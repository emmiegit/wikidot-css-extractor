**Summary:** Pearl Neptunia Langstrum (She/Her) is generally professional but will be a little autistic goober at any given opportunity. Unknown to the foundation, she is a member of the shapeshifting species of Fish people known as Poseifin (although she was exiled for shapeshifting into a human form). She primarily works as the therapist at Site-3. She&#39;s 6&#39;5 btw. She a tall gal.

While she&#39;s primarily a therapist, she can be used in pretty much anything since she has ALOT of free time.

------

= Merseyside, England, United Kingdom

**Departments/Sections:** Investigation Section, Maintenance Section, Storage Section, Department Of Ornithology., Department Of Somniumistics

**Assigned MTF:** Gallahd-7 &#34;Arthur&#39;s Arrow&#34; (Large, multi-purpose), Lionel-3 &#34;Fisher&#39;s Witt&#34; (Small, stealth based team)

**Assigned aic:** TURING.aic

**Site Director:** Belial Hundred (1985-2000), Albert Ezekiel (2000-2015), Billiam Hundred (2015-)

**Cover Story:** Museum (Open on the weekends)

@@ @@

**Description:** Primarily, SIte-3 serves as a storage and analysis facility for [[[https://scp-wiki.wikidot.com/log-of-anomalous-items|anomalous items]]]. Most of the items at Site-3 are so benign they can be mistaken for the mundane quite easily, hence the cover story. Otherwise, Site-3 do the grunt work, the accounting, all the paperwork that can be pushed off to them, usually is. That is why the people of Site-3 are generally more upbeat when it comes to actual research.

The Site-3 dorms are actually individual bungalows, the entire coastal town that surrounds Site-3 being fully Foundation owned and ran. The site itself however... is a labyrinth of incomprehensible layout. 

They purview all of Merseyside and North Wales.

@@ @@

[[=]]
+++ DEPARTMENT OF ORNITHOLOGY
[[/=]]

The department tasked with containing and researching anomalous avian life. They primarily operate out of a vast terrarium in which the birds can fly and cohabitate relatively freely. They utilise liaisons in almost every Foundation Site to transfer, keep track of, contain and locate avian anomalies.

@@ @@

[[=]]
+++ INVESTIGATION SECTION
[[/=]]

A small crew of detectives.

@@ @@

[[=]]
+++ MAINTENANCE SECTION
[[/=]]

The janitors, technicians and all the others who keep the site running.

@@ @@

[[=]]
+++ DEPARTMENT OF SOMNIUMISTICS
[[/=]]

Deals with dream based anomalies. Operate out of the Somniohazardous Containment Wing, which is only accessible via hidden passageways.

@@ @@

[[=]]
+++ STORAGE SECTION
[[/=]]

The crew in charge of Site-3&#39;s primary purpose. Anomalous Item storage. Have two primary underground chambers, similar in appearance to large warehouses. The Storage Wing of Site-3  has only one entrance. Entry by non-storage section members requires approval by the section chief.

@@ @@

[[tab The Feathered Forebearer]]
Long before the universe came to be, long before the Administrator hijacked the realm, long before the first overseer was dropped onto the land, the Feathered Forbearer floated through the void. She watched from a distance as the universe came to be... and she despised it. How dare creation ruin her slumber. She attempted to destroy it, but the Three prevented her, she was slain and her physical form was stricken from the plane. But little did the Three know, her spirit remained in those lands which life does not touch and she was enraged.

She used her almighty force to cast a spell over the universe, she created... birds. Soon her three most powerful creations rose into the light. The Immortal Rufous Sparrow waded the noosphere, Flamingo Bob guided the spirits of limbo and the Dove Eternal observed the world of the living. Soon, as the Foundation formed at the end of the 19th Century, the Feathered Forebearer&#39;s ten apostles would dawn and when they all gathered...

She&#39;d finally be able to take down the blight that ruined her slumber and the Three could do nothing to stop her.
[[/tab]]

This guy is my primary AA and I have thought about him... a lot...
