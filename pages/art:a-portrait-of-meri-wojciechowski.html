[[image https://i.ibb.co/nq03q2Zr/IMG-5405.png]]

Based on [https://scp-wiki.wikidot.com/scp-166 SCP-166], also known as Meri.

[[collapsible show=&#34;+ Artist Thoughts&#34; hide=&#34;- Close&#34;]]
I actually don’t have much to say on this artwork. I really wanted to try a semi-realistic style that was painterly/sketchy, and I like Meri. Been wanting to draw and post an artwork of Meri on the site for a while. So, here it is.

You can do a lot you thought impossible if you just get into it and start creating. I honestly didn’t know I had the skill to make this kinda artwork until I just.. did it! I’m very happy with it.
