**Item #:** SCP-9839

**Object Class:** Safe

**Special Containment Procedures:** All samples of SCP-9839 are to be kept in airtight opaque containers in Site-56&#39;s cold storage. Standard safety precautions for visual cognitohazards and blood products apply.

Attempts to locate any extant copies of SCP-9839-1 are underway.

**Description:** SCP-9839 is a form of human blood that has unusual optical properties. It is an exceptionally bright shade of red -- more so than any existing pigment or any electronic display can properly replicate. SCP-9839 will continue to appear red even in the absence of red light, or in concentrations where regular blood would appear black. Details of SCP-9839&#39;s appearance are abnormally easy to discern, even at a distance or under adverse conditions.

SCP-9839 is a visual cognitohazard. Direct observers report that SCP-9839 appears more &#34;realistic&#34; than its surroundings. They will generally describe this effect as akin to that achieved when a photographic image is placed in an illustrated or computer-generated environment. The neurological basis for this effect is not currently understood.

Psychological reactions to SCP-9839 vary between observers. Most are able to function normally, albeit with lingering doubts as to the nature and/or legitimacy of reality. Observers with pre-existing anxiety about these matters may develop an obsession with SCP-9839 over time. Subjects who are already susceptible to derealization (such as those with certain mental disorders) may abruptly experience it upon viewing SCP-9839. Most subjects also report a greatly reduced emotional response to non-anomalous blood and bleeding.

SCP-9839 is chemically identical to human blood, save for its genetic material, which is comprised of a short repeating nucleic acid sequence that reads &#34;COPYWRITE PORKY576 DONT STEAL OR THE KILL YOU IREL&#34; (sic) when decoded.

SCP-9839-1 was an image file consisting of red text on a black background. When read in full, the reader&#39;s tear ducts would produce SCP-9839 for 30-50 minutes; generally, about 0.4 liters of SCP-9839 were produced per subject. As no extant copies of SCP-9839-1 exist, further details have been gathered from witness testimony.

SCP-9839-1&#39;s text entailed a short horror story about a &#34;lost episode&#34; of the Polish children&#39;s cartoon //Bolek and Lolek// in which the title characters perform a series of unrelated and apparently pointless satanic rituals. The story abruptly concluded with Lolek&#39;s eyes bleeding &#34;hyperrealistic blood&#34;, followed by the assertion that the reader&#39;s eyes would do the same. SCP-9839-1 was barely legible due to frequent spelling and grammar errors.

On July 9th, 2014, all copies of SCP-9839-1 were changed to a non-anomalous image in the same format; transcripts were similarly replaced with text. The text in question is included below.
