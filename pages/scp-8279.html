**SCP-8279:** The Screaming
**Author:** [[*user Zera27]]
⚠️ **Content warning:** Torture, suicide mention
[[[https://scp-wiki.wikidot.com/zera27|Other works by Zera27]]]
[[include :scp-wiki:info:end]]

[[include :scp-wiki:component:info-cw]]

**Item #:** SCP-8279

**Object Class:** Keter

**Special Containment Procedures:** Worldwide communication networks have been deactivated. All methods of exoplanetary travel have been severed. All Foundation military-grade forces and personnel critical to the containment of anomalies capable of causing an XK-Class End-of-the-World scenario are to be surgically deafened and provided basic training in a sign language of their preferred language. Individuals suspected to be contaminated by SCP-8279 must be terminated by any means necessary.

**Description:** SCP-8279 is a memetically-transferred infovirus currently affecting approximately 5.2 million civilians, or 2.6% of Earth&#39;s estimated population. SCP-8279 forces its hosts into a state of constant panic by locking the hosts conscious thoughts into an echo chamber that magnifies fear into a [https://scp-wiki.wikidot.com/scp-2565 conceptual fractal] through [https://scp-wiki.wikidot.com/scp-5920 filtered iterations]. Due to this, and its cross-contamination with other memetic hazards, SCP-8279 quickly became immune to conventional memetic suppression techniques and is subject to a &#34;snowball&#34; effect, where it becomes more potent with each infection.

Infected persons generally experience emotional intensity that would normally be considered non-survivable. Symptoms set in approximately five minutes to one hour post-exposure. Common symptoms include but are not limited to; elevated heart rate, severe paranoia, emesis, uncontrollable screaming, inability to differentiate fiction from reality, aggression towards other people and animals, internal hemorrhaging, suicidal ideation, and organ failure.

SCP-8279 is exclusively transmitted verbally.

**Addendum 8279.1:** Discovery

On ██/██/████, during a routine enhanced interrogation method test, the test subject, D-6549, suffered a panic attack. Unbeknownst to on-site researchers, D-6549 had experienced prior exposure to SCP-████, resulting in her panic attack being transmitted to anyone who heard her voice. Some on-site researchers made outgoing calls to civilians prior to the detonation of Site-██&#39;s warhead, who acted as new disease vectors for the memetic contagion. The resulting containment breach is most frequently referred to as &#34;The Screaming&#34; by survivors.

**Addendum 8279.2:** Interview
&gt; **Interviewer:** Dr. Shilstone
&gt; **Interviewee:** James Fields, an SCP-8279 infected civilian
&gt; **Date:** ██/██/████, one day after the discovery of SCP-8279
&gt; 
&gt; **Foreword:** Dr. Shilstone has been provided with noise-cancelling headphones for this interview. James Fields was selected because he appeared to be conscious enough to attempt communication with MTF Nu-7 &#34;Hammer Down.&#34; Fields&#39; mouth has been fitted with a noise-cancelling speech-to-text muzzle. His hands have been restrained to prevent the removal of the muzzle. A monitor is prepared to display his portion of the interview.
&gt; 
&gt; -----
&gt;
&gt; **Dr. Shilstone:** Hello, Mr. Fields. I&#39;m conducting this interview to get an idea of what exactly we&#39;re dealing with here.
&gt; 
&gt; **Fields:** I can&#39;t get the screwflies out of my flesh. They&#39;re laughing at me. The worms are laughing at me. Mottled and unwavering, nailclippers cutting my teeth. You&#39;re mocking me, aren&#39;t you? Screaming. Scattered across the fires of hell my skin molts away. An earworm of an earworm of an earworm trapped inside my skull, boiling to bursting. I can feel them sawing in the back of my head, taking my memories...  Is my family ok? Are you ok? Eternal scaphism, you slather me in honey for the insects to chew away at my soul. I don&#39;t want to die. I&#39;m going to be pierced by a thousand white-hot nails until the blood gushes from me into a tepid pool. My mother is displeased that I don&#39;t bleed harder, burn harder, freeze harder. Please help me. Please help me. The scream is so loud that it tears me apart, bones snapping as my eyes splinter.
&gt; 
&gt; //Fields coughs up blood, which drips from his muzzle.//
&gt; 
&gt; **Dr. Shilstone:** Christ.
&gt; 
&gt; **Fields:** Why am I chewing my own sinew as I flagellate? I&#39;ll never be loved. I&#39;ll never... I&#39;ll never accomplish anything, be anything. All the worlds children flung from twelfth-story balconies as I watch. Their bodies squashed against the asphalt. You&#39;re going to execute me, aren&#39;t you? That&#39;s what this is, isn&#39;t it? Choking on the never-ending scream. I writhe in the mud, quills piercing all the tenderest parts of myself. I&#39;m infected. Careening into the unknown. I suckle the teat of forgiveness, never to sequester its milk. Please kill me. Shove a spear slowly through my temples and watch as my body spasms. Crunch on my charred skin and surveil my darkest desires. My scalp pe-
&gt; 
&gt; //Dr. Shilstone turns the muzzle off.//
&gt; 
&gt; **Dr. Shilstone:** I think that&#39;s enough of that.
&gt; 
&gt; //Dr. Shilstone exits the interview chamber, the sound of gunshots echoing into the hallway.//
