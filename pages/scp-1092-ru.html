[!--
A NOTE TO POSSIBLE FUTURE EDITORS

Despite being written as a solid piece of text, this text is a classic poem, just like the original Russian text it&#39;s translated from. Like the original, it&#39;s written in the traditional Russian syllabo-tonic style, which implies very strict rules regarding rhyme and the rhythmic structure. While recognized, syllabo-tonic poetry is less common in the English-tradition, so an English-speaking reader tends to look at poetic texts less strictly. Nevertheless, if you decide to introduce any changes to this text, you have to be aware of the syllabo-tonic standards and respect the rhythmic and rhyming structure of the text.

If you find it difficult to parse as a poem, you can find a version of this text ordered in traditional lines here: https://docs.google.com/document/d/1-YyGJcltvWXS1sAbYiK40vtfVDJXZ8Ih97nOInWLMYw/edit?usp=sharing

This text was originally published in 2018, and I reverted a few changes done by other users later because they didn&#39;t follow the rhythm/rhyme of the original text. For example, if you change the number of syllables in a line or move a stress, the verse breaks. If you replace &#34;we only&#34; with &#34;the Foundation&#34;, you move the stress from the 2nd syllable (we-ON-ly) to the third one (the-foun-DATION) and you turn 3 syllables in what sounds like 4 syllables (because &#34;found&#34; in &#34;foundation&#34; is a diphthong so it sounds longer than &#34;we&#34;). If you replace &#34;inflaming&#34; with &#34;spurring&#34; you change 3 syllables into 2 syllables, and you also remove the play on the meaning of inflame/inflamed/inflammation.

I understand that the choice of words and the structure of sentences isn&#39;t always perfect and doesn&#39;t always sound natural. I&#39;m sure it&#39;s known to every one that something like this happens in poetry often for the sake of rhyme and rhythm. While the examples above may seem like improvements to some, from the STRUCTURAL perspective they make the verse worse.

In 2021, after finally translating the attachment, I went back to the original article and added a few changes because I felt like I grasped the structure of the verse better, while still adhering to syllabo-tonic standards.

THANK YOU
--]


**Item #:** SCP-1092-RU

**Object Class:** [[[object-classes|Euclid]]]

**Special Containment Procedures:** As of now, we have only approximate plans of containing the threat that this object presents. Anyone can become an unfortunate victim: doctors, postmen, or clerks—they can all get addicted. Anyone who has ever used rhythm or rhyme, all who trusted a pen with a piece of their mind, even those who forgot of their fondness for poems—none of them are immune; hence are all our worries. 

A continuous search for the possible traces is conducted in various digital spaces. Each suspicious verse prompts a rapid response: MTFs with amnestics and a bag for the corpse.


**Description:** Object ten-ninety-two is a powerful word that takes root in one’s mind and in one’s line of thought. Time and time and again it comes up in their lines, but it’s visible only to uninfluenced eyes.
Once exposed to the word, it will alter the pattern of expression in text: it gets broken and scattered, it’s distorted and filled with unneeded additions, its ideas now changed into rhyming renditions. Since that moment the victim, unaware of the change, will be writing in verse, their words rearranged, to embellish the object and conceal the threat. It cannot be Contained; we are left to Protect.

Every following verse is more powerful, moving; it’s inflaming the listeners, always improving, and it spreads like a virus, it touches the souls. It enchants, it transforms, it infects and it grows. This incredible gift is a curse wrapped as blessing; its effects are untouched by the best of amnestics. For this talent there is but one way to unteach: burn the author along with their passionate speech.


**Addendum:** Our agents and staff have to be highly cautious, as containment requires most radical options. But despite our efforts and strict protocols, the disease worms its way into our reports.

If a member of staff, stiff and callous inside, who does things by the book, never follows desires, cold and dry like a lawyer and a stranger to passion, in a word: a true member of our great Foundation… If they notice a page full of sensuous rhymes, but their heart remains still and their eyes remain dry, this event must be promptly reported above, so [REDACTED] and agents can remove the involved.
