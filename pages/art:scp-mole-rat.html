MISSION STATEMENT
[[image https://scp-wiki.wikidot.com/local--files/art:scp-mole-rat/ATgiJ3l.webp]]
SCP: Mole-rat is a concept art project that aims to bring my view of the SCP Foundation to life, you can see more of my work here https://www.artstation.com/grantguymon


[[collapsible show=&#34;**|ON-SITE RESEARCHER HAZARDOUS MATERIAL PROTOCOLS|**&#34; hide=&#34;//|CREDITENIALS ACCEPTED|//&#34;]]
[[image https://scp-wiki.wikidot.com/local--files/art:scp-mole-rat/8NNuMJV.webp]]

&#34;Hundreds of personnel have been deployed to the incident site... and there&#39;s nothing. A perfectly circular chunk was erased from the coast of South Carolina, thousands are missing, hell, maybe they don&#39;t even exist anymore. Yet again, we have to clean up someone else&#39;s mess. I&#39;m just glad I wont be in charge of the cover-up.&#34; 
//-Concept art for foundation researchers.//
[[/collapsible]]

[[collapsible show=&#34;**|FOUNDATION STAFF AND AGENTS DRESS CODE GUIDE|**&#34; hide=&#34;//|CREDITENIALS ACCEPTED|//&#34;]]

&#34;This isn&#39;t the bleeding-edge research people imagine when thinking of the Foundation. But they&#39;re the bottom line, someone&#39;s gotta keep the lights on&#34;
