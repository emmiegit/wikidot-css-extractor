+ Arsène Lupin In: Money Stalks.

Waking up in the morning, about 9AM, is one [https://scp-wiki.wikidot.com/scp-6000-j Jay Gatsby]. He stands proper and tall, looking out of the window of his beautifully expensive, extravagant mansion. He goes into his walk-in closet, and he pulls one of his suits out of it. It was washed, dried, and ironed by his in-house servants, all paid for with the money that he was able to blackmail out of the Disney Corporation for having created him in the first place. It was all below board, certainly, but it was driving his ability to live the lifestyle he //remembered//. Of course he would never leak this to the media, he would have a bigger target on his head than just Disney, but it worked.

Of course, he was never quite happy-- What person with his kind of wealth would be? He had so many things to be unhappy about, prime of all being the apparent fate of the lover he remembered, but he would drown himself in alcohol once more tonight to forget it all again. He steps outside of his bedroom and finds the halls //completely plundered// of all his trinkets and medals and everything he had found fit to collect.

A servant, holding a contractor bag of trash, comes up the stairs and screams. &#34;Oh my!&#34; He runs down the stairs, followed by Gatsby, who screams for him to call someone! A detective! Anyone!

----

The heavy-set former police lieutenant takes a puff of his cigar, standing alongside the distraught billionaire who had hired him. He had been taking some some Private Investigator work recently, as he had been asked to retire given the fact that he was a fictional character. The precinct couldn&#39;t handle controversy, mostly from the Foundation. It all worked out, though. He enjoyed investigating, and he would always find another case or two to look into.

Columbo takes a look down the looted hallway once more, and clicks his tongue, formulating some words. &#34;Yeeep. Looks like your things&#39;ve been pilfered, Mister Gatsby.&#34; 

&#34;Is that the only conclusion that you could&#39;ve possibly been drawn to?&#34; He huffs.

&#34;Oh, nah. This is just pre-liminary. You gotta give me a little t&#39;call in some of my pals for further investigation, yeah?&#34; Columbo gives a small cough, holding a nearly fully extinguished cigar. &#34;Got an ashtray?&#34;

&#34;Just let it fall. My servants will clean.&#34; The host states, before throwing his arms up. &#34;I&#39;ll be retreating to my quarters for now. Call me when you have something.&#34; He walks off, slamming the door to his bedroom, with the heavy clunk of locks very audible.

He gently stretches and turning to head back down the stairs, when he comes face to face with a man, dressed in servant&#39;s attire. He gives a small, confused look, before a smile. &#34;Hey there.&#34; The man was impeccably well groomed, a small mustache on his face, and a tidied look about him generally. &#34;I thought all the servants were off today?&#34; The Lieutenant queries.

&#34;Well,&#34; He speaks with a heavy French accent. &#34;I did not hear of this. Ah, thank you, //monsieur//.&#34; He gives a small bow, walking down the stairs. It is here that Columbo notices a heavy trash-bag in his hands, as he walks down the steps.

----

Lieutenant Columbo scans across the hall, taking some notes of what was stolen. A vintage lantern, an assortment of Roman Coins, a solid gold bar engraved with Gatsby&#39;s name...

They were all snatched completely without any prints, or anything identifying. He opened drawers, scoped all of this, until he opened a drawer under where a vase was stolen. There was a small piece of paper sitting inside of it, folded so that the contents of the letter would not be seen. He slowly unfolds it, finding a note with perfect handwriting, reading about a guy that Columbo had heard quite a bit &#39;bout, with the whole Foundation fiasco. 

Arsène Lupin.

Well, this just got a bit more complicated than some cat-burglar, but Columbo had some thought about what was going on. He lights up another cigar, taking a large puff of it. Almost sneaking up behind him was the servant from yesterday, holding another large black contractor bag. 

&#34;Well, hey there.&#34; The lieutenant gives a smile. &#34;Good to see a familiar face, I just got a few questions for&#39;ya. Just some general things &#39;bout the mansion.&#34;

The servant gives a small smile. &#34;Of course, //monsieur.// What is there to ask of?&#34;

&#34;You see anyone y&#39;didn&#39;t recognize, later at night?&#34;

He gives a small moment of consideration to the thought, and nods. &#34;//Oui//, I believe I did, Lieutenant. There was some man slipping through the window that points out at the front lawn during one of //Monsieur// Gatsby&#39;s late-night parties. I was going to retire, as I usually clean during the day, but I watched him slip in and take many trinkets from the house.&#34;

&#34;You were followin&#39; &#39;em?&#34;

&#34;Oh, why, yes. I was.&#34;

&#34;Why didn&#39;t&#39;cha try to stop &#39;em?&#34; The Lieutenant queries.

&#34;I was worried, you do understand, //non//? People here in America carry guns everywhere, I fear much for my life with someone such as that.&#34;

Columbo nods. &#34;Reasonable fear, Mister...?&#34; He waves his hand a little.

&#34;Oh, yes, my latter name is Loup. François Loup.&#34;

&#34;Well, it&#39;s nice to meetcha proper, Mister Loup.&#34; Columbo shakes his hand, a big, stupid smile on his face. &#34;Reminds me of my wife, y&#39;know? She learned French in school, y&#39;see, and she says it with me sometimes. Real nice language, sir. You come from France?&#34;

&#34;I do, I do, I moved here when I was about,&#34; He taps his chin, formulating something. &#34;//Douze//, or so.&#34;

&#34;Well, Mister Loup, what do y&#39;do around here? I was wonderin&#39;, y&#39;know? I haven&#39;t actually seen any of your work, I&#39;ve been so caught up in my own, yeah?&#34; 

Loup gives a small smile. &#34;Why, I take out all of the various trashes in the house, and I clean in the morning after //Monsieur// Gatsby&#39;s parties. If I&#39;m lacking duties, I often polish all of the glasses-- The parties use many of those, you see, and it is required for them to be clean for every party.&#34;

&#34;Oh, of course, yeah. No, that makes perfect sense. I was just wonderin&#39;, you know? I get these fears &#39;bout stuff, and I just need to get stuff clarified for it. Well, it&#39;s real good to meet you, I think I gotta get back to checkin&#39; the display cases for this stuff-- This thief is great at this, though. I hate to say this, but they&#39;re clever. Barely any trace of their existence, you know?&#34;

Loup&#39;s mood seems to drop a little. &#34;No trace? You found... nothing?&#34;

&#34;Yep, nothin&#39;. Real good cat-burglar, these types do that.&#34; The Lieutenant shrugs.

The servant begins searching around the desks where the items were stolen, looking in drawers, and finding nothing. He gets more frantic with every drawer, seemingly checking the same one twice.

&#34;Y&#39;see? Real hard to find anything, but, I&#39;m gonna scour around for any fingerprints.&#34; Columbo starts to walk down the stairs, before the servant yelps. 

&#34;Wait! Wait!&#34; He runs to the stairs, regaining his composure as he stands next to the Lieutenant. &#34;Did you not check our cameras?&#34;

&#34;Cameras?&#34; Columbo tilts his head. &#34;Didn&#39;t see any &#39;round.&#34;

&#34;Well, of course not-- //Monsieur// Gatsby has them hidden, so that they would not get smashed by any would-be thieves. Ask him about it, he will show you. I must return to my duties, now, but have a glorious day, Lieutenant.&#34; 

Columbo lets out a little &#34;Hm,&#34; as he watches the servant travel down the stairs with a pep in his step. He gives a small knock-on Gatsby&#39;s door. 

It takes a moment for Gatsby to answer, and he opens the door, disheveled and obviously hungover. &#34;Ah, hey Mister Gatsby. I was wonderin&#39; if you could take me to the camera-room, let me take a look at all the security footage.&#34;

Gatsby narrows his eyes at Columbo, and grumbles. &#34;We don&#39;t have a camera room. I need to get back to sleep. Tell me when you actually find something.&#34; He slams the door in the Lieutenant&#39;s face. Bit rude, but, he&#39;s gettin&#39; paid quite a bit for this. He can&#39;t complain much.

----

The daring, dashing, Arsène Lupin slips down the stairs of the large, lavishly expensive mansion, in his cunning, brilliant disguise. Well, it was one of his last-minute jobs, but it worked fine. Especially because he was still stealing things from right under this Detective Columbo&#39;s nose. He held up his trash-bag of pilfered goods, and passed it off to his crew, acting as the get-away drivers. 

For some reason, he wanted to do this one mostly alone, but he hated to exclude the ones who had helped him get this far completely. He waves a wave to all of them and tells them to flee quickly. It, however, has infuriated him that the Detective has not picked up on any of his clues, so he left a very simple, very big one, plain in the main upstairs hallway, where even the largest dunce would see his mark.

----

The Lieutenant gathered Mr. Gatsby, Loup, and all of his other servants into the dining room, all of the blinds closed, making it extremely dark. Despite the dark, it was the middle of the day, as to not interfere with much of their work. He took his cigarette out of his mouth, tapping a bit of the ash out, and places it back in his mouth. &#34;So, eh.&#34; He coughed a bit. &#34;Yeah.&#34;

Gatsby growled. &#34;Do you have anything of substance to share, or are you just going to //bumble about?//&#34;

&#34;Well, yeah, in-fact, Mister Gatsby, I do actually have something. In-fact, I actually got a copy of your security tapes, and I was able to figure out exactly where the burglar went.&#34; Columbo gave a smile, and with his smile, it was evident that Gatsby and Loup both deflated emotionally.

&#34;You... Found him?&#34; Gatsby let out.

&#34;You //found// him?!&#34; Loup let out, outraged.

&#34;Of course. Yeah, real simple, combing your security tapes on the cameras--&#34; 

Gatsby huffed. &#34;I-- I told you-- How did you get the security footage?!&#34; He slammed his hands onto the table, a low growl being released from his throat. &#34;I did everything I could to keep you from it! You bumbling fool! How did-- Did you bribe one of the servants?!&#34;

&#34;Bribe? Mister Gatsby, I ain&#39;t sure what you&#39;re talkin&#39; about. I just got the footage, and I caught your burglar. We got him at the station, and I was just comin&#39; to--&#34;

Loup stood, placing his foot on the table, and hoisting himself up. In a Shakespearean tone, he spoke to them. &#34;You&#39;ve CAUGHT him? Caught some random cat burglar, when in actuality, the true thief was among you the entire time?!&#34; He throws off his disguise, his full suit, hat, and monocle on underneath. &#34;You have not caught me! Arsène Lupin! You have failed, Detective, and you have made a mockery of your entire craft! I left the most conspicuous, //simple// to find clue to my identity, and you FAIL! You are a disgrace to--&#34;

The Lieutenant gives a small clap. &#34;Y&#39;know, you really should consider doin&#39; a theatre program. My wife? She loves &#39;em, goes to every local play that we get put on. I really was expectin&#39; you to be &#39;ere, Mister Lupin, mostly &#39;cause I found your note.&#34; He takes a slow puff of his cigar. &#34;And uh, Mister Gatsby, I did a little math with a friend o&#39; mine, real good forensic banker, and I figured out that you got a damn good insurance policy on everything stolen. I was wonderin&#39; why you didn&#39;t want me to have footage access, but I guess y&#39;wanted him to get away.&#34; 

Columbo shrugged. &#34;Right. Well, let&#39;s get goin&#39;, you two.&#34;

They both tilted their head at the detective. &#34;What?&#34; They both asked, in unison.

&#34;Well, the boys are &#39;ere. Let&#39;s get goin&#39; and not waste their time. The case&#39;s pretty ironclad, y&#39;know.&#34; Columbo opened the blinds, to show a few police cruisers outside. Gatsby stood, putting his hands behind his back, and Lupin scoffed, doing the same. 

&#34;You know I will escape, yes? You have done your research, nobody has held me long in a cell, //enquêteur//.&#34;

&#34;I did what I was hired to do.&#34; Columbo shrugged, smiling and waving off Lupin and Gatsby as they were taken by the police. He knew that Lupin would slip away, but really, he was just doing this all to help tip off a friend. He opened up his flip phone and gave a call.

&#34;Herlock, I uh, got your guy. Might wanna give &#39;em a talk &#39;fore he gets going.&#34;</textarea></pre>
