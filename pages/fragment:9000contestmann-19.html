    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>**Incident Log 9393-23**

At 2100 hours, Dr. Caroline Wren returned to the SCP-9393 outpost. She told outpost security that she had left some personal effects in the testing facility, and entered.

At 2156, the inner chamber of SCP-9393 was opened, using Dr. Caroline Wren&#39;s credentials. Audio reported various curses, shouts, and sobbing for several hours, finally ceasing at 0327. At 0700, the chamber was opened by Dr. Ronicker, an assistant researcher at the outpost. He found Dr. Wren&#39;s diary and an empty bottle of vodka. 

Dr. Caroline Wren is considered missing in action.
