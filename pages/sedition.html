[[size larger]]**Field Agent Liam Johnston // Department of Applied Intelligence, WATCHDOG Initiative - Field Report p2. - Operation: ██████ █████[[/size]]**

**The Kolyma Gulag __(August 10th, 1944 - January 9th, 1952)__:** A strong contender for one of the worst places to be sent on the planet. I met my good friend Casimir Epureanu there in the gold mines after I arrived following my &#39;arrest&#39;. He was an infantry officer with the 35th Guards, I think. First Ukraine, then to Romania, onto Prague, finally Vienna, and back again. Though, not quite the heroes welcome he was expecting, I suppose. He told me the SMERSH Officers found out about his brother being huge into Antonescu&#39;s Iron Guard, and something else about &#39;reactionary counterrevolution&#39;--or was it &#39;espionage&#39;? I couldn&#39;t keep track of the reasons anymore. Either way, I got snatched off of the streets on my way back in &#39;44 after embedding in in the Red Army. Unexpectedly, I was only picked up after work by Counterintelligence after my superior (Colonel Boris Avramenko) was arrested for seditious behavior. 

Ended up in a cell just outside Kharkov. Damp, dank, and full to bursting with more &#39;malcontents&#39; from every walk of life than I could count. Beyond nightmarish, only comparable to stories about the Third Reich&#39;s own concentration camp infrastructure.

**Escape:** __[ 69.55, 160.96 ]__ **-** He gave me his journal before we split. Pretty sure he made it out once we reached the river, but we parted ways just after we arrived at the banks. I headed north, and he headed west, back to Moldavia. I doubt he got that far. Either way, I managed to exfiltrate on a fishing boat headed down to Sakhalin. I can&#39;t even begin to describe the hellish march under those mountains.

**Journal:** Casimir kept a good record and what went down with the Psychotronics Division. It starts in 1942 after he got his commission, fighting on the backfoot all the way to Stalingrad. When the war started to go the Soviets way, they could afford to trim the Fifth Column. Casimir got snagged on his way to the train station, said someone pretended to be a soldier from his frontline unit before he was picked up by SMERSH. Unlucky. Got shoved on a train headed to Kolyma, where we eventually met in 1944, and escaped in &#39;52.

The contents are mostly irrelevant to the infiltration objectives, but we managed to compile a decent slew of evidence pointing to widespread GRU-P operations all along the northeastern coast of the Union, and much of Siberia. The Gulags act as funnels for resource collection and manpower reserves, though the strife between the &#39;Brotherhood&#39; and the &#39;Bitches&#39; hint at something more insidious than merely Psychotronic involvement. Rituals, occult iconography, a lot of meat and murder. The guards won&#39;t talk about it, and I couldn&#39;t get close enough to the upper class--the big bosses, to ever find anything out. People from that untouchable class showed up dead left, right, and center. Since Casimir was an officer, he immediately caught flak, but lots of those guys banded together when shit got tough. Well, tougher than usual, anyways.

I&#39;ll elaborate in the debrief. I know the Chief wants words with me when I make it back. Here&#39;s hoping they&#39;re brief.
[[/div]]

[[div class=&#34;blockquote&#34;]]
**Interviewed:** Field Agent Liam Johnston

**Interviewer:** Chief of the Department of Applied Intelligence, Elisenda Obrigón

**Foreword:** Field Agent Liam Johnston has displayed an altered sense of identity now incongruent with previously understood recollections of his personality. Throughout the interview he appears to be tense, terse, and above all, paranoid. While Chief Elisenda Obrigón is a known acquaintance and mentor to Agent Johnston, whatever previous relationship the two shared professionally does not reflect in the accumulated conversation.

**&lt;Begin Log, 1952/06/23 - 18:45 (Chief Elisenda Obrigón and Agent Liam Johnston are shorthanded to CEO and ALJ respectively.)&gt;**

**CEO:** Starting log. It is currently the 23rd of June, 1952. The interviewer is Chief Obrigón. Please state your name for the record, Agent.

**ALJ:** Liam Alexander Johnston, Field Agent for the Department of Applied Intelligence.

**CEO:** Thank you, Liam. You don&#39;t know how good it is to have you back.

**ALJ:** I can tell.

**CEO:** Few agents have the mental fortitude to undergo what you did, Agent. Not many people ever come back from being listed &#39;MIA&#39;.

**ALJ:** Well. You knew where I was.

**CEO:** Yes, but only roughly. The prison system is too expansive to keep constant track of your status. Tracking you to the gold mines was already putting a strain on more assets than I would care to admit.

**ALJ:** I suppose so.

**CEO:** We read your report. A bit different from the mainline template I noticed, but the contents were enlightening. Enough so to warrant further investigation.

**ALJ:** There isn&#39;t much else to discuss.

**CEO:** I hope you&#39;re joking.

**There is silence for nearly 15 seconds.**

**CEO:** Right, well, we wanted to achieve further insight into several points of contention regarding your efforts, and that of the journals writer, Casimir...

**ALJ:** Epureanu.

**CEO:** Right, thank you. I have a summary of your notarized report here. Cross referencing with the journal, I understand your time spent in the Kolyma Prison was...strenuous, to say the least.

**ALJ:** I would say so.

**CEO:** Your account mirrors other statements made by agents who have undergone similar experiences, I&#39;ve noticed.

**ALJ:** What, in the GULAG?

**CEO:** Not always in Soviet camps.

**ALJ:** Sure.

**CEO:** Still, it is important to note.

**ALJ:** I imagine so.

**CEO:** Your recounting of your work for the Red Army leaves us confused as to the nature of your detainment, however, if you care to elaborate.

**ALJ:** How so?

**CEO:** You merely state that you were &#39;snatched&#39;. Care to expound on the subject?

**ALJ:** I had committed a crime. So I was arrested.

**CEO:** For your association to the Colonel, one Boris Avramenko?

**ALJ:** He was Ukrainian. Got caught up with nationalists. 58-10.

**CEO:** I&#39;m sorry?

**ALJ:** &#34;Anti-Soviet and counter-revolutionary propaganda and agitation&#34;. 

**CEO:** No doubt such a law was crafted by a very skilled jurist. A very vague basis of prosecution.

**ALJ:** &#39;Politichesky zakliuchonny&#39;. Political prisoners. Carte blanche, a tool of the regime. 

**CEO:** So what did you get?

**ALJ:** 58-12.

**CEO:** Do I want to know?

**ALJ:** Non-reporter. 

**CEO:** Ah. How long was your sentence?

**ALJ:** A year.

**CEO:** But you...Never mind. Let me ask you something more serious.

**ALJ:** I&#39;m ready.

**CEO:** I understand your experiences there within involve elements of the Psychotronics Division, the very same organization we would have had you embed in. When did you first begin to suspect their presence in the camp?

**ALJ:** Early in &#39;47, I believe. I managed to overhear a conversation about something to do with Antarctica. Whaling boats, they said, but I doubt it. Either way, those &#39;whaling boats&#39; got into a clash with something down there[[footnote]] Sources gleaned from operatives in D.C. corroborate this with a clash in New Swabia, as reported by Admiral Byrd and his Antarctican Garrison. Further Pentagram documents recovered all but confirm this.[[/footnote]]. I only heard this in passing, of course. 

**CEO:** I see. When do you believe your first interaction with one of their operatives was?

**ALJ:** What, face to face?

**CEO:** If it was.

**ALJ:** I thought Casimir was a plant, at first. I was scared they knew for a long time. After I realized that nobody was coming for me, I started to trust him more.

**CEO:** So you never met any other operatives outside of that?

**ALJ:** None that I can confirm or known for certain.

**CEO:** Yet you knowingly encountered many of them in the latter half of &#39;49?

**ALJ:** That wasn&#39;t an encounter.

**CEO:** What would you call it then?

**ALJ:** Something else. Experimentation, or fucking //oppression//--something to that effect. Never encounter. Not in a way that would let me part from their company alive.

**CEO:** So what was your personal account of these experiments?

**ALJ:** You&#39;ve read the journal, haven&#39;t you?

**CEO:** Of course. While you&#39;ve vouched for Mister Epure--

**ALJ:** //Lieutenant// Epureanu. Everything he wrote in there is a fact of life, Chief. 

**CEO:** You know that we can&#39;t take everything at face value, Liam.

**ALJ:** The &#39;value&#39; is the ink on the pages. Need me to give an oral statement on the validity of the fucking journal? Here it is, Chief.

**CEO:** Calm down, Liam, it&#39;s an interview, not an interrogation. 

**Agent Johnston becomes visibly agitated.**

**ALJ:** That&#39;s a real blurry line. Listen, okay, I can almost guarantee that I met with a Psychotronics Agent in Kolyma. His name was Captain Petya Vladimirovich Kuznetsov, 115th Tank Brigade. Got caught up in the post-war purges after they found out his father was a Tzarist Officer--58-13, and his wife listened to fucking Wagner a little too close to the window. Want to know what happened to Kuznetsov, Chief?

**CEO:** Liam--

**ALJ:** The guards turned a blind eye when the Brotherhood came calling. Took him to the outhouse, bled him like a pig after they took turns **[DATA EXPUNGED]**. Then they took his body God knows where--but I know what they did. You can smell it on their breath. Nobody else ever got meat, but I know where they got theirs! 

**At this point, Security was alerted to intervene in Conference Room 3A [18:49:13].**

**ALJ:** You read it, didn&#39;t you? You know what happened. You have the fucking gall to question him like that? After all that? Eight years I gave for you, for this rotting fucking carcass, and you think I don&#39;t know what I saw? It&#39;s THERE, I brought it back through time, snow, and enough blood to drown in, you vapid--

**At this point [18:47:42] Security enters the room, and subdues Agent Johnston. The interview concludes. Chief Obrigón has placed Agent Johnston on inactive status. Refer to file ALJ#023 for further information on the Agent.**

**&lt;End Log, 1952/06/23 - 18:48&gt;**

**Closing Statement:** Agent Liam Johnston has returned to active duty upon completion of mandatory debriefing and retraining as of **[1952/12/02]**. For his service he has been awarded the Foundation Star, and has received a meritorious promotion to Advisory Specialist posting at Site-46. Intelligence gathering into the GoI GRU-P continues all across the Soviet Bloc. Agent Johnston&#39;s insight and intelligence gathering has aided in a breakthrough in the understanding of Soviet Counterintelligence.

//&#39;Lieutenant Casimir Epureanu&#39;// has been assigned the Person of Interest designation **//POI-3034-01//**.
[[/div]]

----
= **AN ARACHNE SUPPLEMENTAL**
