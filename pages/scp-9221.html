**Item #:** SCP-9221

**Object Class:** Euclid[[footnote]]Formerly Safe.[[/footnote]]

**Special Containment Procedures:** SCP-9221 is contained within a moderately-sized storage unit at Site-72. Each instance is to be properly labeled for identification purposes. --All experiment proposals must be submitted to the research team prior to approval.-- 

**Description:** SCP-9221 designates 187 traffic cones, varying in size, color, and design.
When arranged [[footnote]]Denoted by the creation of a course, path, or area outlined by SCP-9221 instances.[[/footnote]] the instances connect to form an invisible barrier. With the exception of motor vehicles, the barrier remains permeable to all forms of matter.

**Test Logs:** All experiments involved the use of a teledriving-based automobile and ATDs.[[footnote]]Anthropomorphic test devices; crash test dummies[[/footnote]]
@@ @@
&gt; **Framework:** SCP-9221 was arranged in a horizontal line; instances were spaced 16 meters apart from each other. The test vehicle was then driven into a gap in the line.
&gt; 
&gt; **Result:** The test vehicle collided with the barrier at top speed; vehicle debris was also deflected. None of the SCP-9221 instances were disturbed post-crash.
&gt; 
&gt; **Observations:** Collision occurred despite the test vehicle&#39;s lack of proximity to SCP-9221; it is theorized the anomaly&#39;s barriers are capable of temporary consolidation.
-----
&gt; **Framework:** SCP-9221 was arranged into an obstacle course, featuring multiple speed bumps; the course was to be completed as fast as possible.
&gt; 
&gt; **Result:** Each time the test vehicle encountered a speed bump, it decelerated to 5 mph.
&gt; 
&gt; **Observations:** The operator expressed confusion; he was not attempting to decelerate.
-----
&gt; **Framework:** SCP-9221 was arranged into a driving course. Midway, the course suddenly elevated to a platform raised above the ground; there was no connecting ramp.
&gt; 
&gt; **Result:** Upon reaching the ground course&#39;s terminus, the test vehicle appeared to rise upwards at a steep inclination, allowing it to reach the platform.
&gt; 
&gt; **Observations:** It is believed SCP-9221&#39;s barriers were responsible for the test vehicle&#39;s inclination, inadvertently operating as a makeshift ramp.
-----
&gt; **Framework:** SCP-9221 was adhered to all interior surfaces of the testing chamber.[[footnote]]Including the walls and ceiling.[[/footnote]] They were arranged to form a continuous driving course.
&gt; 
&gt; **Result:** Even when encountering atypical driving surfaces, the test vehicle&#39;s gravity automatically reorientated itself towards the course&#39;s confines.
&gt; 
&gt; **Observations:** Researchers theorized the change in the gravity was due to SCP-9221&#39;s barriers pressing against the test vehicle from the top-down.
-----
&gt; **Framework:** SCP-9221 was again arranged into a driving course; the course possessed a narrow segment featuring 0.3 meter constriction.
&gt; 
&gt; **Result:** The test vehicle was laterally crushed once it reached the constriction.[[footnote]]To a total width of 15 centimeters.[[/footnote]] Despite this, it was still functional. Upon leaving the constriction, all damage sustained to the test vehicle was reversed; this did not extend to the ADTs, which had been destroyed.
&gt; 
&gt; **Observations:** //(See -- Addendum.01)//
-----
@@ @@
**Addendum.01:** Researchers speculated SCP-9221 held additional properties than initially assumed. It was soon discovered that non-anomalous traffic cones were capable of temporarily obtaining SCP-9221&#39;s properties when used in conjunction with the anomaly. This prompted additional testing.
@@ @@
-----
&gt; **Framework:** A driving course was constructed using SCP-9221 and a wide variety of non-anomalous traffic cones -- including RC mini traffic cones (Segment 4.)[[footnote]]ATDs were not available; new ones had to be ordered.[[/footnote]]
&gt; 
&gt; **Result:** The test vehicle transformed into a visually-matching, RC car in Segment 4. Once driven out of Segment 4 it immediately reverted back into its original form.
&gt; 
&gt; **Observations:** It was presumed Segment 4 would not trigger SCP-9221&#39;s effects  due to the cones&#39; lack of official regulatory status. Researchers speculated that the anomaly affects traffic cones based on their appearance rather than their intended utility.

-----
&gt; **Framework:** A driving course was constructed using SCP-9221 and miniature traffic cones constructed from Lego pieces (Segment 2.)
&gt; 
&gt; **Result:** The test vehicle transformed into a visually-matching, Lego construct in Segment 2.[[footnote]]The construct was reminiscent of similar products released under the //Lego Technic// toy line.[[/footnote]] The object was extracted from the driving course without fully completing Segment 2.
&gt; 
&gt; **Observations:** Even when reintroduced to this exact driving course, researchers were unsuccessful in reverting the test vehicle back to its original form.
-----
&gt; **Framework:** Along SCP-9221, the driving course was constructed with images of traffic cones drawn through the use of sidewalk chalk (Segment 3.)[[footnote]]The research team was also finally supplied with multiple sets of ATDs.[[/footnote]] 
&gt; 
&gt; **Result:** The test vehicle transformed into visually-matching chalk drawing in Segment 3; it was unresponsive to controller input. Additional SCP-9221 instances were superimposed onto Segment 3. The test vehicle reverted back to its original form; the ATDs did not.
&gt; 
&gt; **Observations:** Multiple drawings remained in Segment 3; they resembled the ATDs.
-----
&gt; **Framework:** Along SCP-9221, the driving course was constructed alongside a computer laptop running the game program //Traffic Rush//.[[footnote]]An incomplete racing game in early stages of development; it was specifically created for this experiment.[[/footnote]]
&gt; 
&gt; **Result:** The test vehicle dematerialized upon contact with the laptop. A visually-matching, in-game vehicle was located within //Traffic Rush//; it was situated within a traffic cone lane. 
&gt; 
&gt; As the asset was unresponsive to controller input[[footnote]]Both teledriving and in-game.[[/footnote]] the player vehicle was used to ram the asset out of the lane. Upon doing so, the asset disappeared. The test vehicle rematerialized, sustaining massive damage consistent with high-velocity collisions.
&gt; 
&gt; **Observations:** Post-testing, it was realized the ATDs were absent; multiple assets resembling crash test dummies were found within the in-game traffic cone lane. Intrigued, researchers contemplated on possibly recovering the ATDs during a transformation event.
-----
&gt; **Framework:** Along SCP-9221, the driving course was constructed alongside a written manuscript containing the following paragraph:
&gt;
&gt; 
&gt; //{{&#34;The sun rose high above the desert highway -- traffic cones were arranged perfectly on both sides of it. The cones, like the road, seemed to stretch on for miles.&#34;}}// 
&gt; 
&gt; **Result:** The test vehicle dematerialized upon contact with the manuscript. The manuscript then featured a second paragraph:
&gt; 
&gt; 
&gt; //{{&#34;Suddenly, a car appeared out of nowhere! It drove for a moment. But __only__ for a moment. Without a driver proper, the old tired machine slowed to an awkward, but graceful stop.&#34;}}// 
&gt; 
&gt; Determined to recover both the test vehicle and the ATDs, researchers wrote a third paragraph:
&gt; 
&gt; //{{&#34;However -- for no reason at all -- the car miraculously regained its driving force. Nothing could stop it from reaching the end of the road, taking itself -- and the ATDs -- back to where it came from.&#34;}}// 
&gt;
&gt; 
&gt; Upon completion of the third paragraph, the test vehicle rematerialized; the ATDs were again absent. Inspection of the manuscript revealed a fourth paragraph:
&gt; 
&gt; //{{&#34;Unfortunately, that dream never came to complete fruition. Four test dummies laid battered and abandoned at the road&#39;s end, never to be seen again. A bittersweet ending **indeed.**&#34;}}// 
&gt; 
&gt; **Observations:** //(See -- Addendum.02)//
-----
@@ @@
**Addendum.02:** SCP-9221’s properties proved capable of even extending to curated representations. This prompted researchers to expeditiously initiate a multidisciplinary strategy session for future proposals -- particularly towards developing new experimental driving courses; the researchers believed they were on the verge of a major breakthrough. 

However, 13 automobiles had suddenly manifested within the boardroom without warning mid-session. Although there were no fatalities, the survivors sustained severe injuries. Furthermore, a medical diagnosis revealed that the researchers have been infected with a mimetic hazard (SCP-9221-A.) Analysis of SCP-9221-A identified multiple symptoms that appear consistent across all 13 hosts:

* **Sterility:** Unlike most memes, SCP-9221-A is incapable of infecting additional hosts;

* **Cephalgia:** Hosts are continuously afflicted with a minor headache. The symptom worsens whenever the host reflects on SCP-9221-A&#39;s existence;

* **Fixation:** Hosts frequently ruminate over the concept of traffic cones, even in scenarios where they are not relevant to the situation at hand;

* **Paralysis:** Hosts are prone to selective, full body paralysis when operating any kind of motor vehicle, inadvertently leading to vehicular collisions;

* **Depersonalization:** Hosts perceive their bodies as uncharacteristically smooth, completely hairless, and patterned with numerous black and yellow Secchi disks.

Not only was testing occurring just moments before the incident, it was learned the test vehicle had inexplicably dematerialized during experimentation with SCP-9221. The automobiles, despite design variances, were similar to that of the missing test vehicle. Alarmingly, it was confirmed that the test vehicle was supplied ATDs prior to dematerialization.

Amnestization protocols had failed to negate SCP-9221-A&#39;s effects; as such, all hosts are to be quarantined until this issue is resolved. Further testing with SCP-9221 is currently suspended.
