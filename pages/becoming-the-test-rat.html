[[f&gt;image Tale size=&#34;medium&#34;]]


    “I’ve been saying for months this is a terrible idea.”

    Dr. Louise Stefansk was staring at her desk, eyes unfocused. Her mind was elsewhere. First, Anna Scranton, then, the fatigue eating at the back of her eyelids.

    “Too many ‘sad’ scips for one department. It&#39;s going to start getting to us.” The voice behind Louise turned around in her desk chair. Level 3 researcher Olivia Rose stared at the back of her superior’s head. “Don’t you think so, Louise?” she asked.

    Louise Stefansk sighed, leaned her head back and stared at the ceiling. “I heard other departments get opiates. O-5’s sweep it under the rug.”

    Olivia raised her eyebrows. “Perhaps they’ve already gotten to you.”

    Louise straightened her posture, smiled slightly. “No, it&#39;s just the hours I think. Sure, we’ve got 3020 and 8652, but it&#39;s not like we have 173.”

    “[[[scp-106|Or 106?]]] Speaking of, why are they always at the same site? And 96? Seems like a pretty obvious containment incompatibility.” Olivia laughed. 

    Louise, as a level 4 researcher, had had special training to hide her emotions. She was put through SERE. She was starved for a month. Once, the Chaos Insurgency had (unsuccessfully) ambushed her convoy during a transfer. She spent two weeks touring Site 19. Still, her eyes flickered at the thought of what happened to Anna Scranton.

    Olivia pursed her lips. “You’re not sustainable, 4. You’ve been missing fine details recently. I’ve caught them but eventually I’ll mess up, too.”

    Louise paused, stifled the anger that would have been in her tone. //I knew what I was getting into but this is too much// she thought. “I know, but it’s not exactly like I can step down. We should just be happy someone is [[[scp-8652|wearing 8652]]] right now.”

    “Fair, fair. Propaganda has been putting in overtime getting that position filled,” Olivia said. “You know what? When was the last time you were on the surface?”

    Louise brushed back her blonde hair. “Hell, must be close to 6 months.”

    Olivia smiled seeing Louise’s mood change. “I’ve been meaning to go up. I hear there’s snow. I bet we can leverage our work with 8652.”

    Louise clicked her pen and wrote ‘Olivia walk’ on the bottom of a post-it that already had 4 other tasks written on it. Olivia smiled and wheeled back around to continue her data analysis. “Thanks, 4.”

    Louise refocused on her own work. She had just input her latest interview with D-22. //Poor girl. Already at 12 days. We’re lucky a handful of D-Class are waiting behind her.// The truth was that Louise had seen 8652 chew up a dozen D-Class. It likely had more death tied to it than anything else in light containment. Its applications, however, were interesting. Almost a complete painkiller, including starvation or dehydration. It could be considered a form of euthanasia if one really thought about it. In fact, D-18 had requested 8652 for just that reason. He traded his psyche for relief from whatever scip had taken his legs. //It’s like running an animal shelter for humans over here.//

    Light Containment didn’t have too much to worry about when it came to world ending threats. For this privilege, they did paperwork. Hours passed and the clock’s hands moved steadily. It was a Friday, and Louise and Olivia burned through another pot of coffee that afternoon. The work was not tedious– but it was draining. Submitting recommendations for this or requesting permission for that. Interviews and vital signs and clearance codes all needing submission. Once all their mandatory work was done, the pair’s pet projects took the rest of the time. Not much to do below-ground anyways.

    Louise raised her coffee cup to her mouth and realised it was empty. Olivia noticed. “Maybe time we call it a night?”

    Louise scanned her desk. Nothing in red ink or flashing lights told her to stay awake. “Yeah, I think so.”

    “I’ll tuck in all the scips. You can call it, Louise. I’ve got one last form to submit anyways; I was waiting for the other Level 3’s to sleep before I sent it,” Olivia said.

    Louise nodded and smiled tiredly, “You better not turn out like me.”

    “Only the good parts. Night, 4.” Olivia said, turning back to her desktop.

    Louise chuckled and left.

    Olivia pretended to work for another hour before breaking the facade. She briefly glanced around her shared office space and waited until nobody was walking past the door. She booted up Louise’s PC and waited for the password screen. The Foundation made researchers change their password incredibly often– to a fault. Memorizing a new key every week was impossible and most researchers made their passwords pattern based. Pressing a pattern of keystrokes was easier than remembering which variation of birthdays they had decided on Monday. Olivia had noticed that this was the second week that Louise had typed her password with only her right hand, and close listening made it apparent that the keystrokes were from right to left. Olivia entered “L&lt;KMJNl,kmjn” and on her first try was allowed access. 

    Olivia had taken a particular interest in Louise after years of climbing the Foundation ranks. She was confident and worked hard, even when she knew the work was meaningless. SCP 8652, however, was anything but meaningless. Louise’s lack of creativity with applications relating to 8652 had allowed Olivia to notice trends nobody else had. The visions were set to specific dates. It seemed to be a lunar calendar, which is highly irregular, but the pattern was evident to anyone not overworked. For example, visions of child abuse always followed visions of patricide. Lying, theft, forgery; all of it was predictable. And if D-22’s interview was correct, then the mask was a form of lie detector. Suspected criminals could be asked to wear the mask, and depending on the vision, their guilt could be determined. That is not even considering the mask&#39;s value as a survival device: all needs and pains blanked out by guilt. Train an individual in mental fortitude and they could wither away to bones without ever feeling it. In low-food or water situations this could be highly applicable.

    Louise, however, had seen none of this. Or at least she pretended not to. Olivia wanted to find out why. Logging in the same credentials into the Foundation Portal, Olivia clicked the ‘Personal History’ tab. Louise’s entire past career popped up in little footnotes, summarizing over twenty years of Foundation service in a couple hyperlinks. 

    “Damn, 4. You’ve been around,” Olivia whispered, reading through the files. As a level 1 researcher Louise had overseen new containment procedures for a Site in Alaska. That promoted her to level 2, where she worked at Site 120. //Site 120?// Olivia thought. She leaned back in her chair, trying to remember the number. Something important had happened there years ago, right as Olivia had imbedded in the Foundation.
    Cold realization wound its way up Olivia’s spine. //That&#39;s the site with the 106 breach//. Olivia pursed her lips. //Bad joke on my part//. Olivia clicked on the Site 120 link. There were many level 4 clearance and below documents, many of them relating to interdimensional spaces or Hume levels. Olivia noticed a particularly interesting signature next to Louise’s; Anna Scranton. 

    Anna Scranton, wife of Robert Scranton, was a leading figure in interdimensional studies. A genius when it came to Hume and pocket dimensions, she disappeared after the breach at Site 120. //After 106 was at Site 120//. The Foundation wouldn’t put it in text, but it was apparent what happened.

    Scrolling, Olivia dug a little deeper. It seemed like Louise and Anna spent the majority of their level 3 careers with one another. Successful updates to various containments here or there. Requests and approvals for new protocols following breaches. Olivia’s eyebrows slowly raised without her realizing. More and more papers and materials of incredible achievements on Louise and Anna’s part. Much more than Olivia herself could ever hope to achieve, especially at this Site, and especially within the next 5 years of her career. 

    //5 years? I’m losing myself here,// Olivia thought. Olivia didn’t give a damn about the Foundation. She didn’t give a damn about their regulations or whether they were able to squeak out an additional 3% efficiency. That was all her life was? A few numbers on a spreadsheet? A decade of her life was gone with nothing to show. No, this was not for her. All of the other organizations offered her more; offered her power. Better yet, none of them had contacted her. Olivia acted alone and in defiance of her employer. Completely under the radar, in a no-name site, and level 4 clearance to information.

    Olivia scanned Louise’s intranet messages. Admittedly, Olivia had a soft spot for her. She was gentle and kind despite her authority. Even Olivia could appreciate that. //Perhaps it was Anna that made her that way.// For some reason, Louise had been quiet and offputting for the past week. Something was obviously bothering her.

Olivia clicked on the ‘flagged important’ tab. Her mouth opened slightly. She was stunned. The message header, from an Administrator, was in large bold letters: **Keter SCP Transfer - 106**. Olivia opened it. A greeting she didn’t read, body paragraphs detailing dates and times for the transfer, and a reasoning that she briefly read. 106 would be transferred to this site. In less than a month, the Old Man would be housed less than a city block away from them. Olivia closed the message without rereading the 106 file attached at the bottom. She quickly logged out of the entire computer and stared at the black screen. She saw her own face, mouth still open, in the reflection. She couldn’t feel her jaw enough to close it.


Louise could see the gray in her hair blooming through the bathroom mirror. She liked turning her phone’s flashlight on and leaving it on the sink. An old habit, she supposed. The soft light was opposed to the Foundation’s usual harsh overhead fluorescence. It had the extra benefit of hiding her wrinkles and gray hair. //But not this morning, huh?//

As she brushed her teeth she contemplated the monster beneath her feet. Heavy containment was only a hundred or so feet down. An elevator ride away. For 106, he could walk through the material in less than a minute. Louise stared at her shadowed face as she moved her toothbrush back and forth. She imagined his hands around her neck, reaching from the unlit room behind her. She imagined her flesh melting away– the hot sizzle and pop as it corroded into nothing. 

The curse of being a level 4 is that there was nobody left to confide in. The Foundation likely had spies tapped into everything she did. A mention to anyone, even Olivia, would likely end in her demotion. She’d have to battle her fear and morbid curiosity in silence. 

As a bonus, transference of such a big-name scip as 106 meant very little fanfare. He was likely already downstairs and nobody in this entire wing would be aware of it. Not Olivia, not the MTF, not the cafeteria lady. One containment breach and they’d all be a pile of rotting flesh without warning. It made Louise wonder about what else was in Heavy that they didn’t tell even her.

A thumping on her apartment door made her jump. A voice came through the metal door, “Louise? Haven’t kicked the bucket in your sleep, have you?”

Louise spit out her toothpaste. She cursed under her breath. “No, give me a minute I’ll be right out,” she shouted back. Throwing on her labcoat and turning on the lights, she opened the door to find Olivia standing with two cups of coffee. 

“Morning,” Olivia said. “I got you the mug with the cat on it from the staff room. You ever have a cat?”

“Thanks,” Louise said, taking it. “A long time ago, before the Foundation.” The pair began walking to their shared office. 

“Me too. I wish we could have pets down here. Ones that didn’t need containment procedures, anyway,” Olivia added. “They are remembered many times longer than they lived, which is much more than any of us can hope for.”

“Fairly morbid so early, huh Olivia?” Louise asked.

“D-22 died over the weekend. Happened during the morning change, like the others. They’re waiting for our signatures before they give the mask to D-23.” Olivia said. She thought she was doing a good job of hiding her worry about 106.

“Any clue as to what the sin was?” Louise asked.

Olivia shook her head. “We’ll have to watch the tapes.”

The pair came to their office door and Louise swiped her keycard. Monday morning means another new password. Olivia listened in her office chair, back turned, as Louise typed something on the left of her keyboard. Louise typed it in again to confirm and opened her intranet. The notification from Personnel asked for a signature in order to pass on the mask. Louise digitally signed it without bothering to read the D-Class’ file. Wasn’t much use in getting attached. 

She scrolled onto the next notification. She raised an eyebrow. “Hey, Olivia? They denied it. Your walk, I mean.”

“You’re serious? C’mon, not like I need to spend every minute down here watching vital signs,” Olivia complained.

“I know, I know. Maybe something is going on at the Site and want a lot of foot traffic–” Louise offered and cut herself off. //Was that telling too much?//

Olivia went quiet, thinking the same thing. “Yeah, sure.” Is all she offered.  

Olivia made a scene of being irritated for the rest of the morning. She put in headphones, had the system do its usual scrub for memetics, and watched D-22’s last 5 minutes.

She was seated on the floor, legs crossed. D-22 knew what sunrise meant. She appeared to be slowing her breathing. The wristband that measured her vitals was reading 40 beats per minute, which was low for an average person, but not for someone who hadn’t eaten or drank in 12 days. At 6:46, D-22 reached for her throat, her bpm hit zero, and that was that. The video recording shows the attending nurse walking in and checking for a pulse before sending Propaganda a message.

“Nothing of note with D-22,” Olivia said. “Same as the others. No last words, either.”

“Could’ve been a bad vision or just time, then?” Louise asked.

“Yeah. No way to know.” But Olivia did know. Today was a ‘hyperviolent’ day. Either murder or patricide; results had been unclear since the D-Class who reported it had murdered his father. More importantly, it means that Olivia’s pattern was still correct. If she had to guess, tomorrow would be burglary, followed by academic dishonesty, then adultery. The day after that was another ‘hyperviolent’ day. It was difficult to tell exactly what action was tied to the 23rd day in the cycle as ‘hyperviolent’ days often led to the D-Class’ demise. This week was especially brutal as that meant the D-Class was only expected to last four days. Olivia would have to avoid getting attached as well. “Is the next D an inmate, too?” Olivia asked.

Louise pursed her lips, already looking at D-23’s file. “Her data is wiped clean. Nothing but the past month of captivity.”

Olivia raised an eyebrow. “That means demoted Foundation member, right?”

“Likely. Not our job,” Louise said. //Better than getting 106 duty,// she thought.

Olivia wheeled her desk chair over to the security camera looking into D-23’s apartment. There on the couch was a woman, middle aged, wearing a D-Class orange jumpsuit. She looked around her new abode with the curiosity of a child unaware that they’re in trouble. Olivia felt a strange pull to D-23; she watched her for a few minutes. In all respects she seemed like an ordinary, not depressed person.

“Hey 4, can I do the interview this time?” Olivia asked.

“Oh, sure,” Louise answered. “Has to get done before lunch then.”

Olivia stood up and chugged the rest of her coffee. “I’ll go right now.” She strolled past Louise and out of the office.

“Don’t say anything I wouldn’t,” Louise shouted after her.

//Just amnestics having her space out or what?// Olivia thought as she passed doorways into other offices. //Why do I give a damn? She’ll be dead in a few days. Note to self; don’t say that in the interview.// Olivia paused in front of the apartment door. She took a deep breath before letting herself in.

SCP-8652’s apartment was better furnished than either Olivia or Louise’s dorm. Tan carpet and red furniture gave off a rather 80’s vibe. Wood and leather tables and couches were at odds with the usual black and gray Foundation aesthetic. Perhaps this was what D-23 had been enamoured with. 

D-23 stood, unsure of the formalities. “Uh, hi.”

Olivia nodded. “Good morning, I am Olivia Rose, a level 3 from Containment. You may also meet my superior, Dr. Louise Stefansk during your stay here. You can sit wherever you are comfortable.”

D-23 glanced around the living room. “This is fine.”

Olivia helped herself to a chair opposite of D-23. “So, to start; what is your name?”

“D-23,” the D Class responded.

“No,” Olivia chuckled, “Your actual name. This is a sort of baseline test. We need to know your mental faculties are in order.”

D-23 paused. “I have no idea what you mean. I was told a week ago that I was D-23.”

“A week ago?” Olivia blurted out.

“Yes, just about when I woke up.” D-23 said.

Olivia held her tongue. This was definitely a heavy dose of amnestic work. This woman’s mind had been completely wiped. //Why?// Worst of all, this dialogue would likely go above Olivia’s head. //Someone sent her here, level 4 or above. Damn!//

D-23 had her eyebrows raised. “Should I have been given a name, too?”

Olivia shook her head and unconsciously changed her tone. “No, no. Everything is fine, 23. Is it okay if I call you 23?”

“Yes, I think so. You’re in charge after all,” D-23 said.

“No- it doesn’t matter that-” Olivia sighed. //Just do your job. Analyze the morals later.// “Do you know how old you are, 23?”

“I was told I am 32,” she nodded.

“Do you know what you are doing here?” Olivia asked.

“I am going to wear the mask and be absolved of sin,” D-23 stated.

Olivia clenched her jaw. She needed to tread lightly. “Can you clarify that last statement?”

“I must have done something wrong,” D-23 started, “Or else I’d have a memory. Some others in orange jumpsuits explained amnestics to me in the cafeteria. They wiped my memory so I couldn’t remember what I did. I saw the posters advertising the effects of the Mask. So I signed up.”

Olivia said the question she thought in her head, weighed whether she could ask it, then did so anyways, “How do you think that is going to help?”

“Well, I’m good as dead anyways. Can’t exactly go outside; I don’t know my name after all. I’ll die down here eventually and so maybe it&#39;s better that I do a good deed on my way out.” D-23 said.

Olivia took a breath. “You’re just taking everyone’s word on this?”

D-23 shrugged. “I’ve seen the posters, and they gave me the percentages that say the mask prevents other people from feeling bad. I’ll prevent murders as long as I wear it.”

“Yes, that is true,” Olivia said. “I’d just like to make sure you know what you’re doing. I need to make sure you’re not being– coerced.”

D-23 could see she was irritated. “What are the other questions you need to ask?”

Olivia looked down at the single sheet on her clipboard. One last question remained. “Well– what’s the worst thing you’ve ever done?”

“Ah, because it may come up with the mask,” D-23 paused and looked up, thinking. “I swiped another jumpsuit’s french toast stick when they weren’t looking yesterday. Does that count?”

Olivia thanked D-23, told her that she’d likely wear the mask tomorrow, and excused herself. She marched back to her office with white knuckles gripping her clipboard and recording device. She recognized her anger in front of her shared office and internalized it. //It is not Louise’s fault, but it’s her problem.//

As the door slid open Louise looked up. “Well you look pissed.”

“She doesn’t know anything, 4.” Olivia tried to keep her voice rational.

Louise could hear the irritation. “Explains why it was a short interview. What did you get out of her?”

Olivia side-eyed Louise. “No, I mean that she’s been amnesticized to Hell and back. She can’t remember anything past the last week.”

Louise raised an eyebrow. “She must have done something pretty bad, then.”

“She’s like a child, 4. I asked her what the worst thing she’d ever done and she said she stole some french toast from another D-Class. Its like having an innocent person on death row,” Olivia put her stuff down on her desk. “How are we supposed to go through with this?”

Louise spun in her chair to face Olivia. “By doing our jobs, Olivia. She’s getting the mask one way or another; it&#39;s up to us to make her sacrifice worthwhile.”

Olivia looked around the room as though a third person was listening. “We’re condemning someone who has no clue why they’re going to die. She volunteered for this! Effectively one week on Earth and she has volunteered to sacrifice herself for the greater good. There is no way she deserves to die. O-5 probably just wants her gone.”

Louise paused, one hand running through her hair as she listened. “Be careful what you say, Olivia.” She knew her friend might say something that got her in D-23’s place. 

Olivia’s arms were straight and her hands fists. //I hate this whole fucking place. Every hour of my life dedicated to a system that’d toss me a pill cocktail and sacrifice me to some anomaly. I bet everywhere is like this. Not a damned group that acts altruistically. Not a damned one.// Olivia nodded resolutely. “Goodbye, Louise.” Olivia walked out of the office without bothering to log out of her computer.

Louise had a feeling Olivia was overreacting. Maybe overworked. Regardless, Louise didn’t make level 4 without crossing her t’s and dotting her i’s. She needed to cover her own ass. “I’m assuming I’ll see you after lunch,” Louise called out, half to Olivia and half to any listening devices in her office.



When Louise brushed her teeth the next morning, there was nobody to knock on her door. There was no one to bring her coffee or talk her ear off about the little things.

Louise entered her office and Olivia wasn’t there. Too nervous to eat, Louise hadn’t grabbed breakfast. She sipped on her black coffee as she scrolled through her intranet messages. Nothing new. 

Louise pursed her lips as she filled out the missing persons report. //I’ll submit it after lunch// she told herself. [[[SCP-7645|Not like she could have gone anywhere.]]]

Before lunch, of course, was the D-23 interview. Louise looked up at one of the many monitors on the wall. D-23 was in the living room, wearing SCP-8652, sitting on the couch. She was sitting on the edge kicking her feet like a little girl. //Maybe Olivia was onto something.// Louise stood up and slowly walked over to Olivia’s desk. She looked down at the clipboard with Olivia’s notes on it. Reaching for it felt like an admission of guilt. //Doesn’t matter, it needs to happen either way.//

Louise didn’t bring her coffee with her on her way to SCP-8652-1. Her anxiety left a pit in her stomach, but she kept her head held high for the cameras. She let herself into the containment chamber.

D-23 looked up at Louise, one eye showing through the mask. “Oh, good morning,” she said.

Louise was disquieted by the joy in D-23’s voice. Normally the first day was one of the worst. “Good morning,” Louise answered. “Do you mind if I sit?”

D-23 motioned to where Olivia had been 24 hours ago. “Go right ahead.”

Louise sat down. “My name is Louise Stefansk, a level 4 from Containment. For the record, can you state your name?”

D-23 giggled. “The lady from yesterday told me about you,” she said. “And I told her my name was 23.”

Louise pursed her lips. “Yes, she told me about your conversation yesterday. I just need to run through my checklist, okay?”

D-23 enthusiastically nodded, still kicking her feet. 

Louise didn’t look at her script. “Who are you seeing today, 23?”

“A bunch of people without hands,” 23 said plainly. “They all look very sad. It reminds me of a movie scene that should make me sad.”

“Mmhmm.” Louise said, squinting. “You don’t feel any emotions when you look at them?”

23 shook her head. “Nuh-uh. Sometimes, I see some that have stolen food, and I feel hungry.”

“Oh, these people have stolen things?” Louise asked. 

“Yes. And sometimes it is me who has stolen something. But I still have both of my hands,” 23 said. She held out her hands and flexed her fingers to show Louise that she did in fact still have both hands. 

“I see,” Louise said. “Do you feel hungry at all? Thirsty?”

D-23 shook her head. “Not since yesterday. Haven’t slept, either.”

Louise nodded, noting this on the clipboard. //Maybe she’s a psychopath. Unable to feel. Maybe if we force-fed her, we could have her wear 8652 indefinitely.// “23, would you feel comfortable taking the mask off for me?”

“But then people would murder each other again.” 23 said.

“Only for a minute, 23. It is standard practice,” Louise answered.

23 did as she was asked. She took the mask off and placed it on the coffee table between them. Almost immediately, 23 made a disgusted face. “I feel sick,” she said.

“That is normal. You’ve gone a whole day without eating, drinking, or sleeping,” Louise explained.

D-23 looked at the mask like a dog looks at human food. “Can I put it back–”

The lights went out.

Louise let out a slight yelp. There was nothing for a moment; no sound, no lights, no thoughts. Then a strobing red light filled the room. A light that Louise had seen before– a decade ago– at Site 120. A slow rumbling, a crash. The ground beneath the two rumbled. A low droning alarm began. 

There had been a breach.

Louise looked at D-23’s face in the strobing light. She looked curious, pensive. Completely unaware. “Not… normal?” D-23 asked.

Louise tried to stand but her knees gave out. “No… no–” she mumbled. 

“Should we leave?” asked 23.

Louise looked around the room. The furniture was only lit by flashes of red light. The chair there, then gone. The box for SCP-8652 there, then gone. Flashing, like little red-shifted pictures of a room she once knew. 

Louise thought she was hallucinating the smell. The smell of a man on fire, but with no smoke. The horrid stench of acid on living tissue. Flashing, red light on the wall behind D-23. Louise watched a black pit open up behind the test subject. Paint dripping away in gooey piles. D-23 turning her nose at the scent but not determining its source. 

Louise couldn’t find the breath to tell her to turn around.

An acrid arm emerged from the melting concrete. First five fingers, then an elbow, then a shoulder. A bald head with yellowed smile followed, leaning over D-23. The old man reached down, grabbing a handful of 23’s hair. 

The smell of burning hair awoke Louise from her stupor. Her and 23 both screamed. D-23 reached up instinctively, trying to swat away the burning sensation. She found her hands hitting two lanky, black arms that bit into her skin. The sensation of her scalp melting covered the pain from her limbs. The splat, splat, splat, of D-23’s quickly deteriorating arms hitting 106 away. Sinew tore from flesh, carpals split from metacarpals. The old man reached onto D-23’s screaming head. Her hands rended to nubs, her wrists fallen into her lap, her hair burnt around her. 106 dug and dug, squirming his way through the skull and into 23’s neck. With a jolt, D-23’s shoulders fell and she went limp.

Louise knew not how she got to the apartment door. She pressed her level 4 badge to the scanner, expecting it to open. It beeped in error. The containment lockdown had been initiated; it wouldn’t budge. Louise realized in her other hand was 8652. 

SCP-106 made his way to the old woman. He did not bother to walk around the couch, but rather through what was left of D-23. His feet sounded wet on the carpet, his smile flashed in little red instances. 

Louise had her back to the door. She held up SCP-8652 as though it would scare it off. She whimpered, no, thought, //NO!//

106’s stride did not slow. He held up an arm, lifted it past the outstretched SCP-8652. Louise lifted her chin as he pressed on her neck. She whimpered, but realized there was no pain. 106 pressed and pushed, sending Louise through the door. The red flashing light slowly faded, and Louise felt her body go weightless. 

She hit the ground– hard. She rolled on the ground, simultaneously grabbing at her neck and the hip she fell on. Opening her eyes, she realized she was not in the hallway. The floor was cobblestone, the walls concrete. Everything was bathed in a green light, but there was no life nor fixture to emanate it. Louise coughed. That smell! 106 had left a black substance on her labcoat collar and Louise tore it off. She felt a chill breeze on her collared shirt, but saw no window from where it came. To her horror, she saw no openings at all. A room similar to the apartment in size, but square and with no exit. 

    Louise stood, spinning around. There was nothing. Walls of brick and concrete that reached upwards, darkening as they went. Louise couldn’t see the ceiling– if there even was one. She touched her palm tentatively to the stone. It was cool and solid. She felt around, trying to find any loose stone or hole.

    There were none. She was entombed.

    Louise collapsed in a heap with her back against the chill wall. She held her head in her hands. //There aren’t any protocols on what to do in a 106 pocket dimension.// Louise thought. She stayed analytical, focused. People had made it out before. Changed, but alive. Most didn’t. 

    Louise thought of Anna Scranton. All that had been left behind was 106’s corruption and a clump of hair. //Had she been in this same room?//

    Louise checked her pockets. A pen, her keys, and the recording device she had been taping her interview with 23. The red light on top indicated it was still recording. //This thing got all of that? This could be incredible if I make it out.// Louise turned it off for now. 

    She scanned the room in front of her. There were two objects on the floor; her labcoat and SCP-8652. Louise lamented that it had followed her. Such a waste to lose such a thing in here. It could do so much good in the real world. Louise cursed herself for holding onto it.

    She crawled over to it. Picked up the small porcelain object with careful hands. She had never held it without gloves before. She turned it over, wiped away a strand of 23’s hair. Louise’s stomach panged; it was empty. The only thing she had ingested today was black coffee.

    “Fuck,” she said aloud. Then quieter, “No, not yet.”

    She put the mask aside. She wouldn’t use it. She was like a lab rat in a cage with just a morphine drip. If she put on the mask at the slightest inconvenience, she’d be addicted. It was a last resort. //That is, if 106 doesn’t come back for me. Leaves me here.//

    Louise listened quietly. Held her breath, hoping not to hear anything. There was a low, ambient rumble. Like stone moving but so far away she couldn’t tell if she was imagining it. She listened to her breath. Felt the moisture leaving through her open mouth. She shut it.

    Every second would become a struggle. Make every moment a battle for conserving energy and water. She’d die of thirst first, if she was truly stranded here. Slow, deep breaths would reduce the loss if only by fractions. She could move, she supposed. She wouldn’t die of starvation. 

    Louise noticed the coolness under her palms. The tile was cold, but not frigid. It would sap the warmth from her– calorie by calorie. She kept her hands in her lap. Perhaps she wouldn&#39;t move and just enjoy the stone underneath her. 

    It occurred to Louise that she had never called for help. Who could help her anyways? Even if on the other side of the wall there was another person, it wasn’t like they could help. She was stuck in an anomaly. It was up to the anomaly to let her out.

    Louise’s heart rate lowered. She calmed down. //No point worrying about it.// Box breathing. Waiting. She had training for this. She could do it. If anything, she was the best person to be in this position. Foundation training had been thorough and she hadn’t forgotten any of it. If only she wasn’t so old.

    Her bones chilled as the seconds turned to minutes. Louise could no longer smell the damp stone. The droning of rock faded from her consciousness. She startled herself occasionally, thinking she saw the old man’s smiling face in a corner. Ultimately it was just her.

    Louise’s mind began to wander. Thoughts of Anna, thoughts of Olivia. They were alike, those two. Maybe Louise gravitated to that type of person. Maybe that type of person gravitated to the Foundation. Olivia had left the day before. Louise hoped she had made it out, somehow. She could be on the surface right now enjoying a coffee. Or a sandwich. A turkey club with extra mayo. And a side of fries. Louise grumbled, thinking of food. She’d probably been down here an hour. It would be lunch time normally. 

    She glanced at the mask. The aching in her cold bones suddenly became amplified as she focused on it. She cursed, tried to think about something else.

    Anna had been about her age when this happened, too. No security cameras had caught her and 106. The hair found outside her office had come back with her DNA. She could have been in the exact same scenario. She was also calm and level-headed. Louise remembered that 106 had an age preference. Probably why 23 had gotten the treatment she had while Louise had been saved for later.

    And later came. Later and later, hours passed. At some point Louise fell asleep and awoke with a start. She had no idea how long she had been out. Her sense of time was completely destroyed, but the chilling ache in her muscles and the burning in her stomach reminded her that this wasn’t a dream. 

    Louise clawed her nails at her stomach. This wasn’t a craving anymore. She needed to eat. It hurt. Her elbows creaked as she moved. Her cold joints responded slowly to her brain. Louise wondered if her mental state was still at full capacity. A migraine had started in her head. She swallowed spit onto a dry throat and her tongue hurt. What had it been? A day, day and a half? She cursed her old metabolism. It burned away all of her glucose while she was asleep. She had probably been shivering for most of it.

    Louise stood up, did a lap around her confinement. Nothing had changed. The cold stone was indifferent to her misery.

    “Anyone?” she called out weakly. Then “Help!” more firm. The two words echoed above her. Nothing.

    The mask spoke to her. It coerced her, asking how many more days she could handle the ache in her bones and the burning on her tongue. Thick, dehydrated blood pounded in her head.

    It wouldn’t be another day. It wouldn’t be another hour. It would be right now.

    Louise picked it up greedily. Gave herself over to it. Pressed the cool porcelain against her warm face. 

    Then she was looking into a mirror. Herself, thirty years younger. It was the old wooden halls of her college. Some sort of exam lay in front of her. She tried to read the numbers but they were in a different language. Her anxiety peaked and she checked her sleeves. There, she had written the answers.

    //Cheating? Like in school?// Louise thought. She had been smart, but not perfect. College physics wasn’t exactly her forte. Maybe she had cheated. Maybe this was someone else’s memory. 

    Then she was in elementary school. She had an english test on her desk. Around her, other kids wrote quickly. The prompt was, “What did you do yesterday?”. What had she done? Enough? She looked out of the corner of her eye to see what the girl next to her was writing.

    Then she was in art class, a little older. They were making clay pieces. The perfect cube of unchanged muck confused her. She didn’t know what to make, what to create. She looked around the art room for inspiration. The teacher was making a mug. Maybe she’d do that. Louise looked down at the clay and the mask stared back up at her.

    She tore it off, throwing it. The cold crept back into her as she snapped back to reality. She coughed, now remembering how dry her throat was. Her headache was much worse. She accidentally relieved her full bladder. 

    Louise was on all fours, cough-crying. She sobbed what little moisture was left in her head. “How long?” she whimpered, wondering where all the time had gone. Had she  worn the mask for 5 minutes or 5 hours? Her tongue caught the salt water as it passed her lips. She growled like an animal. This was unbearable. She’d rather be in a nightmare than in a containment cell.

    She put the mask back on.

    Louise stole the answer key off of a teacher’s desk. She paid a friend to write her essay. She even wrote the answers on the back of her hands. Every method of cheating in academia was performed until Louise couldn’t remember that she was wearing the mask.

    But it all came back eventually. Her vision faded, the muscles failed to respond. She didn’t hurt, no, but the lack of energy was still there. She looked down at her hands; the thin skin wrapped in purple veins. The day must have been over. It was morning, then. And time for the next sin to be chosen.

    She looked up to see a man, dressed in a suit. He was well shaven and wore a nice gold watch. Blood dripped from the metal and onto the ground. He had a remorseful look on his face, like a little boy with his hand in the cookie jar. 

    “What is it?” Louise asked him. She noticed that her tongue did not hurt.

    “It was just once, I swear,” he offered his palms to her, and Louise watched blood trickle into her lap. 

    She looked up and it was now a woman, nearly as old as Louise. She had a stern chin that she held up high. She wore a red habit, like that of a nun. There was a noose around her neck.

    Louise met more and more people. Little glimpses of these sinners. They only stayed for a moment, sometimes only a blink. But they were there. Louise felt them pouring onto her. Each one adding an ounce of weight to her heart. She felt pity for them, and then for herself. It filled her up– let her know she was still alive. She could smell them. Knew they were real, not visions.

    The empathy was tangible. When someone sees a tragedy in the news, they feel bad. Not forever, but for a moment. When something happens to a family member, they feel worse. Longer. It was like that. Louise met all of these people. Every person on earth that had done this. The pattern became drawn; it was adultery. Louise felt a small portion of relief in some corner of herself. She was glad she didn’t need to experience this one in the first person.

    She excused herself to her current patron, a young woman. Asked her forgiveness and that she needed a break from the mask. The apparition didn’t respond.

    As she pulled the strap loose, Louise vomited on the back side of the mask. Black bits and mucus. She had been motionless for at least two days and she felt it. Her legs were both asleep and wouldn’t respond to her brain. She rolled over, trying to wipe the viscera from her chin. She screamed as the migraine came back. Her elbows felt as though they were broken. Nothing of her fleshy body was working. 

The blood that had pooled in her legs started circulating again. It tried to revitalize the tissues; starting with the nerves. Parathesia wracked her limbs. She frantically grabbed the mask without thinking. She placed the soiled porcelain against her nose.

The young woman was still there, watching. Louise felt no pain, but the failure for her body to comply with her demands was revolting. She pulled herself by her arms towards the specter, dragging her useless legs behind her. 

“Help… please…” Louise couldn’t taste the vomit on her tongue but could feel its texture. She spat it out between pleas. The apparition was indifferent. “I did everything right…” she dragged herself. She couldn’t feel her fingernails pull against the stone floor, but she watched them fall off. “I’ve helped so many…”

She shut her eyes. It felt like someone was staring at her during an awkward silence. She didn’t care. She couldn’t bare to see her body falling apart in front of her. The sea of sinners begged forgiveness to her closed eyes. Louise screamed with them. She couldn’t feel the force she was putting on her vocal cords. She couldn’t feel the acidic burn cooled by the stale air.

Air that became thick. Miasmic. Louise opened her eyes and squinted through sticky eyelashes. He was there, standing above her. Simply watching. Was he an apparition? Did Louise carry the guilt of the old man?

He reached down, and Louise pulled away as much as she could. 106 grabbed her by the shirt collar like a mother cat carries a kitten. He dragged her across the stone floor. Louise tried to raise her arms in protest but they didn’t respond. She didn’t look down to see if they were even still attached to her.

106 walked straight through the wall, and Louise followed. Her vision went dark, then dull. It was dimly lit, but still a confinement. A small metal box, no bigger than a storage container. The old man released her. She watched him cross the room. He found a comfortable corner and stood against it. The metal did not warp.

//A dream. A hallucination. I’m seeing things. A few days of no sleep and water will do that.// Louise tried to take her eyes off of him. She glanced at the walls. Steel held together with rivets. A Foundation logo. 

//NO no no no…// Louise dared to look over her shoulder. There was a table there, with some sort of contraption upon it. A femur breaker.

Louise was in 106’s containment chamber. The security camera in the corner blinked with a red light. It turned to look at her. 

“You know I’m in here?” Louise asked it. It didn’t look away.

She looked back to the old man. His signature smile looked back.  She wasn’t going anywhere. At least they’d know what happened to her. They’d know that she fought back. She wouldn’t go like the others. 

Louise took the mask off.</textarea></pre>
