**Item #:** SCP-9080

**Object Class:** Euclid

**Special Containment Procedures:** SCP-9080 instances found traveling through any postal service shall be confiscated. The instances are to be cataloged, digitized, and stored in a secure box in the archive room of Site-96. Any online mention of SCP-9080 is to be taken down.

**Description:** SCP-9080 is the collective designation for a continuous series of handwritten letters that arrive without postmarks, stamps, or return addresses.[[footnote]] How SCP-9080 instances arrive through postal services while lacking these features is unknown. [[/footnote]] Letters are uniformly written with blue ballpoint ink on lined paper and wrapped in envelopes made of construction paper. 

To date, no discernible pattern has been found across recipients, as instances have been delivered worldwide to civilians across a wide range of demographics with no apparent connection to one another. However, each recipient has only ever received a single instance of SCP-9080; no verified cases of multiple deliveries to the same individual exist.

Instances&#39; contents are regularly predictive, foretelling an event that will happen to the recipient within a stated timeframe.[[footnote]] Timeframes can be as vague as &#34;today&#34; or &#34;two weeks from now&#34;, or as specific as &#34;tomorrow at 9:53 PM&#34;. [[/footnote]] Predictions are typically mundane, but occasionally lead to unforeseen consequences as a result of the predicted event. Attempts to prevent predictions are unsuccessful, as the described event always manifests, even if only in a technical sense or indirect way. Whether an instance is opened and read or not has shown no effect on event manifestation.

The letter&#39;s contents typically do not exceed one sentence, and are invariably written in the recipient&#39;s native language. To date, 32 languages have been found across all collected SCP-9080 instances.

SCP-9080 instances always accredit the sender to &#34;Mom&#34;. Though instances contain similar handwriting, it is unattributable to any known person. Attempts to track the instances&#39; original sending place have proved futile. No DNA has been found on any known instance[[footnote]] Apart from that of postal workers. [[/footnote]], and postal routing records, when present, terminate in inconsistencies or gaps that prevent determination of an origin point.[[footnote]] Interviews of postal service workers who have come into contact with SCP-9080 are ongoing. [[/footnote]]

**Addendum 9080.1:** Log of SCP-9080 Contents
|| Recipient || Contents || Result ||
|| J███ S██████ || &#34;Today, you will buy a new pair of pants.&#34; || SCP-9080 instance appeared to have been deposited in recipient&#39;s mailbox while he was at a local thrift shop, where he purchased three T-shirts, a pair of jeans, and a pair of shoes.||
|| E████ J██████ || &#34;Water will be spilled on you tonight.&#34; || Recipient read the letter, and proceeded to attempt to avoid all liquid at a ballroom event he had planned in the evening. While sleeping, a pipe burst in his apartment&#39;s ceiling, spilling water on him while he slept. ||
|| S████ N█████ || &#34;Máy bán hàng tự động sẽ cung cấp cho bạn hai món ăn nhẹ vào ngày mai.&#34;[[footnote]] From Vietnamese: &#34;The vending machine will provide you with two snacks tomorrow.&#34; [[/footnote]] || Recipient read letter, then proceeded to report to her place of employment the following day. Upon buying a product from vending machine, a coil within malfunctioned, providing her with an extra product. ||
|| D█████ H█████ || &#34;In two days[[footnote]] The predicted time of the event appears to apply when the letter is placed within a recipient&#39;s mail receptacle. [[/footnote]], your name will be on the radio.&#34; || Recipient read the letter and turned it in to her local police station, believing it to be a threat. Stationed officers inside said they were unable to take action, and recipient proceeded to purchase a home alarm system. While driving to work two days after the letter was received, recipient heard her name over her car radio in a conversation about &#34;worst baby names&#34;. ||
|| Researcher J████ R██████ || &#34;At 12:39 PM, you will drop your spoon.&#34; || Recipient read the letter and clocked into work at Site-96, where it was placed under standard containment procedures. During lunch break, recipient used a fork to eat his rice and beans. The following day, at 12:39 PM, recipient accidentally dropped his spoon during lunch break. ||
|| B██████ C██████ || &#34;Tonight at 7:30 PM, your hands will go numb.&#34;[[footnote]] Recipient was noted to have carpal tunnel syndrome. [[/footnote]] || Recipient read letter and disregarded it. While driving his son back from a school soccer game, recipient&#39;s hands seized and fell numb, causing him to lose control over the vehicle and resulting in a fatal accident. ||

[https://scp-wiki.wikidot.com/scp-9080/offset/1 Following the above event, the tone and presentation of letters began to deviate from previously observed patterns.]</textarea></pre>
