&gt; ++++ Incident Report: MTF Zeta-0, 8/12/19
&gt; -----
&gt; On 8/12/19, MTF Zeta-0 (&#34;Reality Shards&#34;) was dispatched to a potentially anomalous incident in ████████, Massachusetts. The Foundation was tipped off after an intercepted 911 call reported a &#34;disappearing person&#34; at a local mall.
&gt; 
&gt; MTF Zeta-0 made contact at the residence. The anomalous humanoid was found inside, and it matched the visual description of the 911 call. However, for unknown reasons, this individual was killed by a member of Zeta-0 before appropriate containment could be attained. Zeta-0 did not fully search the residence before extracting from the scene.
&gt; 
&gt; MTF Zeta-0&#39;s operations have been suspended pending a review by the Ethics Committee.

&gt; ++++ SCP Foundation Internal Email System, 8/26/19
&gt; -----
&gt; **To:** Site-55 Researcher Alias [53 people]
&gt; **From:** Site-55 Director Adams
&gt; **Subject:** Zeta-0 Update
&gt; 
&gt; Hey guys. We had a team of people doing an investigation on Zeta-0 after the incident last week. As it turns out, one of the guys was a covert operator working with the Northeastern branch of the Chaos Insurgency. This individual has been terminated.
&gt; 
&gt; While we aren&#39;t 100% sure this individual caused the incident, I hope this email provides some closure to those concerned. MTF Zeta-0 will be returning to active duty in a few weeks.
&gt; 
&gt; Thanks,
&gt; //Adams//

&gt; ++++ Voicemail Transcript, 9/16/19
&gt; -----
&gt; **Cell phone of Site-55 Director Adams**
&gt; **Caller:** Dr. Allison Barrett
&gt; 
&gt; Hey, boss. I&#39;m going to be out on a funeral and shiva for the next few days. I&#39;ll be in a hotel in South Boston, so if an emergency comes up just call me and I&#39;ll show up.
&gt; 
&gt; Everything&#39;s alright, it&#39;s just a good friend of mine. I&#39;ll see you in a few days.
&gt; 
&gt; Barrett

&gt; ++++ Voicemail Transcript, 9/16/19
&gt; -----
&gt; **Cell phone of Dr. Allison Barrett**
&gt; **Caller:** Site-55 Director Adams
&gt; 
&gt; Hey Ally. I&#39;m sorry to hear that. I hope you&#39;re doing okay. I&#39;ll see you soon.

&gt; ++++ Voicemail Transcript, 9/20/19
&gt; -----
&gt; **Cell phone of Site-55 Director Adams**
&gt; **Caller:** Dr. Allison Barrett
&gt; 
&gt; Hi Adams. The shiva is wrapping up tonight. I&#39;ll be back in tomorrow.
&gt; 
&gt; It was a beautiful service. I was introduced to a lot of friends and family, and I got to mumble along in Hebrew. Almost nobody knew me, but it was good all around.
&gt; 
&gt; I know you don&#39;t know whose funeral it was, and that&#39;s okay. Our relationship was... complicated. But... even though I never got to meet her in person, even though our only interaction was... [pause] I still felt like I needed to show up. She had a way to worm into your heart and make you feel happy. I could tell just by seeing everyone there. She had a really good life ahead of her... [pause] I mean, um...
&gt; 
&gt; [chuckle] S-Sorry. I shouldn&#39;t be dumping all of this on you. You&#39;ve got a lot to deal with already with the Foundation. I guess I just wanted to tell someone else about her. Let&#39;s... talk in person sometime, okay?
&gt; 
&gt; Ally</textarea></pre>
