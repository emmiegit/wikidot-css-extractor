Turn your inner eye back for aeons, thousands of teatimes before yesterday&#39;s chamomile. Before the Silver Tower first pierced the clouds. Before the oldest rat in Skitter-upon-Ashton had first sprouted whiskers.

If you can even conceive it, there was a time when every animal who walked this earth did not walk, but plodded through their days, as if stepping through syrup up to their ankles. Every chore was drudgery, every problem carried with it a manifold of complications and ambiguities, and there were three different monsters for every overlooked corner.

In that time, children were never born from the milk-sweet bud of the swaddleflower planted in newlyweds&#39; yards, but they sprouted painfully from within their mothers&#39; bodies in a syrup of sick-water. They would grow and fester like an infection from two creatures savagely smashing their pelvises against one another.

Over the years, food and water grew ever scarcer. Only he with storehouses of hypothetical gold could afford to sit in the shade of a dying tree and nibble an acorn sandwich with his sweetheart. In their envy and desperation, the animals would rip and slice through their neighbors with a thousand different tools, like forks and spoons to be used on the skin of supper-friends from across the table.

The days grew progressively worse, as if adding up to something. It was as if every horrible day added another brick to a towering monument to spilled raspberry cordial. Where was the purpose in all this? What could have been the punchline to such a dreary joke?

The answer came when great red wings blotted out the Sun.

A giant bird of prey, with feathers red as the ripest strawberry, broke free of his forgotten burrow. He opened his flaming jaws, scooping in whole nations, peoples, and ideas. Countless lives ended that day -- but the fairies had willed the greater story to have no ending.

For you see, just as the night reached its climax, the Holy Moonrabbits descended, and gave their most sacred gift to a scared little field mouse: **The Pipes.**

&#34;Mother Nature is weeping at your plight,&#34; said one rabbit.

&#34;Play her a funny little song on our enchanted pipes,&#34; said a second rabbit.

&#34;She hasn&#39;t laughed in ages, and only you can fix this,&#34; said a third.

The mouse spoke not a word to the rabbits. She only gave a nod in silent understanding as she first blew across the tips.

She played.

And she played.

And she //played.//

And as she leant an ear to her people&#39;s suffering, Mother Nature heard one cheery little song echoing amidst the screams. And Mother Nature laughed -- in fact, she laughed so hard that she dropped all the silly laws she was holding at the time. They shattered into a thousand pieces across the rocks.

&#34;Oh, mercy me,&#34; said Mother Nature. &#34;Whatever shall I do without these laws?&#34;

&#34;Not a thing,&#34; said the Piper. &#34;For as it was, the world allowed for big, red birds to come along and ravage it.&#34;

&#34;That&#39;s a fair point,&#34; said Mother Nature. &#34;But now I haven&#39;t any laws.&#34;

&#34;You needn&#39;t fear,&#34; said the Piper, &#34;for you will hear every law you&#39;ll ever need in my song.&#34;

And so, the Mother built her Piper a mighty Silver Tower in the center of a frozen lake. When the tower was complete, the Piper sat at the very top, and played her song once more.

The metal of the tower resonated with the song like a great tuning fork. And through the tower&#39;s amplification, it was heard by everyone all the world over -- not just in the ears of the people, but in their bones, their fur, their scales, every infinitesimal cell of the body. 

The great red bird shrieked with rage. This song was one of unconditional joy and laughter without reason. And though the bird could never truly die, he was annoyed to bitter tears, and he flew away to find somewhere he couldn&#39;t hear it anymore.

To this very day, the Piper&#39;s song plays on, spreading abundance, dispelling conflict, and rewriting the once-dreary Music of the Spheres into a jolly harvest dance. Of course, you can&#39;t hear it. That&#39;s only natural -- even the rabbits and hares, who can hear even the whispers of insects, have grown too used to the song&#39;s presence to point it out. But if it ever stopped, **you&#39;d //know.//**

And it never will stop. The Piper plays on. So it has been, so it is, and so it shall be.

...

...

And yet...

There are some who would doubt the Piper&#39;s intentions. Is the Piper an Arcadian satyr, content to see her flock cavorting in the grove? Or is she a seducer in pied robes, to lead our firstborn blindly into the raging waters?

Only the Hare in Violet knows the truth.

And though she&#39;ll never say it outright, there&#39;s a secret madness in her backward glance, screaming to drown out any piper&#39;s song...
