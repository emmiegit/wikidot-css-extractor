[[include component:image-block name=https://scp-wiki.wikidot.com/local--files/scp-9471/Price-of-Eternity-02.png|caption=First manifestation of Dr. Lovelace on record.]]

**Item #:** SCP-9471

**Object Class:** Ticonderoga

**Special Containment Procedures:** SCP-9471 is not containable by any known means and no attempts are to be made to contain, detain, or track the movements of the anomaly, as doing so could risk the long-term survival of the Foundation and humanity as a whole.

As SCP-9471 qualifies for an Integration Rating of 8, it will from this point on be referred to as Dr. Vera Lovelace or by her preferred pronouns. Additionally, per the directive of the O5 Council, Dr. Lovelace is to be employed as a researcher and granted Level 3 Housing Privileges.

**Description:** Dr. Vera Lovelace is an extradimensional, non-theological Apex Tier Pluripotent Entity that originated as a female-presenting instance of [https://scp-wiki.wikidot.com/scp-1471 SCP-1471-A]. Although she exists outside of baseline reality, Dr. Lovelace is capable of interacting with it through a holographic projection. This projection takes the appearance of a female humanoid with a canid-like skull, black hair, black fur, and a large stature, measuring 2.16 meters in height. Moreover, she can selectively alter this projection to interact with or ignore any aspect of reality, allowing her to individually change its level of tangibility and visibility, as well as its susceptibility to anomalous phenomena.

Despite appearing to be omnipotent, Dr. Lovelace exhibits no signs of altering reality using ontokinesis or thaumatology. Her Hume level is identical to that of her environment at all times and she is seemingly incapable of emitting EVE. Instead, Dr. Lovelace appears to be taking advantage of the mechanics governing reality in ways that are beyond the current understanding of science. As such, there are no known means of containing or disrupting her abilities.

##bb0011|[ACCESS GRANTED]##

**Addendum 9471.1:** Dr. Lovelace claims to be the director of an independent Foundation division called the Aion Project, stationed out of an extradimensional facility referred to as Site-O, neither of which can be found to exist anywhere on record. The stated purpose of the Aion Project is to recreate civilization in the event that a K-Class end-of-the-world-scenario renders [[[SCP-2000]]] inoperable.
##transparent|Memetics is a girl&#39;s best friend.~##
Despite the lack of previous records, Dr. Lovelace has provided convincing evidence that she originated from a past iteration of our current world, one that was several millennia ahead of ours. The files, which are restricted to the O5 Council only, detail a K-Class Scenario that necessitated a historical reversion to 2013-02-23 — the point at which this current iteration began. As any information regarding Dr. Lovelace’s original world iteration could be infohazardous, staff are to refrain from inquiring about it. Failure to do so will result in immediate termination.
##transparent|The Cycle must continue after all.##</textarea></pre>
