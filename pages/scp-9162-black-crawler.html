    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>**item number#:** 9162

**object class:** Keter

**Special containment procedures:** SCP 9162 is to be kept in a 5 layer heavy defense, with the actual 10x5x5 m reinforced metal wall being the inner most layer. The fifth layer must have a vacuum gap with flame throwers to hold of SCP 9162 during attempted breach. All inner layers will be reinforced 3m thick walls. there is only entry tunnel and testing is to be approved by O5.

**Object description:** 
SCP 9162 is a 11 ft tall humanoid looking SCP. It has pure black muscles and no skin or hide. The head of 9162 is an external skull. It stands on two legs which looks like that of a lizard, it has insane grip and can some times climb and fixate itself on walls. 9162&#39;s hand are extremely long blade-like claws which are near unbreakable. 9162 uses these to break out of containment. 9162 has 5 sets of jaws all of which look like canines, no one has ever got too close to inspect and lived. 

9162 lays dormant for a unpredicted time period estimated between 5-7 weeks. After the fifth week 9162 will start to show up activity and attempt to breach. Nothing will stop it, it has immense regenerative abilities and its thick muscle mass is bullet proof. It is only effect by fire and high explosives. During breach, it goes on an insane killing spree consuming up to 300kg of live flesh, even feeding it before this process, it still goes in this frenzy.

9162 will then go to a rather calmer state, however it is still hostile and is to be re-contained, the most effective method is blowing up its upper part of the body and quickly transferring the remains to its containment chamber, where it will regenerate and be docile. THIS CANNOT TAKE PLACE DURING THE FRENZY AS 9162 WILL REGENRATE AND GO ON A FRENZY AGAIN, CONSUMING 300 kg OF MASS EVEN IF IT HAD CONSUMED BEFORE REGENERATION. When tried once on the orders of O5- [DATA EXPUNGED] 9162 went on a frenzy upon regenerating before the containment chamber could be repaired and escaped the site.

9162 was first found in the amazon rainforest after reports including a large black monster caught the foundation&#39;s interest. Mobile Task Force Unit Delta-5 &#39;//Front runners//&#39; were sent to contain the SCP. The first unit that arrived was obliterated within minutes the second unit was also forced to retreat. Following up Mobile Task Force Unit Nu-7 //&#39;Hammer Down&#39;// was sent to contain the anomaly. Where, in a deadly fight 9162 was damaged and sealed in a glass box where it was brought and contained in Site-581. 

A new Mobile Task Force Unit formation application has been put up for specializing in re-containing 9162.</textarea></pre>
