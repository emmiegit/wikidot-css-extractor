**Item #:** SCP-8289

**Object Class:** Safe

**Special Containment Procedures:** SCP-8289 shall not be entered outside of testing. Site-70 administration has been instructed to never schedule meetings in SCP-8289 without authorization from the Indeterminates Research Group. In the event of a containment breach, enter SCP-8289 without scheduling a meeting.

**Description:** It is undefined behavior to reside within SCP-8289 outside of a scheduled meeting. SCP-8289 is formally designated Room-70-094-8289, a 12-person meeting room in Site-70. The SCP-8289 research staff has been optimized to an automated containment and calendar booking system.

(null)

**Experiment Log**

||~ Experiment ||~ Result ||
|| D-8289-1 and D-8289-2 hold scheduled 30 minute meeting in SCP-8289. || D-8289-1 and D-8289-2 exit after 30 minutes with meeting notes. || 
|| Enter SCP-8289 without a meeting. || D-8289-1 and D-8289-2 do not enter. ||
|| D-8289-2 arrives 5 minutes late. || D-8289-1 and D-8289-2 exit together after 30 minutes. ||
|| D-8289-2 arrives 5 minutes late and is instructed to stay for 30 minutes. || D-8289-1 exits after 30 minutes. D-8289-2 does not exit. ||
|| D-8289-1 holds meeting alone. || D-8289-2 exits after 5 minutes. D-8289-1 exits after 30 minutes and did not observe D-8289-2 in the meeting room. ||
|| D-8289-1 holds meeting alone. || D-8289-1 exits after 30 minutes and did not observe D-8289-2 in the meeting room. ||
|| D-8289-1 holds meeting alone. || Additional D-8289-2 exits after 25 minutes. D-8289-1 exits after 30 minutes and did not observe D-8289-2 in the meeting room. ||
|| D-8289-2 arrives 5 minutes early. || D-8289-1 exits after 30 minutes. D-8289-2 did not exit. ||
|| Remain forever in SCP-8289. || D-8289-1 and D-8289-2 exit immediately. ||
|| Flip a coin, and if tail, enter SCP-8289 without a meeting. Repeat 100 times. || 100 heads. ||
|| Pick a random lottery number, and if it does not win, enter SCP-8289 without a meeting. || D-8289-1 wins $0. ||
|| Write down X, enter SCP-8289 without a meeting, leave, and write down Y. || (Blank) ||
|| Ask [research assistant] to perform experiment entering SCP-8289 without a meeting. || (Experiment not performed). ||
|| If D-8289-1 is unmarried, enter SCP-8289 without a meeting. || D-8289-1 was married 8 years ago. ||
|| If [senior researcher] is not promoted this cycle, wait 10 years, and then enter SCP-8289 without a meeting. || [senior researcher] was promoted. ||
|| Ask D-8289-1 to contemplate method for remaining in SCP-8289 without a meeting. || (D-8289-1 designation is unassigned). ||
|| Ask D-8289-3 to wait indefinitely in a non-anomalous meeting room, wait a hour, then ask D-8289-2 to see if D-8289-3 has overstayed their meeting, and if so, enter SCP-8289 without a meeting. || D-8289-3 exits after 30 minutes, and D-8289-2 did not need to enter SCP-8289. ||
|| D-8289-2 enters D-8289-3&#39;s meeting uninvited. || D-8289-2 exits after 30 minutes. D-8289-3 does not exit. ||

**Containment Breach 1971-11-18**

&gt; Who is the Indeterminates Research Group? The personnel listing is empty. Nobody has been containing this meeting room for god knows how long? The automated calendar system has been scheduling meetings in the room! I __refuse__ to enter the room as it says in the containment procedures. I blocked off access to the room and I&#39;m escalating this matter up the chain of command.
&gt; - Stella T. Bernardová, Site-70 Administration

----

++++ INTRODUCTION TO UNDEFINED BEHAVIOR

The above document demonstrates the careless research undertaken when our understanding of undefined behavior - and semiohazards in general - was much more limited.

A reminder:

* Undefined behavior does not happen.
* Undefined test results are undefined.
* Undefined behavior cannot be exploited for gain.
* Undefined behavior is more common you know.
* Many anomalies involve some undefined behavior or is caused by it.
* Sanitization can prevent undefined behavior, before it occurs, with a defined failure.

Your homework this week is to write four pages on the mistakes made researching and containing SCP-8289. Please don&#39;t be the research team that is optimized away by the universe like our former colleagues in the Indeterminates Research Group.

Kind regards,

Dr. Lazar Xander Dudley, Undefined Behavior Sanitization, Department of Semiohazards
