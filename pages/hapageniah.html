//So who&#39;s Habaniah?//
Habaniah is a character in The Gods of Pegāna by Lord Dunsany, a minor household deity who tends the glowing embers of the hearth. 

//You know what I mean.//
Habaniah is a little gay Jewish guy (he/him) currently studying law. I love tea, hiking, overly complex board games, and, obviously, writing for the wiki.

(As a side note, please feel free to DM me on Discord if you yourself are applying to law school and would like your statements reviewed, a few quick LSAT tips, or basically whatever. This is in part because I care about this community. Mostly, though: if you&#39;re reading this, you&#39;re almost certainly a leftist freak, and I would therefore consider it advantageous to help you get into a position of policymaking authority.)
