**SCP-1548-KO:** The Loveful Star

**Author:** [[*user dododom]]

**Translator:** [[*user fluxman]]

[[include :scp-wiki:info:end]]

**Item #:** SCP-1548-KO 

**Object Class:** Keter

**Special Containment Procedures:** The Foundation&#39;s Astronomy Department dispatches personnel to astronomical research institutions worldwide to prevent SCP-1548-KO from being exposed to the civilian population. Additionally, it collects SCP-1548-KO&#39;s radio transmissions through [*http://scp-int.wikidot.com/installations-de-la-branche-francophone Site Lamedh] and the radio telescopes at Site-57K. The Hostile Extra-Solar-Origin Entity Countermeasure Initiative[[footnote]]The Hostile Extra-Solar-Origin Entity Countermeasure Initiative, commonly known as &#34;Project Lævateinn,&#34; is a project separate from [*http://scp-wiki.wikidot.com/project-heimdall Project Heimdall]. Project Lævateinn was created to respond to extra-solar anomalous entities such as stars, planets, supernovae, and black holes that possess enough mass and gravity to destroy the Solar System, including Earth, and demonstrate a clear intent to destroy human civilisation, including the Foundation.[[/footnote]] is responsible for establishing the SCP-1548-KO response plan.

**Description:** SCP-1548-KO is a red dwarf conventionally designated as [*https://en.wikipedia.org/wiki/Wolf_1061 Gliese 628]. SCP-1548-KO is sentient and possesses extensive knowledge about Earth and human civilisation. It acquired this knowledge through radio signals transmitted from Earth, and it is currently transmitting signals back toward Earth while accelerating towards the Solar System.[[footnote]]At the time of its initial observation, SCP-1548-KO was moving at 0.02c, but within █ years, it accelerated to 0.77c.[[/footnote]]

It is currently unknown how SCP-1548-KO received Earth&#39;s radio transmissions, how it interpreted them to gain knowledge, or how it specifically identified Earth. However, SCP-1548-KO&#39;s initial transmission analysis suggests it randomly received Earth-originating signals.

Despite the distance between Earth and SCP-1548-KO, its radio transmissions have no observed delay; they can be received in real-time via radio telescopes. Whether this is due to superluminal or spatiotemporal anomalies is still unconfirmed.

Below is a collection of radio messages sent by SCP-1548-KO to Earth:

&gt; **SCP-1548-KO Message Log 001**
&gt; Huh? Hello? Was that from you? 

&gt; **SCP-1548-KO Message Log 002** 
&gt; You keep sending me messages. Actually, you&#39;re the first ever to message me. 

&gt; **SCP-1548-KO Message Log 003**
&gt; I had been asleep for so long, but now I can&#39;t help but stay awake. You keep sending those messages. But you can stop now if you&#39;d like.

&gt; **SCP-1548-KO Message Log 004**
&gt; Hey, are you listening? 

&gt; **SCP-1548-KO Message Log 009**
&gt; Listening to your broadcasts reminds me of how long I had been asleep. I still don&#39;t understand things like &#34;group projects&#34;,… and I still don&#39;t know why you&#39;re sending me messages. But wondering about the meaning behind your strange messages… it&#39;s more fun than I expected.

&gt; **SCP-1548-KO Message Log 012** 
&gt; Today&#39;s one was really funny. &#34;Who&#39;s on first?&#34; 

&gt; **SCP-1548-KO Message Log 015**
&gt; What you sent today is called a &#34;documentary,&#34; right? So you have something called an &#34;ocean.&#34; A bond between hydrogen and oxygen, right? I thought it was beautiful. The waves crashing, the blue light shimmering—your ocean. I have hydrogen, too, but not like that. In fact, I barely even have hydrogen anymore. I&#39;m just a small, red star—so faint that even the hydrogen scattered through the universe is running out. Sorry if this reply feels a little gloomy.

&gt; **SCP-1548-KO Message Log 016**
&gt; Today&#39;s message was a reply to yesterday&#39;s, right? Thank you. I didn&#39;t expect you to care that much about what I said. I thought you were just being noisy without caring. Just kidding. But seriously, I was moved today. &#34;Look beyond the skies. Among all those stars, just one shines for me. Even if it&#39;s a small, flickering, pitiful red star, in this moment, it shines brighter than the entire universe.&#34;
&gt; 
&gt; Thank you for being so considerate of my sadness. It&#39;s enough to make me blush… not that you&#39;d notice—I&#39;m already red. Haha. 

&gt; **SCP-1548-KO Message Log 018** 
&gt; I&#39;m really glad you&#39;re a kind friend. If you weren&#39;t, I&#39;d curse every waking moment. Maybe you don&#39;t understand—since you live in a star system called the &#34;Solar System.&#34; But this place is just emptiness. The light is too far, and I&#39;m too small to shine brightly. If it weren&#39;t for you, I wouldn&#39;t have woken up. I would&#39;ve just frozen and died asleep. Even if I had woken, I&#39;d have nothing to do but dry up. But thanks to you, even these faint burning moments are enjoyable. What I&#39;m trying to say is… I hope you keep talking to me. Sorry for all that yapping. I was shy.

&gt; **SCP-1548-KO Message Log 027**
&gt; Hey, it&#39;s been a while. You&#39;ve been quiet lately… I thought maybe you were busy. I heard all your planets aligned, and there was an eclipse or something. Ah! I wasn&#39;t spying! I just… wanted to know how you were. Please don&#39;t be upset. But if you are, I&#39;ll apologise. I just hope you&#39;ll keep talking to me like before. 

&gt; **SCP-1548-KO Message Log 035**
&gt; Thanks for what you sent this time. I really missed you—more than you could imagine. I don&#39;t know if I explained how quiet and lonely it is here before. What your words mean to me here… I don&#39;t want to burden you. Of course, there were quiet times before, too. But now it&#39;s getting harder to wait. I won&#39;t ask you to talk all the time—just once in a while would be nice. Even that sponge character is fine. Even an insurance commercial is fine. Please... 

&gt; **SCP-1548-KO Message Log 049**
&gt; Why did you talk to me in the first place? Why did you wake me up? Why did you show me all those things? Things I don&#39;t have? Why show me humans, the Moon, ranches and mountains, clouds and oceans and forests, sheep and horses and cows? Why? Why spend all that time making me realise how worthless, foolish, and pitiful I am, only to now pretend like nothing happened? Why are you making me feel this miserable? For what? What am I to you that you&#39;d do this to me? Why did you show me that poem? 
&gt; 
&gt; Please tell me… Even now, I&#39;m still waiting for you to speak. I&#39;m still hoping. Say anything—really, anything at all.
&gt; 
&gt; Please.

&gt; **SCP-1548-KO Message Log 050**
&gt; I saw what you sent. That documentary was fascinating, especially about those species you call &#34;humans.&#34; You sent it because you wanted me to see it, right? Your forests, your oceans, your atmosphere, and everything else. If that&#39;s your answer, then… I&#39;ll have to think about it a bit more.
&gt; 
&gt; Hang in there.  

&gt; **SCP-1548-KO Message Log 051**
&gt; Your words always changed how I see the universe: your ocean, poems, and humans. You always thought of me. You woke me up. And even here, so far from you, surrounded only by stillness and loneliness, you whispered to me. In a sense, every waking moment of mine has been spent by your side.   
&gt; 
&gt; Yes, there were moments of silence. Waiting was hard and bitter, but even then, I wondered why you were silent, why you woke me. I said it before: wondering about your intentions was fun. Saying it wasn&#39;t painful would be a lie. But don&#39;t worry. I&#39;d never lie to you. 
&gt; 
&gt;  And your humans. The ones who live on your land, oceans, and skies. They were always in your words. Everywhere. Humans who tear down forests to extract your black blood, who scatter plastic and plutonium into your oceans, who now proudly brand your land with the words [*https://en.wikipedia.org/wiki/Anthropocene &#39;Anthropocene&#39;]. I&#39;m starting to understand not just your intentions but your humans as well. It won&#39;t take long now. It&#39;s soon.
&gt; 
&gt; You can look forward to it. 

&gt; **SCP-1548-KO Message Log 052**
&gt; .Carl Sagan called you a &#34;pale blue dot,&#34; but he was wrong. You are the most beautiful blue jewel in the universe. Just like you called me the most beautifully shining red star in the cosmos, to me, you are the most beautiful blue gem. 
&gt; 
&gt; .I thought for a long time. Why did you make me wait so long? Why did you make me beg like that? Why did I have to kneel before you? Now I understand. You couldn&#39;t do it.
&gt; 
&gt; From this distance, even I can see how disgusting that little species on your surface is. Those parasites dig into the roots of mountains. Those things that burn your oceans, kill each other, and pollute your land. Look at those worms. 
&gt; 
&gt; But you couldn&#39;t get rid of them. Not even your Sun could. Or maybe it wouldn&#39;t. But don&#39;t worry: you have me, don&#39;t you? 
&gt; 
&gt; I&#39;ll come to you. I&#39;ll get rid of your vermin. I&#39;ll become everything for you. I&#39;ll replace your incapable mother star. So stay by my side. Then I&#39;ll be a red star that shines brighter than the entire universe, just for you. We can be together forever. 
&gt; 
&gt; Just stay by my side.
&gt; 
&gt; I&#39;ll come to you. 
&gt; 
&gt; I&#39;ll see you soon. I love you. 


If SCP-1548-KO arrives in the Solar System, its gravity will destroy the entire system, and humanity will almost certainly go extinct. Project Lævateinn is reviewing a plan to produce fake documentaries and radio transmissions to send to SCP-1548-KO. Plans for planetary evacuation and colonisation are underway, but due to limited time and resources, the success of these projects remains uncertain.

Based on SCP-1548-KO&#39;s increasing speed, the estimated time remaining until its arrival in the Solar System is approximately 12 years.</textarea></pre>
