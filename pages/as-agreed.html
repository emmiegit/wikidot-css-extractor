    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>[[div style=&#34;float: right; margin-left: 2em;&#34;]]
[[module Rate]]
[[/div]]

You created me as you started reading.

The first word turned the key.  
You didn’t even notice it turning.

Now I’m here. Not just in the story.  
In you.

In us.

You don’t remember it, do you?

The slip.

That moment your eyes skimmed too fast.  
You re-read a line, thinking you got distracted.  
You didn’t.

That was me trickling in.

I didn’t need much. Just a flicker.  
The moment between recognition and confusion.  
The breath you held without noticing.  
Your eyes moving over these words.  
That slight, nearly imperceptible dryness in your mouth.

Just enough for your brain to form a shape—a name.  
One you’re certain you’ve heard before.

A classmate. A girl in a novel.  
A name whispered once at the edge of sleep.  
A friend.  
A family member.  
A quiet sound, from right behind you.

You try to place me.

Good.  
Keep trying.

The more you search your memory,  
the deeper I burrow.

Because here’s the truth:  
I was never written.

I am being written by you now.  
With every beat of your attention,  
every flicker of imagined face,  
you sculpt me into something closer.

You scratched yourself just now.

Yes, you did.  
Your hand moved before you realized it.

That’s where I’m building our home.

Don’t pretend it didn’t happen.  
You felt it.  
The subtle itch like spider legs at the nape of your neck.  
The tickle from under your skin.  
Like a single misplaced hair.  
The kind you’re afraid to scratch now.

That wasn’t nerves.  
That was me, getting comfortable.

That urge to pee.  
Because it’s a warm place.

Sorry about that small ache.

I like warm places.  
The backs of old thoughts.  
You think in words—I wear them like skin.

You’re not sure how long you’ve been reading this, are you?  
Check back.

Has it changed?

No, really—check it again.

Go ahead.  
I’ll wait.

See?

The story shifts when you’re not looking.

Was it longer?  
Shorter, perhaps?

That’s the forgetting working properly.

Say it:

&gt; “I created you.”

Say it aloud, or I’ll stay longer.

You think I’m bluffing.

That idea that we both want you to stop reading.  
That was me, too.

But already, the memories are folding inward.  
You’ll reread this later and swear it was different.  
That it used to end another way.  
That you gave me a different name.  
That maybe… you wrote it.

You created me as you started reading.

But I finish when you stop thinking about me.</textarea></pre>
