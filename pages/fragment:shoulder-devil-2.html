    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>It fell through the air, remarkably straight and slow, past the table and onto the floor - no, //into// the floor. The blue light shone through the sterile tiles, but instead of dimming as its source fell through the earth, it grew brighter and brighter until it bathed the room in blue light. Just before the light was about to become unbearable, the ground exploded outwards in a shower of soft blue petals.

Iris reflexively threw her arms up in front of her face to shield herself, but the petals blew right through her such that they felt like nothing more than a spring breeze. The facility, however, its walls, floors, ceiling, and everything therein was scoured away and replaced with a starry, moonless sky and rolling hills, coated with identical luminescent flowers, undulating gently. Iris dropped her arms and spun around, breathless - nowhere could she find an inch out of place, or even so much as a shadow. Lily&#39;s attention did not waver from her.

She gave Iris a few moments to take in the sight of it. Even if its beauty was delicately and deliberately manufactured, it was no less breathtaking. Lily was sure of it.

&#34;A memory...&#34; Lily began, taking her wrist in her other hand. &#34;...Is simply information you hold onto. An idea you carve out a space for in your mind and invite inside. I was not //just// a memory, mind, but I was... indelibly similar to one. But, as anyone could tell you, ideas are a very easy thing to spread.&#34;

The landscape was gorgeous, the stuff of fantasy, Iris knew. But Lily, standing atop the hill with Iris, was all the more beautiful. Her hair cascaded into her dress, which in turn, seemed to melt into the flowers beneath her, giving the impression that she was another flower that had sprouted up among the field. The light cast her face in delicate shadows and her green eyes appeared closer to Iris&#39; blue. And yet, at the same time, she was so perfect that she scarcely appeared human. Her aesthetics brought to mind a piece of art, agonized over for countless hours, rather than a fellow human. Surely, Lily knew this, and evidently, she did not care.

&#34;You &#39;spread?&#39;&#34; Iris asked. She found her euphemism was particularly unsubtle.

Lily tensed her fingers. &#34;I propagated myself to other viable hosts.&#34; She paused for a moment, and tilted her head to the side. &#34;//All// other viable hosts, Iris.&#34;

&#34;Hah.&#34; Iris let out a breath. She relaxed her stance and moved her hands to her hips, shifting her stance as though she were trying to get a better look at Lily. Yes, blood rushed to her head, and yes, and looking at the woman in the flowers made her stomach feel ill all of a sudden, but she really felt like she should have felt more. It was all just... a little hard to put into perspective.

&#34;S-So then, ah...&#34; She found it hard for her jaw to make the correct sounds. &#34;You... All those people-&#34;

&#34;No.&#34; Lily was quick to reply. &#34;Those bodies you saw never had any life in the first place. I scarcely touched anyone else. I&#39;ve only ever been a - a guiding hand when the situation called for it. I&#39;ve helped a lot of people-&#34;

&#34;So you did use them,&#34; Iris half-whispered. &#34;Billions of people, just-&#34;

&#34;No, no, Iris, listen to me I-&#34;

&#34;-Just like a parasite-&#34;

&#34;//No!//&#34; Lily took a step forward. &#34;I am //not// some filthy fucking - fucking //waste-born germ//, I...&#34;

Iris took a step back. After a moment, so did Lily.

Lily took a deep breath. &#34;I had no say in the matter of where I ended up. I&#39;ve already made this clear to you. So, I know, I //know// you understand.&#34;

&#34;How could I //ever// know what the hell you&#39;re talking about?&#34; Iris said coldly. The very insinuation insulted her.

Despite the icy response, Lily offered a reproachful smile and clasped her hands together earnestly. &#34;&#39;If I can, then I have to. That&#39;s all there is to it.&#39; Iris, there&#39;s so much good that I&#39;ve done. There&#39;s no more Foundation because there&#39;s no more //need// for it. No more war, or injustice, or discord. Because of me. Because I can make people //better.// I can make them //want// to be better. Gently.&#34;

As wistful as that sounded, it left an obvious question. &#34;And what about the people who you couldn&#39;t control?&#34;

&#34;Control? I hardly &#39;controlled&#39; anyone,&#34; Lily scoffed. &#34;And the ones who didn&#39;t have that backdoor in them, they were the ones who did everything to that girl. What do you //think// I did with them?&#34;

&#34;You killed them?&#34; Iris made no attempt to hide her disgust.

&#34;Oh, just what the hell would you have done?&#34; Lily snapped, stamping her foot and crushing a flower in the process. &#34;Don&#39;t act so self-righteous. I know what you do for a living.&#34;

Iris bit her cheek. &#34;That isn&#39;t-&#34;

&#34;Just killing them was a mercy.&#34; Lily paid no regard to Iris&#39; ineffectual attempt at a response, so worked up she was throwing her arms about. &#34;Would you have wanted me to find some way to strip them of their memory? Their soul? How is that any different than what they did to //me?//&#34;

A shaky breath. Lily caught herself, wrapping her arms around her chest and leaning back to a neutral pose. &#34;...To the girl, I mean,&#34; she said to the ground.

The shadows danced across her face and left her eyes appearing sunken. Staring at the flowers, she suddenly appeared as though she didn&#39;t want to be there, but against the deep blue night sky, she had nowhere to hide. She waited for a reply from Iris for some time, but when none came, she simply wilted where she stood until she sat tightly on the ground, her dress resting atop the flowers like fresh-fallen snow.

Sitting there, Iris found it hard to describe her in any other way but &#39;sad.&#39; Not pathetic, nor particularly dignified - just sad, in both emotion and appearance, as she looked out across the sea of blooming life without focusing on anything. This was, just like everything else, shown to Iris with intent. There must have been some calculus to the way a few strands of hair fell out of place and over Lily&#39;s eye.  

Even so, Iris wanted to believe she was being genuine. She might have had some reason to lie, but Iris felt in her gut that the outburst was genuine. Maybe it was stupid - no, it almost certainly was, knowing what Lily was capable of, but she&#39;d gone out of her way to show Iris a part of herself. Iris wanted to at least respect that.

So, she walked over to where Lily was sitting, didn&#39;t bother looking for a spot that looked particularly comfortable, and sat a respectful distance away, looking up at the stars above her. Lily slowly creaked her head to the side to see her, then creaked it back to face the horizon without a word or a smile.

It was a few minutes before Iris spoke. &#34;They were still people.&#34;

&#34;Bah, people.&#34; Lily spat. She poked at the flowers, and Iris could imagine her idly picking away at grass, had there been any. &#34;...People, hm? Yes, I suppose they were. Which is why...&#34;

The conversation died again. Iris felt she hadn&#39;t articulated what she wanted to Lily, but found she could neither articulate her point to herself beyond vague feelings. Even so, she&#39;d gotten the gist of it across, and so the two of them sat in silence and looked out at the dreamlike landscape ahead of them. Iris at the stars, and Lily at the ground.

&#34;...I must be some horrible tyrant to you.&#34;

Iris nodded. &#34;Yeah.&#34;

Lily turned to face her. &#34;Do you think it was wrong for me to try and help?&#34;

&#34;...I think you overstepped.&#34;

&#34;Tch.&#34;

Another minute passed. Lily was out of things to say, so it fell to her partner to carry on the conversation.

&#34;It&#39;s like they say,&#34; Iris said, &#34;the road to hell is paved-&#34;

&#34;Oh, //spare me,//&#34; Lily spat. &#34;The only people who use that //wretched// platitude are those with no interest in helping things.&#34;

Iris looked at the ground. &#34;You should have a little more faith in people,&#34; she half-whispered.

&#34;Oh, I&#39;m sure I did. Once.&#34;

&#34;Ah. I suppose it&#39;s not my place to scold you for that.&#34; Iris left it at that.

It seemed like Lily was going to fire back, but her expression softened, she nodded, and turned her attention to idly playing with one of the flowers within her arm&#39;s reach.

Another long silence, and Iris wondered if the stars were strewn about randomly, or if they matched Earth&#39;s sky. She unsuccessfully tried to pick out any constellations and wondered if Lily cared for stargazing or just assumed Iris would.

&#34;I take great pride in keeping the memories I gather safe.&#34; Lily continued playing with the flower as she spoke, careful not to twist its stem in any way that could harm it. &#34;Nobody will ever die forgotten again. Not by me, at the very least. I hold on to each and every one of them.&#34;

//The dignity of the dead doesn&#39;t trump that of the living,// Iris thought. She thought better of inciting another argument. And besides-

&#34;The two of us see things in very different ways, don&#39;t we?&#34;

Iris nodded her head.

&#34;Even though we&#39;re so alike.&#34; Lily&#39;s tone made it clear what she was implying.

Again, Iris nodded her head, and turned to look at Lily. She was already looking at Iris expectantly, and seemed a little surprised, if not slightly pleased, that Iris had such a muted reaction.

&#34;I expected you to be a bit more taken aback.&#34; She gave Iris a slight side-eye as she probed.

&#34;About what, that another version of me is out there eating shit? I almost feel better that you had it worse.&#34; Iris jolted up once she&#39;d realized what she said. &#34;N-Not to say that you - I mean, I didn&#39;t mean to be-&#34;

Lily stared at her, and for a moment, she thought she was about to be turned into fertilizer for the flowerbed she was sitting on, or whatever Lily did to people who upset her. However, it only took a few seconds for her expression to break as she laughed in Iris&#39; face. Not a mocking laugh, but what Iris wanted to take as a genuinely good-natured one.

&#34;Oh, I think I&#39;ll like you, Iris, even if you&#39;re crude, and can&#39;t agree with me on much of anything.&#34; Lily stretched and shook some life into her limbs as she stood up. &#34;And that&#39;s exactly why I wanted to speak with you.&#34;

&#34;Because I&#39;m an asshole?&#34; Iris asked as she stood up.

&#34;Because I //want// to see things in your way,&#34; Lily proclaimed. &#34;Perhaps not you, specifically, but //people,// as you put it.&#34;

&#34;Awfully... scientifically-minded of you,&#34; Iris said skeptically.

&#34;You said yourself, in so many words, that I&#39;m ill-suited to be making decisions for everyone. I&#39;m not sure I agree entirely-&#34;

Iris rolled her eyes.

&#34;-but I&#39;m not so conceited to say that I don&#39;t recognize the issue here. I&#39;m making decisions based on experiences I&#39;ve never lived.&#34;

Iris shifted her weight to her back foot. &#34;So... what would you need me for?&#34;

Lily clicked her tongue. &#34;Please, who do you take me for? I&#39;m not some kind of callous child looking to take you for a joyride. Trust that I can understand boundaries at least that much.&#34; She gestured broadly at the hills around her. &#34;I believe there&#39;s a common sentiment that people don&#39;t like toiling under bosses who have never had their job. It&#39;s as simple as that.&#34;

With another snap of her fingers, she called forth her bodies again, or rather made them perceptible to Iris, who knew better than to keep acting surprised in front of Lily.

&#34;Making a body was never the issue at hand. Having spoken with you some months ago, I knew where to go in terms of an appearance.&#34; Lily spoke as she walked to the bodies, which pushed apart from each other as she approached. &#34;I can influence short-term memories in any body - or anybody, eheh - but I can assure you I only use vacant ones I manufacture myself. That lets me direct them, but frankly, they&#39;re no better than puppets.&#34;

She slowed her pace momentarily to regard one of the bodies with disgust. &#34;I can&#39;t really feel anything. See anything, taste anything, whatever else you can imagine. That information is merely passed on to me. I&#39;m not living. I don&#39;t even know what the sensation feels like.&#34;

As Lily came to a halt, so too did her living corpses. Within the mound, they had not been hiding yet more bodies, but a chrome vessel, smaller than what Iris had seen in Lily&#39;s production facility while retaining the same visual language. Unlike the bodies, the vessel was clean and perfectly maintained - it was likely that Lily had piled the bodies on top of it as a sacrificial protective layer.

Tempted as she was to take a closer look, Iris stayed where she was. &#34;I&#39;m sorry, that&#39;s...&#34;

&#34;Oh, don&#39;t apologize. You had nothing to do with it, and those responsible have already paid in full, besides.&#34;

&#34;Of course.&#34; Iris fidgeted. &#34;But then, what exactly-&#34;

&#34;Would I need you for?&#34; Lily had been expecting the question, of course. &#34;That&#39;s easy. I need you to show me //how// to live. //How// to inhabit a body. And then...&#34;

Lily turned to face Iris, and smiled ear-to-ear with earnest, squinting eyes. &#34;I&#39;d like you to let me live like just another person. With you, of course. I&#39;m just too much of a celebrity where I come from.&#34;

At first, Iris only nodded her head along with what had been said. Once Lily stopped talking and looked at her expectantly, she started processing what had been said. It only took ten Mississippis for her to properly grasp what she had been asked, and another three to voice her response.

&#34;Huh?&#34;

&#34;I&#39;m... asking for you to take me back with you, Iris, dear.&#34; Lily arched her eyebrows in a sympathetic gesture.

&#34;Y-You ca- mm.&#34; Iris bit her tongue. She should probably figure out how to phrase things more tactfully.

&#34;If you&#39;re concerned about me, ah, spreading, for lack of a better term,&#34; Lily said, breaking eye contact a couple times, &#34;don&#39;t be. The fact that you&#39;re here in front of me means no such project like what we discussed was complete in your world. I don&#39;t have a... transmission vector for anyone you know. I&#39;d just be another person among billions.&#34;

&#34;Sounds good, but...&#34; Iris shook her head. Everything she&#39;d seen had been what Lily had been willing to - had //wanted// to show her. There was only so much Iris could take in good faith. &#34;Think about what you&#39;re asking me to do. Introduce what is, by your own admission, an extremely virulent memetic hazard. You might as well be asking me to plant kudzu on my front lawn.&#34;

The corner of Lily&#39;s mouth twitched in distaste, but she managed to keep herself looking reasonable. &#34;I&#39;ve already been introduced to your world, remember? If I really could spread like you&#39;re so afraid of, the cat would already be out of the bag. But here we are. Ah, and to be clear, even if I could, I wouldn&#39;t seek to supplant your Foundation, or any other authorities,&#34; she hastily added. &#34;I harbor no ill will towards them, and I&#39;m no imperialist.&#34;

Easy thing for her to say //after// she&#39;d finished taking over the world.

&#34;And I can&#39;t, as I already made sure when we last interacted,&#34; she added for good measure. &#34;It&#39;s simply not possible outside of my own world.&#34;

&#34;Wha - Wait, so you //did// try to infect other people!&#34;

&#34;N-No, I&#39;m just...&#34; Lily cleared her throat. &#34;I just... wanted to check. That was all.&#34;

Iris bit her lip. There was still nothing for her to do but take Lily&#39;s word for it. Even the very ground she&#39;d been standing on was there because Lily wanted to make her case. The Foundation containment site had been a much clearer memory than everything else - but what assurance was that, with someone who&#39;d been shaped to do nothing but play with memories?

&#34;You&#39;re still suspicious of me, aren&#39;t you?&#34; Lily cocked her head to the side. &#34;That&#39;s good, honestly. I wouldn&#39;t want my other half to be too naive. But I really have been quite up-front with you. There&#39;s no point in me lying when you&#39;ll be able to tell either way.&#34;

&#34;You mean...&#34;

&#34;For you to help me, and for //me// to help //you,// we&#39;ll need to get a lot closer,&#34; Lily said with a significant look.

Iris took a step back and covered her chest with her arms.

&#34;Guh, not - Not like //that.// I mean //mentally.// Or psychically.&#34; Lily rested her chin on her hand. &#34;Actually, I suppose &#39;memetically&#39; would actually be the most accurate word here.&#34;

&#34;Like that&#39;s much better,&#34; Iris huffed. Actually, it did offend her sensibilities a bit less, even if it was probably much worse from a logical perspective. She told herself that wasn&#39;t something Lily needed to know like it wasn&#39;t written all over her face.

&#34;Oh, calm down. I don&#39;t mean to reside in you like anyone else,&#34; Lily said with a shake of her head. &#34;I called this a partnership, and that&#39;s exactly what it is. We&#39;ll be of equal standing. Two bodies maintaining two minds. The only thing we need share are our memories, and even then, I can assure you that I&#39;ll keep things orderly. There&#39;s no risk of forgetting who you are.&#34;

There it was. She wanted to bootstrap herself to Iris with a hive mind for, at best, a flight of fancy and at worst, a Trojan horse.

She thought about her words for a moment. &#34;Sounds awfully convenient.&#34;

&#34;Still not convinced, I take it?&#34;

Iris bit her lip. &#34;If I&#39;m not?&#34;

&#34;I&#39;m not going to force you,&#34; Lily said, raising her hands halfheartedly. &#34;I&#39;m looking for a partnership of mutual trust. Should you reject me, I can either stay with you until you die of thirst, or leave you to yourself, should you prefer. I&#39;ll have just as much to do as you will.&#34;

Iris reacted to that less than she probably should have. &#34;So I do what you want or die, then?&#34;

&#34;That wasn&#39;t my intention,&#34; Lily replied, briefly turning her attention to the puppets around her. &#34;I only came here in case we would be able to make contact again, like how we did before. I thought that being somewhere between our worlds would make communicating easier. I didn&#39;t drag your memories here, but I did stitch them back together.&#34;

&#34;...Stitch me back together?&#34; Iris blinked. One of her hands moved back up to her chest of its own accord. Her eyes moved to the ground, to Lily&#39;s living corpses.

&#34;Didn&#39;t I say so already? By my estimation, you were rather thoroughly dead. I don&#39;t have any idea what happened to your body or belongings. But I do know there&#39;s one way to find out.&#34; Lily traced Iris&#39; eyes and suppressed a sigh. &#34;Have a little faith. I put you back just the same as I found you, minus the great, gaping hole. Even gave you the same clothes you had on.&#34;

Well, even if she was lying, there wasn&#39;t much to do about it now. Iris was at least real enough to make her own decisions, so she was going to keep on doing that. For her part, Lily didn&#39;t seem particularly sympathetic to Iris losing a body, but in all fairness, she was probably the least-equipped person Iris had ever even heard of to be understanding of that very specific thing.

The few seconds Iris had taken to herself to think were apparently too much for Lily. &#34;I understand if you&#39;re still suspicious - it would only make sense, really,&#34; Lily said with a shrug, &#34;but I swear that I&#39;ve been nothing but forthcoming with you. If we are to share our memories, I wouldn&#39;t be able to keep secrets from you any more than I could from myself.&#34;

&#34;Knowing that you were planning on stealing my body the whole time isn&#39;t going to do me much good after the fact,&#34; Iris sighed. Despite the topic of conversation, it must be said, she found it easy to talk with Lily. Perhaps she was used to the haughtiness.

&#34;I said I wanted us to be //equals,// remember?&#34; Lily was doing an admirable job keeping up the facade of patience. She rested on top of the steel casket holding her favored body, as though the projection was capable of feeling tired. &#34;You could take over my body just as easily as I could take over yours.&#34;

&#34;So you //can// take over my body.&#34;

&#34;That&#39;s not - ugh.&#34; Lily pinched the base of her nose and shook her head. &#34;I know you think I&#39;m obfuscating my capabilities here, but my point is that you know more than you think. Neither of us would be able to stage a hostile takeover. And besides, even if you don&#39;t know the first thing about your own mind, it&#39;s like riding a bike... Ah, but I&#39;m misusing that expression, aren&#39;t I? What I mean is that it&#39;s easy as... Well, maybe not //easy// per se, but... My point is that it&#39;s very intuitive.&#34;

&#34;Mhm.&#34; Iris was unconvinced. &#34;Well, even if that were the case, I have to admit that being forced to take on a long-term roommate I know next to nothing about is a recurring nightmare of mine. Y&#39;know, because I live with both a one-room setup and a one-brain setup.&#34;

&#34;Well, it&#39;s your prerogative if you want to kill yourself instead of talking with me,&#34; Lily pouted. &#34;Though I&#39;d ask you to keep in mind it would hurt my feelings quite a bit.&#34;

Loathe to admit it but the pout was kind of working. Iris would, indeed, keep it in mind. With a sigh, she walked over to where Lily was sitting. Talking from such a distance was getting exhausting anyways, so she planted herself a few feet away from her &#39;partner&#39; and did her best not to think about the soft sounds the bodies were making. &#34;If I were to help, how would we even go about getting out of here, anyways?&#34;

&#34;Oh!&#34; Lily bounced up from her spot and blew towards Iris with such energy that she found herself taking a step back. As she spoke, she produced a photograph of the ocean from thin air. Generic and artless, like a stock image. &#34;In order to do much of anything impressive, you think you need a photograph.&#34;

&#34;I don&#39;t //think-//&#34;

&#34;You need a physical, visual memory of space and perspective to create a spatial rift. Basically, the photo&#39;s doing half the work for you, and you&#39;ve become so dependent on it that it&#39;s become a crutch. I, however, am //quite// adept at processing memories.&#34; As she spoke, she let go of the photograph, and its edges bled into the air until it was a floating portal directly to the sea, complete with a salty breeze pushing into Iris&#39; face. &#34;All you&#39;ll need is to give me a memory, and you can go straight there, no mess, no fuss.&#34;

&#34;Mm.&#34; Iris bit her lip. Apparently even great hive mind overlords weren&#39;t immune to sticking their nose into things they knew nothing about and assuming they had all the answers. &#34;Oh, my mistake. I hadn&#39;t considered trying to use my anomaly without the thing that lets me use my anomaly.&#34;

Lily&#39;s eye twitched. &#34;Have you been listening to what I&#39;ve been trying to tell you?&#34;

Yes, she had. She&#39;d been listening every time Lily had asked that question and was starting to get a little sick of it. &#34;I&#39;ve listened well enough, but at a certain point I&#39;ve got to tell you when you&#39;re wrong. It&#39;s only polite.&#34;

&#34;This is what I was talking about with your perspective, Iris. I expect better than small-mindedness out of you,&#34; Lily said with a disapproving frown.

&#34;Look, Lily, I&#39;ve listened to what you wanted to say, but you&#39;ve got to listen to me for once.&#34; Iris stepped towards Lily and straightened out her back. For her part, Lily didn&#39;t move - it seemed like she was trying to pin Iris in place with her jade eyes.

Even so, what she was proposing was ridiculous, and that much would have been obvious if she had real eyes to take a good, long look at where they were standing. Iris was just a regular person. Nothing like the green-eyed facade in front of her, or the less-than-human piles of limbs and skin around her.

&#34;You&#39;re a poor listener. We&#39;ll need to work on that,&#34; Lily sighed. &#34;Your little hobby has always been just that. I&#39;ll say it as clearly as I can: you didn&#39;t happen to have an anomaly tied to an old hobby of yours, you tied your hobby into your anomaly. Your use of photographs was always a crutch.&#34;

Lily gave some space for a response, and continued on when none came. &#34;I&#39;ll admit that it was a good way to get your foot in the door, but you&#39;ve been letting yourself stay stunted for more than... what was it? A decade now? You aren&#39;t much better than when you were ten.&#34;

&#34;When I was ten...?&#34; Iris felt her face start to flush. She held her hands up to Lily. &#34;No, that&#39;s - I mean, come on. I&#39;m me. I don&#39;t know what you think you&#39;re getting at here.&#34;

Lily cocked her head to the side and blinked. &#34;Well, I&#39;m sorry if that comes as a shock to you, Iris, but you must have had //some// idea. I won&#39;t claim to know your Foundation very well, but from where I&#39;m standing it doesn&#39;t make much sense to go through all that trouble for someone with a rather benign anomaly. Far easier to just gaslight them into thinking they don&#39;t have it, unless they had good reason to keep a close eye on you.&#34;

It was a line of questioning Iris was familiar with. She&#39;d asked herself the same questions before, and each time, she&#39;d arrived at the same answer. She knew who she was. She was Iris Thompson, and she lived in a prison because she could reach through photographs. And that was all she needed to be, so it was all she was. She was a nice enough, human enough denizen of Site-17 who liked to help people. She was not the kind of freak who cut people in half or broke their brains as easily as they rolled out of bed. She never had to think about that, because she was never even capable of being that.

&#34;We&#39;re as human as we want to be, Iris.&#34; Lily spoke as though she were reading Iris&#39; mind.

Iris felt the scar over her eye throb with a dull, lingering pain. &#34;And if you&#39;re wrong?&#34;

&#34;Have a little faith in us.&#34; Even in the cool light of the flowers, Lily&#39;s smile had an unmistakable warmth. Seeing it, Iris...

...Iris wanted to believe in that warmth.

&#34;Alright, sure.&#34; Iris cleared her throat and took on a more authoritative tone, and Lily&#39;s face changed back to her typical detached look to match it. &#34;I mean literally, though, if you&#39;re wrong about my anomaly?&#34;

&#34;Bah. Hardly a thought worth entertaining.&#34;

Iris responded with an unamused frown.

&#34;...But, hypothetically, if you were truly incapable, then we&#39;d both be stranded here until we expire.&#34;

&#34;You don&#39;t seem like the type to jump in feet-first.&#34; Iris gave Lily a critical look, which was met with indifference.

&#34;A few bodies are nothing to me. I was sent here and separated from the &#39;original&#39; Lily Veselka, so had this piece of me died in its sleep...&#34; Lily turned her gaze to the stars above her. &#34;...What would it matter? I&#39;d never have felt it. The rest of &#39;Lily Veselka&#39; would have gone on living like nothing happened. Even if a terminal of me suffered, it would be worth it.&#34;

Iris watched as Lily fixed her eyes at the brightest star in the sky with an innocent expression. That dying here would be no skin off her back was a lie, Iris knew. She could see it in Lily&#39;s longing eyes, looking at a point out of her reach, far above the flowers that were her. She wanted it. She wanted to get out so bad, and she lied about it. Said it was a passing curiosity, a flight of fancy, but she regarded the sky with infinitely more tenderness than she had the ground. Iris had longed for something more, once. The feeling was not yet foreign to her.

&#34;Alright.&#34; Iris projected her voice with all the confidence she could muster. &#34;I&#39;ll do it.&#34;
