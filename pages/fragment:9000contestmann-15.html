    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>Excerpt from the Journal of Caroline Wren

&gt; There&#39;s nothing. For a short time, I deluded myself that if I just massaged the data the right way, it would all work out. But there is no link, at least not that I can find. No common principle. I&#39;ve tried priming subjects going in, I&#39;ve tried changing variables. Nothing seems to affect which ones come out, and what they experienced. 
&gt; 
&gt; The worst part is that I know I&#39;m right. There must be some rules to this. There is cause, and there is effect, and I know if we had more time, we could find it. But we don&#39;t.
&gt; 
&gt; I&#39;ve failed. I have an appointment with Director Moose on Monday. I&#39;m sure I&#39;ll be terminated. I was so sure I could show them. If I could impress them enough, I&#39;d be good enough, and then
&gt; 
&gt; I don&#39;t know. I could have been one of them. Actually belonged. But I&#39;ve ruined that chance.
&gt; 
&gt; I can&#39;t go home to Christopher. I can&#39;t face him. I&#39;m a failure. I thought for once, I could prove that I was just as smart as he believes me to be. He&#39;s the only one who&#39;s ever thought I was good enough. He&#39;s the only one who ever connected with me. And now I&#39;ve failed him. I&#39;ve failed everything he thought I was.
