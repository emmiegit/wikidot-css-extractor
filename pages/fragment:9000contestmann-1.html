    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>&gt; I walked through the door with the rest of the team. And suddenly I found myself somewhere else. It felt like I&#39;d just woken up, but I don&#39;t remember having fallen asleep. I was backed up against a metal wall, and I realized I was stuck in a shipping container. There was someone sobbing, but I didn&#39;t recognize the voice. I don&#39;t think it was anyone on the team. Sounded too young. There were others too. I didn&#39;t get a count, but I think maybe a dozen people. I was trying to get my bearings, and suddenly everything lurched. I could feel the shipping container moving, scraping against metal. There was a splash, and I slammed into the wall. Water started seeping in. I knew I was the only one in who wasn&#39;t in chains. I&#39;m not sure why I was so sure, but I knew it. The container started to sink on its end. I saw the dim shadows of chained figures going under. My head stayed above water, but the top of the container kept getting closer.
&gt; 
&gt; When I had just a couple inches left, I suddenly lurched again and fell out the damn door.
