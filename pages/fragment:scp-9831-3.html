##99D0F0|**Special Containment Procedures:**## SCP-9831 is kept in a standard humanoid containment chamber. SCP-9831 should be provided with a supply of writing surfaces and tools. Writing surfaces that SCP-9831 has affected shall be computerized and studied for legible details. Other writing surfaces must be kept at least 20 meters away from SCP-9831.

##99D0F0|**Description:**## SCP-9831 is a female humanoid, around 20 years old, standing 165cm in height and weighing 55kg. SCP-9831 is able to voluntarily transfer memories from itself to other individuals, animals, and inanimate objects, and take memories from others in the same way. Memories transferred to inanimate objects, such as notebooks and computers, appear in a format that depends on the medium.

Memories transferred to living organisms are implanted directly into the hippocampus, making it difficult to distinguish memories given by SCP-9831 from genuine memories. Memories taken from living organisms are entirely removed. Exposed individuals have reported a sense of &#34;tearing&#34; and general feelings of pain and panic when this occurs. Even recent or highly traumatic experiences have no effect on the individual when removed.

SCP-9831 stores taken memories within itself and can transfer them like it can its own memories. SCP-9831 can choose not to experience memories taken from others, allowing it to avoid exposure to traumatic events. 

SCP-9831 has maintained a calm and cooperative attitude since containment. 

##99D0F0|**Recovery:**## SCP-9831 was recovered after embedded SCP agents in the ███████ Massachusetts police force received a suspicious dispatch alert regarding SCP-9831. MTF agents intercepted the call and found SCP-9831 on the front porch of its residence. SCP-9831 did not resist recovery efforts and maintained a calm disposition throughout the transportation and booking process at Site-55.

&gt; ++++ Addendum 1: SCP-9831 and Dr. Allison Barrett
&gt; -----
&gt; //The following report contains supplemental information that may or may not be relevant to SCP-9831. At the request of Dr. Thorpe, it has been transcribed here.//
&gt; 
&gt; On 9/18/19, Level 2 researcher Dr. Allison Barrett requested to be assigned to SCP-9831, which was granted. It was immediately apparent that SCP-9831 and Dr. Barrett appeared to have prior knowledge of each other. Upon seeing each other for the first time, Dr. Barrett entered SCP-9831&#39;s chamber and embraced it for nearly a minute. She repeatedly apologized to SCP-9831 and cried. SCP-9831 returned the gesture.
&gt; 
&gt; It should be noted that Dr. Barrett was not present for the recovery operation, was not typically assigned to humanoid SCP objects before SCP-9831, and had never been to the area of SCP-9831&#39;s residence before containment. It is unknown how Dr. Barrett and SCP-9831 were aware of each other prior to containment. Questioning has yielded non-compliance from the part of SCP-9831, and denial of the situation from the part of Dr. Barrett.
&gt; 
&gt; After several days, Dr. Barrett&#39;s attitude towards SCP-9831 returned to Ethics Committee standards. Still, SCP-9831 responds more positively to Dr. Barrett than to other researchers.
&gt; 
&gt; Analysis is ongoing. No disciplinary action has been recommended as of 10/4/19.</textarea></pre>
