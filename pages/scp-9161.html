**Item Number:** SCP-9161

**Object Class:** Keter

**Special Containment Procedures:** Each instance of SCP-9161 is to be kept within standard containment cells. All instances of SCP-9161 are to be kept in separate cells in --Site-24-- Site-42. These cells must be monitored 24/7 as to prevent breaches --caused by SCP-9161-1--. Access is restricted to Level-3 clearance or higher

**Description:** Each instance of SCP-9161 appears to be plushies created to look like a completely black humanoid creature with an unnatural looking smile. Said smile appears to be stitched on quite sloppily. 

**SCP-9161-1** - SCP-9161-1 appears to wear more “elegant” clothing than SCP-9161-2 instances. It is to be noted that SCP-9191-1 appears to be capable of speech, unlike SCP-9161-2. SCP-9161-1 was neutralized during Incident 9161-A.

**SCP-9161-2** - SCP-9161-2 instances don outfits that would be commonly seen by people with blue-collar jobs (such as construction workers). The Foundation currently has --eight-- seven instances of SCP-9161-2 contained. It is unknown if more instances of SCP-9161-2 exist. --SCP-9161-2 appears to only be capable of carrying out tasks ordered by SCP-9161-1.--

**SCP-9161-3** - SCP-9161-3 seems to wear more “royal” clothing. SCP-9161-3 was previously an instance of SCP-9161-2. A strange entity currently only known as “the boss” has improved it to take the place of the now deceased SCP-9161-1. It is believed that the SCP-9161 instances’ boss is a king of some sort, hence why SCP-9161-3 resembles a king.

**Additional:** All --nine-- currently contained SCP-9161 were found sealed in a singular metal box, which was recovered from an abandoned warehouse in Northern Virginia.

When originally discovered, a VHS tape was found next to the metal box.  It appeared to have been heavily damaged which caused the video feed to be unavailable. When played, the following was heard:

[[div class=&#34;blockquote&#34;]]
“These **things** should BURN! Let them rot in hell for what they took from me!!! I… I just want him back…”
[[/div]]

An interview has also been conducted. The interview log is listed below.

[[div class=&#34;blockquote&#34;]]
**Interviewed:** SCP-9161-1

**Interviewer:** Dr. Michael Altruist

**Foreword:** SCP-9161-1 was bound and separated from SCP-9161-2 instances as to minimize risk of a containment breach. Dr. Altruist, SCP-9161 head researcher, was reluctant to interview SCP-9161-1 but agreed to interview it anyways.

**&lt;Begin Log&gt;**

**Dr. Altruist:** Hello, SCP-9161-1.

**SCP-9161-1:** When I agreed to this, I was under the impression that **you** wouldn’t be the one interviewing me.

**Dr. Altruist:** Believe me, I don’t want anything to do with **you** either. I am simply following the orders of my boss.

**SCP-9161-1:** Fine then. What questions do you wish to ask?

**Dr. Altruist:** How is it that you are able to issue commands to each SCP-9161-2 instance?

**SCP-9161-1:** You mean my pawns? 

//(SCP-9161-1 laughs)//

**SCP-9161-1:** They follow my orders. Simple as that.

**Dr. Altruist:** That doesn’t answer the question.

**SCP-9161-1:** I know. I’m surprised someone as smart as you would think I’d actually tell any of you anything!

**Dr. Altruist:** Fine. Guards, escort SCP-9161-1 back to its cell.

**SCP-9161-1:** Alright then, see you never doctor!

//(SCP-9161-1 gets up and walks towards the guards. It pauses and turn back to Dr. Altruist)//

**SCP-9161-1:** Also, don’t worry about your son. He’s doing just fine with the boss.

//(SCP-9161-1 is picked up by the guards and carried back to its cell)//

**&lt;End Log&gt;**

**Closing Statement:** SCP-9161-1 and Dr. Altruist appear to dislike each other. SCP-9161-1 also appears to be unwilling and/or unable to speak about its nature. SCP-9161-1 mentions having a boss, it is unknown who or what this boss is.

[[/div]]

**Incident Report: Incident 9161x1048**
During a cross test between SCP-9161-1 and [*https://scp-wiki.wikidot.com/scp-1048 SCP-1048], the two had seemingly plotted a site-wide containment breach. This is noted to have been a silent conversation between the two SCPs. The resulting containment breach caused approximately 32 casualties. Every scientist remaining at the site had collectively agreed it is best relocate all instances of SCP-9161 from Site-24 to Site-42.

**Incident Report: Incident 9161-A**
During transport to Site-42, SCP-9161-1 breached containment and stole a lighter from one of the guards assisting with the transport. In an attempt to burn the guards, SCP-9161-1 had lit the lighter and attempted to throw it at the guards. However, due to its plush body, it was unable to throw the lighter far. The lighter had then lit SCP-9161-1 on fire. The guards had attempted to put out the fire, however by the time the guards managed to put it out SCP-9161-1 had already perished.


**Addendum:** Post neutralization of SCP-9161-1, SCP-9161-2 instances have demonstrated a lack of understanding of various commands and phrases which they had previously understood. This has stemmed the belief that SCP-9161 acts like a hivemind, which was commanded by SCP-9161-1. --Since then SCP-9161-2 has seemingly been unable to do most tasks.--

**Addendum 2:** Two days after Incident 9161-A, SCP-9161-2 instances were reported having glowing red eyes. This should not be possible as they previously had no eyes. Since then SCP-9161-2 instances have exhibited hostile behavior. It is believed another entity (likely the boss that SCP-9161-1 had mentioned) had started controlling a single SCP-9161-2 instance, causing it to transform into SCP-9161-3.</textarea></pre>
