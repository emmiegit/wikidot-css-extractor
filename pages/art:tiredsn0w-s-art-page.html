++++ Notice: art contains references to canon-typical disturbing content.
**Some of these will be higher quality if you open in new tab :)**

------

[[image 20251006_%D0%B3%D0%BE%D1%82%D0%BE%D0%B2_%D1%81%D0%BE%D0%B1%D0%BB%D1%8E%D0%B4%D0%B0%D1%8E]]

**Description:** A digital illustration of unit 5a82 in his military uniform, with the gas mask removed. He&#39;s tied upside down by ropes, held up at the anchor point of his wrists and lower back. There&#39;s blood running from his mouth and nose, up along his visor, as well as splattered on his chest like he was coughing. The background is in abstract, horizontal rectangles of grey, blue, and green. Written next to him is готов соблюдаю . 

[[image 20251001_dr]]

**Description:** A digital illustration of Unit 5a82 kneeling on the ground, pulling up one of his sleeves to reveal he&#39;s bleeding through a bandage wrapped around his forearm. He&#39;s wearing a collared zip-up jacket, tactical pants, leather boots, a belt, and gloves. He looks nervous, but not appropriately shocked or worried about the heavy amount of blood. The background is dark gray.

[[image 20251005_ado]]

**Description:** A digital illustration of scp-049 and scp-6118. 049 is kneeling on the ground, facing slightly away from the viewer. The hood of his cowl is pulled back, revealing black feathers across his head which blend into white on his face. On his temple, some are missing due to a scar. His hand is on 6118&#39;s hip, and his head is in 6118&#39;s lap, who is petting through the feathers with an indifferent expression. 6118 is dressed in a turtleneck, blue combat jacket, trousers, a belt, and boots. The background is gray.

[[image 20250516_portrait]]

**Description:** A loosely-painted bust of Unit 5a82 in his old uniform, with the helmet removed. The image is tritone, with a medium blue background, green-grey for his armour, and his skin and hair both being the same very pale greyish colour. He looks vaguely to the viewer&#39;s left with a rather fatigued expression.

[[image 20250611_teeth]]

**Description:** A blocky, loose illustration of Unit 5a82 sitting in a dentist&#39;s chair, with a lamp visible above, cabinets visible to the side, and a small rolling tray next to him which contains a scalpel, forceps, a suturing needle with thread, and a handheld rotary bone saw. The perspective is top-down and two pairs of feet can be seen in front of 5a82, but not the rest of the people. 5a82 is gripping the arms of the chair quite hard and looking down. There is blood dripping from his mouth and onto his plainclothes, though due to the harsh, dark shading, it&#39;s only visible where the overhead lamp illuminates.
