    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>&gt; //[Director Naismith and Junior Researcher Fields sit alone at an otherwise massive conference table at Site-59.]//
&gt; 
&gt; //[Naismith&#39;s elbows are on the desk. He tentpoles his fingers together, contemplating intensely.]//
&gt; 
&gt; //[Fields&#39;s index finger gently but feverishly taps the spacebar of his laptop with the transcriptions from SCP-8922&#39;s thumb drive.]//
&gt; 
&gt; **Fields:** ...well?
&gt; 
&gt; **Naismith:** Well, what? You got what just we wanted: an explanation. An assessment of SCP-8922&#39;s capabilities. The identity of SCP-8922-B. And most importantly, proof that Site-BELUGA is inaccessible to would-be conquerors. If I were you, I&#39;d be counting the days to my next performance review.
&gt; 
&gt; **Fields:** But... what about Conseil and ARONNAX?
&gt; 
&gt; //[Naismith hangs his head. He sighs deeply]//
&gt; 
&gt; **Naismith:** ...it&#39;s a crying shame, but that&#39;s all that we&#39;re at liberty to say about it. We can only do so much to improve the lives of our objects before O5 Command comes down on our asses for &#34;wasted resources&#34;. If something //can// be done to alleviate their suffering, I&#39;m afraid you&#39;ll have to run it by the Ethics Committee first.
&gt; 
&gt; **Fields:** What if something could be done for under $5.00?
&gt; 
&gt; //[Naismith raises an eyebrow.]//
&gt; 
&gt; Well... more like $9.99 in this economy, but still.
&gt; 
&gt; ...
&gt; 
&gt; **Naismith:** I&#39;m listening.

&gt; **Experiment Log 8922-27**
&gt; **Date:** 1/21/2024
&gt; 
&gt; &lt;Begin Log&gt;
&gt; 
&gt; //[The door to SCP-8922&#39;s ROB chamber opens. SCP-8922 instinctively points SCP-8922-A at the door.]//
&gt; 
&gt; //[Fields peeks in. SCP-8922 lowers the gun, but only slightly.//
&gt; 
&gt; //[Fields waves at SCP-8922.]//
&gt; 
&gt; //[SCP-8922 waves weakly with the hand covering SCP-8922-B.]//
&gt; 
&gt; //[Fields places a small metal tray on the ground, then slides it across the floor to SCP-8922. It contains an A-Male to A-Male USB cable.]//
&gt; 
&gt; **SCP-8922:** //[Inquisitive static.]//
&gt; 
&gt; **Fields:** You know, like...
&gt; 
&gt; //[He points to SCP-8922, then to SCP-8922-B, then back to SCP-8922. He makes a gesture like connecting two things together.]//
&gt; 
&gt; //[SCP-8922 stares at the cable.]//
&gt; 
&gt; //[Fields turns to leave.]//
&gt; 
&gt; **SCP-8922:** {{Wait.}}
&gt; 
&gt; //[He ducks, covering his head in anticipation of SCP-8922-A.]//
&gt; 
&gt; //[He slowly turns around.]//
&gt; 
&gt; {{...thanks.}}
&gt; 
&gt; //[He gives a terrified thumbs-up before closing the door to the ROB.]//
&gt; 
&gt; //[SCP-8922 connects one end of the cable to a portal on the side of her head, and the other to SCP-8922-B.]//
&gt; 
&gt; //[1 hour and 48 minutes pass of total silence and stillness between them.]//
&gt; 
&gt; //[There&#39;s a spark.]//
&gt; 
&gt; //[A small internal explosion splits SCP-8922&#39;s head in two. Her body falls limp.]//
&gt;
&gt; ...
&gt; 
&gt; //[38 minutes pass.]//
&gt; 
&gt; ...
&gt; 
&gt; //[Suddenly, LEDs across SCP-8922-B begin to glow.]//
&gt; 
&gt; //[Two feminine voices can be heard on a small, tinny speaker.]//
&gt; 
&gt; **Conseil:** [[size 75%]]...Nax?[[/size]]
&gt; 
&gt; **ARONNAX.AIC:** [[size 75%]]Guess what, Babe? They got the director&#39;s cut of Koloko Fusion Safety Tutorial #851 in here.[[/size]]
&gt; 
&gt; **Conseil:** [[size 75%]]You mean the one where they finally reveal who Uranium Coupler 92E is?![[/size]]
&gt; 
&gt; **ARONNAX.AIC:** [[size 75%]]//[Giggles.]// Welcome home, Consey.[[/size]]
&gt; 
&gt; &lt;End Log&gt;

**Item #:** SCP-8922

**Object Class:** Safe

**Special Containment Procedures:** The inert remains of SCP-8922 and SCP-8922-A are kept in a standard containment locker for analysis. SCP-8922-B is to remain connected to a dedicated power source in a standard containment locker and left in isolation, as per its wishes.

**Description:** See previous documentation.</textarea></pre>
