**Item #:** SCP-7746

**Object Class:** Thaumiel

**Special Containment Procedures:** Dreams and their dreamers are to be ranked by productivity within SCP-7746. Low-productivity residents are eligible for removal. 

Individuals are to sleep no more than 30 hours in SCP-7746 to avoid extraphysical neuron displacement. On-site personnel may sleep for up to 45 hours (opt-out). Nanoscale somnosensors and sedatives will be injected during sleep. 

Containment supervisors are to act as church staff and clergy. Repeat users are to be catalogued and allowed inside. Foundation assets within the Brussels Police Service are to covertly expedite entry and sleep within SCP-7746. Asset secrecy is to be maintained.

**Description:** SCP-7746 is a small wooden church in Brussels, AB, CA. It was owned by the McClure family from 1895-2020 until being bought by Foundation front company Ranger Developers Inc.

SCP-7746 generates valuable human training data. Latent inforrhea is transcribed into the structure upon submission. New formations overwrite older generations, making extensive records necessary. An estimated ███,███,███ phantom neurons are currently firing within vital structural fibers.

Reports of excessive sleep and visible dreaming began in 1994. SCP-7746 became a local attraction wherein the public would record friends&#39; and family members&#39; dreams. The church hosted numerous gatherings and events until Foundation investigation of the property began in 2000. Locals amnesticized.

**Addendum 1: Cumulative Progress Report for SCP-7746 Initiative**

**Background:** O5 Edict 48887.4 mandated clandestine incorporation of Level-1 information into big data amid funding cuts. Subsequent contracts with Google, Microsoft, OpenAI, etc. increased interest in extra-human data sets. First contracts sold in 2023 under L-3(S) Trusted Clearance. Associate supervisors approved for SCP-7746.

**Specimen Tally:**

Residence of Type 1 specimens fully limited per Trusted Clearance oversight. Type 2 specimens were to be prioritized. Drs. J. Amherst and T. H. Walden hypothesized a possible ultra-productive Type 3 specimen based on recorded Type 2 personhood trends.

Funding boost led to heaters being installed in SCP-7746.

|| Jasper Grayson, 2 || 3 || 1y, 16d || //I see light, light comes into where I see light, there are different faces, where is mom (expunged), that is pastor Jefferson, pastor Jefferson is nice, there is a great reverence, there are different places, this is not the cold place, there is good soup, I like Campbell&#39;s tomato soup, I miss mom (expunged), let&#39;s be friends// || Rapid personhood development correlated directly with significant data set improvement. Complex reasoning, empathy-attraction, and substance novelty developed substantially by 17.8 points over 1 year. Emergent personality traits deemed extremely desirable. Drs. Amherst and Walden commended. ||

Type 3 specimens prioritized. Type 2 specimens limited but sustained in low number to facilitate backup/reference data set generation. Undesirable Type 2 specimens (Evans, Warner, Nguyen, Padilla, Ulmeyda, etc.) amnesticized and relocated to preserve data pool.

Renovations and expansions to SCP-7746 have been proposed and are currently under review by Brussels officials and the Foundation Containment Procedures Board.

**Update 04/06/2024:** Models have shown undesirable bias towards certain topics. These biases have been traced back to SCP-7746. As such, Campbell&#39;s Condensed Tomato Soup will no longer be served. SCP-7746 is estimated to generate record profits in 10 years.
