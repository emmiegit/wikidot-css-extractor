**Name:** Dr. Pandora Nukumizu

**Security Clearance:** Level 3

**Position:** Technical Researcher, IT Department

**Site of Operations:** Site-15, temporary assignment to Site-17

**Profile:** Dr. Nukumizu was recruited into the Foundation IT Department as a Junior Technical Researcher in 2015 after completing a Ph.D. in computer science at [DATA REDACTED]. Dr. Nukumizu subsequently left Foundation employ in 2017 to work in the private sector before returning to the IT Department in 2025 as a Technical Researcher. 

Dr. Nukumizu is known for an academic style and significant work on SCP objects requiring technical expertise.
