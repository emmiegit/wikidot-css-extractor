    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>With a deep breath, you click accept - the ringing stops.  The thoughts plaguing you all night fall to the wayside in anticipation.  All you can hear is the pounding of your heart as the video call opens - you try not to look at the tiny video feed of yourself in the bottom left.  The rest of your quarters are shrouded in darkness, the screen illuminating you like a spotlight.

You have only half a second to wipe the snot from your nose before Dr. Wyatt’s face fills your screen.  Despite being a man of such renown, he appears before you in a similarly darkened room, dressed in a faded t-shirt.  Same dead eyes, same gray hair.  Just seeing how tired he looks makes you want to apologize.

&#34;Elliot.  It&#39;s been a while,&#34; he says.  Same posh accent you can’t quite place, same authoritative tone.

&#34;H-hello, Doctor Wyatt,&#34; you weakly choke out.  You try your best to appear presentable.  &#34;I&#39;m so sorry about this, I can&#39;t imagine how late it must be where you are.&#34;

&#34;Three in the morning,&#34; he says.  If he’s angry at you, he’s trying his best to hide it.  &#34;I&#39;ve just been notified by Site-82&#39;s nanny that you&#39;ve been repeatedly accessing 8883&#39;s file.  Is something wrong?  Why are-&#34;

&#34;Doctor, look, I&#39;m... I&#39;m so sorry.&#34; You can&#39;t help but cut him off. You try your best to hold back the tears, hoping he doesn’t notice.  &#34;Please, I promise it’s nothing.  I don&#39;t want you to worry about me.&#34;

&#34;...Arthur.  Just Arthur is fine.&#34; Nothing in his eyes... not even a hint of judgment.  The usual formal tone of Foundation calls and meetings you’ve attended is absent from his voice.

He sits there in silence for a moment, studying you.  The mucus on your collar.  The redness of your face, illuminated by the glow of the monitor.  The same dead look in your eyes.  &#34;Talk to me, Elliot.  Tell me what’s bothering you.”

Talk to him.  Say something, anything.  Your body squeals at you - please, please, please.

&#34;I can feel it.&#34; You look down at your arm, careful not to get your scratches in view of the camera.  &#34;I feel like I&#39;m losing my mind, I know 8883 isn’t real, but… I swear, I can feel it.”

You brace for his beratement, but nothing comes.  Arthur just nods.

&#34;...I know.  I feel it too, Elliot,&#34; he says.  The tiniest bit of light manifests in his eyes as he stares off to the side. You remember his words months ago about every test, every scan only further confirming that something was terribly, terribly wrong with him - even though he seemed just fine.  The rot was never really there, but that didn’t make it any less real.

&#34;Every dash-A I&#39;ve ever met has felt it.  The moment they properly learn about it, they know it&#39;s real.  The Foundation writes it off as some sort of memetic effect, but they all feel it.  Every single one,&#34; he says.  &#34;Honestly, most aren’t even surprised.  Some of them even take a sort of comfort in the fact that finally, //finally// they know what’s wrong with them.”

There&#39;s an odd sense of familiarity in his words - at the very least, you&#39;re not going crazy.  Your eyes meet with his for a split second, though you look away just as fast.

Before you can speak, he once again turns his attention to you.  &#34;...That&#39;s not what you want to hear, though.  You want to be cured.&#34;

&#34;Y-Yeah, that&#39;s... that&#39;s right,&#34; you say.  You try to force yourself to look him in the eyes, but you can&#39;t.

Arthur nods.  “So does every other dash-A - myself included.  They all want to be //fixed// - to be //normal//.  It’s such a simple, insignificant little thing, yet the Foundation has tried for decades to concoct some sort of miracle cure,&#34; he says.  It&#39;s the way he refers to it as simple - that&#39;s what frustrates him.  Something so meaningless that can still wholly define someone.

&#34;...And there isn&#39;t one.  There&#39;s never going to be a way out of this,&#34; you say.  You don&#39;t need him to tell you what you already know.

Arthur just gives you a solemn nod.  Not even a half-hearted excuse about how the Foundation will surely figure it out someday - he doesn&#39;t want to lie to you.

“To the Foundation, the important part of containment is focusing on those unable to be treated properly - which, logically, I agree with,” he says, his gaze falling off of you.  “I’ve tried for years to find a way to neutralize 8883, but… it’s no longer a priority.  We have nothing to go off of.   No clues about some unknown component of human nature.  No curse upon the vulnerable.  I envy my colleagues lucky enough to have it all spelled out for them.  We have no explanation, scientific or otherwise, as to what’s wrong with us, Elliot.  //Some people just rot.//”

Some people just rot.  It&#39;s blind fucking luck that you&#39;re like this.  Whatever powers that be decided that //you specifically// should be a walking slaughterhouse.

You try your best to hold back your tears.  &#34;...This is so fucking stupid, Doctor.&#34; The urge to apologize for swearing at him doesn&#39;t bubble up.

&#34;I know,&#34; he says.  You can hear the frustration in his voice - not at you, but at how powerless he feels.  “I wish I had a better answer for you.   I truly am sorry.”

Silence, again.  One that couldn’t be filled with solutions, rationalization, or any words at all.  That was it.  Some people just rot, forever and ever and ever.

“Can... I ask you a question, Elliot?  I don&#39;t want to just leave you with that.”  His voice breaks the silence.  Your eyes move off to your scratched up arm you didn’t even realize you were staring at, back to your screen.

“Sure.  Go ahead,&#34; you say.  Your voice is quiet and coarse.

He straightens himself up in his chair.  &#34;Do you remember the day you and I met?  You were still going through your orientation when you first properly learned about 8883.  It was only a few weeks ago, correct?”

“Of course I do,&#34; you say, straightening yourself back up as well.  &#34;I remember the document, my CT scan, hearing about the tests that you-”

“Apologies, but let me stop you.&#34; He looks away from the monitor in thought.  “Let me be more specific.  Do you remember anything //other// than 8883?”

You think for a moment, a bit confused.  What is he trying to get at?  “Sure, I guess.  I remember my orientation, assignment details, and all that other stuff.  But I guess that isn’t the answer you’re looking for.”

“You told me how you used to play the piano.  And the violin, and the cello, and all these other things.  How you used to study and practice until your fingers went numb,” he says, as if he remembers all the details perfectly.  “That’s what I remember.”

In the sea of endless meetings and doubt over what you saw at your physical, you briefly remember the small talk.  That&#39;s all it was - giving him your life story as succinctly as you could before he broke the awful news to you.  Like introducing yourself in front of the class at a new school.

“Y-yeah, that’s right.,&#34; you say, trying to recall as much as you can.  “That’s what landed me at the Foundation - music studies.  But that doesn’t have anything to do with 8883.”

“You’re absolutely right, it doesn’t,” Arthur says.  His voice perks up just a little.  “All that passion, everything you’ve overcome, the lengths you went to out of love for what you did, all boiled down to ‘used to’.  To me, you weren’t another victim of some anomaly, but someone with enough drive and skill to get themselves a prestigious job like this.  But to you, that’s not the important part of who you are.  Why?”

“Because I was fucking awful at all those things,” you say.  Shame and despair finally start to give way to anger.  “Sure, it was enough to get me all the way here, but... I don&#39;t think I care.  It doesn&#39;t do anything for me.&#34;

“That’s… that’s fine.” He reels his voice back a bit.  “Maybe what I want to get across isn’t something you’re ready to receive now.  But I would like to try - while I have you.”

You slump a little, feeling a bit guilty.  You wipe your nose on your collar again.  “Go ahead.  Sorry about that.”

Arthur thinks for a moment, adjusting his glasses and leaning forward on his desk.  “What are you //without// 8883, Elliot?  What is it that defines you, that gives you meaning if you were never affected by this thing?”

Before you can open your mouth, he continues.  “And your answer can be ‘a failure’.  I know you used those words when I met you, just know that that isn’t how I - nor most people in your life - see it.  Nobody else sees the ‘used to&#39;s the same way you do.”

You slump a bit further.  “It’s… I’ve heard this all before.  I know I’m more than this, more than the rot all the other bad shit that’s happened to me, but I just don&#39;t understand how.”

His words are difficult to process.  You know it has to be true.  His reasoning makes sense.  But it’s incompatible with everything you feel - everything you’ve taught yourself.  It’s real, but you can’t feel it at all.

“8883 is never going to go away.  But hardly anybody you meet will ever know about it.  Likewise, whatever dark cloud you define yourself by is invisible to everyone else.  When you take all that away, what’s left?”

For a moment, you&#39;re afraid there&#39;s nothing else.  That you are nothing but the things that make you rot - like joining the track team in 8th grade, after years of egging on from your father to be a //real// man.  The burning of your lungs and the awkwardness of your gait proved that you could never be one.  Or your first director offhandedly commenting during rehearsal that, with hair like that, you&#39;d make a perfect Beetlejuice.  You&#39;ve kept it short ever since.  Practicing endless concertos and sarabandes and sonatas just to prove that you could do //something//, that you were somehow more than all this.

Yet, as the memories flood your head, one in particular stops you - your friends taking you to get ice cream after a particularly bad solo.  Your constant protests that you&#39;d never pick up a violin again eventually transformed into the same inside jokes and laughter they remember you by.  The feeling of the spring breeze and the taste of chocolate chip cookie dough is tainted ever so slightly with yet another failure - but it&#39;s still there.

Though the feelings may be dulled, the images still appear.  Your grandmother hugging you after graduation, overjoyed that all the sacrifices and sleepless nights finally paid off.  The summer days spent with long gone friends around the basketball hoop in your driveway.  Every concert and pride festival and overnight drive with friends - every bit of it is still there.  Buried under a mountain of blood and guts, but still there.

“...There’s a lot.  It’s hard to feel, really, but… a lot.&#34; Your voice is still quiet.

“//That’s you, Elliot.//  I know how hard it is to realize it, but that’s the part that matters.  I promise you.” 

A world away, across the sea of viscera, it’s all still there.  Immortalized by years-old journal entries and short videos hidden away in your phone’s camera roll, you still exist, somehow.  Before 8883, before your love for the world slowly began to fade away, that boy is still in there.  You can barely feel him, but he hasn’t gone anywhere.

//That’s you, Elliot.//  The you that matters has been lovingly grown and nurtured, despite your many complaints, bearing fruit that has been shared with everybody you have ever known.  The seeds spread in a way you can’t even comprehend - your favorite songs shared between your friends, their friends, and people you’ll never meet.  The child in the audience of your final high school concert, where his interest in music began all because his mom dragged him there.  You exist in ways you can’t even imagine.

Hundreds upon hundreds of snapshots, all at once.  //All of them are you.//  

And in an instant, you’re back in your quarters.  Your thoughts are just thoughts, and your guts are just guts.  The man on the screen can tell from the look in your eyes that something has changed.

“...I’m still here.  Sorry.&#34;  You aren’t sure how long you were spaced out for.

“You’re still here,” Arthur says, raising his eyebrows.  &#34;And?&#34;

You take a deep inhale.  “I&#39;ll be okay.  I guess it&#39;s just... easy to get wrapped up in all this stuff.&#34;

“It is, isn’t it?” Arthur smiles a little.  “And yet, whatever answer you just came to, I promise you it&#39;s realer than 8883 could ever be.&#34;

You shake your head.  “It’s… fucked up how that works.”

“Fucked up indeed,” Arthur says, with as much professionalism as he can.

&#34;It&#39;s... gonna come back though,&#34; you say.  You wish you had a better answer for him - despite his kindness, despite every reminder that you&#39;re more than 8883, you know the sensation of rot will return eventually.  &#34;Right?&#34;

&#34;Always does,&#34; Arthur says.  &#34;But all we can do is try to remember what we are without it - what&#39;s truly important to us.  Promise me you will.&#34;

&#34;Of course.  I&#39;ll try,&#34; you say.  The exhaustion from staying up begins to hit you all at once.  “...It’s late.  I probably shouldn&#39;t keep you any longer - thanks for all your help.&#34;

“Not a problem.”  He shakes his head.  “But, as a personal request, do try to keep yourself away from 8883’s file from now on.”

“Can do.  And if you need another test subject to cut up, you know how to reach me,” you say.  You&#39;re only half joking.

Arthur smiles again - he tries his best to keep himself from laughing.  “Get some rest, Elliot.”

You wish him well, and the call ends.  Once again, the room is silent.

------
[[=]]
[[size smaller]]##5c0606|Despite everything, the rot will fade one day.  It never goes away, but it will fade.  And yet you’ll remain, long after your final steps on this earth have been taken.##
[[/size]]

[[size smaller]]
##5c0606|Your loved ones will not speak of the boy filled with pig guts at his wake.  Your adopted daughters will not know you by the maggots in your heart.  It will be through the recipes you’ve shared, the songs you’ve sung with friends, the stories passed down from your grandmother.  The late nights spent easing the pain of the Junior Researchers who came after you, passing along the same words Arthur gifted you tonight.##
[[/size]]

[[size smaller]]
##5c0606|And yet, no matter how hard you try to grasp it, it never feels real.  The infinite number of ways in which you exist will remain forever hidden to you.  You will never truly be able to see yourself as others do - through the kindness, the love, the pieces of yourself that you gift to them.  But you have to try.  You owe it to yourself, to everyone you love, to never stop trying.##
[[/size]]



[[size smaller]]
##5c0606|Because one day, the rot will fade - and everything else will remain.##
[[/size]]
