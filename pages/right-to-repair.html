//Fragile by design,// Epsilon thought as he picked his way through fused muscle to get at the shredded organ underneath it. Zeta was weak enough to be easily disassembled by Gamma should the situation call for it. A safety measure due to their psionic capabilities. //Not like any of those psionics did them any good.// Epsilon glanced over Zeta&#39;s exposed bone to Mother, who was weaving tissue back over the ribs she had just reconstructed. She made Zeta like this. He wasn&#39;t sure how to feel about that, but it also wasn&#39;t his place to feel much of anything about it.

Gamma leaned down and shoved her face in between Epsilon and the pectoral muscles he was working on, and he recoiled back and frowned. Now he knew how he was feeling. He shot a look at Delta, listening to music a //reasonable// distance away at the side of the room, but she acted like they hadn&#39;t made eye contact. It seems like she wouldn&#39;t be any help keeping Gamma away.

&#34;Gamma, um-&#34;

&#34;She&#39;s fine, Epsilon,&#34; Mother said, resting her hands in her lap and tilting her head to the side slightly, shifting her attention from the task at hand to more pointless observation. &#34;Do you need something?&#34;

Gamma stood up to look at Zeta&#39;s face, still almost completely intact. Their eyes were open slightly, but there was no light behind them - they were unconscious. Their body&#39;s power and systems were being handled by the numerous external systems hooked up to them via a frustrating number of obstructive tubes and wires, the ensemble looking like an inverted mangrove tree stripped of its branches.

For a moment, it looked like Gamma was moving her jaw a little bit. &#34;I should have...&#34; She stopped as suddenly as she started, and Mother leaned in a little bit to better hear her. She didn&#39;t seem nearly as concerned about Zeta as the others were, but she probably just trusted her own craftsmanship to hold up.

&#34;Yes?&#34; Mother tried coaxing out Gamma&#39;s thoughts, though Epsilon was unsure that Gamma even formed particularly complex sentences in her head.

&#34;I should have been faster.&#34; She turned away from the body and back to Mother. 

Mother only smiled, seemingly pleased with the reaction. &#34;You&#39;re already as strong as you need to be. Anything else would mean concessions in other areas.&#34; She tapped on Zeta&#39;s arm. &#34;We&#39;re making good progress with repairs. They&#39;ll be good as new as soon as today.&#34;

//We&#39;re// making repairs, hm? Epsilon glowed at the stubborn mass of misshapen tissue in front of him that he had been chipping away at for the past ten minutes, unable to go any faster for fear of damaging the underlying organs. 

As per usual, Epsilon had no idea how Gamma felt about Mother&#39;s response, so he decided not to concern himself with her for now. Or at least, he tried not to while she continued standing so close to him. He could tolerate Gamma and Delta intruding on his workspace at Mother&#39;s behest, but this was just too much. He could barely stand Mother&#39;s attention when working, let alone his sisters. But he also didn&#39;t want to be rude when Gamma was upset. He thought she was upset. According to Delta, she was. 

He pursed his lips, then looked back to Delta again. To Epsilon&#39;s relief, she sighed and stood up but then stopped. Epsilon clenched his jaw, sighed, and looked back at the muscle to keep cutting into it. His hand twitched, and the cut came out jagged. He heard Gamma shift her weight. She must have heard. 

Letting his momentary annoyance spur him forward, Epsilon asked &#34;Gamma, can you, um...&#34; He trailed off when Gamma turned to look at him. Not even his wounded pride could overcome Gamma&#39;s stare.

&#34;Oh, come now, Epsilon, she&#39;s just worried about Zeta,&#34; Delta sighed, finally decided to throw her hat in the ring on the //wrong side.// Her eyes narrowed. &#34;Besides, we&#39;ll need her soon enough.&#34;

Epsilon slumped down. &#34;What do you-&#34;

//Thud.// The heavy door to the workshop was pushed open, and sharp, consistent, and purposeful footsteps started getting closer to Epsilon. By the time he thought to turn around, Gamma was already stepping in front of the newcomer, her eyes hardening in an instant. It was Adrian, and he was looking straight past her and right at Delta

In response, Delta offered an exaggerated sigh. &#34;Now, now, that&#39;s awfully unprofessional.&#34;

Adrian only stared back at her, with the same cold eyes he always had. He had stopped less than a foot in front of Gamma, whose stance suggested she was expecting a fight, but it seemed like he hadn&#39;t even noticed her.

Delta inhaled as though she were about to say something, but stopped. She seemed more interested in watching Adrian. He, on the other hand, didn&#39;t seem interested in talking. Epsilon saw Gamma&#39;s hand ball into a fist and looked at Mother. She seemed more interested than concerned.

The door opened again, and everyone except Gamma and Adrian looked up to see who came in. Mother&#39;s head tilted to the side. Delta rolled her eyes. The soft, measured //clack// of hard rubber boots on the tile floor. In the moment, Epsilon only recognized the woman they belonged to as Adrian&#39;s boss - both because she rarely spoke to him, and because that was the only thing he cared about her acting as at the time. Even though, he reminded himself, Gamma could handle Adrian if she needed to. He didn&#39;t doubt her at all, he thought as he stole a glance at Zeta&#39;s marred half-body.

Several moments passed, and Mother let out a small, childlike sigh, quiet enough that only Epsilon could hear it. Then, she sat up, projecting her voice to ask, &#34;Do you intend to do anything about him, Bowe?&#34;

Bowe nodded, smiling. She looked older than Mother, with more expensive clothes, and it gave her composure an air of legitimacy. &#34;I&#39;m sorry if he made you uncomfortable, Miss Aubert. Adrian wouldn&#39;t do anything rash, I can assure you. It&#39;s just the kind of posturing military men are fond of.&#34; She stepped forwards again, to Adrian. &#34;I grew up with some in the family,&#34; she added by way of explanation.

&#34;Mhm.&#34; Mother crossed her arms. &#34;If you say so. If you could keep him from threatening his... //companions// I would appreciate it. Even better if you could somehow compel him to pull his weight when you field Gamma and the others,&#34; she added bitterly.

&#34;Miss Aubert, you understand I can&#39;t make any guarantees in this line of work. That much has been clear since this partnership was proposed,&#34; Bowe quickly responded. When Mother narrowed her eyes ever so slightly, she softened her tone again. &#34;But yes, I understand your concerns. They&#39;re important to me, too. I&#39;ll... take precautions in the future.&#34;

Satisfied, Mother nodded and remained silent, either trying to decide what to say next or decide if she should simply go back to working on Zeta. Aside from stealing quick glances at the two humans in the room, though, Epsilon still hadn&#39;t stopped staring at Gamma, who wasn&#39;t phased by Bowe&#39;s intrusion.

Like an instigating teenager, though, Delta just couldn&#39;t let the opportunity to get a jab in pass her by. &#34;What was so important that our fearless leader had to make an appearance in the middle of the workday, hm? Having second thoughts after that little incident with the Foundation girl?&#34;

&#34;Incident?&#34; Adrian was indignant as he chafed against Gamma, unyielding but unwilling to escalate things herself. Based on Delta&#39;s smirk, she was counting on that. Epsilon felt himself wince when he saw Gamma shift her shoulders despite the insignificance of the gesture. He hated it, but it seemed like both Mother and Bowe were content to let Adrian simply blow off steam. No, just have Gamma remind him of his place. Right. That sounded better.

Bowe took a deep breath. &#34;I&#39;m not going to say that the //unfortunate// turn of events had nothing to do with it.&#34; Epsilon detected an undercurrent of vexation in that sentence, and so had Delta, if her put-out expression was anything to go by. &#34;But we&#39;re still in a position where we can look for other infovore candidates.&#34; It seemed like she was speaking more to Adrian than anyone else.

&#34;Are you going to need them any time soon, Bowe?&#34; Mother&#39;s voice projected more exasperation than Epsilon could tell she was feeling. &#34;You asked for top-of-the-line products, but any material for repairs is very finite. Especially if I can expect this,&#34; she said as she gestured to Zeta, &#34;on &#39;simple operations.&#39;&#34;

&#34;No, I won&#39;t. Not in the immediate future.&#34; Bowe readjusted her posture, giving herself more of an authoritative stance. &#34;I wanted to let you know that I&#39;ll be getting in contact with my associates in Marshall, Carter, and Dark, and due to the sensitivity of the proposed deals I&#39;ll need to be there personally ahead of the auction in a month.&#34;

Mother grimaced, doing little to hide her distaste. Epsilon&#39;s hands clutched Zeta&#39;s arms tighter - Why hadn&#39;t she sent Adrian and that woman away yet?

&#34;I&#39;m not fond of dealing with their ilk, but needs must,&#34; Bowe continued after a short pause. &#34;I&#39;ll be there to make sure anyone I, um...&#34; She waved her hands in circles as if struggling for words, which seemed to amuse Delta. &#34;...Take custody of is treated with respect. I&#39;ll make sure you have whatever materials you need, and then some, soon after. I apologize, but I can&#39;t delay with the auction, otherwise I&#39;d be right on that.&#34;

Adrian made a sound somewhere between a groan and a sigh, and Epsilon jumped slightly, then going red in embarrassment. He didn&#39;t have anything to be afraid of in the first place, he reminded himself. &#34;It won&#39;t mean anything if we can&#39;t get ahold of a Bloom fragment.&#34; He stood up, taking a step back from Gamma, who still hadn&#39;t moved. &#34;The intel was shit. There was never a piece of the Bloom at that conference, the Foundation doesn&#39;t even know what the hell&#39;s going on.&#34; Despite his sharp words, neither his tone nor his face showed much emotion.

&#34;We have things to do in the meantime. I&#39;m not just going to sit on my hands //now.//&#34; There was an edge to Bowe&#39;s voice that Epsilon hadn&#39;t been expecting, and he found himself staring at her. Maybe Delta had already figured out what it was supposed to mean, but that never came easy to Epsilon. Bowe caught him staring, and although he looked away, she clearly noticed. &#34;...And Adrian will be coming with me.&#34;

Taking the hint, Adrian made his way back to the door. As he passed by Bowe, she lowered her head slightly and whispered something to him. //I&#39;m sorry about Iris,// her lips read. 

&#34;It&#39;s fine. It won&#39;t matter, right?&#34; Adrian made no attempt to lower his voice. &#34;I know where to get a piece of the Bloom.&#34; He shot a glance at Zeta, and Epsilon felt his muscles tighten as he moved in front of them without thinking. &#34;When we&#39;re ready.&#34;

&#34;Don&#39;t let the door hit you on your way out,&#34; Delta called half-heartedly as Adrian left the room. He didn&#39;t seem to notice. Epsilon relaxed, and shrunk back down to Zeta&#39;s side again, still close. Mother was smiling gently at him.

Bowe bit the inside of her lip, as if unsure if she should speak. &#34;Is there anything you can do about that one&#39;s attitude? It&#39;s liable to get us all in trouble.&#34;

&#34;You asked for a more socially intelligent unit, and that requires some learning opportunities,&#34; Mother responded, polite yet forceful. 

Bowe sighed gently, then nodded. &#34;As long as it&#39;s the only one,&#34; she said as she nodded to Gamma. As she began to make her way back out of the room, she called over her shoulder &#34;I&#39;ll be back in contact in the next few weeks. Take care until then, Miss Aubert.&#34; Mother did not return the farewell as Bowe&#39;s footsteps shrank to nothing down the hall.

Delta rolled her eyes and sat back down to continue listening to music, which Epsilon took as his cue to return to repairing his sibling. He didn&#39;t get ten seconds without getting interrupted again, this time by Mother gently clearing her throat. Epsilon suppressed a groan and looked up to see her silently gesturing to Gamma, who had returned to milling about just a little too close to Epsilon for comfort. 

What was she - oh. Right. He&#39;d hastily asked Mother for help making something for Gamma after she had been hurt, but now he felt a little silly once she had been repaired so easily. Honestly, he was hoping to just sweep it under the rug.

Epsilon mumbled into Zeta. &#34;Um, no, I think it&#39;s fine-&#34;

&#34;Gamma, your brother has something he wants to give you,&#34; Mother said as loudly as if she was attempting to gain the attention of a crowded room before a speech.

Epsilon recited the curses he&#39;d heard from Adrian under his breath as he flinched once with Mother&#39;s declaration, then twice, then three times as Gamma took two loud steps over to his side. He wanted to curse someone, but really, he did this to himself.

Better to get it done quickly. Without a word, he slid out of his chair, and away from Gamma, and quickly slinked across the room to a pile of scrap used for his sibling&#39;s bones and dug out a flat, machined piece of the stuff that was almost three feet tall and a good six inches across. With the treated metallic body and sharpened edge, it looked more like an oversized lawnmower blade than a sword. Epsilon suddenly felt embarrassed as he crossed the room holding the hunk of metal in silence as everyone stared at him.

&#34;Here.&#34; Epsilon awkwardly thrust the cleaver out in front of him, suddenly very aware of the awkward angle he was keeping his arms at. Gamma looked at it, then back to him, hesitated a moment, then slowly picked up the cleaver and looked at it. Her blank expression made Epsilon want to say she didn&#39;t know what to make of it, but he wasn&#39;t sure.

He launched into his rehearsed explanation regardless. &#34;That woman had a knife, and you didn&#39;t, and she hurt you, so...&#34; He hadn&#39;t rehearsed it like that. He hated that he didn&#39;t know why he was stumbling, and he hated that Delta and Mother were smiling like they did. He pushed on, trying to look at Gamma&#39;s feet instead of those two. &#34;This is as strong as you are. Even stronger. So you can kill her next time.&#34; He looked up, to meet Gamma&#39;s wide eyes. &#34;So if it breaks, it&#39;s your fault!&#34;

After a moment of consideration, Gamma nodded. She then stood up and swung the sword a good few times, as hard as she could, before looking back at it again and letting it rest at her side. &#34;It&#39;s well-made. It&#39;ll work.&#34; Epsilon nodded in response and quickly returned to finishing repairs on Zeta, thankful that ordeal was over.

Delta cleared her throat and gave Gamma a look. Epsilon pretended not to notice and let Gamma add in a hasty &#34;Thank you&#34; before she returned to her normal position in front of him. He stole a small glance to the side to see that she was still holding the cleaver. Good, good. 


----

 The remaining repairs went as smoothly as Epsilon could have hoped, even if they had taken longer than he had wanted. Constructing a chassis from the ground up was one thing, but the challenge of building around a partial, damaged base was something else entirely - with the shrapnel and fused tissue, Epsilon had half a mind to throw out everything below the neck and restart from there, but Mother had been clear about their material constraints. 

Regardless of how long it had taken in the end, Zeta was up and running again, and they were right back to staring at Epsilon with those big old eyes of theirs. He wasn&#39;t fond of it, but he was at least more used to it than Gamma and Delta&#39;s looks. He looked up to see their vacuous face, unperturbed by the silence he left it in.

&#34;We&#39;re done. Everything&#39;s fine. You can go now.&#34; It was the first thing Epsilon had said to them since bringing them back online, but they should have been able to keep up with what was happening. They were used to watching Epsilon work in silence, anyhow. 

&#34;Thank you.&#34;

Epsilon squinted at their sibling. Suddenly, Zeta&#39;s stare felt just as uncomfortable as Gamma&#39;s. &#34;...I&#39;m supposed to fix you. Don&#39;t... you don&#39;t need to do that,&#34; he reprimanded. &#34;Mother helped too.&#34;

Zeta looked down without so much as a nod. They were clenching and unclenching their hands around nothing, as though they could feel any part of the cold metal anyways. Epsilon sighed. Zeta was more simple-minded than even Gamma and took to habits quite strongly, and rarely were they without something to hold onto. &#34;Gamma and Delta were just getting all your belongings ready. You&#39;ve been out for a while.&#34;

Zeta blinked.

 &#34;...So they&#39;ll be here with your spear in a moment,&#34; Epsilon added. 

In response, Zeta decided to wrap their hands around their legs and stay seated in the chair Epsilon was using to run the tests. They were as still as the unused wires that dangled around the two of them now that Zeta was no longer connected to them, which made the room feel as though it were just large enough for the pair in the low light. For once, Epsilon found that he was the one staring a Zeta, who was as motionless as they had been when they were dead - were being repaired. 

There wasn&#39;t much time to ruminate on that, thankfully. Light flooded into the room from its door opening as Gamma and Delta returned. Zeta&#39;s head shot up to look at them as they approached, and Epsilon shook his head and followed their gaze.

&#34;Oh, Gamma, Zeta wanted...&#34; He trailed off when he saw Delta. She was the only one whose expressions he could reliably read, but even if he was as clueless as Zeta, he&#39;d be able to tell something was off. She almost never looked so concerned. 

&#34;Gamma, please //wait// a moment, this really isn&#39;t anything worth your concern.&#34; Delta&#39;s hushed tone did little to mask her worry. When Gamma wasn&#39;t stopped, she grabbed her arm. &#34;You&#39;ll only be making things worse by-

Delta&#39;s pleas fell on deaf hears, and Gamma didn&#39;t so much as slow her pace when she was grabbed. Epsilon started to say something, but Gamma brushed past him and tossed something small to Zeta, whose arm snapped up to catch it immediately. Their hand opened to reveal a small, iridescent crystal, made of delicate concentric rectangles. Zeta&#39;s cold hands held it gently, carefully, as they relaxed for the first time since they had woken up.

&#34;Why do you have this?&#34; Gamma demanded. Epsilon flinched at her harsh tone and looked to Delta for some clarification. They made eye contact, but she simply pursed her lips and looked at the ground.

There was no response from Zeta, but unlike their usual vacant silence, they appeared to be biting their lip. They didn&#39;t meet Gamma&#39;s eyes. 

&#34;Gamma.&#34; Delta tried to sound stern, but their voice was ever so slightly shaking. &#34;They probably just think it looks nice. I - //I// think it looks nice.&#34;

&#34;Is she right?&#34; Gamma didn&#39;t look back at Delta or so much as acknowledge Epsilon as he slowly moved closer to Zeta&#39;s side, for reasons he wasn&#39;t entirely sure of. But looking at Gamma, he found it very hard to move his legs.

It took several seconds for Zeta to react at all. They nodded, so slow and stilted that Epsilon wasn&#39;t sure that he was seeing it properly at first. &#34;Mm.&#34; A soft grunt was the only vocal confirmation they offered.

Delta shivered and exhaled an unsure breath. She took a moment to figure out what to say. &#34;Gamma. It&#39;s nothing to worry about. I, I mean, I think it looks nice too.&#34; Her eyes went back to Epsilon. &#34;And I&#39;m sure - Epsilon does too. Right?&#34;

&#34;Yes!&#34; Epsilon answered quickly and loudly despite his nerves, and the fact he hadn&#39;t taken a good look at the crystal. He still wasn&#39;t sure what was happening, but looking at Delta&#39;s expression gave him an awful feeling.

&#34;Zeta isn&#39;t like either of you,&#34; Gamma said. &#34;They can&#39;t be.&#34; 

Epsilon&#39;s mouth fell open. Zeta had been granted less emotional development in order to make sure such a unique product wouldn&#39;t be beholden to any illogical outbursts - they were supposed to be closer to an autonomous system than an individual like Delta. That meant no interests. And no concept of beauty. 

Delta grinded her teeth. &#34;Gamma, dear, we all have similar neural architecture, right, Epsilon?&#34; She turned to him, and he nodded hastily, as Gamma didn&#39;t even bother to look at him. &#34;See? So what if we like the same things.&#34;

&#34;Bowe was unhappy with you.&#34; Gamma&#39;s flat intonation did little to hide her invective. Delta visibly cringed. &#34;She won&#39;t tolerate defects like this from Zeta.&#34;

&#34;For //god&#39;s sake,// it&#39;s a //rock!//&#34; Delta was yelling now, and Epsilon winced and moved a step closer to Zeta, his hand reaching out and squeezing their shoulder of its own accord. Zeta&#39;s head shifted towards him slightly, but he couldn&#39;t make out their face. &#34;Nothing is going to happen to us!&#34;

Gamma whipped around to face Delta with such speed that she staggered backwards. &#34;They will have Zeta decommissioned as a defective product. Either Epsilon will deactivate them or //I will kill them//.&#34;

It was hard to breathe. Epsilon&#39;s stomach churned. Images of Zeta&#39;s innards came to his mind, then the idea of plugging them back into those coils and slicing each of their organs apart while they watched. His hand squeezed them harder as his hand went down to the cleaver he had just given Gamma. It was more than strong enough to cut any of them into chunks. He&#39;d made sure of that.

Delta looked like she was choking. She was hunched backwards as if attempting to flee from Gamma with her feet rooted in place. Her mouth was open, and her eyes were wide, and almost angry. &#34;//You...//&#34; she spat. &#34;You wouldn&#39;t do that.&#34;

&#34;...No. I wouldn&#39;t. I&#39;ll protect you all.&#34; Gamma&#39;s expression hardened as she turned back to Zeta. &#34;This will stop now. Give me the crystal, Zeta.&#34;

&#34;Don&#39;t do that.&#34; Delta&#39;s words were terse, like a warning. &#34;It&#39;s just-&#34;

&#34;I don&#39;t care if it&#39;s small. It won&#39;t get any further.&#34; Gamma held her hand out expectantly. Epsilon couldn&#39;t see if Zeta was even moving as he looked down at them, curled up on the chair. Delta looked as though she wanted to say something, but the simple fact of the matter was that she was little more than an experimental AI and a basic body, and Gamma was built to rip steel beams in half.

Slowly, like a reptile that was afraid of giving away its camouflaged position, Zeta expended their arm, hand in a light fist. Their hand opened next, as slowly as a blooming flower. Then, wordlessly, Gamma seized the crystal and crushed it into dust in her hands. The glittering remains filtered through the open skeletal structure of Zeta&#39;s unfeeling hands and onto the floor.
