&gt; Something broke while we were blasting them holes. First we thought the dynamite struck one of the supports or didn&#39;t go off right, but no, all blew. The snap had been somethin&#39; else. Cracked up the one wall, started leaking water. That ain&#39;t a surprise, everything gets soaked down below after the rain works its way through the mountain, but when I got closer, it just wasn&#39;t right.

= This piece is based off: [[[scp-8987|SCP-8987 &#34;The Brook Runs Red&#34;]]]

------

&gt; SCP-8987 is a petrified tree of unknown genus, whose roots and branches proliferate throughout the bedrock within and around the Red Brook Mine, Dutch Mountain, Pennsylvania. SCP-8987&#39;s trunk is 6 meters in diameter, with its branches reaching a height of 31 meters at their peak. These branches expand through the majority of the 41.8 meter diameter chamber the anomaly resides in. This chamber itself lies at a depth of approximately 250 meters below the surface.</textarea></pre>
