[[include component:image-block | name=exterior | caption=Entrance to SCP-9456-1 | width=WIDTH-GOES-HERE | align=right]]
**Item #:** SCP-9456

**Object Class:** Pythagoras

**NOTICE:** Only White class and above personnel are permitted to view this file. Unauthorized access will result in termination. 

**Special Containment Procedures:** All physical documentation and digital records of the {{WHITEROOM}} protocol are to be safeguarded at Site Black. Full knowledge of the protocol is restricted to BLACKOUT class personnel. Non-cleared personnel found in possession of any classified details of the protocol are to face immediate termination. 

The modified isolation chamber utilized for activation (designated SCP-9456-1) is to remain empty in a sealed vault on Sublevel 5 of Site Black. Access to SCP-9456-1 is permitted only during authorized activations and requires the physical presence of at least two BLACKOUT class personnel. The interior layout of SCP-9456-1 is to remain known exclusively to BLACKOUT class personnel. 

SCP-9456-2 is a secondary containment chamber located adjacent to SCP-9456-1, used exclusively for the restraint and secure accommodation of individuals whose consciousnesses have been displaced following successful activation of the {{WHITEROOM}} Protocol.

Personnel involved in the maintenance of SCP-9456-1 and SCP-9456-2 are prohibited from reassignment. BLACKOUT personnel are authorized to request an unlimited supply of human subjects, specialized personnel, and any other materials required for SCP-9456.  

[[include component:image-block | name=interior | caption=Interior of SCP-9456-2 | width=200 | align=left]]

**Description:** SCP-9456 is a 13-step ritual that enables the complete exchange of consciousness between the enacting subject and any single living human target, regardless of distance. The exchange is fully reversible by repeating the ritual with the subjects in their swapped states. This process is infinitely repeatable.

Activation of SCP-9456 does not strictly require the use of an isolation chamber, though such a chamber has proven highly effective in facilitating the process. The precise mechanism of target selection remains unknown, as all subjects who have undergone the {{WHITEROOM}} protocol report complete amnesia regarding the interval between activation and consciousness exchange. It is similarly unclear whether consciousness remains continuous during this period or whether a temporal &#34;gap&#34; exists. Experiments intended to determine the exact timing and nature of the exchange were suspended due to material constraints.

The {{WHITEROOM}} protocol was developed to standardize and streamline activation of SCP-9456.


[[div class=&#34;blockquote&#34;]]

= **TIMELINE**

**05/13/1972:** SCP-9456 discovered. All other details lost[[footnote]]Multiple Foundation investigations have unsuccessfully attempted to determine the circumstances surrounding the original discovery of SCP-9456.[[/footnote]].

**03/02/1988:** SCP-9456 rediscovered in Foundation archives by Dr. Mathew Williams and Dr. Shahar Goldberg.

**09/08/1988:** SCP-9456 cleared for experimentation.

**03/24/1990:** {{WHITEROOM}} protocol completed development.

**10/01/1990:** SCP-9456-1 and SCP-9456-2 finished construction.

**10/29/1990:** First successful test run of the {{WHITEROOM}} protocol.

**01/01/1991:** SCP-9456 successfully utilized in a coordinated military operation in conjunction with the US government.
----
Since 1991, SCP-9456 has been activated on 113 documented occasions. Recent reductions in usage stem from the growing scarcity of specialized materials required by the {{WHITEROOM}} protocol. Select external parties continue to receive authorization for usage of SCP-9456 solely in exchange for substantial contributions toward the procurement and funding of these materials.

[[/div]]
