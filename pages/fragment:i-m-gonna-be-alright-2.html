She woke to the screech of an alarm and flicker of fluorescent lights. She let ten minutes pass, five for the alarm to stop and five for the buzz of the lights to simmer into the background.

It was the same room, boring and colorless. Well technically beige is a color. Only one window to gaze out of, but at least it was big. Big enough that it&#39;d be impossible not to see her every move from the other side. On her end, there was nothing more to see but a small room and a door she hadn’t seen open in months. There used to be doctors in and out, in and out in...and out.
,,//##E8E9E8|Straighten out your bed.##//,,

“This one is good. This one…just tear stains this time. This one smells…no. How long has it been?” She tossed one of the folded sheets into a bin as she approached the bathroom.

She met the sink guided by the light slipping through from the bedroom. She splashed some cold water on her face, letting it drip off into the drain. Her reflection was opaque in the dim light, yet still too visible. Her hand trembled toward the switch.
,,//##E8E9E8|Fix yourself up. We can&#39;t be late!##//,,

Her ashy skin was the first revelation, its hue faded to match an old yam. Her eyes, sad and crusty, packing bags she could hardly glean away from her hair that had grown wild with its coarse coils.

No scissors, no combs. That made sense, safety was important. No bottles or containers either, even if she could find the product to fill them.  The doctors would probably help her if she asked, but when would she see them? They would just shave it all off anyway. Can&#39;t have that. //Can&#39;t have anything!//

She searched around the room in silence, as if the frustration reverberated off the walls and landed in Dr. Wensley&#39;s ears. She sighed facing herself in the mirror again.

“…Come on, keep fighting.&#34;

No, not that.

&#34;할수 있어…”

Not strong enough.

“I’m…”

…

“결심면 성공해! 결심면 성공해!”

That was it. She learned from dad’s doctor how repetition can help with learning, even after being sick or getting hurt. If he was able to walk again, it could work for her too.

It wasn’t all that helpful really, but she had nothing else to lose.
Even if it hadn’t worked yet. Not like anything ever did.

…

For those who quit! Not her! She searched for courage anywhere but in her reflection.
,,//##E8E9E8|I’m sorry…my beloved.##//,,

The rigid plastic protecting the mirror made it difficult to see herself, but she was grateful she came out in lower definition. She took a strand from the matted mess her hair had become, feeling like hay between her fingers. It snaked back into its coil on release, at home with the gnarled mess across her potato head. It was already painful to untangle with her fingers, wincing as parts broke off and floated to the sink. It felt like some hair had been torn out already. She thought about when that could have happened, staring long enough at the guarded glass in front of her. Embarrassing.

She continued, trying not to get distracted by the constellations forming across her face. Did she put on weight? Of course, being stuck in this room all day.

She took an unpleasant whiff of herself, and prepared for a shower with more pressure than warmth.

She attempted to hide her wicked mane in a ponytail.  It would have been difficult even if she wasn&#39;t still shivering from the air dryers.

Still off, even after the 3rd time she re-tied it. She made do with the strings from the last pillow case she had. They kept the pillow wrapped under a cloth bolted to the bed now, so once those were lost, she lost.

The familiar whine of the alarm beckoned. This one was for breakfast. It was her 5th failure, but it would have to do. She rushed to finish cleaning her face and teeth as best as she could and ran out. Her plate had already arrived.

The food here took no time at all to become cold, soggy and bland and sure enough, the tray seemed to have slid through the compartment by the door ages ago.

It tasted a little better when the doctors brought it to her themselves. She remembered in the early days they even made a nice breakfast with the fat french toast sticks she liked.

They don&#39;t even talk to her now, even when they do come by. She thought she would have gotten used to it, but the quiet just reminded her of being in trouble and the shame of it.

She tossed the sausage aside and did her best to soak up the meat juices with the few napkins provided.

//…six months//.

She tossed aside the napkin, more grease than tissue.
 ,,//##E8E9E8|Make this paper blue.##//,,

She mulled over the desk that sat in the center of the room as she endured the bland paste this hospital called eggs on her tongue. It was covered in colorful pages, most of which had smeared words on them. Each started life as a letter for the Cho’s. They were corpses now, desecrated with scratches, red ink, and tears merged into each page. Gross. 

Two small sketch books laid atop each other next to her meal.
,,//##E8E9E8|Play this symphony without misplaying a single note.##//,,

She remembered one of them was filled with attempts to rewrite a song they showed her. She made it about halfway into the second movement, but could never get it back all the way, and they didn’t come around anymore to bring markers or instruments. Once, she had a bottle she was using for sound, but of course. The others were probably pictures she’d rather not see. They wouldn’t be finished anyway.

,,//##E8E9E8|Solve this puzzle and don’t stop until it’s complete##//,,

She couldn’t bring herself to open the puzzle box under the desk anymore. She lost the pieces to it and couldn’t find them in the room. Somehow. She didn’t know how she did it, but she knew she did it. Sheets weren’t folded right either. Even missed the bin like a fathead.

Six months here, and she was getting worse every day. She stirred around the eggs hoping when they met the char of the “toast” they’d make a compromise for the sake of her tongue. No wonder she’d gotten fat, the only thing she can stomach is the milk and juice that tasted like pure sugar from a fruit that just couldn’t exist. 

…No.

She was just making excuses! She had just gotten careless cause she’s sick. She’d be embarrassed if Dr. Jora saw her moping about something so silly. Lucky for her there was no one and there wouldn&#39;t be anyone for a while.

…

Was she going to be ok?

What she had wasn’t normal and this was clearly an expensive hospital with experimental methods. She should be grateful there was hope for her at all, but six months... 

Dr. Wensley barely did tests anymore. The last time she saw him he said the same things he usually did, but he kept looking at her like mom would look at her brother when he’d come home late. Had she done so poorly?

어머니…Papa…

She slid back out a tray with a puddle of paste that was once cereal and milk and two cartons, emptied of every drop.

These were the kind of places that people were always trying to sneak into in movies and games. They protected things here, right? Maybe they had cures for rare diseases stored somewhere here. They probably had cures for all kinds of things.

But none for what was wrong with her.

Maybe she was just stupid.

That&#39;s why she&#39;s still here. That&#39;s why she hasn&#39;t gotten better. She wasn’t trying hard enough.

She noticed some muffled voices from beyond the room. Beyond the window.

It sounded like Dr. Wensley was talking with someone. They both sounded tired. What were they saying? The murmuring passed as suddenly as it came. It was probably nothing good anyway. Good things never happened here. At least not for her.

&#34;Stop it!&#34;

She looked around. Still no one in the window.

It was frustrating, but she had to try harder. The doctors were trying their hardest to help her and it couldn&#39;t have been cheap or easy for her family to bring her here. She just had to bear it for a little longer, then she could see her family again.
 
어머니?

Mom is Mom of course.

Papa was…

Jun? No, 오빠 is Jun.

And she was

“[https://scp-wiki.wikidot.com/scp-2599 2599], on your feet!”

“Ok.”

She fell out of the chair with a jolt, landing on her knees. She erected herself on them all in one motion.

&#34;Oh, come on!” The same voice groaned.

She saw them now. Two women, one with short hair and all the armor, a security guard. The other, in a white coat and a ponytail, a doctor. They must be new to talk to her like that.

“It’s the only rule we have for it. One simple rule.” The doctor gestured to the grumbling guard.

&#34;Come on stand up!&#34; Zena whispered frantically as the guard approached. The cold glove came under her arm to lift her up.

&#34;NO I-&#34;

As she tensed, the guards pull lost any attempt at gentleness and jerked her to her feet, succeeding at lifting only one leg. The woman&#39;s face went pale when 2599 pulled back against her. Just as quickly, it shrank back into a scowl. 
 
&#34;Easy, she’s still just a kid.&#34; The doctor walked in and gestured toward the door.

“Just a kid my ass!”

They were finally going to work on her again. Finally, and she couldn’t even get to her feet. The next tug lost any gentleness. The guard pulled like the lease of an errant dog. When she was on her feet, The guard shoved her to the doctor who promptly took her hand.

She really wasn’t supposed to talk to her anymore. She understood why, she accepted it by now. But still…

&#34;…I can walk on my own.&#34; she whimpered as the doctor walked her through the halls.
