&#34;Shit. I go through all this trouble and I still get caught by the pigs?&#34; Alicia Socarras, the anartist behind the statue who had recently murdered a handful of civilians in the Little Havana Gallery, grimaced as she found herself cornered. She could see the UIU agents approaching her from all sides. The only thing separating her from them was a few meters. But she was too young to go to prison, too pretty to rot in Paramax with all that other scum. Furthermore, she was a Cuban citizen. These FBI agents had no right to arrest her.

She was surprised she had come this far. It was not easy to navigate the alleys of the city, especially considering that the entrances and exits had been blocked by the authorities because of her actions. Actions whose consequences had been catastrophic. The screams of people being dismembered and burned alive still echoed in her ears. She had run, fled through the alleys, from the feds, from the MAC, from that idiotic journalist... And now everything was coming to an end.

As they surrounded her, Alicia began to formulate ideas on how to avoid being executed. She was just a necromancy student visiting from Deer College. She was an innocent bystander who had been mistaken for the artist. She was incriminated by the Cuban government.

No, they wouldn&#39;t believe any of that. She was a socialist known to the Yankees, so there was really no way out of this. Damn.

&#34;Don&#39;t move!&#34; said the nearest agent approaching with his gun raised. &#34;We have you surrounded.&#34; More and more of them emerged from the surroundings. There were at least a dozen. And every one of them was pointing their guns at her.

She raised her hands high above her head in surrender. &#34;Get on the ground!&#34; Shouted one of the agents. She obeyed, staining her black blouse with water from the day&#39;s rains. Although she could vaporize them all with a spell (she would love to cast Power Word: Death), she knew that would only lead to her demise. For this reason, she preferred to follow orders.

She noticed an officer roughly take her hands, followed by two clicks. They handcuffed her. Tight, too. From what she had heard, the UIU used beryllium bronze alloy handles. With them on, she couldn&#39;t do magic. Could she do something other than magic? Kicking someone, for example, or running, or... Someone forced her to stand up abruptly. Several agents with sullen expressions were watching her. They forced her to move.

&#34;You have the right to remain silent. Anything you say can and will be used against you in a cou--&#34; One of the agents spoke as he pulled her to her feet, but was interrupted by Alicia.

&#34;En español, puto. No hablo tu lengua imperialista.&#34; 

The agent sighed and then looked at Alicia with contempt. &#34;Usted tiene derecho a permanecer en silencio. Todo lo que usted diga puede y será usado en su contra en un tribunal de justicia. Tiene derecho a un abogado. Si no puede pagar un abogado, se le asignará uno. ¿Feliz?&#34; The agent folded his arms.

Alicia spat on the ground and glared at the agent. &#34;Actually, I understand English. I just wanted to see if you would do your best to please me.&#34; The woman smiled.

The agent looked at his companions. Then he looked at Alicia. Then he hit her.

&#34;Next time you&#39;ll think twice before disrespecting my authority.&#34; Two other police officers grabbed her arms while a third covered her head with a bag so she couldn&#39;t see anything. They forced her to move, she heard the sound of a vehicle and then silence. She lost track of time.

Suddenly, there was light. She was sitting in a room, still tied up. Someone was shining a lamp on her, blinding her.


&#34;Who do you work for?&#34; A voice behind the light asked.

&#34;I want a lawyer.&#34; Alicia fired back.

A sardonic laugh was all she got in response.

&#34;That&#39;s for later. For now, you have to deal with me. So your best option is to tell us who you work for and why you caused a terrorist attack in the middle of the city.&#34;

&#34;I know my rights. And I will not speak without a lawyer present.&#34; She didn&#39;t know why he was repeating this refrain, but she couldn&#39;t think of a better way to save her skin.

&#34;There are no lawyers here. Even less so for para-terrorist scum like you.&#34;

Alicia remained silent, blinking under the harsh light.

&#34;Don&#39;t make us start using our advanced interrogation techniques,&#34; said the agent. The anartist spat in the approximate direction from which the voice came. “You asked for it.”

The light moved, allowing Alicia to see two suited agents whispering to each other. Once her eyes adjusted, she was able to identify the room she was in, which looked like a small dilapidated warehouse. Surely a provisional area where the FBI placed Cuban prisoners before moving them to Paramax, the UIU&#39;s maximum security prison for anomalous subjects. A third agent watched from the door, smoking. She looked intensely at the detainee, as if waiting for an opportunity to put out her cigarette on Alicia&#39;s skin.

Suddenly, the very same officer started coughing. Her eyes grew wide. She doubled over, leaning against the wall, and threw the cigarette away. The other two feds turned to her, and immediately started coughing. The first to be affected collapsed on herself. One of the officers who was still standing took a radio from his belt, tried to activate it but it fell out of his hands and he followed her right after. The last one took out a gun and pointed it at Alicia who was beginning to notice a nauseating smell. A smell of death.

A shot rang out.

And then, silence.

&#34;Wake up.&#34;

She moved slightly.

&#34;Wake up, girl.&#34; A deep, masculine, almost raspy voice called her attention. 

&#34;Eh?&#34;

Alicia opened her eyes.

&#34;Good morning, sleeping beauty.&#34; The voice belonged to a bald man wearing a guayabera with his sleeves rolled up and sitting directly in front of her. She realized they were moving: were they on a boat? She heard the soft lapping of water soon after and quickly became dizzy.

&#34;Who are you?&#34; She managed to choke out between containing the vomit threatening to creep out her throat and stabilizing herself. Alicia tried to get away from him but found herself against the wall.

&#34;My name is Ernesto.&#34; He spoke simply and calmly, as if everything that had preceded this kidnapping was nothing.

&#34;Why did you bring me here? Are you going to execute me? Are you with the UIU?&#34; Her chest rose and fell, beads of sweat formed on her forehead, and she reached for something, anything he could use as a weapon against this man. Although she could cast some pretty powerful necromancy spells, the man had kept her alive and freed her from her previous captors. He clearly wanted something.

&#34;If you&#39;re looking for something to hit me with, you won&#39;t find anything here. And I wouldn&#39;t try any of your spells on me either, unless you feel like being stuck alone in the middle of nowhere. As for your questions, I will answer them in reverse order. I would rather die than be with the UIU. I&#39;m not going to kill you. And I want to make you an offer.&#34;

&#34;I don&#39;t like bald men.&#34;

Ernesto laughed and then put his hand in his breast pocket. He pulled out a cigar and a lighter, lit it, then took a drag. &#34;And I don&#39;t like brats. But don&#39;t worry, that&#39;s not what my proposal is about.&#34; Smoke poured out of his nostrils.

Alicia remained silent.

&#34;Aren&#39;t you going to ask me what my offer is?&#34; Ernesto took another deep drag on his cigar and let it out slowly.

The woman, for her part, did not flinch. Despite being a staunch communist, she had left Cuba because she knew there were no prospects for her as a necromancer there. Had he been wrong? Either way, this man wasn&#39;t doing a good job of convincing her.

&#34;No.&#34;

He laughed. She could tell he wasn&#39;t laughing at her, but she still didn&#39;t like the fact that he was laughing.

&#34;No?&#34;

&#34;No.&#34;

He simply stared at her for a moment and then grimaced. &#34;Well, then I guess I&#39;ll return you to Little Havana so you can take care of the UIU yourself.&#34; No problem. — Ernesto stood up, turning his back on her for a moment.

Alicia began casting a spell, keeping her voice to a whisper. &#34;//Warikẽ, ahiyakawo...//&#34;

&#34;I would like to invite you to come work with me,&#34; he said, back still to her.

This made her reflect. She stopped casting. &#34;...It&#39;s much better than rotting in an UIU prison. But first, I want you to answer a few questions.&#34;

&#34;Shoot.&#34; He turned around.

&#34;How did you save me from the UIU agents? With that smoke? What was that?&#34;

Ernesto smiled and extended his hand, which in a matter of seconds turned into smoke and then back into flesh. —Nice trick, right? You&#39;re not the only necromancer with tricks up your sleeve.

Alicia nodded. &#34;I see. Second question: why did you save me? I know you want to give me a job, but why?&#34;

&#34;My organization has spies within the UIIU, and the moment we learned of your statue&#39;s properties we were intrigued. We showed up to contain it before they did. Rest assured that your beautiful statue is in a safe place with us. But upon inspection, we learned that it was incomplete. So my boss wanted to give you the opportunity to complete your vision... and put a spin on it to benefit us.&#34;

She stayed quiet a moment before asking another question.

&#34;Who do you work for? The Foundation?&#34;
