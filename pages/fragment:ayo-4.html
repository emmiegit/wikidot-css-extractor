&#34;결심면 정공해! 결심면 정공해! 결심면 정공해!&#34;

She repeated the mantra religiously the moment she finished her stretches and it was just her and the mirror. She had gotten stiff but she would get her lazy self in order. She had a chance now. Maybe it only took ten years for the other patients, she could do it in half that time!

…

“그냥해!”

It didn’t matter how long it took. What was important was she got it right and didn’t make a fool of herself. This was her life now so there were no excuses for failure.

…

This was her life now. She wrestled with the thought as she struck her face with cold water. 
 ,,//##E8E9E8|This will be your room 2599. Please be mindful to keep it clean.##//,,

FOCUS!

There was a lot she accepted all at once. Even now it was hard to take the thought of changing reality seriously. It&#39;s not that it was hard to believe, she had just done it. But she barely understood what made reality...reality. Was it just magic tricks. or could she actually do more. She felt a hook pull on her chest and drag it deep into her stomach. She held the sink, feeling a ting of nausea build. She escaped when the alarm beckoned breakfast again.  She splashed more water on her face.

“Do it you, fathead.&#34; She whispered before rushing out.

Breakfast was as terrible as ever, but she managed to take a bite out of the sausage this time. It came back up immediately, but it was progress. She needed all the nutrients she could get, even if they came from a nasty place. She started focusing on making sure no matter how bad it was she would finish her plate and, minus the sausage, had been consistent for 3 days now. She had to reign in her nerves, she couldn’t afford any more mistakes.

She wiped the bile off her face before discarding the tray. She studied the letter she had started the same night after her test. It was the fifth attempt, at least since last night, but she promised not to throw this one away.

//--친애하는 엄마와--//

 //--아빠--//

//To my mo//

//--친애하는 할--//

--//To J//--

--//To the Chos//--

--//My Family//--

--//To Everyone who re//--

--//To the Fam//--

--//To Mr. and Mrs. Cho//--

//I’m//

She felt she needed to write it, just in case. She didn’t know when they would allow her another marker. But writing it felt like an admission. Before coming to a decision, the door opened. It was Dr. Jora along with a couple of guards.

“Good morning, 2599. I see you had an early start.”

“Good morning, Dr. Jora. I know. I&#39;ve just been a little nervous…is it today?”

Dr. Jora sighed with a nod as she entered, clutching a clipboard to her chest.

Her guards took stances around the room, Ms. Lyla was sure to stand behind Dr. Jora with her arm stuck to her waist. She eyed the intro to ontokinetics on the table with disgust before focusing back on 2599. Zena rushed to the desk to swat the papers away. She regretted it immediately as some of her ontokinology notes were with it.

“Please, have a seat ma’am.”

“Wensley told me you were excited.” She chuckled as she took her chair.

“…Was he mad?”

“He’s just...concerned. It’s a different environment there at Facility 120.”

“I know! I read the intros to ontokinetics. I’m ready. I want to know how to use my abilities and I want to be...&#34;

Free.

“Useful.”

“Useful?”

“I mean like I want to be able help people. I feel like I’m finally getting better at all of this. Maybe all I needed was to accept I’ll never see my family again. Keehehehe.” 

Dr. Jora was quiet. Zena quickly closed her mouth, shutting down her laughter and following apology. Dr. Jora had already told her about that.

“I&#39;m glad to see you with a more positive attitude, but there’s no shame in being open about how hard it is to handle all of this alone.“

“Alone? Aren&#39;t you coming with me Dr. Jora?” 

“No, I’m so sorry. I&#39;m still needed here. It’s why I came early to see you off.”

“Oh...well that’s fine. I’ve been ready for weeks!”

“Are you having doubts? It’s ok to talk about it even now.”

“It is a little scary…” she laughed nervously. “But, there&#39;s no point crying about it, right?”

&#34;Z...There’s a lot being asked of you and at your age it’s easy to confuse a sense of helplessness as maturity. I just want to be sure you&#39;re...certain you&#39;re ready.”

“I don’t get it. Did Karl lie to me? Do they not want me?”

“There is an interest in your anomaly but that&#39;s-&#34;

“Then I’m ready. I’ve been studying hard for weeks. I didn’t get anywhere here. I won’t fail with people like Karl teaching me. I’ll get to make friends too!” The woman sighed a familiar sigh.

“Ok, that&#39;s good then. So, you have no concerns? No lingering feelings?”

More than she could hope to write, let alone speak.

“Nope.”

It’s not like it mattered.

“I’m ready.”

Dr. Jora put her pen to work on her clipboard without uttering a word. Zena tried to hide her wincing to the scratching, the silence surrounding them made it worse.

She stopped writing and once again sighed.

“I understand it can be...difficult to understand exactly what it means to be an SCP and any opportunity for change sounds amazing, but there&#39;s still-“

“I said I’m ready.” Dr. Jora recoiled like the words bit her. She then pursed her lips and nodded quickly, taking in the girls affirmation.

 It //was// rude of Zena to interrupt like that, even if she meant it. 

“Alright, I see you&#39;re eager to be on your way so I will leave you and the team to it.” She jotted some final notes down than rose to her feet.

“Some staff will be here soon to get you set up.”

She made for the door but stopped just a few steps short. 

“Zena, do you know how long you’ve been here?”

Six weeks right?

“Six...months! Six months.”

She didn’t seem angry. She just left after all that writing and nodding.  

Zena remained at the table, wrestling with the familiar cast of thoughts. She felt the hook snaking back to her heart so she tried to keep focus by thinking of how she would greet the other reality warpers. Should she use Zena or 2599? Would they do test together as a group? Would that be possible with her being…her? 

A group of men and women entered the chamber. She stood to greet the man in front.

&#34;Hello. Am I-&#34;

“2599, cooperate with the staff and listen to their instruction for 8 hours.”

“Ok.”

It felt like her body went limp despite it&#39;s standing posture. As one approached and reached for her arm, she found more strength than usual to raise it.

She didn’t have much of a part to play, and despite how it made her feel, she was going to play it well.
