+ THE RESEARCHER
[[/=]]
@@@@
@@@@
Nobody broke the dress code. Nobody wanted to.

To them, it would mean risking their jobs.

Dave&#39;s job was centered on the study of anomalies. Specifically, he studied anomalies pertaining to biohazards, which was his specialty.

At Site-22, general study of anomalies was the standard activity that kept the researchers engaged.

He wore blue gloves, a white coat, black pants, and a brown shirt. This was his response to the dress code that personnel had to follow. 

If personnel chose not to follow the dress code (and adherence is a choice), they would likely receive disciplinary action. Dave wouldn&#39;t know. He had never been disciplined for refusing to comply with the dress code.

At Site-22, everybody followed the dress code. 

Yet now, Dave had something to say to his peer, who was also a researcher.

&gt; **Dave:** &#34;What do you think would happen if we just didn&#39;t follow the dress code?&#34;
&gt; 
&gt; **??:** &#34;Wouldn&#39;t you get in trouble?&#34;
&gt; 
&gt; **Dave:** &#34;Have you ever seen anyone get in trouble here?&#34;
&gt; 
&gt; **??:** &#34;Not really. That&#39;s just because everyone is compliant here at Site-22.&#34;
&gt; 
&gt; **Dave:** &#34;Where is this dress code written down, anyway?&#34;
&gt; 
&gt; **??:** &#34;Here at Site-22, nobody knows.&#34;
&gt; 
&gt; **??:** &#34;Though it&#39;s probably online, you can go ask the managers.&#34;

Dave isn&#39;t rebellious. He always adheres to the dress code because that is what the researchers at Site-22 do.

At Site-22, nobody broke the dress code.

Dave went down a hallway he had never walked down before. It was here he encountered a manager, or at least someone who looks like a manager.

&gt; **???:** &#34;What are you doing?&#34;
&gt; 
&gt; **Dave:** &#34;I was looking for the place that explains the dress code.&#34;
&gt; 
&gt; **???:** &#34;Here at Site-22, nobody steps up from their place. Go back to work, please.&#34;

What did he mean? How was this stepping up?

&gt; **Dave:** &#34;But... I am just looking for the dress code.&#34;
&gt; 
&gt; **???:** &#34;There are no //buts// about it. Go back to work.&#34;
&gt; 
&gt; **Dave:** &#34;Why?&#34;
&gt; 
&gt; **???:** &#34;Why what? You are already following the dress code. What questions could you have about it?&#34;
&gt; 
&gt; **Dave:** &#34;But what would happen if I didn&#39;t?&#34;

Dave felt pedantic.

The manager, or the manager look-alike hesitated. Perhaps he did not know either.

&gt; **???:** &#34;That is enough. Go back to work.&#34;

Dave couldn&#39;t be insubordinate. He had to obey the command, even if he wasn&#39;t sure whether it was from a manager or a manager look-alike.

Here at Site-22, pretty much no one questions the managers. Nor does anyone break the dress code.

Dave went back to his study, but now it was time for lunch.

There was not much to cover in his study anyway.

At lunch, everybody had the choice to eat either the sandwich or the chicken. Adherence is a choice, after all.

Here at Site-22, everybody chooses to eat the sandwich.

&gt; **?:** &#34;Can I have the chicken?&#34;

This was strange.

But here at Site-22, while everybody followed the dress code, not everybody was completely compliant.

&gt; **??:** &#34;Hey.&#34;

This was the same peer from earlier.

&gt; **??:** &#34;Ethan, by the way. Did you see that guy grab the chicken?&#34;
&gt; 
&gt; **Dave:** &#34;Yes, I saw it too.&#34;
&gt; 
&gt; **Ethan:** &#34;What&#39;s going to happen to him?&#34;
&gt; 
&gt; **Dave:** &#34;I came here to ask you that very question.&#34;

The only way to know what would happen was to observe.

&gt; **?:** &#34;Actually, I think I&#39;ll have the sandwich.&#34;

Never mind.

But Dave did not want to observe his peer. He wanted to observe himself.

&gt; **Dave:** &#34;Can I have the chicken?&#34;

Dave had the chicken. It tasted like chicken. But here at Site-22, the researchers ate the sandwich.

&gt; **Ethan:** &#34;I can&#39;t believe you actually ate the chicken. What did it taste like?&#34;
&gt; 
&gt; **Dave:** &#34;It just tasted like normal chicken.&#34;

Nothing had happened.

&gt; **Ethan:** &#34;Did you ever find out what happened if we broke the dress code?&#34;
&gt; 
&gt; **Dave:** &#34;Nope, they just pushed me away. It was very disappointing.&#34;
&gt; 
&gt; **Ethan:** &#34;That makes sense. Here at Site-22, nobody steps up from their place.&#34;
&gt; 
&gt; **Dave:** &#34;How is asking a question stepping up from my place?&#34;
&gt; 
&gt; **Ethan:** &#34;Because here at Site-22, &#39;manager&#39; is a very etymologically literal title.&#34;
&gt; 
&gt; **Dave:** &#34;What does that mean?&#34;
&gt; 
&gt; **Ethan:** &#34;It&#39;s probably best to learn by experience. I can tell you that nothing bad will happen to you, though.&#34;
&gt; 
&gt; //[Ethan gestures to Dave&#39;s side]//

That was ominous for Dave.

It was then that an administrator stormed in, or at least an administrator look-alike.

&gt; **????:** &#34;**WHO ATE MY CHICKEN?**&#34;

Nobody answered.

Here at Site-22, nobody reported another researcher.

It was a tense situation, and every researcher was nervous. This only intensified when the administrator, or the administrator look-alike, began walking near everyone.

He walked near Dave, looked at him intensely, but not because Dave was in trouble. The administrator&#39;s, or the administrator look-alike&#39;s, eyes expanded.

Here at Site-22, no administrator, or administrator look-alike showed any form of interest in a researcher. Adherence is a choice, after all.

&gt; **????:** &#34;Ethan. Follow me to my office. Now.&#34;

By whatever miracle, Dave was not in trouble. Ethan, unfortunately, had to leave.

But not without Dave&#39;s interference.

&gt; **Dave:** &#34;Why are you taking him?&#34;

Dave&#39;s poor interference.

The administrator, or the administrator look-alike, was already gone.

Twelve minutes later, Dave was called down to the same office.

&gt; **????:** &#34;I am offering you a promotion.&#34;

It was a choice. This is because here at Site-22, adherence is a choice.

&gt; **????:** &#34;Are you interested in becoming a manager, or a manager look-alike?&#34;

Here at Site-22, there was no difference between a look-alike and someone who adhered to the actual role. They were the same person.

&gt; **Dave:** &#34;Would I still be able to do the work I love?&#34;
&gt; 
&gt; **????:** &#34;//Yes.//&#34;

Dave made the rational decision, and he became a manager, or a manager look-alike.

He did this by changing the color of his coat. Here at Site-22, all researchers had white coats, and all managers had black coats.

The administrator in question had a red coat.

Dave was now following the dress code.

The initiative was appreciated.

And then there were no more questions.

Even though Ethan may be gone. 

What manager has time to handle a researcher?
