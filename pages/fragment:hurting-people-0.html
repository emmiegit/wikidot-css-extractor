    <pre><textarea class="page-source" readonly>//We could have hung out in the living room,// Paige thinks, staring out the passenger window of Eric&#39;s car. //We didn&#39;t have to go out.//

= ##white|**ArtPiece XXI**##

She dressed up, but she doesn&#39;t have much to dress up in. She wears tight, ripped jeans with leggings underneath, and a crop top she had to fight herself to put on. She spent an hour and a half trying to get the blue tint off of her chin, every last little bit of stubble scraped away, and now she&#39;s worried her chin looks red and irritated. She can&#39;t tell, and she&#39;s had to make herself stop checking in the mirror. Eric, for his part, has commented on nothing -- if she hadn&#39;t imagined it, he even looked pleased with her when he came to pick her up.

Eric sits in the driver seat, and they&#39;d exchanged some small talk about his work day. Eric seems to have a good relationship with his coworkers -- if unfriendly. Eric has fewer hesitations when it comes to telling shitty customers to fuck off. It&#39;s earned him some respect, and he&#39;s saved some coworkers from customer service hell on occasion. Apparently, something along those lines happened today; a woman was unhappy with her sandwich, accepting no alternatives, and Eric got her to fuck off. It&#39;s clearly put him in a good mood.

Good enough to either not notice or be unbothered by her standoffish responses to him. Or, what she assumes came off as standoffish -- //assuming, always assuming,// she tries to keep herself in line. //You think you know everything, you don&#39;t know anything. Stop assuming. Have you ever considered that you&#39;re doing fine? What if he&#39;s comfortable with silence?//

They arrive at a cafe, some place called Althea Coffee. Paige is too inside herself to notice the aesthetic, but Eric catches the colorful cartoon bears that walk along the windowsills and the big detailed skull on the door. //Hippie shit,// he squints, but he supposes that was inevitable with a cafe in Oregon.

Paige takes a second longer than Eric to get out of the car, but follows him inside, something between a fever and a cramp slinking along the bottom of her rib cage.

&#34;What&#39;s your usual from a cafe?&#34; Eric asks.

&#34;Ah, I used to get caramel macchiatos pretty often, I guess.&#34;

&#34;Cool. I don&#39;t really get coffee. Is it any good?&#34;

&#34;It&#39;s just my normal. I dunno.&#34;

&#34;Okay.&#34;

Eric opens the door and they step inside.

//I hate my belly. My chin is too square. I&#39;m flat on both sides.// Paige shakes her head. //No one is looking at you. No one cares.//

They get in line.

&#34;You alright?&#34; Eric asks.

&#34;I am,&#34; she replies, too fast.

//I had to dress up,// she thinks. //I just had to try. I&#39;m failing. I&#39;m no image of femininity.//

She imagines herself as a neanderthal, and while it&#39;s incredibly demoralizing, it&#39;s also just funny enough to make her chuckle.

&#34;You sure?&#34; Eric asks, tone lower.

She looks up at him. He looks intense. Judging? //Angry. I&#39;m fucking this up.//

She tries to shake it away. //I&#39;m not fucking this up. He just doesn&#39;t get it. There&#39;s no way for him to get it -- to him I&#39;m a man. To him I&#39;m pretending.//

Another hole. She shakes her head again.

He places a hand on her shoulder, and she flinches away.

&#34;Come on,&#34; he says. //Annoyed with me, hating me.// She looks up.

None of that is on his face.

&#34;Let&#39;s go,&#34; he says, and his voice is soft.

She hesitates to move, and he puts his hand on her shoulder again, as he begins to walk to the exit. She follows, and in a sequence of events she doesn&#39;t seem to record, they&#39;re back in the car, driving home.

She looks out the window, at the residences as they pass. Moments pass in silence as she fights the static in her head. //This is why you don&#39;t go out,// she reminds herself, //idiot.//

&#34;Are you better?&#34;

She turns in her seat and looks at Eric. His eyes are on the road, but he glances at her. His expression is neutral, his tone equally unreadable. //He&#39;s holding it in.// She shakes her head.

&#34;No?&#34;

&#34;No -- yes. I&#39;m better. Not good yet. Sorry.&#34;

He nods. He doesn&#39;t ask her what&#39;s wrong -- and somehow, even through her haze, she recognizes it. That&#39;s what she learned to do with Cole -- allow him to say what&#39;s bothering him, never push. That&#39;s the language the Ortegren boys speak. She glances at him again.

//He&#39;s letting me control the pace,// she thinks.

Her eyes return to the window.

&#34;I just...&#34; she starts. She doesn&#39;t continue, but he doesn&#39;t insert himself, so she restarts. &#34;I just... I shouldn&#39;t have dressed up.&#34;

He huffs, and she turns to him, surprised to see an amused smile on his face. &#34;You dressed up?&#34;

He looks at her, and his expression hardens. And then his brow furrows. //Anger?// &#34;Sorry.&#34; //At me, at himself?//

&#34;No, you&#39;re right,&#34; she allows a small chuckle to escape her own lips, &#34;I don&#39;t really have anything to dress up with. That&#39;s... part of the problem.&#34;

&#34;Mm,&#34; he says.

&#34;I just...&#34; her voice lowers considerably. &#34;It&#39;s different, um, going out, without dressing up, and no one knows I&#39;m //supposed// to be a girl, um. But... //you// know, and, I couldn&#39;t just... go out, in boy mode -- uh, in boy clothes, and, feel like I wasn&#39;t lying, or, that... the lie is...&#34;

She flounders.

&#34;Okay,&#34; he says, slowly.

She looks at him. The anger has melted, but he still looks tense.

//He doesn&#39;t get it,// she thinks, and this time, with a clearer head, she feels better about believing it. And then she frowns. &#34;//Do// you?&#34;

He glances at her. &#34;Huh? What.&#34;

Her face screws up. &#34;//Do// you think I&#39;m a girl?&#34;

A pause ensues as Eric pulls onto their street, and lasts until he parks in the cul-de-sac. But he doesn&#39;t get out of the car as the engine turns off. She doesn&#39;t look at him. Doesn&#39;t know if she can.

Finally, he says: &#34;I don&#39;t know why I&#39;m supposed to.&#34;

She jerks her whole body in rotation, looking at him, but she doesn&#39;t take in what he looks like -- she just turns back to the door, opens it, and gets out.

&#34;Paige --&#34;

&#34;//Because I am!//&#34; she yells, even louder than she means to, hoping not only to convince Eric, but herself. She immediately feels seen -- watched, the houses around her, the setting sun preventing her from seeing the faces staring out the windows she&#39;s somehow sure must exist.

&#34;Paige,&#34; and Eric&#39;s voice has an edge to it as he gets out of the driver&#39;s seat, &#34;keep it //down.//&#34;

For some reason, she listens, though her voice crescendos with every syllable. &#34;Because I&#39;m a -- because --&#34; she loses her footing.

Before she notices, Eric&#39;s closed some distance. She steps back, and he reaches out and grabs her wrist. She pulls her arm away, and it catches, his grip solid. Her heartrate jumps.

&#34;Calm the fuck down.&#34;

&#34;Let //go!//&#34; She pulls her arm away, and this time he lets her, releasing his grip.

His eyes are steely. His expression intense. He&#39;s //big//. He&#39;s a lot bigger than her. Tall, wide without much fat. Naturally strong. A man. The build, the stature -- the imposing, instinctual intrusion on her personal space, the willingness to touch her without asking, the assumed ownership of that which he can take. Suddenly, she is not merely uncomfortable with him -- she&#39;s frightened of this man she shares her house with, this person she&#39;s allowed in her space, her space he thinks he can //take.//

Where else to go? She stumbles towards the house.

&#34;Paige --&#34;

&#34;Shut //up!//&#34;

She makes it to the door, but she doesn&#39;t get much farther. As she tries to fish her keys out of her pockets, her shaking hands fumble and drop them on the ground. She feels herself losing grip, her thoughts spiraling more and more. //He&#39;s right, you know. You&#39;re nothing like a woman. You&#39;ve made no strides in ten years. You sit in your room all day and lie to everybody.//

The thoughts interlock with another set, like intertwined fingers: //He&#39;s right there. You can&#39;t do anything to him. He&#39;s going to hurt you. He can do it -- he&#39;s hurt you already.//

She doesn&#39;t even get to lean over and grab her keys, before she feels a familiar hand on her shoulder. She startles, and an embarrassing noise escapes her lips. She turns, and backs up, then realizing she&#39;s been quite literally cornered -- her back where a wall makes a corner with the door. Eric stands there, hand hovering.

&#34;Stop //touching// me!&#34; she shrieks.

His expression hardens. //Furious.// He looks ready to kill something, and her eyes fix on him, unable to look away -- trying to find the angle of attack, dodge, fight back.

He does nothing. He stands there. At some point, his eyes drifted from looking at her to looking at nothing, the wall above her head. After what feels like minutes, he reaches into his pockets, and pulls out his own key. He moves to the door, unlocks it, and pushes it open, then stepping back and out of the way, his expression unchanged.

A moment passes before she realizes he&#39;s letting her past. //He&#39;s putting you in the house where no one can hear you, where you have less escape routes.// She shakes the thought out of her head. //Where else is there to go?// She slides past him, then bolting up the stairs and into her room.

Eric hears the door close behind her, still standing at the doorway, outside in the dark, cool evening.

//He&#39;s fucking retarded,// he thinks to himself. But even as he feels it, it comes with no anger at her. It aims inwards. //He can&#39;t help it, you shithead.// Then he finally clenches his fists. //Can&#39;t he?//

Paige startles at the guttural yell from downstairs. She sits on her bed, breathing faster and shallower than she should. The front door slams. //Is he gone?//

No, she hears his footsteps through the living room. Back and forth, back and forth. She fixates on his movements, as if keeping track of him gives her control of the situation. As if she&#39;ll actually jump to escape out the window should he approach. She won&#39;t, she knows it -- she&#39;s fucked, if anything should happen. She isn&#39;t that proactive. //I&#39;m just not that smart.//

Over the course of minutes, his pace slows. In the same timespan, her breathing becomes more regular, though not as deep and consistent as she&#39;d like. Finally, at some point, he stops. Without the sound of his footsteps, all she hears is her heartbeat in her ears. Then, as the silence prolongs, the soft tinnitus ring of sensory depravation.

He starts moving again, but his footsteps are softer. They feel less like the stomps of a man overtaken by anger, and more like the quiet steps he takes when he gets a glass of water late at night. He stops in the kitchen for a moment, and she can&#39;t hear exactly what he&#39;s doing, but there are the soft sounds of movement all the while.

Her heartbeat slows. Her breathing calms. //I might be okay,// she&#39;s finally allowed to think.

Then, the front door opens, and closes, and the noises stop.

But now, she can hear her room. The ambience of the running computer tower she turns off less than she should. The //shiff// of the blankets while she nervously rubs them with her hands. Other sensations come into focus. The ache of her back from sitting so hunched for so long. The similar ache in her neck. The soreness of tension in her arms and legs, which, now acknowledged, she wills to loosen.

Unexpectedly, a brief swell of emotion forces water into her eyes. She blinks away the would-be tears, and composes herself. //Okay,// she thinks, //what now?//

All she wants to do is curl in bed and try to sleep. //You won&#39;t sleep,// she thinks, //and you&#39;ll boil in your thoughts. You&#39;ve done this before.//

She winces. //You&#39;re emotionally unstable. Reach out.// It comes so unnaturally. She doesn&#39;t want to talk to people -- she doesn&#39;t want to tell anyone. She doesn&#39;t want people to know that she&#39;s weak. She doesn&#39;t want people to feel the need to accommodate her. But Kiave has put herself in a position to be reached out to, has yet to make her feel bad for venting -- well, has yet to make her feel //especially// bad about venting, just the normal amount for venting in general.

She stands up, almost losing her balance as a reminder of how shaky she is, and moves to her desktop.

&#34;I didn&#39;t tell anyone I was coming here.&#34;

&#34;I kind of figured that out.&#34;

&#34;I... I&#39;m going to have to go back to school. Go... back home. Or else they&#39;re gonna find me. Find Eric. I don&#39;t know how, but they will, eventually. They&#39;re probably already looking for me. I&#39;ve probably scared Mom half to death. Dad doesn&#39;t fucking care. He&#39;s probably smug. He probably knew I&#39;d pussy out and do this -- he probably feels so justified, that I&#39;ve become Eric 2. But he&#39;ll be so upset. So upset that both his sons are such fuckups. He&#39;ll take it out on Mom, and...&#34;

He trails off.

&#34;Hey,&#34; Paige picks up the slack. &#34;That&#39;s not your battle. You can&#39;t control that, and your safety comes first.&#34;

He scoffs. &#34;Safety?&#34;

But when he looks at her, he can&#39;t keep the glare on his face, and he looks away again.

&#34;I was -- I&#39;m fine.&#34;

&#34;You&#39;re not. And that&#39;s okay. It&#39;s okay to not be fine.&#34;

&#34;Is it?&#34; Surely the question was meant to come out as a dismissal, but the pitch quirks upwards at the end, and Cole rubs at his nose.

&#34;Yeah. It is.&#34;

The wind blows.

&#34;Okay,&#34; he states simply.

Paige looks off at the trees again.

&#34;Cole, I don&#39;t think you should go back.&#34;

He shakes his head. &#34;How?&#34;

&#34;I... would you believe me if I said I had ways of keeping your location secret, that you could stay here with Eric and I? I mean, unless high school is really important to you.&#34;

He groans. &#34;No. It isn&#39;t. I... I was probably going to get held back, anyways. Drop out, and... join the military.&#34;

&#34;Don&#39;t... do that, either.&#34;

Cole shrugs. &#34;What other options do I have? Where else can I go?&#34; He looks at her. &#34;How can you really keep me here? I&#39;m a minor. You&#39;d be kidnapping me, I think. Unless you wanna, what, do a court case, get custody of me? A year before I could just leave the house anyways?&#34;

&#34;No. None of that.&#34;

&#34;What, then?&#34;

It&#39;s her turn to sigh. &#34;Cole... are you open to having your perspective changed?&#34;

&#34;What the fuck does that mean?&#34; He considers it, seriously, before following up with: &#34;My perspective changed on what?&#34;

&#34;I dunno. Everything, pretty much?&#34;

He sniffles, and rubs at his eyes. &#34;Fuck. Don&#39;t I have to be? I mean, what&#39;s my other option? Fucking kill myself?&#34;

Paige smiles, despite herself. //Is it strange to hear Kiave&#39;s voice in Cole?//

&#34;If I... if I didn&#39;t change a thing, about myself. I&#39;d fuck everything up, right? I mean. That&#39;s what I figure, I... I thought maybe I could stay the course, that -- well... I didn&#39;t think like //that,// at the time, I just... I couldn&#39;t stand it, y&#39;know? I couldn&#39;t keep hating Eric. And it&#39;s not because he doesn&#39;t deserve it or anything.&#34; He scowls a little bit, but the expression doesn&#39;t stick. &#34;It&#39;s just as simple as I said it. I couldn&#39;t. I couldn&#39;t do it. I... if I don&#39;t change, I don&#39;t get to have my brother back, do I? My...&#34; His voice seems to catch, and he clears his throat. &#34;I don&#39;t get to have the family, that I care about. So... I can&#39;t... care, that he&#39;s a -- that he&#39;s gay. I can&#39;t care because if I care I don&#39;t get to have him. And that sucks, okay? I know you don&#39;t agree. Of course you wouldn&#39;t. But that&#39;s the thing. You&#39;re... you&#39;re standing where I have to be, right?&#34;

Paige gives him a confused look as she tries to piece together what he&#39;s saying -- especially trying to piece together whether or not she should be offended, or worried. He takes the moment to continue.

&#34;I have to pick sides. I can either be right, and lose everything, or be wrong, and keep the only people I care about. That&#39;s... that&#39;s not a hard choice, really. So... I have to. Fuck. Even if it&#39;s just a strategy for survival, I have to be able to change. Right?&#34;

She gives a tight smile. She doesn&#39;t like how he&#39;s come to this position, but she has to be able to look past that. She can&#39;t hope for perfect, and she suspects that maybe Cole is simply being... honest. Could that be the word? That he&#39;s acknowledging his emotional reasoning first and foremost, rather than finding rationale after the fact and supplying that. He&#39;s made his conditions clear, he&#39;s made his influence obvious. Maybe that is a good thing. Paige decides to interpret it as such.

&#34;Right,&#34; she agrees, and he seems to brighten at that. &#34;I think... a lot of ideology, is about believing what helps you be happy. And survive. Maybe more than survive. Maybe live, if you know the difference.&#34;

He nods.

&#34;You have to be open to the idea that the world doesn&#39;t work how you think it works. That you&#39;re wrong.&#34;

&#34;Sure.&#34;

&#34;I think it&#39;s about... interpreting yourself,&#34; she echoes her mentor. &#34;Like, you can get all these feelings, and you have to name them so you know what to do with them, and there isn&#39;t a handbook. So you have to start making decisions about what you call everything, like... you&#39;re an art piece. You&#39;re a character, and you have to start deciding what your themes are, what&#39;s important to you. And once you start to get a grip on what you care about, then you have to make decisions about what you act on. Like, you&#39;re deciding that whatever you&#39;ve believed until now, it&#39;s not compatible with the actions you want to take. You have to decide whether to not take those actions -- whether to go home -- or whether to change, whether to believe something different. You&#39;re figuring out what your story is about. You&#39;re having to make a characterization decision. Am I... am I making sense?&#34;

Cole chuckles. &#34;Some.&#34;

&#34;Well... I... I&#39;ve been in a place, where I had to make a really big decision, too. And --&#34;

&#34;You&#39;re acting like you have to convince me. You don&#39;t. If you have a way to keep me here, I&#39;m game. Just tell me what I have to do.&#34;

She blinks a few times, thrown off-balance. &#34;Alright, well, one sec.&#34;

She scoots towards the window, and then carefully disappears inside. She reemerges in a moment with a deck of cards, but not playing cards like the ones Cole&#39;s used to.

&#34;This is a tarot deck. Y&#39;know, where my name comes from.&#34;

&#34;Yeah. I know.&#34;

&#34;I want to... do something with you. It&#39;s gonna seem really silly at first, but, I need you to go with it for a second, and it&#39;ll make sense at the end. Well, why it&#39;s important will make sense. But then everything&#39;s going to make absolutely no sense. And... then I, and hopefully some other guys I know, are gonna help you pick up the pieces, and make a new world. Change your perspective.&#34;

Cole throws up his eyebrows, and gives her a long look. &#34;You sound like you&#39;re going to //drug// me.&#34;

&#34;It might feel like drugs, but no, I&#39;m not. I... I just wanna show you some things, that have been really important to my personal development, to me figuring out my things. To me figuring out the world I live in, who I am, what I&#39;m doing in it. I... figure that if you&#39;re ready to change your perspective, then, now is the best time to show you. Are you?&#34;

He looks between her and the tarot deck, not making any effort to hide his skepticism. But after a long eye contact: &#34;Sure. Yeah. Whatever.&#34;

&#34;No. I need more than a &#39;sure,&#39; it&#39;s not gonna work with &#39;sure.&#39; I need &#39;yes.&#39; I need commitment. Can you commit, Cole? Can you say &#39;yes?&#39;&#34;

Her stare is more intense than Cole has ever seen it, and somehow her conviction seems like it&#39;s already working to thaw his doubts and rigidities. She&#39;s so convinced -- of //what,// Cole doesn&#39;t yet know -- that he feels more capable of being convinced just because of it.

&#34;Yes. I am,&#34; he says, and he means it.

&#34;Good.&#34; She begins shuffling the cards. &#34;Usually, for readings like these, I, the channeler, am supposed to deal the spread. But, if you&#39;re actually in, if you&#39;re open, you can do it. That&#39;s why it&#39;s so important that you&#39;re committed.&#34;

&#34;Okay.&#34;

She holds the deck out to him in one hand. &#34;When you&#39;re ready, but only when you&#39;re ready, flip the top card.&#34;

&#34;Just like... turn it over, put it back on top of the deck?&#34;

She nods.

Her intensity -- thus far alien from anything Cole had come to expect from Paige -- made him hesitate. //Am I ready? What am I leaving behind? My parents are pieces of shit. My school is worthless. I didn&#39;t make any friends. My prospects? I didn&#39;t have any of those. No, I suppose I have nothing to lose except my convictions, and what fucking use are those? They aren&#39;t serving me. They aren&#39;t helping me. Maybe everything I am is stupid and wrong, maybe everything I&#39;ve ever believed was contrived to make me miserable. Maybe none of this matters at all.//

He reaches for the card, and flips it.
