    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>**Statement from D-42810**

&gt; Your guy shoved me through the door. I don&#39;t remember what happened right after, but I must have blacked out. When I woke up, I was laying on hot sand. I could hear dogs barking nearby. I sat up, and I heard a crowd roar, like I was at a fucking football game. The sun was bright, and I squinted as I looked up at all these people sitting in the stands. I heard a jangling and realized I was chained to this pillar by my waist.
&gt; 
&gt; In front of me, there was this cage with the biggest fucking dog I&#39;ve ever seen. It looked like a pit bull crossed with a grizzly bear. When it saw me looking at it, it began growling and slathering. It threw itself at the front of the cage.
&gt; 
&gt; There was a string on the latch, and someone on the other side of the cage started pulling it. I grabbed the chain and yanked as hard as I could, trying to get it loose. Then I was somehow here again.
&gt; 
&gt; Okay, that&#39;s my statement. Now can I please talk to my lawyer? I have rights, you know.

[https://scp-wiki.wikidot.com/scp-9393/offset/#anchor10 Return.]</textarea></pre>
