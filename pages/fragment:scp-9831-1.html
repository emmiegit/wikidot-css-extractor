    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>Since the containment of SCP-9831, Dr. Barrett has been the main point of contact between the Foundation and the anomaly, as SCP-9831 has responded more positively towards her than other researchers. However, a string of unusual interactions between the two has been noted by staff. Dr. Barrett also has a closer and more personal bond with SCP-9831 than allowed by Ethics Committee standards. Notable interactions are listed below:

Note: //The following incidents were only properly investigated after Dr. Barrett&#39;s disappearance on 9/10/19. Security personnel have been reprimanded.//

&gt; ++++ Incident 9831-1 - Video Log: Site-55, Break Room 4, Cam 241, 8/12/19
&gt; -----
&gt; //Foreword:// On 8/12/19, Dr. Barrett, among others, conducted initial contact and containment of SCP-9831 at its location of discovery. Upon return, Dr. Barrett reported feeling distressed and requested to go to the site&#39;s break room. Out of caution, an agent was sent to accompany her.
&gt; 
&gt; **&lt;BEGIN LOG&gt;**
&gt; 
&gt; **&lt;18:12:40&gt;** //Dr. Barrett enters the break room with one of the responding agents. She appears highly distraught. The agent consoles her.//
&gt; 
&gt; **&lt;18:13:16&gt;** //Dr. Barrett and the agent sit on the couch. She is breathing heavily, and her leg is shaking. The agent seems uncertain about what to do.//
&gt; 
&gt; **&lt;18:14:45&gt;** //Dr. Barrett motions for the agent to leave. They hesitate, then do so 22 seconds later. Dr. Barrett continues to sit on the couch.//
&gt; 
&gt; **&lt;18:19:14&gt;** //Dr. Barrett jumps up and runs to the bathroom.//
&gt; 
&gt; **&lt;18:23:51&gt;** //Dr. Barrett returns, pressing a hand towel to her face. She looks around haphazardly, her eyes bleary. She takes a step towards the couch, but stops.//
&gt; 
&gt; **&lt;18:24:20&gt;** //Suddenly, Dr. Barrett drops the towel to the ground, moves over to the break room kitchen, and begins kicking the trash can. She kicks it over and over again, incessantly slamming it against the drawers. She bends down, picks it up, and throws it across the room. Loose trash flies everywhere. She stomps over and continues kicking the trash can against the wall. The trash can is falling apart. She screams. Dr. Barrett misses the can and kicks the drywall, wincing in pain, but continues to run after and kick the can. She continues in this fashion for some time.//
&gt; 
&gt; **&lt;18:26:45&gt;** //Dr. Barrett stumbles and falls to her hands and knees. She crawls to the trash can and puts her head over it as if she&#39;s going to vomit, but doesn&#39;t. She cries into the trash can.//
&gt; 
&gt; **&lt;18:31:04&gt;** //Dr. Barrett seems to come to her senses. She looks around; the break room is still deserted. She stands up and methodically returns the trash to the bin. Then, she collapses on the couch. After a moment, her eyes wander to a set of books on an end table. She picks one out and begins to read.//
&gt; 
&gt; **&lt;18:45:32&gt;** //The door opens, it is Dr. Thorpe. He briefly converses with Dr. Barrett. After a moment, she puts down the book and follows Dr. Thorpe out the door.//
&gt; 
&gt; **&lt;END LOG&gt;**

&gt; ++++ Incident 9831-2 - Video Log: Dr. Barrett&#39;s Private Quarters, Cam B63, 8/23/19
&gt; -----
&gt; 
&gt; //Foreword:// On 8/23/19, security cameras captured unusual behavior from Dr. Barrett in her quarters.
&gt; 
&gt; **&lt;BEGIN LOG&gt;**
&gt; 
&gt; **&lt;01:38:33&gt;** //Dr. Barrett is lying face-up on her bed. Her eyes are open.//
&gt; 
&gt; **&lt;01:39:51&gt;** //Dr. Barrett is seen rising from her bed and sitting at her desk. She puts her head in her hands for a moment before suddenly grabbing a notebook and pen.//
&gt; 
&gt; **&lt;01:40:26&gt;** //Dr. Barrett writes in the notebook. Her writing is fast and consistent, like she already knows what she wants to write.//
&gt; 
&gt; **&lt;01:42:15&gt;** //Dr. Barrett finishes writing. She leans back in her chair, briefly giving the camera an unobstructed view of the notebook. Dr. Barrett has written://
&gt; 
&gt; Camille
&gt; 
&gt; If you&#39;re reading this, it&#39;s because I&#39;m showing you a memory. This is the only way we can talk without them knowing.
&gt; 
&gt; I want to know if your ability works with computers as well. I think that would be the best way to do it.
&gt; 
&gt; If you can, act like you could always use computers and we just didn&#39;t know.
&gt; 
&gt; I want to set this in motion ASAP. They&#39;re talking about transferring me soon.
&gt; 
&gt; Barrett
&gt; 
&gt; **&lt;01:42:28&gt;** //Dr. Barrett stares at the notebook.//
&gt; 
&gt; **&lt;01:53:34&gt;** //Continuing to stare at the notebook, Dr. Barrett picks up her room key and drags it across her forearm. She visibly grimaces.//
&gt; 
&gt; **&lt;01:54:22&gt;** //Dr. Barrett shuts the notebook and goes to bed.//

&gt; ++++ Incident 9831-3 - Video Log: Site-55 Computer Anomaly Suite, Cam C104, 9/10/19
&gt; -----
&gt; 
&gt; //Foreword:// On 9/9/19, Dr. Barrett finished her playthrough of SCP-9831-A. She did not report anything anomalous about the game and finished up her work that day as usual. However, she returned to the computer lab late at night.
&gt; 
&gt; **&lt;BEGIN LOG&gt;**
&gt; 
&gt; **&lt;02:14:29&gt;** //Dr. Barrett enters the dark room. She looks around, but no other personnel are present. She quickly moves to the computer containing SCP-9831-A and turns it on.//
&gt; 
&gt; **&lt;02:15:48&gt;** //The computer boots. Dr. Barrett plugs a USB flash drive into the computer. A file explorer window pops up.//
&gt; 
&gt; **&lt;02:15:55&gt;** //Dr. Barrett drags a file from the computer&#39;s desktop to the file explorer window. Transfer time of sixteen seconds.//
&gt; 
&gt; **&lt;02:16:11&gt;** //Dr. Barrett quickly unplugs the flash drive, looks around once more, then turns off the computer. She pulls out a small laptop from her bag.//
&gt; 
&gt; **&lt;02:16:19&gt;** //Dr. Barrett opens her laptop. It is already on a web browser. She plugs the flash drive into her laptop, takes the file, and drags it onto the website.//
&gt; 
&gt; **&lt;02:17:02&gt;** //The file finishes uploading. Dr. Barrett clicks a red button at the bottom of the page.//
&gt; 
&gt; **&lt;02:17:21&gt;** //Dr. Barrett closes the website, shuts her laptop, takes it and the flash drive, and leaves the room.//
&gt; 
&gt; **&lt;END LOG&gt;**

&gt; ++++ Incident 9831-4 - Written Log: Dr. Barrett&#39;s Note, 9/10/19
&gt; -----
&gt; 
&gt; //Foreword:// On 9/10/19, Dr. Barrett failed to show up to her office. A sweep of her quarters uncovered a note written early that morning hidden in her bedsheets.
&gt; 
&gt; //There has to be more to it than that. All it did was recount her life. We already knew all of that.//
&gt; //What if they&#39;re wrong? What if there&#39;s more to the game? She kept looking up and seeing a window. [UNINTELLIGIBLE]. What if she&#39;s a reality bender?//
&gt; //I&#39;m just as screwed as she is now. I&#39;m going to find a safe spot, then give it one last try, start a New Game, from the beginning. As soon as I connect to the player, they&#39;ll know where I am. They&#39;ll know what I did. There&#39;s nothing to lose now...//

Dr. Barrett has not been heard from since 9/10/19.</textarea></pre>
