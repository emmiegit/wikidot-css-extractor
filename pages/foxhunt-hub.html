[[=]]
&gt; No matter the path I take, I am to be hunted down. That is the fate of a fox.
&gt; The only way to survive is to hunt them myself.
[[/=]]

Daji and her sisters were executed at the end of the Shāng-Zhōu contention, forcibly made scapegoats in hopes that no ill will would remain on both parties.

The gamble of Heaven has failed, and Daji now roams the modern era - hunting immortals and demons alike. If the gods were to make her a villain, then she was ready to play the part.

It is time to topple Heaven itself.
