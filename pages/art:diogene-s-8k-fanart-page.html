[[include :scp-wiki:theme:cosmonaut]]

Hello, this is Diogene_s speaking. As of the day of posting this page, I&#39;ve read 63 entries to the 8000 contest. Most of them are amazing, and I aim to draw fanart of as many of those as I can before burnout kills me. I hope you enjoy them and you check the entries themselves out.

@@ @@

[[tabview]]
[[tab The Seal of Approval]]
[[image Ilustracio%CC%81n%20plague%208kon%202.jpg]]

@@ @@
The well-deserved winner of 8kon, [[[SCP-8000 | The Seal of Approval]]] by [[*user PlaguePJP]] deeply explores the length of this one seal&#39;s tail. Oh, and Paul Lague is also there, I guess. 
[[/tab]]
[[tab Touching Eternity]]
[[image https://scp-wiki.wdfiles.com/local--files/art%3Adiogene-s-8k-fanart-page/Ilustracion%20ORI%208K.jpg]]

@@ @@
This is fanart for [[*user OriTiefling]]&#39;s entry: [[[oris-proposal |Touching Eternity]]]; an early favourite of mine in this contest. The scene I chose to draw is one of the earliest ones in the article to avoid spoiling any wayward readers that come across this page before reading the article itself. 
[[/tab]]
[[tab The House of all our gods]]
[[image https://scp-wiki.wdfiles.com/local--files/art%3Adiogene-s-8k-fanart-page/Ilustracion%20Djoric%208k.jpg]]

@@ @@
These are assorted doodles of various elements in [[[SCP-8225 |The House of All Our Gods]]]. There&#39;s a lot of things going on in this one, and a lot of cool imagery.
[[/tab]]
[[tab Wigglebert the Great]]
[[image https://scp-wiki.wdfiles.com/local--files/art%3Adiogene-s-8k-fanart-page/Ilustracion%20indy-para%208k.jpg]]

@@ @@
[[[SCP-8012 |The Hero&#39;s Journey (Ft. Wigglebert the Great)]]], by [[*user IndustryStandard]] and [[*user ParallelPotatoes]] is one of the cutest articles in the wiki. And Wigglebert is extremely charming. I hope the authors forgive me for the extremely low effort fanart of Wigglebert.
[[/tab]]

[[tab In the Court of the Dragon]]
[[image Ilustracio%CC%81n%20balth%208k-2.jpg]]

@@ @@
[[[SCP-8700 |In the Court of the Dragon]]], by [[*user Dr Balthazaar]], a lot of things happen. Including a tapidly mutating guy lifting a forklift over his head to use it as a weapon. And for some reason, I needed to draw that.
[[/tab]]

[[tab The Birch Knight]]
[[image ilustracion%20nico-peppers%208k.jpg]]

@@ @@
[[[SCP-8400 |The Birch Knight and the Game of the Three Chestnuts]]] is a wonderful story, and it&#39;s great. It has a muscled knight made out of birch wood. And Daleport! What else can you ask for? Go read it.
[[/tab]]

[[tab Hall of the Empresses]]
[[image Ilustracio%CC%81n%20lapis%208k.jpg]]

@@ @@
This is inspired by [[[scp-8600 |SCP-8600]]] by [[*user Miss Lapis]] which is an awesome exploration of a lot of themes. Just go read it. And remember that the empresses are great and Robert Bumaro sucks.
[[/tab]]

[[tab Feeding the Trolls]]
[[image Ilustracion%20Dune%208k.jpg]]

@@ @@
[[[scp-8999 |And they&#39;re never satisfied.]]].
[[/tab]]

[[tab The Wondrous Wedding of William Wallace Wettle (WIP)]]
[[image https://scp-wiki.wdfiles.com/local--files/art%3Adiogene-s-8k-fanart-page/ilustracion%20Lizwiz%208k.jpg]]

@@ @@
[[[SCP-8889 |The Wondrous Wedding of William Wallace Wettle]]] by [[*user LizardWizard]]. As such, it&#39;s still unfinished because I have to colour it. But I felt like including it to fill out a bit of the roster of entries I already fanarted.
[[/tab]]
[[tab Eight-Ball (WIP)]]
[[image Ilustracion%20Places4%208k%20Lineart.jpg]]

@@ @@
[[[SCP-8888 |Eight Ball]]] by Place&#39;s Four is a wild ride. And I just had to draw the heist team. Sadly, I still haven&#39;t been able to color them, but I will. Soon™. For now, here&#39;s the lineart of their portraits.
[[/tab]]
[[tab One to Rule them All]]
[[image https://scp-wiki.wdfiles.com/local--files/art%3Adiogene-s-8k-fanart-page/VNP-8000%20poster.jpg]]

@@ @@
Is it considered in bad faith to put a poster for an 8kcon entry you collabed in making in a fanart page? I wouldn&#39;t say so. So, here we have this poster I made as a means of promoting [[[SCP-8050 |One to Rule Them All]]], by the wonderful [[*user WarriorofChaos]], [[*user UNCGriffin]], [[*user Damian Thorne]] and (the least wonderful of them all, I guess) me, [[*user Diogene_s]]. 
[[/tab]]
[[/tabview]]

@@ @@


[[div class=&#34;cloudbox&#34;]]
Originally, my intent was to read every single submission to the SCP-8000 contest and make fanart of every single one of them. It was supposedly going to be a challenge between me and IndustryStandard and the format was going to be very different. The thing is, I&#39;m not sure I&#39;ll be able to do finish this challenge, or even finish doing fanart of all of the ones that deserve it, because this is a bad time of the year for uni students. Plus, I&#39;m liable to get burntout, and experts have told me that getting that is considered to be &#34;a bad move&#34;. 

But, at least, I&#39;m going to try. Thus, this page will be getting small updates from time to time with more fanart. Also, don&#39;t forget to check out [[[https://scp-wiki.wikidot.com/art:diogene-s-art-page |my actual art page]]]. Thank you!
[[/div]]
