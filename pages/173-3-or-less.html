    <pre><textarea class="page-source" readonly>[[&gt;]]
[[module Rate]]

**It:** SCP-173

**Can You Box It:** No

**How To Put It In Box:** SCP-173 is to be in a box, can not be let out. You can go in its box, but two or one can not go in. Two and one can go in. Two and two can go in, etc. Do not let it out the way in. The way in can not be the way out. Two men put two and two eye on it. Two men can see it. Do not let two men not put eye on it. Put eye on it and go out the way in, and you can put eye off it. Do not let it out. 

**It Is:** Now in The 19. Who did it? Not us. It is of ore and dye. SCP-173 is a bad boy. It can not go if you see it. See it and you do not die. You can not put the eye off it. You die if an eye is not on it. No eye on it, you die. Men die. All die. It can hit you and you die if you do not put the eye on it. If it hit you or men, men see Way 4 bad box guy way to put it in the box. 

Men say it do a din in the ear in the box, but no one is in the box but it. The din is not odd. The din can go on. Say to the big man if the din did not go on. 

The red goo in the box is poo and red in a man arm. Did it do it? It may. Men put poo and red out of the box in a few day. 

[[=]]
[[size smaller]] ##gray|Happy April Fool&#39;s Day## [[/size]]
