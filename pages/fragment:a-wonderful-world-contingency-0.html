    <pre><textarea class="page-source" readonly>+ **Part 9: The Redd Era (Wha-Wha-Wha-What!?)**

[[==]]
&#34;Alright, so now we&#39;re gonna dig into //the Redd era.// But, there isn&#39;t a single article written in the Redd era on the site, in fact this piece of lore is entirely invisible to the average readership. So, instead, we&#39;re going to talk about the events that //are// written, in the Judy era, that lead to the Redd era first.&#34;

##979ca8|&#34;We&#39;ve already namedropped the two major articles here. That would be [[[Curtain Call]]] and [[[Austin &#34;Aggy&#34; Genadew]]], but there&#39;s a third important article here, which would be [[[The Really Really Real Adventures in Capitalism]]], all of which are written by me, with Aggy being co-written with Dharma.&#34;##

&#34;Oh, and also [[[Do They Know It&#39;s Christmas Time At All?]]], written by Elenee and discussed earlier.&#34;

##979ca8|&#34;So to recap what&#39;s already been said, the Scarlet King, in the guise of a Mr. Redd, ends up in Cornelius&#39; canon-cannon that launches the whole story into the universe / dimension / timeline that //What a Wonderful World// takes place in. Thought dead, his fate is a bit more ambiguous than that... later, it&#39;s going to be revealed --&#34;##

##979ca8|&#34;This isn&#39;t even explicitly said anywhere in any written tales yet.&#34;##[[footnote]]Oh shit, it happened again, ye ol&#39; switcheroo and Stuff interrupting himself somehow. 😋[[/footnote]]

&#34;-- that the Scarlet King has been reincarnated as Dr. Isabel Helga Anastasia Parvati Wondertainment V, PhD, otherwise known as that protagonist from the Wondertainment TV show that was beamed into children&#39;s heads that were enslaved by the Factory.&#34;

##979ca8|&#34;Voiced by Isabel. Who is a bell.&#34;##

&#34;That&#39;s not very plot important but it is very funny and I forever love that joke. So anyways, speaking of plot-unimportant details, and this one hasn&#39;t even really been written about, Mr. Redd Jr. of the Little Misters is shown in [[[Cornelius the Collector]]] to be kind of //impulsively// created by Cornelius, like how he made Mr. Redd in the previous timeline. I imagine this was //supposed// to be (though he was unconscious of this fact) an attempt at creating a vessel for the Scarlet King who, like Cornelius&#39; consciousness, was spreading influence all across the timeline as their consciousnesses were beamed into this new world Cornelius had created.&#34;

##979ca8|&#34;It&#39;s all the very wibbly-wobbly and whatever-we-want-it-to-be kind of magic.&#34;##

&#34;But that vessel fails because the Scarlet King, though not dead, //has// been severely wounded, far too much to take hold of a physical being. So the Scarlet King -- who, by the way, during this whole time, has no real consciousness, is working on instinct and doesn&#39;t know who they are -- needs an easier target. Well, where else... but the dreamlands? But Oneiroi?&#34;

##979ca8|&#34;So, the joke here, of course, is that Isabel, in Djoric&#39;s writings, is the reincarnation of the Wondermaker, who fights the Scarlet King in a very typical mythical good-versus-evil sort of way. But this time, the Wondermaker and the Scarlet King are the same, and Isabel is a reincarnation of them both. Thematically -- well, referentially -- this means at some point we&#39;re going to address the internal turmoil of an Isabel that is fighting herself, essentially. But that hasn&#39;t made its way into the story yet. Let&#39;s get back down to earth and start dissecting the actual extant articles on the subject of Isabel.&#34;##

&#34;Sounds good! So Isabel is made, beamed into children&#39;s heads in a cartoon, and then left. Nobody knows she&#39;s alive -- the reason implied for her being a real, physical being is just that they beamed this TV show into their heads literally as dreams, and the dreamworld is shown to be somewhat physical and real in the SCP universe, as it exists as Oneiric space. So, we basically pull some big leaps of logic and say, maybe a character who is so beloved by so many people in Oneiric space can become a breathing, thinking dream-being. A tulpa, by one definition.&#34;

##979ca8|&#34;One would wonder why, if this is possible, there aren&#39;t //more// beings like Isabel Parvati running around.&#34;##

&#34;Well, at some point a character would probably point that out and plant a seed of doubt, which later would be answered by the reveal that it&#39;s because this process really //can&#39;t// make people like this --&#34;

##979ca8|&#34;Well, &#39;can&#39;t&#39; is a strong word considering that another fine point in this whole canon is that the magic of the SCP universe is mostly chaos and unknowable, though that //too// isn&#39;t written about, really. There&#39;s maybe a line in reference to that in [[[This Toy Facsimile of Life]]], spoken by Cornelius to Mr. Redd.&#34;##

&#34;-- but the collective imagining of a character //does// act as a suitable //vessel// for the Scarlet King to possess. Its reality is very, very weak, which gives the King&#39;s parasitic nature a way in. The prey is practically nonexistent. Finally, something that fits the bill.&#34;

##979ca8|&#34;We imagine the bill, in this case, requiring some kind of connection to Wondertainment or Cornelius or the like, as otherwise the King could have popped up anywhere. Something something, in his last life he was Mr. Redd, something something, Mr. Redd was made by Cornelius so the version of the Scarlet King that gets shot into this new timeline is inseparably tied to Wondertainment -- look, it&#39;s all bullshit and we //know// it&#39;s all bullshit, it&#39;s just contrivances and justifications to tell the story we want to tell. We know that, everyone knows that.&#34;##

&#34;I think contrivances like that are pretty accepted on the wiki, though.&#34;

##979ca8|&#34;Indeed.&#34;##

&#34;Okay moving right along. The Scarlet King, slash the Wondermaker, reincarnated as Isabel, sees the impact of her story in these children. In [[[The Really Really Real Adventures in Capitalism]]], we find Isabel has dropped in on Brainy --&#34;

##979ca8|&#34;Ayyy Brainy!&#34;##

&#34;-- as Dr. Neurosis, doing his usual shtick, in his dream office, waiting around for potential clients, y&#39;know. The stuff. That he does. He&#39;s of course scared of Wondertainment as... y&#39;know, his last thing he did before disappearing completely was something pretty heinous in their name, so when Isabel walks in with a Wondertainment insignia he rightly freaks out, but she calms him down and explains her story.&#34;

##979ca8|&#34;So after she was a mindless cartoon character, she sort of floats around the Factory children dreamspace as they continue to dream about her. But, they dream about her less and less, and the positive impact she seemed to have on their lives wanes in the face of, you know... horrible, torturous Factory conditions. She herself basically becomes disillusioned to the message of her show.&#34;##

&#34;Well, not quite. Not disillusioned to the message of the show... disillusioned that the actual show itself did any good. The //message// of her show, well, is to fight evil, is it not? It&#39;s only that a show... just a message... it does nothing... without //action!//&#34;

##979ca8|&#34;So she breaks out of the Factory children dreamworld into the greater world of Oneiroi West.&#34;##

&#34;Or... Oneiroi. I dunno what West really means. I&#39;ve never understood that part.&#34;

##979ca8|&#34;Funnily enough I think Isabel actually makes a joke just like that in her explanation to Brainy.&#34;##[[footnote]]She does.[[/footnote]]

&#34;Well. Uh, yeah.&#34;

##979ca8|&#34;Anyways, she breaks out, and scours for a way to go from being a tulpa to existing in the real world, and eventually she finds Dr. Neurosis, whose whole deal is making vessels for souls to jump into. Well, she&#39;s soul enough so she can, and Dr. Neurosis basically just puts her in the real world, as is his job. While she&#39;s being beamed out, she reveals that maybe she knows who Brainy is, maybe she actually doesn&#39;t like him very much at all (go figure), confesses to a desire for violence (against the Factory, so who am I to judge), and then after she&#39;s gone they discover they&#39;ve just been conned because she didn&#39;t pay and there&#39;s some namedrop of the Serpent&#39;s Hand.&#34;##

&#34;Well that&#39;s a lot. So what&#39;s going on here?&#34;

##979ca8|&#34;Well behind the scenes, what happened is that Aggy&#39;s crew, with Gina and... oh god what was his name. Chris. Those three are Serpent&#39;s Hand members, young politically charged people. The Serpent&#39;s Hand is a group of mostly magical individuals who are collected in opposition to the Foundation and other such oppressors of the anomalous community. Their goal is to protect their own and get information out there to destroy the Veil, in essence. These three characters are just sort of a friend group of Serpent&#39;s Hand members. They go out to try to find people to recruit -- because, I dunno, that&#39;s a thing they do? -- and Chris finds Isabel.&#34;##

&#34;This is shown in the tale [[[Austin &#34;Aggy&#34; Genadew]]], we&#39;re referring to a scene in there.&#34;

##979ca8|&#34;Chris, who&#39;s kind of insinuated to have an ability akin to mind reading or more generally, like, personality reading -- he grabs onto people&#39;s //vibes// and uses it to manipulate them. In any case, when they walk into Isabel, he likes what he sees. She&#39;s doing some very typical kooky crazy stuff. I tried to take Djoric&#39;s Isabel&#39;s flavor of whimsy and wacky and just make it a little creepy. She&#39;s over-the-top, theatric, childish, but this time, kind of out for blood. I mean, I guess Djoric&#39;s Isabel was too, against the King, but I think that was more depicted as, like, a duty, or just, //it must be done.// Righteous, y&#39;know? Here, we&#39;re making her impulse to hurt a bit more disturbing. Oh, and to make it a //want,// not just what must be done.&#34;##

&#34;So they, what&#39;s the word... I dunno, &#39;enroll&#39; and &#39;indoctrinate&#39; both feel wrong.[[footnote]]You seriously forgot the word &#34;recruit.&#34; 🙄[[/footnote]] They enter her into the Serpent&#39;s Hand, there, maybe that wording works. Their first order of business is to get her a body, so they find Dr. Neurosis, and now we&#39;re caught up.&#34;

##979ca8|&#34;Next in the chronology is [[[Curtain Call]]],[[footnote]]Which still has a bunch of errors in present- and past-tense confusion which I&#39;ve been meaning to fix for a long time and somehow have //still// not gotten around to. Hopefully acknowledging this publicly will motivate me, and if you go read Curtain Call and find that it&#39;s all grammatically sound, then know that this is what did it![[/footnote]] which has a lot of implications that aren&#39;t spelled out. Let&#39;s talk about those.&#34;##

&#34;So... Isabel&#39;s goal, right now, is to destroy the Factory. That&#39;s end-goal number one. As she learns more about the real world, she finds more things she wishes to destroy. Under the guidance of Chris and the Serpent&#39;s Hand, she learns to hate the Foundation, the GOC (although I don&#39;t even know if they&#39;ve appeared in this canon, and if they haven&#39;t, they&#39;re probably an unnecessary complication... if they haven&#39;t then let&#39;s say they don&#39;t exist, for simplicity&#39;s sake),[[footnote]]They&#39;re literally the ones that go fuck up Brainy&#39;s shit after attaching a tracker on him in Cairo, how did you forget that? 😜[[/footnote]] many world governments. Y&#39;know, the works. If you&#39;re beginning to catch on to some worrying political messaging in this story, don&#39;t worry. We&#39;re gonna address that after the summation.&#34;

##979ca8|&#34;But to get enough power to overthrow the Factory, she needs, like, a //lot// of people on board. She needs to drum up a movement. How do you drum up a movement? Well, she and her crew decide they ought to get an oppressor and kill him live to show people they&#39;re serious and that things can be done. Said oppressor, said evil shit, is Herman Fuller, the previous head of Herman Fuller&#39;s Circus of the Disquieting.&#34;##

&#34;I don&#39;t remember how much we&#39;ve said about those people,[[footnote]]Not a lot, honestly.[[/footnote]] but Brainy works for them for a time, and by the time he&#39;s there Herman is already out of the picture. Or, y&#39;know, not in charge at least. By this point in the story, however, he&#39;s worse than that -- he&#39;s been made into a wax puppet, forced to endure a fate-worse-than-death of his own creation (that&#39;s a long and mostly irrelevant story, none of the articles that describe this are tagged as being part of this canon so it&#39;s pretty much just a reference), which he at some point escapes. But, after he escapes, it&#39;s implied here -- or even just said out loud by Chris -- that he has done nothing of note since then. His connections eroded. His power has waned. He hasn&#39;t been capable of any real damage in a long time. But he //did// damage in his past, and now they&#39;re going to punish him for it, for their own means.&#34;

##979ca8|&#34;This article is basically torture porn against Herman with little details dripped across it. Lady Redd (Isabel&#39;s new moniker) slays him on stage after revealing all his evil deeds, to an enraptured audience. Some people in the comments have headcanoned that Herman gets away somehow, but no. I didn&#39;t write it like that. In //What a Wonderful World//, this is where Herman dies, for good.&#34;##

&#34;And that&#39;s all that is currently written about Redd&#39;s rise to power.&#34;

##979ca8|&#34;Woowee. Okay we&#39;ve been talking for a while, let&#39;s take a break, play some video games and eat something, why don&#39;t we?&#34;##

&#34;That sounds good. We&#39;ll reconvene in ten.&#34;

Jasper blinks, and then widens his eyes. &#34;Uh.&#34; He move his forelegs, slowly, bending them and straightening them, and then tilts his head to one side, pushing until he hears a satisfying //pop// that tells him his neck has cracked, but it comes with an unexpected jolt of pain that he flinches at. &#34;Ah, fuck.&#34; He repeats the process, tilting his head to the other side, but he&#39;s ready for the pain, so only winces. He then returns to an upright seated position, and rubs some of the dust off of his armchair.

&#34;Ugh, wow. That was a bit longer than ten, wasn&#39;t it?&#34;

...

&#34;God, I&#39;m thirsty. Stay hydrated everyone. Where&#39;d, uh, where&#39;d Stuff go?&#34;

No answer is forthcoming.

&#34;//Stuff?// Stuuuuuuff, yoohoo. Where are ya?&#34;

Stuff pokes his head in.

##979ca8|&#34;Oh shit, you&#39;re back.&#34;##

&#34;Yeah. Looks like the holidays really threw us out of our rhythm, and then even once the holidays were over the vibe just... didn&#39;t come back, y&#39;know?&#34;

##979ca8|&#34;Yeah.&#34;##

&#34;At least we were actually writing something in that time, so it&#39;s not like we just lapsed back into writer&#39;s block completely -- heyyyy, where were //you?// Did you get to be mobile the whole time? I was just stuck here to this chair!&#34;

##979ca8|&#34;I dunno. Once you stopped talking, I went to get a drink. Didn&#39;t feel like that long to me, but time is pretty relative, especially when you only exist on the page.&#34;##

&#34;I collected a layer of dust!&#34;

##979ca8|&#34;It&#39;s metaphorical. Anyways, I got you something.&#34;##

Stuff crosses the room and hands Jasper a soda.

&#34;Oh shit, thanks. I was actually just thinking I needed something to drink. Wait...&#34; Jasper looks at the drink in their hoof. &#34;These things can grab?&#34;

##979ca8|&#34;What were we talking about?&#34;##

Jasper stares at the drink with furrowed brow for a moment, then seems to come back to reality, regarding Stuff with a blank look.

&#34;Oh right. If I remember correctly, we were just about to talk about Lady Redd, Isabel, doing all her stuff we never wrote her doing. Basically we were about to do a quick and dirty rundown of the endgame of the canon, which is a pretty big undertaking.&#34;

##979ca8|&#34;Kind of reasonable we couldn&#39;t conscience doing that while also hunting for presents and everything.&#34;##

&#34;Yeah. Also Art Exchange... y&#39;know, stuff.&#34;

##979ca8|&#34;Everyone here should go look at [[[Art Exchange Hub|Art Exchange]]] stuff.&#34;##

&#34;Oh yes. Yes definitely. DarkStuff, please link that.[[footnote]]It was already linked earlier, but I will gladly do so again. Art Exchange deserves it. 🖌️[[/footnote]] We called the footnotes guy DarkStuff right? I&#39;m Jasper, you&#39;re Stuff, the guy is... did we just call him Dark?&#34;[[footnote]]Ye.[[/footnote]]

Stuff shrugs.

&#34;Helpful. Anyways, Lady Redd. Uh, so, she destroys the Factory successfully with her movement and everything that she drums up in the wake of killing of Herman Fuller and doing some more political maneuvering. There&#39;s, like, a verb, for going and getting support for a movement, maybe starting a revolution, but I can&#39;t remember it.[[footnote]]Rallying, recruiting?[[/footnote]] She and her crew gather support and numbers, do some political action to show they&#39;re part of things, start doing small scale stuff, and then grab a large part of the anomalous community to utterly destroy the Factory. And they succeed! As I said.&#34;

##979ca8|&#34;Which grabs the attention of the Foundation. Now, all of a sudden, Lady Redd, as the leader of the movement that is powerful enough to take down a whole inhuman horror-monster GoI, becomes a priority target -- and the Serpent&#39;s Hand at large as well, as this is all done under their banner.&#34;##

&#34;This would be an 001 Proposal, actually. I was planning on SCP-001 being, in-universe, the reserved spot for //whatever// the most important SCP directive is at that moment, so the Serpent&#39;s Hand takes the priority spot in the wake of the death of the Factory.&#34;

##979ca8|&#34;Then the rest of the canon&#39;s story would basically spiral into a war between the oppressors and the oppressed, and a lot of intrigue would come from who ends up on what side and why, and what the conflict really means, what it&#39;s about, et cetera.&#34;##

&#34;We have some very critical things to say about how this plot was conceived by our younger selves when we committed to putting everything in motion this way, but for now we&#39;re going to continue with recitation of the ideas uncritically. It&#39;s basically just gonna be a laundry list, and if some connection of plot points feels tenuous it&#39;s because we never really figured out how it all fit together or what went between Point A and Point B in that case. We just weren&#39;t there yet, we never outlined this part in full, so it&#39;s more like a collection of scenes.&#34;

##979ca8|&#34;And those scenes are! Isabel and her entourage take over Wondertainment as their base of operations, and Isabel executes Judy Papill. Her speech surrounding that execution is basically a discussion between herself and Judy along the lines of companies and profit incentives leading to dehumanization -- as in, once companies get big enough, they lose the human element completely, and are, by necessity of their structure, lost to the whims of profit incentives, which destroy their ability to be completely ethical. There would be discussions on Wondertainment&#39;s previous dealings with the Factory under the Cornelius era, and then also their compromises with the Foundation in the current era -- where they basically agree to operate by the oppressor&#39;s rules to survive in the market. I was really interested in this scene, I thought it would be really interesting.&#34;##

&#34;I was also thinking this would be a fun time -- this or another speech she does, because she will be doing a lot of speeches -- to have a sniper try to take her out, and have the bullet grind to a halt before it reaches her, and she can get a huge grin and go &#39;wonderful, I&#39;ve been //waiting// for someone to try that!&#39; and that would become an action scene between maybe the GOC and the Serpent&#39;s Hand in the streets of Wonder World!™️&#34;

##979ca8|&#34;And then we get to change up the aesthetic of Wonder World!™️ for the final time, now having it under a revolutionary banner, helmed by Lady Redd.&#34;##

&#34;This //really// establishes her as a threat, and so we get like, a summit (is that the word?)[[footnote]]It is![[/footnote]] helmed by the SCP Foundation, gathering different organizations to address the Serpent&#39;s Hand threat to the Veil (their ultimate goal is to destroy the Veil -- well, I guess their ultimate goal is to destroy the Foundation, but interim goal is the Veil). Actually, screw that last section being in parentheses like we&#39;re not gonna talk about it -- the Serpent&#39;s Hand //does// at some point destroy the Veil, that&#39;s one of their big plays, rocking the world of the public and yaddah yaddah. Dunno if this summit happens before or after.&#34;

##979ca8|&#34;Back on topic though...&#34;##

&#34;Right. So, it ends up that Holly Light, Faeowynn Wilson, MC&amp;D (so, Brainy) and such get wrapped up in this side of things, because they&#39;re all organizations that benefit from the status quo. (Fae and Holly can have some really tough conversations about this together -- there&#39;s a //lot// to dig into here, but also, I think I put them on this side of the conflict before my views on how this conflict is weirdly constructed came into being, and I&#39;m gonna have to assess their role in things, and how they feel about stuff, and... yeah.) They talk about some plans, don&#39;t know what those are. They contact Dr. Everwood because something something we wanna have them be back in the story and do some cool shit, Dr. Everwood discusses a //bunch// of wibbly-wobbly magic bullshit about concepts and how they can measure conceptual ties, they -- with the help of Holly telling everyone the real story about Cornelius -- figure out what //followed// Cornelius in with the canon-cannon. Identify Scarlet King, badabing badaboom, they discover Isabel as the reincarnation of the thing that ultimately destroyed the previous reality by inadvertently creating the Factory. (Did we talk about how the first thing they do in this reality is //destroy// the Factory? Because I find that fun.)&#34;

##979ca8|&#34;We want to juxtapose this very in-depth analysis of the magic system of the SCP-verse with a line later, by Isabel, about how it&#39;s all chaos and nonsense -- and having her immediately demonstrate this with some show of power. Because I really //do// want the magic to remain unexplainable -- it is //openly// contrivance and nonsense, and probably if we were to think about this story thematically a lot harder, we could say something about how the oppressed fringe-groups get to have the magic, and that //normalcy// is built off of oppressing the people who have the ability to do things we don&#39;t understand under our limited cultural framework. Y&#39;know, stuff like that. It could be interesting -- and empowering.&#34;##[[footnote]]I have also been informed that this is not a very unique plot idea, but ah well. I dig it. (There&#39;s no shovel emoji? Lame.)[[/footnote]]

&#34;I don&#39;t think I&#39;d ever thought of it that deeply until you put it that way just now, but yeah. I see it.&#34; Jasper sips his soda you and I both forgot he had. &#34;Ahh. That&#39;s nice. Thanks again.&#34;

##979ca8|&#34;No prob. Uhh, what else what else... extremely minor details include wanting one person of the Aggie / Gina / Chris group to defect for plot intrigue purposes, probably Gina because Aggie and Chris both feel like they&#39;re too dedicated while Gina seems volatile. If I was okay with how zany this is, Brainy could become an unstoppable combative force as he continuously spawns from his Headspace with more and more monstrous bodies, seemingly unable to be killed. The Circus joins Isabel&#39;s side at some point. We want to portray Icky and Lolly&#39;s relationship as incredibly uncomfortably publicly kinky because some people have been uncomfortable with Lolly&#39;s depictions in Dread &amp; Circuses and I feel like the two options are either to shy away from that discomfort, or lean into it //heavily,// because I think the source of the discomfort was mostly from not committing and existing in this weird middle ground where people were unsure what the author intended and if they were reading something fetishy. Uhh... I think those were the only two minor scenes we&#39;d thought of.&#34;##

&#34;And then now we&#39;re at the conclusion. Though the Veil //is// ultimately broken, the head of the revolution, Isabel, is assassinated successfully by the Foundation (or someone on their side). The canon &#39;concludes&#39; with a tour through //many// of the characters seen before now, becoming completely introspective. All different perspectives on the events. How people are reeling, coping, and what their lives look like going forward.&#34;

##979ca8|&#34;Might be cool to sprinkle in a character you haven&#39;t seen here before -- if we really want to highlight perspectives, we could put in a completely new one. I like that idea.&#34;##

&#34;And, if this were written like a book, the //very// last thing you&#39;d read would be a conversation between Chester Williams and Maria Herring, talking about their small business and some anxieties about their lives going forward. I imagine Maria would be worried, and Chester would smile and speak comfort. The story -- the canon -- would end on optimistic lines about the beauty of the world. If we wanted to be cheesy, I bet we could even get away with saying &#39;what a wonderful world&#39; as the final line, and have the emotional impact still land.&#34;

##979ca8|&#34;Even just thinking of the scene kind of makes me wistful and melancholic, in a... positive way.&#34;##

&#34;Yeah... yeah.&#34;

...

##979ca8|&#34;Okay so there&#39;s a problem with this story.&#34;##

Jasper finishes a sip, putting the can down to say: &#34;There is.&#34;

##979ca8|&#34;It&#39;s the messaging.&#34;##

&#34;It is.&#34;

##979ca8|&#34;Let&#39;s talk about that.&#34;##

&#34;I&#39;d love to. But first, I have to ask —&#34;

+ **Part 10: Who is the Scarlet King in This Story?**

&#34;That seems like a useful thing to discuss, because its thematic implications are //really// important.&#34;

##979ca8|&#34;It is. So, in its original conception -- and I&#39;m inclined to keep this idea and alter //other// things to accommodate it //if only// because I find this to be a //fascinating// idea to write a personification of -- the Scarlet King -- also known as the Wondermaker -- is a God of Progress.[[footnote]]//Oh, God of Progress / Have you degraded or forgot us? / Where have your laws gone? / I think about it now// 🎵[[/footnote]] In Cornelius&#39; original timeline, the Factory&#39;s takeover of the entire world is in part because that is a timeline in which &#39;progress&#39; meant the destruction of the planet, scoured for its resources. The Factory was the natural conclusion to this endless march towards &#39;progress,&#39; which had been manipulated into existence by the Scarlet King, the Wondermaker.&#34;##

&#34;Of course, I dislike insinuating that humans aren&#39;t responsible for the things they do and that other factors make us do evil, so I would like to say that the //intended// reading of this is that the Wondermaker more-or-less //represents// humanity&#39;s desire for &#39;progress,&#39; and is not a completely separate entity. However, any interpretations of //What a Wonderful World//&#39;s Scarlet King / Wondermaker will fail to match perfectly, because diegetically this god is &#39;killed&#39; by Cornelius --&#34;

##979ca8|&#34;We&#39;re putting a lot of things in quotes, I see.&#34;##

&#34;Yeah yeah we&#39;ll address that, shush you. But, as I said, it is &#39;killed&#39; by Cornelius, but that didn&#39;t get rid of humanity&#39;s industrialization and scientific endeavors in the new timeline.&#34;

##979ca8|&#34;Okay let&#39;s rewind slightly first though.&#34;##

&#34;Sure, what&#39;s up.&#34;

##979ca8|&#34;Let&#39;s just talk a bit more about the King himself. What he&#39;s like, what does &#39;progress&#39; mean, why we keep putting it in quotes.&#34;##

&#34;Alright, yeah yeah. We don&#39;t want to get too deep into the new timeline before discussing that. Okay, so. Let&#39;s say that the Wondermaker has been around since the start of humanity. I do like the imagery of it showing humans fire, even though I don&#39;t think it literally did that (y&#39;know, once again, I think it&#39;s much cooler when humans get to claim credit for doing the things they did). It gets the idea across though: a kind of mentor that nudges humans along. A muse, actually, that inspires scientists and artists alike. Its personification is this. The Wondermaker is //deeply// invested in the success of humanity as a whole. However, it doesn&#39;t give a single shit about //you.//&#34;

##979ca8|&#34;It has no regard for individuals. If people must die for progress to be made, so be it. The only health it is interested in is the health of the hive. It sees how conflict inspires innovation, and will thus inspire conflict. It is very Darwinist. It thinks that by pitting things against each other, only the fittest will survive, and this will lead us towards yet more //progress.//&#34;##

&#34;But progress -- even in the story (though this was never written, when it //was// this was going to be the plan) -- is left intentionally vague. Progress what? Progress how? Running ourselves into the ground isn&#39;t progress. Progress towards what? Is there an end goal?&#34;

##979ca8|&#34;No.&#34;##

&#34;No, there isn&#39;t. The goal //is// progression itself. The Wondermaker will remain ever unsatisfied, will forever push. It experiences no comfort. It has no patience, and it has no foresight. It wants only one thing: to //build.// It wants humans to make ever bigger, more elaborate things. To go more places. To have more epiphanies, to know more things. It wants //more.// More and more and more and more and more!&#34;

##979ca8|&#34;But of course, infinite growth is not possible. This is how we see Cornelius&#39; timeline fall. We watch the Factory exemplify this concept, that when growth is the only goal humans are lost along the way, and we will reach a point when we completely burn ourselves out and die. Yes, the Factory is shown to be &#39;inhuman,&#39; but it is, like the King, a representation of human activity, of human greed and industry. It is not //alien,// like some write it. In //What a Wonderful World//, the Factory is //us.// It is our worst nature as an unstoppable force.&#34;##

&#34;But it does get stopped!&#34;

##979ca8|&#34;It //does.// Okay, so, Cornelius figures all this out -- what the Scarlet King is, how it made Cornelius make it a vessel (it likes walking among its subjects) -- and realizes he himself is an extension of this infinite growth, right? That Wondertainment, despite its candy-colored branding, is just another company that eats and eats. So that&#39;s where his idea for the new world comes from. A world without the Scarlet King, a world with less //ambition.// He&#39;s still warped, he doesn&#39;t make the perfect world, he only makes his own fantasy, with all its flaws inherent. He still believes, for example, that a company like Wondertainment //can// exist, free from corruption.&#34;##

&#34;Poor sod.&#34;

##979ca8|&#34;Indeed.&#34;##

&#34;The Scarlet King surviving the cannon can be seen as a nod to the fact that the King is a representation of human ambition, which has certainly //not// gone away.&#34;

##979ca8|&#34;But now, maybe, you&#39;re connecting the dots, and going &#39;hey... wait... wait a minute.&#39;&#34;##

&#34;Yes, we made like, the same primordial evil that makes the world into a barren acidic wasteland from razing of resources and natural landscapes into the leader of the revolution against the oppressive reign of the Foundation.&#34;

##979ca8|&#34;Hmm...&#34;##

&#34;Yeah, hmm indeed. And look, there are ways I can sell this idea -- there are ways I can spin this idea that I still would find interesting and rewarding to write. But in all honesty, at the time that I //conceived// this idea, I self-identified as a centrist, and it was almost as two-dimensional as you&#39;re imagining.&#34;

##979ca8|&#34;Mmm...&#34;##

&#34;So I&#39;ve written myself into a bit of a corner, where all the groundwork is there to capitalize on this reveal, but now I&#39;m not sure I want to go through with it, because to make the leader of the revolution be... //this//, is to condemn the revolutionaries that follow her.&#34;

##979ca8|&#34;Well, it //can// not be. Let&#39;s talk briefly about Isabel again. Who she is, what her motivations are -- and how she functions as a reincarnation of the Wondermaker.&#34;##

&#34;Ah ah ah, to answer //that,// we need to talk about the Foundation actually! So, the Foundation is the current biggest barrier to that ever-nebulous //progress// we were just talking about. Think about it. Anything &#39;too advanced&#39; for society to handle at that moment -- anything significantly outside of &#39;normalcy&#39; -- gets shelved, gets //contained.// Cornelius&#39; timeline didn&#39;t have this. Magic existed very out-in-the-open, there was no such Foundation. The Foundation puts a damper on our science surrounding AI, all of the possible energy sources we could have with anomalies, it disrupts //cultural exchange// by condemning and hushing entire religions, what it does to the information highway is devastating. This is the price of Cornelius&#39; wish, to make a world with less ambition, that is happy with the //now.// (Despite the fact this is patently impossible, and ambition is a generally good thing.)&#34;

##979ca8|&#34;So, to further the progress of the human race, the Wondermaker must take out its biggest detractors. Firstly, it seems the Wondermaker //has// learned a little bit, even if it&#39;s an amnesiac, because it starts by destroying the Factory. (Feel free to read into this how you want -- we&#39;ll return to it, but using a different lens, I didn&#39;t really develop what it //meant// for Isabel to crush the Factory first thing, thematically.) Then it takes a look at the big picture, and &#39;decides&#39; that the biggest barrier to the progress of the human race is the Foundation and its allies. The Veil. It needs these gone to get its machine running again.&#34;##

##979ca8|&#34;It is. But there is too much investment, on the part of power-holders, to uphold the system as it is, and frustrate attempts at education and understanding. People have a vested interest in us fighting each other -- and that isn&#39;t to say that our fights are fake. But... let me rewind slightly. So I am -- we are -- a cishet[[footnote]]🤔[[/footnote]] white male, and we grew up that way. I didn&#39;t see the point in fighting. On the one hand, I do still believe that hatred and violence are, in part, self-defeating. But I also have never //had// to fight. My perspective is limited, and I am not of the crowd that needs to literally overpower someone to escape oppression. There is fighting in the world of ideas -- that shit is fucking //important.// It might, in my ideology, still be the most important thing. But we are all representations of ideas. We are more than our ideas, but we still enact the ideas themselves. This is a complex system --&#34;##

##979ca8|&#34;-- sure, yea. But, you know. Look. When people are //getting killed// for... oh, //anything// about themselves, like, you have a right to bear arms.[[footnote]]🍔[[/footnote]] You have a //need// to throw hands. If your ability to fight someone is what is keeping you alive, you&#39;d better do it. If you have to punch someone to keep someone //else// alive, //you&#39;d better do it.// More than that, even, I think violence is in the human genome. I&#39;d rather it stay in boxing rings, and on football fields, in martial arts competitions and rock and roll stages --&#34;##

+ **Part 13: The Writer&#39;s Guide to What a Wonderful World**

Jasper slaps his hooves together. &#34;Okay! You want to write for //What a Wonderful World?// What are you waiting for! Here&#39;s what you have to know!&#34;

##979ca8|&#34;First, in case you are genuinely tackling this as a writer&#39;s guide, let&#39;s summarize all the most important plot beats of the canon.&#34;##

&#34;Ho boy.&#34;

##979ca8|&#34;Lightning fast, brutally short, come on.&#34;##

&#34;Sure sure. Okay, so in 1909, Chester Williams, a black man in Boston, founds Dr. Wondertainment&#39;s World of Whimsy, in Boston. He isn&#39;t inherently magical himself, but being oppressed as a black business owner, he comes in contact with another secretive, oppressed group -- magical people! Maria Herring joins him and becomes the first magical toymaker of Wondertainment&#39;s lineage. They slowly build a refuge in the back of their shop, expanding it until it becomes the start of Wonder World!™️, where the Wondrous people take refuge from the &#39;Real World,&#39; and where the company Wondertainment operates from. That&#39;s the Chester Era.&#34;

##979ca8|&#34;Maria dies, and then Chester dies, and he names his heir as Cornelius Młynarczyk, who continues the economic expansion of Dr. Wondertainment as a company -- at all costs, even dealing with the Factory at times. In his time, he creates the Little Misters as an artificial-life children&#39;s band. This brief era, starting in 1976 and lasting until 1998, is the Cornelius Era of Wondertainment, kind of regarded as the &#39;Dark Era,&#39; in which it&#39;s all a bit scary.&#34;##

&#34;Cornelius dies, and Holly takes over. She receives a letter from Cornelius on her day of inauguration as the new Dr. Wondertainment which she keeps secret. She largely works on reversing Cornelius&#39; damage to the company, and reverting it back to its wholesome, people-oriented goal. This, the Holly Era, lasts until 2040, due to Holly Light&#39;s slowly deteriorating faith in herself and the company.&#34;

##979ca8|&#34;Judy Papill, Holly&#39;s partner, still has &#39;the spark,&#39; and takes over as Dr. Wondertainment. She makes a compromise with the very people oppressing Dr. Wondertainment&#39;s goal and functions, the Foundation. She swears to have all the company&#39;s operations above board, and severely cut down on their making of magical products, in an effort to reach more children and enrich more lives. The Foundation accepts, and they grow a working relationship.&#34;##

&#34;There isn&#39;t a clear year-mark on this part yet, so do forgive, but nearing the end of the Judy era, a mysterious Lady Redd of the Serpent&#39;s Hand begins making large political moves and taking radical action against the Foundation and the Veil at large, and eventually her contingent of the Hand make it to Wondertainment and target them as they are in cahoots with the Foundation, their main enemy. Judy is executed and Redd names herself as the newest Dr. Wondertainment, and they operate out of Wonder World!™️, ushering in the Isabel era.&#34;

##979ca8|&#34;As the conflict between the Foundation and the Hand erupts, the Veil is ultimately destroyed, but eventually Lady Redd is assassinated. I might call this &#39;era&#39; something like &#39;The Years Beyond.&#39; Not much story is meant to be told in the post-Isabel setting, but of course it&#39;s open for anyone to explore, that is merely the end of my interest in making concrete statements about plot developments.&#34;##

&#34;Okay, does that do it?&#34;

##979ca8|&#34;That leaves a //lot// out.&#34;##

&#34;It sure does, but hey, that&#39;s a workable outline of the setting, you can look at that and get an idea of how to write while respecting those plot beats. You&#39;ll mostly be right, as long as you also read some articles to get a sense of the aesthetic and tone.&#34;

##979ca8|&#34;Yeah, I believe that.&#34;##

&#34;Cool! Then, moving on, and perhaps more importantly... what //is// the tone? What should people be //thinking// about when wanting to write for //What a Wonderful World?//&#34;

##979ca8|&#34;You should --&#34;##

&#34;Ah ah ah, let me speak! //You// asked //me// to make it explicit, so //I&#39;ll// be making it explicit.&#34;

##979ca8|&#34;Okayyy, okay, go right ahead.&#34;##

&#34;So. //What a Wonderful World&#39;s// main theme is given away by its title: the canon is about finding beauty in life and the world. Specifically, finding beauty while still acknowledging the bad. Finding beauty in the ugly, even. Discovering that life is worth living, not even in //spite// of the pain, not really //because// of it, but... what word should go here, then... that life is worth living, and pain is part of life, and these two facts do not conflict. That joy is possible, that beauty can be found anywhere.&#34;

##979ca8|&#34;I don&#39;t think we&#39;ve really highlighted that before, have we?&#34;##

&#34;No, not really. This whole article was more about the political message of the canon, but its real central //tone// is the bittersweetness of life.[[footnote]]We have been talking about how we want to represent real human beings, horrid flaws included, hoping to inspire compassion and empathy for //everyone,// and I think that part of that is acknowledging the beauty within the human spirit, the same human spirit that can create the most detestable of all possible people. 🪷[[/footnote]] Perhaps the best band to get in the headspace for this canon would be //the Flaming Lips,// with their extraordinarily popular song //Do You Realize,// but also like... I dunno, most things by them? They hit the right silliness sometimes, too, and they come with a psychedelia that jives very well with the eye-searing colors of Wondertainment&#39;s aesthetic. Go listen to them. Great band.&#34;

##979ca8|&#34;A little sidetracked, there, friend.&#34;##

&#34;True. In any case, while there is room for depressive, venting articles in //Wonderful World//, the central message is perseverance and love of life. It can be about the struggle to attain these things -- it //can// be about anything you want, really -- it can be about redefining your senses of beauty and love, but its about the search for and the discovery of happiness.&#34;

##979ca8|&#34;Couldn&#39;t it be argued, that&#39;s what much of the human experience is?&#34;##

&#34;It can be. And I suppose this canon is making the argument that it is.&#34;

Stuff nods.

&#34;And seeing as we just mentioned the human experience, let&#39;s make this the segue into what we were talking about in the last section. The biggest word for this canon should be //human.// I don&#39;t much care to see perfect good guys nor cackling evil bad guys. Even if we were to believe that such people can exist in real life -- and, I concede, I think of the 8 billion people on earth, there may be a few that truly exist in such stark contrast to my own ideals that I may lose the ability to sympathize -- this story isn&#39;t about that. It is about representations of the imperfect human experience. It is about people doing their best. It is about humans using the tools they are given to work towards the best outcomes they know to achieve. It is about positive change, it is about discomfort. What I want from you, prospective writer of a //What a Wonderful World// article, is //honesty.// I don&#39;t want idealized humans chiseled from marble, I don&#39;t want magical characters that are just you if you could do the things you want to do. I want people I can meet on the street. I want every character to be written with a desire to understand them, to empathize with them, to embody them, or have them embody some part of //you.//&#34;

##979ca8|&#34;We want difficult art.&#34;##

&#34;We want difficult art!! Knowing full well the risks we are taking by saying this, we want art that makes you uncomfortable to write, and makes the audience uncomfortable to read, and we want everyone involved to be looking for the beauty, not in looking upon what we hope to exist and what we hope to be, but what we //are,// because while each of us holds something we dislike about ourselves, we do better to acknowledge and embrace our faults than by pretending they don&#39;t exist to make ourselves more presentable, more acceptable. I find that, by hiding flaws, you merely lose the ability to see when they influence you. It&#39;s hard to notice your prejudices if you&#39;re so certain you have none.&#34;

##979ca8|&#34;Yeah. I hope people get your vibe, because &#39;uncomfortable&#39; can mean a lot of things.&#34;##

&#34;That&#39;s very true. Like, the intent is to write things that make people uncomfortable because they are honest, not because making people uncomfortable is the goal and you succeeded through slight of hand and writing techniques. Y&#39;know, not shock horror, not senseless but impeccably described violence. I dunno. Listen to //the Flaming Lips,// read //Take it Away, My Darling!// You&#39;ll get it.&#34;[[footnote]]In a conversation recently, a friend and I differentiated &#34;discomfort&#34; from &#34;distress&#34; -- the aim is the former, not the latter.[[/footnote]]

##979ca8|&#34;I think they will.&#34;##

The two sit in silence for a moment, then briefly making eye contact.

&#34;So is that it?&#34;

##979ca8|&#34;I mean. Do you have anything more to say?&#34;##

&#34;Not off the top of my head, I don&#39;t think. Kind of unsure what the response to this article will be. It&#39;s not very traditional and I think it might rub some people the wrong way.&#34;

##979ca8|&#34;Well, then, prepare for that. But I&#39;m optimistic.&#34;##

&#34;Glad someone is.&#34;

##979ca8|&#34;And maybe this&#39;ll breathe some life into the canon. Some new authors, even.&#34;##

&#34;I do wonder. We didn&#39;t make this a very approachable piece, so, it&#39;s not //that// inviting.&#34;

##979ca8|&#34;No, but the hope is that that means the people who do get this far are more likely to be the ones inspired by it, no?&#34;##

Jasper nods slowly. &#34;That&#39;s the hope. For sure.&#34;

##979ca8|&#34;Okay then. Well, then I think we&#39;re signing off.&#34;##

&#34;Yup. That only took... oh dear. A full year? Yeesh. Well, bye!&#34;

##979ca8|&#34;Bye! Love you all.&#34;##

&#34;Long live this stupid website, eh?&#34;

##979ca8|&#34;For sure.&#34;##

&#34;For sure.&#34;[[footnote]]💚[[/footnote]]

//P.S.// @@    @@ Hi! It&#39;s me, Dark again, just giving a closing statement, kind of related to the questions about whether any of the messaging I&#39;m sending I&#39;m confident in. It goes without saying, but I&#39;m saying it anyways, that part of the point is that it&#39;s hard to make assertions when I still feel like I&#39;m learning and my views will change. I think it&#39;s useful to try things on and see how they feel, but the thing is, I&#39;m by my very nature very wary of anyone who&#39;s //certain// about anything, and that makes it a lot harder to feel confident in myself, because I don&#39;t want to risk being //certain.// It&#39;s that attitude coming into contact with my want to send nonharmful messages that&#39;s really chafing. I don&#39;t think that&#39;ll ever stop, lest I become set in my ways, which I at least don&#39;t foresee happening for a long time.

So, just like how Vend-a-Friend has some messaging about mental health I don&#39;t much care for, I know for a fact things I write now I will find distasteful in some way or another in the coming years. But if I let that stop me, I&#39;ll never write again! How shitty would that be?

So really this is all an anxious meditation on self-change, and I figure that if you ask me in a year&#39;s time, my ideas on how this should all play out -- the conclusions Zhaleh comes to, what Isabel represents -- will be different again. And that&#39;s why it shouldn&#39;t all be up to me.

Am I just reiterating stuff I already said? I dunno. But I felt like this was a useful addendum.

Write cool shit. Don&#39;t be afraid to be yourself. Heheh, or, be just the right amount of afraid to be yourself, but be honest anyways. //Learn.// Never stop learning. And practice what you learn by writing, maybe. Art internalizes. Art externalizes. Art is really fucking cool.

Alright.

Peace,
