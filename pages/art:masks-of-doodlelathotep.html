&gt; There is a horror I barely dare to speak of as my mind convinces me I am the only one who can see it. It has died a long time ago, yet thrives day after day by sucking time and blood, vampire-like, and lives more the more time and blood it sucks, outliving those who feed it to begin with.

-----

[[image Nyar.jpg]]

------

Team Masks of Nyarlathotep&#39;s entries for [[[pdcontest2025|Public domain con]]] are some of favourite and today I had some free time and decided to draw a piece based off their work. So here&#39;s more of an abstract piece then I normally do.

This piece is based off: [[[masks-of-nyarlathotep-hub|Masks of Nyarlathotep]]] by ([[*user ubergoober]], [[*user radian628]] and [[*user local lesbian commie]])</textarea></pre>
