[[/=]]

+++ Exploration Log: SCP-001 Interior

++++ **Team:** ST-48 &#34;Shit Miser&#34;

++++ **Assignment:** Terminate or disable SCP-001 from within

++++ **Squad leader:** Cpt. Thaddeus O&#39;Dell, Mobile Task Force Zeta-9 &#34;Mole Rats&#34;

------

+++++ &lt;Begin Log&gt;

**&lt;00:00:00&gt;:** O&#39;Dell&#39;s body cam switches on, revealing a dark, spacious area resembling a temple. Mosaic murals can be barely seen on the walls and floors through the rays of light from outside. There&#39;s a deafening sound from outside like rushing wind, rendering speech during the first five minutes and 27 seconds of audio unintelligible.

**&lt;00:00:26&gt;:** Six other members of ST-48 are alive and accounted for.

**&lt;00:00:39&gt;:** O&#39;Dell orders 48-1 and 48-2 to check their dropship for survivors.

**&lt;00:00:42&gt;:** O&#39;Dell turns to face the dropship. The craft is hanging halfway out of what used to be a blastproof window decorated with turtle motifs.

**&lt;00:00:52&gt;:** The dropship falls outward from the window.

**&lt;00:00:57&gt;:** O&#39;Dell rescinds the order. Remaining personnel: 48-L and 48-1 through -6.

**&lt;00:01:14&gt;:** O&#39;Dell switches his rifle&#39;s light on. The others follow suit.

**&lt;00:01:49&gt;:** O&#39;Dell and the rest of the team make their way to a pair of blast doors, which open automatically.

**&lt;00:02:10&gt;:** The team steps through a series of tubelike corridors. Aside from the inital chamber where they landed, there are no flat surfaces.

**&lt;00:05:28&gt;:** The loud noise from outside begins to decrease in pitch and volume.

**&lt;00:05:41&gt;:** (Crew audio comes in clearly for the first time.)

&gt; +++ &lt;Audio Log&gt;
&gt; 
&gt; **O&#39;Dell:** ...haven&#39;t found any hostiles or traps yet, but just getting around is difficult. Feels like I&#39;m trying to jog across the halfpipes at a skate park. Most of the doors here are on the ceilings. This whole place was designed with zero-grav in mind. And as much as I&#39;d like to go back to base and grab some magnetic shoes so we can stop slipping all the goddamn time -
&gt; 
&gt; **48-3:** Wait. 
&gt; 
&gt; **O&#39;Dell:** Can it, I&#39;m trying to log here.
&gt; 
&gt; **48-3:** But I can hear you now!
&gt; 
&gt; **O&#39;Dell:** Then prove it by listening to... hold up, yeah, I wasn&#39;t able to hear you before. What the hell?
&gt; 
&gt; **48-4:** Maybe it&#39;s powering down.
&gt; 
&gt; **48-3:** Huh?
&gt; 
&gt; **48-4:** The ship, I mean. Doesn&#39;t that sound like heavy machinery slowing down?
&gt; 
&gt; **O&#39;Dell:** That&#39;s ridiculous. Tarrare hasn&#39;t slowed down once since it got here.
&gt; 
&gt; **48-5:** And we&#39;re the first ones who boarded the ship.
&gt; 
&gt; **O&#39;Dell:** Don&#39;t be stu -- ...hmm.
&gt; 
&gt; **48-6:** I have a theory.
&gt; 
&gt; **O&#39;Dell:** The floor is yours.
&gt; 
&gt; **48-6:** Whoever&#39;s piloting this ship knows they can&#39;t continue the mission until they&#39;re sure they know whatever boarded them has been neutralized.
&gt; 
&gt; **48-1:** I&#39;ll second that.
&gt; 
&gt; **O&#39;Dell:** I mean, we didn&#39;t exactly sneak in. Weapons up, but keep going.
&gt; 
&gt; **48-5:** {{I want to go through the Party Door.}}
&gt; 
&gt; **48-1:** What?
&gt; 
&gt; **O&#39;Dell:** What?
&gt; 
&gt; **48-5:** What?
&gt; 
&gt; **O&#39;Dell:** What do you mean?
&gt; 
&gt; **48-5:** By what?
&gt; 
&gt; **O&#39;Dell:** You just said you want to go through the -
&gt; 
&gt; **48-5:** I didn&#39;t say anything!

------

[[=]]
+++++ [TRUNCATED FOR BREVITY]
[[/=]]

------

**&lt;00:15:57&gt;:** O&#39;Dell&#39;s team enters an elaborate series of tubes throughout the ship. Other than their lamps, only light sources come from a series of rapidly changing and undulating glyphs on the wall, the majority of which are orange. 

**&lt;00:21:12&gt;:** 48-5 once again says that she wants to {{&#34;go through the Party Door.&#34;}}

**&lt;00:22:31&gt;:** 48-5 once again denies having said anything.

**&lt;00:24:07&gt;:** The team comes to the top floor of one of the towers on SCP-001&#39;s upper deck. The chamber appears to be a shrine to a deity represented by a turtle with 27 hands, holding a flute.

**&lt;00:25:34&gt;:** 48-1 and -2 take photographs - the latter of the shrine&#39;s interior, and the former of the rest of the ship, visible from observation windows.

**&lt;00:28:40&gt;:** 48-5 points out of one of the windows toward the center of SCP-001.

&gt; +++ &lt;Audio Log&gt;
&gt; 
&gt; **48-5:** {{That&#39;s where the Party Door lives.}}
&gt; 
&gt; **O&#39;Dell:** Oh, for God&#39;s sake...
&gt; 
&gt; **48-5:** {{There is a party behind the Party Door and I wish to go there because that&#39;s where a party is.}}
&gt; 
&gt; **48-4:** Wait. Does anyone here have experience with mind-affecting anomalies?
&gt; 
&gt; **48-2:** -5 does.
&gt; 
&gt; **O&#39;Dell:** You mean other than right now?
&gt; 
&gt; **48-2:** She //should// have a high resistance to cognitohazards. The highest out of all of us here, in fact.
&gt; 
&gt; **48-5:** **{{[https://youtu.be/6Zbi0XmGtMw?feature=shared&amp;t=27 (Hums.)]}}**
&gt; 
&gt; **48-1:** And doesn&#39;t that just fill you with confidence?
&gt; 
&gt; **48-3:** {{I hear all the cool kids are hanging out at the party which is behind the Party Door and has party things.}}
&gt; 
&gt; **O&#39;Dell:** Not the time, 3!
&gt; 
&gt; **48-3:** What? I didn&#39;t say --
&gt; 
&gt; **O&#39;Dell:** //FUCK!//
&gt; 
&gt; **48-5:** {{I wanna be a cool kid.}}

**&lt;00:32:49&gt;:** The team holds an emergency meeting regarding the possibility of mental interference.

**&lt;00:37:01&gt;:** At a 6-1 vote, the meeting concludes on the decision that Captain O&#39;Dell is a {{&#34;party-hating nerd&#34;}}. Everyone but O&#39;Dell deserts.

**&lt;00:38:48&gt;:** O&#39;Dell weeps.

------

[[=]]
+++++ [TRUNCATED FOR BREVITY]
[[/=]]

------

**&lt;01:48:02&gt;:** After over an hour of encountering identical scenery and impassable passageways, O&#39;Dell enters what appears to be a storage area in the lower decks. There are 18 black, semi-transparent pillars containing organic remains of indeterminate origin. All but one have been shattered.

**&lt;01:48:59&gt;:** O&#39;Dell approaches the pillar that hasn&#39;t shattered. His hand comes within five centimeters of what appears to be a control panel. 

**&lt;01:49:14&gt;:** An arc of static electricity jumps between his finger and the panel. He yelps.

**&lt;01:49:18&gt;:** The pillar collapses. O&#39;Dell falls backward.

**&lt;01:50:49&gt;:** As he gets back up, his light lands on [https://scp-wiki.wikidot.com/dyfscp0012/offset/2 a 2.5-meter-tall crustacean entity] emerging from the collapsed pillar&#39;s liquid. Its neck and many legs are covered in an elaborate series of shackles and metallic cables to impede movement. Withered red shrubbery can be seen on the back of the entity&#39;s shell.

**&lt;01:51:01&gt;:** O&#39;Dell instinctively draws his pistol at the entity.

**&lt;01:51:05&gt;:** The entity bows politely.

**&lt;01:51:14&gt;:** He half-lowers his gun.

**&lt;01:51:30&gt;:** The entity speaks from an electronic device in its collar. The voice is feminine.

&gt; +++ &lt;Audio Log&gt;
&gt; 
&gt; **Entity:** It would seem that you have rescued me. That&#39;s rather nice of you.
&gt; 
&gt; **O&#39;Dell:** You speak English?
&gt; 
&gt; **Entity:** I speak what I please. //(Indicating the collar)// Your perception fills in the blanks. On whose authority have you come to save me?
&gt; 
&gt; **O&#39;Dell:** I wasn&#39;t planning on saving anyone. This ship&#39;s tearing my planet apart. I came to destroy it.
&gt; 
&gt; //(He raises the gun again.)//
&gt; 
&gt; You wouldn&#39;t happen to have something to do with that, would you?
&gt; 
&gt; **Entity:** That&#39;s... curious. This is no warship. This is an asteroid-harvesting vessel of the Threll Dominion. They haven&#39;t been at war with anyone in 184 {{**[succulent maraschino cherries]**}}. At least, not anyone who could fight back.
&gt; 
&gt; **O&#39;Dell:** I&#39;m gonna go ahead and assume you meant to say &#34;space year.&#34;
&gt; 
&gt; **Entity:** Hmm. I sense great confusion in your soul.
&gt; 
&gt; //(He lowers the gun completely.)//
&gt; 
&gt; **O&#39;Dell:** Then let&#39;s start over. My name&#39;s Captain Thaddeus O&#39;Dell.
&gt; 
&gt; **Entity:** My people&#39;s names are difficult to translate. I am **{{//[Muh-muh-muh-Myyyy Sharona!]//}}** of the **{{[WEASELS?!]}}**.
&gt; 
&gt; **O&#39;Dell:** Of //course// you are.
&gt; 
&gt; --Entity:-- **Sharona:** I also sense that the name &#34;Threll&#34; means nothing to you.
&gt; 
&gt; **O&#39;Dell:** Aliens?
&gt; 
&gt; **Sharona:** Very much so, even to their own homeworld. They&#39;re a nomadic fleet of merchants spanning countless dimensions -- comparable to the Silk Road of you earthlings. Though alive, their progenitor was born among the dead: HAJHETI[[footnote]](Pron. Ha-ZHAY-tee}[[/footnote]] of the Primrose Deep. Sixth Prince of Corbenic. Lord of commerce, trade, and hierarchies.
&gt; 
&gt; //(Indicating her shackles.)//
&gt; 
&gt; Everything the Threll have created -- including this ship -- runs on the power of an unwilling host. 
&gt; 
&gt; Autonomous machines are against the word of HAJHETI. There has to be an element of subjugation in all aspects of Threll existence. Even something as simple as a Threll-made knife requires a little animal grafted to its handle for posterity.
&gt; 
&gt; **O&#39;Dell:** Damn. So what was your function?
&gt; 
&gt; **Sharona:** Teleportation. My people&#39;s specialty. Before I was put back to sleep, my last orders were, roughly translated, to &#34;shunt this vessel into one of the expendable dimensions on this list before that idiot cooks the whole fleet.&#34;
&gt; 
&gt; **O&#39;Dell:** And who was &#39;that idiot?&#34;
&gt; 
&gt; **Sharona:** Hmm. Someone unintelligent, I&#39;d imagine. 
&gt; 
&gt; //(Sharona lumbers out of the pile of debris.)//
&gt; 
&gt; Let&#39;s continue this somewhere devoid of any Threll. I don&#39;t believe they&#39;ve tested a human&#39;s &#34;utility&#34; yet - best not to stoke their curiosity.
&gt; 
&gt; **O&#39;Dell:** I haven&#39;t seen any other lifeforms.
&gt; 
&gt; **Sharona:** Oh? Then they must be hiding. I&#39;ll check.
&gt; 
&gt; //(Sharona meditates for five seconds.)//
&gt; 
&gt; ...my, my. You&#39;ve been busy.
&gt; 
&gt; **O&#39;Dell:** Huh?
&gt; 
&gt; **Sharona:** Every Threll on this ship is dead.
&gt; 
&gt; **O&#39;Dell:** Huh. Well, I wasn&#39;t the one who killed them. ...you know, maybe since I saved you and all, you could help me figure this place out? Like, to pay me back.
&gt; 
&gt; //(Sharona raises her arms.)//
&gt; 
&gt; **Sharona:** Maybe later. After all, now that there&#39;s no longer a master to stop me, {{I think I&#39;ll check out the Party Door because I&#39;ve heard there is a cool kids party on the other side of said Party Door.}}
&gt; 
&gt; **O&#39;Dell:** Wait! First off, what even //is --//
&gt; 
&gt; **Sharona:** {{Party time.}}
&gt; 
&gt; //(Sharona disappears. The space she occupied is replaced with a cloud of heated gases.)//
&gt; 
&gt; //(O&#39;Dell calls out to the ceiling)//
&gt; 
&gt; **O&#39;Dell:** //Where&#39;s my FUCKING invitation?!// 

------

[[=]]
+++++ [TRUNCATED FOR BREVITY]
[[/=]]

------

**&lt;23:12:19&gt;:** The video feed has been out for six hours. Audio can still be heard from O&#39;Dell.

&gt; +++ &lt;Audio Log&gt;
&gt; 
&gt; **O&#39;Dell:** ...and, I&#39;m back. Just... Just hear me out.
&gt; 
&gt; I&#39;m out of rations, my crew has abandoned me, and this is a one-way transmitter, so I have //no// idea if anyone on the earth below me is still alive! And there haven&#39;t been any more of Yusupov&#39;s fucking suicide bombs I MEAN dropships, which means help is NOT coming!
&gt; 
&gt; But you know what I DO have?! KIND OF a functioning understanding of these stupid hieroglyphs all over the ship! 
&gt; 
&gt; Okay, look - you can&#39;t see it, but I&#39;m writing these down. I was looking at this wall for an //inordinately// long amount of time. Several years, in fact![[footnote]](At this point, 23 hours had elapsed since recording began. Cpt. O&#39;Dell has been recommended for a psychiatric evaluation.)[[/footnote]]
&gt; 
&gt; Some of these symbols look more like what they&#39;re supposed to mean than others. This turtle thing is obviously a Threll, or their turtle god, Prince Horchata or something. And if you touch the walls enough - the whole thing&#39;s basically a touchscreen. You can even see some photographs. Mostly of Threll congratulating other Threll for doing Threll things. They look like what would happen if a leatherback sea turtle fucked a chimpanzee and their kid was raised by donkeys. I&#39;ve drawn some pictures of Threll for reference.[[footnote]](Said drawings recovered from O&#39;Dell&#39;s notebook were a hastily-drawn comic of a chimpanzee having sexual congress with a sea turtle, along with concept art of a donkey nanny named &#34;Good Lady Jackenassy.&#34;)[[/footnote]]
&gt; 
&gt; None of the pictures show any Threll with their mouths open. So, my going theory is that the Threll don&#39;t have vocal folds, so they write everything down instead of speaking. And since they do business with so many other cultures in their Silk Road bullshit, it&#39;s only natural that they&#39;d want to have a writing system that anyone could understand. Kinda like how Chinook Jargon was used in trading.
&gt; 
&gt; Anyway, there&#39;s this symbol that means &#34;fire,&#34; and this one... I wanna say &#34;traitor.&#34; And there&#39;s this compound-symbol icon keeps showing up in warning prompts, like, a circle of 16 &#34;fire&#34; symbols surrounding a &#34;traitor&#34; symbol.
&gt; 
&gt; This Traitor-Flame has been showing up a lot in diagrams of the ship. I keep seeing it near the mouth. It&#39;s Tarrare&#39;s power source. 
&gt; 
&gt; But why &#34;traitor?&#34; That&#39;s obvious enough. It&#39;s another creature the Threll kidnapped and enslaved. At some point, it must have broken out of containment, killed its masters - along with most of the other slaves, too - and hijacked the ship.
&gt; 
&gt; If this is true, it means that the Traitor-Flame is also the one responsible for Tarrare &#34;mining&#34; our planet to death. But why would it want to take it out on //us?// 
&gt; 
&gt; Then again, the Traitor-Flame hasn&#39;t moved from the Mouth area ever since it got here. It&#39;s using this ship&#39;s hardware to help it consume as much as possible. So, maybe there isn&#39;t a vengeful or moral aspect to any of this. Maybe it&#39;s just hungry.
&gt; 
&gt; ...
&gt; 
&gt; On a related note, regarding this &#34;Party Door&#34; business... I might have found the answer in these diagrams.
&gt; 
&gt; Speculation that the Mouth is its own pocket dimension seems to be correct. Definitely a bigger-on-the-inside situation. An area of nothing but flame, plasma, and the Traitor-Flame, hanging from a thousand power cables connected to the rest of the ship. But from these diagrams, I&#39;ve been seeing a crack on the third floor - an opening that something had punched through.
&gt; 
&gt; That must be the Party Door. That&#39;s how the Traitor-Flame killed them all - it hypnotized the Threll into walking face-first into their own furnace.
&gt; 
&gt; ...
&gt; 
&gt; //(Rumbling and dopey giggling can be heard in the distance, coming closer and closer.)//
&gt; 
&gt; Oh, right.
&gt; 
&gt; There&#39;s one more thing I forgot to mention.
&gt; 
&gt; The hypnosis doesn&#39;t work on everyone. I&#39;m living proof. So, to round up the stragglers...
&gt; 
&gt; **[Unknown 1]:** //WOOO hoo hoo! Foogh schnaaba! Durrrug jek nab nyab.//
&gt; 
&gt; **[Unkonwn 2]:** //Brrroof galak!//
&gt; 
&gt; **O&#39;Dell:** He&#39;s got a gang of [https://scp-wiki.wikidot.com/dyfscp-001/offset/1 indestructible, shit-eating whale-people.] Judging by the collars, they were Sharona&#39;s unwilling colleagues. ...hi, guys.
&gt; 
&gt; **[Unknowns]:** //HAAAI GAAAI!//
&gt; 
&gt; //(Sounds of a struggle.)//
&gt; 
&gt; **[Unknown 3]:** //GASHGAAH! Mngeefda brob darrrrau. {{Pabee Duur!}}//
&gt; 
&gt; **O&#39;Dell:** Yeah. Great. Listen, can we maybe //not -//

**&lt;23:31:40&gt;:** Audio cuts out.
