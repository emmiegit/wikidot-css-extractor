    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>**Medical Examination of Cameron Parry by Dr. Everett Mann**

&gt; General Description: Patient is a white male with medium-length brown hair. Height is approximately 1.7 meters, weight is 57 kilograms. Subject shows mild malnutrition, consistent with the lifestyle they reported. 
&gt; 
&gt; Subject shows multiple shallow cuts all from behind. Precise number is difficult to ascertain due to overlap, but I would estimate no fewer than twenty. No cut is higher than the subjects waist, consistent with subject&#39;s description of events. Subject also had a torn anterior cruciate ligament in the right knee and was suffering from a mild concussion.
&gt; 
&gt; Testimony from state police describe the subject as having blood across his face and arms; however, no wounds were present that would explain blood on that part of the body. 
&gt; 
&gt; Interview with subject reveals he has contacted his family, but not given details on his experience. I personally recommend against Dr. Wren&#39;s request to stage the patient&#39;s death and disappearance. The potential benefit is not worth the increased risk to secrecy. My professional recommendation is to dispense Class-A amnestics and monitor the subject remotely.
