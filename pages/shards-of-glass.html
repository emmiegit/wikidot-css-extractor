[[tab Operation Report]]

The Great Citadel[[footnote]][https://scp-wiki.wikidot.com/scp-4403 The Great Citadel] is an extradimensional space of indeterminate size that is currently in use by The Silent Crusade (GoI-4403) as their base of standard operation.[[/footnote]], as one of the main operational bases, continued its work. Operators rotated in shifts, and a sweetish taste lingered in the air. Somewhere in the distance, gunfire could be heard. Apparently, some Pages were still being prepared to assume the rank of Squires. Among them was our operative, Ioann Krousman — a recruit of the Silent Crusade.

Upon arrival at the Citadel, the Ioannites[[footnote]]The Sovereign Military Order of Malta (SMOM), officially the Sovereign Military Hospitaller Order of Saint John of Jerusalem, of Rhodes, and of Malta, and commonly known as the Order of Malta or the Knights of Malta, is a Catholic lay religious order traditionally of a military, chivalric, and noble nature.
[[/footnote]] immediately began treating him. The Citadel’s operative carnomancers rushed to heal those wounded during the operation against the The Black Lodge of Hunters[[footnote]]The Black Lodge of Hunters is a neo-Sarkic cult and Russian mafia group headquartered in the Red Lanterns bar in Moscow. They are responsible for arms trafficking, human trafficking, drug trafficking, murder, robbery, and many other crimes.[[/footnote]] and the Daevites in Siberia. Apparently, a new alliance.

Ioann Krousman was hospitalized and sent to rest. A psychiatrist is to be assigned.

The diary is to be confiscated, copied, and returned to the operative. Additionally, Ioann Krousman is to be promoted for valor and courage. According to bodycam footage, the operative killed at least three members of the “Black Lodge Hunters” and wounded several others. He also supported the retreat.

It appears he specialized in deploying improvised explosive devices and served as a coordinator for airstrikes. As understood, the airstrikes were carried out by &#39;&#39;La Spada de Cristo&#39;&#39;, 194th Aviation Division.

Afterward, a member of the German branch of the Templar Order began flipping through the journal. Between its pages were dossiers detailing Templar interventions from the Citadel in crusades across different eras.

Reaching a blank page, the representative of the Reformed Templars tore it out and wrote a promotion dossier. After signing it, he summoned one of the chaplains of the German branch and handed over the document.

Ioann Krousman, in turn, received the dossier. He was overjoyed at his promotion to the rank of Knight — a full-fledged warrior of the Order of Christ and the Temple of Solomon.

Upon gaining a new level of clearance, Ioann was astonished. His eyes raced across the pages of newly accessible material.

These were the **Occult Crusades**.

[[/tab]]

[[tab Diary Logs]]

[[collapsible show=&#34;+ Most likely November 9th. I don’t know the time or even the year.&#34; hide=&#34;- Hide&#34;]]
Alright, I’ve started writing my service diary right here in this Citadel in a rather strange way. Hello to myself — and perhaps to a friend who might read this someday.

I recently joined the Silent Crusade. Four days have passed in my own time since I, as a member of the Holy Order of the Templars (post-Reformation), was transferred to the Great Citadel. It is fascinating to witness the wide variety of units here. Sometimes I see the Hospitallers carrying the wounded on stretchers, or someone moving supplies. Most of all, I am captivated by La Spada de Cristo — the Vatican’s assault detachments. They include both Orthodox and Catholic branches. It is remarkable how the Templar Order has multiple branches and sends them here.
[[/collapsible]]

[[collapsible show=&#34;+ Presumably March 16th. I saw a clock — 16:22.&#34; hide=&#34;- Hide&#34;]]

Hello again. I was recently on a field operation. I completed a full training course and began to manifest anomalous abilities, as told by a member of the Priory of Sion — a neo-Templar, as he called himself. It’s amusing that we share the same Masters (I admire the Priory of Sion, though I’ll never join them). Interestingly, in an attempt to eliminate a man with wings, we found a girl in a nursery. She was taken by our Hospitallers here in the Citadel. They are good people, the Ioannites.

[[/collapsible]]

[[collapsible show=&#34;+ Possibly December. Unknown time.&#34; hide=&#34;- Hide&#34;]]


And here I write again. I am alone in my room — and there are many such rooms. It feels like a massive Christian mechanism. The paths leading from here to other points are incredibly long — hyper-paths, I would say. Amusingly, recently our base commander resembled our Master, Christian. Why does he look so young? How old is he really?
[[/collapsible]]

[[collapsible show=&#34;+ Entry marked as unstable&#34; hide=&#34;- Hide&#34;]]


This is terrible. Recently, we refused to assist the Tsar’s Seers[[footnote]]Tsar&#39;s Seers are an anomalous containment group that operates primarily in Russian-speaking territories. Mostly consisting of thaumaturges, the Seers seek to contain or reclaim Russian anomalies that have fallen into the wrong hands or have been lost throughout history.[[/footnote]] Operators (we call those who manage the Citadel) recorded an attack by unknown anomalies against the Tsar’s Seers of the Russian Empire. The Orthodox branch of the Templar Order provided some aid, but many were wounded. Some were brought here and transferred to other orders. They looked frightened. I feel extreme revulsion toward the Catholics: why did WE not help our brothers? What nonsense.
[[/collapsible]]

[[collapsible show=&#34;+ Christmas. Celebration of the Nativity of Christ&#34; hide=&#34;- Hide&#34;]]

It is now Christmas. Priests of many kinds have arrived and begun the Eucharist right in the main operational base. Everyone is joyful. I have never seen so many happy people simply walking through the Citadel’s corridors or streets. Everywhere, there are songs of praise. It is difficult not to be carried along and start singing as well. Truly, what happiness this is! The Lord sent His Son to us to atone for our sins. It is frightening, sorrowful, and joyful all at once. Both Catholics and Orthodox celebrate this. By the way, the Seers return to their &#34;Tsar-Batushka.&#34;
[[/collapsible]]

[[/tab]]

[[tab Occult Crusade Dossiers]]

+++ Albigensian Crusade

**[[[http://scp-wiki.wikidot.com/scp-4565 | Daevite Crusade (1205–1225)]]]**

**Before Intervention:** Daevite conquerors aligned with Catharism, having adopted Fifthism, would successfully repel the attack on Toulouse and, allied with remnants of the Assassin Order, conduct a series of conquest operations across France. This would result in the fall of Catholicism in France and the subsequent annexation of Catholic Europe by the Daevite-Cathars.

**Actions Taken:** Operatives of La Spada de Cristo carried out devastating strikes on key Daevite strongholds, also sowing discord to split Catharism into multiple sects. This prevented Cathars from defending Toulouse.

**Result:** The Templars captured Toulouse, executed a territorial swap maneuver, and eliminated the main Daevite forces in Europe. This secured victory in the Albigensian Crusade and preserved the existence of the Catholic and Orthodox Churches.

----

+++ Italian Crusade

**[[[http://scp-wiki.wikidot.com/scp-3221 | Anti-Nestorian Campaign (410–1109)]]]**  
**[[[http://scp-wiki.wikidot.com/scp-4261 | SCP-4261]]]**

**Before Intervention:** Presbyter John would inevitably attack the Apostolic Church, leading to its schism. Bishops would fragment into divergent beliefs, and the [[[http://scp-wiki.wikidot.com/scp-4261 | Shofar]]] would not be used. This would result in a complete transformation of Christian culture into Nestorian ideals, deification of Presbyter John, and a &#34;second death of Christianity.&#34;

**Actions Taken:** Using cells of powerful carnomancers and an elite guard of the Temple of Solomon, hundreds of anomalies were created. This fractured the Nestorian Church, splitting it into smaller sects, which were then defeated by the Apostolic Occult Service and the Reformed Templar Order.

**Result:** Presbyter John was sealed, and the Apostolic Church remained in the timeline. [[[http://scp-wiki.wikidot.com/scp-4261 | SCP-4261]]] was lost after the schism in 1054.

----

+++ Crusade Against the Flesh

**[[[http://scpwiki.com/scp-6731 | French Crusade (1096–1120)]]]**

**Before Intervention:** Sarkicism exerted immense pressure on the Pope and King of France, leading to dominance of Sarkic principalities over Catholicism. The Pope, unable to resist, submitted, allowing Sarkicism to persist.

**Actions Taken:** The Templar Order Christianized all Sarkic principalities using cognitive and memetic threats. Jesuit missionaries reinforced Christianization, with refusal met by mass attacks from the Templar Order or Reformed Templars.

**Result:** The Catholic Church gained political dominance in Europe, allowing the Templars to consolidate power and counter major occult forces across Eurasia.

[[/tab]]

[[/tabview]]

----

&gt; &#39;&#39;Ioann Krousman could not describe what he felt. He was proud — of himself, and of his brothers. Those who fought in these crusades still walk among us.&#39;&#39;

----

&gt; &#39;&#39;March forward with confidence, knights. Neither life nor death can separate you from the love of the Lord. Repeat in danger: &#34;Whether we live or die, we belong to the Lord.&#34; Blessed is the one who dies in this battle as a martyr.&#39;&#39;</textarea></pre>
