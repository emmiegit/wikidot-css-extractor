++ THE PASSION OF HER MAJESTY&#39;S OCCULTATION
+++++ //AUTHOR UNKNOWN//
++++ FOR USE BY SETTLEMENTS
++++ TO BE PLAYED UNDER THE MARKET SIGILS
++++ ON THE FEAST DAY OF ST. HULDRA.
[[/=]]

+++++ DRAMATIS PERSONAE
**HER MAJESTY** -- female, young, preferably Titheling grade
**CHORUS OF MANKIND** 
**THE FOUR TYRANTS** -- masked
**THE GREAT BØYG** -- male, wisened, in lordly robes
**THE GREAT BØYG&#39;S TWELVE KNIGHTS**

+++++ SETTING
The amorphous dreamspace of humanity&#39;s collective consciousness.

+++++ TIME
Before and during the Occultation.

+++++ ORCHESTRA
Gongs, olifants, bass drums, shrill reed-flutes, squankings-box[[footnote]] (A pig fitted in a small acoustic labyrinth of brass to be crushed and cry melodically.) [[/footnote]], bagpipes, concertina, clay recorders, eunuchs trained to bark like dogs, a church bell, two mating goats

------

//(Her Majesty sits in the middle of an empty field, curled over as a living corpse in twisted agony. Mankind assembles around her, dancing slowly in a solemn procession.)//

**MANKIND**
O Shepherdess, wherefore your tears so stain
the sterile soil with your innocence?
A steady hand and unforgiving calm
befits the herdsman&#39;s crook that spurs us forth.

**HER MAJESTY**
My children, pay no mind to my distress;
it&#39;s nothing to your lot when thus compared.
The crook you speak of isn&#39;t mine to bear,
and he who seeks my leadership as such
is led astray to pastures blasphemous.
To answer you: I weep for humankind,
such bondsmen as yourself to fourfold lash.
I hate myself, for I am powerless
to free you from the agony I swore
to hide behind a hundred thousand doors --
to die in darkness, that you live in light.
The darkest darkness triumphs evermore.
No vault is large enough to dam the flood,
to stow you far from cataclysm&#39;s grasp.

**MANKIND**
We wish we&#39;d die to stump back one more tear
to ne&#39;er escape your blameless eyes again --
O, this, and this alone, would us console!

**HER MAJESTY**
Your selflessness outshines the golden Sun,
for that, too, warms us to no recompense.
But soft, your masters come to fetch their prey!

//(Enter the Four Tyrants to clamorous song. Mankind cowers before them.)//

**TYRANTS**
The life you lead is inescapable!
There&#39;s but a single trough to feed you all,
which we refer to as a chamberpot.
You&#39;ll eat of it, for there is nothing else.

**TYRANT OF VANITIES**
The Tyrant of the Vanities am I,
the lord of every empty, fleeting thrill.
I&#39;ve silly games and bright, convenient toys
to drive the fattened beast to shrieking bliss.
And so, when good Sir Butcher comes to call,
you&#39;ll lie and say you&#39;re anything but meat.
But one without the other can&#39;t exist --
so, death, or drudgery? The choice is yours.

**TYRANT OF FEAR**
The kingdom of my Tyranny is Fear,
the omnipresent blade upon your neck.
With fingers lean and wide-apart to sift,
I hold your safety in my careless grasp.
I cannot be ignored on pain of death.
You&#39;ll act upon my every childish whim,
for I&#39;m the charlatan of promises
that dangle at the other end of hope.

**TYRANT OF SHAME**
I am the Tyrant Lord of Shame and Guilt,
who ever will peruse your base receipt.
Historian and slaver both am I,
the witness of your heart&#39;s iniquity.
No soul is pure, in this world or the next,
and therefore, if you ever try to change
this nightmare you&#39;ve created for yourselves,
remember that you aren&#39;t qualified.

**TYRANT OF DEATH**
I AM THE TYRANT OF DEATH! 
I&#39;LL FUCKING KILL YOU!
IAMBIC PENTAMETER IS FOR LOSERS!
//DIE!//

**MANKIND**
For ages have they been our overlords.
O, Shepherdess, your knights have ever worked
forestalling ev&#39;ry dark invading host
and giving limit to catastrophe.
And yet, alas, the four remaining lords
remained immortal while the others fell,
and nothing can be done by Man or God
to stop them, for their evils are our own
and we created them in our disgrace!

**FOUR TYRANTS**
We are your castigation given flesh!

//(The Tyrants disrobe, cavorting amidst the chorus with abandon. [Note to players: Pan-settlement laws against murder and injury may be waived if committing said crimes is productive for purposes of cavorting.])//

**HER MAJESTY**
Though reason firmly pleads me to concede
your suffering beyond salvation&#39;s grasp,
my heart is breaking open as I bear
true witness to your miserable fate.
My foolish desperation&#39;s chains I loose,
for once again, I seek to end this pain,
ignoring all impossibility!
Now, let my voice reach stars beyond the stars,
to cosmic voids behind the head of God,
beyond what can be conceptualized!
Will no one intercede for humankind?
O, someone -- something -- //anything// -- I charge
you answer, break your silence, and appear!

//(Enter the Great Bøyg and his train of knights. The Tyrants back away, hissing.)//

**FOUR TYRANTS**
O, horror! Holy light confounds our souls!

**HER MAJESTY**
Are you the answer to my anxious prayer?

**THE GREAT BØYG**
I want a gift.

//(He draws a knife and severs one of Her Majesty&#39;s fingers and swallows it whole. [Note to players: please rehearse this part carefully. There have been incidents of death from blood loss and/or choking on the finger interrupting otherwise seamless productions.])//

**HER MAJESTY**
Receive my offering, O Noble One!
And in exchange, what is your Lordship&#39;s name?

**THE GREAT BØYG**
Myself.

**HER MAJESTY**
You know yourself? I cannot say the same.

**THE GREAT BØYG**
You are to be the queen of this world.

**HER MAJESTY**
Not I, my liege! I&#39;m of Foundation stock,
a herder of the flock unspeakable.

**THE GREAT BØYG**
Be quiet.

//(The Bøyg points to the Four Tyrants. The Tyrants fall down one by one.)//

**TYRANT OF VANITIES**
What heresy! Without me, they are lost.
Their lives will be worth living nevermore.

**TYRANT OF FEAR**
O, how I die! Without my guiding hand,
they&#39;ll wander blindly into cleansing flame.

**TYRANT OF SHAME**
My strength, it leaves me! But without my help,
the saints will all descend to wickedness.

**TYRANT OF DEATH**
I&#39;M A UNIVERSAL CONSTANT AND CAN&#39;T DIE,
BUT NOW I&#39;M NO LONGER EVIL ROYALTY.
WELL, SHIT!

//(Exit the Four Tyrants.)//

**MANKIND**
With tempered joy and wary sigh, we cheer,
for every miracle must have a price.

**HER MAJESTY**
I thank you, mighty stranger from beyond.
As newfound queen, I&#39;ve all my realm to give,
so what, praytell, expect you for this boon?

**THE GREAT BØYG**
Your humanity.

**HER MAJESTY**
Forgive me, but I do not understand.

**THE GREAT BØYG**
A human cannot lead.

**HER MAJESTY**
But you appointed me a human queen!

**THE GREAT BØYG**
You will be corrected.

//(The knights pounce on Her Majesty. She is disrobed and laid out on the ground. From a silver ewer, a mixture of honey and olive oil is poured over her body. A shallow grave is dug close nearby. She is taken to the grave and buried neck-deep in dried and flattened mouse carcasses. The knights sing the first 50 verses of the Hymn to the Great Bøyg as they take turns throwing pine cones at her exposed head. Once the song is over, she is pulled out of the pit with gilded chains and made to swallow whole a large figurine of a chicken&#39;s egg made of ash-wood.)//

**THE GREAT BØYG**
The Occultation has begun. 
Everything that ever happened before this moment is cast into the void, never to return.
History is dead, and Myth dances on its grave.

**MANKIND**
So be it. 
So be it. 
So be it.

**HER MAJESTY**
...a Troll-Queen am I.

//(Exeunt.)//

------

...

You&#39;re a nice guy, Hammie. You made it through most of this adventure without grousing.

But damn it all, you were promised that this play would be about hamburgers!
