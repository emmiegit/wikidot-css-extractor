&gt; [[size larger]]Things I&#39;ve drawn, both related to my own writing and the works of others. Click on the images if you want to see them up close. I made them small, so the page loads fast! &lt;3 [[/size]]

[[tabview]]

[[tab Original Art]]

Here are some sketches of the [https://scp-wiki.wikidot.com/scp-8696 SCP-8696] research team!
[[&lt;image 8696%20K%20tiny.png size=&#34;medium&#34;]]
Dr. K pre and post limb growth. I like his dorky little ponytail. Because I forgot to list his info on the image itself, here it is: Finnish / pansexual / 179cm / male / 46yo.
[[&lt;image 8696%20Dr%27s%20tiny.png size=&#34;medium&#34;]]
The rest of the doctors! If they don&#39;t look like what you imagined them to, I&#39;d LOVE to hear how you thought they looked. I barely described them in the text itself, so let me know if your interpretation differs from my own.

------


Here&#39;s all the artwork I made for [https://scp-wiki.wikidot.com/4eyes4arms-and-other-conversations 4eyes4arms and other conversations], A bonus tale for 8696.
[[&lt;image 8696%20bonus%201%20tiny.png size=&#34;medium&#34;]]
[[&lt;image 8696%20BONUS%202%20tiny.png size=&#34;medium&#34;]]
[[&lt;image 8696%20bonus3%20tiny.png size=&#34;medium&#34;]]

[[/tab]]

[[tab Fan Art]]

Fanart!! Yippee!

[[image skip1%20tiny.png size=&#34;small&#34;]] [[image skip2%20tiny.png size=&#34;small&#34;]] [[image skip3%20tiny.png size=&#34;small&#34;]]

[https://scp-wiki.wikidot.com/scp-999 SCP-999], the little bundle of joy. He&#39;s perfect as he is: an ugly-cute orange mass.

Now, my [https://scp-wiki.wikidot.com/scp-049 SCP-049] design is a bit more interesting. I tried making his robes look more like they&#39;re ACTUALLY a part of his body. I took inspiration from rhinos, making the material look like a thick hide.

[https://scp-wiki.wikidot.com/scp-5270 SCP-5270] is a personal favorite of mine. It&#39;s just so cute! I tried to imitate the pixel style of the original illustrations, and I think it turned out well.
