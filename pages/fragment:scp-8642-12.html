    <pre><textarea class="page-source" readonly>You decide to snoop through some papers haphazardly stacked on a nearby filing cabinet, hoping to find some clue about what this department does. The first paper on the stack is… an unfinished horror story? Strange. You look at the next one, and find that it’s another unfinished story. The third paper looks like a draft for containment procedures and a description of an anomaly you’re not familiar with, also unfinished. You glance through the whole stack, and all of the papers seem to be stories or database articles that haven’t been finished. You open one of the filing cabinet drawers and find the same types of documents there. Same with the next filing cabinet, and the next one. This makes absolutely no sense. Is this department in charge of drafting database articles? But then why all the stories too? What are they doing down here?
