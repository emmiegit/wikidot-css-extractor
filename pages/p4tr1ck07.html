------

Hey there! Welcome to the author page of P4TR1CK07. I&#39;m sorry if this page is a bit lackluster, I&#39;ve never been much of a CSS wiz myself, but I hope you can find something you like here! 

------

[[=]]
[[size xx-large]] **About**[[/size]]
[[/=]]

------

I&#39;ve always dabbled in the SCP community in one way or another for the past sevenish years, and I always wanted to contribute my own stuff! One fateful day I discovered the SCP wiki discord, and got writing. As is so often the case, my first few articles were rough, and after 3 different drafts, only one survived. Hell I couldn&#39;t even wrap my head around what people meant when they said my SCP needed a narrative, having grown up on series one SCPs.

After that I forgot about the wiki and writing for around two years until one day I checked back in to my first and only SCP to see if it was still around. Sure enough, it was, and there was some really positive feedback on it, so I decided what the hell, and got writing again, then I wrote a classiccon entry, and a few others where I experimented with different weak points I felt I had and here we are. 

No wiki superstar, that&#39;s for sure, but I enjoy doing what I do and I contributing to the wiki. I had planned to create an author page when I hit my first +50 article, but I decided now I have six published articles, its probably time.

A special thanks to all the great friends I&#39;ve made on the wiki who have been amazingly helpful and always pushed me to do my very best, I wouldn&#39;t be here without them.

So, enough serious stuff, now the bit everyone&#39;s here for, the silly quotes. Oh yeah, and the actual article list.
