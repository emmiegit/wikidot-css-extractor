    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>**Partial log of recovered remains**

* Seven bodies with no apparent cause of death have appeared from the --north side of the-- door. Two were members of Tau-49, four were Class D personnel. One is unidentified.
* Four plastic bins fell through the south side of SCP-9393. Each was made from bright plastic, with a stylized face on the lid (monkey, dog, bird, and human). These appear to be designed as children&#39;s room decor. Inside were the liver, intestines, lungs, and stomach of Agent Dolores Barragan.
* The body of D-16238 exited the north side door at high speed, striking the door of the inner chamber. Based on the close examination of the camera feed and the autopsy, it is believed that he had already died from massive blunt trauma prior to the exit.
* The body of D-48292 rolled out the north side of the door, compressed to a sphere 33 cm across.
* Two MTF uniforms, four D-Class personnel uniforms, and civilian clothing from at least three unidentified persons.
* The apparent body of Director [REDACTED] was found with a knife stuck in the back. Fingerprints on the knife belonged to Agent Ferris Mason. Director [REDACTED] had died two years prior during a security breach. Agent Mason had been assigned as the director&#39;s security detail during the incident. When Director [REDACTED]&#39;s grave was exhumed, his body was still there.

[https://scp-wiki.wikidot.com/scp-9393/offset/0#anchor16 Return.]</textarea></pre>
