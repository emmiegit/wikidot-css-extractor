**Item # :** SCP-761-FR

**Threat Level** Black ●

**Object Class:** Keter

**Special Containment Procedures:** SCP-761-FR is currently utilized by MTF Alpha-3 &#34;Voice of Reason&#34; for negotiation purposes to stop the damage it caused during its first use.

If this mission is carried out or if it proves to be impossible, the object must be immediately destroyed by any method.

The directors of each Foundation site have received, by secure mail, precise instructions in order to face the current worldwide situation and protect their facilities should the situation worsen.

**Description:** SCP-761-FR is a model T80 Walker&amp;Walker brand megaphone. SCP-761-FR&#39;s anomaly manifests when it is activated and a subject speaks through it. The words said by this subject are then heard by thought by the entirety of human beings present on Earth. These thoughts are anomalously clear and precise and do not involve any language barriers.

SCP-761-FR was discovered in the house of S███████ T████████, a suspected member of the Group of Interest SAPPHIRE. During his arrest, he explained that he made the object in order to prove &#34;the violence that believers can show and their obvious stupidity to believe a voice in their head&#34;.

Before its recovery by the Foundation, SCP-761-FR was only used once by S███████ T████████ in order to transmit the following message:

&gt; I am the sign that you have always hoped for. You have chosen the right belief; now, lead others to it.
