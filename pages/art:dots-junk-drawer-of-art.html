//You open the door to your new office in Site-[REDACTED], Office 37.//

//It smells like oil paint and, oddly enough, cinnamon scented candles inside. For some reason, this office has been abandoned, left, forgotten, at the end of the corridor to fester. It doesn&#39;t look like no one&#39;s been here for ages, rather, it looks clean and orderly. You chalk it up to the janitor just doing their job and remembering to clean the place.//

//The dresser in the corner of the room catches your eye. You approach the forgotten dresser. It&#39;s odd and out of place, with splatters of paint and scratches marring it&#39;s surface. A large &#34;37&#34; is scratched onto its side.//

//Curious, you pull open the first drawer. A worn drawer, with a couple scratches and nicks. Inside, its littered with random pieces of paper. There&#39;s a message scratched onto the bottom of the drawer, &#34;夢&#34;. you rifle through them below.//

//The first thing you see is a sticky note on top of all the papers inside.//

&gt; --some-- most of the drawings in here are just too massive to shove in here so you&#39;re gonna have to stretch out your little fingers and unwrap them, &#39;kay? (TRANSLATION: you&#39;re gonna have to click on them if you wanna see all the juicy pixels I meant for y&#39;all to see. they look really blurry otherwise)
&gt; 
&gt; -dots.
