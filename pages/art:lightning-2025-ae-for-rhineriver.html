**My 2025 Art Exchange gift for [[*user RhineRiver]] of their article [https://scp-wiki.wikidot.com/scp-8749 SCP-8749]**

[[collapsible show=&#34;+ Extra Thoughts&#34; hide=&#34;- Close&#34;]]
Genuinely one of the funnest artworks I have had the pleasure of being able to make. I originally wasn&#39;t sure which SCP to use for this art exchange, and I was very close to making a little comic about the lobster ([https://scp-wiki.wikidot.com/scp-5749 SCP-5749]), but after I fully read SCP-8749, it resonnated with me in a way I really couldn&#39;t explained. It is such an interesting and almost surreal article. So I went with it. The composition was pretty much made immediately, since I knew I wanted it to be very symmetrical so the lightning and body would stand out as different. Really was just a joy to render it. I am really lucky I was able to do this, and it was a great first art exchange experience.
