    <pre><textarea class="page-source" readonly>[[include component:image-block name=/SCP-3930/default.png|caption=N/A]]

**Item #:** SCP-9153

**Object Class:** N/A

**Special Containment Procedures:** A paper containing a definitive proof that the continuum hypothesis is true is to be published and disseminated to the wider mathematics community.

Individuals with prior knowledge of or previously assigned to SCP-9153 are to be made aware that SCP-9153, as well as Researcher Helen Dang from the Department of Mathematics, [[[SCP-3930|does not exist]]]. 

**Description:** SCP-9153 is the counterexample that would disprove the continuum hypothesis: a previously-open problem in mathematics surrounding the possible sizes of infinite sets. In set theory, rather than a singular label for the cardinality (size) of an infinite set, it is understood that there exists an endless sequence of infinite cardinalities, each one bigger than the last. The continuum hypothesis then posits that there is no infinite cardinality that lies between that of the integers, which are the first infinity in the sequence, and that of the real numbers, the alleged second infinity in the sequence.

It has been proven by Researcher Jade Huynh that the continuum hypothesis is correct, i.e. that the hypothetical infinity, and thus SCP-9153 itself, does not exist.

**The remainder of this file is Level 5/9153 Classified with Restrictions.**
