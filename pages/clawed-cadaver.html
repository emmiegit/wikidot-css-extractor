The Clawed Cadaver
[[/div]]

+++++ __From the journal of Alexander Foxx, Captain of The Guard__

//**November 18th, XXXX**//

I awoke around the 5th hour of the day this morning, much to my own dismay. A good night&#39;s sleep continues to elude me even a week after my failure to protect the life of my master&#39;s brother. I can only hope that my nerves will harden in the coming days.

This dreadful weather we&#39;ve been forced to endure persists with no sign of clearing up. Late autumn showers continue to pound the manor&#39;s roofing and soak any soul who dares step out into the freezing rain. I just hope the cold doesn&#39;t cause any illness. Johnathan&#39;s death was bad enough, the last thing the manor needs is pestilence spreading through its inhabitants.

It was not all dark and gloom today, though. Early in the morning, around the 7th hour, one of the guards on post spotted a carriage coming up the mountain road. I was immediately informed and made my way from my chambers to the front driveway. Sure enough, Phillip&#39;s carriage rounded the lot just as I arrived.

&#34;Welcome back, Mr. Darke.&#34; I said as Phillip opened his door. &#34;Come quick. The rain is relentless this morning, and we wouldn&#39;t want you catching a cold. Is this the detective you went out for?&#34;

Following Phillip out of the carriage was a woman wearing a rather dashing tweed suit under a heavy duster coat. Atop her head was a set of dirty blonde hair, pulled back behind her ears, tied into short pony tail, and topped with a cotton tweed cap that covered her head. Contrasting the rather bland coloring of her attire were a pair of dark blue eyes stationed right in the middle of a face that displayed an air of confidence and poise I have seldom seen even amongst the most distinguished members of our guard.

&#34;Indeed.&#34; Phillip answered as his boots hit the gravel path. &#34;Detective Thompson here has agreed to take the case and will be staying with us for the foreseeable future. Ah, where are my manners. Detective Thompson, this is our Captain of the Guard, Alexander Foxx.&#34;

&#34;A pleasure, Captain.&#34; Thompson said as she trailed Phillip out of the doorway, placing a notebook into her coat pocket and raising a gloved hand. &#34;I trust the body and crime scene were preserved to the best of your ability.&#34;

&#34;Yes miss.&#34; I had said, shaking her hand as any gentleman would. &#34;We sectioned off the bedroom with two guards stationed around the clock.&#34;

&#34;And Mr. Darke?&#34;

&#34;Sealed him in one of the on-site caskets and locked it in the ice room.&#34;

&#34;Excellent Mr. Foxx. I commend you on your intuition. Now, Darke Junior, body decay is a very natural process that one can, at best, only delay. I suggest we go take a look at the late Darke senior right away before nature muddies this investigation any more. Oh, dear me, I nearly forgot.&#34;

Thompson spun on her heals and ran back out into the driveway, flagging down one of the servants who were unloading the luggage.

&#34;Please be careful with that, it is very fragile and very expensive. If I may, I am in need of it at the moment. You may take the rest of my belongings to my chambers, but please do be careful.&#34;

Thompson returned a moment later carrying a long, thin box with a handle in its center.

&#34;I would like to interview the inhabitants of this estate after investigating the body. How many individuals are employed here, Darke Junior?&#34;

&#34;Forty-eight. Twenty-six servants, twenty-two guards.&#34;

&#34;As I suspected for an estate of this size. Of course, I will need to question each of the servants as well as the occupants. Would you be so kind as to call everyone into the main living room, Mr. Foxx? Observing the body shouldn&#39;t take more than a moment.&#34;

I was rather taken aback by this suggestion. While Thompson seemed more than capable of handling herself, there was still the threat of a werewolf on the premise.

&#34;If I may, detective, we&#39;re currently enforcing a policy of escort. No one is to traverse the manor alone or without a guard. If you do not mind, I would like to personally see you two to the ice room.&#34;

Thompson gave me a puzzled look, then shrugged her shoulders after a moment of contemplation.

&#34;Very well, Captain. You may end up being useful in our little investigation. Still, I would be most appreciative if everyone could be rallied together as soon as possible. Time is always of the essence in these things.&#34;

I expressed my agreement as us three began walking through the halls of the lower manor. Bill and Percy passed us while on patrol, and I informed them of the detectives wishes.

&#34;Those two. Were they on duty the night of the killing?&#34; Thompson waited to ask once the guards were out of ear shot.

I informed her that they were, and that for the past few days they&#39;ve volunteered for patrol as often as they could. &#34;Most likely out of guilt,&#34; I concluded.

&#34;Guilt, yes.&#34; Thompson whispered. &#34;But shameful guilt or culpable guilt? Oh don&#39;t mind me Captain, sometimes I think out of my mouth. It&#39;s too early to cast suspicion on anyone. Hopefully the upcoming interviews will help shed some light on who the identity of this werewolf may be. Ah, it seems we&#39;re here.&#34;

Ophelia and Henry were stationed on either side of the steel door leading to the ice room. Seeing us, they stepped to the side and bid us welcome.

&#34;This the detective you told us about?&#34; Henry said in a coarse tone. &#34;I say, she&#39;d better figure this out quick. I don&#39;t want to be around next time that wolfman comes about.&#34;

I was about to reprimand my subordinate for his rather rude demeanor, but was beaten by a quick reply from the detective.

&#34;Worry not, my dear fellow. I will have this mystery solved by the week start. Now, if you would be so kind, we&#39;re having everyone gather in the main living room. Guards included. Don&#39;t worry, we&#39;ll be more than capable of handling the cadaver in your absence.&#34;

The two of them looked at me, and after a quick nod of approval, left their posts to make their way to the living room.

&#34;Do allow me.&#34; I said, pushing the heavy metal door to the ice room open. The freezing air caused my body, still dampened by the few moments spent out in the rain, to shiver. There, in the middle of the half filled ice room, was the dark oak casket where my master&#39;s brother laid in a terrible eternal slumber.

&#34;Very nice.&#34; The detective said as she stepped up beside me. &#34;I suspect this room is no warmer than twenty-seven... no... twenty-five degrees. That and the sealed casket should have preserved the body nicely. However, this mystery cannot be solved unless we break open that wooden box. Mr. Foxx, would you be so kind?&#34;

I&#39;ll admit, there was a part of me that was a little reluctant to do so. Breaking open the casket of a deceased man felt like defiling something sacred. But, I was soon to remember that a grave tragedy had just occurred not three nights ago. Dashing the hesitant thoughts from my mind, I placed my hands on casket door, and heaved it off.

A thud echoed around us when the cover fell to the ground. Laying there was the late Johnathan Darke, and a grizzly sight he was. His face and body were mutilated by large claw marks. The clothes he was wearing were in a similarly shredded state, given how we had sealed him in the same attire as he was found. His right arm had been completely torn off, and now sat adjacent to him, carefully placed by the people who had laid him in the box.

&#34;We-heh-ell now.&#34; Thompson muttered in a giddy tone that made me grimace at its rather indecorously delivery. &#34;What have we here? I must compliment on the individual who deduced that this was the work of a werewolf. They were spot on.&#34;

Kneeling, the detective laid the long case flat on the ground. Then, flicking two latched upward, she lifted the case&#39;s lid, and pulled out three metal rods and a small, cubical device. I couldn&#39;t tell what it was at first, but I soon came to the conclusion that it was a photographic camera.

&#34;Are you in need of more light?&#34; Phillip asked as Thompson began setting up the tripod.

&#34;No, that&#39;ll be quite all right. Though, if you two would be so kind, may I ask you step back towards the door?&#34;

I was confused by this request. The ice room was hardly a large space, but there was plenty of room for me and Phillip to stand beside Thompson. But, one impatient glance by the detective was all the motivation I needed to make my way to the room&#39;s end.

Once me and Phillip were huddled under the door frame, Thompson aimed her camera down at the open coffin, and snap a photo. A... single photo.

&#34;Well there we have it gentlemen.&#34; She said, slipping a small piece of paper out of the camera&#39;s end. &#34;You may burry the body now.&#34;

I could hardly believe my ears. The detective had said the investigation would take a moment, but a single photograph? She didn&#39;t even reach into the casket to touch the body. I must admit, there was a part of me that questioned whether Phillip had made the right decision in employing this Miss Thompson as our investigator.

&#34;Is... that it?&#34; I asked.

&#34;That it is, Mr. Foxx.&#34; Thompson replied as she began disassembling the camera and putting it back in the case. &#34;I admit, my methods often appear confusing to those who are unfamiliar with them, but rest assured, they are impeccable. Now...&#34; The detective snapped the case shut and stood. &#34;I believe it&#39;s safe to assume everyone&#39;s been summoned to the living room. Let&#39;s not keep them waiting.&#34;

Adjusting her cap, Thompson briskly walked past me and Darke out the door. The two of us exchanged looks of confusion, surprise, and intrigue, before turning on our heals and following the detective back through the hall.
