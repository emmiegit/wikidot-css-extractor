++++ Who am I? Who am I? Who am I? Who am I?

I started writing SCP stuff in 2021 in a storage closet. A distinct memory, because I was struggling to fall asleep in logical fear of what would happen the next day. It was a bad time. Writing let me persist. :)

Psychological horror and gore are my favorite. I use action PRN and incorporate a military background for a multitude of authorial reasons but also big tank cool. Aliens exist as a great way to build a world with whatever political situation suits your story best, and damn it, Jim, I&#39;m not a biologist! 
I stay as faithful as possible to real-world combat medicine, but starting every Tale with &#34;BSI my scene is safe&#34; would be redundant and also a big fat lie, as everyone is being pumped full of lead, and my characters don&#39;t often don nitrile gloves. Don&#39;t worry, copper-based blood would hypothetically have natural antimicrobial properties... eh, I&#39;m not a biologist.

**Most hated thing in writing:** Inaccurate medical procedures. I&#39;m sorry, it just shatters my suspension of disbelief and I cannot possibly continue. [vasovagals onto couch]
**Most loved thing in writing:** Characters expressing gallows humor in serious moments. Banter between characters. Subtlety. 

[[/div]]
[[div class=&#34;blockquote&#34;]]

++ **Crit**
Please ask me for it!

**Topics I specialize in critting:**
* gore
* violence
* self-harm and suicide
* personality disorders (clusters A &amp; B)
* prehospital medicine (EMS &amp; TCCC)
* stubborn motherfuckers of characters

**Other topics I like critting:** 
* surgery
* pathology
* anything that involves someone getting hurt or sick, really
* combat, action-y stuff
* military stuff!
* sci-fi/tech-y stuff
* aliens. Never enough aliens
* obfuscated events, unreliable narrators, those narratives that slowly dawn on you
* morally gray plotlines/characters

**Won&#39;t crit:**
Sex, romance, stuff that focuses heavy on abuse or mistreatment.

If you need help writing any of the above, idea feedback or draft feedback or factual analysis or sensitivity reading, I can do that. PM me here, ping me in the SCPF server, or DM me on Discord (@tiredsn0w).
