    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>**Item #:** SCP-9618

**Object Class:** None

**Special Containment Procedures:** Not important right now.

**Description:** Also not important right now.

**Addendum:**

&gt; SCP-9618-2: My latest version is ready to look at when you feel up to it, Rose.
&gt; 
&gt; Rosen: Right, sorry. I was just blowing my nose.
&gt; 
&gt; SCP-9618-2: It&#39;s ok, take your time.
&gt; 
&gt; SCP-9618-1: Yeah, there&#39;s no rush or anything. 
&gt; 
&gt; Rosen: Thank you both, but I&#39;m fine, really. 
&gt;  
&gt; Rosen: It&#39;s not bad design-wise, Skully. Though, why are the special containment procedures and description not important?
&gt; 
&gt; SCP-9618-2: Yes, well, I wanted to try something a bit older in terms of design. But beyond that, I wanted to spend less time on the document and more time talking to you.
&gt; 
&gt; Rosen: Talking to me? About what?
&gt; 
&gt; SCP-9618-2: About yourself. I&#39;ve come to the realisation we&#39;ve been attempting to make something you like without actually knowing much about you. This lapse in judgment on our part is something I&#39;d like to amend.
&gt; 
&gt; SCP-9618-1: I hate to say it, but Skully&#39;s right for once.
&gt; 
&gt; SCP-9618-2: Deep down, you know I&#39;m right most of the time. 
&gt; 
&gt; SCP-9618-1: Whatever fungus leaf. It&#39;s Rose&#39;s time to talk now. Rose, tell us about yourself.
&gt; 
&gt; Rosen: There isn&#39;t much to tell.
&gt; 
&gt; SCP-9618-2: Don&#39;t say that, I&#39;m quite certain there is a lot to know about you, Rose. 
&gt; 
&gt; Rosen: Well, I suppose I can start with the basics. My name is Gladys Rosen, I&#39;m 45 years old, and I&#39;ve been working here for about five months now. Maybe closer to six if I&#39;m being honest.
&gt; 
&gt; SCP-9618-1: Why did you start working here? You could&#39;ve worked at a plant nursery. That way, you could have all the soil and fertiliser you want.
&gt; 
&gt; Rosen:  I don&#39;t think it works that way if you&#39;re not a plant, Skelly.
&gt; 
&gt; SCP-9618-1: Aww.
&gt; 
&gt; SCP-9618-2: Don&#39;t interrupt Rose with your nonsense. Rose, please continue.
&gt; 
&gt; Rosen: Before coming here, I&#39;d spent much of my life working in administration. I was the lady people went to when they needed something done. Want something printed and stapled, or need more office supplies ordered? That was my job. I didn&#39;t mean to fall into that line of work. I&#39;d sort of followed the motions, you know? I went to high school, then to university, and finally got a job and stayed the course.
&gt; 
&gt; SCP-9618-1: Why did you quit if you were there for so long?
&gt; 
&gt; Rosen: One day, I went to my doctor and told him I was stressed. He wrote me a referral for one doctor who sent me to another, and then another until I landed in the office of a psychologist. I told her, like I had told the others, that I was stressed and I couldn&#39;t figure out why. After poking and prodding my subconscious and conscious minds, she told me that I wasn&#39;t stressed; I was unhappy because I didn&#39;t like my life.
&gt; 
&gt; Rosen: I didn&#39;t believe her at first. I thought I had everything a person like me could want. I had a job that paid the bills, a car and a house. But her words had started a time bomb. Every day I went to work, I would sit and think about where I was and what I was doing. It&#39;s not that I disliked the work, but I realised it wasn&#39;t what I wanted, you know?
&gt; 
&gt; SCP-9618-2: So you left and came here instead?
&gt; 
&gt; Rosen: Not exactly. It was hard to change after years spent doing the same thing, even more so because I felt like I&#39;d wasted the good years of my life on something I never really wanted to do. It took me a year to get the courage to quit my job and enrol in university to pursue the career path I really wanted. Seven years later, by some bizarre stroke of luck, I was scooped up by a friend of one of my professors named Doctor Ashburn. He approached me the day I graduated and offered me a position with the Foundation. I know it might sound silly, but it made me feel special, like I was finally worth a damn.
&gt; 
&gt; SCP-9618-1: I think that made you more than special. He picked you, right? That counts for something in my leaves.
&gt; 
&gt; Rosen: Not really. Ever since I first arrived at Site-188, I&#39;ve met so many fantastic people. True geniuses in fields I didn&#39;t even know existed six months ago who are making discoveries that could change the universe itself. And here I am struggling to write basic paperwork. It makes me wonder why I even keep coming back here, why I don&#39;t quit and go back to where I was.
&gt; 
&gt; SCP-9618-2: Do you like working in this place?
&gt; 
&gt; Rosen: I do. I don&#39;t regret accepting this position. And I&#39;ve really liked exploring the city above us since I moved here.
&gt; 
&gt; SCP-9618-1: City above us? 
&gt; 
&gt; Rosen: Site-188 is underground for reasons I won&#39;t get into. We&#39;re under a city called Canberra. It&#39;s not the biggest city in the world, and if I&#39;m honest, the nightlife is a bit dull, but I adore it nonetheless. Questacon is one of the silliest places I&#39;ve ever entered, yet I had the most fun I&#39;ve had in months there. The art galleries are divine, and there are so many gardens. Some of them even have lavender. I do so love lavender.
&gt; 
&gt; SCP-9618-1: ...
&gt; 
&gt; SCP-9618-2: ...
&gt; 
&gt; Rosen: Why are you both looking at me with your leaf frowns?
&gt; 
&gt; SCP-9618-2: We don&#39;t like lavender.
&gt; 
&gt; SCP-9618-1: It steals all the room in pots and all the bees, too!
&gt; 
&gt; SCP-9618-2: Plus, they smell.
&gt; 
&gt; Rosen: Oh, sorry for bringing it up. I didn&#39;t know it was a sore subject.
&gt; 
&gt; SCP-9618-2: It&#39;s ok, you didn&#39;t know. And besides, you can like things we don&#39;t like.
&gt; 
&gt; SCP-9618-1: Yeah, and Rose, can you promise me something?
&gt; 
&gt; Rosen: It depends on what the promise is.
&gt; 
&gt; SCP-9618-1: Promise me you&#39;ll be kinder to yourself.
&gt; 
&gt; SCP-9618-2: Much, much kinder.
&gt; 
&gt; Rosen: I am kind to myself. If anything, I&#39;m far too kind.
&gt; 
&gt; SCP-9618-2: I think you think that. And I think that you&#39;re deluding yourself like Skelly does about his supposedly high IQ.
&gt; 
&gt; SCP-9618-1: What he said. 
&gt; 
&gt; SCP-9618-1: Wait a minute... yo—
&gt; 
&gt; SCP-9618-2: Anyway, the point is, Rose, you keep putting yourself down simply for being a bit older. Surely you can admit that&#39;s not the best thing for your self-confidence.
&gt; 
&gt; Rosen: It&#39;s because it&#39;s true. And I see the way people look at me sometimes. The looks of pity like they&#39;re putting up with some old woman who got lost in the supermarket, or the judgment when they expect to hear the words Doctor Rosen and instead they get junior researcher.
&gt;  
&gt; SCP-9618-2: If you won&#39;t promise us anything, will you at least think about what we&#39;ve said? Like how we promised to be fairer to each other?
&gt; 
&gt; Rosen: If it&#39;ll satisfy you both and let us move on from this topic.
&gt; 
&gt; SCP-9618-1: It will.
&gt; 
&gt; Rosen: Ok, I&#39;ll think about it.
&gt; 
&gt; SCP-9618-2: Thank you.
&gt; 
&gt; SCP-9618-1: You&#39;re the best non-plant we know, Rose.
&gt; 
&gt; Rosen: And you guys are the best plants I know.
&gt; 
&gt; SCP-9618-1: Aww, shucks. I feel my leaves turning red on the edges. Or is that crimson? It could be mahogany, too.
&gt; 
&gt; SCP-9618-2: Ugh, can you show us your next document, Skelly? I don&#39;t want to spend the next 10 minutes talking about the colour of your leaves.
&gt; 
&gt; SCP-9618-1: [[[https://scp-wiki.wikidot.com/scp-9618/offset/7| If you insist, spoil leaf.]]]
&gt;</textarea></pre>
