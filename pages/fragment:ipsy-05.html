    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>[[=image https://scp-wiki.wdfiles.com/local--files/ipsylon2x99/alt-title.png]]

[[div class=&#34;blockquote&#34;]]
Merry Christmas! I hope you enjoy your gift. First off though, I would like to say that I&#39;m sorry. I had much much more planned for you initially, but to be entirely honest your artex request was a major challenge for me (lol). Not your fault nor the organizers&#39; fault at all, I just ran into issues trying to come up with something decent.

I couldn&#39;t do a convincing Frutiger Aero nor a Y2k Futurism aesthetic, so I intended to do something with a lot of other Y2K-era aesthetics: vectorheart, gen x soft, metalheart, and some aspects of neo-Y2K. Since I was lacking in the &#34;primary&#34; aspects of the first part of your request, I tried to ensure I would hit the other options. As I haven&#39;t lived in the 90s, for the nostalgic exploration my thought process was to simply emulate a piece of 90s media in order to strike a feeling that wasn&#39;t dependent on being familiar with DSL forums. My course of action then was pulling from anime like Serial Experiments Lain, Neon Genesis Evangelion, and Key the Metal Idol; games like Wipeout Pure, Jet Set Radio Future, and Half-Life. All popular late 90s/early 2000s media that people today still enjoy.

However, I soon ran into issues trying to layer digital utopianism, bittersweet friendship, or even general levity into a story -- mostly a personal issue as I tend not to write that sort of thing. Quite honestly I&#39;m very bad at it. To attempt to remedy this, I workshopped this with some SCP people for almost a month and unfortunately ended up not making much headway. I also didn&#39;t feel comfortable leaning entirely on just what I&#39;m familiar with: in your post you stated that you are &#34;unable to accommodate requests for grimdark, horror, [etc.]&#34; and your incredible art shows an enjoyment of pieces with strong emotion, striking nuance, or character drama. I felt it would be cheating to, even in goodwill, just to lean into my regular &#34;oh everybody&#39;s DEAD&#34; action-lite stuff. I don&#39;t think it&#39;s what you asked for.

From then, I decided on a course of action that may be thought of as shallow, and if you do think so then I do apologize. I tried bringing out the feeling of being a child seeking out older media in the way my gift was formatted: late 90s anime fanpage. I have trawled through many when I was younger and I hoped to bring that moment out. I rationalized it to myself as the embodiment of the idea of all these pages that someone loves a piece of media so much they dedicated decades of their time to upkeep and preservation (looking at you, GearsOnline.net). To me, these feelings that are so strongly conveyed through this data are the heart of technological/digital utopianism.

In the end this tale ended up looking more like a hub. I was additionally planning to write you a script for a single episode (50 pages, about 40 minutes&#39; worth) but due to the limited time I was unable to do this. I do plan on tackling it still. I also want to fill out the Episode Guide and the Plot &amp; Arcs pages as well. This long message is here because while I do think what I gifted was worth giving, I am still unsure if it even &#34;counts&#34; as something that you asked for. I don&#39;t wish to excuse the behaviour if you do think this way, but just to simply explain that I put a lot of thought into it and not for a second did I try to skimp on your gift. I want to make sure I do right by you -- and please don&#39;t feel bad if you do feel cheated or disappointed. I get it.

If you&#39;re not happy with this page, once anonymization has been unveiled, shoot me a DM and we can work something out. You&#39;re an extremely talented artist and your work is freakin&#39; amazing and I think you deserve a solid gift this year. Thanks for being a positive influence in the community.

all the best,
SuperNakaO
[[/div]]
@@ @@

thank you again,
JackalRelated
