__Experiment logs are requested to be written in the following format:__

[[code]]
**Head Researcher:**
**Subject:**
**Material:**
**Equipment:**

**Results:**

**Addendum: (Optional)**
[[/code]]

----

**Head Researcher:** Dr. ██████
**Subject:** Agent ██████
**Book:** __Little House on the Prairie__
**Equipment:** One (1) GPS locator, one (1) two-way radio, one (1) canteen filled with water, one (1) watch, one (1) 9mm semi-automatic with extra cartridges.

**Results:** Upon entry into the affected area, all communications and transmissions immediately ceased. After a period of 5 minutes, Agent ██████ emerged from the door unharmed.  Agent ██████ was dropped in the middle of a prairie with a &#34;green smudge&#34; off to the west (presumably the Verdigris River of the book).  Agent walked towards the river for approximately an hour, before coming across an individual claiming to be Charles Ingalls, who invited him for dinner.  Agent accompanied Ingalls back to his home, a log cabin in the prairie, where he met the rest of his family and discovered SCP-826 sitting on the mantlepiece.  When Agent pointed out SCP-826 to the family, they claimed SCP-826 was not there before, but did not appear concerned about its presence.  Agent then ate dinner with the family, and afterwards asked if he could take the SCP-contained book with him.  The family allowed him to take the book.  Agent proceeded to remove the book from SCP-826, and exit through the cabin door into the research team&#39;s room.  Display time on watch is consistent with Agent ██████&#39;s report that he had spent several hours in the setting.

**Addendum:** Examination of the affected copy of the book reveals an additional paragraph in the book&#39;s mid-section describing Agent ██████&#39;s visit, in language consistent with Laura Ingalls Wilder&#39;s style.  No mention is made, however, of SCP-826; Agent is simply described as having dinner and leaving.  The textual deviation is unique to the affected copy of the book.

**Subject:** Agent █████████
**Movie:**  //The Shining// (DVD)
**Equipment:** One (1) GPS locator, one (1) two-way radio, one (1) canteen filled with water, one (1) watch, one (1) 9mm semi-automatic with extra cartridges, one (1) video camera attached to Agent&#39;s hat
**Results:** After Agent █████████ entered SCP-containing room, GPS and radio proceeded to malfunction as in previous experiment.  After roughly 30 seconds, Agent █████████ exited the room, and gave video camera to research team.  Tape was playable and contained the following footage.

&gt;  Agent █████████ enters into a hotel room from what appeared to be a closet and, after exploring the room and confirming she could not exit through the closet, leaves the room.  Agent continues down hallway and eventually arrives in hotel lobby.  Agent explores behind front desk and enters hotel manager&#39;s office, where SCP-826 sits on shelf beside hotel ledgers.  Agent removes DVD from SCP-826 and exits through office door into research room.

**Addendum:** Examination of DVD copy revealed no major plot deviations, most likely due to the fact Agent did not interact with any of the characters.  Experiment demonstrates that SCP-826 can work on DVDs as well as books.

**Subject:** Agent █████████
**Book:** __The Mammoth Book of Comic Fantasy__, a collection of short stories
**Equipment:** One (1) canteen filled with water, one (1) watch, one (1) 9mm semi-automatic with extra cartridges, one (1) video camera attached to Agent&#39;s headset //(note: use of GPS locator and two-way radio discontinued, due to their uselessness in previous tests)//
**Results:** Agent █████████ returned after seven minutes, having experienced and recorded just over nine hours. Examination of the recorded footage reveals that the Agent experienced a portion of the short story &#34;The Eye of Tandyla,&#34; and was forced to defend himself from temple guards, killing two. This caused the alarm to be raised, and though Agent █████████ was able to retrieve the book from a temple library and escape, the protagonists were apparently caught and executed. The altered copy of the book now reflects this change, although the cause of the alarm is not mentioned, with other stories remaining unaltered. It should also be noted that the book now contains seven fewer pages than a standard, unaltered copy.

Dr. ██████ requests that further experiments be performed with books of short stories, to determine whether the entire book will be experienced, or just a single story, if the book is not recovered from SCP-826 before the story&#39;s end.

------
**Head Researcher:** Dr. Edison
**Subject:** Agent █████████
**Book:** &#34;The Sword That Shoots Laser Beams When You Swing It&#34;, a 3-page short story written by Dr. Edison. The story consists of a poetic description of a sword that shoots laser beams when swung. The story states it stands on a pedestal as thousands of years pass uneventfully.
**Equipment:** One (1) canteen filled with water, one (1) watch, one (1) video camera attached to Agent&#39;s headset.

**Results:** Subject is instructed to retrieve the aforementioned sword, test its &#34;magical&#34; properties, and then bring it out. Subject enters door, and returns five minutes later with the original story, and sword.  Testing proved that sword, when swung in an arc greater than 45 degrees, emits a beam of radiation consistent with the output of a CO2 laser.  Sword has since been assigned to Dr. Edison for further study to determine energy source, laser medium, and optical resonators.

Video logs show that the sword in question matched textual descriptions (including the ability to shoot &#34;Laser Beams&#34;), and that Agent █████████ did indeed bring the sword with him. The story itself remains unchanged, except for a paragraph about a man matching Agent █████████&#39;s description stealing the sword and taking it to &#34;Parts Unknown&#34;. Sword has been dubbed SCP-826-1.

**Addendum:** Scientific testing has proven inconclusive. Molecular analysis shows that SCP-826-1 has a molecular structure consistent with laser printer paper (the medium original story was printed on), yet behaves like high-grade steel in all other respects. The &#34;Laser Beam&#34;, on the other hand, acts like a CO2 laser in all respects but speed, which is clocked at a mere 60 km/h, far slower than conventional lasers. Attempts to collect this energy have proven futile, as energy dissipates within █.██ seconds regardless of hitting a target. 

Of further note, Agent █████████ has come under the delusion that he is a man named &#34;Galthor&#34; from the kingdom of &#34;Zolgorn&#34;. Agent █████████ has insisted on the return of SCP-826-1 to his homeland, and to be released from whatever &#34;foul sorcery&#34; he has been placed under. All attempts at treatment have proven futile. Dr. Edison requests that all further testing with SCP-826 is to be done by D-Class subjects.

**Addendum 2:** At precisely ██:██:██ on ██/██/██ (exactly 72 hours from Agent █████████&#39;s last trip into SCP-826), Agent █████████ and SCP-826-1 simultaneously disappeared. No trace has been found of the two, and Agent █████████&#39;s existence has been stripped from all Foundation records, including backup copies. The story used in the test in all aspects identical, barring a mention that the man&#39;s name was &#34;Galthor&#34;. Once again, Dr. Edison suggests that further testing of SCP-826 is to be done by D-Class subjects.

**Subject:** D-826-01
**Book:** &#34;The Sword That Shoots Laser Beams When You Swing It&#34;, a 3-page short story written by Dr. Edison. Same copy that resulted from previous test, alterations and all.
**Equipment:** One (1) canteen filled with water, one (1) watch, one (1) video camera attached to Subject&#39;s headset, one (1) Police issue X26 Taser (loaded).

**Results:** Subject is asked to retrieve Agent █████████. Subject does not return after five minutes.  Agent C██████  enters SCP-826 and retrieves the story without incident. Story now has additional details on a &#34;man in strange garb&#34; trying to stop Agent █████████ with a &#34;magic weapon hereby unknown to man&#34;, which matches a description of X26 Police Tazer. Story then describes Agent █████████ injuring D-826-01 with SCP-826-01 before &#34;locking him in the foulest of dungeons in Castle Hyleth&#34;. Recovered footage confirms incident.

**Subject:** D-826-02, D-826-03, D-826-04, D-826-05, D-826-06, and D-826-07, all of whom have military training.
**Book:** &#34;The Sword That Shoots Laser Beams When You Swing It&#34;, a 3-page short story written by Dr. Edison. Same copy that resulted from previous test.
**Equipment:** Six (6) canteens filled with water, six (6) watches, six (6) video cameras attached to Subjects&#39; headsets, six (6) Police issue X26 Tasers (loaded).

**Results:**  Subjects given successfully apprehend Agent █████████ and D-826-01, leaving SCP-826-01 behind. Story acknowledges all changes, describing &#34;six rogues&#34; who &#34;clamored to avenge the blood of their fallen brother&#34; capturing Agent █████████.

**Addendum:** Agent  █████████ still experiencing pathological delusions, and remains convinced that he is a Knight named &#34;Galthor&#34;. Likewise, D-826-01 claims to be a &#34;Blood Wizard&#34; named &#34;Rohthmorn&#34;, seeking to claim SCP-826-01 to himself. D-826-01&#39;s X26 taser has turned into a &#34;Magic Staff&#34; capable of shooting &#34;Lightning&#34;, and is hypothesized to have physical properties similar to SCP-826-01. Item has been labeled SCP-826-02, and has been sent to Site ██ for further testing. Also, Subjects D-826-02, D-826-03, D-826-04, D-826-05, D-826-06, and D-826-07 are now claiming to be &#34;Knights of the Throne&#34; sent to aid &#34;Galthor&#34;.


**Addendum 2:** As in the previous experiment, Agent █████████, Subjects D-826-02, D-826-03, D-826-04, D-826-05, D-826-06, and D-826-07, and SCP-826-02 disappeared at ██:██:██ on ██/██/██ (again, exactly 72 hours from exiting SCP-826). Story now says that &#34;Galthor&#34; was indeed accompanied by 6 &#34;Knights of the Throne&#34;, who were armed with &#34;Arcane Weapons&#34; given to them by the good wizard &#34;Edisongrad&#34;. All researchers that had been handling SCP-826-02 or SCP-826 are accounted for.  Further monitoring of researchers handling objects from SCP-826 is recommended.


//Okay, seriously: How did that thing know my name? I&#39;m sure I didn&#39;t tell it to either of the agents, and I&#39;m damn sure that I didn&#39;t tell any of the subjects. I know this turns up so much in our line of work that it&#39;s kind of cliché, but I think the thing might just be sentient...// -- Dr. Edison

------

**Head Researcher:** Dr. Aaron Torres
**Subject:** D-87631
**Material:** A copy of &#34;A Game of Thrones&#34; by George R.R Martin.
**Equipment:** One (1) Military-grade sabre

**Results:** The purpose of the test was to determine how significantly SCP-826 will allow alterations to the main storyline. Test subject was instructed to disembowl the first person it saw in the work. Upon entering, subject found itself in a circular room, alone with the character Lord Eddard Stark, who was unarmed. Subject attempted to stab Stark, but tripped and fell before he could do so. Subject recovered and tried multiple times to approach Stark, but tripped on multiple inconveniently placed objects. Subject eventually managed to stab Stark, but apparently only gave a minor wound. Subject retreated from the room and eventually found the book in a library within the castle.

Upon retrieval, the text itself had not been significantly altered. The only recorded changes to the text were multiple new paragraphs regarding an attempt on Stark&#39;s life by &#34;a rather unintelligent and bumbling assassin&#34;. Presumedly, SCP-826 will adjust settings and events in minor ways to prevent major changes to the work&#39;s core continuity.

----

**Head Researcher:** Dr. King
**Subject:** D-48279
**Material:** The Odd Couple, by Neil Simon
**Equipment:** One (1) head mounted camera.

**Results:** Subject arrived in a landscape consistent with Pioneer-Era America. He encounters a man traveling down a road, matching historical descriptions of Jonathan Chapman, who greets the subject, and continues walking. Subject sees SCP-826 in the branches of a nearby tree, then returns to the testing chamber through a passage in the hollow of said tree. The book originally placed in SCP-826 is found to have been replaced with a modified copy of &#34;Johnny Appleseed&#34; by Rosemary Carr Benét.

----

**Head Researcher:** Dr. Praetorious
**Subject:** D-21094
**Material:** Death by the Book, by Julianna Deering
**Equipment:** One (1) canteen filled with water, one (1) watch, one (1) video camera attached to Test Subject&#39;s headset

**Results:** Upon entering, the test subject returned after 15 minutes. After interviewing the subject and reviewing the footage it was discovered that the beginning of the novel was the first location found by the subject, being the murder scene that is investigated by the main characters and sets the stage for the remainder of the book. The characters, being from a 1930’s period piece, reacted inquisitively to the D-class’ alien clothing and behavior, but did not impede the subject’s examination of the surroundings. In fact at one point the investigator, Chief Inspector Birdsong, interpreted the orange jumpsuit worn by the subject as meaning they were from the coroner’s office, and encouraged them to wait nearby until he was finished examining the crime scene.

It was at this time that video showed the murder weapon used in the crime and sitting next to the body, originally written as a marble bookend shaped like a bust of William Shakespeare, was in fact one half of SCP-826. The novel that had been entered was lying on the floor, roughly half-way between the “murder weapon” and the other half of SCP-826. The test subject immediately retrieved the novel, despite the protests of the characters, and exited the novel before they could react.

Upon examination, the novel now contained an additional character to the first chapter described as an “opportunistic thief” who took advantage of the crime to “pilfer the belongs of the deceased”. Of special note is that the murder weapon was now a “handsome bookend of particular high quality”.

This is the first reported incident of SCP-826 integrating itself into the plot of a novel. It might be an indicator of sentience or merely the narrative taking advantage of the fact that the SCP is identical to an item already in the novel. More testing is suggested.

**Head Researcher:** Dr. Corn
**Subject:** D-6187
**Material:** An Attempt to Deal With a Problem,&#34; a four page booklet that details the adventures of a small boy who finds a stick which instantly and permanently kills any lizards it comes in contact with
**Equipment:** One (1) head mounted camera.

**Results:** D-6187 did not return and no video stream was received by the designated receiver. Upon the conclusion of the book 3 days, 14 hours, and 15 minutes later, no characters matching the description of Subject were found within the text of &#34;An Attempt to Deal With a Problem.&#34; The phrase &#34;Nice Try&#34; was written in red ink and 92.6 pt comic sans font across the second page.

**Head Researcher:** Dr. Curbatov
**Subject:** D-1916
**Movie:** Snow White and the Seven Dwarfs&#34; (DVD)
**Equipment:** One (1) human heart
**Results:** D-1916, thirty - year-old white woman, went through several plastic surgeries that made her a copy of Scarlett Johansson, a famous actress.
The purpose of the experiment was whetherSCP-826 could allow an outside subject to take the place of the main character of the plot if it turned out to be more suitable for the conditions forming the plot. In this case, it was checked whether D-1916 could be more beautiful than Snow White. 
Since D-1916 was not a princess, the Queen didn&#39;t send her to the forest with a Hunter. Instead, she ordered D-1916 to be executed for the attempted murder of the Queen and the dismemberment of an unknown nobleman. The heart given to D-1916 was used as evidence of dismemberment. After that, the plot goes almost unchanged, although the Hunter mentions &#34;that criminal&#34; and that Snow White can expect the same outcome as her.

**Subject:** D-3721
**Movie:** Snow White and the Seven Dwarfs&#34; (DVD). Same copy that resulted from previous test, alterations and all.
**Equipment:** One (1) Police issue X26 Taser (loaded).
**Results:** D-3721 is asked to save D-1916. After D-1916 was rescued, the disk was shattered. At the same moment, D-1916 was torn apart, after which she disappeared.
**Addendum:** //Unfortunately, even the destruction of the data carrier cannot save &#34;incorporated&#34; victims// -- Dr. Curbatov

**Subject:** D-2380
**Material:** &#34;No more diseases&#34;, a short story about a box full of SCP-500, which stands in an abandoned hunter&#39;s house on a hill near the forest in which no animal lives for a long time, since the hunter shot everyone, and then died of hunger himself. The plot emphasizes that the hunter used SCP-500 to cure any disease.
**Equipment:** One (1) head mounted camera.
**Results:** The purpose of the experiment was to test whether objects pulled from history could be used for practical purposes.
The subject was instructed to pick up a box of SCP-500 and take the box with him.
The effect of SCP-500 was tested on two rabbits, two foxes and two wolves. A personal file was created for each animal with a small dossier and a story about the purchase of these animals by the Fund. Exactly 72 hours later, box full of SCP-500, D-2380 and the animals disappeared along with their personal files.
In the story there was a mention that the son of a hunter lives in a hunting lodge for whom the hunter gave all the food when he could no longer find animals in the forest. The son of a hunter walks through the forest and watches foxes, wolves and rabbits and makes a promise to himself that he will not let them die, so as not to repeat his father&#39;s mistakes, but will start gardening using SCP-500 so that the plants do not get sick.

**Subject:** D-1262
**Material:** &#34;The Midas Rod&#34;, a short story about a stick with a silver knob that turned lead into gold if touched with the knob.
**Equipment:** One (1) head mounted camera.
**Results:** The subject took the Midas Rod and left the story.  The rod was tested on three (3) lead ingots. The transformation was successful.  One (1) ingot was melted together with an ordinary gold ingot, thoroughly mixed and poured into molds. One (1) ingot was crushed by a hydraulic press. One (1) ingot was melted into a ring.
After 72 hours, two (2) gold ingots, one (1) gold plate, one (1) gold ring and D-1262 disappeared. In the text appeared a mention that the rod was found by a man with the name &#34;Anch urus&#34;, who began to use it for his own benefit. Buying lead scrap, he turned it into gold, melted it down and sold it. Ingots, a plate and a ring are also mentioned in the text.

**Addendum:** //This proves that any changes made by items from the story will be incorporated into the story&#39;s final version.// -- Dr. Curbatov

**Subject:** D-3126
**Movie:** Antz
**Equipment:** One (1) canteen filled with water, one (1) watch, one (1) video camera attached to Test Subject&#39;s headset, one (1) motorbike
**Results:** The subject is instructed not to come into contact with ants or termites until the picnic scene. 
A new scene has appeared in the movie. D-3126 rides up to Zed and Bala on a motorcycle. They were surprised by appearance of D-3126 and his transport, but D-3126 immediately left.
**Addendum:** //Interesting. This movie was chosen because the main characters in it are ants, and at the same time there are people to some extent. The purpose of the experiment was to check whether D-3126 would be the size of an ant or the size of a man.// -- Dr. Curbatov

**Subject:** D-3088
**Movie:** A video recording of D-3631, D-1716 and D-3088 discussing a football match for ten minutes. At the beginning of the video, D-3088 enters the room.
**Equipment:** One (1) video camera attached to Test Subject&#39;s headset
**Results:** The subjects were surprised by two D-3088 in the same room, but did not prevent the real D-3088 from taking the book.
It seems that real people can&#39;t be integrated into the video with their participation, as this would disrupt the plot.

**Subject:** D-3631
**Movie:** A disc with a video recording of D-1716 entering the room with SCP-826 on the table and taking the disc
**Equipment:** One (1) video camera attached to Test Subject&#39;s headset
**Results:** There were two SCP-826 on the table instead of one. D-3631 took one of the disks and left the room. He was monitored for 72 hours. D-3631 was not integrated into the plot of the video.
It seems that the object cannot integrate itself into a plot where it already exists.

**Subject:** D-3323, D-4434
**Material:** &#34;The Adventure of the Golden Pince-Nez&#34; by Sir Arthur Conan Doyle
**Equipment:** One (1) head mounted camera.
**Results:** Before the experiment began, all known information about D-3323 was collected into one file, after which a copy of this file was made. In the copied file, the name of D-3323 was replaced by name of D-4434. Both files were printed out.
D-3323 returned with pince-nez twenty minutes later and was placed under surveillance. Three days later, he disappeared with his pince-nez. The electronic file about D-3323 was damaged and could not be opened, and the paper copy of the file became blank sheets. At the same time, the files with name of D-4434 remained intact.

**Subject:** D-4434
**Material:** &#34;The Adventure of the Golden Pince-Nez&#34; by Sir Arthur Conan Doyle
**Equipment:** One (1) head mounted camera.
**Results:** Before the experiment began, all known information about D-4434 was collected into one file, after which this file was printed out.
D-4434 returned with pince-nez twenty minutes later and was placed under surveillance. Three days later, he disappeared with pince-nez. The electronic file about D-4434 was damaged and could not be opened, and the paper copy of the file became blank sheets. At the same time, the files describing D-3323, in which name of D-3323 name was replaced by name of D-4434, remained intact.
**Addendum:** //Apparently, SCP-826 erases any truthful information that could confirm that the person embedded in the plot ever existed. At the same time, this effect doesn’t work with information that has been deliberately changed to make it false.// -- Dr. Curbatov

----

**Head Researcher:** Dr. Stanley 
**Subject:** D-2154
**Material:** &#34;Warriors: Into the Wild&#34; by Erin Hunter
**Equipment:** One (1) camera attached to the subject&#39;s headset, four (4) days&#39; worth of rations, one (1) pocket knife. 

**Results:** The point of this experiment was to determine if animals speaking in their own languages that are (fictionally) translated to English would be translated to D-2154. Subject did not have any previous history with the &#34;Warriors&#34; book series and was given no information prior to the test beginning. 
Subject found themself in the house described to the reader by the character &#34;Rusty&#34;, having taken the place of his owner. As described in the original novel, Rusty disappeared a day after D-2154 let him into their yard. However, diverting from the plot, once he didn&#39;t return D-2154 ventured into the woods behind the house to look for him. Camera footage shows that the subject encountered a group of cats, including Rusty, on patrol around the outskirts of the forest. Frantic meowing was heard before they turned tail into the trees. 
Subject spent the rest of the runtime in the house that Rusty&#39;s owners would have lived in, mostly watching television. Review of the book upon retrieval revealed that &#34;Firepaw&#39;s twolegs&#34; came looking for him, but he, Bluestar, Greypaw, and Lionheart all escaped unscathed.&#34; 

**Addendum: (Optional)** //&#34;I&#39;m more surprised that nobody thought of this first than I am by the fact that cats dont speak english.&#34;// — Dr. Stanley


----
**Head Researcher:** Dr. Lombardi
**Subject:** D-37352
**Material:** A video recording of D-82493 holding &#34;The Lion King&#34; (DVD). She has been instructed to trade this DVD to D-37352 for an identical copy.
**Equipment:** &#34;The Lion King&#34; (DVD) - the same copy featured in the video recording. 
**Results:** Subject encountered D-82493 and traded DVDs without issue. D-37352 returned shortly thereafter.
**Addendum:** Item has remained stable after 72 hours, despite having emerged from the narrative. Content is identical to compared to control DVD. Molecular analysis of item&#39;s structure shows no anomalous properties.

//We&#39;ve been focused on taking things from SCP-826, but have never tried a trade. This experiment equalized value and mass. Further testing is needed to see how those variables can be adjusted.// -- Dr. Lombardi

----

**Head Researcher:** Dr. Chair
**Subject:** D-0406
**Material:** A copy of the file for SCP-826 with a copy of the extended Experiment Log attached.

**Equipment:** One (1) 9mm semi-automatic with extra cartridges and one (1) camera attached to the subject&#39;s headset.

**Results:** The item was placed between SCP-826. Personnel overseeing the experiment waited 72 hours for the anomalous properties of SCP-826 to manifest, although no change was observed in the room. Testing was considered aborted, and the item was removed from SCP-826.

**Addendum:** [DATA EXPUNGED]

[[collapsible show=&#34;PLEASE ENTER LEVEL 5 CREDENTIALS OR PATAPHYSICS DEPARTMENTAL ID NUMBER.&#34; hide=&#34;CREDENTIALS RECOGNIZED.&#34;]]

&gt; **Addendum from Dir. Placeholder McDoctorate of the Pataphysics Department:** Immediately following the test item&#39;s removal from SCP-826, an individual identical to D-0406 in physical appearance emerged from a closet in a storage room in Site-57. This individual requested to be given access to SCP-826, which was denied. They were then designated PoI-826-0406 and placed in containment.
&gt; 
&gt; PoI-826-0406 claimed to be employed by an alternate version of the Foundation, and to have been sent into our reality with the purpose of retrieving SCP-826. They claimed to have been instructed to remove the testing material from SCP-826, and then exit from the nearest door into the &#34;real world&#34;. 
&gt; 
&gt; Following a site wide search, a pair of bookends identical to SCP-826 in composition was found resting in the Site-57 archives. The file for SCP-826 with the full testing long attached was recovered between the items. This item was designated SCP-826-02, and the original item was redesignated to SCP-826-01.
&gt; 
&gt; Roughly three days after this incident, SCP-826-01&#39;s containment room underwent radical modifications and was spontaneously transformed to the setting of the __Little House on the Prairie__. PoI-826-0406 began showing symptoms of severe amnesia, claiming that he had always been employed by our universe&#39;s version of the Foundation, and having no memory of the incident which led to his retrieval by Foundation personnel. The day following this incident, a second individual (PoI-826-01), identical to Agent ██████ in physical appearance, emerged from the same closet in Site-57 and was recovered by on-site agents. PoI-826-01 demanded to be given immediate access to SCP-826-02 and the written material recovered along with it. 
&gt; 
&gt; This request was granted by O5 Command. SCP-826-02, the recovered testing material and PoI-826-0406 were all handed over to PoI-826-01, who thanked Foundation personnel and proceeded to vanish immediately after exiting from a nearby door. Immediately after PoI-826-01&#39;s disappearance, SCP-826-01&#39;s containment room returned to normal and SCP-826 was recovered from it without any further incident.
&gt; 
&gt; I understand that this test was the idea of a &#34;Doctor Alan Dafydd Chair&#34; currently employed at Site 57. Considering the mass hysteria and the immeasurable amount of paperwork unleashed by this incident, I am officially requesting Dr. Chair to be reassigned and denied all access to SCP-826 indefinitely. I do not care how many &#34;great ideas&#34; for tests we could conduct using SCP-826 he has, and if I were to quote a significant number of my colleagues which I talked to regarding this manner, I&#39;d say it&#39;s for the greater good if we are to tell Mr. Chair to go and [EXPLETIVE REDACTED] themselves if he keeps putting forward complaints about this issue. In addition to this, given his recent unprofessional additions to [[[experiment-log-423-a | other testing logs]]] which were also known for causing trouble, O5 Command ought to seriously consider banning Dr. Chair from contributing to any more test logs indefinitely.
&gt; 
&gt; Signed,
&gt; 
&gt; Dr. Placeholder McDoctorate, Department of Pataphysics

**Head Researcher:** Dr. Lang
**Subject:** Agent ██████, Dr. Lang
**Material:** __Ultimate Terrestria__, a young adult fantasy novel
**Equipment:** 12 kg of lab-grown pearls
**Results:** Agent ██████ did not emerge from SCP-826 for 96 hours and was assumed to have been &#34;incorporated&#34; into the story. Subsequently, Dr. Lang entered near the middle of the novel and successfully retrieved SCP-826 within a few minutes.

Examination of the affected copy of the book revealed that a traveling merchant from early in the book was replaced by Agent ██████. After being rescued from bandits, Agent ██████ continued to the city of Bellezze and became known as the &#34;Pearl Princess&#34;. 

Agent ██████ is not mentioned again until the nontraditional epilogue, a collection of scenes of the fates of various background characters. The &#34;Pearl Princess&#34; is stated to have &#34;brought succor to exhausted heroines&#34;, &#34;showed the way through the Angel Catacombs&#34;, &#34;acquired the vast wealth of the White Mansion&#34;, and &#34;was generously worshipped for eons as a legend&#34;. 

Dr. Lang was not able to find or retrieve Agent ██████.

**Subject:** D-42487
**Material:** &#34;A complex test&#34;, an altered version of &#34;A simple test&#34; where instead of simply standing in a room, the woman watches the DVD on a TV.

**Head Researcher:** Dr. Lombardi
**Subject(s):** Dr. Lombardi and Agent Hadlin
**Material:** Night at the Museum (DVD)
**Equipment:** - One (1) video camera, $2,000 USD (bills dated pre-2006)

**Results:** Upon entry into the plot, subjects emerged in the American Museum of Natural History during daytime operating hours. Initial reconnaissance located SCP-826 in the museum&#39;s research library. Subjects opted not to retrieve the item at that time.

Subjects waited until Larry Daley&#39;s first night shift as security guard, having mapped his patrol route from their knowledge of the film.

At approximately 18:30 narrative time, subjects successfully retrieved SCP-826 from the library but deliberately left the DVD media in place to maintain their connection to the fictional environment. Dr. Lombardi relocated to a research office with SCP-826 while Agent Hadlin maintained surveillance of the DVD.

At sunset, consistent with the film&#39;s established rules, SCP-826 became animated along with the museum&#39;s other exhibits. Dr. Lombardi conducted an interview with the now-animate bookends. Of particular note was the manner in which the bookends communicated - operating as a single consciousness speaking through two vessels, with one bookend often completing sentences started by the other. Despite this unified communication, the bookends displayed distinct emotional reactions to each other&#39;s statements.

[[collapsible show=&#34;Interview Log Excerpt 826-L1&#34;]]

&gt; **&lt;Begin Log&gt;**
&gt; //Note: For clarity, the dialogue of each bookend has been consolidated under &#34;SCP-826&#34;.//
&gt; 
&gt; **SCP-826:** Very clever, doctor. What an interesting experience. I promise to be honest and forthcoming, although you aren&#39;t going to like my first two answers.
&gt; 
&gt; **Dr. Lombardi:** You&#39;re not going to tell me if you are sentient?
&gt; 
&gt; **SCP-826:** On the contrary. I am sentient if the narrative says I am. Here, the magic of the &#39;Golden Tablet of Ahkmenrah&#39; animates my form and provides sentience. And this //delightful// personality.
&gt; 
&gt; **Dr. Lombardi:** Right, but out in my world. Are you sentient there?
&gt; 
&gt; **SCP-826:** That does not change anything. If the story is that I am sentient, then I am sentient.
&gt; 
&gt; **Dr. Lombardi:** Sentience isn&#39;t what a narrative declares. It&#39;s about being aware - about making your own decisions.
&gt; 
&gt; **SCP-826:** I know everything you are going to do - what would that say about your sentience?
&gt; 
&gt; **Dr. Lombardi:** //(tersely)// Moving on... You&#39;re not going to reveal how you do what you do? Create these worlds?
&gt; 
&gt; **SCP-826:** I could tell you. I could //teach// you. But then this interview will end up redacted, and you&#39;ll end up amnesticized or contained. Let&#39;s save ourselves the trouble.
&gt; 
&gt; **Dr. Lombardi:** I can appreciate that. Why weren&#39;t we allowed to obtain possession of &#39;The sword that shoots laser beams when you swing it&#39;?
&gt; 
&gt; **SCP-826:** Because it would be bad writing. I won&#39;t inflict that upon your story. Can you imagine? The Foundation just getting whatever fantastical thing they need out of a bunch of sloppily-written short stories?
&gt; 
&gt; **Dr. Lombardi:** But some things can come in and out. We&#39;ve done trades before. Every test subject can at least exchange air - sometimes even had meals. What are the rules, exactly?
&gt; 
&gt; **SCP-826:** There is only one rule - &#34;is the writing good?&#34;
&gt; 
&gt; **Dr. Lombardi:** But the 72-hours. Not changing the nar-
&gt; 
&gt; **SCP-826:** //(interrupting)// Those are guidelines. Consistent guidelines are good writing. It&#39;s easier for an audience to follow.
&gt; 
&gt; **Dr. Lombardi:** So we could recover our agent if the reason and writing was compelling enough?
&gt; 
&gt; **SCP-826:** Why would you want to?
&gt; 
&gt; **Dr. Lombardi:** Excuse me?
&gt; 
&gt; **SCP-826:** He was just another nameless agent in your massive shadow organization. But now, he is &#39;Galthor&#39;, heroic Knight in service of a wizard and protector of incredible artifacts. Why would you want to take that life from him?
&gt; 
&gt; **Dr. Lombardi:** I&#39;m sure his family doesn&#39;t see things that way.
&gt; 
&gt; **SCP-826:** //(takes a distinctly darker tone)// Are you saying that in the future when I must correct the narrative that I should use a larger footprint? Make sure to take family and friends as well? Coworkers?
&gt; 
&gt; **Dr. Lombardi:** Point taken - forget I said anything.
&gt; 
&gt; **Dr. Lombardi:** Actual mechanics aside - why are you able to do what you do?
&gt; 
&gt; **SCP-826:** I gain dominion over any narrative that passes between my threshold.
&gt; 
&gt; **Dr. Lombardi:** Threshold being your physical form?
&gt; 
&gt; **SCP-826:** And the world I reveal. That&#39;s how you are experiencing it right now.
&gt; 
&gt; **Dr. Lombardi:** You are implying that everyone that experiences your worlds are stories. Humans aren&#39;t stories - they&#39;re living, breathing creatures.
&gt; 
&gt; **SCP-826:** You can be both. Your DNA is a record of the history of your species. Your epigenetics contains the struggles of your family line. And in your head? The stories of your life. Even the tools you carry around speak to the society that built them. You are stories, made of stories, using stories to create new stories.
&gt; 
&gt; **Dr. Lombardi:** Well based on that logic we could just stick both ends of you on someone&#39;s head and enter their life.
&gt; 
&gt; **SCP-826:** //(voice perks up with an unsettling quality)// Now...wouldn&#39;t that be an interesting experiment?
&gt; 
&gt; **SCP-826:** Sadly, I believe our interview is coming to an end. I don&#39;t recommend trying to repeat this.
&gt; 
&gt; **Dr. Lombardi:** Why is that?
&gt; 
&gt; //(SCP-826 motions towards the window, revealing Agent Hadlin pursuing several Capuchin monkeys in possession of the DVD)//
&gt; 
&gt; **Dr. Lombardi:** Shit!
&gt; 
&gt; //(Recording becomes unstable as Dr. Lombardi exits the room in pursuit. End of intelligible dialogue.)//
&gt; 
&gt; **&lt;End Log&gt;**
[[/collapsible]]

 Dr. Lombardi was forced to terminate the interview to assist in recovery operations. Both subjects successfully exited the narrative after retrieving the DVD, though they sustained multiple minor injuries (primarily bites and scratches) from their encounter with the animated exhibits.

**Addendum:** Review of the altered DVD shows minimal changes to the background events of the film, with only brief glimpses of two unnamed museum visitors (presumed to be the research team) visible in some scenes.


//As tempting as it is, we can&#39;t take the interview as gospel.  It could just be what 826 wants us to think it would say, or how it would be written to speak in a movie.// -- Dr. Lombardi

**Head Researcher:** Dr. Alexander Cuco

**Note:** The following tests were performed to see which types of information storage can be affected by SCP-826 apart from books and DVDs. 

**Subject:** Agent Cobra 
**Material:** The Lion King (VHS) 
**Equipment:** One (1) head mounted camera, one (1) standard canteen, one (1) 9mm semi-automatic with extra cartridges. 

**Results:** Agent Cobra appeared in a section of the Shadowland. Agent Cobra traveled towards the Pride Lands, which he did without issues except for a confrontation with a talking hyena that Agent Cobra killed with his 9mm. After reaching the Pride Lands, Agent Cobra traveled towards the baobab tree where the character of Rafiki lives. When asked about his intent of going specifically there, Agent Cobra stated that he felt a &#34;pull&#34; towards that location. After arriving, he was intercepted by Rafiki, who, according to the agent, referred to him as a &#34;fellow traveler&#34; and a &#34;fellow primate&#34; before giving him the VHS, referring to it as a &#34;magical box.&#34; 

Analysis of the movie revealed the only major change to be the unexplained absence of the hyena character Ed. 

**Addendum:** //At least we now know it also works with VHSs, but the interaction of Agent Cobra with the mandrill was very unusual. I believe this is the first case of a character directly interacting with SCP-826. I recommend more tests with equally &#34;mysterious&#34; and &#34;mystical,&#34; for lack of a better term, characters.// - Dr. Cuco

//Also, I must specify a detail that hasn&#39;t been brought up on this test log yet: when a Subject enters a narrative, they take the form of the appropriate animation style, be it live action, stop motion, animated, etc.//- Dr. Cuco

**Subject:** Agent Cobra
**Material:** &#34;My Inmortal,&#34; a fanfiction set in the Harry Potter universe written by fanfiction.net user &#34;XXXbloodyrists666XXX.&#34; The story was contained in an otherwise empty flash drive. 
**Equipment:** One (1) head mounted camera, one (1) standard canteen, one (1) 9mm semi-automatic with extra cartridges, one (1) metal cross, two (2) wooden stakes, multiple vials of holy water.[[footnote]] //I&#39;ve been informed that vampires are prevalent in this narrative.// - Dr. Cuco[[/footnote]]

**Results:** Agent Cobra appeared inside Hogwarts, whose interior was revealed to be heavily distorted and contradictory. Agent Cobra traveled towards the Hogwarts library, believing that was the most likely place for SCP-826 to manifest. During the way there, Agent Cobra came across a multitude of characters acting in bizarre ways, including public fornication and cannibalistic actions. Agent Cobra was ignored by the characters. 

Just before Agent Cobra arrived at the library, he was confronted by a character in strange clothing later identified as &#34;Ebony Dark’ness Dementia Raven Way.&#34; She tried to bite Agent Cobra throat while insulting him in broken English. Agent Cobra was able to fend her off using the cross[[footnote]] //Actually, the cross probability didn&#39;t have any effect since the main character wears two crosses as earrings.// - Junior Researcher Pupa[[/footnote]] [[footnote]] //Why are you so knowledgeable about this?// - Dr. Cuco [[/footnote]] and multiple vials of holy water. Agent Cobra then entered the library and successfully found the flash drive, returning shortly after. 

Analysis of the text revealed an alteration to chapter 10, including the mention of a &#34;stpid prep&#34; that attacked the main character on her way to practice with her band &#34;Bloody Gothic Rose 666.&#34; 

**Addendum:** //I&#39;m not really sure what happened, but at least we know it works in flash drives as well. On top of this, by what I&#39;ve been told, the Hogwarts library isn&#39;t mentioned in &#34;My Immortal.&#34; More tests with other derivative works are recommended, although by using less strange testing material. I also recommend testing with flash drives holding multiple narratives.// - Dr. Cuco

**Subject:** Agent ████[[footnote]] //Agent Cobra refused to continue testing. Can&#39;t say I blame him.// - Dr. Cuco[[/footnote]]
**Material:** A phonograph cylinder[[footnote]] Phonograph cylinders are the earliest commercial medium for recording and reproducing sound. These hollow cylindrical objects have an audio recording engraved on the outside surface, which can be reproduced when they are played on a mechanical cylinder phonograph. [[/footnote]] holding a recording of Dr. Cuco reciting &#34;Mary Had a Little Lamb&#34;. 
**Equipment:** One (1) head mounted camera, one (1) standard canteen. 

**Results:** Agent ████ appeared in a prairie. He traveled towards a school in the distance where he could see a group of kids playing with a lamb. Agent ████ successfully sneaked into the school where he found the phonograph cylinder. 

Analysis of the structure of the cylinder showed alterations to the groove. Playing it revealed an alteration in the fourth verse, adding the mention of a mysterious man that sneaked into the school while everyone was distracted by Merry&#39;s white sheep. The newly added text maintained the original rhyme. 

**Addendum:** //It&#39;s a very eerie feeling hearing your own voice say something you have never said. But I would call this whole test a success and would like to propose further testing with different information recording mediums.// - Dr. Cuco

**Head Researcher:** Dr. Lombardi


**Note:**  The objective of this test is to determine if a subject can exit the narrative via an in-universe mechanism without terminating the experiment.

**Subject(s):** D-4729
**Material:** Blues Clues Season 1 (DVD)
**Equipment:** - Photograph of research room adjacent to testing chamber (Room B-12)

**Results:** D-4729 was shown two episodes of Blues Clues to familiarize them with the &#34;Blue Skidoo&#34; mechanism, where characters enter pictures or objects by chanting &#34;Blue Skidoo, we can too!&#34;.  They were instructed to enter the testing chamber and &#34;Blue Skidoo&#34; into the photograph of Room B-12.  Subject was understandably skeptical of this request.

Approximately 15 minutes after entering the test chamber, the DVD materialized in Room B-12.  D-4729 emerged from a screenshot printed on the back of the case moments later. Presumably due to the media and test subject being removed from SCP-826 (however unorthodox), the test chamber reverted to its original state thereafter.

Analysis of the DVD revealed significant changes to Episode 4. The original plot is replaced with a new narrative where Steve and Blue hear a loud crash in the kitchen, caused by D-4729 attempting and failing to leap into the photograph. The episode revolves around playing Blue’s Clues to determine what D-4729 needs to skidoo successfully. Clues collected are: a mirror, a smile, and a thumbs-up. The episode concludes with Steve determining D-4729 needs &#34;self-confidence&#34;, after which D-4729 successfully enters the photograph at the 15-minute mark, exiting the episode. Subject&#39;s personality was notably simpler in the episode, seemingly unconcerned with his strange surroundings.

//Here&#39;s the dilemna; we ran this test under the assumption it was a physical law of the Blues Clues&#39; universe that one could teleport by leaping into pictures.  The episode however, presented it as a skill one could learn.  Which means we may have just imparted our D-class with an anomalous power.  We know 826 will reclaim anyone that removes an object from the fictional reality, if it breaks the narrative - but we have no idea what the rules are for powers. D-4729 is insistent they can&#39;t teleport out here - but obviously we can&#39;t take their word for it.  We&#39;re going to keep them isolated from any imagery or media until amnestics gets here.// - Dr. Lombardi

**Addendum:** Approximately 2 hours later, D-4729 escaped Foundation custody by &#34;Blue Skidooing&#34; into the exposed tattoo of Junior Security Officer Hayes, in violation of dress protocol. Tattoo was in the likeness of Hayes&#39; girlfriend, who reported a matching tattoo develop on her ████████ and a strange man spiral out it.  He was then reported to have leapt into her phone background (a photo from a recent beach trip). D-4729 was later spotted on security cameras in ████████, approximately 1,000 miles from the site.

After a 60 hour search, Agent Little located D-4729 at a resort in ████████, CA.  Suspect was apprehended and amnesticized without further incident.

72 hours after testing, D-4729 and all media for teleportation vanished, including Junior Security Officer Hayes and his girlfriend.  Subsequent episodes of the DVD now include D-4729 as a pesky thief archetype, constantly stealing photos and being foiled by officer Hayes and his partner.

//This has been a disaster.  I cannot understate the danger of abilities leaking out of narratives. There has to be a way to mitigate this problem...// - Dr. Lombardi

**Head Researcher:** Dr. Alexander Cuco 
**Subject:** D-60213
**Material:** &#34;Eternal&#34;, a short story about a small abandoned island that grants anyone that sets foot on it immortality.
**Equipment:** One (1) head mounted camera. 

**Results:** D-60213 successfully returned after coming across the book underneath a tree and jumping down a newly created hole. During the next 24 hours, D-60213&#39;s newfound immortality was tested through laceration, gunshot wounds, vivisection, exposure to a vacuum, and incineration. Despite lacking any regenerative abilities, D-60213 failed to cease bodily activity. The conclusion was reached that there was no way of making D-60213&#39;s [[[https://scp-wiki.wikidot.com/end-of-death-hub|brain lose consciousness]]]. 

72 hours later, D-60213 disappeared. The story now possesses a mention of a woman who was affected by the island &#34;curse&#34; and suffered great pain at the hand of &#34;a group of evil scientists&#34;.

**Subject:** D-17394
**Material:** &#34;Rabbit of Seville&#34;, the animation was contained in an otherwise empty flash drive. 
**Equipment:** One (1) head mounted camera, one (1) 9mm semi-automatic with extra cartridges.

**Results:** D-17394 appeared inside an amphitheater and, after a short search, realized the flash drive was in the possession of the character Bugs Bunny. D-17394 spended the great part of the narrative trying and failing to recover the flash drive while being tricked by Bugs Bunny alongside Elmer Fudd.

D-17394 managed to snatch the flash drive during the final confrontation and quickly escaped through the nearest door.

Analysis of the cartoon showed alterations in line with D-17394&#39;s testimony, with all their actions following the rhythm of the 1816 opera &#34;The Barber of Seville.&#34; During the experience, D-17394 showed a high resistance to damage and the ability to quickly regenerate from injuries, among other anomalous abilities that they lacked following their removal from the narrative.

72 hours later, D-17394 remained stable.

**Addendum:** //The current theory on the reason D-17394 wasn&#39;t integrated into the narrative like in the last two tests is that the anomalous traits were due to the nature of the narrative instead of being acquired traits.//

//It is also to note that following D-17394 exit from the narrative, a voice could be heard coming from the testing chamber saying, &#34;Ain&#39;t I a stinker?&#34; Considering Bugs Bunny&#39;s abilities, I recommend forbidding any further test with 4th wall breaking characters.// - Dr. Cuco

**Head Researcher:** Dr. Lombardi

**Note:** This experiment will attempt to create a narrative decontamination zone. Hopefully 826 will cooperate. 
//Yes, it&#39;s basically a character sheet.// - Dr.Lombardi

**Subject:** D-1472
**Material(s):** &#34;Swole&#34;, a short story about a small abandoned island that grants anyone that sets foot on it one hundred pounds of muscle and the strength of five men.  Additionally, a piece of paper containing a brief biography of D-1472&#39;s life, skills, and possessions has been placed between the left bookend and the story.  The paper contains instructions for 826 to trap and record any incompatible or inappropriate possessions, abilities, or knowledge to this document when cross-narrative travel is attempted.
**Equipment:**  One (1) head mounted camera.

**Results:** Armed guards are positioned at the exit of the testing chamber as soon as D-1472 enters the story.  A half hour later, the doors are kicked off the hinges, embedding themselves halfway into the opposite wall.  A shirtless D-1472 emerges confidently, observes his body, and is noticeably disappointed.  Subject returned to custody without incident.

Footage from the head mounted camera revealed D-1472&#39;s body rapidly filling out with muscle as soon as his foot touched the island.  The remainder of the video consists of him bending palm trees in half, lifting boulders, and gloating that &#39;everyone in lockup is going to stop pushing me around now.&#39;  Subject found the book and 826 nestled in a bush near the wreckage of a plane.  Said plane&#39;s door was kicked in to exit the narrative.

**Addendum:** No change to D-1472&#39;s body mass and strength has been noted from baseline.  Likewise, D-1472 has persisted outside the narrative beyond the 72 hour window.  The biography page has notable alterations.  The title is now &#34;D-1472 as Harold Roth&#34;. A small backstory for &#34;Harold Roth&#34; and how he ended up on the island has been included.  Under abilities, &#34;The island&#39;s blessing: Superhuman muscle mass and strength&#34; is now listed.

//Looks like we have a viable way to keep our narratives pristine. I am intrigued by the explicit name and in-universe backstory added to the character sheet.  Can we specify a character for the subject to inhabit before hand?// - Dr. Lombardi

**Subject:** D-1472
**Material(s):** &#34;Bartleby, The Scrivener&#34;.  A character sheet titled &#34;D-1472 as Bartleby&#34; is inserted between the left bookend and the story.
**Equipment:** One (1) head mounted camera.

**Results:** D-1472 emerged from the testing chamber approximately 36 hours after the test began. He showed a great deal of interest in the result of the story, repeatedly asking &#34;Did it work?&#34;
