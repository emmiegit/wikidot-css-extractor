    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>[[&gt;]]
[[module Rate]]
[[/&gt;]]

One school says automation introduces weakness to a system, while another blames humans for faults, and oversights, and missteps aplenty. Neither understands that the system is weak because it is a system. Interface, communication, analysis, transmittal, these bridges and links cannot be established without inviting vulnerability. Somewhere in Kolkata&#39;s suburbs, a red light blinks two stories underground. A spool of receipt paper prints off {{045AX4990: PANG9 RECEIVE BAND 2}}. The last employee who knew its purpose retired two months ago.

System engineers have played this trick throughout history. With the right oil will clockwork flow smooth as water no matter its purpose. In proper hierarchies and by proper law, human society will operate without friction or discontent, fulfilling its founder&#39;s dream at last. In a barn outside Shropshire, obscured by blackout curtains, fingers peck at a surplus military laptop until {{DREAMT GAWAIN FOUND STEEL IN TIBUR}} glows green on black. The dead BBS has nothing to add.

Meeting after meeting on a threat that none grasp is a symptom of the system.

Rust overlooked on the reactor&#39;s steam pipe is a symptom of the system.

White powder in the mail is a symptom of the system.

They claim inefficiencies will be ironed out. They promise flaws are being corrected. They insist time, effort, and money can repair what is inherent, and do so knowing its foolishness at a genetic level, for humans are systems as much as any other. Our organs work at cross-purpose. Our biles betray us. In mudflats off the Turnagain Arm, a lone figure sweeps their metal detector back and forth, searching for what fell from a black flight to Elmendorf. Its serial plate—{{TEST CASE HAPLESS OAK 1/1}}—rotates under a heron&#39;s claw.

And if there is no correcting systems or ourselves, what are the observant to do? Are we obligated to poke at fractures, to pick scabs, reminding our kind that their footing is unstable? One should warn a child on thin ice, and one would tell roulette players that every chamber is loaded. It is no mercy to leave a lie intact. With edits to three lines of code, the software-defined radio whispers a tune suiting hardware-bound receivers abandoned in geostationary orbit: {{WE TWO HAVE RUN ABOUT THE HILLS AND PICKED THE DAISIES FINE}}.

Mismanagement defines the system.

Carelessness defines the system.

Complacency defines the system.

A computer does not know what time it truly is. Absent the clock, its components do not know either. With care, with solder, its preferred sources may be removed and foreign signals introduced, setting efforts at security by synchronization against themselves. 

There is no system safer intact than dismantled, and only the honest engineer will agree.</textarea></pre>
