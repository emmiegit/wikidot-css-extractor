    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>⚠ This author page is heavily WIP ⚠

Hello! My name&#39;s Matthgeek! I like weird ideas taken to their logical (or at least reasonable-sounding) conclusions and fun characters.

I think everyone should give writing making an SCP a shot. It&#39;s a lot of fun, even if you&#39;re not the best with writing.

I&#39;m no longer active on the Discord as a Moth, but if you ever want help with an idea or article, feel free to ask! Just don&#39;t be surprised if I&#39;m too busy.

------
= **My Works**

[[[SCP-7138]]]
My first article. I was eager to post and did not listen to feedback as much as I should have. There is a strong idea here, but the execution is sorely lacking. I will probably return to this one day for an overhaul.
-----
[[[SCP-7137]]]
I&#39;m still mostly happy with this article. It did what I set out to do, without any major gaffs. Doctor Math started out as a silly way to create an author avatar (Math who? = Matthew), but I plan to explore his situation in a more serious light in some tales.
-----
[[[SCP-8713]]]
Probably the article I&#39;m happiest with. It&#39;s the first I created an image for, and the first I put in some of my poetry. Also is a reflection on my frustrations with art as a statement piece.
-----
[[[SCP-8371]]]
The first article I wrote for a contest. I still stand by my idea, but the time pressure definitely resulted in me putting forward a final product that didn&#39;t live up to my original vision. This is also on the rewrite docket.
-----
[[[SCP-9119]]]
Huge shoutout to the friend who talked me down from my first article idea for the SCP-9000 contest. This one definitely turned out better than what I had first planned on. I&#39;m satisfied with what I created here. It&#39;s the first time I executed a half-decent twist.
-----
[[[justbeyourself | Alex Thorley Interviews for a Job]]]
I wrote this tale for the Department of Unreality canon. While I am happy with the story and prose in isolation, I think I could have done a better job of adhering to the themes of the canon. As it is, the piece is too accessible and upfront with what is going on.</textarea></pre>
