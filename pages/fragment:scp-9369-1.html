    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>**Item #:** SCP-9369

**Object Class:** Keter 

**Special Containment Procedures:** SCP-9369 is contained within a 3 x 3 x 3 m cuboidal steel containment unit and surrounded by a lattice of woven hemp rope. The full contents of SCP-9369’s file must only be accessed by personnel with a current semantic certainty[[footnote]] Measure of the stability of one&#39;s worldview [[/footnote]] of 6. Informational containment procedures are as follows: 
* SCP-9369 cannot be fully understood, as to understand it is to make it normal.
* Towards the previous point, information about SCP-9369 cannot be retained in memory, nor packaged together in full. 
* All research on SCP-9369 (if there has been any) must and has been forgotten.
* All documentation of SCP-9369 must contain the assertion that it is not normal.

**Description:** SCP-9369 is a self-actualizing concept, referred to as a &#34;realistic anomaly&#34;.[[footnote]] In contrast to surrealistic anomalies [[/footnote]] For the sake of brevity: SCP-9369 asserts itself and its properties as part of perceived ordinary reality, and cannot be proven to be otherwise. In effect:

Observers of SCP-9369 will always consider it &#34;normal&#34;, regardless of logical contradiction between it and previously established knowledge. This applies to all information pertaining to the object. 

------

SCP-9369 itself is a wooden box. It is in the shape of a rectangular prism, and yet it possesses 7 faces. This is incorrect, rectangular prisms do not have 7 faces. SCP-9369 is not normal. 

SCP-9369 belies ignorance. It desires to be understood, to be normal. This is incorrect, objects do not have desires. SCP-9369 is not normal.

SCP-9369 is semantically assertive. It is an object that would (and has) ripped apart one&#39;s sense of reality. It is surreal, and must remain that way. It does not deserve to be understood by a layman, lest it burrow into the seeds of their uncertainty and undo their foundation. //SCP-9369 is not normal.//

------

##purple|Your supervisor didn&#39;t know what those are? Right right, they wouldn&#39;t. No matter valued personnel! I have procured an order from the Realistics Department with your room as the delivery location! They should be arriving now. ##

**Description:** SCP-9369 is an object that exists according to non-standard laws of dimensionality. Semantically, it presents to many as the concept of the &#34;fifth wall&#34; in a standard four walled room. Scientifically, this is described as a rectangular prism with an extra face. Both of these are an oversimplification of the dimensional laws represented by the object.

[[=]]
##purple|The gnostics should be in full effect, and this description should be nonsense to you. Don&#39;t worry, that&#39;s normal! Things will never be completely accurate when dealing with the surreal. Continue.##
[[/=]]

These descriptions originate from incomplete comprehension of the anomaly. Comprehension of SCP-9369 without semantic fortification causes a forceful rational realignment in the comprehender, such that its alternate laws of dimensionality become true. This often results in extreme and debilitating psychosis. Multiple attempted containment breaches and unauthorized changes to SCP-9369&#39;s file have been caused by individuals under partial or full rational realignment due to SCP-9369.

[[=]]
##purple|That&#39;s enough to get you the gist. Now we cover your duties. I know you&#39;ve been told not to understand this anomaly, but we can&#39;t learn something without compromises, so you will be doing just that! Don&#39;t panic, your mind is semantically fortified by the gnostics you took. You will not be able to comprehend SCP-9369 fully. But in its attempts to be seen, it will shrink itself and present a limited visage that is comprehensible within your own personal logical paradigm. You get to see a different version of the anomaly from everyone else! Exciting, right? ##

.

##purple|No, you don&#39;t have a choice at this point. You&#39;ve read enough now that the seed of the idea of SCP-9369 is sufficiently planted in your mind, and you will imagine it regardless of my input. You don&#39;t need to do any heavy lifting yourself. Just see the image forming, and wrack your brain trying to make sense of it. You will fail, but that is no matter, because you will get a stone’s throw away.  I will harvest the images from you, and you will be made to forget you ever read this file – In fact, it will be like this file does not even exist. ##

.
