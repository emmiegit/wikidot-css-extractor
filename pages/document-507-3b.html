**Foreword:** Below is an archive of all documented &#34;shifts&#34; undergone by [[[SCP-507]]]. Each of these entries is presented with their contents in the following order:

[[code]]

__**(Universe Designation)**__

**Retrieval:** (used for the documentation of any complications or anomalies in the recovery of SCP-507 post-shift)

**Description:** (Description of reality, and description of any aftereffects caused by visiting said reality.)

**Requests:** (Listings of any special requests made by 507 upon return, or for noting any &#34;souvenirs&#34; retrieved from the shift.)

------

[[/code]]

For ease of reference, an inexhaustive list of equipment currently provisioned to SCP-507 by chronological order:
* Tracking collar 
* Holstered handgun that fires rubber bullets, kept loaded with the only provided magazine.
* Knife with sheath and belt.
* Body-mountable digital video camera.
* Tank of air.
* High-intensity flashlight.
* 2 weeks of rations; water filtration kit, thermos, vegetarian MREs.
* Waterproofed set of binoculars.
* Keychain-sized Rubik&#39;s Cube.
* Heat resistant clothing.
* Paper napkins.
* Earplugs.

------

__**1B7-55E-728**__

**Retrieval:** Uneventful.

**Description:** Subject arrived in a desert environment, and wandered around for roughly an hour before encountering another human. Said human was wearing a tanned leather overcoat and was described as &#34;completely unshaven.&#34; The man was bewildered to have encountered the subject and demanded that the subject follow him to lead it back to food and shelter.

Subject originally began to follow the man, but intentionally lost contact with him upon noticing that his leather coat featured no seams or stitching. 

**Requests:** None.

------

__**9E2-66V-7HG**__

**Retrieval:** Uneventful.

**Description:** Subject arrived in a forest habitat, with no signs of previous or current industrialization. No further anomalies were perceptible until the subject grew hungry, at which point it discovered that harvesting or eating the plant life would cause them to emit &#34;telepathic screams.&#34; Subject abstained from eating for the first day as a result, but became hungry enough on the second day onward to consume the flora in spite of the screams.

Testing has shown no biological changes in the subject from this, but subject repeatedly affirms that it &#34;felt horrible&#34; for doing so.

**Requests:** None specifically, but subject adopted a gelatin- and pudding-based diet for two and a half weeks after returning from this shift.

------

__**J75-R63-3TF**__

**Retrieval:** Uneventful.

**Description:** Subject arrived in a dimension with flipped genders. No notable differences besides this were discovered, although subject found issue with the fact that its female counterpart &#34;looks pretty much the same&#34; as the standard version.

**Requests:** None.

------

__**000-000-000**__ (Invalid)

**Retrieval:** Via tracking device. Plainclothes agents found subject sitting in an alleyway at ███████, ███████.

**Description:** Subject was largely unresponsive upon retrieval, and remained so until the standard questioning phase. When asked where it went this shift, subject answered, “Nowhere. I think I missed it this time.”

Subject experienced minor motor skill impairment and decreased activity levels for roughly a month after this shift.

**Requests:** A wristwatch which makes an audible &#34;tick&#34; as the second hand moves. Approved.

------

__**J7Q-53Y-8ST**__

**Retrieval:** Subject was found in its quarters, sprawled on the floor, attempting to chew through the sleeves of a straitjacket it was wearing. The jacket, leg restraints, and the loss of motor skills still present from the last shift led to the subject being unable to stand up or open the door to find assistance.

**Description:** Subject shifted while sleeping, and awoke restrained and lying in a hospital-grade bed. A nurse informed the subject that it was still a patient at the ████ ██ asylum, and was currently suffering from advanced stages of dementia. Subject was then sedated, and spent the rest of this shift alternating between semi-consciousness and total unconsciousness.

**Requests:** None.

------

__**9E2-66V-7HG-2**__

**Retrieval:** Uneventful.

**Description:** Subject once again arrived in the forest habitat from 9E2-66V-7HG. The flora seemed to have remembered subject&#39;s last visit, though, and they reacted by &#34;screaming&#34; for its entire four-day shift.

**Requests:** A hug. Approved.

------

__**6K3-21B-I0S**__

[DATA EXPUNGED] under the direct order of the O5 Council. Level 5 clearance required.

------

__**BN2-AL6-CTE**__

**Retrieval:** Uneventful.

**Description:** Subject arrived in a derelict metropolitan area. Subject was unable to locate any other humans, but noted an overabundance of cats in every area it visited. Said felines seemed no different from normal housecats, though, and subject spent most of this shift petting any who came near.

During the standard examination procedures after retrieval, trace amounts of a //Toxoplasma gondii// variant were discovered on the subject’s clothing, as well as larger amounts on its shoes. Further testing showed that subject had not yet been infected with the Toxoplasmosis variant, most likely attributed to the short timeframe of this shift not allowing the subject to grow hungry and seek out food.

All clothing and belongings that were on subject&#39;s person during this shift were incinerated, and the subject forced to undergo special decontamination procedures, in order to prevent any possibility of contagion.

**Requests:** a pair of rubber gloves. Denied, on the basis that hand protection would not have protected subject from infection in any way.

------

__**125-28P-OS4-3**__

**Retrieval:** Via tracking device. Subject was attempting to return on its own, but was making less progress than usual due to the discomfort of doing so.

**Description:** Subject once again arrived in a pitch-black area, with muted breathing nearby. Subject decided to seek an exit this time via blind wandering. Subject eventually found itself at the mouth of a corridor with what appeared to be a light source at the end. Subject began to run towards the light upon noticing this.

As it grew closer, the light suddenly grew in intensity and the subject was exposed to &#34;searing pain.&#34; Subject passed out at this point, and only awoke after it had shifted back.

Examination upon retrieval revealed that the subject&#39;s epidermis had been cleanly stripped down to the stratum granulosum in all areas open to sunlight, and down to the stratum lucidum in all areas covered by clothing.

**Requests:** None, but subject reappeared wearing a pair of large, heavily tinted sunglasses. Subject did not notice that it was wearing these until they were pointed out, and supposed that they were probably why its eyes did not undergo the same process as its skin.

------

__**7F2-WA3-193**__

**Retrieval:** Uneventful.

**Description:** Subject arrived in an urban area, with no major changes as far as it could tell. Subject used the public computers of a library to search for differences between this dimension and ours, eventually finding that Abraham Lincoln was assassinated by his Vice President in order to claim his position. This ultimately led to the Presidency becoming a &#34;tribe-leader-like&#34; position, where the current holder is legally allowed to be challenged and overthrown by other suitable candidates.

Subject noted, with great surprise, that this change did not do much to alter most &#34;major&#34; presidents taking office. Many minor and/or detrimental presidencies tended to end via bullet wounds, often in unlikely locales or from improbable angles, which deterred most from attempting coups at all.

**Requests:** None.

------

__**WS6-ECU-83D**__

**Retrieval:** Uneventful.

**Description:** Subject arrived at the mouth of a cave with intense heat. Subject walked outside the cave for further investigation, to find that the area around it was a wasteland. Most of the heat appeared to emanate from two suns in the sky; the subject could not discern whether they were extremely large or extremely close to the planet.

Upon further examination, the &#34;suns&#34; blinked and turned away, and the heat subsided.

Subject spent the rest of the shift within the cave.

**Requests:** None.

------

__**Q56-DRU-865**__

**Retrieval:** Subject found in the cafeteria, masticating on what appeared to be [REDACTED].

**Description:** Upon containment of [REDACTED], Subject uttered the words, &#34;More! More! More!&#34; before losing consciousness.

Subject regained consciousness 2 hours later, expressing a strong desire for pudding. When questioned, subject claimed to see &#34;the biggest mound of pudding ever&#34;. When questioned as to why it was masticating on [REDACTED] upon arrival, subject claimed to be eating a &#34;glob a pudding&#34; at the time. 

Subject reported seeing [REDACTED] rolling around the hallways. Hallucinations passed within 24 hours.

**Requests:** Pudding. Request granted.

------

__**F24-9S6-33C**__

**Retrieval:** Subject found in Service Tunnel 6r3bk without original equipment. Subject was wearing a simple uniform with a similar design to the current Foundation D-class uniform.

**Description:** Subject shifted while dining in the cafeteria. Destination dimension had an analogue to the Foundation with a facility in the same location, although internal layout had significant differences. Security responded to subject as an intruder and detained it immediately. During this process, the subject was imprisoned and stripped of all equipment, including the tracking device. For the remainder of the shift, subject underwent repeated questioning, the Foundation analogue refused to accept subject&#39;s explanation of dimension hopping.

Information gleaned from post-shift debriefing indicates that F24-9S6-33C has a Foundation analogue in the Society for Containment of the Paranormal. This analogue has a strong British influence, and is opposed by the Covert Occult Group and Church of the Mending God. Further details remain unclear as the Society refused to answer the subject&#39;s questions and only slipped details by assuming it knew them already.

**Requests:** Replacement equipment. Request granted.

------

__**4GT-F1Q-H17**__

**Retrieval:** Subject was found by the cafeteria kitchen staff of Site-██, drenched, covered in mud, and suffering from severe hypothermia.

**Description:** Subject arrived in a large field during a rainstorm. Subject attempted to find shelter from the rain, but found none, remaining in the rain for the entire shift. After an unknown length of time, the subject reported seeing entities in the distance. Although the heavy rain obscured the subject from obtaining a detailed report of their appearances, the subject described them as being vaguely humanoid in shape. The entities began to slowly move towards the subject from all directions. Near the end of the shift, the subject reported hearing labored breathing from the nearest entities.

**Requests:** a set of warm clothing. Approved.

------

__**2AW-9U2-E5T**__

**Retrieval:** Uneventful.

**Description:** Subject arrived in midair, falling from an outdoor environment into a subterranean body of water at the bottom of a large cavern. Though admittedly experiencing a strong surge of adrenaline from this event, subject reported swimming &#34;a long way&#34; before reaching land. Subsequent observation revealed a giant hole in the ceiling of the cavern, through which subject had apparently fallen. Also reported were archways to other large caverns, most with shafts of sunlight visible indicating other surface collapses. Regular vertical grooves in the walls indicate possible excavation, despite the caverns&#39; immense size. No other sign of life was observed.

Before returning, subject realized that the possibility of shifting back to our reality so far underground might cause it to be displaced in solid rock, and spent its remaining time frantically searching for a way back to the surface. When subject succeeded, it discovered that the sinkholes were much more widespread than what had been visible from below ground.

**Requests:** Diving Lessons. Denied.

------

__**2UU-5I9-Q3D**__

**Retrieval:** Via tracking device.

**Description:** The length of time the subject was absent from our reality was notable, being roughly three months in length. However, during this time, it made several notable discoveries, including several SCPs uncontained by our reality&#39;s SCP Foundation but contained by Universe 2UU-5I9-Q3D&#39;s equivalent. These SCPs have now been contained.

Through this three-month time frame, the subject managed to become a member of 2UU-5I9-Q3D&#39;s SCP Foundation equivalent, working its way up the ranks far faster than would have been anticipated assuming it had been made a member of Foundation personnel on the same day. At the time of its return, he was apparently in the field, working to contain 2UU-5I9-Q3D&#39;s equivalent of SCP-███. Curiously, our Foundation had sent out a Task Force for precisely the same reason, on the same day. Further links between Universe 2UU-5I9-Q3D and our reality are being investigated.

**Requests:** To be made a member of Site personnel. Denied.

------

__**3JT-3MD-DIG**__

**Retrieval:**  Subject retrieved via implanted tracker; medevac required to Site ██

**Description:** Subject was immobile upon retrieval due to greatly increased body mass, measured at ███ kg. Lead Researcher ██████ approved emergency use of [[[SCP-394]]] to keep it alive in order to obtain a report.

Upon recovery, subject reported being surrounded by &#34;really [EXPLETIVE] big&#34; creatures resembling ██████████. They quickly trapped him in a transparent container. It was then transported an unknown distance to a shiny surface, whereupon the creatures began to observe him. After approximately one day tubes were inserted into [DATA EXPUNGED] unknown fluid which was not found upon examination.

Subject reported that the tubes were removed shortly before the shift and it observed [REDACTED] approaching it, presumably for the purpose of extraction.

**Requests:** Services of a personal trainer. Dr. ████████ has agreed to let the subject borrow her workout tapes. Subject now displays a strong aversion to pudding.

------

__**9J3-Y6X-GTY**__

**Retrieval:** The subject was found hanging from its ankles in a tree on-site. Subject was partially encased in insulated, reflective titanium armor upon retrieval.

**Description:** The subject described the world it had arrived in as &#34;extra shiny&#34; and stated that it was apprehended by law enforcement officers upon arrival. After being apprehended, the subject was transported to a nearby manufacturing facility and placed upside down on an assembly line where a series of metal sheets were shaped and cut to fit its body. It briefly had time to ask for clarification, and was informed that the radiation from the sun was extremely dangerous and titanium reflective suits were required by law to prevent thermal radiation damage to any person or structure.
 
**Requests:** Sunscreen and an eye exam. Granted.

------

__**52J-O79-3GH**__

**Retrieval:** Via tracking device. Subject was found inside a padlocked metal shed, behind an abandoned house on the outskirts of ███████, ██.

**Description:** Subject arrived in a small room housing several dried corpses. Besides said corpses, the room was mostly bare; the only things subject noted were a single paneless window and a light fixture on the ceiling which occasionally flickered. Subject attempted to rise to his feet, but had difficulty doing so due to repeated and unpredictable surges of motion.

Subject eventually made its way to the window, at which point it discovered that its &#34;room&#34; was actually a container suspended in midair by a large chain. Subject watched as similar containers passed by it, and as it passed by others, via a complex web of rails above it which the chains were attached to. Subject could see nothing besides this but darkness in all directions.

Subject then tried to wait out its time in this dimension by falling asleep, but found it difficult due to a newly discovered quality of the corpses. During moments of darkness caused by flickering, the corpses rearranged themselves into poses which would be logical for living people during that particular moment. If the subject was looking out the window the corpses would be crowded around it in an attempt to get a better view, if the subject was sitting they would also be seated in a pattern to form a full circle, if the subject attempted to reach the light fixture they would act as a support/seem to be in the process of pushing it upwards, etc.

**Requests:** None.

------

__**YTF-5N2-Q00**__

**Retrieval:** Uneventful

**Description:** Subject arrived in a crowded casino-like area. Subject noted that the only type of machine available was something similar to slots, but they apparently required no money to play and gave out nothing upon a &#34;win.&#34;

Upon actually sitting down in front of one and trying it, the subject discovered that the machine dispensed a small slip of paper with writing on it upon every pull of the lever and spin of the symbols it displayed. Subject could discern no real pattern to what symbol would produce what type of note, but wrote down a list of its attempts and what it received from each just in case.
[[collapsible show=&#34;+ Open list of results&#34; hide=&#34;- Close list of results&#34;]]
[[code]]Jewel/Crescent/Claw: &#34;If given a slice of death, could you tell how large it was?&#34;

Hammer/Crescent/Crescent: &#34;A poor base leads to rushed patch-jobs.&#34;

Crescent/Hammer/Jewel: &#34;Déjà who?&#34;

Claw/Circle/Hammer: &#34;There are things worse than death. For one: Not dying.&#34;

Crescent/Hammer/Crescent: &#34;There will always be someone to look after you.&#34;

Crescent/Jewel/Crescent: &#34;They’re not that jolly; it’s just stuck that way.&#34;

Hammer/Crescent/Hammer: &#34;There will always be something to look after.&#34;

Claw/Claw/Claw: &#34;The future&#39;s looking bright.&#34;

Crescent/Claw/Crescent: &#34;Time to wake up.&#34;

Crescent/Crescent/Crescent: &#34;We’re not so different, you and I.&#34;

Circle/Crescent/Circle: &#34;When all else fails, try something new.&#34;

Crescent/Jewel/Circle: &#34;When death comes knocking, don’t answer the door.&#34;

Crescent/Circle/Circle: &#34;You can’t keep a good death down.&#34;

Crescent/Circle/Jewel: &#34;You can’t take it with you when you go.&#34;[[/code]]
[[/collapsible]]

**Requests:** None.

------

__**FN3-05P-KHC**__

**Retrieval:** Uneventful.

**Description:** Subject appeared in a white corridor, with steel doors lining both walls. Each door had a keypad, a small speaker system, and a clipboard containing forms written in undecipherable characters.

As the subject approached one door to examine said clipboard, the door’s attached speaker turned on and began to address it. Subject was informed that the voice belonged to the person locked behind that specific door, and that he was wrongfully imprisoned, then left to die. The prisoner then pleaded with the subject to release him from his cell.

Subject, jokingly, replied that he would free the prisoner if he promised not to stab the subject upon release. There was roughly a seven second pause before the prisoner asked what “stabbing” was. After a moment of deliberation, the subject defined stabbing as &#34;putting a hole in someone using a sharp object&#34;.

Another pause followed. The prisoner eventually affirmed that he could not stab the subject, because all of his objects were “very blunt.”

Subject did not open that door or any of the others.

**Requests:** None.

------

__**I52-37G-Z8M**__

**Retrieval:** Via tracking device. Subject was in a holding cell of the ███ █████ police station, under charges of public indecency. Extraction was successfully made with no complications.

**Description:** Subject arrived in an area apparently undergoing a large snowstorm. Subject attempted to find shelter but could not find its way in the storm, and had almost succumbed to exposure by the time it was located and pulled into a cave by a man covered in protective furs.

The man helped the subject out of its wet clothing; although he did not have an extra set of garments, he led the subject to an underground hot spring his cave was connected to. When the man was sure that the subject was regaining its strength, he removed his furs and entered the spring as well.

Subject was extremely surprised to discover that the man was a second SCP-507. Subject noticed no obvious physical differences between itself and the double, although the alternate-507 had a pattern of &#34;tribal scarring&#34; across his torso, as well as at the bases of some of his limbs. Subject and the double remained in the cave and conversed with each other until the subject’s shift ended.

**Requests:** Subject drew a replica of the alternate-507&#39;s scars from memory, and asked for any information on possible cultural or symbolic meaning behind the patterns. None have been found so far.

------

__**S43-51U-P09**__

**Retrieval:** Via tracking device. Subject recovered in a cornfield in ██████, █████████, with unidentified brown liquid splattered on its cheek. A human heart with the words &#34;I NEED YOU&#34; written with the same liquid was discovered in subject&#39;s hand. Subject claimed that said object was not in its possession during the shift and does not know how it came into its possession. Researchers are attempting to identify the liquid.

**Description:** Subject arrived in pitch black darkness, with the sound of crying nearby. Upon activating its flashlight, subject discovered the &#34;Smiling Man&#34; from previous shifts leaning towards it. Brown liquid leaked from around its sunglasses. Smiling Man pushed its face closer to subject&#39;s and uttered the phrase, &#34;Why did you do this?&#34; Smiling Man then wiped off a portion of the brown liquid from its eyes with its hand and began caressing subject&#39;s cheek with it.

Subject forcefully pushed Smiling Man away. Subject observed that the Smiling Man&#39;s business suit contained several holes, with brown liquid trailing down from them. Subject drew its firearm and pulled the trigger; however, for unknown reasons, the pistol did not fire. Smiling Man began slowly walking towards subject. Subject ran for approximately 10 minutes and spent the rest of the shift huddled in a corner.

**Requests:** A more reliable pistol. Denied, as the cause of the error is unknown. 

------

__**9E2-66V-7HG5-3**__

**Retrieval:** Via tracking device. Subject was discovered 7km (4.3 miles) North-East of the facility.

**Description:** Subject shifted while reading in its quarters. Subject found itself returned to the forest habitat containing telepathic trees. The trees remained silent upon its entry to the environment. The subject admitted that despite its previous experiences within the environment, it was curious about the absence of any human habitation. The subject propelled itself to the highest ground it could find in order to see over the tree canopy.

The subject found a clearing on the top of a hill. Subject reported seeing a huge semi-translucent blue dome covering the entire forest. The tree canopy extended out to the edge of the dome with foliage so thick that looking up and through it was unfeasible. Subject reported itself to see the dome slightly off-center, suggesting it was not underneath the direct middle.

**Requests:** None.

------

__**5Z4-75T-7YB**__

**Retrieval:** Subject was found prone and unresponsive in its quarters. Subject was bleeding significantly. Several deep gashes were discovered in the left side of the subject, just under the armpit. The claw marks extended to the bottom of the ribcage. Subject received traditional first aid and was committed to the onsite infirmary.

**Description:** The subject woke up on a snow-covered plain. Subject did not have its backpack on hand at the time of the shift, having been asleep. All that went with it was its bed sheets and pajamas. Subject reports having seen a TV show of how to survive in a cold environment before the shift. It attempted to build a crude snow cave using its hands when it was interrupted by a large white bear.

This is the extent of its recollection.

**Requests:** A proper weapon. Granted. Losing subject to a non-anomalous polar bear would be a waste of Foundation resources and an embarrassment. Subject shall receive a knife, sheath, and belt and is required to keep these items on its person at all times.

------

__**3G8-14H-9UX**__

**Retrieval:** Re-contained in the kitchen missing left hand and using expletives in an uncontrolled fashion. The subject was returned to the infirmary.

**Description:** The subject transitioned into a dimension very similar to our own at first glance. The subject was apprehended by Foundation personnel in the infirmary and questioned about his small &#34;canines.&#34; The subject admitted to not knowing what that meant, but quickly worked it out after his interviewer opened its mouth and pointed to a set of large fangs located either side of its incisors. The interviewer also commented on the subject&#39;s roundish body shape, which was considered unusual and fascinating in this dimension.

Despite these differences, the subject described the creatures who interviewed it as kind. They proceeded to bring the subject a large amount of food. The subject noted a distinct lack of anything green in the meal offered to it. When later told to elaborate by Foundation personnel, it stated, &#34;It was all meat!&#34; After eating the meal, two of the creatures containing the subject in their equivalent of the infirmary escorted him into a small room nearby containing a locket hanging on the opposite wall. They told the subject to remove its clothes and stand in front of the locket. After the subject had done as ordered they opened the locket and exposed it to a green orb for approximately 8 minutes. The subject noted the lack of any scar tissue on its left side and a strong feeling of general well being.

The next day a creature came to it and asked for a small portion of his skin and musculature in order to &#34;study genetic differences.&#34; To this, the subject responded with, &#34;Only if you provide me with another delicious meal!&#34; The creature was visibly excited by this outcome. A small biopsy was conducted on the subject&#39;s upper right thigh. The subject described this experience as &#34;painful but totally worth it.&#34; A huge amount of unspecified meat was delivered to the subject upon completion of the biopsy. The subject was then released to explore the facility.

For the next month and a half, the creatures continued to supply the subject with mounds of meat and engage it in amiable conversation. The subject acquired 14kg (30.8lb) of fat during this time. On 16/4/2015 the subject was escorted to the kitchen equivalent. It was then put on a chopping block and its left hand was removed.

**Requests:** A replacement hand. Granted.

------

__**8A8-91T-710**__

**Retrieval:** Uneventful.

**Description:** Subject arrived in a large, opaque dome filled with plants, without any signs of human habitation. Subject stated that walking was difficult and uncomfortable. Upon further investigation, the subject found a window, displaying what was described as &#34;pitch black, with Earth on the horizon.&#34;

Several minutes later, a tall humanoid encountered the subject, inquiring about his comparative short stature. Subject replied, asking where he was. The humanoid stated they were in &#34;Base 12, oxygen and vegetable wing&#34;. Subject asked what Earth was doing in the sky; humanoid appeared puzzled and responded, &#34;That is the moon,&#34; gesturing to Earth. A short argument ensued and the humanoid departed.

Subject noted that after the Earth &#34;set,&#34; a rocky grey landscape became visible, becoming identifiable as the lunar surface after &#34;an hour or so&#34;. Subject attempted to explore more of his surroundings, but shifted back to our reality shortly after setting out.

**Requests:** One camera, denied.

------

__**7J0-175-35X**__

**Retrieval:** Uneventful.

**Description:** Subject shifted while attempting to fall asleep. Subject arrived in a large body of fresh water. Subject swam upward an estimated thirty-five meters before reaching the surface of the water and beginning to tread. Subject noted several dark shapes moving in the water beneath it and bright lights in the distance, but did not attempt to approach either. Subject reportedly found breathing extremely difficult. Subsequent physical tests indicated that the subject had ingested substantial amounts of methane during the shift.

**Requests:** A tank of breathing gas as part of its equipment. Approved.

------

__**99P-UT1-24J**__

**Retrieval:** Subject was found in the location in which it had left, curled up and crying violently. Subject screamed &#34;Why did I have to go?!&#34; when an attempt was made to interact with it, and suffered from severe depression for several days thereafter. Agents described a &#34;beautiful&#34; smell coming from it.

__**UE6-111-4A7**__

**Retrieval:** Via tracking device. Subject was found attempting to return to the site, but with some difficulty. This was intially belived to stem from inebriation, but upon interviewing the subject was determined to instead be due to vection[[footnote]]Colloquially known as [https://en.wikipedia.org/wiki/Illusions_of_self-motion land sickness].[[/footnote]] caused by extended exposure to a non-stationary environment.

**Description:** Subject arrived in a populated area experiencing what it perceived as &#34;at least&#34; a magnitude 7 earthquake. Despite this, subject noted a distinct lack of infrastructure damage. Local inhabitants expressed confusion upon subject&#39;s attempts to question them about the unusual amount of tectonic activity. After 30 minutes, subject was approached by law enforcement and detained under suspicion of public intoxication due to its inability to stand or walk normally.

At the police station, subject learned that the current level of tectonic activity was considered normal in this universe. Almost all architecture was designed to incorporate a complex series of gyroscopes and gimbals that offset the constant motion it was subjected to.

Subject was released after passing a breathalyzer test. Unable to contact a local Foundation equivalent and lacking sufficient funds for better accommodations, it eventually settled in a homeless encampment located in the city&#39;s central park, where it adjusted to the constant motion over several days.

On day 47 of its shift, subject was awoken in the middle of the night. Although at first unable to identify what had awakened it besides a feeling of dizziness and nausea, subject quickly discovered that the shaking it had become accustomed to had entirely ceased. It was then further roused by the sound of screaming, sirens, and distant rumbling crashes and explosions.

Upon exiting its tent, subject discovered that the area had been impacted by a &#34;magnitude 0.00003 earthstill&#34; which had leveled much of the city. With no counterbalancing tectonic activity, the massive gimbals integral to the city had ripped themselves from their foundations and destroyed the buildings they supported, crushing or trapping thousands of civilians under the rubble.

Subject spent the remaining nine days as part of a volunteer disaster response effort attempting to extricate survivors from the ruins.

**Requests:** None.

__**K11-NFD-040**__

**Retrieval:** Subject displayed relatively diminished communication skills and vocabulary. Retrieval was otherwise uneventful.

**Description:** Subject arrived in a location which it described as &#34;somewhere in Africa&#34;. Analysis of the recovered video footage revealed that the location in question closely resembled a replica of our universe&#39;s city of Kampala with the primary exception being that the city&#39;s entire landscape was covered in wild plant life native to Central Africa, which is typical for cities which has been abandoned by the human populace for significant lengths of time. The subject soon discovered the city to be inhabited by an unusually dense population of great and lesser apes (including chimpanzees, bonobos, gorillas, orangutans and gibbons). The inhabitants of the city displayed familiarity with guerilla warfare and close-quarters combat tactics, far greater than what is considered normal for non-anomalous non-human apes. A battalion consisting mainly of chimpanzees equipped with guns of various makes and types, bulletproof vests, army attire, and forest camouflage ambushed and restrained the subject; and began preparing to ceremonially execute it. However, the battalion themselves were ambushed by an enemy battalion consisting of humans. The video footage was lost at this point.

The subject recalls just barely avoiding dying on the battlefied during the ensuing conflict. The subject was taken as a prisoner of war by the apes and forcefully brought to a concentration camp, stripped of its belongings and incarcerated in a cage, placed in an area containing many other detainees and mercilessly beaten upon attempting to communicate with one of its captors. Through watching news material viewed by its captors, subject managed to learn that the universe it shifted to was a world dominated by sapient non-human apes as the superior species. Humans were also present in this reality, although they lacked sapience unlike their close relatives the apes. Subject also learned that the Earth&#39;s counterpart of universe K11-NFD-040 was experiencing a violent SK-Class Dominance Shift Scenario perpetrated by the human populace which had achieved a higher level of intellect through unknown means, named &#39;the Great Human Revolution&#39; or &#39;the Great Human-Ape War&#39; by the inhabitants of K11-NFD-040. By the time of the subject&#39;s arrival, the human-ape conflict had consumed well over 45% of Central Africa, and many important African cities such as Kampala, Mbuji-Mayi and Bangui had fallen under human administration.

Subject was soon noted for its unusually developed motor abilities, which were considered extraordinarily advanced for a human. Subject&#39;s ape captors reacted with shock after discovering that the subject is sapient. The subject was successfully taught the language of the inhabitants of the universe which faintly resembled a mix of Swahili and Dutch. Subject was offered to serve the ape armed forces in the ongoing war with humans, but was teleported back to our universe before it had a chance to deny the offer. Subject insists that if it actually had a chance to respond, it would turn the offer down as it finds its body to be grossly out of shape for armed conflict.

The Earth of dimension D0-N07-3N73R had been colonized by an advanced extraterrestrial species known as the Xyloths. Humanity, deemed inferior and subjugated by the Xyloths, exists as a subservient race, subjected to harsh conditions and strict governance under the Xylothian regime. The Xyloths, possessing superior technology and intellect, established a totalitarian regime. Human society was divided into labor camps and controlled settlements.

Humans are treated as disposable entities, subject to labor exploitation and harsh disciplinary measures. Any attempt at resistance is met with swift and severe punishment, often resulting in public executions or cruel experimentation. Despite the overwhelming control imposed by the Xyloths, small underground resistance groups persist, clandestinely organizing and planning acts of defiance. However, these movements face constant surveillance and infiltration by Xylothian informants, leading to frequent dismantling of their operations.

__**H05-A22-E14**__

**Retrieval:** Uneventful. 

**Description:** Subject manifested in a breathable, zero-g environment containing wisps of golden mist and brightly illuminated from an unknown light source. Subject found it could move through the environment by &#34;swimming&#34; and did so for several minutes, looking for any solid object that might be used as a landmark. 

Subject noted a feeling of being watched at some point, and turned to see two small white lifeforms, resembling winged &#34;keyhole shapes&#34; with only two small black dots for eyes and a small mouth, observing it from behind a bank of the mists. Subject attempted to communicate with them, but the lifeforms did not recognize subject&#39;s verbal or sign languages, responding with high pitched, musical sounding vocalizations. Several other similar lifeforms appeared, and one, capable of speaking English, asked the subject what it was doing here.

Subject explained its anomalous properties, but the lifeforms only seemed to become more uneasy. The lifeform that had asked earlier explained that other universes&#39; instances of the subject had arrived in this universe before, and each time the universal force that punched them through into this one would allow a part of &#34;the ancestral enemy&#34; in.

Almost immediately, subject and the lifeforms noticed a black mass similar to a fracture in the golden mists appearing in the distance. Estimations from the subject&#39;s description put the size of the mass as about one kilometer in width and three kilometers from subject&#39;s location upon first sighting it, though it seemed to grow larger over the course of a minute.

The lifeforms around the subject immediately bowed their heads and began chanting, and subject looked up to see motes of light floating from the lifeforms to a particularly dense mass of golden mist above them, where the unknown light source seemed to originate. The light source suddenly brightened and subject looked away towards the growing black mass, before a stream of golden energy lanced out from the unknown light source into the black mass.

The illumination provided by the golden stream revealed the mass to act like a hole, through which several entities around [[[https://scp-wiki.wikidot.com/tuftos-proposal|an immense, red-skinned humanoid with large horns]]] could be seen. Viewing the central humanoid induced a cognitohazardous effect in the subject, causing it a severe headache and a sudden surge in sadistic impulses. 

Before subject could act on these impulses, the golden stream was joined by several others, blocking subject&#39;s view of the humanoid, before a single far thicker stream struck the black mass&#39;s center and destroyed it, leaving only golden mists behind. Subject only remembered turning to look at the light source, now unobscured by mists, one more time before shifting back.

Subject appeared to be dazed for several seconds upon shifting back, but became lucid with minimal interaction. Subject could only describe the light source as &#34;...[it thinks it] saw God...&#34;

**Requests**

* To ask [[[SCP-343]]] if what subject saw was [[[SCP-343]]] or not. Denied.

------
__**B18-O11-E14**__

**Retrieval:** Via tracking device. Subject was found 2000 miles east of Site-19 on a deserted island in the ██████ Ocean.

**Description:** Subject manifested in an abandoned, dimly-lit city, noting lighting conditions as similar to dusk, though the sky was light purple and lacked stars or other defined celestial bodies. Subject also noted that nearly all buildings were missing large portions, many of which included vital structural elements, yet did not collapse. Subject began to search for intelligent lifeforms, crossing several cracks in the ground that &#34; ... had no bottom, they just opened into the sky underground ... &#34;.

After two or three hours, subject sat down to eat when a second instance of the subject, notably taller and with heterochromatic eyes, manifested within 50 meters of subject. The second subject demonstrated familiarity with the universe&#39;s terrain, but had no recollection of the immediate area. The second subject informed subject that there were intelligent lifeforms native to the universe, multicolored humanoids with odd proportions, and that they were supposedly responsible for &#34;breaking&#34; their universe by attempting to replicate the properties of their own universe&#39;s version of the subject in others.

Subject and second subject moved through the space for several hours, conversing on differences between their universes, before a (previously-assumed decorative) anklet on second subject started beeping. Second subject quickly explained the band was developed as a thirty-second warning for when it was about to shift. Subject attempted to ask how it worked, but second subject only explained it required [REDACTED] to function before returning to its own reality.

Subject remained for two more hours and noted spotting one of the universe&#39;s natives on a rooftop, but returned to baseline reality before subject could ascend the building&#39;s stairs and attempt to interact with the humanoid. Humanoid was noted as being pink with numerous cartoon heart-shaped growths on its head instead of hair.

**Requests:**

* A replica of Second Subject&#39;s anklet or close approximation. Pending. Research into use of [REDACTED] on hold due to the volatile anomalous nature of the substance.

------
__**XJ9-V22-P74**__

**Retrieval**: Subject appeared in Basement Storage Room 4 sitting on a crate. Subject was covered in sweat and breathing heavily with signs of exhaustion. 

**Description**: Subject found itself in an area similar to the Foundation cafeteria but filled with SCP Corporation brand vending machines and dispensaries. Subject quickly realized this dimension’s SCP Foundation was instead a for profit corporation ([[[SCP-1437|SCP-1437-2]]]). Corporate employees in the cafeteria were surprised at the subject&#39;s shift and immediately contacted security. Subject was told to freeze at gunpoint. Destination dimension did not have (or did not know of) an analogue of the subject and suspected it of utilizing an unknown thaumaturgy to shift, which they assumed was teleporting within the same universe. When subject attempted to comply while explaining itself, one security guard used a ranged taser while the other held up a high beam strobe light and sounded a continuous airhorn. Presumably this was to prevent subject from casting thaumaturgies. Subject was gagged and its limbs were clamped to a metal chair bolted to the floor of the interrogation room it was detained in. 

Subject was surrounded by six security guards, four with pistols pointed at him, one with a taser pointed at him, and one with the strobe light and airhorn. When he attempted to speak the airhorn and strobe light were used followed by the guard commanding him not to speak unless spoken to. After waiting for a while in silence, a woman spoke through the speaker above the two-way mirror. She introduced herself as &#34;Sarah Syler, Director of Thaumaturgic Operations&#34; and ordered security to stand down but remain at the ready. She removed the gag stating “It’s likely not a parleglyph.” and interrogated the subject who was finally allowed to explain himself. The director then entered the interrogation room. She was professionally dressed and wore a security badge with the SCP Corporation symbol as well as a pentacle with a horizontal eye placed within the central pentagon. She looked at him closely and asked him if he was a reality bender. Subject replied “No, I don’t think so. I just shift into other dimensions. I can’t control it either.” 

The director then performed what was likely a kinetoglyph which was obscured by strobe light directed at the subject. Director then grabbed subject’s head with both hands and stared into his eyes. Subject reports the feeling that she was “staring into my soul”. She then accused the subject of lying stating that although he was not a reality bender he had clear signs of “weaving behind the eyes”. She also noted that the subject had teleported directly into a site meant specifically for thaumaturgic study, and that this could not have been an accident as the subject had claimed. She then claimed the subject would be charged with industrial and corporate espionage unless the subject performed the kinetoglyph that allows it to teleport. She stated that the subject must do this in clear view of the camera which she pointed out. 

Subject was released from the chair and the director and guards stood back, but still guarded the door. Subject pleaded with the director, repeatedly insisting it had no control over its ability and that it was anomalous, not thaumaturgic. Director threatened the subject and ordered the guards to draw their weapons. Subject then lied pretending to reveal the truth that it simply had not mastered its kinetoglyph and was afraid it would transport it to a hazardous area. The director seemed pleased but continued to insist the subject perform the kinetoglyph under threat of violence. 

Subject recalls the next statement the director made, as it was intriguing. “This is going to be a huge unlock for the entire corporation if we just align it to our clients. Just imagine the revenue of instantly, and I mean instantly transporting goods. Size and weight might not even be a factor with this thaumaturgy. We would become the most utilized corporation in all of history, overnight. Of course, let’s not boil the ocean here. We wouldn’t want to show our whole hand all at once. Let’s circle back. You. Perform the kinetoglyph.” Subject then claimed it was a very long kinetoglyph that could take a very long time to perform. The director still insisted while continuing to “go on and on with a lot of corporate jargon I couldn&#39;t understand”. 

Subject eventually proceeded to improvise gestures incorporating sign language, which none of them seemed to correctly recognize. Subject went through the entire alphabet of signs and every single signed phrase it could think of, many of which were gibberish. Once the subject ran out of those, it switched to dance-like movements and pantomiming. The entire process took at least three hours before the subject finally shifted back. 

**Requests:** 

* Knowledge on thaumaturgy. Denied due to potential dangers. However, the subject was informed that the Foundation has no available information on “weaving behind the eyes” or “parleglyphs”, nor does this event arouse suspicion among research staff that the subject is capable of any thaumaturgy.

* Tests on if the subject’s shifts have a limit to size and weight of objects shifted with it. Pending. Likely unnecessary.

__**P21-N03-H04**__

**Retrieval:** Subject returned one second after shifting, flying backwards and falling prone with a severe concussion.

**Description:** Subject manifested in a boxing ring with painfully bright spotlights on it. Within half a second of manifestation, subject saw a red boxing glove and fell unconscious.

**Requests:** None legible.

__**NAT-07-P7R**__

**Retrieval:** Returned 50 meters outside Site-19, suffering from severe burns.

**Description:** The subject manifested in an abandoned version of Site-19. The subject noted several corpses belonging to Foundation staff, many of which had been charred. Upon exiting the facility, the subject encountered a group of short avian entities wielding flamethrowers and wearing what appeared to the subject to be flame-retardant environmental suits. Upon spotting the subject, the entities attacked it with their flamethrowers. Subject demanifested after 5 seconds of exposure to the flames. Upon recovery, subject noted that the nearby city of [REDACTED] appeared to have been demolished by a nuclear weapon.

**Requests:** Heat resistant clothing. Granted.

__**S16-H09-N24**__

**Retrieval:** Returned three hours prior to its shift in [DATA EXPUNGED]. Subject was immediately evacuated and restricted to a secure location until its past self shifted.

**Description:** Subject manifested several meters above the ground and sprained its ankle in the resulting fall. Subject manifested in a plaza at night, containing numerous entities resembling winged lions with humanoid faces and chests. Subject noted the entities appeared to be partaking in various forms of playing, dancing, eating, and [DATA EXPUNGED], but did not move even when prodded as though frozen. The edges of the plaza were ringed with housing made to accommodate creatures of the entities&#39; size.

Subject searched the plaza and found a small entity, unfrozen, resembling a silvery winged reptile, which hid from subject but was coaxed out by the offer of subject&#39;s rations. Entity spoke in a childish voice at first, asking how Subject arrived and later revealed to be fearing an invasion of sorts by humans. Other attributes of this reality included the following:

* The city Subject appeared in was the sole territory of a race of the winged leonine entities, referred to as Sphinxes. 
* The city allied with an expansionist empire due to the Sphinxes&#39; ability to predict various futures predicting the highest chance of survival being with the empire. 
* The empire fell despite this, and to defend themselves from persecution by the enemies of the empire, the Sphinxes used a thaumaturgical process to divorce their city from time itself, creating a new reality that the Subject manifested in.
* The process used to divorce the city required the imbuing of a &#34;dragon&#39;s egg&#34; with Sphinx blood, creating the silvery entity.
* A side effect of the process caused the Sphinxes to slowly freeze in time, leading to the remainder to partake in mass hedonism and freeze in eternal moments of bliss.

Subject noted that at various points in the conversation, the entity would rapidly grow in size to about twenty meters in length or rapidly shrink to its standard one meter again, particularly when it seemed to feel anger or sadness respectively. The entity described this as being capable of controlling its apparent age, but not being proficient as its true age was ██ months. 

Entity briefly attempted to try changing the age of subject to test if it could before subject told it not to. Subject then noticed its ankle was healed as Entity stated subject was now three hours younger and the time in which it was injured no longer existed. Subject shifted back to baseline reality shortly afterward, but found it had arrived three hours before it had shifted.

**Requests:** None.
------

__**N15-A18-M19**__

**Retrieval:** Via tracker. Subject manifested with an anomalous prosthetic arm gripping its own. Subject sustained major bruising and a broken humerus from the immense grip force endured. Medical attention applied afterwards.

**Description:** Subject manifested in an alleyway at night, and camped out until morning. Upon awakening, subject found a child prodding at subject with a stick. Gently pushing the stick away, subject apparently scared the child, causing them to run away. 

Subject exited the alleyway to see small groups of humans about, and subsequently subject noticed all humans possessed multiple prosthetic arms, most with only two, but several with three or more. Subject covered its arms in a heavy cloak taken from the alley trash to fit in, and left for a public space.

Subject sat with an elderly individual to ask questions. Subject found that all humans in this reality were born without arms since an unknown event at least 100 years prior (the individual noted their grandparents were the last in their family to have natural arms). Subject then left to find accommodations, but was tailed and detained by a six-armed police officer for &#34;disturbing the peace&#34;, subject complied with authorities until they removed its cloak as part of a routine search, exposing subject&#39;s arms.

Subject was kept in the local jail for two days afterwards, trying but failing to explain its circumstances to others. Eventually, a man presumed to be a foundation-equivalent agent of this reality visited. Subject went to go with the agent, but shifted back while the agent was grabbing subject&#39;s arm, taking the agent&#39;s prosthetic with it. Separated from agent&#39;s nervous signals, the prosthetic arm&#39;s grip repeatedly tightened until subject&#39;s arm broke.

**Requests:** 
*Medical attention (received, see Doctor&#39;s Log:507-#116 for information on anomalous parasite extracted)

*Prosthetic arm (sent for study)

------

__**B7B-2NH-1A3**__

**Retrieval:**  Uneventful

**Description:** Subject arrived in a forest where a group of students were fighting a group of [sic] &#34;... weirdos ...&#34; dressed in strange cosplay. After explaining subject&#39;s properties, the students let Subject stay in their school for the time being, allowing subject to learn about the world&#39;s population of &#34;Superheroes&#34;, their society, and the requirements of being a hero. 

Subject describes the world as an Ideal Superhero world for true Superhero fans, with anomalously empowered humans becoming ordinary in all aspects of society, both moral and amoral. Subject also described an incident in which it defended a young child from an anomalous individual threatening her.

**Requests:** A collection of Golden age comic books to read. Approved.

------

__**N15-E25-E19**__

**Retrieval:** Subject manifested blindly sprinting headfirst, colliding with Guest Researcher K at high speeds and inducing a concussion in both individuals.

**Description:** Subject manifested in a dark, maze-like area composed of massive stone bricks about three feet each in height and seven feet in length, with patches of soundproofing material covering most surfaces. Using its flashlight, subject explored for several minutes before encountering a humanoid with smooth skin covering where its eyes should be. Humanoid was friendly and spoke in a barely comprehensible accent, making communication somewhat slow. 

Apparently sensing subject via echolocation and expressing pity at subject for apparently having lost the ability to echolocate as well, the humanoid guided subject to an area of barren walls, then to a small house made from mismatched wooden planks and blankets in a dead-end of the maze. Humanoid revealed the maze as a former prison, and that it is impossible to navigate the &#34;muffled&#34; areas because they mess with echolocation, though it mentioned subject was already used to living like that.

Subject accepted a small meal and offered assistance in any way, which the humanoid used to have subject help it go to a nearby medical clinic where subject could have its echolocation glands surgically corrected. After asking where those were, Humanoid tapped the smooth parts where its eyes should be. Subject spent the rest of the shift running from the humanoid, which was insistent on subject receiving treatment.

**Requests:** None.

------

__**M4E-23R-1RI**__

**Retrieval:** Subject manifested in Dr. Clef&#39;s office. Dr. Clef (who had been taken with the subject during this shift) exited the office and remained silent for the remainder of the day.

**Description:** Dr. Clef intentionally disobeyed protocols concerning subject for unknown reasons, securely gripping subject for several seconds until a shift occurred. Subject refused to report on this shift&#39;s reality, citing a respect for Dr. Clef&#39;s privacy. Subject only stated [sic] &#34;It was like witnessing the life that [[[SCP-166 |he wished]]] [[[SCP-4231 |he had]]]&#34;. Subject offered no other explanation.

**Requests:** To see Dr. Clef more often. Approved.

------

__**N15-S15-U12**__

**Retrieval:** Uneventful. Subject returned coated in non-anomalous dust.

**Description:** Subject manifested in a foggy, monochrome city, the weather noted as being overcast the entire shift. Subject encountered humans in the streets, but all were identical. Thin, hairless, androgynous, without pupils, dressed poorly, and completely monochrome. None of them reacted even to physical contact, walking in a [sic] &#34;...zombie-like...&#34; fashion and entering their respective homes. Subject entered one&#39;s house and encountered a total lack of resistance or decor, only a pipe and a single bowl below it, the humans laying down on the floor to sleep.

Each day, humans of this shift would perform manual labor for 14 hours, return home to eat, often bearing untreated cuts and bruises, then sleep for 8 hours. Subject found food in this reality was a grey, odorless sludge, dispensed from the pipe once a day. After two days waiting to see if something changes, subject noticed one of the humans looking at him for a moment.

The day afterwards, the human who looked did not go to work, instead sitting with subject. The human could not speak, and apparently had no teeth, both removed artificially. Tracing images in the dust on the floor, a rudimentary conversation could occur. In this reality, all humans were surgically made equal at birth, save for a group of apparent overlords who solely benefitted from the labor of the equalized ones. This human felt looking at subject made it feel positive, unequal from the rest who had no positivity or negativity, and asked subject to leave.

Leaving, subject was stalked by a much larger, constantly-grinning human, revealed to be an enforcer for the society&#39;s overlords, who grabbed subject. The human who communicated with subject earlier saved subject by blinding the enforcer with a bowl full of dust and helping subject flee. Subject shifted back immediately after Enforcer returned and separated subject and human.

**Requests:** None. Subject became more eager to begin conversations with others afterwards.

------

__**B3C-8NW-K1Y**__

**Retrieval:** Uneventful

**Description:** Subject Manifested in a Reality that was relatively normal to this one in almost every way. When Subject returned to this Universe and was asked about this Reality Shift, Subject stated [sic] &#34;Apparently that version of me in that other Universe was put into this [[[SCP-914 |Strange Machine]]] by Dr. Clef, which caused the other me to gain control of his Abilities&#34;. While there, Both Subject&#39;s traveled to different Realities that Original Subject had been wanting to visit for awhile now. However, Original Subject Returned to this Reality after spending a good amount of time in all of them with itself in the other Universe.

**Requests:** To be put into the same Machine as it&#39;s other self. Denied.

__**P0O-9YH-3AD**__

**Retrieval:** Uneventful.

**Description:** Subject manifested into a restroom identical to the one in Site-██ while in the process of relieving himself. Subject was unaware of his shift until approximately 5 minutes later, where he realized that the roll of toilet paper in his stall had been replaced with a small cactus. 

Subject then spent the next hour sitting on the toilet waiting for his shift to end. During this time, no less than 4 individuals knocked on the door of his stall, requesting him to &#34;hurry up&#34; and that they were &#34;really, really hungry.&#34;

**Requests:** For a pack of paper napkins to be added to his equipment. Granted.

Subject&#39;s presence did not alert the autonomic security measures of the office. A subsequent investigation revealed that it was added to Director Moose&#39;s approved visitor list. The addition was timestamped to a date prior to Foundation discovery of the subject. It refused to explain this impossibility during interrogation.

**Description:** [DATA RESTRICTED]

**Requests:** To speak with a member of the O5 Council. Initially denied. Subject was to be taken for immediate amnesticization, at which point it told the interrogating researcher that [DATA RESTRICTED]. Request was granted. It spoke with O5-█ on a secure landline for a period of 17 minutes. Afterwards it willingly surrendered itself to be amnesticized.

__**83R-ASQ-2I92**__

**Retrieval:** Recovered via tracking chip; found in the janitors closet of [REDACTED] Elementary School.

**Description:** Subject manifested in a barren landscape comprised of a red sky with no visible sun. Light was emitted dimly from the sky via an unknown source. Various burned shrubs and trees were scattered around, and various entities constructed out of charred human bones were present, patrolling aimlessly through the dimension. Once spotted, the instances gave chase to the subject while emitting cries similar to bells of various sizes and making ringing. Subject hid from and evaded these instances for an estimated thirteen hours, before being caught by an instance. The subject was then [REDACTED], resulting in serious lesions, bites, and burns. After an unknown amount of time being tortured by the instance, the subject demanifested back to our reality.

__**PEN-239-I3P**__

**Retrieval:** Subject was recovered via tracking implant from an //Applebee&#39;s// restaurant. Subject had been bought a beer by another subject at the bar, which it was allowed to finish.

**Description:** Subject manifested on a large rock platform suspended over a seemingly endless void. It was observed by a massive red skeleton with flaming eyes, estimated to be over 400 feet in height, floating in the void over the platform. It began to chant in an unknown language as its head began spinning incredibly fast before rocketing off of the entity&#39;s spine and falling into the void. Subject demanifested after three hours.

__**SOL-P01-F1R**__

**Retrieval:** Subject was recovered via tracking implant from the roof of Site-██. Subject was severely deafened, but hearing returned to normal after sixteen hours.

**Description:** Subject manifested in a large clearing surrounding by forest. It was nighttime. After sixteen minutes, the subject reportedly heard quiet screaming. As the sun began to rise, it was revealed to have a face on it displaying agony. It was constantly screaming at an estimated 90 decibels. Subject only demanifested once the day had ended and the night began again, which reportedly took over 42 hours.

**Requests:** --Earmuffs to be added to its supplies. Denied.-- Earplugs to be added to its supplies. Granted.

__**B01-D16-I07**__

**Retrieval:** Subject reappeared, injured and delirious, in the pig enclosure of a petting zoo two miles south of ███████, ██. Subject had attempted to flee up a light pole and was found still clinging to its top when Foundation personnel arrived. Amnestics were administered to witnesses of the Subject&#39;s manifestation and cover story of Subject being a panicking mental health patient distributed.

**Description:** Subject manifested in a room similar to the Site-19 cafeteria, but dimly lit and with a floor covered in an inch-deep layer of mud. In addition, all personnel had been replaced with humanoid entities bearing porcine heads, skin, and hoof-like fingers. Communicating only in squeals, the entities attempted to violently accost Subject, and Subject fled on seeing many entities brandish weapons. The layout of this universe&#39;s Site-19 was effectively identical, and Subject fled to the exit, where several more of the porcine humanoid entities used firearms in an attempt to injure or kill Subject, all shots missing due to heavy rain obscuring line of sight.

Subject continued along a road to what it presumed was this universe&#39;s version of ███████, ██. As it suspected, all humans in this universe were porcine entities, and in a local farm, it discovered fattier, unintelligent versions of baseline humans were raised as livestock. Subject took shelter in a barn from the rain, but was flushed out by an entity with a shotgun, then surrounded by entities outside the barn and beaten. Subject escaped by aiming its high intensity flashlight at the entities&#39; eyes.

Subject spent the next several hours hiding in the forest from the entities before shifting back, noting their squealing was getting louder and closer the whole time.

**Requests:** Extra pork in its meals for the subsequent few days. Granted.
