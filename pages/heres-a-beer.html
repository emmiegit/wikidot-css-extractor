“Alright. Listen,” Clef said, without looking up at him. “I know what you’re thinking. I can explain.” 

Kondraki blinked at him slowly and blearily in the bathroom light. It was midnight. Day 2 of living together. Clef fucking knew it was going to come up but didn’t know when. There wasn’t a whole lot Ben didn’t know about him— they’d been somehow involved informally on and off for twenty five years. But Clef had put off moving in for a damn reason. 

“Quick question,” Kondraki asked. It was his capital-D Director voice, and Clef fucking loathed hearing it in this context. “Are you fucking okay? Do you need to go to medical?”

Clef spat bloody vomit into the toilet and rubbed his face. “Nope.” 

“You look really bad,” Kondraki said. 

“Thanks,” said Clef flatly. That tank top he’d worn to bed was soaked through with sweat and streaks of blood. The shower was streaked with blood. The kitchen wasn’t even Kondraki’s right now, he knew that damn well without looking at it, who knew if the hallway was stretching endlessly or not. Fuck. 

“Where’s the door to our room?” Kondraki asked. 

“It’s your damn apartment, you tell me,” Clef said. It was a half-hearted attempt at a joke that only made sense to him. 

“It’s gone.” Again. Director voice. He wanted an explanation, and Clef reflected on his options, and also reflected on how much he wished Kondraki had never been given an authoritative position so he never developed a Director voice to present to him when there was only the two of them around. 

“Right,” said Clef. God it was like pulling teeth to say it, he hated saying it. “You know I’m a Type Green, right?” 

“…Vaguely,” Kondraki said. This was exactly as much as Clef wanted him to know. 

“Right. So every so damn often I have nightmares, I don’t know what to tell you. It’s why I avoided moving in for so long.” 

There. He could put the pieces back together from the bare minimum that supplied, surely. Clef wasn’t going to fucking dwell on it, did not want to take questions. 

“I didn’t know that was even possible,” Kondraki said, a little perplexed. 

“Oh, it’s possible,” Clef said. “Unfortunately.” He sighed. “Look, Konny, I’ll give it to your straight. I still have the lease on my own apartment. I understand if you don’t want me to fucking wreck your bachelor pad every damn time this happens, if we want to take the oppurtunity with this and quit while we’re ahead here.” 

No response. Kondraki knelt beside him, his grey-black hair mussed, and he leaned against the wall with his arms crossed, looking at him. Clef wanted to punch him and didn’t. He also didn’t make eye contact. He didn’t know how to deal with some of this shit and never could fucking figure it out. 

“If you don’t mind me asking—” 

“I might mind you asking,” Clef said. A matter of warning. 

“Fine. Do you have… I mean. Look, I hate to ask, but… do you have an [https://scp-wiki.wikidot.com/scp-4231 SCP filing number]? Containment procedures? That sort of… thing? Reality bender stuff?” Kondraki asked. 

“Oh, fuck you, Ben,” Clef growled. Jesus he hated this bastard and hated that he had no idea what it was like to be contained and documented in that way and more than anything he hurt. It hurt for him to know and he didn’t know what to do. It gnawed at the bottom of his stomach but he knew this had to happen. Fuck. 

Kondraki sighed. “Alright. How do you usually…” 

“I put it back. I memorize where shit is and what it is and I just put it back.” 

Kondraki nodded. “Alright, well,” he said, and shrugged, then settled against the wall conspicuously. “I’m watching.” 

Clef slid his eyes over to look at him. His face was honest and neutral. He wasn’t screwing with him. Clef almost wished he was. 

“Close your eyes and I’ll do it,” said Clef. 

“Nope.” 

“Why not.” 

“I’m curious. I want to see it.” 

Clef cracked a smile. “You think I’m joking.” 

“Nope. The opposite, actually. I believe you and I want to see it.” 

“Why.” 

Ben dug his glasses out of the pocket of the sweatpants he slept in, and put them on. “Because I think it’s a big part of you.”

“Don’t fucking tell me what it is to me,” Clef spat. Sure, it was a little too aggressive, but damn that was a stretch. “This shit doesn’t mean anything to me. Wish I had been born without it. If they were smart about it they would have put me down a long time ago.”

“Alright. Then I want to see it because I think it’s important.” He crossed his arms again. 

“It’s not fucking important, either. I’ve worked damn hard to make sure it’s not important,” Clef said. 

“If it wasn’t we wouldn’t be having this conversation, and you wouldn’t be throwing up blood and manifesting shit in our apartment in your sleep. It’s bizarre you’re acting as ashamed as you are about this, honestly,” Kondraki said. 

“I think it’s completely fair to be ashamed of it,” he said, and with utter disdain in his heart he realized he was on the brink of tears, almost. 

Why was he on the brink of tears? 

Ben looked perplexed, and then maybe a little saddened for him in some remote, complex way Clef didn’t understand. His eyes scanned him up and down, still knelt in front of the toilet, hair soaked with sweat. Clef could tell he was trying to pick what to say— whether to argue with him or pass it by. Then he smiled teasingly.

“I’m not touching that,” he chuckled. “That… You know my opinion on that, I don’t need to tell you. You’re gonna have to unpack that with a shrink or something. I just work here, this is a damn Wendy’s.”

That made Clef smile, too. Diffused a little of the tension. Ben was good at that sort of shit. 

Kondraki adjusted himself and pressed his head against the tile wall. “It’s crazy that you know I’m a huge into hauntings kind of guy, and a huge creepy stuff type guy, big anomaly and paranormal guy, and then you actually talk to me about how you can manifest reality at your fingertips and won’t even let me see it. Not even for a second, like it’s your asshole or something.” 

Clef grunted, but was smiling a little. He was taking a different route rather than unearthing any more of that. 

“Like surely I can see it as a treat, right? What if it wasn’t important, but it was a treat. For me.” He touched the middle of his disgusting, ratty Ghostbusters shirt. Kondraki had been wearing that to bed for the entire time Clef had known him, and he’d gotten a front row seat to seeing it deteriorate into dryer lint and bits of thread. 

Clef shook his head. 

“You know what? One second.” Kondraki got to his feet laboriously and left the bathroom. Clef flushed the toilet and took a moment to meditate on the taste of copper in his mouth, and the residual fear and adrenaline making his chest tight. He closed the toilet lid and leaned against the wall, then closed his eyes for a minute. 

God he was exhausted. These nightmares took a ton of energy out of him when they happened. He wasn’t looking forward to putting everything back, but then again he never was. In his old apartment he intentionally had as little stuff as possible, just so he could reverse it with as little effort as possible, but he’d had to put a lot more memorization into Kondraki’s apartment over the years to get to the point where he could fix it correctly. He’d raised his son here, after all. It was more lived in. 

Clef liked it. It was harder on him from a technical ability standpoint to put back together if he broke reality, but he liked that it felt like an actual person lived there, and had a life there. The other day he’d helped Kondraki move an old dresser to the curb, and they’d found three chewed-on crayons behind it from when Draven had chewed on crayons— Draven, who was now an agent. Clef had trained him himself.

“These could’ve been from last year, honestly. Task forces and all that,” Clef had said. Kondraki had sworn at him but he’d seen him desperately attempting to not smile, and that had been enough for Alto in his heart. 

He heard Kondraki come back and roll a glass bottle across the floor to him. 

“Here’s a beer,” he said. “Now show me.” 

Clef smiled and opened his eyes again. The brown bottle rolled to a stop against his thigh. Kondraki had grabbed one for himself, too, and slid back down to the floor across from him. He popped the top off of his on the side of the toilet seat— it was ridged with half-moons already, this was far from the first time the two alcoholics had shared an intimate 3am toilet beer together— and drank from it deeply and thirstily. 

Clef picked his up wearily. He knew what it meant if he opened it, but god did a beer sound good after that. Like it might help numb the horrible mix of emotions he was currently feeling. The apartment wasn’t going to correct itself, anyway. 

He reached the beer out and popped it on the toilet seat. 

“Shame,” Kondraki said. “I was hoping you’d do it with magic.” 

“Your standards for reality bending are incredibly low,” said Clef. He took a deep swig of his own. 

“You should correct me then,” said Kondraki. “Let me see what you can do. Give me a new car or something.” 

A tiny toy car perfectly resembling Kondraki’s sedan manifested on the floor to their left. Kondraki did a double take, and Clef found himself mildly satisfied by his look of genuine surprise. 

“Oh, you’re very funny,” Ben said, and Clef was about to make it disappear when Kondraki picked it up and examined it closer, turning it slowly in his hands, and something deep inside Clef was struck by the sincerity. The way he held it with respect, like it was a piece of art Alto had made for him instead of something he had memorized over the years they’d known each other. It wasn’t something he’d expected. 

Kondraki squinted at the side. Clef had replicated a string of dents and every scratch on it, as well as the marks in the passengers’ seat where Draven had spilled nail polish as a teenager. “Jesus Christ, you’re detailed.” 

“Have to be,” said Clef. He took another swig of his beer. It was washing the taste of vomit and blood out of his mouth and he appreciated it deeply. “People fuck up, Ben. They fuck up the details and that’s how they get killed, but you can avoid all that by just…not doing it in the first place.” 

“Question,” Kondraki asked. “Is this drivable? Did you like, put parts in it? Because it’s fucking heavy.” He weighed it in the palm of his hand. 

“That is a…” He didn’t know the scale estimate, or the answer, really. He just took the car he had memorized and made it comically small on a whim. “…I don’t know. It’s a scale model of your car and whatever that means.” He made it disappear from Kondraki’s hands into nonexistence and took another swig of his beer. 

“That was already pretty impressive, I hope you realize that,” said Kondraki. 

“You think //that// is impressive?” Clef said, genuinely. Maybe he was just desensitized to it, between his use, Lilly’s use back when she’d been alive, all the Greens he’d hunted in the GOC, all the Greens he’d seen in the Foundation… But he really thought Ben would have higher expectations. 

“Yeah, I do,” said Ben, as if it was a challenge that Clef had put him up to. “I do think that’s pretty damn impressive. Are you gonna fix my bathroom or what?” 

Clef felt a sense of self consciousness he hadn’t anticipated settle in on him. Damn it, he had to get it over with. 

If Ben wouldn’t close his eyes than he would. He couldn’t bear to look him in the eye while he did it and he didn’t know why. He pictured the bathroom as he had it memorized and did it quickly. Heard Kondraki react to the reversal with a sharp inhale like it was actually something to be impressed by and tried to ignore it. 

Clef opened his eyes. Ignored Kondraki. Checked his work, because that was the responsible way to do it, if you had to. Checked to make sure the grime had made it back where it needed to be, the dust made it back in the corners, the slight scratches on the tiles, the marks on the mirror and the objects in the drawers. 

Then he looked back at him, dead eyed. Embarrassed. 

“I don’t think you know how amazing you are. That was crazy. You know I don’t say that shit lightly, either,” Ben said, very seriously. “That was some… remarkable power, Al, quite frankly.” 

“Stuff it, Romeo,” said Clef. 

“I mean it. Jesus you’re fucking rude about this.” 

“Yep,” Clef said. He took another long swig of his beer and looked away. “Fixed the other stuff too.” 

Ben looked surprised. He got to his feet and peeked around the corner into the hallway. 

It was fixed. He’d fixed all of it in the blink of an eye.

------

“I’m not gonna pretend to get it, is what I’m saying,” Ben said delicately, following behind him into the kitchen twenty minutes later— Clef didn’t think there was even twenty minutes of shit to say about his reality bending, but Kondraki was verbose as usual. “From what I understand, it’s complicated. As an identity thing, I mean. The Green stuff.” 

Clef rolled his eyes. “You’re reading too many Serpent’s Hand manuscripts if you think it’s an identity thing, Konny, don’t be fucking soft. These bastards want you stupid so you don’t shoot them between the eyes.” He double checked his work in the kitchen, quickly, eying the colors and materials in the ceiling and walls, the scratches on the sink, the objects in the drawers. Superficially all correct. He’d check the small details and look at it all again with fresh eyes in the morning, but he was fairly sure he got everything. 

“It is though, isn’t it?” Kondraki said. “Like, to be honest, this kind of… it kind of reminds me of when we talked about dating for the first time, do you remember that? And you didn’t like the idea of dating a guy, not because you didn’t want to but because—” 

“Oh, fuck off,” Clef said again. “It’s not the same thing and you know that.” He’d only put four plates in the stack in the third cabinet instead of five. He added another out of thin air and ignored Ben’s gaze while he did it. “I’ll tell you what it is, it’s cosmic lying. That’s what it is. Fucking embarrassing and dangerous, not at all the same thing.” He shut the cabinet door shut and turned to face him.

Ben shrugged. He smirked. “I don’t think it’s lying. And it’s dangerous, sure, but that doesn’t mean it’s embarrassing.” 

Clef squatted and checked the contents of the cabinet under the sink. All the same. “My commander in the Gock would’ve called it a ‘severe lapse of judgment and control’.”

Ben took a long sip of his beer, and said, “Well, if there’s anything we know about the Gock, it’s that their judgement and control is impeccable.” He opened a cabinet to his right. “You forgot to put my three pounds of weed and brick of cocaine back, by the way.”

Clef laughed despite himself; he was good. Ben was really good. He put one hand on the counter above him and hoisted himself up laboriously. “Oh, that’s fine, I think you’ve had enough. I didn’t forget Draven’s, though.”

Ben stopped mid-sip of his beer. “What?” 

------

Clef snapped his fingers. Kondraki’s cigarette lit itself. 

They stood on the fire escape at Ben’s apartment now, which he’d decorated with blue and white lights and festive Dreidel stick-ons on the window behind them. Ben carefully removed the lit cigarette from his mouth, returned the lighter he was struggling to get to work to his pocket, and studied it carefully. He looked at Clef and grinned. 

“That’s still really fucking cool. You gotta do that for Hanukkah,” Ben said.  

Clef laughed softly, almost like he was charmed, or somehow flattered. “I haven’t seen a religion yet where changing reality is kosher,” he said. He removed his own cigarette from his lips and exhaled the smoke slowly. 

“Sure it is. It’s my house and my menorah, and I say it is.” 

“Oh, that’s a strong argument to have with a higher power, Konny. ‘My house, my rules’. That works all the time in the Containment blocks.” 

“Draven would be fine with it. And he’s the more religious Jew in the family,” said Ben. He slowly inhaled, then exhaled, then said, “I don’t think I had any super hard rules on the kid, but I mean, the ones I did have, I like to think the ‘my house, my rules’ logic was sound.” 

The night was cold and dark. Ben was wearing his hair down, the way he did when they were off work, and it came past his shoulders in a mess of lethargic curls, dark and streaked with grey. Alto thought that he himself had been old and fat for a long damn time, but Konny— he could have sworn Konny had been //young// and fat once. And it was crazy how beautiful he still was. 

Clef was lucky, that was for sure. He thought he was damn lucky. He leaned his head on Ben’s shoulder, as if he was resigning himself to something he couldn’t quite articulate, and looked out off the fire escape into the alleyway. 

“Sure,” Clef said. “You run a Site like that, too. I hope you know that. Not a whole lot of rules, but, you know…” He smiled. “If you break them, you’re required to break them in a cool way.” 

“Obviously,” Ben said. He kissed the top of Clef’s head in the dark, and Clef moved his head and met his lips, and they kissed again, for a moment. Then Ben said, “You’re my favorite haunting, you know. I hope that makes sense.” 

“It doesn’t,” said Clef, smirking. 

“Cool,” said Kondraki, smiling. “How about I just say I love you, then?” 

“Don’t get sappy on me now, Kondraki,” Clef said, but as he said it he put one liver-spotted hand over Ben’s on the railing of the fire escape, and warmed the other man’s curled fingers in his palm. “Oh, ‘my favorite haunting’, he says, always so goddamn prosaic about it. I love you, too.”</textarea></pre>
