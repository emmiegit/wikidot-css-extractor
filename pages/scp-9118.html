    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>WARNING: This document is classified Level 5/████. Unauthorized access is prohibited. Access without proper clearance will result in disciplinary action. 

 

Item #: SCP- ████ 

Object Class: Keter 

Special Containment Procedures: “The Anomaly” should be kept in 65 feet of titanium steel, especially having little to no space between the atoms. At least 3/4ths of the 05 council and Dr. ████ are needed for the ability to perform a test. All personnel must keep 330 feet away from “the Anomaly&#39;s” containment zone. “The Anomaly&#39;s” name it formally accepts is prohibited to be said: “The ██████ ██████ Of █████” or &#34;The Anomaly” would come after the person who has said name it formally accepts. 

 

Description: “The Anomaly” seems to look like a █████ or a moving cluster of black dust or smoke with no real eyes but “The Anomaly” tries to have its own eyes by leaving gaps through the only observed “head” “The Anomaly” has no real physical form, “The Anomaly&#39;s” floating torso and “The Anomaly&#39;s” “head” can move through solid materials, “The Anomaly” has been observed dissolving through solid materials and being reconstructed, this has been thought of to be due to “The Anomaly” being made of “black dust or smoke” it can move through any gap. “The Anomaly” is then quickly reconstructed. “The-Dimension-Where-You-Fall-To-Death” comes after any humanoid/living/animal Etc., In touch with “The Anomaly” there has been nothing observed there yet with human eye, only sounds. 

 

 

 

Addendum ████-1: 
Due to recent containment instability, this document has been updated under expedited conditions. Further revisions are pending.</textarea></pre>
