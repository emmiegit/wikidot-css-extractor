**SCP-15625-KO-J:** Mx. Let me out
**Author:** [[*user Crssk]]
**Translator:** [[*user fluxman]]
----
Image Credits

**Item #:** SCP-15625-KO-J

**Object Class:** --Thaumiel-- Safe

**Special Containment Procedures:** The subject is to be contained in a private room modified from the D-class personnel quarters of Site-21K and, in areas where no special containment procedures are specified, treated according to standard humanoid anomalous entity containment protocols.

According to the SCP Foundation&#39;s standard response protocols, negotiations are not typically conducted with humanoid/sapient/communicative anomalous entities. However, since the objectives of SCP-15625-KO-J align with the Foundation&#39;s principles of &#34;securing and containing anomalous entities,&#34; an exception has been made, and the Foundation has decided to cooperate with SCP-15625-KO-J. The Containment Department discusses containment measures for SCP-15625-KO-J post &#34;goal achievement.&#34; Until then, the entity has been appointed as a &#34;Special Advisory Consultant&#34; at Site-21K.

**Description:** SCP-15625-KO-J looks identical to a regular human. The phrase &#34;Doctor&#39;s Orders&#34; was written on his clothes at the time of discovery. The Foundation suspected the subject to be one of &#34;Little Misters&#34;, an assortment of humanoid anomalies made by [https://scp-wiki.wikidot.com/wondertainment-hub| Dr Wondertainment], which the subject admitted. SCP-15625-KO voluntarily appeared at Site-21K, and **desperately** requested help in exchange for being contained.
[[include component:image-block name=http://scpko.wdfiles.com/local--files/scp-15625-ko-j/15625drw.png|align=right|caption=&#34;Dr Wondertainment&#34;, provided by SCP-15625-KO-J.]]
SCP-15625-KO-J was going through the PhD programme in Wonderology^^TM^^, and his supervisor was Dr Wondertainment. When the programme did not go as planned, he impulsively escaped Wonder World[[footnote]]A pocket dimension or extradimensional space known as the GoI, &#34;Dr Wondertainment&#34;&#39;s base.[[/footnote]]

The following is the interview conducted after SCP-1562-KO-J&#39;s containment.

&gt; **Interviewer:** Dr Rosa Marcuse
&gt; 
&gt; **Interviewee:** SCP-15625-KO-J
&gt; 
&gt; //(SCP-15625-KO-J reacts to Dr Rosa Marcuse&#39;s entry. The subject is trying hard to push down his emotions.)//
&gt; 
&gt; **Dr Marcuse:** As per SCP Foundation guidelines, you have been designated as SCP-15625-KO-J. We&#39;ll be calling you by this name. Would that be alright?
&gt; 
&gt; **SCP-15625-KO-J:** ...Sure, whatever, it doesn&#39;t matter. As long as it&#39;s not that fucking Wonder World. (Under his breath) ,,That son of a bitch,,...
&gt; 
&gt; **Dr Marcuse:** SCP-15625-KO-J, are you ready for the interview?
&gt; 
&gt; **SCP-15625-KO-J:** (Frustrated, confused) What? Oh, okay. Sorry. Let&#39;s get on with it.
&gt; 
&gt; **Dr Marcuse:** We suspect you&#39;re one of the group of humanoid anomalies called &#34;Little Misters&#34;, created by the group of interest, &#34;Dr Wondertainment&#34;, as some of your traits align with them. Is that true?
&gt; 
&gt; **SCP-15625-KO-J:** Yes, it is. Technically speaking, anyone in Wonder World except for &#34;Dr Wondertainment&#34; is a Little Misters.
&gt; 
&gt; **Dr Marcuse:** I see. Are you from Wonder World?
&gt; 
&gt; **SCP-15625-KO-J:** Correct. I spent almost my entire life there, and I just... escaped.
&gt; &gt; **Dr Marcuse:** Escaped?
&gt; 
&gt; **SCP-15625-KO-J:** Dr Wondertainment was my supervisor. I was going through a PhD programme in Wonderology... But then...
&gt; 
&gt; //(SCP-15625-KO-J stops saying, and he starts frowining.)//
&gt; 
&gt; **Dr Marcuse:** Hey, are you okay?
&gt; 
&gt; **SCP-15625-KO-J:** **I spent [REDACTED] years after the programme to be &#34;Dr Wondertainment&#34;! But that doctor bastard is not giving me a degree!**
&gt; 
&gt; **SCP-15625-KO-J:** //(Tears flowing down his face)// **I spent ██ years making toys, █ years coming up with a theoretical basis for them, and ██ years in Wonder World doing paperwork for him! And that&#39;s not enough? How much do you want from me, Wondertainment!**
&gt; 
&gt; [The statements were omitted, as it is too devastating to be recorded in the SCP Foundation Database]
&gt; 
&gt; //(Dr Marcuse starts crying as she listens to the raging SCP-15625-KO)//
&gt; 
&gt; **&lt;Interview continuation deemed impossible. Interview terminated.&gt;**
 
Security returned SCP-15625-KO-J to his designated containment chamber. The subject continued to sob and rage for about three days.
 
&gt; Anyone with higher education enough to work for the Foundation will cry a river when they listen to his story. 
&gt; - **Dr Rosa Marcuse**
 
&gt; Yep, made me cry. Sigh... That [REDACTED] years... 
&gt; - **Site Administrator Gangsu Lee**
 
Disciplinary action due to &#39;inappropriate action during interview&#39; was revoked for Dr Rosa Marcuse,
 for the above reasons.
 
A follow-up interview three days later, after SCP-15625-KO regained stability, stated that the subject was tasked by Dr Wondertainment to &#39;gather all Little Misters, &#39; which will lead to the consideration of granting his degree. SCP-15625-KO-J claimed that this task is &#34;a very gruesomely arduous and difficult task&#34; and was why he impulsively escaped Wonder World and came to the Foundation. SCP-15625-KO-J expressed extreme anger and sadness during his testimony, and tranquilisers were administered by Site-21K staff.
 
As per the Special Containment Protocols, negotiations are not typically conducted with humanoid/sapient/communicative anomalous entities as per standard responsive protocols. However, as his goals of collecting all Little Misters made by Dr Wondertainment aligns with the SCP Foundation&#39;s goals, Administrator Gangsu Lee of Site-21K proposed the Korea Regional Command to cooperate with SCP-15625-KO. After a 24-hour-long discussion, Administrator Gangsu Lee&#39;s proposal was accepted by Administrator Noraemine&#39;s direct orders.
 
&gt; Several oppositions were present, but they, too, were saddened by Little Mister Skip&#39;s interview video. 
&gt; - **Grace &#34;Noraemine&#34; Choi, Administrator of Korea Regional Command**
 
**Addendum 15625.01:** Following Administrator Noremaine&#39;s directive, the Foundation has been assisting SCP-15625-KO-J in achieving its objectives. Personnel assigned to the &#39;Little Misters&#39; containment operation requested the entity&#39;s cooperation. This proposal was approved by a majority vote, and SCP-15625-KO-J was appointed as a special advisory consultant for the containment of the &#39;Little Misters,&#39; assisting Foundation personnel in their containment and research activities.
 
Foundation personnel receiving assistance from SCP-15625-KO-J unanimously expressed great satisfaction with the knowledge and efforts provided by the entity.
 
**Incident 15625.01:** Thanks to the collaboration between Foundation personnel and SCP-15625-KO-J, the Foundation was able to contain all &#39;Little Misters&#39; SCP entities. The SCP Foundation has determined that all of SCP-15625-KO-J&#39;s requirements have been met.
 
SCP-15625-KO-J informed &#34;Dr. Wondertainment&#34; that his task was complete and requested a review for his doctoral degree.
 
Approximately 168 hours after the entity requested the doctoral degree review, the following message was received:
 
&gt; **Wow!** You&#39;ve just collected all of Little Misters, a limited edition collection from Dr. Wondertainment!
&gt; 
&gt; ##A901DB|**Unfortunately, your degree has been denied.**##
 
&gt; **AAAAAAGH! WONDER, YOU BASTARD!!! LET ME OUT!!!** 
&gt; - Upon recieving the message, SCP-15625-KO-J blurted out and fainted.
 
&gt; That&#39;ll make even the black moon howl. 
&gt; - **Site Administrator Lee Gangsu, after checking the message next to SCP-15625-KO-J.**

 
**Revised Special Containment Procedures:** The subject is to be contained in a private room modified from the D-class personnel quarters of Site-21K. Site-21K psychological treatment staff is to monitor the mental status of the subject regularly.
 
Site-21K research personnel are increasingly requesting SCP-15625-KO-J to be their research assistant. All results are pending.
