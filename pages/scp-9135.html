    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>**Item:**SCP-9135
**Object Class:**Safe

**Special Containment Procedures:** SCP-9135 is contained in a chamber of glass with a size of 6x6x2m. The chamber must have only water and a under water landscape. SCP-9135 due of it`s friendliness are personel with Level 2 or higher allowed to interact with SCP-9135.

**Description:**SCP-9135 is a 10cm high and 30cm long  and a weight of about 1 to 6kg.SCP-9135 is a friendly blue colored lobster. Of this lobster is only one known, but it can be more. SCP-9135 eats only little fish and corals.If something damaged SCP-9135,it will turn aggressive and try to damage the enemy to protect itself. It have a giant anomalous power. SCP-9135 is always under water in little caves or other spots. 
The first sighting was 12.06.2020 at the coast of █████, Norway.

//No further information is currently available.//</textarea></pre>
