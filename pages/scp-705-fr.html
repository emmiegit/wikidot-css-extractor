**Object #:** SCP-705-FR

**Threat Level:** Orange ##orange|●##

**Object Class:** Euclid

**Special Containment Procedures:** As SCP-705-FR is very difficult to reach, the Foundation&#39;s interactions with the anomaly are limited to astronomical observation during its passage in front of the Sun. Civilian observations of SCP-705-FR are to be discredited and photographic evidence is to be described as edited.

A calendar of SCP-705-FR observation periods has been established until 2084 and is displayed in Site-Lamedh&#39;s Study Room 3.

**Description:** SCP-705-FR is a unit of eight biplanes in orbit around the Sun. The squadron is composed of four Nieuport 17[[footnote]]French aircraft put into service in March 1916.[[/footnote]] and four Fokker D.II [[footnote]]German aircraft put into service in January 1916.[[/footnote]]. The method in which these planes have attained their position and withstand constant solar exposure is unknown. SCP-705-FR appears to follow a regular circular trajectory around the Sun.

The status of the crew members is unknown, however, changes in the aircrafts&#39; positions among themselves have been noticed over the years.

An investigation within the French Military Archives (FMA) led to the discovery of a document potentially linked to SCP-705-FR.

&gt; I dreamt of wings, the Army gave me some.
&gt; Wings of a canvas, and made me a soldier.
&gt; 
&gt; We pointed to the sky and said &#34;kill those people!&#34;
&gt; And I killed flying men, like me.
&gt; 
&gt; The sky is my country and my plane a wonder
&gt; Aviators without a country, let&#39;s fly toward the Sun.
&gt; 
&gt; Émile D&#39;Ovinmont, --__French__ Aviator--[[footnote]]The word &#34;French&#34; is more violently crossed out.[[/footnote]] ICARUS

The document was found in October 1916 in an uncultivated field in the Somme (80)[[footnote]]**Translator&#39;s Note:** The &#34;(80)&#34; refers to the Somme&#39;s department number in France.[[/footnote]], in the pocket of a French aviator&#39;s jacket whose insignia had been torn off. Émile D&#39;Ovinmont was a French aviator who was reported missing in 1916, along with three other pilots who were accompanying him. They were declared deserters with the discovery of this document.

**Addendum:** On 02/09/1994, during routine observation of the anomaly by Dr. Domitille, an additional silhouette was noticed in the proximity of SCP-705-FR for the first time. This silhouette has since been spotted with each observation of SCP-705-FR and seems to be attached to the leg of one of the planes. Its presence is to be considered normal.

//Note: Although it&#39;s not established with certainty, it&#39;s possible that this silhouette is [[[http://scp-int.wikidot.com/scp-140-fr|SCP-140-FR]]]. A request to use Site Lamedh&#39;s radioscope was made for more advanced observation.// - Dr. Domitille.
