+ Introduction

Welcome to the official SCP Foundation Wiki 2023 Community Survey results! We&#39;d like to thank everyone for participating. It&#39;s always amazing to see just how many people submit responses, and it&#39;s wonderful to know how many people enjoy the wiki and the SCP fandom as a whole. This year, we had a total of 2507 responses, which is significantly below the last two years

Furthermore, as a reminder, we will be having open town halls with open response forms halfway through the upcoming year for you to voice specific hopes, requests, and concerns you have for the site.

A brief summary of major takeaways from this survey:
* Nearly all of our respondents used the English wiki. This is to be expected, as our survey was conducted in English and sent primarily to the English-speaking community
* Over half of our survey respondents were 18 years old or lower
* Over half of our respondents live in the United States, with almost no other countries commanding a plurality.
* While almost 98% of our respondents read articles on their primary wiki, only about 7% comment regularly and only about 6% write regularly.
*  All of the 1-5 questions seem to be highly correlated. With 50% of the variance being due to a single factor, the statistical analysis does tell us what that factor is, but we are designating it &#34;how much people like stuff&#34;. This highly limits how useful each metric is.


While our survey is comprehensive, this data report is not. Please let us know if you have additional requests for visualizations in the comments section below or to our social media handles, and we&#39;ll see what we can do!

Thank you for being part of the SCP experience, be it as a reader, writer, or fan.
