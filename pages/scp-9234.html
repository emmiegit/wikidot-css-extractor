**Item #:** SCP-9234

**Object Class:** Metanoia

**Special Containment Procedures:** The town of ████‎█‎‎█, Virginia is to remain under full quarantine. The area is to be presented to the public as the site of a severe chemical spill. All roads leading in or out are blocked under the guise of EPA-mandated cleanup. Foundation personnel are to monitor the perimeter and intercept any civilians attempting entry. No food or organic material is to be brought into or removed from the town without Level 3 approval.

**Description:** SCP-9234 is the designation given to an anomalous effect that, until recently, affected all food consumed within the boundaries of ████‎█‎‎█, Virginia. Any edible item ingested inside the town retained its normal physical properties, including but not limited to: 
* appearance
* taste
* texture
* nutritional content
* chemical composition
However, the item would be somehow be extraphysically transubstantiated into human flesh. Standard scientific analysis could detect no difference from ordinary food.

**Addendum 9234-1:** On [REDACTED], during preliminary testing of the anomaly, the transubstantiation effect on food ceased abruptly across the entire town. No further instances of food converting to flesh have been recorded.

Immediately following this cessation, every resident of ████‎█‎‎█ (population 2,341) underwent a reciprocal anomalous change. While each individual retains normal human appearance, behavior, speech, and physiological function, their fundamental substance has been transubstantiated into food.[[footnote]]Each resident has been transubstantiated into a specific type of foodstuff. No correlation has been found between the type of food and the individual&#39;s age, diet, occupation, or any other observable factor.[[/footnote]] Biopsies and standard medical imaging continue to register as ordinary human tissue, but specialized analysis confirms the extraphysical alteration. Residents appear unaware of any change and continue their daily routines without incident.

**Addendum 9234-2:** Foundation leadership is currently reviewing Proposal EC-9234-01. The proposal recommends designating all ████‎█‎‎█ residents as subjects for Foundation testing. Proponents note that, given the residents&#39; extraphysical composition as food rather than baseline human beings, such utilization would represent a more ethical sourcing method than current procedures. Deliberations remain ongoing.
