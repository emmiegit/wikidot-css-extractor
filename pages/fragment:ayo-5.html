She woke to vibrations this time. Rumbling and the chill of air conditioning.

That’s right, they were taking her to her new home in this van with all the strange lights. She forgot how long they told her to sleep, but the drool pooling at the sides of her lips and the ache of her muscles told her she didn’t sleep nearly long enough. 

It was hard to settle back into reality without the buzzing, but it used to be normal. Her father told her once about a salamander that forced your eyes open when you were sleeping while it ate your dreams and when you woke up you would be bald. He always laughed about it, but it kept her checking her pillow at night instead of sleeping. Now she’d give anything to be able to sleep for as long as she could each day. Maybe one of these days she’d wake up and be back in her room.                                        
,,//##E8E9E8|Zena! Don’t play with me, you’ve been in there for hours!##//,,

Scary, but thinking about ever being like that with her family watching again was much more terrifying.

“Is that 2599? Already?” She had barely moved her head before she heard Wensley’s voice.

“Why don’t you put her back to sleep? I’ll tuck her in this time, for you.” Lyla sat across from her reading a book like the intro to ontokinetics. Maybe it was more info on the Facility 120. Even if it was, there was no way Ms. Lyla was going to let her read it.

“It doesn’t work that way and you know it. This hasn’t been fun for any of us.” He began to mutter to himself, burying his face in his palm.

“Ok 2599, we will be arriving in the next 4 hours. Can you be quiet and still until then?”

“Yes sir!” 

“Just yes is fine…please.”

Lyla sucked her teeth as she flipped a page.

Zena had enough thoughts to distract herself with. Like what she would look like in ten years. Her mother wanted her to be smart and make a lot of money, her dad wanted her to put something good into the world. So she was already set on supporting the family in medicine, She remembered how much fun she had in chemistry and already planned to become a chemist. In the daylight.

In moonlight she had dreamed of being a secret agent. She knew some of the people who worked for her parent’s were secret agents. At least that’s what Jun had told her. They went on all sorts of missions going into dangerous places to save sick people and stop bad guys. She had always wanted to believe those stories and now she knew they had to be true. Those were the only times she could remember when Jun wasn’t such a fathead.

Dr. Wensley, was still muttering while flipping through the pages in his binder. She couldn’t see the driver’s face but she had a feeling he was annoyed by it. She wasn’t the only one who wished they could sleep. 

“…a mistake.” He said it again. He was saying it before they even began the trip.

She wished she could gaze out of a window and see what kind of places they were passing. There was just an array of bright lights that looked like TV static. She wondered if they could actually play a show, but she then remembered one of the first things they said she couldn’t do was watch TV or even listen to music. She couldn’t wait to be rid of this stupid anomaly. 

She stared in the sparkling static gateway, tracing images in the display with her finger. The bunny was the easiest to see hopping along the trail, the face of a fox was next to stare back at her curiously. It was as she trailed the neck of a swan she was startled by Ms. Lyla slapping her arm down.

“Knock i- It&#39;s not playtime!”

Dr. Wensley stared back at the two of them. It was embarrassing, usually it was Jun sitting here. It’s not like she wasn’t taking this seriously. She had nothing to do for the next four hours. Still she knew better.

“Sorry.”

“Look, it’s not that we don’t trust you, 2599, it’s just that this is an important transition and we can’t afford anything to go wrong here. At all. We were lucky they even picked you.”

“Karl asked me to.”

“Of course! Of course. Aktus...he sure has an eye on him! Even in his old age. Quite…the veteran.” Each word dripped out of his mouth slowly.

“He never did let on how he managed to cont- guide you on using your anomaly. I wish I could have his magic touch. To have you more prepared, obviously.”

“If you need me here Dr. Wensley...”

“No!&#34; The words shot out his mouth like he was faced with a bear. &#34;I think this is best. For everyone. Really. I’m...let’s just get this over with.” 

Ms. Lyla sucked her teeth and went back to her book.

“This may be a good time to bring out the chimp. I don’t think talking is going to make this ride any more comfortable for any of us.” The soldier in the back spoke. His name was Mert…or was it Mort? Mert.

“Agreed! Lyla.”

She grunted as she took a small box from Mert. She slipped her fingers inside quickly and pulled out a black ball on a key chain. She fastened it to a hook, leaving it to dangle right in front of Zena&#39;s face. Every five seconds the shadows would vanish and she&#39;d see the capsule’s prisoner, [https://scp-wiki.wikidot.com/scp-894 some arcade prize, a monkey holding it&#39;s ears.]

Being treated like a baby again. She looked at the mocking monkey, mouth stretched open like an idiot.

Everything about this was embarrassing. She tried not to let the humiliation make her regret her choice.

Choice. She should have been a comedian.

She sneezed and noticed the sound was gone. Another oddly familiar feeling. But it was the closest thing to sleep she could get now. 

She felt a tap on her shoulder. Mert offered to wipe her snot covered face with a tissue. This was going to be a long ride. It had to have been a while since she woke up right? Like maybe thirty minutes? Another thing she had accepted was apparently digital clocks, or any for that matter, weren’t common here. The guards who say the time occasionally, but it seemed like everyone at the foundation knew the time all the time.

One…

Two…

Three…

Seconds were longer than she thought. Imagining ten years at this rate...No way! She had to be better than that. She had to rub it in Jun’s face she became a secret agent first.
She tried not to get her expectations high like Dr. Jora said.

Four…no where was she? The van stopped before she could align her time. Were they here already? 

Dr. Wensley opened the van door. He then stared at Ms. Lyla. 

“Make hershey dozen moo, please.”

The door shut and the monkey danced. Lyla muttered something as she flipped off the door. She shifted her position to stare directly at Zena.

One…

Two…

Three…

Four…

Five…

Six…

Seven…

Eight…

Ms. Lyla was still on her vigil.

Fourteen…

Fifteen…

“Go have your boat if you want. She wasn’t me my light.” No, sight? It was so fast and loud. She felt the words rattle her. Why was she angry already?

Twenty four…

Twenty five…

Twenty six…

Twenty-

“The only thing I eat is to heap the little high go in bed!”

…Thi-thirty uhm.

“I HATE EDDY IT GO! WHAT’S WRONG WITH EVERYONE?” 

쉰 하나  쉰 둘 쉰셋 쉰넷 쉰다섯 쉰여섯 쉰-

“We’re supposed to eat these bunkers…”

eight nine 예순 one two three four five six seven eight nine 일흔 one t-wait are they leaving?

She only caught the briefest glimpse of green and blue before they closed the door behind them.  There was still a rumbling even though the car had stopped. At least she knew it was still early.

There was more than one reason to feel relieved now.

She slunk in her seat staring at the monkey playing peekaboo from it’s cell. Everytime she saw it, the more she realized how cute it was. It was also her only company now. Better company.

&#39;Wanna help me count Heol?&#39; 

A soundless question met a wordless reply.  

She took down his hanging prison and placed it on her leg. Every time she passed sixty seconds she would turn 헐 trying to imagine a clock beneath him. After six minutes, she found her eyes got heavy. Maybe it was the realization of how ridiculous this was. Maybe it was because of how long she had been waiting.

Where could they be? It was probably just another office building, but maybe this one had a lab she could work in too. As if they’d let her. She could probably manage a peak, but Ms. Lyla was on the other side of that door. The ride felt a bit bumpy, maybe they were off-road at some old cave. Seemed like somewhere a secret organization would meet. 

Wait...what if they were going to sell her? No her parents wouldn’t leave her with people like that, especially while she was sick. No. This was probably another test. A test of patience. She chuckled thinking about them making her meditate under a waterfall. It seemed silly but all of this felt so…how did dad put it? Surreal.

She took in a breath and gagged. Maybe she was just parched but she could feel the moisture in the air on her dry throat. After a few coughs she let it settle in her lungs. It had been a while. She walked down a path of moss and stone towards the waterfall noticing a group of people there.

The man had messy hair and a short scrappy beard, he wore the company logo on his clothes. The tall lady next to him didn’t seem to like him much. She was pretty enough to be a movie star, looking the full part of a secret agent. Really with her poised stance and focused expression she was more likely a model. Maybe this was all just a set. Even Dr. Wensley was there, upset as usual. Of course he would be, arguing for her sake always made mom exhausted too.  They began walking along the path towards where she stood. Wait.

“2599!”

As Dr. Wensley approached she felt a hand practically rip her shoulder off. A cigarette fell on her skin, burning it. Mert approached quickly as well, flushing and hunched over. 

She couldn’t hear,  but she knew the way Dr. Wensley moved when he was angry. The Actress was even angrier, luckily her anger was at him.

But now they were all arguing. Ms. Lyla’s grip got tighter as Wensley seemed to go in on her. The Actress pushed a paper she had been holding into Dr. Wensley’s chest before pointing to her in outrage.

하나, 둘, 셋 …

She was approaching Zena now. With the roar of the waterfall still shaking her body, it was like facing a storm front. Ms. Lyla loosened her grip and shoved her forward as an offering. 

The Actress began her code. Zena felt like she was supposed to get some kind of message but she didn’t know it yet. Did she miss that part? She moved so fast. She finished her spell. Everyone was staring waiting for her response. Wensley tried not to make eye contact.

She couldn’t afford to mess up already. She copied the woman’s motions as best as she could feeling like she would spit out a fireball when she was done.

The woman slapped her own face before shouting at Wensley. Wensley barked back pulling out another piece of paper from the bag he had been carrying. The Actress took the paper and examined it thoroughly, taking glances at her as she did.

This was it. If this woman was the boss…then she failed already. Dr. Wensley was right.

The Shaggy Beard said something and Mert laughed. Everyone was making fun of her now. As she tried to find her place counting, trying to find answers in the dirt, The Actress knelt down to her level.

…hair?

“No!” She pulled back wrestling with the fingers in her curls.
Before she knew it the woman was dragging her along by the hand. 

They stopped in front of the falls, she could feel the winds pushing against her and splashes smacking her face. She was reintroduced to sound by the booms of the waterfall.

“…quite shit with ankle biters.&#34;

Who was that?

“ I don’t care what he says, it’s clear he’s ok giving me his failed experiment. I’m taking care of this.”

What did she do? Who-

“Go unconscious for 6 hours.”
