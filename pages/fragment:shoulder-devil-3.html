    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>&#34;Ah.&#34; It took a moment for Lily to tear her gaze away from the night sky and back to Iris. &#34;That was a rather fast decision, for you.&#34;

&#34;Do you want my help or not?&#34; Iris sighed. All that convincing and she seems shocked that it worked. Maybe not the best sign.

&#34;Oh, no, I didn&#39;t mean it like that. It&#39;s good to be decisive.&#34; Lily strode towards Iris and moved to take her hand, but stopped herself just before the two could make contact. A strange expression washed over her face, but she turned her back to Iris and walked back to her gestation pod before she could see. Iris reluctantly followed, and the two settled next to each other in front of it.

And there they stayed, looking up at the sky for a good minute or two in silence. Now that Lily had gotten her way, she was letting Iris come to terms with things on her own time. Except, the conversation hadn&#39;t died because Iris still had to mull things over.

&#34;...Ahem.&#34;

Lily looked up with wide eyes and a quizzical expression.

&#34;...So?&#34; Iris asked.

Lily cocked her head. &#34;So?&#34;

&#34;Well, um...&#34; Iris tugged her collar. &#34;What now?&#34;

Without changing her expression much, Lily scrunched her eyebrows. &#34;Well, you let me in, and then we go from there. Go out of here, that is.&#34;

&#34;Right, right.&#34; The simplistic explanation confirmed Iris&#39; fears: she was supposed to know what to do. Still, it was a little unfair to expect that. Not like she was some hussy who regularly formed trysts with hive minds. &#34;So, uh, how?&#34;

&#34;...Ahaha.&#34; There was no mistaking that laugh for one of comedy. &#34;Well, I can&#39;t show you until we come together.&#34;

&#34;Okay, just one thing at a time.&#34; Iris scratched the back of her head, maybe as a way to distract herself from the sensation of her flushing cheeks. &#34;How do I do that first thing?&#34;

Innumerable expressions battled for dominance across Lily&#39;s face, but an excruciatingly patient smile eventually won out. &#34;You just... let me in. I&#39;m afraid it really isn&#39;t something I can do for you, with you not having my backdoor. It&#39;s your decision to make, anyhow, so even if I could do it, I wouldn&#39;t.&#34;

&#34;So, what, I say you&#39;re in, and you&#39;re in?&#34; Iris huffed.

&#34;Mm. More or less.&#34;

&#34;Fine, then. You&#39;re in.&#34;

&#34;Ugh. Well, you&#39;ve got to say it like you mean it.&#34; Lily seemed less upset by Iris&#39; incompetence than by her lack of enthusiasm.

Iris clicked her tongue. &#34;What, was that not peppy enough for you?&#34;

&#34;Not really, no,&#34; Lily shrugged. &#34;You&#39;ve got to mean it when you say it.&#34;

Despite the fact that it was Iris who was showing her incompetence, she felt herself getting annoyed. &#34;I //do// mean it. I&#39;m not just saying shit, I&#39;m doing my best to make a connection or whatever.&#34; In her head, Iris stared at Lily with the intensity of the sun, who, in response, sighed. Iris was doing her best to visualize some kind of connection between the two, like a thread coming out of her hand, closing the distance between the two of them, wrapping around Lily&#39;s neck, and wiping that-

&#34;Oh!&#34; Lily perked up like a dog seeing a rabbit. &#34;Well now! That actually worked.&#34;

It did? Iris didn&#39;t feel any different. &#34;...You&#39;re not fucking with me, are you? I said I was trying.&#34;

&#34;Oh, no no no. We&#39;re together now, honest. That stubbornness of yours actually came through.&#34; Lily sat down on her body&#39;s pod, resting her chin on her hand and humming to herself with a smile. &#34;Yes, yes, this all just makes sense. I feel much more at home in here than anywhere else. How pleasant. This must be how it feels to have...&#34; She trailed off as she muttered to herself.

Iris tugged on her collar. If anything, the lack of some... big, mind-bending flashback was starting to unnerve her. Lily seemed right at home, and she couldn&#39;t feel any difference. If she really tried to find something, she thought that Lily looked and sounded sharper, but the difference was so small that her mind could be playing tricks on her.

She could feel herself start to get nervous. She&#39;d rather see the devil&#39;s due sooner rather than later.

&#34;Relax, Iris, dear,&#34; Lily tut-tutted. &#34;I don&#39;t need to read your mind to see you&#39;re nervous, but don&#39;t overthink it. I&#39;m sure we&#39;d both prefer that we had our own space, so I made sure to partition our memories for now.&#34; When Iris&#39; condition did not improve, Lily continued. &#34;Try to recall when I sent a body to watch the flowers in Uzhanskyi bloom, this past April. The pink ones.&#34;

Iris blinked. Iris could feel her memory being jogged, but couldn&#39;t recall any specifics beyond the idea of trees and grass. Thinking hard about it made Iris feel like a fraction of her brain was intoxicated, which was an odd feeling when the rest was sober.

&#34;Don&#39;t think about it too much. Better to keep things separate until you&#39;ve figured out how to process two sets of memories, but if you&#39;re anything like me, you&#39;ll pick it up soon enough. Besides,&#34; Lily said, leaning back with a grin on her face, &#34;I&#39;ll give you something to remember right now.&#34;

Faster than a blink, Lily was gone. For a moment, Iris was alone with the flowers rustling in the wind, and the sense of unease that came with knowing she wasn&#39;t //truly// alone. That was another thing she&#39;d get used to. She knew she wouldn&#39;t have to wait for her to return, though - Lily had an eye for the dramatic. Couldn&#39;t let the pacing escape her.


After a long enough pause to build some tension, the gestation pod Lily had been sitting on hissed, the metal covering sliding off its top. Iris decided she could be a good audience for this - after all, you&#39;re only born once.

Even if Iris hadn’t resolved to be quiet, what awaited her in the pod would have shut her up. Cradled in translucent gel, a body slept - no, Lily slept, whole and complete, unlike the sacks of bones surrounding them. She was, in a word, perfect, so much so that Iris found it hard to know where to look without a single blemish to focus on. She scarcely seemed to have a pore on her skin, and her silky hair was such a radiant blond as to appear white under the cold light of the flowers. Lily was, at once, beautiful and off-putting, radiant and uncanny - it was like someone had taken the idea of Iris, stripped her of all of her edges, and reconstituted what had been taken with the most agreeable replacements. To say she looked like a version of Iris from a dream would be a disservice to the unmatched craftsmanship that had clearly gone into creating the vessel.

A minute was given for the audience to properly bask in her radiance before the pod hissed again and the gel that had embraced the pod’s precious cargo began to drain. Another moment, and the glass of the compartment retracted into the frame, and the woman was exposed. A rather cold, utilitarian birth, with little more fanfare than a technology presentation, but perhaps, for Lily, that’s all that this was.

Moments came and went. The only motion from the pod was the wet hair moving gently in the breeze. In fact, Lily chest didn’t even seem to be rising and falling, but Iris waited. Maybe she was giving her some space, or maybe she was still making sense of the distorted reflection lying before her. Either way, neither woman moved for some time.

Then, without warning, Lily’s eyes shot open. Her arms curled up to her throat, then flopped back down again, then back up to the throat, again and again. Her spine twisted like snake caught in a trap, and she writhed around until she fell out of the pod and hit the ground with a soft //thud.// Choking and gagging all the while.

Iris had heard sounds like that before. The violent reminder of agonal breaths and death rattles snapped her back to the present and brought a dizzying heat to her head as she rushed over to Lily’s side. Her limbs jerked about randomly, her neck twisted, and her jaw moved erratically as she twisted herself up in her long hair. What was this? A seizure? Iris fell into her first aid training routine like a machine, stripping her jacket and trying to wrap it around Lily’s head.

“L-Lily?” Iris asked. The words felt awkward in her dry mouth. “Can you - Can you hear me? Lily?”

It wasn’t  clear if Lily was responsive until her eyes, just as green as before, locked with Iris through her disheveled hair.

&gt; Suffocate/Asphyxiate/Drown

Lily wasn’t speaking to Iris so much as forcing her to think about the concept of ‘not being able to breathe.’ Unproductive, as all it did was make Iris feel like her throat was closing up, but she’d have to find it in herself to forgive her later.

“Okay, uh, shit.” Iris stood up to… what, exactly? Do chest compressions? Pick her up for Heimlich maneuvers? If Lily couldn’t stand, then maybe chest compressions were safer, even if she cracked some ribs-

&gt; No/Do not/Stop that/Reconsider

“Goddamnit, Lily, I have to do //something,//” Iris muttered through gritted teeth. Lily scratched at her throat, and with some effort, shook her head.

&gt; Not choking/Open airway/No obstruction

A moment of relief came and went. Removing an airway obstruction was where her first aid capabilities ended. Lily was red, well on her way to blue, and there wasn’t anything Iris could do. Even though her head knew this, her arms and legs carried her to Lily’s head and she began doing rescue breathing, the muscle memory of her drills taking over when her head failed.

Lily’s thrashing had begun to die down, and she offered no resistance aside from a confused look in her eyes. Iris tilted her head back and exhaled down her throat two times, and the breaths went in. Lily made more strange noises, but otherwise had little to say as Iris counted to six before leaning back down and exhaling again. She had no idea how long this could be expected to work, but she had to do something.

The last breath from Iris seemed to continue going in once she had finished exhaling, and was followed by a choking, gagging, painfully long exhale from Lily that nonetheless got the air out of her lungs. A snorting, stop-and-go inhale followed, but when Iris bent over to breathe again Lily swatted her away. Lily continued to force her way through breaths until she came to a rhythm. She stopped lashing her arms out and color began to drain from her face, returning to the porcelain it had been inside the pod.

Iris flopped on her back and caught her breath alongside her counterpart. Once the panic had left her, she gave until the heavy breathing no longer sounded labored to speak again.

“You alright?” She asked, loud enough to be heard, but gently enough to sound non-judgmental. She hoped.

“G-Ggh… Pff. Ffffu… Fffffuuuh, guh.” Lily’s response did little to help Iris’ frayed nerves, so she sat up to look at the woman lying naked in the flowers. Lily made some more sounds in between her breaths, but eventually gave up and draped an arm over her eyes.

&gt; Fine. I’m fine. And tell me what you’re doing before you do it, next time.

&#34;You&#39;d be able to tell from context clues if you were paying attention,” Iris muttered to herself. Then, louder, “I was just trying to help.”

&gt; Yes, I know.

Lily pressed her arm into her face more tightly.

&gt; …I suppose I should thank you, shouldn’t I?

“Mm. Wouldn’t hurt.” Iris scooted over to Lily’s side and wrapped her in her coat. It wasn’t unpleasantly cold there, but if Lily was anything like Iris - and she certainly liked to say she was - she probably felt rather exposed. And Iris didn’t like seeing that, besides.

Iris tried coaxing Lily to sit up against the pod, but when she found that Lily wasn’t doing much to help her, the coaxing turned to pulling, and the pulling to dragging. And even then, it took a few tries for Lily to find her balance - sitting down - and stay upright against it.

And in all that time, no ‘thank you’ came. She didn’t even try forming words again.

Kneeling down in front of Lily, Iris mustered her most sincere voice. “So, hey, you sure you’re okay?”

Lily slowly curled into - fittingly - the fetal position, wrapping her arms around her knees and tucking her head into them to avoid eye contact. A jerky nod came as her answer.

“…What was that?”

“Nnn… Nnnngh… Nuuuh… Guh.” Lily pulled herself into a tighter ball.

&gt; It was nothing.

“It was obviously //something.//”

No response.

“Lily?” Iris leaned forward. “You still there?”

&gt; I’m right in front of you, aren’t I?

Her ‘voice’ was forceful, but Iris didn’t flinch.

&gt; …I was just getting my bearings, is all. Pay it no mind.

“You were…?” Iris thought about it for a second. She couldn’t remember being born herself, but considering she was probably crying the whole time, it couldn’t have been a pleasant experience. But even so, what did that have to do with her breathing? She sighed.

“What,” Iris mumbled to herself, “did you not know how to-”

“Gggh!” Lily tensed. Iris felt a red-hot rash of shame rip past her.

Ah. Iris fell back to give the naked woman some space. With each gust of wind over the hills, she violently shivered. Careful not to touch her directly, Iris did her best to pull her coat to better rest on Lily’s shoulders. It was largely a symbolic effort, as Lily seemed to be a fair bit tall than Iris and was shaking all the while.

&gt; Stop that. I don’t need it. I’ll be ready soon enough, this is - it’s like waking up when you’re still-

“Yeah, yeah. I get it. It’s new.” Iris scooted back to admire her handiwork, and realized her coat wasn’t doing any better at keeping Lily insulated from the wind. She frowned. But she would have felt awkward trying to fix it again, so she tried to brush past it with something more lighthearted.

“Word of advice, breathing comes a lot easier if you don’t think about it,” Iris said.

Lily glared daggers at Iris over her arms - it might have been the first fully coordinated action her body had taken. Her sharp green stare pinned Iris in place - even in shadows, her eyes seemed to glow like a cat’s, and there was something seething behind them.

&gt; You think I don’t know that?

She didn’t even try forming words now.

&gt; Do you enjoy mocking me, you… //you…//

Condescension and vitriol swirled in Lily’s head, but she stopped herself before putting it into words as she shoved it back down to where it wasn’t so apparent and tucked her head back into her arms. She took a deep breath, as steady as she could manage, and willed herself to stop shaking.

&gt; Oh, forgive me my churlishness. I’m not a morning person after all, it seems.

----

As quickly as they had draped themselves across the dreamscape, the flowers were gone, replaced once again with Iris’ room. Only the two of them were present, the bodies left behind with their purpose fulfilled. Lily’s hands made no attempt to snap, instead dedicating her efforts to push herself back against the bed with her legs, now that the gestation pod was gone. They ineffectually slid against the carpet, and Lily groaned in discomfort. She eventually lost her balance and flopped onto her side, eliciting a louder moan.

When Iris moved to help, Lily kicked at her. It was slow, and it didn’t connect, but the intent was clear. Iris slowly walked backwards to her desk and sat down in her chair, watching Lily drag herself over to the bed, more out of stubbornest than anything, she could tell. She recognized that look from her own eyes.

&gt; Now, here we are. Nothing left to do but hop back into the land of the living, hm? Are you looking forward to it? //I’m// looking forward to it!

Lily’s chipper tone was clearer than her words - to her, it was more important to communicate than the words themselves. This, despite the fact she continued gagging and heaving as she dragged herself across the floor. Rubbing up against old carpet was unpleasant on a good day, to someone with callused skin who was accustomed to their own sense of touch. Nevertheless, Lily pushed on. Perhaps out of respect, Iris decided to stare at the wall.

&gt; Okay! How about we get started, then?

“Wh-What?” Iris was caught off guard. Lily hadn’t even made it to the bed yet.

&gt; Oh, do you need a moment? Hm. I thought you were faster on the uptake, but if you still find the change in scenery to be jarring, I can wait a moment.

Iris blinked. “Well, no, I’m fine, but-

&gt; Good! Time is money, after all. Ah, not that either of us would have much use for it. Even so, wastefulness is a sin.

The wall Iris had been looking at began to distort, like a thick yet perfectly clear sheet of glass had been placed in the center of the room. The image of the wall then began to expand and contract at set intervals, until it coalesced into a number of threads. Somehow, the image of the wall was still there - both it and the threads were in front of Iris at once, not like one was translucent, but like she was seeing both with full opacity at once. It was, to put it lightly, a bit of a trip.

&gt; You don’t have your photographs with you, but I’m sure I’ve given you the next best thing: a tangible, three-dimensional projection. Look now, I’ve even done my best to make it more readable for you. All arranged nice and neat. Optimization like this is hard to come by, you know, and I’m giving it to you for nothing but favors. And perhaps a bit of praise.

Iris stole a glance across the room. Lily had reached the bed and was trying to pull herself up, but was only succeeding in dragging the blankets down.

&gt; Do not/Stop that/Look away
&gt;
&gt; Aha, I mean, stay focused now, Iris, dear. It might not be clear to the uninformed, but parsing though information like this takes a fair bit of effort. Of course, I can handle it well enough, but it’s rude to be the only one not working.
&gt;
&gt; Now would be a fine time for the praise. As previously instructed.

“Um, okay. Right. Yeah.” Iris turned her attention back to the wall. After some practice, she could focus on either the wall or the threads like she could adjust the focus of her eyes. After some more practice, she could still only do that, and after even more practice, she could even feel Lily’s eyes boring holes into the side of her head while she sat there like a deer in headlights.

&gt; …Nothing?

Iris’ cheeks burned. “Well, it’s my first time trying to do anything like this, so…”

&gt; No, I meant - Never mind. All you need to do is whatever you do with your photos, and we’ll be back in your room, simple as that.

“Right, well, um, the whole… picture-portal thing was always a bit more… Um…” Honestly, the most accurate thing for Iris to call it would be ‘vibes-based’ but it would be a cold day in hell before she started letting Adams’ lingo rub off on her.

Iris looked to Lily for help. She had given up on sitting on the bed, and instead curled up on the ground underneath the blanket so that it covered everything beneath her eyes. Even so, her frown was unmistakable.

&gt; Don’t like seeing how the sausage is made, hm? I can assure you, at its core, it’s just the same as using your photos. All you need to do is overcome your own preconceptions.

Despite what Lily said, the scene in front of Iris was truly foreign to her. Trying to reconcile two images at once was giving Iris a newfound appreciation for flies and any other pests with compound eyes.

“Can I have a minute? I’m starting to get a headache.” In truth, Iris was getting nowhere and just wanted to stretch her legs a bit, but with how insistent Lily was, she felt that admitting that would be letting her partner down.

&gt; Are you sure that isn’t the feeling of having to use your critical thinking skills for the first time?

“Not going to give me //anything?//” Iris groaned. “Again?”

&gt; That’s what growing up is, dear, doing things for yourself. Call it tough love.

Iris narrowed her eyes. Lily rolled hers.

&gt; As I said, I can’t do this for you. But isn’t that what makes a good team? To be more than the sum of its parts?

It was so earnest that Iris felt like continuing to ask for hints would have crossed the line from embarrassing to shameful. With a click of the tongue, she turned back to the wall. Still confusing. Rather than the far wall across the room, the threads felt more like a barrier. Rather than try and think of the wall and the threads as the same thing, she tried to think of the threads as in between her and the far wall, which she imagined as a photo of the wall that had already opened to her.

To her surprise, the far wall seemed to shift from the dim, soft lighting of her room to show the room under a brighter, harsher light. Iris rubbed her eyes to make sure she was seeing things correctly.

&gt; Mhm. Vibes-based, indeed.

“I never said that,” Iris snapped.

&gt; Sorry. I didn’t mean to peek, I was just curious, was all. I’ll leave you to it.

Even with Lily being Lily, Iris couldn’t keep her mouth closed. It really was like a photograph, pinned to some corkboard floating in thin air, with the edges smudged into the rest of the room. Iris reached out - and straight through the projection. That took a bit of the wind out of her sails.

&gt; The threads aren’t just for show. I’m being reductive here, but you can think of them like, well, the threads in the fabric of reality. As cliche as it feels to say. Or stupid. It feels stupid to say that. But I say it for you, Iris. I’ll teach you the proper terminology soon enough.

“Uh huh.” Lily, it seemed, really couldn’t help herself, but Iris did her best to take what she said to heart. She reached out to the threads, and easily wrapped them around her fingers. Good. She scooted her chair forward, to press the threads into the picture, to weave them into it. Or just kind of jiggle them around in there, since Iris didn’t know how to knit or anything, but, hey, she was going off of vibes. Stick the real thing into the fake picture to make it more real. And the threads held.

Iris went down the line, tucking the filaments into the image of the far wall, until the image had been completely pulled to where the threads were in front of it. Then again, it’s not like the threads really //were// in front of it in the first place, so perhaps it was more that she’d reconciled them. Hesitantly, she pushed her hand in…

And she felt it hit warmer, and more humid air. It worked. There was a picture made out of nothing in her room.

“Aha! Damn!” Iris shot out of her chair and turned to Lily, smiling like a kid showing her mom her art project. “Lily, I think it worked!”

&gt; Rather crude. Not even a basic understanding of the theory. But your intuition was solid, and you can’t argue with results. Very nice.

“Y-Yeah, I mean, sh…” Iris found it hard to catch her breath. She looked around the room like there would be someone else to congratulate her. “…Shit.”

&gt; Don’t get too worked up, now. The cards were stacked in your favor - this space is so weakly defined, you can almost count the treads on your fingers, and it was extremely malleable. It’s why I made a beachhead here in the first place.

Lily pushed herself upright. Like a freshly-emerged butterfly whose wings had begun to harden, her arms had steadied and strengthened while she was resting.

&gt; It’s only going to get harder from here. They say the only things worth doing are hard, but I find I have little patience for such things. Thankfully, I’m a natural at most anything I set my mind to, so I do hope we’ve that in common as well. Would make things going forwards much easier.

“You know, you’ll have to do something about that attitude once you come over to my place, or I’m gonna get my ass beat for introducing everyone to a huge asshole,” Iris drawled.

&gt; What are you talking about? I’m positively lovely. Look at me. I’m a catch.

As if to demonstrate her point, Lily spread her arms to show off her shapely figure. Admittedly, a fair bit more shapely that Iris’ own. //Not that she’s done anything to earn it,// Iris thought bitterly. Anyone who spent a lot of time around Adams was bound to feel a bit outgunned from time to time, but with what amounted to her own twin, it made her feel a fair bit more self-conscious. Aside from the much lighter hair and green eyes - plus whatever miscellaneous wear-and-tear Iris had accumulated - Lily was just a taller and more filled-out version of Iris. If she had to pick, it was probably the height difference that upset her the most.

“For starters, nobody likes an exhibitionist.” Iris wrapped Lily up in the blanket. Lily made some noises, but relented as Iris picked her up. It seemed she wasn’t confident on her own two feet just yet.

&gt; Yes, yes, easy women are looked down upon, I know that much. Rest assured I have a //very// chic wardrobe planned out. Just you wait.

“Yeah, the same wardrobe all the skips have. Your choice of //stunning steel gray cotton// and //ostentatious high-vis orange.//” It was only out of consideration for Lily’s discomfort that Iris adopted a bridal carry over a fireman’s carry.

Iris stopped before stepping through the portal and looked around. It wasn’t her real room, of course, but she had a habit of double-checking that she wasn’t forgetting anything before she left it.

“Oh!” Iris remembered what Lily had told her on the rolling hills. “If this place collapses without us here to watch it, how are you going to get back home once you’ve learned everything you need?”

&gt; Learned…? Oh, yes, that. I wouldn’t worry about that. I’m sure I’ll cook something up in due time. Now! I think we’ve both waited long enough to get back to the land of the living, no?

Lily offered Iris a smile - her first real smile - and urged her forward.

Beyond the portal, Iris thought, was a return to the land of the living. Her real room. Her real bed. Her overhead shower head built into the ceiling with the additional detachable head she’d practically blackmailed site administration for. All her nice, rose-scented soaps to help scrub off all the sweat from that horrible, horrible operation with those freak-ass robot assholes on //top// of everything since she woke up. And, most of all, her camera. And anyone else to talk to besides Lily.

&gt; …You thought of something very mean just now, didn’t you?

It was Iris’ turn to leave a question hanging as she stepped through the portal, back to her room, and back to solid-









----

Not solid ground at all, in fact. A big, wet pile a dirt that was a good foot and a half above where the floor should be is actually what greeted Iris when she stepped back into her real, physical room. Not a problem, normally, as Iris was wearing shoes and all that, but she was rather unbalanced by the woman who probably weighed at least a few more pounds than she needed to. And thus, the well-meaning choice of bridal carry came to nothing as Iris tumbled forwards.

While she caught herself, Lily had no such chance and fell straight to the ground. A small mercy, then, that the mud that she faceplanted in didn’t end up breaking her nose or anything. Just filled it with a lot of shit.

Iris did her best to ignore the boiling, white-hot indignation, rage, and disgust that slammed into her as she lifted Lily out of the mud. As she did that, she found her nice, tidy room, with nary a decoration to upset its well-planned layout, had been transformed into some kind of greenhouse that just happened to have a bed and a desk. That they were in the same spots consoled Iris with the knowledge that even the room’s new inhabitant had respected her interior design chops.

“In… Nnnn…” Lily wiped her silky-smooth and utterly filthy hair out of her face as her jaw clenched and ground together.

“In… suff-ruh-bull.” Spat with enough venom to kill an elephant.

 “Eheheh, wow, your first word.” Iris tried to lighten the mood. “So glad I could be here for it.”

The fiery screed Lily beamed into Iris’ brain was taken as a gentle suggestion for Iris to turn her attention elsewhere, so she looked at the person who had taken over her room. A pale woman with a flower growing out of one her her eye sockets, and numerous other pieces of greenery coming out from god knows where. Iris recognized her as another one of the ineffectual humanoids she didn’t pay much attention to.

“Y-Yo…” Iris waved.

The woman waved back. “Yo. I remember… you from… the orientation… Good to… see you doing well…” Much like any other plant, she seemed pretty unbothered.

“So, uh… Ahem.” Iris did her best to ignore the way Lily was trying to claw her way up and on top of Iris, like a cat who didn’t know she wasn’t a kitten anymore playing ‘the floor is lava.’ “How you been? How are things?”

“Good… Got a new room… Lots of space for… all my friends.” A gentle smile graced the woman’s lips.

Aw, man. She seemed really nice. Iris could have yelled at Rainer or someone to get the hell out of her room, but she just felt bad asking her. “Yeah, so, uh, when’d you get the room? Usually it takes a while for these things to get reshuffled, ahaha…”

Really, Iris was asking how long she’d been dead. Room reassignments took about a month for all the applications and paperwork to go through.

“Hm…” The flower woman gently put down an old watering can and brought an hand up to her chin. “Maybe… since halfway through the growing season… Still not quite time to harvest yet… The planter you’re in… still just sprouts…”

Right, so, maybe a couple months then. Iris had died when summer was just starting, so unless her room was cursed and the following inhabitant had //also// died and given the room to this lady, then it was still before the end of summer. By Iris’ count, she’d gotten shot earlier in the day, but whatever. She lost nine years of her life after Omega-7, what was two more months?

“Cool, cool.” Iris nodded as best as she could when Lily was grabbing onto her neck with such force. “So, um, you heard about me.”

“Yes… We all did… Heard you were shot… Very, very dead…” she said, nodding sagely.

“You seem remarkably calm about it.” For her part, Iris was being remarkably calm about Lily furiously trying to rub her face clean into Iris’ shirt. But it was less embarrassing to just keep ignoring her.

“Seen trees come back… from far worse than bullets…” the woman shrugged. “To my friends, ‘death’… can mean a lot of things.”

Rapid footfalls and the sound of men shouting to each other began to come through the door. Ah, here it was. The reception Iris should have expected.

“Your friends, though…” The woman smiled, and the flower in her eye bloomed in unison to a wonderful soft blue. “Probably a little more surprised… ehehe…”

The door to the cell slammed open, and armed security officers streamed into the room. Getting their dirty, outside shoes all over Iris’ floor, as if all the planter boxes weren’t bad enough.

“On the ground, //now!// Hands in the…” The officer closest to the anomalies didn’t even finish his sentence. He didn’t immediately lower his rifle, but Iris appreciated that he recognized her. Hadn’t been gone too terribly long, then, since she recognized him too.

“Hey, Ron.” Iris waved with her right arm - the one Lily wasn’t clamped over.

“S-Soh… luh… lah…” Lily scowled at the newcomers.

&gt; So damn loud. My eardrums are too precious for this.

“Yeah, uh…” Iris turned to look at the congregation of guards more broadly. “Hey! How’ve things been?”

The guard at the back of the line was the first one to speak up. “Ron?”

“Y-Yeah?”

“She talked to you first. That mean’s you’re doing the paperwork.”
