So you want to add your Black Queen to this hub, feel free! It&#39;s a relatively simple process.

First: if you are on the hub itself, **__this is not the page to edit__** . You&#39;re going to want to [https://scp-wiki.wikidot.com/fragment:black-queen-hub-0 click here] for that. That one, you can edit.

After that, just follow the formatting of the table, and you&#39;re good to go! 

If your BQ is one that appears consistently in a series or a canon, feel free to add them to the first table. If not, put them into the second table.

Please fill out a description of what makes them somewhat unique, especially if you&#39;re the author of the work. 

If you have any problems or questions, feel free to message [[*user Prismal]]! Best to do so on Discord, because she doesn&#39;t check Wikidot DMs much.
Her Discord username is prismal4

[[*user Prismal]] reserves the right to move BQs from one list to the other.
[[/&lt;]]
