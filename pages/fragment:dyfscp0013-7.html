+ //Chapter 7: I Don&#39;t Wanna Grow Up//
[[/=]]

**Item #:** SCP-9922

**Object Class:** Keter

**Special Containment Procedures:** SCP-9922&#39;s current iteration is to be kept in a reinforced humanoid containment cell at Site-6800. The subject is to undergo a daily behavioral modification regimen under Project Burgess. The current director of Project Burgess is Dr. Marcella Fenwick. 

&gt; ++++ Project Burgess:
&gt; 
&gt; 1. Contain SCP-9922 during its inert phase until regeneration begins.
&gt; 
&gt; 2. The iteration is to be kept under constant surveillance for five years to ensure that it does not vocalize. To this end, SCP-9922&#39;s throat will be filled with expanding fiberglass foam on a thrice-daily basis.[[footnote]]Unfortunately, due to supply chain issues resulting from SCP-001&#39;s rampage, this is not a permanent solution.[[/footnote]] Rudimentary human education will be administered during this phase.
&gt; 
&gt; 3. Once the iteration has demonstrated the self-awareness of a five-year-old human child, foaming will discontinue. SCP-9922 will be administered weekly &#34;quieting&#34; placebos. SCP-9922 will view between 7 to 15 films per day. The content of said films needs to be moralistic, with simple themes of good vs. evil. SCP-9922&#39;s comprehension of the themes in these films is to be tested after viewings.
&gt; 
&gt; 4. After SCP-9922 has demonstrated sufficient comprehension of morality, the content of viewings is to shift to films with graphic depictions of murder, torture, animal cruelty, slavery, cannibalism, and/or sexual assault.[[footnote]]Due to the possibility of SCP-9922 seeing a correlation with its containment procedures, //A Clockwork Orange// has been banned from Project Burgess.[[/footnote]] In an absence of new material, the use of surveillance footage of ethically questionable Foundation activities has been authorized. Again, SCP-9922 will be tested after each film to ensure its understanding of right and wrong.
&gt; 
&gt; //(Note: Should SCP-9922 begin to enjoy the films of Phase 4, progress is to revert to Phase 3 for as long as necessary.)//
&gt; 
&gt; 5. If there is sufficient evidence that containment has instilled a sufficient amount of moral and humanitarian values in SCP-9922, **[5/BURGESS CLEARANCE REQUIRED]**.

If SCP-9922 should enter a vocalization event, the instance is to be rendered inert by any means necessary, and Project Burgess will revert to Phase 1. Ten minutes of sustained heavy machine gun fire have proven effective to destroy SCP-9922&#39;s current body and render the core inert.

However, if any staff members onsite mention a desire to interact with &#34;the Party behind the Party Door&#34; between SCP-9922&#39;s vocalization and neutralization, the onsite nuclear warhead is to be detonated immediately.

Most importantly, under no circumstances is SCP-9922 to return to SCP-001.

**Description:** SCP-9922 is a shapeshifting lifeform of extradimensional origin that was used as the power source for SCP-001. Inscriptions within SCP-001 referred to SCP-9922 as the &#34;Traitor-Flame.&#34; At some point, SCP-9922 assumed control of the ship to destroy the crew, most of the ship&#39;s captives, and 7.9 billion human beings.

**Anatomy:** While inert, SCP-9922 is an indestructible orange disc, 5cm in diameter and 0.5cm in width. 

After 170.2 hours of inertia, a body begins to form around the disc, eventually resembling a human being with orange skin, white hair, and solid black eyes. This humanoid appearance is believed to be a result of Project Burgess convincing SCP-9922 that it&#39;s a human boy, triggering an instinct to blend in with its surroundings. Every surface of its body perfectly imitates human textures and functions.

A newly-regenerated instance of SCP-9922 lacks the memories of its previous iterations. However, if it vocalizes, it will immediately assume its default appearance, regain its memories, and enter a state of extreme hostility and indiscriminate devourment.

SCP-9922&#39;s default appearance is a 2.3-meter-long being that resembles a winged serpent. Its only orifice is a mouth with 14 rows of pointed teeth, made of the same material as its skin. The skin has the superficial appearance of red blown glass. The only visible organs are three yellow, amorphous eyes located over the teeth. There are two winglike arms on either side of the head section with a variable amount of digits.

SCP-9922 is capable of changing its body&#39;s size and shape when agitated. The extent of this ability is currently unknown.

Though the surface temperature of this form&#39;s skin is always one degree Celsius colder than its surroundings, SCP-9922 contains an unknown amount of superheated plasma that can mimic the effects of SCP-001&#39;s &#34;world-eating&#34; ability. It is believed that SCP-001 was designed to harness and amplify this power for commercial or military purposes.

According to inscriptions from SCP-001, the energy contained within the &#34;Traitor-Flame&#34; is limitless. 

Additionally, in its original state, SCP-9922 is capable of subconsciously inducing surrounding organisms to allow it to devour them. In human subjects, this manifests as the subject expressing an interest in going to &#34;the party behind the party door.&#34; Due to the hypothetical collateral damage that would result from testing, this effect has yet to be fully understood.

+++ __Addendum 1: SCP-9922 Recovery Timeline__

&gt;  **5/1/2028:** SCP-001&#39;s neutralization confirmed. 
&gt; 
&gt; **5/2/2028:** Excavation begins of SCP-001&#39;s crash site. SCP-001&#39;s hull was only minimally damaged from impact -- hypothetically, it could resume operation if SCP-9922 were reconnected.
&gt; 
&gt; **5/7/2028:** Cpt. Thaddeus O&#39;Dell&#39;s body is recovered from an observation deck on the bow of SCP-001. Cause of death was determined to be head trauma during SCP-001&#39;s impact with the ground. Prior to death, O&#39;Dell had severed his own Achilles tendons, leaving a written note to explain why:
&gt;
&gt;&gt; Last entry will have to be written instead of oral; the whale-things stepped on my commlink. 
&gt;&gt; 
&gt;&gt; Then they tried to take me to the {{Party Door}}. I was right about the &#34;party&#34; being nothing but flames. They didn&#39;t look too bright, so I just told &#39;em, &#34;you go first.&#34; And they bounded off, giggling and neener-neering at me as their flesh charred and boiled. They didn&#39;t even scream.
&gt;&gt; 
&gt;&gt; That was disturbing enough -- but the longer I stared at the fire, the more I started to... //want// it? My fear of missing out was on overdrive. So what if I didn&#39;t want to burn alive, I was the only one who didn&#39;t --{{get to go to the Party, which is behind the Party Door, where you can drink as many jolly Party Fluids as you want and}}--
&gt;&gt; 
&gt;&gt; Yep, I&#39;m fucked. But I&#39;ve got one last plan. 
&gt;&gt; 
&gt;&gt; Why does the Traitor-Flame need to use this bullshit --{{Party}}-- hypnosis to --{{get people to join the Party behind the Party Door and interact with Party Objects}}-- THE POINT IS, why does it need people to --{{RSVP to the Party}}-- GO THERE instead of just grabbing them --{{and some glowsticks}}--?
&gt;&gt; 
&gt;&gt; Then it hit me --{{and by &#34;it&#34;, I mean Party Fever}}-- -- I didn&#39;t see any reserve power units on the ship. If the Traitor-Flame unplugs itself for even a second, the whole ship will lose --{{their excuses not to Party}}-- power --{{to the DJ}}--!
&gt;&gt; 
&gt;&gt; No. I have decided --{{to suckle the Party Breast for to partake of its Party Milk}}-- I&#39;m gonna hurt myself in such a way that I can&#39;t --{{rave}}-- move. Then, --{{Mr. Party-Haver}}-- the Traitor-Flam--{{boyant Party Outfits}}-- will have to unplug --{{the electric Party-preventing device so that Parties may occur}}-- itself from the ship to come and get me -- thereby cutting --{{up the dance floor with my sick moves}}-- the power and causing a crash--{{ing a Party isn&#39;t nice}}-- landing, and that means we won&#39;t have to worry about --{{losing your right to Party}}-- **FUCK YOU AND FUCK PARTIES**
&gt;&gt; 
&gt;&gt; Tell my wife I--{{&#39;m a Party animal}}-- I lo--{{st my keys at the Party}}-- I love --{{Party Solids and Party Liquids, both of which can be found behind the Party Door}}-- LOVE YOU BABY --{{but if I had to choose between you and the Party Life, I&#39;d stick your head in a}}-- [Aggressive, incomprehensible scribbling]
&gt; 
&gt; Cpt. O&#39;Dell has been posthumously issued the Foundation Cobalt Cross for bravery in the line of duty.
&gt; 
&gt; **5/9/2028:** Additional inscriptions from within SCP-001 deciphered, leading to more information about SCP-9922 that would eventually go into its containment procedures.
&gt; 
&gt; **5/10/2028:** SCP-9922&#39;s regenerated body, hereafter SCP-9922-2, located 59 km south of crash site. Going against orders, Dr. Vadim Yusupov loads 19-Perun with unmanned ammunition to dispatch SCP-9922-2, resulting in its degeneration. SCP-9922 was recovered from the resulting pile of glass.
&gt; 
&gt; **5/11/2028:** Containment procedures under Project Burgess finalized. 
&gt; 
&gt; **5/12/2028:** Representatives of the extradimensional GoI-4019 &#34;Three Moons Initiative&#34; enter Australian airspace on a humanitarian mission. In a joint effort with the Australian government and the Initiative, the Global Restoration Interim Government (GRIG) is founded to use anomalous technology to terraform and eventually restore the Earth&#39;s habitable surface area affected by SCP-001.
&gt; 
&gt; **5/15/2028:** Work begins on the construction of 2,000 new Foundation containment sites in SCP-001 affected areas that have sufficiently decreased in temperature. Anomalous means approved to hasten production.
&gt; 
&gt; **5/17/2028:** SCP-9922 regenerates; Project Burgess begins...

+++ Addendum 3: 7/25/2058 Administrator Memorandum Re: Project Burgess
 
&gt; I believe something hasn&#39;t been made clear enough in the current documentation for SCP-9922, so if I may say a few words...
&gt; 
&gt; The Tarrare Incident was no feeding frenzy, as we had once believed. Observation has proven that SCP-9922 has no need of nutrition. However underdeveloped his mind may have been at the time of the attack, he gained nothing from it but an outlet for his rage.
&gt; 
&gt; Therefore, we //cannot// allow ourselves to grow too attached to SCP-9922. Whatever form he takes, however well he behaves -- we can never truly rehabilitate him. There is no way to atone for a ten-digit amount of murder convictions. 
&gt; 
&gt; I don&#39;t say this out of hatred. Emotions are addictive and dangerous in our line of work. I say this to ensure that we don&#39;t stray from the path laid out by our founders. An organization&#39;s core values are its lifeblood. And if those values falter, their every practical application will suffer. 
&gt; 
&gt; Never forget: the old Foundation Ethics Committee were the ones who came up with Project Valkyrja, and they conveniently booked the first tickets for themselves. //That&#39;s// where compassion for the enemy gets us.
&gt; 
&gt; The day that he becomes our friend is the day we lose our humanity.
&gt; 
&gt; You may re-educate him. You may treat him politely. You may integrate him into Phase 5. You may do as you please, so long as you remember: **SCP-9922 will never truly deserve a second chance, freedom, or compassion.**
&gt; 
&gt; All detractors are advised to tell 7.9 billion charred corpses that &#34;he didn&#39;t know any better.&#34;
&gt; 
&gt; 
&gt; 
&gt; [[&gt;]]
&gt; - Leonid Saltan, Former Administrator of the Foundation
