**Item #:** SCP-9975

**Object Class:** Keter

**Special Containment Procedures:**  SCP-9975’s containment attempts have been unsuccessful. Many continued attempts at containment ended in catastrophe, as seen in Incident Log-██. Any further attempts at containment have been halted as per order of O5-██.

**Description:** SCP‑9975’s true form is incomprehensible to the human mind. SCP‑9975 has been observed to take the shape of whatever the victim is most terrified of, or what was most traumatic for them. SCP‑9975 does not induce hallucinations or cause perceptual distortion. It alters its physical body to match the trauma or fear of the victim, regardless of whether they are aware of that trauma or not. If SCP‑9975 is observed by two individuals at the same time, SCP‑9975 will take the form of each individual&#39;s worst fear or trauma at the same time, but will not allow the other person to see the others form. Observers cannot interact with the other forms manifested for others.

As of April, ██, ████, SCP‑9975 has appeared as a Caucasian Male, a German Shepherd, an ██████████ that detonated upon physical contact, and SCP‑███.

Due to the transforming nature of SCP‑9975, it is currently uncontainable. This was proven when a researcher from Site‑19, who was transferred to research SCP‑9975, caused it to transform into SCP‑███. After the incident Dr. ████████ was interviewed. She told the interviewer that she was deeply terrified of SCP‑███ and it was the main reason for her transfer request.


**Incident Log**

Incident 01:

Containment ordered by Site-████ Administrator.

Nu-7 dispatched at 18:00.

Nu-7 Operative █████, who was an Afghanistan War veteran, reported seeing a tripwire across two trees. Before EOD protocol could be implemented, SCP-9975 was seen to localize into a Type 5 IED, which then detonated.

Casualties:  
One KIA, 3 WIA.

Incident 02:

Containment Ordered by Site-████ Administrator

MTF Eta-10 &#34;See No Evil&#34; dispatched

SCP-9975 was reported to take shape of &#34;See No Evil&#34; Operative ███████&#39;s worst fear, despite protective gear that prevented direct line of sight on SCP-9975. The Operator reported seeing their protective gear shatter, and subsequently saw their family members be killed by SCP-9975. This allowed researchers come to the conclusion that direct sight of the entity isn&#39;t required for the anomalous properties to come into effect, and that the entity doesn&#39;t always cause direct harm to its victims.
