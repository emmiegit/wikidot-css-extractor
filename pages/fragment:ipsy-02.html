[[size 150%]]##003E20|**STORY -- WHAT THE F@@***@@ IS GOING ON?**##[[/size]]
@@ @@
Y2x99 is notorious for not explaining the setting in-depth in its OAV, expecting viewers to innately come to their own conclusions while watching the series. However in the original text serializations much more is explicitly referenced. Interviews with production crew also reveal some details not mentioned in either version. The background below has been collated from all three sources.

BACKGROUND:
In 1997, the appearance of a mysterious extraterrestrial satellite -- &#34;Damocles&#39;s Sword&#34; -- causes major abormal phenomena on Earth (colloquially called &#34;Pandora&#39;s Box&#34;). Sweeping ecological and climate changes prompt a shady but extremely powerful extragovernmental organization, the SCP Foundation, to break their previous secrecy and announce the creation of the massive Baybelon Hypertower to reach the geostationary Damocles&#39;s Sword; they believe it to be a &#39;gate&#39; to a new world. Pandora&#39;s Box affects atmospheric electromagnetic wave propagation, in turn disrupting radio, radar, and many other forms of communication as well as avionics. 

Over a hundred years pass and in the year of 2X99 (it is never specified which century) the vast majority of humanity lives in Baybelon Hypertower. Its populace is spread between the many levels of the Hypertower, spread few and far between. The Hypertower itself is a dismal coffin for the survivors: flat, industrial ceilings that are barely tall enough to accommodate flying vehicles, a massive lack of lighting resulting in dark &#39;skies&#39; and a persistent fog-like cloud for most of the time, and a consistent reliance on technological upkeep in dangerous places to keep the Hypertower habitable. The presence of the Foundation has waned so thin that many of the Hypertower&#39;s residents believe that the organization, once considered the saviors of humanity, is a myth. Others are not as forgetful.

Despite this, the Foundation is still running -- they have simply returned to the shadows from whence they emerged. Their studies of Damocles&#39; Sword has elicited the birth of a being able to communicate via particles dispersed by Pandora&#39;s Box. This power is nothing short of what many would call psychic ability. The discovery echoes in the whispers of those who would even dare to go against the Foundation for this power, and it cries wolf in the mind of those who think themselves as misunderstood martyrs for a cause greater than themselves but not their ego.

Capis Kyi, self-appointed rebel group, has made it their mission to sabotage and oppose the Foundation. The α-Class have been sent by the faceless overseers to ensure that this does not happen. Soon enough, both the Foundation and Capis Kyi extend their reach across the wastelands of grey, brown, and blood in order to claim dominion over both the future and the soul of the human race. In the chaos of ringing swords, both sides do not realize that the source of their new technology is escaping in the hands of a seventeen-year-old girl named Menqet. When she is lost somewhere in the lower reaches of the Hypertower, heading vaguely to the idea of the putrefying remains of the Earth, she is found by &#34;troublemaker&#34; Cal Para and rising mechracer Laeru DuTemps. This is where the series starts.

Most of the episodes are about the somewhat-daily trials and tribulations (as there are occasional timeskips) of Cal and Laeru, often joined by Menqet. The three are pursued by Rechs for most of the series, with Gardonne serving as an uneasy ally before eventually turning on them too. A more detailed breakdown of the plot is available on the [# Plot &amp; Arcs] page.
