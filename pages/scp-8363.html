=====
[[&gt;]]

------
**Item Number: SCP-8363**

**Object Class: Safe**

**Special Containment Procedures:**
SCP-8363 instances are to be kept in a locked storage container at Site-36BM. Testing with the object is not to be carried out without the authorisation of the --Site Director-- --Head of Research-- Head Researcher in charge.


**Special Containment Procedures: 28/9/2005**
SCP-8363 instances are to be kept in a locked storage container at Secure Storage Facility-16. Use of SCP-8363 is forbidden.

@@ @@
**Description:**

SCP-8363 is a 20 mL transparent plastic mist spray bottle containing a yellow liquid of unknown full composition. The substance possesses a vanilla-like odour and chemically resembles an //eau de parfum//[[footnote]] An alcohol or water based solution of 15%-25% concentration lasting up to 6-8 hours.[[/footnote]] solution. Laboratory analysis confirms a base of ethanol (approximately 75%), with the remainder consisting of unidentified organic compounds. As of writing, there are --seven-- three instances, all of which are --half full-- nearly empty.

Application of SCP-8363 to human subjects results in anomalous changes to social perception. Affected individuals are perceived as significantly more physically attractive, charismatic, and trustworthy, resulting in subjects exposed to the scent exhibiting increased openness and compliance toward the user.


@@ @@

**Discovery:**

SCP-8363 was discovered in 1998 by the Foundation&#39;s Thai Branch. A string of home invasions had occurred throughout northern Thailand where victims reported voluntarily allowing the suspects into their homes or left their homes to approach them willingly, often citing the perpetrators&#39; pleasant odor as a factor—one victim described it as &#34;smelling like ice cream.&#34;

Four suspects were apprehended by the Thai Police. During interrogation, one stated that they used &#34;black magic oil&#34; provided by a relative—identified as Banthorn Yongchaiyudh, age 48. SCP-8363 was found in their possession.

When following this lead, it was discovered Banthorn had died in his sleep from a snake bite two days prior. Search of his residence revealed four more full instances of SCP-8363, a tin box full of US Dollars, 20 [[[scp-8366| baskets]]] in a shed near his house, and two live //Bungarus fasciatus//[[footnote]] Banded Krait [[/footnote]] specimens under his house.

During transport to the provincial jail, the suspects fatally wounded a police officer and attempted to escape. A shootout ensued where all suspects were killed. Lt. Thitipan Supasawat, an embedded Foundation asset, was credited with neutralising the escape and declared a national hero; later promoted to Police Major.

@@ @@

**Addendum: Long-Term Exposure and Revised Testing (28/09/2005)**

Over a seven-year period, an unusual pattern of health deterioration was observed among senior personnel at Site-36BM, including:

* Muscle tightness.
* Numbness in the extremities and face.
* Dyspnea
* Chills
* Fatigue
* Syncope
* Severe abdominal cramps
* Reduced scores on memetic and psychological resistance tests

The deaths of two of these senior staff prompted an internal review. Investigation revealed widespread unauthorized use of SCP-8363 among Site-36BM personnel, allegedly for career advancement and interpersonal manipulation.

Subsequent chemical analysis with the latest available technology identified the unknown compound as containing:

- Omega-3 fatty acids  
- Trace concentrations of α-, β-, and κ-bungarotoxins [[footnote]] Found in the venom of certain snakes, particularly kraits. [[/footnote]]

Further testing via Kirlian photography indicated that affected individuals also exhibited significantly diminished bioenergetic fields (aura), correlating with increased susceptibility to psionic and memetic influence.

**Hypothesis:**  
It is believed SCP-8363 artificially reduces the subject’s aura signature, obscuring them from instinctual detection or &#34;sixth sense&#34; by others. Additionally, exposure to the neurotoxin may also dampen the instinctual danger detection in others, further facilitating deception or coercion.

**Action Taken:**  
- All affected personnel were referred for immediate medical and psychological intervention.  
- Disciplinary proceedings are underway for the personnel in the Thai Branch.  
- SCP-8363 is to be transferred from the Thai Branch to another facility under stricter protocols.

**Note:**  
Due to its documented effectiveness in interpersonal compliance, research has been approved to explore a derivative of the item for controlled use in interrogation settings and field work.
