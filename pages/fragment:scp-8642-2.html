    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>Just before knocking, you stop to admire the wood of the doors. From down the hall they had looked like the double doors to a big janitor’s closet, but looking closer you see that these doors are truly a work of art. They both seem to be made of solid oak planks, stained and varnished a tasteful brown. The knobs are simple yet elegant, even if they are the same standard door knobs as all the other doors at the site. The nameplate, too, seems quite similar to all the others on-site, and yet here it contains an air of mystery and intrigue absent at other doors. Indeed, this may be the most impressive door you’ve ever encountered, and when you knock it will surely be a wonderful knock, a fine knock, a splendid knock. With full anticipation, you lift your hand one more and…
