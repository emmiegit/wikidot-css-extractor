+ October 7th, 1985
**J. Edgar Hoover Building
Unusual Finance Unit**

&#34;Robert, you can&#39;t-&#34;

&#34;I DON&#39;T NEED TO HEAR YOUR CRAP! THE UNIT NEEDS A GRENADE LAUNCHER AND THE LAST ONE GOT EVAPORATED WITH STEVE! AS A MATTER OF FACT...&#34;

Michael inhaled sharply through his nose, closed his eyes, and severed himself from material reality. He could still hear Rob hollering at him, feel the man&#39;s voice vibrating the glasses on his face. He was acutely aware that his ears hurt, but tried to ignore everything and let the man get it off his chest.

&#34;AND ANOTHER THING, THAT&#39;S THE LAST TIME YOU ASK IF WE REALLY NEED FULL CBRN FILTERS FOR THE MASKS. NO, ASSHOLE, A SIMPLE PARTICULATE FILTER WON&#39;T DO! WE MEET REAL CHEMICAL THREATS OUT THERE!&#34;

&#34;Robert-&#34;

&#34;YOU DON&#39;T UNDERSTAND WHAT IT&#39;S LIKE! IF WE HAD PROPER GEAR-&#34;

&#34;Robert, I can only pretend to buy so many water coolers and office plants before somebody starts to raise an eyebrow. On paper we have enough Begonias to fill the Empire Stat-&#34;

&#34;NO, SHUT UP! I&#39;M TIRED OF YOUR CRAP YOU TWEEDLY LITTLE PENCIL NECKED BITCH! MY MEN ARE DYING OUT THERE WHILE YOU&#39;RE LAUGHING IT UP IN THIS AIR CONDITIONED FUCKING OFFICE PRATTLING ABOUT A FEW THOUSAND BUCKS! DO YOU HAVE ANY IDEA HOW MUCH WE PAY OUT IN SURVIVORS BENEFITS?&#34;

&#34;Survivors benefits are funded separately. It doesn&#39;t come out of our budget at all. We just tell their families they died going after the mob and nobody questions it. We have more spare lives than we do cash.&#34;

There was an overwhelmingly awkward moment of silence between the two, Michael glaring at the Weapons Unit officer from behind his clipboard with all the self assured correctness in the world. Surely Robert would finally come to understand that he&#39;d been unreasonable all along and- Oh, nope, everything flashed white and his glasses were on the floor now. He&#39;d just been punched in the face. The young financial analyst brought a hand up to his nose and took it away, first seeing then tasting the blood as it ran from his nose down into his mouth. In the meantime Robert had decided to scatter Michael&#39;s paperwork all over the office and was currently in the process of overturning the desk. Michael just stood there and watched, feeling indignant about being struck but realizing he was quite powerless to do anything about it short of going and getting security, which could blow their cover.

A smashed lamp, athletic trophy, and several picture frames later Robert had regained enough of his senses to bring a big meaty finger up to Michael&#39;s face and start using his words again. &#34;They&#39;re people, not lines in an Excell [[footnote]] The Bureau would like to clarify that the aforementioned Excell spreadsheet software was first introduced on September 30 1985 for the Apple Macintosh computer. We have had several reports of people remembering differently before going on to commit seriously un-American activities. If you remember differently, please double check to ensure you have not found yourself in an alternative reality and that you are not under the influence of Communism or other memetic hazards. [[/footnote]] fucking spreadsheet.&#34;

Micheal, of course, wanted to reply that they were both people AND lines in an Excell spreadsheet, and that ignoring the spreadsheet side of things would get the whole operation shut down. He got the impression that Robert might hit him again if he said that, so he thought for a moment before replying: &#34;I&#39;ll try to figure something out, but I can&#39;t turn water into wine. I&#39;m not what&#39;s standing between you and proper gear- that&#39;s the Director of National Intelligence. You want to stroll into his office and smash all the picture frames then be my guest but it won&#39;t help us. Unless you start running into weapons caches in the field or stuff you can sell-&#34;

&#34;What did you say?&#34;

&#34;Weapons caches in the field?&#34;

&#34;No- I mean yes, but the other thing.&#34;

&#34;Stuff you can auction off to the public. You know, like confiscated vehicles or- Oh my god Robert, no! Don&#39;t even think about it!&#34;

&#34;I&#39;ve still got contacts at the CIA.&#34;

&#34;Robert! That&#39;s not an acceptable way to fund things! Please be reasonable! There are rules!&#34;

Robert had opted not to be reasonable. He turned on his heels and went straight to the UIU evidence locker. Michael knew what it meant and decided to just close the door, lock it, and start setting his paperwork in order. There was no point arguing anymore, it was just going to happen anyways.

For his part the massively bulked up former Green Beret was tapping the &#39;delete&#39; key on a lot of entries in the evidence room computer. He then took all the files, put them in a Bureau issued burn bag, and poured a flask of whisky over them before lighting them up. He was grinning from ear to ear as he reached into the cabinets and pulled out brick after brick of pure white snowy powder, shoving them in a conveniently placed duffel bag as he dreamt of all the wonderful weapons he&#39;d buy with his drug money- That&#39;s when something caught his eye in the corner of the room. Wrapped in plastic to preserve DNA evidence and finger prints and leaned against the corner was a Soviet RPG-7. 

Michael grabbed the RPG, slung it over his shoulder, and reached into his pocket for the key to unlock the ammo cabinet. Bingo! Couple rockets in there. He shoved them into the bag with the cocaine, made sure to delete these entries too, and snatched their paper evidence forms out of the filing cabinet. He&#39;d burn those later. For now, he was headed for the parking garage. When he got there he picked up his car phone. &#34;Hey Ollie, it&#39;s me. Listen, I&#39;m in a bind here. My boys don&#39;t have proper gear and the bean counters won&#39;t pay for it. I&#39;ve got some stuff to sell. You still doing that kinda&#39; work with the Contras?&#34;

Michael had waited for things to calm down before going into the evidence locker. He coughed and waved the smoke away from his face, glaring at the burn bag before checking the computer. He went into the trash folder and there was a perfect log of everything Robert had taken. Michael sighed with overwhelming relief, wrote all of it down, and then emptied the trash folder before returning to his office, sitting down, and grabbing fistfulls of his hair to pull on as he racked his brain for how he was going to explain the sudden influx of funds and equipment. If new shit just started showing up in the armory tagged UIU, someone would EVENTUALLY get jealous and start demanding a budget hike. If a shitty backwater unit like theirs got such fancy toys then why couldn&#39;t the big boys in the HRT? Fuck, fuck... How was he going to make this work? Unless...

+ October 8th, 1985
**J. Edgar Hoover Building
The parking lot**

&#34;Robert, we need to talk.&#34;

&#34;About?&#34;

&#34;It&#39;s about the stuff you took from the evidence locker.&#34;

&#34;Woaaaah! Hey now, you don&#39;t have any evidence of that.&#34;

&#34;As a matter of fact I do, but that&#39;s not why I wanted to talk to you.&#34;

&#34;You WHAT!?&#34;

&#34;That&#39;s not important-&#34;

&#34;WHEN DID WE GET A FUCKING CAMERA IN THE EVIDENCE LOCKER? YOU SAID THERE WASN&#39;T ONE WHEN I ASKED. RECORDING SOMEBODY WITHOUT THEIR CONSENT IS A SERIOUS FELONY AND TAINTS THE EVIDENCE. IF YOU RAT ME OUT I&#39;LL GET OFF AND FUCK YOU UP!&#34;

Michael wanted to die. He hated everything so much right now. Hated Robert, hated this job, and most of all hated what he was about to do. &#34;There&#39;s not a camera in the evidence locker, and I&#39;m not going to rat you out.&#34; Before Robert could ask what kind of evidence he had, Michael pressed on: &#34;I was thinking we should store the gear and cash at my place.&#34;

&#34;What?&#34;

Michael explained their predicament and Robert was, for the first time he could remember, smiling while they talked. &#34;Well I&#39;ll be damned, the gutless dork finally grew a spine! You&#39;d really stick your neck out for my boys like that?&#34;

&#34;Not if I had a choice.&#34; the accountant seethed, &#34;I don&#39;t see any other option that even has a slim chance of success. Maybe after a few years we can save up enough to buy a warehouse and register it under an LLC with a scapegoat as the figurehead if things go south.&#34;

&#34;Mike, I like the way you think! Seems like maybe you understand the importance of what we do after all!&#34; The big Green Beret clapped him on the shoulder, a gesture that made the slender young man feel better than he expected. It was the first time they&#39;d ever come close to getting along. &#34;I- Yes...&#34; he answered, pushing his glasses up his face and suddenly feeling just a tad overwhelmed with emotions. Talking to Rob was like riding a rollercoaster. One moment you&#39;re afraid you&#39;re about to get punched in the face, the next he&#39;s clapping you on the shoulder like your best friend. Such a chaotic bully. &#34;That&#39;s why I can&#39;t let it get shut down over something stupid like financial irregularities.&#34;

Robert was positively beaming at him. From this close Michael could smell the faintest hint of alcohol on his breath. &#34;Well, maybe I go too hard on you sometimes, but it&#39;s because I care about my boys! You&#39;d be the same if you knew them like I did!&#34; it was then that Michael noticed something new. Were Robert&#39;s eyes red? Was he... was he... USING? Mike gasped- &#34;Oh god, Robert!&#34;

&#34;Yeah Mike?&#34;

The accountant flushed visibly red with anxiety. &#34;N-Nothing, I was just... I was thinking what would happen if we got caught.&#34; 

Robert wondered if Mike was into him or something. He decided he didn&#39;t care so long as he got what he needed out of this. &#34;Don&#39;t worry about it Mike, I&#39;ll protect you. I&#39;ve got connections, remember? My buddy Oliver? Turns out he&#39;s on the National Security Council now. If we get busted he&#39;ll make it all go away.&#34; 

Michael sighed, &#34;If you say so...&#34;
