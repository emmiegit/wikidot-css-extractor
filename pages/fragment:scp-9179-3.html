++++ NOTICE FROM THE FOUNDATION RECORDS AND INFORMATION SECURITY ADMINISTRATION

Prior to the writing of this iteration, Dr. Gornell attempted to acquire Class-Z Mnestic agents, the highest potency Mnestic possible, administration of which is 100% fatal. This request was denied by The Noöspherics Division.

Dr. Gornell instead obtained permission to use a ##blue|//Creighton Projection Engine//##,[[footnote]]Anomalous technology capable of projecting noöspheric constructs/movements directly to a computer interface via a subject&#39;s brain. The technology is relatively new and undeniably controversial, with particular protest on its usage from the Department of Essophysics.[[/footnote]] which was used in conjunction with previously acquired (and sanctioned) Mnestics, with Junior Researcher Sara Benbrook as the subject.

[[/=]]
[[/div]]

 _
 _

**Item #:** SCP-9179

**Object Class:** Keter

**Special Containment Procedures:** SCP-9179 is uncontained. Although SCP-9179&#39;s antimemetic repulsion make comprehension of it impossible to those without anomalous memetic training and/or chemical memory enhancement, experimentation must continue to discover SCP-9179&#39;s full nature.

**Description:** SCP-9179 is an ideatic memeplex totally intersecting the noösphere. That is, lying completely within the space of human thought.

SCP-9179 enacts a powerful antimemetic &#39;repulsion&#39; upon any persons comprehending it. Subjects will find the concept of SCP-9179 extremely difficult to grasp and their trains of thought &#39;dodging&#39; it, with disciplined meditation still resulting in mere &#39;glancing blows&#39;.

SCP-9179 is within noöspheric proximity to the concepts of &#39;Hidden&#39;, &#39;Bystander&#39;, &#39;Witness&#39; and &#39;Esoteric&#39;. Access to it is most successful following meditation of these concepts, then pushing back against the repulsion to its source. This process is strikingly difficult, and is aptly described as &#39;swimming against a current&#39;.

Due to the repulsion effect, it is near-impossible to ascertain how long SCP-9179 has existed within the noösphere. Also unknown is whether it is &#39;native&#39; to the noösphere or moved there from some different ideatic space.
