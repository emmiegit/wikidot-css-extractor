**Item #:** SCP-9960

**Object Class:** Safe

**Special Containment Procedures:** [REDACTED] Hospital, United States has been shutdown and purchased as Foundation property. Only test subjects are permitted within the West Wing hallway. All test subjects are to be equipped with built-in video recording devices for traversing SCP-9960.

**Description:** Subjects that travel through the West Wing hallway of [REDACTED] Hospital will be transported to SCP-9960 if alone and desiring an exit to the building.

SCP-9960 resembles the hospital’s original hallways: consisting of sanitised white flooring, walls, and a square panelled ceiling. SCP-9960 however curves at regular intervals and seemingly has no end. Red “EXIT” signs hang from the ceiling, 5-15ft apart from one-another. On occasion there will be an intensive care unit containing a lone hospital bed. A distant heart monitor is the only consistent sound heard throughout.

Subjects inevitably encounter a deceased person either lying in the hallway or in a hospital bed. The body will be identical to them, save for being dressed in hospital garbs. This body will keep appearing throughout SCP-9960 in the same relevant location (In the hallway or a hospital bed) and pose originally discovered in as the subject progresses onwards. The bodies never begin to decay no matter how long the subject spends observing.

When a subject finally expires, their body will reappear in the West Wing hallway. In all recorded footage, test subjects died in locations relevant to the identical bodies found within SCP-9960. The sound of the heart monitor will be heard flatlining shortly before the video feed ends.

It is unknown when the subject&#39;s clothes are misplaced, nor who dressed them in the hospital garbs they reappear wearing.
