    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>Excerpt from the Journal of Caroline Wren

&gt; This is it. I was right. They&#39;re giving me an anomaly. I&#39;m going to be a head researcher.
&gt; 
&gt; I&#39;m glad. I am, really. But I don&#39;t feel quite the sense of triumph I thought I would. There&#39;s a shadow over this.
&gt; 
&gt; When I was recruited, I thought that I had finally found my place. I would find the answers I&#39;ve been looking for. More, I&#39;d be doing it with others like me, truly like me, taking science to the unknown. 
&gt; 
&gt; But it&#39;s not like that. They&#39;re just like the people at university. They focus on containment instead of understanding. They do experiments, but they never go as far as they could. They finish the work day and play trivia games at bars. Games! How can they justify this to themselves?
&gt; 
&gt; I won&#39;t be one of them. I have a job to do, and I will not shrink from it. 
&gt; 
&gt; Christopher understands. He&#39;s the only one who understands me.
