    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>**Item** #: SCP-9127

**Object Class**: Safe

**Special Containment Procedures**:  SCP-9127 is to be placed in a plastic box as not to be any risk to foundation personnel or D-Class because of it&#39;s acidic properties.

**Description**: SCP-9127 is a bottle of a random condiment that seems to be infinite. The liquid inside the bottle changes to a random condiment every day at exactly 20:00. The acid can corrode through any and all metals, but not plastic.
