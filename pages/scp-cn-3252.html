**Item #:** SCP-CN-3252

**Object Class:** Safe

**Special Containment Procedures:** The only project prototype currently under the Foundation’s control and in good condition should be stored in Compartment No. 4—a triple-protection, earthquake-resistant compartment—on the fourth basement level of Building A at Site-CN-42. Multiple detectors should be installed inside this compartment to monitor for potential gas leaks. Should a gas leak be detected, staff in Building A and members of the public within 500 meters of the building must be evacuated immediately.

A detachment from MTF-γ-56 &#34;Benzocaine&#34; should remain on standby at all times to respond to potential biological hazard gas leaks.

Pursuant to the Ethics Committee’s directive, all further human testing for the project has been suspended indefinitely for humanitarian reasons. Any animal testing must be approved by the Ethics Committee, and precautions must be taken to prevent the release of toxic chemicals.

If a Foundation employee is accidentally exposed to the effects of a project, in accordance with the //Regulations on the Protection of the Personal Rights of Foundation Employees// (2021 Edition), the employee shall be granted a medical leave of absence for up to four months, receive standard compensation for psychological trauma, and be immediately provided with regular psychological counseling. In principle, the regulations governing the classification of Class-E personnel do not apply to affected employees.

Under exceptional cases, the use of memory-alteration technology to conceal the social connections of exposed individuals is authorized.

Mobile Task Force β-31&#34;Unexploded Ordnance Disposal Unit&#34; has been tasked with monitoring multiple conflict zones and post-conflict areas to search for other possible surviving instances of the project.

**Description:** The item is an anomalous chemical warfare agent with Level III cognitive and behavioral effects, designated SCP-CN-3252; the sole known sample under Foundation control is contained within an MK94 aerial bomb, designated SCP-CN-3252-1.

At 25 degrees Celsius and 1 standard atmosphere, SCP-CN-3252 manifests as a pink gas with a density greater than air. At 25 degrees Celsius, pressurizing it to 701.325 kPa causes the item to liquefy into an oily substance heavier than water.

In approximately 92%–95% of cases of human exposure, the item will exhibit its anomalous properties.

Within approximately twenty-five minutes of exposure to the item, the sexual orientation of the exposed individual will undergo a complete transformation.

Refer to the table below for details regarding the transformation; please contact the Site-17 Archives Office to obtain the original data files.

||~ Test Date ||~ Test Subject ID ||~ Test Subject Gender[[footnote]] Refers to the test subject&#39;s legal gender at the time. [[/footnote]] ||~ Post-Test Effects ||
|| 07/24/1943 || 04 || Male || Significant decrease in sexual attraction from females; significant increase in sexual attraction from males ||
|| 08/14/1943 || 19 || Female || Significant decrease in sexual attraction from males; significant increase in sexual attraction from females ||
|| 08/18/1943 || 74 || Female || No significant abnormalities ||
|| 08/25/1943 || 94 || Male || No significant abnormalities[[footnote]] Cases with no abnormalities accounted for approximately 8% of the total 745 tests. [[/footnote]] ||

This transition typically lasts from several months to several years; its exact duration is directly proportional to the concentration of the inhaled item. Due to a lack of data, the possibility of lifelong effects cannot be ruled out.

+++ **Addendum-CN-3252-A**

**Briefing:** Dated January 27, 1942, this addendum contains the original text of an order issued by the Allied Occult Command.

The document calls for intensified international cooperation among various supernatural organizations involved in the war—including the SCP Foundation—to develop a variety of supertechnological weapons for use against the Axis powers, including but not limited to directed-energy weapons, telekinesis weapons, and telepathic detectors.

Among the various paratech weapons developed at the behest is SCP-CN-3252; relevant information is summarized below.

**Briefing:**  

&gt; 4, This order calls for the development of a special bomb, provisionally codenamed &#34;Intimate Boyfriend&#34;, with the following specifications:
&gt; 
&gt; (1). The bomb operates by applying mass hypnosis to alter the sexual orientation of its targets, causing them—regardless of gender—to develop an attraction exclusively with members of [[span class=&#34;text-underlined&#34;]]the same sex[[/span]];
&gt; 
&gt; (2). As described above, the purpose of this bomb is to create chaos within Axis territory and undermine the fighting spirit of German forces. It is expected to have significant societal repercussions, resulting in the following:
&gt; 
&gt; a. Nazi Germany will conduct large-scale roundups in accordance with its known concentration camp policies (see addendum D), creating widespread chaos within Germany and weakening its war potential at low cost.
&gt; 
&gt; b. Inducing abnormal behavior among senior German officials, thereby generating widespread panic.
&gt; 
&gt; c. Changes in the social level can force Germany to alter its concentration camp policies, which is expected to provide captured our soldiers with more time to escape and better living conditions.
&gt; 
&gt; d. Cause widespread changes in the sexual orientation of German reserve and active-duty personnel; this act of moral corruption is expected to undermine their morale and discipline, impair their combat effectiveness, and destroy their will to fight, thereby creating opportunities for our forces to achieve victory.
&gt; 
&gt; (3). Further specifications for this bomb are provided in addendum E. Its lethal radius must be at least a 500-meter circular area upon ground impact, and its effective range may exceed a 1-kilometer radius when detonated in the air; the bomb’s weight and dimensions must not exceed those of the GP Mk. IV 500-pound aerial bomb to allow for aircraft carriage; simultaneously, a miniaturized grenade version must be developed for use by personnel operating behind enemy lines.
&gt; 
&gt; 5. Given the unusual nature, dangerousness, and potential negative public impact of this weapon, all aspects of this order must be conducted in strict secrecy. All personnel handling classified information must undergo multiple background checks to ensure their political reliability before being permitted to participate in the research. All departments are directed to establish self-contained scientific compounds to isolate researchers, their families, and the general public, thereby ensuring the secrecy of the research. Specific plans should be based on the report submitted by the Oak Ridge Division and the report from the &#34;P&#34; Division of the General Staff’s Fifth Directorate, both of which are included as an addendum to this letter.

Please contact the Site-CN-21 Records Office or the Site-19 Records Office to obtain the full version of this addendum; only a summary is provided here.

+++ **Addendum-CN-3252-B**

**Briefing:** Written in January 1945, this addendum contains the original text of an order issued by the Allied Occult Command.

The document orders all national supernatural agencies to cease research and development of SCP-CN-3252 and to destroy all related technical documentation; the letter has now been declassified.

**Abstract:** 

&gt; II. The reasons for indefinitely suspending the development of this bomb are as follows:
&gt; 
&gt; 1. The development of this bomb has suffered severe delays; research and development work originally scheduled for completion in early 1943 was not actually finished until April 1944. Since production began in July 1944, monthly output of the special hypnotic gas had reached only 37% of the original plan by November 1944. The current supply of this special gas is insufficient to achieve the original strategic objectives.
&gt; 
&gt; 2. During the development process, research data revealed a significant discrepancy between our military&#39;s understanding of large-scale hypnotic effects and the actual facts. Consequently, this technology requires re-evaluation to determine whether it should be deployed. Furthermore, the repeated occurrence of serious accidents during experiments has resulted in substantial losses and demonstrated major flaws in the storage and transportation of this munition.
&gt; 
&gt; 3. The results of drug trials conducted on Japanese captives fell short of expectations, leading to the foreseeable conclusion that this weapon&#39;s combat effectiveness against the Japanese Empire will be inferior to its effectiveness against Nazi Germany. See addendum A of this letter for details.
&gt; 
&gt; III. Given the anomalous nature, dangerousness, and potential negative public impact of this weapon, all matters pertaining to this order must be conducted in strict secrecy. Documents related to the weapon’s development shall be permanently sealed, and certain technical documents shall be destroyed.
&gt; 
&gt; IV. All departments shall respond to this letter by February 18.

Please contact the Site-CN-21 Records Office or the Site-19 Records Office to obtain the full version of this addendum; only a summary is provided here.

+++ **Document Excerpt-CN-3252-C**

**Briefing:** Excerpt from a handwritten letter dated July 1968 from Ho Chi Minh, leader of the Communist Party of Vietnam, to Zuo Situ, head of the Abnormal Affairs Bureau of the People&#39;s Republic of China[[footnote]] **Translator Note:** After 1983, it&#39;s called the 19th Bureau of the Ministry of State Security. [[/footnote]]. Zuo Situ had fought alongside the Communist Party of Vietnam against French occupation in Indochina, and the French Branch of the Foundation had engaged in multiple battles with the supernatural troops under her command.

The handwritten letter mentions that the aerial bomb sent to the People&#39;s Republic of China was SCP-CN-3252-1. The remaining three MK94 aerial bombs are numbered SCP-CN-3252-2 through 3252-4. Aside from one bomb that detonated, the other two were lost from their custodial institutions for various reasons; it is speculated that SCP-CN-3252-2, held by Vietnamese authorities, was transferred by GOI-1023 &#34;Spark International&#34;[[footnote]] **Translator Note:** A GOI in CN Branch. Originally the occult department of the International Workers&#39; Association, the former department was retained after the dissolution of the Communist International. It includes several internal factions, such as Paranational. [[/footnote]]. As of March 2024, the last missing bomb has not yet been recovered.

**Abstract：**

&gt; Comrade Zuo Situ
&gt; 
&gt; I hope this letter finds you well.
&gt; 
&gt; It has been fourteen or fifteen years since we parted ways following the liberation of northern Vietnam. Lately, I have been experiencing heart problems; I often feel chest tightness and dizziness, and I need to use a cane to get around. When I think about it, I have lived for over seventy years and am now in my twilight years. I realize my time is running out, and I have many regrets in life. Perhaps my deepest regret is that I will never again see the reunification of our country and the victory of communism.
&gt; 
&gt; If you are fortunate enough to witness, would you please find a moment to let me know from Saigon that was already belongs to the people? If I truly have a spirit in the afterlife, I will surely hear you then.
&gt; 
&gt; It&#39;s been several years since we last met. I wonder if Chairman Mao is still in good health—is he still able to wade through the Yangtze River and ride the waves? Please also extend my regards to everyone in China. My body is worsing day by day, and I’m afraid I won&#39;t have the chance to meet you in person.
&gt; 
&gt; [IRRELEVANT CONTENT OMITTED]
&gt; 
&gt; As one gets older, he seems to tend to say too much and, without realizing that had strayed far off topic.
&gt; 
&gt; Early this year, guerrilla fighters in southern Vietnam shot down a Phantom fighter jet belonging to the U.S. imperialist invaders using anti-aircraft weapons provided by your Chinese comrades. They reported that this plane was different from the others: while other planes dropped bombs that exploded with a &#34;boom&#34;, this plane was different. When it dropped its bombs, they would thud against the ground and release a &#34;pleasant-smelling&#34; pink gas. After inhaling it, they would feel a strange itch in their heart.
&gt; 
&gt; They feared it might be poison gas from the American guizi[[footnote]] **Translator Note:** &#34;Devil-spawn&#34;, similar to &#34;Mỹ quỷ&#34; or &#34;Japs&#34;, is often used to refer to foreign invaders. [[/footnote]], but in the end, not a single one of them suffered any physical ailments. More and more American planes were dropping these poison gas bombs, and the areas under attack were growing ever wider. We couldn’t figure out what was so strange about these Americans&#39; pink bombs right away. Comrades from the Southern Party organized preliminary tests, but all they could determine was that the stuff affects the brain. The specific reports and data from the Southern Party&#39;s experiments are enclosed with this letter—you saved my life from the French invaders&#39; sorcery, and you’ve seen even more.
&gt; 
&gt; The Phantom fighter jet we shot down was carrying four of these strange bombs. When the Southern guerrillas smuggled them north, they accidentally damaged one. Our intelligence agency kept one for research, and of the remaining two, we gave one to you Chinese comrades and the other to the Soviet comrades. You’ve been studying these strange and unusual things longer than we have and have more experience, so I think you might be able to unlock their secrets sooner than our intelligence agency.
&gt; 
&gt; I&#39;d really like to know what new tricks American imperialism has up its sleeve to come after us! At worst, we&#39;ll meet force with force and water with earth. If those American guizi come to Vietnam to slaughter our compatriots, exploit our people, and divide our land, how could they possibly hope to succeed?
&gt; 
&gt; [IRRELEVANT CONTENT OMITTED]

Please contact the Site-CN-21 Records Office or the Site-19 Records Office to obtain the full version of this addendum; only a summary is provided here.

+++ **Addendum-CN-3252-D**

**Briefing:** This addendum is a comprehensive statistical summary that includes the U.S. military’s damage assessment of the effectiveness of bombing SCP-CN-3252 in Southeast Asia.

Following the submission of the damage assessment report, in the winter of 1971, Project &#34;Intimate Boyfriend&#34; was once again suspended indefinitely.

The findings of the damage assessment do not entirely corroborate the conclusion previously reached by the US Defence Advanced Research Projects Agency that &#34;since homosexuals lack masculinity and the courage to contend with harsh natural conditions, the use of non-lethal sexual reorientation weapons against elusive communist guerrillas in Southeast Asia would not only provide the communist bloc with no moral high ground from which to attack, but could also inflict potential combat losses far exceeding those caused by the deployment of conventional weapons of equivalent weight&#34;.

The damage assessment data indicates that bombing operations in certain areas likely caused no damage whatsoever.

This outcome may have been caused by a combination of factors, including the lack of direct lethality inherent in these munitions, decision-making by U.S. military leadership based on erroneous sexual orientation biases, the U.S. military&#39;s misjudgment of the Vietnamese public&#39;s level of fear toward U.S. troops stationed in Vietnam and toward the LGBTQ+ community, and the U.S. military’s underestimation of the Vietnamese public’s resolve to resist.

Please contact the Site-CN-21 Records Office or the Site-19 Records Office to obtain the complete version of these statistics.

+++ **Addendum-CN-3252-E**

**Briefing:** Li Jiefang, a native of Yunnan, was born in February 1945. He previously participated in the People&#39;s Republic of China’s construction aid efforts in northern Vietnam. After his military discharge, Li Jiefang voluntarily joined the guerrilla forces of the National Front for the Liberation of South Vietnam, where he fought in the guerrilla war for several years. He returned to China on the eve of Vietnam&#39;s national liberation. Later, with the assistance of a local local history publishing house, he compiled his memoirs into a book titled //Memoirs of the Underground Anti-American War in Vietnam//, which was published in a limited edition. The notes in the addendum are excerpted from Chapter 3 of this book, pages 76–94.

The four bombs recovered by the guerrillas are believed to be instances of SCP-CN-3252-1 through 3252-4.

Given the prevalence of legends regarding anomalous incidents during the Vietnam War, the SCP Foundation has determined that no content needs to be removed from this document at this time, as it will not affect the Veil.

**Abstract:** 

&gt; (At that time) I was still eating with my comrades.
&gt; 
&gt; Looking back now, the meal was very simple: the staple was nothing more than a bowl of brown rice, mixed with some pickled vegetables and the like, a few finger-sized small fish, and river moss roasted by the locals—all simply sprinkled with a little salt, just enough for flavor.
&gt; 
&gt; But for us, who had been trekking through the woods for days, exhausted and famished, this meal was more than we could have hoped for. There was fish, hot rice, and salt; best of all, the food was fresh. We’d been deep in the woods for days, and the dry rations we’d brought with us had gone rancid and sour. At last, we’d found a village where we could rest our feet and have a hot meal; for a moment, everyone felt a great sense of relief.
&gt; 
&gt; As we ate, we chatted with our hosts. They told us that bombs dropped by the American guizi had destroyed the irrigation channels and scattered some strange substance; after that, the nearby woods had withered away in vast swathes, and the rice seedlings in the fields had all died for no apparent reason. He was convinced that the American guizi&#39;s planes were up to no good, and urged us to fight hard against the enemy and give those bastards a proper thrashing.
&gt; 
&gt; I told our host that, as a Chinese, I&#39;d heard of such things before coming here. It&#39;s said that the Americans load some sort of toxic agent onto their planes and bomb the countryside after take-off. This agent doesn&#39;t kill people, only trees and crops; the moment plants come into contact with even a trace of it, they wither and die instantly. It&#39;s all part of the Three Alls Policy[[footnote]] **Translator Note:** Kill all, burn all, loot all. It was originally a military tactic used by Imperial Japan during World War II. [[/footnote]] devised by the American guizi to wipe out our guerrilla forces.
&gt; 
&gt; I told the family not to worry; we Chinese have suffered at the hands of the Japanese in this way before, and in the end, we drove them out just the same. Having committed such an act that vulgar and shameless which would make them die without descendants, they are bound to face retribution.
&gt; 
&gt; Just then, Nguyen Dieu Van, who had been keeping watch outside the door, suddenly burst in and shouted to all of us: &#34;Planes! American planes! Take cover, quick!&#34;
&gt; 
&gt; No sooner had we dashed out of the host&#39;s house than we heard a rumbling in the sky—the American Phantom fight jet were back.
&gt; 
&gt; Immediately afterwards, with a whistling sound, a bomb crashed right in front of us. My heart sank; I closed my eyes, thinking, &#34;It’s all over—I’m going to die here in Vietnam.&#34;
&gt; 
&gt; When I opened my eyes again, the bomb hadn&#39;t exploded. I breathed a sigh of relief, thinking perhaps it was a dud.
&gt; 
&gt; &#34;Bang!&#34; The bomb suddenly went off—the sound was faint, but it sent up a plume of pink smoke.
&gt; 
&gt; &#34;Damn it! It&#39;s a poison gas bomb!&#34; someone shouted.
&gt; 
&gt; We scattered in all directions, searching for anything to shield us from the gas…
&gt; 
&gt; [IRRELEVANT CONTENT OMITTED]
&gt; 
&gt; That day at camp, Nguyen Dieu Van—that sharp-witted young dude—suddenly came over.
&gt; 
&gt; &#34;Brother Jiefang,&#34; he said, &#34;Ever since I inhaled that evil energy from the American guizi&#39;s bombs, I&#39;ve been feeling really strange.&#34;
&gt; 
&gt; I asked him what was going on.
&gt; 
&gt; He said that when he first arrived, he was still thinking about that little girl he&#39;d known since childhood—the one who’d been killed by the Americans and the South Vietnamese puppet regime. He’d been thinking that once the war was over and his hometown was liberated, he&#39;d go back and lay a flower on her grave. Sometimes he&#39;d also think about whether he might meet a beautiful girl, marry her, tend the fields, and have a few chubby little toddlers—of course, all after the war ended.
&gt; 
&gt; But ever since he inhaled that gas, he said he just wanted nothing more than to stay with his guerrilla comrades forever. Even in his dreams, he no longer saw that little girl, nor did he think about going home to farm the land and marry a wife once the war was over. He just felt incredibly happy being with his comrades, a tingling sensation in his heart, a deep excitement… He asked me if something was wrong with him, he was very afraid.
&gt; 
&gt; I told him there was nothing wrong with you. You said yourself that this happened after you inhaled that gas. This is the work of American weapons. Now, you are attracted to your comrades, it’s as if you were wounded in the leg by those American guizi—a glorious injury sustained in heroic battle. Would comrades really fear or despise a wounded soldier? Shouldn&#39;t a wounded soldier be thinking about how to fight on tenaciously, just like Pavel·Korchagin? Why would you be blaming yourself here? Isn’t the real enemy right across from us?
&gt; 
&gt; Besides, comrades are all fighting for the liberation of the entire Vietnamese nation, and they&#39;ve all been tested by life and death. How could they possibly shun you, despise you, or distance themselves from you because of something like this? Is a young man who fancies his comrades really more dangerous than American bombs or more terrifying than the guns of the South Vietnamese puppet army? Firstly you haven&#39;t forced anyone to be your intimate partner, and secondly, you’re just as tenacious in battle. I think you’re a fine young man!
&gt; 
&gt; Stop overthinking. Get some rest now—we&#39;ve got mountain trails to traverse tomorrow, and that’ll need all your strength.
&gt; 
&gt; [IRRELEVANT CONTENT OMITTED]
&gt; 
&gt; The last time I saw Nguyen Dieu Van was probably in April 1969.
&gt; 
&gt; The weather that day was delightful, with mild temperatures and a cloudless sky; it was the tail end of the dry season in South Vietnam.
&gt; 
&gt; With the cool morning air at our feet, we made our way through the rainforest along a path pointed out by local comrades.
&gt; 
&gt; The local comrades told us they had seen a plane billowing thick smoke as it plunged into the forest—presumably an American one.
&gt; 
&gt; American bombs had destroyed the local irrigation systems, leaving the crops here barren for a year or two. The villagers urged us to capture that American pilot to avenge them, dead or alive.
&gt; 
&gt; We trekked on, and around noon we found the American plane, mangled beyond recognition, in a clearing. Although it had carved a long trail through the rainforest, its metal fuselage was scraped to pieces on the ground and blackened by flames. Yet there didn&#39;t seem to be much evidence of fire in the surrounding area—at least not enough to set the forest ablaze. At the time, a doubt crossed my mind—perhaps it hadn&#39;t been shot down, but had simply run out of fuel and crashed into the woods on its own.
&gt; 
&gt; We found that American pilot amidst this pile of charred scrap metal—or, to be precise, we found only half of his body, encased in his flight suit, along with his internal organs, all of which had been roasted by the fire, giving off a stench of burnt flesh. We searched the area but couldn’t find much else; it seems the crash had reduced the rest of his body to fragments scattered everywhere.
&gt; 
&gt; Just as we were gloating over the fate of this despicable American guizi, Nguyen Dieu Van suddenly shouted—there were four bombs painted pink still hanging from the wreckage!
&gt; 
&gt; I&#39;ve seen this shit before—when it hits the ground, it doesn&#39;t explode, but spews out a cloud of eerie-colored mist. Those American devils are black-hearted, god only knows what kind of poison gas that is.
&gt; 
&gt; We debated whether to bury the whole thing—plane and all—deep in the ground so we wouldn&#39;t have to look at it, or to risk our lives to bring these weapons back as irrefutable evidence of the Americans&#39; war crimes, or simply blow the whole thing to smithereens with explosives and be done with it.
&gt; 
&gt; Immediately afterward, we heard the hum of engines on the horizon.
&gt; 
&gt; The Americans&#39; helicopters were on their way. They’d already spotted the crashed plane.
&gt; 
&gt; Our team searching for the plane wreckage numbered fewer than twenty men. To travel light through the jungle, we carried nothing but rifles and hand grenades. These American bastards’ helicopters usually carry over a dozen well-equipped soldiers, not to mention the two machine guns mounted on the craft itself.
&gt; 
&gt; In a head-on clash, our dozen or so rifles would likely be no match for them. But if we just retreated like this, firstly, we couldn’t bear the thought of letting the Americans take all those poison gas shells with them. Secondly, as soon as we heard the sound of a helicopter, those American guizi would be right on top of us. Even if we retreated now, we wouldn’t get very far. Once those American guizi got off the helicopter, they’d definitely patrol around the wreckage. If they discovered our tracks, their helicopters and infantry would come after us together, and we’d still be in grave danger.
&gt; 
&gt; After all, those American guizi are just flesh-and-blood human beings, raised by their own parents. They aren’t superhuman, nor are they invulnerable to weapons. What we really fear is that American helicopter. Once that thing takes off, it’ll hover right over our heads, shitting and pissing down on us, and we won’t be able to do a thing about it. If we could just blow up that damn helicopter, a dozen or so American guizi wouldn’t be anything to worry about.
&gt; 
&gt; But how could we blow it up with just the few things we have on hand?
&gt; 
&gt; We all knew that in this situation, we had no choice but to get close enough to throw a grenade—but we also knew that charging forward to throw one under a hail of fire from more than a dozen machine guns would, at best, result in a mutual annihilation. For a moment, everyone fell silent.
&gt; 
&gt; Nguyen Dieu Van raised his hand. The April sun in Vietnam pierced through the forest canopy, reflecting the fury burning in his eyes.
&gt; 
&gt; He had found our unit on his own. I remember he looked just like this when he asked us to take him along.
&gt; 
&gt; &#34;Let me do it!&#34; The four words, spoken with unyielding resolve, were ground out between his teeth.
&gt; 
&gt; The helicopter descended inch by inch, while we lay hidden in the dense canopy of a nearby tree. We were so close that I could see the pale faces of the American soldiers manning the machine guns behind the glass.
&gt; 
&gt; The helicopter swayed to a stop, the door swung open, and a squad of Americans stepped out. As they walked, they seemed to be muttering something in a language I couldn’t understand.
&gt; 
&gt; &#34;Pow—！&#34;
&gt; 
&gt; Our men fired two shots at the group. The Americans, like bees whose hive had been set ablaze, immediately went berserk. Machine guns on the helicopter rattled, and a storm of bullets rained down on the feinting team’s position. The riflemen leaped from the helicopter one after another and charged toward the source of the gunfire. After disembarking, the helicopter spun its rotors, as if preparing to take off.
&gt; 
&gt; Just then, from a direction neither the helicopter nor the American troops had noticed, a dark figure emerged from the dense forest.
&gt; 
&gt; It was Nguyen Dieu Van—he wasn&#39;t even carrying a gun, but clutched a bundle of grenades as he sprinted silently toward the helicopter.
&gt; 
&gt; Seeing Nguyen Dieu Van charging straight at them, the American guizi hurriedly shifted their aim and opened fire in his direction—but it was too late. Braving the crisscrossing hail of bullets, Nguyen Dieu Van hurled the grenade from his chest and fell to the ground.
&gt; 
&gt; The grenades exploded, and immediately afterward, that helicopter—which looked like a green fly—was blown into a ball of fire, likely because its fuel tank had been ignited.
&gt; 
&gt; We let out a roar, leaping down from the treetops where we’d been hiding, bayonets fixed on our rifles, and charged straight at the panicking American guizi.
&gt; 
&gt; &#34;Avenge Comrade Nguyen Dieu Van!&#34;
&gt; 
&gt; By the time we routed the Americans, it was already past noon.
&gt; 
&gt; I will never forget that scene for as long as I live: a young man in coarse cloth clothes had fallen motionless before the smoldering wreckage of the helicopter.
&gt; 
&gt; His eyes were wide with fury, his face covered in dust and blood. With his arms outstretched, he lay in eternal rest on the land where his ancestors had lived for generations.
&gt; 
&gt; At the final moment of his life, Nguyen Dieu Van held his long-suffering motherland close.

Please contact the Site-CN-21 Records Office or the Site-19 Records Office to obtain the full version of this addendum; only a summary is provided here.

+++ **Addendum-CN-3252-F**

**Briefing:** A document from the US Department of Defence&#39;s Defence Advanced Research Projects Agency argued for the feasibility of reviving the &#34;Intimate Boyfriend&#34; project—originally intended to counter Nazi Germany—and deploying it to undermine the resistance forces of the VCP.

After the original was transferred, it was stored in the Site-17 archives; following a fire at the Site-17 archives in 1991, only the following portions remain.

**Abstract:** 

&gt; (2). The purpose of this bomb, as described above, was to sow chaos in Axis territory and undermine the fighting spirit of German forces. This chemical agent has been tested and proven to be fully capable of targeting specific sexual orientations. The potential effects of this bomb are as follows: …
&gt; 
&gt; [[span class=&#34;text-underlined&#34;]]a. Due to their severe lack of masculine traits—including courage, a sense of responsibility, and a spirit of sacrifice—homosexuals lack the potential to serve as military personnel. The spread of harmful sodomy among homosexuals in the military would cause a panic in morale; deploying this weapon would plunge communist military forces in Southeast Asia into a state of severe corruption, and would likely weaken their combat effectiveness more effectively than conventional bombing.[[/span]]
