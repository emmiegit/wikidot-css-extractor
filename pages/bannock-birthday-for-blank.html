+ Bannock Birthday for Blank

[[image http://scp-wiki.wdfiles.com/local--files/the-b-b-decommission/Asterisk43.png]]

+ ##990011|2026##
++ 19th of March
[[span style=&#34;font-family: BauhausLTDemi; font-size: 120%;&#34;]]##990011|**Site-43##: Lambton County, Ontario, Canada**[[/span]]
----
[[/=]]

&#34;Happy birthday, Harry,&#34; Jay practically sang as they walked into the Archives and Revision offices, spotting their friend in the common area.

The archivist, who was reading a document, looked up at the voice, spotting his friend&#39;s tote bag at their side. It looked unusually oblong. Jay was many things -- a GoI Specialist chiefly among them -- but they were also a cook who enjoyed feeding their friends with foods from their culture. Perhaps in a different life, they would have been a chef at some restaurant.

&#34;Thank you, Jay,&#34; Harry straightened his back, getting out of what his wife, Melissa, called &#39;the shrimp position&#39;. &#34;What have you got for me today?&#34; 

&#34;Well,&#34; they stopped at his desk, skillfully maneuvering the tote bag from their only arm to place it on a free spot on Harry&#39;s workspace.  &#34;To celebrate your birthday, I made you some //arroz con leche.//&#34;

&#34;Which means...?&#34;

&#34;Word for word? Rice with milk. Delicious, right?&#34;

&#34;Well, you know me. Always eating my Rice Krispies.&#34;

&#34;You //are// known for enjoying a snap, crackle, and pop on occasion.&#34;

&#34;What is this, an ad read?&#34; he snarked.

The two shared a quick laugh.

&#34;Yeah well, this knocks the socks off of Rice Krispies,&#34; Jay said. &#34;You know how Ilse is in love with Fruit Gushers?&#34; 

&#34;How could I forget after seeing her green high-fructose corn syrup-stained smile that one time?&#34; Harry shuddered.

&#34;Trust me, James isn&#39;t a fan of her stealing his candy either. But she //asked me to make it again.// She&#39;s not the pickiest eater, but you know how she dislikes cinnamon, and I&#39;ve been trying to get her more into Cuban desserts since I know how to make them, and all of them use cinnamon! So she&#39;s always saying &#39;no thank you.&#39;&#34; Jay laughed. Harry was always so kind to them, not stopping them when they rambled and listening politely.

&#34;So tell me, what is ah-rose kohn leechee? Did I say that right?&#34; 

&#34;Not even close, Harold, but I appreciate the effort. It&#39;s a rice pudding, but a perfect combination of both sweet and tangy. I added blood orange to the mix, you see.&#34; 

Harry nodded.

&#34;So, do you want to try it?&#34;

&#34;I don&#39;t have a--&#34;

&#34;Spoon? I brought one from H&amp;S,&#34; they cut him off, reaching into their bag and producing a Tupperware container and a plastic spoon, as well as some napkins. &#34;Go on, try it, birthday boy!&#34; 

Before Harry could open the container,  [[[scp-8056|Jennifer Vide]]], one of his archivists, announced her presence in the main A&amp;R office with a soft &#34;Hi!&#34;

&#34;Miss Vide!&#34; Jay smiled.

&#34;Hello, Jennifer,&#34; Harry nodded.

&#34;Director Blank. Doctor Everwood,&#34; she smiled and nodded similarly.

As she approached, they noticed she carried with her a plastic bag from a topside mom-and-pop restaurant. Jennifer exchanged looks with both and placed her offering on the table once she was close enough. &#34;Happy birthday, Director Blank.&#34; 

&#34;What&#39;s this, Jennifer?&#34; Harry stopped her from proceeding into her personal office down the hall.

&#34;Bannock. Your favorite,&#34; she said simply. &#34;I know there&#39;s a First Nations restaurant topside--&#34;

&#34;... that makes them with a maple glaze,&#34; the two spoke in unison.

&#34;I&#39;m surprised you remember that.&#34; Harry put down Jay&#39;s container and grabbed the bag, which itself held a small cardboard container. He opened it, revealing a fried dough within, then smiled. &#34;Thank you, Jennifer.&#34; 

She shrugged, returning the smile, then continued down the hall. Moments later, she was in her office, door shut behind her.

Jay looked on, watching as their friend sat there staring at a piece of fried dough. Though to the untrained mind it might resemble a beavertail pastry, Harry had instructed Jay on the very important difference between bannock and beavertail. Originally British, the meal of necessity had become commonplace among Canadian First Nations peoples following rationing of foods in the 19th century as well as the banning of foraging for them. 

&#34;Favorite employee, huh?&#34; Jay teased.

&#34;I guess you can say that.&#34; 

&#34;You don&#39;t have to try my //arroz con leche// now. I know fried foods don&#39;t keep well, and that one already made the trip from topside, so go on, eat it.&#34;

Harry plucked the frybread from the box. It smelled of maple. He could already tell it was going to get stuck on his facial hair and leave crumbs all over the place. Taking a modest bite, he savored the crumbly dough, sweet maple, and warm cinnamon; the flavors and textures coming together to create a deliciously delightful experience that made him grateful he had been assigned to a Site in his home country. 

&#34;So tell me, Mr. Dad, you ready for that consult yet?&#34; Jay quirked an eyebrow, chuckling to themselves.

&#34;Dad?&#34; Harry snapped back into reality, narrowing his eyes at them. &#34;You&#39;re not supposed to know that. How do you know?&#34;

&#34;Ilse is awful at keeping interpersonal secrets. Plus, she looks like you and Mel.&#34; Jay laughed. &#34;Even if Ilse didn&#39;t know, where I&#39;m from, knowing who is who&#39;s kid is a skill you just pick up,&#34; they winked. 

He sighed. &#34;How much //do// you know?&#34;

&#34;About her or what you asked me down here for?&#34; 

Harry made a face. &#34;Her.&#34;

&#34;Not much.&#34; Jay sighed, their only hand meeting their waist. &#34;I know she&#39;s from one of the Deadlines. Ilse also told me all of you pulled a little stunt to make sure TAD didn&#39;t sequester her away.&#34; 

&#34;Mel, she, and I had the world&#39;s most uncomfortable coffee date shortly after her arrival as well,&#34; he nodded.

&#34;I can only imagine how riveting the conversation was,&#34; Jay smiled politely, reaching for Harry&#39;s shoulder and patting it gently. &#34;But I&#39;m no stranger to uncomfortable conversation. Besides, now that you&#39;re a parent, you&#39;re gonna have to get used to it.&#34; They shrugged. &#34;Or maybe not. She&#39;s not a teenager, so you&#39;ve been spared the worst.&#34;

&#34;Thank God for that.&#34;

&#34;Amen. I&#39;m glad I&#39;m never going to have to give James //the talk.//&#34;

&#34;Can you imagine Doctor Reynders giving him //the talk//?&#34; 

Jay snorted. A brief silence swept over the two as Harry took another bite of his bannock, dropping crumbs on his facial hair. 

&#34;So,&#34; they smiled. &#34;You had wanted to see me?&#34;

&#34;Right,&#34; he dusted the crumbs off his snowy white beard and lowered his voice. &#34;Please, come into my old office.&#34; 

Harry stood, gathering up both presents he had been given and approaching a shut door. He awkwardly scanned his ID card against the reader and held the door open for his friend as they stepped inside. Upon entering, the door shut and he scanned his ID again. Jay heard the signature hum of SRAs switching on, as well as several other anti-anomalous safety measures activating. 

&#34;I didn&#39;t realize this would be a classified meeting.&#34; They looked to Harry, who had crossed the small room to open a minifridge. 

&#34;It&#39;s one I&#39;ve put off for too long,&#34; he grunted, bending over to stash the bannock and //arroz con leche.//

&#34;Oh?&#34; 

&#34;Yeah. It&#39;s a big one,&#34; he turned back to face Jay. Both of their faces grew deadly serious.

&#34;Is it--&#34;

Harry nodded gravely. 

&#34;SCP-001.&#34;</textarea></pre>
