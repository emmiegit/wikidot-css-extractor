**Item #:** SCP-8702

**Object Class:** Euclid

**Special Containment Procedures:** The building containing SCP-8702 and all surrounding offices have been purchased by a Foundation front company. It has since been converted into Area-8702, with accommodations and living quarters for 50 researchers and 100 armed security personnel. Study of the interior of SCP-8702 is ongoing, conducted through exterior observation and radar analysis. Exploration of SCP-8702, whether manned or remotely operated, may not be attempted until the O5 Council has given permission.

**Description:** SCP-8702 is a dimensional aperture located in the men&#39;s bathroom of a Chipotle franchise at the [REDACTED] Professional Complex in Evanston, Illinois. From what can be observed from the bathroom corridor, the interior of SCP-8702 is a lightless cave composed of a white, chalky substance that has yet to be identified. Natural rock formations in the cave take the shape of the contents of the bathroom that once occupied that restaurant.

The cave extends beyond the reaches of the building&#39;s layout, with a tunnel extending from a hole in the wall an additional 115 meters before curving eastward. The size of this cave is not currently known.

Dust particulates from within SCP-8702 stick to the open doorway like an invisible film. It is not believed that solid matter can exit SCP-8702. Whether SCP-8702 can be breached externally is not currently known.

SCP-8702-A is an entity living within SCP-8702. It takes the appearance of a human girl between the ages of 10 and 13 dressed in blue pajamas. SCP-8702-A has been seen milling about the interior of SCP-8702, humming unidentifiable songs, and drawing abstract, shapeless pictures in the dust. --It has not yet acknowledged the presence of containment staff, nor does it appear to understand speech.-- **[PENDING REVISION]**

**Discovery:** On 1/14/2023, the anomaly was discovered by Mr. Garrett Mathis, a cashier at the restaurant. He had opened the door after working hours, discovering the suite in its anomalous state.

When the Foundation investigated and took control of the building, Mr. Mathis was detained, questioned, and released after being given Class-A amnestics.

&gt; **Incident Log - SCP-8702-A First Contact**
&gt; **Date:** 1/28/2023
&gt; **Time:** 04:13 AM CST
&gt; 
&gt; &lt;Begin Log&gt;
&gt; 
&gt; //[Containment specialists Kayla Dobbs and Carl Waller sits at the observation post in the corridor outside SCP-8702. A motion detector beeps on Dobbs&#39;s laptop.]//
&gt; 
&gt; **Waller:** There she is again.
&gt; 
&gt; **Dobbs:** Want me to try and contact her?
&gt; 
&gt; **Waller:** That, or maybe just record what she does. We have no idea what she&#39;s capable of.
&gt; 
&gt; //[SCP-8702 approaches the gateway.]//
&gt; 
&gt; //[She knocks on the invisible film that keeps her from leaving.]//
&gt; 
&gt; **Waller:** That&#39;s... new.
&gt; 
&gt; **Dobbs:** Maybe she needs our help.
&gt; 
&gt; //[Dobbs gets up.]//
&gt; 
&gt; **Waller:** Be careful, Kayla.
&gt; 
&gt; **Dobbs:** Hi, there! Are you lost?
&gt; 
&gt; [The flesh of both of her hands contorts inward, changing color, making sticky, wet noises — until both hands resemble the head of a pekin duck.]
&gt; 
&gt; [Her own head also contorts inward until it resembles the head of character actor Steve Buscemi.]
&gt; 
&gt; **SCP-8702:** {{I&#39;M HUNGRY.}}
&gt; 
&gt; **Dobbs:** ...um, okay, would you like me to get you something to --
&gt; 
&gt; **SCP-8702:** {{##22a400|**THERE IS A SONG STUCK IN MY HEAD.**##}}
&gt; 
&gt; //[SCP-8702&#39;s right hand suddenly balloons in size, morphing into the head of a tiger shark.]//
&gt; 
&gt; **SCP-8702 (Buscemi Head):** //[Hisses.]//
&gt; 
&gt; **SCP-8702 (Shark Head):** {{##22a400|**NOPE. YOU DON&#39;T GET TO DECIDE WHAT SONGS GET STUCK IN YOUR HEAD. THAT&#39;S THE RULES. JUST BE GLAD I PICKED S.O.A.D. AND NOT LIMP BIZKIT.**##}}
&gt; 
&gt; {{##22a400|**NOW IF YOU&#39;LL EXCUSE ME, I&#39;MMA CUT OFF YOUR FOOD SUPPLY.**##}}
&gt; 
&gt; //[The shark head bashes against the invisible film. The film starts cracking.]//
&gt; 
&gt; **SCP-8702 (Buscemi Head):** {{THIS IS INSIGNIFICANT. I CAN MAKE ANOTHER GATE.}}
&gt;  
&gt; **SCP-8702 (Shark Head):** {{##22a400|**SO I GOT EMPLOYMENT SECURITY? BITCHIN&#39;.**##}}
&gt; 
&gt; //[The other duck hand morphs into another shark head. He bashes both of them against the portal.]//
&gt; 
&gt; **SCP-8702 (Buscemi Head):** {{YOU&#39;RE //NOTHING,// TRAITOR.}}
&gt; 
&gt; //[The Buscemi head contorts into the head of a man of Armenian descent between the ages of 25-30.]//
&gt; 
&gt;  **SCP-8702 (Jim Head):** {{##22a400|**NO, I&#39;M JIM SHARKHANDSIAN!**##}}
&gt; 
&gt; //[Enraged shrieking echoes throughout the cave from millions of sources at once.]//
&gt; 
&gt; //[[https://www.youtube.com/watch?v=lnbvK2HDNUc The new head vocalizes bizarrely.]]//
&gt; 
&gt; //[The portal shatters, leaving nothing behind but the Chipotle&#39;s original bathroom.]//
&gt; 
&gt; &lt;End Log&gt;</textarea></pre>
