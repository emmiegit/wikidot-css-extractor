**Special Containment Procedures:** SCP-7487 is to be employed by the Southern Los Angeles Soup Kitchen[[footnote]] A SCP Foundation front organization ran by the Anomalous Individuals Monitoring Bureau tasked with detection of anomalous individuals within the homeless community of Los Angeles and their integration into society as part of the AIMB program.[[/footnote]] as long as it remains willing and cooperative. Due to its loyalty to the Foundation, further monitoring is considered unnecessary. 

**Description:** SCP-7487 is a 56 year old human male of Hazara ethnicity, originally coming from a Proto-Sarkic community in a rural area of Northern Afghanistan. SCP-7487 possess various carnomantic abilities, including self-regeneration and ability to create non-sentient SK-BIO Type 007 organisms. The latter ability has been utilized by it primarily for the creation of highly nutritious meat-based meals. SCP-7487 is a native speaker of the Eastern Persian language and has a conversational-level knowledge of English. 

Further information about SCP-7487&#39;s personal life has been deemed irrelevant for the purposes of this document.</textarea></pre>
