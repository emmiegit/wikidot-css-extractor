    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>[[include :scp-wiki-cn:theme:wish-for-miracle]]

[[&gt;]]
[[module Rate]]
[[/&gt;]]

It&#39;s really nice to see you, dear visitors! I&#39;m **Relliorca**. 
With the help of my friends...I finally know how to contribute my art to this wiki. Congratulations to myself. 

This means that in the coming weeks, I will gradually showcase my concept art... mainly the characters. However, I&#39;m too lazy and have only drawn a little bit so far. So we can only start with these old SCPs that people might be tired of seeing them...just getting familiar with my art style. 

As for why I&#39;m still following Series I in 2026...I really just like drawing them and writing their stories. I do prefer to re-create based on them. 

Note: My art style may be...unattractive and my skills are extremely unstable. 

[[collapsible show=&#34;+ Rellyn Wyen&#34; hide=&#34;- I want to sleep... &#34;]]

[[image https://scp-wiki.wikidot.com/local--files/art:relliorcaartwork/7fc816547840838b4403c97242d2ee10.webp]]

There&#39;s nothing to say about her. 

[[/collapsible]]

------

Okay this is the completely normal human, Patrick Cecil 

[[image https://scp-wiki.wikidot.com/local--files/art:relliorcaartwork/642279de39a137bcfc6fd24f734175c8.webp]]

And what are you...

[[/collapsible]]

------

[[collapsible show=&#34;+ Dashiell Edward&#34; hide=&#34;- Or SCP-079… &#34;]]

[[image https://scp-wiki.wikidot.com/local--files/art:relliorcaartwork/925e9384551feb24cd936f02ba94a388.webp]]

You will know him if you have seen my tale

[[image https://scp-wiki.wikidot.com/local--files/art:relliorcaartwork/df632ee9c01bb46fee2a4cc1cb035c64.webp]]

Oh，SCP-079

[[/collapsible]]

------

That&#39;s all for today. You can look forward to the rest of the characters. It will definitely not be the old SCPs anymore... I will come back with my arts (I&#39;m sure some people are wondering who Rellyn Wyen actually is).
