&#34;What? You wanna pull up the Abnormality Institute&#39;s records from the early last century?&#34;

In Site-CN-21, seated at the terminal in the data dispatch center, Chen Ping eyed the unfamiliar man before him with suspicion—a stranger he&#39;d never encountered at the site before.

&#34;Correct. I&#39;m currently working on a research project that requires data from that period. I&#39;d appreciate your assistance.&#34;

Chen Ping felt a surge of irritation. Retrieving the Abnormality Institute&#39;s records was notoriously cumbersome. The records were fragmented and heavily restricted by varying access levels. His rare moment of downtime as today’s duty officer vanished instantly.

&#34;Fine, fine. Which period? What clearance level? Where’s the request?&#34;

&#34;1910–1930. Level 4. The application and authorization documents are here. &#34;

Twenty years. Chen Ping curl his lip. This guy was asking for the moon. Big shots never considered how much trouble it was for a nobody like me to pull together two decades&#39; worth of data. Complaints aside, he was eating at their table. Chen Ping scanned the application—stamps, approvals, all in order. The authorization documents were flawless. With a sigh, he opened the terminal and began searching, the process as familiar as breathing.

Really tedious, he thought. Might as well kill some time by asking what this application is even about. &#34;Hey buddy,&#34; Chen Ping casually asked, waving the application in his hand, &#34;could you tell me what this project is for that needs twenty years&#39; worth of data? Your application doesn&#39;t really say much about it.&#34;

&#34;Huh? Oh. It&#39;s to track down a Kuiyang Sect Taoist reverend adept at the Arts of Necromancy, Astrology and Medicine. They say he was born during the Tongzhi[[footnote]] **Translator&#39;s Note：**Tongzhi was the era name of Emperor Aisin Gioro Zaichun, the tenth emperor of the Qing Dynasty and the eighth emperor after the Qing forces entered the Passes. The era name was used from January 30, 1862, until the emperor&#39;s death on January 12, 1875, spanning a total of thirteen years. [[/footnote]] era and has lived from the late Qing dynasty until now.&#34; The man shrugged as he spoke.

&#34;The Abnormality Institute must be seething with hatred for him. They&#39;ve been hunting him down since the late Qing dynasty, decades before the Foundation was even established, but never once caught his fox&#39;s tail at all. Now it seems he&#39;s resurfaced—he even [*http://scp-wiki.wikidot.com/scp-cn-286 brazenly walking in earlier to take the Foundation&#39;s containment object].&#34;

&#34;Wow, that sounds pretty interesting.&#34; The man&#39;s words piqued Chen Ping&#39;s curiosity. &#34;Mind elaborating?&#34;

&#34;He&#39;s a master of disguise. In most records today, he operates under the same name but with a different appearance each time. My project attempts to compare records spanning those twenty years to see if we can identify patterns in his behavior, helping the Foundation track him down sooner. &#34;The man stepped forward and handed over his card. The ink on the card is somewhat blurred.

&#34;Document Department researcher...Shi Jiamin. I see. But why specifically these twenty years?&#34; Chen Ping took the card and studied the characters carefully. Perhaps because the printing was so blurred, his eyes grew heavy, and he couldn&#39;t help a yawn.

The man smiled faintly and continued, &#34;Because that was when he was most active. In the twenty-first year of Guangxu[[footnote]] **Translator&#39;s Note：**Guangxu was the reign title of Aisin Gioro Zaite, the eleventh emperor of the Qing Dynasty, used from February 25, 1875, to November 14, 1908. [[/footnote]], he left the Kuiyang Sect for Hong Kong. At that time, he hadn&#39;t yet mastered the Arts of Necromancy, Astrology and Medicine. Filled with patriotic fervor, he followed several masters, participating in uprisings across the land. After witnessing too much bloodshed and futile struggle, he returned to Kuiyang Sect, practicing in seclusion until the second year of Xuantong[[footnote]] **Translator&#39;s Note：**Xuantong, the era name of Aisin Gioro Puyi, the twelfth emperor of the Qing Dynasty, also the final one in China&#39;s feudal dynastic history. It came into use in 1909. [[/footnote]], when he emerged once more.&#34;

&#34;In the third year of Xuantong, the Arts he mastered turned Wuchang[[footnote]] **Translator&#39;s Note：**Southeastern parts of Wuhan, one of the Wuhan&#39;s Three Townships. [[/footnote]] upside down, followed by Hanyang, Hankou[[footnote]] **Translator&#39;s Note：**Hanyang and Hankou are both parts of Wuhan&#39;s Three Townships. [[/footnote]], Chengdu, and Nanjing. By the time the Sir he revered returned from France, he had already secretly arranged everything in order. It was also during this period that the Abnormality Institute began to take notice of him. The Abnormality Institute still striving to salvage the crumbling Qing dynasty, was enraged by his use of Kuiyang Sect&#39;s Witchcraft to foment unrest. They regarded him as a thorn in their side, a thorn in their flesh.&#34;

At this point, the man let out a few self-deprecating chuckles.

&#34;From smearing him through spies planted beside the Sir, to deploying bizarre artifacts recorded in the Bamboo Scroll, to countering his Arts with curses—amidst the myriad obstructions of the Occult Society&#39;s forces, his arts proved powerless, only watched helplessly as the Sir&#39;s influence crumbled, as Sir was forced to resign, and as the position he had prepared for Sir was handed over to that damned Yuan Shikai[[footnote]] **Translator&#39;s Note：**The leader of the Beiyang military clique. During the 1911 Revolution, he forced the Qing emperor Aisin Gioro Puyi to abdicate and became the Provisional President of the Republic of China. In December 1915, he proclaimed himself emperor, changed the country&#39;s name to the Empire of China. [[/footnote]], propped up by the Abnormality Institute.&#34;

The man&#39;s unusually vivid narration began to take on a tinge of emotions. The terminal before Chen Ping had entered automatic operation phase, commencing the download of selected data. In an instant, a wave of drowsiness swept over him as if days of fatigue had suddenly accumulated, leaving him feeling profoundly sleepy.

&#34;By the third year of the Minkuo[[footnote]] **Translator&#39;s Note：**The Republic of China, proclaimed in Nanjing in 1912 and ceased to exist in 1949. [[/footnote]], his Arts could no longer aid Sir in securing victory. The revolutionary army were crushed by the Beiyang Army, who had been bolstered by the support of the Abnormality Institute. The Sir, swayed by the slanderous words of the Institute&#39;s petty schemers, distanced him. Discouraged and disheartened, he journeyed far to Japan, where he became a disciple of an Onmyoji. Little did he know that Sir himself had also fled to this land before.&#34;

&#34;In the sixth year of the Minkuo, he accompanied Sir back to the country. Thereafter, he devoted himself to serving at his Sir&#39;s side, routing the likes of Lu Rongting and Chen Jiongming into disarray. The sculpins of the Abnormality Institute could find no trace of him, leaving only a trail of baseless rumors and unverified accounts until Sir&#39;s passing in Beijing during the fourteenth year of the Republic.&#34;

The progress bar seemed to be nearing its end. As the man spoke in a steady, measured tone, Chen Ping&#39;s rationality could no longer resist the rising wave of drowsiness.

The Sir has passed away, and his once-boiling blood elapsed with him. Afterward, he returned to Kuiyang Sect once more, observing the rise and fall of the Kuomintang[[footnote]] **Translator&#39;s Note：**Chinese Nationalist Party. [[/footnote]]—the very party Sir had nurtured—as a member of the Kuiyang Sect. His immortality has sustained him to this day. Little did he expect that one day, the defunct Abnormality Institute would reignite as a far more formidable organization. After failing to infiltrate Kuiyang Sect&#39;s esoteric Arts, they now sought to ensnare him once more, weaving a net as intricate as the one cast a century ago.&#34;

Watching Chen Ping slumbering before him and the terminal interface displaying to be completed, the man slowly approached, withdrew the spell disguised as a name card from Chen Ping&#39;s grasp and began skillfully modifying the retrieved data, murmuring softly:

Little did they realize that the person they feared no longer stood out as prominently as a century ago. Instead, he had quietly infiltrated their ranks, even entrusting the task of investigating him to himself—so ironic.

Only the clatter of keyboards, echoed through the silent data dispatch center.
