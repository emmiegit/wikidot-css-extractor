**Item #:** SCP-6926

**Object Class:** Safe

**Special Containment Procedures:** Several copies (both physical and digital) of SCP-6926 are available in Site-84&#39;s Media Archives for testing. Contact the Facilities Department for assistance procuring and/or removing trash. Testers who choose to procure their own trash are reminded to follow relevant sanitary protocols.

No copies of SCP-6926 are believed to exist outside of containment; as such, the risk of a containment breach is minimal.

**Description:** SCP-6926 is //Tasukete! Gomi o taberu no ga yame rarenai!// (&#34;Help! I Can&#39;t Stop Eating Garbage!&#34;), a six-episode animated miniseries created by Dulcet Tone Productions.[[footnote]]An anime studio active from 2001 to 2009 that created several shows with anomalous properties.[[/footnote]] The show is centered on a trio of high school students who share a compulsion to eat trash.

SCP-6926 can only be played in order, starting with the first episode. If the device being used has not shown the entire series up to the current scene, SCP-6926 will only contain static until this is rectified. Likewise, changing SCP-6926&#39;s speed or skipping to a different point in time will render it unwatchable until it is returned to the appropriate point and speed. Pausing and rewinding are unaffected, though replayed sections are non-anomalous.

SCP-6926&#39;s contents vary between viewings depending on what garbage is present within 13 meters of the device playing it. The garbage eaten by the three main characters will be identical to the real-world equivalents within this radius. When an object is swallowed by a character in SCP-6926, its real-world counterpart will abruptly disappear. If played in a typical residential space, SCP-6926 can effectively clean its entire area of effect over the course of the series.

Characters within SCP-6926 will interact realistically with their surroundings, adapting their behavior to the exact nature of the materials that are copied from the real world. SCP-6926&#39;s plot, setting, and tone are highly variable, though the show will consistently remain in the &#34;romantic comedy&#34; genre. The only exception is when no trash is available for SCP-6926&#39;s protagonists to consume; under these circumstances, the characters will deliver lengthy, out-of-character monologues on manners such as household maintenance, fair treatment of servants, and appropriate expressions of gratitude.

SCP-6926&#39;s three main characters retain their appearance between iterations, as well as some pieces of characterization:

* The protagonist, &#39;Brownie&#39;, is a dour, average-seeming male student. He is a skilled craftsman of variable nature and enjoys creating useful objects to give as gifts. He attempts to hide his condition from others, and has become reclusive as a result.
* The deuteragonist, &#39;Hobbes&#39;, is a high-achieving female student in Brownie&#39;s grade; the two were childhood friends. She makes little effort to hide her condition, instead becoming a public advocate for those suffering from compulsion disorders.
* The tritagonist, &#39;Silk&#39;, is a boy from a wealthy family who is one year older than the other two. While often surrounded by fawning classmates, he only displays interest in Brownie and/or Hobbes.

Two notable traits are consistently shared by all three main characters:

* All three dislike wearing clothing; when given the opportunity (such as in private), they will go partially or entirely unclothed. Foreground objects and carefully chosen camera angles are used to avoid displaying nudity.
* All three will occasionally speak with a Scottish accent, abruptly stop, then repeat their lines with the appropriate accent. This is never remarked upon by other characters.

SCP-6926 is commonly criticized by viewers for the off-putting nature of the garbage-eating scenes, lack of overarching plot, and low production value. However, the love triangle between the protagonists is consistently praised, and the show is generally perceived to be a sincere and sympathetic (if atypical) portrayal of mental illness.

While most people in SCP-6926&#39;s credits have been identified as current or former Japanese animation industry professionals, Brownie, Hobbes, and Silk are listed as playing themselves. Due to the circumstances of Dulcet Tone&#39;s dissolution, their actual voice actors remain unknown.

**Addendum:** Incident 6926-04d

On December 18th, 2020, a test was conducted to examine SCP-6926&#39;s behavior in a genuine residence, as previous experiments had used deliberately planted garbage in on-site testing chambers. To this end, Junior Researcher Alice Grimes was provided with a copy of SCP-6926 and instructed to watch it in their home, documenting the plot and which materials were consumed.

JR Grimes reports beginning their watch-through of SCP-6926 at 10:15 AM and finishing at 7:34 PM; no significant deviations from SCP-6926&#39;s previous behavior were found. At 11:50 PM, Grimes decided to restart SCP-6926 and leave it on overnight, as some amount of waste remained in their house after the first viewing. They went to bed at 12:15 AM, and fell asleep sometime thereafter. At 2:06 AM, Grimes&#39;s television crashed onto the floor, rendering the device inoperable and waking them up.

When Grimes investigated this incident, they found that all of the trash consumed during the first viewing had reappeared in a single pile on the kitchen table, covered in saliva and bite marks. The television itself was about three meters away from where it had been mounted, which is inconsistent with a simple fall. Additionally, all food in the house was missing; crumbs and spills in the kitchen suggest that it may have been consumed. No relevant forensic evidence could be recovered from the scene.

Grimes also discovered a piece of paper at the scene for which they could not account. A ten-digit phone number was written on it in charcoal; this number was found to belong to a local cleaning services business.
