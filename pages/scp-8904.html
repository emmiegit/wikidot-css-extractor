**Item #:** SCP-8904

**Object Class:** Gevurah

**Special Containment Procedures:** A database of over 2,000 keyphrases that would indicate SCP-8904 infection has been added to the Shibboleth Identification Network of all Foundation sites. Should any of these be written, typed, spoken aloud, or intensely thought about by any member of Foundation staff, they will be flagged for infection and taken to Disciplinary Site-5000 until the resident board of 50 military psychiatrists has determined that the infection has been resolved. 

In addition, any personnel displaying any of the following symptoms are to be brought to Disciplinary Site-5000 for questioning:

* Insomnia.
* Thanatophobia.
* Paranoia.
* Vegetarianism/Veganism.
* Lack of participation in the Kast Reforms.
* Unfamiliarity with the Kast Reforms.
* Lack of enthusiasm for the Kast Reforms.
* Taking lunch breaks outdoors, rather than in the cafeteria.

**Description:** SCP-8904 refers to DAD. According to the DSM-61[[footnote]]Diagnostic and Statistical Manual of Mental Disorders, 61st edition[[/footnote]], Devourment Aversion Disorder, or DAD, is a personality disorder characterized by a human subject&#39;s extreme and irrational fear of being devoured by one or multiple crocodiles. 

Though once believed to be non-anomalous, at least 5,000 cases of SCP-8904 have been detected among Foundation personnel since the implementation of the Kast Reforms. The O5 Council, in a joint effort with the Office of the 600 Augurs, have determined that the source of this increase was anomalous in nature -- the work of radical anti-Kast reality benders.

In addition, the following symptoms have been discovered among Foundation personnel with SCP-8904:

* Rudeness.
* An inflated sense of self-worth.
* Attention-seeking behaviors, i.e. as excessive struggling and vocalizing.
* Attempts to quit or otherwise breach the Foundation&#39;s non-compete clause.

If unchecked, the spread of SCP-8904 throughout the Foundation will result in a 15% decrease in workplace morale within the next 20 years. However, more recent oracular estimates have determined that a 18% increase could be expected as soon as 2187.

Despite its anomalous cause, psychological studies conducted by the Office of the 600 Augurs have determined that SCP-8904 can be cured -- even reversed -- through the use of cognitive-behavioral therapy, corporal punishment, social ostracism, cranial stapling, and a steady diet of asparagus and salted butter.

&gt; **Interview Log: Foundation SCP-8904 Infectee #4,482**
&gt; **Interviewers:** Dr. Moira Clayton, Director Armin Sachs
&gt; **Interviewed:** Junior Researcher Edgar Franck
&gt; **Date: 2/28/2185**
&gt; 
&gt; &lt;Begin Log&gt;
&gt; 
&gt; //[Franck is led to the interrogation room by two security officers. He sits at a table across from Dr. Clayton and Director Sachs.]//
&gt; 
&gt; **Sachs:** I was under the impression that he would be handcuffed.
&gt; 
&gt; **Franck:** Both of my arms are in slings. I&#39;m not gonna hurt any --
&gt; 
&gt; **Clayton:** You have not yet been given permission to speak.
&gt; 
&gt; //[Franck nods.]//
&gt; 
&gt; ...but yes, the slings made further hand restraints redudant.
&gt; 
&gt; **Sachs:** Very well. The disclaimer, if you please.
&gt; 
&gt; //[She pulls the SCP-8904 disclaimer documentation out of a dossier and reads aloud.]//
&gt; 
&gt; **Clayton:** &#34;By order of Kast Decree #95-A and the Office of the 600 Augurs, I am legally obligated to inform you, [Junior Researcher Edgar Franck], that while you are being interviewed regarding an anomalous condition that is //ostensibly// outside of your control, the part that you have played in your own SCP-8904 infection through your own lack of operational integrity cannot be ignored. Had you conducted your responsibilities at the Foundation with dignity, a solid work ethic, and respect for the Kast Reforms, this meeting would have been unnecessary. Therefore, you are hereby advised not to mistake interest in your condition and your recovery for any form of sympathy, compassion, or endorsement. On a personal note, [we are all very ashamed of you]. [AD-HOMINEMS TO BE PLACED HERE AT SITE DIRECTOR&#39;S DISCRETION.] If these terms are understood, nod.&#34;
&gt; 
&gt; //[Franck nods.]//
&gt; 
&gt; **Sachs:** Mr. Franck, in order to curb the spread of SCP-8904, understanding of its particulars is vital -- even with such an upsetting topic as this. So if you would be so kind as to explain why you struck the face of Researcher Chompers...
&gt; 
&gt; **Franck:** Remind me who Researcher Chompers is, again?
&gt; 
&gt; **Clayton:** The one you //slapped.//
&gt; 
&gt; **Franck:** ...that was a //researcher?//
&gt; 
&gt; **Clayton:** //[Sigh.]//
&gt; 
&gt; **Sachs:** (Don&#39;t let him provoke you, Moira...) No, Researcher Chompers is not //technically// a Foundation researcher. Now, answer the question.
&gt; 
&gt; **Franck:** Well, it was eating me.
&gt; 
&gt; **Clayton:** And you think that&#39;s justification for causing Researcher Chompers physical harm?
&gt; 
&gt; **Franck:** Yep.
&gt; 
&gt; **Sachs:** Explain.
&gt; 
&gt; **Franck:** I didn&#39;t wanna die.
&gt; 
&gt; ...
&gt; 
&gt; **Sachs:** Look, you&#39;re going to have to meet us in the middle. There&#39;s only so much we can do to parse a loaded statement like that.
&gt; 
&gt; **Franck:** Okay, but like... are you saying I should //want// to be eaten by a crocodile?
&gt; 
&gt; **Clayton:** Oh my God.
&gt; 
&gt; **Sachs:** (Moira...)
&gt; 
&gt; **Clayton:** No, really -- I can&#39;t decide if you&#39;re actually aware of how disrespectful you&#39;re being, or if you&#39;re actually this stupid.
&gt; 
&gt; **Franck:** ...yes.
&gt; 
&gt; **Sachs:** What now?
&gt; 
&gt; **Franck:** Yes, I am stupid. So //teach me.// Teach me why I should want to be eaten by a crocodile during work hours.
&gt; 
&gt; **Clayton:** Actually, never mind -- now it&#39;s obvious that you&#39;re acting in bad faith. Thanks for clearing that up.
&gt; 
&gt; **Sachs:** Okay, but what if he isn&#39;t?
&gt; 
&gt; **Clayton:** What?!
&gt; 
&gt; **Sachs:** We have to account for every possibility. In the event that he is actually unaware of --
&gt; 
&gt; **Clayton:** No. Enough is enough. I am not going to sit here and argue with a grown man about why he needs to shit in a toilet, breathe air, or eat food. 
&gt; 
&gt; **Franck:** I mean, is it that necessary for me to be eaten by a crocodile?
&gt; 
&gt; **Clayton:** I&#39;m sorry, but if he says one more word, I&#39;m having a stroke.
&gt; 
&gt; //[She leaves.]//
&gt; 
&gt; **Sachs:** Well. Hope you&#39;re proud of yourself.
&gt; 
&gt; **Franck:** Just, answer me one thing.
&gt; 
&gt; **Sachs:** And if we do answer, do you promise to cooperate?
&gt; 
&gt; **Franck:** Fine.
&gt; 
&gt; **Sachs:** Very well, what&#39;s your question?
&gt; 
&gt; **Franck:** Okay. I was here before the Kast Reforms were set in stone. Back before we needed the Augurs, before we fucked around with the mission statement. And back then, I worked on a few keter-class objects. Like, there was this one anomaly, I forget its number, where if we didn&#39;t sacrifice a goat every few months, it would break out of containment.
&gt; 
&gt; **Sachs:** I fail to see where you&#39;re going with this.
&gt; 
&gt; **Franck:** But, like, is this that kind of situation?
&gt; 
&gt; **Sachs:** ...I don&#39;t follow.
&gt; 
&gt; **Franck:** No, really, when the -- when //Researcher Chompers// attacked me on my lunch break, was that the kind of situation where I had to be eaten by a crocodile or there&#39;d be a K-class scenario of some kind?
&gt; 
&gt; //[Sachs sighs. He leans his elbows on the desk, kneading his scalp.]//
&gt; 
&gt; **Sachs:** Okay, I&#39;m starting to see where the &#34;bad faith&#34; thing was coming from.
&gt; 
&gt; **Franck:** No, I&#39;m serious. This is the only way I can see this making any sense.
&gt; 
&gt; **Sachs:** Franck, you can&#39;t just ask me &#34;why is the Moon a purple banana&#34; and pretend it&#39;s in the interest of genuine inquiry.
&gt; 
&gt; **Franck:** That&#39;s not what I asked!
&gt; 
&gt; **Sachs:** Same level.
&gt; 
&gt; **Franck:** Just -- just //humor me.// Is it necessary or helpful for me to be eaten by a crocodile? Yes or no.
&gt; 
&gt; **Sachs:** And now you&#39;re deflecting! I&#39;ve already been shockingly patient with you, Franck. 
&gt; 
&gt; **Franck:** How is that deflecting?
&gt; 
&gt; **Sachs:** Well, how is it helpful or necessary for you to //forego// devourment?!
&gt; 
&gt; **Franck:** Are you -- ugh. Fine. If I &#34;forego devourment,&#34; that means that not only do I get to stay alive, I can also spend my day not feeling my body being painfully torn apart by a crocodile. Plus, //you// get to keep me on your staff so I can help you, and no one has to mop my viscera off the cafeteria floor.
&gt; 
&gt; **Sachs:** I suppose that&#39;s reasonable.
&gt; 
&gt; **Franck:** Yeah. It is. Now -- 
&gt; 
&gt; **Sachs:** Do you believe you&#39;re uniquely deserving of life?
&gt; 
&gt; **Franck:** What?!
&gt; 
&gt; **Sachs:** Franck, you woke up in this world as a human being. You&#39;ve been alive for multiple decades. Statistically speaking, you are unique in how lucky you are, crocodile incidents notwithstanding. You could have been stillborn. You could have been a //fish.// And yet, here you are, reaping the evolutionary jackpot -- and still thinking you deserve extra treats. 
&gt; 
&gt; **Franck:**  Not being eaten alive isn&#39;t a special treat! It&#39;s the bare minimum of workplace safety!
&gt; 
&gt; **Sachs:** If you really understood how entitled you sound right now, you&#39;d vomit. Death happens to everyone. We are born, we exist, and we die -- that&#39;s the deal we&#39;re given, and we don&#39;t get to dictate the terms of any part of it. It takes a special kind of solipsistic, childish ignorance to think otherwise. If you&#39;re afraid of death, you might as well be afraid of pissing or breathing. It&#39;s like holding onto a childhood security blanket into your 50&#39;s. 
&gt; 
&gt; **Franck:** How does any of this mean I have to agree to be eaten by a crocodile?
&gt; 
&gt; **Sachs:** And that&#39;s how I know you haven&#39;t listened to a single word I&#39;ve said. 
&gt; 
&gt; **Franck:** I //know// death is inevitable. Why does this //specific// death have to --
&gt; 
&gt; **Sachs:** No, I&#39;m not falling for it anymore. Dr. Clayton was right. No matter how much I explain it to you, you&#39;re going to be lost in your own head, daydreaming about living forever while everyone else but you gets eaten by crocodiles.
&gt; 
&gt; //[The door suddenly opens.]//
&gt; 
&gt; Who is it? We&#39;re in the middle of something.
&gt; 
&gt; **Researcher Chompers:** Um. Sorry. I&#39;ll be on my --
&gt; 
&gt; **Sachs:** Oh, it&#39;s you! Nothing to be sorry about, ma&#39;am.
&gt; 
&gt; **Franck:** It talks?!
&gt; 
&gt; **Sachs:** //She// talks. (Asshole.)
&gt; 
&gt; **Chompers:** Listen, no rush, it&#39;s just... I just came back from meeting with the Augurs and I&#39;m //really// hungry, so would you mind if I ate that guy?
&gt; 
&gt; **Sachs:** Now do you understand why you need to be eaten by a crocodile?
&gt; 
&gt; **Franck:** Why?!
&gt; 
&gt; **Sachs:** Because she asked nicely.
&gt; 
&gt; **Franck:** [REDACTED FOR IMPUDENCE]
&gt; 
&gt; &lt;End Log&gt;
