**Special Containment Procedures:** SCP-7487 is to be shut down while the investigation into Akram Fahim&#39;s personal life is ongoing. Frequent customers are currently being monitored for anomalous abilities or physical changes.

The containment procedures will be updated as the investigation progresses.

**Description:** SCP-7487 is a kebab shop known as &#34;Fahim&#39;s Kebab Place&#34;, owned by Akram Fahim,[[footnote]] Hereby designated POI-7487.[[/footnote]]an Afghan refugee from the Hazara ethnic group who immigrated to the United States as part of the 2021 Kabul airlift. The meat sold in the establishment has been proven to have anomalously positive health effects on persons consuming it. Tests with D-class personnel struggling from incurable illnesses such as terminal cancer, rabies or prion disease have shown to briefly recover after consuming products sold in SCP-7487, with the effects of their disease typically returning after 48 hours.

Analysis of samples of the meat has confirmed it to be of mostly human origin. Research into its source is ongoing.

+ Investigation Log
-----

Following the identification of the anomaly by members of the Department of Analytics, a three-member team of MTF Lambda-14 (&#34;One-Star Reviewers&#34;) was sent to investigate the structure on 08/10/2024 during closing hours, posing as health inspectors. The transcription of the following infiltration can be viewed below.

&gt; [BEGIN LOG]
&gt; 
&gt; //[Agents Ruby and Gold of MTF Lambda-14 approach and enter SCP-7487, while Agent Emerald remains outside of the anomaly in case of emergency. POI-7487 can be seen cleaning a blade covered in a red substance]//
&gt; 
&gt; **POI-7487:** Sorry, sorry we are closing-
&gt; 
&gt; **Ruby:** Our apologies, but we&#39;re with the Food Safety and Inspection Service. We&#39;ve received complains regarding the state of your establishment. May we come in?
&gt; 
&gt; **POI-7487:** What? No, you were here last week, you must be mistaken. Sorry, I have to-
&gt; 
&gt; **Gold:** Oh, really? I&#39;ll notify our superiors about that later. But for now, we just have to get a look around. It&#39;s protocol. We won&#39;t take too long.
&gt; 
&gt; //[Agent Gold says as she shows POI-7487 a badge with the logo of the FSIS and her name. POI-7487 sighs and looks around, before taking a step back and gesturing for them to come in. He can be seen fidgeting with a hankerchief. At the same time, Agent Emerald sets up Hume and Elan-Vital Energy monitoring equipment outside]//
&gt; 
&gt; **Ruby:** You&#39;re saying there have been no issues found before, Mr. Fahim?
&gt; 
&gt; //[He nods as the MTF personnel search near the counter, finding no items of note. Unlike in traditional kebab restaurants, the kitchen is not visible from in front of the counter. Agent Gold approaches the kitchen door]//
&gt; 
&gt; **Gold:** I have to say, working this job sure makes one hungry-
&gt; 
&gt; //[Agent Gold pauses as she opens the door, revealing the kitchen. A trail of blood is seen, leading from a traditional Doner Kebab rotisserie towards a staircase leading down. Various cognitohazardous symbols are drawn on the walls using a substance presumed to be blood, designed to implant false images of a standard kitchen to persons viewing them].[[footnote]]As all agents had a Cognitive Resistance Value of 13, the symbols did not have an effect on them.[[/footnote]]]//
&gt; 
&gt; **Emerald:** Humes appear to be normal, EVE&#39;s slightly above average but nothing too alarming. Anything you&#39;ve got of note?
&gt; 
&gt; //[Agent Emerald speaks into the earpiece. The agents inside don&#39;t respond as Ruby notices the state of the kitchen. Agent Gold cautiously takes a step inside]//
&gt; 
&gt; **POI-7487:** You are okay?
&gt; 
&gt; //[He says as he looks towards Ruby, while taking a step towards the door. The agent is able to notice it and draws his gun, which causes POI-7487 to raise his arms.]//
&gt; 
&gt; **POI-7487:** Wha-wha-what? You&#39;re...no, please, just take the money and-
&gt; 
&gt; **Ruby:** Shut up and sit down!
&gt; 
&gt; **Gold:** What&#39;s going on there?
&gt; 
&gt; **Ruby:** Nothing, I got it under control. You have something?
&gt; 
&gt; //[As he asks that, Agent Gold approaches the stairs, which lead to a room with a metal door at the end. Together with other cognitohazardous symbols, various sigils associated with carnomancy are seen drawn on it, in addition to a spiral symbol]//
&gt; 
&gt; **Gold:** Think so!
&gt; 
&gt; [END LOG]

Following the apprehension of POI-7487, the door found within SCP-7487 was subsequently breached using door charges, due to the restaurant&#39;s owner&#39;s refusal to cooperate and provide the keys to which could open it. The room behind it contained a large carnomantic construct in the form of an amorphous mound of flesh, with tendril-like tumors, superficialy resembling portions of Kebab meat. Samples of the construct confirmed it to be the origin of meat sold on SCP-7487.

Following this discovery, an interview took place involving POI-7487. A transcription can be seen below.

&gt; 
&gt; **Interviewer:** Michael Herring
&gt; **Interviewee:** POI-7487 (Akram Fahim)
&gt; **Date:** 9/10/2024
&gt; -----
&gt; 
&gt; [BEGIN LOG]
&gt; 
&gt; //[POI-7487 is seen sitting at the interrogation table with his arms cuffed, his hands shaking. He briefly looks into the camera with a confused expression, before the interviewer enters the room. He is visibly startled]//
&gt; 
&gt; **Herring:** Good evening, Mr. Fa-
&gt; 
&gt; **POI-7487:** What&#39;s happening? Who are you? Is this...police?
&gt; 
&gt; **Herring:** Oh, it&#39;s fine Mr. Fahim, calm down. Would you like some tea, or coffee, perhaps?
&gt; 
&gt; //[Michael Herring smiles at POI-7487, before sitting down and placing a cup of coffee on the table, closer to the POI than himself]//
&gt; 
&gt; **POI-7487:** You&#39;re...government. Yes?
&gt; 
&gt; **Herring:** In a way. Mr. Fahim, I&#39;m just here to ask you a few questions, then we will let you go. Yes, you heard that right. No strings attached, just some...formalities. But that&#39;s something for later.
&gt; 
&gt; **POI-7487:** But what-what do you mean? Why am I here? Did I do something?
&gt; 
&gt; **Herring:** Yes, Mr. Fahim. You have utilized an anomalous effect as part of an above-veil buisness, a crime by both international and local law. A crime that, in most circumstances, leads to such buisness being shut down and its owner put into containment. But let&#39;s not get ahead of ourselves, shall we?
&gt; 
&gt; //[POI-7487&#39;s hands are seen shaking even harder as he looks at Herring. He looks down and, after a few seconds of silence, speaks in a quieter tone]//
&gt; 
&gt; **POI-7487:** What do you want from me?
&gt; 
&gt; **Herring:** Right. We have found these...//[Herring hands him a folder containing polaroid photos]// interesting symbols drawn across your kitchen. We know their purpose, of course. We have come across them [https://scp-wiki.wikidot.com/an-anthropological-approach-to-sarkicism-case-study-02-the-d previously]. Where do you know them from?
&gt; 
&gt; **POI-7487:** Oh...of course. From Ghuka, my village. Our elders drew it on buildings, cars, it was so that...well...
&gt; 
&gt; **Herring:** The outside world wouldn&#39;t encroach on you?
&gt; 
&gt; **POI-7487:** No, not...not at first. They said we are...healers, sufis...sheikhs! But then...first the Talibs, they called us Zindiq, Kafirs, many, many names...
&gt; 
&gt; **Herring:** Were they the only ones?
&gt; 
&gt; **POI-7487:** There was Daesh[[footnote]] Pejorative name for the international terrorist movement commonly known as the Islamic State.[[/footnote]], but they came later. More people joined after.
&gt; 
&gt; **Herring:** That&#39;s...very unfortunate to hear, Mr. Fahim. I take it that made you decide to leave Afghanistan?
&gt; 
&gt; //[POI-7487 nods his head]//
&gt; 
&gt; **Herring:** Let&#39;s switch to a different subject. Your food was noted to have very good health effects on all who consumed it. Why was that the case?
&gt; 
&gt; **POI-7487:** It&#39;s how my father taught me to make it. To make people better, healthier.
&gt; 
&gt; **Herring:** So it wasn&#39;t a trick to get more customers?
&gt; 
&gt; //[POI-7487 looks up at Herring with a frustrated expression]//
&gt; 
&gt; **POI-7487:** I can care for people without wanting money for it! I just had to make it somehow. It&#39;s so...hard to live, here in America.
&gt; 
&gt; **Herring:** I apologize for my assumptions. One last question, and that will be it for this interview. Where did you get the meat? The meat that you have used in your restaurant, that is. And yes, we have discovered the construct in your basement.
&gt; 
&gt; //[POI-7487 lifts up his shirt, exposing a large scar on his belly, before touching it]//
&gt; 
&gt; **Herring:** ...I see.
&gt; 
&gt; [END LOG]
&gt; 
&gt; -----
&gt; 
&gt; **Afterword:** DNA analysis confirmed the construct present in POI-7487&#39;s basement to be genetically identical to him.
