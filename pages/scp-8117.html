**Item #:** SCP-8117

**Object Class:** Safe

**Special Containment Procedures:** SCP-8117 requires no Special Containment Procedures outside of monthly check-ins to determine if the anomaly has been neutralized.

**Description:** SCP-8117 is an invisible transversal plane currently affecting Agents Kathleen Norton and Samuel Hawke. It is a solid, horizontal barrier. Although it does not exert any pressure upon the agents, neither Hawke nor Norton are capable of moving above it. Additionally, the barrier moves downwards permanently to match the lowest height reached by the top of Agent Hawke&#39;s head. Although the position of the barrier is only changed by Agent Hawke&#39;s position, Agent Norton is affected by it in the same way.

SCP-8117 was discovered by Agents Norton and Hawke on 09/22/24. The agents had been reassigned as temporary lab assistants as part of a mandatory psychological recovery program. They had entered the basement in search of supplies for Dr. Manson. Approximately thirty minutes later, Dr. Manson investigated the open basement door and heard the distressed voices of the agents below. Upon review, footage of Agents Norton and Hawke discovering the anomaly was found.

**Video Transcription: 09/22/24**
[[div class=&#34;blockquote&#34;]]
//Agents Norton and Hawke are seen walking down into the basement.//

**Norton:** What did Manson say he needed again?

**Hawke:** Sulfuric acid and a pair of rubber gloves.

**Norton:** What does he need that for?

**Hawke:** Hell if I know.

//Hawke reaches the bottom of the stairs and walks forward before stopping briefly and squinting his eyes. He reaches his arm back to rub his spine.//

**Hawke:** Had to flare up now, didn&#39;t it.

**Norton:** What was that?

**Hawke:** Nothing. Go look for Manson&#39;s shit.

//Hawke and Norton move to separate areas of the basement. Hawke looks into the sub-basement entrance before walking towards the nearby shelves. They begin examining the dozens of stocked shelves lining the walls. Norton scans the brackets and stops suddenly, her gaze shifted upward.//

**Norton:** Found the sulfuric acid.

**Hawke:** Good. Grab it and come help me find the gloves.

**Norton:** Yes sir.

//Hawke flinches at Norton&#39;s words. After a moment, he straightens himself and returns to his search. Norton reaches her arm up to grab the chemical, but stops mid-air. Her hand is pressed against the air, the outline of her palm flattened.//

**Norton:** What the fuck?

//Hawke&#39;s head spins around and he immediately begins approaching Norton&#39;s location.//

**Hawke:** What is it? Did the container break?

**Norton:** The air, it&#39;s—

//Norton lifts her other arm up, both hands now touching the barrier above her. She moves them around, tracing it across the room. Hawke appears distressed.//

**Hawke:** What the hell are you doing, Norton?

//Hawke stares at her in confusion for a moment before raising his own arms. His hands stop parallel to the top of his head, reaching the same height as Norton&#39;s.//

**Norton:** Okay, breathe in, breathe out. Remember the anomaly classification steps—

**Hawke:** That&#39;s only for when you&#39;re in the field. I&#39;ll just go tell Manson about it and he can send his little lemmings down here.

//Hawke makes his way to the stairs and takes a step. As he does, his head hits the invisible barrier and he stumbles backwards. Norton&#39;s hands are pushed down a few inches and she recoils. Hawke walks back up to the stairs, now slightly hunched over, and presses his hands against the barrier. His arms strain as he struggles to try and shove the invisible force up. After a few minutes, he stops, his breath coming out in heaves. He turns to Norton, who still has an expression of fear on her face, and lets out a deep sigh.//

**Hawke:** The first step is to determine the level of danger.
[[/div]]

Following the discovery of SCP-8117, Dr. Manson was assigned to it and tasked with retrieving the two agents. He performed a series of experiments for this purpose, which have been documented below.

||~ Method ||~ Outcome ||
|| Hydraulic Winch || A harness was fitted onto Agent Hawke&#39;s back when it was confirmed that only the two agents are affected by SCP-8117[[footnote]]A D-Class was sent into the basement and instructed to exit immediately after. They did so with no difficulties.[[/footnote]]. A winch was then attached to the harness and mounted to the floor just outside the basement. After 4 minutes, the barrier had not moved, and additional force would have caused harm to Agent Hawke. When a researcher detached the winch from Hawke&#39;s back, the agent lost his footing and stumbled, lowering the barrier further. ||
|| Scranton Reality Anchor|| An SRA was brought down by Dr. Manson and placed between both agents. Ten minutes after activation, Agent Norton attempted to walk up the stairs[[footnote]]Agent Norton was chosen to test the results rather than Hawke so as to avoid pushing the barrier lower.[[/footnote]] but was unsuccessful. Agent Hawke looked incredulous throughout the experiment and asked Dr. Manson if he &#34;knows what the fuck he&#39;s doing?&#34; Agent Hawke claimed this was obviously not a reality-bending SCP and quickly became more aggressive until Dr. Manson&#39;s departure from the basement.[[footnote]]//&#34;I&#39;ve read the action report and he has my condolences, but Agent Hawke is highly disagreeable and difficult to work with. Whoever signed off on his temporary assignment as a lab assistant instead of continuing his therapy sessions needs to rethink their assessment.&#34; - Dr. Manson//[[/footnote]]||
|| Tunneling || After it was confirmed that every part of the basement was covered by the barrier, a team was sent down to drill through the walls and determine if the barrier extends beyond the basement. After reaching a spot located just outside of Site 19, Agent Norton was instructed to push upwards. Her attempt was unsuccessful. On the walk back to the basement, Agent Norton began having a panic attack. Upon returning, the site psychologist was contacted and brought to Agent Norton.||

Upon review of footage and testimony by Dr. Manson and Dr. Caddel[[footnote]]Site 19&#39;s Psychologist.[[/footnote]] it has been deemed appropriate to perform a psych evaluation of both agents. Due to their unique circumstances, the evaluation will have to take place with both of them present.

**Audio Log: 09/25/24**

[[div class=&#34;blockquote&#34;]]
**Caddel:** Good morning agents. I assume Dr. Manson informed you of this.

**Hawke:** Yep, he did.

**Caddel:** Alright, good to hear. Now, I read through both of your personnel dossiers. You have my sympathies. I imagine it&#39;s hard to lose your whole squad—

**Hawke:** They were soldiers. Death is always a possibility, and they knew that.

**Caddel:** I see. How have you been handling their deaths?

**Hawke:** I&#39;ve been doing just fine. Like I said, it&#39;s something we&#39;ve been prepared for.

**Caddel:** You seem quite agitated in spite of that.

**Hawke:** It&#39;s cause I&#39;ve been down in this fucking hole for three fucking days. The Foundation sent in a halfwit with an SRA to fix this shit. Does it look like reality is going haywire? No, it doesn&#39;t. It&#39;s just a wall of air. It&#39;s like bringing a Geiger counter to a house fire.

**Norton:** They&#39;re just doing everything they can.

**Hawke:** Were they &#34;doing everything they can&#34; when they sent in an under-prepared MTF to deal with a fucking Type-Green?

//There is a brief silence in the recording.//

**Caddel:** Agent Hawke, there&#39;s no need to become aggressive. I&#39;m here to help, and Agent Norton is only trying to calm you down.

**Hawke:** What if I don&#39;t wanna calm down? You asswipes, you just want to keep me complacent. Don&#39;t want me telling anyone else how much you fucked up with that mission.

**Norton:** Sir, it wasn&#39;t their—

**Hawke:** Don&#39;t call me sir. I&#39;m not your boss.

**Norton:** I was just trying to say that it wasn&#39;t the Foundation&#39;s fault. They didn&#39;t know it was a reality bender—

**Hawke:** Type-Green.

//Norton can be heard taking a deep, shaky breath. She sounds like she&#39;s on the verge of tears.//

**Norton:** They didn&#39;t know it was a Type-Green. We got overwhelmed and—

**Hawke:** Of course the new recruit&#39;s sucking up to big brother. You think they&#39;re gonna hear this and think you&#39;re an asset? Think they&#39;re gonna give you a promotion for &#39;loyalty&#39;?

**Caddel:** Agent Hawke, that is enough.

**Hawke:** Hell, if the Foundation isn&#39;t to blame, then who is? Who could //possibly// be at fault?

//Agent Norton can be heard crying faintly.//

**Hawke:** Maybe it was the new kid messing everything up.

**Caddel:** Apologies. I&#39;m going to have to cut this meeting short. Can we get a guard down here to separate these two before Norton has another panic attack?

**Hawke:** You sure are a good psychologist, Cad. Why dontcha bring up the death of my squad again, maybe that&#39;ll get us out of this shithole.
[[/div]]

It is the opinion of the research team overseeing SCP-8117 that all attempts at rescue should cease. It is presumed that the anomaly extends far beyond the site and cannot be broken by any available means. While the research team was prepared to create a rotation of personnel to keep the agents company, Agent Hawke requested that no one be sent down. Due to the unique circumstances of SCP-8117, a raised bed was constructed for Agent Hawke so that he can rest without lowering the barrier. There will be weekly supply crates with rations and basic amenities sent to Agents Norton and Hawke. No further support will be sent.

For the purposes of record-keeping, all of the notable video logs regarding SCP-8117 can be found below.

[[div class=&#34;blockquote&#34;]]

**Video Transcription: 09/26/24**

//Agent Norton can be seen sitting down against one of the shelves. She appears to be doing breathing exercises. Agent Hawke is pacing in another area of the basement. He falters frequently, reaching his arm back to massage his spine. He appears to be examining the walls of the basement, intermittently reaching to touch the barrier above him. He stops suddenly, looking up at one of the fluorescent lights for a moment, then walks over to Agent Norton. His foot catches in a small divot in the ground, slipping briefly before catching himself. He stands over Norton, his fingers fidgeting.//

**Hawke:** Hey, Norton...

//Norton tenses up slightly, but continues her breathing exercises. She doesn&#39;t look at Hawke.//

**Hawke:** Look, I didn&#39;t mean what I said back there. Anytime there&#39;s a suit around, it&#39;s easy for me to get stuck on something. I don&#39;t have a problem with you. Are we good?

//Norton doesn&#39;t respond to Hawke. Her tension dissipates and she stops her breathing exercises. Hawke looks around the basement before turning back to Norton.//

**Hawke:** Listen, I-I&#39;m- Fuck. I&#39;m sorry, okay? It&#39;s not your fault. You did what you were taught to, and that&#39;s the best anyone could have expected of you. It was a shitshow, and you got caught in it on your first day.

//Norton looks at Hawke.//

**Norton:** Why are you so convinced the Foundation did this to us?

**Hawke:** I don&#39;t think they did it //to// us, but they certainly let it happen without lifting a finger.

**Norton:** Were we missing any equipment?

**Hawke:** No, it was more than that.

**Norton:** Did they not give us enough information?

**Hawke:** No that&#39;s not—

//Hawke stops speaking and takes a deep breath in.//

**Hawke:** It&#39;s the Foundation&#39;s fault.

**Norton:** But if—

**Hawke:** End of discussion.

//Norton goes silent. Hawke appears agitated and rubs his eyes.//

**Hawke:** God, Sam, what the hell are you doing.

//Hawke leans up against the shelf Norton is sitting at.//

**Hawke:** I don&#39;t want to talk about dead soldiers. It doesn&#39;t do anything good for you or for me. Understand? I&#39;m not trying to be an asshole, I&#39;m just being logical.

//Norton nods her head. She yawns and rubs her temples.//

**Hawke:** How you holding up?

**Norton:** Fine, I guess. I just hope the Foundation sends someone down soon. Anytime there&#39;s a creak, I look at the stairs, but no one&#39;s there. And every time they&#39;re not there, I—

//Norton chokes on her words and does her breathing exercises for a moment. Hawke waits for her to continue.//

**Norton:** I just need to know they&#39;re still trying.

**Hawke:** They wouldn&#39;t give up this easily. I&#39;m sure they&#39;re crunching to figure a way outta this mess.

**Norton:** I hope.

//Hawke rubs his forehead for a brief moment before speaking again.//

**Hawke:** Hey, while we&#39;re waiting for them to come up with a plan, we might as well try a few of our own.

**Norton:** Like what? We deal with reality threats, not... this.

//Hawke walks to one of the shelves and appears to search for something.//

**Hawke:** Y&#39;know, I used to be a Mole Rat.

//Norton shifts slightly and looks over at Hawke.//

**Norton:** A Mole Rat?

**Hawke:** Yup. Damn good one too. I once had to dig through three solid meters of coal slurry and burning tar. Some concrete and an invisible barrier? That&#39;s easy.

//After a moment, Norton stands and starts looking through shelves herself.  Hawke looks over his shoulder at her and seems to smile before turning back around. Eventually, Hawke pulls something from the bottom of a plastic container.//

**Hawke:** Norton, get over here. Got something that could help.

//Norton returns to her seat at the wall and Hawke stands in front of her.//

**Norton:** What is it?

**Hawke:** It&#39;s an alarm.

//Norton waits for Hawke to continue. When he doesn&#39;t, she speaks again.//

**Norton:** That&#39;s it?

**Hawke:** Some anomalies are generated by a collective mental effort, whether it&#39;s intentional or not don&#39;t matter. What matters is that we might&#39;ve made this barrier, and if we did, we just have to knock something loose in our heads.

//Hawke cranks the alarm without looking at the LED screen.//

**Hawke:** I don&#39;t have a clue when this&#39;ll go off, but it&#39;ll be loud as hell when it does, and that might just be enough.

**Norton:** Are you sure this will work?

**Hawke:** No. But it&#39;s a possibility.

//Neither of them speaks. After a few minutes of waiting, Agent Hawke can be seen smiling.//

**Hawke:** You ever had a drink before?

**Norton:** A few times, yeah.

**Hawke:** No, I mean a real drink. Something that&#39;ll knock your eyes out of socket.

//Norton looks concerned.//

**Norton:** Do I want that to happen?

**Hawke:** A &#39;course you do. I asked for some strong stuff in that care package they sent us. And hey, maybe it&#39;ll give us the kick we need to get out of this mess.

**Norton:** Yeah, maybe.

//Hawke rummages around in a large crate in the center of the basement. He removes cans of food and water bottles before finally grabbing a bottle of Tito&#39;s vodka.//

**Hawke:** This stuff&#39;s even cheaper than Smirnoff. You want some?

//Norton can be seen smiling hesitantly. She starts to stand.//

**Norton:** Sure.

//As Hawke begins walking over to Norton, the alarm goes off. He jolts and almost drops the bottle of vodka. Both of them appear startled. Hawke reaches his arm up towards the ceiling, but is cut short by the barrier.//

**Hawke:** Well, that&#39;s one thing checked off the list.

//As he begins walking again, his foot gets caught in the divot in the ground. He trips, then loses his balance. He lands on his hands and knees and the bottle of Tito&#39;s breaks as it hits the ground. Glass shards shoot across the floor and stab into his flesh. His legs give out and force him into a prone position, only a few inches above the floor. Agent Norton cries out in surprise just before her body folds forward, her head pushed into her lap.//

**Hawke:** Fuck! Jesus Christ!

//Norton&#39;s eyes can be seen darting around. She tries to lift herself up, but the barrier keeps her down. Her shoulder muscles can be seen straining against it. The spilled vodka starts to soak into Hawke&#39;s clothes.//

**Hawke:** Norton? Are you okay?

**Norton:** I-I can&#39;t move... I&#39;m stuck like this.

//Norton begins panicking. She tries to perform her breathing exercises. They are ineffective.//

**Hawke:** Hey, hey! Listen to me. Don&#39;t think about any of this. Just listen to my voice. You&#39;re fine. Everything will be fine.

//Norton continues to hyperventilate. Hawke reaches an arm forward and touches her hand.//

**Hawke:** I&#39;m here, you can feel me. You&#39;re not stuck. I can tell you what to do, but you&#39;re going to have to listen closely.

//Norton is still panicking, but she nods her head.//

**Hawke:** Okay. Now, move your head forward, get it out of your lap.

//Norton does as Hawke instructs her to do. Her eyes are closed tightly.//

**Hawke:** Now, unfold your legs out of the criss-cross position.

//Norton struggles briefly, but manages to get herself unstuck. She is now lying on her stomach perpendicular to Hawke.//

**Hawke:** Alright, now just crawl to the sub-basement stairs.

**Norton:** Oh god. We&#39;re never getting out of here.

**Hawke:** Yes we will. You&#39;re just panicking. You&#39;ll be okay.

**Norton:** But you just keep telling me that the Foundation fucks everything up. Do you really think we can leave? Or am I just going to die down here?

//Norton begins crying. Hawke starts to crawl forward slightly.//

**Hawke:** Listen to me, Norton. The Foundation won&#39;t screw this up. The Foundation didn&#39;t- the Foundation didn&#39;t fuck up the mission. They //will// save us. Trust me.

//Norton opens her eyes. She rubs away the tears and takes a deep breath in.//

**Norton:** Okay.

**Hawke:** Now, make your way over to the sub-basement.

//Norton slowly makes her away across the floor towards the stairs. She accidentally cuts her hand on a glass shard and curses under her breath before moving around the debris. She reaches the stairwell and crawls down until she can stand again.//

**Norton:** I&#39;m down here now. Can you make it?

**Hawke:** Yeah, no problem.

//Hawke&#39;s chin scrapes along the floor, the rough concrete scratching against his skin. His vodka-soaked clothes chafe against him with every movement. Blood drips from his knees and elbows periodically. He crawls in a plank position, presumably to prevent the barrier from falling to a level that would prevent him from moving entirely.//

**Hawke:** God, my back...

//Hawke can be seen stopping for a moment, trying to catch his breath. He continues a moment later, his movements strained.//

**Hawke:** Norton, get over here and be ready to pull me through.

//Hawke finally reaches the stairwell, his body shaking from the effort. He puts his arm out for Norton to grab. She takes hold and wrenches him out of the basement and onto the stairs. The barrier falls a little lower, but they both have room to stand. The remainder of the footage shows the agents standing or sitting down to catch their breath.//
[[/div]]

This footage was reviewed by Dr. Manson. He immediately sent a researcher down to check on the physical and mental health of the agents. Their supply crate was carried down to the lower level soon after. Both agents were told that experiments were still being run and help was on the way. Although many members of Site Staff were against this course of action, it was taken for the sake of Agents Norton and Hawke’s mental stability.

[[div class=&#34;blockquote&#34;]]

**Video Transcription: 09/27/24**

//Norton is pacing back and forth in the basement while Hawke watches. Hawke&#39;s clothing is spotted with dried blood. There are glass shards scattered along the floor. Both agents appear exhausted.//

**Hawke:** You should really get some sleep, Norton.

//Norton stops for a moment. She stares at the floor and breathes in deeply before continuing.//

**Hawke:** You&#39;re gonna crash if you don&#39;t rest soon.

**Norton:** What if you fall again?

**Hawke:** What?

**Norton:** What if you fall again, but this time I can&#39;t get out. Or I get crushed in my sleep.

**Hawke:** Listen, kid, that kind of thinking won&#39;t do you any good. Focus on what&#39;s happening now, not what might happen. If you don&#39;t, your mind&#39;ll just gnaw away at you.

//Norton stops again and proceeds to sit down, leaning against the wall.//

**Hawke:** Alright, good. Now, lets talk about ways out of here.

//Hawke grabs a notepad and a pen from a nearby shelf. It appears to have been written on.//

**Hawke:** We tried praying, both of us pushing the barrier at the same time, you went down to the last sub-basement to see if there just so happened to be some magical device that could save us. None of it worked.

//Norton&#39;s expression falls.//

**Hawke:** Hey, don&#39;t start with that yet, I&#39;m not finished. None of it worked, but that isn&#39;t //everything//.

**Norton:** What else is there to do?

**Hawke:** We can try a Way.

//Norton looks surprised.//

**Norton:** Those are real?

**Hawke:** Yup. You probably don&#39;t have clearance for that information, but who cares at this point.

//Hawke walks over to the wall opposite Norton and turns to her.//

**Hawke:** They&#39;re not easy to make though. They demand some effort, or else they&#39;ll just fizzle out. And if you mess them up, some weird shit happens.

**Norton:** Are you sure it&#39;ll work?

**Hawke:** Well, best case scenario is we get out of the bounds of the barrier.

**Norton:** And worst case is we get crushed on our way through.

**Hawke:** No, worst case is we don&#39;t do anything at all and we rot down here until we die.

//Hawke stares at Norton for a moment. She appears deep in thought.//

**Norton:** Okay, what do we do?

**[EXTRANEOUS FOOTAGE REMOVED]**

//Hawke and Norton are standing facing each other. Norton is holding a bundle of wires, duct tape, a map of Site 19, and pocket knife. Hawke is holding several bloody glass shards and a standard-issue MTF helmet. Hawke drops the helmet on the ground, the inner portion facing up. He takes the glass shards and crushes them in his hands. Blood drips down and into the helmet. Norton cuts the wires open, exposing the copper. She examines the map and finds the sub-basement they&#39;re in, taping one of the wires to it&#39;s position. She tapes another wire to the cafeteria. Once she&#39;s done, she spools the remaining wiring into the helmet. Norton backs away towards the nearest wall as Hawke approaches the helmet, a lighter in his hand.//

**Hawke:** Let&#39;s hope this works.

//Hawke drops the lighter into the helmet. The blood and the wiring react to the fire immediately. Arcs of electricity flow through the wires towards the map as the blood erupts upward, droplets floating in mid-air. The map is scorched save for the two spots marked by wires. The electricity returns to the helmet and stimulates the blood. It appears to be morphing and solidifying into a circular shape, but there isn&#39;t enough blood. Hawke steps forward and squeezes his hand into a fist, letting more drip out. The electricity latches onto it and travels through his hand and up his arm. He&#39;s blown back towards the wall, hitting his head and falling into a seated position against the concrete.//

**Norton:** Sir!

//Norton is pushed down to her knees. As she starts making her way towards Hawke, she accidentally disconnects the cafeteria wire. The floating blood shakes in the air as she reaches Hawke.//

**Norton:** Sir, are you okay?

//She checks him for injuries and see&#39;s blood dripping from the back of his head.//

**Norton:** Please, please wake up!

//The half-formed Way stops shaking. Norton begins crying and tries to awaken Agent Hawke.//

**Norton:** It can&#39;t happen again. I can&#39;t let it.

//The floating blood solidifies in the air and light emanates from it. Norton turns towards it.//

**Norton:** What the-

//The Way suddenly folds in on itself and explodes outwards in every direction. There is an inordinate amount of blood considering how much Agent Hawke expelled. Norton screams and begins hyperventilating. She performs her breathing exercises, although their effectiveness appears to be minimal.//

**Norton:** Come on, wake up. Please. I-I can&#39;t—

//Agent Norton closes her eyes. She grabs onto Agent Hawke&#39;s body and begins dragging him towards the next sub-basement entrance. Hawke&#39;s body slouches and the barrier goes lower, knocking against Norton&#39;s head. Her face hits the concrete floor and she curses before spitting out a glob of blood. Norton, now crawling, pulls Hawke&#39;s body across the floor at a slow pace. She stops, exhausted, and cries again.//

**Norton:** I&#39;m sorry, sir. I&#39;m so sorry. I&#39;m so tired, I—

//Norton looks at Hawke&#39;s body. Her expression changed slightly. The helmet, still soaked with blood, fizzles, presumably a remnant of the destroyed Way. An apple manifests inside of it. Norton&#39;s breathing slows, although she still appears to be panicking. She continues dragging Hawke&#39;s body, her arms straining with the effort. She tries to use her legs, but her feet constantly slip on the blood-slicked floor, forcing her to pull herself forward and then tug Hawke along after her. She eventually reaches the stairwell. She slides into it and then drags his body through. She drapes him over her shoulder and walks down the stairs. The remainder of the footage consists of Agent Norton holding Agent Hawke up. When he eventually wakes up, she almost immediately falls to the ground in exhaustion.//
[[/div]]

Upon review of the previous video log, it has been decided by Site Staff that further intervention will only consist of transporting the supply crate to their current sub-level. No correspondence concerning neutralization of the anomaly was sent. 

[[div class=&#34;blockquote&#34;]]

**Video Transcription: 09/28/24**

//Hawke can be seen leaning against a wall with Norton lying down nearby, asleep. Hawke&#39;s legs are shaking, presumably from exhaustion. A few moments later, Norton wakes up. As her eyes adjust, she looks at Hawke.//

**Hawke:** Thanks for saving me back there, Norton. You could&#39;ve just left me, but—

**Norton:** It&#39;s okay, Hawke.

//Neither speaks for a moment. Hawke&#39;s eyes close briefly, before opening suddenly.//

**Norton:** I&#39;m sorry you can&#39;t get any rest.

**Hawke:** It ain&#39;t your fault. Besides, I&#39;ve been on watch for long missions before. It&#39;s no big deal.

//Norton stretches her arms and takes a seated position.//

**Norton:** What kind of missions?

**Hawke:** Hunting down Type-Greens. Some of &#39;em don&#39;t realize their own strength, so when the big military guys show up, they start running scared. So we end up chasing them across towns, once even across the whole state. Obviously we weren&#39;t the only ones, but we couldn&#39;t afford to stop anywhere, so just took turns sleeping while someone else stayed awake. It&#39;s not like it would&#39;ve done much good though. Bennings snored so loud, anyone could sneak up on ya.

//Norton smiles.//

**Norton:** I never really talked to Bennings. He seemed... closed off, I guess.

**Hawke:** Nah it wasn&#39;t that. He was a big, strong guy, but he had some trouble with new people. Took me a month to have even one conversation with him, but after that he wouldn&#39;t shut up for the life of me.

**Norton:** How long did you know him?

**Hawke:** About eleven years or so.

**Norton:** Wow. I thought most MTF&#39;s went through members quickly.

**Hawke:** Yeah, most of &#39;em do. But we were good. We were really good.

//There&#39;s a brief silence. Hawke is smiling and looking down at his hands as he picks at his nails. He looks up, seeing Norton listening intently, and goes on.//

**Hawke:** You remember Guajardo?

**Norton:** Yeah.

**Hawke:** She used to be part of the Mole Rats. Well, they got sent into some hellhole and their comms went down. Whoop-de-doo, the Mole Rats died again. Who could&#39;ve guessed? But //she// didn&#39;t die. She came outta there two weeks later with a broken collarbone, a few fractured ribs, and another squad-mate draped over her back.

**Norton:** Did she get sent to your team after that?

**Hawke:** Hell no. I was the one she had over her shoulders. She&#39;d saved herself and another person from a reality bender. The suits weren&#39;t gonna waste talent like that. She got her own team and they let her pick the members. I was her first option.

//Hawke chuckles to himself.//

**Hawke:** She got a few more, and then we were off. Lotsa people died at first, but every year those fatalities got shaved thinner and thinner, until we had the full squad. When we got stuck with Oscar, I was sure he&#39;d get fried or spaghettified in two days, tops. But he didn&#39;t. He once shoved an SRA and a grenade into the open stomach of some egotistical god-child and blew them to bits.

//Hawke&#39;s expression changes almost imperceptibly. He looks down at the ground.//

**Hawke:** He was a real firecracker.

//His smile falters and he stops leaning against the wall. Norton becomes visibly concerned.//

**Norton:** What&#39;s wrong? Did something happen?

**Hawke:** It&#39;s nothing, just... There&#39;s no point in it.

**Norton:** In what?

**Hawke:** I already told you. Dead soldiers and all that.

**Norton:** But you looked so happy.

**Hawke:** I shouldn&#39;t be.

**Norton:** Why not?

**Hawke:** Because they&#39;re gone. And talking about them won&#39;t change that.

**Norton:** But that doesn&#39;t mean—

**Hawke:** You&#39;re a new recruit. I know you don&#39;t get it, but when people die, you just gotta move on.

**Norton:** But you aren&#39;t moving on! You&#39;re just standing in the same place, waiting for it to stop.

//Hawke shakes his head and rubs his forehead.//

**Hawke:** You just don&#39;t get it...

**Norton:** Do you think it&#39;s been easy for me?

//Hawke looks down at Norton.//

**Norton:** I watched them all die, Hawke. Guajardo got shredded into thousands of pieces of notebook paper. Sato got burned and liquefied by globs of oatmeal. Bennings... Bennings dragged me out of there, he saved my life. And then he got crushed by a giant apple. I saw his blood oozing from under it. I can&#39;t just //forget// about that! And neither can you.

**Hawke:** Type-Green&#39;s are dangerous. Any soldier with their head screwed on right knows that—

**Norton:** Stop calling them soldiers.

**Hawke:** What?

**Norton:** They were your friends! Can you just admit that? They&#39;re not numbers in a stat report. They&#39;re not strangers. They&#39;re not casualties in a war. They were your //friends//!

//Neither of them speaks for approximately two minutes. Norton looks at the ground.//

**Norton:** What are we gonna do?

**Hawke:** Just wait until it goes away. Or crushes us.

**Norton:** So you&#39;re just giving up? The Foundation is still trying to help us, and you&#39;re going to ruin our chances?

**Hawke:** They&#39;re not coming for us, kid. You should&#39;ve realized that.

//They stare at each other. Norton wipes away the tears around her eyes.//

**Norton:** You&#39;re alive.

**Hawke:** Yep.

**Norton:** And they&#39;re not.

//Hawke glares at Norton.//

**Hawke:** The fuck does that have to do with me?

**Norton:** Do you think this is what they wanted for you? For you to lie down and die? Is this what they get for their deaths?

**Hawke:** It was meaningless. They weren&#39;t sacrificing themselves, they weren&#39;t trying to save anyone. They just died.

**Norton:** That isn&#39;t the point.

**Hawke:** Well then what is the point? Tell me, if you know so much.

//Norton looks sympathetically at Hawke.//

**Norton:** I don&#39;t know. But I think we both know this isn&#39;t it.

//Hawke&#39;s glare relaxes into a neutral expression.//

**Hawke:** I bet it&#39;s real easy to act like that when you didn&#39;t even fucking know &#39;em.

**Norton:** You&#39;re right. It is.

**Hawke:** You think you&#39;ve seen something awful? You think seeing some stranger get burned alive is a little rough?

//Hawke waits for Norton to reply. She doesn&#39;t.//

**Hawke:** You know what&#39;s rough? Seeing those awful things every time you put your shirt on in the morning. Every time you drive to work. Every time you blink.

**Norton:** Do you think I don&#39;t?

//Hawke rubs his eyes with the palms of his hands and looks at the ground.//

**Hawke:** You don&#39;t-

**Norton:** Stop saying I don&#39;t get it! We were both there! We both saw them die!

//Hawke squints his eyes and reaches back to rub his spine. He tenses, then leans against the wall. Norton&#39;s face loses its aggression.//

**Norton:** We can help each other, Hawke. But I can&#39;t do that if you aren&#39;t willing to. I know it&#39;s hard, and it&#39;s going to get harder, but if you don&#39;t try, it&#39;s just going to eat you alive.

//Hawke slides down the wall slightly.//

**Hawke:** You know what&#39;s worse than getting eaten alive? Seeing their faces behind my eyelids, just staring at me. And every time I do, it hurts a little more, cause I know they won&#39;t be there when I open &#39;em.

//Both agents stare at each other. Hawke breathes in shakily. Norton stands up.//

**Norton:** Are you just gonna let us both rot down here?

//Hawke continues slowly sliding against the wall. Norton approaches him and tries to hold him up.//

**Norton:** Please. Sir, I don&#39;t wanna die down here.

//Hawke&#39;s eyes are motionless. He doesn&#39;t appear to be comprehending Norton&#39;s words, or he simply doesn&#39;t care. Norton&#39;s head presses up against the barrier.//

**Norton:** Just stand up. We can still get out of here. We can try the Way again. Something will work.

//Norton&#39;s shoulder tenses against the barrier and she is forced to crane her neck. Her expression becomes more agitated. She pulls one hand back.//

**Norton:** Get up!

//Norton slaps Hawke across the face. His eyes lose their glazed appearance and he falls over from the unexpected impact. Norton&#39;s body hits the ground suddenly. She curses and tries to stand, pushing against the barrier as she takes shallow breaths.//

**Hawke:** Trying will only make it worse.

//Norton cries for several minutes while Hawke remains quiet. Once both are silent, Norton turns to look at Hawke.//

**Hawke:** I&#39;m gonna get some sleep, Norton.

**Norton:** Sir?

//Both of them are silent for a moment.//

**Hawke:** Yes?

**Norton:** When you said they weren&#39;t coming for us, did you mean that?

//Hawke doesn&#39;t respond for a moment.//

**Hawke:** No. They&#39;re bringing help. Just wait.

**Norton:** Yes sir.
[[/div]]

On 10/01/24, a team was sent down with a new supply crate for the agents. Hawke and Norton were found lying on the ground, deceased. Cause of death determined to be blood loss and dehydration respectively.
