= **&lt;&lt; [[[voice-of-rage-and-ruin| Voice of Rage and Ruin]]] || [[[varuna-s-war| HUB]]] || [[[Shadow On My Back]]] &gt;&gt;**

[[=]]
**Hainan Island, South China Sea, March 1943**
[[/=]]

My feet were swollen from the climb down the mountain. I could feel my heartbeat in my toes as they strained the thin fabric of my well-worn socks. It was a thready beat, hammering against the molded leather of my boots like the skin of a old drum, joined by a chorus of blisters and lacerations that sang in throbbing harmony across my body, amplified by the chill. Even as painful as it was, it was still better to concentrate on that present pain than to linger on the plume of ash and dust from the mountain behind us, and the missing figure in our marching order.

We reached a switchback, and the head of column looped met my gaze as he turned, his mouth set in a grim line of fatigue and disgust. Matthews — the leather-skinned, hard-worn American cowboy — stared at me with dead eyes. //Keep up,// the eyes seem to say. //Don&#39;t dare straggle, or you&#39;ll get more of us killed. Like you killed Rebekah.//

Rebekah Ainsley, holy knight and bare-knuckle boxer, had saved me from the [[[/voice-of-rage-and-ruin|jaws of an undead dragon]]], just to be killed by it herself, lost in the stone jaws of the immortal beast and a collapsing mountain. //If I had been quicker, if I had been stronger-//

##FF4F00|//You cannot allow yourself to think like that,//## the knife at my side needled.

//Why not?//

 ##FF4F00|//We are at war. Against armies of sorcerers and devils and man. You cannot let yourself falter because of just one death.//##

The mountain scrub gave way to stunted trees as we headed towards the shelter of the forest below. I kicked a loose bit of shale off the ridge to hear its shatter down-slope. //Just one death? She saved me and was killed for it!//

##FF4F00|//And you will in turn go to save others, making her sacrifice worthwhile.//## I couldn&#39;t see it, but I knew the ruby in the knife&#39;s pommel pulsed in time with my beating heart. The devil in the blade and I were bound by blood, in more ways than one.

//And where does that leave us, if we take it farther? If I were to sacrifice all of the children of my village, to save more of the adults-//

Her answer was curt. ##FF4F00|//Then that would be a just sacrifice.//##

//And what about losing your soul, Pramaada? Does your calculus of war factor that in as well?//

I felt rather than heard the sneer in her thoughts. ##FF4F00|//You think of war like a child.//##

//And you think of it like a tax collector with an abacus. These are people.  Not objects or materiel or money. You can&#39;t spend them so easily.//

The harsh light of the moon flickered and died as we reached the tree-cover, hiding us from its pale glow. Pramaada was slow to respond. ##FF4F00|//When you see as many deaths as I, their individual worth becomes meaningless. Their sacrifices blend together like a river of red mud.//##

//And when I die, will I become one in the mud?//

In an instant, her thoughts turned sweet and warm. My vision blurred and breath quickened as she extended her being into my own to caress my mind in a tender embrace. ##FF4F00|//Of course not. You mean so much to me, Kiran.//##

The rifle slung across my back rattled as I stumbled over a log, my vision snapping back into focus. My tongue felt heavy in my mouth.  //Thank you, Pramaada.//

Pramaada withdrew back to the knife, coiling and curdling. ##FF4F00|//You&#39;ll believe me soon enough, one way or another. I&#39;m helping you as best I can. Teaching you as best I can.//##

I nodded numbly to myself. No one else could hear the conversation play out in my own mind. //Thank you, Pramaada.//

I tried not to think for the rest of the hike down the mountain side, for fear of another one of her lessons.

------

We broke for camp near midnight, a few kilometers away from the mountain, many more away from the camp where the majority of the Japanese presence in the region was bivouaced. There was a short argument between al Fine and Matthews about a fire, but early spring chill brooked no argument. There was plenty of dry timber nearby, even with the crust of snow and ice that seemed to cover everything at this altitude. Matthews left to fetch water from the nearby creek, while Fine went who-knows-where and Alstrand stared at their stone runes.

Santo wordlessly started on the fire in the lee of a large boulder, seemingly summoning the sparks with little effort from his flint. He coddled the embers within a small cone of curled bark stuffed with shrubbery, gently blowing air to nurse and let it grow, gnawing and blackening its meal of dead grass and browned leaves, spitting and squalling like a hungry baby.

He shielded newborn embers from the light wind in the air, continuing to feed it puffs of air as it started eating away at the bark cone. His face softened, developing a far-away look and coloring orange and red from the flame as it grew too big for its cradle. Finally, he laid the cone in a square frame of twigs and tinder, setting it ablaze. We stared into its licking, hungry tongues for a while, feeding it twigs, then branches, then logs until it became a roaring fire.

The smoke bent away from the sky and was drawn off into Santo&#39;s tobacco pipe, inscribed with Latin and secret Gormogon ciphers. Santo took an impossibly deep breath of the smoke, and exhaled cold mountain air.

He startled me when next he spoke. &#34;Do you know the recipe for gunpowder, Kiran?&#34;

&#34;Ah, no.&#34;

&#34;Mm, shame.&#34; He took another puff of the campfire smoke. &#34;Six parts sulfur, six parts saltpeter, one part pipevine. The original recipe, anyways. Sure it was refined over the years, using base chemicals instead of herbs and what-have-you, but still. The original. The Chinese invented it, some thousand years ago, eh.&#34; He gestured vaguely around us, to the island itself.

&#34;Do you know what pipevine is, Kiran?&#34;

&#34;It&#39;s a, ah, medicinal herb, isn&#39;t it?&#34;

&#34;Yes. Greeks, Babylonians, Chinese, they were all using it for some remedy or another. Childbirth, arthritis, the plague. Hell, the reason it was used in the recipe was for an attempted elixir of life. Isn&#39;t that funny?&#34;

&#34;How so?&#34;

Santo exhaled O-rings of flickering blue haze. His face turned sour. &#34;That this miracle cure, this tiny little flower, could be turned from a life-giver to this.&#34; He patted the pistol at his hip, and pointed to my rifle. &#34;And that.&#34;

&#34;More potent as death-dealers than ever as medicine, I thinks,&#34; came Alstrand from the top of the boulder, where they had been casting their runes.

&#34;Just the way the world is, Ingmar.&#34; Santo stared into the flames, his pipe dangling from his lips.

&#34;I would say not.&#34; Alstrand crawled down from their perch to meet us by the fire. Their movement was jerky and erratic, twitchy in the way that insects are. Perhaps avoiding the maybe-sos of the future, the accidents, the falls, the one-in-a-millions and once-in-a-hundred-yearses that happen to the unlucky, their vision helping to divine a path down the rock free from any harm. Or maybe after looking into the pool of eternity, the mind is too scarred to function properly in the real world.

They were not any less unnerving up close, even after the many months in their company. Their body was thin and lanky, unhealthily so from many missed meals. Their wispy hair had prematurely turned white, jarring with their face that was at once so young and so very, very old. And their eyes. One a brilliant blue, and the other a glittering stone. The price to pay to see the future, one must cripple their ability to see the present. But even missing an eye, their gaze was piercing in a way that made one feel as though Alstrand already knew the inscription on their tombstone.

Not many people could stand to be near Alstrand for long.

They squatted next to us, the streaks of gold in their lapis eye catching the firelight. From their bag they withdrew a rune, //þ//, carved into a misshapen piece of chert. &#34;This is //thurs//. Danger, harshness, suffering.&#34; Alstrand placed the rune on a piece of slate. It almost seemed to glow in the night.

They drew a second rune from the bag, //ƿ//. &#34;This is //wynn//. Joy. Relief. Good tidings. Such similar symbols, and yet one small change could mean such different things.&#34;

Alstrand pointed at my //kukri//. &#34;Death.&#34; Their finger wavered and lanced towards me, stabbing me in the chest. &#34;Life.

&#34;The cycle it goes, the Wheel that grinds down us all. The plow turning soil fertile, the sickle tearing crops to the ground. Ever churning, ever turning. Even the end of days will herald the birth of a new age.&#34; Alstrand&#39;s face turned to the sky. &#34;//Ragnarök//. It is near.&#34;

Santo cleared his throat. &#34;The witch is right, my boy. Mostly, anyways. Explosives can be used to level battlefields and bring death, or dig a mine and bring wealth to your people. The same substances used to make nitroglycerin can make fertilizer. It&#39;s a matter of... perspective. Good can come of war.&#34; His face tightened. &#34;In small doses.&#34;

I looked back at Alstrand. &#34;And what good will come of this war, Alstrand?&#34;

Alstrand twitched and grimaced. &#34;Progress.&#34;

It wasn&#39;t Alstrand&#39;s voice, but Matthews, a dark figure looming out of the woods, his feet a whisper on crunching snow. He was stooped with a yoke across his shoulders, carrying large buckets of fresh glacier water. He dropped the buckets to the ground, sloshing water making the fire spit and sizzle. &#34;War means progress, Pal.&#34; The way his American accent twisted my name made me grit my teeth.

&#34;Seems like it just makes a whole lot of death.&#34;

His deep-set eyes were cloaked in shadow, the whites glittering like coins at the bottom of a well. &#34;My people conquered the American Midwest on horses brought to the New World. The Mongols built their empire from the creation of the stirrup. The Civil War was won with steam power, trains used for troop and weapon transport. Gunpowder, flight, diesel engines. Innovations gets us new ways to blow each other up, and war gives us new ways to innovate. Medicine, the wristwatch, stainless steel, those explosives that Santo loves so much, all have their roots in //war//.&#34;

Pramaada purred in the back of my mind. ##FF4F00|//Oh, I// like //him.//##

//Be quiet.//

&#34;The Japanese and the Germans are trying to hit back with magic, because they know we have the technological edge. The American logistics, the British Empire&#39;s resources, Russian stubbornness and Chinese muscle. We have that edge because, putting it nice, we are just //that much// better at war than they are.&#34;

He grinned, yellow teeth set in a dark face. &#34;The Axis is dead, it just doesn&#39;t know it yet. Trying to use witchcraft to fight basic economics and gravity. That&#39;s what our job is, Pal. To remind them of the laws of science and which way is down.&#34;  

I stared into the fire for a long while. The coals flickered and embers twirled, spinning dancers in lurid saffron on a black stage. &#34;And was it all worth it?&#34;

He set his jaw, and squatted across the fire from me. &#34;How do you mean?&#34;

The village. Their faces. Their guts on the floor. &#34;And at the end of it all, all the fighting and all the death, was it worth it? For the progress?&#34;

The flames spat.

&#34;I am a part of the greatest country in the world. The largest democracy. The healthiest, wealthiest, happiest country in the world.&#34;

&#34;I&#39;m sure your murdered ancestors are very proud of you for supporting their conquerors.&#34;

I could see a flicker of pain — just for a brief moment — cross his features. &#34;They handed me over to a boarding school. I never knew them, forgot their language and lost my culture. Whatever connection I had to them is long gone.&#34; His face hardened again. &#34;But you know yours, and you are disappointing them right now.&#34;

&#34;They didn&#39;t believe in violence. They were better than me in that regard.&#34;

&#34;And so they let the Wheel roll over them. Like father, like son.&#34;

I repeated myself. &#34;Was it worth the mountain of corpses to get there?&#34;

His gaze bored into me. &#34;I would be disrespecting those who died to say no.&#34;

&#34;And it would be an insult to them to say yes.&#34;

He bared his teeth, grin changing to a snarl. &#34;Careful, Pal. Those are some fighting words.&#34;

The dragon-bite on my side oozed and burned. They hadn&#39;t been attended to yet. They would need to be. &#34;Before I was conscripted, four men were killed by the monarchy. They were not soldiers, they were not rebels, they just wanted to be free from the king&#39;s grasp, and they were killed for it. What innovation came from their death?&#34;

The coals glowed. &#34;Democracy. Their deaths will light a fire in the hearts of your people, and they will overthrow your fat kings and pompous lords and ladies and build a democracy in the Himalayas.&#34;

&#34;And when the Ranas burn monasteries and beat the monks in the streets, what cause does that serve?&#34;

He set his jaw, eyes gleaming with fire. &#34;Revolution. Enough of this.&#34;  

I pushed forwards heedless of his warning. &#34;And when villages starve of famine and children&#39;s bellies grow round from hunger and the old wither and die like autumn&#39;s leaves, what engine does their pain fuel?&#34;

Matthews jumped to his feet and roared, his voice shaking the snow from bare branches. &#34;Progress, Pal, Progress! Their rage and anger and spite and fury and flaming spitting ##FF4F00|//**WRATH**//## will power the pistons of progress and their blood will grease the wheels and they will wipe the slate clean and rip the king from his throne and build a shining city upon a hill for the rest of Asia to see! They will suffer from the pain and the brutality of the powerful until they vomit from the pain and when they&#39;ve had enough they will rise to kill your masters, kill your kings and your gods and break that goddamned Wheel until there is nothing to oppress them.&#34;

His knuckles were white, his breath heavy, his eyes manic. &#34;And if you refuse to get your hands bloody and help them climb that better path, you might as well just hand that knife to me.&#34;

I stood and drew the //kukri//, the heavy, bent, ivory blade painted lurid dark colors and looked almost dripping with blood already. &#34;Come and take it, cowboy.&#34;

A jackal&#39;s smile. Two. One on him, and one on me. &#34;Maybe I will.&#34;

Alstrand&#39;s reedy voice interrupted us. &#34;There is no breaking the Wheel. It turns and turns, and we are all a part of it, and there is no breaking it.&#34;

Matthews spat. &#34;Watch me.&#34;

Santo forcefully chuckled. &#34;I don&#39;t know about you all, but I am putting a bullet through my leader&#39;s skull the second I step foot on the motherland. It may not break the Wheel, but it will give it a good turning.&#34; His eyes glittered gold. &#34;The //fascista// deserves it.&#34;  

Their interruptions were enough to ease the tension. Not fully, but it was no longer ready to snap. Matthews and I hesitated for a moment, but couldn&#39;t find the will to keep arguing. Matthews turned away from me, and holstered the pistol I didn&#39;t know he had drawn. He cast a glance at me, and I knew the thought he directed at me. //Coward.//

al Fine had snuck into the camp at some point and had finished setting up the tents, not bothering to interrupt our argument. Santo reheated half-eaten rations, made poultices and boiled bandages to wrap across my torso and treat my wounds. Alstrand spent much of the time giving me odd looks, a strange expression darkening their face. Matthews sat apart from us as we ate, refusing to say a word the rest of the night.

Pramaada felt distant, even within the confines of my own mind. I thought I disappointed her somehow.

I didn&#39;t know why that disturbed me so, or filled me with such sadness.

------

It was several hours later, and I was still not able to sleep. The forest made noises outside of my tent, creaking branches and cooing owls. It disturbed me.

I rolled over. In my brain I heard a feminine ##FF4F00|//Tch.//##

I sighed. //What, another lecture from you? That I&#39;m not bloodthirsty enough for your liking?//

Silence. ##FF4F00|//You have a duty to uphold, Kiran.//##

//Duty to king, duty to country, duty to al Fine and Sergeant Chand and others. What duty are you talking about?//

##FF4F00|//The oath you swore to me in the jungle. The duty of vengeance and bloodshed.//##

//Another comrade died today, Pramaada. Can oaths and death be forgotten for just one night? Please?//

There was silence from the knife. Suddenly, Pramaada appeared at my side in a puff of spice and petrichor. Her face was twisted in a show of concern. ##FF4F00|//What&#39;s wrong?//##

One set of muscular arms pillowed her head, and the other set caressed my torso and thighs. I stared through her to the canvas wall and twitched. //Stop.//

Her hands paused and backed away. ##FF4F00|//I&#39;m sorry.//##

//I... I need to rest. Four months of this, and the end nowhere in sight. When can I stop fighting, Pramaada?//

##FF4F00|//I do not know. For some, the war never ends. That is how it has always been.//##

//That&#39;s unfair.//

Pramaada pulled me into her chest in a tight hug. She played with my hair and murmured. ##FF4F00|//It never is. But there is no running, my love. There is nothing to do but face it with your head held high.//##

//What if I can&#39;t?//

##FF4F00|//You must.//## She pulled me away and locked eyes with me. ##FF4F00|//For the both of us.//##

//I&#39;ll fail.//

##FF4F00|//Oh, my sweet, sweet champion. My brave warrior.//## Her eyes softened. ##FF4F00|//Never forget, if you fail, if you desert or flee or falter, I will eat your soul, condemn you to a thousand years of// Kudmala, //and mark you as a sinner for the rest of your lives. And neither of us want that, do we?//##

//No, Pramaada.//

Her fingers tightened around my arm, burning like hellfire. ##FF4F00|//Such a good boy. Now, wake up.//##

&#34;Wake up. Kiran, wake up.&#34; Pramaada&#39;s face was replaced by Alstrand&#39;s, her fingers for theirs, squeezing the blood out of my arm.

&#34;What?&#34;

Their voice was hushed — trying not to wake the others — but still filled with urgency. &#34;Listen to me, Kiran. You must listen to me because you are the only one who can.&#34;

I blinked the sleep out of my eyes. Pramaada stirred in the blade. &#34;Alright, I&#39;m coming.&#34;

As I made motions to stand, Alstrand put a halting hand on my shoulder. &#34;Just you.&#34;

&#34;Just me?&#34;

Alstrand glanced down at the //kukri// and nodded. I slowly, silently unsheathed it and placed it on my bedroll, Pramaada&#39;s protestations fading from ear-shot. Alstrand nodded again. &#34;Good. Follow me.&#34;

They slipped out of the tent and I was soon to follow. The fire had dimmed to a lulling flame on a bed of embers, and the air was harsh and chill. Alstrand didn&#39;t seemed to be bothered, walking barefoot on the snow with only their undergarments as protection from the elements. We went a ways from camp until we came to a widowmaker — a large tree drunkenly leaning on a small copse — waiting for the right time to fall and cripple the unlucky traveller walking underneath.

&#34;What are we out here for, Ingmar?&#34; I tucked my hands into my armpits and tried not to let my teeth chatter.

Alstrand muttered under their breath, playing with their runes. &#34;The Norns, they speak to me. The runes are their teeth and the stone their lips and where they fall mark their words. They talk of weapons. Light. Power and more. The Germans, they want it but do not understand it. The Japanese as well. The Americans want and understand, and it would be a terrible thing...&#34;

&#34;What do you mean?&#34;

Their eyes were alight with a terrible fire as they seized my arm. &#34;A weapon. A weapon to surpass all weapons. It will tear down cities, ignite the world with fear and fire. The AOI talk of the Veil and of its importance, but this weapon will shatter both. The Americans will try to use it. You must not allow it.&#34;

&#34;Ingmar, what is this weapon? Magic?&#34;

Their fingers turned into a vise, their nails digging bloody tracts into my skin. They felt hot, feverish almost, as they continued to to rant. &#34;I do not know its nature, my brothers and sisters in Europe do, but the Americans do not listen to them, cannot listen to them, their minds too filled with magic and science and war for diplomacy to work. Using this weapon...&#34; Ingmar seized, the muscles in their neck bulging and pulsing. &#34;They would bring about the end of days, and a new era of a dead world.&#34;

They collapsed to the ground, the snow steaming where they laid. I knelt down and felt for their heartbeat, thready but there. My mind was racing, but before I could decide whether to go back to go back to the camp and get help, Ingmar gasped and sat up.

&#34;Are you alright, Ingmar?&#34;

Ingmar ran their fingers over their face, tapping at their lapis eye. &#34;I am... alive. Dreams of- no, //visions// of deadly rain and scorched earth and screaming shadows on the walls and...&#34; they shook their head. &#34;Things too terrible to tell.&#34;

&#34;Do you want me to get help? Santo has-&#34;

&#34;//No//.&#34; Ingmar held my hand with a death grip. &#34;I am fine. You must not tell a soul of what you heard,&#34; they saw my hesitant look. &#34;Not even the blade.&#34;

Ingmar opened their bag of runes and selected one — //ᛦ// — to place in my palm. &#34;//Yr//. The Yew that Wodin hung himself upon for knowledge. Take this and hold it, and no one will know what you know.&#34;

I held the stone. It was unseasonably warm. I tucked it into my breast pocket, over my heart. &#34;Okay.&#34;

&#34;Thank you, Kiran.&#34; Ingmar stood with effort, and began to limp back to camp.

&#34;Wait, please. Allow me.&#34; I picked up Ingmar and cradled them, their body weighing almost nearly nothing. They tried to complain, but the way they shakily made a fist, they weren&#39;t up for the task. My wounds protested more, though a combination of the numbing winter air and the warmth of the rune-stone calmed them somewhat.

As I walked back to camp carrying Ingmar, I glanced down to the seer. &#34;Why me? Why not tell Santo or al Fine?&#34;

Ingmar pursed their lips before speaking. &#34;al Fine is pragmatic, utilitarian. If it meant we win she would walk backwards into hell for us. Santo is her opposite. He is too entrenched in his beliefs, too backwards in his thinking. He is liable to agree with the Americans, I think. And Matthews...&#34; Ingmar weakly chuckled. &#34;We know why not him.

&#34;But you...&#34; They paused. &#34;Only fools give power to those who want it.&#34;

&#34;Is this because of me and Matthews?&#34;

They studied me with that incrutable gaze. &#34;Partly. Partly your youth, tempered by experience, quenched in fear. You have tasted power, and hate it. You drank deep from the fountain of blood and spat it up. No grand schemes, no loyalty to a higher power. Safe.&#34;

I cast my mind to the //kukri// nestled on my bedroll. &#34;Not entirely safe.&#34;

&#34;She only can act on so much, Kiran. Do not let her words fool you. She may be a god, but just a small one. There are more earthly powers to fear in this world than that of spirits and demons.&#34;

&#34;Hm.&#34;

My feet crunched on rotten snow. &#34;I don&#39;t know why you are here.&#34;

Their lips quirked. &#34;Ah?&#34;

&#34;Well, Matthews is a patriot. Santo as well, though not quite in the same way. He wishes to free his country by fighting on our side. I imagine Rebekah and al Fine were similar, going to war over their shared sense of duty to their secret societies. But you?&#34;

&#34;Ah.&#34; Their good eye turned skyward. &#34;The future is a darkling thing, my dearest. If I were just to gaze into the wyrd and watch the world die without action, what would I be? Collaborator? Traitor? Willful pawn and sycophant? No, I see myself acting, and so I must act. There is nothing else I can do.&#34; They looked back at me. &#34;Am I sensical?&#34;

I smiled. &#34;Yes, that makes sense. Thank you.&#34;

I trudged on, and we neared camp. It was quiet for a while before Ingmar spoke again. &#34;I was going to wait until morning, but I will tell you now. We head to Borneo next, and it is where I will die. Please take this month to mourn me, and no more after.&#34;

They smiled a beautiful, terrible smile. &#34;We have a war to win, after all.&#34;
