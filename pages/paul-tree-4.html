+ Whales - Sea Kings

The air grew cooler as Ken and Paul left the stables and went to the marine life wing.

The smells of hay and soil faded, replaced by the scent of saltwater and metal.

The sounds changed, too. Like in the containment chamber, the mechanical hum was familiar, but faint splashes echoed beyond the walls.

As they walked, Paul spoke with quiet curiosity.  
“It’s as if the whole place is breathing.”

“You’ll see why soon,” Ken replied.

The first room they entered was lined with illuminated aquariums.

Blue, orange, silver, and white fish glided synchronously, scattering the aquarium light across the walls.

It looked like glowing clouds dancing to a silent rhythm.

Paul pressed his face close to the glass, narrowing his eyes.  
“I know these.”

“You do?” Ken asked.

Paul nodded.  
“Of course. Gills, eyes, quiet movements… the colours and fin shapes are slightly different, but still the same.”

Ken’s eyebrows rose.  
“You mean your world’s fish look like these?”

“Not just similar: identical,” Paul said. “Smaller, slower maybe, but the sea hasn’t forgotten how to make life.”

Ken watched Paul crouch and move his wings like the schooling fish.

“A wordless dance,” Paul murmured. “That’s perfection: when movement itself becomes thought.”

He smiled faintly as he stood.  
“It’s comforting. It feels like a piece of my world has made its way here. Seems the water remembers.”

-----

They walked deeper into the marine wing.

The lights dimmed, and at the far end stood a massive dome-shaped structure.

The air felt heavier, colder - perhaps from the immense volume of water nearby.

As the lights brightened, a vast shadow moved across the glass. Its motion was slow, impossibly graceful.

Paul froze. His feathers bristled, pupils narrowing.

“What in the world is that?”

Ken followed his gaze.  
“A whale. Specifically, a humpback.”

Paul stepped closer, eyes widening.

Beyond the glass, the whale swam through beams of light, its tail sweeping in slow, deliberate strokes that sent clouds of bubbles spiralling upward.

“That’s not a fish,” Paul whispered. “That’s… impossible.”

“It’s a mammal,” Ken explained. “Breaths air with lungs, gives birth to live young, nurses them. Descended from land-dwellers that returned to the sea millions of years ago.”

Paul turned to Ken, incredulous.  
“You’re saying they left the land, on purpose?”

“That’s right,” Ken nodded.

Paul looked back at the whale.  
“And became that?”

The whale turned, rising toward the surface.

Its massive eye met Paul’s.

Darkness. Stillness. Vast intelligence beyond comprehension.

Paul felt his throat tighten.

He cleared his voice.  
“In our world… the ocean evolved differently. We have creatures called ‘Sea Kings.’ Massive, yes, but descended from mosasaurs. Scales, blade-like teeth. They sing inaudible songs, and the water turns red when they rise from the depths. Even dragons fear them.”

He pressed one wing against the glass.  
“This one’s different. Not hollow inside, but full here.” He tapped his head.

-----

Ken quietly pressed a switch.

A deep, resonant song came from hidden speakers: the whale’s call.

It filled the room like the heartbeat of the Earth itself.

Paul’s eyes widened.  
“They sing too.”

“Right,” Ken said. “We don’t know why. We think it’s how they communicate.”

Paul stood still, listening.

“Beautiful. Sea Kings sing to erase existence, but whales sing to affirm it. I never imagined the ocean could be this gentle.”

Two whales swam in spirals, their movements intertwined.  
Light reflected off their bodies like waves across a giant agate.

“In our world, when sky-creatures fall into water, they die,” Paul murmured. “But these-” he gestured to the tank, “fill the sea with quiet voices.”

He stayed there a long time.

A calf played beside its mother, rolling and nudging her.

Paul spoke softly.  
“Your world’s ocean knows mercy.”

-----

As they left the facility, Paul looked back once, his expression distant.

“I think our oceans dream different dreams.”

“You might be right,” Ken said.

Paul walked ahead, feathers trembling faintly.

It was their species’ gesture of reverence.

-----

&gt; **Researcher Ken Lee - Observation Log**
&gt;  
&gt; Fish in Paul’s world appear anatomically and ecologically identical to baseline Earth species.  
&gt; Minor differences exist in colouration and movement, but biological roles are similar overall.  
&gt;  
&gt; However, the whale’s intelligence and gentleness have deeply affected him.  
&gt; Based on his account, Paul’s world likely replaced whales with aggressive mosasaur descendants occupying similar ecological roles.  
&gt;  
&gt; Further study recommended.
