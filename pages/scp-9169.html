**Item #:** SCP-9169

**Object Class:** Safe

**Special Containment Procedures:** A provisional site has been established in the area surrounding SCP-9169, operating under the guise of a water treatment facility. An electric fence has been erected, as well as a dam separating the passage into SCP-9169 from any civilian waterways.

Entrance into SCP-9169 is strictly forbidden, unless approved by a member of personnel with Level-4 clearance or higher. Item retrievals are to be conducted solely through use of remote-controlled drones. Individuals that exit their vessels during expeditions into SCP-9169 are considered lost, and are to be terminated on sight.

**Description:** SCP-9169 is a spatial anomaly, located within a cave system in the Epirus region of northwestern Greece. SCP-9169 is solely accessible via a thin stretch of water, branching off the nearby Acheron river and flowing into the cave entrance. All attempts to dig into SCP-9169 from other angles have uncovered only solid rock where the space should be.

SCP-9169 is non-euclidian in nature; the cave system extends far beyond what the surrounding geography would allow. No evidence of an end has been discovered, leading some researchers to hypothesise SCP-9169 may extend indefinitely.

Individuals that have spent a prolonged period of time inside SCP-9169 often report visual and auditory hallucinations, as well as a general increase in paranoia. It is currently unknown whether this is because of a latent memetic effect, or simply the result of spending an extended period of time on a cramped vessel in minimal lighting. These hallucinations most commonly take the form of deceased individuals the subject once had a close relationship with, calling out to them from nearby ledges. The subject will often feel compelled to approach these hallucinations, attempting to exit their vessel and swim across.

A number of artefacts have been sighted/recovered from within SCP-9169, these have included:

* Scraps of wood and metal.[[footnote]] Potentially remnants from past shipwrecks. [[/footnote]]
* Asphodel flowers.
* Weapons, suits of armour, and ceremonial items matching those of a number of ancient civilisations.
* Stone doors carved into the cave walls.
* Enigmatic phrases in a number of languages carved into the cave walls.
* Human and animal remains in a range of sizes.[[footnote]] The largest to date was what appeared to be a human skull, estimated to have a circumference of roughly 15ft. [[/footnote]]

Some exploration teams have reported hearing animalistic sounds, such as growling or the call of birds, echoing from deeper within the cave. To date, no living creatures have been sighted within SCP-9169.

**Addendum 9169.1:** Discovery

References to caves matching SCP-9169&#39;s description can be found in historical records dating back thousands of years. The earliest confirmed mention of SCP-9169 is in a partially-recovered passage from Days of Smoke and Dreams, a lost Mekhanite text believed to have originally been penned circa 1290 BCE. A transcript of this passage can be read below:

&gt; [...] great Arch-general Alxan-Durr did set his boot upon the emerald grass and [...]
&gt; 
&gt; [...] exterminate the wretched followers of the devourer [...]
&gt; 
&gt; [...] native peoples had warned of a [void/pit] where men went to [...]
&gt; 
&gt; [...] echoed screams of [rage/anguish] from deep within [...]
&gt; 
&gt; [...] swallowed fleets [...]
&gt; 
&gt; [...] however it looked, it was not a man  [...]

Foundation operatives first became aware of SCP-9169 on 1/9/1932, following a string of disappearances in the local area. A pattern was soon identified, with all missing persons being last seen within 500m of either SCP-9169 or the nearby waterway. 

Three members of MTF Zeta-9 (&#34;Mole Rats&#34;) were sent in to explore the cave, however all contact was quickly lost. After approximately six hours, a single agent emerged, visibly injured. In debriefing, Agent Hasturman claimed that after approximately three hours, his cohorts reported seeing visions of fallen comrades on a nearby protrusion. After a prolonged struggle of the agent attempting to keep the two in the boat, they both dove into the water; neither resurfaced.

**Addendum 9169.2:**

On 4/2/1955, during a routine expedition into SCP-9169, Dr. Ridley Morgan began to report seeing visions of his recently deceased son. This was flagged as potentially traumatic and plans were made to take Dr. Morgan off the project. However, that evening Dr Morgan conducted an unapproved solo mission into SCP-9169. An extraction team was dispatched shortly after, and the stolen vessel was discovered abandoned approximately 4km into SCP-9169. However, the team found no traces of the doctor.

On 5/2/1955, at 2:15 AM, site personnel were alerted of a potential trespasser near the mouth of the cave. A single guard was sent to investigate; a transcript of their radio logs can be read below.

&gt; **[Begin Log]**
&gt; 
&gt; Walking up now. Checked the fence before, didn&#39;t see any signs of a break-in. The foliage in this area seems pretty undisturbed too. You&#39;re absolutely positive the sensors went off? I know things have been on high alert since yesterday. I ... oh, no, wait. I see him, sort of tucked away between the trees.
&gt; 
&gt; It&#39;s Morgan. God, he looks rough. He&#39;s soaking wet, and ... twitchy. He&#39;s just standing there, staring out at the water, but his hands keep fidgeting. Definitely seems like some kind of psychotic break.
&gt; 
&gt; I&#39;m approaching now.
&gt; 
&gt; (Off-side) Excuse me, Doctor Morgan? My name&#39;s Sam, I&#39;m one of the guards for this area. They&#39;re worried that the cave might be doing something to you, getting in your head. They want me to take you back to the site. (Into Radio) He&#39;s not responsive, I might have to ...
&gt; 
&gt; Hold on, he&#39;s turning around. There&#39;s something not right about him. His face, it&#39;s completely blank, no expression at all. And his eyes, they&#39;re ...
&gt; 
&gt; Wait, but those ... aren&#39;t ... oh god. No! WAI-
&gt; 
&gt; **[End Log]**

A group of guards were dispatched to the area immediately after losing contact. Samuel Evans&#39; body was found completely dismembered, with several limbs missing and the torso impaled on a nearby tree branch. No signs of a second entity could be found.
