**Numerical Identification:** -23

**Object Class:** Safe

**Description:** SCP-8645-23 is a vintage National Biscuit Company cookie tin container, production dated 1918. The condition of SCP-8645-23 is naturally worn with various scuff marks and chipped portions of the tin visible. Nothing of the item visibly suggests the potential for anomalous activity.

SCP-8645-23&#39;s anomalous properties activate when any inedible objects that fit inside are placed within it. These items will henceforth resemble freshly baked cookies to any observer, even after removal from the container. Consumption of these &#34;cookies&#34; leads to the expected outcome of attempting to eat inedible objects, although subjects report a peculiar dual sensation, describing the experience of simultaneously consuming a cookie and consuming an inedible object. 

Subjects invariably compare the taste of the &#34;cookies&#34; to their grandmothers&#39; cooking, regardless of whether or not a subject&#39;s grandmother has ever baked cookies in their lifetime.
------

&gt; **Note:** //23// of //62// recorded items.
