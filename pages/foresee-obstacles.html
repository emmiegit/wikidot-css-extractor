------

Dr. Lunar Ludarium turns her computer off and packs up her stationary as the clock ticks silently in the distance. Suddenly, her exit is blocked by Dr. Kazuki Minerva. 

&#34;Where you headed?&#34; He asks, like he has any right to know.

&#34;None of your business,&#34; Lunar responds, not even glancing in his direction as she moves things around in her purse.

&#34;Its 8:30PM Loo. You don&#39;t usually stay this late unless you&#39;ve got something on your mind.&#34; He awkwardly places a hand on her shoulder, much to her dismay.

&#34;Since when did you psychoanalyse people?&#34; Lunar glances at Kazuki.

&#34;When you don&#39;t talk to anyone, you&#39;ve got a lot of time to think. So...&#34; Kazuki removes his hand and leans against the wall of the cubicle. &#34;What&#39;s wrong?&#34;

Lunar stares at the man. The utter audacity he must have to think she could tell him anything. His expression is unreadable, neither one of pity or of concern but something in the muddled grey. Lunar stands and walks through the now open exit of the cubicle.

&#34;I don&#39;t have to tell you anything.&#34; She mutters as she does.

&#34;But it would help, wouldn&#39;t it?&#34; He retorts. Lunar turns and glares at Kazuki, who now leans against the cubicle&#39;s outer wall.

&#34;You wouldn&#39;t understand.&#34;

&#34;Then you could talk to someone who does.&#34; 

&#34;Bye.&#34; Lunar turns and leaves, her pace hastened with annoyance. Kazuki lingers in the empty halls of Site-3 for another half hour. He wonders if he went about talking to her the wrong way.

------

[[=]]
//Someday we will foresee obstacles//
//Through the blizzard, through the blizzard//
//Today we will sell our uniform//
//And live together, live together//
[[/=]]

------

Lunar steps out into the open night, the freezing, whispering winds flowing through the streets with ease. She takes a deep breath and turns right. It isn&#39;t long before the solid stone transitions into uneven dirt as the breeze is silenced by foliage. 

&#34;Screw him.&#34; She mutters on instinct. Her expression shifts to confusion for a second, contemplating if Kazuki&#39;s questions affected her. It returns to forced indifference, mentally denying the thoughts.

Lunar turns the corner and strides through the shallow river, passing from one forest to another. She walks a familiar unmarked trail, one which reeks of wayward souls of lingering unprocessed emotions. A bug chirps as it is crushed by her boot. A twig falls in her path and is snapped in two. 

Her footsteps echo now, the winds incapable of sound.

She places her hand on the greyed oak, running it along the recognisable markings. She stares at the path ahead, one which gets drastically steeper with each step, one where the wind flows freely. She takes a deep breath.

Lunar climbs the small cliff.

------

[[=]]
//We played hide and seek in waterfalls//
//We were younger, we were younger//
//We playеd hide and seek in waterfalls//
//We wеre younger, we were younger//
//We played hide and seek in waterfalls//
//We were younger, we were younger//
//We played hide and seek in waterfalls//
//We were younger, we were younger//
[[/=]]

------

The yard of identical sedimentary shapes stretches out across the clearing, long since abandoned for the flashy beachside view. A crow lands on a tree branch five metres away from Lunar, who stands in front of the newest looking stone in the yard. 

The words etched onto it are familiar to her, all too so. She sighs, opens her purse, removes a small candle and places it in front the rectangular rock. With a concealed lighter, she ignites a small flame, which illuminates the the recognisable words.

&gt; = Mandrigoria Golden
&gt; = 1982-2000
&gt; = May She Rest In Piece

She breathes in deeply as the memories flicker into view.

&#34;Hey dude.&#34; She manages to push through. &#34;A lot of... crazy shit has happened... recently. But hey, I see you&#39;re doing well.&#34;

The grave cannot respond.

&#34;Ha. You&#39;ve still got it.&#34; Lunar sighs &#34;Greatest comedian ever.&#34;

The grave cannot respond.

&#34;Anyways, happy birthday man! How old are you now, 30?&#34;

The grave cannot respond.

&#34;That&#39;s crazy. It feels like just yesterday when we were kids.&#34;

The crow chirps.

&#34;We used to do some much together... and then we... drifted apart...&#34;

The grave cannot respond. The flame starts to flicker out.

&#34;It... you meant so much to me. If only you... if only the world hadn&#39;t taken you from me.&#34;

Lunar lets one tear fall. The flame flickers more intensely.

&#34;I know I never said it when you were here but...&#34;

The flame flickers out. The grave cannot respond.

&#34;I love you.&#34;

Lunar can only stare at the rock in front of her. Below it lay no body, for it had been incinerated long ago. She didn&#39;t want it to, but how could she have a choice? She was just a friend at the time. That&#39;s all they ever were. Lunar stands and leaves the graveyard.

There is nothing left to say.

She will return.

Again...

[[size 90%]]And again...[[/size]]

[[size 70%]]And again...[[/size]]

[[size 50%]]And again...[[/size]]

[[size 30%]]And again...[[/size]]

[[size 10%]]Forever.[[/size]]
