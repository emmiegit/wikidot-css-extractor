**DeCIRO Catalogue Number:** SC-19/102-20/120

**Document Type:** Step Compilation

**Dates Received:** 17-04-2019 through 08-02-2020

**Operation Status:** Closed

**Foreword:**  The Universal Blacksmith is a hexagonal basalt cave of 400 m diameter located approx. 500 m beneath the surface of a mountain range. The structure appears to be of natural origin at first glance, but noteworthy, all basalt columns within are perfectly hexagonal and of identical size, forming a solid, completely level floor with the exception of a few outlier columns. The chamber can only be reached through a tunnel from the second basement of Production Facility Three that leads to the cave&#39;s south-western wall. The Universal Blacksmith was discovered by the Chaos Insurgency last month.

As it turned out, the cave&#39;s ceiling is a portal to a potentially extradimensional void; to date, no attempts were made to penetrate through the portal, as per the Item&#39;s request. Light shone through the portal is dispersed by a thin haze, yet sufficient intensity reveals a massive silhouette writhing far above. During operation, faint sparks can be seen inside the void; they are distanced to far away for accurate parallax measurements.

The inside of the Universal Blacksmith is filled with scaffolding, workbenches, anvils, gantries, casting moulds, platforms, crucibles and other installations used in metalworking. Each object is attached to one or more hyaline twisted strands of an unidentified, non-organic substance that are suspended from somewhere in the void above.

Hereafter we of Delta Command document the Steps of the Plan as transcribed by the Engineer of the Chaos Insurgency.

**1. STEP 19/102**

Assign Dr. Arus to observe and study the Universal Blacksmith.

**2. STEP 19/103**

Prepare a safe space for observing the object,  attempt to establish verbal contact.

**3. STEP 19/105**

Receive Dr. Arus Findings Report on his observations of the Universal Blacksmith.

&gt; **DeCIRO Catalogue Number:** FR-STEP-001
&gt;
&gt; **Document Type:** Summary Report
&gt;
&gt; **Date Received:** 17-04-2019
&gt;
&gt; **Author:** Dr. Arus
&gt;
&gt; **Summary Report:** During the observation, it was established that the object perceives 
&gt; spoken language exclusively in Latin. It was also revealed that the object is incapable of independent articulation. Instead of verbal communication, it lowers a long hexagonal prism and causes it to oscillate, resembling the movement of a pendulum. Each time the weight passes the equilibrium position, a Roman letter or alchemical symbol flashes on the surface of the prism, forming sequences that can be interpreted as words.

**4. STEP 19/108**

Conduct a structured interview with the Universal Blacksmith to obtain answers to a pre-prepared list of questions concerning his identity, origins, nature of existence, motivations, and conditions of confinement. Use Latin as the primary language of communication, recording both the subject&#39;s direct answers and any subsequent explanations. All observations must be documented for subsequent submission to the Delta Committee.

**5. STEP 19/109**

Obtain a transcript of the structured interview with Universal Blacksmith conducted by Dr. Arus. Please note that the early examples were originally written in Latin and then translated into English.

&gt; **Question:** Who are you?  
&gt; **Answer:** They call me Blacksmith, not because I am the Armourer, but because I forge arms.
&gt;
&gt; **Question:** How old are you?  
&gt; **Answer:** Pieces may break and get replaced, but the whole stays the same. No edge cuts twice, but the grind keeps it sharp.
&gt; 
&gt; **Question:** Can you manufacture equipment for us?
&gt; **Answer:** Of course. It is my nature to practice my craft. I do not care whether you save or take lives. I take honour in the appreciation of my craftsmanship. Only if my work sees use, I am proud.
&gt; 
&gt; **Question:** Could you create other things out of the materials we offer you? A modern battlefield sees few uses for horse armour.  
&gt; **Answer:** Only in a twisted world the laymen dictate the master how to exercise his art.
&gt; 
&gt; **Question:** Could you tell us in advance in what our offerings will result?  
&gt; **Answer:** The strike of inspiration comes as sudden as it is decisive.
&gt; 
&gt; **Question:** Why don&#39;t you tell us of the properties of your creations?  
&gt; **Answer:** The blacksmith only knows to forge weapons, the warrior only knows to use them.
&gt;
&gt; **Question:** Are there more of your kind?  
&gt; **Answer:** Is a chain just the collection of its links? Speak of men or speak of mankind, one is nothing without relation to the other. 
&gt; 
&gt; **Follow-Up:** Does this mean you are a plural or collective entity?  
&gt; **Answer:** A master is the one, not many, who supersedes all but himself.
&gt; 
&gt; **Question:** Why do you work this deep underground?  
&gt; **Answer:** Fish breathe 🜄, so they dwell sea-borne, men breathe 🜁, so they dwell the surface, dragons breathe 🜂, so they dwell the stars and I breathe 🜃, so I dwell beneath.
&gt; 
&gt; **Question:** What lies beyond the portal above?  
&gt; **Answer:** It is a cage, but it is gilded.  
&gt;
&gt; **Follow-Up:** Does this mean you are captive?  
&gt; **Answer:** I have not chosen this place, but it has chosen me.
&gt; 
&gt; **Question:** Why do you communicate through this peculiar mechanism?  
&gt; **Answer:** Read without seeing. Only if words are fleeting, the ephemeral truth can settle. Lasting is treacherous, lasting blemishes, lasting corrupts. Do not trust what the mind perceives before the dream.

**5. STEP 19/111**

Instruct Dr. Arus to conduct an extensive study of the Universal Smithy in order to assess its potential as a strategic and technological component of the Chaos insurgency. The study should include an analysis of the object&#39;s physical properties, with a particular focus on identifying and documenting the basic principles of its operation.

**6. STEP 19/112**

Analyze Dr. Arus findings report on the functioning and capabilities of the Universal Forge. The analysis should focus on the basic principles of the Universal Blacksmith&#39;s work.

&gt; **DeCIRO Catalogue Number:** FR-STEP-002
&gt;
&gt; **Document Type:** Summary Report
&gt;
&gt; **Date Received:** 23-06-2019
&gt;
&gt; **Author:** Dr. Arus
&gt;
&gt; **Summary Report:** During active phases, the Universal Blacksmith (hereinafter referred to as the object) demonstrates the ability to autonomously move production elements inside the chamber. The object freely redistributes the structures used, lowering additional elements through the portal or removing unused ones and lifting them back up as necessary. It has also been observed controlling approximately humanoid structures resembling mannequins by means of intertwined threads, which allows the object to manipulate tools and other objects in a manner similar to puppeteering. When provided with a sufficient amount of raw materials, the object melts them into anomalous alloys, which are then used to create anomalous objects, primarily weapons. The acceptable range of raw materials is extremely wide and includes organic materials, ores, and most other substances, provided they are in a solid state. It has been noted that the yield of the alloy by mass is significantly lower than the volume of raw materials provided. The resulting alloys are used either to manufacture products consisting entirely of this material or to modify and improve the equipment provided, giving it anomalous effects or superior physical characteristics. In the process of working with raw materials, the object periodically requests additional materials, makes recommendations, or comments on the quality of individual samples. These comments have proven to be of high practical value in identifying new combinations of transmutations and evaluating the properties of the weapons being created. All intermediate alloys are given individual names assigned by the object itself.

**7. STEP 19/114**

Appoint Dr. Arus to be responsible for studying the practical application of the Universal Blacksmith. Conduct a detailed analysis of the anomalous alloys produced by the forge, including their physical, anomalous, and operational properties. Conduct a long-term study of the object, followed by the development and creation of the first weapon prototypes.

**8. STEP 19/116**

Conduct analytical processing and evaluation of the documentation presented by Dr. Arus, including “Excerpts from the Transmutation Records” and “Extended Transmutation Log,” in order to identify patterns in transmutation processes, classify anomalous alloys, assess their combat, tactical, and strategic potential, and determine the risks and limitations of their practical application.

+ **Excerpts from the Transmutation Records**

[[tabview]]
[[tab Obsisto-Anancitium]]
++ **Obsisto-Anancitium**
**Raw Material:**
|| 18 t of industry standard duplex stainless steel || 28 Ingots (4,5 kg apiece) ||
|| 20 t of 99,95% pure titanium || 40 Ingots (4,5 kg apiece) ||
|| 15 t of natural iridosmine alloy || 1 Bloom of 50 Ingots (4,5 kg apiece) ||

**Properties:**  
Dark grey matt alloy with a density of 4,012 g/cm³ (at room temperature), a hardness of 9800HV, a tensile strength of 142 GPa and a Young Modulus of approximately 2 TPa. The material has a very low thermal conductivity and is an electric insulator.

**Combinations:**
* **None:**  
The ingots were forged into a multitude of different objects, mostly serving as shields or armour plates, depending on the quantity available to the Universal Blacksmith. This includes cuirasses, helmets, whole mediaeval suits of plate armour, gun shields, ballistic shields, mobile personnel shields, kite shields, heater shields, mobile cover and barricades.
* **Combat Vehicles:**  
The vehicles were outfitted with complete sets of appliqué armour and slat armour. This includes, amongst others, Leopard 2 battle tanks, M113 armoured personnel carriers and in one notable case, a BMW R1200RT motorcycle.
* **Bladed Weapons:**  
Knifes and other sharp weapons had their blades reinforced with the alloy, leading to overall increased physical resistance and reduced wear, but also faster blunting of the edges.
[[/tab]]
[[tab Sanguis-Cruorium]]
++ **Sanguis-Cruorium**
**Raw Material:**
|| 15 t of wrought iron, 2000 l blood (frozen) || 10 Ingots (3 kg apiece) ||
|| 9 t of wrought iron, 35 t of meat || 6 Ingots (3 kg apiece) ||

**Properties:**  
Lackluster crimson alloy that feels warm to the touch. If a living creature is harmed or killed with a weapon made of this material, the wielder will undergo spontaneous and rapid surge of cell regeneration, leading to fast wound healing, detoxication, enhanced stamina and restored strength.

**Combinations:**
* **None:**  
An assortment of scimitars and pole-arms was forged out of pure Sanguis-Cruorium. Weapons are reported to occasionally bend or stretch during strikes in order to hit vital parts of the target.
* **Automatic Firearms:**  
The weapons (AK-15 assault rifles with holographic sights and FN P90 submachine guns) were imbued with veins of Sanguis-Cruorium and outfitted with an additional fixed bayonet (of 19 cm and 15 cm length respectively) of the pure material. The weapons can fire even with empty magazines, though every bullet fired puts a massive strain on the shooter&#39;s health; even a short burst can seriously cripple an operative.
[[/tab]]
[[tab Diffregi-Perdunticulium]]
++ **Diffregi-Perdunticulium**
**Raw Material:**
|| 9 t obsidian shards || 12 boule (40 g apiece) ||
|| 26 t lead glass || 10 boule (40 g apiece) ||
|| 2 t crystalline zirconium dioxide || 2 boule (40 g apiece) ||
|| 140 kg synthetic diamond || 1 boule (40 g apiece) ||

**Properties:**  
Pellucid, dim-grey metal behaving in most aspects like a white metal alloy, including mild toxicity when consumed.

**Combinations:**
* **None:**  
Without additional input all the Diffregi-Perdunticulium alloy at hand was crafted into intricate jewellery, mostly bracelets, rings, brooches, medals, and headdresses. If any of these objects is damaged even just superficially when worn by a human, it will shatter in a way that inevitably inflicts lethal wounds on the wearer.
* **Reflex Sights:**  
The reflective lens element of the sighting instrument was replaced with a carefully crafted mirror made of Diffregi-Perdunticulium. A second plano-convex lens was provided for each reflector sight, which can be inserted to create newton&#39;s rings as alternative reticle should standard LEDs or tritium illumination be at odds with an operation.  
Firing at an enemy targeted with one of these sights will have all projectiles teleport directly to the targeted area, resulting in a guaranteed hit from point-blank range.
[[/tab]]
[[tab Aresco-Marcuium]]
++ **Aresco-Marcuium**
**Raw Material:**
|| 80 t withered plant matter; 3400 kg arsenic || 4 Ingots (200 g apiece) ||
|| 1200 kg cremains, 40 kg Thallium || 2 Ingots (200 g apiece) ||
|| 16 t asbestos || 3 Ingots (200 g apiece) ||
 
**Properties:**  
Unburnished taupe alloy with a density slightly above that of gold. If the alloy comes into contact with a multicellular organism, it will spontanously decay into fine rust whilst the organism undergoes rapid ageing until death.

**Combinations:**
* **None:**  
All ingots were cast into 5.56×45mm NATO bullets.
* **Signal flares:**  
The ingots were ground to a fine powder and mixed into the pyrotechnic composition of the fusees. Objects exposed to the light of these flares will decay at an increased rate proportional the the lights brightness.  
Usage in white phosphorus munitions considered.
* **Scythes:**  
The scythe&#39;s chine was imbued with Aresco-Marcuium, the snaith reinforced with more of the alloy and the entire tool was embellished with surreal decorative ornaments. The blade is able to cut through any organic material without resistance, decomposing the material in the path of the cut.  
The Universal Blacksmith refused to treat Kamas this way.
[[/tab]]
[[tab Perpes-Chronicium]]
++ **Perpes-Chronicium**
**Raw Material:**
|| 105 t of non-fiction books || Less than 1 g ||

**Properties:**  
Superficially identical to brass.

**Combinations:**
* **None:**  
During the initial run, the small amount of material produced was immediately fold into a broad nib for use in a pencil. After extensive testing, it was determined that documents written by hand with this nib were immune to retrocausal alteration and the effect of reality-shift scenarios. The only existing pencil is currently in use at the archival section of Vault-SCORPIO.

**Additional Notes:**  
During the melting processes, the Universal Blacksmith exclaimed &#34;[Unintelligible] trinket of spite? Very well. If one must err to rely on the deceit of phrases, one still must retain one&#39;s honour.&#34;  
Any following attempts to bring books or other greater amounts of written text into the chamber were forcefully removed by the marionettes.
[[/tab]]
[[tab Attraxi-Falaricaium]]
++ **Attraxi-Falaricaium**
**Raw Material:**
||&lt; 7,4 t Vicalloy, 800 kg graphene, 260 kg lodestone ||&lt; 9 ingots (mass N/A) ||
 
**Properties:**  
Heavy but brittle alloy that absorbs &gt; 99.997% of light at optical wavelengths, but is incandescent under ultraviolet light. The material&#39;s mass and weight show a great disparity; whereas its inertial mass puts the mass of a single ingot to approximately 0,5 kg, the passive gravitational mass (and thus the weight force experienced by it) equals to 16 kg.
 
**Combinations:**
* **Combustion Grenade:**  
The internal explosive charge was completely replaced with an unknown mechanism surrounding a scalenohedral chunk of the Attraxi-Falaricaium. When detonated, the grenade created a distorted vortex for approximately 45 s that attracted bullets, shrapnel, flechettes and other ballistic projectiles. This caused most of them to undergo violent trajectory alterations, often being forced on paths akin to an orbit around a gravity well until the effect ceased.
* **Fragmentation Grenade:**  
Similar alterations as with a combustion grenade with the addition, that the vortex was surrounded by multiple concentric rings of shrapnel orbiting it at high velocity.
* **Demolition Charges:**  
Land mines had their explosive components removed and the trigger mechanism modified. When triggered, an area equal to the former blast radius will experience zero gravity for 4 seconds before a sudden surge of approximately 80 g crushes everything inside.
[[/tab]]
[[/tabview]]

+ **Extended Transmutation Log**

[[tabview]]
[[tab Placata-Tuorium]]
++ **Placata-Tuorium**
**Raw Material:**
|| 200 t of ice, 3,4 kg cadmium || 1 ingot (4,2 kg apiece) ||
|| 120 t of acrylic glass, 3,4 kg cadmium || 1 ingot (4,2 kg apiece) ||

**Properties:**
Comparable to pure iron in all physical properties, but of periwinkle colour. Develops a patina after extended exposure to humidity which shimmers like an oil film on water.

**Combinations:**
* **Handheld weapons:**
Weapons of any kind were covered in a thin coating of Placata-Tuorium. Weapons enhanced this way can not be noticed by anyone unaware of its existence whilst holstered. This effect ceases once the weapon is drawn, subsequently becoming permanently perceivable for all observers.
* **Business Attire:**
All buttons, zippers, cufflinks and metalware on the shoes were replaced with pure Placata-Tuorium. Operatives wearing the complete attire are unable to be consciously acknowledged (but not noticed) by sentient beings they do not perceive themselves.
[[/tab]]
[[tab Accudo-Dolositatium]]
++ **Accudo-Dolositatium**
**Raw Material:**
|| 1500 kg of rock candy, 3200 kg of shakudō	|| 520 coins (4 g apiece) ||
|| 2000 kg of rock candy, 400 kg electrum	|| 700 coins (4 g apiece) ||

**Properties:**
Malleable, glossy-golden material of high thermal conductivity. Reported to be dazzling even without sufficient light sources.

**Combinations:**
* **None:**
The material is directly minted into coins of 14 mm diameter. These coins are considered to be extremely valuable by all persons without counter-memetic training and will invoke strong avaricious behaviour. They are eagerly accepted as payment by most people. Possession of the coins will lead to the development of addiction symptoms in the owner, leading to an every growing desire to acquire more of them.

**Additional Notes:**
Creation of more coins requires approval by at least one off-site Administrative Command Executive due to high danger for Insurgency personnel.
[[/tab]]
[[tab Candesco-Celeritatium]]
++ **Candesco-Celeritatium**
**Raw Material:**
|| 50 t of spent nuclear fuel	|| 1 Bloom of 45 Ingots (800 g apiece) ||

**Properties:**
Alloy of matte cupreous colour with a density of 10.3 g/cm³. The material has both high ductility and malleability. When exposed to air, it quickly tarnishes and develops a black shimmering patina; warming it to red heat reverses the process. Material acts as a Gamma and X-Ray mirror.

**Combinations:**
* **None:**
During the only run with this material, the Universal Blacksmith used 39 ingots to create an armour suit both inspired by tactical gear of modern urban warfare and maximilian armour, with the helmet being a synergized shape between a stechhelm and full-face bike helmets. The leftover ingots might have been intended for accompanying weaponry and a set of wings comparable to those of the Polish Hussars, but the Universal Blacksmith never finished them.
When worn, the suit is manipulating kinetic forces applied on and by it by a factor increasing with its relative velocity. Inbound forces (including friction) become reduced, whereas the forces it exerts get increased by the same factor. This means the wearer can accelerate to high velocities on foot and punch holes into walls whilst taking direct hits of enemy fire without suffering damage.

**Additional Notes:**
During the melting process, the Universal Blacksmith exclaimed &#34;It stings!&#34;; following the event, its puppets were seen handling the liquid metal with great caution and tools mounted on long poles. It has refused working with radioactive material of any kind ever since.
[[/tab]]
[[tab Doleo-Tormenium]]
++ **Doleo-Tormenium**
**Raw Material:**
|| 5,3 t salt, 86 kg human milk powder (equivalent to 520 l), 600 kg quartz || 1 boule (6,3 kg) ||

**Properties:**
Ivory coloured, marbled, highly magnetostrictive metal. The surface is constantly exhibiting small ripples slowly moving across it, occasional resulting in the emergence of --[COGNITOHAZARD REDACTED]-- faint wailing.

**Combinations:**
* **Depth Charges:**
□ □ --[REDACTED]-- □ □
* **Grenade Launcher:**
□ □ --[REDACTED]-- □ □

**Additional Notes:**
Production of this material requires Alpha level authorization and facility wide lockdown procedures in place. Output is not allowed to come into contact with genetic material under any circumstances and must be handled by infertil personnel.
[[/tab]]
[[tab Mansuefacio-Gubernatium]]
++ **Mansuefacio-Gubernatium**
**Raw Material:**
|| 31 t pig iron, 15 hides of kangaroo leather, 400 kg paraffin wax || 5 ingots (120 g apiece) ||

**Properties:**
Finely grained, silvery alloy with a Vickert Hardness of approx. 7800 VH. Produces a highly excruciating ringing noise when brought to resonance.

**Combinations:**
* **Nevermore:**
The material was forged into a set of cages, chainmail gauntlets and a small raptor hood. Both the cage and the hood appear to have a sedating effect on the specimen, rendering them inert when inside and/or wearing. The gauntlet allows for an operative to carry a single specimen perched on their arm, keeping the specimen docile and unable to harm the current wearer (but not others) until released.
* **Laser Sights:**
The outer frame of the optics were removed and replaced with pure Mansuefacio-Gubernatium. A click switch is present on the side, allowing to active the lasers alternative mode.
The purpose of this modification was unknown until tests in tandem with an equipped Nevermore specimen were conducted. Whereas exact implications remain unknown, this seemingly allows for laser-guiding of Nevermore specimen during attacks.

**Additional Notes:**
Nevermore behaved highly aggressive and uncooperative towards the Universal Blacksmith, repeatedly attacking and destroying its puppets during their work when taking measurements of the specimen. In response, the Universal Blacksmith lowered a great amount of new puppets into the working area to overwhelm Nevermore, subduing some specimen by dropping anvils onto them. None of the Items appear to have suffered lasting harm.
[[/tab]]
[[tab Rosa-Speculo]]
++ **Rosa-Speculo**
**Raw Material:**
|| 10kg Stramonium dust, 2000kg quartz, 1250kg bismuth || 5 panes (1kg each) ||

**Properties:**
Panes of glass 1 square meter in size. A slightly opaque luster that shows a rainbow sheen when illuminated. Gives the effects of stramonium dust when consumed.

**Combinations:**
* **Water:**
Made into bottles capable of being fitted with a stopper. When water is added it becomes a cloudy purple liquid. When broken the bottle releases a gas cloud similar to that given off by David Wight. The cloud is proportionate with that of water allowed, with 6oz producing 8 square meters of the cloud. The cloud then persists for approximately 60 seconds before dissipating. The following combinations produce similar results except for the changes listed. Substances can be mixed to mix properties.
* **Rubbing Alcohol:**
Cloud persists for 15 minutes before dissipating.
* **Chlorophorm:**
Subjects within the cloud who fall unconscious will no longer die. However, there has been a correlation with test subjects who fall unconscious being diagnosed with lung cancer within the following months.
* **Ether:**
Subjects caught in the cloud will become numb and have movement hindered. Hallucinations become stronger as well, with subjects claiming to see neon lights as well as strengthened previous effects.
* **Human blood:**
Cloud becomes a dark crimson and will leave a sticky film to surfaces upon dissipating. If inhaled, the substance will condense and clog the bronchi branches in the lungs, often resulting in death. The film has also shown to render gas masks unusable.
[[/tab]]
[[/tabview]]

**9. STEP 19/120**

Temporarily suspend all experimental and production interactions with the Universal Blacksmith due to observed instability in the output parameters of its anomalous alloys, as well as an inability to reliably predict the properties of finished items during repeated transmutation.</textarea></pre>
