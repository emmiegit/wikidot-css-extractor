    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>[[&gt;]]
[[module rate]]
[[/&gt;]]

Researcher Talloran&#39;s dead body hung from the ceiling, its doll-like soulless eyes staring into the darkness. The typical Foundation lab coat was torn apart, leaving only a few pieces of cloth attached to the pale skin.

James silently stared at his own corpse, not really affected by the illusion. He didn&#39;t even die this time, just found a copy of himself &#34;hanging around&#34; in the middle of nowhere. Not really scary. The reality bending motherfucker stopped trying, apparently. Or this was a trap to make Talloran feel in control.

He never felt in control, actually. Even his own body hated him, he could feel it, and he couldn&#39;t stop it. His heart was against him, his hands were against him, his eyes were against him, his goddamn genitals were against him, and his brain was against him. He was against himself, hating every piece of the body he was forced to live in. And SCP-3999 knew it damn well.

The hanging corpse was lacking any kind of characteristics that could identify it as male or female. It wasn&#39;t James Martin Talloran, but it wasn&#39;t Jessie Ari Talloran, either. It was something in between. Something that Talloran desperately wanted to be. And he almost got what he wanted, because all kinds of transitions are possible in the world of anomalous, but then he fell into nowhere and everywhere, suffering for eternity because... what was the number of the site where 3999 was contained?

Shit. He couldn&#39;t remember. 

Of course. His memory was also against him. He remembered how this bastard tortured him, he remembered that he hates himself, he remembered the death of Benjamin Kondraki, he remembered Draven&#39;s pain, but he couldn&#39;t remember the fucking site number. Of course.

He should&#39;ve grown numb to this by now. But he was weak, he always was, and that was the thing that kept SCP-3999 strong. It could kill James over and over again, tear him apart limb by limb, suck him into some &#34;black hole&#34; thing, and it would never get bored. Because Researcher Talloran doesn&#39;t resist. He never resists. And never will.

That was something that James realized a long, long time ago. And now, being tormented for all eternities, he thought that it wasn&#39;t that bad. At least he wasn&#39;t terrified of hard-to-destroy reptiles and possesive masks anymore, right? There was something nice about infinite suffering and infinite weakness.

And when Talloran touched the dead body, it finally hit him. The realization of the simple thing that he didn&#39;t even think of when things were normal. 

He was really, really tired. Of his own mind, of his feelings, of his body, of the things happening to him. And now, when he was at the center of everything that happens to him, he knew what he wanted. He wanted to rest, to be a simple, blank nothing. Not a Foundation researcher, not Draven&#39;s boyfriend, not his parents&#39; child. Nothing. That would be very, very nice.

And SCP-3999 will never give it to him.

James looked away from the corpse and started walking. He didn&#39;t know where he will end up, but he wanted to leave. Even if he would get turned into a bag of chips and a bottle of Coca-Cola. Fuck that. Fuck everything.

He heard a voice. It was clear, different from the voices he heard in this insane place before.

&#34;Happy first million years anniversary, Researcher Talloran.&#34;</textarea></pre>
