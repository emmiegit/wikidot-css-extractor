=====

[[&gt;]]
[[module Rate]]
[[/&gt;]]

**Item #:** SCP-CN-3549

**Object Class:** Keter

**Special Containment Procedures:** Several specimens of the SCP-CN-3549 strain deemed noteworthy are contained within the biohazard containment wing of Site-CN-48. Excess specimens will be destroyed. All experimental requests require written approval from the project&#39;s HMCL Supervisor and must be conducted within a Biosafety Level 4 laboratory.

The contained SCP-CN-3549-1 specimens are each contained within appropriately sized negative-pressure containment chambers, with irrigation, monitoring, and other tasks performed automatically by corresponding equipment. Any additional biological material produced by the specimens is either cryopreserved or incinerated as deemed necessary. Entry into and exit from containment areas requires decontamination to eliminate any risk of infection. Any individual exposed without adequate protection to environments potentially contaminated by the object, such as containment rooms, shall be controlled and subjected to at least 30 days of isolation observation.

Avoid using female employees in work related to this object.

**Description:** SCP-CN-3549 is a virus believed to have been artificially created or heavily modified for use as an assault weapon or ritual artifact. The original creator of the item is largely unknown, though records indicate its use and/or modification by GOIs such as the Sarkic Cults and The Children of the Scarlet King.

The object&#39;s DNA sequence remains largely uninterpretable. However, it is known to have undergone some form of thaumatology alteration, enabling certain currently unknown specific thaumaturgy to rapidly render SCP-CN-3549 inert within a small area. This characteristic may have been introduced to limit the scope of an attack or to stabilize the form of infected individuals.

SCP-CN-3549 spreads via airborne and contact transmission. Males infected with the subject present only as asymptomatic carriers and gradually lose infectiousness over approximately three months. However, female infected individuals will begin to develop a series of symptoms, often including severe fever and delirium, ultimately entering a near-dormant, near-death state[[footnote]] For certain special variants, this process may span years or even decades with milder symptoms; during this period, patients are largely non-infectious, possibly to facilitate the management of infected individuals. Variants used in more severe attacks may cause death within hours. [[/footnote]]—subsequently, the patient&#39;s bodily tissues will begin transforming into a plant-like form. Typically, the patient will metamorphose into a plant organism basically adapted to the environment where the transformation process occurs. This entity is designated SCP-CN-3549-1. Trace amounts of SCP-CN-3549 remain detectable within SCP-CN-3549-1&#39;s tissues.

Some notable instances of SCP-CN-3549-1 are listed below.

-----

**Item #:** SCP-CN-3549-1-1

**The Infected:** Unknown. Possibly a migrant population trafficked to the local mountainous areas.

**Description:** A low-growing mulberry (//Morus alba//), some fruits resemble those of upland cotton (//Gossypium hirsutum//) in form. Discovered in an abandoned pigsty, with a rusted-through iron chain still fastened to its trunk. The earliest known instance of SCP-CN-3549-1 discovered by the Foundation, with infection likely occurring in the late 19th century.
[[collapsible show=&#34;    &#34; hide=&#34;    &#34;]]
Nestled between these mountains lies the first palmful of fertile soil, cast aside by her kin for a little sustenance.

This soil was once infertile and unruly, defying discipline even when bruised and battered, knowing it would eventually yield yet still lacking manners.

So the master purchased the seeds, letting their roots erode the stubborn stones struggling within the skull, hollowing out the unyielding vices within the bones.

Thus, the soil finally fertile, the master finally satisfied. Pouring in mucky manure, yielded fruit called infants.

When fertility spent out, for the warmth of master and fruits, the first flower blossomed again, upon the fertile soil.

[[/collapsible]]

-----

**Item #:** SCP-CN-3549-1-13

**The Infected:** Unknown. Reportedly a 6th-century enslaved woman, she was discovered being sold as an “artwork” at a paranormal auction.

**Description:** A grapevine (//Vitis vinifera//). The roots show traces of sticky substance secretion, with a composition similar to semen. Some leaves belong to the blue gum (//Eucalyptus globulus//).
[[collapsible show=&#34;    &#34; hide=&#34;    &#34;]]
The second palmful of fertile soil was born from the yellow sands, as the conqueror had just proclaimed his victory.

The vast soil groveled down, becoming a new slave because of its former master&#39;s defeat.

Yet the conqueror was not satisfied—when he sought to assert his sovereignty over a narrow yet exceptionally splendid expanse of land, this soil revealed a malice far exceeding the desert&#39;s dust storms.

She would rather let venom corrode her very bones than submit to the conqueror&#39;s merciful cultivation.

Thus the conqueror purchased the seed, letting verdant leaves obscure the poisoned soil&#39;s keen eyes, letting tendrils bind the poisoned soil&#39;s limbs, letting the fierce poisonous flame wither into leaves that yearn to flame but cannot.

When the sweet, hedonistic tumour of the Aegean&#39;s pagan deity took root, the fertile soil blossomed with the second flower, dedicated to the conqueror.

[[/collapsible]]

-----

**Item #:** SCP-CN-3549-1-24

**The Infected:** A female high school student. May have been infected with a potent strain of the virus due to a deliberate act of retaliatory poisoning.

**Description:** Multi-stemmed //Nepenthes mirabilis// interconnected through its root system, with its pitcher traps specialized into structures resembling the human mouth, vulva, and anus. During its transformation, it was transplanted into a container and moved to the plaza of the school she attended—the very location where it was discovered.
[[collapsible show=&#34;    &#34; hide=&#34;    &#34;]]
The third palmful of fertile soil held boundless potential. Through tilling the soil and applying fertiliser, the heroes had already given much.

On the floor tiles of the lavatory, one may discern the marks where heroes crushed clods of soil; By the lampposts beside the building at night, one might witness heroes delivering slaps to the pest.

Heroes seek no reward, just finding joy in that: to mould the soil with their own hands at will, is truly a most profound delight.

But the cultivation wasn&#39;t all plain sailing. Though the heroes had solemnly explained the consequences of that, the soil revealed the truth, summoning the storm.

The storm exacted a heavy toll upon the heroes. Resolve was firm—the soil must undergo a thorough tilling, forever etching the consequences of betrayal into the final work.

Thus the seeds committed to memory the heroes&#39; finest work: that time they cleared away the troublesome debris from the soil&#39;s surface, sharing precise soil conditions through the medium of radio waves.

Ultimately, before the eyes of all, every key aspect of the third flower was highlighted and emphasised.

[[/collapsible]]

-----

**Item #:** SCP-CN-3549-1-41

**The Infected:** Rural woman. Mother of multiple children. Died from gunshot wounds after infection.

**Desciption:** The transformation continues after death, forming a plant resembling a low-growing mangrove (//Rhizophora apiculata//). Prior to being collected, the arid mountainous environment caused the &#34;viviparous&#34; hypocotyls[[footnote]]So-called &#34;Viviparous Propagule&#34;.[[/footnote]] produced by this plant to die off continuously after detaching from the parent plant.

[[collapsible show=&#34;    &#34; hide=&#34;    &#34;]]

The fourth palmful of fertile soil had long since awakened, and this awakening was called numbness.

She knew the flowers might bloom at any moment, might at any moment cover the few patches of soil that had little time left.

The conflicts among the elders has persisted far too long. When slaughter could no longer satisfy them, they sowed seeds among their foes. By now, the seeds have spread far and wide. Lying dormant in quietude, new shoots are beginning to sprout.

Yet when children&#39;s blood trickled forth, this resolve shattered into fragments. She threw herself forward, seeking to vent her loathing upon the soldiers.

The fourth flower rendered an utterly impartial verdict: she shall bear children ceaselessly, yet the moment they come into being, their deaths shall likewise be unending.

[[/collapsible]]

-----

**Item #:** SCP-CN-3549-1-54

**The Infected:** Young female. Recovered from a suburban area, appears to have been injected with the strain for the purpose of destroying the body after death.

**Description:** The transformation remains incomplete. Small sections of the corpse show partial ossification, with multiple fractures, bone cracks, hemorrhages, and other signs of abuse. The remaining parts consist of sweet wiliiams[[footnote]]also known as &#34;carnations&#34;.[[/footnote]](//Dianthus caryophyllus//).

[[collapsible show=&#34;    &#34; hide=&#34;    &#34;]]

The fifth palmful of fertile soil stands ready to receive seeds, bearing all cultivation without complaint.

Kinfolks watered with disappointment over her primary sex traits, she swallowed as rain.

Forebears taught with rejection for her mediocre talents, she internalized as lessons.

Adopters reformed her for her willful and bratty behavior, she accepted the discipline.

At last, all preparations were complete—after a terminal convulsion, she calmly accepted the ultimate plowing.

To deal with this unexpectedly cleared plot of farmland, the elders sowed seeds, cast her into the wild grasses of the outskirts.

So the fifth flower bloomed, as a sincere reward for all the sweat and toil.

[[/collapsible]]

-----

**Item #:** SCP-CN-3549-1-59 to 64

**The Infected:** Textile workers. Employed at paranormal enterprise.

**Description:** The infected, once incapacitated, were piled together. During transformation, they were fused into a single entity, ultimately resembling a banyan tree (//Ficus bengalensis//). Signboards and other objects remain embedded within the tissue, impossible to remove.
[[collapsible show=&#34;    &#34; hide=&#34;    &#34;]]
The sixth palmful of soil all concreted as one, where cloth is sown and garments grow.

The collapse and flames within the crowded factory that day released the toxicant hidden beneath.

Without cultivation, the land yield no crops; Slogans and catchphrases—this churning trash— only unsettled and irked the factory owners.

So seeds were sown in furrows plowed by truncheons, irrigated by tear gas.

The sixth cluster blooms thick and lush, covering every patch of land that once wild.

[[/collapsible]]

-----

**Item #:** SCP-CN-3549-1-67

**The Infected:** Militants. Adivasi people[[footnote]]That is, India&#39;s tribal peoples. Many such groups have been influenced by the Naxalites.[[/footnote]], member of local Naxalite militia groups.

**Description:** Despite extensive lignification, the corpse&#39;s form remains largely intact. It lies in a contorted, struggling posture, face upward. Various leaves of inconsistent shapes grow across its body. A particularly vigorous //Crocus sativus//[[footnote]]Also known as &#34;Saffron&#34;. A symbol of Hinduism.[[/footnote]], flowering year-round, thrives on its forehead.

[[collapsible show=&#34;    &#34; hide=&#34;    &#34;]]

The seventh palmful of fertile soil was once teeming with parasites, soaked through by the atrocious toxins of the North.

The parasites are multiplying, the toxins are spreading, and more meek fertile soil will turn into barren land.

Plague shall be ended; darkness must be erased. If the miasma-filled swamp seeks to swallow people whole, it must be struck down and destroyed.

In the name of Kargar, the chill was banished by the roar of gunpowder, and the wicked wilderness watered by blood became fertile soil once more.

Endured such hardship, the seed finally planted; As a symbol of victory, the fertile soil bore forth an unprecedentedly gorgeous seventh flower.

The [[span class=&#34;ruby&#34;]]Crocus[[span class=&#34;rt&#34;]]Safforn﻿[[/span]][[/span]] honoring the Scarlet Crown.

[[/collapsible]]
