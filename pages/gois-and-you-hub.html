= ^^Art by [[*user Sunnyclockwork]]^^

Howdy!

My name is [[*user Uncle Nicolini]], and I love Groups of Interest, or GoIs. My author avatar, Dr. Everwood, is a GoI Researcher, my pet Site ([[[secure-facility-dossier-site-55|Site-55]]]!) is a GoI communications hub, and I have, at time of writing, written the most GoI formats out of anyone on the site. So it should go without saying that I probably know a lot about them. 

I know a lot of people view GoIs as nothing more than a vehicle by which to deliver anomalies to the Foundation, so I decided to write this series of essays to help encourage people to explore them a little more beyond that. There&#39;s a world of depth hiding out there in most of these GoIs, and even the shallow ones have a lot of room to explore in. 

So let&#39;s dive right in, shall we?

@@@@
@@@@
-----
@@@@
@@@@
* [[[the-big-goi-essay|GoI Field Guide]]] - This massive essay is unofficially the start of the series. It contains at least some information on 99% of the site&#39;s GoIs to some degree or another. It&#39;s a little outdated and doesn&#39;t go into as much detail as I would have wanted to, but it&#39;s still a good jumping off point if you&#39;re at all interested in Groups of Interest.
* [[[gois-and-you-1|GoIs and You: The Most Misrepresented (dado and Gamers Against Weed)]]] - An essay covering the two most misrepresented and misunderstood Groups of Interest on the wiki; dado and GAW.
* [[[gois-and-you-2|GoIs and You: The Real Adventures in Crapitalism, or, Alignment Chart Nonsense]]] - An essay covering the three GoIs that love capitalism the most; Wondertainment, the Factory, and MC&amp;D.
* [[[gois-and-you-3|GoIs and You: What the Fuck Is An Alexylva?]]] - An essay covering one of the more mysterious, least developed GoIs on the wiki; Alexylva University.
* [[[gois-and-you-4|GoIs and You: Government Alphabet Soup]]] - An essay covering three of the national normalcy orgs.
* [[[gois-and-you-5|GoIs and You: Random Grab Bag I (Chicago Spirit and Nobody)]]] - An essay covering Nobody and the Spirit.
* [[[gois-and-you-6|GoIs and You: Holy Heck! Horizon Initiative and ORIA]]] - An essay about two religious groups in the anomalous world.
* [[[gois-and-you-7|GoIs and You: On the Kinder Side]]] - An essay covering the Manna Charitable Foundation and Wilson&#39;s Wildlife Solutions.</textarea></pre>
