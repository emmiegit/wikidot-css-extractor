[[include component:image-block name=https://scp-sandbox-3.wdfiles.com/local--files/weight-nickthebrick1/Dumbbell5.jpg| caption=SCP-8114.|width=300px]]

**Item #:** SCP-8114

**Object Class:** Safe

**Special Containment Procedures:** SCP-8114 is stored in a standard containment locker at Site-16. Subjects experimenting with SCP-8114 are to be switched according to the testing researcher&#39;s discretion.

**Description:** SCP-8114 is an &#34;Ivanko&#34; brand dumbbell, weighing 2.3 kilograms. SCP-8114 becomes exceedingly light when held by a living subject, returning to its baseline weight upon loss of physical contact.

Subjects transform into athletic versions of themselves after exercising with SCP-8114, appearing as highly muscular and lean. Repetition, duration, and intensity of the exercises involved are inconsequential; only correctly performing the exercises is what achieves this effect. This transformation is temporary, as subjects will revert to their original bodies over time.[[footnote]]The exact timeframe for complete bodily reversion is indeterminate and varies between each subject.[[/footnote]]

Loss of this transformation can be prevented by frequently exercising with SCP-8114. However, if this occurs, the anomaly&#39;s secondary property manifests. SCP-8114 will progressively gain and accumulate weight in subsequent uses. In addition to making exercising difficult, this also diminishes the potency of the subject&#39;s transformation. If the subject persists, SCP-8114&#39;s weight will increase to the point of permanent immobility. This solely affects subjects who triggered its secondary property. Subjects who have not can still manipulate SCP-8114 without issue.

**History:** SCP-8114 came to the Foundation&#39;s attention in the aftermath of a wellness check performed on an apartment within ████████, Colorado. The apartment was in a state of disarray, with a majority of the rooms being in shambles. The apartment&#39;s sole resident, Albert Mayfield, was discovered dead in the living room. The Foundation took over the investigation after details of the case came to light, necessitating the amnestization of all relevant parties. 

An autopsy revealed that Mr. Mayfield suffered a fatal heart attack. Mr. Mayfield also suffered severe gastrointestinal perforation, caused by the presence of a massive quantity of food in his stomach.[[footnote]]Notably, the body was in the fetal position at the time of discovery.[[/footnote]] SCP-8114 was recovered from the living room. A digital camcorder was also found. Attached below is all relevant footage confiscated from the device.

= __**SCP-8114/Video.File1**__
-----
[[=]]
[[collapsible show=&#34;▶ ACCESS FILE ◀&#34; hide=&#34;▷ CLOSE FILE ◁&#34;]]
[[&lt;]]
&gt; = **[BEGIN LOG]**
&gt; 
&gt; //[Mayfield is sitting on a couch. He opens his mouth, pauses, then chuckles.]//
&gt; 
&gt; **Mayfield:** Sorry. I planned a whole speech, but you know what? Something this special gotta come from the heart. My name&#39;s Albert Mayfield. Born in Wyoming, lived in ████████ for a good while now. I&#39;m 26--well technically 27 -- my birthday’s coming up soon. It&#39;s a brand new year and as you can see... a brand //new// me.
&gt; 
&gt; //[Mayfield gestures to his body, shirtless and highly muscular. He points at his &#34;ten-pack.&#34;]//
&gt; 
&gt; **Mayfield:** Shocking right? Never thought it would be this...
&gt; 
&gt; //[Mayfield stares at the coffee table. SCP-8114 is present, which he picks up.]//
&gt; 
&gt; **Mayfield:** Right. Long story short, my health was going downhill. Reeeeeeal bad. Like the problem became so huge I couldn&#39;t deny it anymore.
&gt; 
&gt; //[Mayfield stands and approaches a floor mirror near him. He then performs a dumbbell overhead press with SCP-8114.]//
&gt; 
&gt; **Mayfield:** But following vigorous exercise.
&gt; 
&gt; //[Mayfield performs a tricep extension with SCP-8114.]//
&gt; 
&gt; **Mayfield:** Strict dieting.
&gt; 
&gt; //[Mayfield performs a bicep curl with SCP-8114.]//
&gt; 
&gt; **Mayfield:** And immense will-power, I managed to pull myself up, &#34;straight up.&#34; Cheesy I know, but the results speak for themselves! The best part?
&gt; 
&gt; //[Mayfield enters the walk-in kitchen in background, pulling a pizza box from the fridge. The waste container is overfilled with disposable food containers. Mayfield sits back down.]//
&gt; 
&gt; **Mayfield:** I can eat crap like this again!
&gt; 
&gt; //[Mayfield opens the box, pulling out an extra-large slice of a deep dish, meat lover&#39;s pizza. He consumes half the slice.]//
&gt; 
&gt; **Mayfield:** What? You thought I was eating rabbit food all this time? The thing about bodybuilders, they require a lot of calories to keep their body functioning. Same applies to me, the difference being is that I found a way to get the best of both worlds. [Faux Italian Accent] Capiche?
&gt; 
&gt; //[Mayfield chuckles, finishing his slice.]//
&gt; 
&gt; **Mayfield:** On a separate note, things have really improved back at ████ State.[[footnote]]The university Mr. Mayfield previously attended.[[/footnote]] I&#39;m making rounds in the sports clubs, I&#39;ve made friends... [Loud Whisper] I even got a couple of phone numbers. All thanks to this little guy!
&gt; 
&gt; //[Mayfield sets down the pizza box and showcases SCP-8114 to the camera. Mayfield blinks twice as his expression softens.]//
&gt; 
&gt; **Mayfield:** ...A-And the other equipment I got lying around. I&#39;m visiting my family for spring break. My folks don&#39;t know yet, it&#39;s a surprise. I can&#39;t wait to see their faces! In fact, that&#39;s why I&#39;m redoing my journal again, thought it was appropriate considering the circumstances. Just... want people to know the new me.
&gt; 
&gt; **Mayfield:** Anyways, that&#39;s the long and short of it. Expect another video, probably soonish. Until then, Mayfield signing out.
&gt; 
&gt; //[Mayfield salutes, still exercising with SCP-8114.]//
&gt; 
&gt; = **[END LOG]**
[[/&lt;]]
[[/collapsible]]
[[/=]]
-----
@@ @@
= __**SCP-8114/Video.File2**__
-----
[[=]]
[[collapsible show=&#34;▶ ACCESS FILE ◀&#34; hide=&#34;▷ CLOSE FILE ◁&#34;]]
[[&lt;]]
&gt; = **[BEGIN LOG]**
&gt; 
&gt; //[Mayfield is sitting on the couch, wearing a sleeveless shirt, He looks at the mirror&#39;s reflection. Mayfield caresses his abdomen tightly, scowling before looking at the camera. He smiles.]//
&gt; 
&gt; **Mayfield:** Hi, guess who? Heh. So big update, a lot has happened since my last video. Remember when I talked about phone numbers? Weeeeell, turns out they were also lottery numbers. And I won. //Biggly//. Courtney Winters.
&gt; 
&gt; //[Mayfield slaps his knee, laughing loudly.]//
&gt; 
&gt; **Mayfield:** Can you believe it?! Courtney. Winters. I kid you not! The same chick who kept forgetting my name is texting me non-stop. I can barely keep up! Not that I&#39;m complaining. We had our tenth date last night. Went to a steakhouse. Hella expensive, but you can never put a price on love, right?
&gt; 
&gt; **Mayfield:**  Sidenote, I&#39;m officially a part of the basketball team now! We got a big game coming up soon. I&#39;ve heard it&#39;s gonna be televised by all the college channels. This may be the ultimate golden opportunity here. If I impress the right people... I might be able to go places. Winters will be there too. Another reason to take this seriously. Best part is, I got it all figured out--
&gt; 
&gt; //[Mayfield caresses his chest in discomfort. He frowns.]//
&gt; 
&gt; **Mayfield:** --Mostly figured out. Pushing yourself does not come without its consequences. Nothing too bad, it doesn&#39;t even hurt most of the time. It&#39;s just...
&gt; 
&gt; //[Mayfield&#39;s eye twitches again.]//
&gt; 
&gt; **Mayfield:** //Annoying//. But it&#39;ll pass. Pumping a little iron never hurt anyone--
&gt; 
&gt; //[Mayfield grabs SCP-8114 as he stands. His right arm suddenly and violently jolts forwards. Mayfield falls onto the coffee table, breaking it in half.]//
&gt; 
&gt; **Mayfield:** Goddammit! Ah... argh....
&gt; 
&gt; //[Mayfield stumbles out of the room, soon returning with a first aid box and bathroom scale. As Mayfield dresses his wounds, he stares at the table&#39;s remains.]//
&gt; 
&gt; **Mayfield:** [Whispering] So it&#39;s getting worse... What the hell is going on?
&gt; 
&gt; //[After applying bandages, Mayfield places SCP-8114 onto the scale. After a moment, Mayfield gasps.]//
&gt; 
&gt; **Mayfield:** That was not five fucking pounds! Are you even working right?!
&gt; 
&gt; //[Mayfield takes SCP-8114 off the scale and steps on it instead. After a moment, Mayfield&#39;s eyes widen. He backs away slowly, eyes trained on the digital display. Mayfield hyperventilates, then scrambles into a hallway.]//
&gt; 
&gt; //[A minute passes. Mayfield sprints back into the living room to retrieve SCP-8114. He leaves the area, frantically performing several bicep curls with the object. He appears to be physically struggling.]//
&gt; 
&gt; = **[END LOG]**
[[/&lt;]]
[[/collapsible]]
[[/=]]
-----
@@ @@
= __**SCP-8114/Video.File3**__
-----
[[=]]
[[collapsible show=&#34;▶ ACCESS FILE ◀&#34; hide=&#34;▷ CLOSE FILE ◁&#34;]]
[[&lt;]]
&gt; = **[BEGIN LOG]**
&gt; 
&gt; //[The coffee table is absent; SCP-8114 takes its place. Mayfield sits on the couch, arms folded. He scowls at SCP-8114. The mirror is draped over by a blue blanket.]// 
&gt; 
&gt; **Mayfield:** Yesterday was... //not good//.
&gt; 
&gt; //[Mayfield rubs his biceps, visibly shaking. He is wearing a large jacket.]//
&gt; 
&gt; **Mayfield:** The game was fine... at first... but I couldn&#39;t keep up. Teammates were mad. Coach was disappointed. We were at neck and neck and I..
&gt; 
&gt; //[Mayfield huffs, slamming his fist into the couch.]//
&gt; 
&gt; **Mayfield:** Goddammit.
&gt; 
&gt;  //[Mayfield sniffles, approaching the camera to shut it off. Instead, he accidentally knocks over the tripod stand. The camera is now filming on the ground at a tilted angle. Mayfield hisses, pulling at his hair.]//
&gt; 
&gt; **Mayfield:** Goddammit!
&gt; 
&gt; //[Mayfield snaps his head towards SCP-8114.]//
&gt; 
&gt; **Mayfield:** You did this... you f-fucking... fucked me! You know that?!
&gt; 
&gt; //[Mayfield kneels in front of SCP-8114, jabbing it multiple times.]//
&gt; 
&gt; **Mayfield:** I fumbled it on //live// television! How can I go back after that performance?! What do you have to say for yourself?
&gt; 
&gt; //[SCP-8114 remains stationary. Mayfield leans closer.]//
&gt; 
&gt; **Mayfield:** It&#39;s such a shame you can&#39;t talk, because I would love to hear what bullshit excuses you&#39;d come with... you //useless// piece of shit. We had a good thing going and you had to throw it all away. And for what? Nothing! Literally nothing! I could&#39;ve left you to rot... I could&#39;ve left you in the garbage... I decided to take a chance on you... and this is how you repay me?! You--
&gt; 
&gt; //[Mayfield jabs SCP-8114 again with significant force. He pulls his finger away in apparent pain. Mayfield stands up and stomps on SCP-8114 repeatedly, shouting expletives at it. Mayfield movements become slower and disengage from further stomping. He is breathing heavily and is clenching his chest.]//
&gt; 
&gt; **Mayfield:** Aw... Augh...
&gt; 
&gt; //[Mayfield looks in the mirror. He removes the blanket, removes his jacket, then inspects himself in the mirror. Mayfield&#39;s body is no longer muscular and has gained an excess amount of fat. Mayfield shudders and begins to cry. He sits on the ground, SCP-8114 is right behind him.]//
&gt; 
&gt; **Mayfield:** No. No... t-that&#39;s not true. Ivan. I&#39;m sorry. [Sniffling] I-I&#39;m so sorry. I didn&#39;t mean any of that. [Coughing] You know how touchy I can be about... //this.//
&gt; 
&gt; //[Mayfield gestures to his abdomen before covering his eyes.]//
&gt; 
&gt; **Mayfield:** Ivan... t-the truth is... I&#39;m happy that we met. I wouldn&#39;t have gotten this far without you. I know for a fact I wouldn&#39;t. Funny how something so great could get mixed up with Legos and rat droppings.
&gt; 
&gt; //[Mayfield softly chuckles before exhaling sharply.]//
&gt; 
&gt; **Mayfield:** I knew you were special. No dumbbell could be that light. It&#39;s silly to think about, but I really enjoyed your company.
&gt; 
&gt; //[Mayfield uncovers his eyes. Both eyes are puffy and red.]//
&gt; 
&gt; **Mayfield:** But for the love of god I don&#39;t understand the problem here. I honestly don&#39;t! [Coughing] Are you angry with me? Are you tired? Are your magic reserves low? Whatever it is, y-you can tell me. I&#39;ll hear you out. Just give me a sign and I&#39;ll do it. Ivan?
&gt; 
&gt; //[Mayfield turns around and tries lifting SCP-8114 with his right hand. SCP-8114 remains stationary.]//
&gt; 
&gt; **Mayfield:** Ivan, we can still fix this! A simple fix, that&#39;s all it is... please?
&gt; 
&gt; //[Mayfield attempts to pull SCP-8114 with both hands. SCP-8114 still remains stationary. Mayfield whimpers.]//
&gt; 
&gt; **Mayfield:** I just want my body back.
&gt; 
&gt; = **[END LOG]**
[[/&lt;]]
[[/collapsible]]
[[/=]]
-----
@@ @@
= __**SCP-8114/Video.File4**__
-----
[[=]]
[[collapsible show=&#34;▶ ACCESS FILE ◀&#34; hide=&#34;▷ CLOSE FILE ◁&#34;]]
[[&lt;]]
&gt; = **[BEGIN LOG]**
&gt; 
&gt; //[Mayfield is sitting directly behind SCP-8114, his body is covered by a blue blanket.]//
&gt; 
&gt; **Mayfield:** I don&#39;t know why I&#39;m still making these.
&gt; 
&gt; //[Mayfield grips his right arm, cringing in discomfort.]//
&gt; 
&gt; **Mayfield:**  Winters texted me.  &#34;Let&#39;s give our relationship a break.&#34; She said that, I kid you not. I had a feeling she would. I&#39;m not pissed though. After all, my coach believes I suffered a bad ankle injury even though I didn&#39;t. I&#39;m not a hypocrite... not anymore. I&#39;ll quit during break. It&#39;s not that the spotlight that forced my hand, not entirely. I never fully explained how my health went &#34;downwards&#34;, didn&#39;t I?
&gt; 
&gt; //[Mayfield pulls away the blanket; he is obese. Mayfield shudders as presses both hands against his distended belly.]//
&gt; 
&gt; **Mayfield:** I went for a check-up. Was told my BMI was bad, deep red, danger zone. It made sense: The pain. The stress. The symptoms. A recipe for an early grave. The prospect terrified me, so I sought to change it. And I did... but it&#39;s not this fantastic story I boasted about earlier. Although what //is// fantastical, I found a shortcut.
&gt; 
&gt; //[Mayfield strokes SCP-8114 with the back of his hand.]//
&gt; 
&gt; **Mayfield:** //This// was the shortcut. I stumbled upon this inside a cardboard box in my uncle&#39;s attic. It felt weird to hold, so I brought it home with me. That&#39;s when it happened. All I did was a //single// bicep curl -- suddenly turned into the next Arnold Schwarzenegger and, trust me, things spiraled from there.
&gt; 
&gt; //[Mayfield begins to rise up to his feet, he appears to be under tremendous strain.]//
&gt; 
&gt; **Mayfield:** S-Spiraled to the tippy top, then came crashing //down//. I can&#39;t do anything about the dumbbell now. It&#39;s been stuck there on the floor for days. It&#39;s too heavy for me to lift anymore. To think I&#39;ve been living with a cursed object for days, look what it did--
&gt; 
&gt; //[Mayfield turns his head to the kitchen. A large number of trash bags by the waste container. He freezes in place, his clenched fists are now relaxing.]//
&gt; 
&gt; **Mayfield:** Maybe it wasn&#39;t cursed. I doubled down, didn&#39;t I? How much crap did I even eat? Did I even lose all that weight to begin with? Did I break it by pushing it too hard... or did it cut me off because I don&#39;t deserve it anymore?
&gt; 
&gt; //[Mayfield remains, silent, staring at SCP-8114 before shaking his head.]//
&gt; 
&gt; **Mayfield:** I suppose it doesn&#39;t matter at this point. What matters is that I&#39;ve gotten from red, to //black//. My body has gotten way worse than I started: I&#39;ve gotten heavier, this pain keeps shooting up my arm... I felt like I was going to faint when I stood up. My heart&#39;s drumming up like mad and I hardly did anything today... I think I&#39;m actually dying.
&gt; 
&gt; //[Mayfield approaches the mirror, observing his reflection.]//
&gt; 
&gt; **Mayfield:** I&#39;ve been exercising -- //real// exercise. I&#39;ve been eating like a mouse... been starving myself a-and... nothing. I&#39;ve been trying every day and... still... nothing...
&gt; 
&gt; //[Mayfield rubs the wooden rim of the mirror. His eyes are watering.]//
&gt; 
&gt; **Mayfield:** What the hell do I do now?
&gt; 
&gt; = **[END LOG]**
[[/&lt;]]
[[/collapsible]]
[[/=]]
-----
@@ @@
= __**SCP-8114/Video.File5**__
-----
[[=]]
[[collapsible show=&#34;▶ ACCESS FILE ◀&#34; hide=&#34;▷ CLOSE FILE ◁&#34;]]
[[&lt;]]
&gt; = **[BEGIN LOG]**
&gt; 
&gt; //[Mayfield is performing a series of jumping jacks in the living room. He appears to be in physical pain. Mayfield stops exercising; he is heavily out of breath. Disoriented, he stands onto the scale. Moments later, he observes the LCD display and backs away in shock.]//
&gt; 
&gt; //[Mayfield quickly enters the kitchen, retrieving a pill bottle and various produce from the cabinet and refrigerator respectively. Mayfield then haphazardly inserts both products into a food processor. After it is fully blended, Mayfield pours the liquid into a cup and drinks it.]//
&gt; 
&gt; //[Mayfield immediately spits it out, dropping the cup into the sink. Mayfield retches, covering his mouth as he rushes into the hallway.]//

&gt; //[Mayfield is performing a set of high knees. He abruptly clutches his chest in pain and falls to the floor. Mayfield gasps and whimpers as he adopts the fetal position. His body shakes at irregular intervals. After an hour has passed, Mayfield no longer appears in pain and rises to his knees.]//
&gt; 
&gt; //[Mayfield stops in place. Mayfield looks to see his right hand has bumped into SCP-8114 as he was getting up.]//
&gt; 
&gt; //[Mayfield is shuddering, his cheeks are becoming wet.]//

&gt; //[Mayfield is sitting on the couch, slouching forwards. The lights have been turned off; the room is now only illuminated through beams of sunlight peering through the window blinds.]//
&gt; 
&gt; //[Mayfield is only wearing a pair of underwear. His body is now extremely obese. Mayfield stops staring at SCP-8114, now directing his attention at the mirror. The mirror is covered by a blue blanket.]//
&gt; 
&gt; //[Mayfield covers his head, shaking in silence.]//

&gt; //[Mayfield is sitting on the couch, covering his face and shaking. His appearance is heavily disheveled; pieces of his hair also appear to be missing. Mayfield suddenly pulls his hands away and screams.]//
&gt; 
&gt; //[Mayfield stands up, makes his way to a nearby table and throws a vase that was resting on top of it onto the ground, shattering it. Mayfield then throws several tables at the kitchen&#39;s cabinets, significantly damaging them on impact. Mayfield looks at the camera and throws the food processor at it, knocking it over.]//
&gt; 
&gt; //[The camera is now on the ground, filming completely sideways. Loud crashing and screaming can still be heard.]//

&gt; //[The footage&#39;s perspective is sideways. From the positioning on the floor, the living room and kitchen appears to be heavily damaged. Broken furniture and other miscellaneous objects are laying everywhere. The cabinet doors and much of the wall paper have been ripped off. Stains of various colors coat the floor. Mayfield is standing in front of the mirror, now without the blue blanket.]//
&gt; 
&gt; //[He observes his reflection as he rubs his right thumbs against the glass. He is breathing loudly and slowly. Boils are visible on his chest and back. His body hair is also greasy. Mayfield nods.]//
&gt; 
&gt; //[Mayfield gently pushes the mirror backwards, shattering the glass as it makes contact with the floor.]//

&gt; //[The footage&#39;s perspective is sideways. Mayfield enters the living room, dumping a large collection of trifold brochure menus onto SCP-8114. He pulls out a credit card from his wallet and drops it onto the couch.]//
&gt; 
&gt;  //[Mayfield takes one of the menus and dials in the number on his cell phone. Mayfield paces around the room. Much of his word are inaudible until he meanders near the camera.]//
&gt; 
&gt; **Mayfield:** --Yeah, I know it&#39;s a lot but we&#39;re having a big party here... yeah, I have the cash, don&#39;t sweat it... My name&#39;s Albert Mayfield... alright, I&#39;ll sit tight. Thanks.
&gt; 
&gt; //[Mayfield rips the menu. He picks up another menu and dials in the number.]//

&gt; //[The footage&#39;s perspective is sideways. Mayfield is sitting cross-legged on the floor, he is surrounded by large piles of foods and dishes. Much of the food is partially eaten or is falling apart onto the rug.]//
&gt; 
&gt; //[Mayfield is rapidly sampling various dishes when he suddenly cringes and holds his abdomen in extreme pain. Mayfield hyperventilates; he presses against his abdomen with one hand as he hits the side of his head with the other. Multiple large bald spots are visible on his scalp, caked in dry blood.]//
&gt; 
&gt; //[Mayfield&#39;s cries diminish as he spots the broken mirror in the background. Mayfield nods as he retrieves a pizza box from the pile, pulling out a slice. Mayfield consumes the slice, whimpering. A massive bruise is present on his abdomen.]//
&gt; 
&gt; //[Through great effort, Mayfield finishes the slice and reaches to the box again. Footage abruptly ends as the camcorder runs out of battery life.]//
&gt; 
&gt; = **[END LOG]**
[[/&lt;]]
[[/collapsible]]
