[[include component:image-block | name=https://cdn.discordapp.com/attachments/1318787236308979713/1486920470749249536/Untitled20_20260326215058.png?ex=69c74219&amp;is=69c5f099&amp;hm=a049db0dd9d1548349ed28ded9f7d2d80860ed2233b944f6882fd003aa2243bb&amp; | caption= Screenshot of SCP-8638&#39;s homepage. | width=10]]

**Item #:** SCP-8638

**Object Class:** --Euclid-- Keter

**Special Containment Procedures:** Any and all web domains that are determined to be related to SCP-8638 are to be immediately taken down or otherwise rendered inaccessible through cyber-attacks upon discovery. If the previously mentioned procedures are unable to inhibit online access to SCP-8638, all web traffic linked to domains related to 8638 will be monitored by personnel on a 24 hour basis.

Upon discovery of web traffic indicating that an individual either unaffiliated with the Foundation, or lacking permission from relevant personnel has browsed or purchased an item or items from SCP-8638’s catalogue, an investigation of all involved parties is to be launched immediately. All purchased items are to be confiscated, and their purchasers to be detained for questioning.

In the event that an individual or individuals have submitted an employment application form to SCP-8638, they are to be immediately located and apprehended as soon as possible. If an individual is revealed to have signed an employment contract sent to them by SCP-8638, or someone employed by SCP-8638, they are to be considered an anomalous human and imprisoned in an S-1 high-security humanoid containment cell when captured. It is recommended to give any captured anahumans __physical__ shopping catalogue magazines to browse, as such activities seem to improve their overall mood and behavior.

------

**Description:** SCP-8638 takes the form of an online shopping mall under the name of &#34;Anomalous Antique Shopping Center.&#34; Researchers who have visited the online website commented on its “eccentric” appearance and user interface, akin to a site found on the early internet. 

SCP-8638 pulls in shoppers through the use of banner advertisements, spam emails, and adware in some cases. The product being advertised varies greatly depending on the target being advertised to, this is to say the product will always take the form of an item the viewer of the advertisement would want or need. While this phenomenon could be anomalous, it could also be attributed to industry standard data harvesting.

SCP-8638 is known to host a variety of anomalous objects for sale, with its selection frequently changing. Bartering is not accepted as a means of payment, and objects may only be sold and purchased through means of payment 8638 approves of in its terms of service. Although some items can be purchased with regular currency, a large majority of the listings on SCP-8638’s catalogue are sold for unusual currencies not accepted anywhere else. Attempts to purchase items sold for unorthodox currencies have not been made as of writing this, nor are there any known records of someone outside the Foundation doing so.

Items that are purchasable with standard currency tend to take on forms that are understandable and easily utilized by most people. Examples being: Clothing, household appliances, weapons, drugs, etc. On the contrary, the appearances of items sold for unorthodox currency are generally unsettling and possibly hazardous. An item purchased from SCP-8638’s catalogue is only loosely attached to its original function, and its actual effects can only be discerned from either direct usage or the description attached to the items listing.

While browsing the website it is possible to apply for a position in the proclaimed parent company of SCP-8638, however doing so will cause either your immediate disappearance, or transfiguration into an anomalous human without exception. Employees of the established parent company of SCP-8638 (Uncanny Appearances Inc.) are observed to have a deep obsession with participating in consumerist practices, along with an unwavering loyalty to the company. Company employees themselves are no more inherently dangerous than the average human, and they could even be considered fairly amicable. Their danger is often derived from the anomalous objects they obtain from SCP-8638’s website, and their habit of attempting to recruit others for employment at the company.

------

**Addendum 8638.1:**  Audio log of an interview conducted by Dr. ███, the subject of the interview is an individual employed by Uncanny Appearances Inc.

[[div class=&#34;blockquote&#34;]]
**&lt;Begin Log&gt;**

[Dr. ███ exchanges pleasantries with the employee, and the sound of a chair being dragged across the floor momentarily is audible.]

**Dr. ███:** Pardon my curiosity sir, but what made you apply for your current job at Uncanny Appearances Incorporated?

**Employee:** Don’t worry about being rude my friend, I’d be happy to answer any questions you have about the company! As for the reason behind my application, it’s simple. The company offers such a wide range of benefits to its employees, it&#39;s truly a dream job!

**Dr. ███:** How very generous of them, you employees must be taken care of quite well. May I ask what these benefits include?

**Employee:** How kind of you to ask!

[The screeching of a chair sliding across the floor and falling over can be heard as the employee explodes out of their chair.]

**Employee:** Free healthcare, and life insurance. Along with promises of guaranteed promotions, generous salaries, two months total of PTO a year, and access to the employee exclusive shopping catalogue! Say, do you happen to be interested in working for the company? We’d be more than happy to welcome you as a fellow colleague.

**Dr. ███:** Ah… thank you for the offer but I’m unable to leave my current job as of right now. Still, the benefits you mentioned are very enticing. Most of all I’m interested in the employee exclusive catalogue, can you tell me more?

**Employee:** Sadly, I cannot reveal any further information about the employee catalogue.

**Dr. ███:** How unfortunate, I suppose it cannot be helped then. I’ll ask you something else, can you disclose the location of your corporate headquarters?

**Employee:** Oh I’m more of a field agent per se. Though I occasionally meet with colleagues that were assigned to corporate, I’m unaware of its exact location. Why do you ask?

**Dr. ███:** I was just considering conducting some more interviews with some of your colleagues there.

**Employee:** I see, if the opportunity arises I’ll introduce you to someone from corporate. However for now it seems my time to be chatting with you is coming to an end. I thank you for giving me such a pleasant conversation, but I must head to work now. Do you happen to know where the exit of this facility is located?

**Dr. ███:** …
 
**Employee:** Do you not understand? I need to leave. I’ll ask you again, where is the exit?

[At this point, the interviewer uses a discreet method to call for security. Struggling can be heard as the interviewee is apprehended and returned to their containment unit.]

**&lt;End Log&gt;**

[[/div]]

------

**Addendum 8638.2:** 03/14/20██-04/14/20██ Incident report.

Due to the assigned containment supervisor’s negligence of SCP-8638’s special containment procedures, an existing instance of 8638’s website was left unmonitored for approximately 2 hours without notice. During this period, an individual by the name of ███ encountered an online advertisement for a flash sale hosted by SCP-8638. Due to the nature of 8638, the item on sale was exactly what Mr.███ needed at that point in time: Formal interview attire.

The item&#39;s listing read as follows:
[[div class=&#34;blockquote&#34;]]
**Social Magnet Business Attire Bundle**

--**1,000,000₩**-- **Sale!** **10,000₩**

//Has there ever been a time where you felt inconsequential, unheard, or even downright ignored? Have you ever wanted to just strap someone down and force them to listen to every little word you say? Well say no more! The Social Magnet Business Attire Bundle is for you! With attire like ours, folks will be sure to agree with everything that comes out of your mouth, no matter how ridiculous your proposal!//

//Buy now!//

[[/div]]

Shortly after purchasing the Social Magnet Attire online, Mr.███ applied for employment on the very same website. According to their internet history, Mr.███ had been unemployed for some time, and their hunt for a job was unsuccessful until this point. 

When Mr.███’s online activity was discovered, any documentation of it was quickly buried by the containment supervisor. Foundation personnel were not dispatched, and the newly instated company employee was not apprehended. After the containment supervisor’s negligence was inevitably discovered, further attempts to locate and apprehend Mr.███ were met with increased difficulty. The subject of this report has yet to be apprehended at this time. 

While it is known that Mr.███ had originally resided in the state of California, due to the Foundation’s delayed response to the situation his current whereabouts are obscured. Occasionally there are times when Mr.███ meets with other employees at varying designated locations across many capitalist countries, and the Foundation has been able to consistently identify these gatherings. However, interfering with these meetings is a non-trivial matter for many reasons.

It is theorized that with the help of the hypnotic influence of the Social Magnet Attire, Mr.███ was able to negotiate a higher position in the company than that of a regular employee. As shortly after their instatement as a company employee, they served a vital role in founding a quasi religious organization in worship of the company. This organization is comprised entirely of Uncanny Appearances employees. The newly founded organization attributed to 8638 has only made containment more difficult and costly. At this time, additional funding and personnel is requested along with the reclassification of SCP-8638 from Euclid to Keter.

End of report.
