This component offers a wide array of pride and other logos for Sigma-9 and Sigma-10 pages. To use it, paste the following somewhere on your page:

&gt; @@[[include :scp-wiki:component:pride-logos s10=-]| code=XXX]]@@

This component also supports BHL and Bedrock themes, along with some other customization options. Please refer to the component page for all the logos and options offered!

@@ @@
[[=]]
----
+++ [[size 125%]]📎[[/size]][https://scp-wiki.wikidot.com/component:toggle-sidebar Toggle Sidebar]
----
[[/=]]

This component enables the mobile sidebar button on a desktop-sized screen, which by extension centres the main page content. To use it, paste the following somewhere on your page:

&gt; @@[[include :scp-wiki:component:toggle-sidebar]]@@

If you&#39;re using a theme on the page, make sure that the [[include]] for this component is put in after the [[include]] of that theme.

You can see this component in action in [[[SCP-6009]]].
