    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>[[&gt;]]
[[module Rate]]
[[/&gt;]]

nothing starts.
there is only white
on white on white on white,
rice
in a paper bowl
with a plastic spoon,
the steam dissipated
into the stale air,
the light
buzzing.
you measure
your life with these things,
squares arranged
into a square,
the universe moving on
undisturbed
without even siren call
to lead you to drown.
you have lost
the power
that once stripped
concrete from rebar,
flesh from bone,
smoke from sky.
you are denied
your shadow
striding behind you
in the morning
or rising to meet you
in the evening;
there is not even dust
to find fear in.
did you once know
why?</textarea></pre>
