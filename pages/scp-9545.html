**Item #:** SCP-9545

**Object Class:** Uncontained

**Special Containment Procedures:** Online forums and social media groups concerning conspiracy theories and/or cryptids are to be monitored for any users posting information relevant to SCP-9545’s established fields of interest, with threads concerning &#34;shapeshifters&#34; and &#34;artefacts&#34; being of the highest priority.

Users who report being stalked after posting flagged material are to be placed under observation until SCP-9545’s involvement can be confirmed. Targets in the “Red Dress” phase are to be placed under the indirect supervision of field agents with a Mobile Task Force on standby. Capture operations are not to be enacted until the &#34;Black Cat&#34; phase, where containment can be more easily guaranteed.

Communications disruptions or power outages within the target’s domicile are to be considered signs of an ongoing “Black Cat” phase and grounds for immediate intervention. Before moving to subdue the subject, agents are to block all potential exits while SCP-9545 is interrogating its target, including windows, ventilation shafts, and pipes.

All personnel assigned to capture operations must be armed with incendiary weapons to exploit SCP-9545&#39;s aversion to fire, ideally to force it away from viable escape routes and into pre-arranged traps.

**Description:** SCP-9545 is a polymorphic entity that most commonly takes the form of a stereotypical government agent. Though this form frequently varies in height, build, hair colour, sex, and ethnicity, it always wears a black business suit, white shirt, black clip-on tie, black dress shoes, black sunglasses, black leather gloves, and an earpiece with the cable fitted into the collar.

The full extent of SCP-9545’s polymorphic traits remains unknown, but witness reports indicate that it is not limited to mimicking humans or animals, as some victims report being alone in locked rooms when they were attacked, indicating it is capable of infiltrating through keyholes or disguising itself as inanimate objects or machines.

SCP-9545 possesses regenerative properties allowing for rapid recovery from injuries; however, given SCP-9545&#39;s propensity for avoiding open combat, the full extent of these abilities is unknown. Available evidence suggests that extreme heat can temporarily hamper regeneration, hence its documented aversion to open flames and electricity.

SCP-9545 targets conspiracy theorists, surveying forums and other online communities in search of individuals providing accurate data on subjects that interest it. If any users provide information that it deems factual, they are subject to a pattern of surveillance and interrogation occurring in four distinct phases[[footnote]]Titled after the codewords used in prior capture attempts.[[/footnote]]:

# **“Green Text.”** SCP-9545 contacts the target as a fellow theorist on their forum of choice and questions them regarding the source of their information. Due to the paranoia inherent to conspiracy theorists, targets rarely answer SCP-9545’s queries, but if they disclose the requested information, the pattern will end immediately. Otherwise, SCP-9545 will progress to the next phase.
# **“White Rabbit.”** The target is contacted via email, with SCP-9545 offering to meet in person and exchange information. This correspondence lasts until the target is manipulated into providing enough details to determine their whereabouts, or their IP address can be traced.
# **“Red Dress.”** SCP-9545 observes the target in person, gathering information and intimidating them. Targets often report being followed through crowds, sightings of black vans or helicopters in their vicinity, or finding that their home was searched in their absence. Demands for the requested information or item will be provided. If the target complies (or the mission objective is found in a search), all harassment will cease. Otherwise, this stage concludes with a 48-hour lull in sightings to induce a sense of false security.
# **“Black Cat.”** SCP-9545 attacks the target in their home, most commonly at night. In the ensuing interrogation, the target will be forced to surrender all relevant data, often through methods involving extensive use of SCP-9545’s polymorphic traits. Victims can be subject to lethal force, but only if they endanger information or objects that SCP-9545 has been pursuing.

**Discovery Log:** The Foundation first became aware of SCP-9545 in 1999 following a series of assaults committed against conspiracy theorists across the United States. It was initially believed that a rogue agent or intelligence agency operating beyond its brief was responsible for these crimes, but after a thorough investigation revealed no involvement from any known GOI, the Foundation began investigating potentially anomalous causes. 

It was not until 2005 that cross-referenced witness reports confirmed that the “man in black” was a polymorphic entity. Following examination of the small number of confirmed encounters, the &#34;agent&#34; was given its formal designation and its //modus operandi// was officially recognized.

Given the level of misinformation and conjecture inherent to conspiracy theorist circles, it is still not known how many times SCP-9545 has conducted its four-step pattern, how long it has been operating, or even how many individuals claiming to be past victims have been lying or mistaken. Additionally, SCP-9545’s default camouflage means that it is frequently misidentified as a stereotypical government agent in numerous other urban legends and conspiracy theories, making the process of tracking it extremely difficult.

Since many of the targeted individuals are widely known as conspiracy theorists, local authorities are inclined to dismiss reports of suspicious activity by the targets, meaning they are usually of limited assistance in alerting the Foundation to SCP-9545&#39;s activities, further impeding Foundation efforts. 

Consequently, three of the five containment operations prior to 2020 were aborted due to Foundation operatives arriving too late to intervene. The remaining two ended in failure when SCP-9545 noticed operatives arriving on the scene and fled the area before it could be captured.

**Addendum (05/06/2024):** Recent technological developments have allowed for more effective means of confirming prior targets, and following successful simulation tests, the O5 Council authorized a survey of individuals claiming to be past victims of SCP-9545, in order to gather sufficient information to set a trap. in the process, three victims were identified and sought for questioning.

[[collapsible hideLocation=&#34;both&#34; show=&#34;&gt; Incident Report: 10:00 AM, 05/06/24 (Brinkstone)&#34; hide=&#34;- Close&#34;]]

[[div class=&#34;blockquote&#34;]]
= **Incident Report**
----
**DATE:** 10:00 AM, 05/06/24

**INVOLVED INDIVIDUALS:** Charles Brinkstone (39)

**LOCATION:** Mellonwoodville, Florida, USA

**FOREWARD:** The subject for the first interview with known survivors of SCP-9545 was Charles Brinkstone, a conspiracy theorist living in Mellonwoodville, who had attempted to contact the police concerning an SCP-9545 sighting in 2021 but was dismissed. Based on commonalities, Foundation computer analysis indicated that the sighting was genuine.

----

**Incident Description:** Foundation agents contacted Mr Brinkstone via the local police, using the pretext of having found &#34;corroborating evidence&#34; that could support his 2021 sighting in order to avoid alarming him. 

However, Brinkstone did not respond to calls even from police officers he knew personally, eventually prompting a wellness check by the police (with Agents Clark and Nauls accompanying them).

Upon answering the door, Brinkstone panicked at the sight of the police, loudly accusing them of either working for &#34;him&#34; or of being &#34;him&#34; in disguise, and refusing to be interrogated a second time. He then fled his apartment via the nearest window in a state of extreme agitation, reaching his car and driving away before police officers could reach him, during which he was heard repeatedly screaming &#34;He&#39;s wearing your faces, you idiots!&#34;

However, upon seeing the Foundation agents waiting by their own car near his escape route, Brinkstone accelerated to unsafe speeds in his attempts to avoid them, ultimately losing control of his car and colliding with a tree at 120 kph. Having neglected to buckle his seatbelt during his escape, Brinkstone was flung through the windshield of the car, suffering critical head trauma on impact with the tree trunk; he was pronounced dead at the scene.

Fortunately, a Foundation forensics team surveying Brinkstone&#39;s apartment discovered that he had documented his encounter with SCP-9545 in his journal. 

According to this document, the information that had drawn SCP-9545&#39;s attention was a photograph of unusual graffiti found at the local airport, painted without any of the staff noticing the perpetrator at work or CCTV cameras detecting anything. Brinkstone had taken this as proof of an alliance between a &#34;shadow government&#34; and shapeshifting aliens, then posted the image to various conspiracy theorist forums along with his theory.

SCP-9545 targeted Brinkstone soon after, resulting in its common pattern of attack proceeding without incident save for Brinkstone&#39;s psychological breakdown. In the entries that follow, Brinkstone becomes increasingly prone to obsessing over random elements of his encounters as the journal continues, most notably fixating on SCP-9545&#39;s habit of playing Stevie Wonder&#39;s “Superstition” through a car radio while stalking him through the streets. 

In the latter stages, Brinkstone&#39;s narration is reduced to seemingly random sentences such as &#34;HE WAS BEHIND ME IN THE BACK SEAT,&#34; &#34;HE RIPPED THROUGH THE GARAGE DOOR,&#34; and &#34;THOSE AREN&#39;T SUNGLASSES, THEY&#39;RE //EYES//.&#34;

The words “Charles Brinkstone? We have a matter to discuss,&#34; are repeated across most of the second-to-last page, along with vague references to being dragged out of bed, the sentence &#34;Tentacle syringe - out of his sleeve, forced under skin of my arm, forced me to tell the truth!&#34; and &#34;WHAT IS THE EXODUS?&#34;
 
Though the graffiti photo could not be found, having presumably been confiscated by SCP-9545 following Brinkstone&#39;s interrogation, a rough sketch of the graffiti has been drawn on the final page.
[[/div]]

[[collapsible hideLocation=&#34;both&#34; show=&#34;&gt; Interview Transcript 1: Hagen&#34; hide=&#34;- Close&#34;]]
&gt; **Interviewed:** Preston Hagen (33)
&gt; 
&gt; **Interviewer:** Agent Joel Fuchs
&gt; 
&gt; **&lt;Begin Log, 11:00 AM, 05/06/24)&gt;**
&gt; 
&gt; **Agent Fuchs:** Please describe the events that led up to the death of your brother.
&gt; 
&gt; **Preston Hagen:** Don’t you already know? You’re the //real// men in black, by the looks of things: you’ve got the records of my official testimony.
&gt; 
&gt; **Agent Fuchs:** We also have audio recordings of your interrogation. You were heard mentioning the Agent when you thought you were alone. You were going to tell the police about him, but your lawyer discouraged you, and all accounts, you continued to follow her advice throughout your trial all the way to your acquittal.
&gt; 
&gt; **Preston Hagen:** And all it cost me was my self-respect. That and the legal fees. Yay.
&gt; 
&gt; **Agent Fuchs:** Please, this is important. Anything you tell us could help other victims.
&gt; 
&gt; **Preston Hagen:** (//sigh//) It all started in 2022. Matt had been into conspiracy theories for a while by then, but that year, he&#39;d gotten obsessed with the idea that the New World Order was using mystical artefacts to mind-control people. I was always trying to tell him how crazy it was, and he was always ignoring me. The pill-popping didn&#39;t help.
&gt; 
&gt; So, when Matt started telling me about being followed by black vans and helicopters, I tagged along whenever he left the house, partly to keep him out of trouble, but mostly just to prove to him it wasn’t real. Surprise surprise, he really was being followed. But not by helicopters. I mean, we kept hearing &#39;em all around us, but never actually //seeing// them.
&gt; 
&gt; **Agent Fuchs:** What about the black vans?
&gt; 
&gt; **Preston Hagen:** Black //van//. Singular. It was outside our house, in the same parking lot when we went shopping, even following us down the street. And always blasting music as well. “Skeletons” by the Brothers Osborne, mainly. But I got close enough to take a good look, and I started noticing odd things.
&gt; 
&gt; During the lulls between songs, I couldn’t hear any sound from the van, not even any engine noise, almost like the music was there to hide how quiet it was. I didn’t even hear the driver react when Matt went apeshit at them one day.
&gt; 
&gt; **Agent Fuchs:** He attacked the van?
&gt; 
&gt; **Preston Hagen:** ...not exactly. It stopped long enough to open a window and drop him a little warning note, but Matt just wiped his ass with it - literally shoved it down his pants and rubbed it up against his butt - and threw the note right back at the van. He was so busy shouting, he didn’t notice that the van didn’t make sound when it drove off. And then, as this thing was rounding the corner, I realized it wasn&#39;t a van at all.
&gt; 
&gt; **Agent Fuchs:** Elaborate.
&gt; 
&gt; **Preston Hagen:** I saw legs. Like millipede legs, hundreds of them moving the car along at once, all hidden behind the tyres and bumpers. Only reason why I&#39;d noticed was because the sunlight happened to catch it at just the right angle.
&gt; 
&gt; **Agent Fuchs:** And what did your brother have to say about this?
&gt; 
&gt; **Preston Hagen:** Zilch. He didn’t notice the legs: his attention stopped at the fact that the van was there at all.
&gt; 
&gt; **Agent Fuchs:** I’m not sure if I understand this; you said he was a hardcore conspiracy theorist, and his arrest record and psych evaluation bear that out, but why would someone so paranoid not look closer?
&gt; 
&gt; **Preston Hagen:** Because Matt wasn’t interested in the little picture. All that mattered to him was that //he’d been right.// He kept bragging that he’d known what was happening all along, that he’d found the one thing that could bring down the Big Bad Whatever The Fuck... and that //they// were “afraid” of him. Can’t forget that bit: Matt had to go on and on about how they were scared of what he’d do next.
&gt; 
&gt; **Agent Fuchs:** Did he specify what he meant by that?
&gt; 
&gt; **Preston Hagen:** Not at first. He didn’t even tell me what he’d been posting. But as soon as the black vans had left us alone for about half a day, Matt popped some Adderall and snuck out of the house when I wasn’t looking. Two hours later, he came back holding this… this… well, it looked like one of those ancient Egyptian canopic jars: this tiny clay thing with human head for a lid and weird symbols carved on its sides. 
&gt; 
&gt; **Agent Fuchs:** And he didn’t tell you where he’d gotten it from, did he?
&gt; 
&gt; **Preston Hagen:** (//chuckles//) Not until his eighth shot of vodka. He said the jar had been stolen from Stanford a few months ago and changed hands between maybe half a dozen conspiracy theorists before ending up with the friend who’d given it to Matt that night. //Matt// thought the jar was one of the occult talismans the world government used to control the population, and he could use it undo their global power forever… or something like that.
&gt; 
&gt; **Agent Fuchs:** And how did he think he could “use” this jar?
&gt; 
&gt; **Preston Hagen:** //Supposedly// he knew a guy on the forums who could show him how. But the vodka made Matt too cocky, and the fucking addies didn&#39;t help: before I knew what was happening, he’d posted selfies of himself with the jar all over his Twitter account.
&gt; 
&gt; **Agent Fuchs:** I see. And it didn’t bother him that he was essentially providing the police with evidence that he was in possession of stolen property?
&gt; 
&gt; **Preston Hagen:** Of course not, he was drunk //and// high! He thought he could blackmail the New World Order into giving him a get-out-of-jail-free card. Every photo he uploaded had the caption “I can use this on you at any time: call off your operatives and free the people, or I will destroy you”.
&gt; 
&gt; (//sighs deeply//)
&gt; 
&gt; He wanted a reaction… and he got one about thirty-five minutes later.
&gt; 
&gt; **Agent Fuchs:** You mean the Agent arrived at your house //that evening?// There was no forty-eight-hour lull between sightings for you?  
&gt; 
&gt; **Preston Fuchs:** That&#39;s right. I’m guessing //they// were keeping an eye on Matt&#39;s social media feeds; the moment the jar selfies showed up, they dropped everything and headed straight for our house. 
&gt; 
&gt; By then, I’d gotten Matt into the shower to sober him up... and for general hygiene: the guy hadn&#39;t washed in about two weeks. I&#39;d left him deodorant on the vanity, even put his smokes and his lighter there as well, just so he’d be in the right frame of mind to be yelled at if he ever stopped doing uppers. And that’s when I heard a noise out in the hall; I was spooked by then, so I grabbed one of Matt&#39;s hunting knives and investigated. 
&gt; 
&gt; All of a sudden, //they// were standing right behind me: six feet tall, slim, dark-haired, dark-skinned, very narrow face, very androgynous features, black suit, black shades. Before I could make a move, they’d grabbed the knife off me, tied my hands behind my back, and threw me into Matt&#39;s bedroom - I&#39;m guessing because it was the closest.
&gt; 
&gt; **Agent Fuchs:** You said Matt was in the shower while you were being captured: he didn’t notice anything amiss?
&gt; 
&gt; **Preston Hagen:** He was drunk, he was high, the shower was running, and he had the bathroom door shut; he wouldn&#39;t&#39;ve noticed the roof caving in. I heard the Agent say &#34;Matthew Hagen? We have a matter to discuss,&#34; and then they dragged Matt out of the shower. Didn’t even let him get dressed.
&gt; 
&gt; Matt started //screaming//. I couldn&#39;t even make sense of half the shit that came out of his mouth: I think there might have been a &#34;I do not consent&#34; in there, but the rest was just Matt shrieking like a howler monkey. Then I heard him crashing around, looking for a weapon, I guess... and I&#39;d left him a can of deodorant and a lighter.
&gt; 
&gt; There was a huge //whoosh// from the bathroom, the Agent let out this... this... roar, like they weren&#39;t even human, and a split-second later, Matt went rocketing past me, buttass naked. After a couple of seconds of screaming, the Agent charged out after him with a massive scorch mark down one arm, black blood pouring down his side. Matt grabbed the knife off the floor where I&#39;d dropped it, then he took the jar out of his sock drawer and held the knife to it.
&gt; 
&gt; **Agent Fuchs:** He tried to //hold the jar hostage?//
&gt; 
&gt; **Preston Hagen:** Key word being //tried.// Matt was saying &#34;One wrong move and the New World Order loses everything!&#34; Next thing I know, the Agent&#39;s expression changed; I think they might have been scared, maybe angry - it was hard to be sure. Then every inch of the Agent’s body just… erupted with these red and black tentacles that shot out of them like grappling hooks, right at Matt. Before he had a chance to react, the Agent&#39;s tentacles slapped the knife away from the jar and... and drove the blade into Matty&#39;s throat, all the way up to the hilt.
&gt; 
&gt; And then Matt pulled the blade out - I don&#39;t know if he was in shock or trying to fight back, but either way, it didn&#39;t work. Next thing I know, he was lying on top of me, bleeding everywhere. I was sure the Agent was gonna kill me next, but instead, they were scooping the canopic jar off the floor, holding it close to their chest like it was a sleeping baby or something. They were even whispering to it.
&gt; 
&gt; Then the Agent reached out toward Matt&#39;s head with their free hand, and their middle finger stretched out, transforming into a long, thin blade, almost like a surgical probe made of black carapace, and they sunk it right into Matt&#39;s left eyeball.
&gt; 
&gt; **Agent Fuchs:** Official records based on your lawyer&#39;s advice state that this injury was inflicted out of desperation during the alleged assault. Do you have any idea why the Agent would have gouged out your brother&#39;s eye?
&gt; 
&gt; **Preston Hagen:** Better than that. The Agent gave me the exact reason.
&gt; 
&gt; **Agent Fuchs:** And why would they tell you?
&gt; 
&gt; **Preston Hagen:** Simple: because I asked. Granted, I didn&#39;t expect to get an answer, but the Agent told me they needed any information they could get from Matt&#39;s brain while he was still fresh, apparently so they could find the source of these jars.
&gt; 
&gt; Once they were finished digging around in Matt&#39;s brain, the Agent let me go. They apologized for tying me up, gave their condolences, then turned to liquid and slid under the door. And that was the end of it… right up until I called the cops and opened a whole new can of worms...[[footnote]]Preston Hagen was accused of murdering his brother but acquitted on the grounds of self-defence, his lawyer having claimed that Matthew had attacked Preston in a fit of amphetamine psychosis.[[/footnote]]
&gt;
&gt; **&lt;End Log&gt;**
[[/collapsible]]

[[collapsible hideLocation=&#34;both&#34; show=&#34;&gt; Interview Transcript 2: Fuller &#34; hide=&#34;- Close&#34;]]
&gt; **Interviewed:** Jodilynn &#34;Jodi&#34; Fuller (16)
&gt; 
&gt; **Interviewer:** Agent Wilford Blair
&gt; 
&gt; **Foreword:** Subject was a resident of Mothwood, New Jersey, discovered by the Foundation less than twelve hours after her reported sighting, and approached for an interview while still hospitalized.
&gt; 
&gt; **&lt;Begin Log, 10:00 AM, 07/06/24)&gt;**
&gt; 
&gt; **Agent Blair:** To begin with, what was it that got the Agent’s attention?
&gt; 
&gt; **Jodi Fuller:** I guess it started with this post I made on the Alternate Conspiracy community. Er, on Twitter. X. Whatever the hell we&#39;re calling it now. I came up with an idea that the lizard people couldn’t fake being human beings anymore because everyone knew how to spot them from all the Youtube videos, so they’d started disguising themselves as objects instead.
&gt; 
&gt; **Agent Blair:** …I see. If you don’t mind me asking, what inspired this particular theory?
&gt; 
&gt; **Jodi Fuller:** Er, a school field trip to the local museum a couple of weeks ago. I wasn&#39;t paying much attention up until the teachers took a bathroom break. The curators weren&#39;t watching, so I snuck off to take a look at one of the upcoming exhibits, the… oh god, what was it? The Occult in the… 19th century?
&gt; 
&gt; Anyway, there was a weird doodad they were getting ready to put on display, still in its crate, this dinky little bronze box covered in symbols, like a steampunk Rubik&#39;s cube[[footnote]]According to the museum catalogue, this was an obscure 19th-century occult device known as a Nereid&#39;s Reliquary, commonly used for sex magic.[[/footnote]]. I wasn&#39;t all that interested at first. But then, for a couple of seconds, I saw these weird… veins running right along the box, like it just grew blood vessels or something, and they stayed just long enough for me to get a picture with my phone before they disappeared. But after a while of looking over the photo and thinking-
&gt; 
&gt; **Agent Blair:** You used it as inspiration for a theory and posted the photo to the forum as well?
&gt; 
&gt; **Jodi Fuller:** Yeah. Well, once I got out of there: a curator was leading some prick in a tailored suit through the exhibit, so I had to sneak past him. I got back to the tour without anyone noticing, we got back on the bus, and while we were waiting for some douchebag in a BMW to get out of our way, I sent off the photo and the theory.
&gt; 
&gt; **Agent Blair:** And how long had you been a member of this Twitter community at the time you posted it?
&gt; 
&gt; **Jodi Fuller:** Uh… ten minutes.
&gt; 
&gt; **Agent Blair:** How long had you been interested in conspiracy theories?
&gt; 
&gt; **Jodi Fuller:** (//mumbling//) ...I hadn’t.
&gt; 
&gt; **Agent Blair:** I beg your pardon?
&gt; 
&gt; **Jodi Fuller:** (//embarrassed//) I’m not a conspiracy theorist. I don’t take any of that bullshit seriously or anything: I made up the whole idea just ‘cause I thought it sounded funny, and I shared it on the conspiracy theory forums because I… well, I just wanted to see if they’d believe it. Just to see what would happen, you know?
&gt; 
&gt; **Agent Blair:** (//sighing deeply//) In other words, it was a prank.
&gt; 
&gt; **Jodi Fuller:** Yes. I know, I know, it’s stupid but I honestly didn’t mean anything by it. I was just having fun. It was harmless. It... it was //supposed// to be harmless...
&gt; 
&gt; **Agent Blair:** And what happened after you posted?
&gt; 
&gt; **Jodi Fuller:** Well, I pretended like I’d be in danger if anyone knew I was sending it, even told them I&#39;d stolen the bronze thingy to fight the aliens in disguise, yaddah, yaddah, yaddah, and then I logged off. That was on the 15th, I think. I didn’t take another look until the 19th, and by then my inbox was overflowing with messages.
&gt; 
&gt; **Agent Blair:** : Did you reply to any of them?
&gt; 
&gt; **Jodi Fuller:** No, I was still acting like I was a missing person. I just read the latest replies, watched everyone freaking out, and then fucked off. Look, I know it was stupid, but I... I just thought it&#39;d be funny.
&gt; 
&gt; **Agent Blair:** But if you didn&#39;t reply to any of them or communicate with anyone on the forum after your initial post, then how did the Agent find you?
&gt; 
&gt; **Jodi Fuller:** …because when I took the photo, I accidentally left location data on.
&gt; 
&gt; (//pause//)
&gt; 
&gt; **Jodi Fuller:** And I&#39;d put my hand on the crate, too: anyone who looked would&#39;ve seen //my// nails right at the edge of the photo.
&gt; 
&gt; **Agent Blair:** Complete with the green-and-black spiral patterns. Very distinctive. 
&gt; 
&gt; **Jodi Fuller:** Anyway, the photo had the location and the date attached, and with my hand in view, the Agent knew it was a kid taking the shot. I was on the only school tour scheduled at the museum for the day, and everyone in class knew my fingernails by sight, so I&#39;m guessing the Agent must have asked around before finding me.
&gt; 
&gt; **Agent Blair:** Did you experience anything unusual in the days before your encounter? Cars following you through the streets, black helicopters, random break-ins, anything like that?
&gt; 
&gt; **Jodi Fuller:** Not really. Dad drove me to school every day, and I think he was in a bad mood about a black van that kept following him and blasting &#34;God&#39;s Gonna Cut You Down&#34; at top volume, but I wasn’t really paying attention - I&#39;m not a big Johhny Cash fan. There were a few helicopters buzzing the neighbourhood for a couple of nights, but I didn’t think there was anything weird about it. And someone trashed my room on the 21st, but I thought it was just my little brother playing pranks again.
&gt; 
&gt; **Agent Blair:** You really didn’t notice //anything?//
&gt; 
&gt; **Jodi Fuller:** Not until last night.
&gt; 
&gt; **Agent Blair:** Describe the event in detail, please.
&gt; 
&gt; **Jodi Fuller:** Well, Dad was working late, my Mom&#39;s on a business trip to Vegas, and my brother was staying at a friend&#39;s house, so I was alone. Around 10 PM, I got up to go to the bathroom, and while I&#39;m there, the power went out.
&gt; 
&gt; Then, while I was walking back to my room, this //voice// behind me said &#34;Jodilynn Fuller? We have a matter to discuss.&#34; I turned around and... she was just //towering// over me, at least eight feet tall, skin so pale she was almost glowing. I was already scared, but then I saw the suit and the earpiece, and I thought &#34;oh god, the Feds are here.&#34; I started running, tripped up, fell down the stairs, and next thing I know, I&#39;m lying on the first floor landing with a broken leg.
&gt; 
&gt; Then she was standing over me, asking me all kinds of questions about where the bronze box was and how I hid it and what I was planning to do with it and how I knew what it really was. I think I spent the first minute talking gibberish and lying about everything. Christ, I was so scared I even tried to pretend that she&#39;d gotten the wrong girl and my real name was Sondra Blake - my mother&#39;s maiden name. No dice, though.
&gt; 
&gt; Eventually, I calmed down enough to admit that I&#39;d been lying and the whole thing was a prank. The Agent said, &#34;then why is the item gone from the museum?&#34; News to me, I hadn&#39;t heard of any break-ins. I tried to tell her that, but she just reached down and grabs me by the head, puts one hand over my entire face and then...
&gt; 
&gt; **Agent Blair:** Yes?
&gt; 
&gt; **Jodi Fuller:** Bugs. There were bugs crawling out of her hands, hundreds of beetles just oozing from the fingertips of her gloves... and then they were all over my face, in my eyes, up my nose, in my ears - Jesus Christ, I could feel them creeping //behind my eyeballs.// I wanted to scream, but I didn&#39;t want to open my mouth in case the bugs went in there too, so I just sat in silence for about thirty seconds while they crawled around inside my head. Then, all of a sudden, the bugs were crawling out of my head again and back into her fingers.
&gt; 
&gt; Once as I was done crying, I could tell the Agent was pissed off. And it wasn&#39;t just that she looked like she wanted to bite my head off: her face kept... rippling, like her skin was just going to peel right off her skull like a mask, and he fingers were lengthening into tentacles. 
&gt; 
&gt; After a while she said &#34;at least your //memories// are honest. &#34; Then she started growling at me, telling me about how much time my prank wasted, how it gave the real thief time to escape... no wait, that wasn&#39;t the word she used; she said &#34;kidnapper.&#34; Anyway, she said, &#34;at least you saw his face and his car. I can work with that.&#34;
&gt; 
&gt; **Agent Blair:** When would you have seen this &#34;kidnapper&#34;, though? Or his car, for that matter?
&gt; 
&gt; **Jodi Fuller:** He was the guy in the suit I saw at the exhibit. The BMW that blocked us on the way out of the museum was his. I&#39;m pretty sure I heard the Agent say his name, too: Carter, I think she called him, Marshall Carter.
&gt; 
&gt; **Agent Blair:** ...I see. What happened once the Agent was finished interrogating you?
&gt; 
&gt; **Jodi Fuller:** She said, &#34;Please don&#39;t waste my time again, Ms Fuller. Lives are at stake. This isn&#39;t a game.&#34; I was nodding, telling her I was sorry, I&#39;d never do it again and... then there was this pain in my arm, and then I was out cold. 
&gt; 
&gt; When I woke up, the paramedics were loading me into an ambulance, and everyone was telling me I&#39;d been drugged in a home invasion. Nobody believed anything I told them about the Agent, said I was just tripping on whatever drugs the burglars gave me. Even the Alt Conspiracy post had been deleted, so the evidence was gone. Still... it&#39;s not all bad news.
&gt; 
&gt; **Agent Blair:** Why&#39;s that?
&gt; 
&gt; **Jodi Fuller:** Once the nurses gave my phone back, I found out that the Agent deleted my Twitter account, too. I&#39;ve been meaning to do that for months but kept talking myself out of it. I guess that was the weird shapeshifting bug lady&#39;s way of saying sorry after breaking my leg and scaring the shit out of me. Like my grandma says, every cloud&#39;s got a silver lining.
&gt; 
&gt; **&lt;End Log&gt;**
&gt; 
&gt; **AFTERWORD**: Approximately two hours after Ms Fuller&#39;s confrontation with SCP-9545, a known Marshall, Carter &amp; Dark courier was found dead in a traffic collision on Interstate 95. CCTV cameras in the area had been disabled, and no witnesses observed the crash. The courier&#39;s only luggage, a sealed crate, had been forcibly opened and the contents removed, suggesting that SCP-9545 was able to acquire the Nereid&#39;s Reliquary despite the delay.

**Operation Setup:** Following the successful extrapolation of data from all three confirmed witnesses, Foundation Intelligence was able to develop a preliminary strategy for the possible capture of SCP-9545 based on its most consistent targets.

It was believed that creating a mimicry of the Nereid&#39;s Reliquary would serve as effective bait for the entity, with additional modifications to make it more desirable, including the graffitied sign that Mr Brinkstone had documented, samples of hieroglyphs recalled by Mr Hagen, and the organic veins briefly witnessed in the original artefact by Ms Fuller. However, even with witness testimony and display photographs of the artefact available, recreating the veins that Ms Fuller photographed proved difficult without using extranormal means.

With the permission of the O5 Council, [https://scp-wiki.wikidot.com/scp-8078 SCP-8078] was selected as the ideal candidate for the role. Under the supervision of Research Assistant Amanda Teo, SCP-8078 was presented with a display photograph of the Nereid&#39;s Reliquary and given a detailed description of both the veins and the sign. After some coaching, SCP-8078 was able to accurately mimic the shape of the artefact, the veined flaw on its side, and the graffiti sign[[footnote]]Here rendered as a bas-relief on the base of the reliquary.[[/footnote]], before being photographed.

In order to provide a convincing backstory for the trap, a Foundation agent on the Alternate Conspiracy site&#39;s main forum claimed that they had discovered another &#34;alien artefact&#34; similar to the items that Fuller had reported. After numerous preliminaries in which details that had previously drawn SCP-9545&#39;s attention were mentioned, another forum user (also a Foundation agent) then offered to buy the artefact; the two agreed to meet in person to exchange information and items, with the agents  &#34;accidentally&#34; posting the rendezvous time and address on the public forum, before deleting it twenty minutes later.

The location chosen was the Roadside Rest Motel in Leafhill, Vermont, at 3:00 AM, 22/06/24. Multiple agents had been stationed in the building to pose as guests, either to operate surveillance or to provide backup; the &#34;buyer&#34; and &#34;seller&#34; were given Room 7 as a rendezvous point, which would double as a trap for SCP-9545: this room was modified to seal all windows, vents, pipes as soon as the target entered, and equipped with an airtight containment unit that SCP-9545 could be driven into. 

MTF-Epsilon-9 (“Fire Eaters”) was on standby for this operation, with members stationed individually inside Room 7, and additional operatives waiting in a truck in the motel parking lot. As soon as the target entered Room 7, these operatives were to force SCP-9545 towards the containment unit, using flamethrowers to drive it away from escape routes and prevent it from engaging in direct combat. The remainder were to cover the door once SCP-9545 was inside to prevent any escape attempts.

Finally, at the recommendation of the O5 Council, Research Assistant Amanda Teo was fully briefed and attached to the mission as a consultant, observing the events from a surveillance truck. Given its extreme distance from the trap, the surveillance truck was provided only limited security, though all personnel were equipped with sidearms loaded with incendiary bullets, and the surveillance truck was equipped with an array of heavy-duty electroshock weapons set up along its bodywork. [[footnote]]It was anticipated that electricity would be able to injure SCP-9545 without risking fatal injuries to Foundation personal, perhaps to the extent of nonlethally incapacitating the entity.[[/footnote]]

As per documentation protocols, the surveillance truck was equipped with an internal &#34;black box&#34; recording device, with backup devices, life-signs monitoring systems, and GPS trackers provided to all passengers.

[BEGIN LOG]

**Research Assistant Teo:** (//static//) -the fuck away from me!

[[collapsible hideLocation=&#34;both&#34; show=&#34;&gt; Concluding Report&#34; hide=&#34;- Close&#34;]]

Despite the efforts of Foundation personnel on the scene, SCP-9545 escape from the rooftop before agents could reach it. Though it was subjected to multiple disabling shots by snipers during its ensuing flight, it was able to recover long enough to avoid attempts to implant it with tracking devices, successfully evading all further attempts to locate it that evening.

Research Assistant Amanda Teo was found to have suffered a broken left leg and a broken right arm during SCP-9545&#39;s efforts to pacify her, along with three cracked ribs sustained during her initial abduction and the aftereffects of the drugs used to question her. After twenty-four hours observation, it was determined she had not been subjected to any anomalous influence or long-term harm. She is expected to make a full recovery and has received special commendation for her conduct in the field.

Though the operation itself was a failure, the information recorded thanks to Research Assistant Teo was deemed sufficient to prepare Foundation operatives for future capture attempts.

As SCP-9545 appears to be the only member of the Children of Proteus with the necessarily psychological traits to serve as an active threat to Foundation interests, the rest of the species are to be considered non-combatants until further notice.

Finally, the O5 Council would like to make it known that they did not assign Amanda Teo to the mission as bait and any similarities to past instances in which ties to polymorphic entities were exploited for the sake of a mission are entirely coincidental.

In light of SCP-8078&#39;s association with SCP-9545, Research Assistant Teo has been permitted to reveal this information to SCP-9545 in order to analyze its reaction. As SCP-8078 has unconsciously exhibited residual memories from its progenitors before, it is believed that this tendency may reveal additional data concerning the Children of Proteus if prompted by the appropriate stimuli.
