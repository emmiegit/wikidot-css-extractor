[[include component:image-block name=quake.jpg| caption=Structural damage on the Interstate 10 caused by SCP-9224.|width=300px ]]

**Item №:** SCP-9224

**Object Class:** Diogenes

**Division:** [https://scp-wiki.wikidot.com/scp-9965 Bioweaponry]

**Special Containment Procedures:** Item SCP-9224 is housed within Enhanced Holding Cell 17 at the Victorville Site, and is subject to research and development under the Bioweaponry Division. The cell consists of 1.9 feet concrete walls lined with 12-gauge carbon steel plating. The chamber is to remain sealed at all times outside of scheduled feeding periods.

Three times weekly, a live, sedated pig (minimum 80 kilograms) is delivered into the chamber via a gravity-fed chute positioned in EHC-17&#39;s northwest corner. Specimen is to be fitted with a single-use disposable rectal speculum prior to delivery to facilitate entry by SCP-9224 and reduce splatter.

Following five personnel casualties during sanitation attempts, routine cleaning of the containment chamber has been indefinitely suspended. Biohazard accumulation is monitored remotely and is not considered a structural risk. Furthermore, SCP-9224&#39;s tendency to roll around and coat itself in refuse seems to have supplanted its previous undesirable behavior of repeatedly bludgeoning itself against EHC-17&#39;s walls.

There are no ongoing efforts to remove the humans from SCP-9224 at this time.

**Description:** Recovered following a civilian incident in West Hollywood, California. The entity was reported as &#34;emerging from the ground&#34; and targeted four Canadian tourists. There were 26 casualties and 49 instances of gross rectal damage during transportation to Site Victorville. (See File [[[file-scp-9224-194b|SCP-9224-194B]]].)

Item SCP-9224 is a bilaterally symmetrical, needle-shaped organism, 9.5 feet tall and roughly 8 inches at its widest point. Both ends taper to points with an estimated tip radius below 0.3 millimeters. Composition is unknown. Microhardness testing conducted remotely has returned values exceeding those of any known biological structure. The exterior surface is covered in retractable spine-like processes, each approximately 2 inches long. Each spine contains a hollow channel connected to an internal reservoir capable of delivering fluid into surrounding tissue upon penetration.

SCP-9224 moves through a rapid ballistic leaping mechanism. No source of propulsion has been identified. Entity covers up to 65 feet per leap and produces no detectable sound; seismic and air-displacement sensors have recorded only negligible disturbance during observed movement.

SCP-9224 is an obligate ambush predator, with stalking periods ranging from 4 to 21 hours. Prior to acquisition by the Special Collections Program, SCP-9224 is known to have resided within the Los Angeles County municipal sewer system. Civilian testimony and recovered evidence indicate its preferred hunting method involved navigating wastewater pipes to terminal plumbing fixtures and surfacing within toilet bowls, where it would encounter exposed anatomy in a seated posture. SCP-9224 would then accelerate vertically into the anal canal of the individual. The majority of pre-acquisition incidents are attributed to this method.

Upon entry, the captured organism (designated SCP-9224-beta) does not sustain the expected bodily trauma, instead undergoing rapid paranormal hyperelasticity, stretching to accommodate SCP-9224&#39;s full dimensions without visible injury. This effect is believed to be chemically induced by agents delivered through SCP-9224&#39;s spines during penetration.

SCP-9224-beta conform tightly around SCP-9224&#39;s surface and form a biological sheath. Over time, SCP-9224 accumulates additional layers through repeated predation. As of the most recent imaging survey, SCP-9224 is encased in 78 distinct layers of SCP-9224-beta, comprising cattle, swine, brown rats, cats, dogs, seagulls, and approximately 22 humans. Inner layers undergo progressive histological fusion over weeks to months, eventually forming a continuous, undifferentiated biomass. Entity is believed to derive sustenance from this congealed inner layer. 

SCP-9224&#39;s internal reservoir system contains at least seven chemically distinct fluid agents, of which five have been provisionally categorized based on observed effects. These agents are delivered through the spine apparatus and appear to be deployed selectively depending on situational context. The most commonly observed effect is a rapid sclerotic hardening of affected tissue, achieving surface hardness sufficient to resist 7.62x51mm NATO at point-blank range within 1.2 seconds of injection. SCP-9224 frequently utilizes this agent when leaping through solid barriers during pursuit. 

Additionally, outer-layer SCP-9224-beta have been observed developing functional limbs from exposed surfaces of the epidermis upon injection, with interior developments occurring invasively and integrating with musculature. These limbs are fully articulated, capable of grasping and hurling objects up to 40 kilograms, and have been observed wielding and discharging SCP-issued sidearms with accuracy. Testing has revealed the advanced behavior of these limbs, up to and including reproducing the third movement of Claude Debussy&#39;s //Suite bergamasque// (//Clair de lune//) on a provided electric keyboard through mediated electroshock conditioning. 

Hunting efficacy is inversely correlated with total attached SCP-9224-beta layers. Distressed vocalizations produced by outer-layer SCP-9224-beta have been observed to alert potential prey and compromise the entity&#39;s ambush strategy. 

//Note: Howdy, bunkermates. Just stopping by to let everyone know that the SCP-9224-beta instances do not formally classify as privileged operators, so all requests for termination cannot be fulfilled under the proper channels. We&#39;re ignoring forms pertaining to this matter from here on out, but you&#39;re free to take it up with your project leads. Or y&#39;all can always wait for those suckers to be slurped down by Mr. Butt Monster eventually. Thanks!!! -[https://scp-wiki.wikidot.com/scp-9560 W.][https://scp-wiki.wikidot.com/scp-8402 W.]//
