[[include component:preview
text=The containment procedures described by SCP-9425 do not adhere to Foundation ethical standards, either present or historical.]]
=====

[[&gt;]]
[[module Rate]]
[[/&gt;]]

**Item #:** SCP-9425

**Object Class:** Euclid

**Special Containment Procedures:** SCP-9425 is kept in a manila folder placed in a locked filing cabinet in Site-204&#39;s overflow storage. It is affixed to the cabinet&#39;s floor with glue. SCP-9425&#39;s filing cabinet is not to be disturbed or inspected.

**Description:** SCP-9425 is a piece of paper with printed text describing special containment procedures for a non-existent Keter-class item. The bottom of the page is torn off, obscuring one or more lines of text. The composition of the ink and paper suggest that SCP-9425 was produced sometime in the 1970s.

The fictional anomalous item in question is designated &#34;SCP-139 - Possible Skull of the White Div&#34;. SCP-9425 does not describe this anomaly (which has no relation to the actual SCP-139), though several properties can be inferred. Namely, it is presented as an infohazardous object that is highly sensitive to the emotions, physical positions, and daily routines of personnel involved in its containment. The containment procedures described by SCP-9425 do not adhere to Foundation ethical standards, either present or historical.

Relevant documentation produced by Supervisor Brandon Biggs on 2007-06-05 has been transcribed below. It was recovered from Site-163.

[[div class=&#34;blockquote&#34;]]
11:03 - Read a news report about old filing cabinets turning up at yard sales with government documents still inside. Walt wasn&#39;t busy, so I sent him to comb through storage and make sure we aren&#39;t making the same mistake.

[EXTRANEOUS DOCUMENTATION REMOVED]

14:41 - Walt found a few receipts in the storage room, but nothing that would raise suspicion. Shredded the receipts.

[EXTRANEOUS DOCUMENTATION REMOVED]

16:16 - Walt mentioned a folder stuck to the bottom of a filing cabinet drawer. He assumed it was empty, but is having second thoughts. Gave him a letter opener and told him to pry it out.

16:40 - Walt is taking a while.

16:52 - There was something in the folder after all. ConProcs for SCP-139. We don&#39;t handle skip documentation, so I have no idea how those got here. I&#39;ll check it out in the morning, no way in hell I&#39;m pulling overtime to handle this.
[[/div]]

Supervisor Biggs did not return home that evening, prompting an investigation beginning at 20:43 local time. All loose items in Biggs&#39;s office, including furniture, were found pushed into one corner of the room. Biggs&#39;s corpse was standing in the opposite corner, facing the wall and standing in a metal bucket; an autopsy showed that his stomach contained 1.3kg of printer paper and 0.5kg of salt. The cause of death was hypernatremia.

All items in Biggs&#39;s office were subsequently transported to Site-62 for examination. However, SCP-9425 was not listed in Site-62&#39;s intake log, suggesting that it was either misplaced or overlooked. The documentation describing SCP-9425&#39;s discovery was noted and SCP-9425 was marked as an item of interest //in absentia//.

SCP-9425 was next located on 2018-11-26 at Outpost Z-51, a high-security document storage facility with 42 employees. Almost all objects in the outpost had been moved into the basement; 179 empty metal buckets were scattered through the rest of the facility. The bodies of Outpost Z-51&#39;s personnel had been dismembered, packed in salt, and stored in 42 separate filing cabinets. These cabinets were placed in a row in the attic, with SCP-9425 on the floor in front of them. No other written materials were found in the facility.

Current containment procedures, based on the initial conditions of SCP-9425&#39;s discovery, were implemented following this incident.

SCP-9425&#39;s anomalous properties, if any, are unknown.
