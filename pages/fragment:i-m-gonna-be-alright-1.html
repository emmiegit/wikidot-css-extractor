    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>+ Are you Ok?

It was bright outside the den. When the buzzing insects lowered their voices, she noticed the others had already ventured far. There was only one now, resting in the patches. She tried to approach him, but he kept getting further away. He opened his eyes and after a  wink, took off.

She raced after his shadow, a hare behind the cloud out of reach. Dew leapt in the air with their stride across the wet ground. The gap still widened. He pretended not to notice her so far below.

They reached a field introducing the thicket ahead where she knew not to go. He stood in the center, face still enough to see the tremors of his whiskers. She paused, planning her next move.

쿵…

쿵…

She declared her challenge. The den they came from was far in the distance, any further would be dangerous. As the thought pulled her focus, he escaped into the tall grass.

She faced the blades, hesitating. They opened so easily for him. But, she wasn’t going to lose after coming this far. She crossed into the forbidden garden after him.

She followed the sound of breaking bramble, until it was drowned out by the cry of frantic waters. There he was again, a leaf guided by gale, landing on the other side of the river.

쿵~쿵~

쿵~쿵~

Her heart murmured as she pondered how to cross. 

But she would get across. 

If he could, she can. He was an idiot. The kind of dummy who would get in trouble just to make people mad. Just to make her mad! She was small, but she was not stupid.

She climbed a reed, clinging. She began a rhythm; back and forth, back and forth, swinging the reed to the other side. She hung on with all her might as the water tried to devour her. She was not weak!

The reed gave way before she did, tearing at the stem. But she let go before she lost herself in the waves. She grabbed the stem of another across with her ear outstretched.

She held on, catching glances as he binkied around before melting back into the mist. 

She was not stupid!

Her eyes resisted the crash of wind and water long enough for her to leap to the other side. She trudged forward, forgetting its sound and terrors with it. She had to bring that dummy back.

One step.

It only took one spot where the ground wasn’t firm to slip.

쿵쿵!

쿵쿵!

The world revolving, a mess of blue and brown with splotches of red until a white spark scared the color away.

Where was she now?

쿵쿵…

Down a mountain?

쿵쿵…

A cliff?

쿵쿵…

She could hardly make sense of her surroundings. Where was that dummy?

An arm reached out from below her. It was her arm but it looked…wrong. Her grip on the ground was tight with the only paw she could feel.

아빠? 엄마?

She struggled to flip over. Her legs, they also looked…wrong.

할머니! 오빠! Where was everyone?

쿵~! 쿵~! 쿵~! 쿵~! 쿵~!

She began to weep as she lost strength. The tears made her eyes burn slower in the light reflecting through the mist. Her wails became a duo. A girl stared at her with eyes as large and wet as the sea.

“Stop crying.&#34;

쿵~! 쿵~! 쿵~! 쿵~! 쿵~!

&#34;Good. Now heal your legs.”
