**[http://scp-sga.wikidot.com/scp-sga-002 SCP-SGA-002]**
**Made By:** [[*user Deadly Bread]]
**Translated By:** [[*user MasterTman2]]
[[include :scp-wiki:info:end]]

**Item #:** SCP-SGA-002

**Object Class:** Safe

**Special Containment Procedures:** SCP-SGA-002 is kept in a standard cold storage container in Site-47&#39;s safe-class containment wing. Access to SCP-SGA-002 is limited to individuals assigned to building a flavor profile for the anomaly. At least one D-Class personnel who has previously consumed SCP-SGA-002 and reacted positively to its flavor is to be kept on-hand for testing.

**Description:** SCP-SGA-002 collectively refers to 58 kg of ice cream, contained in standard 1.4 liter tubs. Labeling on these tubs claims them to have been produced by &#34;Little Angels Dairy Farm&#34;, although no company of this name is known to exist ̣. SCP-SGA-002 is white in coloration, and appears visually identical to non-anomalous vanilla ice cream. SCP-SGA-002 is chemically indistinct, with all attempts to isolate and identify specific ingredients and chemical compounds failing. Testing has similarly failed to produce chemical reactions normally produced in standard cream, milk and sugar.
 
SCP-SGA-002 harbors antimemetic properties transmitted though the gustatory system. These properties prevent memories of SCP-SGA-002 from being properly encoded in human memory, specifically targeting the subject&#39;s sense of taste. Individuals who have consumed SCP-SGA-002 are unable to to communicate details regarding the flavor of SCP-SGA-002, only being able to describe it as &#34;SCP-SGA-002&#34; or &#34;ice cream&#34;. Despite this, individuals who have previously consumed SCP-SGA-002 are able to recognize its flavor universally, and have a 100% identification record across 107 double blind taste tests.
 
**Addendum.002.1:** Current attempts to determine the flavor of SCP-SGA-002 are centered around ingesting the anomaly alongside additional chemically distinct items. As of 04/23/2020, over 540 individual items have been consumed alongside SCP-SGA-002, with a majority of which being considered complementary towards SCP-SGA-002.
 
The following are several notable toppings considered complementary with SCP-SGA-002:

* Melted chocolate
* Mint extract
* Candied fruit
* Cooked meats
* Raw egg yolk and eggshell
* Sawdust
* Coins of varying value and origin
* Sections of polystyrene foam packaging
* Unprocessed cellulose
* Human hair
* Ping-pong balls
* Small rodents (deceased)
* Small rodents (alive)

The following are toppings not considered complementary with SCP-SGA-002:

* Vanilla flavoring</textarea></pre>
