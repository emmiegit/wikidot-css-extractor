Hello, this is my author page. I&#39;m not one for visual design, but maybe I&#39;ll make this look fancy one day.

-----

Anyway, here&#39;s the thingies I wrote in the order I wrote them:

[[[SCP-8117]]]: Life&#39;s Got You Down?

[[collapsible show=&#34;Commentary&#34; hide=&#34;- My first article&#34;]]
I&#39;d wanted to write something for the site for years and only started making attempts in early 2024. My first few ideas weren&#39;t great (Bike wheel that gives birth to clones of people, a growing line of people that compels others to join it) and I took a short break. That short break lasted until New Years Eve where I randomly came up with the idea for this article. It was initially just one agent in the basement, but I got some advice from a critter and made it two. I&#39;m very glad I ended up going with that too because someone just monologuing for three full transcripts would&#39;ve been painful to write and to read.

All in all, I think it&#39;s a decent first effort and I&#39;m happy with how it turned out.
[[/collapsible]]

-----

[[[SCP-8704]]]: Sir Frederick and the Mighty Morphin&#39; Power Sword

[[collapsible show=&#34;Commentary&#34; hide=&#34;- Silly sword man&#34;]]
Came up with this idea while playing Risk of Rain 2 at 1am with some friends. First title idea was &#34;The Place Where He Inserted the Blade&#34;, but I scrapped that pretty early on. Fun fact, in the idea&#39;s infancy, I was going to have Sir Frederick appear as different vital historical figures throughout time, but decided against it because the whole point was that he was just a normal person who wanted to do the right thing. It&#39;s the only lighthearted thing I&#39;ve written and a sequel is currently in the works.

While I like the idea of my first article more, I think I executed this one far better.
[[/collapsible]]

-----

[[[Everything You Can Think of is True]]]

[[collapsible show=&#34;Commentary&#34; hide=&#34;- But a Dream is amazing and I want to do it justice&#34;]]
This was meant to be the first entry in my team&#39;s series for Public Domain Con. Unfortunately, life got in the way for all of us and we dropped out. This remains as the only part of the story line. The prose is probably the strongest point, but after a lot of contemplation I&#39;m not really sure if I&#39;m happy with the piece as a whole. It&#39;s meant to be part of But a Dream, a canon that I adore, and the most easily recognized part of But a Dream is its unique imagery and mood. I don&#39;t really think I got even close to matching that. I plan on either revamping this in the future or making a concerted effort to nail down the right tone for the sequel (which is also in the works).

All in all, could be a lot better.
[[/collapsible]]

-----

[[[SCP-8463]]]: Lookin&#39; into that big empty

[[collapsible show=&#34;Commentary&#34; hide=&#34;- One of many holes in classic con&#34;]]
Here&#39;s something that&#39;s actually pretty good. This is my submission for classic con and my highest rated article as of now. It&#39;s a hole that kills you.

Image is from an old well in an abandoned cornfield. I could honestly write another article using images from that area alone. So many old run-down buildings and farming equipment. Moving on from that though, the political commentary was not initially a part of the article at all. It began as just &#34;weird thing with creepy interview&#34;. The first log was significantly longer, including a lot of extraneous details, and the speech was a conversation with the mayor. Once I decided to actually put more meaning into it, there was an emphasis on unseen mental health issues which can still be found in the current draft (Eliza&#39;s black mark, psychiatry building being removed) but that got overshadowed quickly by the mayor&#39;s speech.

I&#39;ll probably end up editing this once the contest is over. As of now, I&#39;m pretty happy with how I&#39;ve done.
[[/collapsible]]

-----

[[[SCP-1166]]]: The Blyd

[[collapsible show=&#34;Commentary&#34; hide=&#34;- Another hole&#34;]]
My wonderful co-author, Seal, was working on this for the Summer of Doom anthology. We brainstormed a lot of the plot structure together over the course of a week and when they reached a point where they just had no idea what to do, I offered to co-author.

The concept is almost entirely Seal&#39;s with ideas intertwined from me. The block of flesh at the bottom was me, as well as most of the little flesh things underneath it. I was the primary writer for the interview after which Seal touched things up a bit. Otherwise, this is really their project.

As a little side-note, this is the first thing I&#39;d worked on that reached +50 in under month (that wasn&#39;t a contest piece) so a nice little milestone there.
[[/collapsible]]

-----

[[[SCP-9030]]]: Take It On the Chin

[[collapsible show=&#34;Commentary&#34; hide=&#34;- Mm, pork&#34;]]
This went through way too many drafts. I can run through all of them here since I didn&#39;t want to clog the author post.

Initially, this was just a TV channel of a man in a horse mask drinking soup and speaking gibberish. Nothing good came of it and no one ever saw this version. Next was a &#34;Too Many Cooks&#34;-esque article about a TV that &#34;animal-ified&#34; the characters in it. There was a wolf caricature running around killing all of them and he eventually got burned alive in a furnace. Nico told me outright that it just wasn&#39;t working at all and that helped me to start brainstorming something that actually would.

Afterwards, it became a hostile pataphysical entity that added pigs to TV shows and then killed them. The bulk of it was a really long, boring log that went over multiple recordings and had an ending that was way too fucking cool for this article and didn&#39;t fit. A few ideas from this draft might end up in a future story, but they just weren&#39;t meshing here.

Now, right before crystallization, I did another rehaul. This time, it wasn&#39;t some 5k word slog, it was half as long and focused on three guests. I tried to weave in some themes regarding sexual abuse in Hollywood (A wolf in sheep&#39;s clothing seemed like a pretty clear metaphor, it&#39;s also why Conti is in a wool jacket in this draft) but even after research I didn&#39;t believe I was in a state to accurately explore that topic. Dysadron also helped refine the article at this point by encouraging me to tighten down on details and focus in on only a few specific things.

After this, we reached the final draft. Some changes were made after the initial version, especially in regards to the ending, but otherwise I was done. The release from finally finishing this was amazing and I think it&#39;s given me a better grasp on how to handle horror in general.

Happy 9kcon everyone, excited to see what slot I get.
[[/collapsible]]
