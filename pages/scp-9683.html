    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>**Item #** SCP-9683

**Item Class:** Uncontained

**Special Containment Procedures:** SCP-9683-2 instances are to be housed in containment chambers that meet the requirements specific to those anomalies. These chambers must have adequate surveillance and security measures. Current documentation indicates that SCP-9683 cannot be contained, as it does not exist as a physical object or substance but is instead an ability that SCP-9683-2 instances possess.

**Description:** SCP-9683 refers to a property that can be attached to various objects. When applied to a non-sentient object, it makes the object indestructible. For sentient entities, it enables the object to adapt to attacks, similar to the capabilities seen in SCP-682. Any object exhibiting SCP-9683 is reclassified as SCP-9683-2 and is to be placed in Foundation custody to facilitate further investigation for anomalous features. According to existing records, four instances of SCP-9683-2 are currently documented.</textarea></pre>
