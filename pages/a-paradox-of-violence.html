[[==]]
Violence. It&#39;s a paradox, violence. Everything would live better without it -- absolutely everything. Every animal, every plant, every microbe. If nothing ever fought for anything, we would live in perfect equilibrium with our resources -- only as much as could be sustained. In fact, if nothing had ever found out to be violent, we would likely all be plants.

But violence is not always as obvious as the squirrel&#39;s entrails twisting out over the mulch. Once the world was covered completely in green, soaking up every possible ounce of sunlight to exist, and then a new seed was dropped beneath the dense foliage, with naught but darkness to nurture it, what then? Would it be reasonable to ask the plant to simply die, to ask that no seeds were planted until those crowding out the light breathed their last?

Maybe a perfect world wouldn&#39;t see the birds with broken necks lying among the roots. But perfection is impossible. As soon as one plant, if even by happenstance, grew taller than the rest and thus took more sun while casting its long, sinuous shadow -- well, the game would have to begin, and the goal is always moving so the playing never //stops//. Yes, the starving are right to kill to live, if one considers life itself at all right.

A primate slashes its own throat, and it gives itself to [[[SCP-8441|the tree]]].

Years later, the primates play their own game. They slash the throats of pigs to sate the tree, allowing safe passage of their own kin through the forest. Curiously, they leave the tree alive, which blooms beneath their noses and casts spores into the wind. Under their watch and care it gets through three cycles of blooming, beyond which its own genetics fail it -- never having lived long enough to produce so much, a hitherto invisible flaw corrupts its further attempts.

Less than a hundredth of its possible progeny survive the rooting process. In their germination, they reach downward instead of upwards, meeting the extant fungal networks in the ever-thinner forests. They begin with a gregarious role in the soil of the ecosystem, giving and receiving and transporting nutrients. Through this process they gain a sense of the foliage of their environment, and select a target.

They grow as a new plant. A tree, in many cases. Bushes in others. Sometimes a fern, or a grass, though size is selected for as best as they can. Up grows a new vampire, a new temptress. The human environment suits them -- their natural predators are diminished, and once their role is revealed the forests now have few defenses against them. They thrive in this new environment, to their own detriment.

Violence is a paradox. With nothing to keep them in check, they outlive their usual expirations to take more from the forests than they can give.

Their success even brings the attention of the humans who have cultivated this new world. Too many of them now to entirely suppress, some humans find use of them. The primates are imperfect social beings -- without direct links between their bodies and minds, social rules must be created to determine who belongs to and benefits from their groups and hierarchies. In another paradox of biology, large wastings of resources are paramount towards this end -- one must be willing to give up life&#39;s makings to prove devotion and cooperation, for otherwise mimicry would be too easy. If there were no detriment to being in the group, then how easy it would be to parasitize and pretend.

The humans find use for the trees -- the paradox meets another, as humans dance around and one so selected is slain at its base.

Over time, though the time goes fast, the things are domesticated. They quickly forget how to attract prey, as food walks right up to them. Those antagonized begin to fall and fail. A new equilibrium is found, relying not on the forests but on the humans. From the brink of extinction, they become deities, as the few that had been in the long forgotten past had told the current generation through their genes that they one day might be.

They spread. The world warms, the resources on which the humans rely dwindle. Self-sacrifice selects itself out of the workings, and animal sacrifice too diminishes. Some hopeful, sad settlements attempt offerings of herbs and plants, even tokens of metals and crafted things, but still the trees die. Some, the longer lasting, reclaim their ancestry, and entire outposts are murdered among their roots. But those die just the same. And in their sagging trunks and leaning, leaking frames, the humans see omens and tragedy. The humans see dead gods and horrible futures. The tree is nothing but a mimic, and a predator. Still, the humans are not wrong.

In a desperate measure, some spores lay entirely dormant, saving themselves in a hope that in the coming decades -- maybe they could even last a century, if luck is truly on their side -- the tide turns. Once one is touched by the groping roots of a mushroom, once the networks are recreated, maybe they will sense the time is right and sprout. Until then, they wait. Like all successful predators, they lurk, they lounge, and, one can imagine, they laugh.

Until then, they wait. Until then.
