**Item #:** SCP-9830

**Object Class:** Nonexistent

**Special Containment Procedures:** SCP-9830 does not exist, and therefore containment is unneccessary. Any individual or group who states the contrary is to be tracked, located, and terminated by order of the O5 Council.

**Description:** SCP-9830 does not exist.

**Addendum 9830-1:** A series of actions taken in response to statements of SCP-9830’s existence, by order of the O5 Council.

||~ Personnel Reprimanded||~ Personnel Claim||~ Action Taken||
||Dr. Marshall Hughes, Level 3 Researcher||SCP-9830 does exist.||Operatives of Mobile Task Force Alpha-1 (“Red Right Hand”) located and executed Dr. Hughes via gunshots to the head. Termination was successful.||
||Dr. Eric Douglas, Level 3 Researcher||SCP-9830 does exist, and containment is necessary.||Alpha-1 operatives located and executed Dr. Douglas via same method as above. Termination was successful.||
||Dr. ███ Merriam, Level 4 Researcher, former member of Site-176 Council||SCP-9830 does exist, and threatens the lives of all personnel stationed at Site-176.||Dr. Merriam was found deceased by Alpha-1 operatives,[[footnote]]Cause of death is unknown. The possibility of cause of death being a suicide has been ruled out.[[/footnote]] upon being marked for termination. Termination deemed successful.||
||Site-176 Board of Research||SCP-9830 does exist, and poses serious risk for Site-176 and its personnel.||Members of the Board were systematically executed by Alpha-1 operatives. Due to this, and previous events, the O5 Council has ruled that Alpha-1 is to be stationed at Site-176 until further notice.[[footnote]]As of ██/██/20██, number of Site-176 personnel terminated has reached ███ and is rising.[[/footnote]]||
||Site-176 Automated Emergency Broadcast System (AEBS)||SCP-9830 does exist, and has breached containment.||Deactivated from the inside by Alpha-1 operatives.||
||The Antimemetics Division||SCP-9830 does exist, and immediate action is necessary to prevent further damage.||No action necessary. The Antimemetics Division does not, and never has, existed.||
||Ethics Committee administration, including Chairman ████ Tiedeman||SCP-9830 does exist, and has had ill mental effects on the O5 Council and other high-ranking Foundation personnel, including its Mobile Task Forces.[[footnote]]As SCP-9830 does not exist, it has had no ill effects on any Foundation personnel.[[/footnote]]||Alpha-1 operatives located and executed Chairman Tiedeman, as well as all other Ethics Committee Personnel who made the claim, via multiple gunshots to the head. Termination was successful. Mobile Task Force Omega-1 (“Law’s Left Hand”) aided in termination. Ethics Committee administration reformed with personnel whom have not made this claim.||
||Foundation Site-81||SCP-9830 does exist, and is actively hunting major Foundation sites.||Site-81 nuclear warhead successfully remotely activated. Termination successful.||
||Foundation Site-17||SCP-9830 does exist, and has caused devastation on an unprecedented scale.||Same as above. Termination successful.||
||Foundation Site-19||SCP-9830 does exist,  and can no longer be contained.||Remote nuclear detonation unsuccessful. Mobile Task Force Nu-7 (&#34;Hammer Down&#34;) sent to terminate Site-19 and its personnel. Upon arrival, it was noted that Site-19 had somehow already been destroyed. Cause of this is unknown. The whereabouts of many of Site-19&#39;s contained anomalies, including [[[SCP-682]]], are unknown.||
||The Global Occult Coalition||SCP-9830 does exist, has broken the Veil of Normalcy, and will imminently result in the extinction of humanity.||[DATA EXPUNGED]. Termination ongoing.||
||The global Human population[[footnote]]Global population estimated at 9 billion, as of 20██.[[/footnote]]||SCP-9830 does exist, and is actively slaughtering humanity by the millions.||Those who made the claim have been marked for termination. Most have already either been found deceased or terminated by Foundation operatives,[[footnote]]Use of nuclear weapons eliminated all major population centers, making the process significantly easier. Remaining civilians were either found deceased or terminated by available Mobile Task Forces.[[/footnote]] via any means necessary. Termination ongoing. Use of [[[SCP-2000]]] deemed unnecessary by O5 Council.||
