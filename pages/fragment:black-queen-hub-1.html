[[&lt;]]
So you want to add your work to this hub, feel free! It&#39;s a relatively simple process.

First: if you are on the hub itself, **__this is not the page to edit__** . You&#39;re going to want to [https://scp-wiki.wikidot.com/fragment:black-queen-hub-1 click here] for that. That one, you can edit.

Now that you&#39;ve done that. Here are instructions for adding to that page.


If you have a series:
Put the series title under &#34;Series&#34; in alphabetical order with the others. Be sure to format the title with a preceding &#39;+++&#39; . If this is a hub link to it with the title and __do not include the works separately__ . If you do __Not__ have a hub, link the works under the title as is done for these others. The Black Queen must be a prominent character in the series, not just in one work. Otherwise put them as standalones. If you&#39;re not sure if yours fits, ask [[*user Prismal]]

If you have a stand alone work:
Put it under the relevant category, in alphabetical order (or ascending numerically for the SCPs). As you can see, under some of these we have the author, sometimes even the translator, name of canon or series etc. I request you put all that if relevant. 

Preferably only put works where the Black Queen is relevant in these slots. If it&#39;s just an offhanded mention, then consider not adding it. It&#39;ll still be under the automated list. Ideally the hub is a good space to go to to read about the Black Queen. I don&#39;t view it as a great resource if every other work you click she doesn&#39;t even appear.

If you&#39;re intimidated by this at all, heck make the change anyway! Then check if it&#39;s broken. Worst case you can revert using history, I promise I won&#39;t be mad! You can also feel free to ask for help from [[*user Prismal]] (though preferably on Discord, I don&#39;t check wikidot DMs)
Her discord username is prismal4.
[[/&lt;]]
