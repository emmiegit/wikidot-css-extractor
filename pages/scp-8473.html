    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>[[include :scp-wiki:component:image-block name=Luna-v2|caption=Figure A: Sketch of SCP-8473 by Dr. Richard]]

**Item #:** __SCP-8473__

**Object Class:** __Thaumiel__

**Special Containment Procedures:** SCP-8473 is to be contained in a standard humanoid cell furnished with objects requested at site ████. Excessive containment procedures are not required, as they stated they don&#39;t intend to breach contaiment and for the most part proven cooperative.

**Description:** SCP-8473 is a humanoid robotic entity with long black and white hair separated by the middle with a wolf cut hair style. They are usually clothed in a black and white trench coat split in the middle with a opposite orientation than the hair. Their legs are thin and at the feet is a small point making them easy to knock over. SCP-8473 can disintegrate and reconstruct in another area within 20 meters. SCP-8473 can pick up and move any object or organism with their mind, the heavier the object/organism, the harder it is to move. SCP-8473 can break The Law of Conservation of Mass. SCP-8473 can change the properties of matter of any object or organism. SCP-8473 can conjure invisible physical barriers. SCP-8473 can grow wings similar in anatomy to one of a bat, SCP-8473 can grow a tail. with an interesting anatomy. Their tail can open to reveal two (2) rows of canine like teeth and a sharp barbed tongue, the tail itself has six (6) pupilless eyes, as well as having sharp spines on the top of it.

**Addendum:** With SCP-8473 being very cooperative, they are allowed to work as a doctor for the foundation between 7:00 and 13:00 with two (2) guards to supervise them. When the event of a containment breach they are permitted to assist in recontainment of the breached SCP because of their abilities. Due to SCP-8473&#39;s ability to reconstruct matter and assist in recontainment, they have been designated as Thaumiel-class.

**Technical Note:** Physical modification or repair of SCP-8473 is currently deemed high-risk. The entity&#39;s internal systems are integrated with a viscous, black fluid similar in consistency to maple syrup. Any breach of the metal results in significant leakage of this substance, which complicates mechanical upgrades. Consequently, the entity&#39;s physical and telekinetic strength remains fixed.
