+ ##990011|2024##
++ 14 October
[[span style=&#34;font-family: BauhausLTDemi; font-size: 120%;&#34;]]**##990011|Site-01##: Sabattis Christian Parish, Hamilton County, New York, United States of America**[[/span]]
[[/=]]

----

The entire Council had been there, and the lights had been on. 

He was already forgetting what most of them had looked like. The jet black, whirring cylinder was easily the most memorable, and that one he had already met. Most career personnel had to guess who their administrative sponsors were; O5-2 announced itself to each one on their first day, and expected regular progress updates. The others were human, and that was all Harry was willing to swear he remembered. Perhaps the decontamination airlock had amnestics in the misters. 

Then again, he couldn&#39;t remember what he&#39;d eaten on the flight. He couldn&#39;t remember seeing Site-01 from his window. He could remember ascending the topside elevator shaft, but only because it had involved a rickety emergency lift and some preliminary demolition. 

//And because you felt like a monster abandoning them to their ruins immediately after they elected you their leader.//

As soon as Eileen and Amelia had gotten the comms back up, they&#39;d sent a status report to Overwatch. As soon as the report had been received, the summons had been sent. The Red Right Hand had arrived in what looked like Canadian military helicopters -- where had they gotten those on such short notice? -- landed on the tarmac in Camp Ipperwash, and set to work extracting him in a matter of minutes. Pursuit and Suppression would have been a hard-pressed to beat their response time from AAF-A.

He&#39;d been given a new phone, work tablet, and access card at the first of many checkpoints inside Site-01. They&#39;d taken the copy of 5109 he&#39;d been using to lock up the 001 file, which was now being reviewed by god knew how many committees. He would have to brief them soon. He wouldn&#39;t get the Password back, because his brain was now too dangerous to risk taking on potentially deific hitchhikers. He would be expected to weigh in on procedure for Protocol GYRUS. He would be expected to coordinate an overarching defence with Dr. Dan directly. He now had Security Clearance Level-5. He could open almost anything the Foundation had on file.

He was the Director of Site-43.

Because Allan was dead. 

The Overseers had wanted to hear his account of the breach. They hadn&#39;t asked his opinion on why it had happened, or what could have been done to prevent it. He got the vague impression they were going to come to their own conclusions. 

Nobody asked him what his future plans were. Nobody asked after the injured personnel. Nobody seemed to really comprehend the gravity of what had taken place. 

Karen was dead. 

Her body had accompanied him to Site-01, as had Allan&#39;s. They&#39;d parted company outside a church on the way to... No, the church //was// the Site, its topside cover. He&#39;d last seen the caskets headed for a tumbledown graveyard, four heavily-armoured pallbearers to each. Probably they were already underground. 

//Just like me.// The Director of Site-43.

He&#39;d been told he would have a relatively free hand. The Overseers didn&#39;t want to fix what wasn&#39;t broken. 43 hadn&#39;t had a serious breach in twenty years, and all things considered this one could have been much worse. Allan was dead, and Karen was dead, and Bremmel and Vroom and Jessie MacCrum and Ji O and Eddie Simms and dozens more were dead, and one of the world&#39;s largest buildings was a yawning pit of groaning superstructure deep, deep down where nobody could reach it and nobody was in charge because he was here being told it was fine, and the //Weight// had never felt heavier. 

Presumably he made the right noises, nodded at the right times, because eventually they let him go. There was only one more task to fulfill before he could return to the gigantic, compromised sarcophagus he still thought of as his home. He wasn&#39;t clear on what it was, and he didn&#39;t much care. Something symbolic, something official, a test, a debriefing, whatever. He would do it on autopilot. He would save his presence for the people who needed it. His people. 

//Because you are the Director,// he thought as his death-masked escort ushered him into a heavily secured detention cell. //Because Allan is dead.//

Allan was sitting in the detention cell.

Harry didn&#39;t hear the door close behind him. He&#39;d stopped breathing, and his ears were about to pop. It //was// Allan. It couldn&#39;t be.

&#34;Harry,&#34; said Allan. He was wearing an orange jumpsuit, and sitting at a steel table. He looked healthy. He did not appear to have been shot. &#34;I&#39;m very, //very// sorry.&#34; He looked it. There was no lie in those grey eyes.

&#34;Allan?!&#34; Harry managed. There was another chair at the table, but he wasn&#39;t sure he could make it. He thought he might sit down on the floor instead. He wasn&#39;t sure his knees would give him a choice.

&#34;I wouldn&#39;t have done this to you if there were any other way.&#34; The other man&#39;s voice was thick with sorrow. It //was// Allan&#39;s voice. He&#39;d sounded almost exactly like this on the day that Vivian had died. &#34;But I had to leave allowances for emergent situations.&#34;

Harry looked around the room, tunnel vision closing in. Table, chairs, privacy screen in the corner, air vent, wall panels, tile floor, the living dead. He felt dangerously close to laughing. &#34;How are you still alive?&#34;

&#34;I&#39;m not.&#34;

Harry staggered to the table. It was either that or fall over. &#34;I saw your brains blown out.&#34;

Allan reached up to touch his own forehead, gingerly. &#34;Yes. You did.&#34;

//This is a dream.// He looked around to see if Karen was sharing it with him, but of course she wasn&#39;t, because Karen was dead. 

Or was she? What if it had //all// been a dream?

&#34;What&#39;s behind the curtain?&#34; he found himself asking. He didn&#39;t know why. Of course it would be the toilet. &#34;And why are you wearing that?&#34;

Allan had been wearing his usual: a nice shirt, dress pants and a cozy-looking pullover. He&#39;d been sporting business casual when he died. 

The other man paused, and Harry knew it really was a dream. Nothing brought Allan McInnis up short. Even this imperfect doppelganger should have been able to play the part more accurately. 

Still his archivist&#39;s mind pulled on the loosest thread. //Would// there be toilet facilities behind a screen in a detention cell? Did the Foundation care that much about the privacy of their prisoners? 

And why was Allan McInnis, dead or alive, dressed like a prisoner anyway?

&#34;What&#39;s behind the curtain?&#34; he repeated, and he found himself standing up.

&#34;Don&#39;t look,&#34; Allan said softly. &#34;I will tell you.&#34;

Harry walked to the curtain. It cordoned off an entire corner of the room. There was something wrong about that corner. Something very bad. 

&#34;Harry,&#34; Allan pleaded. &#34;Don&#39;t look.&#34;

&#34;[[[scp-069|Zero six nine]]],&#34; said Harry. He hadn&#39;t been conscious of making the connection before speaking it aloud. He didn&#39;t pull back the curtain.

&#34;That&#39;s right.&#34; Allan sounded so very tired. But of course, it was an act. It wasn&#39;t Allan.

&#34;You&#39;re not Allan,&#34; said Harry, without turning back around.

&#34;I am.&#34;

&#34;He&#39;s dead.&#34; 

&#34;You already knew that.&#34;

Harry wheeled in place, pointing a finger at the form of his friend. At the SCP object mimicking the thought patterns of the corpse cooling in the corner. &#34;But then you played your sick joke--&#34;

&#34;It isn&#39;t a joke.&#34; That voice cut through his rage as it always did, letting all the air out. The finger dropped. &#34;You know how this anomaly works. I&#39;m Allan McInnis, until I&#39;m not.&#34;

&#34;For as long as they leave his...&#34; Harry&#39;s own voice was little more than an angry choke. He gestured violently at the curtain, and the punctured clay beyond.

The effigy hung its head in a fair approximation of regret. &#34;As I said, I&#39;m sorry. I never wanted this contingency to go into effect. But there are matters we need to discuss before the transition can truly take place.&#34; 

&#34;Transition.&#34;

The Allan-thing met his eyes. &#34;You&#39;ve been appointed Director.&#34;

&#34;Yeah.&#34; Harry felt like an ass, standing between two mockeries of a man he&#39;d loved and admired. But he couldn&#39;t get any closer to the live one, and it felt like a betrayal to abandon the dead.

//Like they already made you abandon the living.//

069 was nodding. &#34;That&#39;s good. Nim will have refused it, as will Ilse.&#34;

&#34;Yeah.&#34; 

The thing smiled Allan&#39;s smile. &#34;You would have been my choice, anyway.&#34;

&#34;That doesn&#39;t mean much,&#34; Harry snapped, &#34;coming from an anomaly.&#34;

Allan wouldn&#39;t have taken visible offence at this, and his replacement didn&#39;t either. &#34;You&#39;re an historian. The past matters to you. Probably nobody else conceives of that facility as holistically as you do. Its builders are almost all dead, and you&#39;ve inherited their legacy.&#34;

The words were right. The inflection and the expressions. If it weren&#39;t for the fact that William Wettle had put a bullet through the old man&#39;s skull...

Harry did sit down on the floor. He put his head in his hands. &#34;I don&#39;t want to do this.&#34;

&#34;You&#39;ll get used to it.&#34;

&#34;Why can&#39;t they just...&#34;

&#34;Fly my body over to Canada?&#34; Allan chuckled. &#34;Keep it in cold storage in my desk, perhaps?&#34;

&#34;Don&#39;t.&#34; //That __isn&#39;t__ __Allan__.// &#34;Don&#39;t joke about his death.&#34;

&#34;I experienced it.&#34; 

Harry rubbed his face vigorously, felt it turning red, felt the bile rising as he glared at whatever this thing really was. &#34;You didn&#39;t.&#34; 

&#34;I have the memory.&#34;

&#34;And Willie has the memory of shooting you. That doesn&#39;t mean he //did.//&#34; 

&#34;His body did.&#34; 

&#34;And your body //didn&#39;t die.//&#34; Harry felt the last few hours preparing to bolt out of him as lightning, felt the elecricity inside of him, which //was// him, straining to break free and flee to ground, and he wondered if this was how you became a //giftschreiber.// &#34;You might remember what Allan knew, but that doesn&#39;t make you Allan. You were a world away when he sacrificed himself.&#34; 

&#34;I can see our frames of reference are misaligned,&#34; 069 sighed. &#34;I was hoping to give you some comfort, in addition to the information I need to pass on. Perhaps that was naïve.&#34;

&#34;What comfort could you possibly give?&#34; 

&#34;I knew I was going to die.&#34; 

&#34;Obviously.&#34; 

&#34;I knew for decades. Before the Breach, even.&#34;

Harry met its eyes, its familiar grey eyes. His heart still wanted to trust them. &#34;What?&#34;

Allan -- there was no point thinking of it as anything else, not as long as it insisted on speaking in his voice -- turned the chair to face him, pushing the table out of the way. &#34;Harry, there&#39;s a plan at work here which has been unfolding since before either of us was born, and which hasn&#39;t even been conceived of yet. We&#39;re sitting at the centre of a cross-temporal constellation of causality the complexity of which staggers the mind. All of it binding our fractured reality together. We are the weavers of that web.&#34; He touched his chest. &#34;You and I. Ilse. Viv, and Wynn Rydderech. Zwist. Even the Uncontained and Unyielding, in their ways.&#34;

Harry shook his head. &#34;You&#39;re trying to tell me your death was all part of some master plan?&#34; It was a worse joke than puppeting the Director&#39;s body for one last hurrah. It was an absurdity. It was sick.

&#34;No. But it was accounted for.&#34;

&#34;Not by me,&#34; Harry whispered. 

New lines were forming on that strained face every second, and Harry almost wondered if this monstrous form of resurrection came with a time limit. But no, he could see that this version of Allan carried a weight of its own behind those eyes. And it was genuine. &#34;I couldn&#39;t tell anyone.&#34;

&#34;Why?&#34; 

&#34;I simply could not.&#34; Allan stood up, and sat back down again on the floor. Legs crossed, hands on knees. A picture of down-to-earth leadership, more lifelike and true-to-life than whatever they were going to hang up in the portrait hall. Assuming the portrait hall had even survived. &#34;You must believe me that it does not compromise the overall--&#34;

&#34;I don&#39;t give a fuck about the //plan// right now, Allan.&#34; Harry learned this at the same moment the other man did. &#34;I&#39;m talking about the death of my friend.&#34;

Allan pursed his lips, and waited for the obvious finale.
 
&#34;We&#39;re all going to miss you,&#34; Harry managed. His voice did some strange things by the end of it, and it wasn&#39;t quite right. Not quite specific enough.

But he suspected Allan heard the unspoken words, too. &#34;I&#39;m sorry,&#34; he sighed. And then he smiled, very sadly. &#34;But I&#39;m also glad. If the Breach had never occurred, things would have been very different.&#34;

&#34;Better,&#34; Harry said. 

&#34;And worse. We&#39;ve risen to the occasion. Without it, we might have stagnated.&#34; 

&#34;Noè would still be alive. K--&#34;

He couldn&#39;t say it. That single word was strangling him to death. But as before, as always, Allan heard the silence perfectly well.

This time it really did look as though his face was going to collapse. As though the bullet had finally hit home. That measured composure dissolved away, and all that was left was a very keen agony. &#34;Karen?&#34; he said.
 
&#34;You didn&#39;t know,&#34; Harry croaked.

Allan reached up to rub his eyes. &#34;I didn&#39;t know. No. Not about her. Or any of the others. Not before, and not after. Not until this moment.&#34;

He wanted to say he was sorry. Instead, he asked: &#34;And if you had?&#34;

Allan didn&#39;t answer. He was breathing deeply, and staring at the floor.

&#34;If you had known?&#34; Harry pressed. &#34;Would you have tried to stop it?&#34;

They sat in silence a moment longer.
 
&#34;That&#39;s what I thought,&#34; said Harry.

Allan met his eyes again. &#34;This is bigger than all of us.&#34;

&#34;Nothing is that big,&#34; Harry lied.

&#34;The Metafoundation is.&#34;

Harry stared at him.

&#34;If we don&#39;t stop this rot //here,// Harry, it&#39;s going to spread farther. The brothers will have the means to infect realities far beyond our own.&#34; 

&#34;How?&#34; His stomach was a bottomless pit of ever-churning machinery. A boundless gulf. It was eating him up.

&#34;I can&#39;t tell you.&#34; Allan looked rueful, and to his shock, Harry found himself smiling. &#34;What?&#34; 

&#34;You really are him.&#34; Harry shook his head. &#34;So conscientious.&#34;

That warm smile again, tempered with decades of guilt and the burdens of high places. &#34;There are some truths you need to learn on your own, in the fullness of time. When I&#39;m no longer around to tell you.&#34; 

&#34;And some truths you need to tell me now, you said.&#34;

Allan nodded. &#34;That&#39;s right. SCP-069 is not to be used on high-ranking members of personnel. The danger of our knowledge is too great. And of course, no anomalies can be carried into this facility, for the safety of the Overseers. And yet accommodation has been made, for this single case. That&#39;s how important this is.&#34; 

&#34;What happens after?&#34; As if he wanted to know. As if he didn&#39;t already. 

&#34;You&#39;ll have to find a way to make the position yours,&#34; said Allan. &#34;Site-43 needs a leader.&#34;

&#34;I mean what happens to you?&#34; As if the old man had ever once misunderstood him. 

Allan hesitated, completing the picture forming in Harry&#39;s mind. &#34;As I said, the contents of my mind are... privileged.&#34;

&#34;They&#39;re going to decommission you.&#34; It wasn&#39;t much of a question. 

&#34;Yes.&#34; Now there was no regret, no uncertainty. Allan was a leader. He never balked at taking the first step in a new direction himself. 

&#34;And you&#39;re going to let them.&#34; 

&#34;I will insist upon it, if necessary.&#34; 

&#34;Does 069 have an opinion on the matter?&#34; 

Allan shrugged. &#34;It will persist. Take another form. The process is relatively simple.&#34;

&#34;You&#39;re sure about that?&#34; A morbid fascination overtook him. &#34;It feels more likely that they&#39;ll try to find a way to kill it for good. So the things you know can&#39;t slip out.&#34;

&#34;You&#39;re not the first to have this thought,&#34; Allan nodded. &#34;I only know what I perceive to be my own mind, but I suspect my... enabler, knew the risk when it agreed to perform this task. It is not so bad to die as a hero, Harry. Knowing how your end will come, and what will come after.&#34;

There were tears in his eyes.

&#34;Is that how you feel, too?&#34;

The Director&#39;s voice was pitched very low. &#34;I&#39;m not a hero.&#34; 

&#34;You are.&#34;

A beat.
 
&#34;Yes, you //are,//&#34; Harry repeated with all the firmness he could muster. His voice didn&#39;t crack. Not when it counted.

Allan nodded, as though nothing more meaningful than a flight itinerary had been confirmed. Appreciation flickered in the grey, just for a moment. &#34;How is William?&#34;

It was too much to think about. Not now. Not here. &#34;We&#39;ll get him through it,&#34; Harry lied smoothly. At least, he hoped it was smooth.

If he had his doubts, the other man let it pass. The master communicator, himself communicated to a different medium for his final duty. &#34;Good.&#34; He nodded. &#34;Good. Well, I think it&#39;s time we got down to business.&#34; 

Harry nodded. &#34;I&#39;m listening.&#34;

The older man leaned back, placed his hands on the floor, and looked Harry in the eye. &#34;Ask me the question.&#34;

&#34;What question?&#34;

&#34;//The// question.&#34;

And somehow, Harry knew. &#34;Does the Black Moon howl?&#34;

In his capacity as the Administrator of Cornerstone, in Deadline 5243-A, Allan responded: &#34;When the White Sun is silenced.&#34;

The soundscape of the chamber changed subtly. A sort of whirring sound from the ceiling had ceased. Harry knew that if he looked up, he would see the red lights on the camera were no longer blinking.

&#34;They&#39;ll do something about that, won&#39;t they?&#34; Harry asked.

&#34;They will not. They&#39;re handling a rather thorny security problem right now.&#34;

Again Harry felt an inappropriate smile creasing his face. &#34;The Pariah?&#34;

&#34;Among others.&#34; Allan cracked his knuckles. &#34;Now, where to begin? Ah. Yes.&#34; He took a deep breath. &#34;You were young, when Vivian brought you into the fold. As was Lillian, Eileen. Karen.&#34; This time his voice nearly broke. &#34;Most of our cohort. Our... friends. With fresh ideas, and open minds.&#34;

Harry nodded again.

&#34;And the Overseers put a stop to it, when they put a stop to him. Do you know why?&#34;

&#34;Because the young haven&#39;t picked a side yet.&#34;

&#34;Because they don&#39;t really believe there //are// sides. Their minds are still flexible enough to turn another way. And the Foundation has chosen its course already. Harry, the Overseers are going to side with the //schriftsteller.//&#34;

He felt his veins begin to freeze. He felt no warmer than the body in the bag, behind the screen.

&#34;They are going to take up the cause of perfect, universal order. Snuff out all resistance. Close a fist around the globe. They will contain //everything,// just as we saw the Uncontained destroy it all. Instead of perfect, terrible freedom, we will have perfect, suffocating tyranny. And then the Earth will crack, and it will all begin again.&#34;

&#34;And we&#39;ll never have another chance to stop it.&#34;

&#34;That&#39;s right.&#34; Allan folded his hands in his lap, and leaned forward. &#34;So you need to stop //them.// The Overseers. Overwatch. A great many of my former colleagues. You&#39;ll need help. Lillian&#39;s friends, and William&#39;s, and friends Ilse hasn&#39;t yet made. You will need to bring Zwist back into the fold, and somehow bring Dr. Rydderech back to himself. You will need to find the rest of the names on that list. And then you&#39;re going to have to make use of the incubator we fashioned together, over all these years, and realize the dreams of our predecessors. For Vivian, for Dr. Rydderech, for everyone we lost today, and every day before. And since. For everyone in the world; all the worlds, in point of fact.&#34;

&#34;Incubator,&#34; Harry repeated. It could only be Site-43. Site-43, where he, Harold Blank, was Director.

Because Allan McInnis was dead.

&#34;Incubator,&#34; he repeated, &#34;of what?&#34;

Allan reached out, and pressed a hand into Harry&#39;s shoulder. The grip was familiar, reassuring. As though strength could be transferred merely by touch, through skin and fabric, heart to heart.

&#34;Of the Second Coming.&#34; The light of this final, desperate hope was brilliant in the dead man&#39;s eyes. &#34;Of a new Foundation.&#34;</textarea></pre>
