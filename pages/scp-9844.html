**Item #:** SCP-9844 

**Object Class:** Keter 

**Special Containment Procedures:** The sole known copy of &#34;The ██████ Programming Language&#34; is housed within a Level 4 containment locker within Sublevel C of Site-951, with all digital conversions and files written in SCP-9844 stored on the Site-951 SecureNet. Access to any documents pertaining to SCP-9844 requires Level 4 clearance, along with prior authorization for testing issued by the Site Director via written request over the aforementioned SecureNet. All instances of SCP-9844 written or used during testing are to be destroyed[[footnote]]In this context, &#34;destroying&#34; SCP-9844 constitutes non-recoverable deletion of any files containing SCP-9844 source code[[/footnote]]at the conclusion of testing. 

**Description:** SCP-9844 refers to a low-level, object-oriented, statically typed programming language known as ██████, originally written as a competitor to the Java programming language. SCP-9844 was created sometime between 1997 and 2003 at ████████████, a now defunct technology and software company based in Buffalo, New York. Preliminary analysis by Foundation field agents upon recovery of SCP-9844 materials from the ████████████ office in Buffalo suggests that ████████████ employees and executives were unaware of SCP-9844&#39;s anomalous properties, intending for it to be a viable industry-standard language. 

Due to the lack of an available compiler, SCP-9844 will not compile or execute on any known computer architecture. Files can still be written in SCP-9844 and saved with the &#34;.███&#34; file extension, but are functionally useless outside of academic inquiry or use of their anomalous properties. The syntax and grammar of SCP-9844 is very similar to Java and C#, with a relatively high level of verbosity and a strong focus on object-oriented design paradigms. As an example, the following SCP-9844 code would theoretically print &#34;Hello, world&#34; to the console: 

[[code]]
public class Program {
    public static main(string args) : void {
        Console.output(&#34;Hello, world&#34;); 
    }
}
[[/code]] 

SCP-9844&#39;s anomalous properties manifest when code is written that refers to a living organism. In SCP-9844, both proper nouns designating living beings as well as their genus and species are reserved keywords; if a proper name is not used, SCP-9844 will assume the referent based on proximity to the programmer. Code written in this manner will execute as soon as it is syntactically and grammatically correct, with no compilation necessary. Accordingly, all further examples provided in this documentation will be heavily redacted to prevent manifestation of SCP-9844&#39;s anomalous properties. 

In the following example, assume the redacted keyword is the name of a living human: 
[[code]] 
public class Program { 
   public static main(string args) : void { 
        ██████ person = new ██████(); // Note that defining a class for object instantiation is unnecessary when referring to living organisms
        person.say(&#34;Hello&#34;); // &#34;say()&#34; is one of many included functions
   }
}
[[/code]] 

If executed, the code above would force the individual closest to the programmer with that name to say the word &#34;Hello&#34; in fluent English. SCP-9844 always selects the individual closest to the programmer meeting the conditions of a function call, though greater specificity can be achieved by using middle and last names within the type. If multiple objects are created that share a &#34;type&#34; referring to a living organism, SCP-9844 will select another subject that meets the conditions; if no such subject is available, the code will simply not execute. 

Subjects affected by SCP-9844 remain cognizant of their actions during &#34;code execution&#34; and regain autonomy once code execution completes, unless forced to execute the &#34;wipe()&#34; function. The &#34;wipe()&#34; function appears to be analogous to a Class-Omega amnestic and will reduce human subjects to a mental state comparable to that of a toddler. If used on a non-human subject, &#34;wipe()&#34; induces a number of effects depending on the complexity of the organism, ranging from brain death to cytolysis. 

**Addendum I: List of Known SCP-9844 Included Functions** 
//Note: For convenience, the object executing a function will be referred to as the &#34;subject&#34; for clarity.//
|| **Function** || **Output**  ||
|| wipe() || Class-Omega amnestic (in humans); various effects in non-humans. Accepts no arguments.  ||
|| kill() || Forces the subject to attack the entity referred to by the function&#39;s argument until the latter is dead or functionally inert. If this is impossible, the code will not execute. This function does nothing if passed no arguments. ||
|| copy() || Creates a genetically identical copy of the subject within a 10 meter radius through unknown means. The copy appears to possess its own consciousness (if applicable). If passed an argument referring to another subject, the original subject will become a copy of the subject referred to by the argument. || 
|| say() || Forces the subject to verbally repeat the string passed as an argument. If the subject is not physically capable of speech, this function does nothing. || 
|| get_index() || Retrieves the &#34;index&#34; of a memory, thought, or concept that most closely matches the string passed as an argument. This can be combined with the &#34;say()&#34; function (e.g., &#34;say(get_index(&#34;Birth&#34;))&#34; to verbally &#34;output&#34; whatever is retrieved by the function. //Note: Use of this command on subjects with prior knowledge of the Foundation or its internal workings is strictly prohibited.//|| 
|| help() || [SEE ADDENDUM II] || 
|| memcpy() || The effects of this function are not clearly understood. Based on testing, &#34;memcpy()&#34; appears to attempt to copy a subject similar to the &#34;copy()&#34; function, albeit with the original subject&#39;s consciousness duplicated in the copy. The &#34;memcpy()&#34; command has never been used as it is likely to impose an RK-Class (&#34;Identical Duplicate Paradox&#34;) scenario. Testing of this function is theoretically safe in a Type-II pocket reality. //Note: All testing of &#34;memcpy()&#34; is strictly prohibited until further notice.//|| 
|| chess() || Forces the subject to play a game of chess with the subject referred to by the argument. &#34;chess()&#34; accepts up to three arguments for four-player chess. If a chess board and chess pieces are not available in close proximity, the game will take place through verbal recitation of moves and positions in algebraic chess notation.|| 
|| memallocate() || Provides the subject referred to by the argument access to the memories and mental state of the original subject. The use of this function is hazardous to the original subject, as it will gradually induce loss of cognition, severe physiological symptoms, and eventually death if not stopped by the associated &#34;memclear()&#34; function. Note that &#34;memclear()&#34; is a misnomer, as it does not clear the subject&#39;s memories; it merely stops execution of &#34;memallocate()&#34;. || 

**Addendum II: Execution of &#34;help()&#34; Function: ██/██/████** 
On ██/██/████, Dr. ███████ executed the &#34;help()&#34; function on subject D-2115. Upon execution of the function, D-2115 began hemorrhaging from several orifices and collapsed to the ground in an apparent seizure. After several moments, D-2215 opened his mouth (apparently against his will) and began vocalizing in several tones and dialects later found to be distinct from his voice. Immediate analysis of these vocalizations was not conducted due to the testing area being deemed hazardous. 

A microphone in the testing area captured the vocalizations emitted by D-2115 during this incident. Upon playback, the vocalizations appeared to be expressing extreme anguish and a desire for &#34;escape&#34; in several languages. The structure and morphology of vocalizations able to be identified are identical to those used by D-Class subjects exposed to SCP-9844, both living and expired. The vocalizations that were unable to be identified are mostly in known languages, with a small number in languages that could not be reliably identified.  

Following this incident, testing involving SCP-9844 became inconsistent and possibly corrupted by external variables. Chiefly, use of the &#34;copy()&#34; function has resulted in several occurrences of copies of the original subjects immediately entering a state of heightened aggression and panic, variously requesting escape and release. Multiple copies have immediately attempted termination of the subjects from which they were copied, followed by self-termination. 

The implications of this incident have led to a review regarding use of the &#34;copy()&#34; function. As of ██/██/████, a conclusion has yet to be reached by the Site Director and O5 Command.
