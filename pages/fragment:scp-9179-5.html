++++ NOTICE FROM THE FOUNDATION RECORDS AND INFORMATION SECURITY ADMINISTRATION

Stressing &#34;//particular investigatory privileges//&#34;, Dr. Gornell once again received permission to administer Class-Z Mnestic to another D-Class, as well as employment of an improved //Creighton Projection Engine//, capable of sharper resolution in noöspheric actualisations.

However, following the previous experiment and citing concern with SCP-9179&#39;s threat potential, the Noöspherics Division insisted that the experiment be postponed until they had completed their own assessment of SCP-9179.

Dr. Gornell awaited no such assessment.
