**Item #**: SCP-043-J

**Object Class**: Safe

**Special Containment Procedures**: SCP-043-J-1 and SCP-043-J-2 are to be placed on a table in the center of Combat Training Room 46, one of the Foundation&#39;s largest combat rooms, measuring approximately 15m × 30m × 7m. The room is to remain locked with a clearance level of 2 or higher required to enter[[footnote]]Following incident 043-J-1, all entrants are required to clear entry with the on-duty guard.[[/footnote]] and monitored at all times. A single female guard is to be stationed outside the room to prevent unauthorized access and avoid SCP-043-J&#39;s anomalous effects from causing any unwanted incidents. Personnel are allowed to interact with SCP-043-J on their free time provided they possess level 2 or above clearance and properly log their visit.

**Description**: SCP-043-J is a pair of two ordinary-looking sticks (hereafter designated SCP-043-J-1 and SCP-043-J-2), similar to those commonly found in wooded areas. However, they possess a powerful anomalous effect affecting male humanoid subjects.
Upon visual contact with either instance of SCP-043-J, male subjects will feel an immediate compulsion to approach, pick up either of the instances, and examine it with admiration. Shortly after, they will instinctively begin wielding it as a weapon, engaging in mock combat against the air, or an imaginary opponent.
When two (2) male subjects are present near SCP-043-J-1 and SCP-043-J-2, each will grab one instance and, without fail, engage in a duel. Regardless of prior combat experience, both subjects will demonstrate some proficiency in swordplay, fighting with the intensity and skill of trained warriors.[[footnote]]Testing has shown that subjects who have prior experience are more likely to win.[[/footnote]]
Female subjects seem to be entirely unaffected by the properties of either instance of SCP-043-J. When observing affected males, they consistently describe their behavior as “childish” and “absolutely moronic.”

**Discovery**: SCP-043-J-1 and SCP-043-J-2 were discovered on 01/10/2007 at approximately 1430 hours in the woods near Site-██ by Junior Researcher Nathan and Field Agent George. However, the anomalies were not reported until at least four (4) hours after their discovery, when Agent George&#39;s wife, Alice [[footnote]]You know, from the cafeteria staff [[/footnote]], found the two engaged in an intense duel using the SCP-043-J instances as swords.
Alice later described the battle as &#34;intense,&#34; &#34;dramatic,&#34; and &#34;unbelievably stupid.&#34; She promptly confiscated the anomalies and reported them to Foundation personnel, to which they were logged and prepared for testing.

**Test Log 043-J 1.1**
&gt; Eight (8) D-class personnel were selected for the following test—four (4) male and four (4) female, as per standard procedure. One (1) guard was stationed inside Combat Training Room 46 to intervene if necessary.
&gt; 
&gt; **Procedure**: One (1) male D-class personnel enters Combat Training Room 46.
&gt; **Result**: The D-class immediately grabbed SCP-043-J-2, examined it closely, then whistled quietly in what was later described as &#34;admiration of such a fine blade&#34;. He then pointed the stick at the stationed guard and declared, &#34;I challenge thee!&#34;
&gt; Following this, the stationed guard immediately sprinted towards the table, grabbed SCP-043-J-1, and preceded to engage in combat with the D-class using the SCP-043-J instances. Security personnel monitoring the test reported the incident, prompting two (2) female guards to burst into the room and subdue both combatants using stun weapons.
&gt; The D-class was dismissed, and the involved guard was lightly reprimanded.
&gt; 
&gt; //Note: From this point forward, all experiments involving SCP-043-J will be supervised exclusively by female guards.//
&gt; 
&gt; Test Log 043-J 1.2
&gt; **Procedure**: One (1) female D-class personnel enters Combat Training Room 46.
&gt; **Result**: The D-class appeared confused and repeatedly asked what was supposed to happen. Subject was then dismissed.
&gt; 
&gt; Test Log 043-J 1.3
&gt; **Procedure**: Two (2) male D-class personnel enter Combat Training Room 46.
&gt; **Result**: As expected, the D-class personnel initiated an intense duel exactly 6.88 seconds after observing the SCP-043-J instances.
&gt; The female guard on duty was instructed via earpiece to allow the fight to continue for observation. However, after a few moments, she realized that the security room was primarily staffed by male personnel—who were likely just enjoying the spectacle.
&gt; Taking initiative, the guard immediately stopped the duel, forcefully removed the present D-class, and returned the SCP-043-J instances to their designated positions.
&gt; She was later commended by Site Command for &#34;Exemplary defiance of an unreasonable command.&#34;
&gt; The security team responsible for the order was reprimanded.
&gt; 
&gt; Test Log 043-J 1.4
&gt; **Procedure**: Two (2) female D-class personnel enter Combat Training Room 46.
&gt; **Result**: Both subjects began discussing --some boring shit-- unrelated topics, prompting the research team to end the test.
&gt; 
&gt; Test Log 043-J 1.5
&gt; **Procedure**: Two (2) D-class personnel, one (1) female and one (1) male, enter Combat Training Room 46.
&gt; **Result**: The male D-class immediately approached SCP-043-J, hesitating only to decide which instance to take. The female D-class, confused by his confident behavior, asked if he had any idea what they were supposed to do.
&gt; Without hesitation, the male D-class made a single motion-holding SCP-043-J-2 by the tip of its &#34;blade&#34; and offering it to the female D-class.
&gt; Visually confused, she hesitantly grabbed the stick, only to be immediately attacked by the male D-class, who shouted, with deep french accent, &#34;En garde![[footnote]]Subject is neither from france nor does he speak french[[/footnote]].
&gt; The female D-class stumbled backward, shocked, before throwing SCP-043-J-2 at the male D-class and yelling &#34;WHAT THE HELL IS WRONG WITH YOU??!&#34;
&gt; The male D-class froze for a moment, glancing between his stick and the other stick. He then sighed and stated, &#34;Uh, fuck it. You ruined it.&#34; before neatly placing both SCP-043-J instances back on the table.
&gt; 

[[collapsible show=&#34;+ Incident 043-J-1&#34; hide=&#34;- Hide Incident Log&#34;]]
**Incident 043-J-1**: Attempted theft of SCP-043-J-1.

&gt; On 06/10/2007, five (5) days after SCP-043-J&#39;s discovery, a --selfish bastard-- guard that was assigned to guard Combat Training Room 46 attempted to steal one of the SCP-043-J instances for himself.
&gt; At 0037 hours, the security room witnessed the guard entering the room and lifting SCP-043-J-1. He then proceeded to exit the room after &#34;sheathing&#34; it in his belt loop.
&gt; An alarm was immediately set across the site, and O5-1 (who happened to be on-site and pass by) witnessed the guard exiting Combat Training Room 46, wielding SCP-043-J-1.
&gt; O5-1 threw his coffee cup aside and ran towards the escaping guard with unprecedented hatred in his eyes, &#39;&#39;You selfish son of a bitch&#39;&#39; he mumbled just before he kicked the guard&#39;s back, sending him to the floor and releasing SCP-043-J-1 from his grip.
&gt; The guard was then detained and demoted to a D-class level.
&gt; O5-1 personally requested for him to be &#34;In the next femur crushing session when there&#39;s a containment breach by &#39;[[[SCP-106| the old dude]]]&#39; &#34;.
[[/collapsible]]

[[collapsible show=&#34;+ Addendum 043-J-1&#34; hide=&#34;- Hide Addendum]]
**Addendum 043-J-2**: Transcript of a recording from the permissioned entry of Researcher Nathan and Agent George.

&gt; Researcher Nathan and Agent George were observed engaging in combat with the two SCP-043-J instances, enthusiastically reenacting famous sword fights from the Star Wars films.
&gt; 
&gt; **Researcher N.** : I am your father!
&gt; **Agent G.** : Nooooooooooooo!!!
&gt; 
&gt; **Agent G.** : Join the dark side, we have union regulated breaks.
&gt; **Researcher N.** : Fair claim, but I&#39;d rather stay self-employed! (Researcher Nathan appears to rethink his life for a moment)
&gt; 
&gt; **Researcher N.** : I hate sand.
&gt; **Agent G.** : What? Wait a second this isn&#39;t a fighting scene.
&gt; **Researcher N.** : Uhhh... fuck.
&gt; 
&gt; **Agent G.** : (Standing on the table which the SCP-043-J instances are usually put on) It&#39;s over Nathan! I have the high ground!
&gt; **Researcher N.** : (Kicks the table, both Agent G and the table fall back. Agent G is taken to receive immediate medical assistance.)
[[/collapsible]]

[[collapsible show=&#34;+ Addendum 043-J-2&#34; hide=&#34;- Hide Addendum&#34;]]
**Addendum SCP-043-J-3**: --SCP-076-2&#39;s expert inspection of SCP-043-J instances.-- **Able vs The Administrator**

&gt; SCP-076-2 (which will be referred to as &#39;Able&#39; for the rest of the document) equipped with two (2) giant battle axes and escorted by two (2) troops of MTF unit Zeta-69 (&#39;&#39;Able&#39;s asskissers&#39;&#39;), is presented to SCP-043-J.
&gt; Able immediately throws away the battle axes as if they were never of importance to him, and grabs SCP-043-J-1 while claiming: &#39;&#39;This is fucking awesome!&#39;&#39;
&gt; Before Able had a chance to examine the weapon any further, [[[scp-0001-j| The Administrator]]] enters the chamber and declares: &#39;&#39;It&#39;s time to end this once and for all, don&#39;t you think, Able?&#39;&#39;
&gt; Able then grins with the shining smile of a warrior who knows they&#39;re about to enter into legend.
&gt; &#39;&#39;Hell yeah!&#39;&#39; He tosses the second SCP-043-J towards The Administrator, who barely manages to catch it.
&gt; The security room monitoring the chamber is evacuated by direct command of O5-4, and the entire O5 council enters the security room to watch the following battle.
&gt; Able and The Administrator clash with such intensity and ferociousness, that it is nearly unbelievable the sticks didn&#39;t shatter.
&gt; After 38 hours of constant dueling, it was declared as a draw by the two (2) MTF Zeta-69 troops that watched the entire fight. When questioned later, they claimed that they wanted to declare Able as the winner, but were &#34;Too afraid of The Administrator sending their asses to 682 testing&#34; to do so.
&gt; The full recording of the battle is currently classified under Level 05/043-J clearance.
[[/collapsible]]

//Note: I think that this is actually non-anomalous at all. This just seems like the normal male reaction for witnessing two sticks.
I propose changing it to &#39;&#39;Explained&#39;&#39;.
-Junior Researcher Gale//

-Senior Researcher Cornelius.//</textarea></pre>
