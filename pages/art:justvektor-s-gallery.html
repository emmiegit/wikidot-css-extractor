Hi //again//, it&#39;s JustVektor, or [[*user Mr 09_doctor]] if you like the wikidot ID better.

It has not been long since I posted the other art page, but I feel bad for hoarding all my other art for Chinese wiki only.

You might already know me from a certain front page feature[[footnote]] Thank you Jerden and all the other kind people from the Community Outreach Team.[[/footnote]], and I&#39;m glad to inform you that I have a huge art stockpile that I&#39;m going to dump here, sorted via characters and general theme.

**PS:** I really like the Suprematism Theme but surprisingly no one has ported it to the English wiki before, so I&#39;m using the backrooms version of the theme with scp=true.

**PPS:** The cache thing was too annoying so I&#39;m just going to use the Chinese version for now. (FUCK that didn&#39;t work I switched back)
