+ **Ali Khan Hotel &amp; Casino**
++ **Card Game Parlor 3 | Camera 8**
[[/=]]

//A poker table sits at the centre of the view, 6 people are sat around it, each holding a hand of 5 cards. At the head of the table, PoI-7777 &#34;The Dealer&#34;, dressed in a neon coloured crystalline suit, stands with his face obscured to the camera by the brim of his hat.//

**PoI-7777:** Firstly, I&#39;d like to thank you all for coming to test our new game on such short notice.

**Dr. Yule:** Get on with it, Bucko! We ain&#39;t got all day.

**Dr. Queen:** I hate to agree with the scum, but please, we get the gist. I have to pick up my kids in 3 hours so I unfortunately don&#39;t have the time to dilly dally.

**PoI-7777:** Alright then.

//The Dealer places a card in front of each player and snaps his fingers. Suddenly all of the green on the table morphs into water, the cards transforming into pirate ships.//

**PoI-7777:** We&#39;ll be playing &#34;Sailship Royale&#34;. Each and every card in your 80 card decks represents an action you can take. The aim, to be the last ship standing. This is turn based of course, but at any time, you can spin the wheel of god. Whatever effect it lands on, is immediately applied to the board. You each can only spin the wheel a total of three times per game. You lose if your ship is destroyed or you run out available actions. Any questions?

//Dr. Langstrum raises her hand.//

**PoI-7777:** Yes?

**Dr. Langstrum:** What about drinks?

**PoI-7777:** Ah yes, as our esteemed play testers, you can request any drink of your choice at any time. Don&#39;t worry about causing a mess, everything in this room is waterproof.

**Dr. Langstrum:** Hell yeah, I&#39;ll have one Ocean Water cocktail then.

**PoI-7777:** Fabulous, that will be with you in a moment. Anyhow, the turn order will start with Dr. Yule here and continue clockwise, ending with Dr. Langstrum. Are you all ready?

**Sir Williams:** I don&#39;t know about these simpletons, but I&#39;m ready to prove my greatness!

**Dr. Swirl:** Re--

**Dr. Yule:** LET&#39;S JUST GET STARTED ALREADY!

**PoI-7777:** Alright, three, two, one...

//An airhorn sound effect rings throughout the room. Dr. Yule smiles devilishly as he stares at his cards. After a few seconds, he tosses a card at the ship in front of him.//

**Dr. Yule:** Lets see what this does.

//Upon impact with the ship, the card transforms into a pirate dressed in wine red and right gold. With a loud roar, the pirate takes control of the ship, driving it towards the edge of the table where the Dealer stands.//

**Dr. Yule:** Oh, hell yeah.

**Dr. Queen:** Guess it&#39;s my turn.

//Dr. Queen stares at her hand for 2 seconds before placing 3 cards on top of the ship. After a second of delay, the cards transform into a fleet, guarding the ship on both sides. Dr. Queen smirks and gestures for Sir Williams to take his turn.//

**Sir Williams:** Since these fools are too cowardly, I shall be the first to spin the wheel!

**PoI-7777:** Alright!

//The Dealer snaps his fingers and a group of figures, clad entirely in black, push a massive lottery wheel into the room, although it is not legible from the angle of the camera.//

**PoI-7777:** Well then, let&#39;s //spin that wheel//!!!!!!!!!!!!!

//The Dealer tips his hat and presses a concealed button, causing the wheel to start spinning. It remains in motion for 2 minutes before landing on a green tile.//

**PoI-7777:** Lucky you! Draw 2 cards!

//Sir Williams does as told, now holding 7 cards.//

**Sir Williams:** I&#39;d like to spin again.

**PoI-7777:** Well, we&#39;ve got a daredevil over here alright! Let us, once again, //spin that wheel//!!!

//The Dealer presses the button again and the wheel spins for another 2 minutes before landing on another green tile. Sir Williams celebrates and draws 2 more cards.//

**Sir Williams:** Now, does spinning the wheel count as taking my turn?

**PoI-7777:** Of course not! That would be absurd.

//Sir Williams laughs.//

**Sir Williams:** Excellent then I am going to spin the entire wheel and...! Play my entire hand to boot!

//Sir. Williams flashes all 9 cards, each of which displaying the text &#34;Spin the wheel and multiply the result by 2^^X^^ (X being the number of these cards played at once. If this card is played solo, X=2)&#34;.//

**PoI-7777:** Oh really?! Are you sure you want to multiply this result of this final spinning of the wheel by 521?

**Sir Williams:** Ha! I am //the// grand finance guru! My luck and skill is unmatched! Spin the darn wheel already, you //serf//!

**PoI-7777:** Welp, I warned ya.

//The Dealer presses the button and the wheel starts spinning yet again. After 3 minutes of spinning, it lands on a black tile.//

**PoI-7777:** Unfortunate!

//PoI-7777 chuckles.//

**Sir Williams:** What does that mean?!

**PoI-7777:** You landed on a disaster tile! That means we must now pull a card from the disaster deck!

//The Dealer produces a deck of dark purple playing cards from his sleeve, placing them on the edge of the table.//

**PoI-7777:** Your disaster is...

//Multiple lights on the ceiling flash orange.//

**PoI-7777:** //Meteor Shower//!

**Sir Williams:** Huh?

//Tiny meteors begin to rain down from the ceiling and into Sir Williams&#39; ship. After 5 minutes, the final meteor silently lands in the water, nothing of the ship remaining. Sir Williams stares at the empty space where his ship stood for another minute before slamming his fist against the table edge.//

**Sir Williams:** Fuck you!

**PoI-7777:** You lost fair and square my friend.

**Sir Williams:** I won&#39;t stand for this!

//Sir Williams snaps his fingers and vanishes in a puff of smoke. The Dealer laughs.//

**PoI-7777:** Well, that guy&#39;s a sore loser.

**Dr. Langstrum:** Oh, he is. //Massive// sore loser loser, that guy.

//Dr. Langstrum finishes her second Ocean Water and orders a third as Dr. Swirl stares at her cards.//

**Dr. Swirl:** I guess I&#39;ll... play this.

//Dr. Swirl tosses a card towards the board. As it makes contact with the water, Dr. Swirl&#39;s ship moves to where Sir Williams&#39; ship once stood and opened fire on Dr. Queen&#39;s fleet, taking down one ship and damaging 2 others. Dr. Swirl nods to Dr. Langstrum who downs her third ocean water in one gulp and tosses her hand onto her ship. One by one, the card&#39;s vanish and the ship increases in grandeur, eventually becoming reinforced by a metal outer layer.//

**PoI-7777:** And so, round one concludes. How are yall feeling?

**Dr. Queen:** I think this game will make you a lot of mo--

**Dr. Yule:** Shut up!

//Dr. Yule draws a card and places it on top of his ship. Upon impact, the ship duplicates and begins to move towards Dr. Langstrum&#39;s ship.//

**Dr. Yule:** I&#39;m going to take you down!

**Dr. Langstrum:** WOO! I&#39;d like to spin the wheel!

**PoI-7777:** Good choice!

//The Dealer presses the button and the wheel spins, landing on a yellow tile after a minute and a half.//

**PoI-7777:** Oh, that means you get to take your turn early! Play away!

//Another ocean water cocktail is presented to Dr. Langstrum, who downs it one gulp and orders another before drawing a card and tossing it into play. Upon impact, her ship turns to face Dr. Yule&#39;s fleet, moves in-between the two and opens fire, quickly sinking both ships.//

**Dr. Yule:** Fuck! That&#39;s not fair!

//Dr. Yule attempts to punch the Dealer, who catches his fist with ease.//

**PoI-7777:** HA!

//The footage turns to golden static for 2 seconds before returning to normal. Dr. Yule can be seen being dragged out of the room, unconscious and without his labcoat. The Dealer uses a towel to wipe the blood off his hands.//

**PoI-7777:** I never said this would be fair, did I?

**Dr. Queen:** Thank the lords, that guy was //quite// annoying.

//Dr. Queen draws a card and laughs.//

**Dr. Queen:** //Oh//, whoever designed this game needs a //raise//!

//Dr. Queen places three card atop her fleet in a triangle formation. Suddenly, her fleet combines into an aircraft carrier, holding a missile launcher.//

**Dr. Queen:** //Full throttle//!

//With a loud bang, the missiles launch from the carrier and swiftly land in sinking Dr. Swirl&#39;s vessel.//

**Dr. Swirl:** Dammit.

**Dr. Queen:** Sorry girly, but you aren&#39;t as hot as your girlfriend.

//Dr. Swirl sighs.//

**Dr. Swirl:** Whatever. Good game.

**PoI-7777:** Since you&#39;ve been much calmer than those //men//, I&#39;ll let you stay and watch.

**Dr. Swirl:** Alright.

**Dr. Langstrum:** Yippeessssssssssshhhhhhhh?!

= **&lt;Extraneous data removed&gt;**

//After 2 total hours of gameplay, the board is now unrecognisable, now resembling trenches, no naval vessels can be seen. Dr. Langstrum is visibly inebriated.//

**Dr. Langstrum:** I&#39;m gunna bet yu-you

**Dr. Swirl:** Babe, I think you&#39;ve had too much to drink.

**Dr. Langstrum:** You swound like swodo and the beeg fuckoff dragoon that struck me with ferts an hour agoo.

//Dr. Langstrum burps as she tosses a card on the field, which transforms into 5 wounded soldiers.//

**Dr. Queen:** I would like to spin the wheel.

**Dr. Langstrum:** Me too!

**PoI-7777:** I&#39;m sorry Miss Langstrum, but you&#39;ve already spun three times.

**Dr. Langstrum:** Bullfrog! I did... I didn&#39;t... I can&#39;t rememb.

**PoI-7777:** Well, Mrs Queen, this will be your last spin of the wheel. Are you sure?

**Dr. Queen:** Of course.

**PoI-7777:** Well then, lets spin! That! //Wheel//!

//The Dealer presses the button and the wheel whirs to life. After 3 minutes, it dramatically lands on a black tile.//

**PoI-7777:** Disaster time!

**Dr. Queen:** I&#39;d like to play this.

//Dr. Queen places a card with the text &#34;Disaster Shield&#34; in front of the dealer.//

**PoI-7777:** Great decision.

**Dr. Langstrum:** Bring it on, swayby!

**PoI-7777:** Alright, your disaster is...!

//The Dealer draws a card from the disaster deck and smirks.//

**PoI-7777:** LANDMINE!

//The group of soldiers take a step forward, immediately steeping on a land mine, which explodes, killing the entire group instantly. Dr. Langstrum makes incoherent noises of frustration as Dr. Queen silently celebrates. Dr. Swirl sighs, picks up Dr. Langstrum in her arms and leaves the room.//

**Dr. Queen:** What&#39;s my prize?

//Dr. Queen stands as the board returns to a normal poker table. The Dealer chuckles.//

**PoI-7777:** Nothing!

**Dr. Queen:** ...Excuse me?

**PoI-7777:** The fun of playing is reward enough.

**Dr. Queen:** You&#39;re saying I could&#39;ve spent this time fucking my wife but instead I played this stupid as shit card game?!

**PoI-7777:** Well, you had fu--

//Dr. Queen screeches, causing the room to erupt in pink light for 10 seconds. Once the feed returns, the room can be seen in rubble. The Dealer can be seen in the same position, unharmed. After a few seconds, he turns and leaves.//

**PoI-7777:** //(muttering)// I think that went well.
