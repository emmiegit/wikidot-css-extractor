= (I&#39;m terrible at puns)

&gt; **Dr. Soch:** When did it start to hurt?
&gt; 
&gt; //Rsr. Draws hesitates.//
&gt; 
&gt; **Rsr. Draws:** I don&#39;t remember.

------

[[image Asterom.jpg]]

Fi ([[*user Dino--draws]]) keeps writing bangers, and so I keep making fanart. Their most recent work hit me in a way that&#39;s hard to describe. As an autistic dude with a visual impairment, it really hit home on how I&#39;ve felt about my own disability over the years, and as such my journey with it. Even if the experiences aren&#39;t the same, the struggle is. 
I attempted to draw the [[[https://scp-wiki.wikidot.com/scp-8987|RUNS RED]]] logo. I think I did alright.

This piece is based off: [[[https://scp-wiki.wikidot.com/scp-8272|SCP-8272 &#34;Asterom&#34;]]]

------

&gt; Dr. Soch’s request to allow Rsr. Draws full-time usage of SCP-8272 as a mobility aid has also been approved.</textarea></pre>
