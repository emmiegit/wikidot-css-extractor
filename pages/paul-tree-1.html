+ The First Word

The first thing he felt when he came into this world was weight.

The weight of the air pressing against his chest, seeping in with every breath, crushing his lungs. It was like swimming through mud.

Then came the light. Too even, too white. Like the glare you see after being buried in snow, as melted ice seeps between your eyelids.

Something was wrong with the air here. Too thick, too dry.

Each breath felt like scraping sandpaper down his throat. He tried to flap his wings, but his body was too weak to move. All that came out of his mouth was a hoarse sigh.

He remembered no fall. Only the endless wind, the light, and the terrifying stillness that split the world in two.

Then he remembered the voice that had reached him in the storm. Calm, careful, and warm.

He forced his eyes open.

The ceiling was the same as before. No sky, no stars - only white fluorescent light shining down. Machines the same colour as the walls emitted soft, regular mechanical pulses, like an artificial heartbeat. When he turned his head, he saw a familiar pane of glass.

Not a dream, then.

He saw the long, cow-like creature he had thought existed only in his dream.

Its head was covered with short black hair, its face pale in the glow of the device it held. Its eyes looked tired, its mouth small and red where a beak should have been. Most striking, it had no fur anywhere else on its body. A strange-looking creature indeed.

The being blinked and moved its throat. Its lips moved, but no sound came out.

Is it speaking at a frequency I can&#39;t hear?

He recalled reading once about descendants of mosasaurs communicating with infrasound under the sea. Perhaps this one did the same. At that moment, the creature pressed a button on the machine beyond the glass -

-----

&#34;Unidentified lifeform, can you hear me?&#34;

Ken steadied his pounding heart and pressed the transmit button. The Foundation had seen many extraterrestrial beings, but never this species. First contact. No matter how hard he tried, he couldn&#39;t suppress his excitement.

The lifeform turned its gaze toward him, and their eyes met through the glass. Then it opened its beak and made a sound.

&#34;Un... i... den... ti... fied...?&#34;

The old saying came to mind: repetition breeds learning. It could definitely imitate speech. Ken felt a rush of triumph - and a flicker of unease. It had never heard English before, yet repeated it perfectly. There were parrots on Earth that could mimic speech, yes, but this creature&#39;s learning speed was astonishing.

Pushing aside the fear, Ken spoke again.

&#34;Unidentified lifeform, can you hear me?&#34;

&#34;Un... i... den... ti... fied... life... form...&#34;

Ken nearly fainted from shock. He quickly recorded notes on his PDA.

&gt; The subject has learned a new word.  
&gt; Displays mimicry ability beyond that of parrots, likely possesses higher cognition on par with primates.  
&gt; Further research recommended.

-----

The next few days passed in a blur. Hearing new sounds, repeating them, over and over. He felt like a parrot, but it didn&#39;t matter. To survive here, he had to do whatever it took.

Like a hatchling raptor tilting its head, he tried to absorb every sound he could hear. Whenever the long, cow-like beings spoke, he strained to mimic each phrase, each tone.

At first, his voice was rough, like scraping pebbles by hand. Later, it softened - almost like a song.

The language of this world became song, and song became meaning.

The long creature who called itself &#34;Ken&#34; came nearly every day. He would stand behind the glass, jotting notes, muttering to himself, and occasionally speaking to him. Once a figure to fear, Ken was now one he could trust. There was resonance in his voice. Warmth. Courage welled up in him. He decided to try a greeting in this world&#39;s language.

&#34;Good morning.&#34;

Ken froze mid-note, eyes widening. Then he smiled.

&#34;Good morning!&#34;

Ken&#39;s voice was bright with excitement. Across worlds, across species, joy had found resonance.

&#34;Good morning.&#34;

He echoed the words back.

&#34;You remembered,&#34; Ken said.

Remembered. A strange word. I should remember it.

-----

&gt; The subject spoke for the first time. The phrase was &#34;Good morning.&#34;  
&gt; Demonstrates comprehension and memory, not mere mimicry.  
&gt; Displays high-level intelligence comparable to humans.  
&gt; Further research recommended.  
&gt; @@ @@  
&gt; Note: Who knew the words &#34;Good morning&#34; could feel so new.

-----

@@ @@

+ Name, Resonance, Paul Tree

About a week later, the new containment chamber had a window.

As was typical of the Highlands, the weather was gloomy almost every day, and since the Foundation facility was in a remote area, the view offered little more than trees - but it was better than being surrounded by white walls. Two of them still were, but that was fine.

Sitting on the strange perch (the long creatures who called themselves &#34;humans&#34; called it a &#34;chair&#34;), he found comfort in watching the hazy world beyond the one-way glass.

He had many complaints, but if he had to choose one, it was how they addressed him. Some called him &#34;the subject,&#34; others by strange numbers, and the most important one, Ken, called him &#34;unidentified lifeform.&#34; It meant &#34;a living thing not yet known,&#34; apparently. He didn&#39;t like it.

When he fell, he had forgotten his resonance - the name someone once called him with affection and song. Perhaps it was due to his injury.

Just then, Ken entered the room with another human in heavy gear.

Do they think I&#39;m armed or something?

-----

Ken had been visiting regularly to check on the creature&#39;s condition, granting several requests along the way.  
He had moved it to a chamber with higher ceilings, installed lights with a solar spectrum, diversified its diet beyond grains, and even allowed a foggy window view of the outside.  
Under the label of &#34;behavioural study,&#34; he wanted to offer as much comfort as possible. After all, even zoo animals received some measure of care.

But one thing was still missing - what to call it.  
They couldn&#39;t keep referring to it as &#34;Anomalous Entity 414,&#34; &#34;Unidentified Lifeform,&#34; or &#34;Subject.&#34;

Today, he intended to ask.

Ken entered the chamber with the guard.

&#34;Good morning.&#34;

&#34;Good morning.&#34;

It was already past noon, but repeating their first shared greeting had become a small ritual between them.

&#34;It&#39;s twelve-oh-three, sir,&#34; the guard interjected.

&#34;Right,&#34; Ken replied curtly, turning back to the creature.

&#34;So, how are you today?&#34;

&#34;Not much different from yesterday. I do like this strange perch, though. It&#39;ll be useful until my wings heal.&#34;

The unidentified lifeform saw the chair seat as a set of steps and the backrest as a perch.

&#34;But there&#39;s something that bothers me...&#34;

&#34;Go on.&#34;

&#34;My resonance.&#34;

&#34;Resonance?&#34;

&#34;In your words... what was it again? Name?&#34;

&#34;That&#39;s exactly what I wanted to talk about,&#34; Ken said, taking out his notebook.

&#34;We can&#39;t keep calling you &#39;subject&#39; or &#39;unidentified lifeform.&#39; Do you remember any name?&#34;

The creature thought for a long time.

&#34;My resonance... I don&#39;t remember. It was a beautiful one my mother gave me, but it was lost in the sound of the wind.&#34;

Ken found the phrasing poetic but decided not to comment. Then, as if on cue, the guard spoke up.

&#34;How about Poultry? You know, bird meat.&#34;  
[[footnote]] Author&#39;s note: In English slang, &#34;fresh meat&#34; is used for new recruits or inmates. &#34;Poultry&#34; means domesticated birds or their meat.[[/footnote]]

Ken shot him a sharp glare.

&#34;Some things you don&#39;t joke about.&#34;

&#34;I was just kidding...&#34;

The guard floundered. The creature tilted its head.

&#34;Poultry? Meat? What does that mean?&#34;

Ken sighed and explained.

&#34;Sorry, he&#39;s tactless. It&#39;s not a nice term. It refers to birds raised or eaten as food.&#34;

The creature blinked slowly, lost in thought.

&#34;Food... bird...&#34;

It seemed to sink deep into its mind, half-closing its eyes in contemplation. Ken glared again at the guard, who shrank back.

Finally, the creature spoke.

&#34;...In our world, there&#39;s a saying. &#39;Even the smallest wing feeds the whole sky.&#39;  
To eat something is to make it part of the world. It&#39;s often said when a child dies as a phrase of respect and remembrance. It&#39;s not a bad meaning. It carries memory.&#34;

Ken started to speak, then stopped. Silence lingered. The creature&#39;s words had weight - and dignity.

&#34;Still...&#34; Ken said carefully, &#34;If you&#39;d prefer another name, that&#39;s fine too.&#34;

The creature&#39;s expression changed. Its eyelids narrowed, and the edge of its beak curved slightly upward. A smile, perhaps.

&#34;Poultry.&#34;

It repeated softly.

&#34;Paul Tree.&#34;

It said again, rolling the sounds around its tongue.

&#34;Does that sound like a name?&#34;

Ken sighed in disbelief. &#34;Close enough.&#34;

&#34;A name with roots,&#34; the creature said with amusement, thumping its chest.

&#34;Paul Tree. That&#39;s me. I am Paul Tree.&#34;

Paul Tree seemed quite pleased with the name.  
Ken turned to the guard with a look of weary resignation.

&#34;Congratulations. You&#39;ve just named him - and dodged a disciplinary report.&#34;

-----

&gt; The subject has chosen the name &#34;Paul Tree&#34; for itself.  
&gt; Though the name originated from an inappropriate joke, the subject took no offence and accepted it positively.  
&gt; Therefore, disciplinary action against the guard is not requested, and the chosen name is to be officially registered.

Ken filled out both the registration and non-disciplinary forms with a rueful smile.

Through the camera lens, inside the chamber, the being now called Paul Tree perched on the chair&#39;s backrest, gazing at the rainy world outside and singing. The voice was astonishingly beautiful for something that looked so much like a chicken.

&#34;Paul Tree...&#34; Ken murmured.  
A man&#39;s joke had become another being&#39;s name.  
The world, truly, was full of wonders.
