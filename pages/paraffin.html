The stop in front of the candle store is brief. Only two people have waited at this stop for the last few months. Today, the old store employee quietly chews a stick of gum. The young woman scrolls down her phone, but pauses when she hears the bus approaching. The two regard each other for a moment, like they do every day, before stepping onto the bus. They slip into their chairs facing each other and both preoccupy themselves with their own little activities.

The commute takes 20 minutes for the young woman. It&#39;s so exact to the point where she could set a timer on her phone, not pay attention and still know when to get off the bus. The young woman appreciates this clockwork, it helps her concentrate on her music more. Today’s music playlist will be smooth jazz, she decides. 

It&#39;s a much longer commute for the old store employee. He tries to sleep, but it is the first time in a long while that his trying does not succeed. He monotonously thinks about how his day was, and how his family’s day might’ve been. He sold two, almost three candles today. That was passable. Maybe tomorrow he will try and sell three, almost four.

The smooth jazz melts into the woman’s ears like butter. She looks outside the window and sees a row of orange trees. It always cheers her up, this beautiful natural display, at the end of a long day. She thinks about the work she must do when she gets back home.

The old store employee still cannot fall asleep. He is trying so hard he feels as if he is making himself more tired. What he would give to snap his eyelids shut and melt into his seat, drifting slowly in the endless realms of the sleeping world.

The young woman suddenly realizes a hum harmonizing with the smooth jazz. She is still looking outside, but decides to soon tell the old store employee his strange accomplishment.

The old store employee can’t believe it, he is finally falling asleep! How wonderful, maybe he will dream of selling more candles. Then he can make it a reality.

A sticky sensation is now pooling around the young woman’s foot.

And the old store employee is now gone.
