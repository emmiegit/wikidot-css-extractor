||~ Description|| Item is a toy gun capable of shooting wind-up toy dinosaurs, ranging in size from 10cm (3.9 in) to 30cm (11.8 in) in height. Field testing indicates the gun can be fired endlessly. Dinosaurs seek out the nearest moving target after being fired, and will lunge up to 5 meters when in close proximity. Toys will attempt to bite their target and become inactive afterwards, regardless of success. Sharp teeth materialize mid-jump and are retracted after biting; testing shows ability to inflict deep wounds and penetrate Kevlar. Deconstruction of inactive instances show no signs of such teeth or presence of strong metals.||
||||||||~ Marshall, Carter and Dark, Ltd.||

------------

||||||||~ Initial Report||
||||||||~ Q34P5/KO5O5/9H4YT||
||~ Author || P. Weissman ||~ Date || June 16th, 2022||
||~ Interest|| Medium ||~ Identifier|| JurassiMax™ Toy Shooter||
|||||||| Item came into MC&amp;D custody after a representative won a storage locker bid in Lake Huron, Ontario. _
 _
Initial scans show no anomalous modifications. R&amp;D testing revealed the item is capable of spontaneous material creation, spontaneous energy creation, and primitive intelligence. No indication of make or origin could be found.||
||||||||~ Marshall, Carter and Darke, Ltd.||

------------

||||||||~ Memo One: Initial Report Addendum||
||||||||~ Q34P5/KO5O5/9H4YT||
||~ Author || P. Weissman ||~ Date || June 19th, 2022||
|||||||| Considering the state of our business and quality of this item, finding a buyer is of upmost priority. Our branch&#39;s financial instability paired with Foundation presence has us on ice and a turnaround must be made soon. We need income desperately and finds like these are hard to come by. _
 _
If any future sellers have questions, take it to your manager. Do not reach out to me. I&#39;ve submitted a transfer request and will be going somewhere that can afford coffee and napkins.||
||||||||~ Marshall, Carter and Darke, Ltd.||

------------

||||||||~ Product Reevaluation Card||
||||||||~ Q34P5/KO5O5/9H4YT||
||~ Author || C. Hicks||~ Date Filed|| May 16th, 2024||
|||||||| Found this again while scouring our more neglected offers, it&#39;s been up on the market for nearly two years and seen no activity in six months. With a spotlight and a little luck, we can easily make a sale at current price (possibly more!). _
 _
Our great minds up at R&amp;D were crazy thorough, lots of good data to show off. They estimate it&#39;s stocked with endless dinosaurs, and they come in all sorts of different shapes sizes, colors, etc etc. Found an interesting tidbit about a weird one they couldn&#39;t recognize. Research heads thought it was fake or a defect or something, turns out it was a new species that got dug up a month later. As for the weapon aspect, these things are super crazy. The dinos jump far and they can get churned out fast, slow mo footage shows them off some crazy sharp teeth. The testing logs say their bites can poke through Kevlar(!!!). What I&#39;m trying to say is we have a big market to appeal to, archeologists, skip collectors, gun freaks, you name it. _
 _
I see a bit of a hiccup down the road with this whole &#34;Jurassimax&#34; company. Double checked our logs and I can&#39;t find any history of them existing. If buyers are worried about manufacturing deets, this could easily scare them off. Push comes to shove we can find another buyer, but any lost customer is lost time and profit. _
 _
I&#39;ll ring up marketing sometime in the next week and see if they can work some of their magic, I think we got something special.||
||||||||~ Marshall, Carter and Dark, Ltd.||

------------

||||||||~ Memo Two ||
||||||||~ Q34P5/KO5O5/9H4YT||
||~ Author || C. Hicks||~ Date Filed|| August 30th, 2024||
|||||||| It&#39;s a shame we&#39;re forced to lay low, but we can still turn this around. Foundation watchdogs got frozen by their higher ups for a structural reshuffle, improper conduct and such. Straw that broke the camel&#39;s back is their supposed state of the art spy bot choosing the name &#34;John Johns&#34;. Oops. I heard through the grapevine their B-Team isn&#39;t exactly top notch, so we have some wiggle room to work with. _
 _
I&#39;ve been talking to our previous bidder, Mr. Erik, and he&#39;s eager to strike a deal. He&#39;s heard about our dicey situation and upped his bid to 600 to compensate (100 above market price!) and says he wants to discuss dead drop locations ASAP. _
 _
I&#39;ll be filing a request to get this item out of hold tomorrow. I&#39;m hoping you can give me a quick response back, I have a feeling this&#39;ll be the jumpstart we&#39;re looking for.||
||||||||~ Marshall, Carter and Dark, Ltd.||

||||||||~ Memo Three ||
||||||||~ Q34P5/KO5O5/9H4YT||
||~ Author || C. Hicks||~ Date Filed|| September 27th, 2024||
|||||||| I&#39;m assuming all of you getting this memo you&#39;ve already seen the news. The Foundation has mobilized investigation teams and it&#39;s only time before they trace this back to us. Attacks like these cause unprecedented stir, not only among the anomalous community, but in the general public as well. Someone is going to answer for this and I&#39;m not going to be around when that happens. _
 _
I&#39;ve done my homework and looked into our buyer post mortem, he&#39;s a member of an underground paraterrorist group that&#39;s been stocking up on anomalous weapons for the past year or so. Turns out this isn&#39;t some big secret either, he&#39;s come to several of our North American branches and been turned away from every single one, every one except ours. If you pull up his file in our database he&#39;s got a blacklist tag right under his name, plain as day, but of course our background checks guy got laid off last February. We didn&#39;t even need the background checks guy, anyone could have looked, anyone could have typed out his name just once, but no one did. _
 _
I&#39;ve already sent in my official resignation from MC&amp;D, I&#39;m getting out of the country immediately and I recommend the rest of you do so too. Despite everything, it was a pleasure working with all of you.||
||||||||~ Marshall, Carter and Dark, Ltd.||
