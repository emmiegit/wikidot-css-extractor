    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>Posters. The whole thing was just posters, as far as the eye could see. Rows upon rows of posters, several square feet each, densely packed with text and graphs that made Iris&#39; eyes roll right off of them like they were made of teflon. To make matters worse, everyone was congregating around the posters, forming an impenetrable sea of milquetoast thirtysomethings and twentysomething grad students with nothing behind their eyes. Iris supposed the latter would at least help her blend in.

&#34;Something wrong, sir?&#34; Jackie asked, and Iris scolded herself for frowning so obviously.

&#34;Don&#39;t call me that when we&#39;re out, alright?&#34; Iris grumbled, scanning the sea of people and posters to find something of interest. &#34;And, I dunno, I guess I just thought they&#39;d have something a bit more... exciting.&#34;

Jackie blinked. &#34;This is a geology conference, Iris&#34;

&#34;...Well, were your conferences more interesting?&#34;

&#34;I went to a lot of life science conferences, so no,&#34; Jackie said decidedly. &#34;If we brought our work it would either scare the subjects or make everyone there shit themselves and die.&#34;

Iris frowned harder.

&#34;Alright, guys, lock it in,&#34; Adams sighed. Iris turned to look at the rest of the group, Adams at the front, looking serious in her somewhat goofy-looking outfit of a three piece suit over her full-body super suit, and Anne behind her looking like she was just enjoying watching Iris have a bad time. And Foxx was... uh...

&#34;Where&#39;s Foxx?&#34; Iris asked. They&#39;d barely walked into the damn conference hall and he&#39;d already disappeared.

Adams pinched the bridge of her nose, which was always a good sign not even thirty seconds after arriving at an operation. &#34;He wanted to go make sure he has his... uh, &#39;personal items&#39; where he can reach them.&#34;

Anne&#39;s head tilted. &#34;He got vibrators or something?&#34;

&#34;Would you - Would you shut the fuck up?&#34; Iris snapped. She was both annoyed that she had let Anne onto the team in the first place, and also strangely thankful that she was at least acting exactly as Iris had expected her to. &#34;He&#39;s just weird about his guns, is all.&#34;

&#34;Ah,&#34; Anne said with a nod. &#34;He did always strike me as one of those super pro-Castle Doctrine types.&#34;

Iris decided that asking Anne what that even meant would just make her even more pissed off, so she elected to move on. Mustering a voice that sounded confident enough to seem important without being loud enough to draw attention to herself, Iris reiterated the plan. &#34;Alright, we all know who we&#39;re here for, so we just need to get ahold of them. We&#39;ll intercept him on the underground floor, so Anne and I will get a few photos of it in advance, and you two - and Foxx, when he gets back - will figure out when he&#39;ll be there. Should be just before he&#39;s presenting whatever it is that&#39;s got command so worried.&#34;

&#34;If they were so worried, you&#39;d think they&#39;d help us out a bit more. The goddamn Insurgency could at least get me some pictures,&#34; Anne scoffed. For someone who willingly defected from the Insurgency, she sure liked to use her time there to bitch about the Foundation.

&#34;Look, they said they wanted to keep things on a low profile because of &#39;suspected hostile action.&#39; I mean, it&#39;s like they&#39;ll have a White Suit, whoever they are,&#34; Iris said dismissively. Chances were they were just trying to make things a little bit harder for Iris so the people trying to sell anomaly usage had more ammunition. She could already hear them going on about &#39;on-site intelligence gathering leveraged by anomalies.&#39;

“So I’m with you, then?” Anne smiled like a child who just got a new toy with an obnoxiously loud speaker. “I&#39;m flattered.”

“Shut up. I just want to keep an eye on you.” That was half true, at least. “Jackie’s in her element here, and Adams and Foxx are…&#34; Properly socialized adults. &#34;...More experienced with this kind of thing.&#34;

Anne&#39;s expression dropped a little bit. &#34;You know like half of my job before coming here was just talking to people, right?&#34;

&#34;Y&#39;know what? Buddy system. There&#39;s your reason,&#34; Iris snapped. &#34;Are we good?&#34;

Adams rolled her eyes, Jackie nodded, and Anne shrugged. Good enough. &#34;Alright, let&#39;s get going. I know we don&#39;t have a set timeframe, but that doesn&#39;t mean we should stall,&#34; said Iris in a faux-dignified tone.

Iris turned and made her way into the building, trusting that Anne at least had the good sense to not get separated. She felt a little self-conscious as she made an abrupt 90-degree turn to walk along the perimeter of the conference hall upon realizing that she simply wasn&#39;t tall enough to see very much in such a crowd of people, but Anne probably didn&#39;t notice - no, who was she kidding, Anne was probably wearing a shit-eating grin. Bastard. Iris didn&#39;t want to dignify her by turning around to check if her assumption was correct.

She made it to one of the room&#39;s four walls, and slowed down a bit to scan her surroundings. In all honesty, she had only started walking to end the conversation earlier. She didn&#39;t actually have much of a plan. At the very least, it didn&#39;t seem like anyone at the conference was paying her very much attention, as she seemed to fit right into the crowd of disinterested and/or exhausted grad students hanging around the periphery of the room. She narrowed her eyes as she scanned the room, looking thoughtful. As long as Anne thought she had a plan, Iris would be able to tolerate her.

Anne leaned into Iris&#39; field of view. &#34;You don&#39;t know what you&#39;re doing, do you?&#34;

&#34;Guh...!&#34; Iris choked as her face recoiled from the totally unfounded and completely truthful accusation. She cleared her throat. &#34;Yes I do.&#34;

&#34;Aha. You&#39;re not a very good liar, you know.&#34;

&#34;Shut up,&#34; Iris groaned. &#34;We just need to look for a staircase.&#34;

&#34;Mmm.&#34; Anne gave Iris a knowing look. &#34;Alright, but the door&#39;s going to be locked.&#34;

&#34;Well, then you can just pick the lock,&#34; Iris shot back.

Anne brought a finger up to her mouth to feign thoughtfulness that fooled nobody. &#34;Oh? What makes you think I know how to do that?&#34;

Iris only bothered responding with a cold look.

&#34;Well, even if I //did,// it&#39;s not like I have any tools,&#34; Anne said. Iris inhaled to respond that Anne //should// know she has stuff like that in some of her pictures, but Anne beat her to the punch. &#34;Besides, a scratched-up lock would be a good way to tip someone off that something&#39;s up.&#34;

Despite how badly Iris just wanted to stare at Anne until she relented, after a solid fifteen seconds without Anne so much as dropping that dopey smile, it became clear that Iris would have to say something. When it came to commitment to the bit, she was simply outgunned. &#34;Well, we&#39;ll...&#34; Iris had decided to fill the silence before she knew what to fill it with, and Anne gave Iris a smug let slightly pitying grin. &#34;We&#39;ll just talk to a janitor,&#34; Iris huffed.

&#34;Okay, that&#39;s a good idea!&#34; Anne&#39;s voice was reminiscent of the tone you&#39;d use when coaching a kindergartener.

&#34;Don&#39;t patronize me,&#34; Iris snapped. &#34;You&#39;re the one on probation here, not me.&#34;

&#34;Bah, and here I thought you just wanted a buddy.&#34;

&#34;Shut up,&#34; Iris said without any real venom. She only had so much energy to spare on Anne, after all. They could pick this back up once this mission was over, so Iris moseyed on over closer to the staircase.

&#39;Mosey&#39; is an odd term, Iris thought. How does one mosey? She took her hands out of her pockets and let them move back and forth like a normal person. Uh. How did a normal person do that? Now that she was thinking about it, she was acutely aware of the speed and angle of her arms swinging. Were they exaggerated? If they were, someone would probably notice, and then-

Iris felt a light tugging behind her eyes as Anne slid up next to her. &#34;Y&#39;know, I know this is a bit of a platitude - uhh, I mean, um, cliche - but the best thing you can do for these kinds of situations is just to not overthink it. 80% of social engineering is just &#39;Be cool and people will think you&#39;re cool.&#39;&#34; Anne&#39;s tone was one of genuine reproachfulness, which only incensed Iris even more. And the fact she was doing that mind-reading thing in order to figure out what to say was just icing on the cake. What, her constipated-looking walk wasn&#39;t enough for her.

&#34;You really think you&#39;re something, hm?&#34; Iris said tersely. &#34;I was blending in just fine when I met //you// for the first time,&#34; she groaned.

&#34;Mm, well, looking so unapproachable that everyone does their best to ignore you is one way of avoiding attention. Credit where it&#39;s due.&#34;

Iris&#39; mosey faltered a little. Was that really...?

Anne looked back at Iris, grimaced a little, then doubled back to talk to her without needing to raise her voice. &#34;Y&#39;know, I uh...&#34; She trailed off when Iris made eye contact. &#34;Ahem. Seems like we&#39;re in luck, there&#39;s a janitor over by the staircase.&#34; Iris followed her restrained gesture over to a tired-looking man in a black outfit, somewhat grateful that Anne, for once, decided just to not push it with her.

She was quickly reminded why she hated Anne when the corners of her mouth peeled up into a self-assured grin. &#34;Alright, you said I was on probation, right? Just think of this as a test for me,&#34; she said as she turned and walked over to the janitor, who had yet to notice them.

Iris grabbed the back of her coat before she could get far and yanked Anne back to her before she could get up to anything. &#34;Do you even know what probation means? It means you can&#39;t do any stupid shit,&#34; Iris scolded. &#34;I&#39;ll handle this.&#34;

Anne assumed a doubtful, if somewhat derisive expression. &#34;Alrighty then, Cap&#39;n. The floor&#39;s all yours.&#34;

Iris frowned, and her cheeks started to feel a bit warm. She felt as though she wasn&#39;t sure who was the one on probation anymore.

She shook her head. At least Anne had the good graces - or at least the self-preservation instinct - to not try and read Iris&#39; emotions with that anomaly of hers, so Iris just elected to progress the mission and go butter up the janitor. Actually, hang on, was butter up the right word? Well, she was trying to get him to do her a favor, right? Do... Do people really do things like that for strangers they don&#39;t know? Would they need to like the person first? How was she supposed to get a new person to like her? She barely ever met new people, aside from Anne, but Anne was a fringe case since she was probably just a maso-

&#34;Um... Can I help you?&#34;

Oh shit. She had walked right up to the guy without even thinking. Then she jumped back a bit without even thinking. Okay, she could recover from this. Even if she could swear she could hear Anne suppressing a laugh. She just had to lay on the ol&#39; Iris charm that was probably in there. Somewhere.

&#34;Ugh, I need to, um. Get in there.&#34; Iris finished off with a quick point over to the door before she figured that she might look dumb holding her arm out, and quickly brought it back down again. Okay. That sounded pretty normal. She told herself she definitely didn&#39;t feel like Anne was staring at her because there was nothing to stare at.

&#34;...Excuse me?&#34; The man leaned in and turned his ear towards her, and she instinctively recoiled back. No, that was bad. That was gonna make him think she thought he smelled or something. That was counterproductive.

Iris forced down a small jolt of annoyance at having to repeat herself. Alright, speak clearly, and confidently. Well, maybe not totally confidently - Adams liked to put on a helpless-sounding affectation when trying to win men over - but she should at least sound fluent. //Would you be able to let me through that door,// Iris repeated in her head. That was all she had to say.

&#34;Would you be able to let me - uh - I mean, can I get through that door - I mean into the staircase //past// the door, but I guess I... just need the door.&#34; God fucking dammit her mouth just didn&#39;t stop moving once she opened it. She bit the inside of her cheek. She could hear people around her talking, just like before, but now she could swear they were saying something about her. She was suddenly assailed with thoughts of how comfortable her room was when she was alone in it and how much she&#39;d rather be there.

&#34;Oh, uh... Sorry, I can&#39;t let anyone back there.&#34; The janitor sounded confused, if apologetic.

&#34;Oh, yeah, that&#39;s fine. Sorry...&#34; Iris said, turning to slink back to- No, wait, hold on, that wasn&#39;t fine at all. She needed to get through there, one way or the other... Right... She&#39;d just have to pull her gun out and threaten him.

&#34;Sorry about my friend, she gets nervous around new people sometimes. I promise, she&#39;s really quite nice once you get to know her, eheh.&#34; A somewhat forced laugh, but convincing enough if you didn&#39;t know how Anne normally laughed. //Anne.// Of course she had to come in and make everything worse, right at the worst possible time. Hey, if Iris was already gonna take her gun out, maybe she could just...

&#34;Oh. It&#39;s no problem, really. I was just - um - surprised someone came up and started talking to me.&#34; The janitor fell for it. Of course he did, Iris realized his cheeks were rosy. This only served to make her more upset. She would not be reflecting on the fact that she would have gotten more annoyed no matter how this situation developed.

&#34;Aha, no problem.&#34; Anne gave a nonchalant wave of her hand to accompany her easygoing smile that betrayed nary a hint of an ulterior motive. &#34;It&#39;s just that... well, if you can keep a secret, me and my friend messed up, and we could kinda use your help, is all.&#34;

&#34;Oh? Uh, okay.&#34; The janitor leaned forward, clearly invested.

&#34;We&#39;re helping out Dr. Woodrose with some of his research into theoretical cryovolcanic phenomena, so we needed to conduct some experiments over in the Physics Research Building in order to - ah, sorry, it&#39;s not important,&#34; Anne said with an apologetic chuckle. &#34;My point is, we left some of the data readouts back in the sublevel hallways when we were leaving, and if we don&#39;t get it back, we&#39;ll kinda be... well, a little screwed. Can we get down there real quick to grab it?&#34;

&#34;Um...&#34; The janitor furrowed his brow, appearing deep in thought for what was a yes or no question. &#34;Well, I can probably run down there and grab it for you. What&#39;s it look like?&#34;

&#34;Oh, me and my friend here will find it a lot faster. It&#39;s just a stack of papers, and we already know where it is, so we only need to run down and grab it. You don&#39;t even have to leave the room, it&#39;ll just be a minute.&#34; Anne clapped her hands together as though she were praying. &#34;Please help us out?&#34;

Iris, for one, thought she was laying it on a little thick. Did the woman not have any shame...? Well, she did ask to work under the woman who shot her and almost beat her to death. So Iris probably already knew the answer.

The janitor visibly waffled for a bit, but even Iris could tell where this was going from his response to Anne&#39;s bait. Sure enough, once he had confirmed that none of the scientists were paying much attention to the nondescript janitor, he unlocked and even held open the door for the two of them. &#34;I&#39;m not really supposed to let anyone down there, but if you two can already get in there during normal hours, it&#39;s not a big deal. Just don&#39;t tell anyone, okay?&#34; He asked as Anne strode confidently through the doorway.

&#34;Oh, of course!&#34; Anne replied in a conspiratorial yet good-natured tone. &#34;We&#39;ll be just a minute. You&#39;ve been a huge help!&#34;

 Iris walked behind her as they descended to the lower levels, trying not to look as sheepish as she felt. Humiliating. Getting shown up by Adams - hell, even Jackie - was one thing, but Iris felt like she just challenged a child to a game of chess to teach them humility then got her shit rocked. An analogy that only further worsened her mood by digging up a particularly unpleasant memory from a time she made a bet with Anne back at Site-17.

&#34;I just took some bullshit words I saw on some of the posters and trusted he hadn&#39;t seen any of them,&#34; Anne said, unprompted, as they reached the lower level corridor. &#34;For the professor&#39;s name, I just saw who one of the more recent additions was to the faculty list when we entered. The janitor would be less like to know enough about a new guy to call me out.&#34;

Iris just looked at her. Noticing the lack of response, Anne turned back to look at Iris with a... shockingly non-judgmental expression. &#34;Name-dropping a mutual acquaintance or someone important&#39;s a good way to make it seem like you belong somewhere you don&#39;t. That&#39;s why I wanted to get specific with the professor.&#34;

A couple seconds passed in the empty hallway, the indistinct sounds from upstairs doing little to alleviate the stale air. Iris recognized that the ball was in her court here, but she wasn&#39;t entirely sure what Anne was expecting. Well, whatever. &#34;Cut the small talk. We should get these photos and get out.&#34; Iris straightened out her posture and walked past Anne to get a good angle for a photograph.

As Iris was making sure everything on her camera was in order as she took it out of the case resting around her neck - not that anything would be off with how well she treated it, but a habit&#39;s a habit - Anne moseyed over to her side. Iris huffed as she could just sense that Anne was going to push her luck here. Maybe she should have scolded her properly for undercutting her with the janitor.

Moving into Iris&#39; peripheral vision like a bug crawling across her bedroom wall, Anne cocked her head to the side. &#34;C&#39;mon, don&#39;t make me get a read on you. You&#39;re way too tough to do it easily,&#34; Anne nagged. &#34;How&#39;d I do?&#34;

A pause. &#34;I&#39;ll take a simple &#39;thank you&#39; if that&#39;s all you&#39;re feeling up for.&#34;

Pursing her lips, Iris begrudgingly turned to look at Anne. Despite her last comment, it didn&#39;t look like she was getting a kick out of Iris&#39; reaction. Iris... couldn&#39;t really get mad anymore. Damn that woman and her sympathetic country girl eyes. &#34;...Is that it?&#34;

Anne raised her eyebrows a bit. &#34;What? You want the full rundown? Sorry, it&#39;s just that usually when I start talking for any length of time you just-&#34;

&#34;No, I mean...&#34; Iris became aware of how poorly her tongue fit into her mouth. &#34;I just, y&#39;know. Seems like low-hanging fruit is all.&#34;

&#34;Oh, that?&#34; Anne seemed surprised Iris was even bringing it up. &#34;I&#39;d have to be a pretty big asshole to give you shit for something that&#39;s hardly your fault.&#34; She tapped her forehead a couple times, adding &#34;Hence the advice.&#34;

Iris wasn&#39;t really sure how to take that. So she tried to turn her attention back to her camera, which, if nothing else, wouldn&#39;t be analyzing her. &#34;...You //are// an asshole,&#34; she mumbled halfheartedly.

&#34;Well, yeah, but I got standards, too.&#34; Anne turned her head to the side. &#34;Thought you knew that by now.&#34;

&#34;Mm. Maybe I did.&#34; Iris&#39; noncommittal response trailed off...

...Still, she felt something nagging at her. &#34;So, what? Was I on probation too?&#34; She asked, barely more assertive than a mutter.

&#34;What, from me?&#34; Anne pushed air out of her nostrils. &#34;Nope. I pretty much had my mind made up about you from the day we met.&#34; She looked back up to meet Iris&#39; eyes. &#34;Never took you for much of a liar, &#39;s all.&#34;

Iris&#39; mouth opened, just a little bit. Anne wasn&#39;t being annoying, at least not trying to, but she was being... well, she was being //something,// and Iris didn&#39;t like it. After a couple seconds, she clenched her jaw, then it was her turn to look off to the side. &#34;Well.&#34; Now what was she supposed to say to that. &#34;I don&#39;t really know how to take that, Anne.&#34;

Anne watched her for another few seconds. One thing that could be said for her, though, is that she had a good sense of the flow of conversation. Mercifully good, even. &#34;Hey now, don&#39;t worry about it. Lying&#39;s not a good skill to have.&#34; A hint of something crept into her voice before she brushed past it. &#34;Besides, honesty&#39;s one of your charm points,&#34; she added with a wink.

Alright. Iris knew how to respond to that. &#34;You&#39;ve got to be the most insufferable person I&#39;ve met,&#34; she groaned. &#34;Let me focus on taking these pictures, alright? Can you manage that?&#34;

Anne offered Iris an ear-to-ear smile, the kind that made your eyes squint, and Iris wondered how much of it came naturally and how much of it she practiced. &#34;Oh, don&#39;t worry about me, Cap&#39;n.&#34;


----


Geologists had a tendency to be defensive when it came to their chosen field of study. It wasn&#39;t exactly surprising, all things considered, as most people tended to find things that move or at least change to be of more interest than rocks, Jackie included. &#39;That&#39;s actually a common misconception,&#39; they&#39;d reply, clearly seething but making a commendable effort to appear approachable, &#39;but geological formations are actually changing around us all the time!&#39;

Right. Of course. And the sun was getting closer to blowing up all the time, but she still didn&#39;t care. Jackie understood, of course, that geology was an important field of study, but truthfully she never spent much time considering the field or those that worked in it.

And yet. Despite all this, she found herself looking at a display case with rock samples that, if the manually typeset captions were anything to go by, hadn&#39;t been opened since the general voting public was still afraid a Catholic president would make the country a vassal state for the Vatican.

So why was she letting her eyes trace over the old captions instead of gathering information for what might be a critically important mission for one of the most powerful organizations in the world? That was a wonderful question. Sure, she had told Iris that she was up to the task of asking around, but despite her academic background she didn&#39;t feel particularly well-suited for information gathering. Having had a professional career, simply yes-and-ing her superior came as naturally as anything else.

They didn&#39;t need her as long as Adams was on the case - she was more of a warm body just to fill out the task force&#39;s &#39;anomaly&#39; roster from the start.

Of course, it&#39;s not like this was the only mission she felt was pointless.

Of course, it&#39;s not like she only felt that way during missions.

Jackie allowed herself a few seconds to let that feeling gnaw at her before she decided to find something to distract herself. The rocks certainly weren&#39;t cutting it. She should have known better. But, then again, what else was there? A bunch of posterboards that don&#39;t even have rocks, just pictures of rocks. It seemed someone else even came over to the display to distract themself.

The person was at once attention-grabbing and forgettable. A smaller build and an androgynous face that made it difficult to tell how old they were supposed to be. Aside from the tall and thin... cylinder thing they held on their back wrapped in fabric, it might have been difficult to discern any distinguishing features on them. To top it all off, they were staring at the mineral samples as one might stare at a wall of dry paint - Jackie couldn&#39;t even see their eyes moving much.

That was, of course, until their eyes darted up to Jackie.

Jackie found herself with a newfound pity for walls of dry paint, seeing their eyes staring right into her. She felt like a bug under a microscope despite quite handily having a good foot and a half on them, but then again, Jackie was never very good with kids. It was always hard to understand where they were coming from - but maybe she was getting ahead of herself. For all she knew, they could just be a late bloomer.

After a couple seconds, it became clear that this wasn&#39;t just one of those things where you accidentally make eye contact with someone then mutually try to act like it never happened, so Jackie decided it would be good to introduce herself. Didn&#39;t want this getting awkward.

&#34;Hello.&#34;

No response. Maybe she thought Jackie was going to continue?

&#34;My name&#39;s Jackie.&#34;

The person-of-indeterminate-qualities blinked. Probably for the first time. &#34;Okay.&#34;

No further communication. Alright, well, maybe Jackie shouldn&#39;t push them for their name. Some people were just picky about that. Yet, at the same time, she didn&#39;t want to be the one to break eye contact or just walk away. Well, she did, but she didn&#39;t want to upset anyone. She just wanted to wrap up this interaction without a headache. Perhaps they were looking for her to move the conversation (she was using the term loosely) along?

&#34;Um... what do you have there? Seems interesting.&#34;

&#34;An oboe.&#34; Answered immediately, without a hint of pride or... much of anything, really.

Jackie squinted. That seemed like an odd way of carrying something so expensive and fragile. &#34;Don&#39;t those come apart to go into cases?&#34;

This, at least, caused the oboe-player(?) to stop for a second while thinking of an answer. &#34;Yes, I think they do.&#34;

&#34;...So why don&#39;t you do that?&#34;

They blinked again. &#34;Do what?&#34;

Jackie pursed her lips. Now what the hell was she supposed to say? Maybe she should try just shutting up. If she couldn&#39;t manage that, she&#39;d have no business telling Anne off.

Seemingly arbitrarily, though, the oboist just turned back to look at the display again, much in the same manner they had been - seemingly oblivious to Jackie&#39;s presence. Jackie waited a few seconds like she was expecting another odd interaction to just happen //at// her, then decided that she should clear out before anything else happened. Maybe go find Iris and make it look like she was working hard. Or hardly working. Eheh.

&#34;Jackie,&#34; the oboist said the second she had started to make her way back towards the crowd. Spoken like it was just two syllables rather than a name. Damn it. She should know better than to have acted so friendly. She&#39;d gotten too used to acting all nice after spending all that time with her boss.

The oboist turned to Jackie and pressed a finger to the glass, either not noticing or not caring that Jackie had clearly been leaving. &#34;What&#39;s that?&#34;

Well, in for a penny. Jackie walked back over to the display case, not letting her annoyance show too much - but, y&#39;know, not //not// showing it at all - and looked at where the oboist was pointing, already back to staring pointedly at the crystal in the display case.

Jackie squinted. She didn&#39;t know much about geology or anything, but she did know her elements, at least, even if the person who was making the labels back in the Eisenhower administration gave up before getting to that side of the case. &#34;That&#39;s a bismuth crystal,&#34; she said in a blasé tone. If nothing else, she could see why the iridescent angles of the thing caught their eye.

They were both silent for a moment, and Jackie looked back at the oboist. Rather than staring ahead blankly, though, they seemed to be staring intently - or maybe they always were. &#34;Bismuth,&#34; they mumbled, feeling the word in their mouth like they were happy to collect it for themself. They moved down the display a bit, then pointed at a picture of a similarly angled specimen with iridescent coloring, or at least a photograph of one.

&#34;Jackie. What&#39;s this?&#34;

Somewhat begrudgingly, Jackie followed her across the display. She really shouldn&#39;t be bothering with this, but she didn&#39;t want to make a scene, and she had sort of made her bed by wandering off in the first place. Besides, she really didn&#39;t know much about geology, and if anything, she liked to keep it that way. Unless the next sample was, like, copper or something, she was going to be out of luck. She wasn&#39;t even sure why the oboist had asked her in the first place.

She took a better look at the photo... and clenched her teeth a little. As luck would have it, she did know that one. It was, perhaps, the one mineral she was the most familiar with.

&#34;That&#39;s shocked quartz. It&#39;s only made in extreme pressures, like nuclear blasts or meteor impacts. It&#39;s rarely made by lightning, but it&#39;s used to test sites for the previous events.&#34; Jackie was just listing off information she&#39;d heard a thousand times before. She&#39;d had to test for samples of this rock, out in the field, hundreds of times, easily. From craters made from forests. Wastelands made from cities. Calderas made from schools. Hell, she was pretty sure she might have seen this university turn into shocked quartz once.

&#34;...So it can tell us where something like that happened?&#34; The oboist didn&#39;t take her eyes off the photograph, but their voice seemed... a bit less distant, perhaps. Behold the power of fun facts.

&#34;Sure. Not like a few rocks have ever stopped another bomb from dropping, though.&#34; All the shocked quartz in the world couldn&#39;t tell anyone how to stop an asteroid. All it told them was how screwed they were. Not like all those samples Jackie took meant she still had her home to go back to. They never even told her why it was gone in the first place.

She really hated geology.

&#34;Morgan.&#34; A stern voice interrupted Jackie&#39;s train of thought, and she turned around on instinct, only to find herself craning her neck upwards - something she had rarely needed to do after her augmentations. Standing in front of a light so as to cast Jackie in her shadow as if to appear //more// menacing, a woman with black hair, a surgical mask, and unforgiving eyes looked down at the oboist, paying little heed to Jackie. Well, at least that was better than what Jackie had just gone through with the oboist. Plus, she was getting a bit dizzy looking up at the impressively built woman.

The oboist jumped a little. &#34;Ah. Sorry Gamma. I was just-&#34;

&#34;Séverine,&#34; the woman corrected.

&#34;Sorry. Séverine. I was just. Examining the surroundings.&#34; Their stop-and-go speech seemed to indicate they were in some form of trouble.

Séverine(?) looked at the display case, then to the oboist (Morgan?), then to Jackie. Jackie only smiled, a half-hearted, reflexive smile. In truth, she wasn&#39;t used to being looked down upon, and found herself on the backfoot at the mere acknowledgement of her existence by a woman who looked like she could snap her cybernetically-enhanced spine like the wishbone of a particularly cheap turkey.

&#34;W-Was that your... friend?&#34; Jackie looked for some way to appease the woman. &#34;They&#39;re very intelligent.&#34; She wasn&#39;t //just// being nice; in her experience, asking a lot of questions counted for more than having things memorized.

&#34;They&#39;re my sibling.&#34; Séverine responded, curt and cold. Okay, so they //were// non-binary. Cool. Good for them. Jackie could see the family resemblance, even if Morgan was a bit of a shrimp. Séverine turned her attention back towards Morgan. &#34;Your siblings were wondering where you were. Let&#39;s go. And stay close to me. Or at least your other siblings.&#34;

And with that, they turned at left, Morgan following a half-step behind Séverine like a duckling. Séverine didn&#39;t say anything to Jackie as she left, but Morgan was at least kind enough to look back at her once as they left.

Jackie watched them leave, then found her eyes looking back to the shocked quartz. She allowed herself a few seconds to wallow until she would go and find someone from Alpha-9 to distract her.




----

Although she wasn&#39;t used to crowds anymore, Iris at least retained the skill of finding a short person in a dense crowd that was granted to all older siblings, and made her way back over to Foxx, trusting that Anne was enough of a grown-up that she didn&#39;t need Iris to hold her hand as they pushed through the throngs of flabby scientists with disproportionately muscular hiker legs.

&#34;You guys get what you need?&#34; Iris asked, ignoring Foxx&#39;s attempts at a greeting.

&#34;Oh, yeah,&#34; he replied without missing a beat. &#34;He&#39;ll be getting his stuff ready in a room behind the lecture stage, we&#39;ll go talk to him then.&#34; The euphemism rolled off of his tongue so easily, Iris almost missed it. Her eyes followed his finger over to the stage - what was really just a corner of the room with a slightly elevated floor with a lectern on it - and an empty doorway to a hall behind that.

&#34;You guys check it out?&#34; Iris asked, peering into the doorway. She couldn&#39;t see in very well from the angle she was at, not to mention the fact that geologists were somehow weirdly all taller than her.

&#34;Sure, no security or anything, and nobody&#39;s back there but the next lecturer. We don&#39;t need to check with anyone before we head over, and besides, eggheads love talking about their work,&#34; he said with a grin.

Iris glowered. &#34;Are you some kind of fucking Saturday morning cartoon goon? Who the fuck says egghead?&#34;

Foxx seemed taken aback. &#34;What? I thought it was just something people said in America.&#34;

&#34;//No//, we say, like, //scientist// when we talk about scientists.&#34; Iris squinted and leaned forward. &#34;...Hey.&#34;

Foxx averted his eyes.

&#34;What //other// slang terms have you picked up?&#34;

&#34;...Well now I don&#39;t want to say anything.&#34; Foxx replied.

&#34;Whatever.&#34; Iris sighed. If Clef was going to force her to take some random guy along on her missions for fire support or whatever, he could have at least picked one who didn&#39;t act like a moron. Anne acted like and idiot, Iris thought as she turned to look at her, but at least-

Anne wasn&#39;t behind Iris. She lost her somewhere in the crowd. Good god Iris hated these people.

She began to feel for her mother during the times when Iris wordlessly got distracted by a toy display in a store, but she shook those thoughts out of her head. Anne was a grown-ass woman. She probably just ran to the bathroom or something. Would&#39;ve been nice if she checked in.

&#34;Hey, Iris?&#34; Foxx asked. Iris realized she&#39;d been quiet for a little while as he was making faces thinking about Anne.

&#34;Guh. Whatever.&#34; Iris waved her hand flippantly. &#34;You got photos of the room he&#39;ll be in?&#34;

&#34;Sure do.&#34; Foxx produced a small stack of photos. Not from Iris&#39; camera, but they were at least clear enough that she could monitor the situation through them. &#34;You figure out where he&#39;s coming from and when?&#34;

&#34;His lecture&#39;s in twenty minutes, and he&#39;ll be coming in late today. Beyond that, no, not really.&#34; Foxx shrugged. &#34;Can&#39;t expect these people to know everything about a co-worker. Uh, co, um... I feel like there&#39;s a word for this for scientists...&#34;

Iris //also// felt like there was a word for that, but she got the feeling she was just going to be thinking about it until she felt stupid, so she chose to ignore Foxx&#39;s tangent. &#34;Alright, you and Adams watch the entrances and let me know when he shows up,&#34; she muttered, only loud enough for Foxx to hear. The general cacophony of a crowded hall was doing most of the heavy lifting in keeping the conversation private. &#34;I&#39;ll keep Anne with me and check the photos over in some corner. That sound good? You want Jackie to help you out?&#34;

&#34;Nope, all good on my end,&#34; Foxx said with a smile. Foxx was at least confident in his abilities. If he was an idiot //and// he sucked ass in a firefight, Iris would have made more of a stink about him. This saved her the energy. &#34;Don&#39;t worry. I&#39;ve got some special... tools to help me out.&#34;

Iris felt her teeth grind. &#34;I swear to god, Foxx, I let you do this shit on other missions but if a civilian finds-&#34;

&#34;Hey, don&#39;t worry about it, Iris! I&#39;m careful about this stuff!&#34; Foxx said like he&#39;d just been accused of something. &#34;I&#39;m very careful about this stuff. As a gun owner with a child in the house, I have to be.&#34;

That made a certain amount of sense, even if calling the man a &#39;gun owner&#39; was a bit like calling the president someone with a &#39;managerial position.&#39; Still, Iris realized that if he ended up being responsible for some horrible accident with his stashed arms, she&#39;d probably have some responsibility, at least morally. She should probably grill him about all that once the mission was over.

&#34;Alright. Get going. Go let Adams know, too. Send over Jackie if you see her, I&#39;ll send a text message to her either way.&#34; With that, Iris turned to walk over to a relatively unpopulated corner of the room where she could leaf through a stack of photos mostly undisturbed. Foxx went to go find Adams, wherever she was.

Iris didn&#39;t make it five steps before she was cut off by a tall woman pushing her way through the crowd with nary a thought as to how difficult it //should// be for someone like her to push her way through a crowded room. Well, most people were tall to Iris, but this was just absurd. She made Jackie look short, and Iris seriously had to work to be okay with hanging around someone that tall.

Another, considerably smaller, person scurried behind her in the hole she left in the crowd behind her. They reminded Iris of those cars that drive behind ambulances after they clear the road. Probably a good thing, though, since they were carrying some kind of wrapped stick that looked to be almost taller than they were.

The shorter one scurried out in front of the tall one, over to another woman chatting with a presenter alongside what looked to be her somewhat bored-looking younger brother. The brother immediately perked up when he saw the stick bobbing towards him through the crowds.

&#34;Morgan!&#34; He hissed. &#34;Where were you?&#34; Upon hearing the name, the older sister turned her attention away from the presenter and leaned down towards Morgan.

&#34;Ah, sorry. I was looking at something that ended up not being important. Gamma came and got me,&#34; they replied.

&#34;It&#39;s //Séverine,// Morgan,&#34; the older sister said with a sigh as she held out her hands. &#34;Did anything happen? You really shouldn&#39;t wander off in crowds - it&#39;s harder for us to find you.&#34;

Iris squinted at them. Were they using codenames or something...? Well, Iris supposed she also wouldn&#39;t want people to know she was French. If it was for anything important, they&#39;d clearly be more practiced. Anyways, she should hurry over to her isolated corner, as was her forte. Watching a bunch of siblings acting all nice was just going to put her in a foul mood.

The area seemed to be a few circular tables too far away from anything of note to warrant use, with several of their chairs relocated to more populated areas. That suited Iris just fine, as long as people were less likely to sit anywhere near her.

Iris checked for any security cameras, looked for any gum on the seat, and then dragged a chair over so she&#39;d have her back to the wall and sat down. Nobody was paying any attention to her - as they should - so she pulled out her stack of photos and started leafing through them. She&#39;d rather have them spread out, but when she was in public, it was fine to just hold them close to her chest. Besides, it was nice to just feel the paper as she moved from scene to scene. She wouldn&#39;t exactly say it was nostalgic, but it felt... comfortable. Like doing anything you knew you were good at. If nothing else, it helped her calm down after thinking about her team members for too long.

And good thing, too, because if the scraping of a nearby chair was anything to go by, she was about to be upset by a completely new thing. She did her best to keep her attention on her photos, but the scraping stopped on the opposite side of the table she was sitting at. Of course it did. Why would someone want to sit at a table that had nobody else taking up space on it when there was a table that was already occupied?

Iris side-eyed the newcomer as he settled into his chair. Long black hair in a ponytail and a nondescript face. Come to think of it, he reminded her of those siblings she saw earlier. Then again, he looked generic enough to remind her of a lot of people.

As soon as she looked at him, though, he grimaced. Not in the way you would if a stranger saw you looking at them, but the way you would if you just realized something you wished you hadn&#39;t.

&#34;Ah. Figures,&#34; he said to nobody in particular. Then, to Iris, &#34;Looks like they did a number on you. I&#39;m sorry.&#34;

Iris was taken aback. It sounded like he meant it. &#34;If you mean the scar, it&#39;s just from a car accident,&#34; she said, her drab tone obscuring any lingering feelings she might have had. &#34;Can I help you?&#34;

The man seemed to think about that for a second. &#34;Aha. Well, maybe, broadly speaking. But I&#39;m on the clock right now, so I&#39;m really only here to satisfy my own curiosity.&#34;

&#34;Oh yeah?&#34; Iris tense up. Was this guy going to be a creep? &#34;I think you&#39;ve got me confused with someone else.&#34;

&#34;Mm. Maybe. I think I&#39;ve seen you somewhere before, though.&#34; He moved forward in his chair a bit, and Iris moved back. The gesture, however unintentional, seemed to hurt him. Iris didn&#39;t know why, but she hated that. &#34;Well, I might be getting ahead of myself, but I&#39;d like to give you a job offer. I don&#39;t have the go-ahead from the boss lady, but I get the feeling she&#39;d appreciate your help.&#34;

&#34;No thanks. I&#39;ve already got my own obligations,&#34; Iris said as icily as she could manage. &#34;Now, you&#39;ve got the wrong person. I was doing something, so if you could-&#34;

&#34;Hey, hear me out here. This new gig should afford you... a lot more freedom of movement, you know. And that&#39;s only in the short term,&#34; the man said in a knowing voice. From the emphasis he put on the words, it was clear what the implication there was.

Iris retreated farther back in her chair and slowly, deliberately moved her hands to her pockets. Her left hand pressed the panic button on the phone that was provided to all the members of the task force. Her right hand reached into the photograph she never left her room without and closed around a cold steel trigger guard and a polymer grip.

&#34;Look, let&#39;s not do anything too hasty. Besides, I don&#39;t expect an answer right now.&#34; The man stood up, sensing Iris&#39; clear hostility. &#34;I&#39;ll come find you soon enough. Then, we can have a real talk. And one more thing, Iris.&#34; He leaned over the table a bit, careful not to say her name too loud. Even so, she drew her right arm back out of the photo, though still in her pocket. &#34;There’s no backup for you, I already checked. I don’t know who they’ve got you running with, but unless it’s //the big guy// - which I know you wouldn’t do, and I of all people can&#39;t say I blame you - you don’t stand much of a chance. Don’t say I didn’t warn you.&#34;

&#34;Yo, Iris, I know phones aren&#39;t your thing, but you should at least know not to butt-dial me.&#34;

Iris&#39; head jerked up at the mention of her name. There was Anne, hands still a little damp, looking annoyed. &#34;...Butt-dial?&#34;

&#34;Yeah, I told you I was going to the bathroom. Had to run out. You need something?&#34; Anne&#39;s eyes finally moved to the man on the other side of the table and narrowed. &#34;Hey, at least do something with that hair if you&#39;re going to do a bad job hitting on people. You look like a fucking libertarian.&#34;

&#34;...Mhm.&#34; It seemed like the man didn&#39;t quite know how to take that. Iris didn&#39;t either, but she could at least see that Anne was going up to bat for her, which she appreciated, even if she had seriously misread the severity of the situation. Then again, Iris was the one who fumbled around at her phone in her pocket and missed the single most important button on it. &#34;Well, I&#39;ll get out of your hair. Remember what I said - you of all people should know the importance of knowing when to fold &#39;em.&#34;

He waved back to Iris as he left. &#34;Take care of yourself, kid.&#34;

Iris felt something stab into her chest.

The two women watched him disappear back into the crowd, and Iris&#39; eyes lingered where he was. That was... no. No. There was no way. Someone had just lifted some old files and was fucking with her. All that she learned was that the data breach she heard about earlier was worse than she thought. They just picked up some Omega-7 articles and wanted to mess with her. That was all.

&#34;...Hey, Captain? Everything good?&#34; Anne leaned to the side to try and get a better look at Iris.

Shaking her head, Iris stood up from where she was sitting. &#34;I think...&#34; She trailed off, and Anne stepped over to her side so she could whisper. &#34;That data breach compromised us. We have hostile contacts.&#34;

Anne looked around. &#34;So, what? Do we pull out?&#34;

Iris bit her lip and thought about it. What could be such a threat that she&#39;d need... //him// for it? A White Suit? A Church zealot? A Karcist? God, no, nobody could sneak any of those in. She needed to think. God dammit, she couldn&#39;t catch her breath. Fuck. This is exactly what that asshole wanted. Just a reminder of those two got her like this, god. God.

The phone in Iris&#39; pocket buzzed. She checked the notification from Adams - &#34;our guy just came in from the next building going to get something from sublevel.&#34;

&#34;Iris?&#34; Anne was getting antsy.

Iris huffed and called everyone on the task force at once. Anne seemed confused but let her put the phone up to her ear. Adams picked up immediately, then Foxx a second later, then Jackie.

&#34;Yello?&#34; Foxx opened in a chipper tone.

&#34;We&#39;re compromised. Assume hostile contacts,&#34; Iris said. Foxx was real quiet as Iris took a moment to think. &#34;Adams.&#34;

&#34;Yeah?&#34;

&#34;If we had anomalous combatants, would you manage?&#34;

&#34;I&#39;ve got my helmet here. Should be fine up to a White Suit.&#34; Adams paused. &#34;What should I expect?&#34;

&#34;Don&#39;t know.&#34; Iris left the ball in Adams&#39; court.

Adams considered it for a second. &#34;...I&#39;ll be fine if I have backup.&#34;

&#34;Are you //sure?//&#34; Iris pressed.

&#34;Yeah. Give me Foxx and we&#39;ll be good.&#34;

&#34;Understood.&#34; Iris decided to trust Adams&#39; judgment. Part of her wanted to call things off, but she still hadn&#39;t caught her breath. She needed to make a decision and she herself wasn&#39;t thinking straight. Adams could be trusted for this much if nothing else. &#34;Jackie, get back to me and Anne, the corner of the room to the right of the entrance.&#34;

&#34;Yes, sir,&#34; Jackie replied, quickly and clearly.

&#34;Foxx, go with Adams. Get the package off the target before he comes back aboveground, I don&#39;t care if you have to mug the guy, I&#39;ll take it through a photo and then we meet back up at the entrance and get the hell out. I don&#39;t want this to take more than a minute. I&#39;ll watch through photos. If shit goes south you run. Immediately.&#34;

&#34;Understood.&#34; Adams and Foxx replied in unison.

&#34;Then go.&#34; Iris hung up and pulled out her photos.

Anne&#39;s hand reached into her coat and rested on her holster, more for reassurance than anything. &#34;Need anything?&#34;

&#34;Make sure we&#39;ve got a clear exit, and stay close.&#34;

Anne nodded and turned to do her job without delay - Iris supposed she //had// been an Insurgent for a while - and Iris called out to her.

&#34;Anne.&#34; She stopped and turned back to her commander. &#34;Just... be careful. And, you know. Get ready.&#34;

Anne&#39;s serious expression broke into a smile, and she gave Iris a sloppy two-finger salute. &#34;If ya say so, cap&#39;n.&#34;

Gamma&#39;s communicator buzzed. She checked it - Adrian&#39;s number. An external communicator was a concession made to reinforce her cranial structure, but at the very least, smartphones were light and convenient. She brought it up to her ear. &#34;Séverine speaking.&#34;

&#34;Gamma.&#34; Her communicator buzzed with Adrian&#39;s voice. &#34;Looks like Foundation&#39;s going to the sublevel. Follow them.&#34;

&#34;Understood.&#34; Gamma pocketed the communicator and saw the door to the sublevel closing, whoever opened it already out of sight. &#34;Eliza, with me. Morgan, mind your brother.&#34;

Zeta nodded. Delta sighed. &#34;You really need to be less precise in your wording,&#34; she bemoaned.

&#34;Clear communication is paramount to success,&#34; she retorted after a short consideration.

&#34;//Yes,// but, people say you sound like a computer when you talk like that,&#34; Delta sighed.

Gamma blinked at her.

Delta pouted. &#34;Well - //yes,// but we don’t want //them// to know that.&#34;
