&gt; [[=]]
&gt;  
&gt;  
&gt; ++ __KNOWN ANOMALY__
&gt; ‎‎‎‎‎‎‎‎**ITEM INDEX:**  8456 | **CLEARANCE:** Public-01/18+
&gt; [[/=]]
&gt; **Containment Class:** 
&gt; [[size large]] Exterior [[/size]]
&gt; **Secondary Class:** 
&gt; [[size large]] Blacklisted [[/size]]
&gt; **Disruption Level:** 
&gt; [[size large]] Minor [[/size]]
&gt; **Risk Level:** 
&gt; [[size large]] Unknown [[/size]]
&gt;  
&gt; -------
&gt;  
&gt; **SPECIAL CONTAINMENT PROCEDURES:**
&gt; As with all items not attributed the Safe risk level, Item-8456 must never be classed as Interior; even if a vacancy opens underneath the SCP Foundation and the Shortlist is empty, no attempt at retrieval should be made. Watchtower-5 has been assigned to record the anomaly&#39;s position. Following Incident-710/Ext, Item-8456 is ineligible for Protocol-024, &#34;Gate Parley&#34;, and Protocol-011, &#34;Emergency Intake&#34;. At any indication that Item-8456 has become impervious to soul milk, Protocol-001  is to be repeatedly attempted until the SCP Foundation has been successfully relocated.
&gt;   
&gt; Item-8456 may hunt any Wayfarers it targets unimpeded. Should Item-8456 come within 50m of the outer bank, a Howling outbreak should be artificially provoked elsewhere to draw its attention. Instances of Item-8456-1 (whether caused by Howlings or not) are to be tested before consumption.
&gt;   
&gt; All adult staff are to be reminded that the 18+ Clearance restriction is imperative for Foundation moral. Adult staff may cast minor illusions to redact or expunge conversations held in the presence of children, or excuse themselves to the Adult-Only Hall when necessary. Knowledge of Item-8456 (while not cognito-magic) has been documented as particularly frightening to those under the age threshold. If a child asks, Item-8456 vocalizations should be attributed to the falling of boulders during a storm, or simply soul milk eruptions.
&gt;  
&gt;  At this time, no means available to SCP scout teams are capable of destroying Item-8456, only able to cause massive physical damage. Item-8456&#39;s continued existence has been deemed acceptable.
&gt;  
&gt; **DISCOVERY:**
&gt; Multiple reports of strange &#34;roaring&#34; noises close to natural Howling outbreaks were likely the first indication of Item-8456&#39;s existence. The 8456 index was first listed on 21/14/Breathe; on this date both Watchtower-3 and -7 confirmed an unidentified shape moving on the horizon, north of the Hot Zone. The anomaly has been sighted 27 times since, each often closer than the last.
&gt; Item-8456-1 was observed in person before Item-8456 itself. Several pieces were discovered impaled on the spines and thagomizer of a Wayfarer, who had collapsed against a pylon in the East. Severe lacerations had crippled the Wayfarer and removed its ability to speak by the time a scout team arrived at the scene. The animal could not be revived.
&gt;  
&gt; **DESCRIPTION:**
&gt; Animate, variable size but approximately 10m in length, 3m limb span, 2m tall. Item-8456 is a six-legged creature of unknown origin with extreme regenerative abilities. Its skin, incredibly resilient, has been described as &#34;a dark mix of greens and reds, similar to those of the sky&#34;. Furthermore, this outer layer is composed of small pebble-like repetitions, theorized to be instances of the &#34;scales&#34; mentioned in SCP Item files received from the future. The anomaly has repeatedly produced external adaptations when confronted with danger; internal biology remains poorly understood.
&gt;  
&gt; Item-8456 is intelligent, hostile, and territorial. Though originally spotted near the Hot Zone, it has ranged an approximate seven miles since discovery, utilizing its jaws on near everything animate it encounters. Despite being relatively small among local wildlife, Item-8456 is adept at striking the ankles or tethers of other creatures. It will consume only corporeal matter from victims. When still aggravated from a previous encounter, the anomaly may also attack inanimate objects; 5 downed pylons and 63 fractured monoliths have been attributed to this.
&gt;  
&gt; [[=]]
&gt; **ADDENDA ATTACHED BELOW**
&gt; [[/=]]
&gt;  
[[=]]
-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_
[[/=]]

&gt; [[=]]
&gt;  
&gt;  **__Incident Report 710__**
&gt; [[/=]]
&gt; **Type:** Exterior
&gt; **Date:** 43/13/Dance
&gt; **Patron Deity:** N/A
&gt; 
&gt; -------
&gt;  
&gt; On 43/12/Dance, Item-███ contained in subdungeon █ began exhibiting increased levels of distress. When questioned, she warned that &#34;something awful&#34; was close, and temporarily neutralized herself. Watchtowers were alerted, however none reported unusual activity. Soon after, a scout team returned and reported close sighting of Item-8456. The anomaly was situated among the ruins of a spire incorrectly teleported during the last Protocol-001 relocation. The Team Lead confirmed it had been consuming the rubble. As this was the same stone material that comprises the walls of the SCP Foundation, administrative staff increased the item&#39;s risk level from Safe to Unsafe. Watchers directed by the scout team observed the anomaly leaving the ruins, using its tail to &#34;swim&#34; across the bloodmarsh.
&gt;  
&gt;  
&gt;  
&gt;  
&gt;  
 _
&gt; [[=]]
&gt;  
&gt;  **__Sub-Item 1__**
&gt; [[/=]]
&gt; Item-8456-1 designates all organic matter shed or torn from Item-8456. Approximately 70% of instance mass has been found to be edible, with the remaining meat and other tissues constituting a lethal poison. Kitchen staff may test instances by offering small portions to runt livestock or placing them in one of the ant farms. If the matter is consumed and the consumer does not expire within the hour, that instance may be served as food. Instances **must always be tested** if not discarded; discarded matter cannot be used as fuel, as it does not burn.
&gt;  
&gt;  
&gt;  
&gt;  
 _
&gt; [[=]]
&gt;  
&gt;  **__Incident Report 901__**
&gt; [[/=]]
&gt; **Type:** Exterior
&gt; **Date:** 09/01/Seventeenth Moonrise
&gt; **Patron Deity:** N/A
&gt; 
&gt; -------
&gt;  
&gt; After finding Item-███ dormant in her cell, Lesser Priestess Dr. Allelaia alerted administrative staff an Item-8456 related occurrence may be imminent. As the Black Moon was risen at this time, all above-ground facilities (including watchtowers) were unmanned, and could not be remanned until Moonfall. Dr. Allelaia then volunteered herself for Protocol-034, &#34;Farsight&#34;[[footnote]] For this selfless act, the priestess was celebrated via a feast in her honour, held in the SCP Foundation&#39;s Grand Hall. [[/footnote]]. 
&gt; The vessel of this Protocol-034 application was a standard golem. While psychokinetically possessing this golem the priestess confirmed Item-8456 was pacing the outer bank of the SCP Foundation&#39;s moat. The anomaly continuously attempted to submerge itself in the soul milk, receiving substantial disintegration upon contact, then peaking in aggravation and retreating to regenerate. Dr. Allelaia observed this behaviour over the course of 3 storms (during which Item-8456 also survived damage from boulders rained by said storms) until the anomaly noticed her presence.
&gt;  
&gt; The following is a transcript written according to Lesser Priestess Allelaia&#39;s memory of her interaction with Item-8456. The &#34;interview&#34; was impromptu, initiated by the anomaly.
&gt;  
&gt;  
&gt;&gt;  //(Begin log)//
&gt;&gt;  
&gt;&gt; **Item-8456:** I see... //(incomprehensible)//
&gt;&gt;  
&gt;&gt; //(Dr. Allelaia does not respond.)//
&gt;&gt;  
&gt;&gt; **Item-8456:** //(Incomprehensible)//
&gt;&gt;  
&gt;&gt; //(Dr. Allelaia does not respond.)//
&gt;&gt;  
&gt;&gt; **Item-8456:** I can see you, thing.
&gt;&gt;  
&gt;&gt; **Dr. Allelaia:** Greetings, marshlander.
&gt;&gt;  
&gt;&gt; **Item-8456:** No.
&gt;&gt;  
&gt;&gt; **Dr. Allelaia:** You&#39;re not a marshlander?
&gt;&gt;  
&gt;&gt; **Item-8456:** //(Incomprehensible)//
&gt;&gt;  
&gt;&gt; **Dr. Allelaia:** I&#39;m sorry?
&gt;&gt; 
&gt;&gt; **Item-8456:** No. No marshlander, no greeting. You are not sorry.
&gt;&gt;  
&gt;&gt; //(The anomaly tilts its head toward the moat, looking into it or possibly past it.)//
&gt;&gt;  
&gt;&gt; **Item-8456:** Your land is repulsive. What are you hiding in that keep? //(Possibly &#34;What do you hide in your keep?&#34;)//
&gt;&gt;  
&gt;&gt; **Dr. Allelaia:** That&#39;s classified.
&gt;&gt;  
&gt;&gt; //(Item-8456 then produced vocalizations loud enough to be heard in both Interior Containment and General Use subdungeons. In panic, Dr. Allelaia disingengaged from Protocol-034.)//
&gt;&gt;  
&gt;&gt; //(End log)//
&gt;&gt;  
&gt;&gt;  
&gt;  
&gt; After Moonfall, Item-8456 was not observed in its previous location, and was not sighted again for 2 storms. Item-8456&#39;s risk level was briefly raised to Threat, then de-confirmed to Unknown.
&gt;
