    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>Any student wishing to conduct a study on any of our official platforms must prepare the following, to be presented to site staff upon posting:

* **A clear statement of purpose.** An explanation of the study/assignment will do fine.
* **A clear illustration of what information on users will be gathered, and how it will be used.** 
* **A clear statement that all information collected for the purposes of the study will be publicly available.**
* **A clear illustration of risks and or benefits associated with participating**. For example, how are you helping advance a study subject&#39;s understanding of or engagement with the community?
* **A clear statement of what this information will be used for specifically.** Is this a paper that only a professor and TA will see? Will raw data be destroyed after the course ends? Etc.
* **A clear definition of the tools being used to carry out research.** This is essentially to filter out unsafe platforms such as Google Forms.
* **A contact for questions, concerns, etc.** An email address or professor&#39;s name and email address will typically suffice.

None of the above has to be written academically, something that the average person can read and understand what they are signing up for is best. This is a rough approximation of the information we [https://05command.wikidot.com/forum/t-14234747/discussion-policy-on-studies-involving-the-scp-wiki#post-5113091 previously] required of studies operating in wiki spaces to abide by.

If someone attempts to share links to their study without the aforementioned requisites being fulfilled, a member of staff will ask for it. If the study&#39;s representative is unable to or unwilling to comply, we as staff reserve the right to remove their study from our platforms.

If a study asks that staff do anything in support of the work such as promoting it on IO platforms or allocating any resources to it, we require an IRB number[[footnote]] Institutional Review Board (IRB) numbers are a special designation assigned to studies by the IRB, which is a group that reviews research involving human subjects to ensure that the rights and welfare of the participants are protected. All IRB sanctioned studies have an IRB number present on their information request. [[/footnote]] with the appropriate search engine to read the full details so that we can decide before saying yes.

Any student seeking to make an account with us to conduct their study on our platform must follow these rules:

# The research project must get its own account, to distinguish from any personal use of the wiki participating researcher(s) are engaged in.
# This research account should be barred from any voting on pages. If the researcher feels that voting would be necessary for their work, they should submit a request for an exemption (with reasoning) to administration.
# The research account must observe the following specific naming scheme for easy identification: &#34;Academic Student [name]&#34;. [[footnote]] This will also require amending our username policy to prohibit non-student accounts with this name. [[/footnote]]</textarea></pre>
