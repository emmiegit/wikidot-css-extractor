**Test 914-2001**
**Name:** Maintenance Technician Johnson
**Date:** 04/09/2024
**Total Items:** One Mug (broken, repaired)

**Input:** One mug gifted to Maintenance Technician Johnson, for continued performance. The mug was previously broken, repaired with epoxy, and broke again into pieces.
**Setting:** 1:1
**Output:** The same mug, without any damage. Beside the mug was a small pile of epoxy, arranged into a 🙂 shape.

//Note: I broke a mug when transferring here, let me try. -- Dr. Query//

**Name:** Dr. Jeyne Query
**Date:** 05/09/2024
**Total Items:** One Mug (broken, repaired)

**Input:** One mug, broken, and repaired with epoxy. The mug was water-tight at the time of the test.
**Setting:** 1:1
**Output:** A ceramic novelty salt shaker, resembling a pig waiter. On closer inspection, all holes are clogged with epoxy resin.

//Note: I don&#39;t understand. Why isn&#39;t it the same? I guess it&#39;s water-tight, at least? -- Dr. Query//
[[&gt;]]
//Yeah, that tends to happen. Whatever you expect of 914, it&#39;ll likely do something else. Personnel here hold the belief that the thing can develop affection towards people, Johnson gave it a much needed tune-up a few years ago, and this is how it generally responds.//

//Try different settings, but don&#39;t test the same object or settings too many times. Observations led some to believe that it can get &#39;&#39;bored&#39;&#39; of doing the same thing over again. Don&#39;t try to figure out how it &#39;&#39;thinks&#39;&#39;, trust me. I tried.//

//To personnel that weren&#39;t there during the meeting: we&#39;re introducing Dr. Query as a new Director of Research over the next few weeks. I&#39;ll still be around as head of Human Resources, and if you&#39;re sent to me, you screwed up enough that Dr. Query doesn&#39;t want to deal with you anymore. You don&#39;t want that situation. - Veritas//
[[/&gt;]]

**Test 914-2002**
**Name:** Dr. Heart
**Date:** 24/06/2024
**Total Items:** An A-4 sized paper displaying the question &#34;What are you?&#34;

//Note: I&#39;m not really sure what to do with this, should it be stored or incinerated? - Dr. Heart//

**Test 914-2007**
**Name** Medical Resident Ibarazaki
**Date:** 22/09/2024
**Total Items:** One handwritten note on a sticky note, one fountain pen with black ink, one copy of R. Ibarazaki&#39;s medical records, two commercially available prosthetic legs

//Note: Hi! I just got transferred here from the Site-19 main campus, and I just wanna familiarise myself with 914. Also, not sure what the whole intro note thing is, but might as well! - R. Ibarazaki//

**Input:** Aforementioned note, containing the following message, “Hi 914! Please don&#39;t make my job here too hard! I hope working with you will go well!”, aforementioned pen
**Setting:** 1:1
**Output:** One note with seemingly incomprehensible scribbles, one fountain pen. When viewed by --R. Ibarazaki-- anyone in the medical field, the note is interpreted as saying “Take some penmanship lessons.”, in near perfect clarity.

//Note: Oh, very funny. It&#39;s making fun of doctor&#39;s handwriting. - R. Ibarazaki//

**Input:** R. Ibarazaki&#39;s medical records
**Setting:** Fine
**Output:** A cognitohazardous symbol that, when viewed, removes feelings of phantom limb pain in people suffering from it, but causes it in a non-existent limb in all viewers who do not suffer from it. Incinerated.

**Input:** Two commercially available prosthetic legs
**Setting:** 1:1
**Output:** A high tension spring made of carbon fibre, attached to a sharp steel disc. When the output booth opened, it immediately fired, launching the disc at the retrieving D-Class and causing the amputation of both legs below the knee.

//Note: Well, looked like it hurt. What a hello. Is it strange that I still want to test with it? Also, can that D-Class see output #2 before it&#39;s incinerated? - R. Ibarazaki//

//Note: To whoever I overheard in the break room saying it&#39;d be funny to put this thing in a jack-in-a-box: please don&#39;t. - Researcher Boneka//

**Test 914-2010**
**Name:** Dr. Shep
**Date:** 01/10/2024
**Total Items:** Three single beds, all equal size, each with a white pillow and white blanket. 

//Note: The assigned D-Class personnel is diagnosed with sleep apnea and has been selected specifically for testing the outputs of this experiment. - Dr. Shep//

**Input:** One bed, unmade
**Setting:** 1:1
**Output:** A fully made bed. The quality of bed-making is simple.

//Notes: D-382 states it felt no different than before. - Dr. Shep//

**Input:** One bed, unmade
**Setting:** Fine
**Output:** A fully made bed. The pillow is set neatly at an angle against the frame. The blanket is stitched with heart patterns. The wooden legs are decoratively carved with fancy vine patterns.

//Notes: D-382 was hesitant to lie in the bed, complaining about it being &#34;too girly,&#34; but complied with a encouragement. D-382 quickly acclimated and described it as &#34;Pretty damn comfortable.&#34; - Dr. Shep//

**Input:** One bed, unmade
**Setting:** Very Fine
**Output:** A fully made, tucked bed with elaborate detail. The pillow is pre-fluffed. The blanket has visible fine fibers, and high quality stitching along the edges. The wooden legs have intricate carvings of sleeping angels and cherubs.

//Note: D-382 became unconscious within twelve seconds of lying in the bed. Medical staff removed him from the bed and determined he has become comatose, stuck in REM sleep. D-382 has been put on medical support to keep him alive while we try to figure out how to wake him up. - Dr. Shep//

**Addendum**: The Very Fine output was confirmed to cure sleep apnea permanently at the cost of permanent REM sleep.

//Note: I don&#39;t think the trade-off is worth it. I&#39;ll have to find another way to help my sleep apnea. The bed might make for a more humane bed for hospice of comatose terminal patients, though. - Dr. Shep//

//Note: We generally avoid releasing anomalous objects into the public, Shep. - Dr. Veritas//

**Test 914-2014**
**Name:** Medical Resident Ibarazaki
**Date:** 01/10/2024
**Total Items:** One winter parka, one pair of snow pants, one pair of cotton winter earmuffs

//Note: Decided to test these because this place seems a lot warmer than where I&#39;m from, so it seems like they probably won&#39;t be needed. Also, I needed the space in my wardrobe. I&#39;m putting them all on Fine, just to see what happens! - R. Ibarazaki//

**Input:** One pair of snow pants
**Setting:** Fine
**Output:** One pair of what appear to be rain pants, 2 sizes larger than before. The output is extremely hydrophobic, to the point of repelling water within 10 cm of the pants. Due to the fact that this includes water within the body, they cannot be worn.

**Input:** One winter parka
**Setting:** Fine
**Output:** One visually unchanged winter parka. When worn, it anomalously raises the wearer&#39;s body temperature to an extreme fever of 41°C. This fever does not go down for 105.8 minutes. 

//Note: Well, I guess I know what my job is gonna be after these tests. - R. Ibarazaki//

**Input:** One pair of cotton winter earmuffs
**Setting:** Fine
**Output:** One pair of cotton industrial earmuffs. When worn, they render the wearer temporarily completely deaf. However, ear damage can still be accumulated while worn, and as the earpads are made primarily of cotton, they are effectively useless. 

//Note: Wow, these are literally all useless. I mean, I expected at least something that could be used, but I guess I have a lot to learn from this thing. Also, those pink industrial earmuffs looked kinda funny. I&#39;d keep them if they weren&#39;t anomalous. - R. Ibarazaki//

//Note: They aren&#39;t useless if you&#39;re creative with how to utilize it. - Dr. Shep//

//Note: And why would I want to instantly give someone a possibly lethal fever? I can&#39;t think of a reason for that. Actually, no, maybe those earmuffs could be useful for anyone dealing with Veritas? - R. Ibarazaki//

//Note: Fever kills some viral infections. Prior to vaccines for syphilis, people would infect themselves with fever-inducing diseases to fight against syphilis. - Dr. Shep//

//Note: Yes, I know. I&#39;m becoming a doctor of medicine. However, 41°C is just extremely dangerous. Also, we have medicine for that now. I seriously hope your doctorate isn&#39;t in a medical field. - R. Ibarazaki//

//Note: R. Ibarazaki, we will talk about how to pack when moving in the future. - Dr. Query//

**Test 914-2015**
**Name:** Prof. Fuselo
**Date:** 02/10/2024
**Total Items:** One poster displaying silhouettes of various amphibians

**Input:** Mentioned above
**Setting:** Fine
**Output:** Six Rorschach inkblot test cards in a stack. Despite being inkblots, they clearly depict a recognizable animal on each card. In order: Tree frog, mountain lion, rhinoceros, gazelle, maned wolf, and flamingo.

//Note: I&#39;m going to show these to others and ask what they see on the cards. - Prof. Fuselo//

**Addendum**: Each card depicts a different animal per person. Despite being very clear to each person, each person sees a very different animal.

//Note: The tree frog I saw on the first card was seen as an African lion by D-927. Even when looking at the card simultaneously, I saw a tree frog and she saw an African lion. - Prof. Fuselo//

**Addendum 2**: Further testing reveals that the cards depict cognitive assumptions of what an animal is to someone, such as whether it would be their favorite animal (Maned Wolf for Prof. Fuselo.). Each card seems to be a different aspect. The first card is the last animal the subject thought about before viewing the card. This is why the first card was a tree frog for Prof. Fuselo, as the item inserted was an amphibians chart. Card two always shows an animal the subject fears. Card three depicts an animal that the subject empathizes with. Subjects with psychopathy reported the image just being an inksplatter. Card four always shows a prey animal that the subject views as strong. Card five depicts the subject&#39;s favorite animal, even if the subject didn&#39;t know they had one. Card six always shows an animal that the subject has never seen in person, but has seen in videos, books, pictures, etc.

//Note: The gazelle is able to outrun most predators with ease. You might ask &#34;What about zebras? They kill their predators,&#34; to which I say, zebras can&#39;t handle being overwhelmed, while a gazelle can flee for miles. - Prof. Fuselo//

//Note: All of these are octopi to me. That&#39;s... fun. - Dr. Query//

**Test 914-2017**
**Name:** Medical Resident Ibarazaki
**Date:** 02/10/2024
**Total Items:** Six steel Foundation-issued 1L water bottles

//Note: Time for my first Very Fine test! Wanted to start out with something relatively harmless, mainly to make my job easier and make sure nobody gets hurt. And while I&#39;m writing, I&#39;d like to remind everyone that these are free, and you should really pick one up. It&#39;s very important to stay hydrated! - R. Ibarazaki//

**Input:** Two water bottles
**Setting:** 1:1
**Output:** One large 2 litre canteen. Resembles models issued by the GOC.

**Input:** Two water bottles
**Setting:** Fine
**Output:** One waterskin made of steel, with the texture of leather. Holds 3 litres of water, due to having thinner walls than the water bottles, and has Foundation markings.

//Note: Huh. Could I keep this? After screening, of course! - R. Ibarazaki//

**Input:** One water bottle
**Setting:** Fine 
**Output:** One 1L water bottle. It has a temperature dial that makes any water held within the water bottle the temperature the dial was set at. However, the dial ranges from 0K-1000K, and due to the small size of the dial, practical use has been deemed impossible.

**Input:** One water bottle
**Setting:** Very Fine
**Output:** A visually similar water bottle. However, it contains a small pocket dimension that has a currently unknown volume. Whenever any item is inserted into the bottle, it immediately takes a liquid form, regardless of the previous material&#39;s composition. Tests are being undertaken to ascertain whether any of these liquids can be analysed, but as any testing implements inserted become liquid, this seems unlikely. Turning the bottle upside-down also does not drain the bottle of liquids, and as such the only potential way to access the liquids within would be to fill the bottle to capacity. 

//Note: What? How does that work? I feel like that has to break the laws of science somehow. - R. Ibarazaki// 

//Note: So far, around 2000 liters of liquid have been added to the bottle and its capacity has yet to be found. Due to the volume of content inside, incineration is not recommended. - Researcher Boneka//

//Note: Bottle has been transferred to the Anomalous Abatement department, to investigate further applications in recycling. Good job Ibarazaki. - Dr. Query//

**Test 914-2018**
**Name:** Medical Resident Ibarazaki
**Date:** 03/10/2024
**Total Items:** Small wax figurines of various Facility-23 personnel, as well as SCP-914
