Hi, I&#39;m Mal/Maal! After some coercion it seems as though I&#39;ve finally come around to putting my art up in some official capacity. I&#39;ve been drawing SCP-related art for the last few years now, so I&#39;ve chosen just a few to share with the site that inspired me so much for so long. My art has been featured on here before; recently a [https://securecontainplsno.tumblr.com/ blog I co-run] was mentioned on the [[[news-11-2016|monthly news]]] (I&#39;m Mod Pink), but all that stuff is silly, and I don&#39;t spend too much time on it.

Each image links to the respective article, where possible.
