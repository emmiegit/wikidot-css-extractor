**Item #:** SCP-147-J
[[/div]]
**Object Class:** Safe

**Special Containment Procedures:** SCP-147-J is located in the Chancery of Site-138. Due to its benign nature, no dedicated containment procedures are necessary. Nevertheless, the immediate area surrounding SCP-147-J is to be kept clear of obstructions and clean. Supplies of paper and toner are to be maintained at functional levels, with stock inspected each morning.

Relocation requests are to include a detailed justification and contingency plan for transit. Transfers outside Site-138 require unanimous approval from 3 Heads of Departments.

Use of SCP-147-J for standard documentation purposes is authorized for all on-site staff.

Preventative maintenance is not to be performed unless explicitly authorized.

**Description:** SCP-147-J is a Canon multifunction printer, purchased by Site-138 in 2019. Aside from its anomalous properties, it displays no deviations from baseline specifications for its model.

SCP-147-J&#39;s documented anomalous properties include:
* Connecting immediately to Site-138&#39;s network infrastructure (wired or wireless) when powered. Requiring no repeated authentication and remaining continuously discoverable.
* Executing all print jobs exactly as submitted, including formatting, page order, and color settings. Processing begins immediately upon receipt.
* Paper utilized does not jam, misfeed, wrinkle, or print blank. SCP-147-J detects paper size and tray configuration without requesting alternative media when suitable stock is present.
* Toner usage is consistent and produces legible output until supplies are fully depleted.
* Reporting fault states only when genuine mechanical issues are present. Reported errors are clearly formulated, and adherence to the provided instructions resolves the issues.
* Driver updates install smoothly on both SCP-147-J and Foundation systems. Compatibility issues remain unobserved.
* Scanning functions produce complete digital copies without truncation or blank output.

**Addendum:** Jr. Security Guard Pannalti, who reports minimal prior exposure to office equipment, is the only staff member to express no observable reaction when operating SCP-147-J.
