    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>Excerpt from the Journal of Caroline Wren

&gt; It will be two weeks before we have D-Class personnel arrive for testing. While I know, intellectually, there are logistical and security concerns that necessitate the delay, it does frustrate me, especially after that debacle with Kain. Damn him! An old dog too scared by past mistakes to leave his kennel.
&gt; 
&gt; Still, we&#39;re making some progress just by watching the gate and speaking to the survivors of the attempted raid. There&#39;s clearly a hostile force at work here. As loathe as I am to admit it, we are probably best served by waiting until after we&#39;ve accomplished more testing. I&#39;ve begun cross-referencing the survivors with the records.
&gt; 
&gt; I&#39;m starting to come to some conclusions about common elements in their backgrounds. Once we&#39;re able to test using class-D personnel, we should be able to confirm my suspicions, and from there, possibly work out the mechanism behind the anomaly.
&gt; 
&gt; I&#39;m going to show those fossils how to solve an anomaly.
