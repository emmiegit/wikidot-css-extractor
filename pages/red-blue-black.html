In the observation room, two researchers stood alongside each other, reviewing the final pre-test parameters. The test chamber was sterile, brightly lit, with a single metal chair and a small table upon which sat a pair of outdated red-and-blue anaglyph 3D glasses. The experiment was simple, the subject would wear the glasses and describe what they saw.

The D-class selected for the task sat quietly on the metal chair, drumming his fingers against the restraints. 

His file read: 

D-4317, Male, 31. No discernible mental abnormalities. Not religious. No known phobias. No prior contact with any inmate previously involved in SCP-178 testing.

Exactly what they needed.

“D-4317, place the glasses on your face and describe what you see.” Dr. Avenlee spoke over the intercom.

D-4317 complied with minimal resistance. He slipped the glasses on.

For several seconds, he remained silent.

Then, he stiffened.

&#34;Whoa,&#34;

Dr. Avenlee activated the mic. “Describe what you see.”

“There’s… a bunch of them. Just standing around the room. Eight, I think. Not moving. Just staring.”

Dr. Heart made a note. Expected behavior.

So far, consistent with previous observations of SCP-178-1. The entities were typically motionless unless provoked by sudden movement or perceived aggression.

“They’re not… they’re not moving,” the subject continued. “But… they’re not ignoring me either. One of them—he just raised his arm. Kind of slow. Like a wave. But not friendly.”

A pause.

“Now they’re all moving. Not toward me. They’re… gesturing.”

Dr. Heart turned to Avenlee, eyebrows narrowing. No test subject had ever reported such behavior before.

This was new.

“Clarify,” Avenlee said.

“They keep pointing. Two of them are pointing up. The others are doing… it’s like hand signs. Repeating shapes in the air with their fingers. Triangles. Circles. It’s almost like a pattern or—wait—”

D-4317 suddenly pressed his back against the far wall.

“One of them… is humming words at me.”

The subject leaned forward, brow furrowed. He seemed transfixed.

The other researcher hit the mic. “Repeat that, 4317. You believe they’re communicating?”

“Yeah! I can’t hear it clearly... But I think… I think it said ‘It’s coming.’ Then it did this—”
The subject mimicked the gesture on camera: a slow circling motion around his chest, then a downward point.

“Another one just hummed. ‘Help us.’ Then it looked at me—dead in the eye—and backed away.”

Dr. Heart’s hand hovered over the emergency halt switch.

“They seem scared.” D-4317 said suddenly, his voice faint and shaking. “They’re trying to hide... They&#39;re all sitting in a fetal position now... Some are screaming nonsense... This is fucked up! Get me out of here!”

“What are they trying to tell you?”

He looked up. “I don&#39;t know and I don&#39;t care dude. They’re not looking at me anymore. They’re looking above. Just get me out of here please, they&#39;re screaming at me and running around like crazy!”

Before the security personnel could be called into the chamber, D-4317 dropped to his knees. His breathing turned erratic. His limbs seized. Eyes rolled back. He collapsed to the floor, convulsing violently for ten seconds before going still.

By the time the medics reached the chamber, he was already dead. No cause of death could be determined. Autopsy revealed no usual lacerations, no chemical imbalance, no external signs of stress—only micro-tears in his cerebral tissue and ruptured vessels behind both eyes.

---

Late into the night, Dr. Avenlee sat alone in his office, again scrolling through the footage of D-4317’s final moments.

Frame by frame. Gesture by gesture.

He had transcribed the patterns. Compared them to known symbols—military codes, sign languages, ancient ciphers. Nothing ever matched.

He paused on a frame. The same downward motion D-4317 had mimicked. A circle over the chest. A point toward the floor.

There was no randomness here. No madness. Just fear.

And desperation.

He stared at the screen until his eyes blurred. Then, with a quiet breath, he spoke to the empty room,

“They knew something.”

Now there was only silence.
And stillness.
And whatever had made even those things fear.

---

Unconvinced by the results of the previous test, Dr. Avenlee submitted a request to reinitiate testing with a new subject.

The request was approved.

The next subject, D-4392, was selected: 

Female, 28 years old, stable psychological profile, no prior trauma, no knowledge of SCP-178. Verified to have had no contact with any inmate previously tested with the object.

At 14:00 on ██/██/20██, the test proceeded under identical conditions. Same chamber. Same table. Same glasses. Same instructions.

“Place the glasses on your face and describe what you see.”

D-4392 complied without hesitation. She put them on.

And nothing happened.

She blinked.

“Uh… I just see the room,” she said. “Same walls. Table. That big window. That’s it.”

“No figures? No entities?” Dr. Avenlee asked, leaning forward.

“No. Am I supposed to?”

The audio feed remained clear. Visuals showed no change. The D-class walked around the room, waved her hands, squatted, looked into corners. Still nothing.

Ten minutes later, she removed the glasses. The test concluded.

The tension in the observation room thickened. Dr. Heart exchanged a glance with Avenlee, then typed a quiet note into her log.

&#34;SCP-178: Neutralized.&#34;

&#34;They knew something...&#34;

Avenlee whispered to himself as he played back the final frame from the test footage again—where D-4317 mentioned all eight entities curled in fetal positions, looking up.

Avenlee turned his gaze toward the ceiling, as if expecting to see something there.

The lights flickered.

And for a brief second—just one—his reflection in the observation glass wore a pair of red-and-blue 3D glasses.

He wasn’t.

But his reflection was.

And it was screaming.</textarea></pre>
