**Incident report 914-2000-F2**

//Notice: Due to mishandling of SCP-914 and the death of a colleague, testing has been halted temporarily. This is to both pay respect to a colleague and to clean and decontanimate the testing area.//

//Dr. Collin Archer apparently trusted D-9461 enough that he felt comfortable staying in the intake booth while he was testing and D-9461 turned the key. The dial was on &#39;&#39;Very Fine&#39;&#39;, and 914 did the literal thing and ground Archer into paste. I trust we all learned a valuable lesson about trusting convicted criminals carrying out a punitive sentence. A few days later, however, pieces of paper and wood pulp started appearing into the output booth, one at a time over the course of several weeks. After I asked Beliz for the security camera footage again, it does seem like he&#39;s carrying a clipboard at the time. We&#39;re not sure if this is real, or a 914 fabrication, but Dr. Hackett and I decided to document it here. To any researchers foaming at the mouth to write new gospel about its interior, be very aware that this might be the machine screwing with you.//

//Edit: Prof. Dr. Mendoza, a resident psychiatrist, has asked me to evaluate the notes and ask Dr. Archers&#39; colleagues for context. Yes, as far as we&#39;re aware, the notes in here are written by the same person. There are drastic tonal shifts throughout, but eyewitness accounts assure me that Dr. Archer could be the author. - Site Director Hackett//

//Edit 2: Following multiple requests to review the material in my office, I&#39;ve set up a terminal inside Research Personnel Office 3.a. If you&#39;re not cleared to get in that office, you&#39;re not cleared to view the document. Please stop bothering me about it. - Dr. Veritas, Director of Research//

---------------------------------------------------------

I feel disconnected. Like I&#39;m outside of time. The pen still works, the paper is refilling itself, or is it? I can only hope that I will get out, but I know what this machine does. Is this my legacy? Is this a cautionary tale told by new employees, what not to do? Does my soul go somewhere else because my body is trapped here? If I jump off the ledge, can I avoid what awaits me? I know that it has a will of its own, but does that mean that it will show mercy? The metal feels cold, but alive somehow. It&#39;s not exactly comforting, but it feels like I&#39;m not alone. My watch has not moved, it feels like I&#39;m in stasis, just like it said in the report, but I&#39;m moving. Around me are gears and pulleys, I&#39;m walking on an iron beam, I think. The air feels stale, old. My body feels normal but like I&#39;m controlling it from outside myself, it&#39;s hard to describe. I wonder if this will even be read, but it&#39;s weirdly comforting to write it down, like I&#39;m leaving a legacy somehow. I wonder if anyone noticed that I&#39;m gone. I do think so, it&#39;s been more than half an hour, I think. Does Veritas know? Is he scolding someone for losing me? I&#39;m coming up to
There are metal shavings here, they&#39;re very sharp. I don&#39;t think they would be seen, I think my body has shrunk. I took one off, maybe I can use it as a knife. I also found a crumb. It&#39;s stale, but not affected by bacteria or time. I could use it for food, but I&#39;m not sure I need it. I feel floaty, like I&#39;m not even really here. It&#39;s weird: my surroundings are lit but I don&#39;t see any source of light. The walls move around, there&#39;s a giant gear to my right, moving against a smaller one, I can&#39;t see where it leads. The wall on my left is covered with soot.
Thing is: I would be okay with dying if it wouldn&#39;t be alone. I&#39;ve seen people die in horrible ways, but it was never


It was never outside of control, it was never unplanned. They weren&#39;t human, were they? It was just research. Never a chance to write down what they were feeling. I&#39;m having a panic attack

No one to cradle me, no one to tell me that&#39;s it&#39;s going to be fine

I wish I drew more when I was a kid, I want to show what I&#39;m seeing

Gears, pulleys, soot, ash, belts, a clockwork metropolis, it&#39;s deafening and tranquil at the same time. I&#39;ll try to sleep.

---------------------------------------------------------

I&#39;ve decided I&#39;m gonna still attempt to do my job. Hoping it&#39;ll be a welcome distraction from my current situation, even if just for a little while. Might as well stick with research paper etiquette and tone, too I guess.

I&#39;ve documented what my respiratory system is going through.

Breathing: I can indeed still breathe. Although, it appears I no longer have to. It seems inhaling and exhaling is no longer a routine my body needs to follow. I can still do it manually, but I am finding my body does not automatically do it for me. As if it is not natural anymore. I held my &#34;breath&#34; for a steady 10 minutes (or at least what I counted as 10 minutes) and did not feel any pain or major discomfort, nor did I pass out from a lack of oxygen. I did however feel an annoyingly uncomfortable tightness in my chest and mid torso. Again, there was no pain, but it felt as though my body wanted the air expelled. At the moment, I do not believe the way my body is behaving about breathing is cause for concern.

Smells: 914 smells very much like someone looking at it would expect it to. If you would, imagine you’re in an old garage, or perhaps a basement. A…mostly maintained maintenance area at the bottom of a large building. Lots of musty, old metal with hints of dust. (Perhaps from a lack of ventilation?) Those are the main odors that I am finding to be present. They tend to range in power from being near anomic, to very noisome and heavy. Sometimes though, I am lucky enough to get very distinct smells that do not exactly fit into the “old maintenance” category. Below you&#39;ll see a list of the ones I have experienced, and could confidently identify as of writing this.

- Antiseptic, and other such very unmistakable chemical odors
- Burning rubber
- Wet soil and freshly cut grass (they were together)
- Saltwater
- Men’s body spray
- New crayons
- Copper (oddly separate from the regular smells of 914&#39;s other metals)
- Black coffee
- New books (the only smell to have currently stayed present longer than any others)
- Dryer sheets
- Smoke (did not see any, thankfully)
- Stereotypical &#34;autumn&#34; scent (apples, pumpkin spice, and the like all mashed together)
- Whiskey (could use it right now)
- Body odor
- A bar of soap
- New/Hotel bedsheets
- Wet pavement
- Cigarettes

---------------------------------------------------------

I&#39;ve been trying to get a feel for this place. Been trying to figure out if anything here actually conforms to reality. It doesn&#39;t.

I try to move, and it feels like I&#39;m walking through water. I don&#39;t know if I&#39;m actually seeing anything, I don&#39;t know if I&#39;m actually feeling anything, for all I know these are the last firing synapses of someone who&#39;s already dead.

But I still feel alive.

I just tried re-reading this and it reads like nonsense.

**[Scribbling takes up the next two pages, growing increasingly frantic before stopping. The phrase &#34;I need to get out of here&#34; is repeated approximately eighty times.]**

Focus, focus, focus. You have to focus.

This place feels infinite. I can pick a direction, go, and just walk forever. We hypothesized that the machinery and refining process of 914 was potentially connected to an extra-dimensional space of some kind. What I&#39;ve seen lends credence to that. Maybe.

I&#39;ve walked through entire plains of gears, tundras of metal. The skyline&#39;s a mountain range in the shape of constantly rotating cogs that clack together like thunder. An ocean of gears that are roiling and heaving. No animals, nothing living here except me. I think. Just gears within gears within gears within gears within gears within gears within gears within gears.

**[Sketching takes up the next page. Although mostly incoherent, the page appears to document various gear configurations and other machinery.]**

The noise is everywhere. Clicks and rattling, like a watchmaker&#39;s shop taken to the extreme. All of these things feel like 914&#39;s attempts to approximate environments. Or maybe it&#39;s my mind trying to make sense out of chaos.

It feels like I&#39;m in a dream, like my legs are made of molasses. I reach out to feel the teeth of a gear and I can never… quite… touch it. It&#39;s like I&#39;m Tantalus, from the Greek myth. Go to eat the fruit and it is always out of reach. Go to take a drink of water and it recedes. I&#39;m stuck in this place and can&#39;t feel anything.

Yet, sometimes I swear I feel the grind of metal against my back, like the gears are resting right up against me and turning. But when I look back, there&#39;s nothing. More gears. Always more gears, always just out of reach.

I&#39;m waxing poetic. I should have been a writer.

I&#39;ve come across something new. Another machination in the long factory line. From the small crevice that allows access into the chamber, I see a space contained by numerous curved walls, which stretch too high above for light to reach the chamber&#39;s ceiling, if one existed. In the center of this space, I&#39;ve spotted a long, dull tube, which descends from the shadows above, onto a raised pedestal whose identity as a trap door is betrayed by a thin, yet noticeable seam running across it. But the most striking characteristic of the chamber is the soft waves of warmth it radiates, a light humming that I could feel pierce my skin, but not truly hear. When I stumbled through the thin passage, I was almost sliced in two by the source of that inaudible, warm humming. It was a long brass string, so thin it&#39;s nearly invisible if you don&#39;t know to look for it. As I gazed again at the room I had entered, I noticed that the room contained a dozen or so more of its likeness, spread out across it. They are set in an unusual, asymmetrical pattern across the room, and as I examined them, I quickly confirmed them as the source of the warm, cozy feeling the place has inflicted upon me. They seemed to vibrate ever so softly, without making a sound.

I have now flicked one of the strands and recoiled. A thin drop of blood slid down my finger, while another dripped down the string. The heat intensified. The humming grew, so much so I could feel it reverberating within my skull. My senses flared, overwhelmed by stimuli. Colors flooding my eyes, nostrils flaring with an unknown scent, skin itching as if a hundred hands were gliding across it. But as I grew used to the sensation, and its intensity weakened, I had felt no pain. It was the same cozy sensation as before, but far more potent. I swear I can feel my cells softly vibrate, the atoms singing an alien tune. I could almost hear it.

I must stay. I will rest amongst these vines of brass until I decipher the resonance still emanating within me.

When I was first learning how to ride my bike, I fell, as kids tend to do. I braced myself as I hit the ground, slicing my hand over the sharp gravel that made the road. I got over it quickly, as kids tend to do, but the rock left a scar, a thin line on my palm. Its presence was a given. A mere fact of life which has grown unnoticeable. As I awoke from the slumber I fell into, the void left behind was what caught my eyes. It was not gone, no, but it was now located on the back of my hand. Not missing, or healed, but shifted across.

The crevice is far now. Yet I still feel the soft hum of that resonance. A song I am not sure was meant for my ears. I am not certain what it did to me, but I know I should not stay there, no matter how intoxicating the warmth may be within this cold machine. Those golden strings may be far behind me now, but I&#39;m not sure they&#39;ll ever truly leave me.

Alright, I have spent some more time traversing, and here is a point at which I can pause to describe what I am seeing.

I am currently sitting on a giant metal pipe, which connects to a network of many other metal pipes, suspended over a seemingly endless pit of moving gears, their cogs gnashing together once every second. I have been climbing on and walking across these pipes for a while now (precariously!!!!). Footholds are scarce, sometimes I have to crawl because the risk of slipping is --too much for me-- too high.

I can&#39;t imagine what may be flowing through these pipes, if anything. Some of them are scalding hot so I can&#39;t touch them - perhaps boiling water? Or steam? (Would it make sense for there to be water inside 914???)

After assessing my surroundings a bit more, I see a big flat metal grate in the distance that I should be able to hoist myself up onto if I get close enough. Where I&#39;ll go from there... well, God knows.

As long as it&#39;s not downwards.

Can&#39;t even think in this damn place, wherever and everwhere it is. Where is it? Where am I? I am where, it is whe- No. No, I don&#39;t think like that. I never have. Thus begins the process of change. Begins. We were all changing well before we let The Royal Cogmaster play with what we knew. Maybe ol&#39; Clocky was simply hastening our eventual process. All the years we spent throwing shit at the wall, or I suppose, into you, just to see what would stick. And now, I… am somewhere? The thought, it&#39;s there, I… I can feel it… Even among the maddening whine of the gears, my thought, it scampers… Come here, come here, please. Help me stay in this part of the where. Help me find what it is I&#39;m here trying to find. That is what I do… did? Will do? I can… I will, will have thought, am thinking. Tempus fugit. Cogito fugit. Come now, cogito, fugit to me. Wait, did I just think in Latin? Am I trying to emphasize a Cartesian concept of mind-body dualism? Am I becoming philosophical?

No, no. Enough. You are going to sit here and you are going to think about thinking until the thinking comes to you. Use the gears. They form a rhythm, don&#39;t they? When they match, force the thought. And… now. Now. Now. Cogito ergo sum. I am, therefore I think I will be not what I was never. The rhythm, it has changed, it&#39;s disrupted my cogitation. There it is, yet again, just beneath the surface, and the water never parts in this place, the oil stays clear and murky, Lethe, Lethe, forget me not. Is this where I am? Hell? Tartarus? Duat? Kur? Sheol? Old gods and our new gods, we have forgotten, I will forget, I remember us not. Break yourself out. Fend off the eagle from your liver and which way you fly is Hell, yourself am hell. Is this a Hell? Is that the best the addled brain can conceptualize? No place in the world of mortals could ever exist for such a place, so it is turned to the realms of the supra and inframortals. Hm. An actual cohesive thought, a conceptualization. Perhaps all is not yet lost in the everwhere.

This place is going to kill me. Do worse than kill me. I&#39;ve died. There is no more me. I live. I am permanent. I have never been. I am. Say it. Write it. Think it. Force your will into existence. I am inside the machine. One with. Apart from. Intake and Output. The man, the machine, the mind. I will die here. What will happen to my mind? Am I being quantum spaghettified as we speak? Who&#39;s we? Who am I talking to? WHY am I talking at all?

Survival instinct. A need to cling to something, anything, in the dying moments. It seems I cling to Cartesian philosophy and half-baked literature references. To be aware of its own mortality, it cannot handle. But I&#39;ve been handling it. I have handled it. I will not ever cease to withhold from potentially handling it. Even as it fugits around me, I have caught the pretty thing by its tail and let go of me it will not. We are entwined now, Ouroboros, Caduceus, Asclepius, around and around and around go the gears of the here there and everywhere, all around the mulberry bush, run run run little weasel, or is now the monkey the one being chased? Chase chase chase, aren&#39;t we having fun, o you cogs and machinery? We have none time, it has joined our game, please stop for a moment I need to catch my breath, you wicked things, must you continually pursue me? Is this all in good fun for you? Are we having a laugh?

Pop goes the weasel.

It&#39;s been a somewhat longer time now. I&#39;ve been trying to measure time using the rotation speed of my surroundings  The surrounding gears  Didn&#39;t work. Heart pulse, the same. Some distinct clicks, clacks, plunks, or that one pfffffft sound. I can&#39;t find the source of the pfffft. The pfffffft, to use the same amount of letters. I&#39;m becoming more irritated --by-- in general, but the walking and climbing helped. I&#39;m surprised (and irritated) that I haven&#39;t slipped yet and I also haven&#39;t been squashed by any part yet. I used &#34;yet&#34; twice, but The Clockworks  Here I capitalised your shitty nickname.  may fuck off with trying to induce a different, more perfectionist (and less irritated) personality into me. If I&#39;m already being the Ulysses of anomalous exploration, I may as well make as many errors as Joyce. Dear screening experts, technical writers, research personell, administrative staff and who in the 914 layers of hell also reads this: I&#39;m sorry. Should I survive this, you may force me to write this properly. Granted, if I survive, you will kill me or at least drug me with amnestics grade A to **[DATA EXPUNGED],** but if not  Looking at how I write I&#39;ll jump into this construct again. I don&#39;t  I thought of writing &#34;do not&#34; now out of politeness, but I&#39;m not that --despret-- desperate yet.  I don&#39;t even know why I&#39;m fighting so much for my identity to be conserved. I am obviously being alternated. Life is change. 914 is change. And changing stuff. Often. Ergo, life is 914. You only 914 once. First thing I&#39;m sure of in here.

Walking and climbing towards the pffft for many clacks now. I think Im getting closer but it&#39;s getting quieter  hate the word quieter, more quiet is more good  concentration. Probably closer to the pffffft, if it&#39;s coming from where --Im-- **[illegible scribbles spanning across this and the next three lines]** going to. It sounds less metallic than the rest of this inside so maybe i can  I do not know what I could.  Fuck.  Fuck it. **[illegible]** a tourist here anyway, may as well  --does this need a semicolon?--  behave as such. As one. Archer to Team, throw me a camera and an aloha shirt in here, I&#39;m taking 31556925 clicks of a sterotypical vacation.

My vacay is shit. The locals are nowhere to be seen, the food is stale and bland, everything is loud, there is no translation (or any other text) anywhere. At least the architechture is impressive, I guess.
