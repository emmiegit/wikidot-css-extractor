    <pre><textarea class="page-source" readonly>##green|Shout awoke to the weight of Fades’ arm brushing against  him. He felt fresh, as though he caught up on sleep he hadn’t known he missed out on. Fades was sitting next to him on the couch, flipping through TV channels in search of something fun to watch. He was back at the dorm he had seen himself open for Fades. But it all had to be a dream. It //had// to be. He was fine. As long as Fades was here, he was alright.##

“...the Mayor is urging citizens to comply with the Shelter-in-Place order, as elements of the unnamed paramilitary group are still at large in the city and highly dangerous. She declined to comment on whether the US military planned to conduct airstrikes within the Boston metropolitan area…”

    “...mental health epidemic is sure to stick around even if the crisis ends, with an estimated two hundred and eighty thousand fathers, mothers, and siblings of the lost….”
    
    “...represents the longest period of time between waves of disappearances, indicating a possible end to the ongoing tragedy that has gripped America for almost a year now. Though the White House or other federal agencies have yet to issue any official statement…we’re sorry to interrupt, but we have breaking news: fleeing civilians are flooding into Boston from outlying suburbs after a series of skirmishes between national guard troops and paramilitaries…”
    
    “What college student in 2024 has cable instead of just getting a smart TV?” Fades said, tossing the remote aside. “Deadass, what do you even watch? Am I squatting in the one retiree’s dorm room on campus?” 
    
    Shout heard a pop, and the clicking of something metal falling to the ground. He tried to crane his neck, only for pain to shoot up the entire left side of his body. He saw Fades’ had popped the cap off a beer bottle with the buckle of her own belt, which for convenience’s sake she had wrapped around her left arm. “You’re missing out, Shout,” she said, “World’s going to shit in really cool ways. You’d love it.” She lifted the beer bottle to his lips, “It’s your favorite,” she said, “Guess retirees dig Miller High Life.”
    
“Don’t mind if I do,” Shout said, grabbing the bottle. 

Fades screamed, and her hand yanked the bottle; Shout instinctively tightened his grip, and the liquid left the bottle behind on its way up, then down. The suds and amber liquid splashed them both.

Shout relished the way her eyes went wild and the way her voice stuttered into a staccato “OH.” Her slack-jawed mouth revealed her dimples, and her heavy breathing staggered into outright laughter. Solar eclipses, blue moons, decade perennials, and Fades’ being surprised had a lot in common.
“Hey,” he said. He stood up,  shaking the blanket off himself, and realized Fades had stripped off his shirt, and pulled off his pants. He smiled, rolled his eyes, and reached for something to try to dry his chest, when he noticed an oddly textured, bloody mass out the corner of his eye. His mouth went dry when he realized those were his clothes. His shirt has been cut open by Fades’ trembling hands and was glazed with ruddy amber, smeared with flower petals, and covered in odd,  sponge-textured tree branches. His pants were more conventionally caked with dried blood and grass sod. 
He felt Fades’ hand on his cheek draw his face towards her. “I got you,” Fades said, and, without breaking her eye contact with him, peeled off her own shirt.

It was splattered with the dried contents of his mouth and lungs from when she tried to breathe him back to life, but Shout didn’t mind when she used it soak the dampness of his skin, letting her warm breath tickle his neck and jaw until Shout could only hear his heart beat in his ears and her breathy chuckle. She dropped her shirt and idly let her finger drag along a path between the many animal tattoos on Shout’s chest, her nail pressing briefly into a red sparrow’s beak on Shout’s upper pectorals, and then dragging a soft path along the small black cat near Shout’s heart and eventually circling just under the butterfly next to his belly.

“Shower?” Shout and Fades both said.
…

They didn’t make it to the shower, let alone the bedroom. Eventually, Fades laughingly pushed Shout away and climbed  off the kitchen counter before letting Shout drag her back to the couch. They didn’t so much stop as burn out. The fun actually gave  Fades’ brain the space to race faster than usual, and by the time she felt Shout begin to snore under her, she had made a list and decided she didn’t need the gun. 

    One: Take a shower.
    
    Two: Get some clothes.
    
After a hot shower, she was too single-minded on gathering fresh clothes for herself and Shout to care that the bedroom smelled peculiar, of dust, wet cardboard and oil paint. She turned it upside down finding clothes for herself, lucking into some gray denim shorts, a purple and lavender hooded t-shirt, and black sneakers for herself.  She couldn’t find anything for Shout in the bedroom, but she remembered the neat pile of clothes in the main hallway just outside the unit’s door. The first time she came across it, she’d found the apartment key in the pocket of a skirt. This time she found a slightly-too-large pink dress shirt and a pair of checkerboard pattern shorts .) She made a mental note to find some discrete way of destroying their Foundation issued uniforms. Fire, too conspicuous; garbage, too public; wash the uniforms and stash them between vintage trench coats at the Garment District, inconveniently across the Charles River, but under consideration.

Three: Tuck the truck

The humvee was still there, the bumper a few inches from the flagpole. She spent an hour stalking the campus, first looking for evidence of police activity, then evidence of prying eyes, and then evidence of anyone, and found none of the above. Eventually, Fades gathered the nerve to walk over to the Humvee. She pulled open the driver’s side door, climbed onto the passenger’s seat, grabbed the lighter and remaining blunts from the still open glove compartment, pocketing them for later.  She checked the skies for buzzing helicopters and dancing fighter-bombers and took a moment to sort through her racing thoughts. 

Maybe the police were keeping civilians from getting in the way of an imminent sting operation. That possibility didn’t interest Fades, because there was little she could do about it. 

    Occam’s razor: she couldn’t find anyone on campus because there wasn’t anyone on campus and there hadn’t been for some time. Colleges had already seen a sharp decline in applications  around the time the Foundation took charge of sheltering its staff’s children, and that was eight months ago.
    
That satisfied her curiosity about the empty campus, but another question came to mind: whose Humvee was this? A ridiculous question - it belonged to the scared driver, who lent it to-, lent it to-, lent it to-Fades closed her eyes out of frustration. She’d never run into a hole in her thoughts before.

What was her husband last night?

What was her husband last night?

Where are they now?

It’s still Shout. 

“It’s Shout,” She muttered, “It’s Shout.” She searched the rest of the truck and  found a satchel filled with groceries, including ground beef, eggplant, cucumber, and corn. Just what she had been looking for. Shout enjoyed cooking for her. He’d told her  it was the closest thing he had to reliable stress management. She added a few more useful items she found to the satchel and he drove the humvee into a nearby garage. After scurrying back inside the building and up the stairs, she stopped for breath just outside the apartment door. Mission accomplished, she thought, as she reached for the doorknob.

...

Shout was both a heavy sleeper, but extremely sensitive to loud noises. That’s why, when the door walloped the frame, and he felt Fades’ absence on his chest, around forty five percent of his brain accepted that Fades had gone out to run some errands, and had just come back. Unfortunately, his body was only listening to the traumatized fifty five percent. He tumbled off the couch, and scrambled to his feet, instinctually screaming his wife’s name. 

His voice felt dry and raspy. He closed his eyes again and breathed the panic out, using the exercise his Foundation-approved therapist had taught him, so he could pleasantly tell Fades, “Good morning, you scared me,” instead of “What the fuck, Fades.”He opened his eyes.

That was not Fades.

He saw ##purple| Robert Lapin## standing at the door. He was not happy to have the traumatized part of his brain be vindicated like this. ##purple| It is okay, for his trauma will not haunt him for long. I am here, and his narrative shall become mine. ##

“W-who are you?” Shout asked. His face felt damp. He looked at where he’d just slept and saw a head-sized red colored patch on the teal polyester. He felt his face, and saw blood on his finger-tips, and a set of clothes neatly laid out for him on the floor, and finally, the lack of clothes actually on his person. He stumbled backwards.

“I would hope that’s self-evident.” ##purple| Private Robert Lapin ## said, “I am a member of the US Navy Seals. You are a runaway and an imposter.” ##purple|Robert Lapin## walked over to the stove and turned on an electric kettle. “When you’ve made yourself decent, do join me for a cup of tea. Or would you rather I call in back-up now?”

“Just a second, I’ve got to find my…”

“Take your time,” ##purple|Robert Lapin## said, “I will, however, suggest you take too much of mine. What are you doing now?”

“I’m…I’m just trying to wipe my…”

“Your bloody hands? On furniture that doesn’t belong to you? I think your clothes will suffice.”

“Can I quickly pop into the bathroom?”

Silence. “Guess not,” Shout thought.

Shout tried to restore some order to his hair, forgetting the state of his hands. His scalp felt somewhat sticky to the touch - likely from whatever…whatever happened to him back at Site-46. 
“Pardon my…didn’t take a show-”

“I know. Are we expecting any other guests for tea?”

“No,” Shout replied, and immediately felt a migraine blossom, though he did his best to keep a straight face throughout the pain.What was he going to do when Fades returned from…wherever she was? What if ##purple|Robert Lapin## had reached her first? What if something or someone took her? What would Shout do? What could he do? 

##purple|Shout had learned that lies are very expensive in this new life of his, and that he must do his best to remain courteous with the visitor without actually telling him anything valuable. He shouldn’t lie, he shouldn’t be abrupt or defensive, and he should never, ever, ever name things.##

“You appear to have had a nasty spill.” The tea kettle whistled, and seemingly seconds afterwards, he was passed a cup of strong smelling tea, and the billowing aroma of crisp-leafed trees in autumn lifted into his nostrils. 

“I could call the police,” Robert Lapin said, “I suggest you try to make my patience worthwhile. Where are you coming from?”

“Lived at the Pru.”

“What is your name?”

“What’s yours?” Shout asked, somehow already knowing the answer.

##purple|“Immaterial. You’re bleeding all over, it seems. Why? Whence?”##

##purple|“I…nosebleed, I guess?”##

“So what is your name?” ##purple|Robert Lapin## asked. 

Truth be told, he didn’t know. ##purple|And Shout doesn’t. What he calls himself, and what his wife is allowed to say to refer to him are conveniences, not identities. ##

“I was mistaken. Watching the police have their way with you will be far more entertaining.” 

There was a click. Shout noticed the door knob begin to twist. If it wasn’t Fades, he was screwed anyways. In the event that it was, he needed to keep ##purple|Robert Lapin’s## attention on him.

“Samwell Tarly,” ##purple|the fucking idiot## said, and suddenly his hands felt like something was peeling the skin off their bones. He almost threw up then and there. He saw the door bump open just a bit.

“Okay, Samwell Tarly,” ##purple|Robert Lapin## said, “Fascinating. Your name and your flesh are a unity. An abomination, to be sure, but a delicious one. I must applaud you for rewarding my habit of suffering fools gently. Pardon me for asking, but what do you make of what I’ve done to your finger?”

“What…what?” Shout asked, and looked down to see that the five year old stump on his ring-finger had opened once more. He saw something that looked like a tree branch puncture its way through the bone. 

The blood is now flowing out of Shout’s ear. ##purple|Shout was experiencing a neural hemorrhage, but he shouldn’t be concerned. His cognition had ceased to be neurological a week ago. The best parts of his soul transcend his failing body.##

The door swung open, and Shout used his one good hand to splash ##purple|Robert Lapin with the boiling tea, and Robert Lapin’s long ears quivered as Robert Lapin stumbled backwards, visibly in pain. Then, Shout heard a sickening crack, and Robert Lapin slumped over the kitchen counter. ##

##purple|When Shout finally saw Fades, she’d already slammed the blade of the E-Tool on the back of Robert Lapin’s head a second, and then a third time. Before Robert Lapin could bring himself up to his full height of eight feet, Shout screamed the pain out of his body, and threw himself against Robert Lapin’s legs as hard as he could, propelling the giant rabbit-person off the counter and onto the floor. Fades aimed a final strike directly at Robert Lapin’s left eye.##

At that moment, Shout saw one of Robert Lapin’s legs swing upwards and make contact with Fades’ chest, throwing her backwards across the room. He heard a bang that must have been her slamming into the door, and then a deeper thud as her body hit the ground. Shout screamed his wife’s name, then heard a ‘pop’ before feeling something tighten around his neck, and then he felt himself get yanked into the air, windpipe squeezed shut by tight, furry fingers. ##purple| --Shout-- realized Robert Lapin had grabbed him by the neck with one hand and had lifted him a foot or so above the ground. ##

“I’ve never eaten a Name before.” Robert Lapin said, “This will be rather novel for me.”

“##purple|I have##,” ##purple|O5-06## said. 

Then, with two quick piercing movements with her wooden digit, she punctured --Robert Lapin’s-- eyeballs, and then exhaled heavily into --Robert Lapin’s-- bleeding sockets, which burned and shriveled in response

--Robert Lapin-- dropped O5-06 and covered his eye-sockets with his hands as he roared in pain and terror. O5-06’s human nose barely recognized the scent of --Robert Lapin’s-- singed attributes. Her human eyes could not detect the conceptual decay of --Robert Lapin’s-- Name as it exhausted its half-life and its radiance became hers. 

On the other hand, her human hands and human mouth were perfectly adequate to the task that remained to her. 

She heard Fades’s moan of pain, and walked over to the helpless girl, using fingers that resembled human digits to check her pulse. With an ethically appropriate amount of force, O5-06 slapped Fades into consciousness, and then looked at her eyes for signs of a concussion.  Fades mumbled something, presumably her husband’s name, but by then, O5-06 was preoccupied with running her harsh fingers over Fades’ body in search of broken bones. Not even a cracked rib. Nothing more dramatic than a week or two of uncomfortable breathing. She tapped the wife’s left shoulder, and winced when Fades’ screamed. O5-06 assessed the deformation, and arrived at what to do next.
She could see the pupils of Fades’ eyes dilate properly. “Shout, what are you…what are you laughing at?” Fades stammered.

O5-06 got that a lot from people, even when she really wasn’t. She was pleased to see Fades. All things considered, it had been awhile. Fades hadn’t even invited her to the wedding.

“Are you ready?” O5-06 said.

Fades’ eyes widened. Her face stretched in a silent scream, but instead she mouthed a barely voiced “Mom.” Then O5-06 grit her teeth, and Fades screamed as her shoulder popped back into place.

O5-06 left Fades’ to her usual routine of trying too hard to be tough. She turned her attention to the second person of interest in that room, and walked towards Robert Lapin. She knelt next to it and whispered: “All things considered, my furry friend, I hope this will be novel for both of us.” She began to do what came natural to her, only pausing to mark the moment Fades’ passed out from either pain or shock. When the furry friend could no longer scream, it shook instead, all the way until the end.
…
    Fades felt Shout’s fingers graze her cheek. Then, a slap opened her eyes with a jolt. She saw O5-06’s face inches from hers. Her thrill-quickened breath splashed her face. O5-06’s face-splitting grin and wolf-like gaze made her husband’s features altogether alien. She switched gears, telling herself it was not Shout’s hand that struck her, but she couldn’t help but think Shout smiled a lot too. Laughter came easier to him than it did Fades, and she’d feel furthest from him in these moments., watching Shout find joy she could never understand, but in this gap between them she ached to fall. She didn’t want him to settle for her dead heart, not when he could make hers flush with blood with a glance or a touch. The sting of O5-06’s blow lingered. “You look like shit,” O5-06 said.
    
    The intrusive thought was stubborn: Shout was a lot like Mom. They shared that same hunger for joy. The difference was Shout dreamed of filling the world with music and O5-06 longed to make it howl.
    
Behind O5-06, the apartment looked spotless. No trace of the fight or the anomaly that had attacked them.

“What are you waiting for?” O5-06 said, “Want me to carry your fat ass?”

Fades tasted copper and spat something scarlet on the ground. “I don’t care whose nose that is, I’m gonna hit you. Enough with the fucking bullshit.”

O5-06’s smirk widened. “Yellow card.” Fades felt a chill and stiffened in spite of herself. “Oh, don’t be such a stereotype. I’ve never hit you.”

    “You just did.” Fades tried moving the arm O5-06 popped into place and kept her face steady as the arm bit back.
    
“That was your husband.” O5-06 chuckled, “See? I can play with semantics as well.” Her voice resembled Shout’s in pitch and timbre-all the ways her trachea enforced-but her clipped speech, enunciated syllables, and recurring bouts of stifled laughter sounded as if someone was doing a camp parody of Shout. “That was medical necessity, not fun. And it’s never fun watching you hurt.”

    “What happened to my husband?” Fades said.
    
    For the first time today, her hands shook.
…
    Shout woke to a splash of cold water. Where am I? He thought. He heard the boom and crash of a fierce wave crashing against rock. He heard the breaker thunder. As before, his sight was slow to return to him, but he felt something warm and soft pillow his head, and heard someone softly hum something just above his ears. 
    
    It was a note and pitch perfect rendition of the violin to Schubert’s Fantasia. He instinctively started humming the piano’s part. No amount of injury could completely kill the eager ivory-artist in him. He thought he heard the hummer slide a four beat chuckle in a whole rest, and he hummed slightly louder before his counterpart seamlessly rejoined on tempo. He felt more cold water land on his forehead, and as he felt the drops slide down his forehead and sting his eyes, the tar black fog melted away. He could see again.
    
    His humming stopped. Cheeks streaked with crimson tears, face cowled by a rabbit’s severed head, deep gashes where eyes would normally be, O5-06’s beaming face loomed, and Shout realized his head was propped on her knees. She let her right hand rest on Shout’s forehead, and all at once her ghastly chimera stare felt more familiar and comforting than horrifying. O5-06’s hand cupped another splash of water-it seemed a small estuary had formed near them-and let it trickle on Shout’s forehead again. She hadn’t stopped smiling.
    
Shout&#39;s voice lost all of its weakness and got loud. “Where’s my wife?”

“She’s safe.” O5-06 splashed his forehead again.
    
“Ok, but where.”

“Ontically, three inches from you. Ontologically, worlds away.”

“What difference is that?”

Even outdoors, he felt nervous about raising his voice about a whisper. He felt some fear towards aggravating O5-06, but he weirdly felt watched by others, even on the flat shadowless meadow next to the endless ocean. Something hid somewhere.

O5-06 scratched his cheek with a long nail. “You grew up in a world with a clear delineation between ideas and material. Naturally, ideas would seem less real to you than the material. Your meaning of the world was built on facts about it. A stop sign has color, shape, location; a lover’s touch, an electric tickling rush of pleasure. You were in a cave. Those facts are but shadows. This,” She gestured around her, &#34;is what lies outside the cave, with nothing between you and the sun. Ontology is the fundamental definition of the world that gives it meaning. Now, your existence is both ontic-substance-and ontological-an aspect of that definition.”

“I’m only interested in the world she’s in.”

“Do you honestly expect me to believe that? And you can’t return just yet. You broke again, and I am putting you back together.”

“Are you doubting I love her?”

&#34;Perish the thought. I’m doubting you’re indifferent to other things.”

O5-06 patted Shout’s cheek. 

“Now, on your feet. I’d love to talk, but I’d like you to humor me.”

Shout initially tried to lift his head from O5-06’s lap, but the moment the intention passed through his head, his body rose of its own accord and lifted him upright. He staggered backwards. He felt weightless, but the nausea from the whiplash was still very real.

Shout&#39;s body felt an unease and dysphoria that was beginning to fixate his mind. A single question asked a thousand times: What&#39;s happening to me? 

O5-06 seemingly bounced to her feet as though a rope pulled her there. She snapped her fingers, and a table covered with red cloth, an iridescent turquoise tea kettle, and twin white ivory cups and an alder wood sugar bowl popped into existence next to them. Shout saw her purse her lips. 

“Pity.&#34; She stamped her feet in mock outrage. &#34;Missed again.” 

She snapped her fingers a second time, and two wicker wood seats with straight backs and fluffy checkered pillows joined the table. The seats were opposite each other. O5-06 walked towards the seat on the left, sat down, poured herself a cup and dropped six sugar cubes in the hot liquid. She looked at Shout and gestured towards the other seat.

“How about a cuppa?”

    …
    
    “Mom, don’t play me. Where’s Shout?” Fades shoved O5-06 out of her face and got to her feet. “I’m done playing with you.” 
    
“Au contraire.” O5-06 let out another chuckle and walked with a skip to the kitchen. “You’re still trying too hard.” 

Fades ignored O5-06 and tried to meditate on the anomalous cleanliness of the room, gauged the metaphysical implications. “That…furry friend…it doesn’t have fundamental ontology, does it?”
“Getting warmer,” O5-06 walked over to the kitchen. Fades heard a clang and a slamming of cabinet doors. “I’m making tea. You still take yours black?”

“Ye-what?” Fades did a double-take, “So furry friend can’t be named, consists entirely of attributes, looks goofy…are we talking…?” Fades tapped her foot thinking of how to finish that sentence, then brought two hands together, hooked her thumbs, and curled her fingers inward. O5-06 started laughing.

“You even remembered the hand-sign workaround to refer to them! Been a while since I taught you that. Yes, correct. And so are you and your husband are also entities  no names. Well, almost. Those goofy-ass labels you keep calling each other are a care package from me. Consider it a belated wedding gift.” Her smile flickered for an instant. “The wedding you didn’t invite me to.” The kettle whined as steam squeezed its way out the spout.

“Mom.” Fades said, “Please.”

“That’s the spirit!” O5-06 touched the kettle, exhaled with a surprised “Ha,” and turned it off to stop the boil, “Not so hard after all. This is your first lesson in caring for your dying husband, by the way. Manners.” 

“Back up, Mom.” Fades suddenly felt numb. “Mom. Mom, what are you saying-” 

She saw O5-06 carry on, seemingly paying her no mind, while her own lips tried to form words her brain stopped supplying her. O5-06 produced two coffee mugs, and placed them on the countertop where Shout and the furry friend had sat. She took the kettle and a sugar bowl and placed them between the cups, then filled both mugs with tea. She dropped six sugar cubes in her own mug, then sat in the stool where Shout had been. She pulled out a smart phone-she must have raided the apartment bedroom while Fades’ had been unconscious-dialed some numbers, and waited until a voice barked from the phone, “Who the fuck is this?”

“Said I’d see you in hell, didn’t I?” O5-06 replied. “Guess who. Actually, don’t.”

“Oh, fuck.”

O5-06 counted fifteen seconds, “That should be enough to trace my current location. Contain the breach. No, don&#39;t bitch to me. It&#39;s just three Marine battalions. Now come and get us.” She hung up. Fades opened her mouth to yell at her.

    Then O5-06 slammed the phone onto the counter’s edge. She smashed it again, and again, and again, until the phone broke in half. Then she crushed the half into small pieces and threw them into the sink, then stomped on the other half repeatedly until it too was nothing but a plastic-silicone crumble. She adjusted the lapel of the open dress shirt like it was a suit, then sat in her stool again as though nothing had transpired. 
    
Fades didn’t feel like talking anymore.

“Oh Fades,” O5-06 yawned with a brief howl. Fades wanted to scream looking at her. She was still smiling. She smiled through all of it. She gestured at the other stool, and then indicated the tea setting with a flourish.

 “How about a game?”

…

&#34;Do you make a hobby of trying to intimidate your own reflection, Shout?&#34; O5-06 said. She had already taken a strong sip of her tea and smacked her lips with the taste. Shout tried not to confirm whether she was bleeding into the cup.

Shout was too tense to relax, and instead leaned against the back of his chair like the table was on fire, and knowing the nature of this place, he figured it could very well have been. He tried instead to waft the steam in the direction of his nose. &#34;It smells like lettuce. And almonds.&#34;

O5-06 leaned across the table, bracing her elbows on its surface, and rested her chin on her palms. The seeping open wounds soaking through her mask glinted in the sunlight and seem to wink at him. The blood spilled from her face onto her palms and splashed onto the table cloth. Shout saw a few drops would only actually stain the cloth at a time before vanishing, as though making way for the next few. She wrinkled her lips in a jocular pout. &#34;Are you accusing me of trying to poison you?&#34;

Shout crossed his arms. &#34;The thought crosses my mind, yeah. You //are// the reason I agreed to this. You are the reason for all of it.&#34;

O5-06 looked confused, and pointed at herself. &#34;Me? I was just a sacrifice.&#34; She traced a picture frame in the air with her finger around the grotesque mangle her face had become. &#34;You were presented with a choice. I was there to help you think about that choice. Nothing more.&#34;

&#34;You pretended to be a therapist.&#34;

&#34;To save the world. And you&#39;re no different, pretending to be ordinary.&#34;

&#34;I&#39;m not pretending to be anything. I&#39;m me.&#34;

 &#34;You&#39;re a hero, Shout.&#34;

He felt weak and warm all of a sudden. He looked down at his feet, hoping O5-06 wouldn&#39;t notice what saying that did to him. &#34;What&#39;s the tea made of?&#34;

O5-06 groaned and lay back in her chair. &#34;Stop screwing around and just drink already. Or was your dad right about you being delicate?&#34;

&#34;Fuck you.&#34;

&#34;Yellow card.&#34;

...

&#34;What are the table stakes.&#34; Fades asked.

&#34;Your fingers.&#34;

&#34;If I win, you relinquish your Name to Shout and never bother us again. What happens if I lose?&#34;

“Am I okay?!” Shout asked.

“We don’t know.” Someone finally said.

“He’s okay” O5-06 said. “Now stop complaining, you stupid girl.”

Shout spent the rest of the day trying to talk to Fades, but Fades would often deflect or demure. “I’m sorry, my brain is just not there today, and I can’t afford to fuck up. Not with you. We can talk tomorrow, hon-” She punched the door to their room, and took a deep breath, “We can talk tomorrow. Good night.”

“I…Fades, please..” Shout said. He felt desolate, cold, lonely. He reached out to hug her, but she neatly weaved out of his way. She slid under their bedcovers, curled up at the far side of the bed, facing the wall.

“Fades…” he said, feeling wretched. He wanted to feel rage or betrayal at that moment, but tried to see the bright side of things. Fades was doing this to keep him alive. Perhaps this was still love, just another, darker, colder form of it.

Shout climbed into bed, but didn’t bother trying to get under the covers. He slept hugging the edge of the bed facing the room. He tried falling asleep facing Fades’ back, but soon turned away from her.
