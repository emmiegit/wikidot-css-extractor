    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>**Incident 8060-ALC:** SCP-8060 had proved to be difficult to experimentally research, as D-Class testing was often both resource intensive and inconclusive. Subjects were often challenging to select for or prepare, as SCP-8060 required an individual interest in uncovering the associated information, and several subjects who exited SCP-8060-A were incapable of describing the retrieved information or their other experiences within. Six tests resulted in the subject being lost. D-Class were also noted to lack training or expertise in interacting with Alucinari-class entities, leading to often unpredictable additional risks when subjects returned from SCP-8060-A. As such, further tests utilizing D-Class were put on hold. 

[[include component:image-block
|name=https://scp-wiki.wdfiles.com/local--files/scp-8060/rowansketch.jpg
|caption=Depiction of Researcher Rowan Raster, generated by Foundation illustrator Laverne Kennedy following Incident 8060-ALC.
|align=right
|width=300px
]]

It was decided that further tests involving SCP-8060 would involve personnel who had more experience dealing with anomalies of its nature. After much consideration, Researcher Rowan Raster was chosen to perform the first researcher-driven exploration of SCP-8060-A. 

This decision was backed by many of his accomplishments as a researcher, including his heavy involvement in the neutralization of SCP-5045, a Keter level Alucinari-class entity.[[footnote]]An extradimensional threat that referred to itself as &#34;Farmer&#34;, capable of disguising itself as a videogame in order to gain access to humans for the purpose of manipulating and torturing them. Entity had previously overtaken the entirety of Site-301, subsuming it into its own dimensional space.[[/footnote]] 

Rowan also has prior history with Sputnik Studios as a former animator and director, and first entered Foundation employment after it was discovered that one of his animation projects (&#34;The Abnormality Hunters&#34;) included elements resembling multiple confidential anomalous objects. 

These elements included [https://scp-wiki.wikidot.com/scp-1740 a playground which holds humans prisoner], [https://scp-wiki.wikidot.com/scp-217 a disease that transforms organisms into mechanical robots], [[https://scp-wiki.wikidot.com/scp-2000 REDACTED]], and [https://scp-wiki.wikidot.com/scp-2295 a toy bear that heals human children by creating fabric prosthetics]. The details of these objects were sourced from Rowan&#39;s dreams, and were not an intentional act against the Foundation or proper containment of the associated objects. 

Finally, Rowan previously interacted with and formally discovered SCP-8060&#39;s anomalous properties, and had already demonstrated an ability to engage with SCP-8060 in a controlled and responsible way.

In preparation for his entry into SCP-8060-A, Rowan was given a field journal, portable notebook computer and digital camera to record his experiences. Due to the unknown nature of SCP-8060-A, and any hazards it may include, he was also provided with a standard survival and emergency preparedness pack containing food rations, a portable water filter, a thermal blanket/shelter, a flashlight and first aid kit.

The following is a collection of records created by Researcher Rowan Raster during the experiment, ordered chronologically to the best of the Foundation&#39;s ability. Any possible manipulation to the records has been highlighted ##064edd|**blue**##.

-----

&gt; **Entry #0** 
&gt; ------
&gt; **[BEGIN VOICE JOURNAL LOG]**
&gt; 
&gt; Hey. Rowan Raster reporting in.
&gt; 
&gt; I am currently standing near the entrance to SCP-8060-A. The building holding an entrance to be more specific. Took a few good hours of driving to get here, actually. It resembles an old shed. Very strange to see out in the middle of nowhere. I’ll leave a photo at the end of this log.
&gt; 
&gt; Truth be told, I am nervous. Who wouldn’t be? We aren’t even sure what goes on in here. The thought of those weeks of preparation all culminating into me going missing is… very disquieting. Negativity won’t get me anywhere though. Negativity is the antithesis to progress. The Foundation has me well prepared and I’ve certainly been through worse.
&gt; 
&gt; Call it staving off the inevitable, I just want to savor this moment before I enter. This moment of quiet out in these windy plains. Well, quiet if you’re discounting the starry-eyed eagle beckoning me closer to the entrance. Sorry buddy, just give me a few moments. Hahah. 
&gt; 
&gt; Don’t expect to see that weird little guy in the photo, think that’s just SCP-8060 making me see things again. Birds aren’t supposed to have teeth like that anyway. This anomaly really loves playing tricks with your vision. Let me think of an example. 
&gt; 
&gt; Well, on the topic of birds, I saw a parrot crash into my window while I was scrolling through a Sputnik fansite. It splattered on the wall like paint. Literally. No gore, just a big splat on the wall drizzling downwards like syrup. And it still managed to blink at me. Had to shut the blinds for that one.
&gt; 
&gt; //(Rowan chuckles anxiously, then sighs.)// 
&gt; 
&gt; I should admit something. The reason I’m doing this is a bit personal. Don’t get me wrong, I’d be doing this no matter what! But once I found out Horris and Della were missing I knew what had to be done. I didn’t know them all too well during my time working at that studio but nobody deserves to be forgotten the way they have. Not even a missing persons report. Jesus.
&gt; 
&gt; That isn’t the only reason I’m doing this. If I find them, this could be big. This could mean retrieval missions for everyone else who got lost within -A. Not sure if SCP-8060 counts all those people as relating to itself. It’s still worth a shot if this works. I’m hopeful.
&gt; 
&gt; And hell, I know that on some level SCP-8060 is generating the evidence it gives you. That doesn&#39;t mean the evidence is inaccurate though. And so much has been cropping up in relation to the two coworkers. Whole reason I knew where to find this place was because of some old obscure magazine that had a page discussing Curmen&#39;s last film role. Had to cut out all the numbers in it and rearrange them by color.  It was a pain, but if it means I get to save their lives, I&#39;d do it ten times over.
&gt; 
&gt; //(Rowan goes silent for around 13 seconds. The sound of wind picks up in volume.)//
&gt; 
&gt; I— uh. I did watch Societown to prepare for this. Not the whole thing, mind you. I just thought it&#39;d help. I mean, this anomaly is tied to it right? So... 
&gt; 
&gt; //(Footsteps. It is assumed that Rowan is pacing at this moment.)// 
&gt; 
&gt; ...okay fine, it was the whole thing. All seven seasons. I shouldn&#39;t be dishonest on record, apologies. Not bad. A lot more creativity than I was expecting from a preschool show honestly. A lot of the lessons would&#39;ve probably helped me when I was younger. Surprised they were able to keep the concept going for as long as it did, although some episodes did feel like retreads. Could see why they&#39;d want to give it closure. 
&gt; 
&gt; I really liked the choice to make the Societs in Societown so artistically distinct from the main characters. Very unique stylistic choice, made it all the more engaging and exciting when you saw a new character on screen. My favorite Societ was probably Grundon. He&#39;s a hefty guy, has a very distinct voice, good... tail? 
&gt; 
&gt; Uh. Alright, I think that&#39;s enough stalling. I... if I keep on standing like this. I&#39;ll get too afraid to enter. I can&#39;t just sit here talking about cartoons. 
&gt; 
&gt; //(Rowan can be heard walking towards the shed. His breath is unstable, shaky.)//
&gt; 
&gt; There&#39;s a non-zero chance that I&#39;ll go missing, or that something is going to scramble my brain somehow. Maybe I&#39;ll die. If any of that happens, please forgive me for failing the mission. See you on the flipside. 
&gt; 
&gt; //(A door creaks. Wind chimes can be heard emanating from an unknown source.)//
&gt; 
&gt; It&#39;s big.
&gt; 
&gt; **[END LOG]**
&gt; ------
&gt; 
&gt; **File Attachment: mysteryshed.jpg**
&gt; 
&gt; [[image https://scp-wiki.wdfiles.com/local--files/scp-8060/mysteryshed.jpg]]
&gt; 
&gt; **Notes:** Nothing much to say. I like the orange. 

&gt; **Entry #1**
&gt; ------
&gt; **[BEGIN JOURNAL LOG]**
&gt; 
&gt; I want to get my impressions down before I forget. I think I just got here, but I can already tell this place makes you lose track of time.
&gt; 
&gt; People go to theme parks and they think it&#39;s like really being inside the show, but if they were really there they would know the difference. A theme park is all real plastic and concrete put into the shape of fake settings, and real people putting on masks and costumes pretending to be fake characters. This is the real fake. The true false.
&gt; 
&gt; I&#39;m looking around the town square and it&#39;s like everything glows, even the shadows. Everything except the edges. Glow isn&#39;t even the right word for it, really. It&#39;s more like the light is straight on my eyes. When I look at myself, I don&#39;t really fit ##064edd|**yet**##. The layers don&#39;t always work out how you think they&#39;re supposed to.
&gt; 
&gt; It&#39;s like smell and taste don&#39;t exist here. You never know it when you&#39;re outside, but even the air is supposed to have a taste. Here, it&#39;s just sight and sound and touch. Even touch isn&#39;t really touch. No matter what it is, there&#39;s almost a tactile double-image. I feel wood grain on a door, but I also feel the glass and static electric buzz of a television screen. There&#39;s not much to hear yet, ambiently, either, just my own perfect foley footsteps.
&gt;  
&gt; There&#39;s no wind, no &#34;room tone&#34;. I can&#39;t even hear my own heartbeat ##064edd|**out**## here. It&#39;s like things can only make a sound on purpose.
&gt; 
&gt; The surroundings feel familiar, but I guess only because they&#39;re supposed to. If I try to compare them to any of the sets from the show, they don&#39;t actually match up. Waste of my time to find all those maps, but I already knew that this isn&#39;t a place you navigate by walking from point A to point B anyway. I&#39;m pretty sure the roads behind me keep changing, and the street signs definitely are. Asking for directions might work, especially if I ask politely, but there hasn&#39;t been anyone I can get a straight answer from
&gt; 
&gt; There&#39;s SCP-8060-Bs around, by a certain definition of around. They&#39;re all distant one way or another. For a lot of them, I&#39;m not even sure if you can call them ##064edd|**toons**## at all. It&#39;s more like they&#39;re painted onto the scenery. Others, they may stand still, but they&#39;re alive. 
&gt; 
&gt; You can kind of tell just by looking at them, but it helps if you look through something to see if they&#39;re on the level or not. I try to approach them, though, even the ones that move a little, and most don&#39;t get any closer. It&#39;s like trying to walk closer to your own nose. There&#39;s no one I recognize from the show, and maybe that&#39;s a good sign. I&#39;d hate to see Grundon or Trickadee in a state like this.
&gt; 
&gt; This //can&#39;t// be all there is to it, but obviously I need to go farther, or deeper, if I want to find anything.
&gt; 
&gt; **[END LOG]**
&gt; ------

&gt; **Notes:** Trying to demonstrate something here. Apparently the Alucinari behind my hand is named Twitchster? &#34;I&#39;m a Twitchster!&#34;, it says. It just shrieked and ran off after telling me that. Not even sure what to make of this.

&gt; **Entry #2**
&gt; ------
&gt; **Text Input:** tryping thisreally quick sorry i justfound an aluinari that iswilling to acually talk tome expect interview soon
&gt; ------
&gt; **Interviewer:** Researcher Rowan Raster
&gt; 
&gt; **Interviewee:**  Aluci-T322 (&#34;Alford&#34;)
&gt; ------
&gt; **[BEGIN INTERVIEW LOG]**
&gt; 
&gt; //(Rowan is walking towards a large olive green building labeled &#34;Olivia&#39;s Bakery&#34;. The sky indicates that it is around midnight within SCP-8060-A.)//
&gt; 
&gt; **Rowan:** Does this seem like a nice spot to you? I recognize it from the show. 
&gt; 
&gt; //(Rowan turns the camera towards Aluci-T322 (&#34;Alford&#34;), a roughly humanoid SCP-8060-B instance seemingly constructed out of clay, with an enlarged head and eyes. The entity locomotes in a jerky, but controlled manner, visually similar to stop motion animation, and appears to speak by moving a snout-like feature on its face.)//
&gt; 
&gt; **Alford:** Sure? Anywhere is fine, man. 
&gt; 
&gt; **Rowan:** I know, but you&#39;re the first one here that&#39;s actually willing to strike a conversation! I mea— wait. 
&gt; 
&gt; //(Rowan looks upwards.)// 
&gt; 
&gt; **Rowan:** Hey, uh. How long have I been here? 
&gt; 
&gt; **Alford:** Do I look like someone who&#39;d know? This place isn&#39;t really my style either, dude.
&gt; 
&gt; **Rowan:** Forget it, sorry. Let&#39;s just go in and I&#39;ll ask you some questions. 
&gt; 
&gt; **Alford:** Sounds good to me. ##064edd|**Not many answers down here, though!**##
&gt; 
&gt; //(Alford chuckles. Footage suddenly cuts. Rowan is sitting in a seat within the building while Alford is standing upon the table. Both appear to be waiting.)//
&gt; 
&gt; **Rowan:** Do you know your name?
&gt; 
&gt; **Alford:** Of course. I&#39;m Alford. I&#39;m an Alford. You&#39;re filming this right?
&gt; 
&gt; **Rowan:** Oh, yes. Is that alright? 
&gt; 
&gt; //(Alford waves at the camera.)//
&gt; 
&gt; **Alford:** Hi mom! 
&gt; 
&gt; ##064edd|//**(Rowan audibly stifles a laugh.)**//##
&gt; 
&gt; **Rowan:** Excuse me. Thank you for being cooperative. Now, another question. How are you feeling right now? 
&gt; 
&gt; **Alford:** I feel like Alford right now, man! 
&gt; 
&gt; **Rowan:** I specifically mean emotionally. And uh, texturally as well if that makes sense. 
&gt; 
&gt; **Alford:** Huh? I just feel like myself. That&#39;s how everyone should feel. How do //you// think I feel?
&gt; 
&gt; **Rowan:** Happy? You sound happy. Calm, content. 
&gt; 
&gt; **Alford:** Oh yeah. ##064edd|**I&#39;ve tried those before! They&#39;re great!**## Ask more, this is fun!
&gt; 
&gt; //(Alford hops up and down excitedly.)//
&gt; 
&gt; **Rowan:** I will, I will! Settle down. 
&gt; 
&gt; **Alford:** Settled it is! 
&gt; 
&gt; //(Alford flattens itself, resembling a pancake with eyes.)// 
&gt; 
&gt; **Rowan:** Probably shouldn&#39;t be doing that at a bakery. 
&gt; 
&gt; **Alford:** I&#39;ll be fine. 
&gt; 
&gt; //(Rowan clears his throat and coughs.)//
&gt; 
&gt; **Rowan:** ##064edd|**(to self)**## The air here is so... nothing. Focus Rowan.
&gt; 
&gt; **Rowan:** Next question. Have you ever met anyone like me before? 
&gt; 
&gt; **Alford:** Well, what are you?
&gt; 
&gt; **Rowan:** A human.
&gt; 
&gt; **Alford:** Okay, I think I get that. But what //are// you? I&#39;m an Alford.
&gt; 
&gt; **Rowan:** I got that. I&#39;m not sure I should be giving my name out to people. 
&gt; 
&gt; **Alford:** What about your character?
&gt; 
&gt; **Rowan:** My character? 
&gt; 
&gt; **Alford:** Yeah. All that stuff you&#39;re strung up with. Do you know it? 
&gt; 
&gt; **Rowan:** I... this is getting off topic. I&#39;ll ask another question. Are you familiar wi-
&gt; 
&gt; //(An Alucinari-class entity resembling a dolphin with a ##064edd|**funny**## thin mustache and wearing a tuxedo, surrounded by a thick blue outline, walks towards the table using its tail flippers. It places two plates with loaves of bread on the table.)//
&gt; 
&gt; **Dolphin Entity:** Here&#39;s your bread, sir. 
&gt; 
&gt; **Rowan:** Oh, hey. You don&#39;t really look like Olivia. Can I have your name?
&gt; 
&gt; **Dolphin Entity:** No, sir. I rather like it. 
&gt; 
&gt; //(The dolphin leaves. Alford gives Rowan an inquisitive look, crossing its arms.)//
&gt; 
&gt; **Alford:** You don&#39;t want to tell your name and yet you&#39;re asking for everyone else&#39;s? I see how it is.
&gt; 
&gt; **Rowan:** W-what? Hey, no. It&#39;s not like that, I jus-
&gt; 
&gt; //(Alford laughs in a piercing high-pitched tone. Rowan can be heard clasping his ears and exhaling sharply through clenched teeth.)//
&gt; 
&gt; **Alford:** I was just playing with you, man! You don&#39;t look so good.
&gt; 
&gt; **Rowan:** Just not used to all this. I&#39;ve dealt with stuff like this before, but not on this scale. Heh. I really shouldn&#39;t be telling you this, should I? 
&gt; 
&gt; **Alford:** ##064edd|**It&#39;d do you some good, talking to us.**## It helps to talk. 
&gt; 
&gt; **Rowan:** It does.
&gt; 
&gt; //(Silence for 10 seconds. Alford climbs on top of the loaf of bread and lays down on it.)//
&gt; 
&gt; **Rowan:** As I was saying... are you familiar with Societown?
&gt; 
&gt; **Alford:** Socie-what? 
&gt; 
&gt; **Rowan:** It&#39;s where we are, right now. Are you familiar with it? 
&gt; 
&gt; **Alford:** You know where we are? I just fell from space.
&gt; 
&gt; **Rowan:** From space?
&gt; 
&gt; **Alford:** Haha, yeah! It was great. I sorta deserved it, I was being a bit naughty.
&gt; 
&gt; **Rowan:** Okay, lots of questions on that front, but I have to be blunt. Are you aware that Societown is a show? 
&gt; 
&gt; **Alford:** Buddy, does this look like a show?
&gt; 
&gt; //(Rowan looks around the bakery.)//
&gt; 
&gt; **Rowan:** I mean, yeah? //Wait//. Speaking of shows, I have another question.
&gt; 
&gt; **Alford:** Haha, lay it on me! 
&gt; 
&gt; **Rowan:** Your name is Alford right? And you&#39;re an alien. And you have a snout right there.
&gt; 
&gt; **Alford:** So //that&#39;s// what it&#39;s called.
&gt; 
&gt; **Rowan:** Are you at all related to ALF? Y&#39;know, the sitcom with that puppet? 
&gt; 
&gt; **Alford:** You&#39;re already slipping a bit.
&gt; 
&gt; **Rowan:** Excuse me? 
&gt; 
&gt; **Alford:** I said you&#39;re already slipping. What kind of a question is that? You sound so silly. You should really eat something. 
&gt; 
&gt; **Rowan:** Uh. I brought my own food... and I&#39;m not really hungry.
&gt; 
&gt; **Alford:** Why&#39;d you come here? 
&gt; 
&gt; **Rowan:** I thought you&#39;d like it! 
&gt; 
&gt; **Alford:** It //is// cozy, but I don&#39;t eat. Mom doesn&#39;t like it when I eat. Says it&#39;s a waste of food. 
&gt; 
&gt; **Rowan:** Jesus, what? 
&gt; 
&gt; **Alford:** Just kidding! I just don&#39;t have a mouth, I don&#39;t need to eat at all!
&gt; 
&gt; **Rowan:** Oh, good. Don&#39;t joke about things like that, man. 
&gt; 
&gt; **Alford:** She //did// kick me out of my planet though. 
&gt; 
&gt; **Rowan:** Christ. 
&gt; 
&gt; //(The Dolphin Entity suddenly runs towards Rowan and slams both of its fins on the table. It appears aggressive and possibly unstable: its teeth are bared and one of its pupils has transformed into a spiraling shape. The tone and volume of its voice remains the same as before.)// 
&gt; 
&gt; **Dolphin Entity:** Excuse me sir. It seems as though, sir, you haven&#39;t been appreciating your experience here, sir? Didn&#39;t you want the bread, sir? 
&gt; 
&gt; **Rowan:** Are you going to hurt me?
&gt; 
&gt; **Alford:** I like the way he says sir! I want him to say it until it&#39;s the only word I can remember! 
&gt; 
&gt;  **Dolphin Entity:** Eat the bread, sir.
&gt; 
&gt; //(Rowan struggles to steady his breathing.)//
&gt; 
&gt; **Rowan:** Okay. 
&gt; 
&gt; //(Rowan picks up the loaf of bread. The bread slightly sinks into his hands, as it is Alucinari-produced. Rowan//
&gt; 
&gt; //takes//
&gt; 
&gt; //a//
&gt; 
&gt; ##064edd|//**bite.)**//##
&gt; 
&gt; ##064edd|**The scene flickers before cutting to the outside of the bakery. The pitter-patter of rain can be heard, washing down on Rowan&#39;s real fleshbody. Rowan is coughing up something. Something must not be agreeing with him. But can food agree?**##
&gt; 
&gt; **Rowan:** ##064edd|**Fuck, fuck. I can breathe more. Why is it easier to breathe in here? Shouldn&#39;t have done tha-**##
&gt; 
&gt; ##064edd|**The scene flickers again, cutting. The camera is viewing a cloudy sky. It is now daytime. Rowan picks up the camera and pans it to his face.**##
&gt; 
&gt; **Rowan:** ##064edd|**Rise and shine, huh?**##
&gt; 
&gt; **[END LOG]**
&gt;

&gt; **Entry #3**
&gt; ------
&gt; **[BEGIN EXPLORATION LOG]**
&gt; 
&gt; //(Rowan is in a large indoor space, resembling a theatre. Onstage, there is a set composed of cut wooden boards painted to resemble ocean waves, a beach and a palm tree. Rowan speaks loudly.)//
&gt; 
&gt; **Rowan:** Hello? Is anyone here? Does anyone feel like talking?
&gt; 
&gt; //(After several seconds without a response, Rowan speaks to the camera and begins to walk toward the stage.)//
&gt; 
&gt; **Rowan:** I was hoping if I found somewhere from the show, maybe I could find one of the Societs. Everyone else has been nice, or at least harmless, but I really have to find someone who knows. I recognize this place from the first segment of Season 5 Episode 11, &#34;Stage Fright&#34;. It&#39;s called the Sammy Prattle Playhouse.
&gt; 
&gt; //(Rowan places the camera down while climbing onto the stage. Some movement is visible in the rafters before Rowan lifts it again and points it toward the seats.)//
&gt; 
&gt; **Rowan:** ##064edd|**Actually, it was the second segment. The first segment was &#34;The Post Office&#34;.**## This place doesn&#39;t really look that much like the show. It&#39;s much bigger. I don&#39;t even know how long it took me to get this far in. It&#39;s darker, too, but what do I know. It&#39;s not like I&#39;ve ever seen it empty.
&gt; 
&gt; //(The palm tree setpiece tips over as Rowan turns around, making no sound. Rowan does not seem to react, and continues to the edge of the stage behind the curtains. He stops in front of a folding director&#39;s chair with the word &#34;OSGOOD&#34; printed on it.)//
&gt; 
&gt; **Rowan:** Uh, who is Osgood? Is that someone&#39;s first name or-
&gt; 
&gt; //(The chair abruptly folds on its own with a loud clicking noise, lifts off the ground, and begins slowly moving into the backstage area as if it was being carried. Rowan follows behind.)//
&gt; 
&gt; **Rowan:** Oh! Osgood? Is that you? Can you show yourself? I just want to talk for a few minutes if you have the time.
&gt; 
&gt; //(The lights of the theatre (or whatever the source of visibility is in this space was) suddenly go out, leaving Rowan completely in the dark. A crash is heard, seemingly from Rowan dropping the camera, and Rowan says something unintelligible.)//
&gt; 
&gt; **Rowan:** This is //not// right. ##064edd|**There is no such thing as darkness here.**## Why is it making this so difficult? I thought it was trying to help me find this place and now- Wait.
&gt; 
&gt; //(Rowan flips on a light switch, illuminating the area, which now appears to be a wardrobe room, and retrieves the camera. Many of the racks of clothing include large fur coats of various colors. A child-sized, furry ##064edd|**creature**## is also present in the room, but Rowan does not appear to notice it.)//
&gt; 
&gt; **Rowan:** Never seen this before. It wasn&#39;t in the episode.

&gt; **[BEGIN JOURNAL LOG]**

&gt; I might be hitting rock bottom. On my way here, I looked inside a grocery store window, and there were two little rabbit men yelling at each other, trying to put up a poster. They were speaking, I think, Portuguese, but there was still some good slapstick. I was actually enjoying myself, until I laughed, and they both turned around and stood there watching me. I thought they would do something, but they just kept staring for minutes, like //I// was //their// cartoon. Eventually I just walked away, and as soon as I was out of sight I heard them bickering again. Just another disappointment. Maybe I let them down too.
&gt; 
&gt; Saying that I&#39;m lost is an understatement. I&#39;ve asked for directions from the //Mayor//, and I&#39;m still &#34;lost&#34;. I don&#39;t think I&#39;ve ever had less of an idea where to go, or where I //can// go. I keep seeing the same landmarks, and I don&#39;t mean like similar looking buildings, I mean like a monkey the size of a skyscraper. I can tell it&#39;s the same one because every time I pass it, the pile of gigantic banana peels on the ground next to it gets bigger. At least back where I ##064edd|**used to come**## from, you at least knew you were on a sphere. If you walk long enough, you wrap around to the other side. Here, I think ##064edd|**there&#39;s directions I haven&#39;t even thought of yet**##.
&gt; 
&gt; The way I prepared for this is just comical##064edd|**, except it isn&#39;t**##. I don&#39;t know how long I&#39;ve even been here, but the only time I even looked at the MREs, the first aid kit, the blanket and all that was when I dumped it on the ground and left. I thought this was a place where I could get malnourished? Where I could get an infected puncture wound? I&#39;m pretty sure I heard all that garbage crawling away and I didn&#39;t even bother to glance back.
&gt; 
&gt; The only way to find what I&#39;m looking for is going to have to be to think differently. I followed a chain of logic to get here, but I don&#39;t think logic is going to lead me any further. Not here. I&#39;m going to have to think dangerously. I&#39;m going to have to think ##064edd|**funny**##.

&gt; This probably all just sounds like a bunch of whining coming from someone who signed up for this, and maybe I really do just need something to lift my spirits. A positive attitude has got to help here. I won&#39;t lie, this would be the perfect time for a certain big green guy in a striped necktie to make an appearance, but I&#39;ll try to keep my expectations low.
&gt; 
&gt; ##064edd|**Who am I kidding.**##

&gt; || &#34;DOES ANYONE ELSE HERE LIKE STEELY DAN&#34; in bulbous, multicolored letters. || As soon as I saw it, I got &#34;Old Black Cow&#34; stuck in my head. I&#39;m 99% sure I have never heard of that song before in my life, but it is possible I just forgot, in which case this is non-anomalous. || Across the roof of a residential building, only visible from above. ||
&gt; || &#34;Vote Norton&#34; written in pen above an illustration of a bearded man&#39;s face. || When read, I could hear the words in a very tired, raspy male voice. Not literally, but inside my head. || On the inside of a bathroom stall I found at the bottom of what I think was a drained swimming pool. ||
&gt; || &#34;Bring Back The Old Children&#34; printed in neat, pale-grey rectangular letters. || When reading letters, became aware of the sound of heavy footprints and low laughter. Noises faded a few seconds after I moved away, reappeared after I looked back at the graffiti on a second pass. || Below the window of an empty storefront. When I first saw it, there was a porcupine-like SCP-8060-B eating one of those big rainbow lollipops nearby. ##064edd|**I&#39;m serious.**## I left because I thought the footprints were real, and it laughed at me when it saw my reaction. The entity was gone the second time I passed by. I probably wouldn&#39;t have noticed that this was an infohazard if I wasn&#39;t walking in circles. ||
&gt; || &#34;519%&#34; printed in red ink by what looked like it would have been a giant rubber stamp. || Gave the immediate impression that the structure it was printed on was a conventional office building, until I thought back on it a little while later. || Across the front wall and door of a building made entirely out of big pink pieces of raw meat, some with big white bones sticking out of them. ||
&gt; || An image of a face in fluorescent magenta paint. || When I first saw this, I was absolutely sure it was the face of [https://scp-wiki.wikidot.com/scp-6080 someone I worked with for a while]. I was standing there looking around me for I don&#39;t even know how long, expecting them to show up, before I looked at it again and realized it didn&#39;t look anything like them. I&#39;m pretty sure it was supposed to be Hamton Pig from Tiny Toons. ##064edd|**There is a real possibility this was just my own brain. I&#39;ve been thinking about them a lot lately, and honestly these surroundings haven&#39;t helped.**## || On the blackboard of a classroom in the same school where I found all those balloons. ||
&gt; || The word &#34;Stinky!&#34; spray-painted in the style of a graffiti tag, with brown letters and wavy white lines emanating above the word. || The word looked stinky. It didn&#39;t smell bad, it just looked like it smelled bad. I&#39;m not sure how else to explain it. || The inside of a closet door in a bedroom I accidentally entered. ||
&gt; || Very large sticker of a banana with the words &#34;funny bone&#34; (all lowercase) written on it in black letters. || As soon as I read it, I got pins and needles in my hands, forearms, feet and shins. The feeling persisted for some time afterward, making it difficult to walk. ##064edd|**Thanks a lot. Like things aren&#39;t hard enough already.**## || Stop sign ||
&gt; ------
&gt; ##064edd|**I love you guys.**## Please forgive me. This mission has been a total failure. 
&gt; 
&gt; **[END LOG]**

&gt; **Entry #11**
&gt; ------
&gt; **[BEGIN JOURNAL LOG]**
&gt; 
&gt; I ran into a group of SCP-8060-Bs in the woods a little while ago, and it was kind of a bittersweet experience. They looked different than most of the other ##064edd|**toons**## I&#39;ve seen, but I can&#39;t really draw any conclusions about the whole range of &#34;styles&#34;. I&#39;ve seen a lot of different-looking types of Alucinari-class entities, and I don&#39;t know if that //means// anything consistently. Something about these ones made me feel a little nostalgic, though, or maybe homesick.
&gt; 
&gt; It could be that they were just hanging out together, standing around and talking like friends. They weren&#39;t whacking each other on the heads with big hammers or anything, not that I have an issue with that. I guess it reminded me of people I used to know. They were nice, too, and they seemed friendly, but I just felt like I was intruding, any maybe they were just letting me stay there out of pity, so I made an excuse and left. Plus, my Spanish is really not good anymore.
&gt; 
&gt; I feel a bit out of place, here, and a bit lonely. It could be nice to run into someone from Sputnik again if I&#39;m being honest.
&gt; 
&gt; **[END LOG]**
&gt; ------

&gt; **Entry #12**
&gt; ------
&gt; **[BEGIN VOICE JOURNAL LOG]**
&gt; 
&gt; ##064edd|**It&#39;s getting harder and harder to tell what I&#39;m seeing and what I&#39;m remembering, and the order of it all doesn&#39;t matter any more. I&#39;m in my office at Sputnik, wiping drool off my face after another night passed out at my desk. I&#39;m in quarantine at Site-433 listening to Mildew&#39;s frantic questioning. I&#39;m standing waist deep in cake frosting while giant multicolored bees try to lick me clean. I&#39;m laying on the dirt  behind a shed staring up at the orange-painted roof. I&#39;m laying in my crib staring up at my father&#39;s enormous face. I&#39;m laying in a nursing home staring up at a worried group of nurses. Why do I feel like I&#39;ve been here before?**##
&gt; 
&gt; ##064edd|**Everything feels realer now. Realer than the Foundation. Realer than the back of my hand. Every color, every line isn&#39;t just there, but there on purpose, and because that purpose is set in time, these forms can never really disappear. Not like we can. I can see fingerprints on everything, and next to them I just feel like a lump of rotting sea foam taking on one shape after another through mindless random chance. I want to be created too, even if it means I have to create myself.**##
&gt; 
&gt; ##064edd|**I did want this. I didn&#39;t know what it meant, but I did want it. Forget everything I said about duty. Ignore everything I&#39;m going to say about responsibility. I wanted this. I still want it, and I want more. My eyes are bigger than my mouth.**##
&gt; 
&gt; ##064edd|**When I said this place didn&#39;t have a smell, I was wrong. It&#39;s just, you can never smell your own house. Not until you spend some time away from home, and I don&#39;t think I&#39;ve been away from here before.**##
&gt; 
&gt; I think that&#39;s all.
&gt; 
&gt; **[END LOG]**

&gt; **Entry #13**
&gt; ------
&gt; **[BEGIN ENCOUNTER LOG]**
&gt; 
&gt; //(Rowan is walking through what seems to be a dark tunnel. There is a pale green light at the end of the tunnel, an indeterminate distance in front of him. The camera is following Rowan from behind. Rowan is singing.)//
&gt; 
&gt; **Rowan:** When you&#39;ve got some trouble with something odd, something new growing on your bod, don&#39;t you panic, just grab the phone. Time to call the special squad!
&gt; 
&gt; //(Rowan stops singing, and clears his throat. The quality of his singing increases afterward.)//
&gt; 
&gt; **Rowan:** A wooden world, a concrete man, a pile of magic gel-a-tan, an invisible chef, some giant frogs...
&gt; 
&gt; //(Rowan sneezes loudly, the noise reverberating through the space.)//
&gt; 
&gt; **Rowan:** Some giant frogs, and the claws of Dr. Promethean!
&gt; 
&gt; //(For the final verse, another voice faintly sings along with Rowan.)//
&gt; 
&gt; **Rowan and Voice:** All these things and even more. Abnormalities galore.
&gt; 
&gt; //(Rowan appears to notice the voice, and stops singing. The voice continues.)//
&gt; 
&gt; **Voice:** Razz and Welly take the lead, the Hunters are gonna settle the score.
&gt; 
&gt; **Rowan:** Hello?
&gt; 
&gt; //(Rowan turns, looking around himself.)//
&gt; 
&gt; **Rowan:** Hello? Hello?
&gt; 
&gt; **[END LOG]**

&gt; **Entry #14**
&gt; ------
&gt; **[BEGIN ENCOUNTER LOG]**
&gt; 
&gt; //(The camera is initially focused on a stationary painted landscape, depicting green hills below a blue sky with several clouds. A city skyline is visible above some of the hills. Rowan is not visible, but his voice, slightly muffled, is audible.)//
&gt; 
&gt; **Rowan:** I&#39;m almost there. ##064edd|**I&#39;m almost there. I&#39;m almost there.**##
&gt; 
&gt; //(Rowan appears to tear through the surface of the hills as if it was an elastic membrane. The scale and perspective of his surroundings are unclear. Rowan is covered in smears of a viscous dark blue fluid, and more of the fluid is appearing out of the hole he entered through. He appears out of breath while speaking.)//
&gt; 
&gt; **Rowan:** I&#39;m here.
&gt; 
&gt; //(The perspective changes to a closer angle on Rowan. He still appears to be catching his breath, but the blue fluid and the hole are no longer present.)//
&gt; 
&gt; **Rowan:** Hello? Horris? Della? Grundon? Anyone? I dug as deep as I could. You&#39;re supposed to tell me what I want to know. //Someone// is supposed to tell me //something//.
&gt; 
&gt; //(Rowan pounds a fist against the surface of the wall, or possibly hill, producing a drumlike sound. A child&#39;s voice speaks.)//
&gt; 
&gt; **Voice:** You&#39;re supposed to knock //before// you enter, you know. 
&gt; 
&gt; //(The perspective shifts to a close-up of one of the painted clouds, which fades, revealing an SCP-8060-B instance in the form of a yellow sun with a human face.)//
&gt; 
&gt; **Sun:** It&#39;s hard to believe you don&#39;t know your manners by now.
&gt; 
&gt; //(The perspective changes to frame both Rowan and the sun. Rowan is looking upward toward it.)//
&gt; 
&gt; **Rowan:** I&#39;m sorry, I&#39;m just frustrated. I&#39;ve been through a lot, you know.
&gt; 
&gt; **Sun:** I&#39;ll say you have. You&#39;ve gone through almost everything.
&gt; 
&gt; **Rowan:** Why is it so empty, then? Where is everyone?
&gt; 
&gt; **Sun:** Most people who get this far don&#39;t stay. Most go out. Is that what you want to do?
&gt; 
&gt; **Rowan:** Out? Like home?
&gt; 
&gt; **Sun:** Maybe it&#39;s home. Do you want to see?
&gt; 
&gt; **Rowan:** ##064edd|**It couldn&#39;t hurt just to look.**##
&gt; 
&gt; //(The perspective returns to the close view of the sun. The entity&#39;s face swings away from the sky, similar to a porthole window, exposing a circular aperture. Through that opening, ##064edd|**the ocean**## is visible. Inside are a number of rapidly changing images, most of which are unidentifiable. Images of a rotting pumpkin, a flock of geese, Rowan&#39;s face, an erupting volcano and a crying clown can briefly be distinguished.)//
&gt; 
&gt; **Sun:** ##064edd|**Is this what you wanted? Is this helpful?**##
&gt; 
&gt; //(The camera&#39;s perspective changes back to Rowan. Tears are on his face, which appear to be either tinted blue or reflecting the imagery above him. The sun is audible, but not visible onscreen.)//
&gt; 
&gt; **Rowan:** The Mnemosyne Expanse.
&gt; 
&gt; **Sun:** ##064edd|**That&#39;s one name for it.**##
&gt; 
&gt; **Rowan:** I thought I was already there.
&gt; 
&gt; **Sun:** ##064edd|**You were, just like you always were. You were in one pretty little abandoned seashell, and now you can go out into open ocean.**##
&gt; 
&gt; **Rowan:** It&#39;s too much.
&gt; 
&gt; **Sun:** ##064edd|**It&#39;s not too much. It&#39;s everything.**##
&gt; 
&gt; //(The sound of ##064edd|**ocean currents**## gradually becomes louder, and Rowan&#39;s hair begins to stand on end as if electrically charged.)//
&gt; 
&gt; **Rowan:** I&#39;m not here for that. ##064edd|**You know I&#39;m not here for that.**## I want to learn about the episode and I want to find people who are lost. That&#39;s all.
&gt; 
&gt; //(Images of Della Mornt and Horris Curmen appear in the ##064edd|**ocean**## for a moment before distorting, combining and disintegrating, being replaced by an image of Rowan&#39;s face. Rowan&#39;s face warps and divides into three shapes, which develop into Grady, Susie and Richelle, and then ##064edd|**sink into the water**##.)//
&gt; 
&gt; **Sun:** ##064edd|**You can find what you&#39;re looking for, and everything else. You won&#39;t have to choose.**##
&gt; 
&gt; **Rowan:** But I can&#39;t ##064edd|**swim**##.
&gt; 
&gt; **Sun:** ##064edd|**Maybe you can. You won&#39;t know until you jump in, Rowan. You won&#39;t die. That&#39;s one thing I can promise.**##
&gt; 
&gt; //(Rowan does not respond for some time, and appears to be speaking to himself, but the words are unintelligible over the sound of ##064edd|**crashing waves**##.)//
&gt; 
&gt; **Rowan:** I&#39;m sorry. ##064edd|**I want to, but**## I need to complete my mission, and then go back.
&gt; 
&gt; //(The face of the sun swings shut, covering the view of the ##064edd|**ocean**##.)//
&gt; 
&gt; **Sun:** Then I think you&#39;re going in the wrong direction.
&gt; 
&gt; //(The camera perspective cuts to Rowan, displaying a closeup shot of his face. It is completely expressionless. The little amount of sound that can be heard cuts out. Rowan speaks.)// 
&gt; 
&gt; **Rowan:** The wrong direction. 
&gt; 
&gt; //(Rowan grits his teeth. His eyes widen. He chuckles, looking around.)//
&gt; 
&gt; **Rowan:** What other directions do I //have?//
&gt; 
&gt; //(Rowan begins pulling his fingers across his face, lightly scratching it. Based on Rowan&#39;s psychological monitoring records, this is believed to be an attempt at self-harm.)// 
&gt; 
&gt; **Rowan:** What else? //What else?// 
&gt; 
&gt; //(Rowan clutches his head, his forehead seeming to pulsate. Suddenly, a lightbulb manifests above his head. It lights up. ##064edd|**Ding!**##)//
&gt; 
&gt; **Rowan:**  ##064edd|**I know!**##
&gt; 
&gt; //(Rowan grins. He puts his right hand into a fist and knocks on his chest. A hollow banging can be heard within, like metal.)//
&gt; 
&gt; **Rowan:** ##064edd|**Just had to remember what I was taught.**##
&gt; 
&gt; ##064edd|**//(Look inside yourself and see.)//**##
&gt; 
&gt; **Rowan:** ##064edd|**Look inside yourself and see.**##
&gt; 
&gt; //(Rowan is trembling. Tears are streaming down his face ##064edd|**yet again.**##)//
&gt; 
&gt; **Rowan:** But won&#39;t it hurt? I&#39;m scared. 
&gt; 
&gt; **Sun:** Let go. ##064edd|**If it hurts, you wanted it to.**##
&gt; 
&gt; ##064edd|**//(Rowan stares at his right hand. Several sharp black nails extend through the fingertips, destroying them. Blue acrylic paint gushes from the openings. Rowan trembles.)//**##
&gt; 
&gt; **Sun:** What do you consider this to be? 
&gt; 
&gt; **Rowan:** It&#39;s— it&#39;s—  it&#39;s—  I—
&gt; 
&gt; //(Rowan closes his eyes, taking a deep breath. ##064edd|**Suddenly, he turns his head upwards to the sky and opens his eyes.**##)//
&gt; 
&gt; **Rowan:** ##064edd|**//BOORRRINGGGGGGGG!//**## ##064edd|**Claws don&#39;t cut it for me! I need something //really// special.**##
&gt; 
&gt; **Sun:** You&#39;re learning. 
&gt; 
&gt;  ##064edd|**//(Rowan raises his left arm upwards before slamming it down onto the ground with an unnatural amount of force. The force of the impact causes the arm to snap off, leaving a ragged edge of flesh and bone. The detached arm rolls on the floor, yelling. Sounds of audience laughter, screaming, crying, and stomping feet begin to sound from the distance.)//**##
&gt; 
&gt; **Rowan:** ##064edd|**This isn&#39;t so bad.**##
&gt; 
&gt; ##064edd|**//(With his clawed right arm, Rowan quickly sharpens the bone on his left, so rapidly that the bone appears to be surrounded by a tornado for about 3 seconds. The bone is now trimmed to a spear-like shape.)//**##
&gt; 
&gt; **Rowan:** ##064edd|**Blast off!**##
&gt; 
&gt; ##064edd|**//(Rowan attempts to puncture his stomach several times with the shard of bone. Each jabbing attempt makes his torso move unsynchronized from his own body, as if it were avoiding the bone spear.)//**##
&gt; 
&gt; **Rowan:** ##064edd|**Come on now. Don&#39;t be fussy.**##
&gt; 
&gt; ##064edd|**//(Rowan slowly aims the shard point blank at his stomach. He coos.)//**##
&gt; 
&gt; **Rowan:** ##064edd|**Here comes the choo-choo train!**##
&gt; 
&gt; ##064edd|**//(The bone shard jams deep into Rowan&#39;s stomach. Blue acrylic paint sprays from the open wound. Rowan begins to saw at himself from the inside, gurgling. Biological constructs not resembling conventional human anatomy begin to spill from Rowan&#39;s stomach. The stomach wound fully opens up, allowing several more organs to spill outward.)//**##
&gt; 
&gt; ##064edd|**//(Rowan speaks. It is unintelligible. I don&#39;t want to know.)//**##
&gt; 
&gt; ##064edd|**//(Rowan bends his upper body and cranes his neck at a severe angle, pressing his face into his stomach wound. Using the remains of his arms in a climbing-like motion, he pulls himself inside himself, twisting his body in the process. Rowan then lifts both of his feet, tucking them into the wound, and manages to completely enter his own body, everting, shrinking and vanishing from view.)//**##
&gt; 
&gt; **Sun:** ##064edd|**Stay tuned.**##
&gt; 
&gt; //(The Sun giggles.)//
&gt; 
&gt; **[END LOG]**
