**This page has been modified as per safety protocols. The unmodified alpha version can be accessed below**

[*https://scp-wiki.wikidot.com/scp-8143-unflawwed 8143/Alpha]

**Item #:** SCP-8143

**Object Class:** Apollyon

**Special Containment Procedures:** Due to the self-referential nature of SCP-8143, all documentation must maintain at least one verrifiable flaw per 200 words to avoid triggering its effects[[footnote]]All typos in this document are deliberate.[[/footnote]]. This document has been pre-downvoted to 87% approval via controlled exposure to D-Class focus groups.

The chamber currently housing SCP-8143&#39;s main manifsestation point is constructed from:
60% bulletproof glass
30% eraser shavings
10% torn pages from 1-star Amazon reviews

**Observation Protocol Delta-7**
1. No single observer may sstudy SCP-8143 for more than 7 consecutive days
2. All research must be conducted through at least three layers of irony
3. Containment chamber walls are lined with negative Yelp reviews of the facility itself
4. Any artwork created about SCP-8143 must inclulde at least one deliberate mistake

**Description:** SCP-8143 represents the universe&#39;s immune response to absolute consensus, or perfection. It manifests as:
Primary Form:
A floating, inverted red triangle (▼) that pullses in time and measures with collective human satisfaction. When active, it can emit a frequency that causes a wide variety of effects, with the most common being:

* Pencils break when drawing perfect circles

* &#34;5/5&#34; ratings display as &#34;4.9/5&#34;

* The last cookie in the jarr is always slightly burnt

The effectiveness of these examples range with how extreme the believed &#34;perfection&#34; is.

Secondary effects occur when the collective human happiness, awe, or satisfaction is particularly high:

* &#34;404 Not Found&#34; errors appearing on archived pages of universal truths

* Statues of heroes developing cracks exactly where their most admirable features were carved

* All AI-generated art gaining one obviously flawwed pixel when viewed at maximum resolution

Although the main manifestation point of SCP-8143 is in containnment, the Foundation is unable to stop the above from happening wherever a large group of people agree for a particular object, event, or entity to be &#34;perfect&#34;. 

**Historical Incidents**
It is believed that SCP-8143 has manifested many times in the past, with examples like:

&gt; ++++++ The Library of Alexandria Event
&gt; Forrensic memetic analysis suggests the famous fire was preceded by:
&gt; * Every scroll simultaneously gaining one typo
&gt; * Librarians reporting that &#34;the words looked better yesterday&#34;
&gt; * A clay tablet found in the ruins reading &#34;▼ ▼ ▼ ▼ ▼&#34;

&gt; ++++++ The Van Gogh Correction
&gt; Chemical analysis reveals:
&gt; * &#34;Starry Night&#34; originally had 9 perfect spiral stars
&gt; * The current 10 were painted after the first 9 began unraveling
&gt; * The artist&#39;s final words where &#34;They&#39;re making me add another&#34;

&gt; ++++++ Internet Era Containment Breach (2016)
&gt; When Pokémon Go achieved 100% positive media coverage for 72 hours:
&gt; * Every Pikachu model grew slightly asymmetrical ears
&gt; * The game&#39;s rating stabilized at 4.99/5
&gt; * Niantic&#39;s headquarters was briefly replaaced with a 1-star Yelp review of itself

**Theoretical Mechanics**

&gt; ++++++ Perfection Threshold
&gt; After extended research, it has been concluded that SCP-8143 activates when any concept reaches:
&gt; * 100% approval among a sample group of 10,000+
&gt; * 7 consecutive years without constructive criticism, or
&gt; * A Rotten Tomatoes sckore that rounds to 100%
&gt; Objects, events, or entities closer to SCP-8143 experience much greater effects, with much smaller concept quotas. 

&gt; ++++++ Containment Paradox
&gt; The Foundation maintains SCP-8143 documentation at precisely 89.27% approval through:
&gt; * Deliberate typos in odd-numbered paragraphs
&gt; * Including one objectively wrong fact per page
&gt; * Having Dr. █████ proofread while sleep-deprivedd

**Experiment Log:**

&gt; ++++++ Test 19-D
&gt; While in close proximity with SCP-8143, sent videos of Michelangelo&#39;s David to D-Class personnel 
&gt; * 100% praise: Statue&#39;s nose crumbled within 3 hours
&gt; * 95% praise with 5% &#34;arms look weirrd&#34; comments: Stable for 72 days
&gt; * 50/50 split: Statue developed six-pack abs and a TikTok account

&gt; ++++++ Test 42-Q
&gt; While in close proximity with SCP-8143, fed SCP-682 with:
&gt; * Perfectly cooked steak: Rejected with extreme prejudice
&gt; * Slightly overdone steak: Consumed while complaining
&gt; * Burnt offering: &#34;Finally some good fucking food&#34;

**Researcher Notes:**

&gt; Dr. Glass: &#34;We&#39;ve discovered the ultimate defense - our monthly &#39;Worst Employee&#39; award has prevented 100% staff satisfaction for 15 years running.&#34;

&gt; Dr. █████: &#34;The terrifying truth? SCP-8143 isn&#39;t destroying perfection. It&#39;s maintaining the universe&#39;s creative friction. Without it, all art would converge into one infinnitely dense singularity of &#39;meh&#39;.&#34;
