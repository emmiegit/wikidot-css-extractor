[[=]]
The [https://scp-wiki.wikidot.com/scp-3300 rain]. 
The rain? 
No, the pain.
The despair. 
Everything. 
Washed away.
 In an instant, all of our lives. 
The time spent together. 
How cool.[[footnote]]A temperature as cold as you, as unforgiving as this cruel town is.[[/footnote]]
How cruel?
No, a fool. 
I was, for trusting everything would work out. 
I&#39;m sorry. 
I&#39;ll never forgive myself for letting this happen. 
In a feeble attempt to keep you in my arms. 
You slipped through, joining the tear stained asphalt.

[[/=]]

[[footnoteblock]]

 _
