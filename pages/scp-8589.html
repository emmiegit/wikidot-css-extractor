**Item #:** SCP-8589

**Object Class:** Keter

**Special Containment Procedures:** SCP-8589 is to be collected and stored in a windowless containment chamber at Site-19. 115.2m^^3^^ of SCP-8589 has been collected at time of writing. 

Whenever SCP-8589 is discovered to be in use at a Foundation or civilian facility, appropriate measures are to be taken to replace it, and the recovered material is to be forged into bars and transported to the aforementioned containment chamber. An altered version of this article has been written and is to be provided to civilian persons who question the necessity of its recovery. If SCP-8589 is not provided voluntarily at this point, MTF-Ptah is to be mobilized for its recovery. 

Investigation into civilian usage of SCP-8589 is to continue indefinitely.

**Description:**

SCP-8589 refers to approximately 1.5 tons of stainless steel, originally collected from a naturally occurring deposit in Dixie Valley, Nevada. The material is of considerably substandard quality, consisting primarily of tin (43.6%), aluminum (22.5%), and chromium (10.7%), with trace amounts of carbon, iron, gallium, hafnium, lead, platinum, iridium, silicon and titanium. SCP-8589 is considered stainless steel only by technicality as it lacks the material&#39;s usual durability due to its unrefined composition. 

SCP-8589 emits a Class-III memetic hazard which causes observers to believe that it is the ideal material to use in any scenario that would require a metallic substance. Affected individuals will believe that the material possesses qualities which it does not possess, such as advanced durability, Hume reduction, reality-anchoring properties, etc. Further memetic properties have arisen but are inconsistent, such as causing persons to incorrectly determine its composition, incorrectly recount its origin or how they came into possession of the substance, or incorrectly identify the mass, volume, density, melting and/or boiling transition point, hardness, etc. These occur despite measurement instruments returning correct readings. See research documents for a complete list of false properties.

SCP-8589 was initially discovered on July 25th, 2008. After initial testing was completed, researchers concluded (at the time) that SCP-8589 was a more potent variant of [*https://scp-wiki.wikidot.com/scp-148 SCP-148], having the capability to suppress or block any extrasensory or mind-altering anomalous effect, or, in some research, suppress //any// anomalous effect.[[footnote]]The amount of material required and its effective range is inconsistent in research. This inconsistency was generally disregarded by researchers.[[/footnote]] In response to an email regarding how best to proceed in light of this false discovery, O5-5 sent the following to research lead Dr. Harrah:

&gt; **Subject:** RE:RE:RE:SCP-8589 Research Results
&gt; **To:** jharrah01@scipnet.org
&gt; **From:** O5command5@scipnet.org
&gt; **CC:** //none.//
&gt; 
&gt;  **Put SCP-8589 in everything.**

See the following chart for a list of known use cases.

||~ Date ||~ Use Case ||~ Relevant Anomalies ||~ Notes ||
|| 07/25/2008 || Material Forming [*https://scp-wiki.wikidot.com/scp-572 SCP-572] || SCP-572: A blade which convinces its wielder that it is of higher quality than it actually is. || SCP-8589 was first discovered in determining the composition of SCP-572, which was found to have been initially sold in a weapons store in Lovelock, Nevada. Origin of SCP-8589 deposit was traced from manufacturing reports. As of 02/02/2014, 5 other blades containing SCP-8589 have been found in civilian possession in the area. [*https://scp-wiki.wikidot.com/incident-239-b-clef-kondraki A dagger constructed of SCP-8589 was eventually found in the possession of Dr. Clef.] ||
|| 08/14/2008 || First documented use is in containment of SCP-132 || N/A. See Notes. || No material found in use. Nature of SCP-132 is incorrectly described in documentation. ||
|| 08/17/2008 || Coating inner and outer walls of [*https://scp-wiki.wikidot.com/scp-035 SCP-035]&#39;s containment chamber following an incident. || SCP-035: A mask which compels nearby persons to wear it. || SCP-132 &#34;implementation&#34; used as proof of concept. ||
|| 10/09/2008 || Coating several safe room walls at Site-19. || N/A || Safe rooms were already constructed out of reach of or otherwise safeguarded against anomalous influences. ||
|| - - -  || - - - || - - - || //Multiple entries redacted for brevity. See on-site documentation or contact your site&#39;s Documentation Department for a complete list.// ||
|| 10/08/2013 || Several containment measures within Site-17 are replaced by the application of SCP-8589 in relevant walls and doors. || SCP-079: A self-aware artificial intelligence. || An experimental remote-controlled telepath robot is utilized to test the veracity of SCP-8589. The hypothesis is that SCP-8589 will block telepathic messages sent to on-site Class D personnel. As the signal-blocking insulation in [*https://scp-wiki.wikidot.com/scp-079 SCP-079’s] containment unit has been replaced with SCP-8589, SCP-079 covertly hijacks inbound transmissions to the telepath and issues commands to telepathically convince Dr. Maynard and Security Agent Skinner that they are Chaos Insurgency agents operating with the intent to grant SCP-079 access to facility operations. This results in the most severe containment breach currently on record. 225 personnel are killed.||

Following the catastrophic containment breach on August 10th, 2013, a Foundation-wide halt on containment studies was implemented pending an investigation into the cause of the breach. Advancements in memetic inoculation practices and technology developed for this investigation allowed for the discovery of the actual anomalous nature of SCP-8589 on December 13th, 2013. The following order was received by primary Foundation containment specialists on December 15th, 2013, following further research and O5 deliberation:

&gt; = **O5 Council Direct Communication**
&gt; = December 15th, 2013
&gt; 
&gt; Recent developments with regards to SCP-8589 have startled us greatly, as we imagine it must have many of you. However, there is relief in knowing that we have identified the cause to our problems.
&gt; 
&gt; The unfortunate nature of humans is that humans are fallible. The unfortunate nature of the Foundation is that we are staffed by fallible humans. We are all victims to the fatal flaw of //being flawed.//
&gt; 
&gt; The good news is that once you have identified the source of a problem, you can finally begin to fix it. All facilities are to be searched for the usage of SCP-8589 in their construction and are to be appropriately modified for its removal, followed by an update to any relevant anomaly&#39;s special containment procedures to reflect this alteration, where necessary.
&gt; 
&gt; Check containment procedure update logs for a list of affected containment units. Note that this list is likely very incomplete.
&gt; 
&gt; This is the end of an era.
&gt; 
&gt; = -The O5 Council.

To date, misunderstandings regarding the nature of SCP-8589 are thought to have resulted in 58 containment breaches and 346 casualties.
