    <pre><textarea class="page-source" readonly>She peered past the layer of tears in her eyes to notice she was somewhere new. It was more spacious than the van, and moving. Adams sat across from her with an exasperated sigh.

&#34;…What?&#34; Zena began wiping her face. Adams stared with a stern expression, face quivering.

“I didn’t ask for your life story.” Her laughter breached containment. “Holy shit! Gya-hahaha!”

Zena looked around. There was no Wensley, no Lyla or even Mort. 

“Well thanks for the greenlight to use lethal force. Five stars, standing ovation darling.” She clapped.

“So…am I accepted?”

“Accepted she says. This ain’t University, Cho.&#34; She chuckled. &#34;But sure. You’re also not going to die, but you clearly have more important things on your mind.”

“I…Yes! YES!” She hopped out of her seat and continued bouncing excitedly, cheering the affirmation between squees.

&#34;Enough!”

She froze and catapulted back to her seat.

“Do you remember what I said in there? I think you’ve embarrassed yourself enough don’t you think?”

“Right, I know.” Her eyes darted away from Adams. “I’m just a subject here.”

“That’s what I’m talking about!” Adams groaned. “Researching your anomaly is why you’re here but you’re not a dog for god sake. I was worried you were gonna be a conscript but you’re really more of a fanatic.”

“What does that mean?”

“Just because you’re a thing here doesn’t mean you’re a thing.”

“Sure you should be telling her that?” The shaggy bearded man chimed in from behind the wheel. 

“It’s fine. If she dies or fucks up her health before they can even research her, it doesn’t really help us either. Besides she’d eventually figure out I’m more of a bodyguard anyway.”

She took out a pack of cigarettes and smiled.

“She’s not stupid.&#34;

 She began fiddling with one between her fingers like a coin. “Anyway you get what I’m telling you, right, Cho?”

Zena watched vacantly as Adams  struggled with finding the right words for the first time since she they had met. She also struggled to find her lighter.

A thought crossed her mind after looking out the window, now free of static, just an endless expanse of ocean, where she couldn&#39;t see far.

“…You may not be important, but that don’t mean you don’t matter.”

“Hey that works, not bad.” Adams laughed.

“My brother used to tell me that.”

“Sounds like yer bro&#39;s full o&#39; shit.”

“Yea, hehe. He is.”

“Come on Valdes? We were getting somewhere good.” Adams groaned.

Something occurred to Zena and she didn’t want it to be brushed off.

“So what was with that lake and the boat and stuff?”

“The Mnestic you were under operates differently for everyone. I needed a crazy memetic to go along with it too to keep your head straight. Good thing you’re easy to hypnotize.” She finally lit the cigarette.

“So, it wasn’t real after all?”

“Oh, it was real enough. We heard every word. I recorded it too, want to have a look at you bawling while you sleep?”

“NO!” Her face burned up.

“Ha! Anyway, whatever you saw in your head is between you and the voices. All I care about is which ones will play ball and which ones I have to shoot. Simple and clean.” She smiled as she exhaled.

Of course they would even have those kinds of drugs here. It really was just a joke to her. Asshole. Just the worst people here.

She sulked and turned her attention to the window. The reflection was clear and more importantly real. She looked like her father now…but she also looked like her mother. It’s not like either of them were ugly anyway. She didn&#39;t know when it happened but her skin wasn&#39;t so crusty and splotchy, a little dry now surely, but it still glowed a healthy almond. She did get a bit rounder though, but she was impressed by how much definition was still poking through her doughy arms.  Her head wasn’t as much a potato as it was a melon. Not much better but, for once, she felt her big nose kind of fixed the picture instead of destroying it. She knew she had better days, but she also had worse. It all looked right at least.

“Admiring the view? I got to say, you clean up nice Cho! Even if I did the heavy lifting.”

She faced the smoking agent, doing her best not to betray her annoyance.

“…No one told me about you.”

“Are you mad they didn’t?”

“Yes.”

“Pretty sure I know the answer, but I’m dying to hear why?”

She was the first person she could remember who didn’t lie to her. Definitely here at the foundation but probably not since her mother, could she remember that. Thinking about how things operated at 118, it would have been easier for her job not to bother with any of it.

…

“Because you’re crazy.”

Adams laughed, almost choking on the smoke sputtering out of her mouth. “Well I&#39;m in good company. Welcome home, Cho.”


Zena turned back to the window, looking to gaze past her reflection this time.
