[[include :scp-wiki:theme:basalt darkmode=a|hidetitle=a]]

Not to look,
Kept blinds closed;

Weeping, in bed,
&#34;I&#39;ll lose my sight&#34;--
Four-times,
If four-times eclipses seen;

Paints, canvases,
Myriad of sketches strewn--
Artist, cowered under bed covers
In fervid panic;

Heat swelled
In the rented room;
Westerly Sun burning,
Until an eclipse (partial)--

Shade, but no eye-wear,
&#34;I&#39;ll lose my sight&#34;--

Feeling, 
the heat wane;
Feeling, 
the heat die--

Darker
Darker, 
(darker),
Circadian rhythm changed;

Tempted
Tempted
(still),
Tried I--
To turn away;

Held phone
To the window--
Pictures, videos,
Documenting the change in beat;

Shadows; quake, shiver,
As eclipse (partial) approached--

And even so, &#34;satisfied&#34;, with documentation...
...a world holding its breath,

Tempted, I-- by the record,
&#34;I&#39;ll lose my sight&#34;...

Crying, 
Sobbing, 
(asking) for forgiveness,
I viewed the sky--

###0b0b0b|...it&#39;s dark; I&#39;ve gone blind;##
###0b0b0b|there&#39;s a permanent eclipse in my eye--##
