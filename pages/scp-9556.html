**Item #:** SCP-9556

**Object Class:** Safe

**Special Containment Procedures:** SCP-9556 is to be contained within a 4m x 4m x 3m Class V anechoic chamber at Site-██. The chamber must be locked at all times when not undergoing authorized testing.

No audio playback devices are permitted within a 10-meter radius of SCP-9556&#39;s anechoic chamber unless explicitly approved by two (2) Level 3 personnel.

All testing involving SCP-9556 must be conducted within SCP-9556&#39;s anechoic chamber utilizing the following tools:

* Remote-operated playback systems
* Full audio isolation (Class V)
* Real-time neurological monitoring equipment

Personnel exposed to SCP-9556&#39;s audio output must undergo mandatory psychological evaluation. Any individual displaying signs of severe anxiety, prophetic ideation, or apocalyptic fixation must undergo additional psychological evaluation, as well as quarantine procedures for further studies.

**Description:** SCP-9556 is a vinyl record identified as the 1972 album Foxtrot by the english band Genesis. SCP-9556 is indistinguishable from a standard commercial pressing, exhibiting only minor wear consistent with age. When SCP-9556 plays the last song on the record, &#34;Supper&#39;s Ready&#34;, those who are subjected to listening exhibit acute anxiety, prophetic hallucinations, and compulsive self-harm ideation.

Subjects report immersion in vivid, narrative-driven hallucinations, often describing seeing the end of the world in a biblical perspesctive. These hallucinations tend to increase as playback continues. 

Upon completion of the track, subjects enter a temporary acute catatonic state lasting between 3 to 17 minutes. Several subjects have provided consistent descriptions of identical events upon completion of the track, despite no prior contact.


**Addendum 9556.1:** Discovery

SCP-9556 was discovered during the investigation of a sudden self-harm act and hallucinations coming from an eighty-three-year-old caucasian man named ████ Gabriel, in New England. The man took part in a self-harm act, resulting on his death, right after listening to Side-B of Foxtrot, according to his twenty-year-old granddaughter, Casey Gabriel.

**Addendum 9556.2:** Interview with D-7147

The following interview was conducted in Site-██ by Dr. Leonard Hammond twenty-minutes after D-7147 got through listening to SCP-9556. D-7147 listened to the whole vinyl record before finally reaching &#34;Supper&#39;s Ready&#34;, starting to have visions at around 4 minutes into the song.
&gt; **Interviewer:** Dr. Leonard Hammond
&gt; **Interviewee:** D-7147
&gt;
&gt; **[BEGIN LOG]**
&gt; 
&gt; **Dr. Hammond:** D-7147, you just listened to a record called &#34;Foxtrot&#34;, by an english band called &#34;Genesis&#34;. Did you know that band before you listened to the whole record?
&gt; 
&gt; **D-7147:** No, I did not.
&gt; 
&gt; **Dr. Hammond:** You seemed to have listened to the A-Side in a relaxed way. Did you enjoy listening to the first-half?
&gt; 
&gt; **D-7147:** At first, I did. (Pauses) Only at first.
&gt;
&gt; **Dr. Hammond:** When I changed sides, did you notice any difference?
&gt;
&gt; **D-7147:** As soon as vocals came talking about turning some television off, I started to feel a headache. A real strong one.
&gt;
&gt; **Dr. Hammond:** What else did you feel? Could you have possibly seen anything different?
&gt;
&gt; **D-7147:** (Pauses and glares at Dr. Hammond) Why are you asking me this? Did you see it too?
&gt;
&gt; **Dr. Hammond:** D-7147, please answer my questions before you ask anything.
&gt;
&gt; **D-7147:** I did see things. Vivid visions of an angel standing in the Sun. Vivid visions of battles. Mountains of human flesh. (Pauses) I saw New Jerusalem. Have you seen it too?
&gt;
&gt; **Dr. Hammond:** An angel standing in the Sun, you say? 
&gt;
&gt; **D-7147:** Yes! You&#39;ve seen it too, right? Did you hear what he said?
&gt;
&gt; **Dr. Hammond:** What exactly did he say?
&gt;
&gt; **D-7147:** &#34;This is the supper of the mighty one&#34;, he cried.
&gt;
&gt; **Dr. Hammond:** Please continue.
&gt;
&gt; **D-7147:** And the end of my visions was so different from what I had seen a few minutes before! (Opens his arms and smiles at Dr. Hammond) You have no idea! At first, everything seemed too surreal to be true. Everything seemed too absurd. There were people following the one who fooled us all. A supersonic scientist! (Pauses) But then, right at the end, when I heard the angel cry, I saw the hand of the Lord guiding me to New Jerusalem!
&gt;
&gt; **Dr. Hammond:** I saw and heard you screaming during &#34;Supper&#39;s Ready&#34;. Was it joy or was it fear?
&gt;
&gt; **D-7147:** It was confusion. At first, confusion. Then, fear. But finally, joy. Can you play that song again? I feel a bit anxious. I want to see everything again. I want to see the apocalypse closely. You know the apocalypse is coming, right? Let me listen to it one more time, and I swear I&#39;ll take you to supper with the Lord with me.
&gt;
&gt; **Dr. Hammond:** I&#39;m afraid I can not.
&gt;
&gt; **D-7147:** Please.
&gt;
&gt; **[END LOG]**
&gt; 
&gt; **Closing Statement:** After D-7147&#39;s request of listening to SCP-9556 once again was denied, D-7147 started mentioning self-harm ideation to himself. Three hours after being denied listening to SCP-9556 again, D-7147 expired dued to cardiac arrest. 

**Addendum 9556.3:** Interview with D-95290

The following interview was conducted in Site-██ by Dr. Leonard Hammond thirteen-minutes after D-95290 got through listening to SCP-9556. D-95290 only listened to &#34;Supper&#39;s Ready&#34;, starting to have visions at around 4 minutes into the song.

&gt; **Interviewer:** Dr. Leonard Hammond
&gt; **Interviewee:** D-95290
&gt; **[BEGIN LOG]**
&gt; 
&gt; **Dr. Hammond** D-95290, you just listened to a song called &#34;Supper&#39;s Ready&#34;, by a band called &#34;Genesis&#34;. Did you know that band before you listened to the song?
&gt; 
&gt; **D-95290:** I thought I did.
&gt;
&gt; **Dr. Hammond:** What do you mean by that?
&gt;
&gt; **D-95290:** I had already listened to this song before, but I&#39;ve never actually seen what the song talks about.
&gt; 
&gt; **Dr. Hammond:** What do you mean by having seen what the song talks about?
&gt;
&gt; **D-95290:** I saw the apocalypse. I heard the seven trumpets play, what I could call, sweet rock n&#39; roll.
&gt;
&gt; **Dr. Hammond:** What else did you see?
&gt;
&gt; **D-95290:** The hand of God. (Pauses) His hand. Guiding me towards New Jerusalem.
&gt;
&gt; **Dr. Hammond:** New Jerusalem?
&gt;
&gt; **D-95290:** Where we&#39;ll supper with the mighty one, of course! The end times are coming, doc, and we can&#39;t do anything but wait for our time and supper with Him.
&gt;
&gt; **Dr. Hammond:** And how do you know that?
&gt;
&gt; **D-95290:** I&#39;ve seen it, doc! When you played that sweet tune on the record player, I saw it all displayed in front of me! At first, I felt like everything was crushing me. Too much information filling my head, doc. But then, it all came together. (Pauses) When I saw the angel standing in the Sun.
&gt;
&gt; **Dr. Hammond:** Did the angel say anything?
&gt;
&gt; **D-95290:** He did.
&gt;
&gt; **Dr. Hammond:** And what did he say?
&gt;
&gt; **D-95290:** &#34;This is the supper of the mighty one.&#34;
&gt;
&gt; **Dr. Hammond:** Do you feel like listening to it once again?
&gt;
&gt; **D-95290:** (Pauses) I&#39;ve seen what I needed to see.
&gt;
&gt; **[END LOG]**
&gt; 
&gt; **Closing Statement:** D-95290 later exhibited signs of anxiety, depression and self-harm ideations. When questioned, D-95290 explained that he wanted to be with the &#34;Lord&#34;. At exactly three hours later, D-95290 expired dued to cardiac arrest.
