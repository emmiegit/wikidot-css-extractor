[[size 150%]]**General Info:**[[/size]]
* I have eaten a cubic foot of chicken parmesan in under 15 minutes. 
* I am among the many wretched spawn of Massachusetts. 
* I am fated to die in an IHOP. 
* I have a Bachelor&#39;s Degree in Game Design. 
* I am regularly exposed to radiation.
* I love you. 
* I created and own a Muppet version of myself.

As a rule of thumb, expect whatever I make to be weird. Sometimes for comedic effect, sometimes to scare, it&#39;ll always be bizarre if it&#39;s coming from me. My articles are rarely all-the-way serious, but aside from the occasional grim piece expect at least one joke per article. I love making weird creatures more than almost anything else in the world.

[[size 125%]]//I don&#39;t know how to do fancy divs or themes or CSS formatting please forgive me.//[[/size]]

[[size 150%]]**Writing Philosophy:**[[/size]]
The way I portray the Foundation is occasionally compared to lolFoundation, but that&#39;s not really what I&#39;m going for. I portray the Foundation and life within it as what it is: a workplace. Sure, it&#39;s an important, weird, dangerous job, but still a job nonetheless. And the people there are smart, but no less human. They goof off when they know it&#39;s safe to do so. They chat with each other, and maybe the anomalies too if they&#39;re the less-loathsome type. Because no matter how serious it may seem, the setting is by its very definition full of strangeness. So let&#39;s get strange, ourselves!

My main writing influences include Terry Pratchett, Junji Ito, Ursula Vernon, Q Hayashida, Douglas Adams, Alfabusa, Gary Larson, KC Green and David Lynch.

I am always open to collabs, as they are fun, and it is cool to see other people&#39;s takes on your ideas. For the same reasons, you never need to ask me to use any of my creations in your work, but still feel free to ask me for advice. I like to help!

If you need me, contact me on discord at iamtheooga#1866.

If you dislike any of my works, let me know why, so I can make them un-suck. I love getting feedback, and I read all comments in the discussions of my articles. Every single one &lt;3
