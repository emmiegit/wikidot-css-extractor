++ MANY CONGRATULATIONS TO [[*user yossipossi]] FOR WINNING BOTH CATEGORIES!

They have been awarded $50 for their efforts, and have truly spooked Nico. Well done!

Make sure to read the winning entry here: [[[SCP-8980]]]



[[collapsible show=&#34;+ Show Rules, Entries, etc.!&#34; hide=&#34;- Close&#34;]]
[[=image spooky.png]]
@@ @@
@@ @@
@@ @@
[[=]]
+++ Hello!
[[/=]]
-----
If you know me at all, you know that I&#39;m a tough nut to crack when it comes to horror on the SCP Wiki. I can count on one hand the amount of times articles here have scared me. So I decided to host a contest with the sole purpose of writing horror that //will// spook me! 

-----

[[=]]
+++ The Rules
[[/=]]
-----

# This is a horror-themed contest, so your entry must primarily inspire fear, terror, those kinds of emotions. That doesn&#39;t mean you&#39;re not allowed to have silly or heartfelt moments, just make sure the primary theme is horror.
# SCPs, Tales, GoI Formats, Creepypasta, whatever you want to write, its fair game.
# This is a solo contest. No exceptions.
# Entries will be subject to the usual deletion process.
# Minor edits are permitted - grammar edits, formatting, etc. Try not to change the article fundamentally.
# You must write something new. If you&#39;ve got something close already on the site, you don&#39;t get to enter it just because the contest came along.
# In order for your entry to be considered for the contest, tag it with {{spook-nico-2024-unofficial}}.
# Old drafts ARE allowed, as long as they were not previously posted.
# Any member who takes unusual and/or negative actions to increase their vote total, or decrease that of their competitors, will be disqualified for the involved contest and potentially banned from further contests. Site members who are not participating in the contest but do this sort of thing may be subject to Disciplinary action. Examples of shenanigans include, but are in no way limited to: Downvoting all of your competitors&#39; work within minutes of them being posted, Spamming people with PMs about your work, and Spurring Malicious Upvoting/Downvoting, whether on your work or anyone else&#39;s. If you&#39;re not sure if something counts as shenanigans, then it probably does, but feel free to PM me asking.

-----
[[=]]
+++ The Dates
[[/=]]
-----
* Writing opens up the moment this hub goes live. 
* You will have until October 15th, 11:59 PM  EST (GMT-5) to post your article.
* The voting period begins on October 16th 12:01 AM EST (GMT-5) and continues until October 30th 12:01 AM EST.
* Winners will be announced on October 31st. 

-----
[[=]]
+++ The Prizes
[[/=]]

To the victors go the spoils! 

The entry with the highest number of upvotes total will receive a $25 Steam Gift Card.
My personal favorite entry will receive a $25 Steam Gift Card.

-----
[[=]]
+++ Have some help!
[[/=]]
-----

What fun would it be if I didn&#39;t tell you what the scariest article on the site (in my opinion) was? It&#39;s [[[SCP-3817]]] for me. I&#39;ll also throw you another bone. I like making my blorbos suffer, so if you think that making my characters suffer will get to me, it won&#39;t. 

Now go forth, armed with this knowledge, and scare me. I look forward to your entries!

-----
