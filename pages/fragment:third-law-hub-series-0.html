[[# 7OW]]
++ The Seventh Occult War
[[/=]]

From 1939 to 1945, the world burned in the fires of global war. Terrible new weapons were unleashed and unspeakable atrocities were committed. Strange alliances once thought impossible were forged by necessity, and ancient institutions once thought eternal were swept aside. The Second World War was the greatest and worst conflict in human history.

These stories are not about that war. These are the stories of the other war, the secret war, the Seventh Occult War.

----

[[=]]
[[# blacksun]]
+++ [[[Black Sunrise]]]
[[/=]]

* **[[[obskuracorps-memos |Obskuracorps Memos Acquired in Operation BLACK ROPE]]]** -- Nazi wizards frantically plot to assemble a doomsday weapon, all while being hounded by a machine that punches fascists. //Written by GreenWolf//
* **[[[archival-document-hsa-008-advent |Archival Document — HSA-008-Advent]]]** -- Mankind has always been enamored with cool swords. The Allied Occult Initiative has to make sure the Obskuracorps doesn&#39;t sway the course of the war with one. //Written by NatVoltaic//
* **[[[a-man-of-clay-and-men-formerly-men| A Man of Clay and Men Formerly Men]]]** -- Special Operative Josef invites himself into an abandoned manor to put an end to an occult experiment. //Written by NatVoltaic//
* **[[[SCP-9666|SCP-9666: Operation AEON DAWN]]]** -- The Foundation goes to war. The Golem of Prague haunts a Nazi wizard. Enrico Fermi borrows a billion dollars of plutonium to kill God. This is how the 7th Occult War ends. //Written by GreenWolf and tawny0//
* **[[[SCP-3457| SCP-3457 - The Rite of Solomon]]]** -- The wisdom of Solomon was unmatched among mortal men. The Foundation seeks to keep it that way. //Written by ChaoSera//

----

[[=]]
[[# blacksun]]
+++ [[[varuna-s-war|Varuna&#39;s War]]]
[[/=]]

* **[[[walkin-slow|Don&#39;t Go Walking Slow]]]** -- A British platoon is stuck in the Burmese Jungle. Will the enemy kill them first, or will the monsters underground? //Written by Anorrack//
* **[[[Voice of Rage and Ruin]]]** -- Kiran Pal and the rest of the AOI squad make their way to Japanese-held China. There they find a secret Imperial super-weapon project, about to go terribly wrong. //Written by Anorrack//
* **[[[Talking to Someone Else]]]** -- Kiran Pal talks about the future and the importance of war to fight the injustices of the world. //Written by Anorrack//
* **[[[Shadow On My Back]]]** -- Kiran and his comrades find themselves in tropical Borneo, where they must face the sins of the past. //Written by Anorrack//
* **[[[No Tears of Regret]]]** -- Kiran fights a demon long thought buried, and has to make a fatal decision between the mission and his friends. //Written by Anorrack//



----

[[=]]
[[# war-stories]]
+++ Other War Stories
[[/=]]

* **[[[whats-going-down|Everybody Look What&#39;s Going Down]]]** -- The Ancient and Most Noble Order of Gormogons is called upon to annihilate a secret Nazi UFO base. //Written by ch00bakka//
* **[[[The Golem of Prague]]]** -- The Golem of Prague is a construct of Kabbalistic thaumaturgy dedicated to the fight against fascism, working with the GOC to destroy the Obskuracorps of Nazi Germany. //Written by GreenWolf and ch00bakka//
* **[[[Sifting Through The Sand]]]** -- The Foundation and the British Occult Service attempt to stop the Order of the New Templars from stealing the body of the mad pharaoh Akhenaten to use in a Nazi death ray. //Written by Anorrack//
