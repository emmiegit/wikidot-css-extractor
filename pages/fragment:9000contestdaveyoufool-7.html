&gt; **Interview Log: Pre-Bedtime Questioning**
&gt; **Interviewer:** Dr. Trent Summers
&gt; **Interviewed:** SCP-9005-A-RD18
&gt; **Date/Time:** 6/23/2025, 8:30 PM
&gt; 
&gt; &lt;Begin Log&gt;
&gt; 
&gt; //[Dr. Summers enters the interview room. He sits across the table from SCP-9005-A-RD18.]//
&gt; 
&gt; //[Neither of them speak for 17 seconds, just staring at each other.]//
&gt; 
&gt; //[Notably, SCP-9005 is still glowing red.]//
&gt; 
&gt; **Summers:** Hmm. Have you seen any Stanley Kubrick films?
&gt; 
&gt; ...
&gt; 
&gt; //A Clockwork Orange?// //The Shining?// Maybe //Full Metal Jacket?//
&gt; 
&gt; **9005-A-RD18:** I like Transformers movies.
&gt; 
&gt; **Summers:** Oh. Because, like, fun fact -- from the way you&#39;re staring at me, there&#39;s this movie-talk thing called --
&gt; 
&gt; **9005-A-RD18:** Why do you want me to kill myself?
&gt; 
&gt; ...
&gt; 
&gt; **Summers:** Hmm... you know, when you make the assumption that I&#39;ll agree to subverting the questioner/answerer roles just because you&#39;re verbally strong-arming me, that makes //me// feel like --
&gt; 
&gt; **9005-A-RD18:** Why do you want me to kill myself?
&gt; 
&gt; **Summers:** You already said that.
&gt; 
&gt; **9005-A-RD18:** And I said it again because you&#39;re not fucking listening. 
&gt; 
&gt; **Summers:** //Whoa.// Okay, T/O, no need to be a bully.
&gt; 
&gt; **9005-A-RD18:** //Why.// Do //you.// Want //me// --
&gt; 
&gt; **Summers:** Okay, that&#39;s a //leading question//. That&#39;ll get you kicked out of Debate 101 faster than smoking a joint at the front of the class. It&#39;s like saying &#34;why do you hate potato chips?&#34; when you don&#39;t know that person&#39;s opinion on potato chips.
&gt; 
&gt; **9005-A-RD18:** //WHY.//
&gt; 
&gt; **Summers:** Because in that situation, they&#39;re trying to establish the hatred of potato chips because their argument is built on that, when in reality --
&gt; 
&gt; **9005-A-RD18:** DO //YOU.//
&gt; 
&gt; **Summers:** OOOH, ME //ROBIN!// ME //BIG!// ME ASK QUESTIONS //LOUD!// UNGA BUNGA!
&gt; 
&gt; **9005-A-RD18:** WANT //ME.// TO //KILL MYSELF?!//
&gt; 
&gt; ...
&gt; 
&gt; **Summers:** ...Get it out of your system yet?
&gt; 
&gt; //[RD18&#39;s fists clench. He breathes heavily.]// 
&gt; 
&gt; Y&#39;know what? Fine. I&#39;ll humor you. Why the hell do you think I&#39;d want you to do the thing that //no therapist on the planet// wants their client to do?
&gt; 
&gt; **9005-A-RD18:** You spent the past 6 months finding new ways to make me dread waking up in the morning. Calling me a quitter when I don&#39;t do what you want and calling me a monster when I //do.//
&gt; 
&gt; **Summers:** Emotional reasoning, got it.
&gt; 
&gt; **9005-A-RD18:** And then you started putting a gun under my pillow with only enough power to kill someone at point blank.
&gt; 
&gt; **Summers:** And where&#39;s your proof?
&gt; 
&gt; **9005-A-RD18:** I saw you put the gun there.
&gt; 
&gt; **Summers:** //Where&#39;s your proof?//
&gt; 
&gt; **9005-A-RD18:** I //said// --
&gt; 
&gt; **Summers:** And I could //say// I saw you shitting diamonds into the mouth of God last night. Accusations and proof are two different things.
&gt; 
&gt; **9005-A-RD18:** I was pretending to sleep.
&gt; 
&gt; **Summers:** Dreaming, got it. Also, what motivation would I have? Where&#39;s the &#34;why?&#34;
&gt; 
&gt; **9005-A-RD18:** //Why the FUCK do you think I&#39;m asking you?!//
&gt; 
&gt; **Summers:** So lemme get this straight. You have no motive and no concrete proof... but you //do// have how much you hate me for trying to help you. And now, while //you&#39;re// pulling the mother of all mental gymnastics routines to paint me as much of a bad guy as you can, the finishing move involves pulling a &#34;what if Perry Mason were a caveman?&#34; 
&gt; 
&gt; Now, let&#39;s talk about what&#39;s actually going on here. See, you know I&#39;ve hit the nail on the head about the kind of person Simon Dabrowski Junior really is, and now that you&#39;re caught in the trap, you&#39;re flailing around and trying to make yourself look big to scare me away. Because what you&#39;re //really// afraid of is letting someone turn you into a good person. That way, you wouldn&#39;t be able to indulge in all your secret urges. So, you constructed this elaborate real-life fanfiction to --
&gt; 
&gt; //[RD18 slams both his palms on the table and stands up, looming over Summers.]//
&gt; 
&gt; //[Just before he can reiterate his initial question, Summers vaguely gestures at him.]//
&gt; 
&gt; See?
&gt; 
&gt; //[RD18 slowly sits back down, holding his forehead in his hands.]//
&gt; 
&gt; Anything to add, buddy?
&gt; 
&gt; **9005-A-RD18:** [[size 75%]]I wanna call Uncle Bogdan.[[/size]]
&gt; 
&gt; **Summers:** I got a better idea.
&gt; 
&gt; //[Summers pulls out his Foundation ID card. There&#39;s a hidden plastic chamber in the back of the card holder. He opens it. A small capsule falls on the table.]//
&gt; 
&gt; See this?
&gt; 
&gt; **9005-A-RD18:** [[size 75%]]What&#39;s that?[[/size]]
&gt; 
&gt; **Summers:** Personnel handbook calls it &#34;Basingstoke.&#34; It started replacing the standard cyanide caplets last year -- it&#39;s painless, tasteless, and instantaneous. One bite, and it feels like you just went to sleep standing up.
&gt; 
&gt; Look, I want to help you. But I also never thought it was possible for me to grow this many gray hairs in six months. I can&#39;t help you if you&#39;ve already made your decision a long time ago. If you&#39;re //that// dedicated to never changing, if you have your heart set on dying as Simon Dabrowski Junior...
&gt; 
&gt; //[He points to the capsule.]//
&gt; 
&gt; ...Commit to the bit.
&gt; 
&gt; //[RD18 sobs quietly.]//
&gt; 
&gt; **9005-A-RD18:** [[size 75%]]I just... let me call my uncle. Please. I wanna hear his voice.[[/size]]
&gt; 
&gt; **Summers:** Yeah... My first questioning session about you was actually with him, over the phone. I told him you were in our custody.
&gt; 
&gt; **9005-A-RD18:** [[size 75%]]What did he say?[[/size]]
&gt; 
&gt; **Summers:** &#34;Oh, thank God. Whatever he did, keep him. Don&#39;t //ever// let him out.&#34;
&gt; 
&gt; //[RD18 grabs the pill with his right hand.]//
&gt; 
&gt; Welp. For the record, I tried.
&gt; 
&gt; //[He brings his right fist to his mouth.]//
&gt; 
&gt; //[He opens his mouth.]//
&gt; 
&gt; //[He closes it.]//
&gt; 
&gt; //[He bites down.]//
&gt; 
&gt; //[He falls backward in his chair.]//
&gt; 
&gt; ...
&gt; 
&gt; //[Summers gets out of his chair.]//
&gt; 
&gt; //[He bends over RD18, examining him closely.]//
&gt; 
&gt; //[He slaps RD18&#39;s cheek.]//
&gt; 
&gt; [[size 75%]]Hey. Hey, buddy.[[/size]]
&gt; 
&gt; //[No response.]//
&gt; 
&gt; //[Summers sighs deeply, trembling.]//
&gt; 
&gt; [[size 75%]]Okay... hooooo boy, this is gonna //suuuuck...//[[/size]]
&gt; 
&gt; //[Summers takes off his bowtie and opens his collar.]//
&gt; 
&gt; //[He kneels over RD-18, face-to-face with him.]//
&gt; 
&gt; //[He holds open the collar of his shirt, turns his head up, closes his eyes, and braces himself.]//
&gt; 
&gt; ...
&gt; 
&gt; //[RD18 opens his eyes.]//
&gt; 
&gt; **9005-A-RD18:** //I fucking knew it.//
&gt; 
&gt; //[Though unclear from the security camera&#39;s framerate, Summers is startled enough to end up lying on the interrogation table in one movement.]//
&gt; 
&gt; //[RD18 stands up and opens his right fist. The pill lands on the floor.]//
&gt; 
&gt; //[Though trembling, Summers eases back into a standing position.]//
&gt; 
&gt; **9005-A-RD18:** Just shooting me yourself meant that someone would have restrained you, right?! No, you had to be the first person to find my body!
&gt; 
&gt; //[RD18 sits back down as if nothing happened, smiling.]//
&gt; 
&gt; All right, then, I think it&#39;s about time you started asking your questions.
&gt; 
&gt; //[Summers remains standing.]//
&gt; 
&gt; Go on. Let&#39;s talk about why I&#39;m //just the worst//. 
&gt; 
&gt; **Summers:** Stop that.
&gt; 
&gt; **9005-A-RD18:** Stop //what?//
&gt; 
&gt; **Summers:** I -- I don&#39;t know, just -- //[Gestures vaguely to RD18.]// Whatever this is, I don&#39;t know what the word is for it, but STOP IT!
&gt; 
&gt; **9005-A-RD18:** Then let&#39;s move on. Because I&#39;ve got a new question for you: why do you want the Viper?
&gt; 
&gt; **Summers:** I DON&#39;T! Leading questions, remember?! I don&#39;t want anything to do with SCP-9005!
&gt; 
&gt; **9005-A-RD18:** So... I&#39;m gonna assume opening your collar in front of my neck was just some interpretive-dance thing to say goodbye to your patient?
&gt; 
&gt; **Summers:** I //don&#39;t// want a bunch of fucking needles under my face! //It hurts!//
&gt; 
&gt; **9005-A-RD18:** Yes. It //hurts.//
&gt; 
&gt; **Summers:** Why would I want that?!
&gt; 
&gt; **9005-A-RD18:** Hmm...
&gt; 
&gt; //[RD18 bares both rows of teeth in his grin.]//
&gt; 
&gt; Well, for one thing, 20-Murgatroyd would give you the chance to act out everything you dreamed of doing on your secret flash drive.
&gt; 
&gt; //[Loaded silence.]//
&gt; 
&gt; //[Summers sits back down. He tentpoles his fingers on the table.]//
&gt; 
&gt; **Summers:** Time out. White flag of truce. 
&gt; 
&gt; **9005-A-RD18:** I thought it meant surrender.
&gt; 
&gt; **Summers:** I&#39;ve heard rumors about the Viper. 
&gt; 
&gt; **9005-A-RD18:** Mm-hmm?
&gt; 
&gt; **Summers:** Well... rumors to the effect of, uh, that you can have these seance-ish things with dead Administrators. Including the most recent one. Is that true?
&gt; 
&gt; **9005-A-RD18:** What&#39;s your point?
&gt; 
&gt; **Summers:** You&#39;ve been here, on this floor of site 491, and nowhere else, for six months. So, //if// -- big if -- //if// the most recent dead Administrator knew about the Magic Drool Bus, then, logically, she would have been the only person who could have told you. ... //Therefore...// there is a nonzero chance that my higher-ups know about it. And they haven&#39;t said anything because they&#39;re biding their time to get law enforcement involved when it&#39;s convenient for them.
&gt; 
&gt; Is that true? 
&gt; 
&gt; Or... is this a bluff? Do you not actually know about it and you&#39;re just pulling this out of your ass? ... Are you even mentally capable of bluffing?!
&gt; 
&gt; //[RD18 sighs. He stands up.]//
&gt; 
&gt; **9005-A-RD18:** You know something, Doc? I&#39;ve been thinking about your offer. I //would// like a teddy bear. The pillows in my cell suck ass; I always wake up with a tension headache. If nothing else, a stuffed animal would make for a nice --
&gt; 
&gt; **Summers:** //YES OR NO, IS THIS A GODDAMN BLUFF?!//
&gt; 
&gt; **9005-A-RD18:** Throw in a hundred teddy bears and I&#39;ll //think// about telling you.
&gt; 
&gt; //[Summers leaps across the table. He pounces on RD18.]//
&gt; 
&gt; //[His hands are too small to strangle RD18.]//
&gt; 
&gt; //[RD18 grins.]//
&gt; 
&gt; You&#39;re not very good at strangling. //Do better.//
&gt; 
&gt; //[Summers grabs the head of SCP-9005, wiggles it around, and tries to yank it out of RD18&#39;s neck.]//
&gt; 
&gt; //[RD18 screams and flails, trying to throw him off.]//
&gt; 
&gt; **Summers:** //ALMIGHTY VIPER!// HE&#39;S TOO WEAK TO ACCEPT YOU! //I&#39;M// A WILLING HOST! COME OUT AND MAKE ME YOURS! I WANT TO JOIN THE PILGRIMAGE!
&gt; 
&gt; **SCP-9005:** //[Shrill, metallic moaning.]//
&gt; 
&gt; **Summers:** //PLEASE!// I&#39;LL DO WHATEVER YOU SAY! NO QUESTIONS! NO HESITATION! I&#39;LL EVEN --
&gt; 
&gt; //[RD18 grabs Summers from both sides of his head, holding him in the air by his scalp.]//
&gt; 
&gt; //[RD18 snarls under his breath.]//
&gt; 
&gt; **Summers:** [[size 75%]]Now, before we do anything //too// crazy, I would like to clarify that I never did actually talk to your uncle. Foundation personnel are EXPRESSLY forbidden from contacting relatives of anomalies they work with unless given permission directly from the O5 Council. In all likelihood, Bogdan Dabrowski is very concerned for your safety and happiness as we speak. In fact -- [[/size]]
&gt; 
&gt; //[RD18 gouges Summers&#39;s eyes out with his thumbs before throwing him to the floor.]//
&gt; 
&gt; **9005-A-RD18:** //[Incoherent roaring.]//
&gt; 
&gt; //[He jumps, landing on Summers&#39;s crotch with both feet.]//
&gt; 
&gt; //[Based on de facto analysis of the blurry footage, RD18 proceeds to punch Summers in the face between 170 to 204 times. Summers stops screaming after the third punch.]//
&gt; 
&gt; //[Unidentifiable wet, ripping noises off camera.//]
&gt; 
&gt; //[By the time 9005-A-RD18 gets back up, Summers&#39;s head has taken the appearance of spilled chili con carne mixed with hair and bone fragments.]//
&gt; 
&gt; //[RD18 angrily gargles a mouthful of Summers&#39;s blood, then swallows.]//
&gt; 
&gt; //[He closes his eyes and takes a deep breath.]//
&gt; 
&gt; **SCP-9005:** //[Warped, inquisitive cooing.]//
&gt; 
&gt; //[SCP-9005&#39;s eye glows blue.]//
&gt; 
&gt; //[RD18 opens his eyes.]//
&gt; 
&gt; //[He backs away from the body, trying not to look at it. Hitting the wall, he slides down into a sitting position.]//
&gt; 
&gt; ...
&gt; 
&gt; //[[https://www.youtube.com/watch?v=RKvAvSpnBXI He sings weakly.]]//
&gt; 
&gt; **9005-A-RD18:** [[size 75%]]//Here&#39;s our, jingle for Goldfish//
&gt; //Yes, baked and not fried Goldfish//
&gt; //Th-the wholesome snack, that smiles back//
&gt; //Until you... bite their heads off//
&gt; //Now, see the fishes swimming//
&gt; //Oh, look the pretzel&#39;s winning...// 
&gt; [[/size]]
&gt; 
&gt; //[Sobbing.]//
&gt; 
&gt; [[size 75%]]//You know... they&#39;re made with real cheese,//
&gt; //Even though they look like... fishies,//
&gt; //The s-snack... that smiles back... Goldfish...//[[/size]]
&gt; 
&gt; //[The door opens. Dr. Ashton enters, holding a pistol.]//
&gt; 
&gt; //[She notices the body, then RD18.]//
&gt; 
&gt; ...
&gt; 
&gt; //[She gestures to someone outside the room.]//
&gt; 
&gt; **Ashton:** I&#39;ve got it under control. Come back in five minutes with a Shop-Vac.
&gt; 
&gt; //[She closes the door.]//
&gt; 
&gt; //[RD18 stands up.]//
&gt; 
&gt; **9005-A-RD18:** Shoot me. ... I don&#39;t wanna take the pill. I want the good guys to shoot me.
&gt; 
&gt; //[She holsters the gun.]//
&gt; 
&gt; //[From a hidden compartment in her lab coat, she unsheathes a Roman-style gladius.]//
&gt; 
&gt; That works, too, I guess.
&gt; 
&gt; //[She points the gladius at Summers&#39;s corpse.]//
&gt; 
&gt; **Ashton:** &#34;Trent&#34; is a weird name.
&gt; 
&gt; //[The sword flashes with light. Summers&#39;s remains, clothes, and personal effects crumble into ashes.]//
&gt; 
&gt; **9005-A-RD18:** What the hell was that?!
&gt; 
&gt; **Ashton:** What, the SEXTUS Model 13? Standard-issue.
&gt; 
&gt; //[She sheathes it.]//
&gt; 
&gt; Usually, I&#39;m honor-bound to kill anyone who directly witnesses a Model 13 outside of its scabbard. But given that you&#39;ve just passed the final test, I don&#39;t think you&#39;ll have anything to worry about.
&gt; 
&gt; **9005-A-RD18:** What //test?//
&gt; 
&gt; //[She kneels in supplication.]//
&gt; 
&gt; **Ashton:** Robin Dabrowski. From this moment forward, you are the Administrator-Elect of the SCP Foundation.
&gt; 
&gt; &lt;End Log&gt;
