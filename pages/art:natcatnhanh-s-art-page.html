Hi I&#39;m Nat Cat. A fanartist, who really really likes SCP. I love everything about the concepts and website. 

About me: Sometime in 2019, I came across SCP through [https://www.pixiv.net/user/18923/series/10631 松(A・TYPEcorp.)] and their [https://www.youtube.com/watch?v=H3jjv0wpZJg&amp;list=PL8fm_MTq3WfU7AlpGkU3W44R_WO3cY_7N Oversimplified SCP] series that was posted onto Youtube. I&#39;ve been a huge fan of it ever since, and I adore TYPEcorp&#39;s art. I automatically consider the majority of their designs as canon and draw them accordingly in my work keke

[https://scp-wiki.wikidot.com/scp-978-extended-test-logs Desire Camera is my favorite SCP], it&#39;s very beautiful and heartfelt. The epitome of everything I like about the SCP website and all things relating to it.  

I like cosmic horror, and horror that still centers around themes of humanity. 

One of my favorite quotes that I associate with SCP is: &#34;I believe in a universe that dosen&#39;t care and people who do&#34; from the 2017 video game; Night In The Woods 

https://www.tumblr.com/natcatnhanh

= ₊⊹♡
