=====
[[include component:preview
text=Dr. Perry Yule hates Christmas.]]
=====

[[&gt;]]
[[module rate]]
[[/&gt;]]

Dr. Perry Yule takes a step into his kitchen and frowns. He stares at his calendar for exactly two minutes and thirteen seconds. It is his least favourite, day of the year. December 25th. 

Christmas.

He groans as he marks the day off and moves to collect his toast. It is burnt. His sigh is quieter than he intended, he sighs again to compensate before eating his burnt toast. 

It doesn&#39;t take him long to get dressed. His usual green turtleneck, dark blue jeans and grey hiking boots are already laid out on his couch from the prior night. Neat and perfect, just the way he likes it. 

He removes a white box from his dresser before exiting the small bungalow.

------

With an audible sigh, he enters Site-3, his trenchcoat replaced with a white labcoat. The halls are easy to weave through, he&#39;s done it a thousand times. Even with the new lights adorning half the walls, the building is still uniform. Dr. Yule turns a corner to see the whole staff gathered in the assembly hall. He scowls.

&#34;Oh, Hello Perry!&#34; The irritating voice of Site-3&#39;s tiny director, Billiam Hundred, shoots through the crowd as the 3&#39;9&#39;&#39; man sprints toward Dr. Yule. 

&#34;Hello, Sir.&#34; Dr. Yule barely manages to hold in his contempt for the man as he speaks:

&#34;Cut it out with that &#39;sir&#39; talk. It&#39;s Christmas! Oh wait, is that a present you&#39;ve got in your hands?&#34; Dir. Hundred is practically vibrating with excitement. Dr. Yule sighs.

&#34;It&#39;s breath mints. You all should consider using some.&#34; He mutters as he places the box in the disappointed Dir. Hundred&#39;s hands.

&#34;Well... its the spirit that counts!&#34; The man smiles meekly. Suddenly, a considerably drunk researcher slams into Dr. Yule, spilling his small cup of alcohol all over his own labcoat. The whole building falls silent, staring at the now visibly angry doctor in terror. The alcohol-drenched man feels his deepest emotions bubble up to the surface.

[[=]]
+++ **//WHY?//**
[[/=]]

The booming question echoes through his whole body as he vibrates with rage. He takes a deep breath and exhales sharply.

&#34;Merry fucking Christmas.&#34; He manages before storming off deeper into Site-3&#39;s labyrinthian halls.

------

He sits in the dark cold storage chamber, his ruined labcoat strewn in organised pieces on the other side of the room. He can&#39;t remember the past hour... or has it only been three minutes? He can&#39;t tell.  

Knock, Knock, Knock.

Three raps on the door ring out. Dr. Yule looks at his --mess-- collection and sighs.

&#34;The door isn&#39;t locked.&#34; He says. Almost as soon as he finishes, the doorknob turns. Before he realises it, the head of the Maintenance Section is leaning against the wall next to him.

&#34;Looks like you made good use of the labcoat.&#34; The figure says.

&#34;Shut up.&#34;

&#34;Mate, I don&#39;t even know who you are and frankly, I think I&#39;m more important than a Christmas hating brat like you.&#34; The figure smokes a cigarette, much to Dr. Yule&#39;s visible bemusement. 

&#34;I don&#39;t know who you are either.&#34; He manages, moving away from the figure slowly.

&#34;Makes sense. No-one cares for the janitors. The name is Way. For your information, I am nonbinary and use they/them pronouns.&#34;

&#34;I don&#39;t care. I&#39;m Doct--&#34;

&#34;Yeah. Dr. Perry Yule, you&#39;re quite famous around these parts.&#34;

&#34;That&#39;s what 30 years of experience gets you.&#34;

&#34;Yeah, whatever. Welp, why //do// you hate Christmas?&#34;

&#34;I don&#39;t...&#34; Dr. Yule sighs and gets to his feet. &#34;Its the noise and the mess and the... ARGH!&#34; Dr. Yule shouts and bangs his head against the wall.

&#34;So... you have like, autism or something?&#34;

&#34;//I don&#39;t know!//&#34; Dr. Yule groaned, Way rolled their eyes.

&#34;Well, take it from a fellow grinch. It&#39;s always better to be hateful with a buddy.&#34; Way swirls a bottle of whiskey in his left hand towards Dr. Yule. The man stares at the bottle for a few minutes before grabbing it.

&#34;Fine.&#34; He downs the bottle in one go.

It certainly wasn&#39;t the worst Christmas of his life.
