    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>**Statement from Agent Janet Clary, Tau-49 Operative**

&gt; I was tied to a chair, and my mouth hurt. One of my teeth was broken. I don&#39;t know how I knew that, but I did. My wrists were already raw from rubbing against the rope, like I&#39;d been struggling against them for a while.
&gt; 
&gt; There was someone standing behind me, holding a mirror. I could just see the bottom of their face. They had blue rubber gloves on, and they kept grabbing my face, poking me, prodding me. There was something metal in my mouth, holding it open. The man behind me, I saw him smile, and he held up a battery in one hand, and a wire leading from it in the other. He began... he reached in, he...
&gt; 
&gt; **Interview ends.**

**Note:** Agent Clary&#39;s mouth required extensive reconstructive dental surgery following the incident. She retired from field work after her encounter with SCP-9393.
