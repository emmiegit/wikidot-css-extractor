    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>**Statement from Agent Bradley Harris, Tau-49 Operative**

&gt; I was walking through the forest. Like, the one back home, in California. I could feel the pine needles crunching under my boots, smell the dust. It was dark, and I could just make out the trees around me.
&gt; 
&gt; I didn&#39;t have any of my gear on me. I didn&#39;t... My gun was gone. I started walking, and I heard something else moving. I looked around, but I couldn&#39;t see anything in the dark. I started walking again, and I heard it.
&gt; 
&gt; Suddenly, I felt a hand grab my head, like palming a basketball. It gave me a little push and let go. I spun around, but there was nothing there.
&gt; 
&gt; Something behind me laughed, and I ran. Next thing I know, I&#39;m stumbling back out of the door.
&gt; 
&gt; One of the guards started to say something, but they stopped. They were just kind of staring at me. At my hand. I didn&#39;t even know I was holding anything. I dropped it, and I&#39;ll never forget the wet sound it made when it hit the ground. 
&gt; 
&gt; I guess I freaked out after that. I don&#39;t remember too much of the ride back.
&gt; 
&gt; They say I might have to get amnesticized before they let me have a gun again. I think it&#39;s worth it.

**Note:** The object in Agent Harris&#39;s hand was identified as the top three inches of Agent Joshua Prestwood&#39;s head. No other remains of Agent Prestwood have been retrieved to date.

[https://scp-wiki.wikidot.com/scp-9393/offset/#anchor7 Return.]</textarea></pre>
