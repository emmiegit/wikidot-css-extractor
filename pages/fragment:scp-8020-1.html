Winston retrieves his gun and drapes a greatcoat over his shoulders. With a burning fire in his heart, he would forge a war path through the nauseatingly sterilized halls of Site-01. His broad shoulders barged into agents, factotums, and overseers alike; many were surprised at the Administrator’s sudden reappearance.
[[=]]
&gt; OFFICE OF THE THIRTEENTH OVERSEER
&gt; OFFICE OF THE TWELFTH OVERSEER
&gt; OFFICE OF THE ELEVENTH OVERSEER
[[/=]]
The authoritative stomps of his loafers as he passed by the doors to their offices echoed throughout. The noise went as far as shaking the deepest recesses. It was enough to make the shadows themselves cower. He would halt for nothing and no one. An omnipotent could block his path and he would happily spit in its eye if it meant making it move.
[[=]]
&gt; OFFICE OF THE TENTH OVERSEER
&gt; OFFICE OF THE NINTH OVERSEER
&gt; OFFICE OF THE EIGHTH OVERSEER
[[/=]]
For the past several years, Winston had suffocated himself in his sorrows. He had lost himself in the “Would be’s” and “Could be’s”. He had entertained a lifetime’s worth of dreams and fantasies. For what? Because it was the path of least resistance. But a man’s mind can only stew for so long before it crumbles from its own weight. His ears were ringing with the voices of his whirling thoughts; “This is it,” they said, “if anything is to happen to you today, let it be known that it was for Him”.
[[=]]
&gt; OFFICE OF THE SEVENTH OVERSEER
&gt; OFFICE OF THE SIXTH OVERSEER
&gt; OFFICE OF THE FIFTH OVERSEER
[[/=]]
Despite that, Winston didn’t have to do this in person. He could call forth the Seat of Consciousness to do it for him while he sat in the safety of his office. No worries, no strife: one moment O5-1 would be alive, and the next his story would be over. But where would the satisfaction be? Contempt was built up over several years, contempt for a single man; the desperation for catharsis lingered in his itchy index finger.
[[=]]
&gt; OFFICE OF THE FOURTH
&gt; OFFICE OF THE THIRD OVERSEER
&gt; OFFICE OF THE SECOND OVERSEER
[[/=]]
To say he didn’t sympathize with Roland’s plight would be a lie. The correspondence those many moons ago showed that his mind was anything but in one piece. Ensnared and captured in the tangled web of cognitohazards and memes. One could even go as far as to say that he took a bullet for Winston. But that did nothing to subjugate his rage. A life was taken from him, a life that now sits in a concrete tomb //(good God, is that what we’ve been doing to all of those families?)//
[[=]]
&gt; OFFICE OF THE FIRST OVERSEER
[[/=]]
Here he was, standing before judgment itself. With one more step comes absolution. He did not hesitate to take that plunge, as he rams his shoulder into the door: the dark oak barrier flinging open. Roland, in turn, looks up from his terminal; startled by the grand display. Winston’s shadow towered over him.

“Winnie?” He gasped with disbelief, “Christ, It’s been years. How have you been?”

His reply was a silent raise of the revolver, a gloved thumb slowly bringing back the hammer, “I’m sure you can guess how I’ve been, Roland.”

The suited Overseer raised his hands slowly at the threatening display, “I see,” he mustered, “I suppose this means you don’t want a drink? No brandy? Coffee, perhaps?” Roland hunched inwards slightly when Winston made no change in demeanor, “No? Okay.”

“...So… How’s the boy, Win’?” The Overseer asked somewhat sheepishly, a single hand slowly lowered.

“He’s still right where you left him.” The venom dripped from the Administrator’s tongue, “Four concrete walls, the occasional offering of metal to keep him complacent, the odd interview here and there.”

“Good… Good.” He nodded slowly, the hand lowering further to the point where it was out of sight. Winston’s keen gaze remained on the man. Then, in one smooth flourish–[[/==]]
[[=]]
++++ **BANG!**
[[/=]]
[[==]]
Roland’s head lashed backward as he crumpled further into his chair. A clatter of an object hitting the floor rang in the office, as blood began seeping from the newfound hole in his head: it complimented the cerebrospinal fluid that flowed from his nostrils quite well. His features were locked in a stunned surprise as his autonomic nervous system took over, trying all it could to keep him alive. His muscles spasmed as nerves misfired, causing fingers to twitch erroneously.

As Winston stared, he bore witness to a fragmented skull carefully welding itself back together, the swelling of the brain gently deflating and the flesh itself meticulously weaving the frayed fibers into one. The lifeless stare of O5-1 was broken by two confused blinks before he took a full gulp of air--differentiated by splutters.

“You should know better than I do, that doesn’t work.” Roland taunted, a sly smile parting his lips; betraying the danger that was clasped within the Administrator’s very hand, “The Fountain of Youth is one hell of a thing.”

“I know,” Winston replied dryly, “did it hurt?”

“Like hell.” Roland chuckled with a hint of bitterness.

“Good. I have five more with your name on it, and I don’t intend to leave here until the cylinder has been emptied.”

The Overseer shook his head as he slowly stood up from the chair, his hands were raised as if it was all some sort of big misunderstanding. Like he //didn’t// just attempt to return fire on the assailant before him.

“What do you intend to accomplish here, Win’?” Roland asked, “You gonna shoot me a few more times in the head and then call it even?”

Winston’s arm remained rigidly outstretched as he cocked the hammer back for a second round, “Maybe…” he replied, a glint of uncertainty shone in his eye. “It entirely depends on how you answer my questions, friend.”

“Well, it would be rude to deny you that opportunity.” He bowed with petty delight, “Go on. Ask away, Bossman.”

&#34;Why-&#34; Winston was hardly offered a moment before he was cut off.

“Why did I do it? Because it told me to Winston. It told me to find a worthy lamb to sacrifice for the good of mankind.” Roland grinned.
[[/==]]
[[=]]
++++ **BANG!**
[[/=]]
[[==]]
“Bullshit,” Another gunshot rang out, the motions were repeated. O5-1’s smile began to wither. The tissue around where each wound would be began to appear shiny- almost like bronze.

“I don’t know what you want me to tell you, Win’.” Roland groaned, “That’s what it said. It wouldn’t leave my mind until I put the pieces into motion. Hell, it //still// scratches at my temporal lobe and whispers things to me.”

“Like what?”

“Like how you’re an asshole.”
[[/==]]
[[=]]
++++ **BANG!**
[[/=]]
[[==]]
A third gunshot echoed. Roland gave a pained chuckle this time.

“Humorless bastard…” He hissed, interspersed by the occasional coughing.

“You caused the breaches didn’t you?” Winston completely ignored the man’s sharp retort, a bubbling feeling beginning to well up in his stomach.

“You want a gold star?” His nose wrinkled, “I just got the ball rolling. After a while, eighty-twenty was more than capable of getting out on its own.”

“You lock a few doors here and there, and suddenly the hamster&#39;s found his way to his treats.” He chuckled, “Though, I’ll admit, had I known the oil was going to do what it did to him… I probably would have done that first.”
[[/==]]
[[=]]
++++ **BANG!**
[[/=]]
[[==]]
Winston’s brow twitched as two bullets were now left in the chamber. Meanwhile, the wall behind the Overseer was becoming increasingly washed with crimson and the floor was dirtied by metal fragments that looked more like crushed cans than bullets. His blood pressure was steadily rising.

“I didn’t even do anything that time,” Roland grunted in protest.

“Of course you didn’t.” Winston maintained a glare in his direction, “How did you do it?”

“Oh, you just want to know all of the secrets today, don’t you?” He sneered, moving around the desk with his eyes locked on the six-shooter.

“I have to start somewhere if I am to repair the mess you made.” Winston disclosed, he felt the spitting hot magma at the back of his throat.

“What mess?” He grinned, a twisted sense of pride dripping from his words, “I have revived humanity’s last bastion to save us!”

“You are //insane//, Roland.” Winston snarled.

“You won’t be saying that when She comes!” He cackled, “If I were you, I’d just let nature take its course!”

The grip on the revolver tightened, “You are speaking //nonsense!//” The Administrator protested.

“What? Planning on shooting me //again?//” Roland took a step backward, reaching for the object that fell to the floor, “Go on, one more time! That’ll save you!”[[/==]]
[[=]]
++++ **BANG!**
[[/=]]
[[==]]
Roland was knocked backward, but his hand firmly held onto something: A copper ring. In the dim light of the office, it looked like a small snake. Winston observed as it slithered and curled around the madman’s finger,

“A slow sort of country…” Roland mumbled.

Winston pulled the hammer back for a final time.

“...Now, here, you see, it takes all the running you can do…” He choked.

The Administrator took a deep breath and aimed.

“To keep in the same place.” A final smile flashed on his face.[[/==]]
[[=]]
++++ **BANG!**
[[/=]]
[[==]]
The revolver clattered to the floor, empty. He looked helplessly onwards to the gore-spattered wall, now ordained with a new decoration: A single bullet hole.

Roland was nowhere to be found.

The room was heavy, Winston’s chest heaved as adrenaline continued to course through his veins. His mind was clouded by anger, disbelief, and the continuous yearning for his unobtained catharsis. Now, everything was still; juxtaposing the chaos that had unfurled mere moments before.
Stunned surprise overtook his body as he was forced to gaze upon the gruesome sight before him. A single shaky hand curled inwards into a balled fist- his knuckles turning white as his nails dug into his flesh.

“This isn’t over.” He promised the empty room, “I //will// find you.”

= Inhale.

= Exhale.
[[/==]]
[[=]]
&gt; “I //will// make things right.”
