[[collapsible hideLocation=&#34;both&#34; show=&#34;⚠️ Cognitohazard&#34; hide=&#34;hide&#34;]]
[[=image cognitohazardsign size=&#34;small&#34;]]
&gt; Hazard triangle adapted from [https://commons.wikimedia.org/wiki/File:Warning.svg Wikimedia Commons], released by Open Clip Art Library under CC0 1.0.

&gt; Eye adapted from [https://commons.wikimedia.org/wiki/File:Eye_-_The_Noun_Project.svg Wikimedia Commons], released by the Noun Project under CC0 1.0.
Eye as a shorthand for perception, and then the classic exclamation mark.

[[/collapsible]]

[[collapsible hideLocation=&#34;both&#34; show=&#34;⚠️ Semiohazard&#34; hide=&#34;hide&#34;]]
[[=image semiohazardsign size=&#34;small&#34;]]
&gt; Hazard triangle adapted from [https://commons.wikimedia.org/wiki/File:Warning.svg Wikimedia Commons], released by Open Clip Art Library under CC0 1.0. Art within is my own.

From the classic explanation of semiohazards &#34;one plus one doesn&#39;t always equal two&#34; (SCP-INTEGER by Placeholder McD).

[[/collapsible]]

[[collapsible hideLocation=&#34;both&#34; show=&#34;⚠️ Bureaucratohazard&#34; hide=&#34;hide&#34;]]
[[=image bureaucratohazardsign size=&#34;small&#34;]]
&gt; Hazard triangle adapted from [https://commons.wikimedia.org/wiki/File:Warning.svg Wikimedia Commons], released by Open Clip Art Library under CC0 1.0. Art within is my own.

Scales used to mean laws, as paper/sheets just looked like a symbol for a written cognitohazard. Tipped scales for wrongness.

[[/collapsible]]

[[collapsible hideLocation=&#34;both&#34; show=&#34;⚠️ Narrativohazard&#34; hide=&#34;hide&#34;]]

&gt; Hazard triangle adapted from [https://commons.wikimedia.org/wiki/File:Warning.svg Wikimedia Commons], released by Open Clip Art Library under CC0 1.0. Art within is my own.
[[=image narrativohazardsign size=&#34;small&#34;]]
The [https://en.wikipedia.org/wiki/Hero%27s_journey diagram of the heroes journey] simplified and disrupted by an external force, which has also entered the &#39;Known&#39; aka disrupting normalcy.
