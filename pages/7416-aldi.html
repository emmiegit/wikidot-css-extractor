= [[size 220%]]**SCP-7416 A.L.D.I.**[[/size]]
= [[size 140%]]Anomalous Legislature Decompilation Initiative[[/size]]
----
 
[[size 0%]]spacer[[/size]]
 
[[size 110%]]The SCP-7416 Anomalous Legislature Decompilation Initiative is an ongoing effort towards cataloguing any portions of the legal knowledge of [[[SCP-7416]]] deemed relevant to the interests of the Foundation and its continued operation. This document is intended to be a primary log of recovered information, and is accessible by all personnel assigned to 7416-ALDI. Information presented here has been sanitized, translated and truncated from SCP-7416&#39;s original statements whenever possible for maximum comprehension by Foundation personnel.
 
All recordings are to be presented in the following format:[[/size]]

[[collapsible hideLocation=&#34;both&#34; show=&#34;+ Show Document 7416-ALDI-003 &#39;Spiff Code&#39;&#34; hide=&#34;- Hide Document&#34;]]
&gt; +++ 7416-ALDI Document 003
&gt; ----
&gt; **Given Title:** &#34;Spiff Code&#34;
&gt; **Claimed Origin:** SCP-7416 has claimed that the legislation is maintained by an alliance between several metadimensional entities, all children between the ages of 5 and 12, and United States film director Michael Bay.[[footnote]]Referred to as &#34;Great Sage Bay&#34;.[[/footnote]] No information confirming the latter two claims has been found.
&gt; **Transcribed By:** Researcher Hastings
&gt; ----
&gt; = __**Overview**__
&gt; Spiff Code allegedly dictates the outcome of any events that could be considered &#34;cool&#34; or &#34;action-packed&#34; or &#34;totally radical&#34;. It does so via a wide variety of systems requiring certain events to happen in conjunction with each other or the presence of certain factors in a relevant situation. The legislation uses several unique terms including &#34;Saurii&#34;, a standard unit used to measure &#34;gnarlyness&#34;.[[footnote]]How well any given element or subject aligns with the stated values of coolness.[[/footnote]] The legislation appears largely nonsensical, consisting of treating action movie tropes as if they were fundamental laws of existence, and there is no evidence of any of these laws being enforced in any way.
&gt; ----
&gt; = __**Notable Excerpts**__
&gt;&gt; __**Edict The Whateverth**__[[footnote]]Spiff Code does not use any methods of organization or numeration, with each individual law instead being assigned a semi-random title.[[/footnote]]
&gt;&gt; Beasts and peoples with a gnarlyness of at least 4.8 Saurii are not permitted to perish due to causes rating less than three-fifths of their own Saurii rating.
&gt;&gt; ----
&gt;&gt; **Note:** //If a method of ensuring selective enforcement of Spiff Code can be achieved, this edict has potential for Foundation usage to ensure survival of personnel and anomalies.//
&gt; 
&gt;&gt; __**Edict THE BIG ONE**__
&gt;&gt; If something doth be wicked sweet and/or totally awesome, it shall be made to happen.[[footnote]]This edict has been noted to heavily resemble the popular &#34;Rule of Cool&#34; media trope.[[/footnote]]
&gt; 
&gt;&gt; __**Edict Giant Robot**__
&gt;&gt; If any entity or construct defined as a &#34;Giant Robot&#34; by the 1967 Kyoto Agreement is present in a scenario, said entity or construct&#39;s Saurii rating may not be lower than 80% of the highest individual Saurii rating present.
&gt; 
&gt;&gt; __**Edict Number Punch**__
&gt;&gt; If there is a cool guy, he should punch the bad guy.
[[/collapsible]]
[[collapsible hideLocation=&#34;both&#34; show=&#34;+ Show Document 7416-ALDI-009 &#39;The Cantos of the Calcified Custodians&#39;&#34; hide=&#34;- Hide Document&#34;]]
&gt; +++ 7416-ALDI Document 009
&gt; ----
&gt; **Given Title:** &#34;The Cantos of the Calcified Custodians&#34;
&gt; **Claimed Origin:** A race of unknown alien entities that have existed on earth for approximately 400 million years.
&gt; **Transcribed By:** Researcher Schmidt
&gt; ----
&gt; = __**Overview**__
&gt; SCP-7416 claims that the legislation is an ancient code of conduct and chivalry followed by a sect of alien warriors &#34;Sworn to protect all lifeforms of honor from within that cannot protect themselves&#34;. These entities are claimed to be widely-propagated throughout earth, humanity and even the Foundation. SCP-7416 has claimed it is unlawful for it to divulge the nature of the concealment these entities have undergone. It has compromised by explaining that they are &#34;amongst mankind&#39;s closest allies&#34; and have been &#34;hiding within since time immemorial&#34;.
&gt; ----
&gt; = __**Notable Excerpts**__
&gt;&gt; __**27th Oath**__
&gt;&gt; If a Custodian should fail to protect the life of their ward, they must lie amongst their remains to watch over them. This vigil shall only end when the Custodian&#39;s form is naught but dust, at which point they shall reincarnate to watch over a new ward from the moment of their birth.
&gt; 
&gt;&gt; __**30th Oath**__
&gt;&gt; A Custodian shall never move against the wishes of their ward, indeed without their ward they shall simply lie without motion. In doing so they shall demonstrate the truth of their pledge. When their ward does wish for them to move, the messages relaying their desire shall be conveyed by the tugging of the red filaments.
&gt; 
&gt;&gt; __**44th Oath**__
&gt;&gt; A Custodian must conceal their form from all wards, unless doing so would violate another oath. The sole exception is when both the ward and Custodian are bathed in the &#39;rays that pierce all things without touching them&#39;, and then the Custodian may silently reveal their visage.
&gt; 
&gt; **Note:** //Is he talking about fucking skeletons?//
