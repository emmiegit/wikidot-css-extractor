**Item #:** SCP-9970

**Object Class:** Safe

**Special Containment Procedures:** A misinformation campaign is currently in effect to redact all sensitive information regarding SCP-9970. Agents implanted within local police forces, legal offices and media outlets are to cover SCP-9970 as if it were a typical, non-anomalous crime.

The land surrounding SCP-9970-A has been purchased by a Foundation front company and a large electric fence has been erected around the grounds.

Blood samples taken from the remains of SCP-9970-5 are held in cryogenic storage at Site-35. 

**Description:** SCP-9970 collectively refers to a string of murders that occurred at Camp Greenwood, in New Merilyn, New Hampshire, as well as the subsequent destruction of the camp itself. 

As told in the story released to the public, five teenagers (SCP-9970-1 to SCP-9970-5) trespassed onto the campgrounds around midday on 4/12/1988. It is understood the group intended to stay at the camp, which had been closed to the public, for several days. However, that evening an unidentified individual (SCP-9970-6) ambushed the group, ritualistically hunting and executing each member. Following this, it is believed the individual set off some kind of reaction, triggering an explosion and burning down the camp. Emergency services arrived onto the scene not long after.

It is currently understood that each of the victims possessed some level of psionic and/or reality-bending abilities. According to various sources,[[footnote]] See recovered GOC document on KTE-7743-Green (&#34;The Losers Club&#34;). [[/footnote]]  the group would regularly meet up in secluded or otherwise private areas to exercise their abilities outside of the public eye. SCP-9970-6 is believed to have also been anomalous to some capacity, as it is otherwise unknown how they could have avoided detection or retaliation from the group during the attack.

SCP-9970-A refers to the dilapidated remnants of Camp Greenwood. Individuals that stand at certain points throughout the grounds will be overcome with vivid visual and auditory hallucinations, believed to show a first-person perspective of the victims&#39; final moments. Five points have been discovered throughout SCP-9970-A, each correlating to a specific victim.

**Addendum 9970.1:** Vision Transcripts

||~ Vision Subject ||~ Trigger Location ||~ Contents ||
|| SCP-9970-1 (&#34;Gunther Brown&#34;) || Fire Pit || All five teenagers are sat on logs, arranged around a campfire. Subject is holding a guitar, playing an acoustic rendition of the song Push It to the Limit, from the 1983 film Scarface. The other four chat idly amongst themselves. SCP-9970-4 can be seen toasting a marshmallow over the fire. Vision ends abruptly after 23 seconds.[[footnote]] This is the shortest  of the five visions. The current hypothesis is that SCP-9970-1 was shot in the head immediately after the depicted events.  [[/footnote]] ||
|| SCP-9970-2 (&#34;Jake Harrison&#34;) || Male Bathrooms || Subject is stood on top of a toilet in a stall. Subject is noticeably trembling and covering its mouth. The sound of footsteps can be heard approaching from nearby, eliciting clear distress within the subject. There is a brief period of silence, before a loud crashing noise (as if someone had kicked open a stall door) can be heard from the end of the room. This repeats several times, getting closer each time. Through the gap beneath the stall door, a pair of black combat boots can be seen approaching, before stopping directly outside. There is a moment of stillness, with the individual standing motionless outside the door for approximately 20 seconds. Subject lets out a quiet whimper. Suddenly, the door flies open and the subject is violently pulled out of the stall. The attacker seems to grab the side of the subject&#39;s head, hitting it against the wall several times in rapid succession, shattering the mirror. The final moments of the vision depict the subject lying limp on the ground, surrounded by broken glass, as a puddle of blood begins to pool beneath its head. ||
|| SCP-9970-3 (&#34;Lucy Thompson&#34;) || Women&#39;s Sleeping Cabin || Subject lies on its front underneath a bed. Subject is covering its mouth, but audible sobs can still be heard. Subject remains under the bed for 45 seconds, before quietly climbing out and sneaking toward a nearby bag. Subject hastily rifles through the bag, however does not appear to find whatever it is looking for, letting out a grunt in frustration. A quiet thud can be heard somewhere in the room, causing the subject to gasp and rise to its feet. Subject scans the room, panicked, however the room appears to be empty. Suddenly, a hand emerges from behind and grabs the subject&#39;s face, covering its mouth. An accented male voice can be heard whispering the words &#34;Found you,&#34; into the subject&#39;s ear,[[footnote]] This is the only instance of SCP-9970-6 speaking across all five visions. [[/footnote]] before a second hand suddenly emerges holding a hunting knife, and proceeds to repeatedly stab the subject in the throat. Afterwards, the subject is dropped to the ground and the sound of footsteps walking away can be heard. ||
|| SCP-9970-4 (&#34;Scott Allens&#34;) || Kitchen || Subject hurriedly rifles through drawers and cabinets, clearly panicked. The subject mutters to itself, reacting in frustration each time it does not find what it is looking for. Eventually, the subject discovers a drawer full of kitchen knives. The subject lets out a celebratory grunt before picking up a long butcher&#39;s knife. A sound can be heard off to the side, causing the subject to flinch and drop the knife. The subject turns, spotting a figure stood in the darkness. The figure appears to be a male, between the ages of 25 and 35, with medium-length blonde hair, however further details can not be made out in the low light. The subject backs away, ordering the figure to &#34;Stay back,&#34; however the figure does not respond. The subject raises its hand towards the figure, and several objects in the vicinity begin to levitate into the air, however the figure seems to be unaffected. Seemingly panicking, the subject rapidly turns and attempts to run away. There is a loud, metallic thud and the subject drops to the ground. The subject lies limp on the ground, half-conscious. Clicking sounds (as if turning on a gas stove) can be heard. ||
|| SCP-9970-5 (&#34;Natasha Nieves&#34;) || Nearby Woods || Subject is sat with its back against a tree. Subject is hunched over, panting heavily. Its body is caked in mud, with torn clothes and its legs covered in scratches. The subject attempts to move, but quickly stops, clearly in pain. The subject lets out a moan, rubbing its eyes with one hand.There is a sudden flash of light, and the sound of an explosion can be heard nearby. Subject looks towards the tree line, seeing the rising flames. Subject swears before dropping to its stomach. The subject hastily attempts to crawl away, however due to its injuries, it is only able to clear a few metres before giving into exhaustion. Alongside the crackling of the fire, the sound of a stringed instrument, such as a guitar or [[[agent-ukelele|ukulele]]], can be heard approaching from behind. The subject gives out a loud sigh before closing its eyes, seemingly in resignation. ||

Due to its relative distance from the camp, SCP-9970-5&#39;s remains were not damaged in the subsequent fire. A bullet wound was discovered in SCP-9970-5&#39;s lower back; cause of death determined to be from blood loss. SCP-9970-5&#39;s tongue seems to have been cut out at some point prior to expiration.
