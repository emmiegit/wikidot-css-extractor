    <pre><textarea class="page-source" readonly>[[&gt;]]
[[module Rate]]
[[/&gt;]]
[[&gt;image 255-1.png]]
Bonba! I love Bonba!

I&#39;ve been encouraged by my partner to start posting my SCP practices here, so here they will be. I only have two so far, but I do want to make more. They&#39;re wonderfully refreshing to do between my bigger projects.

[[collapsible show=&#34;+Various Random Thoughts&#34; hide=&#34;-close&#34;]]

I haven&#39;t read Black Diamond Billions, given my own trauma regarding money, sexuality, and self worth; but the modern SCP-255 sucked me in. I started reading it on my phone during a lunch break and came back ten minutes late. Whoops.

I made this render once I got home, the whole process, from modelling to final render, probably took less than an hour. I&#39;m still pretty bad (See: Improving) at art, but being able to create fan content like this helps me on the journey to not suck.
[[/collapsible]]

[[collapsible show=&#34;+On 255 in particular&#34; hide=&#34;-close&#34;]]
I&#39;ve always enjoyed cute things, hell I still sleep with a little rabbit plush. Bonba is very cute, and she even destroys a major source of antagonization we&#39;ve all come to accept in our lives: excessive advertisement. When you&#39;re born weird, it&#39;s good to get the comfort you can; especially when the world has commodified the right to be alive.

While my own issues can&#39;t come close to Jessica Leblanc&#39;s, I can certainly relate to her psychological problems and the world&#39;s indifference to them. I was able to get help with my learning disability growing up, and it certainly helps that mine had ironically made reading and study the forefront of how I approached my hyper-fixations. I was lucky for the life I&#39;ve had; but for every one of me, there&#39;s ten of Jessica. They&#39;re lying on park benches wondering why they&#39;re without help or agency; wondering why they get ostracized for //just trying to connect,// while corporations are encouraged to scream at us.

So I made a quick render of a beveled cube, because it brought me comfort.
[[/collapsible]]
