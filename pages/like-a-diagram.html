&gt; (The speck stops struggling. He has looked, with some effort, to his left and his right. He has now, finally, seen that there are other figures mounted here with him on the retina, older figures who have mostly been interpolated into the membrane, and no longer have independent life or thought. This causes him no small amount of alarm. He says: &#34;…By who?&#34;)
&gt; 
&gt; Hold still.
&gt; 
&gt; (The speck&#39;s brain explodes, like a diagram.)
&gt; 
&gt; = [[[Tombstone]]], There Is No Antimemetics Division -- //qntm//

[[collapsible]]
This is fanart of TINAD that I made a few days ago; specifically, of the chapter entitled &#34;Tombstone&#34;. It&#39;s really great. The line &#34;The speck&#39;s brain explodes, like a diagram.&#34; really struck me, so I decided to make some art about it.

Most of it is generated with code I wrote in Python, and the rest I put together in GIMP. 

- cubeflix
