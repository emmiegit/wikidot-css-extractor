Arcos went first, reaching up to cut his thumb on the spearhead. Perrin used one of his short swords. I didn&#39;t see what Nobody did; he just stretched a pale arm out from the front of his coat, a drop of blood already dangling from its outstretched finger. I still had the knife I&#39;d stolen from that sailor, and I made sure not to show any pain as I did my part. With each drop that evaporated, one of the flames changed color. When Horatius&#39;s turn arrived - last, since he&#39;d had to remove one of his gauntlets - he used a wickedly curved knife that I&#39;d never seen before. He also cut more deeply into himself than was probably necessary, if the amount of blood was any indication, but he didn&#39;t show even a hint of discomfort.

&#34;What&#39;s that thing for?&#34; Perrin asked, eyeing the sinister blade appreciatively.

&#34;It&#39;s ceremonial,&#34; was all he said. Then he flicked the blood from it into the circle, changing the last candle, and re-sheathed it at his side.

&#34;You may wish to stand back,&#34; Moritz said. He didn&#39;t have to tell us twice, because the floor inside the diagram had started glowing. The circle of light shifted through several different colors, then settled on a rippling black. It buzzed quietly.

&#34;Excellent!&#34; he cheered, clapping once. &#34;Now, who wants to go first?&#34;

There were no volunteers.

&#34;It&#39;s perfectly safe.&#34;

&#34;It&#39;s buzzing,&#34; Perrin countered.

&#34;That&#39;s probably normal.&#34;

&#34;//Probably//?&#34;

&#34;Fine,&#34; Arcos sighed. &#34;I&#39;ll do it.&#34;

&#34;Excellent! Just jump in.&#34;

&#34;Really?&#34;

&#34;Yes.&#34;

&#34;Wonderful.&#34; Arcos took a deep breath, as if he were about to dive underwater, then hopped into the circle. He dropped through the black circle like it was thin air.

&#34;Next?&#34;

&#34;Hold on, buddy,&#34; Perrin said, through gritted teeth. He stepped tentatively into the circle and fell. Horatius marched wordlessly in after him. Nobody nodded to us, then followed. Moritz looked at me.

&#34;Last chance to turn back.&#34;

&#34;Not going to happen.&#34;

He gestured at the portal. &#34;Women and children first.&#34;

Putting on a brave face, I stepped proudly forward and into the hole. With a disorienting whoosh, I disappeared.

----

The darkness seemed to press in on my eyes like a blindfold. For a brief, disorienting moment, I could not tell if they were open or closed.

Then Moritz spoke a magic word, and the crystal point of his staff began to glow. I realized that I&#39;d been holding my breath and released it. Arcos did the same, but his sounded more like a shuddering gasp. Fear was clearly written across his face. Surely the Child of Night was not afraid of the dark? As his nocturnal eyes reflected the glow of Moritz&#39;s staff, I realized this was exactly the case - but he had never before encountered a place so dark that his night vision could not capture a single speck of light.

We stood in the crumbling ruins of what might have once been a tavern. Eight centuries of neglect had reduced most of the wooden furnishings to dust, but the rust-wreathed frames of tall chairs and circular tables still protruded in places. A cracked pane of curved glass rose from the wreckage of the bar, sheltering jumbled plates of long-gone food from the steady stream of disintegrating plaster that trickled down from the hole-filled ceiling. Here and there, white cups peeked out of the inch-deep dust like dead fish gasping for air in a poisoned pond. When I prodded one with my foot, expecting the unyielding texture of porcelain or ceramic, it crumpled with an unpleasant squeaking sound.

&#34;Come,&#34; Nobody coughed, &#34;we had best get outside.&#34; Things were little better beyond the shattered glass door, though; as far as our light reached, there was nothing but rot and ruin. The cobbles were littered with chunks of stone, shards of glass, piles of rust, and less-identifiable shapes buried under layers of cobwebs. The sky above showed not even a flicker of starlight.

&#34;By the Saints,&#34; Perrin swore. &#34;What happened to this place?&#34; He was whispering, in unconscious respect for the dead silence around us. From the moment we&#39;d arrived, the only sounds we&#39;d heard were the ones we&#39;d made.

&#34;Less than most of the Ancients&#39; cities,&#34; Nobody answered. He looked contemplatively at an indistinct lump nearby. &#34;Though I cannot recall the specifics.&#34; His tone was not reassuring.

&#34;Did the Ancients often use profanity in their signage?&#34; Moritz asked. He was squinting up at the sign above the ruined tavern, which showed a drawing of a woman surrounded by a green circle and letters of the Old Speech, very different from the seven-sided characters of the common tongue.

Nobody glanced at the sign. He did not smile.

&#34;We had best keep moving,&#34; he said. &#34;The city is shaped like a bowl. We&#39;ll find its center at the lowest point, then make our way to the Jurassic Quarter from there.&#34;

&#34;Seems a bit circuitous,&#34; Perrin said, eyeing the vacant windows uneasily.

&#34;It will have to do, at least until I am sure where we are. Alert me if you see a street sign.&#34;

At that, we set off downhill. Portland was not what I expected. Ancient cities were supposed to be forests of sky-scraping monoliths and wide roads clogged with horseless carriages, but the buildings here were no taller or farther apart than those of Arnven. Perhaps that is what made it so eerie. I wanted to ask Nobody about these discrepancies, but it felt wrong to break the silence, even with the crunch of glass and gravel under my feet. This vast, empty ruin felt more like a tomb than a city.

As if conjured by my unspoken thought, a skeleton came into view. The long centuries had destroyed its connective tissues, leaving only a jumbled pile of yellow bones. I gasped, but the dust-shrouded heap was too divorced from anything living to truly frighten me. At least, that is what I told myself as we proceeded past the skeleton - and the next one, and the next one, and the next one. Some of the bones had broken, but it was hard to know if they&#39;d been bludgeoned or simply given out under the weight of so much time. Their clothes had long since moldered to nothing, leaving no clue as to who these Ancients might have once been...mostly. With a shiver, I noted that some of them were child-sized.

I do not know how long we walked. It was hard to tell, with nothing in the sky to guide us and no sound but our footsteps. The world seemed to end at the edge of the light, our little island in a vast, dark sea. When Nobody finally called us to a halt, it felt like being startled from a dream.

&#34;Shh,&#34; he said, pausing. We stopped. Silently, we listened.

//Thump. Scrape. Thump. Scrape.//

Quickly, he motioned to the gaping doorway of a nearby building. //Hide!// We hurried inside, but I didn&#39;t see what good it would do. Our path through the dust would be as clear as footprints on a snowy day. Moritz doused his light as soon as we were all inside, denying me a good look at the interior. We crouched below the large broken windows that flanked the absent door. There, we waited in absolute blackness.

//Thump. Scrape.// Though muted by the omnipresent dust, the footsteps were clearly heavy.

//Thump. Scrape.// I tried not to breathe. The slow footfalls competed with the sound of my speeding heartbeat. Could the others hear that too?

//Thump. Scrape.// I felt Horatius&#39;s gauntleted hand beside mine, and involuntarily I grasped it. He did not move.

//Thump.// It stopped. It was right outside.

Suddenly, there was light. I stifled a yelp. It filtered in through the cracked, grimy glass and fell in a bright rectangle on the filthy floor. The building didn&#39;t seem to have any interior walls, or if did, they had long since crumbled away. Only indistinct lumps of rubbish accompanied my hunkered companions in the floor. Perrin was beside me; to the other side of the door, I could see Horatius gripping his mace, ready to spring up and strike whatever came through.

Wait. //If Horatius was over there...//

Eyes wide with terror, I turned to see what owned the hand I had touched. It was slumped against the wall beside me, a man-shaped thing like an armored scarecrow. I jerked my hand away, but something in the movement or the light must have woken it. Two pinpricks of red light appeared on its too-smooth face, and its hairless head ground around on a rusted neck to face me. Without moving, its mouth coughed out a crackling, distorted message.

&#34;{{The Mayor is mad. The Ways are shut. We cannot get out. We cannot get ouuuuuu...}}&#34;

I am not sure what came next; my terrified shriek, or the earsplitting wail of a siren. The lights outside shifted from constant white to alternating flashes of hellish red and unnatural blue. The thing beside me pitched forward, the last of its non-life spent, but the one outside addressed us in a loud, hollow voice.

&#34;TRESPASSERS. YOU ARE UNDER ARREST. COME OUT WITH YOUR HANDS UP.&#34;

We came out, but we did so swinging. The thing out there - apparently some form of city guard, the existence of which was almost reassuring in this tomb-city - was like a huge clay sculpture of a man, even bigger than Arcos. Time had not been kind to it, though; nothing remained of its arms below the shoulders, and one of its legs was missing a huge chunk of knee. It was for this weak spot that Arcos aimed. His hammer shattered the remaining material, sending the construct to the ground with a crash. It squirmed ineffectively, seemingly unaware that it no longer had arms to attack with. Still, it continued to shout at us and flash those blinding lights from its wide glass eyes. Above them, I saw that some incomprehensible rune had been carved into the thing&#39;s forehead. Moritz saw it too.

&#34;Smash the rune!&#34; he shouted, pointing with his staff. Arcos did exactly that, scattering fragments all around. As the creature died, its lurid lights faded...yet we did not find ourselves in darkness. At first, I thought that Moritz had relit his staff, but he was staring up at the nearest streetlight. A feebly flickering ball of electricity had materialized inside the shattered bulb, casting us all in a jarring white light. A moment later, another lamppost lit up the same way. On they proceeded on down the street, following the curved surface all the way to the city center.

&#34;Oh, no,&#34; said Perrin. &#34;That is clearly a trap.&#34;

&#34;It&#39;s the direction we were already going,&#34; Horatius reasoned.

&#34;Well, now we should go a different way, one that doesn&#39;t lead into an obvious trap.&#34;

&#34;What say you, stranger?&#34; Horatius turned to Nobody, and the rest of us followed suit. The gray man still stood in the ruined building, turned half away from us. He was looking down at the metal man who&#39;d startled me.

&#34;What did this robot say to you, Geva?&#34;

I swallowed. &#34;It said &#39;The Mayor is mad. The Ways are shut. We cannot get out&#39;.&#34;

Nobody nodded. &#34;I thought that was what it said.&#34;

&#34;Who&#39;s the mayor?&#34; Horatius asked.

&#34;How can the Ways be shut?&#34; Moritz asked, concern evident.

&#34;What does that mean, can&#39;t get out?&#34; Perrin said, on the verge of panic.

Nobody thought for a moment before he turned to face us. &#34;It seems that Portland&#39;s first resident would like us to pay a visit.&#34; Then he continued on down the road. We followed, though Perrin only did so when the first streetlamp flickered off behind the rest of us. That continued the whole way, as if we were reeling in a spool of light - or fish on the end of a baited line. The lights were evenly spaced, even in places where the light poles had fallen, broken, or gone missing entirely.

At the bottom of the bowl-shaped city, the ground leveled out. At the same time, the endless ranks of ruined buildings came to a halt. The wide, open circle might have been a park once, but now it was a graveyard. Rows and rows of crooked tombstones split the dirt like close-packed teeth, interrupted here and there by vast, bone-filled pits. I saw another clay creature standing beside such a pit, mindlessly trying to dig with a shovel that had long ago disintegrated. The lights stretched on through this charnel wasteland, to a circle of much larger buildings at the very center of the city. Arrested only briefly by the morbid sight, Nobody continued on, and we followed ever more reluctantly.

The path led us between two stone buildings, their sturdy walls marred with gaping black cracks and craters. They contrasted starkly with the building on the other side of the circular plaza, which seemed completely untouched by the ruin wrought on the rest of the wreckage. But that was far from its strangest feature.

It reminded me of a wasp nest. This structure, this clot of architecture pretending to be a building, had that same sense of alien habitation, and it gave off the same instinctual menace. It //looked// like a narrow, two-story tower, but it was wrapped from base to peak in overlapping spirals of tangled balustrades, twisted columns, and precipitous balconies. Hundreds of tiny ebon windows peered out from random points along its surface, but there was only one entrance, a set of double doors not quite centered at the top of a low marble staircase. As I watched, the doors creaked open. A yellow glow came from within, but the inside looked strangely...hazy.

&#34;Well, Perrin,&#34; Nobody said, &#34;I think you&#39;re right.&#34; He looked to the left, then to the right, and set off that way.

&#34;Where&#39;re you going?&#34; Arcos called after him.

&#34;The Jurassic District.&#34; He paused, contemplatively. &#34;Perhaps we should hurry.&#34;

And hurry we did, though the predatory menace of the fake house wordlessly warned us not to run, at least not until we were out of its sight. It was less than ten meters away when we turned off down a street instead of marching through its open door. As I rounded the corner, I heard the doors creak again. The noise sounded indignant, like an aggressive tomcat, but louder. Much louder. By unspoken but unanimous agreement, we all began to jog as we passed through the graveyard ring&#39;s other side. There were more pits here, some of them so full of bones that their tops had risen above the level of the ground and spilled jawless skulls onto the path. The ghostly streetlights did not follow us, but Moritz lit his staff again. The crooked headstones cast ghoulish shadows in its lambent light. Another gravedigger golem watched us pass, grunting out some greeting or warning in the Old Tongue.

On the other side of the graveyard, we started to run. That is when we first heard it: a low, rumbling crash, as if a building were slowly collapsing in on itself. It was coming from the plaza. As we barreled on through the ruins, they seemed to come alive. Lights flickered. Rubble shifted. The cobblestones seemed to wriggle beneath my feet. The very air grew thick and hot, like the breath of some giant beast.

&#34;There!&#34; Nobody shouted, pointing up the hill at the dim outline of a two-story building that seemed to block the street. Only when I saw this shape outlined against it did I realize that the sky had begun to light. There was still only fathomless black overhead, but the inverted horizon around us had become limned with a dark, fiery red. Though we could see the shadow of the castle ahead, it was horribly far away. My legs were already burning from the effort of sprinting uphill. I stumbled over a stray bone, but my knees had scarcely hit the ground when Arcos snatched me up with one hairy arm. He did not even break his long stride.

Somewhere behind us, something made a noise that was half furious roar and half the awful squeal of bending metal. Then there came a thunderous //BOOM// and the very ground trembled. Arcos lost his footing and pitched forward, twisting his body to shield mine from the impact. He tried to stand, but now it seemed the whole world was being tossed about on stormy seas. With an awful sound, a great chasm tore across the street ahead, swallowing the buildings to either side. Horatius would&#39;ve been swallowed as well, had Perrin not dragged him away from the pit&#39;s crumbling edge.

As the tremor ripped through them, the age-weakened ruins of the city finally fell, sending great plumes of dust and shrapnel in all directions. Though the thunder drowned his voice, I saw Moritz shout a spell. A powerful wind whirled around us, deflecting all but the largest chunks of debris. An errant piece of glass sliced across my cheek, while fist-sized chunks of stone bounced off of Arcos&#39;s broad back.

Then, as suddenly as it had come, the earthquake ceased. Moritz released his spell, leaving us alone in the one clear bubble in a billowing ocean of dust.

And still, above the dying echoes of the cataclysm and the rumble of disintegrating stone, we heard those mighty footsteps. //Doom. Doom. Doom.// I looked toward the shadowy castle, now lost in the clouds of pulverized rock. The chasm was more than four meters wide, further than any of us could hope to jump. Maybe Moritz could work another spell...but he was looking the other way. Towards the footsteps.

It loomed out of the cloud like an angry mountain. It was shaped like a man, but its flesh was crushed concrete and rusted rebar. I-beam bones showed at its joints, squealing under its colossal weight. Two streetlights glared from its lump of a head, and two great arms dangled apelike at its sides. One ended in a cluster of thick pipes, dripping with a thick fluid that wasn&#39;t quite sewage and wasn&#39;t quite blood. From the other arm dangled a thick braid of metal cables, twitching with live electricity like a nest of vipers. It screamed at us, in a voice like metal fatigue, like broken church bells, like stone scoring glass.

&#34;THANKLESS!&#34; it wailed. &#34;UNGRATEFUL!&#34;

We struggled to our feet, to fight or to flee, but we did not get the chance. The cobbles melted beneath us, pulling us down like quicksand and hardening again, entombing us alive below the waist.

&#34;I GAVE YOU LIGHT, HEAT!&#34; it screamed. &#34;I GAVE YOU WATER, ELECTRICITY! STILL YOU WOULD LEAVE ME HERE TO DIE ALONE?&#34;

&#34;Mayor!&#34; Nobody shouted, struggling to be heard over the walking avalanche. &#34;Stop!&#34;

&#34;IT IS YOU WHO WILL STOP!&#34; it rumbled, leveling its pipe-arm at our trapped, wriggling forms. &#34;YOU WILL BE MY CITIZENS, MY CELLS, FOREVER!&#34;

A strange look came over Nobody. A frightening look.

&#34;No,&#34; he said, with a strange authority that seemed to crackle on the air. &#34;They will not.&#34; Then he flung his great arms to the side, and //other// arms erupted from the cavernous sleeves of his battered coat. Four long branches of transparent wood with knobby elbows and gnarled, clutching fingers lunged toward the Mayor...then bent backwards and latched onto the throats of my companions. I screamed, but my wail was cut off when a scaly tentacle like the tail of a snake slithered from the coat&#39;s collar and coiled around my own. Then, as if that was not shocking enough, I saw a huge, tawny paw creep up from the front to press its claws against Nobody&#39;s neck.

&#34;I will kill us before we become your prisoners,&#34; Nobody warned. &#34;And you will die here, entombed in yourself and full of your failures!&#34; To my utter horror, I believed him. The others did too; in the corners of my eyes I could see them struggling or hacking uselessly at the alien arms. Moritz couldn&#39;t catch the air to sputter out a spell. I poured my energy into the twitching tentacle, but it was unmoved. It had no mind to trick, and it was wrapped to tight to force away.

The Mayor hesitated, but only for a moment. It swung its left arm, //cracking// the braided cables with a blinding flash of sparks. &#34;THEN WHY SHOULD **I** NOT KILL YOU?&#34;

&#34;Because there is another way!&#34;

The Mayor advanced one menacing step. &#34;WHAT WAY?&#34; The stone tightened around my legs, and the tentacle tightened around my neck.

&#34;I will stay here, and in exchange, you will release my friends. You will open the Way to Portland Castle and let them leave. Then you and I will talk, for as long as you yet live.&#34;

Its lamppost eyes flickered. &#34;AND WHO ARE YOU, THAT THINKS HIMSELF SO CLEVER?&#34;

&#34;I am more like you than anything else you are likely to meet. I, too, have watched the empty centuries crawl by. I, too, have seen - have //felt// - the multitudes who once depended on me die, and been helpless to save them. I, too, have watched as everything I built fell to pieces. And I, too, was driven mad by it. I know what you are, and you know what I am. Look into my mind and see.&#34;

For a long, tense, moment, the Mayor stood there, its ersatz eyes locked on Nobody&#39;s unflinching glare. I could barely see them through my desperate, terrified tears.

Then, as suddenly as it had come, all the pressure released. The coat&#39;s strangling appendages retreated, and the pavement vomited us back to the surface. I fell to my knees, coughing and weeping.

&#34;GO,&#34; the mayor commanded. The dust cloud parted, clearing the way to the shadow of Portland Castle. Fragments of shattered walls floated into place above the chasm, locking together into a precarious bridge. Perrin needed no further convincing; he barreled across it as far as his sputtering lungs would allow with Moritz hot on his heels. Arcos bent over me, placing one huge hand on my heaving shoulders.

&#34;Are you alright, little one?&#34; he rasped, rubbing his bruised throat with the other. I could not force out any words, but I managed to nod. Gently, he lifted my trembling form and plodded toward the bridge. Over his shoulder, I saw Horatius approach Nobody.

&#34;L-lord?&#34; he stammered. &#34;Are...are you He?&#34;

&#34;No,&#34; he repeated, quietly. &#34;Not anymore.&#34; He looked at Horatius, then, and there was a bottomless sadness in his face. &#34;Go, Horatius. Mend my mistakes, while you still can.&#34; The slender arm of a dark-skinned woman slid from the front of his coat, holding some tubular metal object towards Horatius. He accepted it with numb fingers.

&#34;Yes, Lord.&#34; He knelt at Nobody&#39;s feet. &#34;I will not fail you!&#34;

&#34;Hurry, sir knight. The Mayor grows impatient.&#34; And so it did; the live wires of its electrical whip were creeping slowly towards the armored knight. Horatius leapt to his feet and marched quickly across the bridge beside Arcos. As we passed over, I glanced down into the darkness at the bottom. There was Nothing there.

The shadow of the castle was thin, like fog. Within its gloomy mass, though, I could see a long rectangle of light. Our Way out. I looked back as we stepped through. I watched as the billowing dust clouds closed around Nobody and the titan form of the mad Mayor. He did not look back at us.
