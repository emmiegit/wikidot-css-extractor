&gt; The book in your hands is the true personal account of one Princess Geva of Arnven, describing her travels from that fair city to the cursed island of Uk and back. Herein you will encounter daring feats of battle, wizardry, cleverness, and courage, tales of untold wealth and hideous monsters, and a historical blueprint for our present. I believe that my adapted translation of this story is the most historically accurate depiction of these world-shaping events, derived as it is from a primary source and backed up by substantial background research. The core of this story was told to me by Geva herself while I was a guest in her home. I have made only minor edits to her tale for the sake of clarity, and included only the embellishments that I was able to verify by consolutation of the relevant maps, historical texts, and Sacred Containment Procedures.
&gt; 
&gt; This book was compiled at the behest of Her Majesty Fortepiano III, Secretary-Empress of the German Occidental Coalition. I was asked to perform this task in response to the wild legends and rumors that have sprung up in the fifty or so years since these events occurred, so that they might be either verified or put to rest. In pursuit of this goal, I spent many years traveling the lands of Europe, Uk, America, and beyond gathering all manner of songs and stories along the way. My most useful resource by far was, of course, Princess Geva herself, who I found in Arnven at the end of my journey. I remained on the American continent for the years that it took to complete this manuscript, then (with a great deal of reluctance) arduously returned to my homeland to present my findings to the Secretary-Empress - and to you, dear reader. Though it is still intended primarily as a historical account, I hope that you will find it entertaining as well; I certainly enjoyed writing it.
&gt; 
&gt; Yours in perpetuity,
&gt; 
&gt; The Eighteenth Wanderman of Gormogon
&gt;

[[div class=&#34;blockquote&#34;]]

----

[[=]]
+ __BOOK 1__
+ THE RUNAWAY
[[/=]]

----

The Free City of Arnven is sometimes called &#34;the city at the center of the world&#34;. This is not an accurate description - the world is well-known to be spherical - but it does give a sense of Arnven&#39;s importance to the region it inhabits. Since its successful war of independence with the Holy Foundation, Arnven has become a haven for outcasts and foreigners, a thriving economic hub, and a vibrant cultural melting pot. It is still famed for its great temples of the greatest Saints, but above them all, at the city&#39;s very center, looms the Witch Image. This ten-meter marble colossus depicts the famous Witch of Arnven, standing proudly above her city with arms flung high and wide, as if casting some mighty spell. Her flowing robe, pointed hat, and fiercely smiling face were intricately carved by the coolest sculptor in the land, who also imbued her open hands with two perpetually burning spheres of shimmering gray-green flame, supposedly the same color as the mighty witch&#39;s eyes. A magical wind swirls perpetually about the statue, flickering the lambent flames and stirring the stone robes as only the coolest art can. The statue clearly conveys the Witch&#39;s great power and her willingness to defend her great city, but it fails to capture her humanity. Towering over her subjects in monolithic glory, the Witch looks more like a long-dead Saint of the Holy Foundation than what she really was: a young girl with more power than sense, and a heart too big for her own good.

I should not be so cynical. If Sigurros had not so valiantly sacrificed herself in defense of our city, I would not be here to write these words. She did what was right, and for that I cannot judge or blame her. Sigurros is not responsible for the legend that sprang up in the troubled decades beyond her death. It is said that, in Arnven&#39;s time of greatest need, the Witch will return from Corbenic to aid it once more, just as she did in Father Jaelen&#39;s battle with Asser Clef for the fate of the city. As times grew worse, Arnven grew worse as well. The Holy Foundation tightened its controls of the river Heilas that was Arnven&#39;s lifeblood, and merchants were less and less willing to brave the raids and blockades between the sea and the city, much less trade with the conniving enemies they&#39;d find at the end of such a perilous journey. And all the while the Thereven horde drew nearer to the north, conquering Foundation land at a pace too fast to believe. It was unlikely that they&#39;d make any distinction between the Foundation and the cities that had seceded from it. If the stories about the barbarians were true, it was equally unlikely that Arnven could withstand their assault. The city&#39;s fortunes were failing, and its people were seeking a savior. 

That is why, when an urchin girl with gray-green eyes was found in the gutters of the River Quarter, using magic to steal food from street vendors, stories began to spread. For a time, the urchin girl relished the attention...the //adoration//. In a matter of days, she went from peasant to princess. For the first time in her life, she had no want for food or clean clothes. The wisest sages in the city taught her letters and numbers. They told her great stories of ancient times and distant places, of saints and gods and heroes who Secured the future of humanity, Contained the monstrous expunged, and Protected the world from crumbling once more into savagery and horror. These stories filled her childish dreams with visions of adventure.

There was one story, though, that she hated, and that was the story of the Witch of Arnven. She hated it because, when people told it to her, they did it with a horrible look of //expectation//. They wanted her to be Sigurros - or, rather, they wanted her to be the Witch - so that she could magically save Arnven from all its troubles, even at the expense of her own life. They looked at her as though she //owed// them that. For a time, she wondered if she did. After all, the leaders of the city had taken her in and provided her with the best of everything, far better than what little she had scrounged on the streets in her adolescence. She realized, though, that these gifts had not been showered on //her//, nor had they really been gifts. They had been given to the Witch&#39;s ghost that supposedly dwelled within this little urchin girl, and they, too, were expectations. Expectations that, if she failed to live up to the legacy that&#39;d been thrust upon her, would doubtless be taken away. As the barbarian horde drew closer, as the looks in people&#39;s eyes grew ever more desperate, she wondered if those gifts might not be the only thing she stood to lose.

As the merchant ship drifted down the river, a 12-year-old girl peered over its rails at the receding lights of Arnven. There would be much alarm when she was found to be missing, but that was no longer her concern. The chains of unasked-for responsibility already felt lighter, countered by the winged thoughts of adventure in her young mind. In the free city of Utgard, she would not be the Witch of Arnven, or even Sigurros. She would finally, for the first time since her last day in the gutter, be Geva again.

She would be me.

----

The voyage to Utgard was long and unpleasant, but not as long or unpleasant as I had feared. My talents - with only a dash of extra magic - were sufficient to keep me clean, fed, and unbothered by malcontents throughout the journey. Scarcely any of what occurred on that stinking boat would be worth setting down here, and I have already (and mercifully) forgotten most of those dull, cramped, and sweaty weeks. The journey might have been more noteworthy had I gone ashore at any of our many stops, but I dared not set foot in Foundation territory, where my meager magical talents were more likely to be meet by torches and pitchforks than hero-worship. That is why I set my sights on Utgard, another Free City like Arnven, but at the opposite side of Foundation land, near Kannada. Like my own home, Utgard had (according to my education, at least) become much more accepting of folks with unusual capabilities than those lands still under the boot of the Overwatch Cardinals, in no small part because it had been occupied by the Chaos Insurrection during the Civil War. It was reputedly a wretched hive of scum and villainy for the same reason, but that just made it sound all the more filled with adventure.

There were one or two occasions when the crew became suspicious of me, not quite remembering how I&#39;d gotten onto the ship or if I&#39;d paid for the privilege, but each time I managed to disappear among the other dirty children or - with a bit of a mental nudge - convince the snooping sailors to stick their nautical noses elsewhere. Most of the other passengers were refugees, seeking a new life further from the menacing Thereven Horde. I was sure to steer clear of the few Arnven natives, lest I be recognized and my adventure cut embarrassingly short. Such an occurrence was probably unlikely, since I&#39;d had the good sense to exchange my princess gown for a more sensible (and less conspicuous) set of common clothes, but just to be on the safe side I borrowed a sailor&#39;s knife and hacked off most of my red hair. Now I was indistinguishable from any other street urchin, just as I had been before that whole princess business. It felt like coming home, in a way.

----

Utgard was different enough from Arnven to be exciting but not so dissimilar as to be discomforting. The buildings here were taller and closer together than those in Arnven, and in a different architectural style that included smaller windows and steeper roofs than I was used to. I found it quite quaint, and I spent many hours wandering these unfamiliar avenues, until I finally found myself on Shrine Street.

It was apparent that the saints of the Holy Foundation still held great sway here, but I saw that the saints revered in this land were not the same ones I had known growing up. Where Arnven had shrines to the oldest, greatest saints - hoary names like Clef, Gears, and Rights - Utgard venerated newer figures that had, in my education, always been portrayed as &#34;lesser&#34; or &#34;minor&#34;. I wandered for some time among these unfamiliar temples, marveling at the icons of these new saints.

An old man with wild, white hair stood before the temple of Saint Ibidus McMartyrdom, admonishing passerby with esoteric parables. A statue of Saint House, its marble polished whiter than new-fallen snow, held two six-sided dice in one hand and five playing cards in another. A wooden effigy of Saint Everwood, patron of diplomats, extended its single arm for a friendly handshake. Great torches blazed in the soot-stained stone hands of Saint Sinclair, butterflies danced in the gardens of Saint Kiryu, and street dogs ate greedily from the trough before Saint Crow&#39;s temple. There was even a small, empty shrine for Thorley, the patron saint of nothing.

Yet more than any of these, I was drawn to the shrine of Saint Talloran. This name alone was unfamiliar to me, and the temple seemed curiously deserted compared to the others. As I stepped through the darkened doorway, I found the cramped space within to be nearly empty. Its only furniture was a single crooked pew, and its only decoration was an immense, half-closed triptych almost wider than the building. The triptych&#39;s fine details were hard to discern in the chapel&#39;s dim light, and I felt myself drawn forward for a closer look.

I had seen many paintings in Arnven. The palace&#39;s cold stone walls were adorned with portraits of saints, heroes, and aristocrats, many of which felt strange and alien beneath layers of esoteric symbolism. On one of its outside walls, there was a massive, grotesque mural of the animal army&#39;s defeat by the valiant templars. The fierce, snarling jaws of the animals and the pained, bloody faces of their clawed and bitten victims always frightened me as a child. I had never expected to find a more upsetting painting, but that is exactly what the triptych of Saint Talloran was.

The interior panels were festooned with the figures of tiny people, and they were all suffering at the hands of monstrous creatures, nightmarish machines, and armies of faceless, inhuman soldiers. Minute, precise brush strokes highlighted a thousand different torments. People were skinned, burned, beheaded, devoured, and subjected to other processes that I would struggle to even describe. As I looked closer, with equal parts awe and disgust, I realized that all these miserable victims were in fact the same person, their image repeated over and over again. Was //this// Saint Talloran? What trials or deeds could such grotesquerie commend? Who could pray at the foot of such a nightmare?

These unspoken questions were answered by a man&#39;s voice.

&#34;I think you have the wrong James.&#34;

Badly startled, I whirled to face the speaker. He stood at the entrance to the shrine, nothing but a huge silhouette before the daylight of the street. He spoke calmly but confidently.

&#34;If you&#39;re looking for the patron of children, James the Younger is that way. This is James Talloran.&#34; He pointed at the horrid triptych behind me. I looked over my shoulder at it, then back to him.

&#34;Who is that?&#34;

The man tilted his head strangely. Was he surprised that I did not know the name? Or...disappointed? 

&#34;Some would say they are the greatest of the saints. Others, the least.&#34;

&#34;Why?&#34;

Instead of answering, the man stepped slowly into the shrine. As he approached, I could discern more of his appearance: a set of worn but expensive clothes, blond hair and beard short but well-groomed, and - I noted with surprise - a large, sheathed sword by his side. In Arnven, only guards and nobility were permitted to openly carry blades. Was this man a guard? Surely he would have worn armor, had he been on duty. Could he be a knight? I watched him curiously as he rounded the crooked pew and stood beside me before the triptych. His dark, haunted eyes surveyed it as he spoke.

&#34;In the days before the Great Breach, Saint Talloran was captured by one of the Expunged. It was a terrible creature, a monster so powerful that it could have destroyed the world. But first, it wanted to destroy Saint Talloran. It tortured them for eons, in ways that not even the madman who painted this triptych could have imagined. None had ever suffered as Talloran did, and I pray that none ever will. Yet despite their torment, despite the horror, Talloran triumphed. Not by might or guile, but by their unshakable iron will. They forced the Expunged to destroy itself, and in doing so saved the world from its ravages. But that victory came at the cost of Saint Talloran&#39;s own life, and so they became a martyr. They died in the dark, so that we might live in the light.&#34;

&#34;That&#39;s horrible!&#34; I gasped.

&#34;Yes,&#34; he agreed. &#34;It is.&#34;

I must have gaped up at him for several seconds before he spoke again. Still, he did not look at me.

&#34;Run along now, child. Your friends are at James the Younger&#39;s.&#34;

I needed no further persuasion, but found the door blocked when I turned to leave. While the knight was speaking, a fantastically old man with a heavy, gray coat, a long, gray beard, and a tall, gray hat had appeared in the entrance. I caught the old man&#39;s eyes - also gray - and he chuckled quietly.

&#34;Pardon me, young lady.&#34; Then, obligingly, he stepped aside. My eyes flicked back to the knight, but he still stood in silent contemplation of Saint Talloran&#39;s suffering. If he had noticed the old man, he gave no sign. Sensing that something was amiss, I scurried from the room as quickly as I dared. The old man eyed me closely - and I returned the favor - until I left the shrine and his sight.

I did not, however, leave earshot. Princesses have sharp ears, and urchins even sharper. As I listened by the shrine&#39;s high, tiny window, the knight was the first to speak.

&#34;Truly, today is a busy one. You and that girl make more visitors than this shrine has had all week.&#34;

&#34;I am no mere visitor.&#34; The old man&#39;s voice was dry with age, but clear nonetheless.

&#34;Then who are you?&#34;

&#34;Nobody of consequence.&#34;

&#34;Yet your words are heavy with it.&#34;

&#34;And this scroll is heavier still.&#34;

I heard the //click// of an opening lock and a deep, hollow //pop//. Then there came a rustle of parchment.

&#34;This,&#34; said the knight, surprised, &#34;is a Sacred Containment Procedure.&#34;

&#34;So it is.&#34;

For a long while, the knight read in silence. When he next spoke, there was hushed anger in his voice.

&#34;Do you understand what you are asking? This would be treason and heresy.&#34;

&#34;It would be the fulfillment of all that you have sworn to uphold. The purpose for which you have honed that iron will.&#34;

&#34;You must be mad! You must think that //I// am!&#34;

&#34;Perhaps. But if I am not, these tidings are dire indeed. And if //you// are not, I will see you at the sign of the Pinioned Pegasus come midnight.&#34;

&#34;You will not.&#34;

&#34;Perhaps.&#34;

I remained crouched below the window as the gray man left the shrine. I tried to follow him, but he became lost in the dense crowd almost immediately. I could not even spot the pointed tip of his towering hat - though, admittedly, this may have been a simple result of my own unimpressive height. I thought of returning to the shrine of Saint Talloran, in hopes of sneaking a peek at the gray man&#39;s mysterious missive, but I dared not do it. If he caught me, the knight would know that I had been spying on his secret and dangerous business. No good could come of that. Besides, there would be other opportunities to eavesdrop, if I could find the sign of the Pinioned Pegasus.

----

Under only my own power, it might have taken days to find a single tavern in a city of such size. Fortunately, I did not have to rely on only myself. I had only to find a member of the city guard, which was not difficult in the slightest. I approached him as he patrolled. He was alone; apparently Utgard&#39;s temple street is quite safe. He was a large man, maybe a bit more fat than muscle, but imposing nonetheless. A sizeable mace bobbed at his hip, its metal head sometimes thumping against the tops of his leather greaves as he patrolled. The weapon might&#39;ve scared some people, but I&#39;ve never been one to fear city guards.

&#34;Excuse me,&#34; I asked, trying my best to look like a lost, scared, child.

&#34;Oh, hullo,&#34; the guard grunted. &#34;Can I help you, little girl?&#34;

&#34;Do you know where the Pinioned Pegasus is? My dad said he&#39;d be waiting for me there.&#34;

From the way his face twisted, I knew that I had made a mistake. &#34;The Pegasus is no place for a girl.&#34; He said it with concern - perhaps passing judgement on my fictitious father - but also with suspicion. I recognized that tone; this was a man who&#39;d been fleeced by urchins before. Perhaps my old tricks were getting a bit //too// old. Ah, well. I had other ways.

&#34;Take me to the Pinioned Pegasus,&#34; I commanded, exchanging my false fear for a well-practiced nobility. Before the guard could wonder about the sudden change, the gray-green glimmer of my eyes had erased all questions from his mind.

&#34;Certainly, miss,&#34; he said, slowly, as if drunk. &#34;Right this way.&#34;

----

As we approached the [[[scp-042 |Pinioned Pegasus]]], I realized why the guard had been so reluctant to bring me there. It crouched on a corner three blocks from the docks, and was accordingly patronized by sailors, whores, smugglers, and other unsavory characters. I supposed that was unsurprising; with the apparent secrecy of the gray man&#39;s mission, it would only make sense to meet outside the attention of upstanding folks. Some of the nastier people eyed me with ill intent, but my armed escort dissuaded any further mischief.

&#34;Here we are,&#34; the guard said, still sounding a bit dazed. &#34;The Pinioned Pegasus.&#34; With one large hand, he pointed to the tavern&#39;s painted sign: a starved, miserable-looking white horse with the bloody stumps of wings sticking out of its shoulders. It was dreadfully tasteless, but I suppose the place&#39;s proprietor wanted his patrons to know what they were getting into.

&#34;Thank you very much,&#34; I said, curtsying out of habit, even though I&#39;d long since swapped my skirt for trousers. &#34;Now go back to patrolling, or whatever it is you were doing.&#34;

&#34;Yes&#39;m,&#34; he grunted, absently saluting before he wandered off. I had thought about retaining him for the rest of the night, just to keep the creeps at bay, but I&#39;d begun to worry that he&#39;d suffer for it if I kept him from his job for too long. Besides, I can take care of myself.

Still, though, maybe it would be a good idea to lay low somewhere safer, at least until the time to meet with the mysterious man came closer. Now that I knew where it was, it&#39;d be easy to find my way back. Besides, it&#39;d be boring to waste my time sitting around in there all day when there was a whole city to explore! There had to be something else interesting nearby.

And so there was; just a way down the street, I stumbled across a small, dingy shop whose faded sign read &#34;apothecary by dado&#34;. I didn&#39;t see anyone behind its grimy windows, which would make it the perfect place to kill some time. A tiny bell tinkled as I stepped inside. Though the shop was scarcely wide enough for two men to stand abreast, it was very deep, almost more like a long hallway than a proper room. Both walls were lined with rickety shelves, each piled precariously high with vials, beakers, jars, and bottles of every conceivable shape and size, filled with liquids of every conceivable color and consistency. One especially large bottle of water had a centimeter of sand accumulated at the bottom and a small wave sloshing back and forth at the top. Another seemed to be boiling, despite the tiny cubes of ice floating in it. One contained some kind of pickled worm, gently curling and uncurling in the yellow fluid. A fat jar of green jelly even seemed to have a goat&#39;s eyeball suspended in it. Curiously, I raised my finger to tap the glass. I had the inexplicable sense that, if I did so, that eye would turn to look at me, and in it I would see...

&#34;no touch!&#34; someone yelled. I jumped, almost toppling three different things in the process. The shout had come from the back of the store, where a small, bizarrely dressed man had appeared behind the counter. The apothecary was wearing too many clothes to count, layered over each other and with so many patches and holes it was hard to be sure that there even was a person underneath. Even his face was covered, by a star-spangled pointy hat so large its brim had slipped down to his shoulders. As I gaped at this lunatic, wondering vaguely where he&#39;d come from, he cleared his throat and tried again.

&#34;hello and welcome to fine dado emporium of potion, poultice, and parmaceutical!&#34; His buzzing voice was a baffling mix of unidentifiable accents, and also quite loud; I was grateful for the muffling effect of his ridiculously oversized hat. &#34;what fine product can dado sell you today?&#34;

&#34;Um,&#34; I began, but &#34;dado&#34; had not even paused for breath.

&#34;you are adventuring type, yes? traveling to far off land and fighting the martian card shark?&#34;

&#34;What?&#34;

&#34;excellent! dado have just thing.&#34; He produced a small wooden box, seemingly from thin air, and dropped it with an alarming plunk on the counter. It popped open immediately, revealing a collection of twenty-some little glass vials. &#34;this fine dado product is ultimate apothecary collection. here have heel potion, invisible potion, tiny potion, tough potion, strong potion, speed potion, youth potion, you name it, dado have it, no refunds!&#34; He loudly snapped the lid shut again and thrust it at me, though I was still a good three meters away.

&#34;Who //are// you?&#34; I asked. I wanted to ask how he&#39;d even managed to get behind the counter, since there weren&#39;t any doors back there and it spanned the whole width of the room. Did he just crouch down back there when not serving a customer?

&#34;dado!&#34; he answered, with exasperation. &#34;is in name of store!&#34;

&#34;Oh,&#34; I said, lamely. &#34;Right.&#34;

&#34;now, is you be buying fine dado product or no?&#34;

&#34;Um.&#34; I looked haplessly at his bizarre wares. &#34;What do they do?&#34;

He opened the &#34;ultimate apothecary collection&#34; again. &#34;this one make wound heel, this one invisible, this one tiny, this one-&#34;

&#34;Alright, alright!&#34; I said. Something about his voice was giving me a headache.

&#34;alright what? u buy?&#34;

&#34;Uh...&#34; I hadn&#39;t the slightest compunctions about theft, of course, nor any particular interest in potion, poultice, or &#34;parmeceutical,&#34; but this strange little man and his strange little shop had piqued my curiosity. And, I suppose, unnerved me a bit...perhaps I had better pay, just to be safe.

&#34;Sure,&#34; I said, hesitantly.

&#34;excellent! full collection will cost u...&#34; he pulled some weird rectangle out of his sleeve, manically poked at it, and tucked it back away before I could even get a good look. &#34;ten thousand gold coin!&#34;

&#34;That&#39;s outrageous!&#34;

&#34;is fine dado product! no sell cheap knock off like geese burner or overprice slop like amber breast haunt. also not sell food like those place but that beside point! all fine dado product come with u trust dado guarantee, if not work, not dado!&#34;

I blinked at him. Was there some kind of toxic gas leaking from one of those vials?

&#34;Look,&#34; I groaned, rubbing my head. &#34;I don&#39;t have ten thousand gold pieces. I can give you fifty, tops.&#34;

&#34;fifty top what?&#34;

&#34;What?&#34;

&#34;oh, fifty gold piece. dado understand.&#34;

&#34;So what can I get for that?&#34;

&#34;dado give you...three heel potion!&#34;

&#34;Okay, fine. Three &#39;heel&#39; potion.&#34;

&#34;excellent! money please.&#34;

Grumbling, I rummaged around in my pockets for some the coins I&#39;d liberated from the pockets of passerby since my arrival. I had to fish some out of my personal stash too, but at that point I was just trying to get this interaction over with. I slammed the money on the counter with as much attitude as felt safe. To my astonishment, some kind of giant piebald mouse scurried out of dado&#39;s sleeve and started biting each individual piece, as if to make sure it was really gold.

&#34;What is that?!&#34;

&#34;is best friend and familiar robert mitchell. he do dado money count.&#34;

I shook my head. Surely every merchant in Utgard couldn&#39;t be like this. &#34;Just give me my potions.&#34;

&#34;here go!&#34; dado said, passing me an even smaller wooden case, small enough to fit in my hand. I popped the lid off and saw three tiny vials of what looked an awful lot like blood.

&#34;Is this blood?&#34;

&#34;is heel potion. u trust dado.&#34;

Frankly, I didn&#39;t trust this strange creature any further than I could&#39;ve thrown his weird money-counting rat. But, if it would get me out of his dirty, weird-smelling shop, it was worth it.

&#34;Fine.&#34; Then I took my potions and left.

----

After that misadventure, I concluded that continuing to explore might be more dangerous (or at least more expensive) than hanging out in the Pinioned Pegasus after all, so I made my way back over there. I got some funny looks when I walked into that den of iniquity all by myself, but it only took a little bit of magical menace to tell these reprobates that I wasn&#39;t worth messing with. They might not have known it, but I made them //feel// I was dangerous, and that was enough to get the point across. Heedless of these onlookers, I made my way to the bar. It was time to eat something other than hardtack. The bartender seemed perturbed by my presence, but not so much so that he turned down my coin. I could&#39;ve simply made him give me the food (or covertly stolen it from a few feet away), but I saw no reason to do so if, for once in my life, I really did have the money. The meat pies he brought me were dreadfully lukewarm, but far better than hardtack at least. My belly thus full, I found an unoccupied corner and settled into it. There, I drew the shadows a tad tighter around myself, hoping to slip from everyone&#39;s sight. This was a trick I&#39;d done often in my urchin days, and more than once when sneaking around (or out of) the castle. It seemed to work just as well here, since no one looked at me again. Now I had time to look at them.

Most of the patrons were the same unsavory sorts that prowled the rest of this district. Grizzled sailors with lurid tattoos of Finnfolk and sea monsters lined the bar. Scarred criminals with shifty eyes and concealed weapons played cards and dice for stolen goods. A crowd of young men huddled around a hookah, following the smoke to the riff-filled land. Women of the night made the rounds, tempting the lot of them with a quick trip to the rooms upstairs. On a small stage opposite the fireplace, three minstrels performed an Ancient musical epic, something about the &#34;[[[scp-2112 |Temples of Syrinx]]]&#34;. But even among this colorful cacophony, there were people who stood out.

In front of the fireplace, there sat a thin man in striking, deep green robes trimmed with gold. He had the hood pulled over his head, which looked to be bald despite the well-manicured beard and mustache on his face. He was trying to focus on a large book open on his lap, but he kept glancing up disdainfully at the noisier patrons.

The loudest among them was the resident champion arm-wrestler, a massive brute who had to have been part orc. He was well over 2 meters tall, with long-fingered hands and bare feet even larger than would&#39;ve seemed normal at that size. Where they protruded from his brightly-colored clothes - clearly stitched together from multiple smaller garments - his musclebound limbs were nearly covered in thick brown hair. A shaggy mane of the same surrounded his long face, which bore dark eyes set deep beneath a heavy brow, to either side of an upturned, squashed-looking nose. He smiled as another opponent succumbed to his superior strength, revealing unusually long canine teeth. Someone cheered from across the room, and the wrestler raised his tankard in appreciation.

The cheering had come from a handsome (though rather short) scoundrel with a dark red cape, who was making quite a show of himself by doing (admittedly impressive) trick shots with darts. There wasn&#39;t anyone playing against him, for there clearly would&#39;ve been no point, but several women had gathered around him to either express admiration or feign it. From the way this rogue was handling these women, I got the impression that they feigned quite a lot of things for his coin. That must&#39;ve meant he had a lot of it, though he certainly didn&#39;t look like the kind of man who comes by wealth honestly. His black hair was pulled back in a respectable ponytail, revealing a handsome but scarred face and, I realized, the notched left ear of a D-caste. Arnven had become something of a safe haven for escaped slaves since its separation from the Foundation, and the same was clearly true of Utgard if this man was able to display his fugitive status so proudly. I respected the attitude. Still, though...there was something predatory in his shining smile. Something that made those half-dozen gold teeth far more menacing than his muscular friend&#39;s fangs.

I did not, however, see any sign of the knight Horatius. Maybe he really had chickened out. Maybe an upstanding, honorable man like him just didn&#39;t want to be seen in a place like this. Yet even as this thought crossed my mind, I saw a vaguely familiar silhouette slip through the tavern door. He had tried to hide himself under a hooded cloak, but Horatius&#39;s stiff posture and hard features were unmistakable. He crossed the room to settle at the bar, whose tender he waved wordlessly away.

For perhaps an hour, I kept my eyes on these four characters and the other folks around. The wrestler and the darts player eventually finished their respective games, then settled into a corner together with several women and many drinks. The other two kept at their sulking, despite the bartender&#39;s increasingly irritated insistence that Horatius either order something or get out of the way. There was no need for him to move, though, not really. In fact, it was a beginning to seem a bit odd, just how few people were left in there. Without my noticing - or, seemingly, anyone else&#39;s - the crowd had been slowly but surely filing out, some even leaving their games and drinks unfinished. The minstrels finished their performance, then even they stepped out. Without the music, it was suddenly very, very quiet. The back door squeaked as the bartender retreated, leaving the five of us alone with the crackling fire.

Then someone clapped loudly, and we all jumped a little. That someone, of course, was the strange old man from the shrine, who had seemingly appeared from thin air near the hookah.

&#34;All right,&#34; he said, his dusty voice disarmingly cheerful, &#34;let&#39;s get down to business.&#34; He took a seat at the largest table in the room, beckoning the others to join him. With universal reluctance, they did so.

&#34;Who are these ruffians?&#34; Horatius asked, eyeing the wrestler and dart-thrower suspiciously. The latter of them answered for both, though he looked a bit offended by having to do so.

&#34;I am Perrin the Badger, and this is my partner Arcos the Hammer. We&#39;re the finest thieves and warriors in the North! //Surely// you&#39;ve heard of us.&#34;

&#34;The Badger?&#34; Horatius scoffed.

&#34;Yeah,&#34; Perrin said, with a gleaming grin. &#34;Cuz I&#39;m little, but I&#39;ll kill ya.&#34;

&#34;And who are you,&#34; Arcos rumbled, &#34;that can call us &#39;ruffians&#39; in a place like this?&#34;

Horatius lowered his hood and proudly raised his head. &#34;I am Horatius, last Knight of the Order of Saint Talloran.&#34;

Perrin glared at the old man. &#34;Are you trying to get us arrested?&#34;

&#34;Fear not,&#34; Horatius said. &#34;I have no authority to bring you in, nor would I risk my own hide in Foundation territory just to do so.&#34;

&#34;Risk your...oh, //Talloran//. You&#39;re one of those excommunicated freaks.&#34;

Horatius glowered at him but did not challenge the assertion. Instead, he changed the subject.

&#34;And you?&#34; he asked, indicating the bald man. &#34;You wear the robes of the Serpent&#39;s Hand.&#34;

&#34;Indeed,&#34; the man agreed, without looking up from his tome. &#34;I am Moritz, an adept wizard of that very order. And I must say, I find it quite odd that we all share a mutual acquaintance.&#34; At that, he loudly closed the book and looked at the old man. &#34;I don&#39;t suppose he has told any of you his name?&#34;

Suspicious and curious looks were exchanged. Apparently, he had not. The old man chuckled.

&#34;You may call me Nobody, if you must. Now, let us talk business.&#34;

At that, &#34;Nobody&#34; removed a huge map from some interior pocket of that enormous coat and spread it out on the table. The paper was strangely shiny, and the unfamiliar landmass depicted thereon was nearly obscured by multicolored lines and scribbles in the Ancient letters.

&#34;That&#39;s Uk,&#34; Moritz said, matter-of-factly.

&#34;Uk?&#34; Perrin repeated. &#34;The legendary cursed island on the other side of the ocean?&#34;

&#34;That&#39;s the one.&#34;

&#34;Surely you don&#39;t expect us to go there.&#34;

Nobody took a contemplative puff from his pipe.

&#34;Saints, you do!&#34;

&#34;That&#39;s impossible,&#34; Moritz protested. &#34;Nobody&#39;s crossed the ocean in centuries.&#34;

Nobody smiled slightly. &#34;What if I told you that I knew a shortcut?&#34;

&#34;I&#39;d call you a liar. Or a lunatic.&#34;

&#34;But I do know a shrotcut. Tell me, Mortiz, does the name &#39;Portland&#39; mean anything to you?&#34;

His eyes widened.

&#39;What?&#34; Perrin asked, looking between the two of them. Moritz answered.

&#34;It&#39;s supposed to be a city between cities, sort of a secret world that connected three different places with the same name. One of them was in Uk.&#34;

&#34;And one of them is now called Utgard,&#34; Nobody finished.

&#34;But Portland was destroyed in the Great Breach, like all the cities of the Ancients. Wasn&#39;t it?&#34;

&#34;Not quite. I imagine that it&#39;s been empty for quite some time, but when I crept into Porthead Lighthouse last night I could still detect the Way. Just barely.&#34;

&#34;A working Way? So long after the Great Breach?&#34;

&#34;That&#39;s right. But I&#39;ll need your help to open it.&#34;

Perrin cut back in. &#34;Hey, uh, can we back up for a moment? Assuming this shortcut of yours does exist, what exactly do you expect us to do on the other side?&#34;

&#34;Kill a dragon.&#34;

There were several seconds of stunned silence.

&#34;I&#39;m sorry,&#34; Perrin said, half laughing, &#34;what?&#34;

&#34;Marscar the Dark. The three-headed wyrm said to guard all the lost treasures of the Ancients, deep within an underground city at the heart of Uk.&#34;

&#34;I know the story. I just can&#39;t believe you want to fight it.&#34;

&#34;Marscar is...an old enemy of mine. I&#39;d like that score settled.&#34;

&#34;Even if that wasn&#39;t complete nonsense, it would still sound like a personal problem. Why involve us?&#34;

&#34;I can&#39;t very well kill a dragon by muself.&#34;

&#34;And you think we can? Look, buddy, I&#39;m just an opportunist. I deal with people, not the Expunged.&#34;

&#34;And you also deal in small change, by the look of you.&#34;

Perrin bristled. &#34;What&#39;s that supposed to mean?&#34;

&#34;No insult. Merely an incentive - for I want no part of the dragon&#39;s treasure, only to see it slain. The rest of its legendary hoard is all yours.&#34; He gestured to include the whole group. &#34;And I&#39;d be happy to provide a sizable &#39;down payment,&#39; as it were.&#34;

&#34;We are a bit low on cash,&#34; Arcos confessed.

&#34;Not //that// low!&#34;

&#34;And it might be wise to get out of town for a bit, after that fiasco with the apple merchant.&#34;

&#34;They can&#39;t prove anything!&#34;

&#34;And think what fun it&#39;d be! No one alive has seen that land.&#34;

&#34;There&#39;s a reason for that!&#34;

&#34;And the fame! Imagine the stories we could tell.&#34;

Perrin didn&#39;t have a comeback for that one. He spent a while trying to come up with one, then decided to switch tracks and argue with the knight instead.

&#34;What&#39;s //your// deal?&#34; pointing at Horatius. &#34;You&#39;re no mercenary.&#34;

&#34;I will restore the honor of my order with a trial of courage and endurance, as is customary.&#34;

Perrin gave a mean laugh. &#34;What, you can&#39;t whip your way out of this one?&#34;

Horatius scowled. &#34;I mortify for strength, not penance.&#34;

&#34;Don&#39;t you do drugs, too?&#34;

&#34;Suffering strengthens the spirit.&#34;

Perrin shook his head.

&#34;No wonder you guys are heretics. What about you, wizard? What ridiculous thing are you chasing?&#34;

&#34;No one has been to Uk in eight centuries. If Marscar the Dark really does hold the wealth of the Ancients, in one of their cities no less, much lost knowledge stands to be found.&#34;

Perrin looked around the table, perhaps realizing for the first time that everyone else had already made up their minds. They were staring at him.

&#34;You&#39;re all crazy.&#34;

&#34;I tire of your false cowardice, Perrin. You and Arcos have done far more outlandish things than this.&#34;

&#34;Nothing is more outlandish than this.&#34;

&#34;Not stealing the Jaded Ring from Monastery-19? Not robbing the baron of Migolton? Not returning alive from the rusted dungeons of the Forge? And you, Arcos. Have you //ever// been bested in combat?&#34;

&#34;Only by this one,&#34; he said, winking at Perrin, &#34;and only because I was very, very drunk.&#34;

&#34;And Horatius, how many Expunged have you slain? How many battles have you won against pirates, cultists, and marauders? Did you not lead the Mobile Legion that drove the Cult of Cool from Durgeth? Did you not single-handedly vanquish the Voice-Stealers of Crimson Cave?&#34;

&#34;That was a long time ago.&#34;

&#34;But you are no less capable now. I know a Talloranite would never let something so trivial as age weaken his body or his spirit.&#34;

&#34;What of me?&#34; Moritz asked, skeptically. &#34;I have no heroic deeds of which to boast.&#34;

&#34;You,&#34; Nobody said, pointing at him, &#34;are the most powerful wizard in Utgard, are you not? Three decades of study under L.S. themself?&#34;

&#34;That much is true, but scholarly magic-&#34;

&#34;Scholarly! Mortiz, I have seen you call down bolts of lightning for //dramatic effect//. I can&#39;t imagine what you could do if you actually intended to kill someone. Look me in the eyes and tell me that you could not immolate me with a word.&#34;

&#34;That would be one of the less efficient ways, but yes, I could.&#34;

&#34;What&#39;s the efficient way?&#34; Perrin wondered, skeptically.

&#34;A staff upside the head, usually.&#34;

Arcos chuckled. &#34;I like you, wizard.&#34;

&#34;You know,&#34; Perrin said, &#34;I think we may be overlooking the biggest question here, that being how //you// intend to contribute to all this. I still don&#39;t believe that you&#39;ve somehow got a personal rivalry with an 800-year-old dragon on the other side of the ocean, and I certainly don&#39;t think your parents were cruel enough to name you Nobody.&#34;

Nobody puffed inscrutably at his pipe. &#34;My past is irrelevant, for the amount of coin you&#39;re getting. It is enough that you know I am a master of arms, and that I have more tricks up my sleeve than you have pulled in your entire lifetime.&#34;

&#34;That isn&#39;t exactly reassuring.&#34;

&#34;It was not intended to be,&#34; Nobody said, glowering. He didn&#39;t actually seem to move, but some subtle shift of his posture suddenly made it very apparent just how large the man under that bulky coat was. &#34;I am hiring you to kill a dragon, not ask me a thousand questions.&#34;

&#34;You&#39;re asking us to die for you.&#34;

&#34;I&#39;m asking you to become legends,&#34; Nobody responded. &#34;This will be the greatest deed ever done, and you will be the richest men alive. Of course such a thing is not without risk. If it were not so difficult, it would have already been done. What would you do instead? Try your luck with the city guard until they run you out or string you up? Such things are beneath you. The five people at this table are the most capable fighters in the North, and quite possibly all the world. If anyone has ever stood a chance of slaying a dragon, it is us.&#34;

&#34;Come on, Perrin,&#34; Arcos urged, nudging his friend with one elbow. &#34;You know you want to.&#34;

Perrin did his best to maintain a scowl, but a sneaky smile crept onto his face anyway.

&#34;Fine. I&#39;ll be crazy too. But I&#39;m taking a double share of that treasure.&#34;

&#34;Excellent! Although, there is one other thing.&#34;

&#34;Of course there is. What?&#34;

He leaned in. &#34;I think it would be best if we kept this little endeavor between us. We don&#39;t want competitors lining up to rob us when we return.&#34;

&#34;Why not bring them along?&#34; Arcos asked, half-joking. &#34;As it stands we barely outnumber the dragon&#39;s heads. Should be plenty of gold to go around, shouldn&#39;t there?&#34;

Nobody shook his head. &#34;Marscar the Dark will not be slain by force of arms. It will take courage and cleverness, which runs far stronger in a small band of...characters like yourselves than in any army.&#34;

&#34;Thanks,&#34; Perrin said. &#34;I think.&#34;

&#34;You really want us to keep this quiet?&#34; Arcos asked.

&#34;If at all you can.&#34;

&#34;Then we had best do something about that girl.&#34; Then he jutted his thumb right at me. I was so surprised that I briefly froze, giving the other ones ample time to spot me as well. I must have been so focused on eavesdropping that I let my shroud slip. The knight stood up - perhaps recognizing me from earlier - and startled me into motion. I ran for the door, only for Nobody to reach out with a surprisingly long arm and grab one of my own.

&#34;Not so fast, young one. Who are you?&#34;

&#34;Nobody.&#34;

He chuckled. &#34;No, that&#39;s me.&#34;

This was far from the first time someone had tried to stop me getting away. Usually, all it took was a strong push to make them let go. I sent a wave of green energy Nobody&#39;s way, but he swatted it aside with his other hand. I was flabbergasted; no one had ever done that before.

&#34;Oho. No, you aren&#39;t nobody at all. Why were you spying on us?&#34;

&#34;I was just curious! I heard you talking and-&#34;

&#34;You followed us all the way from the Street of Shrines,&#34; the knight interrupted. &#34;You listened in on my conversation with Nobody, didn&#39;t you?&#34;

There was no use denying it, though he did have one of the facts wrong. &#34;Actually, I beat you here and waited.&#34;

&#34;Why?&#34;

&#34;Like I said, I was just curious! Now let go of me!&#34; I laced my words with a touch of sorcery, hoping to persuade Nobody as I had the guard who led me here, but it didn&#39;t seem to work on him.

Nobody squinted at me. &#34;Who are you, little sorcerer?&#34; he asked again. &#34;You look like a common urchin, but you talk like one with authority.&#34;

&#34;That&#39;s none of your concern!&#34; I said, still trying to wriggle out of his iron grip. Who was this strange man, that he could shake off all my tricks?

&#34;Oh, but I&#39;m afraid it is. I can&#39;t have you telling people about our impending adventure.&#34;

&#34;I won&#39;t tell anybody!&#34; I snapped. &#34;Who&#39;d even care about a bunch of crazy people getting themselves killed anyway?&#34;

Perrin, laughed. &#34;Kid&#39;s got a point.&#34;

&#34;Besides,&#34; added Moritz, sounding just as concerned as he looked. &#34;How could we stop her?&#34;

&#34;We could turn her over to the guard,&#34; Horatius suggested. &#34;I&#39;m sure she&#39;s got some stolen goods.&#34;

&#34;I&#39;m no snitch,&#34; Perrin said, glaring at him.

&#34;And you&#39;d better not be, either,&#34; Arcos warned, sitting up a little straighter to emphasize how much taller than the knight he was.

Horatius raised his hands apologetically and backed off.

&#34;I could always...&#34; Perrin said, tracing a finger across his throat.

&#34;No!&#34; Horatius cried, horrified.

&#34;Saints, Perrin!&#34; Arcos scolded.

&#34;What is wrong with you?!&#34; Moritz exclaimed.

&#34;Relax!&#34; he said, feigning offense. &#34;I was joking. Not gonna kill a kid.&#34; The warning glare he sent me suggested that he wasn&#39;t entirely sure about that...or that he was just trying to scare me. That&#39;s never worked for anyone.

&#34;I&#39;m not afraid of you,&#34; I said. &#34;And I&#39;m not a kid!&#34; I tried to jerk away from Nobody again, but his grip was strong as ever.

&#34;Hmm,&#34; Moritz mused, &#34;but you do look like one. Honestly, I don&#39;t think anyone would believe her even if she did try to tell people what we&#39;re up to. What would you think if some street urchin told you five lunatics were taking a magic shortcut across the ocean to kill a dragon?&#34;

&#34;I&#39;d think she was conning me somehow,&#34; Perrin said. &#34;Not very well, either.&#34;

&#34;See?&#34; I agreed. &#34;Your secret is safe with me. Now let go!&#34;

Surprisingly, Nobody did. &#34;Alright, young sorcerer. You&#39;ve convinced me. Now get out of here.&#34;

Indignantly, I straightened my sleeve where all that grabbing and wriggling had disrupted it. I wanted to run, but that would&#39;ve given them the impression that they&#39;d scared me. Instead, I held my head high and marched out with as much authority as I could measure.

&#34;What an odd child,&#34; I heard Moritz say.

&#34;Indeed,&#34; Nobody mused.

----

This time, I really did intend to leave. I faded into the settling darkness, until I doubted that even that unusually perceptive orc could&#39;ve spotted me. The dark was accompanied by cold, which reminded me that I didn&#39;t have any lodgings for the night. I&#39;d known that Utgard would be chillier than Arnven, but I suppose I had underestimated just how severe that temperature difference might get. The simplest solution would&#39;ve been to go back in the Pegasus and rent myself a room, using gold and magic to smooth over any suspicion thus created, but I certainly couldn&#39;t do that while Nobody and his crew of weirdos were still about. Even once they left, it&#39;d still be a risk - bad things tend to happen to young girls who sleep alone in strange places.

Then again, anywhere in this foreign city would be strange. The quaintness of Utgard&#39;s unfamiliar architecture had departed with the sun; now the dark lent a subtle menace to those tall, pointed buildings and their tiny, barred windows. Perhaps I would be root out a hidey-hole somewhere dry and relatively warm, but if this place was anything like my own city, most such spots would already be full of other street people. If any of them were even half as dangerous as me, that might be even riskier than the inn. It would certainly be less comfortable. In the past, I had sometimes weathered cold nights by sneaking into the attics or basements of houses, which as an extra benefit often contained a few easily-missed valuables. The houses here seemed to have bars on their windows, though, and I had neither the time nor the patience to fool with that. I supposed there must be some nice stables somewhere, and out on the edge of town I might even find a barn where I could cuddle up with a flock of fluffy sheep. I&#39;d smell rather interesting the next morning, but there&#39;s nothing warmer than wool and I&#39;ve always gotten along with animals anyway. Still, though, the edge of a city this big would be a pretty long walk away - and depending on how this particular city-state had drawn its borders, might fall under Foundation jurisdiction. That&#39;s not something I could afford to tangle with.

I wrapped my arms around me for warmth and looked distastefully back at the bar. There was a huge, blazing fireplace in there. Who did that bunch think they were, running me off like that? Well, I suppose that I left of my own accord, but only because they were being so unneccesarily cagey about their stupid plan. Who was going to care about their ridiculous quest through some long-abandoned Ancient city, probably full of cursed treasure and terrible monsters, to a distant and mysterious island that no one had set foot on in centuries, where they were going to do heroic battle with the most legendary creature of all, in search of wealth and fame beyond imagining? Ridiculous. You&#39;d have to be crazy to do something like that. Crazy.

Although, if you did do something like that, the cozy little shrine that you seemed to be the sole minder of, and which nobody ever visited, would likely sit empty and closed for quite a while, and it&#39;d be pretty warm and safe in there too. With a devious grin on my face, I set off for Shrine Street.

The crowds there were thinner at night, and some of the temples had already closed their doors. Some street people had congregated around Saint Sinclair&#39;s statue to warm up in the heat of those everburning torches, but I decided to leave them be. Your first night in an unfamiliar city is no time to start making introductions. I did stop to pet some of the dogs dozing in front of Saint Crow&#39;s, though. Horatius had locked Saint Talloran&#39;s behind him, but I&#39;m not the kind of person who needs keys. The place was just as it had been earlier. There wasn&#39;t anything particularly soft on hand, but there was just enough space for me to lie down on that crooked pew, which I went to the trouble of straightening as a vague sort of apology. I called up a little ball of green flame, which I held for a while to drive out the cold of the streets.

As its light banished the deepening darkness, my little fire also brought that hideous triptych back into view. I tried to ignore it, but nothing else in the room was even remotely interesting. I could not help but approach, with a sick sort of fascination. The nightmare landscape of Saint Talloran&#39;s suffering looked positively ghoulish in the green glow. They were tied to a tree and pierced with a hundred arrows. They were eaten alive by armor-plated wolves. They melted into a puddle of screaming flesh. They were torn limb-from-limb by a giant, disembodied heart with arachnid limbs and bladed tentacles. They flayed themself alive with rusty knives. They disintegrated into a swarm of bees. They-

My light went out, and it was a relief. I could only give myself nightmares, staring at something like that. I shuffled back over to the pew, scarfed a chunk of cheese I&#39;d borrowed from the Pegasus, and settled down on my backpack for a pillow.

I closed my eyes.

And waited.

And waited.

And waited.

This pew was dreadfully uncomfortable. How could people be expected to sit there in meditative contemplation of Saint Talloran&#39;s suffering without a single cushion? Well, if Horatius really did whip himself, he probably didn&#39;t mind a hard seat all that much. But I certainly did, especially with all the lumps and bumps in my impromptu pillow. Maybe I should&#39;ve grabbed more linens and fewer valuables on my way out...

Saints, had I really gone so soft? I was a street kid! I&#39;d done this - and much worse than this - for almost half my life! But the other half had been more recent, and it had also been a lot softer and warmer.

I groaned and rubbed my eyes. I could easily send others to sleep with my sorcery, but it would be dangerous and stupid to point something like that at myself. Counting sheep only reminded me how much warmer and softer they were than my actual surroundings. I was far too old (or, perhaps, too proud) to tell myself the old bedtime stories of King Collector and the Small Sirs, but mentally reciting the few Sacred Procedures I knew was more boring than relaxing, and doing the same with stories of the Witch only made me homesi-

Saints, I really had lost my edge. The thought of missing that stupid, oppressive, too-fancy, too-big, well-staffed, food-filled, comfy, and warm house in Arnven made me so angry that I got up to pace. Maybe if I tired myself out I&#39;d be able to sleep.

Almost immediately, I stubbed my toe on the edge of the pew. Swearing in a most unladlylike fashion, I tipped it over with a burst of green energy. The flash lit up that wretched triptych again, and I thought about knocking it over too, or at least closing the damn thing. At least then I wouldn&#39;t feel it staring at me while I was pretending to try to sleep. Not a bad idea, actually.

The side panels swung shut easily enough, and I leaned it back against the wall with a begrudging carefulness. Couldn&#39;t have it falling on me in my sleep, which I certainly wouldn&#39;t have put past that Redaction-worthy abomination of wood and paint. As I closed it, though, I realized that I&#39;d never seen the exterior panels. Cursed, as always, by my own curiosity, I brought back my little ball of flame to see if the outside was any less disgusting than the inside. I&#39;m not sure what I expected, but it&#39;s not what I found.

Instead of the myriad tiny figures of the inside, the outer panels showed two life-sized people. The one on the right was Saint Talloran, though the smile upon their face might&#39;ve stopped me from recognizing it if not for the terrible scars. Talloran was shown in profile, looking up at the figure on the left side. I didn&#39;t recognize this one, though he wore the armor of a knight. The two clasped hands where the panels opened, gazing lovingly into each other&#39;s eyes while three crescent moons shone overhead. Oh, so this was Corbenic. Saint Talloran was reuniting with...somebody in the afterlife. I&#39;d have to ask Horatius who that was supposed to be, when I saw him again.

When? What did I mean, when?! He was going to tromp off through that lost city tomorrow and get himself killed fighting a dragon, and I was going to clear out of this ghastly shrine in the morning to go buy myself some more food, then maybe pick enough pockets and pinch enough purses to buy a proper room at some place I wasn&#39;t likely to get press-ganged. Then I&#39;d link up with the local thieves&#39; guild, for surely there was one in a city like this, and get back to my element. Yes, my difficult, dangerous, dirty, stinky element. That I had fled back to from the cushy life of a princess. Yes.

...

Fuck.

Saints, what had I been thinking?! Was I really so averse to responsibility that I&#39;d willingly dove headfirst back into the hard-knock life? How had the sheer idiocy of this decision not occurred to me until now? I hadn&#39;t minded the ship trip, at least not like this, because at least then I had been //going// somewhere, but now I was about to settle down again in a tangibly worse situation! Had I really been so stifled in that pretty palace that I&#39;d mistaken hardship for adventure?

Hmm. Adventure...

----

Porthead Light was an //old// lighthouse. It perched on a rocky headland at Utgard&#39;s southern fringe, waggling at the ocean like an old crone&#39;s crooked finger. Every building within a block was empty, and the relentless salty wind had almost knocked some of them down. The keeper&#39;s house attached to the tower&#39;s base was in only marginally better condition, and I wondered if anyone even lived there anymore. Surely they still needed this light, didn&#39;t they? Maybe someone came in from elsewhere to light it at night. It certainly wasn&#39;t lit on that gray and clammy afternoon, though. When Nobody and his band arrived at Porthead Light with their bulky bags and laden pack-mule, the only person waiting for them was me. I was leaning against the side of the lightkeeper&#39;s house, smiling smugly.

Perrin groaned. &#34;Didn&#39;t we tell you to get lost?&#34;

&#34;I&#39;m coming with you,&#34; I said, matter-of-factly.

&#34;No,&#34; Moritz said, shaking his head.

&#34;You can&#39;t be serious,&#34; Perrin said.

&#34;Absolutely not!&#34; Horatius protested.

&#34;It&#39;s too dangerous,&#34; Arcos said, genuine concern touching his hard features.

The mule snorted dismissively.

Nobody just looked at me curiously.

&#34;I can take care of myself,&#34; I said, standing proudly.

&#34;Don&#39;t be ridiculous,&#34; Perrin said, reaching for the door. I tried to block him, and he tried to shove me aside. He wasn&#39;t being unneccesarily rough, but if these ruffians wanted a demonstration of my capabilities, that&#39;s what they&#39;d get.

&#34;//Get away from me//,&#34; I commanded, eyes flashing green. Without even thinking about it, Perrin let go my shoulder and stumbled back into Arcos. He looked around dazed for a moment, then settled on an angry glare.

Moritz sighed and waved his staff. An unseen force slid me several meters to the right, and I almost lost my own balance. Horatius went for the now-unblocked door, and I once again tried to interpose myself. He reached out to block me, but I sent out a burst of green energy to knock him away. I might&#39;ve put a little more //oomph// into it than I really meant to, because I ended up knocking him on his butt instead. I started to taunt him, but then a huge hand grabbed the back of my shirt and hoisted me into the air.

&#34;Alright,&#34; Arcos said, &#34;that&#39;s enough.&#34; I was about to blast him too when Nobody cut in.

&#34;It&#39;s alright, Arcos. Set her down.&#34; Begrudgingly, he did so. Nobody approached me, hands in the pockets of his enormous coat.

&#34;Tell me, child, do you really think you could handle a quest like this? These men are masters of their crafts. What have you to offer beyond mere tricks?&#34;

&#34;I&#39;m a damn good burglar,&#34; I promised, gazing steadily back into his inscrutable eyes. &#34;I could swipe that dragon&#39;s treasure right out from under it, and not even have to get close.&#34;

Perrin scoffed, but Nobody shushed him. &#34;And what proof have you of this?&#34;

&#34;I broke into his shrine last night,&#34; I bragged, pointing at Horatius. He had only now gotten to his feet, and my boast had not done anything for his attitude.

&#34;You what?&#34; he demanded.

&#34;I picked that sad little lock,&#34; I said, waving my glowing fingers, &#34;and I closed your ugly triptych.&#34;

He flinched, violently. &#34;You-&#34; he started, but Nobody got between us.

&#34;There&#39;s a big difference between that shrine and a dragon&#39;s lair, my friend. I admire your courage and...ingenuity, but you&#39;ll only get hurt on this journey. Even we don&#39;t all expect to come back alive. Now please step aside.&#34;

Looking around, I saw that they had all lost their already very limited patience with me. Sorcery or not, I was sure that the five of them together would have no trouble wrestling me out of the way. Then I&#39;d be stuck here in this dismal city, faced with an undignified return to the hardscrabble or a depressing voyage back to some very unhappy people in Arnven.

&#34;I can do more than that!&#34; I insisted. &#34;I can make illusions, and hide myself in shadows, and look like somebody else, and-&#34;

&#34;Alright,&#34; Nobody said, reaching out again with his weirdly long arms. &#34;That&#39;s enough.&#34; He grabbed me again, and my tricks were just as effective against him this time as they had been before. I also kicked at him, but the voluminous coat seemed to soak up the blows like armor. He set me down roughly, away from the door. &#34;Maybe we&#39;ll tell you the story when we get back.&#34;  At that, Moritz opened the lighthouse door and they started filing inside. Arcos grabbed the huge bundle of equipment from the mule&#39;s back on the way.

My opportunity was slipping away. Another person might have taken this inglorious stymieing as an opportunity to wise up and head home, but I was always famously stubborn, even for a twelve-year-old.

&#34;Halt!&#34; I said, in my best I-am-a-princess-and-you-are-a-peasant voice. &#34;I am the Witch of Arnven!&#34;

I could scarcely believe I&#39;d said it. Now I would almost certainly be sent home, quite possibly in exchange for a ransom if Perrin was a shifty as he looked. Still, my claim got their attention, though maybe not in the way I&#39;d hoped. Perrin actually laughed.

&#34;The Witch is long dead,&#34; Horatius said, darkly.

&#34;Not anymore. I&#39;m her. She&#39;s back, in me.&#34;

&#34;She does have an Arnven accent,&#34; Nobody mused, stroking his long beard.

&#34;That doesn&#39;t prove anything,&#34; Perrin protested. &#34;She&#39;s probably faking that too.&#34;

&#34;What, then,&#34; Moritz asked, &#34;is the reincarnation of a legendary hero doing in the gutters of the wrong city, pestering us about something that&#39;s none of her business? Shouldn&#39;t you be back home, protecting your people from the barbarian horde?&#34;

I had talked myself into a corner. Perhaps it was time to come clean.

&#34;Arnven can handle itself. She...I...the Witch died for them once already, do you think I want to do it again? I ran away for adventure, and here you are.&#34;

&#34;Uh huh,&#34; Arcos said. &#34;And Arnven is where you learned thievery?&#34;

&#34;Yes,&#34; I said, nodding curtly. &#34;I lived on the streets before they saw me doing magic and made me a princess. Against my will, I might add.&#34;

That last bit wasn&#39;t strictly true, but pride demanded that I pretend otherwise.

&#34;Great,&#34; Perrin said, rolling his eyes. &#34;Now she&#39;s a legend //and// a princess. You&#39;re clever, kid, but you&#39;re a bad liar.&#34;

&#34;No,&#34; Horatius said, quietly, &#34;I don&#39;t think she is.&#34;

&#34;What?&#34;

Slowly, he shook his head. &#34;She&#39;s telling the truth. What she believes to be true, anyway.&#34;

&#34;How can you even tell?&#34;

&#34;I know what a liar looks like,&#34; he said, glaring pointedly at Perrin.

&#34;Well, that just means she&#39;s mad then.&#34;

&#34;Do I look like a lunatic?&#34; I demanded.

&#34;Yes,&#34; Moritz answered, without hesitation. I suppose that was true; after all, I was a dirty street urchin waving my arms about and trying to boss five grown men.

&#34;And yet,&#34; Nobody said, &#34;she speaks like one accustomed to authority. And she does have the Witch&#39;s eyes.&#34;

As proof, I turned up their shimmering gray-green glow as brightly as I could.

&#34;I don&#39;t care who she is,&#34; Perrin insisted, &#34;we&#39;re not taking a //child// with us to slay a Saints-damned dragon!&#34;

There is something demeaning about the way adults say &#34;child&#34;. They use it the same way they would &#34;idiot,&#34; to completely dismiss any contribution or value just because someone is young. Even after they made me princess, the grown-ups in Arnven would still do that to me, never mind the fact that I had twice the street smarts as them. I&#39;d like to see a single one of my &#34;advisors&#34; - glorified babysitters, all of them - last a month in the gutter! Nobody&#39;s band was clearly more battle-hardened and world-wise than anyone I&#39;d ever had to deal with back home, but that just meant they should know all the better how capable I must be. But despite my evident cleverness and apparent power, they continued to see me only as an incompetent child. And, of course, men always thought themselves better than me until proven otherwise. It was infuriating! I felt my temper rising, but I didn&#39;t owe it to these overconfident louts to reign it in.

&#34;I am not a child!&#34; I shouted, voice ringing loudly with angered authority. &#34;I am the Witch of Arnven!&#34; Then I stomped my foot, which might have been a childish and petulant gesture had it not struck the ground with such force that the lighthouse trembled. Thunder pealed in the distance, but I was almost sure I hadn&#39;t done that. Less sure than Perrin, at least, who looked frightfully at the sky for a moment before regaining his composure. Then they all just stared at me in wary silence. I had not meant to create such spectacular effects; they&#39;d just slipped out, as they sometimes did when I was at my most furious. But that didn&#39;t matter, if they frightened these men into place. Only the mule seemed unimpressed.

Nobody was the first speak. &#34;Very well,&#34; he chuckled. &#34;Welcome aboard, princess.&#34; The others all protested at once.

&#34;What?&#34; Arcos sputtered.

&#34;No!&#34; Moritz insisted.

&#34;Are you insane?&#34; Perrin blurted.

&#34;Is that even legal?&#34; Horatius asked.

The mule yawned.

&#34;She&#39;s a sorcerer,&#34; Nobody said, calmly. &#34;A very powerful one, though she may not fully know it yet. We&#39;ll need that sort of power, if we&#39;re to fell that dragon.&#34;

&#34;Nobody,&#34; Perrin pleaded, &#34;she&#39;s-&#34;

He held up a hand to silence the rogue. &#34;I have made my decision. The witch will accompany us, whether you like it or not.&#34;

Perrin stared at the old man in frustrated astonishment for a while, then threw up his hands and stepped inside. Moritz followed, pulling the hood over his head. Arcos looked at me with puzzlement and concern, but I just narrowed my eyes at him. Horatius entered last, face inscrutable, leaving me alone outside with Nobody and the mule.

&#34;What&#39;s your name, sorceress?&#34; he asked. Finally, someone had seen far enough past my age to ask.

&#34;Geva,&#34; I said. The old man nodded.

&#34;It&#39;s a pleasure to meet you properly, miss Geva. Call me Nobody.&#34; He extended a thin hand to me, and I firmly shook it.

----

The house&#39;s interior was nicer than I&#39;d expected. There was only one room, though a few load-bearing studs remained where walls had been demolished. The remaining walls were decorated with neat shelves of cast-iron cookware, slightly soggy books, and various nautical knickknacks. An empty stewpot sat in a small fireplace, which was surrounded by an assortment of sturdy furniture.

&#34;Where&#39;s the keeper?&#34; I asked.

&#34;I&#39;m giving him that mule to take the day off,&#34; Nobody said. &#34;And to not ask any questions.&#34; He looked pointedly at me when he said that last bit. Moritz either didn&#39;t get the memo or knew it didn&#39;t apply to him.

&#34;Where&#39;s the Way?&#34;

&#34;In here,&#34; Nobody said, moving towards the door that lead to the light proper. &#34;At the base of the stairs.&#34;

While they went to look at that, the others started unloading. As their backpacks opened and Arcos unrolled the mule&#39;s pack, I noticed quite a lot of metal. I supposed they&#39;d wanted to travel here without their arms and armor on full display, which was only sensible for such a semi-secret mission. Horatius carried a huge bundle of metal and quilted cloth into the only enclosed space - some kind of storeroom, I presumed, or maybe a latrine - to change, but Arcos and Perrin just wore their armor over their clothes.

Perrin took only a moment to suit up, having only a cuirass, cap, and various pads, all of hard-boiled leather reinforced here and there with metal bands. The cuirass almost looked more decorative than protective, pressed as it was with vine-like designs, but there were still some scratches and scuffs that proved its practicality. The dark red cloak that he wore over it was definitely more for style, though.

&#34;Isn&#39;t that a bit flashy?&#34; I asked. It was nothing compared to the silly dresses they&#39;d stuck me in back in Arnven, but at that time I was dressed in the same grubby common clothes I&#39;d run away in. They were comfortable and nondescript, which had in my experience been the most important parts of fashion for criminals. In that red cloak, Perrin could never disappear into a crowd or creep unseen along a twilit rooftop.

&#34;The word you&#39;re looking for is &#39;dashing&#39;,&#34; he said, swishing it dramatically away from the blades at his hips. &#34;Besides, it&#39;s reversible.&#34; The inside was black, which made more sense.

&#34;That&#39;s right,&#34; Arcos laughed. &#34;You do the dashing, I do the smashing.&#34; His armor was a mismatched set of metal greaves and braces, plus a breastplate so big it must&#39;ve been custom-made. Over his shoulder was slung a downright monstrous polearm, taller than he was and thicker than my arm. The business end was affixed with a frightening conglomeration of weapons: a four-pronged hammerhead on one side, a curved, half-meter spike on the other, and a long, sharp spearhead in between. I pitied any cavalryman who found himself charging at that thing.

&#34;What&#39;s taking Horatius so long?&#34; Perrin wondered, loudly. As if summoned, Horatius stepped out of the storeroom. We heard him before we saw him, thanks to the countless jingling links of his chain mail, augmented around the important bits with metal plates. His face was all but invisible behind the tiny breathing-holes and narrow eye slits of a flat-topped great helm. There was nothing especially fancy about any of this; in fact, the plates and especially the helm were marred by plenty of small dents and scratches.

However, I didn&#39;t notice those less-than-glorious details until much later, because my attention was forcibly seized by the cloth surcoat draped over that well-used armor. Every inch of the garment, from its knee-height hem to its sleeveless shoulders, had been painstakingly embroidered with a branching, repeating, fiendishly detailed pattern of black, white, and gray. As I turned my head, the pattern almost seemed to move.

&#34;What&#39;s that for?&#34; I asked, trying (and failing) to conceal my bewilderment. I couldn&#39;t see the smile on his face, but the pride in Horatius&#39;s voice was apparent.

&#34;Its purpose is twofold. To my allies, this pattern identifies me as a knight of the military orders and instills courage in them by showing that I still stand. In my enemies, it subtly imparts a sense of hatred that will goad their attacks toward my breastplate,&#34; which he rapped with one gauntleted fist for emphasis, &#34;instead of my less-protected limbs. Or my more lightly-armored companions!&#34; He patted Arcos and Perrin on the back, though Perrin&#39;s wince suggested that it might&#39;ve been more of a slap.

&#34;Yeah,&#34; he grunted, &#34;it&#39;s definitely instilling hatred in me.&#34;

Arcos chuckled.

&#34;If you think that&#39;s impressive-&#34; Horatius began.

&#34;I don&#39;t.&#34;

&#34;-then behold this!&#34; he finished, heedless. With his left hand, Horatius hefted a large shield of steel-braced wood, intricately painted with an asymmetrical pattern of swirling blue and gold. It seemed to spin infinitely into itself, spiraling deeper and deeper in constant incomplete repetition.

&#34;Careful,&#34; he warned, &#34;you&#39;ll give yourself a headache.&#34; I blinked, and I experienced a weird sort of vertigo as I looked away.

&#34;Ugh,&#34; I said, &#34;what is that?&#34;

&#34;That,&#34; he said, proudly, &#34;is a warding pattern, as is the one on my surcoat. The ancient Foundation used designs like these to keep prying eyes from the holiest of the Sacred Containment Procedures. The most powerful ones could strike a man dead at a glance! This one won&#39;t kill anyone, but it will strike great fear into the hearts of any who look upon it with ill intent.&#34; He turned his helm towards Perrin. &#34;Incidentally, this property also makes it easy to root out hidden enemies.&#34;

Perrin squinted at the shield. &#34;I&#39;d be scared too, if I saw someone toting anything that ugly. You&#39;d have to be a blind maniac to go around looking like that.&#34;

Horatius puffed up a bit. &#34;I will have you know that the creation of warding patterns is an ancient and honored art form among the military orders!&#34;

&#34;Uh huh. Is that why I&#39;ve never seen any other clowns wearing them before?&#34;

&#34;Well,&#34; he sighed, &#34;it&#39;s also something of a //dying// art. These patterns are slow and difficult to make, and their makers even slower to train. It seems that Overwatch sees greater use in hordes of disposable, untrained thugs like yourself than one professional soldier, no matter how effective his painstakingly handmade warding patterns might be.&#34;

An uncomfortable moment passed in sad silence, but he quickly regained his usual proud demeanor.

&#34;But!&#34; he said, &#34;for a small mission like this, none could be better suited.&#34;

&#34;Yeah,&#34; Perrin scoffed, &#34;as long as we don&#39;t need to be hidden. Or quiet.&#34;

&#34;You are the subtle one, ruffian. I fight with honor and bravery.&#34;

&#34;You fight with a lot of extra effort, that&#39;s what I think. Work smarter, not harder.&#34; Perrin tapped his shaggy head. &#34;I could run circles around somebody stumbling around in that much metal. And put about four holes in him, right here, here, here, and here.&#34;

&#34;Is that a challenge?&#34; Horatius asked, reaching for the heavy mace at his belt.

Perrin stood up. &#34;Maybe.&#34; There were suddenly blades in his hand, a long rapier and a jeweled dagger.

&#34;Oh, please,&#34; Arcos said, rising to his full height. &#34;Neither of you could even get close to me, not with this in my grasp.&#34; He planted the steel-shod butt of his polearm in the dirt with a thump. &#34;I could squash that bucket you call a helm at three paces. Or,&#34; he said, turning to Perrin, &#34;trip you flat with this spike, before you got a chance to do all that fancy footwork.&#34;

&#34;Wanna bet?&#34; Perrin asked, tapping Arcos&#39;s breastplate with the rapier blade.

&#34;Oh, by the Saints!&#34; Moritz groaned from the tower. &#34;Just pull out your pricks and measure already.&#34;

&#34;Like that, would you?&#34; Perrin teased. &#34;I know Horatius is on board.&#34;

&#34;Don&#39;t flatter yourself,&#34; he grumbled.

&#34;I&#39;d like for you to shut up,&#34; Moritz continued. &#34;I&#39;m //trying// to think.&#34;

Now fully prepared for danger, the four of us moved to the door to watch Moritz at work. He hadn&#39;t even changed since the night before, but now he was carrying a staff. Slightly shorter than he was, it was a smooth length of wood topped with a sharp quartz crystal and wound with thin, intersecting lines of gold. The crystal glowed faintly as he used it to trace a complex diagram on the circular patch of floor at the center of the stairs. Periodically, he would reference his ever-present book (which Nobody was obligingly holding for him) to make sure he was doing it right.

&#34;What&#39;s in that big book, anyway?&#34; Perrin pried.

&#34;All my notes and formulas. I&#39;ve got to get the math right, lest we be dumped Outside.&#34;

&#34;Outside what?&#34; Arcos asked.

&#34;Yes,&#34; Moritz said, with a hateful tone that made it clear he was done explaining.

&#34;But can you open it?&#34; Nobody asked, peering down at the book.

&#34;Yes,&#34; he answered immediately.

&#34;How old is this structure?&#34; Horatius asked, peeking up the stairs to the tower&#39;s top some thirty meters above.

&#34;Not quite Ancient,&#34; Nobody answered, &#34;but it&#39;s in more-or-less the same spot as another lighthouse that was destroyed in the Breach. Lighthouses were some of the first things to be rebuilt, once people rediscovered sailing.&#34;

Perrin looked at him oddly. &#34;How do you know that?&#34;

&#34;I&#39;ve been to the Ancient History Museum,&#34; he said, condescendingly.

&#34;So have I,&#34; Perrin said, defensively. &#34;I was just more interested in the...valuable exhibits.&#34; He elbowed Arcos, who shook his head but smiled nonetheless.

&#34;Alright,&#34; Moritz announced. &#34;Just need to set up my sinks.&#34; Carefully, he arranged six small candles equally along the diagram&#39;s perimeter, and lit each one with a touch of his finger. &#34;Now for the Source.&#34; Quickly, he drew a small knife from his belt and pricked his left thumb with it. Then he flicked the droplet into the circle, where it evaporated with a puff of magenta smoke and a whiff of lemon. One of the candle flames turned blue. &#34;There we go. Now who&#39;s next?&#34;

&#34;Next?&#34; Perrin asked.

&#34;You&#39;ll each need to do what I just did. With your favorite weapon, if possible.&#34;
