**Item #:** SCP-689-KO

**Object Class:** Safe

**Special Containment Procedures:** The seed culture and 76 fully grown instances of SCP-689-KO are currently under containment in the biohazard containment room in site 22K. Upon recovery of uncontained instances, DNA tests should be done to samples from the fruiting body, to identify the host.

**Description:** SCP-689-KO is a mushroom that seems to be a subspecies of //Hypocreales Lindau//, which uses humans as its host.

Most instances are visually identical to an indoor wireless standing electric fan. The adult&#39;s[[footnote]]Instances of SCP-689-KO refers to the adult unless otherwise mentioned.[[/footnote]] control panel is filled with mycelia. Instances excrete resin and wrap around themselves to imitate the texture and shape of bakelite plastic and painted metal used in non-anomalous fans.

SCP-689-KO&#39;s fruiting body corresponds to the stalk and motor of a fan. The stalk uses the human spine as its axis.[[footnote]]For this reason, the height of the host affects the size of the fully-grown instance.[[/footnote]]  The safety grate and blades correspond to the cap and gills of a mushroom and have a large amount of spores on them.[[footnote]] Suspected similarities with //Phallus indusiatus//[[/footnote]] Spores on the grate and blades of an instance look very similar to dust on a non-anomalous fan but regenerate in three hours when they are wiped off.

The &#34;switches&#34; on SCP-689-KO&#39;s control panel shoot electrical signals through the spine to the &#34;motor&#34; part of the fruiting body. The &#34;motor&#34;, acting like animal muscles, rotates the &#34;blade&#34;[[footnote]]The organism uses fat or sugars extracted from the host&#39;s body as its energy source[[/footnote]] to allow spores to spread via the wind. SCP-689-KO has a plug that looks identical to a regular fan but cannot be charged with electricity.

When a human inhales more than a certain amount of the spore,[[footnote]]It needs more than three hours of continuous inhalation before complete infection[[/footnote]] they become its host. The host then becomes the nutrients for SCP-689-KO by the process written below. The current mortality rate of SCP-689-KO infection is approximately 90 per cent. Attempts to harvest the organism without infecting humans did not fruit meaningful results until this time.

* **Phase 1:** Spores inhaled to the lungs infiltrate into the spine. The host does not feel pain at this stage.
* **Phase 2:** The spores enter the brain via the spine. The spores then affect the brain, inducing the host to avoid other humans, and to prefer damp and cool locations outside their house.[[footnote]]To date, there have been no instances where the host has died in their own house.[[/footnote]] Infections around the spine become more serious, and the host&#39;s bodily functions grow weak as the spores spread across the body.
* **Phase 3:** About five days after phase 2, the spores attack the CNS of the host, inducing coma. Afterwards, mycelia secrete enzymes to disintegrate and absorb the body.[[footnote]] The enzyme can digest not only the human body but various leather and fabric as well.[[/footnote]] Almost every host dies at this stage.
* **Phase 4:** Mycelia formed on the lower part of the spine adds pressure to the spine and straightens it, making the skull and the spine rip outside the host&#39;s body. Mycelia wrap around the now straight spine. Other parts of the host&#39;s body are rapidly disintegrated.
* **Phase 5:** Other parts of SCP-689-KO including its cap are formed, taking the shape of an electric fan. It takes around five hours after the host&#39;s death for the instance to be fully grown.

SCP-689-KO was initially found by the Foundation in 19██ after people continued to go missing in a goshichon[[footnote]]Translator&#39;s note: A residential district where students who prepare for national exams reside. Living conditions in the district are usually poor.[[/footnote]] in Sillim-dong, Gwanak-gu, Seoul. Investigations show that the first victim purchased a fully grown instance at a nearby junk shop. SCP-689-KO is thought to be closely related to the &#34;fan death&#34; myth widely spread across South Korea. The Foundation is investigating whether SCP-689-KO was made by someone who knows about the myth, or if it is an anomalous organism that evolved to mimic industrial products, similar to how [[[SCP-071-KO]]] did. However, it is highly unlikely that 689-KO is the cause of the myth. [[footnote]]For further information refer to recovery log 689-KO and &#34;//Research of the correlation of anomalous instances and modern Korean urban legends//&#34;(Paranormal histories research centre, Science division of the Korean Branch).[[/footnote]]

**Addendum:** Data about the GOI &#34;Pomegranate Club&#34; found by the Japanese branch of the Foundation is found to contain information about SCP-689-KO. Based on this, it is theorised that some GOIs, including the Pomegranate Club, have hold of instances and are harvesting them. Attached below are the e-mails exchanged between the Pomegranate Club and the seller of SCP-689-KO.

&gt; **Item:** 20 kg of mushrooms
&gt;
&gt; **Invoice #:** 1773464832
&gt;
&gt; **Date of Delivery:** 2004-07-12
&gt;
&gt; **Date of Receipt:** 2004-07-16
&gt;
&gt; **Delivery Method:** Direct delivery
&gt;
&gt; **Delivery Address:** [Deleted due to recipient request]
&gt;
&gt; **Item Description:** It&#39;s the item I talked about earlier. There are other mushrooms that take only humans as its host, but this one&#39;s the only one that&#39;s both edible and leaves some part of the host alive to make its own.
&gt;
&gt; They aren&#39;t extremely delicate like matsutake, and you&#39;ll only need some humans to inhale the spores or have them inoculated near the spine; they&#39;re effortless to grow. However, I had to remove the cap because of delivery regulations, so to breed it, you will need the mycelia rather than the spores. Well, culturing the mycelia isn&#39;t that hard either; you&#39;ll only need to cut some off from the bottom and culture them in a medium. (You could use the commercial ones if you have to, but it&#39;s better if you make your own by mixing some protein solutions.)
&gt;
&gt; They&#39;re considered typical clutter here since they&#39;ve been around for twenty years, but some of the people who tasted these say that it&#39;s quite delicious, if you can get over the household appliance shape. As we&#39;re expecting to diversify our special meat industry, we hope that the club finds our product fitting as well.
&gt;
&gt; We&#39;re always in debt to you. Thank you.
&gt;
&gt; ,,P. S. We&#39;ve heard you have connections with the JOICL. Could we ask for research about this breed?,,

&gt; **Item:** Five bottles of Nihonshu
&gt;
&gt; **Invoice #:** 38957393845
&gt;
&gt; **Date of Delivery:** 2004-09-07
&gt;
&gt; **Date of Receipt:** 2004-09-11
&gt;
&gt; **Delivery Method:** Direct delivery
&gt;
&gt; **Delivery Address:** [Deleted due to recipient request]
&gt;
&gt; **Item Description:** Apologies for the late response. To me, growing a mushroom out of a pomegranate is a part of the culinary arts, but some of us thought it was a waste of good pomegranate, so we needed some time to come to a conclusion. (They were happy with it after they had some, though.)
&gt;
&gt; We&#39;ve cooked and had three or four of the mushrooms you&#39;ve sent us, and the rest is stored to harvest the seed cultures. As you&#39;ve told us, the pomegranate is still intact near the stalk of the mushroom. We&#39;ve done some research about mushrooms using pomegranates, but the problem there was that the pomegranate&#39;s taste and texture always seem to be entirely overwhelmed by the fungi. This breed solved that problem in ways we&#39;ve never expected.
&gt;
&gt; We&#39;ve made a clear soup out of half of the mushrooms since we had to check the state of the pomegranate too, and we braised the other half and discarded the pomegranate following the recipe that you&#39;ve sent us. In the soup, the mushroom was just barely subtle enough not to be overshadowed by the pomegranate, but it, therefore, took a role of a pedestal that supports the taste and scent of the pomegranate. Also, the fact that the pomegranate inside was preserved with only the scent of the mushroom, rather than being mixed with it, shines a light on the clean aroma. It seems that the recipe you&#39;ve sent us is based on the Korean recipes of Gamja-tang[[footnote]]Translator&#39;s note: Stew made from pork spine.[[/footnote]] or Galbijjim[[footnote]]Translator&#39;s note: Braised short ribs[[/footnote]]. We&#39;ve also rather enjoyed the harmony of various spices and ingredients mixed. Personally, though, it was a shame to cover the subtle taste of the mushroom and pomegranate with the pungent spices and ingredients.
&gt;
&gt; Take the items that we&#39;ve sent as a sign of gratitude for letting us have an enjoyable meeting. We&#39;ve received these from a renowned place, and they&#39;re known to go well with meat dishes, especially with pomegranates. Please, take good care of us in the future as well.
&gt;
&gt; ,,P. S. We&#39;ve requested analysis to the JOICL as asked. They seem to think that the mushrooms are made naturally. We cannot stop being humble in front of mother nature&#39;s wisdom.,,</textarea></pre>
