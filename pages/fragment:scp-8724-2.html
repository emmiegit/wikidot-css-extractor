[[=]]

**Item #:** SCP-8724 @@ @@ @@ @@ @@ @@ @@ @@ @@ @@ @@ @@ @@ @@  **Object Class:** Safe

[[/=]]

-----

[[=]]
**Special Containment Procedures**
[[/=]]

-----

The area surrounding SCP-8724 has been cordoned off, and a preventative perimeter has been placed around the site. Following the initial exploration of SCP-8724, personnel are forbidden from entering the premises. RAISA is to regularly check Foundation employee records for signs of decay. 

-----

[[=]]
**Description** 
[[/=]]

-----

 SCP-8724 is an abandoned building in Ciudad Juárez, Chihuahua. The structure is composed of a single floor of residential space, with no evident anomalous characteristics from the exterior. Recording devices are inoperable within SCP-8724. Any attempt to photograph or record will have the resulting image appear through unknown means upon reviewing the footage.

[[include component:image-block
|name=.
|caption=INT. -- SCP-8724
|align=center]]

There are no other known anomalous phenomena originating from SCP-8724.

-----

[[=]]
**Discovery**
[[/=]]

-----

It is believed that SCP-8724 was first encountered by an unnamed member of the Department of ▓▓▓▓▓▓▓▓ ▓▓▓ ▓▓▓▓▓, who failed to report the anomaly to his superiors following an excursion into the structure.
Following the agent&#39;s death during an unrelated incident, a series of files were discovered amongst his effects, which detailed a number of encounters with anomalous phenomena that went unreported to the Foundation dating back 15 years.

The content of these reports was composed of largely incoherent information, with little discernible data and pronounced aberrations in both style and language. Due to the nature of the agent&#39;s work, and a limited number of accounts that could be corroborated, an investigation was opened into the matter, uncovering a number of anomalies, including SCP-8724.

▓▓▓▓ ▓▓▓ ▓▓▓▓▓▓▓ ▓▓▓ ▓▓▓▓▓ ▓▓▓▓▓▓▓▓▓▓, ▓▓▓ ▓▓▓▓▓▓▓ ▓▓ ▓▓▓▓▓▓▓▓▓▓ ▓▓▓▓▓ ▓▓▓▓▓ ▓▓▓▓▓▓▓ ▓▓▓▓ ▓▓▓▓▓ ▓▓▓▓▓▓ ▓▓▓ ▓▓▓▓▓▓▓▓▓. ▓ ▓▓▓▓▓▓▓▓ ▓▓▓▓▓▓▓▓▓ ▓▓▓▓▓▓ ▓▓▓ ▓▓▓▓▓▓▓▓▓ ▓▓▓ ▓▓▓▓▓▓▓▓ ▓▓▓▓▓▓▓▓▓▓.
After a rudimentary perimeter was established, Foundation Agent Jon Delacroix was tasked with exploring SCP-8724 in order to determine ▓▓▓ ▓▓▓ ▓▓▓▓▓▓▓▓▓ ▓▓ ▓▓▓ ▓▓▓▓▓▓. The exploration failed to produce any data of note, and SCP-8724 was classified Safe. For archival purposes, a transcript of the exploration log is available within this file.

[[=]]
**Addendum-8724-A** 
//Exploration Records 02/06/2024.//
[[/=]]

-----
@@ @@

[[div class=&#34;blockquote&#34;]]

= **Audio Log - 02/06/2024**
-----
= **RECORDING START**
-----

@@ @@

= //The sound of a metallic door opening is heard. It scrapes against the floor.//

**[DELACROIX]:** Heading in. No sign of anything out of the ordinary so far.

= //Footsteps.//

**[DELACROIX]:** Nothing in here. Standing in a vestibule. No lighting sources or furniture of any kind. Two doors at the end of the room. Both unlabeled, although there&#39;s a space for a plaque on both doors. There&#39;s a trail leading towards the leftmost door. Opening the right door first, just in case.

= //The door is opened. Footsteps can be heard.//

**[DELACROIX]:** Dead end. Room could&#39;ve been anything in the past. Floor&#39;s carpeted, walls are consistent with the exterior. No windows. No furniture. Same deal. Heading back.

= //Muffled footsteps can be heard, when a crash is suddenly heard. Movement can be captured, presumably as the agent turns around.//

**[DELACROIX]:** Jesus. Nothing behind me. If the recorder picked it up, I just heard a crash. No clear source. Possible anomaly. Room&#39;s still completely empty.

= //Muffled footsteps resume. A door closes.//

**[DELACROIX]:** The vestibule just changed. Five chairs are arranged near the entrance. Looks like a waiting room now. There&#39;s a clock on the wall that wasn&#39;t there before.

= //Silence.//

**[DELACROIX]:** Not functional. Seems stuck at... 3:30. 

**[DELACROIX]:** There&#39;s a thick layer of dust on all pieces of furniture. As if they&#39;d been here all along. 

= //Footsteps.//

**[DELACROIX]:** Gonna follow the trail now. Left door. Starts abruptly a few feet from the entrance. No need to take a sample. We all know what ▓▓▓▓▓ looks like.

= //A pause.//

**[DELACROIX]:** And who I&#39;m looking for.

= //Footsteps echo through an empty space. A door opens.//

**[DELACROIX]:** Room&#39;s empty. The trail runs through the room to a window. Only one I&#39;ve seen here. Taking a closer look...

= //Silence.//

**[DELACROIX]:** That&#39;s not good.

= //Silence.//

**[DELACROIX]:** It&#39;s not a window. It&#39;s, uh, a crawlspace, of some kind?

**[DELACROIX]:** It&#39;s pitch black in there, but there are stairs going down, and a light a couple dozen feet down. The trail is visible down there. 

= //Sounds of light struggle, as Delacroix pulls himself through the window.//

= //Silence. Static lightly obscures the environment after a while.//

**[▓▓▓▓▓▓▓▓▓]:** //(Muffled by static.) It&#39;s all fine. No sign of the body.//

**[▓▓▓▓▓▓▓▓▓]:** ▓▓▓▓▓ ▓▓▓▓▓▓▓▓▓ ▓▓▓ ▓▓▓▓▓

**[▓▓▓▓▓▓▓▓▓]:** //(Muffled by static.) The room seems to be a storage space, empty, of course. The trail just… stops in the center. No other leads in here.//

**[▓▓▓▓▓▓▓▓▓]:** ▓▓ ▓▓▓▓ ▓▓▓▓

**[▓▓▓▓▓▓▓▓▓]:** //(Muffled by static.) I&#39;m going to be turning back. No point staying in here.//

**[▓▓▓▓▓▓▓▓▓]:** ▓▓▓ ▓▓▓▓▓▓▓▓▓ ▓▓▓▓▓

**[▓▓▓▓▓▓▓▓▓]:** //(Muffled by static.) On second thought, I&#39;ll be picking up a blood sample just in case. We didn&#39;t find her, after all.//

**[▓▓▓▓▓▓▓▓▓]:** ▓▓▓▓ ▓▓▓▓

**[▓▓▓▓▓▓▓▓▓]:** ▓▓▓▓ ▓▓▓ ▓▓▓▓

**[▓▓▓▓▓▓▓▓▓]:** [UNINTELLIGIBLE]

= //Footsteps.//
**[DELACROIX]:** Alright, I&#39;m out. Signing off.

**Additional Notes:** Agent Delacroix emerged from SCP-8724 immediately after shutting off the recording. Upon listening to the recording, he failed to provide an explanation for the sounds heard in the final minutes of the tape, which were attributed to SCP-8724 interior. Subsequent exploration of SCP-8724 failed to confirm the main findings of the initial exploration log, namely, any extraspatial anomalies within the structure. No furnishings or windows are present within SCP-8724.</textarea></pre>
