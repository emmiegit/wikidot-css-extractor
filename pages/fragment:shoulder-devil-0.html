    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>##gray|//Hah... Hah... It&#39;s cold... I&#39;m so cold...//##

##gray|//I&#39;m so cold it hurts... I...//##

##gray|//I think it should, but... I can&#39;t feel a thing...//##

##gray|//Stop it... Stop it...!//##

&gt; ...Ugh. Again with this.

##gray|//I want to curl up. I want to go away.//##

&gt; A bore. A saddening bore. I&#39;ve seen it already.

##gray|//I can&#39;t feel myself.//##

##gray|//I want to draw in a deep breath but I can&#39;t even remember the sensation of it.//##

##gray|//I don&#39;t have the lungs for it, anyways.//##

##gray|//I don&#39;t remember sensation.//##

##gray|//I don&#39;t remember much of anything.//##

&gt; Stop it.

##gray|//The memories aren&#39;t there anymore. I can only feel the holes where they were.//##

##gray|//I&#39;m full of holes.//##

##gray|//No, I&#39;m just holes. I&#39;m a hole.//##

&gt; Stop it. Stop it. I don&#39;t want to see her. I don&#39;t want to be shown her.

##gray|//I don&#39;t want this. I don&#39;t want to know what this feels like. I don&#39;t want to remember this.//##

##gray|//I was born wrong. I understand. I&#39;m sorry. It won&#39;t happen again.//##

##gray|//I&#39;ll be better this time. I promise.//##

##gray|//I just don&#39;t want to be alone anymore.//##

&gt; Have some decency. Just let me sleep.
----

Wind like a dying breath. The sound of rustling leaves and running water, but absent any sounds of life. The only witness to those sounds sounded like it was barely capable of drawing breath. Or, perhaps, that it had nearly forgotten how to do so.

The babbling of the creek was enough to shock the body, accustomed as it was to near-total stasis. Its eyes slowly opened, simply because the memories of its bones remembered the action of &#39;waking up.&#39; Awash in a dull light that cast everything in shades of gray, the world looked like nothing so much as a sun-bleached photograph. The eyes didn&#39;t attempt to focus on anything; simply opening was enough for them. The right hand lifted itself out of the water - slowly, as if remembering how it moved - and traced along the chest it was attached to. Felt across the fabric on it. Pressed down, as much as its near-absent strength allowed. It found no imperfections. Only the perfect impression of a terrifically well-worn, stubborn body.

A sigh escaped the body&#39;s lips and melted into the wind. The sound of it woke up the woman the body belonged to, who had been sleeping so deeply she had forgotten even her body for a time.

Her eyes remained unfocused. Thoughts were slow to return to her, but her emotions remained steadfast. The shame of failure climbed up the sides of her like water soaking upwards into a fabric, and she gritted her teeth against it. Her hand had not left her chest, and she balled it into a fist as she regained her strength, grabbing onto her shirt as though the simple sensation would take her mind away from things.

She had died. In a stupid, simple way. It was almost downright banal. It took only a moment for her to automatically begin admonishing herself for all the things that would happen because of that. //You were important to the girls, and now they don&#39;t have you. Now they might replace you. Rainer and Daniel could. Jackie won&#39;t know what to do. You may as well have thrown Anne to the wolves. What&#39;s Adams supposed to do? Maybe she just died because you couldn&#39;t help her, along with Anne. If Foxx isn&#39;t dead, he could be out of a job. And who&#39;s going to pay for his kid&#39;s food, then?// All of those thoughts quickly melded together into the familiar sentiment of //&#39;everyone is worse off now, because of you.&#39;//

She tucked the thought into the back of her mind as the rest of it refocused on the present. She allowed her head to roll to the side. A single row of evergreen trees greeted her, each the same height and width, with park benches nestled in between each. Each had identical imperfections, the same chips in the wood and the same moss patches on their underside. The unblemished grass tapered down into a creek moving so slowly the surface appeared as flat as a mirror. Though it can&#39;t have been more than an inch deep, its surface was as reflective as polished silver. If not for the grass on the banks of the creek, Iris would have thought she was resting on the sky.

The sky was too bright. She wasn&#39;t sure how bright it was, but it was too bright for her to look at, so she retreated back behind her arm. Nothing beyond the trees had any definition, and the ground at the horizon bled into the watercolor sky, indistinct in the dull light that seemed to come from everywhere. It was a nearly forgotten memory, with its shape derived from stretching a single clear image too far. It felt like Iris was inside of a painting submerged in water, watching as the ink washed away in front of her.



She stayed in the river for some time, letting the gentle sensation of the water wash away her thoughts when they became too much, and clearing her mind as though she were trying to fall back asleep after waking up too early. With time, however, the growing awareness of her body and mind won out, and Iris was fully awake. Her arm slid off her face and landed in the water with a wet //plop,// and she looked at the sky with her newly adjusted eyes. The breath from her barely-parted lips condensed in front of her and blended into the monolithic matte gray canvas stretching above her.

But Iris could see the breath. She was still alive, in some kind of way. She could rest when she was well and truly dead. Really, when she thought about it, nothing had changed aside from her location. All she had to do was get a handle on that. One thing at a time. She allowed herself ten more seconds to wallow in the sheer absurdity of not even getting a break after taking a bullet to the heart, and awkwardly pushed herself up, not yet re-adjusted to the feeling of having limbs.

The trees, the benches, the grass, and the stream stretched on to the horizon in either direction. It reminded Iris of standing in between two mirrors. In fact, the only thing telling her that she //wasn&#39;t// doing just that was the stream&#39;s gentle current. Even though she couldn&#39;t feel an incline, the water was running from somewhere.

Iris vaguely recalled something she&#39;d been told by a member of Zeta-9 once, that when she was some place where she didn&#39;t know up from down, she should start with something, anything, she did know, even if it was as simple as left and right, and take one thing at a time from there. Seeing as Iris seemed to have a physical body, or something close enough to it, she would need fresh water soon. She decided to follow the stream to its source.

The water in the stream didn&#39;t seem to soak into anything. Iris could feel when her feet were in it, a lukewarm, gentle hold, but the instant she lifted her foot out, her shoes were bone dry. The silt and gravel of the streambed was the most even terrain, but Iris decided she&#39;d rather walk on what looked and acted like grass than what almost certainly wasn&#39;t water.

Passing the trees and the benches, Iris was unable to find a single difference between them. They looked to be normal evergreens and normal park benches, clearly old but not dead or rotting, but the sheer repetition made it impossible to keep track of how long she&#39;d been walking. Hell, sometimes Iris caught herself wondering if she&#39;d ever started walking at all. She found her arm was picking at her chest, so she brought a hand to her neck and began counting her heartbeats to remind herself that she was moving. That she //could// move.

Any points of interest eluded Iris, and her eyes slid off of what was in front of her before she could focus on anything. There was nothing of note ahead of her. Perhaps she&#39;d die of thirst before getting anywhere. Wasn&#39;t that funny? It was bad enough to die by getting shot with a completely normal, boring gun by someone she&#39;d never met before, but to just keel over from thirst because she went for a walk was even funnier. A dry laugh forced its way up Iris&#39; throat, and the suddenness of it made her jump. She shook her head and quickened her pace.

After seven-hundred and twenty-four beats of her heart, Iris saw something ahead of her. It was much closer than the horizon, and although she couldn&#39;t tell if she had simply missed it or if it just appeared, she didn&#39;t care. It was something. Anything. Her dragging feet livened up. Thank god. Thank god she wasn&#39;t just walking in circles. Thank god she wouldn&#39;t die in such a stupid way now. She didn&#39;t care what she found. She was almost close enough to see it now, she could make out the shape of it as she broke into a jog, then a run, as her eyes ran over it, drinking in every detail-

Iris stopped as though her bones had all fused. She tasted bile again. Every one of her thoughts fled her.

The mound undulated like a soft tide. To say it did so gently would be a lie - its movements were that of a dying animal that had already laid down for the final time. It was a pile of bodies, pressing against each other and reaching toward the sky as if to pray. When one half would inhale, the other would exhale. They were not people, but simple bodies, no more alive than a corpse with a heartbeat. Their scant clothing did little to hide their pallid, translucent skin, which in turn revealed sickly, discolored veins beneath. Clouded eyes were open and unblinking, staring off at odd angles. A pile of bodies, alive only in the strictest reading of the word, frozen as they reached out to offer themselves to something.

The scene dredged up a memory of Iris&#39; childhood, of finding a fallen bird&#39;s nest with its scraggly, bloated chicks badly mangled, mustering the last of their energy to call out to their mother. Her legs found the strength to move first, silently moving to the side of the mound as though she were afraid to disturb them, as though they could even register her. They smelled like chemical preservatives. Like mothballs and formaldehyde. Like dead things not allowed to leave.

Iris crouched down next to it. From there she could see the closest face clearly, but any identifying details had been shorn off by its emaciated state. Its eyes were so sunken in that it seemed that true sleep was a foreign concept to it. One of Iris&#39; hands reached out to it. Its breath was so shallow she could barely feel it. Its blue lips were cold and dry, desiccated already.

She felt her throat and her hand constrict in turn, and her eyes began to burn. There must have been dozens of them in that pile, with dead minds and stubborn bodies. Iris shuddered to call that life, to consider being pressed up against cold flesh with only the wind for company. It must be so lonely. Like sitting on the inside of a cell with no windows. She gently pulled away from it, a pit forming in her stomach as though she were leaving it to die, and she took a step back.

Around the back of the pile of bodies, at the head of the river, was where Iris found her.

The &#39;water&#39; condensed from the air, a viscous thing that was neither liquid nor gas, and clung to the girl as it rolled down her body and onto the waiting riverbed beneath her. It wasn&#39;t fog, but the air itself, congealing and dripping down onto the silt, and flowing as it took the form of a stream.

The girl rested atop the stream as its fountainhead. In a simple, elegant white dress, she leaned against the bodies as though she was being held in the warm embrace of family, gently resting against it in sleep while they reached out and strained to hold her as still as they could manage. The flow of the river was soundless and ethereal, unwilling to disturb even the hem of the girl&#39;s dress. The girl herself was as still as a painting, as though she had sat down to die, and to fade rather than rot. Her pale skin and paler hair gave her the appearance of an antique photograph, stubbornly holding onto its subject through years of sun damage.

She didn&#39;t truly touch the river, nor did the bodies truly hold her up. But the stream flowed around her anyways, and the mass of pale limbs reached out for her regardless, as though worshipping something forever just beyond their reach.

It was only when the girl&#39;s emerald-green eyes snapped open that Iris found she could breathe again.

&#34;...I didn&#39;t think lying to you would be productive for either of us,&#34; she said with a plodding intonation. It wasn&#39;t immediately clear if the girl had moved her mouth. &#34;I wanted you to see me before we spoke.&#34;

See her...? Iris looked to the bodies, heaped upon each other like they were to be burned, and then back to the girl, a pure and weightless superimposition on Iris&#39; own eyes. Her gaze drifted back to the tangled mess of pale, clammy skin. &#34;...Guess I&#39;ve seen worse,&#34; she muttered before kicking herself. She reminded herself that was no way to speak to someone - much less the only person she //could// speak to. &#34;Are you - Are you alright?&#34;

The girl took slow, shallow breaths, each returning - or perhaps injecting - more life into her frame. The gentle roll of condensing air began to lessen as it was disturbed. &#34;Yes,&#34; she said with a gentle nod. &#34;It felt like... having a long dream.&#34;

&#34;A good dream or...?&#34; Iris trailed off, having started speaking without realizing.

&#34;Hah.&#34; The girl closed her eyes and braced herself against an outstretched arm she had been resting upon. With some effort, she began to push herself up to a standing position. &#34;It doesn&#39;t matter. I&#39;m awake now.&#34;

With a deep breath, the girl steadied herself, and with a sharp exhale, her eyes snapped open, positively luminous in their newfound energy. Her proud posture made it clear that she was taller than Iris, which incensed her for some reason. But before Iris could say something embarrassing, the woman clapped her hands together, the sudden noise striking Iris like a gunshot. &#34;Now, now!&#34; She spoke with the gusto of someone kicking off a grand party. &#34;Introductions are in order, aren&#39;t they? Couldn&#39;t very well introduce myself when you could only barely hear me back then, could I?&#34;

Iris blinked. This woman was definitely a morning person - she&#39;d shaken off any remnants of sleep so fast Iris was getting whiplash. The very air around her seemed different. &#34;Back... Back when?&#34; Iris muttered.

&#34;Ah, you know,&#34; the woman said dismissively. &#34;Back with all of that running, and shooting, and that...&#34; Her hands tensed, and her face twitched. But only for a moment. &#34;...That impudent little friend of yours.&#34;

//[https://scp-wiki.wikidot.com/voices-carry-part-4 ...Damn.]// It made sense - in a &#39;cosmic joke&#39; sort of way - that this little bastard would be the only one with Iris. She must have made coats out of the skins of puppies in a past life or something.

&#34;Anne&#39;s not my friend,&#34; was how Iris chose to respond.

&#34;Now, now,&#34; the taller woman tut-tutted upon seeing Iris put two and two together. &#34;This will be the second time I save your life, if you&#39;ll let me.&#34; She tilted her head forward as she spoke, catching Iris in an insistent gaze. &#34;A &#39;thank you&#39; would be nice. Is that face you&#39;re making any way to show your gratitude?&#34;

The claim that she had saved Iris&#39; life even once was dubious, but she at least //seemed// interested in helping her. Iris looked down at the ground to avoid that sharp green glare and forced out a &#34;Thank you.&#34; The woman in the white dress seemed appeased by the lip service.

Iris&#39; eyes traced across the ground and settled onto the mound of bodies yet again, now pressing up against each other as they stretched their limp arms upwards. It gave the pile the appearance of a termite nest and nauseatingly reminded Iris that those things were alive and seemed to have at least some amount of intelligence.

Iris tore her eyes away. She told herself to focus on the people who could still be helped. Namely, herself.

&#34;Oh?&#34; The woman seemed bemused as she followed Iris&#39; gaze. &#34;Interested in them, hm?&#34;

//Interested// was... not entirely wrong, but wholly imprecise. &#34;Are those...&#34; Iris forced herself to at least meet the half-lidded green eyes looking back at her. &#34;Are those people, are they-&#34;

&#34;People?&#34; The woman scoffed. &#34;Kehehehe. People. People, hm? Well, that&#39;s something,&#34; she said, moving the back of her hand to cover her toothy grin. &#34;Not quite, dear. That&#39;s just storage. Admittedly an inelegant solution, but needs must.&#34;

She acted like she was speaking about something far removed from her. She hadn&#39;t once debased herself to look at the writhing monument since she had arisen, despite making it a point to have Iris see it.

The bodies pressed against the ground, rubbing themselves on the grass and flopping in the stream, while the woman stood unconcerned atop the water and the grass. It looked as though she was simply a trick of perspective - in fact, it was simpler to assume she really was just an illusion, with an appearance so far removed from the bodies she had been clinging to. Iris tried to take a better look at any of the individuals in the pile, but they all seemed to bleed into one another.

&#34;Hmph.&#34; The longer Iris&#39; attention was focused on something other than the woman, the more incensed she became. &#34;They just anchor me here, that&#39;s all. They... //hold// me, but they&#39;re //not// me. No more than simple sheet music holds an orchestra&#34;

Iris pursed her lips. It was all she could do to stop herself from rolling her eyes. &#34;You don&#39;t quite look the part to me.&#34;

The woman smiled ear-to-ear in a convincing recreation of earnestness. &#34;I&#39;m much closer to it than you know. My name&#39;s [[[scp=3002|Lily Veselka]]]. You can think of me as a //friend//, for now, and isn&#39;t that what&#39;s important?&#34;

It was not lost on Iris that Lily probably either didn&#39;t want to spend the time explaining what she actually was, or was attempting to obscure her lack of a real explanation. Iris only hardened her posture. &#34;And why&#39;s that?&#34;

&#34;I told you back then, didn&#39;t I? With that friend of yours, and the farm, and all that shooting and whatsit? Ah, and here I was thinking you had a good memory...&#34; Lily sighed.

&#34;Hey, she&#39;s not my friend,&#34; Iris bristled. &#34;And I&#39;ve got a //great-//&#34;

&#34;As I said, I wanted to offer you a partnership.&#34; Lily plowed over Iris&#39; interjection like she hadn&#39;t heard it. &#34;I promised to come and speak with you myself, didn&#39;t I? And you were courteous to meet me halfway.&#34;

&#34;...Well, I appreciate the gesture.&#34; Iris tried - and failed - to not sound dismissive, but it was hard to not be skeptical of what appeared to be no more than a particularly gruesome projector and its hologram. &#34;But I don&#39;t even know where I am.&#34;

Lily&#39;s smile disappeared from her face as though she could read what Iris was thinking about her. &#34;I can assure you, there are a //great many things// you don&#39;t know. We&#39;ll just have to fix that, won&#39;t we?&#34; Lily narrowed her eyes and snapped her fingers, as sharp as a gunshot.
