    <pre><textarea class="page-source" readonly>[[include :scp-wiki-cn:theme:wish-for-miracle]]

Hello, it&#39;s me again, Relliorca. 

It seems that the characters involved in the story have not been finished yet... but we can preview some of them first. For example, a few researchers from 19-B-6 project team and a friend who came from afar, or an O5. They all have varying degrees of connection with Wyen in the story. Without further ado, let&#39;s take a look at who they are. 

Oh well I just realized that I didn&#39;t post my tales here... ...which makes it a little difficult to understand the characters. :(

Note: My art style may be... unattractive, and my skills are extremely unstable. Symptoms include, but are not limited to... distorted and horrible body proportions! Weird fan creations! Disgusting colors(maybe a little exaggerated)! 

------

[[collapsible show=&#34;+ Mr. Blake Lysander&#34; hide=&#34;- OMG O5-1 &#34;]]

[[image https://scp-wiki.wikidot.com/local--files/art:relliorcarolledawaywithherart/66d2b21d9eef2a563d4fc9b8a75f3bb0.webp]]

The founder, Blake Lysander, died unfortunately in 1471 and was later reborn even more unfortunately. Why did he show up? It&#39;s largely related to Rellyn Wyen. 

[[image https://scp-wiki.wikidot.com/local--files/art:relliorcarolledawaywithherart/15e2a7fae4bb61a5ccf66e4d451d8133.webp]]

So that&#39;s that. 

[[image https://scp-wiki.wikidot.com/local--files/art:relliorcarolledawaywithherart/552829257a40aea6d05a78a999574c27.webp]]

Another abstract one...

[[/collapsible]]

R: That&#39;s for sure, the project leader, a very, very important character(do not blame me for this). Yes...I have drawn several times  (but how come each time the effect is the same!). 

[[/collapsible]]

------

We&#39;re one step closer to knowing all the characters! 

But there are a few I haven&#39;t finished. Important Arden Edward, Laurent Kern, Elliott Campbell, [https://scp-wiki.wikidot.com/scp-049 and Elijah Itkin&#39;s brief appearance]... I will continue-definitely in my lifetime haha. 

You can look forward to the group image of the 19-B-6 project team, including the project. : D

Ah I think I&#39;ve angered a lot of people. I&#39;m gonna get out of here(rolled away).</textarea></pre>
