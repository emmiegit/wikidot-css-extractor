[[=]]
+ __BOOK 2__
+ THE WITCH
[[/=]]

----

The stale, oppressive air of Portland gave way to a cool, salty breeze. Ocean waves roared, and thin beams of moonlight slipped through the castle&#39;s windows. In its pale glow, we looked almost ghostly under our coatings of dust.

Gently, Arcos set me down. I had stopped crying, and now I was feeling rather embarrassed that I had done so.

&#34;He&#39;s gone,&#34; I said, staring at the wall where our Way had been.

&#34;Good,&#34; Perrin grumbled. Moritz shot him a look, but Perrin crossed his arms resolutely. &#34;He threatened to strangle us!&#34;

&#34;He wouldn&#39;t have actually done it,&#34; Arcos said, but he didn&#39;t sound so sure. &#34;He was just...bargaining.&#34;

&#34;We wouldn&#39;t have made it out at all if he hadn&#39;t,&#34; Moritz agreed. &#34;Right, Horatius?&#34;

Horatius didn&#39;t answer. He was also staring at the wall, with a sort of numb shock painted across his face. Softly, he spoke.

&#34;Don&#39;t you know who that was?&#34;

&#34;Yeah,&#34; Perrin replied, &#34;a madman who nearly got us killed. And I don&#39;t just mean the &#39;bargaining,&#39; because that whole death trap was his idea.&#34;

&#34;Well,&#34; Moritz said, peering out one of the windows, &#34;it //was// a shortcut.&#34;

At that, we all (save Horatius) seemed to remember just where we were. The portal had deposited us in a squarish room maybe five meters to a side. Windows looked out of three walls, and a doorway stood at the corner of the fourth. Looking west, I saw a sparse forest stretching into the distance. To the right, the old trees gave way to a dark ocean. its gentle waves glinting with the full moon&#39;s light.

&#34;Wow,&#34; I gasped. So this was Uk.

&#34;Wow indeed,&#34; Moritz said, grinning. &#34;Wow indeed.&#34;

&#34;This looks more like a house than a castle,&#34; Perrin scoffed, leaning out the south window to look down the wall.

&#34;Not from this side,&#34; Arcos whispered. He was looking to the east. I followed, and he moved aside to let me see. Craning my neck, I glimpsed a squat keep, joined to the building we were in by a low wall that encircled a large, overgrown courtyard. The keep was overgrown, too, with thick vines of ivy that made it nearly as green as the forest. Looking down, I saw that the other walls of this building were similarly covered.

&#34;Perhaps this was the castellan&#39;s house,&#34; Moritz mused.

&#34;Whatever it was,&#34; Perrin said, &#34;it&#39;s empty now. You think the keep is too?&#34;

Moritz gave him a funny look. &#34;Why would it not be?&#34;

He shrugged. &#34;This is a nice place. Coastal, too. Perfect spot for pirates to hide out.&#34;

&#34;Speaking from experience?&#34;

Perrin feigned offense. &#34;I&#39;m an upstanding mercenary, thank you very much. I would never stoop to such an unscrupulous profession as piracy. Isn&#39;t that right, Arcos?&#34;

Arcos grunted noncommittally. &#34;Is Horatius okay?&#34; he asked. The knight was now kneeling before the collapsed Way, with head bowed and hands clasped tight around the cylinder Nobody had given him. I could hear him praying quietly.

&#34;Oh, brother,&#34; Perrin sighed. &#34;He&#39;s really having a moment, isn&#39;t he?&#34;

&#34;Horatius?&#34; I asked, tentatively. He did not respond.

&#34;Well,&#34; Perrin said, irritably, &#34;I&#39;m going to go scout it out. Holler if he tries to kill you or something.&#34; Then he walked through the door, followed shortly by Arcos and Moritz. Left alone with Horatius, I approached him.

&#34;Only at my side,&#34; he whispered. &#34;Only in my hands. Only in my heart. Only in my mind.&#34; It felt rude to disturb him, but his behavior was disturbing me.

&#34;Horatius, we really need to get up and look around. Perrin thinks there might be pirates or something.&#34;

&#34;Only. Only. Only. Only.&#34;

&#34;Horatius, what are you-&#34;

I was interrupted by a loud shout from somewhere else in the house. It also interrupted Horatius, who looked up.

&#34;Shit!&#34; Perrin exclaimed, distantly. I heard a crunch and a cry of pain.

Suddenly Horatius was on his feet. He reached the doorway before me, which was a good thing, because a flung spear slammed into his shield and clattered to the floor. Now there was a //lot// of shouting in the hallway - and, I realized, downstairs. And outside. And in the keep. I didn&#39;t recognize the language, but it sounded like Perrin&#39;s instincts had been correct. And it sounded like we were horribly outnumbered.

Horatius raised his shield, just in time for a battle axe to bury itself in it. He reached for his mace, dropping the cylinder in the process. It bounced and rolled towards me.

&#34;**Run**, Geva!&#34; he shouted, swinging his mace at whoever was in that hallway. It struck home with a bloody crunch, but another spear immediately glanced off Horatius&#39;s armored shoulder.

My feet were obeying Horatius&#39;s command before I even knew what I was doing. As I bolted for the southern window, I called the metal cylinder to my hand, almost without thinking about it. Then I was out the window, cushioning my fall with magic, and sprinting off into the woods. No one saw me.

----

I did not go far. Down there in the dark, it was easy to draw the shadows around myself and hunker down among the old trees. The sounds of fighting did not last long, but the shouting continued on for some time. My heart was pounding as I listened. Surely my friends had not been killed? Who even were these enemies?

A flicker of torchlight appeared in the window, soon followed by my answer: a burly, bearded man clad in furs. Behind him, I thought I glimpsed a struggling Horatius being hauled away by two others. The man&#39;s eyes scanned the woods, but they glided right past me in the dark. As soon as he moved away from the window, I moved away from the trees. The castle wall stretched some distance to the east, but there was a high and seemingly unguarded gate not far away. I inched along with my back to the wall, then peered carefully through the opening.

In the courtyard, more of the fur-clad men were half-leading, half-dragging my friends - wounded and restrained, but alive - into the keep. I thought about slipping through the shadowed gate to follow them, but more enemies were emerging from the castle house now, wielding axes and shields, and heading my way. It would not be wise to go sneaking about while they were still on alert, so I retreated quietly to the forest and watched them take up positions by the gate. There would be no more sneaking tonight, but at least I knew that my friends were still alive. And I also knew who had captured them.

Valravns.

----

I used the cover of darkness to find myself a good tree to hide in, out of sight from the keep but within walking distance. I would need to be close, if I was going to rescue my friends.

When the sun rose early that morning, I took that opportunity to do a little exploring. Portland Isle seemed almost completely forested, and it wasn&#39;t very large; from the castle, it only took a little more than an hour to walk to its southernmost point, one a few places where the shorecliffs gave way to a proper beach. I allowed myself a little time to just stand there and bask in the salty breeze from the shimmering water, though both were chillier than I would&#39;ve liked.

Then I gasped; there were ships in the distance! I could just see the sun shining on their billowing sails. Maybe I could signal for help somehow, and...give my presence away to the Valravns, even if the ships out there missed or ignored my signal. Drat.

This thought in mind, I headed back toward the castle. It overlooked a sheltered bay between Portland and Uk proper, which were connected by a long, wide beach not too far away. That&#39;d be our escape route, once we were free, and it was nice to know that I&#39;d have a way to get off the island myself if worst came to worst.

I eyed the castle cautiously. There were guards at the gate now, which was inconvenient, but the ivy all over the weathered walls would still make them laughably easy to climb. The real problem was the sunlight, which left me very few shadows to hide in. If I was going to do any major sneaking in there, it would have to be under cover of the night.

I spent some time lurking outside the castle, slowly circling its walls from a safe distance and squinting up at the windows, but there wasn&#39;t much to see, at least not on the landward. The beach, though, was a different story. Two battered longships had been hauled up onto the sand in the castle&#39;s shadow. They were large, flat vessels with curved prows carved in the likeness of monsters; one, some kind of feathered snake, and the other a yellow shark-like creature with four frills around its head like flower petals. Each ship had only a single mast, and one of them was visibly cracked. There were several other places where boards had broken or come loose, and I guessed that the Valravns had stopped here to repair their ships after some stormy mishap. I wasn&#39;t sure how that information might help me, but I didn&#39;t discount the possibility.

After another hour or so of fruitlessly watching from the trees, I resigned to go back to my hiding spot and wait for nightfall. That would give me time to more closely inspect that curious cylinder Horatius had dropped.

It was nothing too fancy, at least not at first glance. Made from dark metal, it was maybe 25 centimeters long, and thick enough to be held comfortably in one hand. It wasn&#39;t especially heavy, either, though I could hear something sliding around in there when I jostled it. There was a hinged metal lid at one end, with a prominent keyhole right at the center. My initial attempts to pry it open were unsurprisingly fruitless, but I thought I might have better luck picking the lock. Mundane criminals typically need special equipment for that sort of thing, but all I&#39;ve ever needed to get somewhere I&#39;m not supposed to be is a touch of magic and a little patience. It should&#39;ve been easy enough to reach inside that keyhole with my sorcerous talents and move the tumblers around until it popped right open.

Well, it should&#39;ve. I had barely started on my first try when a long needle, glistening with poison, popped out of the keyhole like a striking viper, then quickly retreated back inside. I shuddered to think what that poison might&#39;ve done to me if I&#39;d been using my hands. I kept trying, of course, but the trap kept going off. It soon became clear that, in addition to jabbing any would-be thief, the trap was also resetting all the tumblers every time it triggered. The trap would have to come apart before the lock, but that was easier said than done. I grabbed it (magically, of course) the next time it sprang, but whatever convoluted, no doubt partly magical, mechanism kept reloading the thing made a scraping sound so unpleasant that I feared it&#39;d break inside the lock if I tried to pull the needle out, jamming the whole thing shut for good. Reluctantly, I released the needle and cursed as everything once again clicked back into place.

I also considered just smashing the tube open with a heavy rock, but I doubted myself strong enough for that. Anyone resourceful and paranoid enough to set up such a fiendishly complicated lock surely would&#39;ve made sure that &#34;nature&#39;s key&#34; couldn&#39;t easily open it either. In fact, I wouldn&#39;t have put it past that thing&#39;s designer to include some other trap inside the tube that would ruin its contents if forced open, if the sheer violence of being crushed with a rock wasn&#39;t already enough to do that. Maybe the thing rattling around there was a fragile vial of ink or acid or something.

With a frustrated sigh, I set the container aside. I would only get to see its contents //after// I rescued my friends, and the key that Horatius must have still had.

----

I passed the next several days in this manner. By day, I would creep about in the forest, spying on the castle from safety, or explore the island and pick out more good places to hide. I had to be careful; sometimes, groups of Valravns would emerge from the castle to gather wood, some of which was used to repair their ships and some of which was burned. Others trained in the courtyard, sharpened their weapons, or perused the forests in vain for game they could bring down with thrown spears. None ranged very far from the castle, though, and I had little difficulty evading them in my ever-growing collection of hidey-holes. No one seemed to be actively searching for me, which I took as proof that I&#39;d gone unseen on the night of our arrival.

By night, I found it almost humorously easy to evade detection. There must have been almost a hundred Valravns in that castle, but I&#39;ve always found it easier to avoid crowds than small groups. When a hundred people are in one place, they&#39;re all moving around and talking and looking at each other, not scanning the nooks and crannies for suspicious sights or listening intently for strange noises. It was a small matter to shroud myself in shadows, muffle my footsteps, and clamber across the overgrown walls.

Though they were not speaking a language I could understand, I was nonetheless able to learn quite a bit about these Valravns just by creeping around in their living spaces. Nearly all of them were men, and they were all warriors of some stripe, equipped with the axes and spears I&#39;d seen before as well as some colorful (but not mind-affecting) wooden shields. It was clear that this group was part of an army or raid, and it seemed that they had only stopped here temporarily. There was not much furniture in the castle, so most of the Valravns had made temporary accommodations on the floor of the keep, or the lower level of the attached house we&#39;d arrived in. This had the unfortunate side effect of keeping me out of their living quarters, lest I accidentally step on a sleeper and find myself surrounded, but I could still peek in through the windows. I even crawled in through one, finding myself in a kitchen or pantry of sorts mercifully devoid of slumbering Valravns. Their stores of dried fish, nuts, and berries fed me well in those furtive days. There were also some kegs of mead in there, which (after sampling my fair share) I stuffed with rotten fish from the trash heap. I doubted that it&#39;d be enough to make them sick - surely the foul taste would give it away - but if nothing else a lack of drink would put them in a sour mood, and maybe start a little infighting as the Valravns blamed each other for my prank.

Also in my creepings, I managed to identify their leaders. One was a huge man whose wild, red hair was braided with human bones, and whose skin was covered in strange runic tattoos. He wore no armor, only the hide of a bear, complete with a fanged skull for a helmet. Most of the others (understandably) seemed to regard him with fear. Their other leader was less immediately threatening, but I received the distinct impression that she was more respected than feared, unlike the bear-skinned brute. Instead of chain, her cuirass seemed to be made of bronze. I didn&#39;t see how the softer metal would provide any better protection, but it had at least allowed the armor to be intricately carved with designs that resembled gears, as well as writing in an alphabet I couldn&#39;t recognize. She also wore a steel helmet with stylized wings protruding from the sides, which struck me as even more impractical than favoring bronze over steel. I wondered if perhaps her armor was ceremonial, but both she and it bore enough battle scars to indicate otherwise. Maybe she was simply fierce enough to overcome these seeming vulnerabilities. That might explain why the men showed her such deference. All of them, that is, except the bear-skinned one, with whom I frequently saw her arguing.

Eventually, I even managed to locate most of my captured friends. Moritz was the first I spotted; it seemed that he&#39;d been put to work reopening the portal to Portland, under the supervision of armed guards. After seeing how quickly he&#39;d opened the one in the lighthouse, I got the distinct impression that the vaguely menacing diagrams that he was now drawing very, very slowly on that upstairs room&#39;s floor were intended more as a stalling tactic than actual effort. Silently, I applauded his resistance.

Arcos, also, was easy to find. After the first few days, he started to accompany the firewood-gatherers, who surely appreciated his great strength. They had wisely refrained from trusting him with an axe, though, and they also kept him bound in leg irons to deter any thoughts of flight. Just from the look in his eyes, I could tell that it took every bit of restraint he possessed not to kill the captors with his bare hands. Surely, though, he knew as well as I did that it&#39;d be impossible to fight our way out of this.

There was no sign at all of Perrin, and I wondered if he&#39;d been killed, perhaps in a botched escape attempt or as a result of one too many sharp retorts. I soon came to doubt this possibility, though, for I surely would&#39;ve noticed any major ruckus, 
and surely Arcos would be in much worse state if his partner had been slain.

I was likewise unable to lay eyes on Horatius, but there could be no doubt that he still lived, for I regularly heard him scream. It set my teeth on edge and my blood to boiling, but he was too deep in the castle for me to reach him. I sustained myself with promises that these bastards would pay double for every wound they&#39;d dealt him.

Free as I was to enter their lodgings by night, I often thought of doing away with these marauders in their sleep. I could never quite push myself to follow through on it, reasoning that I only had to make one mistake for the alarm to be raised and my life to be ended, and for fear of what might be done to my compatriots in retaliation even if I did get away. Horatius was no doubt suffering terribly, but the fact that he continued to be so tormented proved that he was still withstanding it. As long as Arcos and Moritz were yet unharmed, there was still a chance that I could get us out of this without taking such a tremendous risk.

Soon, I began to grow frustrated. Stealing their food and tampering with their drinks was well and good, but it wouldn&#39;t get my friends any closer to escape. Those ships would be fixed soon, and then they&#39;d probably take my friends off somewhere else, stranding me alone on this saintsforsaken island.

These thoughts are what inspired my greatest trick yet. On the fourth night of our captivity, I crept down to the beach toward the two longships. Their repairs looked almost complete; I had not acted a moment too soon. If successful, this act of sabotage would be by far my most effective. But if I failed, I might very well die. As I walked, though, I realized that these stakes were not as unfamiliar to me as they had once been - or, rather, that they had once again become familiar to me. I was back in my element, and while the sparse forests of Portland Isle were no more warm or comfortable than the hard pew in Saint Talloran&#39;s shrine had been, I now had a better reason to endure that adversity than mere senseless rebellion. My friends were in peril, and I was the only one who could save them.

That is why, after I effortlessly waved the few drowsy sentries to sleep in the sand, I emptied two pots full of smoldering coals from the kitchen fire onto the wooden decks of both longships. I was long gone by the time anyone in the castle noticed the fires, and one of the ships had burnt almost to the waterline by the time they extinguished them. The other ship had not burned much at all, sadly; I think that its stowed sails had somehow escaped the blaze, or perhaps its boards were simply better treated. The ensuing argument between the two leaders, right there on the beach, was their most spectacular yet. At one point, it almost seemed that they might strike each other and set off a whole fracas, though I was not that lucky. In the end, the man simply stormed away, barking orders at those who&#39;d gathered to watch. They seemed strangely uneasy.

In the morning, I learned what those orders had been. I watched as roughly half of the Valravns in the castle loaded provisions, weapons, and finally themselves into the longboat that was still seaworthy. To my relief, they didn&#39;t bring any of my friends with them. This, I had expected; if Moritz was still expected to open the portal, his allies would be better kept here as additional leverage. The wing-woman watched impassively from the castle&#39;s ramparts as the others sailed away. I assumed that they had promised to return, probably with another ship, or else the Valravns still in the castle would&#39;ve surely put up more of a fight against being marooned. I couldn&#39;t guess how long it might take for those reinforcements to return, but knew that I had to free my friends before that happened.

With the castle now half empty, I expected it to be even easier to creep through. However, it seemed that the warriors had finally wised up to (or at least come to suspect) my unseen intrusions, as every doorway was now manned by two guards with spears crossed before the entrance, a barrier I could not safely pass under without risking discovery. Fortunately, the castle&#39;s high, narrow windows were no more secure than they had ever been. While scrambling about on the ivy-shrouded walls, I was able to see and hear much that escaped me before.

On the first night, I peered in through a window of the house to watch Moritz work. He had now covered nearly the entire room in arcane scribbles, accentuated in places by unlit candles that were placed not quite randomly but not quite in a recognizable shape either. His armed guards, two spearmen, seemed bored and bewildered by the whole thing. I was still thinking about putting them to sleep and rescuing Moritz when their leader entered. The guards snapped back to attention at her approach, and even Moritz slightly adjusted his posture. To my surprise, she addressed him in heavily-accented Common.

&#34;How much longer will this take, wizard?&#34;

He shrugged. &#34;It is hard to say. The polarity of the connection-&#34;

She cut him off with an abrupt hand gesture. &#34;I care not for your arcane gibberish, and I am beginning to suspect that it means as little to you as it does to me. Are you stalling me, wizard?&#34;

&#34;Of course not! But this is a delicate ritual. I&#39;ve only done it once, and as far as I know no one had ever done it before that.&#34;

&#34;Are you suggesting that you might be //unable// to reopen my path to America?&#34;

&#34;No!&#34; he said, raising his hands in a placating gesture. &#34;No, of course not! But this sort of magic is very precise. You wouldn&#39;t want to be dumped into the endless black abysses beyond the edge of the universe, now would you?&#34;

&#34;And //you// wouldn&#39;t want me to saw your back open and rip your lungs out, but I&#39;ll still do it to you and all your friends anyway if you don&#39;t get this damned portal open before my husband returns. I //know// you are tricking me somehow, and I am not a woman who likes to be tricked!&#34;

Grimacing, Moritz bowed stiffly. &#34;Fear not, lady Runa. The portal will be opened.&#34;

&#34;It had best be, or I will open your throat instead.&#34; At that, she stalked from the room.

I now understood why she commanded such power among the Valravns.

Now sweating profusely and swearing quietly, Moritz sat back on the floor and returned to his book. He paged through it frantically, no doubt searching for a solution to this captivity that had somehow evaded him. I thought I might have an idea. With a wave of my finger, I ignited a small green flame on the candle nearest to him. Moritz noticed immediately. His guards, who had now returned to their dice game, did not. The wizard stared at the flame for a few seconds, then began to look cautiously about the room. I dared to drop my shadowy shroud just a smidgen, enough that someone who was already looking for me might pick up my outline. And so Moritz did, when his eyes alit on the window. I gestured at him, but he quickly looked away. Flipping to one of the book&#39;s blank back pages, he began to scribble furiously. Then, with a great cry of feigned frustration, he angrily tore the page from the book, crumpled it in his fist, and flung it towards the window - towards me. The guards briefly looked up at his outburst, but apparently they were used to such outbursts. Once Moritz had returned to his studies and they to their game, I reached out with my talents and drew the wad of paper to myself. Then I scrambled back down the wall to read it.

&gt; Demon summoning circle. Waiting signal. Others center keep bottom floor. Hurry.

I hurried.

&#34;Center keep bottom floor&#34; was, naturally, the hardest part of the castle for me to access. Peering in through the deep, narrow windows of the ground floor, I could see an octagonal room being used as living quarters for maybe a dozen Valravns, all of whom were never far from their weapons. A narrow partition blocked off the rear half of the room, save for doorways at either end, leaving me to assume that my friends were locked up back there somewhere. There was no way I could sneak past that many guards, even if I did come in through the window. I crept back to the forest before dawn, wracking my brain for a solution.

----

On the second night, I returned to the windows of their prison, but it was just as well-defended as before. I stayed there for hours, vainly hoping that some unexpected change might give me an opening, but no such opportunity arose. I was still trying to think of a plan when two new Valravns entered the room and went behind the partition. Soon after, they reemerged with Arcos in tow - and in chains. They led him from the room, and it took a great deal of scrabbling about on my part to find him again. When I did, it came as a great surprise - for they had brought him to the personal chambers of lady Runa, the westernmost room on the top floor. It was as large as the other rooms in the keep, but that just meant that Runa had twelve times the personal space of her soldiers. This room even had a large bed, a small table, and two chairs. Runa had been waiting in one, and Arcos was forcibly seated in the other. Then, at Runa&#39;s orders, the men who had escorted him unchained his hands and feet before finally leaving the room.

&#34;Welcome, Arcos,&#34; she said, in Common. He did not offer a reply.

&#34;Help yourself,&#34; she offered, gesturing at the food spread on the table. It was mostly the same as what I&#39;d been stealing from the kitchen downstairs, with the addition of some cheese, dried berries, and a flagon of mead that had somehow escaped my sabotage.

Arcos did not help himself. I don&#39;t even think he was looking at her.

&#34;I promise I&#39;m not poisoning you.&#34; To prove this assertion, she took a great swig of the mead and a bite of fish.

Still, he remained silent. Unbidden, the absurd thought that his tongue had been cut out crossed my mind.

&#34;Fine,&#34; she sighed. &#34;So you are a man of few words. But you are also a man with the blood of giants, and I wish to know how you found yourself in league with such inferior comrades.&#34;

Slowly, an expression of contempt twisted across Arcos&#39;s face.

&#34;Have I offended you, Arcos? I surely did not mean it. But it seems clear to me that your compatriots are less capable warriors than you. And yet the small man and the deranged knight both seem to think that they are the leader of your little band. Why do you tolerate this? I am curious.&#34;

Arcos growled quietly, but he did not speak. Or perhaps it was his stomach that was growling.

&#34;I can wait here all night, Arcos. Please, for the love of the gods, just eat something. I want to know your story.&#34;

Still eyeing her suspiciously, he reached hesitantly for a piece of fish. But once it reached his mouth, there was no longer any hesitation. I got the impression that they hadn&#39;t been feeding him much in captivity.

&#34;There. Now isn&#39;t that better? These are from my personal stores.&#34;

&#34;What do you want with me, wench?&#34; Arcos spat, through a mouthful of food.

She shrugged. &#34;I just want to know who you are. My people place great value on stories, and yours must surely be an interesting one.&#34;

&#34;It surely is,&#34; he said, still chewing. &#34;But I will not burden you with its telling, for it is as long and meandering as a mountain road, and I fear that it has ended most shamefully.&#34;

&#34;Oh, but it hasn&#39;t ended, Arcos. Not yet. Not anytime soon, if I have any say in the matter.&#34;

&#34;If you do not mean me ill, you have a very odd way of showing it.&#34;

&#34;By inviting you to my chambers and offering the finest food on hand?&#34;

&#34;By clapping me in irons and forcing me to work.&#34;

She shook her head. &#34;That was all my husband&#39;s doing. All he knows is violence.&#34;

&#34;And you know better?&#34; Arcos asked, skeptically. &#34;It is you who have been tormenting Horatius.&#34;

My fists clenched tighter on the vines.

&#34;It is I,&#34; she said, &#34;who have recognized your true potential and brought you out of bondage in pursuit of a greater and more glorious end.&#34;

&#34;And what end would that be?&#34;

Instead of answering, she took another long drink of mead. Beads of foam remained on her thin lips, which she licked lasciviously away.

&#34;Among Valravns,&#34; she said, &#34;you would be a legend. A warrior of your strength and wisdom...the mead-halls would ring with cheers when you entered. Feasts would be held in your honor. Maidens would throw themselves at your feet. You could be a king.&#34;

&#34;And you my disloyal queen?&#34;

Runa blinked in surprise, but quickly recovered with a smile.

&#34;Truly, you are perceptive. But why would you think me disloyal?&#34;

&#34;Have you not a husband?&#34;

&#34;Bah. Halvar has too much between the legs and not enough between the ears. He is a fierce warrior, but he is not a king. Not like you, handsome Arcos.&#34;

Slowly, she stood.

&#34;I am no king.&#34;

&#34;Why not?&#34; she continued, moving to Arcos&#39;s side. &#34;None could stand against you on the field of battle, not with me by your side.&#34;

&#34;Nor with your spear in my back?&#34;

&#34;I am not a murderess, Arcos.&#34;

&#34;No, you want me to kill your husband in your stead.&#34;

&#34;It would be easy, Arcos. Then we could rule this clan, and far more.&#34;

Standing behind him now, she placed her pale hands on his bare shoulders. Was she planning to slit his throat?

&#34;I have no desire to rule.&#34;

&#34;Why not?&#34;

&#34;I care not for prestige or politics. I live for the thrill of it; the flow of drink, the roar of battle, the sight of a new land, the cold wind through my hair, the hot embrace of strong arms.&#34;

At that, Runa bent forward, slowly wrapping her arm around Arcos&#39;s neck. I was startled by the bulge of her biceps; did she mean to strangle him?!

&#34;Arms like these?&#34; she asked.

&#34;You will not seduce me to your ways, wench.&#34;

&#34;But will I seduce you to my bed?&#34; she whispered, mouth mere inches from his ear. &#34;You are a man who burns with passion. Passion like that which burns in me.&#34;

Oh. I could feel my invisible face turning red.

&#34;Your passion is not lust. It is greed. Do you want nothing for its own sake?&#34;

&#34;Power! I seek power for the sake of power, for that is all that truly matters!&#34;

&#34;If that is what you believe, we have nothing else to say to each other. I will not be your husband, and I will not be your fool.&#34;

Suddenly, her arm tightened. Arcos&#39;s neck muscles bulged, resisting her grip.

&#34;Then perhaps you should be my slave. I hold the very lives of your wretched friends in my grasp. I could slaughter them before your helpless eyes.&#34;

&#34;You would not,&#34; he said, through gritted teeth. &#34;You need Moritz to open the portal. Horatius knows something you want. And Perrin has surely double-crossed us already, probably without you even having to bed him first.&#34;

She squeezed harder, and Arcos grimaced.

&#34;Then perhaps,&#34; she hissed, &#34;I should kill //you//.&#34;

&#34;Do what you will,&#34; he rasped. &#34;I am no one&#39;s slave.&#34;

For a long, tense moment, she maintained her stranglehold. I silently willed Arcos to stand up, to fight back, to do //something// besides just sit there and suffocate! But perhaps he knew better than I did, because she eventually released her grip.

&#34;Damn you, Arcos. Damn your honor, and the respect it commands. There will come a day when you die penniless in some gutter, or hanged by a cruel magistrate, or laid low by some petty illness or accident, and as you walk the cold road to Hel you will remember me. You will remember the kingdom you could have had.&#34;

&#34;I will remember,&#34; he spat, &#34;that your breath reeks of fish.&#34;

Angrily, she swatted him on the back of the head. Arcos grunted with pain, but he did not retaliate, nor did he move as she left the room and the guards returned to place him back in chains. I still begged him to fight back, but even I knew that such resistance would be fruitless as long as they had us so outnumbered.

Although...now that I knew where Runa slept at night, perhaps I could prevent her from waking up again. I could not hang by that window all night, though, as my trembling arms attested. Instead, I climbed up to the roof to rest. Up there, I was delighted to find a door. It was a flimsy, wooden thing, clearly meant for stopping weather, not intruders. I dared not open it yet, though, not while Runa was still angry and on the prowl, and probably alert for threats.

At least, I told myself this was the reason for my hesitation. I know now that I was merely a coward, afraid to do what I had done only once before, and only then in desperate self-defense. I will not speak of the circumstances that taught a young street girl to kill, but let it suffice to say that I would not have survived them had my sorcerous talents not manifested when they did. Carefully planning a murder felt different from that reflexive lash, and I was not eager to face those feelings - or those memories - again. For that reason, I eventually retreated back to the trees, to spend yet another day in hiding.

----

On the third night, I heard Horatius screaming louder than ever. The sound carried easily from the bottom floor, echoing up through a lightwell to the roof where I was still lying in wait, still trying to work up my courage. As I perched beside the well, I could clearly hear the happenings below. Each scream, crack, and thud made me almost sick with anger. Soon, though, the noise subsided, to be replaced with speech.

&#34;I must admit,&#34; Runa said. &#34;You have lasted far longer than I expected.&#34;

When Horatius replied, his voice was hoarse from screaming.

&#34;I am stronger than you could ever imagine.&#34;

&#34;Perhaps you are right. But make no mistake: what you have experienced thus far is only a fraction of the torment I could inflict upon you.&#34;

&#34;And what you have seen is only a fraction of my resilience.&#34;

&#34;That, I believe. As fun as it would be to string you up by your ankles until your head bursts, or force you underwater until you nearly drown, or slice off every single one of your fingers and toes joint by joint, I don&#39;t think it would do me any good. If you were ever going to break, you would have done so by now. I don&#39;t know if I should be impressed by your resolve or frightened by your madness. Mostly, I am frustrated. This is why I have decided to try a new approach. Perrin?&#34;

&#34;Hello, Horatius,&#34; said a familiar voice. &#34;You look like shit.&#34;

That bastard! Arcos had been right. Horatius did not answer Perrin&#39;s greeting, nor his insult.

&#34;Could we have a moment, dear?&#34; Dear?! &#34;He&#39;s not gonna talk to me while you&#39;re around.&#34;

There were some moments of silence, presumably as Runa left the room, but I doubted she had gone far.

&#34;Okay,&#34; Perrin said, &#34;here&#39;s the thing. We are all going to die here unless we give these people what they want. The only thing keeping me out of that chair is you being in it. I&#39;m impressed and a little horrified by just how much punishment you&#39;ve been able to take, but it&#39;s getting kind of old, Horatius. If she gives up on you, she&#39;s gonna start working on us. See, here&#39;s the way I figure it. You&#39;re a real selfless martyr kind of guy, right? So what are you gonna do when she starts threatening to do that to me and Arcos and Moritz and...our other friend, once they catch her. She can&#39;t keep playing guerilla forever like this. She&#39;s gonna do something stupid and get caught, and then we&#39;re all gonna have to watch while they slice her to pieces. Please, Horatius. It&#39;s better that you give up whatever secret you&#39;re hiding //now//, before we all get cut to bits. At least this way if they do let us go when they&#39;re done, we might have enough fingers left to still fight the dragon.&#34;

When Horatius next spoke, it was with cold certainty.

&#34;You are a traitor and a coward, Perrin. I would not lift a finger to stop these Valravns from torturing you, and I know that Arcos would kill them all with his teeth or die trying before he submitted to such treatment. They won&#39;t do a damn thing to Moritz as long as he&#39;s working on that Way. And unlike you, I have faith that our friend will get us out of this mess.&#34;

&#34;Faith?! I have faith, too, you know. D-11424, patron saint of the D-caste, not that you&#39;ve heard of him. Every time the Foundation sent me into one of their dungeons, I prayed to him to help me miraculously survive whatever nightmare I found down there. Every time I face danger, I strive to emulate his calm, his cleverness, and his unbelievable luck. And I think it is because of those qualities that I still have all my body parts. But you know what, Horatius? I also understand that D-11424 is //dead//. Just as dead as your patron saint is, no matter how fanatically dedicated you are. Just as dead as our friend will be if - when - these psychopaths get their claws on her. We are on our own in here, Horatius. Maybe you //want// to die, but I want to //live//. I want all of us to live, even you. If you want to martyr yourself, there are less literal ways to do that! Spill your metaphorical guts to that bitch, and maybe she won&#39;t spill our literal ones. Please!&#34;

&#34;I have nothing more to say to you, coward.&#34;

&#34;Dammit, Horatius. Damn you.&#34;

A moment passed, then I heard Runa&#39;s voice again.

&#34;He&#39;s right, you know. I am going to kill that little witch when I catch her. Or maybe I&#39;ll sell her to the Daevites, and see what wonderful torment they come up with.&#34;

&#34;You won&#39;t catch her.&#34; He sounded more sure than I felt. &#34;And if she doesn&#39;t kill you, I will.&#34;

Runa laughed. I did not.

----

On the fourth night, I decided to do it. I swallowed my fear and revulsion and told myself that this, too, would be just as much a necessary act of desperation as my other deed had been. It was well after midnight when I returned to roof, stopping by Runa&#39;s window on the way to ensure that she was asleep. The makeshift door had no hinges or handles, so I used my magic to slowly and carefully and quietly lift it aside. The narrow stairs below led to an unmanned guardroom overlooking the courtyard; another flight led down from there to the main part of the second story. I crept along, wrapped tight in shadows and silence, with my stolen sailor&#39;s knife in hand. The stairs ended at a hallway, which led right to the room above my friends&#39; prison and left to Runa&#39;s chamber. There were no doors, only animal hides strung up to create some rudimentary privacy. No guards glimpsed me as I brushed past the curtain and into Runa&#39;s room.

The only light inside came from the dying embers in the fireplace beside the door. In their low glow I could see Runa&#39;s shoulders rising and falling as she breathed. Her back was towards the door; what luck! The bed was in the opposite corner from the entrance, with its headboard against north wall. The window through which I had first spied this room was just past its foot.

I made my way towards her, carefully avoiding the table and chairs. I would sneak up from behind, then slit her throat before she even had a chance to wake. It would be easy. //It would be easy//, I told myself, trying to steady my nerves and shaking hands. After all she had done to my friends, this was the only fate she deserved.

Perhaps because I was so lost in this internal struggle, I did not notice the nutshells on the floor until I stepped on them. Very loudly.

In an instant, Runa sprang from her bed, wielding a spear that had to be two meters long at least. Had she not been stabbing in the dark, I&#39;m sure she would&#39;ve run me through. Realizing I&#39;d been had, I did the only thing that made sense and ran. I flung a wave of green energy out behind myself, hoping that it might knock her down long enough for me to make it back outside. She shouted an alarm as the wave hit her, and I was sure that the sleepers in the next room would&#39;ve heard. One of them swept aside the curtain in the hallway just as I entered from the other end. Had I not been shorter than his usual opponents, his battle axe would&#39;ve taken off my head. Instead, I blasted him too and sprinted up the stairs. Not a moment after I rounded the corner, Runa&#39;s spear stuck into the wall beside me. She led the charge up the stairs, but now I was going faster than her, scrambling up the narrow flight on all fours like a rodent. I had dropped my knife somewhere along the way, not that it would do me any good now.

Once on the roof, I realized just how deep my trouble really was. There was no way to scale these walls quickly. I could jump down, using a very useful trick that would make me land as lightly as a feather, but that would just put me in a courtyard that would very soon be filling up with bloodthirsty Valravns. My only chance was to leap down and sprint for the gate through the wall. Runa arrived on the roof just in time to see me jump, and she rushed to the battlements to watch me float down. Just as my feet touched dirt, a pack of warriors burst out of the keep entrance. I ran for the gate, only to find myself cut off by another group that had been guarding it. I sent another wave of energy their way, or tried to, but stumbled and accidentally discharged the blast into the dirt instead. More warriors boiled out of the castle house to my right. The only way I could have run was left, but the courtyard was empty of cover. I&#39;d certainly catch a spear in the back before it reached the other wall.

I do not clearly recall what exactly happened next. My mind was swimming in a sea of panic. I was //sure// that I was about to die. I am not sure that, even in the adventures that followed, I was ever again as frightened as I was in that courtyard, running alone and unarmed surrounded by these screaming savage warriors with axes and spears bigger than me. There wasn&#39;t even going to be anything left of my body.

But...somehow in that sea of panic, some part of me grabbed on to a few key things. There was the castle house there on my right, that my enemies were spilling out of, where Moritz was presumably still locked up somewhere. There was the floating trick I had done when I jumped from the roof, that I had done many times in Arnven when ditching the scene of a crime or sneaking out of the castle. There was that blast of green energy that I had accidentally launched at the ground, and all the dirt and dust that that blast had kicked up. I didn&#39;t //consciously// put these things together. It just sort of //happened//. And after it happened, I was standing on the roof of the house.

Dizzily, I looked down at the befuddled warriors who had presumably seen me jump about five meters into the air. One of them chucked a spear at me, but it was a bad shot at a bad angle and ricocheted harmlessly off the crenelations around the roof&#39;s edge. I jumped back away from it, making myself all but invisible from the ground. Then I saw Runa, still standing at the spot where I had jumped from the keep and visibly fuming with fury at my unlikely escape. Riding high on my near-miss with death, I pressed my luck just a bit too far by making an...extremely rude gesture in her direction.

With a snarl, she slammed the butt of her spear against the stone, striking sparks from it. Golden light raced up the shaft to accumulate at the point, which began to glow red hot. The intricate lines on her cuirass also lit up, and the gear designs somehow seemed to spin. Then, with a loud metallic clang, two great wings of gleaming, sharpened bronze erupted from the back of her armor. It was then that I once again began to run.

I could hear Runa swooping down behind me, but all that mattered was the outer wall of that house. I plunged over it headfirst, and that glowing spear almost took my head off as she whizzed past overhead. I launched a blast an instant before I hit the ground, bouncing myself up to land painfully but non-fatally on my face. The impact nearly stunned me, but there was no time for that. Runa //dove//, and it was all I could do to get out of her way before that spear smote the dirt with the fury of a lightning bolt. It was only the softness of the soil that saved me; Runa wasted precious moments prying her embedded weapon out of the earth, and several more folding her wings back shut to chase me through the trees. I knew the forest better, though, and I could duck under low branches that would be hazards to her. I zigged, I zagged, and I scrambled over logs and under bushes. I kept running until I reached the southern shore, long after the shouts and torches of pursuing warriors had faded into the distance. I crawled into a hidden hollow, and there I finally fainted.

----

On the fifth day, I awoke in pain. The previous night&#39;s brushes with death had seemingly left my whole body cramped and bruised, and it felt like the heat from Runa&#39;s spear had even burned the back of my head a little. The thirst, pain, and exhaustion made it a long, painful walk back to my original hidey-hole, but the last of the stolen mead therein helped with all three. It also awakened my appetite, which I quenched with the last bits of stolen food. Only once the hunger subsided did I start to wonder why there were not still warriors searching for me in daylight, when it would surely be much easier. Though the relief was much-needed, it created a pit of dread in my stomach. Something had changed, and likely not for the better.

I was still only halfway to the castle when I heard a horn blow. I hoped that didn&#39;t mean what I thought it meant, but a quick trip down to the beach confirmed my fears: the returning longship had been sighted. Time was almost up.

In a panic, I formed and discarded countless desperate plans to penetrate the castle and save my friends, despite the broad daylight and the numerous Valravns who were doubtless expecting me to try something stupid. All this and more flashed through my mind as I ran through the woods, trying to ignore the pain in my arms and legs. When I had no choice but to stop for breath, I would creep back to the beach to measure the enemy&#39;s progress. Each such look only worsened my panic, because the ship seemed to be moving more than twice as fast as I was. What had started as just a blur in the distance was now the clear outline of their strangely-shaped ship. I could even see the splashing of the oars beside it, as if the damnable westward wind was not speeding them along enough. At this rate, I would be hard-pressed to even reach the castle before they did.

I didn&#39;t make it. By the time I got there, Halvar was already leading his force around to the castle gate - or at least, what was left of his force. The forty-some Valravns he&#39;d departed with had been reduced to maybe half that, and many of those who remained were clearly injured. They all looked worn and weary.

In a flash of inspiration, I wondered if this might be an opportunity. Runa had clearly wanted her husband dead; might she see his force&#39;s sorry state as a chance to take him out? She might not have another choice, if there wasn&#39;t room for both her troops and the rest of Halvar&#39;s on a single ship. Either way, it was a good thing that he hadn&#39;t brought reinforcements as I&#39;d feared. As subtly as I could, I inched along the castle wall to peer through the gate, which I now realized had not been under guard when Halvar&#39;s men passed through it. Interesting.

I grinned hopefully, or perhaps manically, when I saw the scene in the courtyard. Halvar&#39;s party had stopped just inside the gate, because they&#39;d found Runa&#39;s men blocking their path. Her soldiers stood clearly formed for battle, shields and weapons at the ready. Runa&#39;s voice came from the direction of the keep, higher than I could see through the gate, and Halvar bellowed a reply. I couldn&#39;t understand what they said, of course, but I had more important things to worry about anyway.

The room where the Way was, where Moritz would hopefully still be, had a window on the exterior wall. I scrambled up the wall, not bothering to be terribly quiet since everyone&#39;s attention was surely fixed on the coup-in-progress, if that is what it was. Peeking in through the window, I was elated to find Moritz still alive! He was still under guard, but they were both too focused on what was happening outside to even know what happened when I put them to sleep.

&#34;Moritz!&#34; I whispered, as he looked confusedly at the suddenly unconscious guards.

&#34;Geva? Gods, what happened to you?&#34; I must&#39;ve looked even worse than I felt, but living in the woods for a week will do that to you.

&#34;Never mind that,&#34; I said, already through the window. &#34;What&#39;s happening? Do you know what they&#39;re saying?&#34;

&#34;Runa&#39;s about to overthrow Halvar. He was supposed to come back with another ship but went out to raid instead and...well, look at them.&#34;

&#34;This is our best chance, then. Is this ready?&#34; I asked, gesturing at the summoning circle.

He nodded. &#34;All we need is the Source. Help me drag these bastards over there.&#34;

Quickly, we moved the dozing guards onto the diagram. With a quiet word, Moritz lit all the candles.

&#34;Do you have to stay here,&#34; I asked, &#34;after the, uh, demon shows up?&#34;

&#34;No. I&#39;m just going to point it at them and let it fly.&#34;

&#34;Then you&#39;ll come with me to get the others while they&#39;re distracted.&#34;

&#34;Okay.&#34; He glanced out the window. &#34;When?&#34;

I moved over to it and peeked out as well, staying low in case someone happened to glance our way. Now I saw that Runa was standing on the roof, at the same spot I&#39;d jumped from the night before. With her towering spear, bronze wings gleaming in the sun, and golden hair flowing in the sea breeze, she cut a far more impressive figure than the bedraggled Halvar. Moritz translated key bits for me as they argued.

&#34;They&#39;re insulting each other...he thinks she was wasting her time trying to open this portal...she&#39;s uh, she&#39;s saying a very rude thing about his privates...said she&#39;s found a new, uh, not husband, I think that translates more like consort, or maybe concubine?&#34;

On cue, Perrin stepped onto the roof. That backstabbing scum! He smiled like a cat with a mouthful of bird. Moritz didn&#39;t translate Halvar&#39;s response, but I got the gist of it. I was still glaring daggers at Perrin when, to my utter shock, he caught my eye. Then the bastard had the audacity to wink! I nearly told Moritz to sic the demon on that backstabber inst-

&#34;Glory to Halvar!&#34; Perrin suddenly cried, triumphantly raising a rapier in his right hand. Confusion flashed across Runa&#39;s face, right before Perrin&#39;s short sword plunged through the seam where the front and back of her cuirass met.

Oh. &#34;Now!&#34; I sputtered. Dutifully, Moritz raised his staff and speared one of the sleeping guards with its crystal tip. The other one started awake at the sound, but he was dead before he could stand.

Outside, Halvar&#39;s confused men had taken Perrin&#39;s betrayal as their cue to attack Runa&#39;s even more confused forces. Halvar himself led the charge, howling like an animal as he smashed effortlessly through the enemy lines with a massive axe. Perrin had already disappeared down the stairs, leaving Runa on the roof to bleed out.

&#34;[[[scp-7412 |Fifteenth Lord of Envy]]]!&#34; Moritz chanted, arms raised. &#34;Master of the Dark Triad! I conjure you, demon, and I command you to smite my foes!&#34; The dead guards&#39; blood evaporated into sulfurous smoke, and a living shadow with burning red eyes took form within it.

&#34;Go!&#34; Moritz yelled, frightened. He didn&#39;t have to tell me twice. We barreled down the hallway, heading for the stairs at the far end of the house. No one tried to stop us; all the Valravns were outside, dying. No one even noticed as we ran behind Runa&#39;s forces and into the keep. As we passed, I saw the demon erupt from the window with a peal of sinister laughter and plunge into the masses below, scattering blood and fire everywhere.

The first room we came to was the one we&#39;d been looking for. I raced to one end of the partition, and Moritz to the other. On my side, I found a trapezoidal room that was almost empty, save for a small alcove at the back where a huge, familiar figure had been chained.

&#34;Arcos!&#34; I cheered, just as he cried my own name in surprise and relief.

&#34;What&#39;s happening?&#34; he asked, as I quickly set my magic to work against the locks holding him down.

&#34;The Valravns are fighting each other. Perrin stabbed Runa and Moritz summoned a demon.&#34;

&#34;He what?!&#34; Arcos asked, before I even got to the part about the demon.

&#34;In more ways than one,&#34; Perrin said, now standing at the doorway. I whirled on him, and was somewhat surprised to see him carrying Horatius&#39;s hideous shield in one hand and holding Arcos&#39;s hammer over his shoulder with the other.

&#34;You traitor!&#34; I accused.

&#34;Does this look like betrayal?&#34; he asked, hurrying over to us. He laid the hammer against the wall beside Arcos. &#34;I don&#39;t know where they put your armor, but there&#39;s no time for that anyway. Let&#39;s get the Corb out of here before that berserker castrates us both.&#34;

I finished opening the chains. Immediately, Arcos stood and grabbed his hammer. &#34;Where&#39;s Moritz?&#34; he asked.

&#34;Over there,&#34; I said, pointing to the other half of the partitioned area, which was presumably Horatius&#39;s cell. Arcos and Perrin both winced.

&#34;Come on,&#34; Arcos said, grimly. We hurried back into the main part of the room, only to find ourselves face-to-face with a dozen of Runa&#39;s men, apparently fleeing from the twin horrors of berserker and demon outside. They looked at us with pure hate.

&#34;Now, look-&#34; Perrin began, but they weren&#39;t interested in his tricks. They just charged.

&#34;Kitchen!&#34; Arcos yelled, because the hallway leading to it was right beside us. I darted down it, with the others retreating behind me. They didn&#39;t run, though; the two of stopped a meter or so past the door, with Perrin half-crouched in front of Arcos. I looked back in confusion, wondering why they hadn&#39;t simply fled.

Soon, the answer became clear: they didn&#39;t need to. Perrin moved like a cat, dodging every stab and swing and replying to each one in kind with a precise jab of his rapier. Arcos swung the hammer clean over Perrin&#39;s head, shattering shields and skulls alike. The Valravns never had a chance, forced as they were by the narrow hallway to attack one at a time.

&#34;Go around!&#34; Perrin barked, clearly addressing me. Quickly, I dashed down the stairs from the kitchen to the inner courtyard, an arc-shaped space with a stone floor and an open ceiling where a wooden roof had rotted away. At its other end, the courtyard had another short flight of stairs leading up to a room the Valravns had camped in. From there, another hallway led back to the room where he had entered.

I didn&#39;t get to go that way, though, because three of the fleeing warriors had apparently thought better than trying to fight my friends in the hallway and tried to go around, just like me. They rushed me at once. Remembering a time I&#39;d evaded three guards, I sent a blast of force their way, aimed low and wide. It caught all three of them in the knees, knocking them flat on their bellies. I jumped over the one in the middle, stomping on his back as I continued into the first room.

I was met there by three other Valrvans, who seemed unsure if they wanted to plunge into Arcos and Perrin&#39;s kill zone, chase after the three I&#39;d just tripped, run back outside, or drop their weapons and surrender. When I came into the view, they mistook me for an easy target. One raised a spear to throw it, but it hadn&#39;t even left his hand when a ball of fire shot from somewhere to my left and downed all three of them with a loud //whoosh//. I looked to its source, Moritz, standing in the gap at the end of the partition.

I could hear the ones I&#39;d tripped getting back up. I backed away from the hall, offering them to Moritz, who nodded appreciatively. He stepped proudly in front of the doorway just as they had all filed into the hall. In the instant before a lightning bolt fried them, I heard one scream for mercy.

At about the same time, Arcos and Perrin finished dispatching the other six. They picked their way over to us, across the heap of corpses they&#39;d created.

&#34;Damn,&#34; Perrin said, looking at the destruction Moritz had wrought.

&#34;Wait until you see what my demon did,&#34; he said, with a smile.

&#34;Where&#39;s Horatius?&#34; I asked, looking between Moritz and the doorway he&#39;d emerged from.

Moritz grimaced and looked away.

&#34;What?!&#34; I demanded.

&#34;He...&#34; Moritz began.

&#34;Geva...&#34; Arcos cautioned.

Perrin dropped the warded shield.

&#34;No!&#34; I cried, dashing past them both and into the torture chamber. I will not - can not - go into the details of what Runa had done to my friend, but I know that when I saw him I was sure he hadn&#39;t survived it. I think that I screamed. I might have fainted briefly. I know that I lost myself for a bit, because the next thing I remember is being back in the courtyard, with Moritz pulling me along. I remember it because Halvar&#39;s howl was what startled me back to my senses.

He rushed us like the savage bear whose pelt he wore. He was covered head-to-toe in the black, sooty remains of the demon he&#39;d apparently vanquished, and the blood-red runes glowing through on his arms and chest made him look even more infernal than it had. Perrin dodged the first swing of that massive axe by mere centimeters. He tried to counterattack, but the backswing clubbed him across the head, throwing him down unconscious or dead. Howling like an animal himself, Arcos responded in kind. Halvar didn&#39;t even move to block the incoming hammer, still stained with the blood and brains of his slaughtered kin. It fell like a meteor on the berserker&#39;s head, shattering the bear-skull helmet to dust. And then it just...stopped.

Arcos gazed dumbly at the unharmed berserker. We all did. A blow like that should&#39;ve driven him knee-deep into the ground, but he hadn&#39;t even felt it. Nor had it slowed him down any, as Arcos discovered when the axe blade passed with centimeters of his face, swatting his hammer aside. The axe&#39;s beard hooked around the shaft, and it was all Arcos could do to keep it from twisting out of his grasp.

Moritz threw another bolt of lightning at Halvar, but it fizzled uselessly where it made contact with his glowing tattoos. The same happened when I struck him with a blast of green energy.

Recovering from the initial shock, Arcos twisted his grip and heaved the other way, hooking the axe with the spike on the back of his hammer. Halvar and he heaved with all their might, each trying to disarm the other. Arcos&#39;s longer weapon offered better leverage, and it almost looked like that would make the difference, but he was taken off guard when Halvar simply let go of the axe and drove his shaggy head directly into Arcos&#39;s face. Arcos staggered backwards, trailing blood from his nose and dropping the tangled weapons in stunned confusion.

&#34;Hurry!&#34; Moritz said, trying to drag me away. All the other Valravns were dead; we had a clear path to the exit, if we didn&#39;t mind leaving the others to die. But I couldn&#39;t do that, not so soon after losing Horatius. I tore free of Moritz&#39;s grip, flinging blast after blast at the berserker&#39;s back, head, and limbs, all without effect. Horatius did not join me, but I cared not for his cowardice. I would stay to defend my friends. I //had// to.

Like a wild animal, Halvar pounced, trying to throw his massive hands around Arcos&#39;s neck. Arcos did the same, perhaps hoping that the mystic tattoos wouldn&#39;t protect him from strangulation. And so they found themselves locked together, crushing grips around each other&#39;s collars, bulging arms pushing at each other, and feet dug deep into the dirt as they resisted. Halvar&#39;s fury was like nothing I had ever seen. His mouth literally foamed as he snarled and bit at Arcos&#39;s face mere centimeters away. And slowly, slowly, I could see my friend&#39;s grip start to weaken. Arcos was strong, but it seemed that nothing could stand against the berserker&#39;s rage.

His rage.

Quickly, I reached for his mind, in the same way I did to persuade people or make them fall asleep. His thoughts were a churning, boiling ocean of animalistic fury, but maybe if I could calm them...

Slowly, slowly, my charm took hold. His burning mind resisted me with every push, but he couldn&#39;t do that and wrestle with Arcos. He began losing ground. He took a step back.

Above me, I heard a shriek.

&#34;WITCH!&#34; Runa howled, in equal parts pain and rage. I couldn&#39;t look away; if my concentration slipped for even a moment, Halvar might overpower Arcos and throw him to the ground. I was paralyzed; should I abandon Arcos to his fate and try to protect myself? Should I try to save him and hope that Runa missed? The chance to decide passed me by as Runa dove from the roof, wings outstretched and spear leveled right at me. I only had time to close my eyes.

There was a loud CRASH. Runa screamed, and I heard her slam to the ground behind me. It was her pained wail that finally did Halvar in, dredging whatever confused feelings he had for her back to the surface of that bloody ocean. My charm took effect, and the rage deserted his body in an instant. Effortlessly, Arcos flung him to the ground. Breathing heavily, he picked up his fallen hammer and advanced on the supine berserker. Halvar was too exhausted to even scream before the massive spearhead plunged into his chest. His glowing tattoos faded away.

I turned around. Runa had indeed missed me. Her spear was embedded half a meter in the ground, still quivering slightly with the force of its impact. She lay a short distance away, neck broken by her collision with the ground. But how had she...?

Horatius. Half happy and half horrified, I realized that Horatius was now beside me, still wielding his warded shield. He had bashed Runa aside with it, not a moment too soon. He stood there unsteadily, covered in his own blood.

&#34;And that&#39;s all I wrote,&#34; he mumbled. Then he collapsed.

At the same time, Perrin awoke. &#34;Did we win?&#34; he groaned piteously.

Arcos sat heavily beside him. &#34;We did&#34;.

&#34;Oh, thank the gods!&#34; Moritz cried, running towards us from inside the house. Were there not larger matters at stake, I would have berated him for cowardice. Instead, I quickly fished dado&#39;s potions out of my pocket and withdrew one with a trembling hand. Horatius was still breathing, somehow, but it didn&#39;t sound like he could keep it up much longer.

&#34;What&#39;s that?&#34; Moritz asked.

&#34;A heel potion,&#34; I snapped, as if it was obvious. &#34;Now hold his head.&#34; Moritz obliged, steadying Horatius so I could pour the vial&#39;s red contents into his mutilated mouth. Weakly, Horatius swallowed.

The effect was immediate. His bleary eye snapped open and his spine arched as the magic shot through him. The sound he made was almost worse than the way he looked as bones cracked violently back into place, flesh wounds rippled shut, and regrown parts erupted from their stumps with sprays of blood. I had to look away to keep from being sick. Moritz did throw up.

After six horrible, horrible seconds, it was over. I looked back at Horatius, who was now absolutely drenched in blood but otherwise unharmed. He stared up at the sky, dazed.

&#34;Ouch,&#34; he gasped.

----

It felt a bit ridiculous, sitting in the keep&#39;s kitchen and stuffing ourselves with our dead foes&#39; food, but it was sensible thing to do. None of us had eaten well during the whole fiasco, and most of it would now be going to waste anyway. The smell of the Valravns fried by Moritz still permeated the place, and Horatius was still drenched in his own blood, but we were too tired and hungry for those things to bother us much.

&#34;Okay,&#34; said Perrin, around a mouthful of fish, &#34;I think we need to compare notes about what happened over the last week. This is the first time I&#39;ve even seen you, Moritz. What&#39;s been going on?

Moritz swallowed a handful of dried fruit. &#34;She wanted me to re-open the Way so they could reach America again.&#34;

&#34;And you didn&#39;t want to sic the Mayor on them?&#34;

&#34;I couldn&#39;t do it. I think the Mayor is holding it shut to keep Nobody in.&#34;

&#34;That means he&#39;s still alive!&#34; I said, relieved.

&#34;Poor bastard,&#34; Arcos muttered.

&#34;And it means we&#39;ll need to find another way home,&#34; Perrin complained.

&#34;Eventually, yes,&#34; Horatius agreed. &#34;But we will have much bigger problems between now and then.&#34;

&#34;True.&#34;

&#34;Horatius,&#34; Moritz asked, &#34;has she just been torturing you this whole time? I could barely concentrate through your screaming.&#34;

&#34;Essentially, yes.&#34;

&#34;Why?&#34;

&#34;She wanted to know the true reason for our quest.&#34; Horatius glanced at me when he said that.

&#34;Didn&#39;t she already?&#34; Arcos asked, sniffing suspiciously at a mug of only-slightly-fishy mead. &#34;To kill the dragon.&#34;

&#34;She thought there was more to it than that.&#34;

&#34;Well,&#34; Perrin cut in, leaning towards the knight. &#34;Is there?&#34;

&#34;No,&#34; he responded, with a suspicious glare. &#34;But if I had not pretended otherwise, I would not have been useful to her any longer. Though I must say, Perrin, I don&#39;t think my ruse would have been nearly so effective had you, too, not been so sure that I am hiding something. Do you really distrust me so much that you would sell us out for an imaginary secret?&#34;

&#34;Of course not! That was acting, pragmatic acting. I had to make myself useful somehow, just like we all did. I can&#39;t open portals or survive torture or lift heavy stuff, so I used my other skills. Simple as that.&#34;

&#34;Was it also pragmatic acting to let that bitch bed you?&#34; snapped Arcos.

He crossed his arms. &#34;Actually, that was contingent on me killing Halvar, so we didn&#39;t get the chance.&#34;

Arcos seemed unconvinced. &#34;Hmph.&#34;

&#34;What, are you jealous?&#34; Perrin laughed. &#34;You had your chance.&#34;

Arcos glared at Perrin.

&#34;Oh,&#34; Perrin said, bluster failing. &#34;I thought we talked about this.&#34;

&#34;We&#39;ll talk about it later,&#34; Arcos said, smashing a walnut with his fist.

I cleared my throat. &#34;So, would anyone like to know what I&#39;ve been doing?&#34;

&#34;The ships,&#34; Perrin said, eager for the topic change, &#34;that was you, wasn&#39;t it?&#34;

&#34;Uh huh,&#34; I answered, proudly.

&#34;And the fish in the mead?&#34; Arcos grumbled, pushing his mug away.

&#34;Yep!&#34; That one was less funny now that the mead was ours, but I was going to own it.

&#34;And all that ruckus last night,&#34; Moritz asked, &#34;what was that about?&#34;

&#34;Oh, uh......I snuck in and tried to, uh...I tried to kill Runa. She was ready for me, though. I almost didn&#39;t get away.&#34;

The others stopped their various fidgets to look at me. I was a little insulted by the surprise. Horatius nodded to me.

&#34;That was very brave of you, Geva.&#34;

I smiled unsteadily. &#34;Thanks.&#34;

&#34;You&#39;re just full of surprises, princess,&#34; Arcos said, with bewildered admiration.

&#34;Yeah,&#34; Moritz added, &#34;speaking of which, where did you get that potion? That was disgusting, but I can&#39;t argue with its effectiveness.&#34; Horatius nodded, but also winced.

&#34;Oh, that?&#34; I said, pretending it was no big deal. &#34;I bought three of them from some apothecary near the Pegasus.&#34;

Moritz&#39;s brow furrowed. &#34;What apothecary?&#34;

&#34;The sign said &#39;apothecary by dado&#39;. That was the name of the man running the place, I think. He was very strange.&#34;

Moritz looked at Arcos. &#34;Is there an apothecary near the Pegasus?&#34;

He scratched his chin. &#34;There&#39;s a whorehouse //called// The Apothecary.&#34;

&#34;It wasn&#39;t a very big shop,&#34; I said, uneasily. Why were they doubting me? &#34;Maybe it just opened, or something.&#34;

&#34;Maybe,&#34; Moritz agreed, uncertainly.

&#34;Well,&#34; I said, defensively, &#34;it worked, didn&#39;t it?&#34;

&#34;Of course,&#34; Moritz agreed, eyeing Horatius. &#34;Though I don&#39;t think we should make a habit of ingesting strange liquids from mysterious shops.&#34;

&#34;Well, there&#39;s only two more anyway.&#34;

Horatius nodded. &#34;Then we&#39;ll need to use them sparingly. Try not to let the dragon hurt any of you as badly as Runa hurt me.&#34;

&#34;Man,&#34; Perrin said, shaking his head. &#34;What was the //deal// with these people anyway? Moritz, did you understand that language they were using?&#34;

He shrugged. &#34;Mostly. It&#39;s still a bit like what they spoke in the Rus&#39;. From what I could pick up, I think this bunch was part of a larger fleet on its way to Brasil-&#34;

&#34;Brasil?&#34;

&#34;Another island, uh, that way. Apparently there&#39;s elves on it.&#34;

&#34;Elves?&#34;

&#34;That&#39;s what they said.&#34;

&#34;Huh.&#34;

&#34;So they were on their way to a raid in Brasil, but these two ships got blown off course by a storm and stopped here for repairs. After we appeared, Runa wanted to stay here and find out what we were up to, but Halvar wanted to keep going and rejoin the fleet. Then you ruined her ship,&#34; he said, nodding appreciatively at me, &#34;so she told him to go back home and get another one, but it looks like he went on to the raid instead, only to miss the rendezvous and be badly beaten. I suppose that when he came back here with no treasure, no more ships, and half his men missing, Runa just decided that she&#39;d had enough.&#34;

&#34;I get the impression,&#34; Horatius said, &#34;that this Halvar wasn&#39;t too terribly smart.&#34;

&#34;Damned strong, though,&#34; Arcos quietly admitted.

&#34;No kidding,&#34; Perrin agreed, rubbing the lump on the side of his head.

&#34;So,&#34; I said, grabbing Arcos&#39;s discarded fishy mead, &#34;are we going to the dragon now?&#34;

Moritz looked at me funny, then shook his head. &#34;Oh, you left before we talked about this.&#34;

&#34;Talked about what?&#34; I hate being the only person in a room who doesn&#39;t know something.

“Before we go to the dragon&#39;s lair, we&#39;re going to stop by, uh…&#34; Moritz took a moment to fish one of Nobody&#39;s Ancient maps out of his robe. &#34;Dozmary Pool first.&#34;

“Why? What’s that?”

“It’s a lake. Nobody thought there might be a magic sword in there that can help us.”

“A magic sword?”

“Yes. Apparently it used to be a Relic, until it was stolen by fairies about a hundred years ago.”

“Fairies?”

“That’s what he said.”

I waited for more, but there wasn&#39;t any. I shook my head.

&#34;Sure, why not.&#34;

----

First, though, there was looting to be done. While Arcos and Perrin sorted out their issues in the kitchen, I went to explore Runa&#39;s quarters, in case there was anything small and valuable in there. I was pocketing a nice ivory comb when Horatius entered.

&#34;Do you have it?&#34; he asked, no-nonsense.

&#34;Have what?&#34; I played.

&#34;//Do you have it?//&#34;

I frowned. &#34;Maybe. Do you have the key?&#34;

&#34;Give me the scroll.&#34; He held out a demanding hand.

&#34;Why should I?&#34; I protested, hands on hips. &#34;You gave it to me for safekeeping, and I kept it safe.&#34;

&#34;You snatched it off the ground as I was being captured.&#34;

&#34;And if I hadn&#39;t done that, then Runa would&#39;ve cracked it open, and probably your head too. I think I&#39;ve earned the right to hold onto it, and you&#39;ve proved that you can&#39;t.&#34;

&#34;You can&#39;t even open it.&#34;

&#34;Not until you give me the key.&#34; I held out my own hand, mocking his presumptuous gesture. Horatius matched my smirk with a squint.

&#34;Perhaps you are right,&#34; he admitted. &#34;I have already read its contents, so it probably //would// be best to let another carry it, in case something else happens to me.&#34;

&#34;Exactly! Now give me the key.&#34;

&#34;That, I will not do.&#34;

&#34;What? Why not?&#34;

&#34;Because you have no need of it, not yet. I am letting you hold the scroll for safekeeping, not because you have earned the knowledge it holds. If some ill fate befalls me, you can pry the key from around my lifeless neck. Only then will my responsibility become yours.&#34; He turned to go.

&#34;What if I tell Perrin?&#34; I asked, quickly.

Horatius dismissed me with a wave. &#34;He already suspects. And if he tries to open that, it&#39;ll poison him to death.&#34;

I glared at his back until it was out of sight. This was just plain unfair. But at least now I knew it was a scroll.

----

We spent that night in the castle. It felt weird, sleeping on our slain enemies&#39; beds (or bedrolls, as it were), but I was too tired to care and the others were just glad to not be sleeping in chains. By unspoken agreement, no one attempted to sleep in Runa&#39;s bed.

In the morning, I found that Arcos had awkwardly attached Runa&#39;s backplate to his own mismatched armor. It didn&#39;t really fit, of course, but the real benefit would be the wings, not the protection. Horatius tracked down his own armor, and he was much relieved to find that the Valravns hadn&#39;t vandalized his warding pattern. I asked him if he could really keep all that heavy armor on the whole way to Dozmary Pool, but he assured me that he was well-accustomed to discomfort and plenty tough enough to withstand the weight. After what he&#39;d been through, I couldn&#39;t dispute that.

Moritz estimated that it would take us five days of westward walking to get there, or maybe more if the terrain was unfriendly. It wasn&#39;t too bad, though; the trees around Portland soon gave way to heaths and moors, which had little in the way of obstructing undergrowth or landmark-blocking trees. The gloomy weather - gray, with a chance of drizzle - did lend the barren landscape a sort of vague ominousness, but it wasn&#39;t nearly as bad as I&#39;d imagined &#34;the cursed island of Uk!&#34; to be.

I retained that impression until we reached the lake. While most of the land we&#39;d seen was barren, this place was //blasted//. Not so much as a blade of grass rose from the blighted, soggy soil, which had in some place been scorched black or even turned to glass by what I could only assume was dragon breath. The ground was further marred by irregular patterns of strangely-shaped pits that I only belatedly identified as immense footprints. I tried not to wonder just how huge that dragon would have to be to leave such marks in its wake, and instead focus my attention on the lake.

Next to such dismal surroundings, the water itself was all the more striking. The slow wind stirred little waves across its shining surface, which remained sky blue despite the gray clouds hanging low overhead. As we drew closer, I saw that somehow the lake was not reflecting the real sky at all, but a bright and sunny day when weeds and reeds had still ringed the water&#39;s edge. Truly, this was a magical place.

Curiously, I bent down to the touch the pure waters. My finger was mere centimeters from its surface when a woman&#39;s voice commanded me to stop. Startled, I jumped back and looked about for the source of the shout. There seemed to be no one in sight, but then I noticed the Lady.

Slowly, she rose from the center of the lake. Clear water cascaded from her verdant green hair, in which several sets of crayfish-like antennae twitched. Her skin was covered in deep blue scales that shimmered in the sunlight, and her nose was little more than a pair of amphibian slits. Yet despite these bizarre features, I knew she was beautiful, the most beautiful being I had ever seen. This was not a conclusion, but a //fact//, in the same way that one looks at a cloud and knows it to be white. The effect was disconcerting, but not altogether unpleasant. The waters of the lake rose up to envelop her like a transparent dress, and I did my best not to ogle the lithe, scaly form underneath. She walked across the water&#39;s surface, back straight and chin up in a noble posture that suited her perfectly. It was clear, instinctively, that this lake was her domain, and we but intruders upon it. I might have knelt, were I less inclined to rebellion. Only Horatius succumbed to that particular urge.

&#34;Fair Lady of the Lake,&#34; he began.

&#34;Silence,&#34; she said, with a voice like the gentle rush of wind through tall reeds. We remained in such until she ceased her approach, some three meters away from the shore. &#34;Tell me, humans. Why have you come to my lake? As if I do not already know.&#34;

&#34;We seek the sword [[[scp-2307 |Excalibur]]],&#34; Horatius replied, carefully pronouncing the Ancient name that Moritz had relayed to him, &#34;with which to slay the three-headed dragon.&#34;

The Lady sighed. &#34;Of course you do. As have many, many before you. What makes you any different?&#34;

Horatius looked up at her. He was trying to hide his confusion. &#34;M&#39;lady?&#34;

She rolled her piscine eyes. &#34;Oh, get up. I&#39;ve heard enough &#39;m&#39;lady&#39;s for five lifetimes.&#34;

This was clearly not going the way he&#39;d expected. Awkwardly, Horatius climbed to his feet. &#34;Apologies...ma&#39;am?&#34;
