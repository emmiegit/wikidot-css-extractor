&#34;Don&#39;t apologize. Explain to me what makes you so much more deserving of my sword than every other would-be conqueror, long-lost heir, and cheese-brained Don Quixote that&#39;s come after it, these last two thousand years.&#34;

Recapturing some of his confidence, Horatius puffed out his armored chest. &#34;I am a knight of Saint Talloran, sworn to-&#34;

&#34;Alright, that&#39;s enough. Gods, the way you humans prattle on about knights and oaths and lieges. All that chivalry foolishness only exists because of how badly this sword was misused the last time one of you got your grubby paws on it. Arthur never talked to me like that, I assure you.&#34;

&#34;I...beg your pardon?&#34; Horatius asked, cautiously.

She crossed her arms. There were fins on her elbows. &#34;What part of that was unclear?&#34;

He glanced at the rest of us for support, but we were equally clueless (and, in Perrin&#39;s case, enjoying the show far too much to interrupt). Hesitantly, he cleared his throat.

&#34;Forgive me, ma&#39;am, for I&#39;m not quite sure who this &#39;Arthur&#39; is, or what disrespect he might have shown you, but I surely do not mean to emulate it.&#34;

Her jaw dropped, revealing small, pointed teeth. She looked at the rest of us, but we could only shrug or shake our heads in response. Groaning, the Lady rubbed her eyes.

&#34;You mean to tell me that bastard has finally been forgotten?&#34;

&#34;At least to us,&#34; Perrin answered.

Moritz piped up, hesitantly. &#34;I...//may// have seen the name before, in some Ancient children&#39;s literature, but I don&#39;t quite remember the story.&#34; He shrugged apologetically. &#34;Much was lost in the Great Breach.&#34;

&#34;Clearly,&#34; the Lady said, shaking her head. &#34;But his legacy, or rather the false one that this sword fabricated, still lives on in your knightly nonsense.&#34;

&#34;Ma&#39;am,&#34; Horatius said, bristling, &#34;matters of honor and nobility are hardly-&#34;

&#34;I&#39;m done talking to you.&#34; Sarcastically waving goodbye with one webbed hand, she turned and began walking back into the water.

&#34;Nice going, buckethead,&#34; Perrin muttered.

&#34;I didn&#39;t see you jumping up to talk to her!&#34;

&#34;Cuz you were doing such a good job! I didn&#39;t want to interrupt your eloquent soliloquy.&#34;

Arcos stepped between the two before they could make any greater fools of themselves. While his arms pushed the squabbling humans aside, he called out to the faerie queene.

&#34;Ma&#39;am? Lady?&#34; She ignored him, still sinking with every step she took away from the shore, but he persisted. &#34;Don&#39;t you //want// the dragon killed? I assume it&#39;s what did this to your lakeshore.&#34;

She stopped and looked over her shoulder. &#34;Of course I want it killed! Look at this mess!&#34; With a whoosh, water currents bore her back to the shore. &#34;There used to be cattails taller than you on this bank, and lily pads bigger than dinner plates! Now it&#39;s just mud and dirt and soot. I haven&#39;t heard a frog in twenty years! What I wouldn&#39;t give to see a duck again...&#34; She trailed off, looking sadly down at the blasted mud.

&#34;Then let us help you,&#34; Arcos asked, politely. &#34;We&#39;ll take care of the dragon, and it&#39;ll stop pestering you about that sword.&#34;

&#34;Like you are?&#34; she retorted, cocking a hairless eyebrow. &#34;How do I know you&#39;re not the dragon&#39;s minions sent to trick me?&#34;

Perrin snorted, and she shot him a look that could&#39;ve wilted trees, perhaps literally. To his credit, he didn&#39;t flinch. &#34;Lady, if we were spies, I&#39;m sure we&#39;d be doing a much better job. I know the dragon would&#39;ve told us about this Arthur fellow, at least.&#34;

&#34;Hmm,&#34; she said, scowling. &#34;You //are// quite incompetent.&#34;

Perrin spread his hands. It was self-evident.

&#34;Hold on,&#34; the Lady said, scratching her feeler-filled hair. &#34;If you haven&#39;t heard of Arthur, how did you know about me?&#34;

&#34;Nobody told us. Er, a guy who called himself &#39;Nobody&#39;. I&#39;m sure his parents didn&#39;t actually hate him that much.&#34;

&#34;And this Nobody character,&#34; she said, skeptically, &#34;what&#39;s he like?&#34;

&#34;Tall. Gray. Pointy hat.&#34;

&#34;Hmm. Sounds untrustworthy.&#34;

We couldn&#39;t really argue with that.

&#34;If I may,&#34; Moritz intervened, &#34;why exactly are you so reluctant to let go of this weapon?&#34;

The Lady looked him up and down. &#34;You&#39;re a scholarly sort, yes? You look like a book-reader.&#34;

He nodded. &#34;Yes, ma&#39;am.&#34;

&#34;Then I&#39;d like you to imagine something for me. Imagine that this scruffy-looking turf-burner,&#34; she said, gesturing at the only slightly offended Perrin, &#34;somehow got his greasy mitts on the Stylus. Now imagine that, just because he&#39;d picked up a thing without understanding what it even was, everything ever written about him //changed//. He went from a selfish ruffian to a noble king, from a murderous backstabbing rapist to a romantic hero, from a dirty, jumped-up brigand to a figure of myth and legend. Now imagine that every other book that&#39;ll ever be written about him will only have those tampered sources to work with, that every story ever told about him will be based on those lies, that whole generations of young men will go tromping about the wilderness in his over-inflated shadow, committing all kinds of crimes and embarrassments in imitation of some frivolous absurdity that never even existed. That&#39;s what happened when Arthur got ahold of it, and I am not about to let another of you air-breathing toddlers etch your foul-tasting names on the walls of history.&#34;

&#34;Oh,&#34; Moritz said. &#34;That does sound rather...undesirable.&#34;

&#34;I&#39;m not a rapist,&#34; Perrin grumbled.

I groaned. These bumbling men were ruining everything. &#34;Excuse me, Lady?&#34;

She looked down at me. &#34;What?&#34; she said, contemptuously.

I took a deep breath to collect my thoughts. &#34;Look. We aren&#39;t here to trick you out of your sword, or hand it off to your enemies, or even become legends. We didn&#39;t even know it existed two weeks ago. We&#39;re only here because the man who hired us to kill that dragon believed this weapon would give us a fighting chance. That&#39;s all we came here to do, is kill Marscar the Dark. We don&#39;t //want// your sword, but we //need// it.&#34;

&#34;Hmm,&#34; she scoffed.

&#34;Look,&#34; I sighed. &#34;I&#39;ll tell you what. If you give us the sword, we&#39;ll go kill the dragon, and then we&#39;ll bring it straight back.&#34;

Her scaly eyebrow rose. &#34;You&#39;d really give up the most coveted sword on Earth?&#34;

I shrugged. &#34;As I said, we didn&#39;t even know about it two weeks ago.&#34;

&#34;Are you suggesting that the Stylus of the Broken God is not //worth// coveting?&#34;

&#34;Of course not!&#34; I said, raising my hands in a placating gesture. &#34;But it does seem like it&#39;s worth more to you than it is to us. So we&#39;re not going to take it from you if you don&#39;t want to give it. But please, just let us borrow it. Then maybe you can have frogs again.&#34; I gestured at the lake&#39;s barren shores, to remind her what was at stake.

The Lady paused for a time, deep in thought. I almost began to hope that I&#39;d convinced her.

&#34;Still,&#34; she said, hesitantly, &#34;even if I did let you &#39;borrow&#39; the Stylus, how can I be sure that you&#39;d //make// it back? Everyone that&#39;s ever tried to kill Marscar has had the favor returned to them tenfold.&#34;

&#34;None of them had the Stylus,&#34; I said, simply.

&#34;None of them were children, either. I am unconvinced.&#34;

&#34;Lady,&#34; Horatius spoke up, his confidence suddenly back in full force, &#34;I know now that you place little stock in oaths and devotion, but surely you place some weight on deeds. Know that we have traveled across the sea itself to complete this quest, and that we have endured the loss of one of our number, outwitted temptation and treachery, withstood captivity and torment, and battled mighty foes in its course. Yet we still stand here together, united in our dedication to this quest. I have not known these men - or this young woman - for long, but they have already proven themselves the boldest, fiercest, and most talented companions it has ever been my pleasure to fight beside. There is not a shred of doubt in my mind that we will vanquish this dragon and any other evil that stands in our way. And when the quest is complete, you have my solemn word - not as a knight of Saint Talloran, or by any other authority - but as a man who would sooner die than turn from his task, and who would sooner tear out his tongue than break an oath so given. Perhaps you place no stock in knights or nobility, but I beseech thee, oh Lady: place your faith in my friends. If it is but one smidgen of the faith I have in them, then it shall be enough.&#34;

For a long time, her fishy eyes looked over us. She inspected our faces: Horatius&#39;s tightly set jaw, Perrin&#39;s confident smirk, Arcos&#39;s gentle smile, Moritz&#39;s wise eyes, and my own determined glare. She took in our battered armor and bloody weapons, our fading bruises and healing cuts. And beneath all that, I think she saw something greater. Something that made her smile.

&#34;Very well,&#34; the Lady said, quietly. I nearly cheered.

&#34;But know this,&#34; she said, raising one claw-tipped finger. &#34;If you do betray me, I will curse you and all your descendants, unto the seventh generation!&#34; Then she vanished into the water, leaving us to contemplate that unpleasant thought for a few moments. When she returned, she was carrying something, laid flat across her upturned palms. It looked like an old, old longsword, not quite a meter long and completely sheathed in rust.

&#34;That&#39;s the Stylus?&#34; Perrin asked, skeptically.

&#34;The rust will be gone by the time you get to London. The metal heals when it&#39;s not in my lake.&#34;

&#34;Interesting,&#34; Moritz whispered.

&#34;Now,&#34; the Lady continued, &#34;who shall wield the Stylus of the Broken God? Who, in whatever stories might be written of you, shall be a hero?&#34; She eyed us carefully. Horatius glanced at us, but no one else stepped forward. With a grateful nod, he approached the Lady.

&#34;I shall bear this blade. And if it be within my power, I will ensure that my deeds live up to its stories.&#34;

&#34;So it shall be,&#34; she said. &#34;Kneel before me, you who would wield the Broken Blade.&#34;

He did so, knee plates just touching the water&#39;s edge.

&#34;Upon thee I bestow this weapon, that thou might scratch the Dragon from the story of the world. May thy legends be more honest than those of thy predecessors, and thy deeds more noble. Know that the Stylus is not thine, nor was it ever anyone&#39;s, nor shall it ever be until a new king comes. Thou shalt return it to me when thy quest is accomplished, or thou shalt pay the penance. Rise and go forth, Sir Horatius. May the Mekhane guide thee on thy quest.&#34;

At that, she laid the sword in his outstretched hands, and he rose.

&#34;I shall not fail thee, Lady.&#34;

She smiled. &#34;Farewell, Horatius. I shall see thee soon.&#34; Then she turned to go. We watched her as she sank, too enraptured by her otherwordly beauty to look away. The water was past her hips when she stopped and looked back at us.

&#34;Oh, by the way. This does not make you the king of England.&#34;

Horatius blinked. &#34;What&#39;s England?&#34;

The Lady laughed, with a sound like a little waterfall. Then she vanished beneath the surface.

&#34;Why would a sword make you king?&#34; Arcos asked.

&#34;I haven&#39;t a clue,&#34; Horatius answered, looking down at the encrusted weapon.

----

The Lady&#39;s promise was true; within the week, all the rust had fallen away to reveal a blade of strangely dark steel. She had given us no scabbard, so Horatius discarded his mace and attached the new weapon to his belt in its place. It seemed a bit dangerous, having that blade thumping around by his hip, but Horatius was unconcerned.

It took us ten days in all reach the place that Nobody&#39;s map called London. There were a lot of roads and highways on that map, but no trace of them remained now. A few ruined structures still poked out of the trees in places, mostly old stone things like Portland Castle, and places like these made good campsites on those nights we spent in the wilderness. On the sixth day, we passed by a huge circle of ancient, inscrutable stones, some standing upright with more balanced atop them. Moritz marveled at it, but I wasn&#39;t particularly impressed; the Ancients had built much bigger things, or so it was said.

We never saw any people, or even any sign of people more recent than the Ancients. That was more or less what I&#39;d expected - and, after our lovely visit with the Valravns, come to hope for - from the legends, which all said that Marscar the Dark would destroy anything people tried to build in its territory. We did see deer fairly often, in part because the normally skittish animals had apparently long forgotten their fear of humankind and so let us come quite close before bounding away. It was eerie, but also peaceful in a way.

London, however, was a different story.

Like the lakeshore, the former site of Ancient London was now a blighted wasteland. T dragon&#39;s mere presence, even in the subterranean city far below, had poisoned the ground around it. Charred tree trunks protruded from the lifeless dirt like broken fingers reaching for the bruised clouds. Strangely-colored lightning crawled across the sky, and thunder rolled constantly. The chill wind stank of rot.

Set against this backdrop, the blue bus looked downright ridiculous.

&#34;What is that?&#34; Perrin asked, pointing at the bizarre vehicle. It was a huge, bulky, rectangular box on wheels, painted bright white and ocean blue. Glass windows lined both sides, and doors flanked what seemed like its front end, where another large window peered out above a weird symbol and a pair of huge glass bulbs. There was some kind of windowed hatch on the back, as well as more of the strange bulbs. A short pipe protruded from its underside, which I saw was festooned with all manner of strange machinery.

&#34;It looks like one of the Ancients&#39; vehicles,&#34; Moritz said. &#34;But it&#39;s in perfect condition!&#34;

&#34;Where does the horse go?&#34; Horatius asked. Moritz looked at him like an idiot.

I stood on my toes and peered inside. There were two padded seats at the front, facing the big window and some kind of counter covered in weird dials, with a huge wheel sticking out of it on the left side. There were more seats in the back, as well as some cabinets and things. A few empty bottles and papers were strewn on the floor.

Arcos pulled at one of the handles, but it didn&#39;t budge. &#34;What&#39;s it doing here?&#34;

&#34;Well,&#34; Horatius said, &#34;this was an Ancient city.&#34;

&#34;Yeah,&#34; Moritz scoffed, &#34;and it was all destroyed, except this. It doesn&#39;t even have dirt on it.&#34;

&#34;Look at this,&#34; Perrin said, pointing at the ground. It was only then that we noticed the footprints. It looked like several people had been meandering around the vehicle, maybe even sitting or lying down, before heading off in a nearly straight line. The prints didn&#39;t come back. We also noticed that the vehicle itself didn&#39;t seem to have left any tracks, though its weird treaded wheels certainly should have.

&#34;I don&#39;t like this,&#34; I said. The vehicle&#39;s oddness had rapidly gone from almost amusing to very unsettling.

&#34;I like it even less,&#34; Horatius said. He was standing at the front, gazing grimly at the strange symbol. We circled around to stand beside him. Up close, it was clear that this was actually //two// symbols; one, a simple arrangement of diagonal lines, seemed to be part of the vehicle&#39;s perfect paint job. The other had been carefully painted over it with thick black lines. Now that I&#39;d separated it out from the underlying design, this one was unmistakable: a black circle surrounding the stylized head of a three-eyed fox, with nine curved lines descending beneath it.

&#34;The Nine?&#34; Perrin breathed.

&#34;The Nine,&#34; Horatius confirmed.

My blood ran cold. The 11th Mobile Legion of Epsilon was Overwatch&#39;s personal death squad, dispatched only to carry out high-profile assassinations, eliminate dangerous fugitives, and neutralize the most dangerous rebel leaders. I had spent much of my time in the castle fearing and preparing for an assault by them, even though the Foundation had not acted directly against a Free City since Eridar&#39;s war of independence. Seeing their symbol here of all places suddenly made that remote fear of assassination real again, and I could tell that it had similar effects on the others. For the Foundation&#39;s enemies, the Nine were boogeymen. And now, they were all too real.

&#34;Why are //they// here?&#34; I asked, voice trembling.

&#34;Same as us, I imagine,&#34; Perrin groaned.

&#34;To kill the dragon,&#34; Horatius finished.

I looked at him suspiciously. Could this have something to do with that secret scroll he wouldn&#39;t let me read? He caught my glance and slowly shook his head. If it was, he wasn&#39;t about to tell me. I knew better than to bring it up.

----

According to Nobody (who, once again, had apparently conveyed this information to my companions after I left), our entrance had once been the Ancient Foundation&#39;s primary means of egress to and from UnLondon. It was technically part of the city far below, a magically-created tower a kilometer high, with a single very, //very// long staircase spiraling inside it. There had also been an “elevator,” whatever that was, though Nobody had doubted that it’d still be functional after all this time. He had also predicted that any building which might have once marked the way would have been destroyed by the Great Breach, the dragon, or the sheer weight of 800 years. Even the river had changed course over all those centuries. If not for the Nine&#39;s footprints, it would have been nearly impossible to find the subterranean entrance, even with our maps. They led us to a large heap of weathered stone, from which several good-sized boulders had been removed to reveal a hollow underneath. Arcos peered into the gap, then waved us forward.

“This is the place,” he said, with more dread than anything. “The staircase.”

It was, truthfully, not much to look at. The stone stairs wound clockwise around a thick central pillar, descending quickly into darkness. The walls were unadorned, save for periodic sconces that might have once held lights but could now scarcely hold themselves up. The prints of the Nine were clearly visible in the layer of dust, dirt, and ash that had accumulated on the steps. Without another word, we descended, single file. Arcos went first, probing the darkness with his night vision. Moritz walked in the center of our procession, between Horatius and myself, lighting the way for the rest of us with his glowing staff. Perrin stayed in the back, of course.

The descent was slow, painful going. I had unconsciously expected the walk to be about the same as a horizontal trip of the same distance, but my burning leg muscles loudly attested otherwise. After nearly an hour of nothing but stairs and silence, Moritz called us to a halt, begging for a chance to sit and massage his aching legs. We all followed suit, of course. Arcos seemed to be managing alright, but the rest of us would probably be wobbling like drunken sailors by the time we reached the bottom. It was hard to even know how far off the bottom was; bereft of any other landmarks, our only indicators of depth would’ve been the number of steps or corroded wall sconces, the count of which we had long since lost. I briefly entertained the fevered notion that we’d somehow been tricked, that this was a false entrance that only plunged endlessly into the depths of the earth, and that by the time we realized the ruse we’d be far too exhausted to return to the top before our waterskins ran dry. Arcos must have sensed my budding panic, because I felt his huge hand pat my sweat-soaked shoulder. He didn’t say anything, though, perhaps recognizing the futility of comforting words in such a place as this.

Eventually, our legs calmed enough to resume their punishment and carry us further downward. And so we continued for almost half an hour – the longest half hour of my life – until Arcos suddenly barked at us to stop. I was startled by his tone; had he spotted the Nine? The dragon?!

“What?” Horatius gasped, moving to replace his heavy helm.

“They end.”

“Thank the Saints!” Perrin said, already pushing forward.

“No!” Arcos insisted, moving backwards and pushing the befuddled Horatius with his broad back. “They //end//.”

Understanding settled on us like a cloud.

“Oh,” I said, weakly. 

Moritz shoved past me. “Let me see,” he grumbled. Horatius – suddenly moving very, very carefully – pressed himself against the side to let the wizard through. Arcos turned, and with one long finger he pointed at the black gulf beneath us. There were four more steps past Arcos, but the fifth had half crumbled away, and everything beyond it was darkness. Moritz’s light showed only an irregular edge where even the wall and the central column had fallen away. It was as if we’d reached the bottom of the world and hung suspended over nothing but the stifled air of inner earth. This, I realized, was the ceiling of UnLondon. A sudden vertigo swept over me, and the others followed suit as I reeled back from the yawning gulf until it was well out of sight. Then, as one, we collapsed to a seat once again.

“Oh Saints,” Perrin quietly groaned, head between his knees. “How far down is it?”

“I don’t know,” Arcos said, distantly. “I couldn’t see anything, not even when he brought the light down.”

“We’ll have to lower a lantern down,” Moritz said.

“And tell the dragon we’re right here on its doorstep?” Perrin challenged. “Why don’t we spread some butter on ourselves while we’re at it?”

“The dragon couldn’t fit up here,” Moritz said, with the tone of an overworked tutor.

“Its fire could!” Perrin retorted. “Or maybe it’ll circle around us and block off the entrance! What then, Moritz?”

&#34;How did this even happen?&#34; Horatius asked. &#34;The Nine came this way.&#34;

&#34;Then those stairs were destroyed afterwards,&#34; Moritz answered.

&#34;Looks like Marscar didn&#39;t want any more visitors,&#34; Arcos remarked.

&#34;Apparently not.&#34;

&#34;Well,&#34; Horatius said, &#34;what are we going to do? There must be another entrance somewhere, for the dragon.&#34;

Perrin groaned. &#34;Great. So we have to go back up all those steps, then wander around in the woods looking for it?&#34;

&#34;It&#39;d have to be a very big opening, for the dragon to fly through it.&#34;

&#34;No,&#34; Arcos said, shaking his head. &#34;We don&#39;t have to climb back up. We&#39;ll just drop a rope and climb down.&#34;

“How much rope have we even got?” Horatius asked. “I didn’t bring any.”

“Lucky for you,” Arcos said, already rifling through his pack, “some of us came prepared.” As it happened, both he and Perrin had brought 15-meter coils of rope for situations such as these. They were surprised to find that I had as well.

“What else have you got in there?” Horatius asked, peering at my backpack.

“Stuff,” I non-answered, quickly buttoning it closed again. Barely any of it was stolen, but I still didn’t want him in my business. Arcos chuckled.

“Alright,” Moritz said. “That’s almost fifty meters of rope. If the ground, or whatever’s left of the rest of the stairs, is closer than that, we’ll be fine.”

“I’ll go first,” Arcos volunteered. “I can see better down there, and I’m the best climber anyway.” He flexed his big hands. There were no objections.

After a few minutes of tying and hammering, Arcos began his descent. Moritz stood as close to the hole as he dared so his light could shine down into the void. It might not reach as far, but it’d do more for Arcos than the rest of us, and as long as the actual source was up there with us it shouldn’t be as visible from the other parts of the underground city. I was strangely glad for the lack of room beside Moritz, because I don’t think I could have stood to peer over the edge as Arcos slowly slunk out of sight.

Many quiet seconds became a long, tense minute.

“Arcos?” Perrin called, more quietly than he’d meant to. Moritz shushed him; it wouldn’t do to go hollering out into the unplumbed void.

Then, faintly, we heard a whistle, like the song of a wild bird. Arcos’s signal. He’d found something to stand on! I released the breath I’d been holding. As we watched, a light appeared down below – Arcos had lit a candle to guide us. It looked dreadfully small and far away.

Horatius went next, figuring that, if there was trouble at the bottom, he and Arcos were best equipped to handle it. Perrin went next, scurrying down the rope like a rat. I guessed that he and Arcos had done some “second-story work” in their checkered past together, and the thought brought a smile to my face. I wondered if he was surprised by how easily I scampered down after him. The going wasn’t really that hard; we had tied knots every meter or so to use as handholds, and Arcos was holding the other end to keep it from swinging about too much. Things were a bit more stressful outside the range of Moritz’s light, but I could look down at Arcos’s increasingly close candle for reassurance and feel my way down towards it. My hands were cramped and shaking by the end, but I made it. At the bottom of the rope – almost the full 50 meters, I noted with a shudder – we found ourselves back on the stairs. Something had destroyed the section immediately below the ceiling, but the rest seemed to still be intact.

“Come on, Moritz!” Arcos whispered. The wizard couldn’t have heard him from so far away, but it was more like a curse than a call. I looked back up to the ceiling, where I saw Moritz faltering at the edge. Arcos repeated his signal, more insistently this time, and waved one of his arms over the candle so Moritz could see the shadow pass.

“Horatius,” he whispered. “Hold this. I might have to catch him.” At that, Arcos passed the bottom of the rope to the knight and stepped to the side, eyes up and arms out. As I watched, Moritz extinguished his light and began a tentative descent. I wondered if he was afraid of heights or just weak in the arms. Maybe it was both. I couldn’t watch his progress in the dark, but the irregular jerking of the rope told of slow and unsteady progress.

“I can’t see him,” Arcos said.

“Perrin,” Horatius ordered, “light a torch.”

“But-“

“Do it.”

He did it, keeping the torch itself below the rim of the broken wall but letting its light shine upwards.

“Oh no,” Arcos breathed. “It’s okay, Moritz. One at a time.” He didn’t bother to whisper that bit.

Squinting, I could just barely see an indistinct, greenish shape that might’ve been the end of his robes.

Moritz whimpered something unintelligible.

“One at a time,” Arcos repeated, slowly and calmly. “You can do this.”

I heard Horatius start to pray.

Moritz continued, audibly grunting with the exertion of holding himself upright. For a few more meters, he seemed to be doing alright. Then something happened, and I watched as, with a horrible slowness, he lost his grip. Arcos moved to catch him, but from that height the fall would probably hurt him just as badly as the wizard, if it didn’t send them both hurtling over the broken wall. A scream slipped out of my lips and my hands shot out in a mirror of Arcos’s catching motion, as if my own puny arms could have done a thing to catch a falling adult man…but, I discovered, they could. A gray-green glow enveloped Moritz, and his fatal fall became a feathery float. He still screamed in terror the whole way, though.

“Huh?” he gasped, looking wildly about as Arcos picked him easily out of the air. 

Arcos looked over his shoulder at me, still standing with palms outstretched. Gray-green fire flickered across them. He smiled.

“Geva caught you.”

&#34;Come on!&#34; Perrin hissed. &#34;We need to move, before the dragon comes to see what all that screaming was!&#34; In silent agreement, we hurried after him down the rubble-strewn stairs.

UnLondon&#39;s ceiling must have been very high indeed; it took us more than half an hour to finally reach the ground. The staircase&#39;s single exit was in the courtyard of an empty palace, into which we quickly relocated. The building&#39;s interior was one large space, piled high with rust that had once been metal bed frames. Black mold speckled the walls and ceiling, and its spores veritably set my lungs ablaze as we entered. Moving back &#34;outside,&#34; we discovered a slow but constant drip of water from the unseen cavern ceiling. If not for the total absence of wind, it would have felt like a rainy, moonless night on the surface. In the end, we settled back at the base of the stairwell, which seemed to be the only dry place around (or at least the only one within the distance Moritz was willing to walk). It would&#39;ve been mad (and impossible) to sleep down there, but it wouldn&#39;t have done to go after the dragon with our knees trembling. While we rested, we tried to formulate the next step of our plan.

&#34;Alright,&#34; Perrin asked, &#34;where&#39;s the dragon, again?&#34;

From his pack, Horatius fished out one of the maps Nobody had given him. &#34;This is an Ancient map of upper London. The 1,678th Sacred Procedures say that UnLondon has exactly the same layout, so we should be able to use it to get around.&#34;

&#34;Okay,&#34; Perrin said, with tired annoyance, &#34;but where&#39;s the dragon on it?&#34;

&#34;Nobody marked it here.&#34; He pointed to a large building that Nobody had apparently circled with dark ink. I couldn&#39;t read the label, but Moritz translated it for us.

&#34;Buckingham Palace.&#34;

----

Buckingham Palace, which the map said had once been the dwelling place of Uk&#39;s queen, was almost directly east of us. The shortest path cut across a huge open space - &#34;Hyde Park&#34; - which would&#39;ve left us and our light source entirely too visible. Instead, we circled around to the south, following UnLondon&#39;s moldering streets. It was just as eerily empty as Portland had been, but at least the constant drizzle kept us out of total silence. Eight hundred years of water action had also put the remaining buildings in much worse shape than Portland&#39;s. Only the biggest, fanciest ones even looked safe to enter.

It took us about another hour to reach Buckingham Palace. It might have been hard to positively identify in our limited light, but Moritz&#39;s staff had ceased to be its only source. A yellow-orange glow danced in the palace&#39;s many windows, as if cast by some massive hearth within. The illumination did not travel far beyond those windows, but it was enough to reveal the bodies. They were scattered around the palace&#39;s main entrance, a great semicircular porch ringed with towering limestone columns. One was still upright, frozen solid.

&#34;We should loot those bodies,&#34; Perrin suggested.

&#34;Perrin,&#34; Moritz began, only to be interrupted by Horatius of all people.

&#34;No, he&#39;s right. The Nine were likely carrying relics that might aid us.&#34;

As we crept closer, though, it became apparent that there was nothing left for us among our predeceased predecessors. One body&#39;s head had been completely smashed, and another bitten in half. Even the frozen corpse had been disarmed, in every sense; its right arm, raised to deliver a blow that never fell, had been snapped off at the elbow, along with whatever relic it had been clutching.

&#34;The beast has taken the relics!&#34; Horatius said, anger evident despite the hush.

&#34;Of course it has,&#34; Arcos said. &#34;It&#39;s a dragon.&#34;

&#34;So these are the Nine?&#34; Perrin asked, idly tapping the frozen faceplate of the one that still //had// a head. It was impossible to miss; those faceless helms, without a single eye slit or breathing hole, were one of the many things that made the Nine so infamous. No one was sure how they fought, much less breathed comfortably, in a great helm so sealed, but the answer was unlikely to be pleasant. They also wore shields and mail, though unlike Horatius&#39;s, their shields bore only the Foundation&#39;s holy symbol and their tabards were a simple black. Clearly, none of it had done any good against the dragon.

&#34;Where are the other ones?&#34; Arcos asked, looking around warily.

&#34;Maybe they were completely burnt up,&#34; Perrin hoped, with false confidence. &#34;Or eaten. I mean, this guy&#39;s just a bottom half. Dragon&#39;s got three heads, it could&#39;ve gulped one with each, twice.&#34;

&#34;Maybe,&#34; Horatius agreed, only because the alternative was too unpleasant and unactionable to contemplate. If they were still wandering around down here in the vast, ghoulish city, we wouldn&#39;t know it until they revealed themselves.

&#34;You know,&#34; I said, eyeing the colossal claw marks where the dragon had perched on the palace roof, &#34;I think we should use the other door.&#34;

&#34;Good idea,&#34; Moritz agreed.

A few minutes later, we approached the palace from the opposite side. As with all the doors and gates, the wood or metal that comprised this one had long since fallen away. There was a grand hall just inside that looked like it would lead us right to the inner courtyard, where the fiery glow seemed to be coming from. We did our best to stay low and quiet as we approached, ducking below the windows and making sure to avoid any metallic collisions like the one that had outed us last time. Peering in through a window, I was strangely disappointed to find that the stately palace&#39;s interior was still just full of disintegrating bed frames. The courtyard, though...there was something enticing about that yellow glow. As we crept in through the back door, I realized what it was: the yellow cast of the firelight came from the mountains of gold that reflected it. The whole courtyard must have been piled two meters high with golden coins, jewelry, and bars, interspersed here and there with glittering gems. The pile overflowed the sills of the interior windows, through which I could see...

As one, our party ground to a halt. We could see the dragon. It lay there, at the center of its hoard, taking up so much of the courtyard that I had nearly mistaken it for a strange building or rockfall. Its jet-black scales were the size of kite shields. Wings bigger than circus tents lay half-open on either side of its huge body, and four legs thicker than the oldest of trees splayed out in the front and back. The gleaming talons at the ends of its clawed feet were longer than I was tall. The steady firelight highlighted every spine, horn, and frill on its three monstrous heads, each one the size of a small cottage...and each one deep in slumber. As we stood there in the great hall, with the pitter-patter of the rain muted and distant, we could hear its slow, heavy breaths like the crash of waves upon the beach.

I looked at Moritz. Could we really be so lucky? Had the dragon, exhausted from its battle with the Nine, settled down for a long nap to digest them? Would Horatius be able to creep up and sever its three heads without any fight whatsoever?

Moritz shook his head. Not with our luck.

Still, onward we pressed. Arcos and Perrin in the front, moving as quietly as they could. Moritz and myself, carefully padding along in our soft clothes. Horatius at the back, clanking and jingling with every step but ready to charge headlong into the inevitable fray.

We stopped at the edge of the courtyard, regrouping at the base of the treasure pile. We were so close to the dragon&#39;s central head that I could smell the ozone on its breath. The  wealth in the courtyard was unimaginable; it seemed that all the treasures of the Ancients had wound up here. Jeweled crowns and scepters sat atop house-sized hills of gold. Marble statues protruded from the pile like trees, draped with gleaming jewelry. The metal mountains shone like liquid twilight in the fiery glow, which we now saw was coming from four enormous braziers floating in midair at the courtyard&#39;s corners. Each one was the size of a house and studded with enough gems to buy one.

Horatius looked down at the pile&#39;s edge. He shook his helmeted head. No one dared speak so close to the dragon, but the message was still clear. Even if he didn&#39;t slip on the pile of wet coins, Horatius would sound like an avalanche if he went clomping through it. Any of us would be hard-pressed to close the distance to the dragon without waking it.

For a while, we simply stood there in awe of the dragon&#39;s sheer size, and of its wealth, greater than any of us had ever imagined, must less seen.

Then the dragon opened its eyes, and the baleful glare of those six glowing orbs affixed us all to the spot with supernatural fright.

&#34;Beautiful, isn&#39;t it?&#34; the central head purred. Its eyes were an evil yellow.

&#34;You&#39;re very loud,&#34; growled the left one, red eyes almost smoldering.

&#34;And terrible at climbing,&#34; hissed the right, which had eyes of frigid blue.

Languidly, the great beast arose from its feigned slumber. It stretched like a cat, cracking its whip-like tail at the starless dark above and spreading those vast wings to their full extent. This thing was larger than the palace I&#39;d grown up in. Slowly, it settled back down. The three heads reared up, revealing rows of violet scales armoring its underbelly.

&#34;Alright,&#34; the middle head sighed, &#34;let&#39;s talk.&#34;

Horatius, seemingly unfazed by the paralytic panic streaming from those evil eyes, stepped up.

&#34;What could we have to discuss with you, dragon?&#34;

The middle head squinted at him. &#34;I would like to know what you&#39;re doing here.&#34;

&#34;It&#39;s been a very busy week for us,&#34; the right head added.

&#34;A very tiresome week,&#34; finished the left.

The middle continued. &#34;There must be something truly strange occurring across the pond, for fourteen skippers to have come knocking.&#34;

&#34;We do not represent the Foundation,&#34; Horatius clarified. &#34;We-&#34;

&#34;Are explorers,&#34; Perrin cut in, finally shaking off the fear. &#34;We came to explore this island, to see if there really was a fearsome dragon defending it.&#34;

&#34;Well,&#34; laughed the center head, &#34;is there?&#34; The other heads seemed unamused.

&#34;Oh, most certainly. You are, without a shadow of a doubt, the most fearsome creature it has ever been my honor to behold.&#34;

The right head growled in response. &#34;Flattery will get you nowhere, insect.&#34;

Left agreed. &#34;I suggest that you drop the act.&#34;

&#34;Aw,&#34; the middle said, playfully. &#34;I was rather enjoying it. You may continue to tell us how impressive we are, though I would appreciate a more honest answer this time.&#34;

Perrin bowed. &#34;Forgive me. I have not spoken to a dragon before, and I thought it best to be cautious when first addressing the great Marscar the Dark.&#34;

&#34;Marscar the Dark?&#34; they said, in bewildered unison.

Perrin hesitated. &#34;Is that...not your name?&#34; Dear saints, had we somehow gotten the wrong dragon?!

The central head shook. &#34;No. //This// is Marshall,&#34; it said, nodding at the left, blue-eyed head. &#34;//This// is Carter,&#34; it said, indicating the red right. &#34;And //I// am Dark.&#34;

&#34;That does have a nice ring to it, though,&#34; Marshall muttered.

&#34;Oh, I see. Forgive me; it seems that the stories have muddled some details, these last eight centuries.&#34;

&#34;So it does,&#34; Dark purred. &#34;Tell me, what else do these stories say about us?&#34;

&#34;Well, um,&#34; he stammered. He knew the legends damn well, but he was no doubt afraid that they might offend the great beast before us. Horatius, on the other hand, had never known fear of anything.

&#34;It is said,&#34; he interrupted, drawing an alarmed look from Perrin, &#34;that you were the richest men in the Ancient world, but when the Great Breach struck, you hid yourselves away down here instead of sharing your wealth with those who needed it during that great tribulation. As punishment, the gods transformed you into...well, into this.&#34;

The dragon did not look happy. Carter rumbled like a distant avalanche.

&#34;I was a //woman//,&#34; Dark snarled.

Marshall snorted disdainfully. Its breath formed a frosty cloud above its nostrils. &#34;I would hardly call such power as ours a punishment.&#34;

&#34;Of course not!&#34; Perrin agreed, lightly shoving Horatius back a bit. &#34;Personally, I have nothing but admiration for your power and glory, and naught but disdain for the weak moralism that would paint you as a villain. Or this rude goody two-shoes who would say such foolish things to your face. Er, faces.&#34;

Seeing the look on Perrin&#39;s face, Horatius reluctantly bowed to the beast. &#34;Apologies, great dragon. I thought that you would like to hear the truth of what people say, and not the honeyed words of this liar.&#34;

Dark looked between them in amusement.

&#34;You two are much more polite than your countrymen who came here before. They did not even attempt to strike up a conversation.&#34;

&#34;How very rude.&#34;

&#34;Indeed. I very much would&#39;ve liked to know what brought a Mobile Legion to my doorstep. I certainly haven&#39;t ravaged your Foundation&#39;s land the way that I have this one.&#34; 

&#34;Though that could certainly change,&#34; Carter warned.

&#34;I cannot know why the Nine were sent after you,&#34; Perrin answered, honestly, &#34;though I would not put it past the Holy Foundation to sentence you to death on principle. They have always taken a dim view of magic.&#34;

&#34;You speak like the Foundation&#39;s enemy,&#34; Marshall hissed.

&#34;Indeed I am, great dragon. I was once held in captivity by their lies, and only escaped by luck and cleverness. My friends, also, are exiles, outcasts, and runaways from their thrall.&#34;

&#34;Then perhaps you //would// like me to destroy the Foundation,&#34; Carter said, with a serpentine smirk.

&#34;Ah, perhaps another time. I would first like to return there, to spread your legend anew. It has been many centuries since anyone from our land set foot on yours, and there are those who doubt your reality. They say that you are but a fairy tale, a doodle made at the edge of a map by superstitious sailors.&#34;

Carter snorted unhappily, producing a cloud of black smoke. Quickly, Perrin pivoted.

&#34;But I never doubted you! Now I will return to America and tell the tales again, striking newfound fear and wonder into the hearts of men. And, perhaps, a bit of admiration for my own accomplishment in the hearts of women.&#34; He winked at the dragon, the rascal. Dark snorted derisively, spraying yellow sparks.

Marshall was skeptical. &#34;And just how do you expect to prove that you traveled to our land?&#34;

&#34;By stealing a souvenir from our hoard?&#34; Carter accused.

&#34;Of course not! Theft from one such as you would be all be suicide!&#34;

&#34;Indeed it would,&#34; Dark agreed. &#34;But knowledge can be stolen just as surely as gilded cups and golden coins. Have you considered that we may not //want// erstwhile dragon-slayers knocking down our door every week?&#34;

He faltered, but only for a moment. &#34;I had, but you seem to be quite a gracious host, with a love for good conversation. And it isn&#39;t as though you are in any danger; the Nine were outfitted with the mightiest weapons known to the Foundation, and they were but light snacks to you. Besides, it would be quite difficult for anyone else to follow our path, or that of the Nine.&#34;

&#34;Yes, how //did// you get here? Have you finally re-invented the astrolabe?&#34;

&#34;We, uh...took a shortcut.&#34;

&#34;Ah. Portland.&#34;

&#34;I&#39;m surprised the old Mayor is still kicking,&#34; Marshall mused.

&#34;We, too, were quite surprised,&#34; Perrin understated.

&#34;So, whelp,&#34; Dark answered, &#34;How does one so young come to know of Portland and the great city of UnLondon? If it was not the Foundation who hired you, someone else surely must have.&#34;

Perrin grinned widely. I knew what he was going to say, and I almost tried to stop him.

&#34;I assure you, great dragon, Nobody hired us to do this.&#34;

&#34;Nobody, eh? Do you think us some common Polyphemus?&#34;

He blinked. &#34;I...am not sure what that is.&#34;

&#34;Shame. Surely you, wizard, still know of Homer? You must be fascinated by the past.&#34;

Moritz was startled by the dragon&#39;s sudden attention, but he quickly recovered. &#34;Ah, yes, I am. Though I do not recall a Polyphemus among the residents of Springfield.&#34;

The heads responded in unison. Carter groaned and Marshall rolled his eyes, but Dark gave a single chuckle. Moritz only looked confused.

&#34;You lot are much funnier than the last bunch. I might just let you live.&#34;

&#34;I would be most grateful,&#34; Perrin laughed, unable to keep at least a little nervousness from his voice.

&#34;...on one condition,&#34; Marshall added.

&#34;Oh?&#34;

It pointed with one enormous claw. &#34;That sword,&#34; Dark said. &#34;Give it to me.&#34;

&#34;Alas,&#34; Horatius answered, &#34;I have already promised to return it to the Lady of the Lake.&#34;

&#34;Once you have slain me, yes? You do not strike me as a liar, unlike this one.&#34;

&#34;Indeed, great dragon. I have come to destroy you, and I borrowed this weapon for that purpose.&#34;

&#34;I respect an honest man. Few could openly admit to seeking my demise so close to my killing jaws, and fewer still without even a tremble of fear. Tell me, knight, are you impossibly brave or utterly mad?&#34;

&#34;I have been called both, great dragon. I care not which, so long as the deed gets done.&#34;

&#34;Should I take this to mean that you will not accept my merciful offer?&#34;

&#34;Alas,&#34; he repeated, &#34;I have given my word. If I return to the Lady empty-handed, she will curse me, my companions, and seven generations of our descendants.&#34;

&#34;If you do not give me that sword, she will be cursing a pile of ashes.&#34;

&#34;Or a pile of shit,&#34; Carter rumbled. Marshall snapped at him, incensed by the vulgarity. 

Heedless of the squabbling, Dark continued. &#34;Would it not be better to live cursed than to die by my claws?&#34;

&#34;Perhaps to a coward such as he,&#34; Horatius said, indicating the disgruntled Perrin. &#34;But I do not fear death, and I do not fear you.&#34;

&#34;And what //of// this coward, brave knight? Will you drag your friends with you into martyrdom?&#34;

Horatius hesitated. &#34;I have given my word,&#34; he repeated, a tad uncertainly.

&#34;To whom? Surely not only the Lady. I could believe that this one cares only for wealth and fame, but a fool such as you seeks something less tangible.&#34;

&#34;I have come to restore the honor of my order, through-&#34;

&#34;Do not lie to me, tin man, or I will lose what little respect I have for your kind.&#34;

Horatius looked askance at us, then back to the dragon.

&#34;Very well, great dragon. And alongside this truth, I make an offer.&#34;

&#34;An offer?&#34; Marshall hissed.

&#34;Yes. My life, in exchange for those of my companions. And this sword, in exchange for a certain object of yours.&#34;

What? What was he talking about? We all looked at him with varying combinations of confusion and suspicion.

All three heads grinned. &#34;Ah, finally. You see, knight, I have known from the beginning why you were here. Do you think I know not what I possess?&#34; Then, as one, it frowned. Nictitating membranes slid into place over their eyes, turning them into smooth, sinister orbs of color. &#34;And do you really think that I would be so ignorant of its true value as to trade it for anything? Do you really think that I would so lower myself as to exchange goods with one so small as you, when //all// that glitters is rightfully mine? It is an abomination to me that others should possess anything at all, especially the sword Excalibur, which you were not even worthy to wield, merely borrow. I had considered mercy, because you had saved me trouble by delivering it here, but now you have insulted me in my own palace, by presuming to bargain with what is already mine!&#34;

In unison, they thundered: &#34;We are Marscar the Dark, Lords of Terror and Destruction!&#34;

&#34;And what are you?&#34; Dark asked.

&#34;A bug,&#34; Carter growled.

&#34;A shiny little beetle,&#34; Marshall crooned.

Dark grinned. &#34;A lightning bug.&#34; Electricity arced between her teeth as she inhaled.

----

A yellow flash consumed my vision as thunder smote my ears. At first, I thought that I had been the one struck. But between the spots in my eyes, I saw Horatius.

Slowly, he rose from a crouch, lowering his shield. Electricity arced between his armor, the gold around his feet, and especially the Stylus. A ball of St. Hedwig&#39;s fire danced at its tip, growing larger and brighter with each passing moment. Horatius stared at it. I could not see his face, but the dragon looked dumbfounded enough for three people.

Slowly, Horatius turned his helm towards the beast. Then, laughing triumphantly, he leveled the glowing sword at the central head and //fired//. A white bolt every bit as mighty as the dragon&#39;s breath shot forth, smiting the dragon&#39;s face with its own reflected wrath. Its triplicate roar of pain and shock was louder than the thunderclap. Horatius made to charge, and for a split second I shared in his triumph. This was our moment! We could press the advantage and slaughter the beast before it regained its senses! But Arcos seized the knight by the collar and dragged him back, just as a great, black talon scythed through the space where he&#39;d been. It would have reduced him to ribbons.

We needed no further convincing to flee. One of the massive heads snapped at us, but it was far too large and horn-bedecked to fit through the hall. It inhaled, and we felt a building heat at our backs.

&#34;Side!&#34; Perrin yelled, clearing the exit and diving desperately to the left. We followed, flinging ourselves aside mere moments before a flood of fire swept through the hall. It burned off half of my hair.

The dragon gave another triple roar. We heard a great rush of wind and a mighty clatter of spilling coins, and realized that it had taken to the air.

&#34;Inside!&#34; Perrin cried, already leaping through the nearest window. Horatius and Mortiz ungracefully followed while Arcos grabbed me and plunged through another. At the same time, the dragon slammed down outside, claws scoring deep trenches in the cobbles. It had not so much flown as //leapt// over the entire four-story wing of the palace.

&#34;Inside!&#34; Perrin repeated, scrambling to his feet and through the door on the opposite side. The dragon wheeled, smashing the outer wall with one swipe of its titanic tail. We turned left and barreled down a hallway, but Perrin screamed for us to &#34;Stop!&#34; just before we crossed an intersection. Not a moment later, a river of icy mist rushed through the perpendicular hall. A branch of it streamed down our hallway, and it surely would have frozen us had Moritz not quickly thrown a gust of wind in the opposing direction.

&#34;Go!&#34; Perrin ordered, and we sprinted across the frost-encrusted hallway before the icy head could switch places with another. Now we were in the palace proper, careening through dusty corridors and empty doorways almost at random. I don&#39;t know how much longer we fled before Perrin called us to a halt, in some vast rectangular space that might have been a ballroom in the original palace but was only another dismal, junk-heaped bunk in this one. The building shuddered suddenly, raining dust onto our heads as the dragon climbed atop it. I looked fearfully at the ceiling. It would have been easy for the monster to smash the floors above and entomb us in rubble.

We waited, breath baited. Moritz noticed that the hem of his robe was on fire and frantically stomped it out.

Like an invisible serpent, the dragon&#39;s evil harmonies slithered down to us.

&#34;//Come out, come out, little pigs. I can wait here until you starve. Would it not be better to face your doom now? To die boldly in glorious combat? To stain my fangs with your noble blood?//&#34; It chuckled, a reptilian sound like the growl of an alligator. &#34;//Come to me, my prey. Come and meet your murderer.//&#34;

Suddenly, my feet were moving, carrying me toward its insidious whispers. I saw Arcos beside me, shuffling like a sleepwalker. His eyes were wide with fear. I&#39;m sure that mine were as well, for they seemed to be the only part of my body still under my control. Somewhere behind me, Moritz groaned like he was struggling to wake from a nightmare. I supposed we all were.

All save Horatius, whose iron will was unbroken by the dragon&#39;s poison words. He issued a command, and his words rang with that same unshakable resolve.

&#34;**Stop!**&#34; And we did. Stumbling, shuffling, wavering.

&#34;//Come to me...//&#34; the dragon hissed once more. I took a single unsteady step.

&#34;**No! We will not follow you! You will not break us! We will not submit! Not when the body breaks, not when the mind crumbles, not when the eleven-day empire eats the sky! Your poison words are nothing before my will to fight! YOU are nothing!**&#34;

With that, the spell was broken. I staggered backwards, and Moritz fell to his knees. Perrin groaned, clutching his head. Arcos howled, a noise like a mountain lion&#39;s scream, and slammed his mighty fist into the nearest wall.

The dragon growled like rolling thunder. &#34;//You are strong, noble one. But I am patient.//&#34; The building shook again as it flew away.

&#34;What&#39;s it doing?&#34; I whispered.

&#34;Circling, I imagine,&#34; Perrin answered. &#34;Waiting for us to step outside, so it can blast us. And staying out of our reach, in case we try to come after it with that sword.&#34;

&#34;Why doesn&#39;t it just bring the building down on us?&#34; I asked.

&#34;Would you want to squash your own house?&#34;

&#34;No, I suppose not.&#34;

&#34;When did you become such a tactician?&#34; Horatius asked, with mingled surprise and respect. Only then did I realize the absurdity of Perrin guiding us to safety through that infernal assault, but he had done it with skill and authority.

Perrin grinned sardonically. &#34;You might call it cowardice, but I call it survival instinct.&#34;

Carefully, Horatius removed his helm. Lines of soot shadowed its eyeholes, looking like strange warpaint. He nodded to Perrin. &#34;That was not cowardice. It was leadership.&#34;

&#34;Pff,&#34; Perrin scoffed. &#34;Sure.&#34;

&#34;No, truly.&#34; His voice was scratchy, worn out from that strange shouting. &#34;You are owed my respect, and my thanks. You too, bold Arcos. Had you not pulled me back-&#34;

&#34;Shut up,&#34; Arcos growled, taking us all aback. &#34;What was that mind-magic you did?&#34;

Horatius blinked, but quickly regained his composure. &#34;That was wordsmithing. Another knightly discipline, a bit like this,&#34; he said, gesturing with his painted shield. &#34;It follows the same principle, using words or images to plant ideas in someone&#39;s mind. Or, in this case, remove them.&#34; He coughed dryly. &#34;I don&#39;t think I could do it again, not until my throat is better, but I doubt the dragon knows that.&#34;

Arcos swallowed heavily. Slowly, he nodded. &#34;Well,&#34; he said, through gritted teeth, &#34;I suppose you saved me. For that I am grateful. But,&#34; he said, turning to face the knight, &#34;if you //ever// put your fingers in my head again, for any other reason but to save my life, I&#39;ll smash your skull.&#34;

Horatius recoiled. &#34;Would you have preferred that I let the dragon eat you?!&#34;

&#34;I&#39;d prefer that your kind learned to leave our minds alone!&#34;

Slowly, understanding dawned. &#34;Oh,&#34; Horatius said, bowing his head. &#34;I see. Forgive me, dear Arcos. Not for saving you, but for forgetting your history.&#34;

&#34;Hmph,&#34; Arcos grunted. Perrin consoled his partner with a half-hug. Arcos returned the gesture, then slunk off to a corner to rest.

&#34;So,&#34; Moritz said, eager to change the subject, &#34;what in Corbenic are we supposed to do now?&#34;

&#34;Who&#39;s got that map?&#34; Perrin asked, rubbing his hands together.

----

While he, Horatius, and Moritz talked strategy, I went to check on Arcos. All of the others seemed to know why he was so upset, but I had no idea. He was seated against the wall now, padded knees curled close to his armored chest. Wordlessly, I sat down beside him. He looked at me sadly.

&#34;Yes, little one?&#34;

&#34;Are you okay?&#34;

&#34;Oh,&#34; he sighed, &#34;I&#39;m fine. Fine as I can be.&#34;

I tilted my head. &#34;What&#39;s that mean?&#34;

&#34;Did they not teach you of my people in Arnven?&#34;

&#34;There aren&#39;t any orcs in Arnven.&#34;

&#34;No,&#34; he said, softly, &#34;I don&#39;t suppose there are. Not many of us anywhere, anymore. Not like there used to be.&#34;

&#34;What do you mean?&#34; All my knowledge of orcs came from wild tales of the deep woods, from whence they emerged by night to abduct maidens and eat babies. I had always doubted the truth of these lurid stories, and Arcos had driven that doubt home. He was just a bigger, hairier human as far as I could tell.

He shook his shaggy head. &#34;Don&#39;t let me trouble you with myths, little one.&#34;

&#34;Tell me!&#34; I protested. &#34;Why did you say that about leaving your minds alone?&#34;

Arcos looked at me, his dark eyes searching mine for something. After a while, he relented.

&#34;You know that we are not the man-eating savages from the fairy tales, yes? Surely I have proved that to you.&#34;

&#34;Of course! You&#39;re the kindest man I know.&#34; I hugged his arm, and it brought a genuine smile to his face.

&#34;Thank you, little one. That means much, from one so young. Very few people have said such things, in this age or those before.&#34; As he spoke, his quiet voice took on a distant tone. He seemed to be remembering as much as telling. &#34;My people are not like yours. We do not have cities like yours, or like this one.&#34; He looked around the dismal stone room. &#34;Well, like the real London of the Ancients. But we did, once. Long before the Ancients, long before Tiamat hatched from her primordial egg, before the first human had even learned to speak. We mastered all of nature, and all across the world we reared great cities of wood and bone. But we were unkind to your people - much as they now are to us - and they made an evil bargain with a vile god of the deep woods. Our cities crumbled, and our minds were bound. For ages, we were little more than beasts, unable to speak, unable to build, unable to master our primate instincts, but horribly, painfully aware of our miserable condition. Only after the Great Breach did some of us learn to talk again, and to make spears and axes from the natural elements that we had once commanded like our own arms and legs. We have never forgotten what we once were, but the magic is far away now, and the knowledge is long gone. But still it...//dances//,&#34; he said, grasping at the air just before his face, &#34;just outside of reach. Just outside of memory. I am better off than most, but still it drives me mad. We could be just like you, with mighty cities and millions of people, if only I could catch that fleeting knowledge. That memory of what we were. What we would still be, if humankind had not broken us.&#34;

Again, Arcos looked at me. I know not how my face appeared, but it seemed to pain him. &#34;Do you see, now, Geva? Why I would not yield to the Valravns, and why I so hated Horatius&#39;s magic words? I would sooner //die// than let my mind be broken again.&#34;

At a loss for words, I squeezed his arm more tightly. &#34;I&#39;m sorry, Arcos.&#34;

&#34;Don&#39;t be sorry, princess. The kindness of ones like you is what makes it tolerable.&#34;

The moment was brief, but it was happy. Then Perrin ruined it.

&#34;No, you moron!&#34; he yelled, addressing Horatius.

Arcos sighed. &#34;I had better get over there.&#34;

&#34;Yeah,&#34; I agreed. &#34;Let&#39;s go.&#34;

&#34;We should sneak out,&#34; Perrin was suggesting. &#34;Back to the stairs!&#34;

&#34;Impossible,&#34; said Moritz. &#34;It would see or hear us trying to climb that gap, if we even can after all this, and smash the tower under us.&#34;

&#34;What about the dragon&#39;s exit? It flies up to the surface somehow.&#34;

&#34;Considering that it flies, I&#39;d wager that exit is on the ceiling somewhere. We couldn&#39;t get up to it, even if we could somehow see the ceiling.&#34;

&#34;There&#39;s a river in this joint, isn&#39;t there? Maybe we could follow that to the ocean.&#34;

&#34;I doubt it. We&#39;re almost a kilometer below sea level.&#34;

&#34;Then where in Corbenic is the water going?!&#34;

&#34;That&#39;s the Expunged for you.&#34;

&#34;Saints,&#34; Perrin swore.

&#34;We&#39;ll have to kill it,&#34; Horatius said, with finality. &#34;That&#39;s the only way we leave this city again.&#34;

&#34;How?! It could flatten all five of us with one foot. If the Nine couldn&#39;t handle it with all their relics-&#34;

&#34;They didn&#39;t have this one.&#34; Moritz raised the Stylus. In the light, we could see a smear of noxious blood steaming at its tip. &#34;I nicked it when it clawed at me. This blade cuts its scales like butter.&#34;

&#34;You&#39;ll still only get one shot,&#34; Arcos cautioned. &#34;Even that thunderbolt only stunned it for a second. You were nearly sliced to ribbons.&#34;

&#34;Then I&#39;ll have to get it straight through the heart.&#34;

&#34;Its heart is bigger than your whole body.&#34;

&#34;Doesn&#39;t matter. If we charge the sword again,&#34; he said, nodding at Moritz, &#34;the shock would stop it. I&#39;ll have to get under it somehow, and then...&#34; he made an upward stabbing motion.

Perrin scoffed. &#34;You couldn&#39;t even //reach// its chest, much less stab it with enough force to hit the heart. Its ribs must be as thick as trees.&#34;

&#34;One of you magic folks can launch me. Or Arcos could throw me?&#34;

&#34;I&#39;m not that strong.&#34;

&#34;Maybe we get it to fall on you?&#34; Perrin suggested, sarcastically.

&#34;And crush me to death? Very well.&#34;

Perrin blinked. &#34;Well, but how are we supposed to knock those mountain-legs out from under it?&#34;

&#34;Could we trick it into lying down?&#34; Arcos suggested.

&#34;As if it wouldn&#39;t notice this harlequin lunatic waving a sword at its belly.&#34;

&#34;I could do my shadow trick!&#34; I volunteered, eager to contribute.

&#34;That won&#39;t fool it,&#34; Horatius said. &#34;It&#39;d smell me.&#34;

&#34;I could mess with its mind, then.&#34;

&#34;All three of them, each as strong as mine or stronger? No.&#34;

&#34;We could hit it in the air,&#34; Perrin proposed. &#34;Arcos has that flying armor.&#34;

&#34;Won&#39;t matter if we can&#39;t see to aim. Even if we could, I can&#39;t outmaneuver that thing in the air. It&#39;s got bigger wings and 800 years of practice.&#34;

&#34;I know,&#34; Moritz said, tapping his bald head. &#34;We make it stand up on its back legs, then come at it from the front.&#34;

&#34;How would I get up to its chest?&#34;

&#34;Arcos picks you up and flies.&#34;

&#34;How do I do that without being spotted and eaten right out of the air?&#34;

&#34;You fly through a window. We&#39;ll distract it with something on the roof of a tall building, and then when it rears up you come through a lower story and stab it.&#34;

&#34;Why would it land at all? If the distraction is on the roof it could just swoop down and breathe on us.&#34;

&#34;You could fly me up from some other hiding spot,&#34; Horatius proposed.

&#34;I don&#39;t think this armor could go straight up, not fast enough to hit a target moving the other way, not with both of us.&#34;

&#34;Wait!&#34; I exclaimed. &#34;Hold on! It tried to talk to us! It&#39;s brilliant, and it hasn&#39;t had anybody but us and the Nine to talk to in centuries. It&#39;s got to be almost mad with loneliness! The distraction could pretend to parley, and it would be so curious that it&#39;d have to land to talk to him. It&#39;s too big to land on the roof, so it&#39;d have to sit on the ground and rear up. That&#39;s when we&#39;d strike.&#34;

I was proud to see that no one seemed to have an objection. Well, no one but Perrin.

&#34;One problem: are there any buildings in this saint-damned city tall enough for that?&#34;

Moritz consulted the map. &#34;Yes. There&#39;s one right nearby. Looks like it&#39;s called...Big Ben.&#34;

&#34;What kind of a name is that?&#34;

&#34;That&#39;s the Ancients for you.&#34;

&#34;Let me see that map.&#34; Moritz showed it to him, pointing out the location of &#34;Big Ben&#34;.

&#34;Well,&#34; Perrin said, &#34;that&#39;s convenient. Or it would be, if we had a way out of this saints-damned...oh, never mind, I&#39;ve got one.&#34;

&#34;What?&#34; Moritz asked.

Perrin grinned. &#34;Look at all these beds. This place was built to house thousands of people. All those people would need toilets. And if there&#39;s toilets, there&#39;s sewers.&#34;

&#34;Oh no,&#34; Arcos groaned, &#34;not again.&#34;

----

As it turned out, the ersatz palace did have bathrooms. They were small, oddly-shaped, completely overtaken with mold, and far too few in number to sustain the multitudes that were clearly intended to live in this place, but each one seemed to have functional plumbing nonetheless. Of course, finding a drain was a long way from slithering down it, but Moritz had a solution. Using his staff as a dousing rod, the wizard sniffed out what, to him, &#34;felt like&#34; an underground river - presumably a much larger sewer tunnel.

&#34;How far down is it?&#34; Horatius asked.

&#34;Only one way to find out,&#34; Moritz replied, rolling up his sleeves. &#34;Arcos, break that floor up a little.&#34; Arcos happily obliged. He smote the stone three times with his hammer, leaving it riddled with cracks and craters. 

&#34;That enough?&#34;

&#34;That&#39;s perfect. Now stand back.&#34; Muttering some magic words, Moritz raised his staff like a spear and plunged its glowing crystal point into the hole Arcos had made. Veins of red light shot along the cracks, growing wider and deeper as Moritz worked his staff further into the hole. Then the whole floor began to sag, and he jumped back just in time to avoid a two-meter sinkhole that opened to the sewer below. It was less than a meter below the basement, and it looked wide enough for any of us but Arcos to stand comfortably...or it would have, had it not been filled with half a meter of cold, flowing water.

&#34;That looks unsafe,&#34; Arcos said.

&#34;Less unsafe than a dragon,&#34; Perrin reminded him.

&#34;Barely.&#34;

----

Though they were not many in number, the flooded, frozen minutes I spent in UnLondon&#39;s sewers were the most miserable of my life. The water came only to my knees, but there were countless little leaks in the tunnel&#39;s walls that sprayed thin, icy rivulets of rainwater everywhere else. I became soaked in seconds, and my teeth soon set to chattering. Our progress through the rushing water was agonizingly slow. Each of us fell at least once, feet betrayed by the slick stone and chilling current. If Arcos hadn&#39;t been blocking the channel in front of me, I might have been swept away entirely. I could scarcely feel my feet by the time we found an exit. The ladder up to the manhole had long since fallen away, but it was still close enough for Perrin to reach with a boost from Arcos. He went first, then Arcos helped Moritz and passed me up to them. Horatius was far more difficult to move, thanks to his heavy mail and waterlogged gambeson, but we managed it. Arcos came up last, bracing his long limbs against opposite sides of the short vertical shaft. Then he slammed the manhole back into place, with unnecessary but completely understandable force. The noise reminded us of the street&#39;s dangers, though, and we quickly ducked into the nearest building.

&#34;C-c-an we stop to warm up?&#34; I asked, pitifully clutching my shoulders. Moritz shook his head and shivered.

&#34;It&#39;ll t-t-take hours to get dry, and by then it&#39;d be s-s-sure to spot our fire.&#34;

I groaned, but he was right. We had no choice but keep going. Moritz relit his staff, but only with a low red glow that (we hoped) would be too dim for the dragon to see from its height, at least with the rain and tall buildings in the way. We hadn&#39;t a clue to our location, but Moritz&#39;s compass still seemed to be working, so we headed roughly east. We&#39;d eventually reach the river, and then perhaps we could determine if we were north or south of Big Ben. We ducked in and out of buildings, keeping our eyes to the skies as if we&#39;d have been able to see winged death descend. Every faint echo seemed like the rush of approaching wings, and every scuff of our soggy shoes felt like a dinner bell.

----

As we continued eastward, Moritz&#39;s light fell upon what had to be the side of a cathedral. Even in the dim, red glow, it was clear that the building must be huge, and that it was probably a right monstrosity of arches and stained glass. Moritz, briefly interested in this Ancient architecture, stopped for a bit to take it in.

&#34;We&#39;ll have to come back and get a better look at this, once that dragon&#39;s out of the way.&#34;

&#34;Agreed,&#34; Horatius said. I was a bit surprised, but then again I suppose it made sense for a knight (even an excommunicated one) of the Foundation to appreciate a good cathedral when he saw one.

That still didn&#39;t make it any less catastrophic when, captivated by the architecture, Horatius walked right into a lamppost. The metal rim of his shield set it ringing like a bell.

We froze. 

&#34;//There you are!//&#34; came the draconic voice, from somewhere high and to the west.

&#34;Inside!&#34; Perrin commanded, then sprinted into the cathedral. Its vaulted ceiling, propped on numerous towering columns, was so far overhead that we could barely see it. Shattered chandeliers crunched underfoot as we ran for an opulent archway far ahead, hoping to find cover on the other side.

The ground shook. We weren&#39;t going to make it.

With a crash, one of the dragon&#39;s heads burst through the massive stained-glass window at the cathedral&#39;s front. It loosed an ear-splitting roar, and I screamed as the wave of fire broke upon us.

-----

As the smoke cleared, Carter admired his handiwork. Nearly the whole nave was now scorched black. And there at its very center, burnt to shriveled crisps, were the corpses of four failed dragonslayers. He laughed, shaking the windows that yet remained in the copied cathedral. Dark barked something at him, and he pulled his head from the window so she could see. Her yellow eyes surveyed the same scene of fiery death, counting the smoking bodies. She growled a question at Carter, and he hissed in response. Marshall laughed, and she snapped at him. Then they lumbered away from Westminster Abbey, and with a rush of wind, returned to their aerial patrol, seeking a fifth victim.

I exhaled. The smoldering illusions of Moritz, Arcos, Perrin, and myself dissolved into greenish sparkles. Moritz also relaxed, dropping the spell that had kept us from meeting the fiery fates of our duplicates. Thinking quickly, he had used the water soaking our clothes to whip up shields of solid ice and chill them as cold as he could. The dragon&#39;s breath had completely vaporized the ice, but steam burned less than fire. We were both completely out of breath, hunkered just inside a smaller archway on the nave&#39;s right side. Arcos and Perrin had both spotted it as we fled past, and they had quickly dragged the rest of us through.

&#34;Well,&#34; Moritz gasped, leaning on his staff for support, &#34;at least we&#39;re not cold anymore.&#34;

Perrin laughed once, nervously.

Horatius seemed none the worse for wear, despite having just sprinted 30 meters in at least that many kilograms of armor. He looked at me with a puzzled expression.

&#34;Why did I not have a decoy?&#34;

I smiled through the exhaustion. &#34;If it thinks we&#39;re //all// dead, it won&#39;t buy the distraction.&#34;

He nodded. &#34;Good thinking. You&#39;re a clever one, princess Geva.&#34;

I laughed, then winced. My head hurt.

&#34;Let&#39;s get out of here,&#34; Arcos grumbled, scratching at a newfound bald spot where the fire had almost gotten him. Continuing through the arch, we hurried along the cloisters that ringed a large courtyard and emerged back onto the street we&#39;d been traveling.

----

It was only a short distance from there to Big Ben, and we covered it as fast as we could without raising a ruckus. The clock tower was actually just one part of a massive palace, much larger than the one that Marscar the Dark had made its home. Rather than brave its interior, we picked our way along the outside, then climbed through a tall, long-broken window near the tower&#39;s base. The outside of the tower looked sturdy enough, but the inside was a different story. It seemed that the bells and clock mechanism had fallen, turning the bottom floor into a treacherous pile of rust and rubble. In the southeast corner, though, we could see a set of spiral stairs winding up the wall. We picked our way across the wreckage, then carefully proceeded up the stairs. The metal railings had long since corroded to nothing, but the steps themselves were the same resilient stone as the walls, cracked in places but holding up for now, at least. A few hundred steps brought us to a narrow balcony that ran along the perimeter of the tower, ringed on one side by walls and the other by the huge, circular holes where clock faces had once been. With another fifty or so, we had reached the belfry. Four piles of rust were all that remained of the quarter bells, and hour bell had left no sign but a gaping hole in the floor. Yet still the stairs continued, passing a stone balcony that supported rafters from which the bells had once hung. Finally, the stairs ended near the very top of the tower, on a wide platform beside what looked like a lighthouse beacon. This platform was open to the air, so we retreated to the relative shelter of the balcony above the belfry. There were no windows there, so we could finally do away with the dim, red light that had oppressed us since our escape from the sewers. So sheltered, and so informed of the tower&#39;s internal layout, we began to lay our scheme.

----

Marscar the Dark soared above UnLondon, sweeping in wide circles around Buckingham Palace. They swooped low over Hyde Park, remembering the Foundation tent city that had once been there. They stared back at the empty socket where the UnLondon Eye had once stood, before the relentless water claimed it and every other piece of ferrous metal in that urban facsimile. They perched for a while at the top of the Shard, the highest point in this lowest city, and surveyed their vast, beautiful, ancient, and utterly empty domain. They could still see the glow of their braziers in the far-off palace&#39;s quadrangle, and they could just pick out the top of Westminster Abbey, which that idiot Carter had so foolishly damaged. That window could never be replaced, now that Upper London had crumbled to dust. Not that Marscar the Dark would have allowed workmen into its domain; no, any who set foot in their lair would, by the very act, forfeit their lives, and all their beautiful possessions. Possessions like the most famous sword in history, the most cherished treasure in the Ukish Isles, the symbol of a king&#39;s authority that the dragon had tried for centuries to pry from the depths of that damnable lake in Cornwall, only to be thwarted again and again by the faerie magic of its insolent Lady. How could any being be more worthy to rule than they, Marscar the Dark, Lord of Terror and Destruction? How could any being be so foolish as to oppose their rightful rule?! How could-

How could the Ayerton Light be lit? There, at the top of Big Ben, the beacon had come alive. It could be seen from anywhere in the city, even at the far edges where it merged back into the bedrock. Someone was signaling them. The dragon laughed.

&#34;Parliament,&#34; Dark laughed, &#34;is in session.&#34;

As they glided closer, they could discern the silhouette of the missing knight, waving his priceless sword and hideous shield in some crude signal. Their supernaturally keen ears could hear his squeaking cries.

&#34;Dragon!&#34; he bellowed, as if any amount of shouting could intimidate one so powerful as they. &#34;I demand a parley!&#34;

A parley? How quaint. What could this insect possibly have to bargain with? The dragon had thought him brave, when he shook off their poison words so easily, but perhaps he really was just stupid. Still, it was entertainment...something that the dragon hated to admit was in very short supply so far beneath the earth. They had slept for a hundred long years before these would-be dragonslayers arrived, but now that they were awake, they might as well enjoy the experience. Maybe once they had that sword in their clutches they would go raze a town or two, just to stretch their wings.

As gracefully as possible for something so large, the dragon glided to the ground beside big ben, carelessly crushing the Jubilee Fountain. They craned their serpentine necks to eye the idiot beside the beacon, and they answered his demand.

&#34;Very well, worm. What have you to bargain with? I have already destroyed your friends, and though you are indeed more slippery than I expected, the fact remains that you will never leave this city alive.&#34;

&#34;Silence!&#34; he roared, in a tone of such presumptuous authority that the dragon nearly laughed. &#34;You will bow before your king, serpent!&#34;

The dragon stopped laughing.

&#34;We bow to nothing, interloper. And it is we who are this island&#39;s monarch.&#34;

&#34;Lies! Treasonous lies! For it I who wield the sword, Excalibur! It is I, deemed worthy by God to rule this accursed land! Now for a third time, I command thee: bow before your divinely appointed king!&#34;

The dragon wondered if their torments had driven the poor knight mad. They did not stop to wonder why (or even how) a knight of the Holy Foundation had invoked the God of Abraham or the legend of Excalibur, for these customs of the old world were still far more familiar to them than the odd practices of those across the sea. Besides, they cared far more for the insult to their ego that this cretin&#39;s asinine charlatanry had wrought. Menacingly, they crept forward. With a single beat of their vast wings, Marscar the Dark raised up the front of their monstrous body, propping their weight on their massive tail and planting both forelimbs on the walls of Big Ben. The whole tower shifted with their weight, cracks spreading from where their black talons dug into the stone. Dark extended her neck, bringing herself face to monstrous face with the foolish knight. Yellow sparks danced on her tongue as she spoke.

&#34;It takes more than a sword to rule, mortal. You claim the blessing of a god, but I know that I am one. Before my might, your words and traditions are worth no more than your dying screams shall be!&#34; She spread her maw wide and prepared to impale this wretched fool on her venomous fangs...when something caught her eye. She closed her mouth, and turned her head to the side to get a better look at the metal stick this pathetic human was waving. Its details had been hard to make out, backlit as it was by the Ayerton Light, but now that she was up close, it didn&#39;t look very like Excalibur at all. It looked like a notched, slightly bent broadsword of Valravn manufacture.

&#34;That&#39;s not Excalibur!&#34; she hissed, in barely coherent frustration.

&#34;Nope!&#34; the knight said, dropping the useless blade and tearing off his helm with the hand thereby freed. &#34;And I&#39;m not Horatius!&#34; Perrin laughed.

On cue, the wizard hidden in the belfry poured every ounce of energy he had to spare into the most powerful lightning bolt he&#39;d ever conjured, then flung it at the true knight. His ancient sword captured the bolt, wreathing him head to toe in brilliant blue St. Hedwig&#39;s fire. A huge, hairy man swooped from the rafters, Mekhanite wings spread wide, and wrapped his massive hands around the knight&#39;s unarmored shoulders. At dizzying speed, he rushed from the belfry&#39;s arched windows and screamed to a halt in midair, transferring all his energy to the plasma-sheathed knight. He hurtled headfirst through the air, gleaming sword extended. The dragon&#39;s heads looked down in fright, but it was too late to do anything but watch as the billion-year-old blade plunged into their chest, splitting scale, flesh, and bone with equal ease. As its very tip bit into their dark, cold heart, it discharged the fury of a thousand thunderstorms - the divine wrath of the Broken God - into that heaving muscle, and stopped it.

Quietly, the dragon&#39;s heads exhaled their final breaths. The elemental fury in their mouths flickered out. With the slow, tragic grace of a sinking ship, they fell. All UnLondon trembled.

Marscar the Dark was dead.
