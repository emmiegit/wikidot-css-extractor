++ Incident **##cc0000|THESEUS##**-BLACK Timeline
[[/=]]

**4/29/2043:** SCP-##22a400|**VATHEK**## decommissioned; Project ##22a400|**VATHEK**## put on hold.

**5/10/2043:** The following live segment airs on //Morning Would! with Ellen Degeneres.//[[footnote]](After significant political contributions to Foundatia, her public image was forcibly restored through usage of the Brandt-Kartoffel Thaumaturgical Persuasion Technique.)[[/footnote]]

&gt; //[After coming back from a commercial break, Ellen DeGeneres sits on her couch.]//
&gt; 
&gt; **DeGeneres:** So, um, my next guest is a little -- I dunno -- unorthodox? Let&#39;s go with unorthodox. What is it about that word that leaves a weird taste in your mouth? It&#39;s hard to //chew.//
&gt; 
&gt; //[Canned laughter.]//
&gt; 
&gt; Anyway, this guy&#39;s a scientist from Foundatia, from the province of Diet Russia -- Belarus, sorry.
&gt; 
&gt; //[Canned laughter.]//
&gt; 
&gt; And because he&#39;s //clearly// got that much time on his hands, his work in the field of RNA Compassing is gonna let me keep hosting this show for the next 200 years. And, uh, apologies in advance if the janitor&#39;s gonna have to, y&#39;know, spatula my butt off the floor by that point.
&gt; 
&gt; //[Canned laughter.]//
&gt; 
&gt; Anyway, please welcome Dr. Emil Fabrikant.
&gt; 
&gt; //[Canned applause. Dr. Fabrikant joins her. They hug. He sits down.]//
&gt; 
&gt; Hey, thanks for comin&#39;!
&gt; 
&gt; **Fabrikant:** Is great to be on your show, Ellen. 
&gt; 
&gt; **DeGeneres:** So, like, how are -- uh, this is your first time in Burbank, right?
&gt; 
&gt; **Fabrikant:** Yeah, is um, I am not being used to this heat.
&gt; 
&gt; **DeGeneres:** Hey, uh, listen, before we get into your, uh, contributions to whatever I just said earlier, I just wanna know -- what you were sayin&#39; in your autobiography, is that true?
&gt; 
&gt; **Fabrikant:** Um, is my own life. I //hope// is true.
&gt; 
&gt; //[Canned laughter.]//
&gt; 
&gt; **DeGeneres:** But like, I&#39;m talking about the specific part where you said the two things you hated the most were, uh, lemon juice and zebras? Kinda... I dunno, oddly specific. Like, &#34;hey guys, I&#39;m afraid of balsamic vinegar and kangaroos.&#34;
&gt; 
&gt; //[Canned laughter.]//
&gt; 
&gt; **Fabrikant:** I mean, is not so much being //afraid// of, more like feeling weird around. For one thing, the smell of lemon juice -- I have very good sense of smell, but... like a blessing and a curse, because --
&gt; 
&gt; **DeGeneres:** So you like eating salmon with nothing on it?
&gt; 
&gt; **Fabrikant:** I mean --
&gt; 
&gt; **DeGeneres:** Your fish is //naked,// sir.
&gt; 
&gt; //[Canned laughter.]//
&gt; 
&gt; **Fabrikant:** Heh, well, I don&#39;t --
&gt; 
&gt; **DeGeneres:** Just keep swimming, am I right?
&gt; 
&gt; //[Wild canned laughter, canned applause.]//
&gt; 
&gt; **Fabrikant:** As for zebras, I dunno. Just rub me the wrong way I guess.
&gt; 
&gt; **DeGeneres:** Well, you won&#39;t find either of those here.
&gt; 
&gt; //[A man in a zebra costume sneaks up to Fabrikant from behind the set, holding a bottle of lemon juice.]//
&gt; 
&gt; Anyway, let&#39;s talk about RNA Compassing!
&gt; 
&gt; **Fabrikant:** Yes, of course. Is still new, emerging field in microbiology, but the applications of it are astronomically important for purposes of --
&gt; 
&gt; **Zebra Man:** //[Aggressive neighing.]//
&gt; 
&gt; //[He splashes Fabrikant&#39;s scalp with the lemon juice.]//
&gt; 
&gt; //[Fabrikant explodes into millions of screeching worms.]//
&gt; 
&gt; //[Video feed cuts out.]//

**5/15/2043:** **##cc0000|THESEUS##**-A constructs in the shape of pigeons and seagulls overwhelm Minneapolis and St. Paul, MN, aggressively infecting solid and liquid matter throughout the city.

**5/17/2043** A joint effort by the governments of the United States and Foundatia begins to quarantine areas of California and Minnesota that have been affected by the spread of **##cc0000|THESEUS##**.

**5/18/2043:** The first models of the V-115, colloquially known as the &#34;Medusa Gun&#34;, are mass produced to combat the spread. The V-115 is a modified pressure washer and tank designed to heat and spray boiling citric acid.

**5/20/2043:** Every video screen in Times Square is hacked by an unknown third party. For 20 minutes, the screens display the following:

[[=]]
&gt; **I WAS THE DISTRACTION**
&gt; 
&gt; **WHY DO YOU THINK HE MADE ME EAT ALL THOSE LEMONS?**
[[/=]]

**6/1/2043:** The firebombing of 72 lemon orchards in Spain is attributed to **##cc0000|THESEUS##**-A activities. EU declares state of emergency.

**7/10/2043:** South Korean president Choi Da-Som&#39;s nose accidentally shapeshifts into a hand grenade on live TV.

**7/11/2043:** Seoul placed under indefinite quarantine.

**8/14/2043:** 17 major cities around the globe placed under quarantine.

**8/17/2043:** The **##cc0000|THESEUS##**-A swarm in Chicago amalgamates into a 200-meter-high mallard, heretofore **##cc0000|THESEUS##**-DUCK, which proceeds to go for a swim in Lake Michigan.

**8/18/2043:** To contain the catastrophic spread of liquefied **##cc0000|THESEUS##**-A into the ocean, an emergency dam is constructed in northern Lake Michigan through the use of nuclear mining and [REDACTED].

**8/19/2043:** **##cc0000|THESEUS##**-DUCK jumps over the dam.

**8/21/2043:** Anti-Foundatia nationalists from the province of North Korea detonate a stolen nuclear warhead in Seoul, citing a need to take matters into their own hands.

Immediately afterward, the unknown third party hacks Times Square&#39;s video screens again, with the following message:

[[=]]
&gt; **RADIATION MAKES //MORE// OF THEM YOU DIPSHITS**
[[/=]]

**8/25/2043:** Twenty instances of **##cc0000|THESEUS##**-MOOSE, each of which is twice the height of **##cc0000|THESEUS##**-DUCK, escape Seoul. 

**8/31/2043:** **##cc0000|THESEUS##**-A infiltrate the Pax Aeternam Nuclear Vault, using it as a breeding epicenter.

**9/2/2043:** The Administrator of the Foundation issues the following address, played on the intercom at all Foundation sites:

&gt; Good evening. 
&gt; 
&gt; People of the SCP Foundation, the Republic of Foundatia, and all subsidiary entities, I will not pretend that the times we&#39;re going through aren&#39;t catastrophic.
&gt; 
&gt; As your Administrator, I would like to formally announce...
&gt; 
&gt; //[Wet, slapping noises.]//
&gt; 
&gt; //[Guttural whining.]//
&gt; 
&gt; //[Gurgling.]//

**10/1/2043:** Times Square&#39;s screens are hacked for the final time.
[[=]]
&gt; **THAT&#39;S ALL I GOT LEFT**
&gt; 
&gt; **REMEMBER YOUR TRUE SELF IN THE COMING DAYS**
&gt; 
&gt; **AND IF THE REAL YOU SUCKS**
&gt; 
&gt; **THEN SUCK //GOOD//**
&gt; 
&gt; **THIS IS NOT ADVICE, THIS IS //SURVIVAL//**

[[/=]]

**1/12/2044:** The 87th Amendment to the United States Constitution is passed, making the possession of lemon juice punishable by being hung, drawn, and quartered.

**2/1/2045:** **##cc0000|THESEUS##**-APE lays its third egg in Kosovo.

**2/12/2045:** [[[SCP-169]]] awakens from its dormant state. 

**2/13/2045:** [[[SCP-169]]] surfaces on the shore of Brazil and [REDACTED].

**2/14/2045:** [[[SCP-169]]] reclassified as **##cc0000|THESEUS##**-LEVIATHAN.

**2/28/2045:** The UN passes a joint resolution with the Foundation to begin the emergency acidification of all bodies of water.

**3/1/2045:** **##cc0000|THESEUS##**-PRESIDENT gives the following address. 

&gt; My fellow Americans,
&gt; 
&gt; Your ego is a prison. 
&gt; 
&gt; //[He disrobes, revealing that his genitals have transformed into a bouquet of screeching barracudas.]//
&gt; 
&gt; We have such treasures to show you.

**3/12/2045:** **##cc0000|THESEUS##**-INDONESIA defecates.

**3/15/2045:** **##cc0000|THESEUS##**-RAT elected President-for-Life of Foundatia.

**4/2/2045:** **##cc0000|THESEUS##**-MOON opens its mouth for the first time.
