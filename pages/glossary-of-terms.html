 * //If it&#39;s locked in a box indefinitely and nothing bad will happen, it&#39;s probably **Safe**-class.//
 * //If it&#39;s locked in a box and we have no idea what might happen, it&#39;s probably **Euclid**-class.//
 * //If it&#39;s locked into a box and eventually all hell will break loose, it&#39;s probably **Keter**-class.//
 * //If it// is //the box, then it is probably **Thaumiel** class.//
* **lolFoundation** -- Additions to an SCP article that imply seriously unprofessional conduct among Foundation personnel, such as reckless misuse of dangerous anomalous objects, as well as threats of punishment for such behavior such as reassignment to &#34;Keter Duty&#34;. While generally considered to be too unprofessional for a serious research organization, there is still [[[lolfoundation-hub-page| a place for it]]] on the site.
* **malicious downvoting** -- downvoting someone&#39;s article for any reason other than the quality of the work, as explained in the [[[Site Rules]]].
* **Murder Monster** -- An inhuman entity that attacks and kills people. Although this term is often used dismissively, this is a classic type of SCP, going all the way back to [[[scp-173|the Original]]]. There are [/system:page-tags/tag/murder-monster many successful articles written about this kind of SCP], but new examples will need more of a **hook** than just a description of a dangerous creature to be successful.
* **sandbox stalking** -- The act of reading the **sandbox** pages of other authors for purposes other than critique, without their permission or knowledge. While not against the Site Rules, telling an author that you had covertly read their unpublished drafts could make them uncomfortable, as these pages often do not reflect the finished product. It is advised to not share the contents of an author&#39;s sandbox page to other users, nor to edit someone else&#39;s drafts without their explicit permission. Note that the term does not apply to members of **[https://05command.wikidot.com/maintenance-and-ancillary-staff-team-main MAST]**, who regularly clean the [http://www.scp-wiki.net/sandbox offical SCP sandbox wiki] for vandalism and offensive content.
* **side chat** — A private Discord server used by a group of authors as an alternative to the public [https://discord.com/invite/scp SCP Wiki Official Discord server].
* **[[[spc-hub|SPC]]]** -- The Shark Punching Center. A [http://en.wikipedia.org/wiki/Backronym backronym] created to make fun of people who misspell &#34;SCP&#34; as &#34;SPC&#34; (e.g. &#34;I like the idea, but what does the Shark Punching Center have to do with it?&#34;), subsequently turned into a **Group of Interest**.
* **Thing That Does A Thing** -- Inanimate objects with an anomalous property. While this is a common type of SCP, particularly for new authors writing their first article, this term is usually used as a reminder that the article needs a **hook** to hold the reader&#39;s interest. See [[[things-what-do-a-thing-an-essay-on-things | this essay]]] for advice on doing this well.
* **Total Winner** -- Refers to articles that have reached a rating of +100 under 24 hours.
* **Wikifot** -- Catch-all joke term used by the community to refer to the general technical issues our platform, Wikidot, occasionally runs into.
* **whitename** — Derogatory term for a new member of the SCP Wiki who has yet to publish an article or to contribute to the community in any way (such as becoming a **Staff** member or providing **critique**). Originates from the /r/SCPDeclassified Discord server, where members without certain roles (e.g., Author role, Contributor role, Artist role) would have their display name in a white color.

+ Updating the Page

Further contributions are always welcome! While this page is open to contributions from any site member, new terms should not be added to this page unless they&#39;ve been used in published articles on the site more than once. While you don&#39;t have to cite sources, remember that links to articles that go into more detail can be very useful to people unfamiliar with specific terms. An important caveat is that these terms may not always be used consistently, that&#39;s just inevitable when we have so many different canons and alternate interpretations on the site.

If you&#39;re not sure whether a term warrants inclusion, want to clarify a proposed definition, or think a definition already on this page should be amended, post in the discussion thread for this page to get feedback first. Feel free to comment on other people&#39;s suggestions and additions, if you think you have something useful to add!
