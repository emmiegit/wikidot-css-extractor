This page is a collaborative resource defining terms commonly used on the site or in the community. Terms defined elsewhere ([[[object classes]]], [[[personnel-and-character-dossier|characters]]], [[[locations-of-interest|specific locations]]], [[[groups of interest]]]) are omitted from this list to avoid redundancy. 

The page is ordered alphabetically, but terms are organised into multiple sections, with synonyms listed together. If you&#39;re looking for a specific term, you can quickly search this list using your browser&#39;s &#34;Find In Page&#34; option (Keyboard shortcut ctrl + F or cmd + F).

[[toc]]

+ In-Universe Terms
Specialized vocabulary that may be used in SCP articles, tales and GoI formats.

++ Article Format
Listed by typical order of appearance in an SCP article.
* **Item #** -- The numeric identifier for the SCP. Note that the formal name of an SCP is always &#34;SCP-####&#34;, and not its number alone (&#34;SCP-173&#34;, not &#34;173&#34;), although the number on its own is often used informally.
* **[[[object-classes|Object Class]]]** -- A system of categorization based on the difficulty of containing the entity or object. See the [[[Object Classes]]] guide for more information, and definitions of the most commonly used object classes (Safe, Euclid, Keter), as well as some less commonly used object classes (including Thaumiel, Neutralized and Apollyon). [[[esoteric-classes-complete-list| More esoteric object classes]]] may replace these, and supplementary classification systems may be used (such as adding a **[http://scp-int.wikidot.com/niveaux-de-menace-des-objets-scp Threat Level]**, or using the [[[anomaly-classification-system-guide| Anomaly Classification System]]], which replaces &#34;Object Class&#34; with &#34;Containment Class&#34;).
* **Special Containment Procedures** (**SCP**) -- Instructions to be followed to keep the entity or object contained. May be truncated to &#34;S. C. Procedures&#34; or referred to informally as &#34;conprocs&#34;.
* **Description** -- The section of an SCP article that explains in a clear and concise way what the entity or object does, and why it is contained. The description can be supplemented by one or more addenda, but you should be able to understand the basic function through the Description alone.
* **Addendum** -- (//Plural: addenda//) A section of an SCP article that either expands on specific aspects of the Description, shows the progression of information over time, or otherwise provides additional information that does not fit into the Description. Addenda can be posted on the main page or in separate **[[[incident-reports-eye-witness-interviews-and-personal-logs| supplement]]]** pages, and can include [/system:page-tags/tag/experiment Experiment Logs], [/system:page-tags/tag/exploration Exploration Logs], [/system:page-tags/tag/incident Incident Reports] or [/system:page-tags/tag/interview Interviews].

++ Foundation Terminology
Other terms used in Foundation documents to describe their own personnel, facilities and containment procedures.
* **[[[o5-command-dossier| The Administrator]]]** -- Mysterious figure in-universe, may (or may not) have been the founder of the SCP Foundation. Possibly a member of the **O5 Council**, possibly the overall leader of the Foundation, outranking even the Council members. Inspired by FritzWillie, the [[[an-interview-with-the-administrator| person who brought the SCP Wiki to Wikidot]]], as he used an account simply called &#34;The Administrator&#34; to create and run the new website.
* **[[[personnel-and-character-dossier| agent]]]** -- An undercover Foundation field agent, typically capitalized when used as a title (e.g. Agent Smith). Note that not all field personnel employed by the Foundation are necessarily &#34;agents&#34; in this sense, nor do all such personnel have the title &#34;Agent&#34;. See also: **containment team**, **response team**, **Mobile Task Force**, and **researcher**.
* **[[[log-of-anomalous-items| Anomalous Item]]]**/**Anomalous Object** (**AO**) -- An object with **anomalous** properties too minor to warrant **Special Containment Procedures** or further research.
* **anomaly**/**anomalous** -- Foundation term for the objects they contain and research. Generally defined as anything that cannot be explained by current scientific knowledge, behaving as an exception to otherwise universal laws and principles. See also **paranormal**, **anahuman** and **parafauna**.
* **Area** -- A type of [[[secure-facilities-locations#area| Foundation Facility]]] completely unknown to the public.
* **censor bar** ( █ ) -- One of the three types of censorship used on the site. Unlike **[DATA EXPUNGED]** and **[REDACTED]**, censor bars do not suggest any reason for their usage in withholding information. Nowadays, censor bars are primarily used to redact data of a smaller scale, such as dates or numbers, as their employment on large sentences or paragraphs may be seen as too distracting for readers. Informally referred to as a **blackbox**, the Unicode character (U+2588) is officially known as a [https://en.wikipedia.org/wiki/Block_Elements &#34;full block&#34;].
* **Contained Person of Interest** (**CPoI**) -- A **Person of Interest** the Foundation has captured and contained. Usually is an anomalous human (**anahuman**) [[[scp-6703|whose properties are too minor]]] to warrant **Special Containment Procedures**, and as such have more privileges than an **SCP entity**.
* **containment breach** -- Term used when an SCP object escapes containment. May involve physically breaking out of a **containment chamber**, but could also refer to the spread of knowledge about it outside of the Foundation.
* **containment chamber** -- A room dedicated to the containment of an SCP object.
* **containment team** -- Field personnel specializing in recovering or retrieving anomalous objects or entities. Members may or may not be field agents as well, but usually have a different title, such as &#34;Containment Specialist&#34;. See also **agent** and **response team**.
* **[DATA EXPUNGED]** -- One of the three types of censorship used on the site. While often used interchangeably with **[REDACTED]** and **censor bars**, specifying that information has been &#34;expunged&#34; implies that it has been permanently deleted from the records, typically because the information poses a hazard in and of itself, e.g. if it&#39;s a **memetic** hazard. 
* **D Class** -- Foundation employees deemed expendable if necessary for testing or containment. Typically consist of prison inmates recruited by the Foundation for this purpose in exchange for reductions in their sentence, although Foundation employees may be demoted to D Class for egregious violations of protocol, and it has also been claimed that D Class are [[[d-2000|artificially created]]] by **Hominid Replicators**. Older articles refer to a &#34;monthly termination&#34; of all D Class, claiming that they are exclusively recruited from death row, but this is generally regarded as unlikely to be true for both pragmatic and ethical reasons, with D Class instead being retained for as long as they are useful or being periodically mind-wiped using **amnestics**. See the [[[Security Clearance Levels]]] guide for more information, as well as the relevant [[[ethics-committee-class-d-housing-regulations|Ethics Committee Regulations]]]. 
* **[[[departments| department]]]** -- Organisations within the Foundation that specialize in a specific task, discipline or field.
* **[[[personnel-and-character-dossier| director]]]** -- The head of a Foundation **Facility** or **Department**. Typically capitalised when used as a title (e.g. Director Jones).
* **Disruption Class** -- Part of the [[[anomaly-classification-system-guide| Anomaly Classification System]]], the Disruption Class refers to an anomaly&#39;s ability to disturb the status quo or break **the Veil** if uncontained. In ascending order, these are Dark, Vlam, Keneq, Ekhi and Amida.
* **&#34;Does the black moon howl?&#34;** -- A phrase used by the Foundation to protect important files, enabling access only when a particular answer is used in response. Alternatively, it may be a [[[scp-5236|memetic agent]]] that compels an individual, without realizing, into replying back with a counter-phrase that reveals their dishonesty, ulterior motives, mental stability (if affected by mind-altering anomalies), or simply their security clearance. The &#34;Black Moon&#34; may or may not refer to an actual entity. See [[[black-moon-howl-complete-list|this page]]] for a full list of known responses.
* **[[[scp-ex|Explained]]]** (**EX**) -- A class for SCP objects that have either been debunked as a hoax, sufficiently understood so as to be normal scientific knowledge, or so widely disseminated that containment is no longer possible.
* **[[[log-of-extranormal-events| Extranormal Events]]]** (**EE**) -- Anomalous events that occurred too briefly to be contained.
* **[[[secure-facilities-locations|Facility]]]** -- A generic term used to refer to both **[[[secure-facilities-locations#site| Sites]]]** and **[[[secure-facilities-locations#area| Areas]]]**.
* **The Foundation** -- A secret organization that contains **anomalous** objects, entities, and phenomena through the creation of **Special Containment Procedures**. Only rarely referred to as the &#34;SCP Foundation&#34; in-universe, usually just &#34;The Foundation&#34;.
* **[[[locations-of-interest#free-port| Free Port]]]** (**FP**) -- A larger and more formally recognized type of **[[[locations-of-interest#nexus| Nexus]]]**, an area that is inherently anomalous and entirely behind the **Veil**. This means that there is no need to try to conceal the existence of the **anomalous** from the people who live there, since they all already know. The Foundation&#39;s ability to operate within a Freeport is usually limited by legal agreements or local opposition, giving Groups of Interest much more freedom than usual.
* **[[[a-semi-comprehensive-list-of-foundation-fronts| front]]]** -- An organisation used as a cover for the Foundation&#39;s activities, allowing agents of the Foundation to operate in public. Fronts may have a name that can be abbreviated as &#34;SCP&#34;, such as [[[departments#spicy-crust-pizzeria| Spicy Crust Pizzeria]]] or [[[the-s-c-plastics-hub | S&amp;C Plastics]]] - see [[[pickman-blank-proposal| The Frontispiece]]] for more information about this practice.
* **[[[Groups of Interest]]]** (**GoI**) -- A Group of Interest is an organisation other than the Foundation that is aware of the anomalous.
* **HMCL Supervisor** -- Responsible for managing the containment of one or more anomalies. The exact nature of the role varies in each canon, either being a single administrative position that oversees all anomalies contained in a **Facility** or a title given to the leading member of an SCP object&#39;s **research team**. The actual meaning of &#34;HMCL&#34; is debatable; however, most users conclude it to be &#34;**Hazardous Materials Containment Liaison**.&#34; Alternatively referred to as the **Head Researcher** or **Containment Supervisor**.
* **[[[k-class-complete-list| K-Class Scenario/K-Class Event]]]** -- Hypothetical situations with drastic effects on normality or reality. The most well-known K-Class Event, the XK-Class Event, typically denotes a catastrophic event resulting in the destruction of human society, if not the entire human species, but various other scenarios have their own designations, used with varying consistency across different articles.
* **[[[Locations of Interest]]]** (**LoI**) -- A Location of Interest is an area with anomalous properties, often inhabited by a permanent community and requiring a more diplomatic approach to their containment. See also **Unexplained Location**, **Nexus** and **Free Port**.
* **[[[task-forces|Mobile Task Force]]]** (**MTF**) -- A highly-trained and specialized team that is deployed in the field by the Foundation to deal with specific threats or conditions. Mobile Task Forces are designated by a Greek letter and a number (e.g. &#34;MTF Alpha-7&#34;, &#34;MTF Omega-15&#34;) and may have a nickname attached, similar to many real-life military units. MTFs are the elite personnel of the Foundation, and run the gamut from highly experienced field researchers to combat-hardened troops, with each MTF specialising in a different scenario or class of anomaly. [[[task-forces-complete-list|Other types of Task Force also exist.]]]
* **[[[locations-of-interest#nexus| Nexus]]]** (**Nx**) -- An actively anomalous location supporting a permanent community. Originally defined and listed [[[nexus-series|here]]]. The Nexus Area Classes are Briar, Asphodel, Camelot, Shangri-La, Dunwich and Turing, depending on how overtly anomalous the area is. See also **Freeport**.
* **[[[o5-command-dossier| O5 Council]]]**/**Overseer Council** (**O5**) -- short for the &#34;Council of Observers, Level 5&#34; or the &#34;Overseer Level 5 Council&#34;. The highest authority in the Foundation and the leading body of **Overwatch Command**, a council of 12 or 13 individuals who have the power to authorize or veto any action taken by the Foundation as a whole. O5 Council members are only known by their numbers (O5-1 through O5-13), are rarely involved in day-to-day Foundation activities, and are typically not allowed to contact any SCP objects directly for fear of contamination. Note that it&#39;s a capital letter &#34;o&#34;, not the number zero.
* **Overwatch Command**/**O5 Command** -- The highest administrative department of the Foundation, headquartered in [[[secure-facilities-locations|Site-01]]]. Although often used to refer solely to the **O5 Council**, Overwatch Command is the name of the Foundation&#39;s general central authority, composed of the most high-ranking personnel and the Overseer&#39;s closest staff (e.g [[[task-forces#alpha-1|MTF Alpha-1]]]). Along with the Council, it manages and supervises all other **Facilities** and **Departments**.
* **[[[personnel-and-character-dossier| Person of Interest]]]** (**PoI**) -- An individual that the Foundation is investigating or observing due to their involvement with the anomalous. May have anomalous abilities, have had contact with an **SCP object**, or be a member of a **Group of Interest**. 
* **[REDACTED]** -- One of the three types of censorship used on the site. Something that is &#34;redacted&#34; is withheld from the article because the reader is not cleared to see the information, but would be made available to someone else with a higher **Security Clearance Level** or on a need-to-know basis. See also **[DATA EXPUNGED]** and **censor bars**.
* **[[[personnel-and-character-dossier| researcher]]]** -- A broad term for anyone involved in research and development at the Foundation - they may be referred to as a Researcher, Technician, Doctor or Professor, depending on their qualifications and specialty. Researchers can be involved in anything from figuring out how an anomalous object or entity functions to developing better materials and containment procedures. Field researchers may also accompany containment teams to assess the nature of uncontained anomalies.
* **research team** — A group of researchers assigned to study and manage a specific SCP object. Lead by a **Head Researcher** or **HMCL**/**Containment Supervisor**.
* **response team** -- A heavily armed team trained to deal with security or containment breaches, typically at a secure Foundation site. Response team members are also sent into the field to escort containment teams when dealing with highly hostile or dangerous objects or entities, or when enemy [[[Groups of Interest]]] are involved. 
* **Risk Class** -- Part of the [[[anomaly-classification-system-guide| Anomaly Classification System]]], the Risk Class refers to the severity of an anomaly&#39;s effects on an individual person, and how easily one can recover from it. In ascending order, these are Notice, Caution, Warning, Danger and Critical.
* **SCiPNET** -- Alternatively capitalised as SCiPNet or SCiPnet. The Foundation&#39;s intranet and inter-site database, used for sending emails between employees and for accessing SCP files and other documents. 
* **SCP** -- An [https://simple.wikipedia.org/wiki/Initialism initialism] for &#34;Special Containment Procedures&#34;, and used informally as a short-form of &#34;SCP article&#34;, as in, &#34;I wrote three SCPs yesterday&#34;. SCP objects or entities are not formally referred to as &#34;an SCP&#34; or &#34;the SCP&#34; in-universe, although characters might do so informally, even using casual pronunciations like &#34;scip&#34; or &#34;skip&#34;. Note that &#34;SCP&#34; is //not// an initialism for &#34;Secure, Contain, Protect&#34;; the motto of the Foundation is a [https://en.wikipedia.org/wiki/Backronym backronym] derived from &#34;SCP&#34;.
* **SCP object**/**SCP entity** -- An anomaly assigned its own **Special Containment Procedures**. May also be referred to as [https://scp-wiki.wikidot.com/secure-facility-dossier-site-56 Special Containment Projects (SCPs).]
* **[[[security-clearance-levels| Security Clearance Level]]]** -- Specifies the information that a Foundation employee is authorized to know, ranging from 1 (very limited) to 5 (beyond top secret).
* **Site** -- A type of [[[secure-facilities-locations#site| Foundation Facility]]] disguised behind a mundane front (e.g. as a corporation or government office).
* **Site Director&#39;s Executive Committee of the Whole**/**Site Director&#39;s Executive Council of the Whole** (**SDECotW**) -- A gathering of Foundation **Site** Directors, serving as the Foundation&#39;s penultimate administrative authority, one step down from the **O5 Council**.
* **[[[species-complete-list|Species of Interest]]]** (**SoI**) -- Non-human species with anomalous properties. 
* **[http://scp-int.wikidot.com/niveaux-de-menace-des-objets-scp Threat Level]** -- A complimentary system to the object classes, assigning each anomaly a color code based on the danger it would pose if containment was breached. The threat levels, in ascending order, are White, Blue, Green, Yellow, Orange, Red and Black.
* **Unclassified Anomalous Entity** (**UAE**) -- An anomalous entity too minor or insufficiently understood to have **Special Containment Procedures**, most commonly used on anomalies generated by a **[[[locations-of-interest#nexus| Nexus]]]**. Usually, nexus UAE&#39;s are additionally designated with a codeword signifying their locations (e.g UAE-Chapman for [[[locations-of-interest#sloths-pit|Nx-18: Sloth&#39;s Pit]]], UAE-Fowke for [[[locations-of-interest#lake-huron|Nx-94: Lake Huron]]]) 
* **Undesignated Anomaly**/**Unknown Entity**/**Unregistered Anomaly** (**UA**/**UE**/**URA**) -- An anomalous entity that has not yet been assigned Special Containment Procedures. A temporary designation, prior to full documentation as an SCP object.  
* **[[[log-of-unexplained-locations| Unexplained Location]]]** (**UE**) -- A specific place where anomalous phenomena too minor to be assigned **Special Containment Procedures** occur. See also **Locations of Interest**, as well as **Nexus** and **Free Port** for inhabited anomalous locations.

++ Anomalous Science
Terms used by the Foundation and by other groups to describe and categorize the anomalous.
* **acroamatic abatement** -- The processing of anomalous waste products and esoteric substances produced by anomalies into non-anomalous industrial effluent. See [[[acroamatic-abatement| Everything You Need to Know About Acroamatic Abatement But Were Too Confused by the Name to Ask]]] for an elaboration.
* **Akiva Field**/**Akiva Radiation** -- An anomalous field that fluctuates based on human belief and divine intervention, possible to measure and quantify in centiAkiva (cÁ/cAk) or [[[a-brief-introduction-to-thaumaturgical-engineering|Steiners (⊕)]]]. High levels of Akiva radiation correlate with the divine presence in a location, the piety of an individual, and the religious significance of objects. Named after a Jewish scholar and religious leader, the [https://en.wikipedia.org/wiki/Rabbi_Akiva Rabbi Akiva]. See the [[[tactical-theology-hub|Tactical Theology Hub]]] and the [[[Akiva Counter Operating Instructions]]] for more information, as well as the [[[Seas of Orcadia hub]]] for an explanation specific to that canon.
* **anahuman**/**parahuman**/**superhuman** -- A human being with anomalous properties or abilities.
* **[/system:page-tags/tag/antimemetic antimemetic]** -- Antimemes (also known as counterconcepts) are ideas which, by their intrinsic nature, discourage or prevent people from spreading them. The Foundation has an [[[antimemetics-division-hub| Antimemetics Division]]] investigating and containing anomalous antimemes.
* **Apex Tier [[[divine-dossier| Pluripotent Entity]]]** -- An incredibly powerful anomalous entity, possibly omnipotent. Generally used as a clinical term for a god (although not all divine beings will be &#34;Apex Tier&#34;). May or may not also be a **pistiphage**.
* **Aspect Radiation (ARad)** -- **EVE** emissions intense enough to alter reality - the basis of applied **thaumatology**.
* **backlash** -- Random alterations to reality caused as a side-effect of **thaumaturgy**.
* **bozomorphic** — Clinical term for anomalous entities resembling clowns. See the [[[dread-circuses-hub|Dread &amp; Circuses Hub]]] for a summary of different types of bozomorphic entities.
* **bureaucratohazards** -- A sub-class of **semiohazards** that affect bureaucratic systems, making certain entities not guilty despite committing crimes or violating rules.
* **carnomancy**/**fleshcrafting** -- anomalous techniques for altering and reshaping the body, most frequently practiced by followers of [[[sarkicism-hub| Sarkicism]]].
* **Cognitive Resistance Score**/**Cognitive Resistance Value** (**CRV**)-- A measurement of the mental fortitude and resistance of an individual to mind-affecting anomalies, particularly those that are **memetic**. Also known as a Cognitohazardous Resistance Score, Cognitohazard Resistance Value, Mental Resistance Score, Mind-Affecting Resistance Score (MARS) or Psychic Resistance Score, each measured using the corresponding scale.
* **[/system:page-tags/tag/cognitohazard cognitohazard]** -- A term used to refer to objects that are dangerous to perceive. This could occur through any or all of the human senses, including sight, sound, smell, taste, or touch. Differs from an **infohazard** in that simply being informed about a **cognitohazard** has no anomalous effect. See also **memetics** and **hermeneutic**.
* **[/system:page-tags/tag/ectoentropic ectoentropic]** -- Entities or objects that produce energy or matter in an unexplained way, in apparent violation of the First and Second [https://en.wikipedia.org/wiki/Laws_of_thermodynamics Laws of Thermodynamics], which specify that energy (which includes matter) cannot be created (or destroyed), and that entropy (the disorder of a system) must always increase over time.
* **Elan-Vital Energy** (**EVE**) -- Mysterious energy emitted from living beings and sapient anomalies that can power **thaumaturgy**. See [[[goc-supplemental-arad|this lecture]]] for more information. May be referred to by alternative terms, such as [https://en.wikipedia.org/wiki/Aura_(paranormal) Aura], [https://en.wikipedia.org/wiki/Mana Mana],  [https://en.wikipedia.org/wiki/Orgone Orgone] or [https://en.wikipedia.org/wiki/Qi Qi (Chi/Ki)].
* **Empyrean Entity** -- Clinical term for an [https://en.wikipedia.org/wiki/Angel angel], a divine servant or messenger operating on behalf of a god. Also known as [[[kte-5503-bice-copernicus|&#34;Type Bice&#34;]]] entities in [[[goc-supplemental-threat-entities| Global Occult Coalition terminology]]]. Contrast with **Tartarean Entity**.
* **essokinesis**/**essokinetic** -- Clinical term for **reality bending**. Less frequently used than **ontokinesis**.
* **essophysics** -- The scientific study of the physical embodiments or manifestations of abstract concepts. See [[[Mountainous Essophysics]]] for more information. 
* **exploit** -- anomalous phenomena that can be reproduced by anyone with sufficient knowledge and skill. Frequently utilized by **anartists**. See also **Flow**.
* **[/system:page-tags/tag/extradimensional extradimensional]**/**extra-reality** -- Existing in or originating from an alternate reality or in an additional spatial dimension other than the three that we are familiar with. 
* **[/system:page-tags/tag/faerie Faerie]/Fay/Fair Folk/Fairy** -- [https://en.m.wikipedia.org/wiki/Fairy Terms from European folklore] used to refer to a wide variety of supernatural beings. In the various versions of the SCP Foundation setting, the human subspecies of Fae (//[/system:page-tags/tag/homo-sapiens-sidhe Homo sapiens sidhe]//) [[[from-120-s-archives-hub| From 120s Archives]]] and the Tuatha Dé Danann (//Homo sapiens tumuli//) of [[[nx-02| Hy Brasil]]], the [/system:page-tags/tag/nameless nameless entities] within [[[taboo|]]], and the //Trans stellaris// of [[[project-paragon-hub| Project Paragon]]] may all be referred to as types of Faerie, in addition to many other creatures inspired by different folktales. In-universe, these beings may or may not coexist, and may or may not be related to one another.
* **[[[flow-hub| Flow]]]** -- A process for creating **anart** that does not rely on **thaumaturgy** or any inherent **ontokinetic** ability, but instead on intense focus and emotion through an anomalous version of the [https://en.wikipedia.org/wiki/Flow_(psychology) Flow state], as explained in [[[anart-lecture| this lecture on Anart]]]. Flow may draw on humanity&#39;s collective reality-bending power, as explained [[[testing-the-flow| here]]].
* **hemovore** -- Clinical term for a vampire.
* **hermeneutic** -- A type of cognitohazard activated by or resulting from the reinterpretation of a concept, causing reality-altering effects due to the recontextualization of baseline reality.
* **Hume** -- A unit used to measure the strength or amount of reality in an area. See the [[[and-this-one-explains-humes|FAQ]]] for more information. Named for the philosopher [https://en.wikipedia.org/wiki/David_Hume David Hume].
* **infoallergenic** -- An uncommon class of **infohazard**, capable of exhibiting both **memetic** and **antimemetic** properties. See also **pretermemetic**.
* **[/system:page-tags/tag/infohazard infohazard]** -- A term used to refer to objects that have an anomalous effect whenever they are referred to or described. Differs from a **cognitohazard** in that cognitohazards require the anomalous phenomenon to be directly perceived, whereas infohazards may be spread indirectly, simply through people telling each other about them. Because of this, the effects of infohazards may also be **memetic**. See [[[memetics-and-infohazards-division-orientation| this orientation]]] for more information.
* **kinetohazard**/**kinetoglyphs** -- anomalous mental and physical effects that occur when an entity performs specific gestures and movements.
* **Knock** -- An action or requirement that enables the opening of a **Way**. May also be referred to as a [[[nx-02|Newman-Hyatt Key]]]. See the [[[wanderers-library-hub|Wanderer&#39;s Library Hub]]] for more information.
* **lambda waves** -- A form of specialized telepathic energy used by a variety of anomalies. Distinct from regular **psionics** for its ability to [[[scp-2803|control electronic devices]]], though various other capabilities have also been observed, such as [[[dyfscp-001|regenerative healing]]]. Can be suppresed through the use of a [[[scp-4922|Naismith-Henderson Lambda Wave Sink]]].
* **Large-Scale Aggressor** (**LSA**) -- Clinical term for a giant monster.
* **[/system:page-tags/tag/memetic memetic]** -- [https://en.wikipedia.org/wiki/Meme Memes] are the basic units of culture, ideas or behaviors that can be transmitted to others through communication or imitation. In the context of the Foundation, memetic effects are concepts that can spread much more effectively than non-anomalous memes, and may have anomalous effects on anyone exposed to them. Creators and users of anomalous memetic effects may be referred to as memeticists or cryptomancers. See [[[Understanding Memetics]]] and [[[memetics-and-infohazards-division-orientation| this orientation]]] for more information. Compare with **cognitohazard** and **infohazard**.
* **[/system:page-tags/tag/metamorphic metamorphic]**/**polymorphic** -- Clinical term for shapeshifters, entities that alter their own form or appearance.
* **[/system:page-tags/tag/mimetic mimetic]** -- entities capable of anomalous mimicry of another creature or object.
* **narrativistics** -- A meta-meta framework for understanding and justifying the presence of conflicting models in the same system. Utilizes aspects of holographic theory, extended modal realism, narratology, mechanical determinism, the worldview of author, all cosmological concepts and absurdism to suggest our reality may be part of an infinitely nesting loop of complex storytelling. See [[[Narrativistics And You]]] for more information. See also **pataphysics** and **metafiction**.
* **narrativohazard** -- A construct of independent, individual units of narratives (known as **narremes**) that collectively destroys stories they are part of.
* **[https://en.wikipedia.org/wiki/Narreme narreme]** -- The basic unit of a narrative, much like **memes** are the basic units of a culture.
* **non-Euclidean** -- Refers to spaces possessing geometry that is inconsistent with [https://en.wikipedia.org/wiki/Euclidean_geometry Euclid&#39;s postulates]. While mathematicians use &#34;non-Euclidian&#34; to refer to [https://en.wikipedia.org/wiki/Non-Euclidean_geometry other types of explainable geometry], including hyperbolic and elliptic geometry, the Foundation typically uses the term to refer to anomalous geometries that should not be physically possible in 3-dimensional space. A substance&#39;s non-Euclidian nature may be referred to as its [[[scp-5243|recondicity]]].
* **noogenesis** -- Clinical term for the formation of a new consciousness.
* **[/system:page-tags/tag/noosphere Noösphere/Noosphere]** --  The realm of collective human thought, also known as the //[[[scp-8382|spiritus mundi]]]//, encompassing dreams, concepts and ideas. [[[the-wild-light| May]]] or [[[scp-6820| may not]]] generate and conceptually encompass infinite omniverses. May be the [[[intro-aux-anomalies-narratives | primary source of pataphysical phenomena]]]. The  [https://en.wikipedia.org/wiki/Noosphere term originates from the work] of [https://en.wikipedia.org/wiki/Vladimir_Vernadsky Vladimir Vernadsky] and [https://en.wikipedia.org/wiki/Pierre_Teilhard_de_Chardin Pierre Teilhard de Chardin], combining [https://en.wikipedia.org/wiki/Nous nous] (meaning thought or reason) with sphere (analogous to the [https://en.wikipedia.org/wiki/Atmosphere_of_Earth atmosphere] or [https://en.wikipedia.org/wiki/Biosphere biosphere]).
* **ontokinesis**/**ontokinetic** -- Clinical term for **reality bending**. Derived from the philosophical use of [https://en.m.wikipedia.org/wiki/Ontology ontology], the study of being and the most general features of reality, with ontokinesis meaning &#34;control over being&#34;.
* **parafauna** -- Animal species with anomalous properties or abilities.
* **paranormal**/**paranatural**/**preternatural** -- alternative terms used to describe phenomena that the Foundation categorises as **anomalous**. These phenomena may also be referred to as esoteric, occult, supernatural or transmundane.
* **pataphysics**/**&#39;pataphysics** -- The scientific study of fictional narratives and their effect on reality, including the study of the fictional SCP Foundation universe by characters that are part of it, a form of **metafiction**. [https://en.wikipedia.org/wiki/&#39;Pataphysics &#39;Pataphysics] was originally proposed as a parody of science, being one step up from metaphysics and defined as the study of imaginary solutions. See the [[[intro-aux-anomalies-narratives | Narrative Anomalies Orientation]]] and [[[departments#pataphysics-dept| articles featuring the Pataphysics Department]]] for more information. See also **narrativistics**.
* **[/system:page-tags/tag/pattern-screamer Pattern Screamer]** -- Consciousnesses embedded within the fabric of reality. These entities do not exist, but may be [[[scp-3930|brought into existence if perceived]]]. They may have once existed at some point in the past, in a now-destroyed reality. Also known as [[[pattern-dwellers-an-expose| Pattern Dwellers]]] or [[[scp-8212|Usinsk-Class Ideoforms]]].
* **pistiphage** -- An entity that feeds on faith, deriving sustenance and power from belief and worship. Often used as a clinical term for a god, a pistiphage may also be a [https://en.wikipedia.org/wiki/Tulpa Tulpa] or [https://en.wikipedia.org/wiki/Egregore Egregore], only existing because people believe in it. An **Apex Tier Pluripotent Entity** may or may not also be a pistiphage.
* **pretermemetic** -- Information that is selectively **memetic** or **anti-memetic** depending on the nature of the recipients or circumstances. Used by groups such as [[[dread-circuses-hub| Herman Fuller&#39;s Circus of the Disquieting]]] to advertise without attracting the attention of organisations like the Foundation. See also **infoallergenic**.
* **psionics** -- The generation and detection of supernatural phenomena solely through the power of the mind, including telekinesis, telepathy, precognition and clairvoyance, abilities that may also be referred to as extra-sensory perception (ESP). The scientific study of psionics is known as parapsychology or as psychotronics, with the later term mostly being used in Eastern Europe and the former Soviet Union. Individuals with psionic abilities may be known as psions, psychics, psykers, mentalists or espers. The [[[SCP-7669|Psiophone]]], a device capable of measuring telepathic signals and projections and converting them into electrical signals, can be used to decrypt psionic data. See [[[psi-guide-1| this lecture series]]] for more information about psionics.
* **[/system:page-tags/tag/reality-bending reality bending]**/**reality warping** -- The anomalous ability to alter reality. May be referred to as **ontokinesis**, **essokinesis**, or simply as &#34;magic&#34;, although **thaumaturgy** is generally regarded as something separate. Humanoid reality benders may be referred to as &#34;Type Greens&#34; using [[[goc-supplemental-threat-entities| Global Occult Coalition terminology]]], or as [[[scp-3241| ontokineticists]]], [[[grasp-on-reality| &#34;bixbies&#34;]]], [[[goc-supplemental-thaumatology| &#34;Outside Observers&#34;]]] or [[[grant-request-for-the-manufacture-of-devices-to-regulate|&#34;Objective-Reality Independent persons&#34;]]]. See [[[and-this-one-explains-humes|this FAQ]]], [[[clef101|this orientation]]] and [[[what-we-know-so-far-answering-the-question-of-what-how-and-w| this document]]] for more information.
* **semiontological anomaly**/**semiohazard** -- Anomalies that disrupt the **semiosphere** to create universal axioms that should not be possible.
* **semiosphere** -- The medium through which information about reality travels before it is perceived or measured.
* **spectral entity** -- Clinical term for a [/system:page-tags/tag/ghost ghost], spectre or spirit. May also be referred to as a posthumous entity, eidomorph or ectomorph (an entity made from ectoplasm). See [[[anatomy-of-a-specter| this document]]] and [[[welcome-to-spectral-affairs| this orientation]]] for more information.
* **spectremetry** -- The scientific study of **spectral entities.**
* **[/system:page-tags/tag/surrealistics-dept surrealistics]** -- The scientific study of anomalies too incomprehensible or bizarre to understand, except through illogical thought and the use of **agnostics.** The term is a reference to the artistic movement of [https://en.wikipedia.org/wiki/Surrealism Surrealism].
* **SWN001 entities/swn001-1 instances** -- Also known as author entities, this is how inhabitants of the fictional SCP Foundation universe refer to their creators, the people writing for the SCP Wiki. This in-universe terminology used in **metafiction** was first detailed in [[[sandrewswann-s-proposal|S. Andrew Swan&#39;s Proposal]]] for [[[SCP-001]]], and then further explored through [[[i-h-p-proposal|I.H.Pickman&#39;s Proposal]]], **pataphysics** and **narrativistics**.
* **tachyons** -- A type of particle whose density and charge can alter the flow and direction of time in a surrounding area. Based on a [https://en.wikipedia.org/wiki/Tachyon hypothetical particle] of the same name. See [[[welcome-to-delta-t|this hub]]] for more information.
* **Tartarean Resonance Energy** (**TRE**) -- Radiation naturally produced by demonic or **Tartarean Entities**. Named for [https://en.wikipedia.org/wiki/Tartarus Tartarus], the part of the Greek Underworld where monsters and sinners were imprisoned.
* **Tartarean Entity**/**Tartarean-Class Demonic Entity** -- Clinical term for a [/system:page-tags/tag/demon demon], which are traditionally defined as [https://en.m.wikipedia.org/wiki/Demon malevolent supernatural entities]. See the [[[undervegas-hub|Undervegas Hub]]] for a summary of different classes of Tartarean Entities. Contrast with **Empyrean Entity**.
* **[/system:page-tags/tag/thaumaturgy thaumaturgy]** -- A term meaning [https://en.wikipedia.org/wiki/Thaumaturgy &#34;wonder-working&#34;] and referring to miracles, the occult, and magic with practical affects. The scientific study of thaumaturgic phenomena is known as **thaumatology**, while the use of it is known as **applied thaumatology**. Magic users are formally referred to as thaumatologists, thaumaturges or &#34;Type Blues&#34; in [[[goc-supplemental-threat-entities| Global Occult Coalition terminology]]], although more archaic terms may also be used, including &#34;wizard&#34;, &#34;sorcerer&#34; and &#34;mage&#34;. When considered as distinct from **reality bending** and **ontokinesis**, the phenomena studied by thaumatologists generally follow more predictable rules and limitations, for example the [https://en.wikipedia.org/wiki/Sympathetic_magic Laws of Similarity and Contagion]. See [[[goc-supplemental-thaumatology| this lecture]]], [[[another-goddamn-magic-system| this orientation]]], [[[sistema-taumaturgico| this document]]] and [[[A Brief Introduction to Thaumaturgical Engineering]]] for more information. 
* **theurgy** -- A term meaning [https://en.wikipedia.org/wiki/Theurgy &#34;divine-working&#34;], referring to rituals used to invoke the presence of the divine. As a magical practice, it may involve the use of supernatural abilities drawn from a particular **[[[divine-dossier| Pluripotent Entity]]]**. See the [[[akiva-counter-operating-instructions| Akiva Counter Operating Instructions]]] for more information.
* **tychekinesis** -- Clinical term for probability manipulation, named for the Greek goddess of fate and fortune, [https://en.wikipedia.org/wiki/Tyche Tyche].
* **Way** -- An anomalous connection between two locations, enabling rapid travel between them regardless of distance. Ways can facilitate travel into other realities, including to the [[[wanderers-library-hub| Wanderer&#39;s Library]]]. Ways must be activated through a **Knock**. May also be referred to as a [[[scp-5024|Rosen-Fortune Bridge]]] or a [[[scp-6000| Class-W transportation gateway]]]. See [[[another-goddamn-magic-system| this orientation]]] for more information. 

++ Anomalous Technologies
Technology and devices existing within the Foundation setting. For less commonly used technology, see [[[a-semi-comprehensive-list-of-foundation-technology|this extended list.]]]

* **agnostics** -- Substances that makes consumers more open to otherwise incomprehensible anomalous phenomena by altering their thought-patterns to become more illogical. See also **surrealistics**.
* **Akiva Counter**/**Akiva Detector** -- A device for measuring the level of **Akiva Radiation**, enabling divine presence and individual piety to be quantified. See the [[[Akiva Counter Operating Instructions]]] for more information on how they work.
* **amnestic** -- Drugs, procedures, or devices that induce memory loss when administered to an individual. While [https://en.m.wikipedia.org/wiki/Drug-induced_amnesia drugs with amnestic effects] are not unknown to medical science, the Foundation&#39;s amnestics have much greater potency and specificity, enabling them to make civilian witnesses forget about any anomalous activity they may have witnessed. The term for subjecting someone to an amnestic is &#34;amnesticize&#34;. Although the exact details vary, see the [[[amnestic-orientation-manual| Amnestic Use Guide]]] and the [[[Updated Amnestics Guide]]] for more information. 
* **apportation** -- Teleportation through **thaumaturgy**. Requires significant preparation to arrive on-target, and causes substantial **backlash**.
* **Artificially Intelligent Conscript** (**AIC**) -- An artificial intelligence created and employed by the Foundation&#39;s [[[aiad-homescreen| Artificial Intelligence Applications Division]]].
* **beryllium bronze** -- An alloy of copper and beryllium that is frequently used in anomalous devices. Although the [https://en.m.wikipedia.org/wiki/Beryllium_copper physical properties of the metal are well known to metallurgists], the exact details of its anomalous properties vary widely, ranging from [[[scp-3721|channelling consciousness]]] to [[[scp-6678|conducting emotions]]] to [[[scp-8765|amplifying thaumaturgic energy]]].
* **[[[goc-supplemental-equipment| Black Suit]]]** -- The [[[goc-hub-page|Global Occult Coalition&#39;s]]] Standard Field Dress, an advanced form of bulletproof body armor that resembles ordinary clothing.
* **countermeme**/**memetic inoculation** -- A counter-meme protects against or reverses the effects of an anomalous **meme**.
* **Dark Web** -- A cloud computing service operated by [[[marshall-carter-and-dark-hub| Marshal, Carter and Dark]]] as a [[[the-dark-web-dke79-o2rg5-4jlw6 | subscription service]]], enabling access to anomalous applications via ordinary computers. Used by the anomalous community to access services such as **Void**.
* **Deepwell server** -- Alternatively capitalised as DEEPWELL server. Specialized data storage servers capable of preserving information across shifts in reality, either because they are located in extradimensional space, or because they utilise shielding from **Scranton Reality Anchors** or other anomalous technology. See [[[SCP-4800]]] for more information.
* **demonarcotics** -- Performance-enhancing drugs [[[the-vice-girls| made from demons]]], also known as **Tartarean Entities**.
* **demonics** -- A type of **paratechnology** that incorporates sentient entities referred to as demons (also known as **Tartarean Entities**), particularly into electronic devices. See [[[a-brief-explanation-on-demonics| this history]]] for more information.
* **eigenweapon** -- An anomalous weapon of mass destruction, capable of fundamentally changing the nature of warfare. Named by analogy to the mathematical concept of [https://en.m.wikipedia.org/wiki/Eigenvalues_and_eigenvectors eigenvalues and eigenvectors]. See [[[deus-vulture| this tale]]] for one history of eigenweapon development. Terms like eigenmachine may be used to describe similar devices intended for purposes other than destruction.
* **Ennui Protocol** -- An emergency operation that quickly subjects the global human population to the effects of an **amnestic**. Only used in the event that an imminent lifting of the **Veil** is [[[scp-8900-ex|otherwise unavoidable]]]. See the [[[amnestic-orientation-manual|Amnestic Use Guide]]] for more information.
* **Everhart Resonator** -- A device for converting electrical energy into **EVE**, in order to power **thaumaturgy**. 
* **Geas** -- The use of memetic agents to force a person to obey a set of rules or guidelines. The name comes from Irish mythology, where a [https://en.wikipedia.org/wiki/Geas Geas] is a magically enforced prohibition against certain actions. See [[[operation-llewyn-dark| this document]]] for more information.
* **gnostics** -- The opposite of an **agnostic**, gnostics make one more certain and sure of things, although this does not necessarily make them correct. 
* **Hominid Replicator**/**Bright/Zartion Hominid Replicator** (**BZHR**)-- A device capable of creating non-anomalous humans from raw materials. Individuals can be created at any age, and can be implanted with memories and skills. Essential to the function of [[[SCP-2000]]], may also be used to create **[[[D-2000| D Class]]]** personnel, and potentially other Foundation employees.
* **Kant Counter** -- Instrument used to measure the **Hume** level of a location, that is, the amount of reality that is present. See [[[and-this-one-explains-humes|this FAQ]]] for more information. Named for the philosopher [https://en.wikipedia.org/wiki/Immanuel_Kant Immanuel Kant].
* **Memetic Kill Agent** -- A **memetic** hazard with a lethal effect on anyone exposed to it without the appropriate inoculation with a **countermeme**. Used to protect [[[SCP-001]]] and other important data from unauthorised access. The SCP-001 page specifically describes the **cognitohazard** on it as a [[[scp-9001|Berryman-Langford Kill Agent]]], a reference to the &#34;Berryman Logical Image Technique&#34; from [https://en.m.wikipedia.org/wiki/BLIT_(short_story) a short story] by science-fiction author David Langford.
* **mnestic** -- The opposite of an **amnestic**, mnestics are chemical compounds that enhance the user&#39;s memory. This can be used to bring back erased or forgotten memories, counter the effects of amnestics, and resist **antimemetic** effects. See the [[[antimemetics-division-hub| Antimemetics Division Series]]] and the [[[Updated Amnestics Guide]]] for more information.
* **[[[goc-supplemental-equipment| Orange Suit]]]** -- The [[[goc-hub-page|Global Occult Coalition&#39;s]]] Ultra-Heavy Engagement Chassis ([[[goc-tale-sequence-uhec| UHEC]]]), consisting of a **paratechnological** giant robot controlled by a human pilot, also known as a mech or mecha.
* **oriykalkos/orichalcum** -- A crystalline substance originating from Atlantis, capable of storing extreme amounts of digital data and eletrical/thaumaturgical energy. While very rare, the Foundation has successfully created [[[SCP-6488|synthethic oriykalkos]]] as an inferior but mass-producible alternative. See [https://scp-wiki.wikidot.com/scp-6500/offset/2 SCP-6500] for more information.
* **PANOPTICON** -- A global surveillance network developed to detect and monitor anomalous phenomena across the globe. Composed of multiple covert recording devices, linked-in government surveillance systems, paratechnological constructs, **Artificially Intelligent Conscripts** and an array of satellites. Managed by RAISA&#39;s Surveillance Division from its headquarters at [[[secure-facility-dossier-site-7|Site-7]]]. See [[[SCP-5900]]] for more information.
* **paratechnician** -- a creator of or expert in the use of **paratechnology**.
* **paratechnology** (**paratech**) -- Technology that relies on anomalous principles or components to function, such as the devices developed by [[[prometheus-labs-hub| Prometheus Labs]]] and [[[anderson-robotics-hub| Anderson Robotics]]]. More specific terms like paraweapon and parapharmaceutical may be used for specific types of paratechnology. Paratechnological anomalies may also be referred to as wonders, magic items or [[[sistema-taumaturgico|technothaumaturgy]]].
* **Pickman-Sinclair Narrative Fluctuation Detector** -- A handheld device for detecting changes in the narrative. Related to the [[[i-h-p-proposal| Law of Narrative Causality]]], and to **pataphysics**.
* **SCRAMBLE Goggles** -- An eyepiece that identifies and obscures visual cognitohazards in real-time, enabling the wearer to observe these anomalies without being exposed to their effects. SCRAMBLE gear was [[[incident-096-1-a| originally designed]]] by Dr. Dan and Dr. Oleksei for the containment of [[[SCP-096]]]. See [[[psa-cognitohazards-and-you| this PSA]]] for more information.
* **Scranton Reality Anchor** (**SRA**) -- A technology that stabilizes reality around it, preventing or restricting **reality bending** as well as other forms of [[[scp-2000| anomalous interference]]], which may or may not include **thaumaturgy** and anomalous effects more broadly. Occasionally called a [[[scp-1451| Scranton Box]]] or [[[reach-s-blueprint-folder| Scranton Reality Buoy]]], although those terms may refer to a somewhat different technology. May function through the use of [[[scp-4231| the brains of captured reality benders]]], or [[[kawasaki-kyoko-is-afraid-of-drowning| tissue cloned from them]]], although there are [[[scp-4065| alternative explanations]]] for how they work, including the [[[faulting-the-leylines-a-geological-examination-of-thaumaturg| use of a rare element]]] known as [[[scientia-potentia-est| Scrantonite]]] or [[[doctors-of-the-church-hub| Scrantonum]]]. See [[[and-this-one-explains-humes| this FAQ]]] and [[[grant-request-for-the-manufacture-of-devices-to-regulate| this Grant Request]]] for more information, and [[[reach-s-blueprint-folder| this page]]] for blueprints. Named after the in-universe inventor, [[[scp-3001| Robert Scranton]]].
* **Shibboleth Identification Network** (**SIN**) -- An audio surveillance system included within Foundation **Facilities**, designed to detect anomalous keywords (such as **cognitohazards**) and highly-classified codes that have been spoken outloud.
* **Telekill** ([[[SCP-148]]]) -- A metal with the property of blocking or preventing anomalous extrasensory mental effects like telepathy and mind control. See [[[SCP-7814]]] for more information.
* **Vegas Room** -- A [[[the-wild-light| memetically insulated space]]] that removes memories of what happened within upon leaving - as the saying goes, what happens in Vegas stays in Vegas. Used by the [[[antimemetics-division-hub| Antimemetics Division]]] for sensitive conversations and investigation into **antimemetic** **infohazards**. Works through information suppression camouflage derived from the bones of [[[SCP-2256]]].
* **[[[goc-supplemental-equipment| VERITAS]]]** -- A headset that detects **Elan Vital Energy**, enabling magical auras around people and objects to be detected and identified by the operator. The color assigned to different EVE signatures corresponds to the [[[goc-supplemental-threat-entities | GOC&#39;s codewords for anomalous humanoids]]], including Type Blue, Type Green, and Type Red. The device can also use resonance imaging to visualise the surrounding environment, through the detection of EVE&#39;s interactions with non-anomalous particles, enabling the wearer to see through walls. VERITAS replaced the more primitive COLLICULUS Aetheric Resonance Imager - see [[[goc-supplemental-arad | this transcript]]] for more information. VERITAS is incorporated into OCULUS, the [[[goc-hub-page|Global Occult Coalition&#39;s]]] [[[goc-tale-sequence-assessment| four-function enhanced vision system]]], alongside low-light, infrared and ultraviolet imaging. The MULTI is [[[dead-man-walking| an equivalent device]]], developed by [[[prometheus-labs-hub| Prometheus Labs]]] for use by the American government.
* **[[[goc-supplemental-equipment| White Suit]]]** -- The [[[goc-hub-page|Global Occult Coalition&#39;s]]] Combat Garment, consisting of powered armor concealed by a cloaking device.
* **Xyank-Anastasakos Constant Temporal Sink**/**Xyank-Anastasakos Constant Time Sink** (**XACTS**) -- Named after Dr. Thaddeus Xyank and Dr. Athena Anastasakos of the Foundation&#39;s [[[welcome-to-delta-t|Temporal Anomalies Department]]]. Capable of protecting a place or an object from temporal changes, or altering the passage of time to speed it up or slow it down within a specific area. See [[[reach-s-blueprint-folder| this page]]] for blueprints.

++ Anomalous Culture
Terms used to describe events and practices involving anomalous individuals and communities.

* **anart** -- Short for anomalous art. This term can be used to describe individual works of art with anomalous properties, as well as to the practice of using the anomalous for the purpose of artistic expression. See [[[a-study-of-anomalous-art| this document]]] and [[[anart-lecture| this lecture]]] for further analysis. 
* **anartist** -- Short for anomalous artist. Refers to anyone capable of creating **anart**, such as members of [[[are-we-cool-yet-hub| Are We Cool Yet?]]] or the [[[hub-madao| Medicean Academy of Occult Art]]]. See **Flow** and **exploit** for explanations for how this may work.
* **Bookburner** -- A derogatory term for members of the [[[goc-hub-page | Global Occult Coalition]]], primarily used by individuals associated with the [[[serpent-s-hand-hub | Serpent&#39;s Hand]]].
* **Boring Agreement** -- A pact between the Foundation, [[[wilson-s-wildlife-solutions-hub|Wilson&#39;s Wildlife Solutions]]] and the United States government, signed in 2008 in response to the [[[the-ursus-maritimus-incident|Ursus Maritimus Incident]]]. It allows Wilson’s to handle the containment of Safe and Euclid-class **parafauna** within Clackamas County, Oregon under the supervision of the Foundation.
* **Foundie** -- Slang term used in the anomalous community to refer to employees of the SCP Foundation. 
* **Gawker**/**Gocks** -- Slang terms used in the anomalous community to refer to members of the [[[goc-hub-page | Global Occult Coalition (GOC)]]]. 
* **The Grey Coats** -- Slang term used by members of the [[[Chicago Spirit]]] to refer to the SCP Foundation. 
* **House Accords** -- A nonaggression pact between the Foundation, the [[[goc-hub-page|Global Occult Coalition]]] and the United States Department of Defense (specifically their occult branch, [/system:page-tags/tag/pentagram PENTAGRAM]), signed in the 1960s. It governs the groups&#39; simultaneous access to American territory and allows certain cooperative initiatives between organizations, including the exchange of files on anomalous objects. 
* **Hummer** -- A derogatory term for members of the [/system:page-tags/tag/maxwellism Church of Maxwellism] sect of the [[[church-of-the-broken-god-hub|Church of the Broken God]]], primarily used by individuals associated with its rival factions, the Broken Church and the [/system:page-tags/tag/cogwork-orthodoxy Cogwork Orthodox Church]. 
* **Jailer** -- A derogatory term for employees of the Foundation, primarily used by individuals associated with the [[[serpent-s-hand-hub|Serpent&#39;s Hand]]].
* **Janitor** -- A slang term for employees of the Foundation, primarily used by individuals associated with [[[gamers-against-weed-hub|Gamers Against Weed]]].
* **Multi-Foundation Pact of 1981**/**1981 Multi-Foundation Coalition Agreement** -- A pact between several versions of the Foundation from other timelines/universes. Foundations signed under it are subject to [[[scp-5618|a number of regulations]]] to protect the integrity or normalcy of other timelines, and signatories [[[karen-queen-of-the-monsters|may work with one another]]] to achieve in this goal, typically by [[[scp-6820|sharing files on extra-universal anomalies]]] or reporting on [[[scp-7243|problematic Foundation variants]]].
* **normalcy** -- The apparently ordinary state of the world, which the Foundation preserves by containing anomalies. Also known as normality, baseline reality, consensus reality or the mundane world. See also **The Veil**.
* **Normalcy organization**/**Normalcy Preservation Organization** (**NPO**) -- Also known as a normalcy org, Normalcy agency or Normalcy Preservation Agency, this term refers to any institution that conceals the existence of the anomalous from the general public. This includes the Foundation, as well as **Groups of Interest** like the [[[goc-hub-page| Global Occult Coalition]]] and national paranormal agencies such as the FBI&#39;s [[[unusual-incidents-unit-hub| Unusual Incidents Unit]]].
 *  **National Normalcy Preservation Organization** -- A subcatagory of NPOs that are run by a national goverement, like the UIU or GRU-P. 
* **Occult War** -- A conflict concealed from the public due to the anomalous nature of the participants and weapons used. This may occur at the same time as a non-anomalous conflict known to the public; for example the [/system:page-tags/tag/7th-occult-war 7th Occult War] generally refers to an anomalous conflict taking place during the Second World War, between the Allied Occult Initiative (the precursor to the [[[goc-hub-page| Global Occult Coalition]]]) and the Nazi Obscurakorps. The dates and events of the preceding six Occult Wars are not as widely agreed upon.
* **paracrime** -- Illegal paranormal activity, investigated by organisations such as the FBI&#39;s [[[unusual-incidents-unit-hub| Unusual Incidents Unit]]], and punished by imprisonment in institutions such as [[[Paramax]]]. Includes both the use of anomalies to commit conventional crimes like fraud, theft and murder, as well as the breaking of laws specifically relating to anomalies, for example the illegal sale of **paratechnology**.
* **paracriminal** -- A paranormal criminal, such as the members of the [[[Chicago Spirit]]] crime syndicate. A paracriminal could be an anomalous individual who commits an ordinary crime, or a non-anomalous human who commits a **paracrime**.
* **Paranormal Renaissance** -- A period in which **paratechnology** and anomalous science flourish, usually referring to the time period between the 6th and 7th **Occult Wars**.
* **[[[the-gulf| Southern United States Extranormal Organization Cooperation Treaty]]]** (**SUSEOCT**) -- A regional covenant introduced by the FBI&#39;s [[[unusual-incidents-unit-hub|Unusual Incidents Unit]]], made in order to regulate the operations of various **Groups of Interests** within the Southern United States, especially the [[[the-gulf|Gulf Coast]]]. Its signing parties include the Foundation, [[[horizon-initiative-hub|multiple local factions]]] of [[[marshall-carter-and-dark-hub|well-known GoIs]]], as well as [[[scp-7113|seemingly non-anomalous]]] [[[scp-5952|organizations]]].
* **Skipper** -- Slang term used in the anomalous community to refer to employees of the SCP Foundation. Frequently used by the FBI&#39;s [[[unusual-incidents-unit-hub|Unusual Incidents Unit]]].
* **The Supervisors** -- Slang term used by the volunteers of [[[wilson-s-wildlife-solutions-hub|Wilson&#39;s Wildlife Solutions]]] to refer to the SCP Foundation. 
* **Ticker** -- A derogatory term for members of the [/system:page-tags/tag/cogwork-orthodoxy Cogwork Orthodox Church] sect of the [[[church-of-the-broken-god-hub|Church of the Broken God]]], primarily used by individuals associated with its rival factions, the Broken Church and the [/system:page-tags/tag/maxwellism Church of Maxwellism].
* **The Veil** -- A term referring to the separation of the anomalous and the people aware of it from the rest of the world. Actively maintained by **Normalcy Preservation Organisations** like the Foundation that conceal the existence of anomalies. Also known as the Veil of Secrecy, the Veil of Normalcy, the Veil of Normality, and the Veil Protocol. See [[[5-veil-tiers|this GOC document]]] for more information on how awareness of the paranormal is controlled.
* **Void** -- A Twitter analogue used by members of paranormal communities, operating on the **Dark Web**. This [[[component:void-post|component]]] illustrates the typical format of a post.
* **whammied** -- A slang term used at [[[the-s-c-plastics-hub|Site-87]]] to refer to being affected by a **cognitohazard**.

+ Out-Of-Character Terms
Terms that are likely to be used on **hubs**, **essays**, **guides** and discussion pages.

++ Site Terminology
Official Terms used on the site.
* **[https://scp-wiki.wikidot.com/system:page-tags/tag/001-proposal 001 Proposal]** -- Proposals for [[[SCP-001]]], usually named for the site member making the proposal.
* **[[[adult-content-warning-guide | adult content]]]** -- While the SCP wiki as a whole is intended for a mature audience, specific adult content warnings are placed on articles with content deemed to be inappropriate for anyone under 18.
* **[[[archived-scps|Archived]]]** (**ARC**) -- Pages that are outdated or considered low-quality, but were archived rather than being deleted outright due to references to them in other works. No longer done, except for guides and official pages. The term is occasionally used in-universe to refer to anomalies that were formerly assigned an SCP designation. 
* **[[[authors-pages| author page]]]** -- Also known as &#34;personnel files&#34;, these pages are written by site authors once they have written three or more successful articles, as a place to list their body of work. Their contents are entirely up to the author.
* **author avatar** (**AA**) -- Also called a self-insert or an original character (OC), this is a character considered to represent the author in the fictional setting. Can be grounded in reality, ridiculous and over the top, or anything in between. There&#39;s no rule requiring or prohibiting author avatars, but they will be held to the same critical standards as any other fictional character.
* **Blocks** -- the ten sets of 100 articles in each series, such as the &#34;000s Block&#34;, &#34;100s Block&#34; or &#34;1300s Block&#34;.
* **[[[canon-hub|canon]]]** -- Officially recognised canons are collection of articles by multiple authors intended to take place in a shared continuity and setting. Authors may also treat some or all of their own articles as an internally consistent personal canon, and may consider other authors&#39; articles to be canon to their own version of the Foundation universe. However, although individual canons have their own established events and worldbuilding that new articles are expected to fit into, the SCP Wiki overall has no canon that all articles must comply with - any established element of the SCP Foundation or its setting may be contradicted if it makes for a more interesting story.
* **[[[components-hub| component]]]** -- Pages designed to be imported onto various other pages via the [[include]] syntax in order to add new design, style or functionality.
* **[[[collaboration-page-hub | collaboration]]]** -- indicates that an article is open to contributions from any member of the SCP Wiki. Read the page carefully to determine what kind of changes are expected and permitted.
* **contest** -- A competion in which people are invited to contribute work created with a specific theme or constraint in mind. Winners are usually (but not always) determined by the upvotes and downvotes on each contest entry. See the [[[Contest Archive]]] for a full list of official and unofficial competitions hosted on the SCP Wiki. 
* **[[[creepy-pasta]]]/creepypasta** -- a term for short scary stories that often take the form of urban legends, often copied from place to place without attribution or provenance. In site terms, creepypasta are a sub-class of tales that are original work by site members, but generally do not feature the Foundation or any **Groups of Interest**, although creepypasta posted on the [[[parawatch-hub| Parawatch Forum]]] as &#34;true stories&#34; written by the in-universe author are a common framing device used for this type of tale.
* **critique** -- Offering feedback on a **draft** or published SCP. Can be positive, negative or mixed, but must follow the [[[Criticism Policy]]].
* **CSS** (**Cascading Style Sheets**) -- A coding language that can be used to alter the appearance of elements on the site. See [http://scp-int.wikidot.com/manuel-de-formatage-avance this essay] for more information on simple ways this may be used on the site.
* **[[[archived:decommissioned-scps| Decommissioned]]]** (**D**) -- As a site procedure, this refers to SCP articles deemed so egregiously bad that a story was written in which staff members&#39; **author avatars** destroyed it, keeping the original article around as a sort of &#34;hall of shame&#34;. This practice has been discontinued, and the decommissioned articles have been deleted (although tales based on them remain), but the term is still used [[[decom-dept-hub| in-universe]]] as an [[[object classes| object class]]] for SCPs that were deliberately destroyed or rendered inactive by the Foundation .
* **draft** -- Any work in progress. Drafts are not allowed on the main site or in the forums; go to the [http://www.scp-wiki.net/sandbox SCP Sandbox Wiki] for instructions on how to create a sandbox page for posting drafts.
* **[[[essay-resource-hub|essay]]]** -- Informative pages written by members of the SCP wiki community about aspects of the site or writing process. See also **guide** and **resource**.
* **fragment** -- A page designed to be imported onto a single page. These are most often included in other pages as **offsets**.
* **[[[goi-formats|GoI Format]]]** -- An article written from the perspective of a specific **Group of Interest**, conforming to the format or formats laid out in that **GoI**&#39;s hub page. Anyone may create a new GoI format for a new or existing GoI.
* **[[[guide-hub|guide]]]** -- Informative pages officially endorsed by SCP wiki **staff** as authoritative guidance.
* **hub** -- Pages with a large number of links to related pages to enable navigation between them.
* **[[[scp-international| International]]]** (**INT**) --This term can refer to the foreign language branches of the SCP Foundation, to the [http://scp-int.wikidot.com/ International Translation Archive] hosting articles translated from those branches, or to the community of these sites. Individual articles translated from other languages that are posted on the English language SCP Wiki are also tagged as [/system:page-tags/tag/international &#34;international&#34;]. Note that foreign branches are named for and organised around language, not nationality.
 * **Official Branches** -- Branches with a large enough community of writers and translators to be [[[how-to-create-a-branch-of-the-scp-foundation| officially recognised by the other branches]]].
  * **EN** -- The [https://scp-wiki.wikidot.com/ English SCP wiki]. 
  * **RU** -- The [https://scpfoundation.net/ Russian SCP wiki]. 
  * **KO** -- The [http://ko.scp-wiki.net/ Korean SCP wiki]. 
  * **CN** -- The [http://scp-wiki-cn.wikidot.com/ Chinese SCP wiki]. 
  * **FR** -- The [http://fondationscp.wikidot.com/ French SCP wiki]. 
  * **PL** -- The [http://scp-wiki.net.pl/ Polish SCP wiki]. 
  * **ES** -- The [http://lafundacionscp.wikidot.com/ Spanish SCP wiki]. 
  * **TH** -- The [http://scp-th.wikidot.com/ Thai SCP wiki]. 
  * **JP** -- The [http://scp-jp.wikidot.com/ Japanese SCP wiki]. 
  * **DE** -- The [http://scp-wiki-de.wikidot.com/ German SCP wiki]. 
  * **IT** -- The [http://fondazionescp.wikidot.com/ Italian SCP wiki]. 
  * **UA** -- The [http://scp-ukrainian.wikidot.com/ Ukrainian SCP wiki]. 
  * **PT/PT-BR** -- The [http://scp-pt-br.wikidot.com/ Portuguese (and Brazilian) SCP wiki]. 
  * **CS** -- The [http://scp-cs.wikidot.com/ Czech SCP wiki]. 
  * **ZH**/**ZH-TR** -- The [http://scp-zh-tr.wikidot.com/ Traditional Chinese SCP wiki]. 
  * **VN** -- The [http://scp-vn.wikidot.com/ Vietnamese SCP wiki].
 * **Developing Branches**  -- Branches that have not yet been recognised as **Official Branches**, but are [http://scp-int.wikidot.com/requirements-for-developing-branches officially recognised as progressing towards official status].
  * **EL** -- The [http://scp-el.wikidot.com/ Greek SCP wiki].
  * **ID** -- The [http://scp-idn.wikidot.com/ Indonesian SCP wiki].
  * **ND** -- The [http://scp-nd.wikidot.com/ Nordic SCP wiki].
  * **TR** -- The [http://scpvakfi.wikidot.com/ Turkish SCP wiki].
  * **HU** -- The [http://scp-hu.wikidot.com/ Hungarian SCP wiki].
* **[[[joke-scps|Joke]]]** (**J**) -- Joke articles are written in an absurd or over-the-top manner, primarily intended for humor. Note that this doesn&#39;t mean that non-Joke articles can&#39;t have comedy in them; they just tend to be more subtle or rely on situational humor rather than the obvious parody typical of Joke articles.
* **[/system:page-tags/tag/metafiction metafiction]** -- Fiction about fiction, referencing the work&#39;s own fictional nature. In-universe acknowledgement that the SCP Foundation is fictional may reference **SWN001 entities**, **pataphysics** or **narrativistics**, but not all metafiction on the site uses this terminology, or does it so overtly. 
* **[http://05command.wikidot.com/ O5 Command]** -- The SCP wiki staff site.
* **offset** -- A way of creating multiple versions of the same page sharing the same rating and discussion thread, by creating each version as a separate **fragment** page, then adding code to the page to cycle through them. See [[[listpages-magic-and-you| this essay]]] for more information on how this works.
* **[[[essay-resource-hub| resource]]]** -- Resources provide in-universe information about the SCP Foundation and its universe, often as a collaboration open to new contributions that acknowledges that there is no canon, just many conflicting individual works. See also **essay**.
* **roleplaying** -- Acting as if the fiction of the SCP Foundation was real. Roleplaying is prohibited on the forums and official community spaces of the SCP wiki.
* **sandbox** -- A space that mimics the format of the SCP wiki, for posting in progress drafts. Many exist, including an [http://www.scp-wiki.net/sandbox official SCP wiki sandbox].
* **SCP Article** -- Entries describing anomalous objects or entities that are contained by the Foundation. The category includes **Joke** SCPs, **Explained** SCPs and **001 Proposals**.
* **series** -- A block of 1000 SCP articles. SCPs posted outside of the current range of acceptable SCP numbers will be summarily deleted. May instead refer to a [[[series-archive| Tale Series]]].
* **[[[incident-reports-eye-witness-interviews-and-personal-logs| supplement]]]** -- satellite pages to a main SCP article that contain interviews, reports, or logs that are important to the narrative as a whole but do not fit into the main page, either due to length or other considerations.
* **[[[foundation-tales| tale]]]** -- any fictional story or narrative set within the SCP Foundation setting that is not posted as an **SCP** or **GoI Format**. Unlike these other types of article, there is no specified format for a tale, and they are usually written in prose. There is a [/system:page-tags/tag/foundation-format foundation-format tag] for tales that mimic the format of an SCP article.
* **theme** -- A specific type of component that changes the aesthetic of the page.
 * **[[[sigma-9-themes| Sigma-9 Themes]]]** -- Themes based on the default appearance of the SCP Wiki.
 * **[[[black-highlighter-themes| Black Highlighter Themes]]]** -- Themes based on a popular alternative to Sigma-9, the [[[theme:black-highlighter-theme| Black Highlighter Theme]]].

++ Staff Terminology
Terms referring to the volunteer staff responsible for maintaining and improving the SCP wiki.
* **[http://05command.wikidot.com/staff-list Staff]** -- Staff are members of the SCP Wiki that have volunteered to be responsible for its maintenance, upkeep and policy. See [http://05command.wikidot.com/staff-structure this page] for more information.
 * **[http://05command.wikidot.com/junior-staff-guide Junior Staff]** -- Junior Staff assist with staff duties, and are reviewed periodically for promotion to Operational Staff if deemed a useful enough member of their team or teams. 
 * **Operational Staff** -- Promoted after a trial period as Junior Staff. Permitted to vote on most site policy proposed in [http://05command.wikidot.com/forum/c-595160/voting-threads O5 Voting Threads].
 * **Mod Tools Users**  (formerly Moderators) -- Operational Staff trusted with the ability to edit all pages (including locked pages), and to delete forum posts or articles in accordance with the [[[deletions-guide| deletions policy]]].
 * **Administrators** -- Operational Staff responsible for accepting new members to the site and banning abusive members. 

Staff can be members of one or more of the following teams, each of which is lead by a Captain:
* **[http://05command.wikidot.com/ambassador-main Ambassador Team]** -- Facilitates communication between the English language SCP Wiki and other **International** [[[scp-international| branches of the SCP Wiki]]]. Additionally, the team is responsible for settling any issues which may arise that involve other branches.
* **[http://05command.wikidot.com/anti-harassment-main Anti-Harassment Team]** (**AHT**) -- Handles harassment cases arising between users of the SCP wiki.
* **[http://05command.wikidot.com/community-outreach-main Community Outreach]** (**CO**) -- Handles communication between staff and the on-site community, addressing and responding to site issues as a whole. 
* **[http://05command.wikidot.com/critique-main Critique Team]** -- Responsible for providing critique on ideas, drafts and published works.
* **[https://05command.wikidot.com/curation-main Curation Team]** -- Responsible for curation of work on the SCP wiki, including the labelling of **adult content**, the posting of anonymous articles, the maintainance and pruning of collaborative pages, the updating of **guide** pages, the replacement of images incompatible with the site license, and organising rewrites of low-rated articles at risk of deletion.     
* **[http://05command.wikidot.com/disciplinary-main Disciplinary Team]** (**Disc**) -- Ensures site behavior standards are met and enforced, responsible for punishing offending users and preventing disruptive individuals from engaging with the site further. 
* **[http://05command.wikidot.com/internet-outreach-main Internet Outreach]** (**IO**) -- Staff that handle and communicate with off-site communities and the wider SCP fandom, responsible for conveying important events to casual fans and assisting new members in learning more about the Wiki. 
* **[http://05command.wikidot.com/license-experts-main Licensing Team]** -- Ensures that copyright standards are upheld across the Wiki and its community. Responsible for determining if content is stolen or plagiarized, and guaranteeing that all used media are attributed correctly and legally.
* **[http://05command.wikidot.com/maintenance-and-ancillary-staff-team-main Maintenance And Ancillary Staff Team]** (**MAST**) -- Maintains and updates the site to ensure proper functionality. Tasked with carrying out deletions and quality control, and implementing elements to improve navigation, such as Wikiwalk footers and tags.
* **[http://05command.wikidot.com/technical-staff-main Technical Team]** (**Tech**) -- Maintains the technical assets of the site and implements new features.

++ Community Terminology
* **6-7**/**SCP-067** -- A popular TikTok meme involving the nonsense phrase &#34;six seven&#34;, typically used in a humorous and absurdist manner. It is not related to the actual [[[SCP-067]]] in any way, despite the two being conflated among off-site fans. More context can be found [https://en.wikipedia.org/wiki/6-7_(meme) here].
* **clinical term**/**clinical terminology** -- Using scientific (or pseudoscientific) words and phrasing instead of colloquial language - many examples are listed in the Anomalous Science section! This is used to make SCP files read more like a real scientific document - in-universe, Foundation employees would use these terms because they&#39;re more precise and professional than more widely used synonyms. See the [[[Clinical vs Complex]]] and [[[clinical-tone-declassified|Clinical Tone: Declassified]]] essays for more information on getting this right.
* **coldpost** -- A page submitted directly to the site without any kind of review. Can be well received, but cold-post is usually used in a derogatory manner, referring to work posted by newer members that would have really benefited from receiving feedback and critique on the **draft**.
* **[[[format-screw-hub| format screw]]]** -- A term for SCP articles that intentionally violate some aspect of the standard SCP format or framework, generally because the SCP itself affects the documentation.
* **headcanon** -- Refers to individual interpretations of inconsistent, ambiguous or non-existent elements of **canon** - people use this term to describe how they imagine aspects of the Foundation universe, while recognizing that it&#39;s only one interpretation. A good example of this would be the exact strengths of the various classes of amnestics, or the precise nature of various K-class Events.
* **hook** -- The aspect of your article or tale that catches your reader&#39;s attention and makes them want to keep reading until the end. A hook has to inspire some sort of curiosity or emotion in your reader; it doesn&#39;t necessarily have to be at the very beginning of your article, but it does have to be early enough to make a difference. A hook can also be the aspect of the article or tale that keeps a reader interested after they&#39;re done reading; this can take the form of an interesting revelation or twist ending, and tends to be closer to the end of the writing.
* **listpages** -- a type of Wikidot module that enables pages on the wiki to list other pages on the same wiki. These are often used to create automatically updating lists of articles that meet specific criteria, such as possessing a specific tag, as [https://www.wikidot.com/doc-modules:listpages-module explained here]. 
* **ListPages Presented Text** (**LPT**) -- As explained in [[[listpages-magic-and-you| this guide]]], **listpages** can also be used to present a series of fragment pages as offsets of the same page, enabling multiple pages to be presented as parts of the same article, all sharing a rating module and discussion thread.
* **Kalinin Threshold** -- Refers to the idea that SCP articles which do not reach a rating of +50 or more should be eventually deleted. Largely referenced as an inside joke within community spaces, and no member of Staff has ever considered to actually implement it in the Deletions Policy. Named after former author Kalinin, who mentioned the idea once in an off-hand remark, but otherwise never seriously proposed it.
* **Kcon** -- An abbreviated way of writing &#34;Thousand Contest&#34;, this is a type of **contest** held every time the current SCP **series** is nearly filled. The tradition started with the [[[scp1000contesthub | SCP-1000 contest]]] in 2011 to mark the opening of SCP slots 1000-1999, and has continued since then whenever each new series has nearly been filled. The entry with the most votes at the end of the contest is awarded the first slot in the new series (X000), while runners up are assigned to other slots of their choice in the new series.
* **Keter duty** -- In-universe threats to demote personnel to Class D or otherwise assign them to dangerous Keter-class objects as a form of punishment. Considered a type of **lolFoundation**. Referenced in the title of the [[[keter-duty| Ihp/Locke Proposal for SCP-001]]].
* **larpocracy** — A term used to criticize **Staff**, referring to their tendency to use time-consuming procedures and excessively commit to minor rules. A portmanteau of LARP (live-action roleplaying) and bureaucracy.
* **locked box test** -- An informal thought exercise often used to determine what **Object Class** on an object or entity ought to have. It is explained as such:
