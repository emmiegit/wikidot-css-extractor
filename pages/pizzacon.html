This was supposed to be the sports contest, but I got hungry.

[[image http://scp-wiki.wikidot.com/local--files/pizzacon/ant.jpg]]

+ Do you think world hunger is a problem? Well, now you can exacerbate it! Introducing: Pizzacon!

You see, the problem with an upvote based economy is that there&#39;s just too many votes on the wiki, and attempting to establish a flat rate doesn&#39;t work for the purposes of capitalism. I&#39;m not an economics major, so instead, we&#39;ll be working off a fluctuating rate, accounting for inflation: we&#39;ll be using motos.

What&#39;s a moto, you ask? Well, in honor of moto42, the esteemed creator of SCP-173, the price of one pizza is now equal to 1 moto. I will not elaborate further.

+ But what does this have to do with Pizzacon?

I&#39;m glad you asked! Have you ever wanted to catch up to those bigly named authors with a bajillion upvotes? Well, for today and today only, we&#39;re offering a special deal: every pizza you make and submit to the wiki and gets accepted will count as 1 moto&#39;s worth of votes! I did not consult anyone when writing this, but I&#39;m sure this is completely allowed!

+ Contest Information

* Legally speaking, I am required to tell you that in joining the contest, you agree to waive your right to complain on the wiki about any cooking-related injuries. However, I&#39;m sure that the brilliant minds behind the wiki can cook a pizza without fail... right?
* By agreeing to join the contest, you agree to submit only the tastiest pizzas. No war crime creations are allowed, unless they generate a substantial amount of traffic to the site for Michal&#39;s ad revenue.
* You __must__ indicate how long the pizza took you to make. Anyone can microwave a premade pizza. The amount of sweat you used correlates to how deserved your motos will be.
* Not every pizza will be accepted! If it&#39;s not tasty enough, I will throw it in the trash and move on.

+ Important Dates:
**Announcement:** Now
**Posting Opens:** When I get hungry
**Posting Closes:** Once I&#39;m full
**Results Decided:** When I wake up from the food coma

+ Entries

Sorry, I ate them all.

+ Rules

* Be kind to one another. Pineapple on pizza does not make you superior to someone else. While the Chicago Deep Dish is more pie than pizza, it also counts for this contest.
* More than one entry is allowed per user. Collect your motos and take over the number one spot on crom![[footnote]] This contest was not sponsored nor supported by smlt [[/footnote]]
* Pre-existing pizzas are not allowed. I don&#39;t want your stinky leftovers.
* Yes you can absolutely send in store-bought pizzas, but I //will// judge you for it.
* You can submit your pizzas anonymously, but don&#39;t expect a thank you in return.
* Winners will be determined by me. Only me. Fuck the other contest committee members.
* Any contestant who takes unusual and/or negative actions to increase their tastiness, or decrease that of their competitors, will be disqualified and I&#39;ll keep your pizzas for no motos in exchange. Examples of shenanigans include, but are not limited to:
 * rat poison
 * disrupting the supply chain
 * marijuana monopolization
* Bribery isn&#39;t allowed - however, I think spicy sausages are a topping worth getting VoNCed over and will give bonus points based on that.
* The contest marshals for this contest are me, [[*user Naepic]]. Only me. These are my pizzas now. You can&#39;t have them anymore.
