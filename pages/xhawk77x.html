+ My Works
**SCPs:**

* **[[[SCP-7046]]] - Unwilling Blood** ([https://www.youtube.com/watch?v=iEvYYy1tu7I Audio Adaptation]) What would you do if your god died? For Cassidy Redwood, the answer is simple: do whatever it takes to bring her back.
* **[[[SCP-8410]]] - When Dreams Come True** As his life crumbles, a young boy retreats into the fantastic world of his dreams, but these dreams are realer than he knows, and carry a secret, sinister purpose.
* **[[[SCP-7589]]] - A Cure For Dracula** The once-mighty Count Dracula, who fed on the blood of innocents for centuries, has grown weary of his bloodlust and seeks a cure for it, but is he truly ready to leave his old ways behind?
* **[[[SCP-7851]]] - The Telekill Ally** A boy with a unique gift performs a heroic deed, but instead of being rewarded, he finds himself imprisoned as an &#34;anomaly&#34; for his trouble. Can he adjust to his circumstances or is he doomed to a lifetime of misery?
* **[[[SCP-7862]]] - Meat&#39;s Vengeance** A cursed diner where the tables are turned.
* **[[[SCP-9280]]] - The Arena Demands a Sacrifice** The Foundation often has to make sacrifices for the greater good, but what happens when someone is willing to move heaven and earth to find another way, and save the boy marked for next year&#39;s sacrifice?
* **[[[SCP-9349]]] - The Horse, the Homestead, and the Huntsman** A talking horse stumbles onto a homestead of pagans in rural Missouri and acquaints himself with its residents. What proceeds is a story about love, courage, and manhood that will force the homestead&#39;s residents, especially their new equine companion, to grapple with their pasts and fears in order to find happiness.

__Dracula__
* **[[[herman-fuller-presents-dracula|Herman Fuller Presents: Dracula!]]]** - The ancient and mighty vampire Dracula awakens to find himself under the power of the lowest, most mortal scum he can imagine. He chafes under their chains, but there seems to be nothing he can do to defy them. Will he find a way?
* **[[[Cursed Ambrosia]]]** - A vampire laments his bloodlust.
* **[[[SCP-7589|SCP-7589 - A Cure For Dracula]]]** - The once-mighty Count Dracula, who fed on the blood of innocents for centuries, has grown weary of his bloodlust and seeks a cure for it, but is he truly ready to leave his old ways behind?
* **[[[Stains of Blood and Sin]]]** - A young vampire hunter is condemned to the ultimate punishment for the crime of defying his rulers. Can he find redemption, or will the weight of his sins drag him to the depths of hell?

__Andrew and Oz__
Slice of life tales about a Nälkän-Mekhanite interfaith couple and the unique challenges they face in building their life together.
* **[[[The Feasting Day of Klavigar Nadox]]]** - Gift-shopping is hard enough at the best of times, and, for Andrew, it&#39;s further complicated by the intense cultural rift between him and his unlikely partner.
* **[[[Bonds of Blood and Wire]]]** - When a member of his estranged family reaches out to him, Andrew wants nothing more than to reconcile with them, but are they truly willing to accept him, or are they just hoping go bring him back into the fold?

**Standalone Tales:**
* **[[[Hemophobia]]]** - The story of an Ortothan whose efforts to give blood offerings to his gods are frustrated by an intense fear of blood which he fears he may never overcome.
* **[[[Seasonal Emergence]]]** - A slice of life tale about a bug-boy who sneaks out to go to a Halloween party.
* **[[[Diary of an Adolescent Orange Blob]]]** ([https://www.youtube.com/watch?v=4tb8UQJYWpA Audio Adaptation]) - Excerpts from SCP-999&#39;s diary.
* **[[[Underneath the Mistletoe]]]** - A slice-of-life workplace comedy about Dr. Clef and Kondraki being subjected to a whimsical Christmas prank with unexpected consequences.
* **[[[A Steller Encounter]]]** - A man with a troubled past discovers something captivatingly beautiful, but is that beauty a product of his own mind, or is it just a way for something else to control him?

**GoI Formats:**
* **[[[zeyu-eitothan|Zeyu-eitothan of the Voru]]]** - An Ortothan fable about curiosity and how far we should go to judge people by their choices rather than their origins.

+ About Me

I&#39;m a 30yo novelist from the midwestern United States. I write sci-fi and fantasy stories about strange horrors, eldritch gods, and the power of love. I often focus on LGBT themes, as well as religion, romance, and supernatural mystery.

I&#39;ve been a fan of the SCP Wiki since I discovered it more than ten years ago, but it wasn&#39;t until 2022 that my own writing skills grew strong enough that I felt like I could contribute to this wonderful universe. I hope all of you enjoy what I create here.

+ Off-Site
Besides being an SCP author, I also write novels. Links to all of my work, including my personal blog and an e-mailing list you can subscribe to, are available on [https://www.daviscollinsauthor.com/ my author website].

My first novel, entitled The Springstorm Alpha, is available as an eBook on [https://www.amazon.com/Springstorm-Alpha-Davis-Collins-ebook/dp/B0DRF2X96Z Amazon], as an eBook or Paperback on [https://www.barnesandnoble.com/w/the-springstorm-alpha-davis-collins/1144918745?ean=9798893470239 Barnes &amp; Noble], and in serialized form on [https://www.webnovel.com/book/the-springstorm-alpha_25519290205134005 Webnovel], [http://abs.ireaderm.net/zyhw/app/app.php?ca=Share.toPcdisp&amp;bookId=12857304&amp;p2=120161&amp;lang=GLOBAL&amp;countryCode= iReader], and [https://www.dreame.com/story/1784568064-the-springstorm-alpha Dreame]. It&#39;s a paranormal romance, but it&#39;s also a mystery story about a strange town full of monsters and the brutal murder connected with it. The first few chapters are free on each of those platforms, so you might as well check it out!

I also have an [https://xhawk77x.blogspot.com/ old blog] I used to post some stories on. Among the works present there is a (basically) complete web serial called Angel of Death, which is also available on [https://www.royalroad.com/fiction/2594/angel-of-death Royal Road].
