    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>**Item #:** SCP-9765

**Object Class:** --Safe-- 🔴✗ Euclid 🟢✓

**Special Containment Procedures:** To assist in the analysis of SCP-9765, the file relating to SCP-9765 is to be read out in the presence of the anomaly and the output following each statement is to be recorded. SCP-9765 is to be contained in an anomalous item storage locker in Site-19 🟢✓. SCP-9765 poses no danger to personnel 🔴✗. Dr. Naomi Sato is permitted to access SCP-9765 for testing purposes 🟢✓. 

**Description:** SCP-9765 is a brushed aluminium box fitted with two LED lightbulbs, one red and one green 🟢✓. When a statement is spoken near SCP-9765, one of these two lightbulbs may activate 🟢✓. If the statement is a true fact regarding SCP-9765, the green light will activate 🟢✓. If the statement is false regarding SCP-9765, the red light will activate 🟢✓. Statements not relevant to the properties or history of SCP-9765 do not cause a light to activate 🟢✓.

SCP-9765 was recovered from a self-storage facility in Trenton, New Jersey on the 7th of May, 2025 🟢✓. The unit was rented under the name &#34;Naomi Sato&#34; 🟢✓. Dr. Naomi Sato, who was recruited into the Foundation in 2023, expressed confusion when presented with this information and has no recollection of renting or visiting this storage unit. This is a coincidence 🔴✗.

SCP-9765 responds only to statements about its physical properties and containment status 🔴✗. SCP-9765 responds to statements about its past and future states 🟢✓. SCP-9765 can predict the future 🔴✗. SCP-9765 can affect the future 🟢✓.

----

On 2025/06/08, 2025/06/10, and 2025/06/19, Dr. Naomi Sato submitted requests to perform a series of tests on SCP-9765 🟢✓. Special permission was granted on 2025/06/25, with Director Greyling observing. Director Greyling made several additions to the list of statements to be provided to Dr. Sato in the test chamber without her knowledge. Per standard protocol, the following record includes all statements spoken within the test chamber without redaction.

&gt; **Statement:** &#34;SCP-9765 is currently located in Test Chamber 4.&#34;
&gt; **Output:** 🟢✓
&gt; **Note:** Baseline positive result.
&gt; 
&gt; **Statement:** &#34;SCP-9765 is spherical.&#34;
&gt; **Output:** 🔴✗
&gt; **Note:** Baseline negative result.
&gt; 
&gt; **Statement:** &#34;I have green hair.&#34;
&gt; **Output:** None.
&gt; **Note:** Dr. Sato&#39;s hair is not green.
&gt; 
&gt; **Statement:** &#34;SCP-9765 is controlled remotely.&#34;
&gt; **Output:** 🔴✗
&gt; 
&gt; **Statement:** &#34;SCP-9765 was created by a human being.&#34;
&gt; **Output:** 🟢✓
&gt; 
&gt; **Statement:** &#34;SCP-9765 is alive.&#34;
&gt; **Output:** 🔴✗
&gt; 
&gt; **Statement:** &#34;SCP-9765 is conscious.&#34;
&gt; **Output:** 🔴✗
&gt; 
&gt; **Statement:** &#34;SCP-9765 will now light up green.&#34;
&gt; **Output:** 🟢✓
&gt; 
&gt; **Statement:** &#34;SCP-9765 will now light up red.&#34;
&gt; **Output:** None.
&gt; 
&gt; **Statement:** &#34;This statement regarding SCP-9765 is false.&#34;
&gt; **Output:** None.
&gt; 
&gt; **Statement:** &#34;SCP-9765 has a purpose.&#34;
&gt; **Output:** 🟢✓
&gt; 
&gt; **Statement:** &#34;If explained, SCP-9765&#39;s purpose would be comprehensible to me.&#34;
&gt; **Output:** 🟢✓
&gt; 
&gt; **Statement:** &#34;SCP-9765 was created by the Foundation.&#34;
&gt; **Output:** 🟢✓
&gt; 
&gt; **Statement:** &#34;SCP-9765 was created accidentally.&#34;
&gt; **Output:** 🔴✗
&gt; 
&gt; **Statement:** &#34;SCP-9765 was created to facilitate the containment of an anomaly.&#34;
&gt; **Output:** 🔴✗
&gt; 
&gt; **Statement:** &#34;Okay, let&#39;s end the test there.&#34;
&gt; **Output:** None.
&gt; 
&gt; **Statement:** &#34;That&#39;s not necessary, Director.&#34;
&gt; **Output:** None.
&gt; 
&gt; **Statement:** &#34;We&#39;ve already read all the listed statements.&#34;
&gt; **Output:** 🔴✗
&gt; 
&gt; **Statement:** &#34;I don&#39;t know who added that, but it wasn&#39;t in my proposal.&#34;
&gt; **Output:** None.
&gt; 
&gt; **Statement:** &#34;The test is over and I&#39;m not reading those.&#34;
&gt; **Output:** None.
&gt; 
&gt; **Statement:** &#34;SCP-9765 was created by Dr. Naomi Sato.&#34;
&gt; **Output:** 🟢✓
&gt; 
&gt; **Statement:** &#34;Dr. Naomi Sato remembers creating SCP-9765.&#34;
&gt; **Output:** 🔴✗
&gt; 
&gt; **Statement:** &#34;Dr. Naomi Sato understands the purpose of SCP-9765.&#34;
&gt; **Output:** 🟢✓
&gt; 
&gt; **Statement:** &#34;Dr. Naomi Sato has accessed SCP-9765 without permission from the Site Director.&#34;
&gt; **Output:** 🟢✓
&gt; 
&gt; **Statement:** &#34;SCP-9765 can be used to discover the reasons behind Dr. Naomi Sato&#39;s amnesticisation.&#34;
&gt; **Output:** 🟢✓
&gt; 
&gt; **Statement:** &#34;Dr. Naomi Sato has already discovered the circumstances around her amnesticisation by using SCP-9765.&#34;
&gt; **Output:** 🔴✗
&gt; 
&gt; **Statement:** &#34;SCP-9765 can be destroyed.&#34;
&gt; **Output:** 🟢✓
&gt; **Note:** At this point, Director Greyling ordered termination of the test.
&gt; 
&gt; **Statement:** &#34;SCP-9765 could exonerate me.&#34;
&gt; **Output:** 🟢✓
&gt; **Note:** The test was terminated here and Dr. Sato was removed from Test Chamber 4.

[[footnoteblock]]</textarea></pre>
