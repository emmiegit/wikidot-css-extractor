    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>**Item:** SCP-9298

**Object Class:** Euclid

**Special Containment Procedures:** SCP-9298 is kept in an alternating and adjoining pair of Category-C[[footnote]](10m^^3^^, As per the 2021 reforms of the O3 Council)[[/footnote]] reinforced containment cells at Site-50.

Once every week, SCP-9298 will be forcibly escorted from one cell to the other so that all flat surfaces in said cell can be cleaned and repainted with Portnoy-Mateus transparent anticorrosive agent, including walls, ceilings, floors, and plexiglass guard screens over the security cameras.

It is currently believed that SCP-9298 will die of starvation as soon as 8/14/2027. Work is underway to determine a means to provide nutrients for SCP-9298 through coercion or force. Second in priority to this is the translation of SCP-9298&#39;s language for negotiation.

**Description:** SCP-9298 refers to a carnivorous and extremely hostile lifeform with reptilian, mammalian, and insectoid characteristics.

[[collapsible show=&#34;+ Anatomical Data&#34; hide=&#34;- Anatomical Data:&#34;]]
During the brief period in initial containment when SCP-9298 was unconscious, SCP-9298&#39;s mass was determined to be 927.012 kg and measured 1.8 m from head to tail, though its four hindlegs are each 3.3 m in length.

The entity&#39;s torso is protected by a rigid carapace similar to that of a tortoise. A purple robe brocaded with precious metals has been affixed to the front half of the shell through adhesive. The rim of the shell has eight openings for six limbs, a tail, and a head.

The rear four limbs are triple-jointed, tipped with hooves, and used for locomotion. The front two limbs (1.9 m in length) are double-jointed and each end in three clawed, opposable digits. The tail (0.4 m in length) is used to stabilize the body while sitting. The head and prehensile neck (1.28 m in length) is tipped with a conical head with six eyes.

The head contains six eyes and a retractable proboscis. Digestion is external through the expulsion of gastric juices through the proboscis onto prey. The prey&#39;s liquefied remains are then consumed through the same proboscis.

It is not currently known which part of its body SCP-9298 uses for speech, though the origin point of its vocalizations is within the shell.
[[/collapsible]]

SCP-9298 is capable of speech, though it --exclusively--[[footnote]](See addendum.)[[/footnote]] uses a language that has yet to be identified. --It does not understand English,--[[footnote]](See addendum.)[[/footnote]] and does not seem to understand our inability to translate its language.

[[collapsible show=&#34;+ Linguistic Analysis as of 8/01/2027&#34; hide=&#34;- Linguistic Analysis as of 8/01/2027&#34;]]
//**Note:** This is all hypothetical, going off direct observation. I&#39;ve found nothing to cross-reference any of this with. Anyone who has seen these terms in any other context should contact me ASAP. I don&#39;t have a clinical-tone means of conveying how desperate I am for some kind of lead here, so use your imagination.// -- Dr. Sybil Estrada, SCP-9298&#39;s containment manager.

||~ Phrase||~ Context/Possible Meanings||
||{{&#34;Hajheti torog.&#34;}}||Heard most often during unaccompanied observation. Could either be a protest chant, i.e. the contextual equivalent of &#34;Attica! Attica!&#34;, or carry some sort of religious significance.||
||{{&#34;Krek varaki&#34;}}||Heard when resisting feeding attempts, i.e. &#34;To hell with your food!&#34;||
||{{&#34;Kagmin drau tot ferram burut.&#34;}}||An insult. Used in a mocking, vaguely sing-song voice.||
||{{&#34;Lyuor grogatt!&#34;}}||A pejorative for Researcher-Mayles-shaped people. (Only says this when pointing at Researcher Mayles.)||
||{{&#34;Myuy!&#34;}}||Used when throwing its feces at containment staff.||
||{{&#34;Etsipi fandatso&#34;}} or {{&#34;Etsipi&#34;}}||Used in reference to us. Possibly a corruption of &#34;SCP Foundation.&#34; (The term was not used by our staff in its presence before -- this would mean it has prior knowledge of our existence.)||
||{{&#34;Guarat schegta! Dek protak schialek-waruk nel threll-domanya torokh hazheyti nel muarhudt schuun, frovuk! Derr zhaka huo-raru! VAKH SCHNEE! UUR-UUR! GADATTA FARATTA SCHOOG! BOG DYET BATTA! UUR-UUR! VALAI FEVEK CHAA!&#34;}}||...I have no idea, but it really likes this monologue in particular.||
[[/collapsible]]

**Discovery:** SCP-9298 was first reported from sightings in a warehouse of the [REDACTED] dockyards in Bridgeport, CT. On 4/10/2027, SCP-9298 attacked and devoured three dock workers. A fourth worker attacked SCP-9298&#39;s head with a pipe wrench, resulting in SCP-9298 losing consciousness long enough for initial containment to be established.

**Addendum - Health:** As of initial containment on 4/10/2027, SCP-9298 has continued to violently refuse to eat or drink. Based on observation of external symptoms[[footnote]](Lethargy and dry heaving.)[[/footnote]] and dramatic changes in appearance[[footnote]](Loss of bodily mass, muscular atrophy, discoloration of scales)[[/footnote]], it has been determined that SCP-9298 is attempting to either self-terminate or engage in a hunger strike[[footnote]](If true, the demands of this strike remain unknown due to the language barrier.)[[/footnote]].

[[collapsible show=&#34;+ Video Log - Attempt #148 to coerce SCP-9298 into feeding&#34; hide=&#34;- Encryption key accepted.&#34;]]
[[div style=&#34;border:solid 3px #000000; background:#ffffff; padding:15px; margin-bottom: 10px;&#34;]]
[[=]]
++++ Video Log - Attempt #148 to coerce SCP-9298 into feeding
+++++ 8/4/2026, 12:00 PM
[[/=]]
&lt;Begin Log&gt;

[Dr. Damon Uhl, Director of Site-50, enters the antechamber to SCP-9298&#39;s current cell, where Dr. Sybil Estrada and some researchers are already assembled.]

**Estrada:** Dr. Uhl?

**Uhl:** I&#39;m here for the coercion attempt. You know, I&#39;ve been reading a book about CIA-level identification of nonverbal cues. Would you care to explain why my presence is such an issue?

**Estrada:** No issue at all, sir, I just... I wasn&#39;t aware that 9298 was such a priority to warrant your personal involvement. If anything, I&#39;m flattered.

**Uhl:** Yeah, well, remember the Keter wing breach yesterday? Everyone who&#39;d been lined up to be your plus-one today is currently in the infirmary. Besides, I&#39;ve got an opening in my schedule -- and a new strategy to end this hunger strike. No promises, but I&#39;ve got a good feeling about this.

**Estrada:** The floor is yours.

**Uhl:** Cool! Okay -- table, chair, microphone. Chop-chop.

[The researchers set up the three items in front of the shuttered window to 9298&#39;s current cell. Uhl sits down.]

**Estrada:** Raise the shutter.

[It raises automatically. SCP-9298 can be seen languishing in a corner of its cell. The window has been darkened with the Portnoy-Mateus anticorrosives.]

[Uhl waves cheerfully to SCP-9298. It does not respond.]

**Estrada:** Open audio --

**Uhl:** Wait! Increase our mic sensitivity. We&#39;re gonna ASMR this.

**Estrada:** As you wish.

[Audio contact is established with the interior of the cell.]

**SCP-9298:** //[Weakly]// {{Hajheti... torog... hajheti torog...}}

[Uhl taps the mic. SCP-9298 jolts from the sudden noise.]

**Uhl:** Hey, 9298! Happy Tuesday! How&#39;s it goin&#39;, big guy?

**SCP-9298:** //[Violent hissing.]//

**Uhl:** My name&#39;s Damon! I&#39;m the site director around here. 

**SCP-9298:** //[Immediately stops hissing.]//

**Uhl:** And guess what? It&#39;s lunchtime!

[He pulls a sandwich from Quiznos out of his suitcase.]

**Estrada:** Uh -- sir?

[He loudly and messily devours the sandwich.]

[As he does, SCP-9298 slowly approaches the window, studying Dr. Uhl intently.]

**Uhl:** //[With his mouth full]// This is chicken carbonara, by the way. Usually you&#39;ll only get that in spaghetti form. It&#39;s not even toasted right now, but who gives a fuck? Tasty as //shit.//

**SCP-9298:** Excuse me.

[Uhl stops eating.]

**Uhl:** What, you gettin&#39; hungry already?

**SCP-9298:** Did you say &#34;site director?&#34;

**Estrada:** He can understand us?

[SCP-9298 points at Estrada angrily.]

**SCP-9298:** //{{**VAGATT!** Kuorof cha katettet nramm! Uur-uur!}}// ...Again, are you the director of this facility?

**Uhl:** Uh... yes, I&#39;m the Site Director.

[SCP-9298 bows deeply.]

**SCP-9298:** OH! Oh! {{Gakh chrukh!}} A thousand apologies. One moment.

[SCP-9298 clasps its hands together and mumbles some kind of chant. Its musculature suddenly reverts to its previous, healthier state upon initial containment.]

**Uhl:** What are you doing?

[It bows again.]

**SCP-9298:** Forgive my deception. I&#39;m not hungry. Our holy father, **The Great and Unspeakable Prince {{HAJHETI}} of the Primrose Deep, Master of the Pipe, Sixth Prince of Corbenic**, sustains us with His mind. The digestive tract became purely cosmetic some time ago.

**Uhl:** You don&#39;t have to eat?

**SCP-9298:** Correct!

**Uhl:** But you ate three dockworkers.

**SCP-9298:** I opted to sample the local cuisine. Just a wee snackie!

**Uhl:** So... if you could understand us the whole time, why did you need to feign a hunger strike?

**SCP-9298:** I had to wait for a local authority figure before negotiations could begin. The worse off I looked, the quicker they&#39;d fetch you.

**Uhl:** Why couldn&#39;t you talk to my staff?

**SCP-9298:** I will //not// negotiate with your slaves. Basic etiquette!

**Uhl:** //What.//

**SCP-9298:** Now, on to business.

Allow me to introduce myself. I am **Lord {{Shialekuaruk}}, House of {{Gielet}}, Tribe of {{Mruu Lakhari}}, Banner of {{Garai}}, Sixth-{{Droizh}} Emissarial Bureaucrat of the Immortal and All-Beloved Threll Dominion. //{{HAJHETI TOROG!}}//**

I came to this world as ambassador and surveyor to assess its resources, resale values thereof, and potential as Threll colony. (Very promising, by the way.) 

But you found me. You overpowered me. Therefore, you imprisoned me.

On one hand: this is a //reversal// of the appropriate outcome. Also, it&#39;s a violation of the Threll Nonaggression Accords. It gives us //many// excuses to do //many// unpleasantries. 

On the other hand: the fact that you won me through violent conquest... that&#39;s just adorable! I just //love// seeing a lesser species embodying the Threll Spirit. So much, in fact, that I can&#39;t help but offer clemency before anything too spicy. Catch more flies with honey and all that.

So, I will discuss the terms of my release, and you will go home rewarded with favors. Yes?

...

I give you permission to speak.

**Uhl:** Okay, first off, just to back it up a little. I do //not// have slaves.

[SCP-9298 looks around the room, staring at the other staff members one by one.]

**SCP-9298:** Curious.

**Uhl:** These are my workers.

**SCP-9298:** HAW! HAW! HAW! How abundantly I am driven to laughter! Forgive my impropriety. Okay. I will give due respect to your &#34;Wurr Kurrs&#34;, yes. Wink. Nudge. 

Now, behold the Astral Catalog.

[SCP-9298 raises its arms. Threads of light form in the air above it, depicting glyphic symbols and images of unidentified lifeforms in collars and chains.]

Here at the Threll Dominion, we strive for perfection with every transaction. Lord HAJHETI has bequeathed His children the bounties of the Omniverse as our birthright. But! Lord HAJHETI commands us to be generous, to offer low prices and sweet deals to the masses. 

[It swipes through the lines, scrolling the images.]

Ergo. If you release me, not only will my commanding officer not be informed of the reason for my absence -- but you will also be issued the free Category {{Vlekh}} &#34;Wurr-Kurr&#34; of your choice!

[A picture of a vaguely feline creature impaled on a metal fork with a spigot grafted to its groin.]

{{Vlekh}} Model {{Sharag-Turu}}! The perfect-temperature cup of intestinal coffee every time, guaranteed!

[Another picture: a grand piano made out of a single walrus, which is still moving.]

{{Vlekh}} Model {{Umrug-Snii}}! Excessive Steinway, profound Lisztomania!

[Another picture: a bipedal hominid creature with fins, staring nervously.]

{{Vlekh}} Model {{Fravua-Helutyokh}}! Thanks to ingenious bioconditioning, it will exclusively receive dopamine when it gives you a foot massage!

[Another picture: a pile of crystals with a single eyeball peeking out from between the cracks.]

{{Vlekh}} Model {{Ztii-Greth}}! ...I forgot what this one does.

[Another picture: six pangolins grafted into a serpentine mass.]

{{Vlekh}} Model {{Dhutvakahuurgog-Uung-Nakhtadakh-Vuoyyu}}! Never go without designer ice cream again!

[Another picture: [REDACTED]]

{{Vlekh}} Model {{Yhaa}}! Dentist!

[Another picture: **[DATA EXPUNGED]**]

{{Vlekh}} Model **[DATA EXPUNGED]**! Always pregnant, never needs snake-proofing, and --

[Uhl closes the shutter and switches off audio.]

**Uhl:** //Change the object class to safe and weld the cell doors shut.//

**Estrada:** Is that an order?

[Uhl thinks about this, then sighs.]

**Uhl:** It might be, later. I&#39;ll let you know once I&#39;ve made a few phone calls about it.

**Estrada:** Understood. ...Hey, about that sandwich --

**Uhl:** It&#39;s fine. I&#39;ve lost my appetite.

[He throws what&#39;s left of the sandwich in the wastebasket, then leaves.]

[Estrada approaches the wastebasket.]

...

[She stares into the wastebasket, radiating with disappointment.]

&lt;End Log&gt;
