    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>**Statement from Agent Thomas Chi, Tau-49 Operative**

&gt; I was walking on a sidewalk, up a hill. I didn&#39;t recognize the neighborhood. I saw a guy standing in the street ahead of me, staring past me, into the distance.
&gt; 
&gt; He was holding a baby by the ankle. Just dangling it. It wasn&#39;t moving, but it didn&#39;t look like it was dead. I knew something bad was about to happen. I tried to yell at him, to say that you couldn&#39;t hold a baby like that, but my throat wouldn&#39;t work. I moved toward him, but I couldn&#39;t get my feet to move fast enough. Like I was stuck in slow motion. He just kept staring.
&gt; 
&gt; There was a sudden glint in his eye, and something slammed into my back, and I was here again.

**Note:** Agent Chi&#39;s statement was taken three days after recovery, as he had returned with second and third degree burns across his back that required immediate medical intervention.
