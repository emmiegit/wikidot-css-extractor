 ,,//##E8E9E8|짜내! 연장해! 짜내! 연장해!  ##//,,

One was rolling on a glowing ball

One clinging to that ball 
 ,,//##A8F19B|Ha! Didn’t break it this time! I&#39;m King now, fathead!##//,,

One man sized in a wheelchair munching on a carrot, it blew out a mist that made the strange scene even more veiled. 
 ,,//##B6D0E2|They don’t talk like that in California! Dad don&#39;t talk like that!##//,, 

They were all so cute.

//##F70101|It’s all your fault, stupid!##//

//##F8C8DC|It’s ok Zena ##//

//##F8C8DC|You can do it!##//

&#34;힘을내!&#34;

More began to appear from the mist... She figured this was a dream but then again, anything was possible with these people.

//##A8F19B|진내야 할 수있어! ##//
//##A8F19B|진내야 할 수있어!##//
//##A8F19B|진내야 할 수있어! ##// 

Maybe she could just stay here.
,,//##520A0A|Just listen! ##//,,

 //##FFC000|You don&#39;t belong in the forest!##//
 //##F8C8DC|You’re a good girl, Zena##//

The ones following her stopped and stared as she ran down the yellow dirt road.

//##7577AA|I’m- ##//

Eventually, they reached a lake. Dorothy giggled and eased on in. Zena stopped when she looked in the water. If she hadn’t felt her own head, or rather how little was on it, she would swear Jun was looking right at her. 

 //##520A0A|You’re a lady act like it! ##//
//##E8E9E8|act like it##// 
//##E8E9E8|act like it##// 
//##E8E9E8|act like it##// 
//##E8E9E8|You do not belong in the forest##//

She was alone now with the echoes of the rabbits behind her. A thrashing in the middle of the lake grabbed her attention. As the water squelched and burped, red splotches rose to the top before dissipating. She rushed into the lake. 

Her pace meant nothing, unable to close the distance between her and the bloodbath. Something floated back up. She feared the worst but as she finally reached the center, all she found was water lacking color. She couldn’t see anything else. 

Zena backed away slowly until she bumped into a small rowboat, the shore having left her in the distance.

“They recruit cowards and leave me with shit.” 

The voice was loud like it was right in her ear ringing. She looked around covering them. 

“Hello?”

“Are you alright, kid? Can you hear me?”

She looked up and realized the boat wasn’t empty. The Actress, Dorothy and a head of lettuce greeted her.

“It’s ok Zena!”

She pulled herself up, shaking herself dry. Dorothy offered tea to all the passengers.

“Thank you.” Zena took a cup. There was a sweet smelling red liquid inside.

&#34;No thanks…now.&#34; The actress coughed in her hand. looked to her left and spotted another boat. It was a tug boat with a shiny wheel.

“But I can’t go alone with the lettuce silly, I’ll eat it.”

The actress grabbed the lettuce, spilling its tea, and took a big bite. “Get lost!”

The little one hopped off the boat and floated across the water to the smaller tug boat.

“You can do it Zena! Keep fighting!” it whistled a tune as it disappeared into the mist.

“Alright.” The actress said as Zena waved her friend away. “This is all going to seem strange...&#34; Adams suddenly grabbed Zena&#39;s cup of tea. &#34;But you’re not dreaming.” She tossed the cup in the water. “You listen and  things go well. You can focus on me, right?”

&#34;Yes ma&#39;am.&#34;

“Ok, SCP 2599. I’m Andrea Adams. Security Chief at Facility 120.”

“Hello Mrs. Adams! I am SCP 2599, Zena Cho ready to work at Facility 120!”

“Already said your name. I think we should speak only when asked.”

“Yes ma&#39;am.”

Shoot.

“So, I’ve been told having you come to my site wasn’t an order. If you want to be here, I’m sure you know we have some things to address, right?”

It was time to nod. Adams took another bite then split the folds of lettuce with her fingers to pull out some papers.

“Two things.” Lettuce pieces were still falling out of her mouth.

“One, do you know what we do at Facility 120?”

She nodded.

“You can talk.”

“Facility 120 is a research facility focused on experimenting and containing ontokinetic objects creatures and people. Mm.”

“Do you know why you’re here?”

“I am an SCP to be studied.”

“Yes, but why? Why are we studying //you//.” She pointed at the SCP in question.

“Oh, sorry. I&#39;m an anomalous object called a reality warper.”

&#34;You know what reality warpers do?&#34;

&#34;They can change reality at will.&#34;

“Can you change reality at will?”

What was the right answer? Technically she’s supposed to be able to, but she’s broken.

“Broken is a word for it. Let&#39;s circle back with something simple. Why are you here, Cho?”

“Huh? Didn’t I-”

“You told me what a reality warper does, now I’m asking if you understand why we need to study your anomaly.”

“Because I’m…”

Dangerous.

**우르릉!**

She shivered as Adams laugh echoed with the thunderclap. She felt droplets pelt her face as the cackling reverberated across the lake.

“A few decades late, darling. These days you throw a stone and you hit ten greens. Ha ha and most of them die. The foundation isn&#39;t the only one good at what it does.  So the thought of you being dangerous needs to leave your head before you lose it.”

&#34;Oh…ok.&#34; She started to feel a bit more comfortable.

“Good we aim to please our guest on this side of the veil. Everything we do here is about safety, so everyone can feel nice and comfortable with the hell around us. The gist of what we do is find the weird shit and keep it locked tight. For as long as necessary, by the necessary means.”

She pointed to the sky.

“So if you seek danger…”

우르릉!

She then aimed her fingers at Zena who could practically trace the weapon between them.

“Then I’m all you need.” A spark crackled through her hand, leaving a puff of smoke to leap off her finger.

“My career is making sure every kind of weirdo, a Skip, a green, a lunatic too into his storybooks, stay where they’re supposed to be. Usually that means in the ground. If your plan is to survive, then following directions, schedule and curfew is what you want to do. If you accept what you’ve been given, then everything is going to be alright. Understand?&#34;

Zena nodded. So that&#39;s what Dr. Jora was talking about with expectations.

She found her shivering calm down and her body warm up.

“Wonderful. Now, being an anomaly doesn’t mean living at the barrel of a gun.”

But…but then-

“Why would you do that?”

“Didn’t I say no interrupting?”

Right. Her mother prepared her for pressure like this. She always thought it&#39;d be in an office.

“Being an SCP means being more responsible than anyone else. I haven’t had to use my piece in a long time and I don’t want to have a reason too, got it?”

“…Ok.”

“Things are going to be tough, but what we do here is not a matter of hard or easy. It’s work. Nothing more, nothing less. Keep that in mind. Unlike other sites you&#39;re expected to be a part of the team. We don’t need you burning out before we get anywhere.”

“Yes ma’am.”

It&#39;s not like she could resist even if she wanted to. Were they going to be stricter at this site?

“…Do you know what SCP stands for?”

“Secure. Contain. Protect.”

“Everyone here risks their life the moment they clock in to keep the dangerous things in their box. If we’re taking you out of yours it means something has convinced us we can handle you being out of it. I think we should keep it that way.”

“Right, I remember this, we die in the dark so they can live in the light.”

&#34;You&#39;ve done your research.&#34;

Yes!

&#34;But you’re a child not a soldier. All you need is patience and to trust the nerds.”

“Ok.”

So basically nothing. Same as always.

“Well, given your record here you should be grateful we’d let you get this far.”

“What? What does that mean?”

“Right. One thing at a time. They did a number on you. But I don’t think the boat needed much rocking. What a mess this is.”

쾅

“…I’m not stupid.” she muttered.

“Ok you’re not. So next question. Why do you want to come here?&#34;

&#34;Isn&#39;t that the same question?&#34;

&#34;I know why //we// want you there, this one is why you want to be here yourself.”

“Right. I want to be able to control my anomaly.”

“Is that all? Learn how to control your power and…then what? We pack up your stuff and send you on your way home, with the power of God in the palm of your hand?”

“I know it won’t be that simple.”

“That’s simple to you?”

“No, I…no.” She took a deep breath and uncle chef her fists. She looked anywhere but the lake to find strength.

“If these are powers I can control, then that means I can use them to help people.”

“Oh of course, you&#39;re an altruist, cursed by fate with a horrid anomaly. BUT! Unlike all the thousands of skips before her she wants to help people. Moves me to tears.”

“…I’m not stupid.”

“Then who you’re trying to help?”

The W-

**우르릉!**

“My family! My H- grandmother she.”

“You think you&#39;ll be seeing her anytime soon? Even then, she won&#39;t be kicking by the time you learn anything.”

“…I know that! She has a…garden? Yes! I used to help her with my brother. We’d go there every summer.” 

“Sounds delightful.” 

“Yea I loved those trips…”

Wait, focus!

“But Karl said there were important people, people who were sick like me, but worked hard and became H-“ 

Don’t be childish. Not now.

“Responsible people.”

“Responsible people?”

“Yes.”

“What do you mean by responsible people?”

“…Someone who chooses to do the right thing for others. Even if they could do the wrong thing.&#34;

“Even if it’d be easy to do the wrong thing? 

&#34;Yes.&#34;

&#34;Like a superhero?”

“Yes!”

Wait!

“You really plan on making my job harder.” Adams sighed.

“What? No!” Why was she messing with her like this?

“I’ll tell you why. In fact, I’m going to tell you a lot of things. Very important things, ok.” She pointed to her ears.

Time to nod and be quiet.

“It doesn’t matter how special you think you are you were picked for a purpose, it wasn’t your purpose to be picked.“ She chuckled to herself, a verbal self pat on the back not lost to the young SCP.

“I know that. I’m not stupid.” She didn’t need to be reminded she sucked.

“No, you’re a little brat with more issues than I can count. That means the safest thing you could do is learn how to never use those abilities for anything again.”

“Yes! That’s all I want! To be able to do things without this stupid anomaly stopping me or making me a bad girl! I’d do anything to be normal again!” 

“Anything? Wow, that got you excited, didn’t it?”

“…I’m not-“

“Stupid, didn’t say you were. Maybe gullible.”

Another word for stupid.

“I don’t want to be some superhero. Or a soldier, I don’t want to be here at all!&#34; She took a deep breath, finally remembering what she was here for. 

&#34;I just want control of my life back.&#34;

“Finally getting honest. Everyone here wants the same thing, but that goes out the window once you&#39;re on this side. You come to my facility with the goal of freedom or lofty dreams about saving people, and it’ll quickly become  a problem for me.” 

“Don&#39;t you mean everybody?” 

“What do you think //me//, means?” 

“Ok I get it. I’m going to be trapped forever so I shouldn’t do anything. I can do that.”

Adams slapped her own face. “Oh boy, brats are so frustrating.”

What did she do wrong now? How many words did English have for stupid? 

“If you’re so smart then how are you missing the point this badly? This isn’t some temp job or sitting in a room all day. This is work and this work is your life now. If it’s anything but that, all we’re doing is training the weapons of tomorrow.” 

“You aren’t listening to me at all! I don’t want to hurt anyone!”

“Neither do I, but what you do isn’t always about what you want. Some things you can’t write off as a mistake.”

“No! I’m not a mistake!&#34; she yelped.  &#34;I’m not a bad girl, I swear! I can do whatever you need me to do! I can’t mess it up if I just follow what you say. I’ll listen, even if it’s only y-” 

**우르릉~~!**

The rain stopped, frozen out by the crash of thunder. The boat ignored this and drifted lazily along its way as still water droplets brushed past their faces.

“Is that what you’ve got for me, Cho?” 

&#34;I’ll do whatever it takes. So yes.”

“I was hoping you wouldn’t say something like that.” She groaned.

Huh?

The boat rocked as it hit a pier.

“Alright interviews over, if you keep walking straight ahead you&#39;ll be where you need to be.&#34;

“…ok.” She feared what consequences questioning it would have.

She cautiously disembarked onto the pier, taking notes of the odd aroma in the air. It entered the nostrils sweet, but became sickening and pungent as it lingered. It only grew stronger as she continued. Not far along the path she saw it.

“Halmeoni!”

It was her house! She ran without a care for how out of place it seemed or what she had just experienced. 

“Jinaeieyo!”  

The rot in her nostrils, the blood in the water, the interrogation of Adams. It didn’t matter, she was home! She crashed into the door, and grabbed the handle. She paused for a moment, unsure why until she remembered her manners.

“Anyeonghaseyo...Gyeseyo? ” she knocked. &#34; Halmeonikkeseo, neomu bogo sipseubnida!” 

It was quiet, the mist felt thicker with each passing second, becoming syrup in her lungs and nose.

Be careful when you open the door, you&#39;ll invite everyone in and yourself out.” Granny always said that when they came. 

She felt nauseous. 

“Come back to the forest.” But that wasn’t her voice. She knew who’s it was. So she obeyed. 

The door opened, then slammed shut with a thunderclap that echoed through the familiar hallway. With each step as she entered, she felt the squelching beneath her feet. It was strong now, enough to make her vomit if it wasn&#39;t familiar.

She never thought she’d forget that face, she also thought she’d know peace once she did. Wrong as usual. It was all so wrong. So fast, and so wrong.

빵!

The first step she took after she fired was heavy, heavier than when she held the knife. The blood wasn’t as hot as it was now.

She trekked through the magma, the heat trailing to her back as their stares seared holes into it. The scratching across his clipboard scraped her ears like the scatter of rats running from the carcass.

She knelt beside him. His face was twisted…all wrong. The edges of his skull started to flatten, his eyes had sunken in, like his head had been a mask. The hole was small and crude, still singed from the entry. She didn’t need to lift it to know the damage to the back. 

She brought her quivering hands to it, what was left of it, doing her best to smother. It was hot but she couldn’t let go until it was finished. When there was nothing left to burn, she brought her stained palms to her face. She only caught a glimpse of his, but it was enough. She knew.
His eyes regained their depth, the wound became much smaller, and there was breath. Struggling. Because she had failed again.

“I’m-”

She didn’t move her hands from her face. Not when she felt how warm and wet they were. Not when it felt like it would melt her. Its how it always felt. As the voices spoke in worried tones, as her peers danced and mocked, how those she looks up to look down in displeasure.

Scorching heat. That continued to burn.

“Well that was an unexpected result. Seems the secondary effect will go as far as necessary to keep the task inco-“.

He stopped his muttering when he noticed her bump into him, her hands still covering her face.

“Please…tell me again. I can do it. I can kill him. Please…”

“That’s enough 2599, now-”

“NO!” 

&#34;2599!&#34;

&#34;NO NO NO NO NOOOOOOOOOOOOO!&#34; She put her hands on her ears, muffling the sound further with the blood seeping into them.

“2599!”

“NOOOOOOOOOOOOOOOOOO!”

“Knock it off you little…” The gun in the woman&#39;s hand  was still hot from the shot fired. 

“It&#39;s fine, Lyla just let her calm down and-”

빵!

“FUCK SHE GOT ME IN THE LEG! THE LITTLE BITCH!”

She picked up the tool and ran to the breathing carcass.

빵! 빵! 빵!

She had fired over a thousand times in her heart, but her fingers refused to move.

“2599! STOP THIS RIGHT NOW!”

She froze. Not a cell in her body stirred.

“…Ok. D-drop the gun.”

The gun hit the floor instantly.

“…turn around.&#34;

She faced him.

&#34;Now come here.&#34;

She walked with perfect symmetry to him.

“Ok, now…now apologize to Lyla.&#34;

&#34;I&#39;m sorry Ms. Lyla.&#34;

“What the fuck are you waiting for? Clear her memory already!” 

“Hang on, this…this is progress. Her secondary effect wasn’t triggered. We shouldn’t ignore the chance to-“

“SHE FUCKING SHOT ME! We need to keep these things in check! Did you forget about what happened with 2006? About that damn witch and all these-”

“That’s exactly why! We can’t contain any of these things if we can’t understand how they tick. My job is to research how they function, your job is to keep them from ending my research. One of us has to be responsible.”

“What’s the matter with you? Do you think any one is going to let you-”

“Is she bothering you Dr. Wensley? I can make her go away.”

“Hell no! Listen you little shit, f-&#34;

She clung behind the Doctor with a whimper. Dr. Wensley covered the girl&#39;s ears. “That’s enough Lyla. Secure, //Contain// and Protect.&#34;  He uncovered her ears and leaned in. &#34;You know better than to try and abandon us again right, 2599?”

“Yes sir!”

“You’re not serious. You can’t be serious!”

“I take my job  and therefore my life very seriously. I&#39;ve found an undeniable breakthrough. That is all. Take some time off, Lyla. Medical will be in soon, have them look at your leg. I have work to do. Come 2599, back to your containment.”

“Yes Dr. Wensley.”

“You’re actually fucking serious?”

Zena stared at the woman clinch her leg in disbelief as she and the Doctor walked away. She became smaller and smaller as a mob of rabbits passed by them with gurneys and medical equipment.

“That was good…right?”

“Well, I don’t approve of you acting on your own like that, but when you listened perfectly to what I told you, you made me very proud.”

She smiled as he opened the door. He looked around.

“As long as you listen to me…” He knelt to her level. “To //me//, ok? I can help you. Now wait in your room.&#34;

She hugged him tightly and hopped to the bed.

“Ok! I’ll make sure they die next time!&#34;

She lingered there, her smile fading slowly as the cold began to chill her back. Her arms came closer and closer together. She couldn&#39;t feel the bed anymore, instead sinking to the floor. Her head was buried in her arms and knees.
