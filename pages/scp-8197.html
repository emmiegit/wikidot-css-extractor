__//**Special Containment Procedures**//__

SCP-8197 must be kept in a reinforced theropod-class containment enclosure measuring //60 m × 40 m × 15 m//, constructed of //high-density alloy mesh// and //triple-layer// observation glass.
The habitat is to simulate a natural forested environment, such as where SCP-8197 was first located, so it feels at home and less stressed. 
And, __at all times__, must be around //18–22 °C//      

Personnel entering SCP-8197’s chamber must undergo //Level-3 clearance authorization// and //remain under constant observation// from the upper control platform. __//No more than two individuals are to enter the enclosure at once.//__

Feeding occurs //twice// weekly with __//live//__ Elk.

In the event of agitation or containment breach indicators //(rapid bioluminescent activity)//, SCP-8197 is to be calmed using //low-frequency sound emitters tuned to __27 Hz__//, which have been shown to induce a subdued state.


__**//Description//**__
SCP-8197 is a large, bipedal, theropod-like organism approximately //9 m in length and 3 m tall at the head.// Morphologically //similar to Maip macrothorax//, SCP-8197 possesses dense feathers and quills all over it&#39;s back and tail, believed to aid in temperature regulation.
[[f&lt;image https://tse1.mm.bing.net/th/id/OIP.1HOZHvHisRXeD9qIKLQ4PwHaDv?cb=ucfimg2ucfimg=1&amp;rs=1&amp;pid=ImgDetMain&amp;o=7&amp;rm=3]]
The entity’s coloration is //grey at the base, darkening toward the head//, with a //series of blue, vein-like luminescent structures visible beneath the skin along the torso and throat//. These luminescent veins //pulse in synchronization with the creature’s heartbeat//, intensifying during //stress or aggression//. The function of this phenomenon is //undetermined// but hypothesized to be related to //communication or emotional display//. Eyes are dark green with vertical pupils.

SCP-8197 possesses a //proportionally large skull// housing numerous serrated teeth capable of //exerting an estimated bite force of 3 000 psi//. The forelimbs terminate in three elongated claws capable of //inflicting severe trauma//; hind limbs exhibit //strong musculature enabling bursts of speed up to 38 mph//.


__//**Behavioural Summary:**//__

At first: SCP-8197 was extremely //aggressive and attempted to attack any personnel or mechanical presence in sight//, displaying signs of //disorientation consistent with post-traumatic environmental shock.//
Now: SCP-8197 demonstrates significantly //reduced hostility//, showing //curiosity and limited social recognition toward specific handlers//. Bioluminescent activity slows markedly when //interacting with __familiar__ staff//, suggesting lowered stress and adaptive trust responses.


__//**Addendum 8197-A – Discovery:**//__

SCP-8197 was recovered on 12 / 6 / 2012 following reports of sightings of a //large reptilian animal// at //&#34;Great Bear lake&#34;, Canada//. Mobile Task Force Eta-6 located the entity at the edge of the lake drinking. The moment it was shot with one of the darts, it bolted to the forest, luckily it didn&#39;t take long for the anaesthetic to take affect and slow it down. Tranquilization required four high-yield anaesthetic darts and two reinforced containment vehicles for transport to Site-65.


[[div class=&#34;blockquote&#34;]]

__//**Class-D experiment 1.**//__

----
Date: 12 / 7 / 2012
Time: 14:00
----
__Researcher Involved.__
**Dr. Elijah**
__Class-D Involved.__
**D-7712**
----
[BEGIN LOG]

**Dr. Elijah:** &#34;D-7712, you may now enter SCP-8197&#39;s containment.&#34;
**D-7712:** &#34;OK, so what actually //do// you want me to do once I go in?&#34;
**Dr. Elijah:** &#34;Just do whatever, really. Just stay as calm as possible while doing what you do, we&#39;re just merely looking for a reaction from SCP-8197.
**D-7712:** &#34;Alright..&#34;

[D-7712 enters SCP-8197&#39;s containment]

**D-7712:** &#34;So what am I exactly in here with..?&#34;
**Dr. Elijah:** &#34;That does not concern you. Carry on with what you are doing.&#34;
**D-7712:** &#34;Well, it clearly DOES concern me!&#34;
**Dr. Elijah:** &#34;Just stay focused and calm. Could you got further to the back of the containment, close to the foliage.&#34;
**D-7712:** &#34;Sure.. I guess..&#34;

[D-7712 goes further into the containment, coming to a full stop.]

**Dr. Elijah:** &#34;Everything alright in there, D-7712?&#34;
**D-7712:** [trembling] &#34;I-.. I can see it...&#34;
**Dr. Elijah:** &#34;Good, now can you tell me what it&#39;s doing right now? And remember, try to stay as calm as possible.&#34;
**D-7712:** &#34;It&#39;s just.. Staring at me.. Crouched low to the ground..&#34;
**Dr. Elijah:** &#34;So it&#39;s seen you?
**D-7712:** &#34;..Yes..&#34;
**Dr. Elijah:** &#34;Okay, this is going to sound stupid, but.. I want you to approach it slowly, and while doing so, tell me how it&#39;s reacting to your presence.&#34;
**D-7712:** &#34;You&#39;ve gotta be kidding me.. I&#39;m not getting any closer than I am already.&#34;

[D-7712 starts to walk to the containment exit.]

**Dr. Elijah:** &#34;What do you think you&#39;re doing?! Get back there now!&#34;
**D-7712:** &#34;I am NOT going to do any more you tell me t-&#34;

[SCP-8197 quickly snatches and drags D-7712 into the foliage.]

[END LOG]
----
__//**Post-Experiment Note:**//__
  
Following Incident 8197-01, D-7712 was declared deceased. Recovery of D-7712’s body was deemed unsafe due to SCP-8197’s heightened aggression.  
Approximately three hours after the event, SCP-8197’s bioluminescent markings were observed pulsing at an accelerated rate before gradually returning to baseline. Researchers speculate this response may be stress-related or a display of agitation.  

Further testing involving live human subjects has been temporarily suspended pending review by Site Command.
----
[[/div]]


//__**SCP-8197&#39;s Current Status:**__//

SCP-8197 remains //contained//. Continued behavioural and neurological monitoring is authorized to evaluate its potential for higher cognitive processing and emotional learning.
