    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>[[&gt;]]
[[module Rate]]
[[/&gt;]]

Within the Imperial Church, a schism occurred. In the very world from which the first and last Grand Master of the Order of the Temple of Solomon originated, the first uprising arose — the first deviation from faith. One of the trusted servants of His Holiness of the Imperial and Universal Church Alpha-3 [[footnote]][https://scp-wiki.wikidot.com/scp-7503/ SCP-7503][[/footnote]], Christian I, initiated one of the major rebellions in Theta-0 quadrant, within the Bernoulli constellation. It shook the Imperial Empire and began to rapidly spread within SCP-7503. They called themselves the Orthodox Imperial Church, which called for mercy toward other peoples and for the supremacy of the Bible over Church dogma, as well as the recognition of the Holy Trinity.

Christian I and his proud guard of the beatified captured planetarium after planetarium [[footnote]]A planetarium is a network of planets within a system[[/footnote]], advancing toward the center of all SCPC [[footnote]]SCPC — Imperial Occult Service[[/footnote]], seeking to halt expansion into other worlds. The Imperial Church could not understand how its greatest warriors had turned against the Universal Church. Hundreds of strongholds, manned by the blessed, fell under the assault of their own comrades, whose slogan was: “Only the Holy Order of the Templars can make the Catholic Church free!” And this led to what became both the beginning and the end of the greatest parasite of the multiverse.

Christian, together with the blessed, carrying their proud banner, broke into the largest cathedral of the Imperial Church in quadrant █████, announcing to His Holiness the arrival of the militia. He dismissed the Swiss Guard, wishing to meet Christian face to face. A colossal skeletal entity, standing at 50 derkins in height [[footnote]]1 derkin = 2.2 meters[[/footnote]]. Its body, like vines, was adorned with golden ornaments forged specifically for it thousands of years ago, when the Xia Dynasty fell. And it moved toward the comparatively small Grand Master, having traversed a vast portion of the Milky Way personally to reach him.

The moment it began to move, the Imperial Church rallied its forces within seconds and began crushing Christian’s militia. Countless stars exploded, along with the rebels’ hope for a more humane Church. But the Grand Master pressed forward, and he arrived. He stood clad in a white reliquary, adorned with numerous golden ornaments. In his eyes were hope for victory and faith in God. He knew he would not win the war he had begun, but by sacrificing himself, he would save billions.

A thunderous sound echoed through the grand hall. On one side stood the Grand Master, and on the other — a vast entity, for which Christian appeared no more than an insect. Yet it chose to listen. The Grand Master addressed it, threatening retribution and declaring his readiness to sacrifice himself. His Holiness merely smirked, but lowered itself to the ground — not out of respect, but to hear the doctrines of the rebel, behind whom the Imperial Guard began to gather, having already crushed Christian’s forces.

Christian, in turn, began to call upon His Holiness to come to reason, and it paused in thought. Its immense body controlled the entirety of the Imperial fleet and all expansion into other realms, destined to be cleansed of heresy. It was not human and had never sought to be. It was merely a mechanism, meant to grant its people — Christianity — a perfect existence through the atonement of heresy, for its complete understanding. It had given humanity everything except what it could never provide — truth. His Holiness relied upon the most sacred and fundamental scripture in existence — the Bible, for it was God who granted the grace for it to be written, and it was He who called for what His Holiness itself could not fulfill.

It remained unknown how the Grand Master had risen, and how the Templars had followed. But at one moment, His Holiness looked upon the Grand Master and noticed a white cloak. Upon it were red crosses and golden elements from the Solomonic era. It recognized them instantly, understanding that the uprising had occurred by the will of the Almighty — to bring it to reason. This was an attempt by the true Creator to correct His servant — and it heard it. It came to understand what it meant to be human, and it was able to hear a human.

His Holiness ceased to trust itself. It trembled from a feeling so foreign, something not meant for the already dead. Yet it understood, and that was what mattered most. It heard the Grand Master, but no longer knew to whom it could entrust what must be carried on. And the Holy One of the Universal Council acknowledged him. It recognized a new ecclesiastical jurisdiction — the Order of Christ and the Temple of Solomon — as truth, and passed its legacy to the one who had brought the Word of God to it. It acknowledged a successor, and thus a covenant was formed — a covenant of universal scale.

The Grand Master was granted equal authority over all of Alpha-3, and even more — everywhere the presence of His Holiness and its fleets had reached. Those territories renounced their prior authority and came under the jurisdiction of the Holy Order of the Templars, which would never be disbanded, but instead legitimized. Christian, as the successor, was to receive his own leader as a servant, for to be a leader, one must be a servant. This advisor would aid him in governance, so that Christian, even while still in the flesh across other worlds, could bring truth to others — the truth that His Holiness had failed to understand. And this truth was acknowledged. The Grand Master agreed to sacrifice everything he had for the sake of millions.

The stronghold of heresy within the clergy was overcome, and the uprising was transformed. His Holiness recognized all that was tied to the Holy Trinity, for it is truth, and agreed to the rights and freedoms of humanity. Yet the Empire did not fall — on the contrary, it became stronger, more united, more enlightened. This led to a surge of scientific inspiration and the subsequent free development of the Imperial Church. This era came to be known as the Infinite Age, for it did not mark the end of the war against heresy, but its victory.

Everywhere His Holiness and its Fleet had once reached, Christian, from the moment of his birth, was endowed with the rights and title of Grand Master — a title he had earned. And as a child, he did not yet understand how devoted he was to God, nor how great he would become for humanity. Everything unfolded as His Holiness had desired, for there would be no force capable of opposing it… except itself.</textarea></pre>
