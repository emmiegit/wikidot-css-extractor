    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>**Statement from D-39203**

&gt; I did what you told me, okay? Soon as I stepped through, I tried to step back. It didn&#39;t work. 
&gt; 
&gt; I was in... some neighborhood. I didn&#39;t recognize it. The houses all looked like each other, with tan stucco and brown tile roofs, all the same.
&gt; 
&gt; It was hot. So fucking hot. Like the worst summer day you ever had. I went up to one of the houses, trying to see if someone in there would let me use their phone. I went to knock on the door, and I realized it wasn&#39;t real. It was just painted on. The windows, too. 
&gt; 
&gt; I ran to the next one. Same thing. And the one after that, all of them. I looked down the road, and it went as far as I could see. I just started running. My mouth was dry, it was so hot I couldn&#39;t even tell I was sweating because it dried so quickly.
&gt; 
&gt; I started to black out, but I tried one last door. It opened, and I fell and I was here again.

[https://scp-wiki.wikidot.com/scp-9393/offset/#anchor11 Return.]</textarea></pre>
