    <pre><textarea class="page-source" readonly>[[&gt;]]

It&#39;s a quiet Monday night in Lansing, Michigan. 

Two 19-year-old roommates, Dan and Mike, are in front of their desks. Dan is almost half-asleep, but Mike has been staring at his computer for almost four hours. 

Mike saw something this morning. A small van with three letters engraved to it&#39;s side. S, C, P. He had no idea what it meant, but he was determined to figure it out. 

He dashed to his computer as soon as he got home from school. He searched up the three letters immediately, only to find all sorts of irrelevant companies: laundry machines, pest exterminators, even a hospital that specialized on hemorrhoids. 

However there was no stopping Mike from finding what he saw. Again and again and again, he searched all the corners of the Internet, to find the truth. 

One site. 

&#34;The S.C.P Foundation.&#34;

Foundation. As soon as Mike saw that word he knew he had found it.

Mike screams to his roommate that was at this point one with his table. 

&#34;Dan. Dan!&#34; 

Dan wakes up startled. A long string of saliva can be seen stuck to his left cheek.

&#34;Wh-What?&#34; 

&#34;I-I found it!&#34;

Excited, Mike shows his screen to Dan. Dan stands up and rushes to Mike&#39;s desk.

Dan reads the front page of the site, and has his suspicions.

&#34;The Foundation database is classified.... you sure we&#39;re allowed to do this?&#34;

Mike thinks for a moment. 

&#34;Fuck it. Who cares? This is fucking awesome dude. Wow, so much shit I can click on.... What should I try first?&#34;

Dan points to the first article on the site.

&#34;SCP-001. Try that one.&#34;

Mike clicks the article to see a giant, red warning at the top.

&#34;Top secret, the following files have been classified by order of the administrator, blah, blah, blah.&#34;

Mike scrolls down the page without reading the rest of the warning. The screen flashes a bright shade of orange.

{{[[UNAUTHORIZED PERSONNEL DETECTED]]}}

{{[[ACTIVATING MEMENTIC KILL AGENT]]}}

&#34;What the fu-&#34;</textarea></pre>
