++++ NOTICE FROM THE FOUNDATION RECORDS AND INFORMATION SECURITY ADMINISTRATION

Pleading the injury sustained by Researcher Benbrook, Dr. Gornell acquired Class-Z Mnestic clearance. He administered it to a Class-D personnel, D-4880, in conjunction with another use of a //Creighton Projection Engine//. This Class-D personnel&#39;s memetic knowledge was minimal, so pre-recorded data from Researcher Benbrook&#39;s brainwaves were utilised to allow D-4880 to access SCP-9179.

[[/=]]

**Item #:** SCP-9179

**Object Class:** Apollyon[[footnote]]RAISA added context: It is worth noting that the Projection Engine was active throughout the entire writing of this iteration. Meaning, much like the final lines of previous iterations, this object class was likely assigned by SCP-9179 itself.[[/footnote]]

**Special Containment Procedures:** SCP-9179 cannot be contained. SCP-9179 is a lethal infohazard and experimentation must be abandoned. All research must be purged and staff amnesticized.[[footnote]]See above. D-4880 would have no knowledge of this terminology.[[/footnote]]
