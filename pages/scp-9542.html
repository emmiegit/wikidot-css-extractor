**Item #:** SCP-9542

**Object Class:** Euclid

**Special Containment Procedures:** SCP-9542 is kept in an Oversized Humanoid Containment Cell at Site-37 with standard amenities. Under no circumstances may it be given unsupervised access to cutting, piercing, or writing implements.

SCP-9542 has been granted enhanced library privileges (two books per week, no content restrictions) and access to a desktop computer with limited internet access (fully supervised, standard whitelist) in exchange for advising Site-37&#39;s surgical department, contingent on good behavior.

Staff may not interact with SCP-9542 except in groups of three or more, and may not remove it from its cell without the presence of a full security detail. Additionally, staff must take care not to engage with any statements made by SCP-9542 that are hypothetical, rhetorical, fictitious, or dishonest in nature. Staff who may have been affected by SCP-9542&#39;s mind-altering abilities will be subject to psychological evaluation and potential reassignment.

Twice per month, SCP-9542 should be provided with 1.0 kilograms of tissue from a recently deceased cadaver and one hour of access to one of Site-37&#39;s surgical theaters. Materials from feet and legs are preferred, though other limbs are permitted in the event of a shortage. An inventory must be taken of the theater&#39;s contents before and after SCP-9542&#39;s visit to ensure that it cannot steal surgical implements.

**Description:** SCP-9542 is a human of indeterminate age who has had numerous functional limbs and appendages grafted to its body at various points. Its most notable features are as follows:

* SCP-9542&#39;s arms, legs, hands, and feet are elongated by 80-120% and contain 1-3 extra joints each. Four additional hearts are located in its &#39;primary&#39; elbows and knees, apparently to ensure consistent blood flow to SCP-9542&#39;s appendages.

* Three separate forearms, with associated hands, are attached to each of SCP-9542&#39;s distal elbows. Each of these hands has six fingers and two toes. SCP-9542 uses its three right hands for most tasks; its three left hands translate all of SCP-9542&#39;s vocalizations into written German, written English, and an idiosyncratic sign language.

* SCP-9542&#39;s tailbone terminates in a knee attached to a leg and foot, which extend 0.6 meters outwards. SCP-9542 prefers to rest on this limb, rather than on furniture, except when sleeping.

* A cavity in SCP-9542&#39;s jaw contains two nine-jointed fingers that can be extended from an opening under SCP-9542&#39;s tongue. These have been observed performing oral hygiene tasks, removing choking hazards, and assisting in surgical modifications to SCP-9542&#39;s jaw and neck.

* SCP-9542&#39;s middle toe on its right foot is extended with material from 398 other toes, totaling 3.6 meters in length. SCP-9542 uses this appendage primarily to interact with objects outside of its immediate vicinity, leaving it coiled tightly when not in use.

* 137 fingers are attached directly to SCP-9542&#39;s back. SCP-9542 cannot consciously control these fingers; they will move sporadically in response to physical stimuli (heat, contact, etc.) and heightened emotional states.

SCP-9542&#39;s weight ranges between 275 and 325 kg, depending on its exact configuration of limbs at any given time. A detailed account of SCP-9542&#39;s anatomy is available in Appendix C.

When SCP-9542 is injured, cells near the wound will revert to pluripotent stem cells which quickly reproduce and differentiate into other cell types as necessary to heal it completely. If recently dead human body parts are held in contact with tissue undergoing this process, SCP-9542&#39;s cells will invade the foreign tissue and incorporate that material into its body. While added tissue will adhere to SCP-9542 within minutes, the formation of all connections necessary to render the added tissues functional (neural, vascular, muscular, etc.) generally takes 1-3 weeks. Cells from the new flesh will diffuse through its body over the course of several years; SCP-9542&#39;s immune system, while normally functional, does not reject any new human tissue.

SCP-9542 will actively seek out opportunities to graft human limbs and appendages onto its body. If new tissue is not added to its body regularly, tumors will develop in its extremities and grow until they are amputated. Generally, 5-10kg of tissue must be removed for each month that SCP-9542 goes without receiving new materials. At time of writing, SCP-9542 is a chimera of at least 430 separate humans.

----

SCP-9542 possesses highly elevated linguistic, social, and spatial intelligence; in particular, SCP-9542 is highly adept at tasks related to storytelling. SCP-9542 is fluent in Dutch, English, Frisian, German, Greek, Latin, Russian, Spanish, Welsh, and Yiddish, as well as the constructed languages Esperanto, Klingon, Láadan, Quenya, Sindarin, Volapük, and at least three languages devised by SCP-9542 itself.

SCP-9542 is capable of low-level hypnosis through collaborative storytelling; any person who works with SCP-9542 to create a fictional narrative, and is exposed to material produced by SCP-9542 in the process, is susceptible to this effect. This has been established to occur whether the collaboration is carried out in person or remotely, and whether it is done synchronously or asynchronously.

SCP-9542 can adjust the worldview of its collaborators by rendering a story&#39;s setting or characters in a manner slightly different than what the subject would consider &#39;realistic&#39;. Subjects affected this way will view the changes as plausible and desirable, adjusting their own thought processes to match. While this effect is minor, it is cumulative, allowing SCP-9542 to shape a victim&#39;s perception of reality drastically over the course of an extended collaboration. The victim will remain unaware of how SCP-9542 is affecting them and are difficult to convince of the matter. Speculative fiction (sci-fi, fantasy, horror, etc.) is much more effective than other genres, as SCP-9542 can use the fantastic setting to justify more dramatic deviations from reality.

SCP-9542 will attempt to acquire new limbs by convincing its collaborators to amputate their own limbs or those of others. It will vary its exact methodology to suit its victims&#39; pre-existing personality and beliefs, though it will usually induce delusions of a conspiratorial, religious, and/or medical nature.

----

**History:** SCP-9542 reports being born as the fifth son of a German noble family in 1555. SCP-9542&#39;s written works, aliases, and collaborators all number in the hundreds; its 1987 autobiography, as well as the results of the Foundation&#39;s own (inconclusive) investigation, are available upon request.

SCP-9542&#39;s most extensive collaboration in terms of volume was with horror and weird fiction author H. P. Lovecraft; the pair exchanged 3,718 letters over the course of eighteen years, focusing on matters of race, science, and literary technique. SCP-9542&#39;s contributions to Lovecraft&#39;s &#34;Cthulhu Mythos&#34; allowed it to convince Lovecraft and several of his contemporaries that their non-dominant hands posed an impediment to their writing abilities, thus inducing them to remove the offending appendages. SCP-9542 claims to still use Lovecraft&#39;s left hand to transcribe its speech into English.

SCP-9542&#39;s longest-lasting interpersonal relationship, ranging from 1933 to 1972, was with fantasy author J. R. R. Tolkien. SCP-9542 and Tolkien&#39;s discussions typically focused on linguistics; in particular, SCP-9542 assisted Tolkien in the development of several constructed languages, including several that would later appear in //Lord of the Rings//. SCP-9542 claims that it made no effort to affect Tolkien&#39;s mind, describing their relationship as &#34;strictly for the sake of mutual enlightenment&#34;.

SCP-9542 came to the Foundation&#39;s attention in 1976, following its involvement in the &#34;Pepper Pike D&amp;D Murders&#34;. SCP-9542 had become involved with four teenagers in Pepper Pike, Ohio, and convinced them to join it in a campaign of the recently-published //Dungeons &amp; Dragons// roleplaying game; the campaign lasted for eight months, with SCP-9542 as the group&#39;s &#34;dungeon master&#34;.

Over time, SCP-9542 was able to convince its victims that their family members had been replaced by malicious homunculi which could only be destroyed through a particular Satanic ritual. SCP-9542 provided assistance in exchange for the limbs that would be amputated during the ritual. On August 23rd, the teenagers murdered nine of their close family members in a ritualistic fashion; the events received international media coverage due to their scale and gruesome nature. The actions of the victims were popularly attributed to an obsession with //Dungeons &amp; Dragons//.

SCP-9542 successfully avoided scrutiny from media or law enforcement in the aftermath of the murders, having convinced its players to take full credit for the scheme, but a Foundation-led inquiry was able to locate SCP-9542 and contain it without incident. While the Pepper Pike D&amp;D Murders were successfully erased from the historical record and popular memory, many civilians continued to subconsciously associate //Dungeons &amp; Dragons// with delusions and ritualistic murder, fueling unrelated controversies regarding the game.

In the thirty-two years since its containment, SCP-9542 has written thirteen novels and completed sixty-one short stories in various genres of speculative fiction. These documents have been shown to have no anomalous properties, and have since been published under various aliases as an additional source of revenue for the Foundation.
