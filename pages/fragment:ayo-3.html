This office had more color than her room. The chairs were a lot comfier too. A light blue shade along the walls, a small brown rug and two bookcases with every gapped filled. It even had a lingering scent of coffee and dust. A familiar scent. It was always testing rooms or just her room before. It finally feels like a real place.

Well except for that strange chandelier. It hung low and shined so brightly, she couldn&#39;t tell where the bulbs were. Every now and then it would chirp like a baby bird.

There was a security guard by the door, and with them were usually cameras. She felt making a game of figuring out where they were would ease her tension, but she couldn’t find them in this room. She had to be at her best during the testing then.

It looked like the guard was trying to hide his gun, but it was too big to hide, even behind his broad back.

She wasn’t used to security guards carrying such large weapons, even the guards back home  didn’t carry ones that scary. But it did make some sense given what she heard. It wasn’t much, just conversations between the guards she&#39;d catch when they forgot she was around. But it made more sense than what Dr. Wensley would tell her. The hardest part was acting like she didn’t notice him staring. Hopefully he’d go away when they got started.

She helped herself to one of the books to calm her nerves.

It was a book about fae that made her nostalgic. It looked like a storybook, but the language was more textbook, detailing fairies and their history and societies. The images were like portals, more photographs than paint. The fairies in the book took on all kinds of shapes, changing from person to animal to creatures she had never seen. The man with the rabbit head was her favorite. 

“산~토끼 토끼야~…” She sang quietly exploring the pages.

Dad told her he had met fairies before, and they were like people; complicated. Mom didn&#39;t believe any of it though; even when 할머니 would sing songs about them. Maybe a fairy cursed her to be dumb. That //would// be a lot harder than studying a disease. 

“…can’t be done!”

The handle began to twist as the muffled conversation leaked into the room. She placed the book back on the shelf and flung herself back into her seat.

She slapped her cheeks a few times to fill her mind and body with the power of effort.

“Don’t be so nervous, Albert. The future has never been more secure.” He jauntily strolled as his old joints would allow with a bag draped around his shoulder.

“Good morning Karl!”

He shuffled in his step for a moment, almost dropping the papers he had in his hand. He then replied with a smile of his own.

“Good morning, Zena!”

Zena? …oh yea that’s right. Zena! Effort paying off already

Karl nodded to the security guard. He replied with a nod of his own and stepped out of the room. 

“It’s good to see you with such spirit. Oh my? Looks like you’ve gone and grown up on me, haven&#39;t you?”

She knew it, she had gotten fat. Even with this nasty hospital food.

“Did I grow that much?” She chuckled. “It’s only been a few months.”

He took a glance at one of the papers and placed a hand on his head astonished.

“Ah, I suppose it has! Eyes have a way of tricking you as you get old.” He pulled out the chair across from her, placing the papers in a folder. “It’s easy to forget to cherish youth when you have it. Then, before you know it, you’re all old and bald.” 

“It’s ok to be old!&#34; She said as if he injured himself. &#34;But hehe, I don&#39;t want to go bald.”

“Well, you have a long life ahead of you.&#34; He said smiling as she touched her head with both her hands. &#34;So no need to worry...too soon.” He chuckled as he finished storing the papers neatly.

“Yea and the more tests we do, the sooner I&#39;ll get better. Then, I can go home.”

“Ah yes, that’s always the plan, isn&#39;t it?” He pulled his chair back closer to the desk.

“Yea. I mean when I’m not sick anymore I can go home, right?”

“Have you been feeling sick?”

“Huh? Oh no no no! I mean, my problem. My being horrible-at-everything disease. It’s why I’m here, right?”

“It is. But there is so much more to it than that. We have a lot to talk about today, but before any of that…” He gently folded his hands on the table as he got comfortable in his seat.

“Is there anything you’d like to ask me? I can only imagine how many questions you have.”

“I’m not…”

She did have a ton of questions, but she usually got the same kinds of answers. Karl was nice, but she didn’t want to bother him with questions he wasn’t allowed to answer. He’d probably even get in trouble because she said the wrong thing.

“No. I’m a-actually more excited than anything!” She flashed her best smile.

Karl restored his own. He reached back into his bag beside him.

“Well as always, you’re free to ask me whatever is on your mind. Oh, I hope you like this office by the way. I had it arranged from our typical cream affair.” He strained a bit, what he sought just out of reach.

“Much cozier don’t you think? You said you were a bookworm in school so I figured I would take it upon myself to surprise you with—”

He glanced at her wide eyed stare and stopped his rambling.

“Actually.” He cleared his throat. &#34;I’m sure your concerns lie a bit deeper than décor, we don&#39;t need to go on about any of that.”

“Its ok. No one really talks to me about anything anymore and it sounds like you put a lot of thought into all this. I really appreciate it!&#34;

&#34;Really?&#34; He paused his rummaging. &#34;I was sure they would have found better options than that silly— I&#39;m sorry to hear that. Really.&#34;

&#34;It&#39;s fine, I get it.&#34; She started looking at the ground. &#34;I get it. Its not safe for me or any of the skips.&#34;

“Skips?&#34;

&#34;Oh!&#34; She popped up. &#34;It&#39;s what I heard some of the security guards call the patients. Is it bad? 

&#34;No, I just didn&#39;t expect terms like that to reach the ears of our patients.&#34;

&#34;Sorry, like I said they don&#39;t talk to me so I kind of eavesdropped.&#34;

&#34;Well I can&#39;t imagine personnel would talk about anything too unpleasant in the company of a child.&#34;

&#34;I&#39;ve heard…some things.&#34;

&#34;Anything in particular?&#34; He returned to his bag.

“Nothing bad!” She recoiled. “Well, it is kind of scary to think about but, I heard the other ski—patients are all weird like me. They keep using a word, I’m not sure what it means, but it seems like another word for...”

Wrong.

“Different.”

“I think the word you’re looking for is anomalous, my dear.”

“Yea that’s it!”

“Well, you’re not far off.” He pulled out a few small gadgets she couldn&#39;t quite tell what they did.

“What I can tell you is an anomaly, put simply, is something extraordinary.”

He began rubbing his glasses with a cloth he pulled out so swiftly it appeared as if he summoned it between his fingers.

“You see, anomalies can be many things. There are some that are strange and bizarre, some are just odd quirks of nature, but all of them are indeed, very, definitively different.&#34; He gently placed his glasses back to his face.

She tilted her head as she lingered on his explanation. They still didn’t sound different from diseases, just stronger ones.

“In the end, what we wish to do is the same no matter the anomaly, to understand them.&#34;

“So, they really are dangerous?”

“Some of them are, until we get to know them. That is why we do the research we do, so we can take steps to ensure that an anomaly is no longer a threat.”

So //**she**// was really dangerous. She had a feeling, it made her stomach turn just thinking about it, but as she slunk deeper into her seat each word made it clearer.

“Then, that’s why I can’t see my family then, right?” She trembled, not looking away from the desk below her.

He was quiet, leaning back woefully in his chair. With a heavy sigh he spoke
 
“I’m sorry Zena, th—.”

Her head fell into the desk with a thud.
,,//##E8E9E8|Make sure she never tries this again.##//,,

“Why?”

“We’re here to study the why, and the how as well as—”

“I mean why—”

Her? What did she do wrong?

“...did this happen? How did I get sick?&#34;

“Zena, can you take a deep breath for me?”

She raised her head and inhaled but as she tried to exhale, she coughed.

“You’ve done nothing wrong, my dear. We’re not always sure why anomalies happen to certain people, sometimes it’s a simple matter of time and place. Sometimes it’s mere fortune at play.”

He put a hand on her shoulder.

“But what you have does not have to be a curse. I&#39;d say your anomaly is one of the luckier cases that I’ve seen.”

“It doesn’t feel lucky. I just suck at everything.”

&#34;Oh Zena.”

Right. That’s not what he wanted to hear. She had to try harder.

“I understand you see these abilities as a curse, but I’d like to ask you to trust me to conduct our test before continuing our discussion on the matter. Can we try that Zena?&#34;

She nodded. Not like she had a choice.

“Thank you. I think it may change your perspective, yet.  That makes all the difference concerning anomalies, you know.”

The tests. She just had to show she wasn’t dangerous. That she wasn’t an anomaly.
,,//##E8E9E8|You&#39;re a lady act like it!##//,,

She shuffled in her seat, starting to feel a chill in her spine as he pulled out three Rubik’s cubes from the bag, placing each on the desk. They were all shuffled differently.

“Now, you said your record in middle school was 7 seconds. I think we can beat that today.”

Three chances. Three chances to embarrass herself.

“Today’s test will be a little different. If you concentrate and listen carefully, we are sure to get results.”

Three chances.

“Now, Zena.” He cleared his throat and tapped the left most cube. “Would you kindly solve this cube in 6 seconds or less?”

Her eyes twitched. She picked up the cube slowly. Once she had placed her other hand upon it, she began shuffling its sides around with fervor. It wasn’t long before she placed the cube back on the table with its siblings. Karl clicked his stopwatch in step with the chirp of the chandelier.

“5.23 seconds, excellently done.”

“No, its—”

“I asked for 6 seconds or less and you succeeded, that’s progress.”

“But…” it wasn’t complete. Just a corner off. One stupid corner she couldn’t get.

“You are doing fine, Zena, we’re working towards the goal of isolating the key parts of your anomaly.”

Right that word. This was all to figure out what’s wrong with her.

“For this next cube.” He seemed careful about how he asked today.

“Please resolve this cube as accurately and quickly as you possibly can.” She froze for a moment, leaving Karl bewildered in the silence. 

Her eyes lost all their color. A twinge of sweat breached his shining head as he blinked. His eyes opened with the chirp. She was grimacing.

Karl looked back at the cube and noticed the sides had been completed.

“That was magnificent.”

“The bottom is all wrong.” Without missing a beat. She didn’t even point at it. 

He lifted the cube and indeed the final side was an array of colors.

“This is all going accordingly, it’s important you believe that as much as I do, Zena.”

“Ok…”

“Now then…”

He picked up the last one and handed it to her himself. “Resolve this cube until it is 200% complete.”

She held the cube in her hand. She focused on it, examining it with trance stillness. Karl fetched a small cloth from one of his pockets and wiped his dome.

&#34;알겠습니다&#34;

This time she started immediately, her eyes staying empty as she processed the cube.

Karl adjusted his glasses, studying her hands. He noticed that she had resolved the cube once, but her hands continued to move, splitting it again and redoing it before finally placing it on the table.

“10.27 seconds.”

Color returned to her eyes as she gazed at the cube. Each side, a nation its own color. Perfect even on the bottom as Karl noticed, lifting up the cube. Her eyes welled up.

“Remarkably done, Zena.” He said with the enthusiasm of an old wizard. 

“With perseverance and a new p—&#34;

“But it’s all wrong!” She yelled, slamming her hands on the table. She quickly covered her mouth as her cheeks flushed, noticing Karl’s look of concern.

“…sorry.”

Of course she had to do something stupid, just to embarrass herself some more. She knew that look. The confusion, the concern. Soon he was going to make excuses for her. He already had been.

His gaze left her for a moment to inspect the cube.  Up close, it seemed ordinary and complete. But he noticed the longer his eyes lingered on it, the colors began to feel somewhat…off. Like they were getting away from his eyes.

He reached into his bag and pulled out a small device, it looked like some high-tech radar. He ran it across the cube, and it began to chatter, like the bugs gathering in the summer night. 

He slowly placed it back on the table.

“I’m having trouble understanding my dear, what is wrong with it?”

“The colors on the other one.”

He looked at the other two cubes on the table. Same as ever. “I only got one side done.”

“Zena, which cube would you be talking about?”

She pointed to the cube in his hands. “The uhm other…”

His fingers caressed his chin, looking at the chandelier, puzzled. Maybe it was because it didn&#39;t chirp for a while, or that it wasn&#39;t as bright. Eventually, something seemed to finally click.

He pulled out another device, this one was much smaller. He pressed it against his glasses, and she noticed some lines appear on them. She wasn’t quite sure, her eyes were still a bit wet, but she swore the frames seemed to shrink and stretch too. He muttered something about…calibration? 

Then, he suddenly flew back, almost falling on his rear as he slid passed the chair. Did she hurt him, somehow?

“Zena, how did you see this?” He said with as little breath as he could spare.

“I…”

See? She couldn’t actually see anything but the cube. She just…knew it was wrong somehow. It had to be, she did it.

Karl’s special goggles flashed as he fawned over the cube. He took them off, rubbed his eyes, then sighed.

“My dear Zena Cho, let me begin by congratulating you on being the first human being to successfully complete a Rubik’s cube by I’d say—” He placed his glasses to his face to inspect the cube. “at least one hundred and twenty nine percent.”

Zena wiped her face one more time for good measure, before looking at the cube again. Her face contorted until she couldn’t bear to stare at it anymore and hung her head.

“That’s not 200.” She muttered.

“Perspective my dear.”

“Its not 200.”

She only heard his sigh, but she knew she was bringing his energy down. She was trying, but how could she be satisfied with…that?

“Certainly, it is not resolved by two hundred percent.” She heard the chair scrape the floor as it shifted. “If we look at it another way, I asked for 200%, an impossible task to begin with, you took that challenge head on and still managed to exceed expectation.”

“It doesn’t mean anything if it’s not done properly…”

“It means we’ve got results and with results like these we can move forward.”

“Forward?” Her head rose to see he was now pacing as he held the cube.

“Zena, what exactly is it that you believe we do here?”

She was quiet, shuffling nervously in her seat.

“It’s ok, there’s no wrong answer here.”

“You’re a hospital, right? It seems like a super secret hospital. You said my disease was called an anomaly, so it just made sense to me.”

“Well, not quite.” He stood up from his chair.

“Yes, you see anomalies in and of themselves are only dangerous as far as we lack an understanding of them. But even so there are some people and creatures who are anomalous and willingly use these abilities to harm—”


 ,,//##E8E9E8|WHAT ARE YOU WAITING FOR?##//,,
//**“FUCK! SHE GOT ME IN THE LEG!”**//
,,//##E8E9E8|THE LITTLE BITCH!##//,,


“…But where there are those who use these abilities irresponsibly, there are those who do the opposite. We aim to find afflicted persons like yourself who are unique in their want to use their anomaly responsibly.”

…

“…Zena?”

“But I can’t use my anomaly at all. I can only do what I’m told.” She couldn’t even do that.

“Zena, you just manipulated the dimensions of a cube outside of our reality without leaving any residual.”

“I don’t know what that means.” She said flatly.

“It means you have a gift, one that is used to help others, in any way you can. I find that to be a beautiful thing.”

She tried to cover her face like she just remembered she was in the middle of crying.

“I’m sorry Karl. I&#39;m acting like such a baby.”

“It is a difficult situation, there’s no shame in emotions.”

“It’s just...I really want to help; I do. But it doesn’t feel like something I can control.”

“Then tell me what it does feels like.”

“It feels like someone’s making fun of me. Like every time I try to do something this… anomaly keeps telling me I can’t do it.”

And she couldn’t.

&#34;Zena...&#34; He returned to his seat, placing the cube on the table before he began. 

“The task we are burdened with as scientist is to reason what is or isn’t possible. What I&#39;ve found as an old man who&#39;s had his hand in many an experiment, is that if there is anything in this world that is well and truly impossible, then it is merely something of no interest. We can look at failure as the end, but I prefer to see each failure as a bridge towards success. That way, when we&#39;re weary from our efforts, we can look upon our path with fondness from the other side.&#34;

He eyed her 2nd attempt on the table, indistinguishable from the 3rd. He raised it careful not to expose its shameful underside. “It’s all a matter of where you’re looking from my dear.” He tapped on a side all blue.

Her shaking finally stopped, and her chills began to warm. Only a little bit, but warmer for sure. 

&#34;I came here today for results above 100% and I have been more than satisfied.”

He seemed so excited. Even though she messed up that cube. 
These doctors have been working hard on her disease while working on so many others. It’s got to be hard on them. All she had to do is what she was told, that shouldn’t be this hard.

Even she didn’t know what she did to that cube. There’s a lot of things she had done here that she didn’t know. She didn’t even know what this building looks like and it’s been…

“Six months.”

Karl quietly listened to the girl’s words as more sweat slipped through his scalp.

“Six months and I still can’t do anything right.”

“Right, rather, success is a matter of perspective.” 

“Will perspective really help with an anomaly?”

“I believe it can. It&#39;s a major part of ontokinetics.”

“onto…”

“Hmm? Oh yes, it’s another name of what your particular anomaly is called. Reality warping— well the study of existence to be more precise.”

“Reality warping? Like some kind of comic?” She chuckled.

“Oh. I didn’t know you were into such things, Zena.”

She wasn’t that interested; she was just mad the first time she took one of Jun’s. But thinking about it now, she wished she had one of those comics now, she liked Ace the Crusader, she wondered if it was still in the sky island arc.

He pondered for a moment considering his next words. “Well if you know what comes with great power, I suppose you could use those stories as inspiration.”

Of course. This was just another thing she had to prove. How relieved would her family be if instead of coming back sick, she was able to do anything they wanted? If she was able to follow what they said perfectly? She really was lucky!

Karl leaned back in his seat, noticing the grin appearing on Zena’s face.

“Well, then, I take it we have your support?”

“Yes! I mean…what do you want me to do?”

“Well it’s not what we want you to do as much as what we wish to explore with you.”

His mouth hung open as if to continue but he stared at her with a look she wished she hadn’t recognized so well. He then reached into his bag again.

“Honestly an old man’s prattling is hardly persuasive. Please.”

He revealed a small laptop to her. At least it looked like one. It seemed anything could come out of that bag. He flipped the screen, and it turned on revealing a grainy and pixelated image. 

It eventually cleared up to reveal a massive castle stuck in a cave. The poor image quality already made it difficult to make out but as she continued to stare, she noticed little oddities, like some towers seemed to be floating, and it was hard to see where the building stopped, and the cave began.

“Introducing Auxiliary Research Facility 120! One of the SCP foundations latest and greatest installations for the sake of a greater tomorrow!”

SCP Foundation. She felt like she had heard the name of this place before, but she never saw it written on anything.

“In this little building, big brains are working with some of our most amazing SCPs; all to understand this funny little thing called reality.&#34;

As the jubilant voice spoke, the images continued to change. Faces of other doctors, different children in tattered clothes, a creature that looked like a human who didn’t know what a human was, Some monks with unfamiliar markings on their face, a girl holding a ball of light in her hands, A doll that scared her, another boy with a wide smile surrounded by smaller versions of himself. Was any of this real?

&#34;The abilities of reality warpers were tricky to figure out how to study safely, but thanks to years of dedication and the ever-advancing march of science and technological advancement, a bunch of whizkids are ready to help young people like you learn to use their abilities!”

Like a school. All she had to do was study. Of course! She could do this!

“That’s…yes! Haha yes! Please teach me!”

“There’s a nice change in tune! I know we can get you there no matter how long it takes!”

She began hopping in place. This laughter filling her lungs, the folds of her smile etched on her face, the weightlessness of her heart.  This couldn’t be real!

…

“How long will it take?”

“Well, it’s difficult to say. It may take only a few months or years.” He saw the makings of a reassured smile crease her face, but he knew why it wouldn’t bloom. 

“…But projections say it’d most likely be a decade before we could be sure.”

Of course. There it was.

 “Your anomaly is…complicated.” I’m afraid it’s not just information you need. It’s the nature of the anomalous to be difficult.” He sighed heavily before closing the laptop. &#34;But l can guarantee you will have full control of your abilities and you’ll have plenty of support. You won&#39;t be alone!&#34;

Ten years. 

“You said I can’t go home because I’m dangerous, but if I know how all this works maybe I wouldn’t suck so much. Maybe I //could// help.”

“If you help us, you would be helping the world in no small measure, I can assure you.”

“And it would mean, I’m not a dangerous anomaly, right?”

“That’s the plan!” Karl perked up.

“Ok, I’ll do it! I want to go!&#34;

“Are you certain?&#34;

“Yea, I don’t wanna see my family if I’m still messed up. I just have to try harder; I know I can do it, then…” She failed to hide her blushing face with her hands. “They’ll be so proud of me.”

With that, he gathered the cubes and his bag.

“We’re glad to continue cooperating with you Ms. Cho.” He made a gesture between a nod and a bow.

&#34;When will I see you again?&#34;

“There is due process I must abide by, but your consent today will do wonders to move things through the pipeline.” He noticed her sad and confused expression. “Just know I’ll handle the boring paperwork, so we can get you there quickly. We’ll see each other then.”

“Oh…ok…” Her eyes drifted back to the shelves of books, as she practiced the new word quietly to herself. Ten years…

“Karl!” She ran up to the shelf and after a few jumps managed to pull down a book that caught her eye. “This is it right? Ontokinetics? Can I take this book back to my room, please!“ 

It was the most flustered she had ever seen him look. He even peered over his shoulder, were cameras watching him too?

“You’re a young scholar right?” She was surprised when he knelt to her level. She nodded. “You know how a scholar treats their books right?”

“Yes sir!” 

“Then you can keep these as long as you use them appropriately.” He handed her the 2nd volume of Intro to Ontokinology.

“This doesn’t feel right. They won’t punish you?” 

“Perspective, my dear. Books are for studying, so would it not be right to use them that way?”

She started giggling, hoisting the books like stolen diamonds.

“Now stay seated. Personnel will be here to escort you back to your room shortly.” He returned each item to the bag. He made his way to the door as she sank into the seat until she was practically falling off.

“Thank you Karl!”

The security guard re-entered the room as Karl opened the door.

She failed to contain her giggling, shuffling in her chair like she had been tickled.

The guard shook his head as he adjusted the tool on his back.

 &#34;Anything to get this kid out of here huh?&#34;
