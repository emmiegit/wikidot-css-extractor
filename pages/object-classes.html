    <pre><textarea class="page-source" readonly>[[f&gt;toc]]
All anomalous objects, entities, and phenomena requiring Special Containment Procedures are assigned an Object Class. An Object Class is a part of the [[[how-to-write-an-scp|standard SCP template]]] and serves as a rough indicator for how difficult an object is to contain. In universe, Object Classes are for the purposes of identifying containment needs, research priority, budgeting, and other considerations. An SCP&#39;s Object Class is determined by a number of factors, but the most important factors are the difficulty and the purpose of its containment.

+ Primary Classes

These are the most common Object Classes used in SCP articles, and make up the bulk of the objects.

++ Safe

Safe-class SCP objects are anomalies that are easily and safely contained. This is often due to the fact that the Foundation has researched the SCP well enough that containment does not require significant resources or that the anomalies require a specific and conscious activation or trigger. Classifying an SCP as Safe, however, does not mean that handling or activating it does not pose a threat. 

For a complete list of Safe-class articles on the site, click [/system:page-tags/tag/safe here].

++ Euclid

Euclid-class SCP objects are anomalies that require more resources to contain completely or where containment isn&#39;t always reliable. Usually this is because the SCP is insufficiently understood or inherently unpredictable. Euclid is the Object Class with the greatest scope, and it&#39;s usually a safe bet that an SCP will be this class if it doesn&#39;t easily fall into any of the other standard Object Classes. 

As a note, any SCP that&#39;s [/system:page-tags/tag/autonomous autonomous] or [/system:page-tags/tag/sapient sapient] is generally classified as Euclid, due to the inherent unpredictability of an object that can act or think on its own.

For a complete list of Euclid-class articles on the site, click [/system:page-tags/tag/euclid here].

++ Keter

Keter-class SCP objects are anomalies that are exceedingly difficult to contain consistently or reliably, with containment procedures often being extensive and complex. The Foundation often can&#39;t contain these SCPs well due to not having a solid understanding of the anomaly, or lacking the technology to properly contain or counter it. A Keter SCP does not mean the SCP is dangerous, just that it is simply very difficult or costly to contain.

For a complete list of Keter-class articles on the site, click [/system:page-tags/tag/keter here].

++ Thaumiel

Thaumiel-class SCP objects are anomalies that the Foundation specifically uses to contain other SCPs. Even the mere existence of Thaumiel-class objects is classified at the highest levels of the Foundation, and their locations, functions, and current status are known to few Foundation personnel outside of the O5 Council.

For a complete list of Thaumiel-class articles on the site, click [/system:page-tags/tag/thaumiel here].

+ Secondary Classes

The following object classes are less frequently used, and designate anomalies with unusual containment requirements. These secondary classes may also be described as esoteric classes, in addition to many other esoteric classes used even less frequently.

++ Apollyon 

Apollyon-class SCP objects are anomalies that cannot be contained, are expected to breach containment imminently, or some other similar scenario. Such anomalies are usually associated with world-ending threats or a K-Class Scenario of some kind, and require a massive effort from the Foundation to deal with.

For a complete list of Apollyon-class articles on the site, click [/system:page-tags/tag/apollyon here].

++ Archon

Archon-class SCP objects are anomalies that could theoretically be contained but are best left uncontained for some reason. Archon SCPs may be a part of consensus reality that is difficult to fully contain, or may have adverse effects if put into containment. These SCPs are not uncontainable - the defining feature of the class is that the Foundation chooses to not put the anomaly into containment.

For a complete list of Archon-class articles on the site, click [/system:page-tags/tag/archon here].

++ Cernunnos 

Cernunnos-class SCP objects could be functionally contained, but for logistical or ethical reasons the Foundation has chosen not to at this time. The anomaly may still be partially contained or actively concealed from the public, but the costs of fully containing it are deemed to outweigh the benefits.

For a complete list of Cernunnos-class articles on the site, click [/system:page-tags/tag/cernunnos here].

++ Ticonderoga

Ticonderoga-class SCP objects cannot be contained, but also do not need to be contained. While these anomalies are similar to Archon-class SCPs in that their containment is unnecessary, Ticonderoga-class SCPs are distinguished by also not being containable given the Foundation&#39;s current knowledge and resources. This may be due to their widespread or ubiquitous occurrence on Earth, despite the general public remaining unaware of their existence or anomalous nature, although the Ticonderoga class also includes extraterrestrial anomalies beyond the current reach of the Foundation.

For a complete list of Ticonderoga-class articles on the site, click [/system:page-tags/tag/ticonderoga here].

+ Non-Standard Object Classes

Most of the following Object Classes indicate that an SCP has not yet been assigned a standard object class, or that it was previously assigned a Standard Object Class but no longer requires containment. There are also additional Object Classes that are used less frequently than the ones listed above, known as Esoteric or Narrative object classes.

++ Explained

Explained SCP objects were formerly classified as anomalies before being completely and fully understood, to the point where their effects are now explainable by mainstream science, or were falsely identified as an anomaly before being debunked as a hoax or misunderstanding. While most of these articles are listed separately as [[[scp-ex|Explained SCPs]]], a mainlist SCP may be reclassified as Explained after further investigation into the apparent anomaly.

For a complete list of Explained-class articles on the site, click [/system:page-tags/tag/explained here].

++ Neutralized

Neutralized SCP objects were classified as anomalies but are no longer anomalous, due to the object being intentionally or accidentally destroyed or disabled, or simply due to its anomalous properties or effects ceasing.

For a complete list of Neutralized-class articles on the site, click [/system:page-tags/tag/neutralized here].

++ Decommissioned 

Decommissioned SCP objects are anomalies that have been intentionally destroyed or stripped of their anomalous properties by the SCP Foundation. As the Foundation usually tries to contain rather than neutralize anomalous objects, this object class is only used when it is not possible to fully contain an anomaly, or when excessive expenditure of resources is required to keep an anomaly in containment. Decommissioning may also be performed for ethical reasons, particularly when containment necessitates extreme suffering or is unable to prevent excessive loss of life. To avoid any unnecessary losses, decommissioning anomalies requires authorization from a higher authority, such as the O5 Council, the Ethics Committee, or the [[[decom-dept-hub | Decommissioning Department]]].

For a complete list of Decommissioned articles on the site, click [/system:page-tags/tag/decommissioned here].

++ Pending

SCP objects that have not yet been assigned an object class may be labelled as Pending. This is used to indicate that the Foundation does not currently have enough information to assign an object class to the anomaly. This is a deliberate decision to emphasize that research is ongoing, and is not the same as the author simply not knowing which object class to assign!

For a complete list of Pending-class articles on the site, click [/system:page-tags/tag/pending here].

++ Uncontained

SCP objects that are not yet contained may be assigned an object class, often Keter, but in some articles Uncontained is used in place of an object class to emphasize that ongoing effort is required to establish or restore containment.

For a complete list of uncontained SCP objects on the site, some of which use Uncontained in place of an object class, click [/system:page-tags/tag/uncontained here].

++ Esoteric Object Classes

Additional Object Classes not listed above are generally created to further the narrative in a particular SCP and only used once, and so are referred to as Esoteric or Narrative Object Classes. Esoteric object classes that are used often enough may eventually meet the requirements to be added to the list of Secondary Classes above. It is recommended to use one of the Primary Object Classes listed here for most SCPs, only using another object class if there&#39;s a good reason to justify it in the article. 

For a comprehensive list of Esoteric Object Classes and the articles that use them, click [[[esoteric-classes-complete-list|here]]].

+ Object Class FAQ

[[# locked-box]]
**[[size 120%]]What is the Locked Box Test?[[/size]]**
The Locked Box Test is an informal guideline used to determine an object&#39;s most appropriate Object Class. It goes like this:

* If you lock it in a box, leave it alone, and nothing bad will happen, then it&#39;s probably **Safe**.
* If you lock it in a box, leave it alone, and you&#39;re not entirely sure what will happen, then it&#39;s probably **Euclid**.
* If you lock it in a box, leave it alone, and it easily escapes, then it&#39;s probably **Keter**.
* If it //is// the box, then it&#39;s probably **Thaumiel**.

Extending the analogy to other Object Classes:
* If it used to need a box, but no longer does, it&#39;s **Neutralized**. If this is because of a deliberate decision by the Foundation, it was probably **Decomissioned**.
* If it turns out it never needed to be put in a box in the first place, it&#39;s probably **Explained**.
* If you can&#39;t put it in a box and it&#39;s about to end the world, then it&#39;s probably **Apollyon**.
* If you could have locked it in a box but chose not to due to dire consequences, then it&#39;s probably **Archon**.
* If you could have locked it in a box but chose not to for practical or ethical reasons, then it&#39;s probably **Cenunnos**.
* If you can&#39;t fit it in a box but that&#39;s not a big deal, then it&#39;s probably **Ticonderoga**.
* If you&#39;re not sure what box to put it in yet, it&#39;s probably **Pending**.

Note that as a special consideration, something that is autonomous, alive, and/or sapient is almost always //at least// Euclid-class. That is, if you lock a living thing in a box and forget about it, it will eventually suffocate or starve to death, and that&#39;s not a good outcome. Something that is intelligent could also end up being smart enough to outwit its containment procedures and/or stop cooperating with the Foundation&#39;s attempts to contain it, making it more dangerous than it otherwise might be.

[[# wrong-object-class]]
**[[size 120%]]What if I find an SCP that is the wrong Object Class?[[/size]]**

The Object Classes are intentionally left vague to avoid limiting the author&#39;s creative freedom. While definitions are listed and explained above, these are descriptions of common usage, and not rules that must be followed when writing an article (although there are rules to ensure only the correct object class tags are applied to SCP articles). While there have been proposals to create a more coherent system, rigidly defined classes would hinder an author&#39;s ability to write the way they want to.

If you find an SCP article that you feel might be inappropriately classified, feel free to raise discussion on the topic and see what other community members think. If the explanation is not to your satisfaction, then feel free to express your opinion on the matter and vote accordingly on the page.

[[# danger-and-object-class]]
**[[size 120%]]If an SCP is very dangerous should its Object Class be higher?[[/size]]**

No, danger does not really affect an SCP&#39;s Object Class. As has been reiterated several times above this, an item&#39;s Object Class is more based on the difficulty of containment rather than the danger it otherwise poses. For example, a button that can destroy the entire universe when it&#39;s pressed would be safe, whereas a cat who randomly switches places with another cat anywhere on earth would be considered Keter.

[[# multiple-object-classes]]
**[[size 120%]]Can an SCP have more than one Object Class?[[/size]]**

Generally no, however it is permitted. While secondary classes can be used alone, they are frequently used in addition to a primary object class, and in those cases the tags for both are applied (or the tag for the primary object class plus the esoteric-class tag, in the case of a secondary object classes that does not have its own tag).

In cases where an SCP&#39;s object class changes over time, and the SCP article reflects that, for the purpose of tagging only the Object Class or classes on the final version of the SCP should be applied. The exception is SCPs that were Neutralized, Decomissioned or Explained - they should be tagged with whatever their object class was before.

[[# risk-disruption-threat]]
**[[size 120%]]What about Risk Classes? Disruption Classes? Threat Levels? ect.[[/size]]**

Various authors have introduced alternatives or supplements to the SCP Object Class. The most widely used is the Anomaly Classification System (ACS), explained in detail [[[anomaly-classification-system-guide|in this guide]]], which adds a Risk Class to indicate how dangerous an anomaly&#39;s effect are to individuals, and a Disruption Class to indicate how widespread its effects would be if uncontained. Alternatively, some articles use color-coded Threat Levels to indicate how dangerous an anomaly if containment was breached. This system was originally created by the French branch of the SCP Wiki, as outlined [http://scp-int.wikidot.com/niveaux-de-menace-des-objets-scp in this translated guide], but has seen some use on the English-language Wiki. Other systems are less frequently used, and may be the creation of a single author for use in their own works, although other people are welcome to use if if they think it works well for their own articles.

[[# decomissioning]]
**[[size 120%]]I thought we weren&#39;t Decomissioning articles anymore? When did that change?[[/size]]**

Originally, the Decommissioned Object Class was used by staff to place unwanted articles deemed to be of low quality in a sort of &#34;Wall of Shame&#34; rather than simply deleting them, keeping them around to serve as examples of what not to do. This involved rewriting the article to describe the SCP object&#39;s &#34;decomissioning&#34;, generally involving author avatars destroying the object in an over-the-top manner. This practice is no longer performed, partly because such heavy-handed edits by SCP staff are no longer allowed and partly because decommissioning ended up backfiring, rather than encouraging better writing. The Decommissioned articles, [[[archived:decommissioned-scps| formerly listed here]]], have now been deleted. See the [[[History of the Universe Hub]]] for more information about this period in the site&#39;s history.

The modern Decomissioned Object Class, as described on the [[[decom-dept-hub|Decommissioning Department Hub]]], is very different. Although the name references the original process of Decommissioning, it&#39;s about exploring the reasons why the SCP Foundation might want to destroy a particular SCP object for pragmatic or ethical reasons, and is not about mocking low-quality articles.

[[# adding-to-this-list]]
**[[size 120%]]What determines which Object Classes are added to this list?[[/size]]**

Ultimately, it comes down to how often an object class is used. While the majority of SCPs are classified as Safe, Euclid or Keter, some articles use a different classification. While most of these are created for a specific SCP and used only once, a narrative object class can be reused if another author thinks it is useful. As a general guideline, if you use an object class that isn&#39;t listed on this page, it&#39;s worth making sure that it&#39;s clear what it means within the SCP article, because your reader is unlikely to have seen it before.

Safe, Euclid, and Keter have been standard classes since the inception of the website; all others became standard due to widespread usage. Currently, an esoteric object class must be used in 25 SCP articles before it can be given its own tag and be defined in this guide.
