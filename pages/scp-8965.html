[[include component:preview
text=
Pick up the phone. ]]
=====


**Item #:** SCP-8965

**Object Class:** Keter

**Special Containment Procedures:** Due to the uncontainable nature of the anomaly, disinformation efforts are to be carried out to mask all SCP-8965 related deaths as coincidence or as a result of pre-existing health conditions.

**Description:** SCP-8965 is an anomalous spam call. SCP-8965 events typically occur with individuals[[footnote]]Hereby referred to as SCP-8965-1.[[/footnote]] with pre-existing health conditions ranging from cancer, stroke, or chronic issues.
SCP-8965 events occur during periods when SCP-8965-1 instances are recovering. Deaths occur from anomalously induced heart failure regardless of relation to previous conditions.

SCP-8965&#39;s caller ID typically belongs to individuals closest to SCP-8965-1. SCP-8965 events are unable to be disconnected remotely, and SCP-8965-1 instances are unable to react to outside stimuli during SCP-8965 events which makes it impossible to prevent or prematurely cease a SCP-8965 event.

Attempts have been made to source the origin of SCP-8965 via tracing the calls; all attempts have led to multiple unrelated mortuaries. Questioning of employees and investigation of phone records have resulted in zero findings.

**Addendum:** As an attempt to understand SCP-8965, a list of Foundation personnel with a potential to be subject to a SCP-8965 event was compiled. All phone records of these personnel are to be monitored and checked for correlating signs to previous SCP-8965 events. Containment protocols have not been updated to include this as to maintain morale of individuals monitored.

Detailed below is the transcript of a SCP-8965 event involving Researcher Maslov, who was previously diagnosed with lung cancer prior to employment.

&gt; **Researcher Maslov:** Hey, you don&#39;t normally call me during school. Is everything ok-
&gt; 
&gt; **SCP-8965:** (SCP-8965’s voice is robotic and monotone.) We&#39;re calling you to ask you to rest. We worry that it may return. We don&#39;t want your family to worry.
&gt; 
&gt; **Researcher Maslov:** Oh no. Please don&#39;t tell me — this wasn&#39;t meant to happen to me. I&#39;m not ready to go… please don’t make me go. Why&#39;d you have to use his name.
&gt; 
&gt; **SCP-8965:** It was such a tiring and frighting time for you. We don&#39;t want that for you again. Please just let us help you. Let us free your family, and friends of their worries for you, and your condition. Let us assure them that you&#39;re in a better place.
&gt; 
&gt; **Researcher Maslov:** But they said I was fine; that the treatment worked. That I&#39;d get to see him grow up. He’s still a kid, a-and he needs me.
&gt; 
&gt; **SCP-8965:** Come lay down with us.  Your lungs will feel so clear when you lay down.
&gt; 
&gt; **Researcher Maslov:** I don&#39;t want to die yet. I still have things I want to do. I haven&#39;t made a name for myself. Please just give me a few more years… just give me a few more years to live, please. Let me see him to a point where he can move on easy.
&gt; 
&gt; **SCP-8965:** Let us soothe your pain. Let us bring you mercy. Let us save the heartbreak.
&gt; 
&gt; **Researcher Maslov:** I don&#39;t even feel any pain when I cough. (Researcher Maslov attempts to fake a cough.) I don&#39;t need m-mercy. I feel fine.
&gt; 
&gt; **SCP-8965:** We just worry. All we do is worry. Just let go Maslov, let go.
&gt; 
&gt; **Researcher Maslov:** I don&#39;t want to let go. Please don&#39;t make me let go. Make someone else let go. I was going to be ok d-dammit. Please don’t tell me that was wrong. Please don’t tell me all that work was for nothing.
&gt; 
&gt; **SCP-8965:** We worry it will return, Maslov. Don&#39;t let him see you suffer.
&gt; 
&gt; **Researcher Maslov:** ...Wi-will this my family be ok? Are you sure that he&#39;ll be fine without me?
&gt; 
&gt; **SCP-8965:** We will take care of them. We will make sure they always remember you. That they will never forget you. Let us make you feel alive again.
&gt; 
&gt; **Researcher Maslov:** (Researcher Maslov drops his phone and is heard falling to the ground. He is heard attempting to speak, but is unable to be properly transcribed due to violently coughing as he attempts to speaks. After 30 seconds, Researcher Maslov ceases all activity.)
&gt; 
&gt; [CALL DISCONNECTED]
