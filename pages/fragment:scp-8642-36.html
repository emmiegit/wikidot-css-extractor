    <pre><textarea class="page-source" readonly>Much to Greg’s obvious annoyance, you state that you’re fine standing until he gets you the report. “Fine,” he grumbles, turning back to , “just be quiet so I can work.” You can’t tell if Greg is being rude on purpose or if he just has zero social grace, but you keep a professional demeanor up and try to not let it get to you. Still, you allow your curiosity a small bit of leeway as you peek over his shoulder. Truly, the computer is an impressive amalgam of towers and consoles, connected with webs of wires and input devices in an impressive display of controlled chaos. Greg’s work on the computer is no less impressive: he seems to be juggling multiple projects in various programs, switching between them like it’s nothing. The desktop, from the glimpses you get of it, radiates the same sense of controlled chaos as the computer itself: There are shortcuts, folders, and files all over with no obvious organization, but Greg seems to immediately know where everything is. You can’t help but wonder how on Earth both the machine and the man operating it run.

Then something catches your eye; it’s a small collection of shortcuts in the corner of the desktop, not too different from the rest of the cluttered screen except that you recognize it as a cluster of shortcuts to games and game stores. From the short glimpses you get, you can see that many of your favorite titles are represented. You are tempted to ask Greg about them, but then again he’s already annoyed with you and DID tell you to stay quiet. After grappling with your social anxiety for a little, you decide to…
