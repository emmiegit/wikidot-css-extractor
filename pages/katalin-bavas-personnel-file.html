**Name:** Katalin Johannes Bava

**Years Active:** 1980-2003

**Resting Place:** Cimitero Monumentale di Sant&#39;Anna, Trieste, Italy

**Profile:** Operator of the [https://scp-wiki.wikidot.com/series-0 Special Collections Program] from Oct. 1980 to Feb. 2003. Time of death 12:04 AM EST at Site Black.

Born in Trieste, Italy in 1953, Bava&#39;s femily emigrated to the United States in 1958 and settled in Philadelphia. Graduated from Eötvös Loránd University in Budapest in 1966 with a doctorate in human psychology and honors in biology and social sciences. Began government work in 1973, joining the early SCP during its formation from 197[ ] to 198[ ].

Participant in Project Kneel Hospice 1988-1989. Granted two SCP Medals of Honor in 1994 following the break-out of CIA/SCP-[##white|@@----@@##] from Site 11.  

Body found partially incorporated into office space on 4 Feb. 2003. Identifiable genetic material traced in portions of the building&#39;s infrastructure, with [ ],[##white|@@---@@##] nerve endings still functioning while wrapped around steel struts and internal piping apparatuses. Mercy-killed by Agent [##white|@@----------@@##], [##white|@@-------@@##] and [##white|@@-----@@##] witnessing. Her death is believed to have been caused by symptoms gained during Kneel Hospice whose onsets went undetected following post-experimental screenings.
