**Special Containment Procedures:** Warwick Castle has been purchased from Merlin Entertainment Limited (its previous owner) by Foundation front companies, and the location closed under the cover story of becoming a private events space. 

 
[[include component:image-block
|name=http://scp-wiki.wikidot.com/local--files/scp-9350/Warwick%20Castle%203.0%20%20-%20Copy.png
|caption= Bodycam view of an SCP-9350 event&#39;s aftermath. Agents only now able to safely access the site due to the sheer scale of the prior night&#39;s kegger.  
|width=300]]
 
  

All roads leading to the structure are now private, and additional trees have been planted to prevent the structure being viewable from the River Avon. Both the castle and grounds are to be continuously monitored via audio-visual feed, and the perimeter guarded by agents from Site-44.

**Updated Containment Procedures:** As of 05/11/22, a detachment of MTF Epsilon-6 (“Village Idiots”) is to be permanently stationed outside of Warwick Castle, within the newly constructed Outpost-1068. Epsilon-6 is to conduct nightly patrols of the castle, and during “revelry events”, guard all exits to prevent egress of partygoers. 

During daylight, Epsilon-6 is to clear-away detritus from prior revelry events. Recovered anomalous items are to be shipped to Site-44 for testing and archival. 


------


**Description:** SCP-9350 refers to a phenomenon affecting Warwick Castle, in Warwick, England. Exclusively during night hours, approximately once per 10-21 days, an SCP-9350 event will occur within the castle and its grounds (hereby dubbed a “revelry event”). 

During revelry events, Warwick Castle becomes host to an immense, crowded and chaotic party, facilitated by the spontaneous appearance of ~250-1000+ inebriated, hyperactive party guests                     (collectively dubbed SCP-9350-1). Extensive genealogy has proved SCP-9350-1 instances to be corporeal manifestations of individuals than inhabited the castle, or Warwick, within the medieval period. 

Additionally, during revelry events, Warwick Castle itself appears to possess a memetic property; outsiders spending more than 10-15 minutes within the castle-proper will become compelled to  participate in the festivities. Afflicted individuals will not leave the castle voluntarily until sunrise, and will possess limited recollection of the prior night (beyond merely the effects of extreme drunkenness). 

Also notable is the general atmosphere of SCP-9350 events, combining features of both modern parties (DJs, drinking games, raving etc) and cultural practices from medieval England. This extends to the clothing of SCP-9350-1 instances, with medieval dress typically supplemented with body paint, glowsticks, shutter-shades, and other party-wear. 
 
Despite this, SCP-9350-1 instances seem unable to recognize the unfamiliar time period they inhabit, never questioning novel phenomena (or rationalizing them according to their original time period, such as referring to an assault rifle as a “breathlessly ornate crossbow of Yorkshire-make”).

Additionally, during SCP-9350 events, the castle itself exhibits anomalous behaviors, including:

* Deafening music exuding from various points within the structure – most often techno, electronic, rap, or metal remixes of medieval bard-music, hymns, and folk-songs.

* The stonework of the castle “sweating” high-quality red-wine or hippocras. 
 
* The River Avon (nearby to the castle) being transmuted into ale or mead. 

* The appearance of modern foods being cooked in medieval styles (e.g. various “Burger King” burgers rotating on a spit).

* The castle’s portcullis independently “thumping” up and down, in time to music. 

* Cheering and applause sounding from the castle’s dungeons and oubliettes, even if empty. 


-----

**Discovery:** Warwick Castle is not believed to have possessed anomalous properties prior to October 2020. However, on 31/10/20, local police reported to the castle following reports of loud noises, strobe-lighting and smoke from within the structure, during the 2020 COVID-19 lockdown.

An in-progress SCP-9350 event was subsequently discovered, with backup being called once orders to leave the structure were refused, and the first wave of attending officers joined the party.                          A Foundation asset within the Warwickshire Police service then became aware of the escalating situation, quickly contacting Site-44 regarding the potential anomalous activity.

During the subsequent Foundation response, all officers and witnesses at the scene were amnesticized, and a cover story regarding an illegal rave fabricated to local media organizations. 
Following this, provisional containment was established, and subsequent observations quickly identified a potential culprit for the carnage (hereby designated POI-9350-A).

------
**POI-9350-A:**  POI-9350-A is a middle-aged Caucasian male of unknown origin, most commonly dressed in a stereotypical blue “wizard’s robe”, with an accompanying beard and pointed hat. 

According to POI-9350-A, his preferred name is: //“Aldathar Aethelwulf, Lord of Cups,        Thrice Gelded, Warlock of Warlocks, Friend To All”// (or “Aldathar”, for brevity). 

Through repeated Foundation observation, Aldathar was quickly discerned as the source, or at least a focal point, of SCP-9350. Subject possesses powers resembling common ideas of magic, able to control the anomalous properties of the castle at-will, end or resume revelry events, and perform a wide variety of other anomalous activities with no known limit. 

Aldathar is universally known amongst SCP-9350-1 instances, considered an exceptionally generous host. His hospitality has even been cited as the reason SCP-9350-1 instances have “come all this way”, or “travelled far” to attend the revelry. Notably however, no SCP-9350-1 instances appear to know Aldathar on a personal level, only as a distant benefactor.

[[collapsible show=&#34;Addendum 9350-A&#34; hide=&#34;- Close&#34;]]
[[=]]
++ ##990000|**Addendum 9350-A**##
++ 
[[/=]]

On 05/11/22 (Bonfire Night), a revelry event of exceptional intensity took place. 

Approximately four hours into the event, Aldathar was seen to vanish from a mosh pit towards the castle’s eastern wall, before emerging, thirty minutes later, riding a dragon (to the great amusement of revelers). The dragon then began a low altitude flyover of Warwick, stunning civilians and singeing multiple houses. 

In the aftermath, Foundation disinformation campaigns were able to successfully convince witnesses that the “dragon” was actually part of a nearby drone show, and that the fires throughout the city were the result of unrelated fireworks misuse. Still, the severity of this containment breach prompted the creation of Outpost-1068 and the deployment of MTF Epsilon-6.

Other notable revelry events are as follows:

&gt; //**12/07/21** – several SCP-9350-1 instances, alongside Aldathar, successfully teleport to a nearby “Bargain Booze” store, ostensibly to pick up alcohol. CCTV footage shows the cashier initially assuming the group to be costumed partygoers, but the situation degenerates after several revelers attempt to pay using gold coins, or trade using live chickens and geese. Foundation personnel subsequently collect SCP-9350-1 instances, with Aldathar responding “mead maketh the merriment!” when challenged.// 
&gt; 
&gt; //**03/02/22** – whilst investigating the memories of SCP-9350-1 instances, Samantha Dubois of the team’s security detail communicates to another member via radio. Dubois’ French accent is immediately noticed, and she receives several “two finger” gestures from nearby revelers, alongside one yelling “Agincourt, wench!” from across the crowd.// 
&gt; 
&gt; //Despite Aldathar’s repeated efforts to calm the situation, multiple personnel are struck by thrown beer mugs and rotten vegetables during the ensuing commotion.//
&gt; 
&gt; //**21/06/22** - during a revelry event to celebrate 2023’s summer solstice, an abnormally large swan was seen arriving at Warwick Castle, dubbed &#34;our lady of the lake&#34; by Aldathar. Swan was approximately 21x the size of ordinary members of the species, yet was notably docile,  offering rides to SCP-9350-1 instances throughout the night.//
&gt; 
&gt; //Upon agents attempting to interact with the creature, however, it reacted in a manner more typical of swans, injuring all involved personnel before escaping into the surrounding forest. Drone imagery reveals the swan did not dematerialize upon sunrise[[footnote]]Due to this, it is believed the beast was most likely a normal swan, transmuted by Aldathar.[[/footnote]], persisting within the countryside surrounding Warwick. Recovery efforts are ongoing.//
&gt; 
&gt; //**27/03/23** – at approximately 1AM, various &#34;Viking&#34;-style longboats were observed arriving from the River Avon, followed by disembarkation of many SCP-9350-1 instances in traditional Viking dress[[footnote]]Dating of their belongings links them to various Viking raids in the region during the 1100s.[[/footnote]]. Aldathar initially reassured others that they were their “friends from beyond the sea”, but despite this, 17 separate confrontations occurred within the first 10 minutes of their presence, primarily over ale casks and food.//  
&gt; 
&gt; //Subsequent recommendations for a fully British team of personnel were rejected, owing to the xenophobia of many revelers towards even Scottish or Welsh accents, and the impracticality of sourcing a team entirely from the English midlands.// 
&gt; 
&gt; //**31/12/23** – as this revelry event signifies a new year, Aldathar attempts to give a speech to all SCP-9350-1 instances present. However, this attempt is marred by a general lack of interest and attention from the crowd, and is ceased when a naked reveler leaps forward, shouting: “behold, mead AND meat!”, causing an uproar in the crowd. Throughout this, Aldathar looks noticeably deflated.//
&gt; 
&gt; //**13/03/24** - at approximately 2AM, Aldathar conjures a large patch of bioluminescent            blue mushrooms, consuming a small handful before lying down. Various SCP-9350-1 instances subsequently follow his example, yet seem reluctant to do so. Recovered samples reveal the mushrooms were chemically identical to Psilocybe cyanescens (a type of “magic mushroom”), however Epsilon-6 members reported feelings of intense melancholy whilst in the vicinity of the mushroom patch.//
&gt; 
&gt; //**01/04/24** – at approximately 11PM, Aldathar breaks away from a crowd of revelers and retreats to a nearby battlement. None follow him. Aldathar sits alone for 30 minutes before conjuring a cloud of will-o&#39;-the-wisps, watching them fly away, then slowly walking back towards the fray.//
&gt; 
&gt; //**05/04/24** - a record 1535 SCP-9350-1 instances are seen in attendance, including various creatures from English and Welsh mythology. Despite this, Aldathar mostly spends the night alone, partaking of River Avon’s ale.//
&gt; 
&gt; //**01/05/24** – revelry event attendance once again breaks records, but Aldathar is not seen at all during the proceedings. During Epsilon-6 patrols the following morning, however, Aldathar is found slumped against the door of the castle’s primary keep, unspeaking. Subject&#39;s beard and robes appear unkempt, while his overall demeanor is despondent. This is the first instance of an SCP-9350-1 instance persisting beyond daybreak.//
&gt; 
&gt; //Following repeated questioning from Epsilon-6, Aldathar finally speaks up, requesting a            “private audience with your liege”. Following deliberation at Outpost-1068, alongside confirmation that SCP-9350’s memetic properties were no longer active, Head Researcher Henrietta Thorpe was sent to converse with POI-9350-A.//
&gt;

The transcript of this interview is as follows (with Aldathar’s words translated from Middle-English):

&gt; **Researcher Thorpe:** “It’s nice to finally meet, Aldathar Aethelwulf, L-“…
&gt; 
&gt; **Aldathar:** &#34;If it please you, my lady, “Aldathar” is more than enough.&#34; 
&gt; 
&gt; //Thorpe appears momentarily surprised, before resuming.//
&gt; 
&gt; **Researcher Thorpe:** “So… Aldathar, you said you wanted to chat?”.
&gt; 
&gt; //Aldathar remains silent, with a look of mild confusion.//
&gt; 
&gt; **Researcher Thorpe:** “My apologies, you… “requested an audience” with us? We have questions we’ve wanted to ask you too, Aldathar”.
&gt; 
&gt;
&gt; //Aldathar remains silent for another 15 seconds, gazing at the dawn sky.//
&gt; 
&gt; 
&gt; **Aldathar:** “Does your work give you purpose, my lady?”. 
&gt; 
&gt; **Researcher Thorpe:** “My… work? I’m not sure I understand… If you mean my research, well I’ve always wanted–“.
&gt; 
&gt; **Aldathar:** “So many have toiled in this domain, these fields, for countless years.”
&gt; 
&gt; //Aldathar shifts in the light, and it becomes clear his eyes are red from tears.//
&gt; 
&gt; **Aldathar:** “To ease their worries, their fears, their long wait. To provide a sanctuary, of a sort. That was my goal.”
&gt; 
&gt; //Researcher Thorpe glances at the grass surrounding the castle keep. Smashed ale casks, chicken bones, and what appears to be several dragon eggs and smoldering fires are still visible.//
&gt; 
&gt; **Researcher Thorpe:** “So this… revelry… of yours? It’s a distraction? A reward?&#34;
&gt; 
&gt; **Aldathar:** “A reward indeed. But to my shame, too much of a sweet thing can still poison, my lady. I had shunned my purpose, but after so long, I find myself coveting it once more.&#34;
&gt; 
&gt; **Researcher Thorpe:** “Your purpose?... Aldathar… just how old are you? These people you host, they’re centuries old, but we’ve never been able to figure out-“.
&gt; 
&gt; **Aldathar:** “[REDACTED]. I trust there you’ll find the answers you seek, my lady.&#34;
&gt; 
&gt; 
&gt; //Researcher Thorpe appears momentarily stunned by the information.//
&gt; 
&gt; 
&gt; //Aldathar stands, appearing moreso at peace than the start of the interview. He turns to    Researcher Thorpe, knowingly smiles, and bows.//
&gt; 
&gt; **Aldathar:** “I know not who you are or what you seek, but my lady-“
&gt; 
&gt; **Researcher Thorpe:** “Please… call me Henrietta if you’d like”.
&gt; 
&gt; //Aldathar chuckles and smiles again.//
&gt; 
&gt; **Aldathar:** “I know not who you are or what you seek, Henrietta, but you strike me as a soul           most-learned in the ways of science. I leave stewardship of this sanctuary to you”.
&gt; 
&gt; //Aldathar begins to fade from the castle.//
&gt; 
&gt; **Henrietta:** “But Aldathar, I don’t… wait!”.
&gt; 
&gt; //Five seconds later, Aldathar has completely vanished. The castle is silent and inactive.               Henrietta slumps on the grass, defeated, for several minutes.//
&gt; 
&gt; //Henrietta radios Outpost-1068, instructing Epsilon-6 to travel to the nearby location: [REDACTED] and begin excavations.//
&gt; 

Excavations at the provided location revealed the skeleton of a male human, tattered robes matching Aldathar&#39;s outfit, plus a faded tapestry, depicting him in service to William Maudit, 8th Earl of Warwick. 

Since incident 1068-B, SCP-9350 events have continued to occur, albeit more sporadically,                   with fewer SCP-9350-1 instances in attendance, plus noticeably less anomalous activity. 

Aldathar has not been seen in attendance.
