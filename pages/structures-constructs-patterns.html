    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>[[&gt;]]
[[module rate]]
[[/&gt;]]

A sea of orange speaks,
Forest sound a symphony.
[[[SCP-9320|We’re some kind of pest.]]]

Universe’s edge,
Dying throes of the lonely,
[[[SCP-9016|Anvil will survive.]]]

To contain it all,
[[[SCP-9090|The jungle celebrates.]]]
The lion is fed. 

A Scarlet King dies.
Our own failure crashes down.
[[[SCP-9600|The plague will come.]]]

A town out of time,
Torn between faith and future,
[[[SCP-9993|Unbelievable.]]]

In the land of gods, 
We let the lost demons lie.
[[[SCP-9990|There are angels too.]]]

The Foundation drifts.
Such is the way of waiting,
[[[SCP-9900|Nothing else matters.]]]

We are ignorant.
[[[SCP-9500|It is time to leave the cave.]]]
Will we be strong enough?

The land of the free,
[[[SCP-9726|I long for true liberty.]]]
Perhaps it’s family. 

When the world watches
A prince in a crowd of blood,
[[[SCP-9998|This wasn’t in the script.]]]

Our memory fails us. 
We burn the world for our love.
[[[SCP-9799|They can’t forget us.]]]

Why do we keep going?
[[[SCP-9935|For the law of the very game,]]]
There’s heaven on earth. 

The Foundation lives. 
[[[SCP-9000|They’ll continue the good work.]]]
No one makes it out.</textarea></pre>
