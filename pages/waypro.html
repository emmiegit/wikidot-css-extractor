It was the fourth cigarette Adams fizzled out in the ashtray. The dashboard was pulsing with an array of gauges and dials she had long since gotten used to. That distinct smell of soot and brine, lights that made sleep impossible, a boring picture from behind the film and only two people to share it with: Joseph Valdes, vacant as always behind the wheel, and their current cargo, [https://scp-wiki.wikidot.com/i-m-gonna-be-alright SCP 2599.] 

It was designed to ferry new SCP subjects and their security teams to Auxiliary Research Facility 120 and had more than enough space to do so. But 2599 was a low maintenance skip, if anything more people escorting her would be riskier with the way even their finest soldiers liked to chatter these days. It made it even more apparent, watching the girl standing alone in its belly, glued to the window like this was  a field trip, the foundation could have invested in smaller and certainly faster models for transport.

But that was for the accountants and engineers to figure out. Her job was security. She knew better than to underestimate what could go wrong sharing space with a skip and she reviewed this one thoroughly. Despite that, it was hard to ignore the stupid girl gazing like this was some field trip. 

There were worse stories for skips. She was lucky that the incident at 118 had more to do with Wensley than her.  She could only imagine how deep the shit show  at 118 was since Wensley got the keys. Even worse for her, after all of it, the fae problem ended up taking care of itself. Things had been going well at the foundation, well enough for people to be too lazy to be cold or cruel. Just incompetent. One of the biggest motivators for doing good work at the foundation was figuring out how to avoid reckless decisions out of fear. 

The girl had just gotten a lot of [https://scp-wiki.wikidot.com/i-m-gonna-be-alright her memories] back too. It didn’t matter what was on her mind, it wouldn’t lead anywhere good. She figured at the top of the list would be the family she lost. Priding herself on her deductive skills she would have been disappointed to know what 2599 was really thinking, was about the possibility of rewinding time. 

Time was a part of reality, after all. The volumes introducing the “skip” to Ontokinetics made it seem like one of the more dangerous uses. But her Halmeoni had most likely died, without knowing she was stuck here. It would be enough for her just to get a chance to burn the incense or pour the liquor. But knowing how things usually went, she’d barely get back 4 seconds let alone the 4 years she lost.  She shuddered even considering looking over her Halmeoni’s body and hearing someone tell her to-

“Where’s Dr. Wensley?” Her voice barely carried the short distance from the containment car to the front where Adams sat. 

“Worried?” Adams sighed. “Do I need to put you back under?”

“No. I just thought he was coming with me the whole way. That’s all.” 

“He has info we need to start working on you, so he’ll be there for a few days. Then he can wriggle back to 118.”

“Without me…right?” 

“Is that a problem?”

The girl’s reply was silent as she returned her attention to the film and the misty blue beyond it. 

[[size large]]##ADD8E6|A WORRISOME REACTION##[[/size]]

“I thought you were moving on.” She spat the charred end into the ashtray and hopped out of her seat. 

“I. am.” The rasp in her reply made it barely intelligible. 

“Then enjoy the freedom!  Don’t tell me it doesn’t feel good to stretch your legs now that you&#39;re out of that room?” 2599 didn’t move an inch as Adams approached.

 “The scenery can’t be that exciting. It’s not much of a view for people like me, but I guess you see things differently.”

The girl’s focus, if nothing else, proved that much right. But it was hardly a reply.

[[size large]]##ADD8E6|NO BITE##[[/size]]

“Guess it must be. You might as well be falling out.”

[[size large]]##ADD8E6|WE’RE A LURE LEFT UNBOTHERED##[[/size]]
[[size large]]##ADD8E6|Brats are annoying. Unless...##[[/size]] 

“There’s nowhere to go out there, you know. Don’t tell me you’re just going to keep running away.” 

“…I’m not running.” 

“Of course not. This site’s far from 118 anyway. Honestly-”

“I don’t care! I’m going to be me again.” 

[[size large]]##ADD8E6|A FIERCE CATCH, CONGRATULATIONS ANDREA##[[/size]]

“I got it, Cho. I like to know who I’m working with.”

“Well, you already did that.” 

“Well, there’s a lot to learn from such a genius, yea?” 

2599’s nostrils flared before pressing herself closer to the film. 

“Don’t be cold now that we’ve come this far. You’re going to want to be at your best when we get to the facility. You do remember what Facility 120 is, right?”

“Of course I do!” She didn’t lose the new memories she made. It’s part of what made it so disorienting every time they returned. It was like her head was bloating, not even to bursting, just swelling. Pushing against her skull. The aching never completely went away.

“As long as I’m here you will all just do what you want anyway.  As long as I get fixed I don’t care how bad it is.” 

Adams rolled her eyes and glanced out the screen. All she saw was a house in an empty white field. 

“So, you know about out there?” 

 “…It’s secret, isn’t it?” 

“That’s usually the case.” She stopped the dance of the cigarette in her hand and pressed it between her fingers.

“…So where are we?”

“Now why should I tell you that?” She lit the fifth unconcerned with the girl’s glare.

“Whatever. It’s probably just some secret ocean facility owned by the American government.” she groaned.

 “Ocean? Must be some view. You know subs usually don’t have this much leg room to work with.”  

“You guys are government dogs at war with nature. You’d make something horrible like this to get your way.”

“Harsh. But we don’t work for any government and nature is the thing we’re protecting. Not that you’re interested in any of that.”

“I love nature! I’m just not scared of anomalies like you people.” 

“Whew!” Adams howled. “We got a badass over here. Ga ha-ha!” 

2599 clenched her teeth, burning holes in the cackling hound mocking. 

“Of course, you’d say that.&#34; Adams wiped a tear from her eye. &#34;But it has nothing to do with fear, it’s about keeping things in balance. There’s right and wrong ways to go about it.”

“That’s the whole reason I’m going anyway, so I can do things right again.”   

“Is that all?” 

“...I want to meet people too. People like me.”

“Good to know you’re in this for more than just a cure.” She patted the girl on the back, chuckling.  

“Because there is none. At least none that wouldn’t involve embedding an SRA in your skin. Sound fun?” 

“…Is that what’s going to happen to me?”

“It’s happened before…” 

“If you can’t tell me then say that. I’ll end up finding out anyway.” 

“Gah, you’re more worried about regulation than I am. What happened to the girl crying ‘I don’t give a fuck’?” She made sure her impression was extra shrill.

Cho lifted her head before it melted through the screen. “Rules are always important!” She quickly hushed her breaking voice. “They keep us from doing stupid…and dangerous things. Even the ones we don’t like.”

“Roger that, Director.” Adams chuckled thinking about how Clef would eat her alive. 

“Aren’t you an agent? You should be more disciplined than this!” 

“What does an agent look like in your world, darling?” 

“Tch…Nothing like you.” She scoffed.

“Alright then, before you bring this moody little attitude, why don&#39;t I tell you the rules I give all my 
students, so they survive out there?” 

“Aren’t you my bodyguard? If you are good at your job, I don’t need any of your lessons.” 

“Survival is not a one lane street, it’s a highway. Every little bit and every little thing, helps. We’ll have to rely on each other here, Cho.” 

“…I still don’t even know what here is.”

“The world without a veil. Now that you’re here you don’t have our safety net.”

“You’re not scaring me.”

“Good. Reality shouldn’t scare you. That’s how you lose the game.” 

“This ain’t a game for me!”

“Either way I’d rather win, wouldn’t you?

Zena pouted, trying to settle her peaking interest.

“Rule 1.” Adams placed an arm behind her back and began her address. 

“That was actually pretty good. We’re going with that thing I just said about highways.” 

Cho sucked her teeth and muttered “shut up” under the illusion she was discreet.

“Hey, where are you looking, Cho? I don’t waste my time with lost causes! You a lost cause?”

Cho rolled her eyes and surrendered her attention with a groan.

 “There’s not a lot you can do on your own, that goes double for you see-n-serve.”

“…Whatever. You guys aren’t going to let a ‘skip’ do anything anyway.”

“That hasn’t stopped you before. Remind me how many escaped attempts are on your record Ms. ‘rules are important’?”

“…Ok fine. What should I expect then?” 

“A lot of attention. The nerds here get overzealous with their work.”

“…What does that mean?”

“They’ll look at your situation and get excited trying to figure you out. They’re definitely more hands on here, so be ready for that.”

Cho brought her arms in with a grimace on her face. Adams could see the goosebumps with a glance. 

“Hey, hey, hey! You’re coming to my facility! No one sets foot here without knowing boundaries. That goes double for skips. These guys are professionals, obsessive but professional. Better than 118. Ok?”

2599 leaned on the film, sighing. 

“I said I was ready anyway.”

“You keep saying that, makes me wonder where your confidence comes from.” 

“Are skips not allowed to be confident?”

“Right, I forgot, you can do anything, can’t you?” 

“Yes, that’s right!&#34; The skip stamped her foot. 

&#34;So, you can lock me away or chop me up or leave me to die and laugh like you cowards do! I am going to-.” She hesitated, feeling her face heat up each second. “Reap the spoils of my efforts!”

“Colorful. That leads to rule 2: Don’t just assume, if something doesn’t feel right, dig a little. There’s always more to know.”

“Perfect! I love studying.”

 “I’m not talking about knowledge. I’m talking about information. This ontokinetic shit is all about information and how you use it. If you assume you’ve got all the info you need, you’ll walk right into that buzzsaw you want to tear you apart so badly.”

“Why are you telling me this like I’m stupid?”

“You’re the type who doesn’t understand a warning until the consequences happen. Just terrible at seeing the obvious.”

“What? That doesn’t mean anything.” 

“It means you’re easy to lie to. Or gullible, which means - ”

“I know what it means!” She growled. “I’m not that either!” 

“Sure. You’re not.” Adams rolled her eyes with a sigh. “By the way what have you been staring at this whole time?” 

“Isn’t it obvious?” The girl made sure to sound as dumb as possible as she pointed out the window. “It’s a coral reef or something.” 

“You haven’t noticed anything strange about the reef?”

“Of course I did! We’ve been moving past it for a while now. Is this some kind of time loop? No, this is probably all made up with digital screens.”

“There’s a theory. Have you tried blinking yet, ya zombie?”

She tested it, and on her third blink she noticed that the “reef” had dispersed into multiple clouds of confetti. When she blinked again a giant field of coral sprawled out in front of her. With another, the coral became a mountain, of such a size it was barely distinguishable from the haze around it. 

“That’s so… What’s going on out there?”

“That’s the right question, Cho!” She gave a scholarly thumbs up. “For the white coats.” She pointed her thumb behind her. “The most I could tell you, is to be glad you’re in here.”

“Useless. Who raised you?” 

“Some smart people who taught me not to waste energy on things that don’t matter. There’s a third rule for you, focus on what matters.  My job is keeping weird shit to a minimum. That’s how we all get to survive.”

“What happened to digging a little?” 

“Well go ahead, dig rabbit.” 

Asshat. 

Cho focused on the vision before her. It was still a mountain. Perhaps a bit oddly placed for its size. She even caught glimpses of some kind of...things swimming around it. Some long enough to wrap themselves around the structure and others zipping through it&#39;s cracks. She felt her eyes starting to dry trying to notice the exact point it would change. Like trying to watch the day turn to night.

2599 pointed to the image only she saw &#34;There’s a reality anchor in this thing, right? It prevents this low hume environment from doing…that to us.”  .

“Sure, that could happen, but you could also just vanish the moment you step out. Or some undiscovered, untraceable creature scoops you up and splits your mind across the universe. Or maybe there are no humes out there at all and you’ll incur madness from existing. Want to join an interdimensional cult?”

“That’s what’s happening out there? Why would we ever come to such a horrible place?” 

“Because we’re horrible people, Cho. You haven’t heard we eat babies?”

“I’m not st-” She took a deep breath. “Ok I get it. Sometimes I jump to conclusions…

“Sometimes she says, good grief.”

 “…but I did study ontokinology.”

 “I believe you; I’ve been inside your head. That’s also why I say you miss the obvious.” 

“Now you’re saying being more informed is bad.”

“Information is only as good as its useful, otherwise its a distraction. I’ve trained a lot of agents and the ones I notice quickly are those who come with some big shot idea of where they should rank. ‘My father was a veteran and him before him!’ ‘I’ve worked with MI16 for four years.’ Sometimes they don’t even have that going on. Just some textbook idea of containment. Truth is, nothing but doing what we do can prepare you for it. Losers like that can never cope when reality kicks their ass on the field.”

“Neh, Scrub.” 

“Huh?”

“Someone who never runs sets and just bullies the same people they know they can beat. They end up watching the people they used to beat improve when they can not, blaming the game instead of their own trash skills. Mm” 

“Ok guru. A scrub huh?”

“Have you never heard of a scrub before? Gee-hee-hee how old are you?” 

“Old enough to know a scrub when I see one.” 

“You don’t even know what you’re talking about! You don’t even know what Tekken is, do you?”

“Of course not, what the hell is that?”

“Oh its…its nothing.” The girl&#39;s forehead hit the screen while her eyes aimed low.  “Just a dumb game I used to play.” 

Adams sighed. “Way to kill the mood. You had me going there too, you got another mantra from the temple you want to try?”

“엿이나 먹어라.”   She muttered.

“미친 만큼 안 교활한가 보요.” Adams groaned.

“ 안 미친!”    She gasped and covered her mouth.

“애새끼!”  Adams barked. “We both know you’re crazy, darling. You need to be to survive on this side.” 

 “…I’m not crazy. Besides, I thought I wasn’t a soldier.”

“You’re right, you’re not. This isn’t about being a soldier, this is about getting things done right. I know you care about that.” 

“More than you could ever know.”

“Well, I’ve survived twelve years here so there’s a chance I know what I’m talking about.”

“Well, I can take care of myself. Sounds like you’re just paranoid.”

“Experience can sound like that to a scrub.”

“Stop doing that.”

“Just showing I’m listening.”

“Keep laughing, karma’s going to get all of you. You think all those people you’re scared of that you’ve locked away will just stay like that forever?”

“If we only locked up things we’re scared of why would we take a scrub like you?” 

“You’re so annoying! You don’t care about safety at all, you just want to control everything!”

“That’s right. Shitty. Did I tell you the baby thing yet? Good eating.”

“You’re not funny. It’s embarrassing.”

“Hate it all you want but the reality is, sometimes choices suck. The only thing worse than making a choice that sucks is running from the aftermath. Most of the shit we do is cleanup.”

“That’s just an excuse to be an imperialist invader.” 

“Sure, and when my imperialist bosses get scared a skip in a village is a threat to the world, part of my work is making sure its only a threat to the village. Remember that contain part?

“What about just making sure it’s not a threat, period?”

“Jumping to extermination? Who’s the imperialist here?

“I didn’t mean it like that, fathead!” 

“Of course not. But after the decision is made no one’s going to give a shit about if your heart was in the right place.”

“…Just because you don’t.” 

“Really?” Adams sighed a puff of smoke that blew passed her face.  “Guess I can’t blame you.  118 does leave behind an image. It&#39;s not the only site stuck using the old lazy methods of containment. It pisses me off but the goal will always be to secure contain and protect. What we do at 120 is continue to finder  easier ways to do that. Think of contain more like compromise.”

“Compromise? You can’t be serious?”

“It’s the only reason you’re here and not stuttering in your room.”

“Oh, should I kiss your toes now?”

“Wouldn’t hurt to add thank you to that colorful dictionary of yours.”

“Fine! I’m sorry, thank you for kidnapping me.”

“You’re welcome. We keep you safe and fed, you don’t go looney outside the veil. Compromise.”

“What do you mean by that? I thought I was already crazy.” 

“You don’t get the point yet, Cho? A lot has happened but…”

“I’m fine!” Cho hissed at her,  but quickly sought the comfort of the film. “I’m fine.”

“…So you are.” Adams took a long pull, focusing the stream away from the skip.

“We all want the same thing here. You don’t have to like us, but things will be a lot harder if you can’t trust us at all. 

“Why should I? I already signed my life away. No, wait. You took me from my life.” 

“Yes, your life which is also under that P. You’re right, this is a box full of cowards who want you to be normal and live a normal life. The last thing we want is to have more unpredictability at our doorstep. So maybe some trust for the only people in the world who want to help you return to a normal life would go a long way. In fact rule five: Trust is everything!”

“You keep acting like you all are some kind of peace makers but I know your games. You’re probably mining out resources from this world or poaching the poor animals here!” 

“Cho, what the hell are you talking about now?”

“Do the creatures of this world not count towards your security? Do their voices too not echo in the harmony of life and resonate with nobility?” 

Adams pinched her brow and sighed.

“…OK. Let’s start with rule two…”

“You’re going to lie to me and say there aren’t creatures here?” 

“No, you’re right there are definitely things out there. But the things here are nothing like the creatures you know. Even the anomalous ones.”

 “So that makes it ok to put them in cages and run experiments?”

“The whole point is to drop the cage, Cho.”

“Well, however it is, we’re not buddies. We’re not partners. We’re da- we’re not friends. I don’t need an invader telling me how to live.” 

“Hey, //we’re// invaders now, brat! Besides, going to places you’re not supposed to and calling it home is just human nature.”

“Sounds like an invader to me.”

“Fair enough. Someone has their ideals in order.”  

Just as she was starting to feel she had the upper hand, she noticed Adams eyes linger on her. She recognized the look, she said some stupid things but was it really enough to concern her that much?

“I’ve been having some fun here, but I really do want to know you better, Cho.” Her voice was suddenly somber and deep. The smell of wine and ashes billowed through the girl’s nostrils. 

“You had to give up a lot, I get that. Honestly, I’d be pretty pissed too.  You were probably on your way to doing some pretty amazing things. I just want you to know that doesn’t have to end here.”

The sincerity was bizarre but not unwelcome. 

“You said your grandmother had a garden, right? It was pretty cold where I grew up so I didn’t get to spend time with that side of nature. You make it seem nice.”

“…We also raised rabbits there.” For some reason she felt guilty.

“Everything good, Cho? How are your legs?”

 “uhh…I’m-!” She squeaked when Adams took her hand. 

“If anything feels off with you, you have to let me know, ok? I&#39;m fine listening to you complain.”

“…Ok.”

Adams examined the girl, moving her body gently like guiding a child into position.

“Is this troubling you?”

“…No.”

“So raising rabbits?&#34; Adams voice charged back with its initial gruffness. But it was warmer now. &#34;Kind of a niche hobby this day and age isn’t it? I can understand granny Cho but you didn’t strike me as the type.” 

“What is that su-- I never saw where they were all kept. I…wasn’t allowed to go there. We planted more flowers than anything, really.”

“Sounds a little sickeningly sweet to me.”

“The bunnies were allowed in the garden though so I could squeeze them all I- mean is it was fun.”  

“Where’d Granny like to grow her plants?”

“Kaesong.”

“Really? Land is kind of precious there, doesn’t sound like a little hobby granny has.”

“We made medicine with them actually. Some of it we gave to the state, but most of it we delivered ourselves.”  

“You seem proud of that. I was beginning to think you forgot how to smile.” 

Cho became aware of how long she must have been travelling without any stops. Just thinking about those summer days at Jangmadang made her feel like a soggy mess. She had to have smelled disgusting.

“I guess I see where your passion for rules comes from. You must have been seeing soldiers all the time.”

“Why would it mean that? It’s our families farm, of course we’d use it to help the state. Not like anyone had to force us.”

&#34;Relax.&#34; Adams brushed a few curly follicles on the back of her head. She noticed her hair had already begun growing after all the work she did. There was also a birthmark, looked a bit like an X, but not much else. 

&#34;Just your family?&#34;

Cho took a deep breath. She hadn&#39;t realized how sensitive her nape was exposed without her curls. “It’s not that weird. She liked to work most of the year with people from the city. But me and my cousins would come in the summer when it got too hot. Even some of my American cousins would come.” 

She started giggling with each word thinking about the games of tug of war they used to have and how her side always won, even if it was only because she stayed on her brother Jun’s side. How she used to chase rabbits until they reached their burrow in the big hill. How her cousin Mel gave her a PSP and how she got to play Birth by Sleep for the first time. It was fun for the 2 weeks before Jun got his hands on it. 

“But I-”

She was shocked out of her nostalgia when Adam’s cold hands brushed her skin in her examination of the girl’s back. She wasn’t surprised to see so many scars. Healing the body was hard enough for most greens let alone odd ones like her.

“But you?”

“I went once in the spring, when I was really little. The flowers had just bloomed…” Adams came back around and gave her chin a lift with a few fingers. “it was…Go-go- going on? What are you doing? Is something wrong with me?”

“Nothing. It just checks out judging by your thick arms and country figure you spent more time outside working than inside writing.” 

2599 launched her fist in the middle of her sentence, only to be swatted away. On the second attempt, Adams grabbed the girl’s arm and pressed it against her back, pinning her to the wall.	

“It’s a nice thing your granny had going on. A community effort to make sure everyone is taken care of.”  

“Argh…let go of-”

“We’re having a nice conversation. Now it’s my turn.” Adams pressed her into the screen. “A friend of mine got hit by a green like you a few years back. The bastard didn’t have to do much, just changed how his brain worked. Whenever he wanted to do something he did the opposite. Doesn&#39;t sound so bad until you&#39;re struggling to eat, struggling to walk and talk, struggling not to off yourself on missions. He had to relearn everything he knew about being alive. What do you think the foundation wanted to do with him?

“I don’t care!” 

“Nope. They wanted to throw him away. He wasn’t useful to anyone the way he was, so they were ready to execute him. So it started with just three of us, me and a couple of his drinking buddies. It took about a year, more checks out of pocket than I care to remember and some surgery at site 120, but now he’s better than he’s ever been.”

“What does that have to do with me?”
 
“Because even now, when he’s really overwhelmed, he asks me to help him eat, he still asks me to help him use the bathroom. A real pain in the ass.”  

“That’s how you talk about your friend?” 

“Of course I would, because the reality is every time he asks it is a pain in the ass. It’s a pain in the ass when he doesn’t ask but needs help. But every time he asks, I do what I can for him. Why do you think that is?”

“I don’t know.” She groaned failing to break the hold. “But I know it has nothing to do with being 
kind!” 

“Of course not, its because we all understand he will never be normal again.”
Cho stopped struggling. 

&#34;What we deal with here is not something to overcome or conquer.  They’re things we have to live with and we can’t do that by being stubborn. If you want a crop to reap, then you have to accept normal doesn’t exist anymore. You get what I’m telling you now?” 

Cho stayed quiet. She tensed but nothing more than that.

“It’s not about inconvenience, or about right and wrong. It&#39;s about getting shit done so we get to live to complain another day.  You’re part of the team now, so I’m going to treat you like it, got it?” 

Her mother always told her work smart, and your body will not suffer. But nothing could have prepared her for this anomaly. There was no compromise with it and yet this woman spoke with such familiarity. How dare she!

How dare she act like she knew  her family that they took her from?  Like she knew how many memories of those summers she had lost serving these monsters! How would her father get better if she wasn’t around? Who would take responsibility for the family business if her mother fell ill working so hard to fill in his shoes? How dare she!

“Ok, I get it.”

But she was here, and the door was open for her to get her life back on track. She already felt enough shame struggling in this grip. So, she would behave. But she swore one day she would make them pay for this.

“You can let go of me now.” Adams obliged. 

That day would be today!

“Dumbass!” She immediately went for a hell-sweep but found Adam’s legs were as tough as steel and hurt as much to strike. 

“Ack!” She fell back holding her heel, sucking her teeth and exhaling as the pain reverberated. 

“In one ear and out the other.” She took a drag from her cigarette as 2599 sat with her back against the film. 

“You can’t buy trust and you sure as hell can’t take it.  You got to earn it.”

“How do I do that, if I’m just an SCP?” 

“Well to start with, this whole teen angst thing? Really shitty way to earn trust.” 

“Fine, I have to earn your trust, and you don’t have to earn mine. Leave me alone already!”
She stared at the flustered girl as she took another drag. She then let them close humming softly to herself.

“That’s right, I don’t have to earn your trust.” She walked back to the face and tapped away the ash of her cigarette. 

“But I would like to have it. Would make my job a lot easier.”  Adam’s muttered as she sank back into her seat.

“Did you have fun?” Valdes said, not moving an inch as Adams approached. 

“She hasn’t had a real conversation for over six months and we don’t know what else Wensley may have done to her. We’re lucky she’s as stable as she is, I don’t need any surprises onsite.” 

“I didn’t realize interrogating children was a part of the Alpha Nine handbook.” 

She scoffed a tuft of smoke at the mention of such an old thing. “Acting like you care. Besides she’s not a kid anymore. Adams leaned back in her chair, ignoring the squelch as it bent. 

“When is this thing landing anyway?”

“This speed is for you and the cargo. It’s not like time matters here.” 
She was still processing it. The image of 2599 with blood racing off her arms and her legs trembling like a newborn goat that crossed her vision. It would be a question that went unanswered. The girl was going to be another headache on the pile. One reality would offer no solutions for.

“Well don’t let that slow you down.” She sighed, closing her eyes.
 
At least she was annoying to everyone.

The thought was the last thing 2599 hoped to remember from the terrible conversation. Her brooding brought her back to the film. She noticed the mountains left her behind. It was just the haze now, with neon lights swimming through the abyss. 

She blinked a few times and was disappointed the landscape didn’t change. How did it all work? She experimented with keeping her eyes closed or covering them with her hands. She tried to surprise herself, turning her back to her reflection. She turned forward with a hop then fell back with a loud gasp as everything vanished. No haze, no sky, no lights, no color. Nothing. 

“What are you doing back there?”

“Sorry!”  

She climbed back into her seat, sitting oddly to avoid aggravating her soreness. She looked out the looking skin again to see they were beside a tall fence with a flower garden behind it. 
She felt a familiar whimsy. As they continued to move, a table stretched as far as the fence in the garden, fitted with an assortment of utensils, teapots, and glasses.

Even her dreams never felt this…free?

It didn’t wait anymore for her to blink; a twitch of her eyes was enough to distort the image. 
Bursts of light began popping in the sky and streaking down to the ground. The flowers had fused together stretching to meet these lights until she witnessed a mess of polychromatic static. 
It was bright. It was chaos. It was incomprehensible. It was hypnotizing. She reached out a hand, like she had lost something past the barrier. 

The disorder began to sort itself, becoming a cold gray as the light scattered. Now there were huge blocks stacked atop each other with each shift revealing smaller and smaller ones. Was any of it real? Was it just her imagining it? 

She darted her eyes to a wicked looking statue that was trying to be a person when her view slid left, she noticed two of the skyscrapers were hugging. Her grandmother believed A place however big or small hurt like people do. This world seemed as lonely as she did. The link of their arms began to drift lower, the other blocks melted away with fading colors. 

It was dark now and two lights flew back into view. They each began to stretch into a thin diamond shape. A third light started to emerge between them growing larger. A face started to form between the lights and the rubble. Its stony smile cracked to open even wider. She smiled back, it just felt polite. The light of the train made a portrait of the smile, casting it across the car with its contrast to the darkness. More cracks were forming.  

She closed her eyes and looked away, but she still saw an after image burned into her retina. She felt dizzy as she tried to tighten her eyes. She could still feel it. It’s hand on her shoulder and its breathing. It’s knowledge of her skin as it entered beneath.

They stopped suddenly, forcing her eyes open in shock. 

They were in the sky now. Nothing strange about it, just flying amongst the clouds in the early morning. 

It looked just like this the day she had flown to California. Ten years ago. She realized why she had thought so much about her grandmother. Besides her brother who sucked, she was the only one who made the supernatural fun. 

Her dad told his stories, and he had a way with words, but they were always to warn her to stay away from the world’s oddities and those who sought them.

Mom always figured there was a reasonable explanation for everything, so she wrote anything weird as fearmongering nonsense for the uneducated.

Normal people took them exactly as they were, stories. Well, it turned out the world was big enough that even all the stories’ people could dream of, or couldn’t for that matter, were all true. She felt a little vindication knowing she was really here. Real. Horrible. Awesome.

“Alright, we need to sit tight for a while.” Adams and Valdes left the front seat.

“Oh. I thought we were finally here.” 

“We are, but train has to stabilize.” 

Valdes opened the door.

“Then we have to stabilize.”

Valdes slammed the door shut on his way out.

“Yea he’s different.” Adams replied to 2599’s look of disbelief. “He’s also got an adorable little attitude problem so it’s best not to let him get to you. Trust me he loves when it gets to you.” 

“…ok.”

She didn’t know what signal they were waiting for and she dreaded the idea of asking. Adams kept avoiding even looking at her. She had no idea what to make of her now, everything the woman did was confusing or annoying even if it seemed like she really did want to help her. It was her job. Just a job. She was tired of being a job for people. By the time the beeps rang out in their unorthodox sequence, she hadn’t even notice if any time passed at all.

“Alright time to go.” Adams opened the door slowly. Most people feel a little vertigo and nausea. Sometimes it leaves you a bit stiff. But you’ll be fine.” 

“…ok.”

It was nothing but the same sky to greet them. Adams stepped out and took a deep breath once both of her feet were firmly floating in the air. She turned around and offered her hand.

“Greens like you are even less affected. Now can we go today?” 

Cho took careful steps to the edge, doing her best to believe that she would feel solid ground when she stepped out. She found it hard to reach for Adams hand. But eventually she made her choice. 

She then, promptly, tripped out of the car and into the clouds.
 
Her descent was fast, and stable because of it. She saw her own face looking back at her, drifting farther away. Adams lifted her counterpart off the ground and carried it to a group of white coats not too far from a large fearsome looking serpent. 

The image was distorted as the distance grew. She could feel the humidity of the clouds below her. They were all becoming dots so fast. She didn’t feel a loss of breath or focus, just a loss of time.  The clouds were becoming thicker, with a sizzling scent of burnt sugar and the buzzing sounds of static. Colors became sharp before the darkness began to spread in the shadow of the mist. 

The only light left came from a trillion stars rising beneath her from realms unknown, spreading into an array of colors scattered far. The colors swam towards her, a school ready to feed, starting with her face. She closed her eyes to stop the tears from breaking through. It was heavy, heavier than fear, too heavy to hold.  She fell, faster and faster in her arms, unable to run.
