    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>**Item #:** SCP-9078

**Object Class:** Safe (To be reclassified as Thaumiel)

**Special Containment Procedures:** SCP-9078 is to be stored inside a copper-lined containment chamber outfitted with no less than ten (10) acoustic damping devices in order to minimize anomalous audio emissions. Personnel are to refrain from manipulating the volume control setting of SCP-9078 without proper noise-reducing headphones. Should any unplanned broadcasting occur while maintenance is underway, sound dampening procedures will need to be reinstated immediately or evacuation of the chamber is advised.

**Description:** SCP-9078 is an autonomous Sony BRAVIA KDL-46X1000 television set. The device has sustained superficial damage as a result of extensive use. The anomalous television does not receive regular terrestrial or digital broadcasts. It only displays and manifests EAS transmissions.

The anomalous properties of SCP-9078 involve its sensory scope, which covers 0.2 km with complete omnidirectionality. It can affect physical objects in this radius depending on the nature of its broadcast in question. A &#34;Shelter-in-Place&#34; announcement results in the instantaneous bonding of all apertures to adjacent surfaces, effectively hermetic-sealing the environment until the subsequent end of said broadcast. SCP-9078 cannot be deactivated. However, turning its volume down below fifty (50) greatly reduces or eliminates the impact of its anomalous abilities.

The entity is able to generate categories of alerts on its own, including &#34;Hazardous Anomaly Warning,&#34; which it broadcast during a containment breach involving SCP-965. SCP-9078 is sentient and expresses itself through a pre-programmed voice called &#34;Paul.&#34; Forensic analysis of the machine shows it to have been produced for a civil defense department located in [REDACTED], Denmark, although the anomalous effects may have been unnoticed prior to acquisition by the Foundation.</textarea></pre>
