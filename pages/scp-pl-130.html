**Item #:** SCP-PL-130

**Object Class:** Euclid

**Special Containment Procedures:** The subject is kept contained in Site ██. SCP-PL-130 is contained in a room with dimensions of 6 x 10 x 5 [m]. Bricked into the walls are remains of destroyed instances of SCP-PL-130-2. The containment room is guarded by 2 guards of a level 3 security clearance. These guards are equipped with standard rifles as well as hand grenades with a gas, which composition includes the bone tissue of SCP-PL-130-2. If containment measures are breached it is advised to nullify the subject with the help of gas, and then destroy the &#34;body&#34;, in which is found SCP-PL-130-1.

**Description:** SCP-PL-130 is separated into two parts: SCP-PL-130-1 (referred to as the &#34;Soul&#34;), as well as SCP-PL-130-2 (referred to as the &#34;Body&#34;).
 SCP-PL-130-1 visually resembles a pale source of light with a slight blue tint, which has the ability to levitate. The subject is conscious and intelligent, however it does not have the ability to speak, and reluctantly cooperates with Foundation personnel. The object also complains about the lack of freedom and the inability of creating new instances of SCP-PL-130-2. The being, if it has the means to do so will construct &#34;bodies&#34;.

SCP-PL-130-2 are puppets, which have been created by the &#34;Soul&#34;. Visually they resemble humanoids, likely modelled on the form of a human, however they are made in mere resemblance, which does not allow for any closer identification into the original model. These beings are most often made from flesh and bones, however if SCP-PL-130-1 is unable to access these materials it is able to construct puppets from any organic material. After constructing the subjects the &#34;Soul&#34; will avoid them from 10 minutes to 12 hours, this time is referred to as the &#34;maturation&#34;. After this period it will be able to come into interaction with the above mentioned beings. The objects gain anomalous properties after interaction with the &#34;Soul&#34;, or with SCP-PL-130-X.

If a &#34;body&#34; is present near SCP-PL-130-1, both objects merge creating SCP-PL-130-X. This occurs by the penetration of the &#34;Soul&#34; into the subject. If this occurs, a pale light will begin to shine from the orifices of the &#34;body&#34;, and the subject itself will be made alive, and it will gain the ability of speech. If the object is destroyed SCP-PL-130-1 will return to its original state.

If in the vicinity of SCP-PL-130-X is found SCP-PL-130-2, which has undergone the stage of &#34;maturation&#34;, the subject will attempt to touch the object. If this happens the &#34;body&#34; will gain the ability to move, but will be subordinated by SCP-PL-130-X, which results in the entity forcefully executing the commands of the &#34;Soul&#34;, which are likely transmitted telepathically. The actions of objects in this phase are unpredictable, the &#34;Soul&#34; will try to act like a human, which may both lead to thoughtless actions, and complex and well thought-out actions. Due to the fact that SCP-PL-130-X can create SCP-PL-130-2 in an unlimited amount, it is advised to instantly destroy the subject immediately after &#34;connection&#34;.

[[collapsible hideLocation=&#34;both&#34; show=&#34;Interview 130-1&#34; hide=&#34;hide&#34;]]
  **Interview 130-1**__
&gt; **Interviewed:** SCP-PL-130-X
&gt; **Interviewer:** Dr ████████
&gt; 
&gt; **&lt;hour 18:07. SCP-PL-130-X is chained to an iron chair fixed to the floor. The Doctor walks in and sits opposite the subject&gt;**
&gt; **Dr ████████:** Hello SCP-PL-130. I would like to ask you a few questions.
&gt; 
&gt; **SCP-PL-130:** I&#39;m listening...
&gt; 
&gt; **Dr ████████:** Who are you?
&gt; 
&gt; **SCP-PL-130:** For now I am only an &#34;anomaly&#34;. You imprison me, and I need freedom, I need information, to find out how to create the ideal body and become like you, become a human.
&gt; 
&gt; **Dr ████████:** The Foundation rewards objects, which cooperate. Could you tell me why you are doing this? Why you are trying to obtain an &#34;ideal body&#34;?
&gt; 
&gt; **SCP-PL-130:** Because I need it. They told me that only people can enter. I was never a human, or at least nobody regarded me as a human. I was above that. And now a mere human is better than me. I need to become one of you, to find peace. Will you help me?
&gt; 
&gt; **Dr ████████:** Who are &#34;they&#34;?
&gt; 
&gt; **SCP-PL-130:** They care for the cold people. They are there where no one living has access to. That is all I can say, but in reality you know who they are, but you push away this thought from yourself. Will you finally let me out?
&gt; 
&gt; **Dr ████████:** **&lt;After a moment of pause&gt;** I still need to ask you a couple of questions. How do you know how to build these puppets?
&gt; 
&gt; **SCP-PL-130:** The little people told me... it was in a playground. I asked what a human is made out of and then answered me.
&gt; 
&gt; **Dr ████████:** And what is it made out of?
&gt; 
&gt; **SCP-PL-130:** From meat. From bones. From water. They also told me about other parts, but they seemed stupid, so I ignored them.
&gt; 
&gt; **Dr ████████:** What were those parts, SCP-PL-130?
&gt; 
&gt; **SCP-PL-130:** Nonsensical and irrelevant, like emotions. After all, it does not exist materially, I can&#39;t put this inside a body!
&gt; 
&gt; **Dr ████████:** You are right, it is irrelevant..
&gt; **&lt;Object stopped reacting to questions&gt;**
&gt; **&lt;End of log&gt;**
&gt; **Summary:** It is recommended to continue to keep SCP-PL-130 in the belief that the features in the log given are irrelevant.

[[/collapsible]]

[[collapsible hideLocation=&#34;both&#34; show=&#34;Secured notes SCP-PL-130&#34; hide=&#34;hide&#34;]]
&gt; I miss the times when everything seemed so beautiful. I never fully appreciated what I have, but now, when they are keeping me here like no more than a criminal I think that they were incredible times. I long, once more, to feel the wind on MY skin, as well as to be treated as a human, not as a monster.
&gt; But if the Foundation will continue to keep me in this cell, I will not get back my not-life, I will be condemned to a worthless existence here.
&gt; Humans have always lacked the feeling of justice. They kill, and when someone retaliates they accuse of the worst of things. This is what do those who call themselves higher beings.
&gt; Despite these numerous flaws, people have something in them, which makes me sometimes forget about their sins.
&gt; But some sins you cannot forget.
&gt; Robberies, rapes, murders. How many times have they killed me? How many times have they robbed me? Their warped minds wouldn&#39;t last a day without doing harm.
&gt; So why shouldn&#39;t I do harm to them?
&gt; End of ends, this world is based on violence.
[[/collapsible]]
