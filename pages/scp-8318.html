**Item #**: SCP-8318

**Object Class**: Keter

**Threat Level**: Orange (Obscure/Hostile Potential)

**Special Containment Procedures**: The geographical area encompassing SCP-8318 (designated Zone-8318) has been classified as a restricted cultural heritage site under Foundation front company ████████████. All civilian access is barred under the pretense of environmental protection and indigenous rights preservation.

A perimeter radius of 3 km is monitored via motion-sensitive drones and EMF detectors. Foundation personnel stationed at Site-███ must not attempt to activate SCP-8318 under any circumstance without Ethics Committee authorization.

All experiments involving biological materials on SCP-8318 have been suspended indefinitely following Incident 8318-A.

Due to SCP-8318&#39;s passive activation mechanism and its lethality to unrelated civilians, total containment is prioritized over study. Unauthorized interaction may result in immediate disciplinary action or termination. SCP-8318 is currently classified as a high-risk parabiological and memetic hazard pending further analysis.

**Description**: SCP-8318 refers to a cluster of four geographically separated hills (designated SCP-8318-A through SCP-8318-D) located in [REDACTED], near the former site of the ███████ tribe in ███████ Africa.

When four distinct anatomical sections (cranial, thoracic, abdominal, and upper femoral) of a once-living organism are placed individually at the summits of each SCP-8318 location, the organism will spontaneously reconstruct and reanimate approximately 5–12 hours later.

Reanimated specimens (designated SCP-8318-R) demonstrate:

* Basic biological functions (breathing, standing, limited eye movement)
* Complete absence of voluntary behavior or stimulus response
* Eventual biological death within 3–7 days

Each activation of SCP-8318 consistently leads to the deaths of four individuals, spatially distributed across distinct locations within a 2–5 km radius. Autopsies reveal:

* Acute necrosis and internal decay concentrated in head, chest, abdomen, and femoral regions
* No common preexisting conditions
* Deaths occur within the same time frame as the reanimation

&gt; **Discovery Log**: SCP-8318 was discovered following the declassification of a private research journal authored by Dr. T. Kamau, a Kenyan anthropologist active in the 1980s–1990s. The journal was recovered by his granddaughter, Dr. Miriam Kamau (a Foundation-affiliated cultural analyst), who submitted the materials for analysis under anomalous folklore protocol FOLK-13.[[footnote]]Internal Foundation protocol for the analysis and classification of anomalous folkloric materials, including oral legends, religious narratives, and recovered ethnographic artifacts that suggest the presence of SCP phenomena.[[/footnote]]
&gt; 
&gt; A photo included in the journal depicted a goat bearing four distinct markings standing intact at the edge of a hill. Subsequent forensic data matched the animal to one reportedly sacrificed earlier that day.
&gt; 
&gt; Cross-reference with local health records confirmed the simultaneous death of four villagers, each displaying regionalized tissue failure corresponding to the anatomical sections used in the ritual. No other cases of comparable pathological presentation were identified that year, underscoring the singular nature of the event.
&gt; 
&gt; The journal also referenced an artifact described as a fragmented black stone engraved with four unknown glyphs previously held by the tribal elders. The artifact was reportedly shown to Dr. Kamau under strict secrecy and was believed by locals to be sacred. Following the incident, the artifact could not be located, and is currently classified as missing. Retrieval is considered Priority-Level 3, with investigation assigned to Mobile Task Force Mu-98 (“Myth Chasers”).
&gt; 
&gt; **Personal Note by Dr. Miriam Kamau**: “My grandfather spent years chasing this myth, not out of arrogance, but guilt. I think he blamed himself until the day he died. Some parts of the journal feel like hallucinations, others too detailed to be false.”
&gt; 

&gt; **Addendum SCP-8318.1 - Recovered Journal Excerpt (Dr. T. Kamau)**:
&gt; 
&gt; **17 Februari 1985**
&gt;
&gt; //Nilirudi katika kijiji cha █████ leo, baada ya siku nne za safari kutoka ███████. Jumuiya hii haipo kwenye hati zozote za kikoloni au utafiti wa kihistoria ninaoujua. Lugha yao ina mizizi na Kinubian, lakini kuna athari za zamani. Hii inaweza kuwa nafasi pekee ya kurekodi historia yao kabla ya kutoweka kabisa.//
&gt;
&gt; (I returned to the village of █████ today, after four days of travel from ███████. This community is absent from any colonial documents or historical research I know of. Their language shares roots with Nubian, but there are older traces. This might be the only chance to record their history before it disappears entirely.)
&gt; 
&gt; **12 Agosti 1986**
&gt;
&gt; //Tangu mwezi uliopita, nimefanikiwa kuleta daktari kutoka ██████ mara mbili. Watoto walikuwa na homa ya matumbo na wazee walikuwa na shinikizo la damu lisilotibiwa. Kiongozi wa kijiji alisema kwa mara ya kwanza watu wake wameweza kupata msaada bila hofu ya kudhalilishwa au kuchukuliwa.//
&gt;
&gt; (Since last month, I managed to bring a doctor from ██████ twice. Children had typhoid, and the elders had untreated hypertension. The village leader said it’s the first time his people have received help without fear of humiliation or being taken away.)
&gt; 
&gt; **3 Januari 1988**
&gt;
&gt; //Leo walinifungulia chumba cha zamani karibu na mti wa tambuu. Ndani, kulikuwa na sanduku lililokuwa limefungwa kwa ngozi na kamba za zamani. Sikuuliza kilichomo - waliniambia, ‘Bado hujawa tayari.’ Lakini nilihisi, kwa mara ya kwanza, kwamba wanaona mimi si mgeni tena.//
&gt;
&gt; (Today they unlocked an old room near the tambuu tree. Inside was a box sealed with hide and old ropes. I didn’t ask what was inside - they told me, ‘You are not ready yet.’ But for the first time, I felt they no longer saw me as a stranger.)
&gt; 
&gt; **28 Machi 1989**
&gt;
&gt; //Nimevutiwa na jamii hii, si kwa sababu ya hadithi zao, bali kwa sababu ya ujuzi wao wa kipekee wa kihistoria. Lugha yao ina maneno ambayo hayapatikani kwenye familia yoyote ya lugha niliyoisoma. Kuna uwezekano mkubwa kuwa jamii hii ni mojawapo ya vizazi vya mwisho vya ustaarabu usiotambuliwa.//
&gt;
&gt; (I&#39;m fascinated by this community, not because of their stories, but because of their unique historical knowledge. Their language contains terms not found in any linguistic family I&#39;ve studied. There’s a strong possibility that this tribe is one of the last descendants of an undocumented civilization.)
&gt; 
&gt; **03 Aprili 1990**
&gt;
&gt; //Watoto wawili wamekufa wiki hii. Malaria, walisema. Lakini hilo halielezi jinsi macho yao yalivyokuwa na hofu hata walipolala.//
&gt;
&gt; (Two children died this week. Malaria, they said. But that doesn&#39;t explain the fear in their eyes, even in sleep.)
&gt; 
&gt; //Mwana wa Omari alikuwa mjanja sana. Alipenda kuniuliza kuhusu dunia ya nje. Siku moja aliniambia angekuwa daktari ili asaidie kijiji.//
&gt;
&gt; (Omari’s son was so clever. He liked asking me about the world beyond. One day, he said he wanted to be a doctor and help the village.)
&gt; 
&gt; //Lakini sikuweza kumsaidia. Nilijua hatari ya maji machafu, lakini sikuwa nimefanya chochote hadi sasa. Labda nimezoea kuwa mtafiti zaidi ya kuwa binadamu.//
&gt;
&gt; (But I couldn’t help him. I knew the danger of the dirty water, but I hadn’t done anything until now. Maybe I’ve grown too used to being a researcher instead of a human.)
&gt; 
&gt; **12 Mei 1990**
&gt;
&gt; //Tumeanza kuchimba mfereji mdogo kutoka mto mdogo kuelekea kijiji. Inachukua muda, lakini watu wanafurahia. Nimeandika barua kwa daktari ambaye nilikutana naye mjini ███████████ - yuko tayari kuja mara moja kwa mwezi.//
&gt;
&gt; (We’ve begun digging a small trench from the nearby stream to the village. It’s slow work, but the people are excited. I’ve written to a doctor I met in ███████████ - he’s willing to visit once a month.)
&gt; 
&gt; **17 Desemba 1990**
&gt;
&gt; //Nimefanikiwa kuratibu mpango wa afya ya msingi kwa kijiji. Daktari kutoka Afrika ██████ sasa huja mara moja kwa mwezi. Tumefanikisha pia kuweka bomba la maji kutoka mto ulio karibu. Watu wameanza kuniita &#34;rafiki wa jamii.&#34;//
&gt;
&gt; (I&#39;ve managed to coordinate a basic health initiative for the village. A doctor from █████ Africa now visits once a month. We&#39;ve also installed a pipeline from the nearby river. The people have begun calling me &#34;a friend of the community.”)
&gt; 
&gt; **03 Juni 1991**
&gt;
&gt; //Kichwa wa kijiji amenipa nafasi ya kuona kile walichokiita jiwe la miujiza. Lilikuwa limevunjika vipande vinne. Alisema maneno yaliyokuwemo kwenye jiwe hilo ni siri ya zamani, hurithiwa tu kwa viongozi.//
&gt;
&gt; (The village elder gave me a chance to see what they called the miracle stone. It was broken into four pieces. He said the words carved on it are an ancient secret, passed only between leaders.)
&gt; 
&gt; //Alionekana kuwa na hofu hata kuzungumza juu ya hadithi hiyo. Nilihisi si hadithi ya kawaida. Labda ni fumbo. Au onyo.//
&gt;
&gt; (He looked afraid even to speak of the legend. I felt it wasn’t just a story. Maybe a riddle. Or a warning.)
&gt; 
&gt; **20 Desemba 1993**
&gt;
&gt; //Nimeanza kuamini kuwa kuna ukweli ndani ya hadithi hii. Majina ya milima minne yaliyochorwa kwenye jiwe yanafanana na sauti zinazopatikana katika lugha ya jamii hii - lakini hakuna anayekumbuka milima hiyo iko wapi. Nitajaribu kutafuta.//
&gt;
&gt; (I&#39;m starting to believe there&#39;s some truth to this story. The names of the four mountains carved on the stone resemble sounds found in the language of this community - but no one remembers where the mountains are. I&#39;ll try to find out.)
&gt; 
&gt; **12 Juli 1997**
&gt; 
&gt; //Mbuzi huyo hakusogea hata kidogo. Alisimama pale vile vile, kama sanamu. Lakini niliona kifua chake kikiongezeka na kupungua - alikuwa akipumua.//
&gt;
&gt; (That goat didn’t move an inch. It stood there like a statue. But I could see its chest rise and fall - it was breathing.)
&gt; 
&gt; //Nilijaribu kumkaribia usiku uliopita. Macho yake yalikuwa matupu - sio tu kama mnyama aliyekufa, bali kama hakuwahi kuishi.//
&gt;
&gt; (I tried to approach it last night. Its eyes were empty - not like a dead animal, but as if it had never lived.)
&gt; 
&gt; //Asubuhi hii nilirudi kijijini. Watu wanne walikufa usingizini. Kila mmoja alikuwa na uozo kwenye sehemu tofauti: kichwa, kifua, tumbo, na paja.//
&gt;
&gt; (This morning I returned to the village. Four people had died in their sleep. Each had rot in a different part: the head, chest, stomach, and thigh.)
&gt; 
&gt; //Najua kilichosababisha. Najua.//
&gt;
&gt; (I know what caused it. I know.)
&gt; 

&gt; **Addendum SCP-8318.2**: Experiment Log SCP-8318.2 (01/09/2005)
&gt; 
&gt; Test Materials: One (1) SCP-8318-R ( //Capra aegagrus hircus// - goat), euthanized, dissected into four anatomical sections matching SCP-8318 pattern. 
&gt; 
&gt; Procedure: Each part placed on summit of SCP-8318-A through SCP-8318-D, over 1.5 hours.
&gt; 
&gt; Outcome: Goat reassembled and found standing 10 hours later on the summit of SCP-8318-D, unresponsive to stimuli. No Foundation personel stationed near SCP-8318-D reported witnessing the transport or reappearance of any goat remains, suggesting the reassembly occurred instantaneously or outside human perception. Expired 6 days later.
&gt; 
&gt; Simultaneously, 4 civilian deaths reported in the nearby villages of ███████, █████, and ███████. Autopsy results: localized necrosis matching dismembered regions.
&gt; 
&gt; Result: Ethics Committee has prohibited further experimentation. This event has been formally designated as Incident 8318-A.

[[collapsible show=&#34;+ Ethics Committee Memorandum - Re: Incident 8318-A&#34; hide=&#34;- Hide Ethics Committee Memo&#34;]]

&gt; **To:** Site Director, Site-███  
&gt; **From:** Ethics Committee Oversight Cell  
&gt; **Subject:** Moratorium on Further Biological Testing Involving SCP-8318 
&gt; **Date:** 04/09/2005  
&gt;  
&gt; Following the outcome of Experiment Log SCP-8318.2 and the resulting civilian casualties, the Ethics Committee has unanimously voted to suspend all further experimentation involving SCP-8318 indefinitely.  
&gt;  
&gt; The lack of predictability in SCP-8318&#39;s activation and its lethal collateral effects on uninvolved civilians represent a gross ethical violation under Protocol-7B (“Unintended Civilian Harm”). No additional testing, dismemberment procedures, or biological interactions are to occur without express approval from the O5 Council.  
&gt;  
&gt; Continued observation of SCP-8318 is authorized, but all activity must prioritize non-interference. Local mythos should be treated as containment-relevant intelligence and not provocation for further rituals.  
&gt;  
&gt; Consider this memorandum binding and final.  
&gt;  
&gt; - Ethics Committee, ████████████  

[[/collapsible]]
