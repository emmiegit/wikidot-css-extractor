[[collapsible show=&#34;+Dr_Wondertainment_Chactersdesign&#34; hide=&#34;silly_little_nonbinary&#34;]]
[[image https://scp-wiki.wikidot.com/local--files/randomraven-artwork-hub/dr_wondertainment__ref_by_randomravenart_dkji040-pre.webp]]
[[image https://scp-wiki.wikidot.com/local--files/randomraven-artwork-hub/1000019234.webp]]
[[image https://scp-wiki.wikidot.com/local--files/randomraven-artwork-hub/1000019235.webp]]

Ok to clarify. This is my own version of Dr. Wondertainment.  This version is nicknamed Wonder. I&#39;ve been thinking of trying to start up Dr. Wondertainment comic again. Why I wanted to draw this ref sheet. Also wanted to do it for fun. 

But let&#39;s dive deep whys and what&#39;s.  So this version of Dr. Wondertainment is relatively bender that came from a fourth-dimensional universe. Imagine a universe like psychedelic, modern art. Anyway, in that, please either go there and twist around people or be warped.  Thanks to that, they can warp things to their will.  In the second ref, we can see stages of them figuring out the whole human form thing.  It would be interesting to draw each stage out. And the last one just has different outfits and an Alagadda form. My reason why it looks like this is that this version of Dr. Wondertainment has never been there, so they don&#39;t have an ideal form. As well, the plane will probably be fucking confused about what makes them. So they spit this version out that&#39;s close to when they were still figuring out the human body. Aswell the Artstlye base on chikondoesstuff version of the plan.  It&#39;s really gorgeous, so check them out. But yeah, that&#39;s most of the explanation. If you have any questions I&#39;ll gladly answer.
