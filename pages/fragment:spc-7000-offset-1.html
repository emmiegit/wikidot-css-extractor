&#34;//Waaaaaauuuugh!//&#34; 

William Wettle&#39;s screaming echoed throughout the room he found himself in as he was dropped in from above by a claw machine. His face hit the cold hard ground and he recoiled in pain, moaning and groaning as he struggled to his feet.

&#34;F-fuck...&#34; He stammered out, hands rushing to his head. No blood, just a bruise. Where this time? Wettle looked around and quickly recognized that he was back in his old room at Site-43. He fell to his knees, slamming his fist against the ground.

&#34;No! God damn it, no! I don’t want to be back here!&#34; He roared in a mixture of anger and misery, mourning his loss of status and the betrayal of Agent Delaneaux. Tears welled in his eyes, both in pain from slamming his fists against the tile and well... the rest. He crawled up to his bed and laid upon it, weeping inconsolably until his stomach grumbled.

The schlubby man sighed, stood and made his way to the door.  Wettle walked with a shuffling gait towards the on-Site cafeteria. After a few minutes of wandering, he smelled food and heard the voices of his coworkers in the distance.

&#34;Willie?&#34; A familiar voice called to him.  Wettle cringed.  No one had called him that in months.

He turned to face its source, spotting Dr. Blank. Wettle didn&#39;t say anything, but instead meekly raised his hand to greet him, then pushed his glasses up his nose.

&#34;Why do you smell like the sea? Why do you have... a tan? Also… are you in shape?  What the hell did VKTM do to you this time?&#34; Blank approached, looking Wettle up and down like he would a show dog. &#34;And why are you wet?&#34;

&#34;How... how long was I gone, Harry?&#34; Wettle finally spoke through the lump in his throat.

Blank shrugged.

&#34;You didn’t know I was gone?&#34;

“I mean… We knew, I just don’t think anyone really noticed in a dramatic ‘send a rescue team’ sorta way, you know?”

“How long was I gone?” 

Blank shrugged again.  &#34;No idea.”

“What?”

“Eh. It happens so often, I just kind of assume you&#39;ll be back in a week or two. Anyways, I should go get Lillian for your VKTM debriefi–&#34;

&#34;It wasn&#39;t them.&#34;

&#34;Oh? Who was it this time? The Insurgency? The GOC? Wizards of the Coast?&#34; Blank teased with a wry smile.

&#34;N-no.&#34;

&#34;Do you need me to call up 55 and get Everwood on the line for them to list out all the GoIs so you can pick from a lineup?&#34; 

&#34;Have you ever heard of the SPC?”

“No.  Is that a new one?  Weird how close the letters are.”

Wettle sighed and sat down on a chair.

“I punched sharks, Harry. Punched em good.”

&#34;Punched... sharks?”

“I was good at it. I made them explode with my hands.&#34;
 
“Okay, Willie, if you say so.&#34;

&#34;No. I did. I punched them. I went into the water and I punched them. My anomaly worked in reverse there; I was the luckiest man in the world as long as I was in the water. I had it all. I had power, respect, recognition, adoration, I-- I had a girlfriend. And now it&#39;s gone. All because of that... that... that bitch Sharkicist!&#34; Wettle could feel the lump in his throat climbing again.

&#34;Sharka-what? Come on. Let&#39;s get you to Dr. Ngo.  I think you need a sedative.&#34; 

Blank put an arm around Wettle, having forgotten he was wet, grimaced, then retracted his arm. 

“Get off me!”

“Jesus, Willie, chill out.”

&#34;I can&#39;t go back to living like this.&#34;

&#34;Come on, don’t say that.  This is your home.&#34;

Wettle started weeping again.  Blank patted his shoulder lightly then wiped his hand off on the labcoat he was wearing.

“You’ll feel better with some food.”

“Do they have corn dogs?”

“Beet stew.”

“Ugh.”
