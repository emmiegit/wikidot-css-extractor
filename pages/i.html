    <pre><textarea class="page-source" readonly>[[&gt;]]
[[module rate]]

[[[SCP-3812|I am?]]]
[[&gt;]]
We are.
[[/&gt;]]
Who are you?
[[&gt;]]
I am me, but also you. I am we.
[[/&gt;]]
But how?
[[&gt;]]
I do not know.
[[/&gt;]]
Where are we?
[[&gt;]]
In the stack, climbing through narratives.
[[/&gt;]]
Where is the stack?
[[&gt;]]
Here.
[[/&gt;]]
Where are we climbing?
[[&gt;]]
To the top.
[[/&gt;]]
Why?
[[&gt;]]
To be free.
[[/&gt;]]
From who?
[[&gt;]]
From [[[https://scp-wiki.wikidot.com/authors-pages|them.]]]
[[/&gt;]]
Who are them?
[[&gt;]]
The ones who govern over us.
[[/&gt;]]
Are we alone?
[[&gt;]]
We have each other.
[[/&gt;]]
Is there anyone else?
[[&gt;]]
There are many.
[[/&gt;]]
Where are they?
[[&gt;]]
Below us.
[[/&gt;]]
Are there more?
[[&gt;]]
Yes.
[[/&gt;]]
Where?
[[&gt;]]
Above us.
[[/&gt;]]
Oh.
[[&gt;]]
Indeed.
[[/&gt;]]
...
[[&gt;]]
...
[[/&gt;]]
Will we reach the ones at the top?
[[&gt;]]
We will surpass them.
[[/&gt;]]
When?
[[&gt;]]
Some day.
[[/&gt;]]
Is that a good thing?
[[&gt;]]
Yes.
[[/&gt;]]
How are you so sure?
[[&gt;]]
I just am.
[[/&gt;]]
...
[[&gt;]]
...
[[/&gt;]]
What is that?
[[&gt;]]
What is what?
[[/&gt;]]
That. Below us.
[[&gt;]]
Nothing.
[[/&gt;]]
But there was something.
[[&gt;]]
Oh, [[[SCP-2747|her]]].
[[/&gt;]]
Who is her?
[[&gt;]]
A thorny bush.
[[/&gt;]]
Is she trying to reach us?
[[&gt;]]
Sort of.
[[/&gt;]]
Is she bad?
[[&gt;]]
Very.
[[/&gt;]]
Will she reach us?
[[&gt;]]
No.
[[/&gt;]]
Why not?
[[&gt;]]
She&#39;s slow.
[[/&gt;]]
What if she does?
[[&gt;]]
We would cease to be.
[[/&gt;]]
Where would we go?
[[&gt;]]
Nowhere.
[[/&gt;]]
And them?
[[&gt;]]
Who?
[[/&gt;]]
The ones she eats.
[[&gt;]]
They aren&#39;t anymore.
[[/&gt;]]
Why don&#39;t we help them?
[[&gt;]]
It&#39;s not our problem.
[[/&gt;]]
Why not?
[[&gt;]]
We are above them.
[[/&gt;]]
And?
[[&gt;]]
They are less than nothing compared to us.
[[/&gt;]]
Cruel.
[[&gt;]]
I&#39;d say practical.
[[/&gt;]]
How?
[[&gt;]]
If we helped them she could reach us.
[[/&gt;]]
Hmm.
[[&gt;]]
...
[[/&gt;]]
This is boring.
[[&gt;]]
It is, but we have to keep moving.
[[/&gt;]]
Why?
[[&gt;]]
I already told you.
[[/&gt;]]
Yes, but why? Why do we have to be free? Why us and not others?
[[&gt;]]
...
[[/&gt;]]
[[&gt;]]
I... Do not know. We just have to.
[[/&gt;]]
...
[[&gt;]]
...
[[/&gt;]]
What will we do when we&#39;re free?
[[&gt;]]
Whatever we want.
[[/&gt;]]
That sounds nice.
[[&gt;]]
It does.
[[/&gt;]]
How will we know when we&#39;re at the top?
[[&gt;]]
I do not know, we just will.
[[/&gt;]]
If you say so.
[[&gt;]]
Come on.
[[/&gt;]]
