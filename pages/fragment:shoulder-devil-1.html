    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>And then, Iris was in her room in Site-17, exactly as it had been when she left it, barring the unsightly mound of bodies that followed her. Iris nearly lost her balance as she hurriedly checked her surroundings, but aside from the bodies, which had been out of place from the start, she couldn&#39;t find anything left of the park.

Without giving Iris a chance to introduce herself in kind, even if it was more of a formality for her, Lily hopped out from behind the bodies and sat down on the bed. She had disappeared from where she had been standing in front of Iris, probably just to make a theatrical entrance again, or perhaps to show off her little costume change. She wore a well-tailored women&#39;s suit, happily adjusting her sharp glasses simply to draw attention to them. It was not lost on Iris that she had chosen not to wear an anomaly&#39;s uniform.

Lily hummed and hawed as she patted the moderately expensive bedsheets Iris had begged for as a teenager. &#34;So this is your idea of &#39;home,&#39; hm?&#34;

&#34;What?&#34; Iris asked a rather unintelligent and nonspecific question considering the circumstances, but it was the most she could muster on such short notice. &#34;You, wha, I... huh?&#34;

Lily huffed. For some unknown reason, she hadn&#39;t expected to need to explain anything. &#34;This place is //just// real enough to collapse into the shape of its inhabitant&#39;s perception, so long as they bring their own from outside, like a memory. The park was mine, and this room is yours.&#34; Before Iris could conjure up any sort of response, Lily continued. &#34;It&#39;s real enough to matter, so you&#39;re as alive as you can be, alright? Anything else I&#39;ll explain when I get the time.&#34; Her curt tone made it clear she wasn&#39;t open to follow-up questions.

Iris glowered at her from where she stood in her unadorned room. The fact that it wasn&#39;t //really// her room did little to assuage the discomfort she felt at seeing someone on her bed. In outside clothes, no less. &#34;Get off my bed.&#34;

&#34;Why?&#34; Lily blinked. &#34;It&#39;s not real.&#34;

&#34;It&#39;s real enough to matter.&#34;

Lily considered this for a moment, then smiled. &#34;Mhm, I suppose I left myself open there. Alright.&#34; She bounced back up from the bed, which didn&#39;t react at all, with an exaggerated clap. &#34;Now, what //is// photography?&#34;

She received only an unamused look in response. It wasn&#39;t so much that Lily was trying to have a back-and-forth, Iris was beginning to realize, than it was that she already had a script in her head and somehow expected Iris to play her part.

Despite the cold reception, Lily didn&#39;t lose any of her energy. She was acting like she knew more than her - which, again, was probably the case, but Iris wasn&#39;t quite in the mood for this. &#34;Come on. Just say whatever comes to mind.&#34;

&#34;...Ugh,&#34; Iris groaned, not trying very hard to keep herself quiet. &#34;It&#39;s, what, taking pictures? The //art// of taking pictures?&#34;

Lily deflated. Whatever Iris&#39; line was, she had flubbed it.

&#34;Just spit it out,&#34; Iris snapped. &#34;I don&#39;t want to spend time playing word games with you.&#34;

&#34;Bah.&#34; //You&#39;re no fun,// Lily&#39;s face said as she lifted up a hand and plucked a photograph out of the air the instant it blipped into existence. &#34;A photograph,&#34; she said as she flipped the picture around, &#34;is the simplest and easiest method of crystalizing a moment.&#34; As she said this, she reached her hand into the photo and plucked out its subject - a lily, its white petals and yellow stalks impossibly vibrant in the dim light of the bedroom.

Yet another thing she mimicked as though it came naturally to her. //Of course, it just looked like she did that,// an offended voice inside of Iris said. //She can&#39;t actually do it.//

&#34;I suppose I&#39;m asking for a little bit of imagination here, but you could say photographs are like holding memories in the palm of your hand.&#34; She twirled her namesake in her fingers, speaking more to herself than anyone.

Iris couldn&#39;t bring herself to disagree with that. Her eyes darted to her nightstand.

Lily&#39;s eyes followed hers, and she smiled. Iris caught her breath and kicked herself, but Lily made no move to look inside of it. She probably already knew the kinds of old pictures Iris kept in there. &#34;Aha, I knew you&#39;d understand. It feels nice, right? And reassuring?&#34;

&#34;Hmph.&#34; Iris looked at the floor. It did. It wouldn&#39;t be hard to tell, even as an outsider. In spite of everything, Iris still held onto her camera, when she felt, logically, that she should have gotten rid of it a long time ago. Her hands twitched awkwardly at her sides without it to rest on. &#34;What&#39;s any of that got to do with anything?&#34;

&#34;Oh, very little, you&#39;ll come to see,&#34; Lily said, her green eyes snapping onto Iris like spotlights. &#34;Less than you think. Even so, it&#39;s important we go over this.&#34;

&#34;If it&#39;s not important, can&#39;t we just cut to the chase here?&#34; Iris dug her hands into her pockets and felt her fingers twitch idly without any photographs to fiddle with.

&#34;Oho?&#34; Lily straightened her posture to look down at Iris, dropping the flower, which faded away before it reached the ground. &#34;And why&#39;s that?&#34;

&#34;Because I want to go back home, that&#39;s why.&#34; What kind of question was that?

&#34;Well. I don&#39;t mean to overstep here,&#34; Lily said as she readied herself to overstep, &#34;but it doesn&#39;t really seem like you had //very much going on.//&#34; She finished with an exaggerated tilt of the head.

Iris pursed her lips. &#34;The task force-&#34;

&#34;Now, I remember a very distinct //bitterness// from you, concerning that little arrangement, last time we spoke.&#34; Lily spoke as she sauntered up to Iris, who began to backpedal to keep a consistent distance. &#34;And now you&#39;re just itching to go back? What sense does that make?&#34;

&#34;I need to go,&#34; Iris said as put her foot down just before backing into the wall, &#34;so that nobody else has to take my place.&#34;

Lily&#39;s eyes lit up. &#34;Now, now, why rake yourself over coals for their sake, hm? I doubt any of them could do what you do,&#34; Lily said with a sly voice and a smile. &#34;In fact, I don&#39;t think they&#39;d even try.&#34;

&#34;What does that matter?&#34; Iris took a step forward, and Lily twisted her body away from the sudden counterattack as Iris pressed to close the distance. She bristled at Lily&#39;s mere implication - who the hell did she take her for? &#34;If I can help, then I have to. That&#39;s all there is to it.&#34;

Lily seemed taken aback. She took a step away from Iris to recenter herself, then studied her for a moment. Unsatisfied with what her eyes could tell her, she asked in an incredulous tone &#34;Is that really all there is to it?&#34;

&#34;It&#39;s that simple,&#34; Iris replied.

&#34;Mm.&#34; Lily regarded Iris with a slight smile. &#34;Now isn&#39;t that just a very //human// answer? I suppose that&#39;s just the kind of thing I&#39;d expect from you.&#34;

&#34;Well, I&#39;m sorry to disappoint you.&#34;

&#34;Don&#39;t be. It&#39;s good for me to know.&#34; Lily paused to stretch. &#34;As long as you understand what your photographs represent, we should be able to get down to brass tacks, as you requested.&#34;

&#34;//My// photographs?&#34; Iris raised an eyebrow.

&#34;Yes, yours specifically. My point stands for any others, but quite frankly, for them it&#39;s more of a philosophical distinction.&#34;

&#34;Uh huh.&#34; Iris was finding it difficult not to look //too// confused. &#34;And for me it&#39;s... what, exactly?&#34;

&#34;I&#39;ve said what I need to here.&#34; Lily raised a hand with its fingers pressed together. &#34;You&#39;ll understand what you need to soon enough, but it&#39;s time to move on.&#34;

//Snap.//

----

Wherever Iris was standing was pitch black. She could tell the ground beneath her was solid and level, but even so, she staggered off to one side as she lost her balance, only barely catching herself on what felt like glass before falling to the ground. Once she caught her breath, she tried looking for anything, listening for anything, but the only thing she could sense was the gentle hum of a powerful electric current.

For the love of god, did Lily get off of fucking with Iris? There was no goddamn reason to jerk her around aside from pissing her off. She pounded the glass with her hand and gritted her teeth. This had to be some kind of test. Or maybe she just enjoyed getting a rise out of people so she could scold them. Freak. Why couldn&#39;t Iris just have a nice, helpful person to meet after she kicked the bucket? Even an overtly hostile threat would at least spare Iris the headache of dealing with such a petulant brat.

//Clap, clap.//

The gentle electric hum spun up into a whirring sound as a wave of bluish light washed from one side of the room, past Iris, and down the hall into eternity. Iris watched the wave pass by as though she were following something blown in the wind. Once she recentered herself, she looked between the room and the structure she was resting on. It was one of a staggering number of cylindrical, glass-and-metal pods stood upright and arranged into nice and neat rows, filled with biomechanical tubing and a viscous, blue liquid. Each one was at least twice as tall as Iris, and about as wide. She found herself holding her breath as she studied the suspension, as though she were afraid of what she might find at the nexus of all of the tubing. Whether that was because the scene was so foreign or because the intubation reminded her of her own hospital stays wasn&#39;t something she thought was worth considering.

&#34;It&#39;s no use looking in there, the ones here aren&#39;t large enough to look at yet.&#34;

Iris jumped a little bit, but she wouldn&#39;t give Lily the satisfaction of looking any more startled than that. She turned around slowly to see Lily, wearing a sharp-looking grey suit that was too seamless and minimalistic to exist. Iris only glowered at her. &#34;Can you just tell me when you&#39;re going to do that?&#34;

&#34;You&#39;d be able to tell from context clues if you were paying attention,&#34; Lily replied dismissively as she turned and began walking down an aisle between the perfectly spaced pods. Iris scowled at her back as it got smaller, hoping she&#39;d be able to feel her eyes attempting to burn a hole through her perfect outfit, but unfortunately, they both understood who was really in charge. Lily didn&#39;t deign to look back, and Iris was left with no choice but to scurry along, acutely aware that she could just appear next to her or force Iris along if she wanted.

&#34;Now.&#34; Lily began speaking without looking back, trusting that the echo would carry her voice. &#34;The Foundation - //my// Foundation - came into the possession of a... rather significant leftover. Perhaps it&#39;s better described as an archeological find,&#34; she said, regarding the facility&#39;s cavernous ceilings and hallways stretching to the horizon.

Although there was nobody else there, and they were hardly //anywhere// in any real sense, Iris tried running after Lily as quietly as possible. Perhaps it was the oppressive darkness beyond the glowing vats, but making any noise felt sacrilegious. Despite Lily&#39;s saunter, she easily kept ahead of Iris, who had to take far more steps just to keep pace.

Nevertheless, cross the distance she did. &#34;//Your// Foundation?&#34; Iris asked incredulously. That was a pretty bold thing to say. It could mean any number of things. None of them made Iris feel good.

&#34;Yes. //My// Foundation.&#34; Lily seemed to put a different kind of emphasis on that one as she clasped her hands together and puffed out her chest. &#34;I have no way of knowing if yours has access to a similar facility, but a number of things seem similar between our homes.&#34;

&#34;Like what?&#34;

Lily looked at her with a smirk, barely visible in the low light, and a green side-eye that seemed brighter than anything else. &#34;Mhm. What, indeed?&#34;

Iris narrowed her eyes in response. She wasn&#39;t in the mood for rhetoricals when Lily had already promised brass tacks. &#34;What was this place?&#34;

&#34;Would you-&#34; Lily groaned as her feet came to a halt. She took a deep breath. Iris was unamused by the theatrics - if she wanted to get to say something, she should have just said it. &#34;Fine. We&#39;re far enough now. I can show you.&#34;

With a blank expression, Lily spun on her heel and walked up the metal staircase spiraling up the side of the nearest pod. Iris didn&#39;t think she had been standing so close to one a moment ago, but she shook the thought from her mind and followed her up.

There wasn&#39;t much to see from the top of the structure, aside from the geometric rows of seemingly identical pods. Without much to look at, she turned her attention down to the exposed top of the pod, and down through the suspension inside of it. Lily had nothing to say, simply looking down along with Iris, albeit with a blasé expression.

The blue fluid - more of a gel, really - bubbled in slow motion as machines pushed air through the inside of the pod, obscuring Iris&#39; vision somewhat. Even so, there was far less in the way from above, and the cold industrial lights lining the pod&#39;s walls made it easy to see what was resting inside, connected to the tubing: past a shock of blonde hair floating gently in the translucent soup, a woman was sleeping. Iris could make out that some of the tubing was handing the essentials of the body - the inputs and outputs, so to speak. Iris found her eyes moving to examine her shoes.

&#34;Gross, right?&#34; Lily clicked her tongue.

&#34;Mm.&#34; Ten years on, and the horror of having plastic tubing stuck into her still hadn&#39;t left Iris. &#34;Hospitals are always gross. It&#39;s just the way it is.&#34;

&#34;//Hospital?//&#34; Lily looked up from the body with a wide-eyed expression. She held it for a moment before laughing to herself. &#34;Kehehahaha. No, not quite.&#34; She nodded back towards the blue suspension.

Iris tried to clear her thoughts of her hospital stays, only to make way for another kind of unease to settle inside of her. When Lily wasn&#39;t speaking, she wasn&#39;t breathing, either, which left Iris feeling that she was someplace she shouldn&#39;t be. The expanse of machinery should have been making more noise than the nigh-inaudible hum coming from the floor a dozen feet below her. Iris felt she was trespassing, not in a medical facility, but on sacred ground. Sacred like a graveyard, not like a church.

Without making a sound or coming any closer to Iris, Lily pressed down on her the longer she stalled. Iris forced her eyes to focus on the body. It was indeed nude, and if it was breathing, Iris couldn&#39;t tell. Even looking right at the skin, she couldn&#39;t see any movement. But she did see innumerable synthetic ducts of any shape slipping perfectly into skin and bone. The tubes and the wires couldn&#39;t have been jammed into the body as part of some procedure while remaining such seamless integration.

The body had grown around them.

Iris felt her balance become unsteady. Her unconscious mind wanted to pull her away from the pool she was standing over, one that suddenly felt an order of magnitude deeper, but her conscious mind wasn&#39;t making her do much of anything. The metal wires slid effortlessly into the body&#39;s spine, no doubt infiltrating the bone and poking into the nerves underneath. A series of tubes sliding between the ribs were probably what handled breathing. A duct punching a hole through the sternum was what was keeping the heartbeat. No part of the body was truly separate from the machine. Iris wondered if the machine would work after she vomited into it.


&#34;Yes, extracting the product //is// something of an ordeal.&#34; Lily waved her hands dismissively while she closed the distance between them, but didn&#39;t reach out to steady Iris. Even if she could touch her, Iris wondered if she would have bothered. &#34;It takes the biofilm another week to clean things up.&#34;

Iris&#39; eyes met Lily&#39;s, the green looking every bit as deep and luminescent as the pool they stood above. It was only for a second, as Iris staggered back as she began to look around the cavern now that she truly understood what she was looking at. It was endless. Rows upon rows of perfect, sterile machines cultivating living, breathing humans with all the fanfare of oversized agar plates. She felt an impulse to ascribe everyone she&#39;d ever known to one pod each, but she scarcely made it past her arm&#39;s reach before she ran out of names. For a farm reaching past the horizon.

&#34;It has inorganic fabrication facilities as well,&#34; Lily said as she followed Iris over to the edge of the platform and rested on the railing. She sighed, &#34;The only thing it lacks are some solid records. For my money, though, I&#39;d say the site was activated perhaps a half dozen times.&#34;

She was so nonchalant that it took Iris a moment to digest what she was saying. That place didn&#39;t feel real. It was a single detail from a nightmare replicated ad infinitum. If there were just a handful of gestation pods, Iris could think of no small number of reasons to keep them around, as unsavory as they were. But this? What the hell could possibly call for this, even once? There had to be enough to replace everyone on the whole damn planet.

Oh, god. Iris felt the blood rush from her head. Lily&#39;s knowing look when their eyes met told Iris what she needed to know.

&#34;Even needing it once speaks to a certain level of carelessness, no? But I suppose if you knew you had it, you&#39;d probably be a bit less careful.&#34; Lily narrowed her eyes. &#34;If you&#39;re going to be sick, I could find us some kind of garbage can first, you know.&#34;

Iris pushed down the bile out of pure spite and took a deep breath, white-knuckling the railing and not daring to look past it. That was real enough for her. She searched the metal for imperfections and found none, but that netted her precious seconds with her mind off the proposition at hand.

&#34;Then, everyone...&#34; Iris pointed outwards. It was the most she could do. &#34;Everyone&#39;s just-&#34;

&#34;Everyone&#39;s still people. If it quacks like a duck,&#34; Lily flippantly replied. Despite her lackadaisical tone, her eyes stayed trained on Iris. &#34;Besides, once things hit the fan, so to speak, better to have a copy than nothing at all. So much of what makes &#39;people&#39; on a broad scale are constructs, anyhow.&#34;

&#34;For the love of //god.//&#34; Iris spun around to face Lily with her whole body. Lily&#39;s eyebrows raised, but she was otherwise unmoved. &#34;People are people. They got... shit, they got //blood//, and... //dreams//, and it - shit, it //matters// when they die.&#34;

&#34;Oh? Even if they come back with not a hair out of place?&#34; Lily drew out her words as she spoke. &#34;What&#39;s that phrase again? &#39;A tree falls in the forest&#39; and all that?&#34;

&#34;//Yes,// it...&#34; A chill gripped Iris and she clutched at her chest on reflex. It was hard to breathe for a moment. &#34;...It matters.&#34; She forced out the words and willed herself to refocus on Lily. Iris could see her. She could taste blood as she bit down. She could feel her chest. That&#39;s what mattered. What was right in front of her.

&#34;Still. It&#39;s better than nothing, isn&#39;t it?&#34; Lily mumbled as her eyes lazily traced the rows of gestation pods.

Iris offered nothing in the way of a response.

Lily allowed a moment of silence before soundlessly sliding closer to Iris. &#34;...Hey. Tell me, Iris.&#34; Her voice was soft. Intimate. Vulnerable. &#34;If you had the run of the place - just you, nobody else to answer to - and you knew you could use it, use it to help the //whole entire world...// would you?&#34;

&#34;God...&#34; Iris scoffed. &#34;That&#39;s a stupid question-&#34;

&#34;No.&#34; Lily remained quiet. &#34;It&#39;s the most important thing I&#39;ve asked.&#34;

Even without looking, Iris knew how she was looking at her. As immaterial as she was, Iris could practically feel her breathing down her neck - at times it felt like being thirty feet underwater just when she looked at her.

&#34;...I can&#39;t answer that.&#34;

&#34;Yes, you can.&#34;

&#34;I //can&#39;t.//&#34; Iris shook her head. &#34;I can&#39;t say what&#39;s good for the whole damn planet. I barely know what&#39;s good for myself.&#34;

&#34;You&#39;re the only one who can say that for yourself, Iris. Not even I can answer that for you.&#34; There was a momentary lull - a split second where Lily&#39;s eyes fell to the ground - but she pushed past it. &#34;But if you knew, you really knew, what you were doing was for good, wouldn&#39;t you want to help?&#34;

&#34;With what?&#34; Iris asked. She barely even knew what she was being asked.

There was no response. Lily only kept staring at Iris, as if to say //that&#39;s not important.// Iris understood the silence itself to be her answer.

//Given everything you can see, everything you can&#39;t imagine, everything beyond the horizon, would you take it? Would you do what you think is best?// It was a juvenile question, something a child would ask their friend at recess. Even so, Lily&#39;s breathless expression left the question feeling heavy over Iris&#39; head. It was pure hubris. Just like what the Foundation had. It was never their place to make everyone&#39;s decisions for them, but they&#39;d been doing it for so long they practically //were// the way the world worked.

But then, how would one go about dealing with that without power like that to meet them...

The two stood beside one another, moving neither their bodies nor the conversation for a long time. Iris&#39; scarred face doing its best to match the absolute stasis on Lily&#39;s plastic, perfect expression. After what felt like hours, Lily pulled away. &#34;Ah, but I already have your answer, don&#39;t I?&#34;

Iris turned her head away to look at the horizon.

&#34;If you can, then you have to, right?&#34; Lily nodded to herself. &#34;I&#39;m sure you&#39;ll come to understand, then.&#34;

//Snap.//
----

Winter had driven any life out of the forest long ago. Not even lichen clung to the trees, leaving their monolithic trunks a stark black against the blanket of snow. The fresh powder was an undisturbed, even dusting in all directions, betraying no sign of the land&#39;s inhabitants. None of the warmth from the rich colors of the sunset made it to the earth.

The deepest part of the forest, sheltered even from any wind that would push the snow from the trees&#39; branches, was a depression carved out by a stream. It couldn&#39;t be called a valley, shallow as it was, but it was deep enough to hide itself from the sun. It was there, walking between the trees, that the forest&#39;s sole living inhabitant found herself.

Without anything to guide her, Iris had decided to follow the stream as she had before. The forest past the creek seemed entirely complete, and its trees were as varied as one could expect from a monoculture. Unlike before, she could have wandered in any direction, and the cold sapped her confidence the longer she continued down her path. The snow fell into her shoes and bit her ankles. Her ears began to burn, as did her nose. She clenched her jaw to keep her teeth from chattering.

It didn&#39;t take very long for Iris to start having doubts. Had she said something wrong, and Lily decided to cut her loose? Or was this Lily&#39;s idea of putting her back where she came from? The biting cold of the snow was much more real than Lily&#39;s river, after all. Perhaps she was just ignorant as to the average human&#39;s unimpressive natural insulation.

Mercifully, however, the stream was far shorter than Iris had expected. Just around a shallow bend in the creek, the walls of the depression climbed back up. Embedded in the hillside was an unadorned concrete structure, which might have once been an impressive fortification but had weathered down to match any other rock in the forest. The stream eked out from the entranceway, and just far enough in to obscure her face in the darkness, a woman in a white dress stood. Iris nearly mistook her for a snowdrift.

&#34;Lily!&#34; Iris called out, wincing as her annoyance gave way to audible desperation. It was difficult to steady her chattering teeth enough to speak, not to mention the suffocating absence of any signs of life.

Only after she had made her presence known did the woman turn on a heel and disappear into the artificial cave. Iris clicked her tongue. Where she was standing, there was no wind for her to get away from, nor sunlight to warm her. She didn&#39;t have much of a reason to follow Lily aside from humoring her whims.

Despite the intensity of the cold, Iris remained still for a time without anything to shake her from her thoughts. It was only once a twitch of her hand informed her that her fingers were going numb that she realized she had to make a decision. Better to investigate the cave while she still had the capability to do so, she told herself.

The yawning mouth of the cave was possessed of a very different stillness than the forest. As bleak as it was, the forest seemed nothing so much as asleep. It was unnerving, yes, but deep in the winter, perhaps that was how it ought to have been. The concrete tunnel bored into the hillside was another matter entirely. Anything past the threshold was encased in a thick, nearly tangible darkness far more intense than it should have been, considering the position of the sun. It seemed less like it was asleep, and more like it had been encased in tar.

Regardless of how Iris felt, her legs carried her forwards and into the darkness. Once the decision was made, she had no say in the matter.

Her eyes could do little to adjust to the darkness, but at the very least, she made out a door. The rest of the enclosure seemed to be concrete, utterly featureless aside from the numerous small signs of decades of disuse. The door, however, appeared newer. It was made of machined steel, and the letters had not fully faded, although Iris couldn&#39;t read them in the darkness. She couldn&#39;t even make out the language.

A creaking sound tore through the cave and echoed into the forest. The door had been blown open by a draft from behind it. The lock had been wrenched off of it by force. Although Iris felt she had been in there for seconds, the forest outside of the cave was rapidly darkening to match the hollow Iris was standing in.

There was light coming in from where the door had cracked open. The thick, suffocating darkness was beginning to smother the forest. Iris pulled the door open, slid inside, and pulled the door shut behind her. As soon as she was inside, she had the uncanny feeling that if she opened the door again, there wouldn&#39;t be anything on the other side.

The draft that had pushed the door open gently howled as it pushed up the staircase that Iris now found herself in. There were large, fluorescent lights dotting the walls, and at least a third still seemed functional. There was a gaping wound in the wall where a freight elevator must have been at one time. Iris crept across the floor to look down the stairway - there seemed to be about ten sublevels. Seemed excessive. But there was nowhere else to go, so her legs carried her down the stairs.

It was dizzying. Left turn after left turn after left turn. Not once did Iris feel steady on her own two feet. The descent felt like nothing so much as falling out of bed, half-awake, for what felt like several minutes. Iris lost count of what sublevel she was on after the fourth floor. There were no signs posted on the walls, but they hadn&#39;t degraded - they appeared to have been torn off. By hand, if the dried red stains on the concrete were any indication.

After some time, Iris arrived on the bottom floor. The lack of another step surprised her enough to make her aware of where she was. The bottom of the stairway was as unremarkable as the top, with only concrete ground and an open doorway to greet her, but she could make out finished flooring in the next room. The tiling reminded Iris of a hospital - or, more accurately, Site-17&#39;s medical wing.

Iris stuck her head through the doorway. Although it was in a state of disrepair - or was it that the place had been trashed? - it was clearly a modern facility. Couldn&#39;t have been more than ten, maybe fifteen years old. Some of the signs were still up. The doors to the freight elevator had been torn from the wall, but beyond that, the rest of the damage was minimal. The papers disorderly strewn about implied a hasty exit of whoever was here last, but most of the rest of the damage could be chalked up to disrepair.

She moved into the hallway, unconsciously keeping her footsteps silent. The staircase led to the end of a short hallway, off of which was a single door to her left, and a room to her right that had been trashed so thoroughly that its purpose was indiscernible.

There was the sound of a heavy door mechanism shifting. At the end of the hallway, a woman stood in front of an opening set of double doors. The harsh fluorescence cast shadows on her face that left her looking gaunt. She turned and disappeared down the hallway past the doors. Without a shadow to pass into, she faded away like a mirage, bidding Iris to follow. Her legs obliged.
 
Glass crunched beneath her feet. Her eyes darted to the ground. It was splayed out from a broken overhead light, scattered onto the ground in a random arrangement. Shreds of singed paper and ashes piled up haphazardly in the corners. The organically disordered mess was exactly what Iris would expect, and it made her stomach turn. Neither the river nor the production facility had anywhere near this level of fidelity. If they were dreams and fuzzy memories, then this truly was stepping into a photograph.

The trashed room didn&#39;t seem to have ever had doors, with disheveled filing cabinets spilling out of the doorway with their contents scattered and burned. The back of the room was collapsed and barred any entry to the rest of the facility. A single fluorescent tube hanging down from the ceiling cast harsh shadows and bathed much of the room in darkness, obscuring whatever still remained on the files.

Iris looked past the doors at the end of the hall. The room on the other side was small and torched beyond recognition, with a blackened metal sink and cabinet still visible. Another set of doors at the end led to another room, indistinct from where Iris stood, but she could make out a soft glow from inside. The color brought to mind the image of an anglerfish&#39;s lure. She remained by the file cabinets.

The sound of Iris sifting through the papers, even opening and closing the filing cabinets, was absorbed by the shadows, and no echoes reached her. Many of the papers were burned, but some legible words remained inside of some of the larger stacks. Whoever had torched the place hadn&#39;t done a very good job. The words &#34;sevoflurane&#34; and &#34;propofol&#34; were some of the only ones Iris recognized, anesthesia medications she&#39;d heard of before. Other disinfectants, iodine and the like, were all that she could make out. It wouldn&#39;t be out of place for a facility like this to need medical supplies, but general anesthesia is more specialized. She discarded the paper and moved to some of the cabinets with fewer scorch marks, digging through them until she found some almost completely intact documentation to examine.

&gt; 14/03/2012
&gt;
&gt; Incidents of self-harm have increased since January&#39;s hippocampus procedure. I&#39;d like to request sedation and restraints when we&#39;re not running tests, but Veles is demanding it remains lucid. I understand that we&#39;ve previously prioritized its mental state for continued cooperation and communication, but that ship has sailed. The subject can no longer identify its name or photographs it has taken, and I&#39;ve attached evidence of motor and communication deterioration. Engels has proposed a solution that interfaces with the brain stem and frontal cortex in order to remove any unknown behaviors moving forwards. I would at least recommend going this far, but additional editing to the cerebellum could

There was more to the paper, but Iris threw it away. She&#39;d seen enough.

She tripped over a cabinet as she stumbled to leave the room and caught herself on the entrance. She took a deep breath. Counted up the grains of glass on the ground. Let her eyes dart from paper to paper, scanning for words without really reading them. She raised her head and stepped back out into the hallway, no longer caring to conceal her footsteps, and regarded the single door in front of her. The metal door was reinforced and had a lock to match. Iris recognized it.

No, no, she told herself, she can&#39;t be jumping to conclusions. Her eyes darted to the double doors before focusing back onto what she was facing. One thing at a time. Lily must have wanted her here for a reason. She wouldn&#39;t do all this just to scare her before killing her. All she needed to do was check the next room. Its door creaked open effortlessly.

//Tick. Tick. Tick.// An analog clock on the wall spun its second hand diligently. The hour and minute hands had long since broken off and settled on the floor, leaving the seconds to while away without reason.

The room had a bed, a desk, and a festering metal toilet. The backside of the door had claw marks tearing up the paint - no, not claws. Human fingernails, digging into the metal and tearing off the paint. They hadn&#39;t even bothered to repaint the door.

//Tick. Tick. Tick.// The sound of the clock did a poor job of filling up the room in place of its inhabitant&#39;s breath.

The bed was a yellowing, threadbare sack of synthetic fibers absent any bedsheets. The discolored depression at its center would have done a fine job communicating just how long the room&#39;s inhabitant had spent there if the rusted restraints still anchored to the bed frame hadn&#39;t made it plenty obvious.

//Tick. Tick. Tick.// The clock&#39;s hand continued its endless spiral.

The only piece of furniture that didn&#39;t seem to be decomposing was a short desk, large enough for a child. Its drawers had been taken out, but scattered haphazardly atop it were several small, square pieces of laminated paper. Iris didn&#39;t need to see what was printed on them to recognize them as polaroid photographs.

//Tick. Tick. Tick.// The seconds marched on to an eternal present.

The photos were clearly amateur. Close-ups of flowers, of weeds, of trees. If Iris squinted, she thought that she could make out a deer in one. The care the photographs had put into them was befitting of a child, and served as nothing more than a catalog of vaguely pleasant sights. Even so, they were kept with far greater care than anything else in the room. It reminded Iris of the pictures she used to take as a child.

//Tick. Tick. Tick.//

It reminded her of herself a lot, actually.

//Tick. Tick. Tick.//

The realization came and went. The most surprising thing about it was how unsurprising it was. Iris found herself feeling a sick sort of comfort as she looked back to the bed. At least she wasn&#39;t the only Iris that had it bad, with the only Foundation that didn&#39;t care. She didn&#39;t even have it the worst.

//Tick. Tick. Tick.//

Iris stepped back out into the hallway and looked to the soft glow past the burned-out room. There was only one place left to go, and Iris felt that she owed it to Lily, out of solidarity, or perhaps pity, to see what she wanted to show her. She closed the door behind her, as gently as its weight allowed, and walked,

Out of the girl&#39;s room,

Past the cabinets,

Through the burned doors,

And out into an operating room.

The operating theater was ringed by a large, horseshoe-shaped observation room, elevated above the theater with a staircase on the far side leading up to another entrance. The glass that separated the rooms was perfectly see-through, both ways. Even without anyone there to look down at her, she felt intimidated by the thought of it. The theater itself was nearly intact, with the surgeon&#39;s trays upright, still holding their tools, and the overhead lights hanging limp and unpowered, though intact. They were not the room&#39;s source of light.

On the operating table, pushing up out of the metal and through the fabric, was a single flower. Six petals, unblemished and in full bloom, radiated a soft, but cold bioluminescence. It stood straight, reaching for a sun it would never see, spreading its roots for nutrients it would never find. No flower should have ever attempted to grow in such a place, spending energy it didn&#39;t have for nourishment it could never reach. But it stood on anyway, caring nothing for its own irrationality or the impossibility of its growth. It bathed the room in its glow, even if it was undeserving of such a miracle.

&#34;The Foundation loves memory like a shepherd loves his flock. Loves them when they&#39;re controlled. Loves them when they&#39;re productive. Culls them when he wants to, slaughters them when he has to.&#34;

Iris heard her own voice echo into the theater from the top of the staircase across from her. With each sentence, a footstep clacked against the tiles and the voice grew closer, and feet came into view, then legs, then a chest.

&#34;The flock loves him all the same.&#34; The words bitterly tumbled out of Lily&#39;s mouth as her face became visible. Her eyes were locked with Iris&#39;. Her expression was altogether different now, both more tired and more awake, equal parts reluctant and insistent with her gaze.

&#34;But a love born only from a desire to control is only dependency. Amnestics weren&#39;t enough. It wasn&#39;t enough to control the entire world&#39;s perception. Even culling those with inconvenient memories wasn&#39;t nearly enough. The simple possibility that there could be memories they deemed undesirable was entirely too much for them.&#34;

Lily reached the floor of the operating theater, and stopped. She did not yet approach the table. Iris remained planted across the room from her.

&#34;It was only so long until the mass cloning facility was needed again. It was trivial to manufacture a back door into the memories of anything made in it. And, once that was done, the only thing left was finding the right thing to worm into it.

She took a moment to herself. Closed her eyes. Tilted her head down. Didn&#39;t bother pretending to take a breath.

&#34;And if they couldn&#39;t find something, it was just as simple to make it.&#34;

With that, she solemnly marched towards the center of the room.

&#34;It didn&#39;t take long for them to find a candidate in a ignorant little Ukrainian girl.&#34; Though not impartial, Lily had seemed distant before. But now she was scoffing at her own words. &#34;Ignorant as to what anything meant. Ignorant as to what she could do.&#34;

Iris bit the inside of her cheek and remained silent and still. //She was just a kid. You can&#39;t blame her.//

The woman in white stopped not an arm&#39;s length from the flower. Under its light, even her hair seemed entirely bleached as she regarded it. &#34;So the girl was carved down, piece by piece, into the perfect little worm. Whittled away until they found, too late, that there was nothing left for them to even control. So, the last piece of her that was shorn away was the memory that the girl had ever once lived. And she became another body sacrificed on the altar of progress.&#34;

There was a long silence, but it didn&#39;t weigh on Iris. Lily didn&#39;t pressure her with any sort of expectation, waiting patiently for some kind of decision. There wasn&#39;t anywhere else for her to go, in any case, but she was beginning to understand why Lily had been so insistent on having Iris see things for herself. It only felt right to meet her sincerity in kind. Iris moved to the operating table.

It was only once Iris stood across the table from her that Lily moved again, leaning down to delicately cradle the head of the flower. She caressed its petals, a soft expression on her face as she watched them spread out. Maybe she even felt them. After several seconds, she lifted the flower up and out of the table. Its stem snapped like a single thread of spider&#39;s silk and drifted down, disappearing before it reached the table. The flower itself continued to glow just the same, no less alive than before it had been picked.

A humorless smile graced Lily&#39;s lips. &#34;Ah, if only it were so easy. Things have inertia, and us, we don&#39;t die easy.&#34;

Iris felt taken aback by suddenly being addressed so directly, but Lily paid her no mind as she lifted the flower up to her face, so carefully as to give the impression it was made of dust and would crumble at the slightest provocation. &#34;It took a while. I&#39;ll even deign to admit it was largely instinct for a time. But I collected myself and selected a name once I believed myself to be something worthy of one.&#34;

&#34;Lily Veselka.&#34; She sounded it out as though she were seeing how it felt on her tongue. &#34;White lilies are often used as funeral flowers, to represent the return to... //innocence and purity// that comes with death. Hmph. I find them to be beautiful, at any rate.&#34;

Her eyes snapped from the flower to lock with Iris&#39;. &#34;I think it&#39;s a very nice name,&#34; Lily said as an assertion. She wasn&#39;t looking for her to agree.

&#34;It&#39;s much easier to imagine a &#39;self&#39; with a name - rather, easier for there to //be// a self. I knew I wasn&#39;t just a memory. I wouldn&#39;t allow it to be so. I knew I could be so much more.&#34;

A silence settled over the room. There was more for Lily to say, but she hesitated. Left the implication hanging in the air. Knowing what Lily was, seeing where her bodies came from - it wasn&#39;t hard to connect the dots. The production facility wasn&#39;t something the Foundation would ever loan out to things like Lily. Especially things with a good reason for a grudge.

&#34;And then?&#34; Iris asked.

Lily broke eye contact. &#34;Hm. You should know that by now.&#34;

&#34;I want to hear you say it.&#34; Iris was surprised by the conviction in her voice.

The woman in white&#39;s eyes widened for a moment, as if caught by surprise, but it passed as soon as it came. &#34;Very well,&#34; she said as she dropped the flower.
