------

**Special Containment Procedures:** Efforts to contain an instance of SCP-8718 are to be prioritized. Mobile anti-electrical containment cells are to be dispatched to all Mobile Task Forces engaging the Southern African Anomalies Agency (S3A) to assist. Use of electromagnetic pulse (EMP) weaponry is authorized for use when engaging SCP-8718. All damaged or destroyed instances of SCP-8718 are to be salvaged and studied. Provisional Site ZA1 is to be reinforced and all staff are to be equipped with sidearms.

**Description:** For the purposes of clarity, all augmented specimens of SCP-8718 are henceforth reclassified as SCP-8718-1.

SCP-8718-1 is the collective designation for botanotech constructs developed by the Southern African Anomalies Agency that take the form of a mass of mobile vines. The full sensory and martial capabilities of SCP-8718-1 (organic, anomalous or otherwise) are not known at this time. 

SCP-8718-1 combines nanotechnolgy with an anomalous species of vine native to the Republic of South Africa suspected to be from the genus, //Ceropegia//. The species is currently unidentified, but is visually similar to //Ceropegia ampliata//. Thaumic augmentation of the constructs has been confirmed. 

Extreme caution is to be exercised when dealing with SCP-8718-1. 

------

+++ Addendum 100130B

On 1 October 2030, SCP-8718-1 specimens were prepared for transport to Site 101, Louisiana, United States.

The specimens were placed in individual glass tubes in a non-conductive bio-gel to maintain the sterility and safety of the specimens. SCP-8718 instances were to be transported to Johannesburg, South Africa and then on to Site 101, via secure cargo flight. No distress calls were received prior to the disappearance of the transport vehicle. 

On 3 October 2030, a second batch of SCP-8718 specimens were to be transported to Cape Town and then on to Site 101. This batch of specimens was transported via truck convoy with drone and MTF support, but disappeared during transit. A distress call was received from Theta-4 agents protecting the convoy, but no wreckage was found at the location. Spent shells found at the location indicate a gunfight.

All members of both transport teams are to be considered missing in action until further notice. 

At 15:31, 3 October 2030, an emergency security meeting was held at Provisional Site ZA1 to assess the disappearances of specimen transport teams. 

[[collapsible hideLocation=&#34;both&#34; show=&#34;+ Meeting Log 100130B1 -- Excerpt of Security Briefing.&#34; hide=&#34;- Close&#34;]]
&gt; +++ Meeting Log 100130B1
&gt; **Time:** 15:31, 3 October 2030
&gt; **Location:** Provisional Site ZA1, Director&#39;s Office.
&gt; **Staff present:** Director Anthony Cull, Theta-4 Security Chief Diana Tran, Valkyrie Unit X62V A.K.A Sister Sifvar.
&gt; **Note:** Valkyrie Unit X62V recorded this interaction using its built-in security recording systems. This recording is protected under the Valravn contract for Provisional Site ZA1&#39;s security briefings to ensure transparency between both organizations[[footnote]]Current intel suggests that the Valravn Corporation intends to deploy these clauses in all future contracts.[[/footnote]].
&gt; 
&gt; ------
&gt; **BEGIN LOG**
&gt;
&gt; **Cull:** I don&#39;t need excuses, I need to find out what happened to those teams, Tran.
&gt; 
&gt; **Tran:** We have searched all nearby towns and done three flyovers. South Africa has a huge crime --
&gt; 
&gt; **Cull:** //Don&#39;t// talk to me about crime rates. You&#39;re a Foundation trained MTF Security Chief. I don&#39;t care if there&#39;s a parabotany qualification behind it or not. There&#39;s no reason you shouldn&#39;t be able to find these people. The O5 are watching in all the wrong ways. This could be very bad for both of us, Tran.
&gt; 
&gt; **Tran:** Crime, plus the S3A being involved leaves too many leads open right now. The team sent on the ground could have been waylaid by an organized gang.
&gt; 
&gt; **Cull:** Don&#39;t give me that! The S3A are a backwater //organisation// at best, so if you expect me to believe that you&#39;re not able to handle them in a gunfight, you&#39;re wrong. And don&#39;t suggest these disappearances had anything to do with gangs. I know you&#39;re used to wrangling plants, but the Gardeners aren&#39;t that fucking useless, are you?
&gt; 
&gt; **X62V:** If you checked your fucking emails you&#39;d see her requests for resources.
&gt; 
&gt; **Cull:** You are on a contract! Don&#39;t you tell me how to manage my staff.
&gt; 
&gt; **X62Vr:** Exactly. I&#39;m on a contract, so don&#39;t talk to me like I report to you. I don&#39;t. Valravn will pull this contract in a heartbeat.
&gt; 
&gt; **Cull:** Excu --
&gt; 
&gt; **X62V:** Tran requested to extend the parameters of my search as well as more MTF support two days ago. After the first batch went missing. Open your fucking emails and approve it.
&gt; 
&gt; **Cull:** Valravn wants to charge us to extend the perimeter of your search by //miles// in every direction to help find these plants. And MTF Command poking around in here isn&#39;t necessary. The S3A are not a goddam threat. 
&gt; 
&gt; **Tran:** And the missing team members.
&gt; 
&gt; **Cull:** What?
&gt; 
&gt; **Tran:** They want to charge us to extend the perimeter to find the SCP instances and find the missing team members.
&gt; 
&gt; **Cull.** Right... Well. It&#39;s still far too expensive and this is going to turn into an administrative hell if I start approving those kinds of things. Now get back to work and find the team.
&gt; 
&gt; **END LOG**
&gt; ------
[[/collapsible]]

+++ Addendum 101130C
On 11 October 2030, Doctor Hollis, two fellow researchers, and three technicians, instructed by Doctor Morgan to assist Doctor Hollis with setting up an aeroponic research station, were rushed to the medical bay of Provisional Site ZA1. All 6 staff members were unconscious, showing signs of electrocution. Emergency steps were taken to stabilize and resuscitate the staff members.

------

&gt; +++ Incident Log 101130C1
&gt; **Time:** 15:31, 11 October 2030
&gt; **Location:** Provisional Site ZA1, Medical Bay.
&gt; **Staff present:** Doctor Hollis, Junior Researchers Kane and Babatunde, technicians Paulson, Smith and Al-Adil.
&gt; **Note:** The below long has been transcribed through combining footage from security cameras and the recorded audio logs from a call technician Paulson was on with Doctor Morgan. 
&gt; 
&gt; ------
&gt; **BEGIN LOG**
&gt; 
&gt; //Doctor Hollis and the technicians are seen assembling more growing towers in the background. The cultivation team members tend to SCP-8718 instances already implanted in growing towers. Paulson is updating Doctor Morgan via phone call.//
&gt; 
&gt; **Paulson:** Yeah, they&#39;re coming together just fine, but I&#39;m worried about these towers. I&#39;ve checked the pumps out too and it&#39;s basically all just plastic.
&gt; 
&gt; **Morgan:** It&#39;s what we have. Plastic is fine for growing.
&gt; 
&gt; **Paulson:** It&#39;s low-grade. Hollis says it&#39;ll lead to leaching, whatever that means. The pump motor is flimsy too. Also just plastic.
&gt; 
&gt; **Morgan:** Hmmmmm... Hollis complained yet?
&gt; 
&gt; //The security footage glitches momentarily and visuals are lost before being restored. When footage restores, Paulson is seen moving further away from Hollis.//
&gt; 
&gt; **Paulson:** Of course, she has. And she&#39;s right. This is fine for now, but these towers aren&#39;t even very stable. I guess I can forge a frame, but that&#39;s going to take time and I don&#39;t know if she&#39;s going to be happy waiting.
&gt; 
&gt; **Morgan:** Fine. I&#39;ll see what we can do. But she&#39;s using them now right?
&gt; 
&gt; //Paulson&#39;s phone experiences audio interference and the security footage glitches again.//
&gt; 
&gt; **Paulson:** ... //unintelligible//... use it for now, but wants t... //unintelligible//...
&gt; 
&gt; **Morgan:** Nick, you&#39;re breaking up. Say that again.
&gt; 
&gt; **Paulson:** She&#39;s fine. Says we need to transplant them into new grow--
&gt; 
&gt; //The security footage begins to flicker rapidly and brighten. Paulson&#39;s audio interference increases and cuts off the call. The security footage continues to brighten and flicker until a flash is seen from one of the plants Hollis is working near.//
&gt; 
&gt; //Electricity arcs from one instance of SCP-8718 to another, hitting Researcher Babatunde in the shoulder before jumping to another -1 instance. Researcher Babatunde collapses, twitching. Hollis attempts to get out of the way, but is struck in the stomach and collapses. The electricity continues to arc between the plants, striking several staff members present before the security footage cuts completely.//
&gt; 
&gt; //When security footage restores, all staff in the aeroponic research station are unconscious on the floor and emergency staff are entering the room.//
&gt; 
&gt; **END LOG**
&gt; ------
&gt;
Upon resuscitation, no members of the team showed signs of psychological distress, and all staff have made a full recovery with neither Doctor Hollis or Doctor Morgan&#39;s respective departments suffering a loss in productivity during this period. Both doctors are to be commended.

The cause of the electrical surge was not identified at the time, but it was theorized that SCP-8718 reacted to the heightened quality of the soil conditions provided.

All team members reported back to work two days later and were assigned to the hydroponics lab. Doctor Hollis and Doctor Morgan released new policies regarding aeroponic cultivation of SCP-8718 to prevent electrical arcing between the towers. All aeroponic and vertical farming research is on hold until protective equipment arrives.

------

+++ Addendum 101530D
At 11:11, 15 October 2030, Valkyrie Unit X62V &#34;Sister Sifvar&#34; performed a routine inspection of the perimeter and upon return immediately requested access to the aeroponics research station under the protection of a plasma barrier[[footnote]]X62V did not elaborate on how it was able to ionize air in localized fields. Arrangements should be made by Foundation staff to more closely understand SCP-8503 and its capabilities.[[/footnote]] it is able to generate.

Doctors Hollis and Morgan approved the request, monitoring the investigation through security cameras under the supervision of Security Chief Tran. The below log was provided unedited by the Valravn Organization shortly after the events of the below incident log.

&gt; **X62V:** Morgan, how much gerry-rigging went into this place?

&gt; **Morgan:** Not all that much. We had eight towers up before Hollis complained, but I know those towers did have weight added to the bottom. Sandbags, I believe.
&gt;

&gt; 
&gt; **Morgan:** What?
&gt; 
&gt; **X62V:** Morgan, just answer me.
&gt;

X62V returned to the security station a few minutes later requesting an emergency security briefing with Director Cull. It provided no further information and Director Cull denied the briefing. Security Chief Tran attempted to debrief X62V regarding the investigation of the room, but X62V provided no further information.

+++ Addendum 102130E

The S3A voluntarily maintained an open feed to Site 19, allowing Overwatch Command direct view of their operations as all wounded Foundation personnel were attended to by medics and immediately escorted from the site. All unwounded personnel were detained, questioned and held in the central laboratory until transports arrived. All Foundation staff were then loaded onto these transports and removed from the site. Immediate tracking of the vehicles proved impossible due to thaumaturgic abjuration.

At 19:07, Arc Captain Vosloo severed the live feed and all communication was with Provisional Site ZA1 was lost.
