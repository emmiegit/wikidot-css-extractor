Dr. Kreis Personnel File
[[/div]]

**Name:** Dr. Amadeus Kreis, also known as SCP-9034. 

**Security Clearance Level:** Currently suspended. In light of recent events, Dr. Kreis’ clearance has been summarily revoked due the events of Incident 9034-A and is now considered to be an extremely dangerous anomalous entity that is currently uncontained. 

**Former Position(s):** Lead Researcher for the 9034 Project, Sturmbannführer

**Status:** Currently at large 

**Profession:** Pataphysicist, formerly Sturmbannführer and military researcher for the SS Ahnenerbe Obskurakorps

**Current Location:** Unknown

**Serial Number:** 9-14-5-22-9-20-1-2-12-5

**History:** Born on December 19, 1880, Dr. Kreis initially started off in the field of physics at the University of Bonn before entering into the field of Pataphysics with the publishing of a paper on the relationship between metaphysics and the concept of chaos theory. This saw him recruited by the Imperial German Das Büro für anomale Forschung or BAF [[footnote]] Translating to The Bureau for Anomalous Research. [[/footnote]] around the start of WWI. It was during his time as a member of this military research institute that he developed several anomalous weapons used by the Central Powers during the war. 

After the war, Dr. Kreis continued his work in the field of Pataphysics, and collaborated with the Foundation on a few occasions in the containment of anomalies within Weimar Germany. It was during this time that he built a reputation as one of the Foundation&#39;s best partners. However, during the rise of the German Nazi Party in 1933, several paranormal researchers and partners were pressed into the service of Ahnenerbe Obskurakorps. [[footnote]] A division of the Schutzstaffel or SS as it is more commonly known. [[/footnote]]

For nearly eight years, Kreis helped develop various Wunderwaffe (wonder weapons) for the Wehrmacht and the SS during the lead up to and the initial stages of the Seventh Occult War. [[footnote]] Coinciding with the outbreak of the Second World War at the time.[[/footnote]] In 1941, Dr. Kreis defected to the Foundation as part of an Allied initiative to smuggle disloyal scientists out of the Third Reich. It was around this time that SCP-9034-A was apprehended, and Kreis became the Lead Researcher of the project, as part of an effort to understand the threat that was the SCP-9034 phenomenon.

This project saw the initial research into SCP-9034 remain limited to observations of the spatial anomaly spoken of by SCP-9034-A and attempts to solve the equation  later designated SCP-9034-B that the entity had provided. Alongside those procedures, a limited number of sanctioned interviews were allowed to be conducted by Dr. Kreis with SCP-9034-A. However, research into this stopped following Incident Atropos. In the months  following the Incident, Kreis was observed being more obsessed with the equation than ever before. Constantly being caught attempting to decipher it through the limited replications of it even after such activity was deemed off limits. Despite several warnings of potential disciplinary action by the O5-Council, he continued with his research in SCP-9034-B. This culminated in Incident 9034-A, which saw the SCP-9034-A entity seemingly neutralized and rendered Kreis comatose and Quantumly Fixed.  

Kreis woke up approximately a week after the initial Incident and was interrogated for his role in causing the affair. What then unfolded is detailed in the Incident-9034-B Report as linked below in the revised SCP-9034 file. Following Incident 9034-B, the Ethics Committee reviewed the events as documented and concluded Kreis should receive SCP classification. It has been determined that all information surrounding Kreis should be suppressed to avoid panic within the lower ranks of the Foundation and the exacerbation this would have on the damage SCP-9034 has done to the universe. For more information on this, please consult the revised SCP-9034 file.
