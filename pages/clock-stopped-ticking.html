[[=]]
+ The Clock Stopped Ticking Forever Ago
[[/=]]
= 6:22.

She can always tell it&#39;s happening when the window starts to fog. It&#39;s a subtle sign, but it&#39;s the first sign that the changes are coming. The twenty-fourth hour in the 8th&#39;s wake, preparing to ring.

The outside hall is temperature controlled, the glass is often cleaned. If it&#39;s fogged, something&#39;s wrong. There&#39;s been some break or falter in the system and it&#39;s started //it&#39;s started.// She doesn&#39;t even have to see the ghosts to know that it&#39;s starting.

Ilse Reynders feels her heartbeat rise in her throat, then drop back down to the same rate it&#39;d been the day she stepped foot in here, only to rise again. Rise, fall, rise, fall, rise, fall -- the sudden start and stopping feels like palpitations in her chest. It awkwardly forces stale air out of lungs that aren&#39;t even processing the oxygen in ragged gasps.

She can&#39;t tell if she wants to stumble away and tuck herself into the corner between the incinerator&#39;s piping and the wall, or desperately shove herself against the glass as though that&#39;ll dispel the awful fog. That calm before the storm. 

= 6:23.

Reynders wheezes and nearly falls, bracing a hand against the smooth wall and sliding down it to the ground. She curls up against that wall, slamming her eyes shut. Rise and fall, rise and fall goes her heart. There&#39;s no other noise, the timeless state of the incinerator lets not even sound permeate within. It leaves only an awful, pulsing //nothingness// in her ears that&#39;s only broken by failed attempts to gasp for air that doesn&#39;t exist, and that horrible, discordant beating. 

And both are far more deafening than any silence ever could be. 

She digs her nails into her arms, faintly feels the painful tearing of skin beneath her nails and the warmth of blood against her fingertips. It&#39;ll close in minutes. The blood will rewind up her arm and back into her veins and back into the rise and fall of her heart. Rise and fall, rise and fall.  

&#34;Why can&#39;t you just get it over with?&#34; she cries out, voice crackling, &#34;I don&#39;t... I can&#39;t wait like this. For-for the shoe to drop.&#34; There&#39;s no one to respond. Just those same four walls as always, deaf and uncaring to the pleas that bounce off the old plaster and pipes. She&#39;s grown far too comfortable talking to empty air, but what else is she to do? 

There&#39;s no clock inside here, and if there was it would be useless. Reynders raises her head from her arms and stares at the window. There&#39;s still fog. It&#39;s still going to happen. 

= 6:24.

Reynders crawls to her feet, and drags herself to the window. The hall is empty, no ghosts, no men, no beasts. She leans against the glass; in comparison to the maddeningly //temperate// feel of the rest of the room, it&#39;s cold.

= 6:25.

For a moment, she stays just pressed against the glass. Forever her lifeline. Through the fogged window, she can see the clock that&#39;s been mounted there. Reynders&#39; eyes trace the hands, the Roman numerals upon the old thing as the red hand ticks. 

= 6:26.

//Ah.// 

It&#39;s close. It&#39;s horribly, yet //tantalizingly// close.

Reynders finds herself just staring at the hands of the clock, tracing the second hand with her eyes. There&#39;s nothing else to stare at, in this moment. Not the hall, not whatever ghosts may be starting to gather, not the fogged window, not the haggard face reflected in the glass. 

= 6:27.

The only thing she can hear is a faint static from the speaker meant to project her voice, a quiet and low hum of feedback. She latches onto that humming, mind grasps at every odd little dip in the frequency. Every minute change in that droning tone makes Reynders tense, like she&#39;s prepared for a blow that will not come. 

= 6:28.

She&#39;s not breathing. It doesn&#39;t matter. It creates a tightness in her chest nonetheless. As that thin, red line draws onward across the clock&#39;s face she breaks eye contact with it. Reynders puts her forehead against the window. Should she close her eyes? Would that even do //anything?// Anything at all?

There&#39;s a sound, down the hall.

= 6:29.

Her head rises.

The shoe falls.

It feels like the world is exploding, crumbling, reforming -- over, and over, and over again. There&#39;s no way to be prepared for the feeling of the timeline branching, no way to get used to the sensation. Her legs give out beneath her and she&#39;s only still upright via her hands and head pressed against the glass. 

A nausea rolls over her in waves, a pulsing, writhing, //squirming// feeling behind her eyes. Like something kicking and screaming. Reynders dares to open her eyes and is struck by a worsened sense of sickness -- the wall of the hall is covered in a myriad of colors and shapes and head-hurting fractals that are there one moment and gone the next. Strobing between the plain concrete and whatever sort of graffiti has been splattered onto it. 

It&#39;s splattered on the glass, too. There&#39;s someone in the hall. She can&#39;t tell //which// of the two halls they&#39;re in. Wait. No. It&#39;s the painted hall. They&#39;re painting on the wall, cackling like a madman. Some of the paint is on the glass. No, no there&#39;s no paint on the glass it&#39;s clean it&#39;s fogged it&#39;s paint filling the hall it&#39;s a trick of the light //there&#39;s a god damn cognitohazard on the wall--//

[[=]]
+++ //CRACK.//
[[/=]]

She doesn&#39;t know why she does it. She doesn&#39;t like that she&#39;s made a habit of it. Reynders feels blood trickle down her nose, raises a hand to wipe it away as if it won&#39;t vanish on its own. Where is the blood? Here? There? Which is here and where is there? Both places? How many? One two, one two, one two, --five--, one two. Two. Two places. There&#39;s a small smear of red paint on the glass. There&#39;s a small smear of blood on the glass. It&#39;s hers. It&#39;s her blood. She&#39;d struck the glass with her head. She doesn&#39;t like that she&#39;s made a habit of it. 

Reynders wheezes out a breath, it comes out a strained, manic sort of sound. The person in the paint-hall pauses but does not stop their task. There are people in the grey-hall now too. They&#39;re watching her. She doesn&#39;t look at them. She looks past the ghosts and stares at the patterns on the wall. It hurts, it makes her feel sick. She wonders what would happen if she threw up in here. Would it reverse? Have to climb up her neck and back down her throat? 

Ilse Reynders pushes herself back and away from the glass. She stops herself from nearly slamming her skull back against it for a second time. She can still feel that trickle of blood down her face. The stale air of the incinerator is briefly tainted by the smell of wet iron. 

The ghosts are still there. The painting-ghost and the grey-ghosts. The painting-ghost does not seem to notice nor care that she&#39;s there, why would they? From their point of view, she&#39;s probably been yowling for hours or days or weeks on end. They just keep painting on the walls, over and over again, overlapping layers of shapes and colors and patterns. She doesn&#39;t know where the paint is.

The grey-ghosts. The grey-hall-ghosts. They&#39;re the ones looking at her. There&#39;s one-- two? Three? Five? No it&#39;s two. Two. The painting-ghost is the third but they&#39;re not in the grey hall they&#39;re in the painted hall so there&#39;s two, it&#39;s //two.// 

Reynders can tell she&#39;s being spoken to. Her outburst has drawn the two over. She doesn&#39;t recognize their faces, but her vision spins between so many things and she can&#39;t even tell if they have faces. She can feel the vibration of their voices through the glass, but the words fall off her ears like water through a drain.

//&#34;I&#39;m sorry,&#34;// she whispers to the glass, //&#34;bit indisposed right now. Can&#39;t help,&#34;// the woman in the incinerator manages to choke out. The grey-ghosts behind the glass reply with something, worried? Sad? Confused? Something&#39;s wrong. //She// knows what&#39;s wrong. They may not -- but most don&#39;t.

She wants nothing more than to be able to reach through the glass and cling to //someone// out there to ground herself. To feel the warmth of a person but there&#39;s nothing but this empty air and glass and paint and ghosts and there&#39;s nothing but her inside the incinerator. The people out there couldn&#39;t do anything to help her, even if they wanted to.

It&#39;s just her. Just her against this madness. Her and this madness for god knows how long. Well no, no she knows how long. A year, a year until time collapses and condenses and her vision falls back to one. A //year.// She can make a year. She can do nothing else //but// make it through the year.  

Reality feels like it&#39;s fraying at the edges, and all that&#39;s left in the torn between pieces is her. How many times before has this happened? One, one two. One, two, three. Five. It&#39;s four. This is the fourth time. Will there be a fifth? A sixth? Could she //handle// that? Could reality handle that?

A year. It will be a year. A year that will feel longer than all the others in the past few decades.

//&#34;Please fix this,&#34;// Reynders whispers, voice hoarse. She doesn&#39;t know if she&#39;s been saying other things -- mind out of place and out of time. The grey-ghosts are confused, she&#39;s not addressing them, the painting-ghost doesn&#39;t look, she&#39;s not addressing them. 

//&#34;I don&#39;t know how much more I can take.&#34;//</textarea></pre>
