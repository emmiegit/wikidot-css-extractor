[[include component:preview
text= This series of tales follows a young man&#39;s quest for the truth behind the events that took his brother away from him. He begins mostly ignorant of the true nature of the world he lives in, but his quest will put him in conflict with some of the greatest powers in the anomalous world, and force him to ask very difficult questions about the people closest to him.]]
=====

[[&gt;]]
[[module Rate]]
[[/&gt;]]

[[=]]
,,[[[xhawk77x|More by this Author]]],,
[[/=]]

Jerry lost his brother Evan when he was only a child. The world wants him to believe that Evan died in a natural disaster, that his death was a meaningless tragedy for which no one could be blamed. Jerry knows better. He knows his brother was taken from him, and he will stop at nothing to uncover the truth. This quest will put him in conflict with some of the greatest powers in the anomalous world and force him to question whether he can trust the people closest to him.

+ Season 1
* [[[i-didn-t-forget-pt-1-the-galaxy-plaza-disaster|Part 1: The Galaxy Plaza Disaster]]] - Jerry researches the Galaxy Plaza Disaster in which his brother allegedly perished, and finds that he&#39;s not the only one whose memories of that night diverge from the official story.

* [[[i-didn-t-forget-pt-2-spirituality-club|Part 2: Spirituality Club]]] - Jerry investigates the high-school Spirituality Club of which his brother was a prominent member, and considers how its intrigues may have led to the Galaxy Plaza Disaster.

* [[[i-didn-t-forget-pt-3-richard-michaels|Part 3: Richard Michaels]]] - Jerry further investigates the nature and origins of Spirituality Club, but his snooping seems to be drawing unwanted attention.

* [[[i-didn-t-forget-pt-4-guiding-star-baptist-church|Part 4: Guiding Star Baptist Church]]] - As the apparent scope of the forces arrayed against him grows, Jerry is forced to question whether his closest ally may, in fact, be one of his enemies.

* [[[i-didn-t-forget-pt-5-the-star-clad-tome|Part 5: The Star-clad Tome]]] - Jerry&#39;s independent investigations seem to be exonerating Theo from Daisy&#39;s accusations, but lingering questions continue to gnaw at him.

* [[[i-didn-t-forget-pt-6-the-service|Part 6: The Service]]] - Jerry&#39;s spying gives him a glimpse into one of Theo&#39;s church services, and what he finds is stranger and more terrible than he could&#39;ve possibly imagined.

* [[[i-didn-t-forget-pt-7-the-church-of-the-blessed-sacrifice|Part 7: The Church of the Blessed Sacrifice]]] - Jerry pays a visit to the Church of the Blessed Sacrifice, resolved to learn once and for all what Theo is hiding from him.

* [[[i-didn-t-forget-pt-8-Theodore-North|Part 8: Theodore North]]] - The truth comes out as Jerry confronts Theo about the secrets he&#39;s been keeping.

* [[[i-didn-t-forget-pt-9-the-wanderer-s-library|Part 9: The Wanderer&#39;s Library]]] - In the aftermath of Theo&#39;s betrayal, Jerry is finally able to take his first plunge into the anomalous world.

* [[[i-didn-t-forget-pt-10-the-serpent-s-hand|Part 10: The Serpent&#39;s Hand]]] - Jerry is going to need help if he&#39;s to have any chance of rescuing his brother. That help comes with a price, but Jerry is eager enough to pay it if it means he might see his brother again.

* [[[i-didn-t-forget-pt-11-the-jailors|Part 11: The Jailors]]] - Jerry and his newfound comrades infiltrate a Foundation facility hoping to find information that will lead them to Evan, but the operation doesn&#39;t go as planned.

* [[[i-didn-t-forget-pt-12-site-17|Part 12: Site 17]]] - The moment has come. Jerry and his remaining comrades are heading into Site-17 to find Evan, but what they find there is different than anything they could have possibly expected.

* [[[i-didn-t-forget-pt-13-evan-sanders|Part 13: Evan Sanders]]] - At last, the brothers are reunited, but the occasion is far less joyful than either of them would have liked.

+ Interlude
* [[[SCP-7851|Interlude: SCP-7851 - The Telekill Ally]]] - A boy with a unique gift performs a heroic deed, but instead of being rewarded, he finds himself imprisoned as an &#34;anomaly&#34; for his trouble. Can he adjust to his circumstances or is he doomed to a lifetime of misery?

+ Season 2
* [[[i-didn-t-forget-pt-14-containment-cell-84|Part 14: Containment Cell 84]]] - As both Evan and Jerry do their best to adjust to their new circumstances, the Foundation is alerted to a new, and old, danger.

* [[[i-didn-t-forget-pt-15-something-big|Part 15: Something Big]]] - Evan&#39;s attempts to figure out what the Fifth Church is up to lead him back into contact with an old friend. Meanwhile, Jerry&#39;s new circumstances continue to weigh on him.

* [[[i-didn-t-forget-pt-16-hell-on-earth|Part 16: Hell On Earth]]] - The Foundation resorts to drastic measures to secure Jerry&#39;s cooperation.

* [[[i-didn-t-forget-pt-17-veronica-hall|Part 17: Veronica Hall]]] - Evan questions high-ranking Fifthist Veronica Hall in hopes of learning more about the Church’s plans, but what she has to say raises more questions than it answers, and takes the investigation in an unexpected direction.

* [[[i-didn-t-forget-pt-18-callum-michaels|Part 18: Callum Michaels]]] - While Jerry reunites with his comrades in containment, Evan finally drags the whole truth out of Callum, whose confession reveals that the world is in even more danger than the Foundation feared.

* [[[i-didn-t-forget-pt-19-the-memetic-agent|Part 19: The Memetic Agent]]] - The gravity of the situation now fully revealed, the Foundation scrambles to prevent a world-shaking crisis.

* [[[i-didn-t-forget-pt-20-the-cure|Part 20: The Cure]]] - While Evan rushes to cure as many people as possible, Light does everything she can to convince Jerry to join in the effort on the Foundation’s terms, but will the Foundation’s “cure” even work?
