    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>Excerpt from the Journal of Caroline Wren

&gt; I&#39;ve been able to eliminate some of my early hypotheses. While I thought that a religious background might have influenced survival, the fourth survivor, Torres, is strictly irreligious. So much for no atheists in the foxhole. I was able to eliminate a few more commonalities once I was given access to the subjects&#39; full medical records. This has given me a wealth of data, to a point where I&#39;m now finding it difficult to sift through it all. Thankfully, my staff are proving more than up to the challenge.
&gt; 
&gt; The survivors were not as helpful as I was hoping. Their testimony is often halting, and getting details is like pulling teeth. I make the usual sympathetic noises, but I&#39;m afraid I can&#39;t entirely hide my irritation. We all have our own problems. Why can&#39;t they put theirs aside to focus on the mission?
&gt; 
&gt; No matter. I&#39;ll have my assistant, Ronicker, take over the interviews. He&#39;s better at this sort of thing. There&#39;s no sense in my taking out my frustrations on some broken commandos. They probably don&#39;t deserve it.
