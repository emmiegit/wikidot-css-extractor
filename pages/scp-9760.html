**Item #:** SCP-9760

**Object Class:** Euclid

**Special Containment Procedures:** SCP-9760 currently resides at the United Oil 76 filling station on Arlington Avenue in Los Angeles, California. To entice SCP-9760 to remain in place, a 35% discount on Newport-brand menthol cigarettes has been subsidized for this station only. Law enforcement, as well as the station&#39;s proprietors and employees, have been instructed not to interfere with SCP-9760. They have also been advised to overlook minor (&lt;1 USD) shortfalls when SCP-9760 attempts to make purchases.

A Foundation agent posing as the store&#39;s manager is to make conversation with SCP-9760 at least once per week to ensure its continued stability and ascertain any plans to change location. If necessary, the agent should dissuade SCP-9760 from leaving.

**Description:** SCP-9760 is a human male, apparently in its late 20&#39;s. SCP-9760 is capable of instantly disappearing from its current location and reappearing in the parking lot of any filling station,[[footnote]]Also known as a &#34;gas station&#34; or &#34;petrol station&#34;, depending on the dialect.[[/footnote]] though it has a strong preference for those with attached convenience stores. If SCP-9760 is taken anywhere other than a filling station, the station&#39;s parking lot, or the station&#39;s convenience store, it will immediately teleport to the nearest such establishment.

When left to its own devices, SCP-9760 will loiter in filling station parking lots indefinitely, showing no need for rest. It will periodically enter a convenience store to purchase food and cigarettes, use its restrooms, or avoid inclement weather. It has not visibly aged since its identification in 1963 and has suffered no apparent ill effects from its lifestyle, though it does walk with a slight limp. Tissue samples and excrement from SCP-9760 show no abnormalities.

While SCP-9760 will generally remain wherever it is currently located, it may teleport to a different parking lot when faced with inquiries from law enforcement, a lack of its preferred cigarettes, and other disturbances. Despite this apparently deliberate behavior, SCP-9760 claims to have no knowledge of any anomalous abilities, offering excuses or going on unrelated tangents when pressed on the matter.

SCP-9760 carries the following items on its person at all times:

* A worn leather wallet, containing miscellaneous gift cards in small denominations, as well as a single &#39;Joker&#39; playing card. When SCP-9760 enters a convenience store, a small amount of the appropriate currency (between 5 and 15 USD) will appear in the wallet.
* A silver Zippo lighter, with a drawing of a skull crudely etched into the side. It has not been observed to run out of fuel or degrade in function despite over 15 years of regular use.
* A non-functional iPhone 3G. Cursory attempts to repair it have failed, and SCP-9760 has refused to relinquish it for closer examination.
* Several food and gum wrappers of variable nature.
* A pair of glasses with corrective lenses.

If any of these objects are removed from SCP-9760&#39;s person, they will return to it the next time it teleports.

SCP-9760 will introduce itself as &#34;Seth&#34;, refusing to provide a surname or other concrete identifying information. It claims to have several friends, a long-term girlfriend, family, etc. but has not provided sufficiently detailed information to locate any of them. When asked about its current situation, it will claim to have only been out for several hours, despite considerable evidence to the contrary.

While SCP-9760 has declined to participate in more in-depth testing, all available information suggests that it has a mild temperament and mundane psychological profile.

**Addendum:** Weekly SCP-9760 check-in, 2019-03-31

[[div class=&#34;blockquote&#34;]]
**&lt;Begin Log&gt;**

//SCP-9760 is wandering around the United Oil 76&#39;s parking lot, eating from a can of Rotisserie Chicken-flavored Pringles. He nods when Agent Burns approaches, but does not otherwise acknowledge her.//

**Agent Burns:** Hey Seth. How&#39;s it going?

**SCP-9760:** Good, good. You know, I heard someone say earlier that Pringles tubes are inefficient.

**Agent Burns:** Yeah?

**SCP-9760:** Yeah, and I&#39;m just thinking like, Pringles are the most efficient way to store chips, right? When with normal chips, there&#39;s just a ton of air in there. But the Pringles all stack together. It&#39;s crazy.

**Agent Burns:** Really, the problem is that they&#39;re hard to get out of the tube without breaking.

**SCP-9760:** I mean, it&#39;s not //that// hard, you just gotta use some finesse. I got a good trick for it, actually. Like here, watch.

//&lt;SCP-9760 cups his hand below the opening of the can, then gently tilts the can towards himself until the chips barely begin sliding towards the opening; he slowly spins the tube clockwise when the chips stop moving, eventually allowing a few chips to enter his hand, along with several broken chip pieces and a number of crumbs.&gt;//

**SCP-9760:** Ah, shit, it usually works better than that. Maybe this one&#39;s a weird batch. //(SCP-9760 eats the chips, allowing some crumbs to spill onto his shirt.)//

**Agent Burns:** So, what&#39;s new with you?

**SCP-9760:** Nothing much.

**Agent Burns:** Cool. Got anything going on today?

**SCP-9760:** Nah.

//&lt;Extended silence. SCP-9760 finishes eating the chips and discards the can in a waste bin.&gt;//

**Agent Burns:** So, uh, you sure like to hang out here a lot.

**SCP-9760:** Yeah, I guess.

**Agent Burns:** Got a lot of time on your hands?

**SCP-9760:** I dunno, time&#39;s weird. I try not to think about it too much.

**Agent Burns:** I mean like, do you have any responsibilities?

**SCP-9760:** Well, yeah, course I do. I need to pick up my dad&#39;s meds later, plus I got a bunch of little siblings to keep an eye on.

**Agent Burns:** Ahh, gotcha. Oldest child problems?

**SCP-9760:** Oldest one that&#39;s not in jail.

**Agent Burns:** Yeesh. I can see why you&#39;d need a break from all that.

**SCP-9760:** Tell me about it. There&#39;s always some stupid new crisis or weird problem going on, and it&#39;s nice to just go somewhere you know what you&#39;re gonna get.

**Agent Burns:** I wouldn&#39;t be too sure about that, we&#39;re getting that new flavor of Monster next week.

**SCP-9760:** Oh shit, for real? The uh, the Ultra Gold?

**Agent Burns:** Yeah. It all tastes like battery acid to me, but maybe you&#39;ll like it.

**SCP-9760:** Nah, battery acid tastes way different.

**Agent Burns:** You&#39;ve tasted battery acid?

**SCP-9760:** Yeah, have you ever licked the flat end of a battery? It&#39;s like copper except way more intense.

**Agent Burns:** That&#39;s not battery acid, though. Battery acid is the stuff //inside// the battery. The outside is just metal.

**SCP-9760:** Then why does it taste like that?

**Agent Burns:** I think it&#39;s an electricity thing?

**SCP-9760:** Huh.

//&lt;SCP-9760 retrieves his lighter and a pack of cigarettes from his pocket; he silently offers the pack to Agent Burns, who holds up a hand to refuse.&gt;//

**SCP-9760:** But yeah, other than that, this place&#39;s been the same as long as I can remember.

**Agent Burns:** You&#39;ve been coming here for a long time?

**SCP-9760:** Since I was a little kid. Actually, my first memory is coming here with my mom to get some medicine.

**Agent Burns:** No kidding?

//&lt;SCP-9760 lights a cigarette and begins to smoke.&gt;//

**SCP-9760:** Yeah, I remember Michael was working the cash register... he said we&#39;d have to come back later.

**Agent Burns:** Must&#39;ve been before my time, &#39;cause we don&#39;t have anyone named Michael.

**SCP-9760:** Huh.

//&lt;Extended silence. SCP-9760 scratches an unidentified symbol into the gravel with his shoe.&gt;//

**SCP-9760:** You ever think about, like, the end of the world?

**Agent Burns:** I try not to.

**SCP-9760:** Same here.

//&lt;Silence.&gt;//

**Agent Burns:** Well, I gotta head back.

//&lt;Agent Burns leaves. SCP-9760 resumes his normal routine.&gt;//

**&lt;End Log&gt;**
