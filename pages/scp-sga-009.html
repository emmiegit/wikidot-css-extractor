**Item #:** SCP-SGA-009

**Object Class:** Keter

**Special Containment Procedures:** All signals originating from SCP-SGA-009 are to be intercepted by Foundation satellites and prevented from reaching Earth.
  
**Description:** SCP-SGA-009 is the Sun. Every few years, at random times, SCP-SGA-009 will broadcast a brief radio signal, with an embedded message consisting of one sentence in English.
  
**Addendum SGA-009.1:** The following is a list of all messages thus far received from SCP-SGA-009:

&gt; I&#39;ve been watching all of you, and I&#39;m so proud.
  
&gt; I can&#39;t do much from here, but I try my best.
  
&gt; It&#39;s a bit difficult, of course, making everything just right.
  
&gt; Are you getting these?

&gt; I haven&#39;t heard from any of you.
  
&gt; Maybe you can&#39;t respond.
  
&gt; Maybe you&#39;re not receiving these.
  
&gt; But I love you, okay?

&gt; Each and every one of you.
  
&gt; Just, remember that, okay?

&gt; I&#39;m not sure how long I can protect you.
 
&gt; But I will, for as long as I can.</textarea></pre>
