**Item #:** SCP-9167

**Object Class:** Keter

**Special Containment Procedures:** Calls to law enforcement are to be monitored for events matching SCP-9167. When an SCP-9167 event occurs, all surviving witnesses are to be amnesticized, and any deaths and injuries should be explained using a suitable cover-up story.

Any dentist affected by SCP-9167 should be assigned a new identity with a profession unrelated to dentistry.

**Description:** SCP-9167 is a phenomenon that causes anomalous mental and physical changes in dentists. 75-100 cases are reported yearly worldwide with no discernible pattern.

Symptoms of SCP-9167 occur immediately upon the dentist in question seeing the underside of a patient&#39;s tongue. The dentist will experience an abrupt, irresistible urge to mutilate their patient, which immediately subsides after it is acted upon. This violence is targeted at the patient&#39;s face, jaw, and tongue; usually, death from blood loss follows.

Dentists affected by SCP-9167 will exclusively attack their patient by biting. The bite force exerted under the effects of SCP-9167 is sufficient to tear flesh and crack bones, suggesting that the dentist&#39;s body is anomalously enhanced during the event. When possible, they will consume any tissue that they remove from their patient&#39;s body, even after their violent urges subside.

Notably, no dentist has reported experiencing any form of trauma or guilt after engaging in an SCP-9167 event. While they recognize SCP-9167 as an undesirable occurrence, they are apparently incapable of developing an emotional reaction to it. Additionally, the subject will lose all interest in practicing dentistry. Other dentists and prospective dentists who are made aware of an SCP-9167 event will have a similarly muted emotional response, but their interest in practicing dentistry will increase.
