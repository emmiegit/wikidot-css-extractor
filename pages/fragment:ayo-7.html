    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>“You with me, Cho?”

The cold stopped. There was nothing to feel anymore. Just her and the voice questioning.

“…Yes ma’am.”

“So you remember?&#34;

“…Yes ma’am.”

“How far back?”

“All of it.&#34;

“…how far back Cho?”

“Four years. No three years and...heh. Six months.&#34;

“So you understand my place in all of this.&#34;

…

&#34;So last question, do I have a reason?”

Every memory they erased returned and not a single one judged her favorably. She remembered everything, some things for the first time and many things for the second or even third. All the escape attempts, attacking other skips, never leaving Dr. Wensley&#39;s side. Even the sign language she learned for her 할머니 didn’t belong to her.

How many costumes did they force on her since she had gotten sick, and they still ask her questions like this?

“Why do you all like to keep acting like I have a choice? If you want to kill me then just do it. I get it already.”

“That your final answer Cho?”

What more did she want from her? To beg? She had taken them for cold assholes not some lame sadists. No…they made sure she felt that way. Nothing had changed, they could have just saved her some years and killed her if they were going to stop her every time she tried to run. It was all a game to them.

“Why’d you bother with any of this? Was it that funny?”

“It’s my job. No one wants it, but they want the results of it. Even if they can’t do their own. Pfft, especially when they can&#39;t handle their own shit. Thankless work.”

“Just a job? All of this and it’s just a job for you?”

“Yup. It’s as simple as that, and I do damn good thankless work.”

&#34;...No one even wants it.&#34; Zena chuckled.

&#34;No, and here we are.&#34; 

&#34;My dad used to tell me that all a person owes the world is one dirty job with a smile, even if you hate it and everyone hates you.”

&#34;Eventually, you either accept that or people can&#39;t accept you.”

It was quiet after that. For too long. She expected the woman to continue digging in to her before it would all be over, but found the silence more intimidating than the idea of her actions.

“I think I was only 7 or 8 when I moved to California. I was so excited. The kids talked so much and were so confident about everything. I thought they were so smart, and they thought I was stupid because I asked so many questions.”

“Not a good start, but we start somewher, ya?”

“Heh, this girl Stacy even asked me why Japanese food smelled so much better than Korean food. She even called me a fake Asian when I said I didn’t like K-pop that much.”

“Doesn’t get more American than that.”

“It sucked because my English wasn’t good enough to get back at her. I practiced a lot before we moved too. It was so embarrassing. Especially when I got mad, my parents told me not to make a big deal out of dumb people. Heh! My dad cared more about me making friends and my mom cared more about my grades.”

“Why do I feel like you ignored that?”

“Well, I couldn’t take it! It made me so mad to have them laugh at me like that. So, I took my dad’s CDs and my brother’s comics and studied them. I kept using these big words and old phrases from like the 70s.&#34; She paused her story for a good bout of laughter.

&#34;My mom, Keeheehee, was so confused oh my god. My dad was just sitting there crying his eyes out just laughing. Yea, that was when I first watched it. That old movie they liked, it was called the Wiz I think. Yea! We all loved it, but it was so weird.”

She choked out more laughter, remembering her brother copy Michael Jackson’s dancing and how hard it was for her to keep up with her little legs. He used to call her Toto, the jerk.

“Then, right before the summer, What was it? Some kind of show and tell thing. I remember I made this presentation about my favorite foods from Korea and their history. I messed up my words so much, I think I spent thirty minutes just talking to my whole class about my favorite Tteok-bokki recipe.”

“What an attempt at diplomacy.”

“I thought they would be nicer if I could show them what I liked. Every time they laughed, I tried to scream over them. Oh god.” She belly laughed, struggling to take in air. “They just made more fun of me at school after that. They called me fatass and kept giving me their snacks.”

Her laughing became quieter, coming out more like it was leaking than intentional.

“And of course I’d take them. I’d even say thank you. Thank you! I should have just died then. Yea school just got worse...”

Then it stopped entirely.

“But that day…my parents were so proud of me.” She started trembling as she had then.

“E-even Jun. He was cheering when I was done making a fool of myself in front of them.” She laughed as she cupped her mouth, miming how he did that day screaming &#39;LETS GOOOO!&#39;.

“He lifted me on his shoulders, too. Even Granny sent a video congratulating me.”

She laughed as the tears rolled by, and memories continued to surface.

“Yea, even in middle school, it’s how I met Naya and the others. God, when was that?”

It seemed like a lifetime ago now.

“She made the boys stop laughing at me. I didn’t know what to say to her, but she kept talking to me after that.” 

She wondered how many people were asking what happened to her. She wondered if people would even ask. She wondered if any of those people were even real.

But none of it mattered in the end.

&#34;I’ve been here before too. Doesn’t matter if I cry, or run or let you shoot me. I’ll just wake up back in my room.”

Right. The room.

“Just because my mom tells me to clean my room and I can’t f-” Her hand slipped against the shadows behind her. “I can’t do it!” She struck at it again, this time on the “floor”, hitting something solid.

“The easiest thing in the world and I couldn’t do it. I couldn’t even clean up after myself anymore when I know…I can do it!” She gave up any attempts to hide the wrinkles in her face, barely managing to get air in between her sobs.

“I don’t even know why!”

She slammed her hand against nothing, to the sound of nothing but her own heart beating through her chest.

“Now I’m too scared to know why! Everyone’s scared of me, and I’m scared of me! I don’t know what’s wrong with me, or what to do, or where my family is, and everybody keeps acting LIKE I’M FUCKING STUPID!”

She shot up from her bed of shadows.

“I’M NOT STUPID!” It began to dissipate.

“I’M NOT STUPID! I’M NOT STUPID!” a faint light emerged in the void. It&#39;s rays pierced through. She planted both feet, ten toes deep in the abyss.

“I don’t care! I can do this! I can do anything! I’m not some stupid anomaly! I’m…I’m Zena Cho! I got the 2nd place 3X3X3 record my freshman year! I’m one of the top ten King-Leo at my local! My 떡볶이 recipe is the best my Granny&#39;s ever had in Kaesong! I’m not some, anomaly! I don’t want to lose to this anomaly. I don’t want to lose to any stupid anomalies. FUCK ANOMALIES!&#34;

The light expanded quickly towards her, a star tearing apart the darkness. Its shape changed, stretching and opening wide.

“I can do this! I know I can! I can do anything! So go ahead and kill me if you’re so damn scared I will! I don’t care! I don’t give a fuck! I’m not a mistake! Fuck you! I’m not…”

She sank back to the hug of her knees, forcing back her tears and snot. She struggled like the effort itself would make her vomit. She buried herself so deep she couldn’t see, much less feel her sunshine nuzzle its nose against her.
