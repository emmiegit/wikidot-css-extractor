    <h2 class="header">Page Source</h2>
    <pre><textarea class="page-source" readonly>[[&gt;]]
[[module Rate]]
[[/&gt;]]

He gave it all up for a whim,
Neighbour saw a lone hind limb,
And he received a sentence grim,
Was put away for good.

A stranger now before him stood,
Told him for a price, he could, 
Avoid a fate with chair and hood,
If he now took a deal.

Flown away with arrow’s seal,
To a place for things surreal,
One of many, a new cogwheel,
Won&#39;t tell him what it means.

His future, he began to glean,
From red spots he saw them clean,
He heard it in his neighbour&#39;s scream,
Saw the guilty Doctor’s face.

The doctor trails behind a pace,
When she leads him to the place,
That makes him vanish with no trace,
To help perform the rites.

She makes herself think that it’s right,
As they die with her at night,
To keep their loved ones in the light,
Her doubts, she won&#39;t admit.

She signs forms, her lamp is lit,
In the creaky chair she sits,
When her eyes start to submit,
No one calls her to bed.

That, she has left in her stead,
Joining the world’s overhead,
Let her family be misled,
“To help them from afar”.

She&#39;d proudly take any scar,
For her duty to the bizarre,
She would recite any grimoire,
To halt further bloodshed.

Her parents must think that she’s dead,
“For their safety” She had said,
Her reward for friends she&#39;d shed,
&#39;The future of their world&#39;.</textarea></pre>
