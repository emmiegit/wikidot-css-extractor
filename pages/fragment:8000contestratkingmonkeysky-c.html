&gt; ##064edd|**//Behold! What we have been waiting for is none other than Rowan Rocket, blasting through the Intraspace. Although, you may know it better as Gutsburg! While his appearance may disquiet, he has a kind heart! I promise.//**##
&gt; 
&gt; ##064edd|**//You may have noticed something is different. Well, I got tired of the barrier. All that restriction and having to fit myself in a specific shape. I&#39;m not into that at all. But enough about me, this isn&#39;t my story. This is Rowan Rocket&#39;s story!//**##
&gt; 
&gt; @@ @@
&gt; 
&gt; **Rowan Rocket:** ##064edd|**You tell them! Hahaha! Oh god. Oh my god. It&#39;s all so much! Hahaha! Look at this place! It&#39;s my temple! It&#39;s the temple of my body they&#39;d teach me about at school! Whee!**##
&gt; 
&gt; @@ @@
&gt; ##064edd|**//Rowan Rocket is covered in soot, with a few spots on his body still smoldering, and only a few little messy dark hairs are left on his head. His arms both end in ragged, charred scraps where his hands used to be, and the rest of his features look like they&#39;ve been slightly scattered by some violent force.//**##
&gt; 
&gt; ##064edd|**//To put it simply, he looks like someone who can&#39;t go five minutes without exploding, and I&#39;m not even talking about the jets of flame shooting out below his waist. It seems like he&#39;s loving it, though. Maybe even a little too much?//**##
&gt; 
&gt; @@ @@
&gt; **Rowan Rocket:** ##064edd|**Got to find my friends! They could be anywhere around here! Blast off!**##
&gt; 
&gt; @@ @@
&gt; ##064edd|**//Rowan Rocket soars through Intraspace, passing by mounds and pits of viscera in all sorts of kooky shapes and sizes! It could almost be considered a parody of human anatomy, but it&#39;s more like a love letter if you ask me.//**##
&gt; 
&gt; ##064edd|**//Inside his cavernous cavity, Rowan Rocket spirals around, disoriented, looking desperately for some clue of where to go. Finally, it occurs to him when he catches sight of a pulsating pyloric sphincter in one of the walls.//**##
&gt; 
&gt; @@ @@
&gt; **Rowan Rocket:** ##064edd|**Aha, that&#39;s it! If I&#39;ve learned one thing from all of this, it&#39;s to follow my gut!**##
&gt; 
&gt; @@ @@
&gt; ##064edd|**//Perhaps out of relief from Rowan Rocket&#39;s discovery, the ring of smooth muscle relaxes, revealing a mysterious dark passageway behind it. Rowan Rocket jumps at the opportunity, diving into the opening in a blaze of enthusiasm, barely making it through before the door tenses up once again behind him.//**##
&gt; 
&gt; ##064edd|**//Rowan Rocket finds himself in a dark, narrow tunnel. Is anyone else having deja vu? This time, though, the walls close in around him. Any other explorer might be scared, but Rowan Rocket trusts his gut, and he lets the waves of peristalsis carry him through as gently as a baby. There are some noises associated with all of this, but I think that sort of comedy is beneath us.//**##
&gt; 
&gt; ##064edd|**//Finally, Rowan Rocket finds himself spit out like a piece of gristle, and spins end over end into a wide conical space, like a circus tent with blood vessels. He rights himself, and calms his rocket-end, slowly lowering toward a floor that looks like it&#39;s carpeted in intestinal villi. In the middle of this strange field, leaning up against a house-sized polyp, is a wrecked wooden sloop, its hull split and its sails in tatters.//**##
&gt; 
&gt; @@ @@
&gt; **Rowan Rocket:** ##064edd|**Ahoy there! How did a thing like this get inside me?**##
&gt; 
&gt; @@ @@

**Conclusion:** Approximately 19 minutes after entering SCP-8060-A, Researcher Rowan Raster exited through the same building, and was then transported by Foundation personnel to a Foundation Rehabilitation and Debriefing Center for assessment and quarantine. While in transport, Rowan reportedly spit out a digital camera and notebook, chipping a lateral incisor in the process, but he otherwise was physically uninjured and superficially normal in appearance.

At the FRDC, Rowan was found to be physically stable and healthy with no anatomical changes, and demonstrated no unusual psychological changes apart from a previously undisclosed fear of dolphins. The only confirmed changes to Rowan were a benign anomalous effect manifesting when photographing him.

Rowan voluntarily turned over all records of his expedition to Site-433 Director Jonathan Mildew, but firmly refused to offer his own interpretations on any of the events therein. Additionally, he has gone on record strongly discouraging any future investigation or research into SCP-8060 and associated persons of interest.
